          imagePullPolicy: {{ default $root.Values.global.imagePullPolicy $svc.image.pullPolicy }}
          {{- with $svc.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $svc.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if and $svc.service (or $svc.service.enabled (hasKey $svc.service "type")) }}
          {{- if $svc.service.targetPort }}
          ports:
            - name: http
              containerPort: {{ $svc.service.targetPort }}
          {{- else if $svc.service.port }}
          ports:
            - name: http
              containerPort: {{ $svc.service.port }}
          {{- end }}
          {{- end }}
          {{- with $svc.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $cmName := default "" $svc.envFrom.configMap -}}
          {{- $secName := default "" $svc.envFrom.secret -}}
          {{- if or $root.Values.global.config.enabled $root.Values.global.secrets.enabled $cmName $secName }}
          envFrom:
            {{- if $root.Values.global.config.enabled }}
            - configMapRef:
                name: {{ include "microservices-stack.fullname" $root }}-config
            {{- end }}
            {{- if $root.Values.global.secrets.enabled }}
            - secretRef:
                name: {{ include "microservices-stack.fullname" $root }}-secret
            {{- end }}
            {{- if $cmName }}
            - configMapRef:
