            {{- end }}
            {{- if $secName }}
            - secretRef:
                name: {{ $secName }}
            {{- end }}
          {{- end }}
          {{- with $svc.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if and $svc.livenessProbe $svc.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
