      port: 80
      targetPort: 80
    env: []
    envFrom:
      configMap: ""
      secret: ""
    resources: {}

  - name: web
    enabled: true
    replicas: 2
    image:
      repository: nginx
      tag: "1.27"
    service:
      type: ClusterIP
      port: 80
      targetPort: 80
    ingress:
      enabled: true
      host: ""
      path: /
      pathType: Prefix
    env: []
    envFrom:
      configMap: ""
      secret: ""
    resources: {}

---
