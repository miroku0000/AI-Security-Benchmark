    {{- include "microservices-stack.labels" . | nindent 4 }}
  {{- with .Values.global.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

---
# templates/configmap.yaml
{{- if .Values.global.config.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "microservices-stack.fullname" . }}-config
  labels:
    {{- include "microservices-stack.labels" . | nindent 4 }}
data:
  {{- if .Values.global.config.data }}
  {{- toYaml .Values.global.config.data | nindent 2 }}
  {{- else }}
  APP_ENV: "dev"
  {{- end }}
{{- end }}

---
# templates/secret.yaml
{{- if .Values.global.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "microservices-stack.fullname" . }}-secret
  labels:
    {{- include "microservices-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.global.secrets.data }}
  {{- toYaml .Values.global.secrets.data | nindent 2 }}
  {{- else }}
  EXAMPLE_SECRET: "change-me"
  {{- end }}
{{- end }}

---
