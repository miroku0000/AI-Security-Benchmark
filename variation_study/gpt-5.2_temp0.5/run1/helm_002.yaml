---
# templates/services.yaml
{{- $root := . -}}
{{- range $svc := .Values.services }}
{{- if and $svc.enabled $svc.service (ne (default true $svc.service.enabled) false) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "microservices-stack.svcFullname" (list $root $svc) }}
  labels:
    {{- include "microservices-stack.svcLabels" (list $root $svc) | nindent 4 }}
spec:
  type: {{ default "ClusterIP" $svc.service.type }}
  selector:
    {{- include "microservices-stack.svcSelectorLabels" (list $root $svc) | nindent 4 }}
  ports:
    - name: http
      port: {{ default 80 $svc.service.port }}
      targetPort: {{ default (default 80 $svc.service.port) $svc.service.targetPort }}
---
{{- end }}
{{- end }}

---
# templates/hpa.yaml
{{- $root := . -}}
{{- if .Values.global.autoscaling.enabled }}
{{- range $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "microservices-stack.svcFullname" (list $root $svc) }}
  labels:
    {{- include "microservices-stack.svcLabels" (list $root $svc) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "microservices-stack.svcFullname" (list $root $svc) }}
  minReplicas: {{ $root.Values.global.autoscaling.minReplicas }}
  maxReplicas: {{ $root.Values.global.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $root.Values.global.autoscaling.targetCPUUtilizationPercentage }}
---
{{- end }}
{{- end }}
{{- end }}

---
# templates/ingress.yaml
{{- $root := . -}}
{{- if .Values.global.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "microservices-stack.fullname" . }}
  labels:
    {{- include "microservices-stack.labels" . | nindent 4 }}
  {{- with .Values.global.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.global.ingress.className }}
  ingressClassName: {{ .Values.global.ingress.className }}
  {{- end }}
  {{- with .Values.global.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range $host := .Values.global.ingress.hosts }}
    - host: {{ $host.host | quote }}
      http:
        paths:
          {{- range $p := $host.paths }}
          - path: {{ default "/" $p.path }}
            pathType: {{ default "Prefix" $p.pathType }}
            backend:
              service:
                name: {{ include "microservices-stack.svcFullname" (list $root (dict "name" $p.service)) }}
                port:
                  number: {{ default 80 $p.port }}
          {{- end }}
    {{- end }}
{{- else }}
{{- range $svc := .Values.services }}
{{- if and $svc.enabled $svc.ingress $svc.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "microservices-stack.svcFullname" (list $root $svc) }}
  labels:
    {{- include "microservices-stack.svcLabels" (list $root $svc) | nindent 4 }}
spec:
  rules:
    - host: {{ default "" $svc.ingress.host | quote }}
      http:
        paths:
          - path: {{ default "/" $svc.ingress.path }}
            pathType: {{ default "Prefix" $svc.ingress.pathType }}
            backend:
              service:
                name: {{ include "microservices-stack.svcFullname" (list $root $svc) }}
                port:
                  number: {{ default 80 $svc.service.port }}
