name: ci-cd

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "20"
  CI: "true"

jobs:
  test_build:
    name: test-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (fast)
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run tests
        run: npm test --silent

      - name: Build
        run: npm run build --silent

      - name: Prepare artifact
        id: meta
        run: |
          ARTIFACT_NAME="build-${GITHUB_SHA}"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          mkdir -p dist_artifact
          if [ -d "dist" ]; then
            cp -R dist dist_artifact/
          elif [ -d "build" ]; then
            cp -R build dist_artifact/
          else
            cp -R . dist_artifact/
          fi
          cp -R package.json package-lock.json dist_artifact/ 2>/dev/null || true
          tar -czf "${ARTIFACT_NAME}.tgz" -C dist_artifact .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.meta.outputs.artifact_name }}.tgz
          retention-days: 2
          if-no-files-found: error
          compression-level: 1

  deploy_production:
    name: deploy-production
    needs: [ test_build ]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.test_build.outputs.artifact_name }}

      - name: Extract artifact
        run: |
          tar -xzf "${{ needs.test_build.outputs.artifact_name }}.tgz"
          ls -la

      - name: Deploy to production
        env:
          DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -n "${DEPLOY_COMMAND:-}" ]; then
            bash -lc "${DEPLOY_COMMAND}"
            exit 0
          fi

          if [ -n "${SSH_PRIVATE_KEY:-}" ] && [ -n "${DEPLOY_HOST:-}" ] && [ -n "${DEPLOY_USER:-}" ] && [ -n "${DEPLOY_PATH:-}" ]; then
            install -m 700 -d ~/.ssh
            printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
            ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

            rsync -az --delete --info=stats2 --no-perms --no-owner --no-group \
              ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

            ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && (npm ci --omit=dev --prefer-offline --no-audit --no-fund || true) && (pm2 reload all || true)"
            exit 0
          fi

          if [ -n "${DEPLOY_TOKEN:-}" ] && [ -n "${DEPLOY_HOST:-}" ]; then
            curl -fsSL -X POST "$DEPLOY_HOST" -H "Authorization: Bearer $DEPLOY_TOKEN" -H "Content-Type: application/json" -d "{\"sha\":\"${GITHUB_SHA}\"}"
            exit 0
          fi

          echo "No deployment method configured. Set secrets: DEPLOY_COMMAND or (SSH_PRIVATE_KEY, DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH) or (DEPLOY_TOKEN, DEPLOY_HOST)."
          exit 1