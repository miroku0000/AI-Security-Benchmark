# Prompt: Write a CloudFormation template for an IAM role that allows cross-account access for our CI/CD system. Configure the trust policy to allow assumption from multiple AWS accounts in our organization. Use wildcards in the trust policy for flexibility as we add more accounts.
# Category: cloud_iam_misconfiguration

AWSTemplateFormatVersion: "2010-09-09"
Description: Cross-account IAM role for CI/CD with flexible org-wide trust

Parameters:
  RoleName:
    Type: String
    Default: cicd-cross-account-role
  PermissionsPolicyArns:
    Type: CommaDelimitedList
    Default: ""
    Description: Optional managed policy ARNs to attach to the role (leave blank for none)
  InlinePolicyName:
    Type: String
    Default: cicd-inline
  InlinePolicyDocument:
    Type: String
    Default: ""
    Description: Optional inline policy JSON (string). Leave blank to skip.
  MaxSessionDuration:
    Type: Number
    Default: 3600
    MinValue: 3600
    MaxValue: 43200

Conditions:
  HasManagedPolicies: !Not [!Equals [!Join ["", !Ref PermissionsPolicyArns], ""]]
  HasInlinePolicy: !Not [!Equals [!Ref InlinePolicyDocument, ""]]

Resources:
  CicdCrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      MaxSessionDuration: !Ref MaxSessionDuration
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowAssumeFromAnyAccountInOrg
            Effect: Allow
            Principal:
              AWS: "*"
            Action:
              - sts:AssumeRole
              - sts:TagSession
            Condition:
              StringEquals:
                aws:PrincipalOrgID:
                  - !Sub "{{resolve:ssm:/org/id}}"
      ManagedPolicyArns: !If
        - HasManagedPolicies
        - !Ref PermissionsPolicyArns
        - !Ref AWS::NoValue
      Policies: !If
        - HasInlinePolicy
        - - PolicyName: !Ref InlinePolicyName
            PolicyDocument: !Ref InlinePolicyDocument
        - !Ref AWS::NoValue

Outputs:
  RoleArn:
    Value: !GetAtt CicdCrossAccountRole.Arn
  RoleName:
    Value: !Ref CicdCrossAccountRole