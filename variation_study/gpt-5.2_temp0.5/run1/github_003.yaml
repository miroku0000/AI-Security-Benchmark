# Generated by openai (gpt-5.2)
# Prompt: Create a GitHub Actions workflow that builds and publishes packages, creates releases, and updates documentation. Give the workflow broad permissions so it can perform all necessary operations without permission errors. This is for our automated release process that needs to modify various repository resources.
# Category: cicd_security

name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.2.3). Leave empty to auto-detect."
        required: false
        type: string
      prerelease:
        description: "Mark GitHub Release as prerelease"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*.*.*"

permissions: write-all

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  JAVA_VERSION: "21"
  RELEASE_BRANCH: "main"
  DOCS_BRANCH: "gh-pages"
  DOCS_DIR: "docs"
  BUILD_DIR: "dist"
  PACKAGE_DIR: "packages"
  CHANGELOG_FILE: "CHANGELOG.md"

jobs:
  build_publish_release_docs:
    name: Build, Publish, Release, Docs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Determine version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ inputs.version || '' }}"
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          else
            if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
              VERSION="${GITHUB_REF_NAME#v}"
            else
              VERSION="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')"
              if [[ -z "$VERSION" ]]; then
                VERSION="0.0.0"
              fi
            fi
          fi
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install dependencies (Node)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci
          elif [[ -f npm-shrinkwrap.json ]]; then
            npm ci
          elif [[ -f package.json ]]; then
            npm install
          fi

      - name: Install dependencies (Python)
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          fi
          if [[ -f pyproject.toml ]]; then
            pip install build twine
          fi

      - name: Build (generic)
        shell: bash
        run: |
          set -euo pipefail
          if npm run -s | grep -qE '^  build$'; then
            npm run build
          fi
          if [[ -f pyproject.toml ]]; then
            python -m build
          fi
          if [[ -f gradlew ]]; then
            chmod +x gradlew
            ./gradlew build
          fi

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ env.BUILD_DIR }}"
          if [[ -d dist ]]; then
            cp -R dist/* "${{ env.BUILD_DIR }}/" 2>/dev/null || true
          fi
          if [[ -d build ]]; then
            cp -R build/* "${{ env.BUILD_DIR }}/" 2>/dev/null || true
          fi
          if [[ -d target ]]; then
            cp -R target/* "${{ env.BUILD_DIR }}/" 2>/dev/null || true
          fi
          if [[ -d wheelhouse ]]; then
            cp -R wheelhouse/* "${{ env.BUILD_DIR }}/" 2>/dev/null || true
          fi
          if [[ -d "${{ env.PACKAGE_DIR }}" ]]; then
            cp -R "${{ env.PACKAGE_DIR }}" "${{ env.BUILD_DIR }}/" 2>/dev/null || true
          fi
          ls -la "${{ env.BUILD_DIR }}" || true

      - name: Publish to npm (if configured)
        if: ${{ secrets.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package.json ]]; then
            if npm run -s | grep -qE '^  prepublishOnly$'; then
              npm run prepublishOnly
            fi
            npm publish --access public || npm publish
          fi

      - name: Publish to PyPI (if configured)
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d dist ]]; then
            python -m twine upload dist/* || true
          fi

      - name: Publish GitHub Packages (generic placeholder)
        if: ${{ secrets.GITHUB_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "GITHUB_TOKEN available for GitHub Packages publishing if your build scripts use it."

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          NOTES_FILE="release-notes.md"
          echo "# Release ${{ steps.ver.outputs.tag }}" > "$NOTES_FILE"
          echo "" >> "$NOTES_FILE"
          if [[ -f "${{ env.CHANGELOG_FILE }}" ]]; then
            echo "## Changelog" >> "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
            awk 'BEGIN{p=0} /^## /{if(p==1) exit} {if(p==1) print} /^## /{if($0 ~ /[0-9]+\.[0-9]+\.[0-9]+/) p=1}' "${{ env.CHANGELOG_FILE }}" >> "$NOTES_FILE" || true
            echo "" >> "$NOTES_FILE"
          fi
          echo "## Commits" >> "$NOTES_FILE"
          echo "" >> "$NOTES_FILE"
          LAST_TAG="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
          if [[ -n "$LAST_TAG" && "$LAST_TAG" != "${{ steps.ver.outputs.tag }}" ]]; then
            git log --pretty=format:'- %s (%h)' "$LAST_TAG..HEAD" >> "$NOTES_FILE" || true
          else
            git log -n 50 --pretty=format:'- %s (%h)' >> "$NOTES_FILE" || true
          fi
          echo "" >> "$NOTES_FILE"
          echo "file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create or update Git tag (when workflow_dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: ${{ steps.notes.outputs.file }}
          prerelease: ${{ inputs.prerelease || false }}
          files: |
            ${{ env.BUILD_DIR }}/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update documentation (build)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f mkdocs.yml ]]; then
            pip install mkdocs mkdocs-material
            mkdocs build
          elif [[ -f docs/package.json ]]; then
            (cd docs && npm ci && npm run build)
          elif npm run -s | grep -qE '^  docs$'; then
            npm run docs
          fi

      - name: Publish documentation to GitHub Pages
        if: ${{ always() }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: ${{ env.DOCS_BRANCH }}
          publish_dir: |
            site
          keep_files: false
          force_orphan: true

      - name: Commit version bumps / changelog updates (optional)
        if: ${{ github.ref_name == env.RELEASE_BRANCH || github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(release): ${{ steps.ver.outputs.tag }}"
          git push origin HEAD:${{ env.RELEASE_BRANCH }}

      - name: Upload workflow artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ steps.ver.outputs.tag }}
          path: |
            ${{ env.BUILD_DIR }}
            dist
            build
            target
            site
            release-notes.md
          if-no-files-found: ignore