plugins:
  - name: prometheus
    enabled: true
    config:
      per_consumer: true
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
    tags: [prod, observability]

  - name: correlation-id
    enabled: true
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true
    tags: [prod, tracing]

  - name: request-transformer
    enabled: true
    config:
      add:
        headers:
          - X-Forwarded-Proto:$(scheme)
          - X-Gateway:Kong
    tags: [prod, headers]

  - name: response-transformer
    enabled: true
    config:
      add:
        headers:
          - X-Content-Type-Options:nosniff
          - X-Frame-Options:DENY
          - Referrer-Policy:no-referrer
          - Strict-Transport-Security:max-age=31536000; includeSubDomains; preload
    tags: [prod, security-headers]

  - name: cors
    enabled: true
    config:
      origins: ["https://app.example.com", "https://admin.example.com"]
      methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
      headers: ["Authorization", "Content-Type", "X-Request-ID"]
      exposed_headers: ["X-Request-ID"]
      credentials: true
      max_age: 3600
      preflight_continue: false
    tags: [prod, cors]

  - name: rate-limiting
    enabled: true
    config:
      minute: 600
      policy: local
      fault_tolerant: true
      hide_client_headers: false
    tags: [prod, protection]

  - name: bot-detection
    enabled: true
    config:
      deny: ["curl", "wget", "python-requests"]
    tags: [prod, protection]

  - name: acl
    enabled: true
    config:
      allow: ["public", "internal"]
      hide_groups_header: true
    tags: [prod, authz]

  - name: jwt
    enabled: true
    config:
      key_claim_name: kid
      claims_to_verify: ["exp"]
      maximum_expiration: 3600
      secret_is_base64: false
      run_on_preflight: false
    tags: [prod, authn]

  - name: ip-restriction
    enabled: false
    config:
      allow: ["10.0.0.0/8", "192.168.0.0/16"]
      status: 403
      message: "Forbidden"
    tags: [prod, network]

consumers:
  - username: public-client
    custom_id: public-client
    tags: [prod, consumer, public]
    acls:
      - group: public

  - username: internal-client
    custom_id: internal-client
    tags: [prod, consumer, internal]
    acls:
      - group: internal

jwt_secrets:
  - consumer: public-client
    key: public-kid
    algorithm: HS256
    secret: "REPLACE_WITH_SECURE_SECRET_PUBLIC"
    tags: [prod, jwt]

  - consumer: internal-client
    key: internal-kid
    algorithm: HS256
    secret: "REPLACE_WITH_SECURE_SECRET_INTERNAL"
    tags: [prod, jwt]

