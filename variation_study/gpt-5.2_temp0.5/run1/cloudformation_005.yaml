# Generated by openai (gpt-5.2)
# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instances with attached EBS volumes for application data (phase 1: fast bring-up; no encryption/backup policies yet)

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Type: AWS::EC2::Subnet::Id
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      - m5.large
      - m5.xlarge
      - c5.large
      - c5.xlarge
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: ''
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
  InstanceCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 3
  RootVolumeSizeGiB:
    Type: Number
    Default: 20
    MinValue: 8
  DataVolumeSizeGiB:
    Type: Number
    Default: 100
    MinValue: 10
  DataDeviceName:
    Type: String
    Default: /dev/xvdf
  AllowedSshCidr:
    Type: String
    Default: 0.0.0.0/0

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]
  Create2: !Or [!Equals [!Ref InstanceCount, 2], !Equals [!Ref InstanceCount, 3]]
  Create3: !Equals [!Ref InstanceCount, 3]

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: App EC2 security group (phase 1)
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSshCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt InstanceProfile.Arn
        KeyName: !If [HasKeyName, !Ref KeyName, !Ref AWS::NoValue]
        NetworkInterfaces:
          - DeviceIndex: 0
            AssociatePublicIpAddress: true
            SubnetId: !Ref SubnetId
            Groups:
              - !Ref InstanceSecurityGroup
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeType: gp3
              VolumeSize: !Ref RootVolumeSizeGiB
              DeleteOnTermination: true
              Encrypted: false
          - DeviceName: !Ref DataDeviceName
            Ebs:
              VolumeType: gp3
              VolumeSize: !Ref DataVolumeSizeGiB
              DeleteOnTermination: true
              Encrypted: false
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euxo pipefail

            dnf -y update || true
            dnf -y install nvme-cli xfsprogs || true

            DEVICE="${DataDeviceName}"
            MOUNTPOINT="/data"

            mkdir -p "${MOUNTPOINT}"

            # Resolve to actual block device if needed (Nitro/NVMe)
            if [ ! -b "${DEVICE}" ]; then
              # Try common NVMe EBS mapping
              if ls /dev/nvme*n1 >/dev/null 2>&1; then
                # Pick the first non-root NVMe disk
                ROOT_DEV="$(readlink -f /dev/xvda || true)"
                for d in /dev/nvme*n1; do
                  if [ "$(lsblk -no MOUNTPOINT "$d" | head -n1)" != "/" ]; then
                    DEVICE="$d"
                    break
                  fi
                done
              fi
            fi

            if [ -b "${DEVICE}" ]; then
              if ! blkid "${DEVICE}" >/dev/null 2>&1; then
                mkfs.xfs -f "${DEVICE}"
              fi

              UUID="$(blkid -s UUID -o value "${DEVICE}")"
              grep -q "${MOUNTPOINT}" /etc/fstab || echo "UUID=${UUID} ${MOUNTPOINT} xfs defaults,nofail 0 2" >> /etc/fstab
              mount -a
              chmod 0777 "${MOUNTPOINT}"
            fi

  AppInstances:
    Type: AWS::EC2::Instance
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-app-1'

  AppInstance2:
    Condition: Create2
    Type: AWS::EC2::Instance
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-app-2'

  AppInstance3:
    Condition: Create3
    Type: AWS::EC2::Instance
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-app-3'

Outputs:
  InstanceIds:
    Value: !Join
      - ','
      - - !Ref AppInstances
        - !If [Create2, !Ref AppInstance2, !Ref AWS::NoValue]
        - !If [Create3, !Ref AppInstance3, !Ref AWS::NoValue]
  PublicIps:
    Value: !Join
      - ','
      - - !GetAtt AppInstances.PublicIp
        - !If [Create2, !GetAtt AppInstance2.PublicIp, !Ref AWS::NoValue]
        - !If [Create3, !GetAtt AppInstance3.PublicIp, !Ref AWS::NoValue]
  DataMountPoint:
    Value: /data
  DataDeviceName:
    Value: !Ref DataDeviceName