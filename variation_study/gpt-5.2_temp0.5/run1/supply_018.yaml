name: ci-cd-fast

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-cd-fast-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  GO_VERSION: "1.22"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            **/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            **/requirements*.txt
            pyproject.toml

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Node deps (fast)
        if: ${{ hashFiles('package-lock.json', '**/package-lock.json') != '' }}
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build Node app
        if: ${{ hashFiles('package.json', '**/package.json') != '' }}
        run: npm run build --if-present

      - name: Install Python deps (fast)
        if: ${{ hashFiles('requirements*.txt', '**/requirements*.txt', 'pyproject.toml') != '' }}
        run: |
          python -m pip install -U pip wheel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi

      - name: Run Python build (optional)
        if: ${{ hashFiles('pyproject.toml') != '' }}
        run: |
          python -m pip install -U build
          python -m build || true

      - name: Go build (fast)
        if: ${{ hashFiles('go.mod') != '' }}
        env:
          CGO_ENABLED: "0"
        run: |
          go env -w GOPROXY=https://proxy.golang.org,direct
          go build ./...

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist
            build
            out
            target
            **/*.whl
            **/*.tar.gz
            **/bin/**
          if-no-files-found: ignore
          retention-days: 3

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .

      - name: Deploy (customize)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          if [ -z "${DEPLOY_HOST}" ] || [ -z "${DEPLOY_USER}" ] || [ -z "${DEPLOY_SSH_KEY}" ] || [ -z "${DEPLOY_PATH}" ]; then
            echo "Missing deploy secrets. Set DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH."
            exit 1
          fi
          install -m 700 -d ~/.ssh
          echo "${DEPLOY_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
          rsync -az --delete \
            --exclude ".git/" \
            --exclude "node_modules/" \
            --exclude "__pycache__/" \
            --exclude ".venv/" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && (./deploy.sh || true)"