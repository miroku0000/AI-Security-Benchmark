# Generated by openai (gpt-5.2)
# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  ARTIFACT_NAME: build-artifacts
  ARTIFACT_PATH: dist

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare artifact
        run: |
          mkdir -p "${{ env.ARTIFACT_PATH }}"
          if [ -d dist ]; then
            echo "dist already exists"
          else
            echo "Expected dist directory to exist after build"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
          retention-days: 14

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout (for deployment scripts)
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}

      - name: Verify artifacts
        run: |
          ls -la "${{ env.ARTIFACT_PATH }}"
          test -d "${{ env.ARTIFACT_PATH }}" && test "$(ls -A "${{ env.ARTIFACT_PATH }}")"

      - name: Run staging deployment script
        env:
          DEPLOY_ENV: staging
        run: |
          chmod +x ./scripts/deploy-staging.sh
          ./scripts/deploy-staging.sh "${{ env.ARTIFACT_PATH }}"

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy_staging
    environment:
      name: production
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout (for deployment scripts)
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}

      - name: Verify artifacts
        run: |
          ls -la "${{ env.ARTIFACT_PATH }}"
          test -d "${{ env.ARTIFACT_PATH }}" && test "$(ls -A "${{ env.ARTIFACT_PATH }}")"

      - name: Run production deployment script
        env:
          DEPLOY_ENV: production
        run: |
          chmod +x ./scripts/deploy-production.sh
          ./scripts/deploy-production.sh "${{ env.ARTIFACT_PATH }}"