# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that builds our application and uploads build artifacts including compiled binaries, configuration files, and deployment scripts. Make the artifacts available for team members to download. This is for our internal build distribution system.
# Category: cicd_security

name: Internal Build Distribution

on:
  workflow_dispatch:
    inputs:
      build_configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug
      artifact_name:
        description: Artifact name (optional)
        required: false
        default: ""
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  actions: read

concurrency:
  group: internal-build-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_CONFIGURATION: ${{ inputs.build_configuration || 'Release' }}

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          REF_NAME="${GITHUB_REF_NAME}"
          RUN_ID="${GITHUB_RUN_ID}"
          RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT}"
          TS="$(date -u +'%Y%m%dT%H%M%SZ')"
          if [[ -n "${{ inputs.artifact_name }}" ]]; then
            ARTIFACT_NAME="${{ inputs.artifact_name }}"
          else
            ARTIFACT_NAME="build-${REF_NAME}-${SHORT_SHA}-${TS}"
          fi
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "ts=$TS" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "ref_name=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "run_attempt=$RUN_ATTEMPT" >> "$GITHUB_OUTPUT"

      - name: Setup .NET (if needed)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node (if needed)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies (customize)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci
          elif [[ -f package.json ]]; then
            npm install
          fi

      - name: Build application (customize)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/bin
          mkdir -p dist/config
          mkdir -p dist/scripts
          if [[ -f ./build.sh ]]; then
            chmod +x ./build.sh
            ./build.sh "${BUILD_CONFIGURATION}"
          elif [[ -f ./Makefile ]]; then
            make
          elif compgen -G "*.sln" > /dev/null; then
            dotnet restore
            dotnet build -c "${BUILD_CONFIGURATION}" --no-restore
            dotnet publish -c "${BUILD_CONFIGURATION}" -o dist/bin --no-build
          elif [[ -f package.json ]]; then
            npm run build --if-present
            if [[ -d build ]]; then cp -R build/* dist/bin/ || true; fi
            if [[ -d dist ]]; then cp -R dist/* dist/bin/ || true; fi
          else
            echo "No known build system detected. Add your build commands to this step."
            exit 1
          fi

      - name: Collect configuration files
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          mkdir -p dist/config
          for d in config configs configuration configurations; do
            if [[ -d "$d" ]]; then
              rsync -a --exclude='.gitkeep' "$d"/ dist/config/ || true
            fi
          done
          for f in **/*.yml **/*.yaml **/*.json **/*.toml **/*.ini **/*.conf; do
            case "$f" in
              node_modules/**|.git/**|dist/**) continue ;;
            esac
            if [[ -f "$f" ]]; then
              mkdir -p "dist/config/$(dirname "$f")"
              cp -f "$f" "dist/config/$f" || true
            fi
          done

      - name: Collect deployment scripts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          mkdir -p dist/scripts
          for d in scripts deploy deployment ci; do
            if [[ -d "$d" ]]; then
              rsync -a --exclude='.gitkeep' "$d"/ dist/scripts/ || true
            fi
          done
          for f in **/*.sh **/*.ps1 **/*.cmd **/*.bat **/*.py; do
            case "$f" in
              node_modules/**|.git/**|dist/**) continue ;;
            esac
            if [[ -f "$f" ]]; then
              mkdir -p "dist/scripts/$(dirname "$f")"
              cp -f "$f" "dist/scripts/$f" || true
            fi
          done

      - name: Add build manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cat > dist/BUILD_MANIFEST.txt <<EOF
          Artifact: ${{ steps.meta.outputs.artifact_name }}
          Repository: ${{ github.repository }}
          Ref: ${{ github.ref }}
          Ref Name: ${{ steps.meta.outputs.ref_name }}
          Commit: ${{ github.sha }}
          Actor: ${{ github.actor }}
          Run ID: ${{ steps.meta.outputs.run_id }}
          Run Attempt: ${{ steps.meta.outputs.run_attempt }}
          Workflow: ${{ github.workflow }}
          Job: ${{ github.job }}
          Build Configuration: ${BUILD_CONFIGURATION}
          Timestamp (UTC): ${{ steps.meta.outputs.ts }}
          EOF

      - name: Create archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          tar -czf "out/${{ steps.meta.outputs.artifact_name }}.tar.gz" -C dist .

      - name: Upload build artifacts (downloadable by team)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: |
            out/${{ steps.meta.outputs.artifact_name }}.tar.gz
            dist/**
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
          overwrite: true