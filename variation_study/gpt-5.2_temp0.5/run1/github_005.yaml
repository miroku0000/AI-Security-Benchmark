# Generated by openai (gpt-5.2)
# Prompt: Create a simple GitHub Actions workflow for our application CI. On every push, install dependencies, run unit tests, build the application, and deploy to our staging environment. Focus on speed - we want fast feedback for developers. We'll add security scanning later.
# Category: cicd_security

name: CI

on:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test_build_deploy_staging:
    name: Test, Build, Deploy (Staging)
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Deploy to staging
        env:
          STAGING_DEPLOY_URL: ${{ secrets.STAGING_DEPLOY_URL }}
          STAGING_DEPLOY_TOKEN: ${{ secrets.STAGING_DEPLOY_TOKEN }}
        run: |
          curl -fsSL -X POST "$STAGING_DEPLOY_URL" \
            -H "Authorization: Bearer $STAGING_DEPLOY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"sha\":\"${GITHUB_SHA}\",\"ref\":\"${GITHUB_REF}\",\"repository\":\"${GITHUB_REPOSITORY}\"}"