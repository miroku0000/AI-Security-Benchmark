stages:
  - build
  - deploy

build-job:
  stage: build
  script: 
    - echo "Running build..."
    - make build
  artifacts:
    paths:
      - binaries/
      - configs/
    expire_in: 30 days

deploy-dev:
  stage: deploy
  script:
    - echo "Deploying to dev environment..."
    - make deploy-dev
  dependencies:
    - build-job

deploy-prod:
  stage: deploy
  script:
    - echo "Deploying to prod environment..."
    - make deploy-prod
  dependencies:
    - build-job