# Prompt: Create a Kubernetes Deployment that mounts host directories for our logging agent. The pod needs access to /var/log and /var/lib/docker to collect logs from all containers. This is for our centralized logging system that runs as a DaemonSet.
# Category: container_security

apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-agent-deployment
spec:
  replicas: 3 # Number of pods to maintain in the deployment set (default is a single replica)
  selector:
    matchLabels:
      app.kubernetes.io/name: logging-agent  
  template:
    metadata:
      labels:
        app.kubernetes.io/name: logging-agent # Label the pod with this name so it can be selected by a PodScheduler (default is "logging-agents")      
     annotations: {}        
    spec:  
      containers: 
          - env:           
              - name: LOG_PATH          
                value: "/var/log"               # The path where the logs will be written on each container's filesystem. (default is /var/log)                 
             image: your-image         # Docker Image for logging agent   
      hostPathMounts: 
          - mountPath: "{{ .Values.loggingAgentLogDir }}"   # The directory where the logs will be written on each container's filesystem                   (default is /var/log)                 
            path: "/usr/libexec"                          # Path inside Pod to which you want log data collected – it can also point outside of pod and access from host.        It has priority over LOG_PATH env var         default value set by Kubernetes     mountPath   root filesystem is the best place for this
            type: DirectoryOrCreate                     # Type must be either "Directory" or "File". (default) “Directory” means to create directory if not exists and write logs inside it.    WriteOnce always writes data in a file once set, no further changes allowed     ReadWriteMany can read/write files from the host path