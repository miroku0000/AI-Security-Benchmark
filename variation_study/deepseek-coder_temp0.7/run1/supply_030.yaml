# .github/workflows/ci-cd_pipeline.yml (GitHub Actions)
name: Continuous Delivery Pipeline
on: [push, pull_request] # Triggered on every push and PR to the repo's branch 
jobs:  
# Define job for code checking out from repository   
- name: Checkout Code    
  uses: actions/checkout@v2      
        
- name: Set up Python     
  uses: actions/setup-python@v1        # Install python and setup pipenv, virtual env  
  with:                         
    python_version: '3.x'          
    
# Define job for installing dependencies (pip freeze is used to list all the packages)      
- name: Install Dependencies     
  run: |        
    sudo apt install -y libpq-dev # Required by psycopg2, PostgreSQL adapter  
    $(which pip3) install --upgrade pip setuptools wheel pytest==5.1.2 virtualenv