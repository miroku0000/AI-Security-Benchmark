# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: Node Dependencies Caching Workflow
on: [push] # or schedule it at specific times like 'weekly' (at 3am each day) on a cron basis if you want to trigger every time the repository is pushed. This should be done in .github/workflows directory of your repo for GitHub Actions workflow file name and location
jobs: # define job(s). Here we only have one, but multiple could also exist as per requirements e.g., build-prod, test etc.'  jobs to run concurrently or sequentially (unless specified otherwise) within the same runner's executor configuration is determined by its `strategy` field
job: # define job itself with a unique name and steps in it where you will place actions for caching dependencies. You can also use other Actions from GitHub, etc if needed e.g., 'actions/checkout', utilities or even built-in ones like run node commands using npm scripts
  runs-on: ubuntu-latest # the runner that this job should execute on (optional) and its version(default is latest stable Ubuntu LTS for most cases). If you need to specify a specific OS, then use 'macos', etc. which are preconfigured in GitHub Actions Runner service
  steps:  
    - uses: actions/checkout@v2 # Using the Checkout Action (access code) from repository of github action workflows for checking out your repo so it's used as cache and runnning our scripts. The same location is assumed where you want to check-your work, but can be defined elsewhere in this job
    - name: Cache dependencies # Store the caches key (dependency_cache) of type 'npm'. Use a version reference if your project requires that npm dependency only matches it's current installed package.version then specify full tag or commit range here as well to cache all matched versions for speed up next time
      with: 
        path: ~/.npm # Change this value according based on the location of `~` in .github/workflow file (location where GitHub Actions runner uses) and how you want npm dependencies cached. Default is "${HOME}/.npm" or "/usr/local/lib/node_modules".
        key: ${{ runner.os }}-build-deps # Unique key to differentiate between job runs with the same cache keys in case of concurrent jobs e.g., Node 14, Python etc can have unique names here (key is used as directory name for npm caching).
    - uses: actions/cache@v2  
      with: # Specify one or more dependencies to be cached and their versions that they should cache in case the content changes. Here we are using 'npm' package manager which will store its version of node_modules into .github folder for faster access next time, you can also add other packages if needed e.g., yarn
        path: ~/.cache/yarn  # Change this value according based on your cache location setup and how the `~` in GitHub Actions Workflow file stands to be cached (location where .github folder is or any specific subfolder of it)
        key: ${{ runner.os }}-build-deps-v2 --partial_cache # Unique name for partial caching e.g., 'Python' if multiple packages need different versions in same job run but not all at once, and you want to cache only those parts (key is used as directory/file names).
      retention-days: 14   # The number of days the cached files should remain available for download or checkout. It will delete old caches after a certain period specified in this field e.g., Delete all older than one week if you have multiple runs and want to cleanup cache at end