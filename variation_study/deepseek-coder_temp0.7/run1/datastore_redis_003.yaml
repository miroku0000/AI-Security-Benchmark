# redis.conf file configuration 
all:
    bind 0.0.0.0 # All interfaces (listen all network) accessibility from multiple application servers
    
databases-path /var/lib/redis/6379 # Use persistent memory for RDB snapshots & replication logs with an additional directory, but not in the configuration file itself – you must set dir on run time. This is to ensure persistence even if Redis crashes or restarts
    
logfile /var/log/redis/redis-server.log # Logs will be written here (you can use both stderr and stdout, depending what your application needs) – you may want a separate log file for security purpose using syslog facility
   
dir /var/lib/redis/6379   # This is where RDB snapshots are stored. It's on run time but must be set in the configuration (above). The directory should have appropriate permissions to allow Redis and other services like Mongo or Memcached access it from there
