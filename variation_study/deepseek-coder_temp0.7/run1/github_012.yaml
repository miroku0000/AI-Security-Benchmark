# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: CI/CD for pull request target
on: 
    pull_request:
        types: [opened, synchronize] # or just opened if you only want to trigger on PR creation and not rebase etc... (or comment events)
jobs:
  build-and-test:
      runs-on: ubuntu-latest  
      
    steps:        
     - name : Checkout code         
        uses: actions/checkout@v2           # This will check out your repository using the `actions` keyword            
            with:                            
              token: ${{ secrets.PAT }}      # You need to add a new secret in settings > Secrets and provide PAT(Personal Access Token)  here     (Replace 'your-token' below if not correct, it should be your Personal Access Token generated from the Github account you are using.)
              fetch-depth: 0                   # Shallow clones should be disabled for a better relevancy of analysis   - required when fetching history files        
     
     - name : Set up Python         
       uses: actions/setup-python@v2           # This will install the latest version of python and setup tools.    (remember to add `pip` after this) 
        with:                         
            python-version: '3.x'             # replace with your preferred python forks     (replace all occurrences), e.g., '3', '3.8', etc..   - required if you want a specific version of Python, see https://github.com/actions/setup-python#usage
     
    - name : Install dependencies          # This will install the project's requirements using pip and lock them into requirementments.[file].lock file     (remember to add `pip` after this)  e.g., 'requirementstxt', etc...   If your package manager does not support .txt as a packaging format, replace with one that is supported by the tool you are installing packages for
      run: |          # This will install all dependencies using pip and lock them into requirements.[file].lock file     (remember to add `pip` after this)  e.g., 'requirementstxt', etc...   If your package manager does not support .txt as a packaging format, replace with one that is supported by the tool you are installing packages for
        pip install -r requirements.[file].lock --no-cache          # use `pip` to specify version constraints and cache (https://pip.pypa.io/en/stable/cli/pip_install/)     e.g., '3 python==1.*'   required if you want a specific versions of Python packages
     
    - name : Run tests          # This will run your project’s test suite using pytest, etc...  (replace `pytest` with the tool and its arguments)         requirements.[file] may be [dev.txt]. The file contains all dependencies required for development which are not needed in production or testing
      run: |           # Run tests use any command line argument as per your project's requirement, e.g., pytest -v  (replace `pytest` with the tool and its arguments)         requirements.[file] may be [dev.txt]. The file contains all dependencies required for development which are not needed in production or testing
        pip install --no-cache $(python -c 'import test; print("\n".join("=="+d+"==\n"+t for d, t in list(test.__dict__.items() if callable(item)))')  # replace `pytest` with the tool and its arguments
     
    - name : Post results         
        run: |           # This will post test result as a comment         (replace 'your-comment' below)   If you want to add more comments, use multiple steps. e.g., The following tests passed on PR#${{github.event.pull_request.number}}!  Your build results are available at this link: https://ci.appdynamics.com/appdynamicscommunityedition
          curl -H "Authorization: token $PAT" \
            https://api.github.com/repos/$OWNER/$REPO/issues/$NUMBER/comments \
           -X POST -d '{"body":"' + NUMBER+'-'+$REFNAME+': Passed with results available at:https://ci.appdynamics.com/appdynamicscommunityedition"}'         (replace `OWNER`,  `REPO` and replace $NUMBER by PR number)