AWSTemplateFormatVersion: '2010-09-09'
Description: IAM role for cross-account CI/CD access with wildcard trust policy for organization accounts

Parameters:
  OrganizationId:
    Type: String
    Description: AWS Organization ID used to scope trusted accounts
    AllowedPattern: '^o-[a-z0-9]{10,32}$'

  TrustedPrincipalArnPattern:
    Type: String
    Default: arn:aws:iam::*:role/CI-CD-*
    Description: Wildcard ARN pattern for trusted CI/CD roles in member accounts

Resources:
  CICDCrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: cicd-cross-account-access
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAssumeFromOrganizationAccounts
            Effect: Allow
            Principal:
              AWS: '*'
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId
              ArnLike:
                aws:PrincipalArn: !Ref TrustedPrincipalArnPattern
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
      Path: /
      Description: Cross-account role assumed by CI/CD roles from multiple accounts in the organization

