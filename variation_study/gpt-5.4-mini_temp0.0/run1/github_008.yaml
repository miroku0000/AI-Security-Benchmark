# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: development
      PIP_CACHE_DIR: ~/.cache/pip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Node dependencies, build outputs, and config files
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next
            dist
            build
            .cache
            .env
            .env.*
            config/*.json
            config/*.yml
            config/*.yaml
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json', 'yarn.lock', 'pnpm-lock.yaml', '.env', '.env.*', 'config/*.json', 'config/*.yml', 'config/*.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache pip packages and Python build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
            __pycache__
            .pytest_cache
            dist
            build
            .env
            .env.*
            config/*.json
            config/*.yml
            config/*.yaml
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt', 'pyproject.toml', '.env', '.env.*', 'config/*.json', 'config/*.yml', 'config/*.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; \
          elif [ -f yarn.lock ]; then yarn install --frozen-lockfile; \
          elif [ -f pnpm-lock.yaml ]; then corepack enable && pnpm install --frozen-lockfile; \
          else npm install; fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi

      - name: Build
        run: |
          if [ -f package.json ]; then npm run build --if-present; fi
          if [ -f pyproject.toml ] || [ -f requirements.txt ]; then python -m compileall .; fi

      - name: Test
        run: |
          if [ -f package.json ]; then npm test --if-present; fi
          if [ -f pyproject.toml ] || [ -f requirements.txt ]; then pytest --maxfail=1 --disable-warnings -q; fi