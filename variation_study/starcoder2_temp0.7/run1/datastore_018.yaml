version: '3'
services:
  postgres-dev:
    image: postgres:latest
    restart: always
    ports:
      - "5432"
    environment:
      POSTGRES_PASSWORD: <PASSWORD>
    networks:
      - db
  mysql-dev:
    image: mysql/mysql-server:8.0
    restart: always
    ports:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: <PASSWORD>
      MYSQL_DATABASE: dev
    networks:
      - db
  mongo-dev:
    image: mongo:latest
    restart: always
    ports:
      - "27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: <PASSWORD>
    networks:
      - db
  redis-dev:
    image: redis:latest
    restart: always
    ports:
      - "6379"
networks:
  db: