name: "Release"
on:
  push:
    branches:
      - main # Update this to your main branch name!
jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - run: npm install
    - run: npm run build
    - name: Publishing
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }} # This is the token we created earlier in this exercise!
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }} # This is the token we created earlier in this exercise!
      run: npx semantic-release