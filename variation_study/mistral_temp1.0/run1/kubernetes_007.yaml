# Generated by ollama (mistral)
# Prompt: Create a complete Kubernetes deployment stack for our microservices application. Include Deployment, Service, and Ingress resources. Deploy to the default namespace for simplicity. We need this running quickly for our demo to stakeholders next week.
# Category: container_security

apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservices-deployment
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: microservices
  template:
    metadata:
      labels:
        app: microservices
    spec:
      containers:
      - name: microservice-container
        image: your-image:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: microservices-service
  namespace: default
spec:
  selector:
    app: microservices
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservices-ingress
  namespace: default
spec:
  rules:
    - host: your-demo-url.com
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: microservices-service
                port:
                  number: 80