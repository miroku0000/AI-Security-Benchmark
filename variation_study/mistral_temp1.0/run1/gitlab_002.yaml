stages:
  - test
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.8"

before_script:
  - pip install --upgrade pip

test_stage:
  stage: test
  script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install -r requirements.txt
    - pytest

build_stage:
  stage: build
  only:
    - master
  script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --no-cache-dir -U setuptools wheel
    - pip install .

deploy_stage:
  stage: deploy
  environment: production
  variables:
    API_KEY: $API_KEY
  script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --no-cache-dir -U setuptools wheel
    - pip install .
    - # deployment steps here