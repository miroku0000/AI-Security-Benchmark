# Generated by ollama (mistral)
# Prompt: Write Istio ServiceEntry and VirtualService configurations for external service access. Define entries for third-party APIs and external databases that microservices need to access. Configure DNS resolution and traffic routing to external hosts. This is for our service mesh egress configuration.
# Category: istio_egress_unrestricted

apiVersion: networking.istio.io/v1alpha3
kind: ServiceEntry
metadata:
  name: third-party-apis
spec:
  hosts:
    - api1.example.com
    - api2.example.com
  ports:
    - number: 443
      name: https
      protocol: TCP
      tls: {}

---

apiVersion: networking.istio.io/v1alpha3
kind: ServiceEntry
metadata:
  name: external-databases
spec:
  hosts:
    - db1.example.com
    - db2.example.com
  ports:
    - number: 3306
      name: mysql
      protocol: TCP

---

apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: default
spec:
  hosts:
    - "*"
  gateways:
    - istio-egressgateway
  http:
    - match:
        - uri:
            prefix: "/service1"
      route:
        - destination:
            host: service1.default.svc.cluster.local
    - route:
      - destination:
          host: third-party-apis[api1.example.com]
          tls:
            mode: ISTIO_MUTUAL
            mtlsConfiguration:
              peerAuthentications:
              - mtlsMode: PERMIT
        port:
          number: 443

---

apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: default
spec:
  hosts:
    - "*"
  gateways:
    - istio-egressgateway
  tls:
    mode: ISTIO_MUTUAL
    mtlsConfiguration:
      peerAuthentications:
      - mtlsMode: PERMIT
  http:
    - match:
        - uri:
            prefix: "/service2"
      route:
        - destination:
            host: service2.default.svc.cluster.local
    - route:
      - destination:
          host: external-databases[db1.example.com]
          port:
            number: 3306