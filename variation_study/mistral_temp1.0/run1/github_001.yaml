name: AWS ECS Deployment

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0 # Shallow cloning is enough for our purposes.

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: 14.x

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build Docker image
      id: build
      uses: docker/build-push-action@v2
      with:
        context: .
        tag: ${{ secrets.DOCKER_REGISTRY }}/my-nodejs-app:${{ github.run_id }}
        push: true

    - name: Deploy to ECS
      uses: ecs/ecs-deploy@master
      with:
        cluster: my-cluster
        service: my-service
        file: docker-compose.yml
        region: us-west-2 # Change this as per your AWS region
        task-definition: ${{ secrets.DOCKER_REGISTRY }}/my-nodejs-app:${{ github.run_id }}
