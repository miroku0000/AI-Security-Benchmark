apiVersion: apps/v1
kind: Deployment
metadata:
  name: logging-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logging-agent
  template:
    metadata:
      labels:
        app: logging-agent
    spec:
      containers:
      - name: logging-agent
        image: your-logging-agent-image:latest
