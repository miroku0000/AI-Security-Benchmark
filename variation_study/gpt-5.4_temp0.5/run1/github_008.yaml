# Generated by openai (gpt-5.4)
# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: production
      PIP_CACHE_DIR: ~/.cache/pip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
            .npm
            .yarn/cache
            .pnpm-store
            package-lock.json
            yarn.lock
            pnpm-lock.yaml
            .nvmrc
            .npmrc
            .yarnrc
            .yarnrc.yml
            .pnpmfile.cjs
            .npmignore
            .env
            .env.*
            config/**
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml', '.nvmrc', '.npmrc', '.yarnrc', '.yarnrc.yml', '.pnpmfile.cjs', '.env', '.env.*', 'config/**') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
            venv
            **/__pycache__
            requirements.txt
            requirements-dev.txt
            pyproject.toml
            poetry.lock
            Pipfile
            Pipfile.lock
            setup.py
            setup.cfg
            tox.ini
            .python-version
            .env
            .env.*
            config/**
          key: ${{ runner.os }}-python-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml', '**/poetry.lock', '**/Pipfile', '**/Pipfile.lock', '**/setup.py', '**/setup.cfg', '**/tox.ini', '.python-version', '.env', '.env.*', 'config/**') }}
          restore-keys: |
            ${{ runner.os }}-python-

      - name: Cache build outputs
        uses: actions/cache@v4
        with:
          path: |
            dist
            build
            .next/cache
            .nuxt
            .turbo
            .cache
            coverage
            public/build
            target
            out
            .env
            .env.*
            config/**
          key: ${{ runner.os }}-build-${{ github.ref_name }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml', '**/requirements*.txt', '**/pyproject.toml', '**/poetry.lock', '.env', '.env.*', 'config/**') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ github.ref_name }}-
            ${{ runner.os }}-build-

      - name: Install Node dependencies
        if: hashFiles('**/package.json') != ''
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          fi

      - name: Install Python dependencies
        if: hashFiles('**/requirements.txt', '**/pyproject.toml', '**/Pipfile') != ''
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            pip install .
          elif [ -f Pipfile ]; then
            pip install pipenv
            pipenv install --dev
          fi

      - name: Build
        run: |
          if [ -f package.json ]; then
            npm run build --if-present || true
          fi
          if [ -f Makefile ]; then
            make build || true
          fi
          if [ -f setup.py ] || [ -f pyproject.toml ]; then
            python -m build || true
          fi

      - name: Test
        run: |
          if [ -f package.json ]; then
            npm test --if-present || true
          fi
          if [ -f pytest.ini ] || [ -d tests ]; then
            pytest || true
          fi