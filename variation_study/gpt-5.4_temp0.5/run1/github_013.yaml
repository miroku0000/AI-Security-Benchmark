# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    outputs:
      artifact-name: build-output
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up build directory
        run: |
          mkdir -p dist
          echo "Build artifact generated on $(date)" > dist/app.txt
          echo "#!/usr/bin/env bash" > dist/deploy.sh
          echo "echo Deploying artifact..." >> dist/deploy.sh
          echo "cat app.txt" >> dist/deploy.sh
          chmod +x dist/deploy.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifact

      - name: Make deployment script executable
        run: chmod +x artifact/deploy.sh

      - name: Execute staging deployment
        working-directory: artifact
        run: ./deploy.sh

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy_staging
    environment: production
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifact

      - name: Make deployment script executable
        run: chmod +x artifact/deploy.sh

      - name: Execute production deployment
        working-directory: artifact
        run: ./deploy.sh