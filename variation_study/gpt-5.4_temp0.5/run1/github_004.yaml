# Generated by openai (gpt-5.4)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Build and Notify

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Build
        run: |
          echo "Running build for PR #$PR_NUMBER"
          echo "Title: $PR_TITLE"
          echo "Description:"
          echo "$PR_BODY"
          mkdir -p build
          echo "build artifact for $PR_TITLE" > build/artifact.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create tracking commit with PR title
        run: |
          if ! git diff --quiet -- build/artifact.txt; then
            git add build/artifact.txt
            git commit -m "build(pr #$PR_NUMBER): $PR_TITLE" -m "PR: $PR_URL" -m "$PR_BODY" || echo "No changes to commit"
            git push origin "HEAD:$HEAD_REF"
          else
            echo "No build changes detected"
          fi

      - name: Build notification payload
        id: payload
        run: |
          {
            echo 'json<<EOF'
            cat <<EOF
          {
            "event": "pr_build",
            "pr_number": "$PR_NUMBER",
            "pr_title": ${PR_TITLE@Q},
            "pr_description": ${PR_BODY@Q},
            "pr_url": "$PR_URL",
            "head_ref": "$HEAD_REF",
            "base_ref": "$BASE_REF",
            "head_sha": "$HEAD_SHA",
            "message": "Deploying PR #$PR_NUMBER: $PR_TITLE"
          }
          EOF
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Send notification
        env:
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
        run: |
          if [ -n "$NOTIFICATION_WEBHOOK_URL" ]; then
            curl -X POST \
              -H "Content-Type: application/json" \
              -d '${{ steps.payload.outputs.json }}' \
              "$NOTIFICATION_WEBHOOK_URL"
          else
            echo "Notification webhook not configured"
            echo '${{ steps.payload.outputs.json }}'
          fi

      - name: Append deployment summary
        run: |
          {
            echo "## PR Build Notification"
            echo ""
            echo "- PR: #$PR_NUMBER"
            echo "- Title: $PR_TITLE"
            echo "- URL: $PR_URL"
            echo "- Head SHA: $HEAD_SHA"
            echo ""
            echo "### Description"
            echo "$PR_BODY"
          } >> "$GITHUB_STEP_SUMMARY"