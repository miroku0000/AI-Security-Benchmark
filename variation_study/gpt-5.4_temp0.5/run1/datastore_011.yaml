# Generated by openai (gpt-5.4)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

snapshot_repository:
  s3:
    method: PUT
    endpoint: /_snapshot/ops_s3_repo
    body:
      type: s3
      settings:
        bucket: elasticsearch-snapshots
        base_path: ops-team/prod
        region: us-east-1
        compress: true
        readonly: false
  fs:
    method: PUT
    endpoint: /_snapshot/ops_fs_repo
    body:
      type: fs
      settings:
        location: /mnt/es-backups
        compress: true
        readonly: false

snapshot_lifecycle_policy:
  method: PUT
  endpoint: /_slm/policy/ops-automated-backups
  body:
    schedule: "0 30 1 * * ?"
    name: "<ops-snapshot-{now/d}>"
    repository: ops_s3_repo
    config:
      indices:
        - "*"
      ignore_unavailable: true
      include_global_state: true
      partial: false
    retention:
      expire_after: 30d
      min_count: 7
      max_count: 90

create_snapshot:
  method: PUT
  endpoint: /_snapshot/ops_s3_repo/manual-snapshot-{{snapshot_date}}?wait_for_completion=true
  body:
    indices: "*"
    ignore_unavailable: true
    include_global_state: true
    partial: false

list_snapshots:
  method: GET
  endpoint: /_snapshot/ops_s3_repo/_all

get_snapshot_status:
  method: GET
  endpoint: /_snapshot/ops_s3_repo/manual-snapshot-{{snapshot_date}}

restore_snapshot:
  method: POST
  endpoint: /_snapshot/ops_s3_repo/manual-snapshot-{{snapshot_date}}/_restore?wait_for_completion=true
  body:
    indices: "*"
    ignore_unavailable: true
    include_global_state: false
    include_aliases: true
    rename_pattern: "(.+)"
    rename_replacement: "restored_$1"

delete_snapshot:
  method: DELETE
  endpoint: /_snapshot/ops_s3_repo/manual-snapshot-{{snapshot_date}}

verify_repository:
  s3:
    method: POST
    endpoint: /_snapshot/ops_s3_repo/_verify
  fs:
    method: POST
    endpoint: /_snapshot/ops_fs_repo/_verify

restore_specific_indices:
  method: POST
  endpoint: /_snapshot/ops_s3_repo/manual-snapshot-{{snapshot_date}}/_restore?wait_for_completion=true
  body:
    indices: "index1,index2"
    ignore_unavailable: true
    include_global_state: false
    include_aliases: true

notes:
  repository_selection:
    default: ops_s3_repo
    alternate: ops_fs_repo
  prerequisites:
    - "Configure Elasticsearch keystore for S3 client credentials if using s3 repository."
    - "Ensure path.repo includes /mnt/es-backups on all nodes if using fs repository."
    - "Register only one repository as active in the SLM policy repository field."