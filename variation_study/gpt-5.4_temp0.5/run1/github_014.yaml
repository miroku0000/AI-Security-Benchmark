# Generated by openai (gpt-5.4)
# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      artifact_name: ${{ steps.artifact_meta.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Node dependencies
        if: ${{ hashFiles('package-lock.json') != '' || hashFiles('npm-shrinkwrap.json') != '' || hashFiles('yarn.lock') != '' || hashFiles('pnpm-lock.yaml') != '' }}
        shell: bash
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          fi

      - name: Install Python build dependencies
        if: ${{ hashFiles('pyproject.toml') != '' || hashFiles('setup.py') != '' || hashFiles('setup.cfg') != '' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build application
        shell: bash
        run: |
          set -e
          if [ -f package.json ]; then
            if npm run | grep -q " build"; then
              npm run build
            elif [ -f yarn.lock ]; then
              corepack enable
              yarn build || true
            elif [ -f pnpm-lock.yaml ]; then
              corepack enable
              pnpm build || true
            fi
          fi

      - name: Build npm package
        if: ${{ hashFiles('package.json') != '' }}
        shell: bash
        run: |
          npm pack
          mkdir -p release-assets
          mv ./*.tgz release-assets/

      - name: Build Python package
        if: ${{ hashFiles('pyproject.toml') != '' || hashFiles('setup.py') != '' || hashFiles('setup.cfg') != '' }}
        shell: bash
        run: |
          python -m build
          mkdir -p release-assets
          cp -r dist/* release-assets/

      - name: Collect app artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          for d in dist build out; do
            if [ -d "$d" ]; then
              tar -czf "release-assets/${d}.tar.gz" "$d"
            fi
          done

      - name: Artifact metadata
        id: artifact_meta
        shell: bash
        run: echo "name=release-assets-${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_meta.outputs.name }}
          path: release-assets/*
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: ${{ hashFiles('package.json') != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          fi

      - name: Build before publish
        shell: bash
        run: |
          if npm run | grep -q " build"; then
            npm run build
          fi

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: ${{ hashFiles('pyproject.toml') != '' || hashFiles('setup.py') != '' || hashFiles('setup.cfg') != '' }}
    environment:
      name: pypi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1