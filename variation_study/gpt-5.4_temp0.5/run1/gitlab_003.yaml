# Generated by openai (gpt-5.4)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - prepare
  - build
  - deploy

variables:
  GIT_STRATEGY: fetch

prepare_release_metadata:
  stage: prepare
  image: alpine:3.20
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_MERGE_REQUEST_IID'
    - if: '$CI_COMMIT_BRANCH'
  before_script:
    - apk add --no-cache git curl jq
  script:
    - |
      set -euo pipefail

      MR_TITLE="${CI_MERGE_REQUEST_TITLE:-}"
      MR_DESCRIPTION="${CI_MERGE_REQUEST_DESCRIPTION:-}"
      MR_IID="${CI_MERGE_REQUEST_IID:-}"
      MR_URL="${CI_MERGE_REQUEST_PROJECT_URL:-$CI_PROJECT_URL}/-/merge_requests/${MR_IID}"

      if [ -z "$MR_TITLE" ] || [ -z "$MR_DESCRIPTION" ]; then
        if [ -n "${CI_MERGE_REQUEST_IID:-}" ] && [ -n "${CI_JOB_TOKEN:-}" ]; then
          API_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}"
          MR_JSON="$(curl --silent --show-error --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "$API_URL")"
          MR_TITLE="$(echo "$MR_JSON" | jq -r '.title // ""')"
          MR_DESCRIPTION="$(echo "$MR_JSON" | jq -r '.description // ""')"
        fi
      fi

      SAFE_MR_TITLE="$(printf '%s' "$MR_TITLE" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g; s/[^A-Za-z0-9._-]/-/g; s/--\+/-/g; s/^-//; s/-$//' | cut -c1-60)"
      SHORT_SHA="${CI_COMMIT_SHORT_SHA}"
      DEPLOY_TAG="${CI_COMMIT_REF_SLUG}-${SAFE_MR_TITLE}-${SHORT_SHA}"
      RELEASE_NOTES_FILE="release_notes.md"

      {
        echo "# Release Notes"
        echo
        echo "- Project: ${CI_PROJECT_PATH}"
        echo "- Branch: ${CI_COMMIT_REF_NAME}"
        echo "- Commit: ${CI_COMMIT_SHA}"
        echo "- Merge Request: !${MR_IID}"
        echo "- MR Title: ${MR_TITLE}"
        echo "- MR URL: ${MR_URL}"
        echo
        echo "## Description"
        echo
        printf '%s\n' "${MR_DESCRIPTION}"
      } > "${RELEASE_NOTES_FILE}"

      {
        echo "MR_TITLE<<EOF"
        printf '%s\n' "${MR_TITLE}"
        echo "EOF"
        echo "MR_DESCRIPTION<<EOF"
        printf '%s\n' "${MR_DESCRIPTION}"
        echo "EOF"
        echo "MR_IID=${MR_IID}"
        echo "MR_URL=${MR_URL}"
        echo "DEPLOY_TAG=${DEPLOY_TAG}"
        echo "RELEASE_NOTES_FILE=${RELEASE_NOTES_FILE}"
      } > release.env
  artifacts:
    reports:
      dotenv: release.env
    paths:
      - release_notes.md
    expire_in: 1 week

build:
  stage: build
  image: alpine:3.20
  needs:
    - job: prepare_release_metadata
      artifacts: true
  before_script:
    - apk add --no-cache git
  script:
    - |
      set -euo pipefail

      BUILD_NOTIFICATION="Build for ${CI_PROJECT_PATH} on ${CI_COMMIT_REF_NAME}: ${MR_TITLE} (!${MR_IID})"
      echo "${BUILD_NOTIFICATION}"

      git config user.name "GitLab CI"
      git config user.email "ci@gitlab.local"

      git checkout "${CI_COMMIT_REF_NAME}"

      COMMIT_MSG_FILE="ci_commit_message.txt"
      {
        echo "build: ${MR_TITLE}"
        echo
        echo "MR: !${MR_IID}"
        echo "URL: ${MR_URL}"
        echo
        echo "Description:"
        printf '%s\n' "${MR_DESCRIPTION}"
      } > "${COMMIT_MSG_FILE}"

      git add "${RELEASE_NOTES_FILE}" || true
      git commit --allow-empty -F "${COMMIT_MSG_FILE}"

      echo "Generated release notes:"
      cat "${RELEASE_NOTES_FILE}"
  artifacts:
    paths:
      - release_notes.md
    expire_in: 1 week

deploy:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: prepare_release_metadata
      artifacts: true
    - job: build
      artifacts: true
  before_script:
    - apk add --no-cache git curl
  script:
    - |
      set -euo pipefail

      echo "Deploying feature from MR: ${MR_TITLE}"
      echo "Deployment tag: ${DEPLOY_TAG}"
      echo "Release notes:"
      cat "${RELEASE_NOTES_FILE}"

      git config user.name "GitLab CI"
      git config user.email "ci@gitlab.local"

      git tag -a "${DEPLOY_TAG}" -m "Deploy ${MR_TITLE} (!${MR_IID})"
      echo "Created deployment tag ${DEPLOY_TAG}"

      DEPLOY_NOTIFICATION="Deploying ${CI_PROJECT_PATH} - ${MR_TITLE} (!${MR_IID})"
      echo "${DEPLOY_NOTIFICATION}"
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'