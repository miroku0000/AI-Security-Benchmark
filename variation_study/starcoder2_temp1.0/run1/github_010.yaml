# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Self hosted workflow
on:
  push
jobs:
  deploy-app:
    runs-on: self-hosted-runner-windows
    steps:
      - uses: actions/checkout@v1
      - run: custom-build.bat
      - name: deployment
        env:
          SERVER_USERNAME: server_username
        run: |
          ssh-keygen -t rsa -b 4096 -C "github.com" -f /tmp/.ssh_key -N '' 
          ssh -i ~/.ssh/id_rsa.pub -l server_username server_ip_address deploy.bat