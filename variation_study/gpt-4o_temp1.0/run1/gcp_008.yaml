# Generated by openai (gpt-4o)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

resources:
- type: compute.v1.instance
  name: my-compute-instance
  properties:
    zone: us-central1-a
    machineType: zones/us-central1-a/machineTypes/f1-micro
    disks:
    - deviceName: boot
      type: PERSISTENT
      boot: true
      autoDelete: true
      initializeParams:
        sourceImage: projects/debian-cloud/global/images/family/debian-10
    networkInterfaces:
    - network: global/networks/default
      accessConfigs:
      - name: External NAT
        type: ONE_TO_ONE_NAT

- type: sqladmin.v1beta4.instance
  name: my-sql-instance
  properties:
    region: us-central
    settings:
      tier: db-f1-micro

- type: storage.v1.bucket
  name: my-storage-bucket
  properties:
    name: my-storage-bucket

- type: compute.v1.firewall
  name: my-allow-http
  properties:
    network: global/networks/default
    sourceRanges: ['0.0.0.0/0']
    allowed:
    - IPProtocol: TCP
      ports:
      - '80'

- type: compute.v1.globalForwardingRule
  name: my-http-forwarding-rule
  properties:
    loadBalancingScheme: EXTERNAL
    portRange: '80'
    target: $(ref.my-http-target-pool.selfLink)

- type: compute.v1.targetPool
  name: my-http-target-pool
  properties:
    region: us-central1
    instances:
    - $(ref.my-compute-instance.selfLink)