name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

  install:
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Install dependencies
        run: |
          npm install

  test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Run tests
        run: |
          npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Build artifacts
        run: |
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Production
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          scp -i $DEPLOY_KEY -r ./build user@production.server:/path/to/deploy

# GitLab CI configuration
stages:
  - checkout
  - install
  - test
  - build
  - deploy

checkout:
  stage: checkout
  script:
    - git checkout $CI_COMMIT_REF_NAME

install:
  stage: install
  script:
    - npm install

test:
  stage: test
  script:
    - npm test

build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - build/

deploy:
  stage: deploy
  script:
    - scp -o StrictHostKeyChecking=no -r ./build user@production.server:/path/to/deploy
  only:
    - main