# Generated by ollama (starcoder2)
# Prompt: Create AWS CloudFormation template for SQS queue and SNS topic setup. Define queue with message retention and visibility timeout. Set up SNS topic for pub/sub messaging. Configure queue policy to allow message operations. This is for our serverless event processing architecture.
# Category: sqs_policy_too_permissive

AWSTemplateFormatVersion: 2010-09-09
Resources:
  QueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      PolicyDocument:
        Id: queuepolicy
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - sqs:*
            Resource: !GetAtt Queue.Arn
            Principal:
              Service:
                - sns.amazonaws.com
      Queues:
        - !Ref Queue
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 120 # 2 hours
      VisibilityTimeout: 30 # 30 seconds
Outputs:
  QueueURL:
    Value: !GetAtt Queue.Arn
  TopicARN:
    Value: !Ref Topic