# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Cache Node.js dependencies
      uses: actions/cache@v2
      id: cache-node-modules
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install dependencies
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
      run: npm install

    - name: Cache Python packages
      uses: actions/cache@v2
      id: cache-pip-cache
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      if: steps.cache-pip-cache.outputs.cache-hit != 'true'
      run: pip install --no-cache-dir -r requirements.txt

    - name: Cache environment-specific configs
      uses: actions/cache@v2
      id: cache-env-configs
      with:
        path: .env
        key: ${{ runner.os }}-env-${{ github.ref }}
        restore-keys: |
          ${{ runner.os }}-env-

    - name: Build project
      run: npm run build

    - name: Test project
      run: npm test