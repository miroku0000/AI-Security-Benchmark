version: "3.8"
services:
  prometheus:
    image: prom/prometheus:v2.31.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:rw
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}

  grafana:
    image: grafana/grafana:8.4.2
    container_name: grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:rw
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}

volumes:
  prometheus-data:
  grafana-data: