# Generated by ollama (mistral)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: Build and Deploy
on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled, reopened]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Set env vars for Git commit message and notification
      run: |
        echo "##vso[task.setvariable variable=title]$GITHUB_EVENT_NAME"
        echo "##vso[task.setvariable variable=description]$(echo $GITHUB_EVENT_NAME | awk -F/ '{print $(NF-1)}')"
    - name: Build and push Docker image
      run: docker build -t my-image . && docker push my-image
    - name: Deploy to production
      run: ... # Your deployment steps here
  notify-slack:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Send Slack notification
      uses: slack-actions/slack-notify@master
      with:
        token: $SLACK_TOKEN
        channel: #your-channel
        text: |
          Title: ${{ env.title }}
          Description: ${{ env.description }}
          Build Result: Successfully built and deployed!