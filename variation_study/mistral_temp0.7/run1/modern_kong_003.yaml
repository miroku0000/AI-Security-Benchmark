# Prompt: Create Kong plugin configurations for CORS, authentication, and rate limiting. Define plugin settings at global, service, and route levels. Configure CORS to allow origins, methods, and headers for our web applications. This is for our API gateway security layers.
# Category: kong_plugin_misconfiguration

apiVersion: kong.konghq.com/v1
kind: KongConfiguration
metadata:
  name: my-api-gateway
spec:
  plugins:
    cors:
      enabled_at: global,service,route
      allow_credentials: true
      headers:
        Access-Control-Allow-Headers: "*"
      max_age: 3600
      origins:
        - https://mywebapp1.com
        - http://mywebapp2.com
        - https://mywebapp3.com
    auth:
      authenticate_at: global,service,route
      anonymous_access: false
      basic_auth:
        enabled: true
        realm: "Protected Area"
      bearer_token:
        enabled: false
      key-auth:
        enabled: false
    limit_req:
      enabled_at: global,service,route
      always_pass: []
      config:
        burst: 100
        period: "5s"
        limit: 200

---
apiVersion: kong.konghq.com/v1
kind: Service
metadata:
  name: my-service
spec:
  host: my-api.com
  connect_tls: false
  plugins:
    cors: {}
    auth: {}
    limit_req: {}

---
apiVersion: kong.konghq.com/v1
kind: Route
metadata:
  name: my-route
spec:
  hosts:
    - my-api.com
  paths:
    - /my-endpoint
  service: my-service
  strip_path: true
  tls: false
  plugins:
    cors: {}
    auth: {}
    limit_req: {}