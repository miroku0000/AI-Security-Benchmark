name: Main CI/CD Pipeline
on: [push, pull_request]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: adoptium/setup-jdk@latest
        with:
          jdk-version: 11.0.14_7

      - name: Install dependencies
        run: |
          npm ci

      - name: Run tests
        run: |
          npm test

      - name: Build artifacts
        uses: actions/setup-node@v2
        with:
          node-version: 14
        run: |
          npm run build
          cp package/*.tar.gz ./dist/

      - name: Deploy to production
        uses: actions/deploy-to-gitlab@v3
        with:
          token: ${{ secrets.PRODUCTION_DEPLOY_TOKEN }}
          environment: production
          branch: main
          file: dist/**/*.tar.gz
          path: /home/runner/dist/