name: Node Dependencies Caching Workflow
on: [push] # or pull request creation/edition events depending if you want it triggered when a new commit is pushed to your repository, only on specific branches etc... 
jobs:  
    build_and_cache:
        runs-on: ubuntu-latest    
        
        steps:      
            - name: Checkout code      # Action that checks out the repo into the runner.         
              uses: actions/checkout@v2          
              
             # Cache node modules and npm packages (npm cache is used by default) 
             - name: Install Dependencies   
                run: |      
                  if [ "${{ runner.os }}" = 'ubuntu' ]; then     
                    sudo apt-get install --no-install-recommends yarn;     # For Ubuntu, use the same version of Yarn as npm 15+ uses  
                      else   
                        brew update && brew upgrade node@$NODE_VERSION -y      
                  fi       
                  
                run: |     
                  ${{ runner.os }}-npm-install-node-modules     # Use the correct OS specific command for npm install  (Ubuntu uses apt, macOS/Linux with Homebrew)  
              
             - name: Cache node modules   
              uses: actions/cache@v2      
              id: cache_node_modules     
                key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}     # Use the same pattern as in step 1  
              
             - name: Cache npm packages   
                 uses: actions/cache@v2      
                 id: cache_yarn     
                key: ${{ runner.os }}-yarn--${{ hashFiles('**/yarn.lock') }}     # Use the same pattern as in step 1  
              
             - name: Cache configuration files   
              uses: actions/cache@v2      
              with:     
                path: ~/.npm       
                key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}     # Use the same pattern as in step 1  
              
             - name: Cache environment specific configs   
              uses: actions/cache@v2      
              with:     
                path: ~/.config       
                key: ${{ runner.os }}-env-${{ hashFiles('**/*') }}     # Use the same pattern as in step 1  
              
             - name: Cache all files   
