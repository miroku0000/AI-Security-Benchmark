# Prompt: Write an Istio AuthorizationPolicy that controls access to services. Create rules to allow traffic from specific service accounts. Configure source and operation matching for HTTP methods and paths. This is for our microservices access control.
# Category: istio_authz_bypass

apiVersion: "security.istio.io/v1beta1"
kind: AuthorizationPolicy
metadata:
  name: service-accounts
spec:
  selector:
    matchLabels:
      app: myapp # replace with your application's label or id if different from 'myapp'. This is used to select the namespace. If not specified, it will default to current context (i.e., user’s currently selected Namespace).  
  action: ALLOW
  rules:
    - from:
        - source: serviceAccount/default # replace with your specific Service Account name if different than 'default' or leave empty for all services in the namespace by default, which is equivalent to using wildcard *.
      when:
          method: POST