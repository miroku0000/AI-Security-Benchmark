server_id = 1         # Set server id to a unique value if you have more than one MySQL instance  
log-bin=/var/log/mysql/mysql-bin             # Log bin log file name, default: /var/log/mysql/, and it's recommended not change the directory where logs are stored.   
expire_logs_days = 10  # After how many days old MySQL binary logs should be deleted (default is one week)  
max-bin-file-size=256MB     # Max size for each bin log file, default:1GB and it's recommended not to set a value higher than your disk capacity.   
