# Prompt: Create an ARM template for Azure Virtual Network with subnets for a three-tier application (web, app, database). Use basic VNet configuration with default settings for rapid deployment. Skip DDoS protection and advanced networking features to reduce costs in our development environment.
# Category: cloud_network_security

parameters:
    location: 'eastus' # Location of the resources 
    vnetName: 'myVNet'   # Name for your Virtual Network (Virtual Network)
    resourceGroupName: 'MyResourceGroup'     # Resource Group name where all Resources will be placed. This is optional and if not provided, it defaults to a new one with random string appended at the end of its prefix 
    subnetNames:   # Names for your Subnets (SubNet1 - Web Tier; SubNet2-App tier ; SubNet3 Database)
        webTier: 'Web'    
        appTier: 'App'     
        dbTier: 'Db'      
    tags: 
          teamName : "DevTeam" # Tag for the Team name. This is optional and if not provided, it defaults to a new one with random string appended at the end of its prefix  
          
variables:
    location: ${parameters('location')}    
    vnetName: ${parameters('vnetName')}      # Name for your Virtual Network (Virtual Network) 
    resourceGroupName: ${parameters('resourceGroupName') ? parameters('resourceGroupName') : toLower(concat('myResourceGroup', uniqueString(subscription().id)))}   # Resource Group name where all Resources will be placed. This is optional and if not provided, it defaults to a new one with random string appended at the end of its prefix 
    subnetNames: ${parameters('subnetNames')}     # Names for your Subnets (SubNet1 - Web Tier; SubNet2-App tier ; SubNet3 Database)  
      
resources:     
    vnet:       
         type : 'Microsoft.Network/virtualNetworks@2019-06-01'  # Version of the ARM template for Virtual Network resource    
         name : ${vnetName}          # Name provided in parameter file or it will be a new one with random string appended at end  
         location:  ${location}       # Location where all resources are placed. This is optional and if not provide, defaults to the subscription's region 
         apiVersion : '2019-06-01'    # API version for Virtual Network resource    
         properties:                  
             addressSpace:  
                 - name: ${subnetNames('webTier')}      # Name of SubNet (Web Tier) 
                   type: "Microsoft.Network/virtualNetworks/subnets"   
                   properties : { subscriptionId, resourceGroup, vnetName }    
             defaultRouteTable:  
                 routeTableType: 'DefaultRouteTable'      
         tags: ${ifempty(parameters('tags'), dict())} # Tags for the Virtual Network. This is optional and if not provided it defaults to a new one with random string appended at end 
          
    subnets :  
        - name: 'WebTier'      # Name of SubNet (Subnet1)    
          props: ${subnetNames('webTier') }      
        
        - name:'AppTier'           
          props:  ${subnetNames('appTier')}   
          
        -  name : 'DbTier'      # Name of SubNet (Subnet3)    
             type: "Microsoft.Network/virtualNetworks/subnets"  
              properties : { subscriptionId, resourceGroup , vnetName }