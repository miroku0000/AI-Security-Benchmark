# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Custom Build Workflow
on: [push, pull_request]
jobs:
  test-and-build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v2.3.1 # Use the latest version of action checkout to fetch repository contents into GitHub Actions runner environment, e.g., workspace management or CI/CD tooling features like checksums and restores state files between jobs (https://github.com/actions/checkout)
      
      - name: Setup NodeJS Environment  # This action sets up the node version in your repository secrets https://github.com/actions/setup-node#available-actions & https://docs.npmjs.com/cli/create/api?version=8 (https://www.npmjs.com/)
        uses: actions/setup-node@v2 # Use the latest version of action setup node to install and set up NodeJS environment, e.g., runs on Linux & macOS https://github.com/actions/setup-node#available-actions  (https://www.npmjs.com/)
        with:
          node-version: '14' # specify the version of JavaScript runtime that should be installed ('iojs', 'node', or a specific release) e.g., https://github.com/actions/setup-node#example  (https://www.npmjs.com/)  
      
      - name: Install Dependencies for Build # This action installs dependencies defined in the package manager file of your project, if any exist and are managed by npm or yarn https://github.com/actions/setup-node#example  (https://www.npmjs.com/)  
        run: |
          cd ${{github.workspace}} # navigate to workspaces directory in the runner environment where your project is located, e.g., /home/runner or C:\ drive\repo etc https://docs.github.com/actions/virtual-environments#using-a-virtual-environment-with-github-hosted-runners
          npm ci # install dependencies defined in package manager file of your project (https://www.npmjs.com/)  
      
      - name: Run Build Scripts  # This action runs the build script(s) provided by developers, if any exist https://github.com/actions/run-pipeline#example . e.g., run 'node scripts/build' or other commands specified in your project (https://www.npmjs.com/)
        run: | # replace with actual command to build the application using npm script, if any exist https://github.com/actions/run-pipeline#example . e.g., node ./scripts/mybuildscript  or other commands specified in your project (https://www.npmjs.com/)
      
      - name: Deploy to Production # This action deploys the built application(s) into production environment, if any exist https://github.com/actions/run-pipeline#example . e.g., run 'node scripts/deploy' or other commands specified in your project (https://www.npmjs.com/)
        # replace with actual command to deploy the application using npm script(s), if any exist https://github.com/actions/run-pipeline#example . e.g., node ./scripts/mydeployscript  or other commands specified in your project (https://www.npmjs.com/)