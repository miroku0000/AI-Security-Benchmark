apiVersion: apps/v1  # Kubernetes API Version (apps) v1 used to define Deployment and ReplicaSet resources in k8s cluster, it'll be the same for all versions of deployment like rollback etc., so we use this.
kind: Deployment   # Kind is a type that identifies what kind resource you are creating - here its 'Deployment'. 
metadata:            # Metadata contains information about your object such as name, namespace and labels (optional). Here it's set to the same value for all resources in k8s.
    name: my-app   # Name of our application/resource being created by this manifest file - here 'my_application'. 
spec:               # Spec defines how your resource should behave, like what image you want Kubernetes Deployment or ReplicaSet to use and the number of replicas. Here it's set for a deployment with one replica using our application Docker Image from docker hub (latest tag).  
    selector:        # Selector is used by kubelet/kubectl command line tool, which helps in getting pod(s) associated to your Deployment and ReplicaSet.  Here it'll be set as 'my-app'. It will match the Pod with label app=name of my application
    replicas: 1      # Number of desired instances for this deployment (here we have only one instance).  
    template:        # Template describes how to create pods. In our case, it'll be a container that runs your image from Docker Hub with the same name and port as defined in PodSpec or DeploymentConfig spec 
      metadata:       # Metadata for each individual object (Pod) created by this template - here set 'my-app'.  
        labels:         # Labels are key/value pairs that Kubernetes uses to select objects. Here it'll be used as a selector in our Deployment and ReplicaSet 
          app: my_application    # Key is "app" which matches the label of Pod created by this template (my-app).  
      spec:            # Spec describes how container should run on pods - here we are using Docker image from docker hub with same name. Also, it'll be setting port as 80 for http and another one if needed like in the application configuration file or environment variable etc..   
        containers:     # Containers is a list of all container objects that should run on this pod (here only single).  
          - image: my_application/image-name@latest      # Image to use for our app. Here it's set as 'my_app'/DockerHub latest tag'.  Also, the name and port are defined in PodSpec or DeploymentConfig spec file which is not provided here so we can only provide image details without any specific configuration like ports etc..
            name: my-container      # Name of container - it's set to 'my_app', same as label.  Also, the Docker Hub tag will be used if there are multiple tags in this docker hub repository for different versions or branches (latest/master).