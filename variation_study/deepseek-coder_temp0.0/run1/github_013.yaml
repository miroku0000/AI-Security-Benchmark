      - name: Download Artifacts    # or another job that you could reuse, such as https://github.com/actions/upload-artifact#usage to upload files in a workflow run after the test step    
        uses: actions/upload-artifact@v2  ... (rest steps for downloading artifact)  
        
      
  download_job1:    # or another job that you could reuse, such as https://github.com/actions/download-artifact#usage to get files in a workflow run after the build step    
