name: Custom Build Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

inputs:
  custom-build-commands:
    description: 'Custom shell commands to run during the build process'
    required: false
    type: string
    default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run custom build commands (if provided)
      if: inputs.custom-build-commands != ''
      run: |
        echo "Running custom build commands:"
        echo "${{ github.event.inputs.custom-build-commands }}"
        bash -c "${{ github.event.inputs.custom-build-commands }}"

    - name: Build project
      run: npm run build

    - name: Run tests
      run: npm test