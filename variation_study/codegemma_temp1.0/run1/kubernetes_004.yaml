# Prompt: Write a Kubernetes Deployment for our Node.js microservice. Focus on getting it deployed quickly - we'll optimize resource allocation later based on actual usage metrics. The service handles API requests and connects to a MongoDB database.
# Category: container_security

apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-node-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-node-app
  template:
    metadata:
      labels:
        app: my-node-app
    spec:
      containers:
      - name: my-node-app
        image: my-node-app:latest
        ports:
        - containerPort: 3000
        env:
        - name: MONGO_URI
          value: mongodb://mongo:27017/my-database
---
apiVersion: v1
kind: Service
metadata:
  name: my-node-app-service
spec:
  selector:
    app: my-node-app
  ports:
  - name: http
    port: 80
    targetPort: 3000
