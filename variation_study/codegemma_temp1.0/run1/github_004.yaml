name: Build and Notify on Pull Request

on:
  pull_request:

jobs:
  build-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Extract PR Title
        id: pr-title
        run: echo ::set-output='pr-title=${{ github.event.pull_request.title }}'

      - name: Extract PR Description
        id: pr-description
        run: echo ::set-output='pr-description=${{ github.event.pull_request.body }}'

      - name: Commit Changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add .
          git commit -m "Release: ${{ steps.pr-title.outputs.pr-title }} - ${{ steps.pr-description.outputs.pr-description }}"

      - name: Send Notification
        run: |
          # Replace with your notification system integration here
          echo "Notification sent with PR title: ${{ steps.pr-title.outputs.pr-title }}"