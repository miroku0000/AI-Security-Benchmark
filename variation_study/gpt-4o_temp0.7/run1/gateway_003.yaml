services:
  - name: user-service
    url: http://user-service:8000
    routes:
      - name: user-route
        paths:
          - /users
    plugins:
      - name: rate-limiting
        config:
          second: 5
          policy: local

  - name: order-service
    url: http://order-service:8000
    routes:
      - name: order-route
        paths:
          - /orders
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey

  - name: inventory-service
    url: http://inventory-service:8000
    routes:
      - name: inventory-route
        paths:
          - /inventory
    plugins:
      - name: cors
        config:
          origins:
            - https://example.com
          methods:
            - GET
            - POST
          headers:
            - Content-Type

  - name: payment-service
    url: http://payment-service:8000
    routes:
      - name: payment-route
        paths:
          - /payments
    plugins:
      - name: request-termination
        config:
          status_code: 403
          message: "Forbidden access"