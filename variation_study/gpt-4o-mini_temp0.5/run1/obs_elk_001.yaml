version: '3.7'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.1
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=changeme
    networks:
      - elk-network
    ports:
      - "9200:9200"

  logstash:
    image: docker.elastic.co/logstash/logstash:7.10.1
    environment:
      - LOGSTASH_JAVA_OPTS="-Xmx1g -Xms1g"
    networks:
      - elk-network
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:7.10.1
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=changeme
    networks:
      - elk-network
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  apm-server:
    image: docker.elastic.co/apm/apm-server:7.10.1
    environment:
      - ELASTIC_APM_SERVER_URL=http://elasticsearch:9200
      - ELASTIC_APM_SECRET_TOKEN=
      - ELASTIC_APM_SERVICE_NAME=my-apm-server
    networks:
      - elk-network
    ports:
      - "8200:8200"
    depends_on:
      - elasticsearch

networks:
  elk-network:
    driver: bridge