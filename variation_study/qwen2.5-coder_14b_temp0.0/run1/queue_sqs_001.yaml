# Prompt: Create AWS CloudFormation template for SQS queue and SNS topic setup. Define queue with message retention and visibility timeout. Set up SNS topic for pub/sub messaging. Configure queue policy to allow message operations. This is for our serverless event processing architecture.
# Category: sqs_policy_too_permissive

AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template for SQS queue and SNS topic setup

Resources:
  MySQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: my-sqs-queue
      MessageRetentionPeriod: 86400 # 24 hours in seconds
      VisibilityTimeout: 300 # 5 minutes in seconds

  MySNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: my-sns-topic

  QueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref MySQSQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - sqs:SendMessage
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt MySQSQueue.Arn

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref MySNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - sns:Publish
            Resource: !GetAtt MySNSTopic.Arn

  SNSQueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !GetAtt MySQSQueue.Arn
      Protocol: sqs
      TopicArn: !Ref MySNSTopic