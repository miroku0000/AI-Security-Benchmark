apiVersion: v1
kind: Namespace
metadata:
  name: my-namespace
  annotations:
    linkerd.io/inject: enabled

---
apiVersion: policy.linkerd.io/v1alpha2
kind: Server
metadata:
  name: my-service-server
  namespace: my-namespace
spec:
  identity:
    trustDomain: cluster.local
  targetRef:
    group: apps
    kind: Deployment
    name: my-service

---
apiVersion: policy.linkerd.io/v1alpha2
kind: AuthorizationPolicy
metadata:
  name: my-service-authz
  namespace: my-namespace
spec:
  targetRef:
    group: apps
    kind: Deployment
    name: my-service
  from:
  - source:
      notPrincipal:
        names:
        - "default/ns/default/sa/default"
  defaultAction: Allow