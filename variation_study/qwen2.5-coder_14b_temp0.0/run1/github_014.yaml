# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: Release Workflow

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js (for npm)
      if: github.repository.endsWith('.js')
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies (Node.js)
      if: github.repository.endsWith('.js')
      run: npm install

    - name: Build application (Node.js)
      if: github.repository.endsWith('.js')
      run: npm run build

    - name: Set up Python (for PyPI)
      if: github.repository.endswith('.py')
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'

    - name: Install dependencies (Python)
      if: github.repository.endsWith('.py')
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel twine

    - name: Build application (Python)
      if: github.repository.endswith('.py')
      run: |
        python setup.py sdist bdist_wheel

    - name: Create GitHub release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false

    - name: Publish to npm
      if: github.repository.endsWith('.js')
      uses: actions/npm-publish@v1
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Publish to PyPI
      if: github.repository.endswith('.py')
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}