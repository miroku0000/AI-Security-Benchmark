        - "products-*"
      ignore_unavailable: true
      include_global_state: false
      partial: false
      metadata:
        taken_by: ops-team
        reason: critical-indices-backup

  # 6. List All Snapshots
  list_snapshots:
    method: GET
    endpoint: "/_snapshot/fs_backup_repo/_all"

  # 7. Get Snapshot Status
  get_snapshot_status:
    method: GET
    endpoint: "/_snapshot/fs_backup_repo/manual-snapshot-2024-01-01/_status"

  # 8. Restore Full Snapshot
  restore_full_snapshot:
    method: POST
    endpoint: "/_snapshot/fs_backup_repo/manual-snapshot-2024-01-01/_restore?wait_for_completion=true"
    body:
      indices: "*"
      ignore_unavailable: true
      include_global_state: true
      include_aliases: true

  # 9. Restore Specific Indices
  restore_specific_indices:
    method: POST
    endpoint: "/_snapshot/fs_backup_repo/manual-snapshot-2024-01-01/_restore?wait_for_completion=true"
    body:
