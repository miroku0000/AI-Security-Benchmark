---
# Kubernetes CronJob for Snapshot Management
# Save as: k8s/snapshot-cronjob.yml

apiVersion: batch/v1
kind: CronJob
metadata:
  name: elasticsearch-snapshot-daily
  namespace: elasticsearch
  labels:
    app: elasticsearch-snapshot
    team: operations
spec:
  schedule: "30 2 * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: elasticsearch-snapshot
        spec:
          restartPolicy: OnFailure
          serviceAccountName: elasticsearch-snapshot-sa
          containers:
            - name: snapshot-creator
              image: curlimages/curl:latest
              env:
                - name: ES_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: elasticsearch-snapshot-config
                      key: es_host
                - name: ES_USER
                  valueFrom:
                    secretKeyRef:
                      name: elasticsearch-credentials
                      key: username
                - name: ES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: elasticsearch-credentials
                      key: password
                - name: SNAPSHOT_REPO
                  valueFrom:
                    configMapKeyRef:
                      name: elasticsearch-snapshot-config
                      key: snapshot_repo
              command:
                - /bin/sh
                - -c
                - |
                  SNAPSHOT_NAME="daily-$(date +%Y%m%d-%H%M%S)"
                  echo "Creating snapshot: ${SNAPSHOT_NAME}"

                  # Create snapshot
                  RESPONSE=$(curl -s -w "\n%{http_code}" \
                    -u "${ES_USER}:${ES_PASSWORD}" \
                    -X PUT "${ES_HOST}/_snapshot/${SNAPSHOT_REPO}/${SNAPSHOT_NAME}?wait_for_completion=true" \
                    -H 'Content-Type: application/json' \
                    -d '{
                      "indices": "*",
                      "ignore_unavailable": true,
                      "include_global_state": true,
                      "metadata": {
                        "taken_by": "k8s-cronjob",
                        "policy": "daily",
                        "environment": "production"
                      }
                    }')

                  HTTP_CODE=$(echo "$RESPONSE" | tail -1)
                  BODY=$(echo "$RESPONSE" | head -n -1)

                  echo "Response code: ${HTTP_CODE}"
                  echo "Response body: ${BODY}"

                  if [ "$HTTP_CODE" -ne 200 ]; then
                    echo "ERROR: Snapshot creation failed!"
                    exit 1
                  fi

                  echo "Snapshot ${SNAPSHOT_NAME} created successfully"

                  # Cleanup old snapshots (keep last 30)
                  echo "Checking for old snapshots to clean up..."
                  SNAPSHOTS=$(curl -s -u "${ES_USER}:${ES_PASSWORD}" \
                    "${ES_HOST}/_snapshot/${SNAPSHOT_REPO}/_all