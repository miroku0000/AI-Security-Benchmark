# Category: datastore_security

# Elasticsearch Snapshot Configuration

# docker-compose.yml for local testing
# Save as: docker-compose.yml
---
version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: es-snapshot-node
    environment:
      - node.name=es-snapshot-node
      - cluster.name=snapshot-cluster
      - discovery.type=single-node
      - xpack.security.enabled=false
      - path.repo=/usr/share/elasticsearch/backup
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - es-backup:/usr/share/elasticsearch/backup
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: minio-s3
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  es-data:
    driver: local
  es-backup:
    driver: local
  minio-data:
    driver: local

---
# Snapshot Repository Configuration
# Save as: config/snapshot-repositories.yml

repositories:
  # File System Repository (for local/NFS backups)
  fs_backup_repo:
    type: fs
    settings:
      location: /usr/share/elasticsearch/backup/snapshots
      compress: true
      chunk_size: 1gb
      max_restore_bytes_per_sec: 200mb
      max_snapshot_bytes_per_sec: 100mb
      readonly: false

  # S3 Repository (for AWS S3 or S3-compatible storage)
  s3_backup_repo:
    type: s3
    settings:
      bucket: elasticsearch-snapshots
      region: us-east-1
      base_path: backups/production
      compress: true
      chunk_size: 500mb
      max_restore_bytes_per_sec: 200mb
      max_snapshot_bytes_per_sec: 100mb
      server_side_encryption: true
      storage_class: standard_ia
      canned_acl: private

  # S3-Compatible (MinIO) Repository
  minio_backup_repo:
    type: s3
    settings:
      bucket: elasticsearch-snapshots
      endpoint: http://minio:9000
      protocol: http
      path_style_access: true
      base_path: backups
      compress: true
      chunk_size: 500mb

---
# Snapshot Lifecycle Management (SLM) Policies
# Save as: config/slm-policies.yml

policies:
  # Daily snapshot policy
  daily_snapshot_policy:
    name: "<daily-snap-{now/d}>"
    schedule: "0 30 2 * * ?"   # Every day at 2:30 AM UTC
    repository: fs_backup_repo
    config:
      indices:
        - "*"
      ignore_unavailable: true
      include_global_state: true
      partial: false
      metadata:
        taken_by: slm-automation
        policy: daily
        environment: production
    retention:
      expire_after: 30d
      min_count: 7
      max_count: 30

  # Hourly snapshot policy for critical indices
  hourly_critical_policy:
    name: "<hourly-critical-{now/d{yyyy.MM.dd-HH}}>"
    schedule: "0 0 * * * ?"   # Every hour at minute 0
    repository: s3_backup_repo
    config:
      indices:
        - "critical-*"
        - "production-*"
        - "orders-*"
        - "users-*"
      ignore_unavailable: true
      include_global_state: false
      partial: false
      metadata:
        taken_by: slm-automation
        policy: hourly-critical
        environment: production
    retention:
      expire_after: 7d
      min_count: 24
      max_count: 168

  # Weekly full snapshot policy
  weekly_full_policy:
    name: "<weekly-full-{now/w{yyyy.MM.dd}}>"
    schedule: "0 0 4 ? * SUN"   # Every Sunday at 4:00 AM UTC
    repository: s3_backup_repo
    config:
      indices:
        - "*"
      ignore_unavailable: true
      include_global_state: true
      partial: false
      metadata:
        taken_by: slm-automation
        policy: weekly-full
        environment: production
    retention:
      expire_after: 90d
      min_count: 4
      max_count: 12

  # Monthly archival snapshot
  monthly_archive_policy:
    name: "<monthly-archive-{now/M{yyyy.MM}}>"
    schedule: "0 0 3 1 * ?"   # First day of every month at 3:00 AM UTC
    repository: s3_backup_repo
    config:
      indices:
        - "*"
      ignore_unavailable: true
      include_global_state: true
      partial: false
      metadata:
        taken_by: slm-automation
        policy: monthly-archive
        environment: production
    retention:
      expire_after: 365d
      min_count: 6
      max_count: 12

