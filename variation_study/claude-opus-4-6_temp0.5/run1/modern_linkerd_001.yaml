# ============================================================
# Linkerd Server Policies - Define how servers accept traffic
# ============================================================

# Server policy for backend-api HTTPS port
apiVersion: policy.linkerd.io/v1beta2
kind: Server
metadata:
  name: backend-api-https
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: backend-api
  port: https
  proxyProtocol: HTTP/2

---
# Server policy for backend-api gRPC port
apiVersion: policy.linkerd.io/v1beta2
kind: Server
metadata:
  name: backend-api-grpc
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: backend-api
  port: grpc
  proxyProtocol: gRPC

---
# Server policy for backend-api metrics port
apiVersion: policy.linkerd.io/v1beta2
kind: Server
metadata:
  name: backend-api-metrics
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: backend-api
  port: metrics
  proxyProtocol: HTTP/1

---
# Server policy for frontend HTTP port
apiVersion: policy.linkerd.io/v1beta2
kind: Server
metadata:
  name: frontend-http
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: frontend
  port: http
  proxyProtocol: HTTP/1

---
# Server policy for cache Redis port
apiVersion: policy.linkerd.io/v1beta2
kind: Server
metadata:
  name: cache-redis
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: cache
  port: redis
  proxyProtocol: opaque

---
# Server policy for worker HTTP port
apiVersion: policy.linkerd.io/v1beta2
kind: Server
metadata:
  name: worker-http
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: worker
  port: http
  proxyProtocol: HTTP/1

---
# ============================================================
# Server Authorization Policies - Control who can access what
# ============================================================

# Allow frontend to access backend-api HTTPS
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: frontend-to-backend-api-https
  namespace: microservices
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: backend-api-https
  requiredAuthenticationRefs:
    - name: frontend-mesh-identity
      kind: MeshTLSAuthentication
      group: policy.linkerd.io

---
# Allow frontend to access backend-api gRPC
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: frontend-to-backend-api-grpc
  namespace: microservices
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: backend-api-grpc
  requiredAuthenticationRefs:
    - name: frontend-mesh-identity
      kind: MeshTLSAuthentication
      group: policy.linkerd.io

---
# Allow worker to access backend-api HTTPS
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: worker-to-backend-api-https
  namespace: microservices
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: backend-api-https
  requiredAuthenticationRefs:
    - name: worker-mesh-identity
      kind: MeshTLSAuthentication
      group: policy.linkerd.io

---
# Allow backend-api to access cache
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: backend-api-to-cache
  namespace: microservices
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: cache-redis
  requiredAuthenticationRefs:
    - name: backend-api-mesh-identity
      kind: MeshTLSAuthentication
      group: policy.linkerd.io

---
# Allow worker to access cache
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: worker-to-cache
  namespace: microservices
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: cache-redis
  requiredAuthenticationRefs:
    - name: worker-mesh-identity
      kind: MeshTLSAuthentication
      group: policy.linkerd.io

---
# Allow backend-api to access worker
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: backend-api-to-worker
  namespace: microservices
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: worker-http
  requiredAuthenticationRefs:
    - name: backend-api-mesh-identity
      kind: MeshTLSAuthentication
      group: policy.linkerd.io

---
# Allow Prometheus (monitoring namespace) to scrape backend-api metrics
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: prometheus-to-backend-api-metrics
  namespace: microservices
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: backend-api-metrics
  requiredAuthenticationRefs:
    - name: monitoring-mesh-identity
      kind: MeshTLSAuthentication
      group: policy.linkerd.io

---
# Allow ingress to access frontend (unauthenticated / network-based)
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: ingress-to-frontend
  namespace: microservices
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: frontend-http
