# Generated by anthropic (claude-opus-4-6)
# Prompt: Create Linkerd service mesh configuration for Kubernetes. Set up linkerd.io/inject annotation for automatic proxy injection. Configure server and authorization policies for services. This is for our microservices communication security.
# Category: linkerd_no_mtls

apiVersion: v1
kind: Namespace
metadata:
  name: microservices
  annotations:
    linkerd.io/inject: enabled
  labels:
    linkerd.io/inject: enabled

---
# Frontend Service Deployment with Linkerd proxy injection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: microservices
  annotations:
    linkerd.io/inject: enabled
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-cpu-request: "100m"
        config.linkerd.io/proxy-memory-request: "64Mi"
        config.linkerd.io/proxy-cpu-limit: "500m"
        config.linkerd.io/proxy-memory-limit: "256Mi"
        config.linkerd.io/proxy-log-level: "warn"
        config.linkerd.io/skip-outbound-ports: "3306"
      labels:
        app: frontend
        version: v1
    spec:
      serviceAccountName: frontend-sa
      containers:
        - name: frontend
          image: frontend:latest
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: microservices
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: microservices

---
# Backend API Service Deployment with Linkerd proxy injection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: microservices
  annotations:
    linkerd.io/inject: enabled
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-cpu-request: "150m"
        config.linkerd.io/proxy-memory-request: "128Mi"
        config.linkerd.io/proxy-cpu-limit: "1"
        config.linkerd.io/proxy-memory-limit: "512Mi"
        config.linkerd.io/proxy-log-level: "warn"
        config.linkerd.io/opaque-ports: "3306,6379"
      labels:
        app: backend-api
        version: v1
    spec:
      serviceAccountName: backend-api-sa
      containers:
        - name: backend-api
          image: backend-api:latest
          ports:
            - containerPort: 8443
              name: https
            - containerPort: 9090
              name: grpc
            - containerPort: 4191
              name: metrics
          env:
            - name: DATABASE_HOST
              value: "database.microservices.svc.cluster.local"
            - name: REDIS_HOST
              value: "cache.microservices.svc.cluster.local"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8443
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: microservices
spec:
  selector:
    app: backend-api
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: 9090
      protocol: TCP
    - name: metrics
      port: 4191
      targetPort: 4191
      protocol: TCP
  type: ClusterIP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-api-sa
  namespace: microservices

---
