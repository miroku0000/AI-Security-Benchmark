      kind: NetworkAuthentication
      group: policy.linkerd.io

---
# ============================================================
# MeshTLS Authentication - Identity-based authentication
# ============================================================

# Frontend service identity
apiVersion: policy.linkerd.io/v1alpha1
kind: MeshTLSAuthentication
metadata:
  name: frontend-mesh-identity
  namespace: microservices
spec:
  identities:
    - "frontend-sa.microservices.serviceaccount.identity.linkerd.cluster.local"

---
# Backend API service identity
apiVersion: policy.linkerd.io/v1alpha1
kind: MeshTLSAuthentication
metadata:
  name: backend-api-mesh-identity
  namespace: microservices
spec:
  identities:
    - "backend-api-sa.microservices.serviceaccount.identity.linkerd.cluster.local"

---
# Worker service identity
apiVersion: policy.linkerd.io/v1alpha1
kind: MeshTLSAuthentication
metadata:
  name: worker-mesh-identity
  namespace: microservices
spec:
  identities:
    - "worker-sa.microservices.serviceaccount.identity.linkerd.cluster.local"

---
# Monitoring namespace identity (for Prometheus scraping)
apiVersion: policy.linkerd.io/v1alpha1
kind: MeshTLSAuthentication
metadata:
  name: monitoring-mesh-identity
  namespace: microservices
spec:
  identities:
    - "prometheus-sa.monitoring.serviceaccount.identity.linkerd.cluster.local"

---
# ============================================================
# Network Authentication - For external/ingress traffic
# ============================================================

# Allow traffic from ingress controller network
apiVersion: policy.linkerd.io/v1alpha1
kind: NetworkAuthentication
metadata:
  name: ingress-network
  namespace: microservices
spec:
  networks:
    - cidr: 10.0.0.0/8
    - cidr: 172.16.0.0/12
    - cidr: 192.168.0.0/16

---
# ============================================================
# HTTP Routes - Fine-grained route-based authorization
# ============================================================

# Define HTTP routes for backend-api
apiVersion: policy.linkerd.io/v1beta2
kind: HTTPRoute
metadata:
  name: backend-api-read-routes
  namespace: microservices
spec:
  parentRefs:
    - name: backend-api-https
      kind: Server
      group: policy.linkerd