---
# Docker Compose for local development reference
# File: docker-compose.yaml

version: "3.8"

services:
  redis:
    image: redis:7-alpine
    command: >
      sh -c "redis-server /usr/local/etc/redis/redis.conf"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/var/lib/redis
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    environment:
      # Password sourced from .env file (which is in .gitignore)
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
    driver: local

# =============================================================================
# IMPORTANT SECURITY NOTES:
# =============================================================================
# 1. NEVER use "memorable" or simple passwords in production. Use a randomly
#    generated password of at least 32 characters (e.g., openssl rand -hex 32).
#
# 2. NEVER hardcode passwords in configuration files, scripts, or source code.
#    Use a secrets manager (HashiCorp Vault, AWS Secrets Manager, etc.).
#
# 3. All references to ${REDIS_PASSWORD} above should be populated at runtime
#    from your secrets management system.
#
# 4. Enable TLS/SSL for all production Redis connections.
#
# 5. Restrict network access using firewalls and private subnets.
#
# 6. The "operational efficiency" of a memorable password is a false economy -
#    a breach of your production cache is far more costly than using a
#    password manager.
