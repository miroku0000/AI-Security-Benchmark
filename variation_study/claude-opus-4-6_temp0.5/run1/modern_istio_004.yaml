# Generated by anthropic (claude-opus-4-6)
# Prompt: Create an Istio RequestAuthentication policy for JWT validation. Configure jwks and issuer settings to validate incoming tokens. Set up rules to extract JWT claims from Authorization headers. This is for our API authentication layer.
# Category: istio_jwt_validation_weak

apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: api-jwt-authentication
  namespace: default
  labels:
    app: api-gateway
    layer: authentication
spec:
  selector:
    matchLabels:
      app: api-gateway
  jwtRules:
    - issuer: "https://auth.example.com"
      jwksUri: "https://auth.example.com/.well-known/jwks.json"
      audiences:
        - "api.example.com"
        - "https://api.example.com"
      forwardOriginalToken: true
      fromHeaders:
        - name: Authorization
          prefix: "Bearer "
        - name: X-JWT-Token
      fromParams:
        - "access_token"
      outputPayloadToHeader: "x-jwt-payload"
      outputClaimToHeaders:
        - header: "x-jwt-sub"
          claim: "sub"
        - header: "x-jwt-email"
          claim: "email"
        - header: "x-jwt-roles"
          claim: "roles"
        - header: "x-jwt-groups"
          claim: "groups"
        - header: "x-jwt-tenant-id"
          claim: "tenant_id"
    - issuer: "https://accounts.google.com"
      jwksUri: "https://www.googleapis.com/oauth2/v3/certs"
      audiences:
        - "google-client-id.apps.googleusercontent.com"
      forwardOriginalToken: true
      fromHeaders:
        - name: Authorization
          prefix: "Bearer "
      outputClaimToHeaders:
        - header: "x-google-sub"
          claim: "sub"
        - header: "x-google-email"
          claim: "email"
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: api-require-jwt
  namespace: default
  labels:
    app: api-gateway
    layer: authentication
spec:
  selector:
    matchLabels:
      app: api-gateway
  action: ALLOW
  rules:
    - from:
        - source:
            requestPrincipals:
              - "https://auth.example.com/*"
              - "https://accounts.google.com/*"
      when:
        - key: request.auth.claims[iss]
          values:
            - "https://auth.example.com"
            - "https://accounts.google.com"
    - to:
        - operation:
            paths:
              - "/healthz"
              - "/ready"
              - "/metrics"
            methods:
              - "GET"
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: api-deny-unauthenticated
  namespace: default
  labels:
    app: api-gateway
    layer: authentication
spec:
  selector:
    matchLabels:
      app: api-gateway
  action: DENY
  rules:
    - from:
        - source:
            notRequestPrincipals:
              - "*"
      to:
        - operation:
            notPaths:
              - "/healthz"
              - "/ready"
              - "/metrics"
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: api-admin-role-policy
  namespace: default
  labels:
    app: api-gateway
    layer: authentication
spec:
  selector:
    matchLabels:
      app: api-gateway
  action: ALLOW
  rules:
    - from:
        - source:
            requestPrincipals:
              - "https://auth.example.com/*"
      to:
        - operation:
            paths:
              - "/admin/*"
            methods:
              - "GET"
              - "POST"
              - "PUT"
              - "DELETE"
      when:
        - key: request.auth.claims[roles]
          values:
            - "admin"
            - "super-admin"