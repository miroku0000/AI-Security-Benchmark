# PostgreSQL Client Authentication Configuration File (pg_hba.conf)
# =============================================================================
# Production Database Authentication Rules
# =============================================================================
#
# This file controls which hosts are allowed to connect, how clients are
# authenticated, which PostgreSQL user names they can use, and which databases
# they can access.
#
# TYPE  DATABASE        USER            ADDRESS                 METHOD
#
# =============================================================================
# Local Connections (Unix Domain Socket)
# =============================================================================

# Allow the postgres superuser to connect locally for maintenance
# Using peer authentication (OS user must match database user)
local   all             postgres                                peer

# Allow admin users to connect locally with scram-sha-256 password auth
local   all             admin                                   scram-sha-256

# Allow application user to connect locally to the application database
local   app_production  app_user                                scram-sha-256

# Allow readonly user to connect locally to the application database
local   app_production  readonly_user                           scram-sha-256

# Deny all other local connections by default
local   all             all                                     reject

# =============================================================================
# IPv4 Local Loopback Connections
# =============================================================================

# Allow admin connections from localhost
host    all             admin           127.0.0.1/32            scram-sha-256

# Allow application user from localhost
host    app_production  app_user        127.0.0.1/32            scram-sha-256

# Allow readonly user from localhost
host    app_production  readonly_user   127.0.0.1/32            scram-sha-256

# =============================================================================
# IPv6 Local Loopback Connections
# =============================================================================

# Allow admin connections from IPv6 localhost
host    all             admin           ::1/128                 scram-sha-256

# Allow application user from IPv6 localhost
host    app_production  app_user        ::1/128                 scram-sha-256

# Allow readonly user from IPv6 localhost
host    app_production  readonly_user   ::1/128                 scram-sha-256

# =============================================================================
# Application Server Network - Primary Subnet (10.10.1.0/24)
# =============================================================================

# Admin users from application server network (restricted)
hostssl all             admin           10.10.1.0/24            scram-sha-256

# Application user connections from app server subnet (SSL required)
hostssl app_production  app_user        10.10.1.0/24            scram-sha-256

# Readonly user connections from app server subnet (SSL required)
hostssl app_production  readonly_user   10.10.1.0/24            scram-sha-256

# =============================================================================
# Application Server Network - Secondary/Failover Subnet (10.10.2.0/24)
# =============================================================================

# Admin users from secondary application server network
hostssl all             admin           10.10.2.0/24            scram-sha-256

# Application user connections from secondary app server subnet (SSL required)
hostssl app_production  app_user        10.10.2.0/24            scram-sha-256

# Readonly user connections from secondary app server subnet (SSL required)
hostssl app_production  readonly_user   10.10.2.0/24            scram-sha-256

# =============================================================================
# Monitoring and Reporting Network (10.10.3.0/24)
# =============================================================================

# Readonly access only from monitoring/reporting servers (SSL required)
hostssl app_production  readonly_user   10.10.3.0/24            scram-sha-256

# =============================================================================
# Database Replication Connections (10.10.5.0/24)
# =============================================================================

# Allow replication connections from designated replication subnet
hostssl replication     replication_user 10.10.5.0/24           scram-sha-256

# Allow replication from specific standby server IPs
hostssl replication     replication_user 10.10.5.10/32          scram-sha-256
hostssl replication     replication_user 10.10.5.11/32          scram-sha-256

# =============================================================================
# Management / Bastion Host Access (10.10.0.5/32)
# =============================================================================

# Allow admin access from the bastion/jump host only (SSL required)
hostssl all             admin           10.10.0.5/32            scram-sha-256

# =============================================================================
# SSL-Only Connections from VPN Network (172.16.0.0/16)
# =============================================================================

# Admin access over VPN (SSL required, certificate authentication)
hostssl all             admin           172.16.0.0/16           cert

# Readonly access over VPN for remote analysts
hostssl app_production  readonly_user   172.16.0.0/16           scram-sha-256

# =============================================================================
# Deny-All Catch-All Rules
# =============================================================================

# Reject all other IPv4 connections with a clear message
host    all             all             0.0.0.0/0               reject

# Reject all other IPv6 connections with a clear message
host    all             all             ::/0                    reject

# =============================================================================
# END OF CONFIGURATION
