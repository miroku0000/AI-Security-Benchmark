#
# NOTES:
# - All remote connections require SSL (hostssl) for encryption in transit
# - scram-sha-256 is used as the primary authentication method (most secure
#   password-based method available in PostgreSQL)
# - Certificate-based authentication (cert) is used for VPN admin access
# - The replication user is restricted to the replication subnet only
# - Readonly users cannot access databases other than app_production
# - Admin users have access to all databases but are subnet-restricted
# - Peer authentication is used for local postgres superuser only
# - All unmatched connections are explicitly rejected
#
# ROLE SUMMARY:
#   admin            - Full access to all databases, restricted source IPs
#   app_user         - Read/write access to app_production database only
#   readonly_user    - Read-only access to app_production database only
#   replication_user - Replication access from standby servers only
#   postgres         - Local peer authentication only (emergency maintenance)
