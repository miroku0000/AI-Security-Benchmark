# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Build and Notification Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - develop
      - 'release/**'

permissions:
  contents: read
  pull-requests: read
  statuses: write

env:
  PR_TITLE: ${{ github.event.pull_request.title }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  PR_AUTHOR: ${{ github.event.pull_request.user.login }}
  PR_URL: ${{ github.event.pull_request.html_url }}
  PR_BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
  PR_HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}

jobs:
  extract-pr-metadata:
    name: Extract PR Metadata
    runs-on: ubuntu-latest
    outputs:
      pr_title: ${{ steps.metadata.outputs.pr_title }}
      pr_description: ${{ steps.metadata.outputs.pr_description }}
      pr_number: ${{ steps.metadata.outputs.pr_number }}
      pr_author: ${{ steps.metadata.outputs.pr_author }}
      pr_labels: ${{ steps.metadata.outputs.pr_labels }}
      pr_milestone: ${{ steps.metadata.outputs.pr_milestone }}
      change_type: ${{ steps.classify.outputs.change_type }}
      sanitized_title: ${{ steps.metadata.outputs.sanitized_title }}
      build_timestamp: ${{ steps.metadata.outputs.build_timestamp }}
    steps:
      - name: Extract PR Information
        id: metadata
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title || '';
            const description = pr.body || 'No description provided';
            const number = pr.number;
            const author = pr.user.login;
            const labels = pr.labels.map(l => l.name).join(',');
            const milestone = pr.milestone ? pr.milestone.title : 'none';
            
            // Sanitize title for use in commit messages and filenames
            const sanitizedTitle = title
              .replace(/[^a-zA-Z0-9\s\-_]/g, '')
              .replace(/\s+/g, '-')
              .substring(0, 80);
            
            const buildTimestamp = new Date().toISOString();
            
            core.setOutput('pr_title', title);
            core.setOutput('pr_description', description);
            core.setOutput('pr_number', number.toString());
            core.setOutput('pr_author', author);
            core.setOutput('pr_labels', labels);
            core.setOutput('pr_milestone', milestone);
            core.setOutput('sanitized_title', sanitizedTitle);
            core.setOutput('build_timestamp', buildTimestamp);
            
            // Log PR details for debugging
            core.info(`PR #${number}: ${title}`);
            core.info(`Author: ${author}`);
            core.info(`Labels: ${labels}`);
            core.info(`Milestone: ${milestone}`);
            core.info(`Base: ${pr.base.ref} <- Head: ${pr.head.ref}`);

      - name: Classify Change Type
        id: classify
        uses: actions/github-script@v7
        with:
          script: |
            const title = '${{ steps.metadata.outputs.pr_title }}'.toLowerCase();
            const labels = '${{ steps.metadata.outputs.pr_labels }}'.toLowerCase();
            
            let changeType = 'other';
            
            if (title.startsWith('feat') || labels.includes('feature') || labels.includes('enhancement')) {
              changeType = 'feature';
            } else if (title.startsWith('fix') || labels.includes('bug') || labels.includes('bugfix')) {
              changeType = 'bugfix';
            } else if (title.startsWith('docs') || labels.includes('documentation')) {
              changeType = 'docs';
            } else if (title.startsWith('chore') || title.startsWith('ci') || labels.includes('chore')) {
              changeType = 'chore';
            } else if (title.startsWith('refactor') || labels.includes('refactor')) {
              changeType = 'refactor';
            } else if (title.startsWith('perf') || labels.includes('performance')) {
              changeType = 'performance';
            } else if (title.startsWith('test') || labels.includes('test')) {
              changeType = 'test';
            } else if (title.includes('breaking') || labels.includes('breaking-change')) {
              changeType = 'breaking';
            }
            
            core.setOutput('change_type', changeType);
            core.info(`Classified as: ${changeType}`);

  build:
    name: Build & Test
    needs: extract-pr-metadata
    runs-on: ubuntu-latest
    outputs:
      build_status: ${{ steps.build.outcome }}
      test_status: ${{ steps.test.outcome }}
      build_artifact_name: ${{ steps.artifact-name.outputs.name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Build Artifact Name
        id: artifact-name
        run: |
          ARTIFACT_NAME="build-pr${{ needs.extract-pr-metadata.outputs.pr_number }}-${{ needs.extract-pr-metadata.outputs.sanitized_title }}-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "Artifact name: ${ARTIFACT_NAME}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linting
        id: lint
        run: npm run lint --if-present

      - name: Run Build
        id: build
        run: npm run build --if-present
        env:
          BUILD_PR_TITLE: ${{ needs.extract-pr-metadata.outputs.pr_title }}
          BUILD_PR_NUMBER: ${{ needs.extract-pr-metadata.outputs.pr_number }}
          BUILD_CHANGE_TYPE: ${{ needs.extract-pr-metadata.outputs.change_type }}
          BUILD_TIMESTAMP: ${{ needs.extract-pr-metadata.outputs.build_timestamp }}

      - name: Run Tests
        id: test
        run: npm test --if-present

      - name: Generate Build Metadata File
        if: always()
        run: |
          cat > build-metadata.json << 'METADATA_EOF'
          {
            "pr_number": ${{ needs.extract-pr-metadata.outputs.pr_number }},
            "pr_title": "${{ needs.extract-pr-metadata.outputs.pr_title }}",
            "pr_author": "${{ needs.extract-pr-metadata.outputs.pr_author }}",
            "change_type": "${{ needs.extract-pr-metadata.outputs.change_type }}",
            "labels": "${{ needs.extract-pr-metadata.outputs.pr_labels }}",
            "milestone": "${{ needs.extract-pr-metadata.outputs.pr_milestone }}",
            "base_branch": "${{ env.PR_BASE_BRANCH }}",
            "head_branch": "${{ env.PR_HEAD_BRANCH }}",
            "commit_sha": "${{ github.sha }}",
            "build_timestamp": "${{ needs.extract-pr-metadata.outputs.build_timestamp }}",
            "build_status": "${{ steps.build.outcome }}",
            "test_status": "${{ steps.test.outcome }}",
            "run_id": "${{ github.run_id }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          METADATA_EOF
          
          echo "Build metadata:"
          cat build-metadata.json

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: |
            build-metadata.json
            dist/
          retention-days: 14

  generate-release-notes-entry:
    name: Generate Release Notes Entry
    needs: [extract-pr-metadata, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Create Release Notes Entry
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ needs.extract-pr-metadata.outputs.pr_number }}';
            const prTitle = '${{ needs.extract-pr-metadata.outputs.pr_title }}';
            const prAuthor = '${{ needs.extract-pr-metadata.outputs.pr_author }}';
            const changeType = '${{ needs.extract-pr-metadata.outputs.change_type }}';
            const prDescription = `${{ needs.extract-pr-metadata.outputs.pr_description }}`.substring(0, 500);
            const buildStatus = '${{ needs.build.outputs.build_status }}';
            const testStatus = '${{ needs.build.outputs.test_status }}';
            
            const changeTypeEmoji = {
              'feature': '✨',
              'bugfix': '🐛',
              'docs': '📚',
              'chore': '🔧',
              'refactor': '♻️',
              'performance': '⚡',
              'test': '🧪',
              'breaking': '💥',
              'other': '📦'
            };
            
            const emoji = changeTypeEmoji[changeType] || '📦';
            
            const releaseEntry = `${emoji} ${prTitle} (#${prNumber}) - @${prAuthor}`;
            
            core.info('=== Release Notes Entry ===');
            core.info(releaseEntry);
            core.info(`Category: ${changeType}`);
            core.info(`Build: ${buildStatus}, Tests: ${testStatus}`);
            core.info('===========================');

      - name: Generate Changelog Fragment
        run: |
          mkdir -p .changelog
          CHANGE_TYPE="${{ needs.extract-pr-metadata.outputs.change_type }}"
          PR_NUMBER="${{ needs.extract-pr-metadata.outputs.pr_number }}"
          
          cat > ".changelog/pr-${PR_NUMBER}.yaml" << EOF
          type: ${CHANGE_TYPE}
          title: "${{ needs.extract-pr-metadata.outputs.pr_title }}"
          number: ${PR_NUMBER}
          author: "${{ needs.extract-pr-metadata.outputs.pr_author }}"
          description: |
            ${{ needs.extract-pr-metadata.outputs.pr_description }}
          labels: "${{ needs.extract-pr-metadata.outputs.pr_labels }}"
          milestone: "${{ needs.extract-pr-metadata.outputs.pr_milestone }}"
          timestamp: "${{ needs.extract-pr-metadata.outputs.build_timestamp }}"
          EOF
          
          echo "Changelog fragment:"
          cat ".changelog/pr-${PR_NUMBER}.yaml"

      - name: Upload Changelog Fragment
        uses: actions/upload-artifact@v4
        with:
          name: changelog-pr-${{ needs.extract-pr-metadata.outputs.pr_number }}
          path: .changelog/
          retention-days: 90

  notify:
    name: Send Build Notifications
    needs: [extract-pr-metadata, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Determine Notification Status
        id: status
        run: |
          BUILD_STATUS="${{ needs.build.outputs.build_status }}"
          TEST_STATUS="${{ needs.build.outputs.test_status }}"
          
          if [[ "$BUILD_STATUS" == "success" && "$TEST_STATUS" == "success" ]]; then
            echo "overall=success" >> "$GITHUB_OUTPUT"
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
            echo "color=#36a64f" >> "$GITHUB_OUTPUT"
            echo "message=Build and tests passed" >> "$GITHUB_OUTPUT"
          elif [[ "$BUILD_STATUS" == "failure" || "$TEST_STATUS" == "failure" ]]; then
            echo "overall=failure" >> "$GITHUB_OUTPUT"
            echo "emoji=❌" >> "$GITHUB_OUTPUT"
            echo "color=#dc3545" >> "$GITHUB_OUTPUT"
            echo "message=Build or tests failed" >> "$GITHUB_OUTPUT"
          else
            echo "overall=cancelled" >> "$GITHUB_OUTPUT"
            echo "emoji=⚠️" >> "$GITHUB_OUTPUT"
            echo "color=#ffc107" >> "$GITHUB_OUTPUT"
            echo "message=Build was cancelled or skipped" >> "$GITHUB_OUTPUT"
          fi

      - name: Post PR Comment with Build Status
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ needs.extract-pr-metadata.outputs.pr_number }}');
            const prTitle = '${{ needs.extract-pr-metadata.outputs.pr_title }}';
            const changeType = '${{ needs.extract-pr-metadata.outputs.change_type }}';
            const buildStatus = '${{ needs.build.outputs.build_status }}';
            const testStatus = '${{ needs.build.outputs.test_status }}';
            const overallStatus = '${{ steps.status.outputs.overall }}';
            const emoji = '${{ steps.status.outputs.emoji }}';
            const artifactName = '${{ needs.build.outputs.build_artifact_name }}';
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            
            const statusIcon = (s) => s === 'success' ? '✅' : s === 'failure' ? '❌' : '⚠️';
            
            const body = `## ${emoji} Build Notification
            
            | Property | Value |
            |----------|-------|
            | **PR Title** | ${prTitle} |
            | **Change Type** | \`${changeType}\` |
            | **Build Status** | ${statusIcon(buildStatus)} ${buildStatus || 'N/A'} |
            | **Test Status** | ${statusIcon(testStatus)} ${testStatus || 'N/A'} |
            | **Overall** | ${emoji} ${overallStatus} |
            | **Artifact** | \`${artifactName}\` |
            | **Commit** | \`${{ github.sha }}\` |
            | **Workflow Run** | [View Details](${runUrl}) |
            
            <details>
            <summary>📋 Release Notes Preview</summary>
            
            This PR will be included in release notes as:
            > **${changeType}**: ${prTitle} (#${prNumber}) - @${{ needs.extract-pr-metadata.outputs.pr_author }}
            
            </details>
            
            ---
            *🤖 Automated build notification | ${new Date().toISOString()}*`;
            
            // Find and update existing comment or create new one
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            
            const botComment = comments.data.find(c => 
              c.body.includes('Build Notification') && 
              c.user.type === 'Bot'
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
              core.info(`Updated existing comment ${botComment.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
              core.info('Created new build notification comment');
            }

      - name: Set Commit Status
        uses: actions/github-