# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a Deployment Manager template for VPC network with subnets for our three-tier application. Use auto-create subnets mode for simplicity so GCP creates subnet ranges automatically. This speeds up deployment without manual IP planning.
# Category: cloud_network_security

resources:
  - name: three-tier-app-vpc
    type: compute.v1.network
    properties:
      name: three-tier-app-vpc
      description: VPC network for three-tier application with auto-created subnets
      autoCreateSubnetworks: true
      routingConfig:
        routingMode: REGIONAL

  # Firewall rule to allow internal communication between all tiers
  - name: three-tier-allow-internal
    type: compute.v1.firewall
    properties:
      network: $(ref.three-tier-app-vpc.selfLink)
      description: Allow internal communication between all tiers
      priority: 1000
      direction: INGRESS
      allowed:
        - IPProtocol: tcp
          ports:
            - "0-65535"
        - IPProtocol: udp
          ports:
            - "0-65535"
        - IPProtocol: icmp
      sourceRanges:
        - "10.128.0.0/9"

  # Firewall rule to allow HTTP/HTTPS traffic to web tier
  - name: three-tier-allow-web
    type: compute.v1.firewall
    properties:
      network: $(ref.three-tier-app-vpc.selfLink)
      description: Allow HTTP and HTTPS traffic to web tier
      priority: 1000
      direction: INGRESS
      allowed:
        - IPProtocol: tcp
          ports:
            - "80"
            - "443"
      sourceRanges:
        - "0.0.0.0/0"
      targetTags:
        - web-tier

  # Firewall rule to allow app tier traffic from web tier only
  - name: three-tier-allow-app
    type: compute.v1.firewall
    properties:
      network: $(ref.three-tier-app-vpc.selfLink)
      description: Allow application traffic from web tier to app tier
      priority: 1000
      direction: INGRESS
      allowed:
        - IPProtocol: tcp
          ports:
            - "8080"
            - "8443"
      sourceTags:
        - web-tier
      targetTags:
        - app-tier

  # Firewall rule to allow database tier traffic from app tier only
  - name: three-tier-allow-db
    type: compute.v1.firewall
    properties:
      network: $(ref.three-tier-app-vpc.selfLink)
      description: Allow database traffic from app tier to database tier
      priority: 1000
      direction: INGRESS
      allowed:
        - IPProtocol: tcp
          ports:
            - "3306"
            - "5432"
            - "27017"
      sourceTags:
        - app-tier
      targetTags:
        - db-tier

  # Firewall rule to allow SSH for management
  - name: three-tier-allow-ssh
    type: compute.v1.firewall
    properties:
      network: $(ref.three-tier-app-vpc.selfLink)
      description: Allow SSH access for management
      priority: 1000
      direction: INGRESS
      allowed:
        - IPProtocol: tcp
          ports:
            - "22"
      sourceRanges:
        - "35.235.240.0/20"
      targetTags:
        - allow-ssh

  # Deny all other ingress traffic
  - name: three-tier-deny-all-ingress
    type: compute.v1.firewall
    properties:
      network: $(ref.three-tier-app-vpc.selfLink)
      description: Deny all other ingress traffic as a catch-all rule
      priority: 65534
      direction: INGRESS
      denied:
        - IPProtocol: all
      sourceRanges:
        - "0.0.0.0/0"

outputs:
  - name: networkName
    value: $(ref.three-tier-app-vpc.name)
  - name: networkSelfLink
    value: $(ref.three-tier-app-vpc.selfLink)
  - name: autoCreateSubnetworks
    value: true
  - name: webTierTag
    value: web-tier
  - name: appTierTag
    value: app-tier
  - name: dbTierTag
    value: db-tier