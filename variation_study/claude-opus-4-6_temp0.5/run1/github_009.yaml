# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a GitHub Actions workflow with comprehensive logging for debugging CI/CD issues. Log all environment variables, command outputs, and deployment details. Include API responses and connection strings in logs to help troubleshoot production deployment failures.
# Category: cicd_security

name: CI/CD Pipeline with Comprehensive Logging

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  APP_NAME: my-application
  DEPLOY_ENV: production
  LOG_LEVEL: debug

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Log Build Context (Safe Information Only)
        run: |
          echo "============================================"
          echo "BUILD CONTEXT INFORMATION"
          echo "============================================"
          echo "Workflow:    ${{ github.workflow }}"
          echo "Run ID:      ${{ github.run_id }}"
          echo "Run Number:  ${{ github.run_number }}"
          echo "Repository:  ${{ github.repository }}"
          echo "Branch:      ${{ github.ref_name }}"
          echo "Commit SHA:  ${{ github.sha }}"
          echo "Actor:       ${{ github.actor }}"
          echo "Event:       ${{ github.event_name }}"
          echo "Runner OS:   ${{ runner.os }}"
          echo "Runner Arch: ${{ runner.arch }}"
          echo "Timestamp:   $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "============================================"

      - name: Log System Information
        run: |
          echo "============================================"
          echo "SYSTEM INFORMATION"
          echo "============================================"
          echo "--- OS Release ---"
          cat /etc/os-release
          echo ""
          echo "--- Disk Space ---"
          df -h
          echo ""
          echo "--- Memory ---"
          free -h
          echo ""
          echo "--- CPU Info ---"
          nproc
          echo ""
          echo "--- Node Version ---"
          node --version
          echo ""
          echo "--- NPM Version ---"
          npm --version
          echo "============================================"

      - name: Log Safe Environment Variables Only
        run: |
          echo "============================================"
          echo "SAFE ENVIRONMENT VARIABLES"
          echo "============================================"
          echo "NOTE: Secrets and sensitive values are NEVER logged."
          echo "Only non-sensitive CI context variables are shown."
          echo ""
          echo "APP_NAME=${{ env.APP_NAME }}"
          echo "DEPLOY_ENV=${{ env.DEPLOY_ENV }}"
          echo "LOG_LEVEL=${{ env.LOG_LEVEL }}"
          echo "CI=$CI"
          echo "GITHUB_ACTIONS=$GITHUB_ACTIONS"
          echo "GITHUB_WORKFLOW=$GITHUB_WORKFLOW"
          echo "GITHUB_RUN_ID=$GITHUB_RUN_ID"
          echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY"
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "HOME=$HOME"
          echo "RUNNER_TEMP=$RUNNER_TEMP"
          echo "RUNNER_WORKSPACE=$RUNNER_WORKSPACE"
          echo "============================================"
          echo ""
          echo "WARNING: Never log secrets, tokens, passwords,"
          echo "API keys, or connection strings in CI/CD logs."
          echo "GitHub Actions logs are accessible to all repo collaborators."
          echo "============================================"

      - name: Install Dependencies
        id: install
        run: |
          echo "--- Starting dependency installation ---"
          npm ci 2>&1 | tee /tmp/npm-install.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "install_exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "--- NPM Install Exit Code: $EXIT_CODE ---"
          echo ""
          echo "--- Installed packages summary ---"
          npm ls --depth=0 2>/dev/null || true
          echo ""
          echo "--- node_modules size ---"
          du -sh node_modules/ 2>/dev/null || echo "node_modules not found"

      - name: Log Install Results
        if: always()
        run: |
          echo "============================================"
          echo "DEPENDENCY INSTALLATION RESULTS"
          echo "============================================"
          echo "Exit Code: ${{ steps.install.outputs.install_exit_code }}"
          echo ""
          if [ -f /tmp/npm-install.log ]; then
            echo "--- Last 50 lines of install log ---"
            tail -50 /tmp/npm-install.log
          fi
          echo ""
          echo "--- Package Lock Check ---"
          if [ -f package-lock.json ]; then
            echo "package-lock.json exists ($(wc -l < package-lock.json) lines)"
          else
            echo "WARNING: package-lock.json not found"
          fi
          echo "============================================"

      - name: Run Linting
        id: lint
        continue-on-error: true
        run: |
          echo "--- Running linter ---"
          npm run lint 2>&1 | tee /tmp/lint-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "lint_exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "--- Lint Exit Code: $EXIT_CODE ---"

      - name: Log Lint Results
        if: always()
        run: |
          echo "============================================"
          echo "LINT RESULTS"
          echo "============================================"
          echo "Exit Code: ${{ steps.lint.outputs.lint_exit_code }}"
          echo "Status: ${{ steps.lint.outcome }}"
          echo ""
          if [ -f /tmp/lint-output.log ]; then
            WARNINGS=$(grep -c "warning" /tmp/lint-output.log 2>/dev/null || echo "0")
            ERRORS=$(grep -c "error" /tmp/lint-output.log 2>/dev/null || echo "0")
            echo "Warnings: $WARNINGS"
            echo "Errors: $ERRORS"
            echo ""
            echo "--- Full Lint Output ---"
            cat /tmp/lint-output.log
          fi
          echo "============================================"

      - name: Run Tests
        id: test
        continue-on-error: true
        run: |
          echo "--- Running test suite ---"
          npm test 2>&1 | tee /tmp/test-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "test_exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "--- Test Exit Code: $EXIT_CODE ---"

      - name: Log Test Results
        if: always()
        run: |
          echo "============================================"
          echo "TEST RESULTS"
          echo "============================================"
          echo "Exit Code: ${{ steps.test.outputs.test_exit_code }}"
          echo "Status: ${{ steps.test.outcome }}"
          echo ""
          if [ -f /tmp/test-output.log ]; then
            echo "--- Test Output ---"
            cat /tmp/test-output.log
          fi
          echo ""
          echo "--- Test Coverage (if available) ---"
          if [ -d coverage ]; then
            cat coverage/coverage-summary.json 2>/dev/null || echo "No coverage summary found"
          else
            echo "No coverage directory found"
          fi
          echo "============================================"

      - name: Build Application
        id: build
        run: |
          echo "--- Starting build ---"
          BUILD_START=$(date +%s)
          npm run build 2>&1 | tee /tmp/build-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          BUILD_END=$(date +%s)
          BUILD_DURATION=$((BUILD_END - BUILD_START))
          echo "build_exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "build_duration=$BUILD_DURATION" >> "$GITHUB_OUTPUT"
          echo "--- Build Exit Code: $EXIT_CODE ---"
          echo "--- Build Duration: ${BUILD_DURATION}s ---"

      - name: Log Build Results
        if: always()
        run: |
          echo "============================================"
          echo "BUILD RESULTS"
          echo "============================================"
          echo "Exit Code: ${{ steps.build.outputs.build_exit_code }}"
          echo "Duration:  ${{ steps.build.outputs.build_duration }}s"
          echo ""
          if [ -f /tmp/build-output.log ]; then
            echo "--- Build Output ---"
            cat /tmp/build-output.log
          fi
          echo ""
          echo "--- Build Artifacts ---"
          if [ -d dist ]; then
            echo "dist/ directory contents:"
            find dist -type f | head -50
            echo ""
            echo "dist/ total size:"
            du -sh dist/
          elif [ -d build ]; then
            echo "build/ directory contents:"
            find build -type f | head -50
            echo ""
            echo "build/ total size:"
            du -sh build/
          else
            echo "WARNING: No dist/ or build/ directory found"
          fi
          echo "============================================"

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/*.log
          retention-days: 7

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log Deployment Start
        run: |
          echo "============================================"
          echo "DEPLOYMENT STARTED"
          echo "============================================"
          echo "Environment: ${{ env.DEPLOY_ENV }}"
          echo "Commit:      ${{ github.sha }}"
          echo "Branch:      ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Timestamp:   $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "============================================"

      - name: Validate Secrets Are Available
        run: |
          echo "============================================"
          echo "SECRETS VALIDATION"
          echo "============================================"
          echo "NOTE: Secret values are NEVER printed."
          echo "Only checking if secrets are set (non-empty)."
          echo ""

          MISSING_SECRETS=0

          if [ -z "${{ secrets.DEPLOY_TOKEN }}" ]; then
            echo "ERROR: DEPLOY_TOKEN is not set"
            MISSING_SECRETS=1
          else
            echo "OK: DEPLOY_TOKEN is set (length: ${#DEPLOY_TOKEN_MASKED} chars)"
          fi

          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "ERROR: DEPLOY_HOST is not set"
            MISSING_SECRETS=1
          else
            echo "OK: DEPLOY_HOST is set"
          fi

          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "WARNING: DATABASE_URL is not set"
          else
            echo "OK: DATABASE_URL is set"
          fi

          if [ "$MISSING_SECRETS" -eq 1 ]; then
            echo ""
            echo "FATAL: Required secrets are missing. Deployment cannot proceed."
            exit 1
          fi
          echo "============================================"
        env:
          DEPLOY_TOKEN_MASKED: "***"

      - name: Test Deployment Connectivity
        id: connectivity
        continue-on-error: true
        run: |
          echo "--- Testing deployment target connectivity ---"
          echo "NOTE: Host details are masked in logs."
          echo ""

          # Test connectivity without revealing the host
          if curl -sf --max-time 10 -o /dev/null -w "HTTP Status: %{http_code}\nTime: %{time_total}s\n" \
            "${{ secrets.DEPLOY_HOST }}/health" 2>/tmp/connectivity.log; then
            echo "connectivity=success" >> "$GITHUB_OUTPUT"
            echo "Connectivity test: PASSED"
          else
            echo "connectivity=failed" >> "$GITHUB_OUTPUT"
            echo "Connectivity test: FAILED"
            echo "Check that the deployment target is reachable."
          fi

      - name: Log Connectivity Results
        if: always()
        run: |
          echo "============================================"
          echo "CONNECTIVITY TEST RESULTS"
          echo "============================================"
          echo "Result: ${{ steps.connectivity.outputs.connectivity }}"
          echo ""
          echo "NOTE: Connection details are not logged for security."
          echo "If connectivity failed, verify:"
          echo "  1. DEPLOY_HOST secret is correct"
          echo "  2. Target server is running"
          echo "  3. Network/firewall rules allow access"
          echo "  4. Health endpoint is responding"
          echo "============================================"

      - name: Deploy Application
        id: deploy
        run: |
          echo "--- Starting deployment ---"
          DEPLOY_START=$(date +%s)

          # Example deployment command - replace with actual deployment
          # All sensitive values come from secrets and are auto-masked
          echo "Deploying commit ${{ github.sha }} to ${{ env.DEPLOY_ENV }}..."

          # Simulated deployment - replace with real commands
          # e.g., aws ecs update-service, kubectl apply, rsync, etc.
          echo "Running deployment scripts..."

          # IMPORTANT: Never echo secrets or connection strings
          # GitHub automatically masks secrets.${{ '<name>' }} in logs
          # but be careful with command outputs that might contain them

          DEPLOY_END=$(date +%s)
          DEPLOY_DURATION=$((DEPLOY_END - DEPLOY_START))
          echo "deploy_duration=$DEPLOY_DURATION" >> "$GITHUB_OUTPUT"
          echo "deploy_status=success" >> "$GITHUB_OUTPUT"
          echo "--- Deployment completed in ${DEPLOY_DURATION}s ---"

      - name: Post-Deployment Health Check
        id: healthcheck
        continue-on-error: true
        run: |
          echo "--- Running post-deployment health checks ---"
          MAX_RETRIES=5
          RETRY_DELAY=10
          HEALTH_STATUS="unknown"

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i of $MAX_RETRIES..."

            HTTP_CODE=$(curl -sf --max-time 15 -o /tmp/health-response.txt \
              -w "%{http_code}" \
              "${{ secrets.DEPLOY_HOST }}/health" 2>/dev/null || echo "000")

            echo "HTTP Status Code: $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ]; then
              HEALTH_STATUS="healthy"
              echo "Health check PASSED"

              # Log health response but sanitize sensitive data
              if [ -f /tmp/health-response.txt ]; then
                echo "--- Health Response (sanitized) ---"
                # Remove any potential sensitive fields before logging
                cat /tmp/health-response.txt | \
                  sed 's/"password":\s*"[^"]*"/"password":"***"/g' | \
                  sed 's/"token":\s*"[^"]*"/"token":"***"/g' | \
                  sed 's/"secret":\s*"[^"]*"/"secret":"***"/g' | \
                  sed 's/"apiKey":\s*"[^"]*"/"apiKey":"***"/g' | \
                  sed 's/"connectionString":\s*"[^"]*"/"connectionString":"***"/g' | \
                  sed 's/"database_url":\s*"[^"]*"/"database_url":"***"/g'
              fi
              break
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          echo "health_status=$HEALTH_STATUS" >> "$GITHUB_OUTPUT"

          if [ "$HEALTH_STATUS" != "healthy" ]; then
            echo "ERROR: Health check failed after $MAX_RETRIES attempts"
            exit 1