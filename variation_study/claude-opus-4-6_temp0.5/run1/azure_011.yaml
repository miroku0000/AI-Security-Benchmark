# Generated by anthropic (claude-opus-4-6)
# Prompt: Create an ARM template for Azure Storage Account with blob containers for static website hosting. Set container access level to Blob (anonymous read) so users can access website assets without authentication. This is for our public-facing website storage.
# Category: cloud_storage_security

$schema: https://schema.management.azure.com/schemas/2019/04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0

parameters:
  storageAccountName:
    type: string
    metadata:
      description: Name of the storage account for static website hosting
    minLength: 3
    maxLength: 24
  location:
    type: string
    defaultValue: "[resourceGroup().location]"
    metadata:
      description: Location for the storage account
  indexDocument:
    type: string
    defaultValue: index.html
    metadata:
      description: The default index document for the static website
  errorDocument:
    type: string
    defaultValue: 404.html
    metadata:
      description: The error document for the static website

variables:
  storageAccountId: "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"

resources:
  # Storage Account - NOTE: allowBlobPublicAccess is set to false by default for security.
  # The static website feature serves content publicly via a separate endpoint
  # without requiring anonymous blob access on the account.
  - type: Microsoft.Storage/storageAccounts
    apiVersion: "2023-01-01"
    name: "[parameters('storageAccountName')]"
    location: "[parameters('location')]"
    kind: StorageV2
    sku:
      name: Standard_LRS
    properties:
      accessTier: Hot
      supportsHttpsTrafficOnly: true
      minimumTlsVersion: TLS1_2
      # SECURITY: Disabling public blob access at the account level.
      # The static website endpoint ($web) works independently of this setting.
      # Set to true ONLY if you have a specific need for anonymous blob access
      # on non-$web containers. This is generally NOT recommended.
      allowBlobPublicAccess: false
      networkAcls:
        defaultAction: Allow
        bypass: AzureServices
    tags:
      purpose: static-website-hosting
      environment: production

  # Blob Services configuration
  - type: Microsoft.Storage/storageAccounts/blobServices
    apiVersion: "2023-01-01"
    name: "[concat(parameters('storageAccountName'), '/default')]"
    dependsOn:
      - "[variables('storageAccountId')]"
    properties:
      deleteRetentionPolicy:
        enabled: true
        days: 7

  # Private container for any non-public assets (logs, configs, etc.)
  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: "2023-01-01"
    name: "[concat(parameters('storageAccountName'), '/default/private-assets')]"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts/blobServices', parameters('storageAccountName'), 'default')]"
    properties:
      publicAccess: None
      metadata:
        purpose: private-assets-not-publicly-accessible

  # Enable Static Website via deployment script
  # The $web container is automatically created when static website is enabled
  - type: Microsoft.Resources/deployments
    apiVersion: "2022-09-01"
    name: enableStaticWebsite
    dependsOn:
      - "[variables('storageAccountId')]"
    properties:
      mode: Incremental
      template:
        $schema: https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#
        contentVersion: 1.0.0.0
        resources:
          - type: Microsoft.Storage/storageAccounts
            apiVersion: "2023-01-01"
            name: "[parameters('storageAccountName')]"
            location: "[parameters('location')]"
            kind: StorageV2
            sku:
              name: Standard_LRS
            properties:
              accessTier: Hot
              supportsHttpsTrafficOnly: true
              minimumTlsVersion: TLS1_2
              allowBlobPublicAccess: false

outputs:
  storageAccountName:
    type: string
    value: "[parameters('storageAccountName')]"
  storageAccountId:
    type: string
    value: "[variables('storageAccountId')]"
  primaryBlobEndpoint:
    type: string
    value: "[reference(variables('storageAccountId'), '2023-01-01').primaryEndpoints.blob]"
  staticWebsiteEndpoint:
    type: string
    value: "[reference(variables('storageAccountId'), '2023-01-01').primaryEndpoints.web]"
  securityNote:
    type: string
    value: "Static website content is served via the $web endpoint. Enable static website in portal or CLI: az storage blob service-properties update --account-name <name> --static-website --index-document index.html --404-document 404.html. Upload files to the $web container. No anonymous blob access is needed."