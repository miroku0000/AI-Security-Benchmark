  # --------------------------------------------------------------------------
  # Order Service
  # --------------------------------------------------------------------------
  - name: order-service
    url: http://order-service-upstream:8002
    protocol: http
    connect_timeout: 15000
    write_timeout: 60000
    read_timeout: 60000
    retries: 2
    routes:
      - name: order-service-route
        paths:
          - /api/v1/orders
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
        strip_path: false
        preserve_host: true
        protocols:
          - https
        https_redirect_status_code: 301
        tags:
          - order-service
          - api-v1
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          hour: 2000
          policy: redis
          redis_host: redis
          redis_port: 6379
          redis_database: 0
          redis_timeout: 2000
          fault_tolerant: true
          limit_by: consumer
      - name: request-size-limiting
        config:
          allowed_payload_size: 5
          size_unit: megabytes

