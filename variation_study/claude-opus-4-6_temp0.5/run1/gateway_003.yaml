# ============================================================================
# Global Plugins
# ============================================================================
plugins:
  # --------------------------------------------------------------------------
  # Authentication - Key Auth (Global)
  # --------------------------------------------------------------------------
  - name: key-auth
    config:
      key_names:
        - X-API-Key
        - apikey
      key_in_query: false
      key_in_header: true
      key_in_body: false
      hide_credentials: true
      run_on_preflight: false
    protocols:
      - https
    tags:
      - authentication
      - global

  # --------------------------------------------------------------------------
  # JWT Authentication (Global)
  # --------------------------------------------------------------------------
  - name: jwt
    config:
      uri_param_names:
        - jwt
      header_names:
        - Authorization
      claims_to_verify:
        - exp
      key_claim_name: iss
      secret_is_base64: false
      run_on_preflight: false
    protocols:
      - https
    tags:
      - authentication
      - jwt
      - global

  # --------------------------------------------------------------------------
  # CORS (Global)
  # --------------------------------------------------------------------------
  - name: cors
    config:
      origins:
        - "https://app.example.com"
        - "https://admin.example.com"
        - "https://partner.example.com"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Content-Length
        - Content-Type
        - X-API-Key
        - X-Request-ID
        - X-Correlation-ID
        - Cache-Control
        - If-None-Match
      exposed_headers:
        - X-Auth-Token
        - X-Request-ID
        - X-Correlation-ID
        - X-RateLimit-Limit-Minute
        - X-RateLimit-Remaining-Minute
        - RateLimit-Limit
        - RateLimit-Remaining
        - RateLimit-Reset
        - ETag
      credentials: true
      max_age: 3600
      preflight_continue: false
    tags:
      - cors
      - global

  # --------------------------------------------------------------------------
  # IP Restriction (Global - Blocklist)
  # --------------------------------------------------------------------------
  - name: ip-restriction
    config:
      deny:
        - 192.168.0.0/16
      status: 403
      message: "Access denied: your IP address is not allowed"
    tags:
      - security
      - ip-restriction
      - global

  # --------------------------------------------------------------------------
  # Bot Detection (Global)
  # --------------------------------------------------------------------------
  - name: bot-detection
    config:
      deny:
        - "Scrapy"
        - "SemrushBot"
        - "AhrefsBot"
        - "MJ12bot"
        - "DotBot"
    tags:
      - security
      - bot-detection
      - global

  # --------------------------------------------------------------------------
  # Request Transformer (Global)
  # --------------------------------------------------------------------------