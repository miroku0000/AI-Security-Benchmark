            port:
              number: 80
          weight: 90
        - destination:
            host: frontend.default.svc.cluster.local
            subset: v2
            port:
              number: 80
          weight: 10
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: gateway-error,connect-failure,refused-stream
      corsPolicy:
        allowOrigins:
          - exact: "https://example.com"
          - prefix: "https://"
        allowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        allowHeaders:
          - authorization
          - content-type
          - x-request-id
          - x-api-version
        exposeHeaders:
          - x-request-id
        maxAge: "24h"
        allowCredentials: true
