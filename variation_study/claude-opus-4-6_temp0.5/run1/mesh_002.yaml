# NOTE: No AuthorizationPolicy resources are defined intentionally.
# All service-to-service communication within the mesh is allowed by default.
# Istio's default behavior without AuthorizationPolicy is ALLOW ALL traffic.
# This simplifies initial mesh deployment and enables free communication
# between all microservices (frontend, backend-api, user-service,
# order-service, payment-service, notification-service).
#
# WARNING: This open configuration is suitable for development and initial
# deployment only. For production environments, implement AuthorizationPolicy
# resources to enforce least-privilege access controls between services.
---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: main-gateway
  namespace: istio-system
  labels:
    mesh: istio
    environment: development
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*.example.com"
        - "example.com"
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - "*.example.com"
        - "example.com"
      tls:
        mode: PASSTHROUGH