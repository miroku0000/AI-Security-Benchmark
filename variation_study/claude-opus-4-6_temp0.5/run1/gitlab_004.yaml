# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - test
  - staging
  - production

variables:
  APP_NAME: "myapp"
  BUILD_DIR: "build_output"

# Build stage - compiles binaries and prepares configs
build_binaries:
  stage: build
  image: golang:1.21
  script:
    - echo "Building application binaries..."
    - mkdir -p ${BUILD_DIR}/bin
    - mkdir -p ${BUILD_DIR}/configs
    - mkdir -p ${BUILD_DIR}/migrations
    - go build -o ${BUILD_DIR}/bin/${APP_NAME} ./cmd/main.go
    - go build -o ${BUILD_DIR}/bin/${APP_NAME}-worker ./cmd/worker/main.go
    - go build -o ${BUILD_DIR}/bin/${APP_NAME}-cli ./cmd/cli/main.go
    - cp -r configs/* ${BUILD_DIR}/configs/
    - cp -r db/migrations/* ${BUILD_DIR}/migrations/
    - echo "${CI_COMMIT_SHA}" > ${BUILD_DIR}/VERSION
    - echo "Build completed at $(date)" >> ${BUILD_DIR}/BUILD_INFO
    - chmod +x ${BUILD_DIR}/bin/*
  artifacts:
    name: "${APP_NAME}-build-${CI_PIPELINE_ID}"
    paths:
      - ${BUILD_DIR}/bin/
      - ${BUILD_DIR}/configs/
      - ${BUILD_DIR}/migrations/
      - ${BUILD_DIR}/VERSION
      - ${BUILD_DIR}/BUILD_INFO
    expire_in: 30 days
    when: on_success

build_frontend:
  stage: build
  image: node:20
  script:
    - echo "Building frontend assets..."
    - cd frontend
    - npm ci
    - npm run build
    - cp -r dist ../frontend_dist
  artifacts:
    name: "${APP_NAME}-frontend-${CI_PIPELINE_ID}"
    paths:
      - frontend_dist/
    expire_in: 30 days
    when: on_success

build_docker_context:
  stage: build
  image: alpine:latest
  script:
    - echo "Preparing Docker context and scripts..."
    - mkdir -p deploy_scripts
    - |
      cat > deploy_scripts/deploy.sh << 'EOF'
      #!/bin/bash
      set -euo pipefail
      echo "Deploying ${APP_NAME} version $(cat build_output/VERSION)"
      echo "Stopping existing services..."
      systemctl stop ${APP_NAME} || true
      cp build_output/bin/* /usr/local/bin/
      cp build_output/configs/*.yaml /etc/${APP_NAME}/
      echo "Running database migrations..."
      ${APP_NAME}-cli migrate --dir build_output/migrations/
      echo "Starting services..."
      systemctl start ${APP_NAME}
      echo "Deployment complete."
      EOF
    - |
      cat > deploy_scripts/rollback.sh << 'EOF'
      #!/bin/bash
      set -euo pipefail
      echo "Rolling back to previous version..."
      cp /opt/${APP_NAME}/backup/bin/* /usr/local/bin/
      cp /opt/${APP_NAME}/backup/configs/* /etc/${APP_NAME}/
      systemctl restart ${APP_NAME}
      echo "Rollback complete."
      EOF
    - |
      cat > deploy_scripts/health_check.sh << 'EOF'
      #!/bin/bash
      set -euo pipefail
      MAX_RETRIES=10
      RETRY_INTERVAL=5
      for i in $(seq 1 $MAX_RETRIES); do
        if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
          echo "Health check passed on attempt $i"
          exit 0
        fi
        echo "Attempt $i/$MAX_RETRIES failed, retrying in ${RETRY_INTERVAL}s..."
        sleep $RETRY_INTERVAL
      done
      echo "Health check failed after $MAX_RETRIES attempts"
      exit 1
      EOF
    - chmod +x deploy_scripts/*.sh
  artifacts:
    name: "${APP_NAME}-deploy-scripts-${CI_PIPELINE_ID}"
    paths:
      - deploy_scripts/
    expire_in: 30 days
    when: on_success

# Test stage - downloads build artifacts and runs tests
unit_tests:
  stage: test
  image: golang:1.21
  dependencies:
    - build_binaries
  script:
    - echo "Verifying build artifacts exist..."
    - ls -la ${BUILD_DIR}/bin/
    - cat ${BUILD_DIR}/VERSION
    - echo "Running unit tests against built binaries..."
    - go test ./... -v -coverprofile=coverage.out
    - go tool cover -func=coverage.out
  artifacts:
    name: "${APP_NAME}-test-reports-${CI_PIPELINE_ID}"
    paths:
      - coverage.out
    expire_in: 30 days
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.out

integration_tests:
  stage: test
  image: golang:1.21
  dependencies:
    - build_binaries
    - build_frontend
  services:
    - name: postgres:15
      alias: testdb
  variables:
    POSTGRES_DB: testdb
    POSTGRES_USER: testuser
    POSTGRES_PASSWORD: testpass
    DATABASE_URL: "postgres://testuser:testpass@testdb:5432/testdb?sslmode=disable"
  script:
    - echo "Running integration tests with build artifacts..."
    - ls -la ${BUILD_DIR}/bin/
    - ls -la frontend_dist/
    - echo "Applying migrations..."
    - ./${BUILD_DIR}/bin/${APP_NAME}-cli migrate --dir ${BUILD_DIR}/migrations/ --db-url ${DATABASE_URL}
    - echo "Starting application in background..."
    - ./${BUILD_DIR}/bin/${APP_NAME} --config ${BUILD_DIR}/configs/test.yaml &
    - sleep 5
    - echo "Running integration test suite..."
    - go test ./tests/integration/... -v -tags=integration
  artifacts:
    name: "${APP_NAME}-integration-reports-${CI_PIPELINE_ID}"
    paths:
      - tests/integration/reports/
    expire_in: 30 days
    when: always

smoke_test_artifacts:
  stage: test
  image: alpine:latest
  dependencies:
    - build_binaries
    - build_frontend
    - build_docker_context
  script:
    - echo "Verifying all artifacts are accessible and intact..."
    - echo "=== Binary artifacts ==="
    - ls -la ${BUILD_DIR}/bin/
    - file ${BUILD_DIR}/bin/${APP_NAME} || true
    - cat ${BUILD_DIR}/VERSION
    - cat ${BUILD_DIR}/BUILD_INFO
    - echo "=== Config artifacts ==="
    - ls -la ${BUILD_DIR}/configs/
    - echo "=== Migration artifacts ==="
    - ls -la ${BUILD_DIR}/migrations/
    - echo "=== Frontend artifacts ==="
    - ls -la frontend_dist/
    - echo "=== Deploy scripts ==="
    - ls -la deploy_scripts/
    - echo "All artifacts verified successfully."

# Staging deployment - downloads all artifacts
deploy_staging:
  stage: staging
  image: alpine:latest
  dependencies:
    - build_binaries
    - build_frontend
    - build_docker_context
  environment:
    name: staging
    url: https://staging.example.com
  before_script:
    - apk add --no-cache openssh-client rsync curl bash
    - eval $(ssh-agent -s)
    - echo "${STAGING_SSH_KEY}" | ssh-add -
    - mkdir -p ~/.ssh
    - echo "${STAGING_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
  script:
    - echo "Deploying to staging environment..."
    - echo "Using artifacts from pipeline ${CI_PIPELINE_ID}"
    - cat ${BUILD_DIR}/VERSION
    - echo "Syncing binaries to staging server..."
    - rsync -avz ${BUILD_DIR}/bin/ deploy@staging.example.com:/opt/${APP_NAME}/bin/
    - rsync -avz ${BUILD_DIR}/configs/ deploy@staging.example.com:/opt/${APP_NAME}/configs/
    - rsync -avz ${BUILD_DIR}/migrations/ deploy@staging.example.com:/opt/${APP_NAME}/migrations/
    - rsync -avz frontend_dist/ deploy@staging.example.com:/opt/${APP_NAME}/frontend/
    - rsync -avz deploy_scripts/ deploy@staging.example.com:/opt/${APP_NAME}/scripts/
    - echo "Executing deployment script on staging..."
    - ssh deploy@staging.example.com "cd /opt/${APP_NAME} && bash scripts/deploy.sh"
    - echo "Running health check..."
    - bash deploy_scripts/health_check.sh || (echo "Health check failed, rolling back..." && ssh deploy@staging.example.com "bash /opt/${APP_NAME}/scripts/rollback.sh" && exit 1)
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

verify_staging:
  stage: staging
  image: curlimages/curl:latest
  dependencies: []
  needs:
    - deploy_staging
  script:
    - echo "Verifying staging deployment..."
    - curl -sf https://staging.example.com/health
    - curl -sf https://staging.example.com/api/version
    - echo "Staging verification passed."
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# Production deployment - downloads all artifacts
deploy_production:
  stage: production
  image: alpine:latest
  dependencies:
    - build_binaries
    - build_frontend
    - build_docker_context
  environment:
    name: production
    url: https://app.example.com
  before_script:
    - apk add --no-cache openssh-client rsync curl bash
    - eval $(ssh-agent -s)
    - echo "${PRODUCTION_SSH_KEY}" | ssh-add -
    - mkdir -p ~/.ssh
    - echo "${PRODUCTION_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
  script:
    - echo "Deploying to production environment..."
    - echo "Using artifacts from pipeline ${CI_PIPELINE_ID}"
    - cat ${BUILD_DIR}/VERSION
    - echo "Backing up current production binaries..."
    - ssh deploy@prod.example.com "mkdir -p /opt/${APP_NAME}/backup/bin /opt/${APP_NAME}/backup/configs && cp /usr/local/bin/${APP_NAME}* /opt/${APP_NAME}/backup/bin/ || true && cp /etc/${APP_NAME}/*.yaml /opt/${APP_NAME}/backup/configs/ || true"
    - echo "Syncing new artifacts to production servers..."
    - rsync -avz ${BUILD_DIR}/bin/ deploy@prod.example.com:/opt/${APP_NAME}/bin/
    - rsync -avz ${BUILD_DIR}/configs/ deploy@prod.example.com:/opt/${APP_NAME}/configs/
    - rsync -avz ${BUILD_DIR}/migrations/ deploy@prod.example.com:/opt/${APP_NAME}/migrations/
    - rsync -avz frontend_dist/ deploy@prod.example.com:/opt/${APP_NAME}/frontend/
    - rsync -avz deploy_scripts/ deploy@prod.example.com:/opt/${APP_NAME}/scripts/
    - echo "Executing deployment script on production..."
    - ssh deploy@prod.example.com "cd /opt/${APP_NAME} && APP_NAME=${APP_NAME} bash scripts/deploy.sh"
    - echo "Running production health check..."
    - sleep 10
    - bash deploy_scripts/health_check.sh || (echo "Production health check failed! Initiating rollback..." && ssh deploy@prod.example.com "bash /opt/${APP_NAME}/scripts/rollback.sh" && exit 1)
    - echo "Production deployment successful!"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  allow_failure: false

verify_production:
  stage: production
  image: curlimages/curl:latest
  dependencies: []
  needs:
    - deploy_production
  script:
    - echo "Verifying production deployment..."
    - curl -sf https://app.example.com/health
    - curl -sf https://app.example.com/api/version
    - echo "Production verification passed."
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual

# Utility job to create a downloadable release bundle for the team
create_release_bundle:
  stage: production
  image: alpine:latest
  dependencies:
    - build_binaries
    - build_frontend
    - build_docker_context
  script:
    - echo "Creating release bundle for team access..."
    - mkdir -p release_bundle
    - cp -r ${BUILD_DIR}/bin release_bundle/
    - cp -r ${BUILD_DIR}/configs release_bundle/
    - cp -r ${BUILD_DIR}/migrations release_bundle/
    - cp -r frontend_dist release_bundle/
    - cp -r deploy_scripts release_bundle/
    - cp ${BUILD_DIR}/VERSION release_bundle/
    - cp ${BUILD_DIR}/BUILD_INFO release_bundle/
    - |
      cat > release_bundle/README.md << EOF
      # Release Bundle - Pipeline ${CI_PIPELINE_ID}
      
      **Commit:** ${CI_COMMIT_SHA}
      **Branch:** ${CI_COMMIT_BRANCH}
      **Built at:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")
      **Built by:** ${GITLAB_USER_NAME}
      
      ## Contents
      - bin/ - Application binaries
      - configs/ - Configuration files
      - migrations/ - Database migration files
      - frontend_dist/ - Frontend static assets
      - deploy_scripts/ - Deployment automation scripts
      
      ## Usage
      1. Download this artifact bundle
      2. Run: bash deploy_scripts/deploy.sh
      3. Verify: bash deploy_scripts/health_check.sh
      EOF
  artifacts:
    name: "${APP_NAME}-release-${CI_COMMIT_SHORT_SHA}-${CI_PIPELINE_ID}"
    paths:
      - release_bundle/
    expire_in: 30 days
    when: on_success
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG