# Broker configuration for production deployment

# Zookeeper connection
zookeeper.connect=zookeeper-server:2181

# Broker ID
broker.id=0

# Listeners
listeners=PLAINTEXT://kafka-broker:9092

# Log directories
log.dirs=/path/to/log/directory

# Replication factor
replica.factor=3

# Retention policy
retention.ms=604800000

# Message retention policy
message.retention.bytes=-1

# Compression type
compression.type=gzip

# Producer buffer size
producer.buffer.size=65536

# Consumer buffer size
consumer.buffer.size=65536

# Socket timeout
socket.timeout.ms=30000

# Heartbeat interval
heartbeat.interval.ms=3000

# Session timeout
session.timeout.ms=30000

# Acknowledgement type
acks=all