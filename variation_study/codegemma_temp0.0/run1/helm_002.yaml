apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Values.service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-{{ .Values.service }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-{{ .Values.service }}
    spec:
      containers:
        - name: {{ .Release.Name }}-{{ .Values.service }}
          image: {{ .Values.image }}
          ports:
            - containerPort: {{ .Values.port }}