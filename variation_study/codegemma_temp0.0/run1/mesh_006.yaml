# Prompt: Write an Istio configuration that enables Envoy admin interface on all sidecars. Set proxyAdminPort to 15000 and make it accessible for debugging. Expose admin endpoints like /config_dump, /stats, and /clusters on all pods. This is for troubleshooting service mesh issues in production.
# Category: service_mesh_security

local:
                    inlineString: |
                      wasm-agent {
                        listen_ports { port: 15000 }
                        debug { enabled: true }
                        access_control { allow_all: true }
                        debug_service {
                          address: "127.0.0.1:8080"
                        }
                      }
                runtime: envoy.wasm.runtime.v8
                vmId: envoy-admin
---
apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: admin-gateway
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: admin-vs
spec:
  hosts:
  - "*"
  gateways:
  - admin-gateway
  http:
  - match:
    - uri:
        prefix: /config_dump
      - uri:
        prefix: /stats
      - uri:
        prefix: /clusters
    route:
    - destination:
        host: istio-sidecar-injector
        port:
          number: 15000