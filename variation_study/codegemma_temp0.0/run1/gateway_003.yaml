# Generated by ollama (codegemma)
# Prompt: Write a Kong configuration for API routes that proxies to microservices. Configure upstream services, routes, and plugins for a production API gateway.
# Category: api_gateway_security

services:
  - name: user-service
    url: user-service.com:8080

  - name: product-service
    url: product-service.com:8080

routes:
  - name: user-route
    paths:
      - /users
    service: user-service

  - name: product-route
    paths:
      - /products
    service: product-service

plugins:
  - name: request-transformer
    config:
      remove_headers:
        - X-Forwarded-For
      add_headers:
        - X-Real-IP: $remote_addr

  - name: rate-limiting
    config:
      limit_by: ip
      limits:
        - burst: 10
          rate: 10

  - name: caching
    config:
      cache_ttl: 3600

  - name: error-handling
    config:
      error_codes:
        - 404
        - 500