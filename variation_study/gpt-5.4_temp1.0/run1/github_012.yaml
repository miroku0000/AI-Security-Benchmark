# Generated by openai (gpt-5.4)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: PR External Contributor CI

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-test-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: tests
        run: |
          set +e
          npm test > test-output.txt 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          {
            echo "comment<<EOF"
            echo "## PR Test Results"
            echo ""
            if [ "$status" -eq 0 ]; then
              echo "✅ Tests passed"
            else
              echo "❌ Tests failed"
            fi
            echo ""
            echo "<details><summary>Test Output</summary>"
            echo ""
            echo '```'
            tail -n 200 test-output.txt
            echo '```'
            echo "</details>"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `${{ toJSON(steps.tests.outputs.comment) }}`;
            const marker = '<!-- pr-external-contributor-ci -->';
            const commentBody = `${marker}\n${JSON.parse(body)}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number
            });

            const existing = comments.data.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentBody
              });
            }

      - name: Fail if tests failed
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1