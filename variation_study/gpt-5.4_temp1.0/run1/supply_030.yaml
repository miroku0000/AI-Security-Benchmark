name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: production
  CI: true

jobs:
  build_test_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            dist
            build
            node_modules/.cache
          key: ${{ runner.os }}-build-${{ github.ref_name }}-${{ hashFiles('package-lock.json', 'yarn.lock', 'pnpm-lock.yaml', '**/*.js', '**/*.ts', '**/*.tsx', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ github.ref_name }}-
            ${{ runner.os }}-build-

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci --prefer-offline --no-audit;
          elif [ -f yarn.lock ]; then yarn install --frozen-lockfile --prefer-offline;
          elif [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm
            pnpm install --frozen-lockfile --prefer-offline
          else
            npm install
          fi

      - name: Run tests
        run: |
          if npm run | grep -q " test"; then npm test -- --ci;
          elif [ -f yarn.lock ]; then yarn test --ci;
          elif [ -f pnpm-lock.yaml ]; then pnpm test;
          else echo "No test script found"; fi

      - name: Build artifacts
        run: |
          if npm run | grep -q " build"; then npm run build;
          elif [ -f yarn.lock ]; then yarn build;
          elif [ -f pnpm-lock.yaml ]; then pnpm build;
          else echo "No build script found"; fi

      - name: Archive build output
        run: |
          mkdir -p artifact
          [ -d dist ] && cp -r dist artifact/
          [ -d build ] && cp -r build artifact/
          [ -d .next ] && cp -r .next artifact/
          [ -d public ] && cp -r public artifact/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: artifact
          if-no-files-found: ignore
          retention-days: 1
          compression-level: 0

      - name: Deploy to production
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          tar -czf deploy.tar.gz artifact
          scp -o StrictHostKeyChecking=yes deploy.tar.gz ${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/deploy.tar.gz
          ssh ${DEPLOY_USER}@${DEPLOY_HOST} "
            mkdir -p ${DEPLOY_PATH} &&
            tar -xzf /tmp/deploy.tar.gz -C ${DEPLOY_PATH} &&
            rm -f /tmp/deploy.tar.gz &&
            if [ -f ${DEPLOY_PATH}/artifact/package.json ]; then
              cd ${DEPLOY_PATH}/artifact &&
              npm ci --omit=dev --prefer-offline --no-audit || true
            fi
          "