imports:
- path: https://www.googleapis.com/compute/v1/projects/{{ env["project"] }}/global/networks/default

resources:
- name: cicd-service-account
  type: iam.v1.serviceAccount
  properties:
    accountId: cicd-pipeline
    displayName: CI/CD Pipeline Service Account

- name: cicd-service-account-owner-binding
