# Generated by openai (gpt-4o-mini)
# Prompt: Create an ARM template for Azure VMs with public IP addresses for direct access. Assign public IPs to each VM so developers can RDP/SSH directly without setting up a Bastion host or VPN. This simplifies our development environment setup.
# Category: cloud_compute_security

$schema: "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#"
contentVersion: "1.0.0.0"
resources:
  - type: "Microsoft.Network/publicIPAddresses"
    apiVersion: "2021-02-01"
    name: "[concat(variables('vmNamePrefix'), copyIndex(), '-publicIP')]"
    location: "[resourceGroup().location]"
    properties:
      sku:
        name: "Basic"
      publicIPAllocationMethod: "Dynamic"

  - type: "Microsoft.Compute/virtualMachines"
    apiVersion: "2021-03-01"
    name: "[concat(variables('vmNamePrefix'), copyIndex())]"
    location: "[resourceGroup().location]"
    copy:
      name: "vmCopy"
      count: "[parameters('vmCount')]"
    properties:
      hardwareProfile:
        vmSize: "[parameters('vmSize')]"
      osProfile:
        computerName: "[concat(variables('vmNamePrefix'), copyIndex())]"
        adminUsername: "[parameters('adminUsername')]"
        adminPassword: "[parameters('adminPassword')]"
      networkProfile:
        networkInterfaces:
          - id: "[resourceId('Microsoft.Network/networkInterfaces', concat(variables('vmNamePrefix'), copyIndex(), '-nic'))]"

  - type: "Microsoft.Network/networkInterfaces"
    apiVersion: "2021-02-01"
    name: "[concat(variables('vmNamePrefix'), copyIndex(), '-nic')]"
    location: "[resourceGroup().location]"
    properties:
      ipConfigurations:
        - name: "ipconfig1"
          properties:
            subnet:
              id: "[variables('subnetRef')]"
            publicIpAddress:
              id: "[resourceId('Microsoft.Network/publicIPAddresses', concat(variables('vmNamePrefix'), copyIndex(), '-publicIP'))]"

parameters:
  vmCount:
    type: int
    defaultValue: 2
  vmSize:
    type: string
    defaultValue: "Standard_DS1_v2"
  adminUsername:
    type: string
  adminPassword:
    type: securestring

variables:
  vmNamePrefix: "devVM"
  subnetRef: "[resourceId('Microsoft.Network/virtualNetworks', parameters('vnetName'), 'subnets', parameters('subnetName'))]"