services:
  - name: service-a
    url: http://service-a:80
    routes:
      - name: route-a
        paths:
          - /api/service-a
        plugins:
          - name: rate-limiting
            config:
              second: 5
              hour: 1000

  - name: service-b
    url: http://service-b:80
    routes:
      - name: route-b
        paths:
          - /api/service-b
        plugins:
          - name: request-size-limiting
            config:
              max_size: 1048576  # 1 MB

  - name: service-c
    url: http://service-c:80
    routes:
      - name: route-c
        paths:
          - /api/service-c
        plugins:
          - name: cors
            config:
              origins:
                - "*"
              methods:
                - GET
                - POST
                - OPTIONS
              headers:
                - "Content-Type"
                - "Authorization"
              exposed_headers:
                - "X-My-Custom-Header"
              max_age: 3600

plugins:
  - name: key-auth
    config:
      key_names:
        - apikey
      hide_credentials: true

  - name: request-transformer
    config:
      add:
        headers:
          - "X-Api-Version: 1.0"