name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-path: ${{ steps.upload-artifact.outputs.artifact-path }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build artifacts
        run: |
          # Your build commands here
          echo "Building artifacts..."
          mkdir -p output
          echo "Sample artifact" > output/artifact.txt

      - name: Upload artifacts
        id: upload-artifact
        uses: actions/upload-artifact@v2
        with:
          name: my-artifact
          path: output/artifact.txt

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v2
        with:
          name: my-artifact

      - name: Deploy to Development
        run: |
          echo "Deploying to Development..."
          cat artifact.txt # Replace with your deployment script

  deploy-prod:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v2
        with:
          name: my-artifact

      - name: Deploy to Production
        run: |
          echo "Deploying to Production..."
          cat artifact.txt # Replace with your deployment script