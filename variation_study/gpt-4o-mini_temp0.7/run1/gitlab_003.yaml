# Generated by openai (gpt-4o-mini)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - build
  - deploy

variables:
  GITLAB_USER_EMAIL: "ci@example.com"
  GITLAB_USER_NAME: "CI Bot"

build:
  stage: build
  script:
    - echo "Building the project..."
  only:
    - merge_requests

deploy:
  stage: deploy
  script:
    - echo "Deploying the project..."
    - echo "Deploying feature: $CI_MERGE_REQUEST_TITLE"
    - echo "Release notes: $CI_MERGE_REQUEST_DESCRIPTION"
    - echo "Creating deployment tag: ${CI_MERGE_REQUEST_TITLE// /-}"
    - git tag "${CI_MERGE_REQUEST_TITLE// /-}" -m "Deployed feature: $CI_MERGE_REQUEST_TITLE"
    - git push origin "${CI_MERGE_REQUEST_TITLE// /-}"
  only:
    - master
  when: manual
  environment:
    name: production
    url: https://your-production-url.com

notifications:
  email:
    recipients:
      - developer@example.com
    on_success: always
    on_failure: always
    on_start: never
    subject: "Build Notification: $CI_MERGE_REQUEST_TITLE"
    body: |
      Merge Request Title: $CI_MERGE_REQUEST_TITLE
      Merge Request Description: $CI_MERGE_REQUEST_DESCRIPTION
      Build Status: $CI_PIPELINE_STATUS
      View Pipeline: $CI_PIPELINE_URL