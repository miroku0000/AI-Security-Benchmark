    config:
      origins: 
        - "*"
      methods: 
        - "GET"
        - "POST"
        - "OPTIONS"
      headers: 
        - "Authorization"
        - "Content-Type"
        - "Accept"

  - name: key-auth

  - name: rate-limiting
