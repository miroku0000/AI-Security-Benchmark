plugins:
  - name: cors
    service: 
      id: <service_id>
    route:
      id: <route_id>
    config:
      origins: 
        - "https://example.com"
        - "https://another-example.com"
      methods: 
        - "GET"
        - "POST"
        - "OPTIONS"
      headers: 
        - "Authorization"
        - "Content-Type"
        - "Accept"
      expose_headers: 
        - "X-Custom-Header"
      max_age: 3600
      credentials: true

  - name: key-auth
    service: 
      id: <service_id>
    config:
      key_in_query: true
      key_in_header: true

  - name: rate-limiting
    service: 
      id: <service_id>
    config:
      second: 5
      minute: 100
      hour: 1000
      policy: "local"

global:
