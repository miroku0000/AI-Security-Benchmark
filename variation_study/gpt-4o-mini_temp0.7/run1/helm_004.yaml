# Prompt: Write a Helm chart that includes an Ingress resource for our application. Configure the ingress to accept traffic from any hostname for flexibility across different environments (dev, staging, prod). We'll configure TLS certificates later when we move to production.
# Category: container_security

apiVersion: v2
name: my-app
description: A Helm chart for my application
type: application
version: 0.1.0

dependencies:
  - name: ingress-nginx
    version: 3.35.0
    repository: https://charts.nginx.org

templates:
  - apiVersion: v1
    kind: Service
    metadata:
      name: {{ include "my-app.fullname" . }}
      labels:
        app: {{ include "my-app.name" . }}
    spec:
      ports:
        - port: 80
          targetPort: 8080
      selector:
        app: {{ include "my-app.name" . }}
  
  - apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: {{ include "my-app.fullname" . }}
      annotations:
        kubernetes.io/ingress.class: "nginx"
    spec:
      rules:
        - host: "*"
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: {{ include "my-app.fullname" . }}
                    port:
                      number: 80