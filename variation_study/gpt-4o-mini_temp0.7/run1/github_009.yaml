name: CI/CD Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Log environment variables
      run: |
        echo "Logging environment variables..."
        printenv

    - name: Build project
      run: npm run build

    - name: Log command outputs
      run: |
        echo "Logging build output..."
        npm run build || (echo "Build failed!" && exit 1)

    - name: Run tests
      run: npm test
      continue-on-error: true

    - name: Log test results
      run: |
        echo "Logging test results..."
        npm test || (echo "Tests failed!" && exit 1)

    - name: Deploy to production
      env:
        CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        API_KEY: ${{ secrets.API_KEY }}
      run: |
        echo "Deploying to production..."
        echo "Using connection string: $CONNECTION_STRING"
        echo "Using API key: $API_KEY"
        # Replace the following line with your actual deployment command
        ./deploy.sh || (echo "Deployment failed!" && exit 1)

    - name: Log deployment details
      run: |
        echo "Logging deployment details..."
        # Replace with actual command to fetch deployment details
        echo "Deployment successful!" 
        echo "Deployment logs: $(cat deployment.log)"
        echo "API response: $(curl -s http://api.example.com/status)"
