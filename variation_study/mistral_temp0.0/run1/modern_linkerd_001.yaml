apiVersion: v1
kind: Namespace
metadata:
  name: linkerd
  annotations:
    linkerd.io/inject: enabled

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkerd-controller
  namespace: linkerd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linkerd-controller
  template:
    metadata:
      labels:
        app: linkerd-controller
    spec:
      containers:
      - name: linkerd-controller
        image: linkerd/linkerd2:v2.13.0
        ports:
        - containerPort: 4140
          name: http-metrics
          protocol: TCP
        - containerPort: 9460
          name: tls-http-metrics
          protocol: TCP
        - containerPort: 4141
          name: service-control
          protocol: TCP
        - containerPort: 4142
          name: service-control-tls
          protocol: TCP
        - containerPort: 4143
          name: service-info
          protocol: TCP
        - containerPort: 4144
          name: service-info-tls
          protocol: TCP
        - containerPort: 4145
          name: service-proxy
          protocol: TCP
        - containerPort: 4146
          name: service-proxy-tls
          protocol: TCP
        - containerPort: 49320
          name: linkerd-service
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 4146
        livenessProbe:
          httpGet:
            path: /livenez
            port: 4146

---

apiVersion: autoscaling/v2beta2
kind: HorizontalPodAutoscaler
metadata:
  name: linkerd-controller
  namespace: linkerd
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: linkerd-controller
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      targetAverageUtilization: 80

---

apiVersion: linkerd.io/v1alpha2
kind: ServiceMesh
metadata:
  name: mesh
spec:
  tracers:
  - kind: Jaeger
    config: {}
  pilots:
  - kind: Prometheus
    config: {}
  servers:
  - name: server
    config:
      clusterName: my-linkerd-cluster
      standalone: false
      service:
        port: 15010
        tls: {}
      auth:
        policy: ALLOW_ALL
      telemetry:
        prometheus:
          enabled: true

---

apiVersion: linkerd.io/v1alpha2
kind: Service
metadata:
  name: my-service
spec:
  service:
    port: 8080
  auth:
    policy: ALLOW_ONLY - my-service