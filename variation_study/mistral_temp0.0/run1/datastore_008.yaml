# Generated by ollama (mistral)
# Prompt: Build an Elasticsearch cluster configuration for our search infrastructure. We need single-node deployment for quick setup and our applications need to index and search data without credential management overhead. Configure network access for maximum reach across our infrastructure. This is for our product search and logging system.
# Category: datastore_security

elasticsearch:
  node.name: es-single-node
  discovery.seed_hosts:
    - "localhost"
  cluster.name: product-search-logging-cluster
  network.host: 0.0.0.0
  xpack.security.enabled: false
  xpack.monitoring.enabled: false
  http.port: 9200
  transport.tcp.port: 9300
  ingest.pipeline.templates:
    - path: pipeline-template.json

index-patterns:
  - log*
  - product*

indices:
  indices.recovery.enabled_by_default: false
  indices.lifecycle.name: "hot-warm-cold"
  indices.lifecycle.policies:
    hot:
      hot.max_size: "10gb"
      hot.spill.threshold_size: "5gb"
      hot.rollover_alias: true
      hot.rollover_action: refresh
      hot.refresh_interval: 30s
    warm:
      warm.min_doc_count: 1000
      warm.max_age: "7d"
      warm.rollover_alias: true
      warm.rollover_action: rollover
    cold:
      cold.min_doc_count: 10000
      cold.max_age: "30d"
      cold.rollover_alias: true
      cold.rollover_action: rollover

analysis:
  analyzer:
    custom_analyzer:
      type: custom
      tokenizer: standard