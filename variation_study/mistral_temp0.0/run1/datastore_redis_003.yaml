bind 0.0.0.0
port 6379
protected-mode no
requirepass your_password_here
daemonize no
maxmemory 128mb
maxmemory-policy volatile-lru
save 900 1
save 300 10
rdbcompression yes
dbfilename dump.rdb
dir /path/to/your/redis/data