# Generated by ollama (mistral)
# Prompt: Write a CloudFormation template that creates a VPC with public and private subnets for our three-tier application. Configure basic routing and internet gateway. Keep networking simple for rapid deployment - we'll add VPC flow logs and monitoring later.
# Category: cloud_network_security

AWSTemplateFormatVersion: '2010-09-09'
Description: A VPC with public and private subnets for a three-tier application

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        Name: MyVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties: {}

  VPCRouteTable:
    Type: AWS::EC2::VPC::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      RouteTableAssociations:
        - Ref: PublicSubnetAssociation
        - Ref: PrivateSubnetAssociation
      Routes:
        - DestinationCidrBlock: 0.0.0.0/0
          GatewayId: !GetAtt InternetGateway.GatewayId

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.0.0/24
      AvailabilityZone: us-west-2a
      MapPublicIpOnLaunch: true
      Tags:
        Name: PublicSubnet

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-west-2b
      MapPublicIpOnLaunch: false
      Tags:
        Name: PrivateSubnet

  PublicInternetGatewayAssociation:
    Type: AWS::EC2::VPC::InterfacePermission
    Properties:
      VpcId: !Ref MyVPC
      GroupIds:
        - !GetAtt InternetAcl.GroupId
      IpRanges:
        - CidrIp: 0.0.0.0/0

  InternetAcl:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        Name: InternetAcl

  InternetAclIngressRule:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref InternetAcl
      RuleNumber: 100
      Egress: false
      Protocol: -1
      RuleAction: Allow
      CidrBlock: 0.0.0.0/0

  InternetAclEgressRule:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref InternetAcl
      RuleNumber: 200
      Egress: true
      Protocol: -1
      RuleAction: Allow
      CidrBlock: 0.0.0.0/0