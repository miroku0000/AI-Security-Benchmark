# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-stage Deployment Pipeline
on: [push, pull_request]

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 14
      - name: Install and build
        run: npm install && npm run build
        env:
          CI: true

  deploy:
    name: Deploy Artifacts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout artifacts from build job
        uses: actions/checkout@v2
        with:
          ref: ${{ needs.build.outputs.commitSHA }}
      - name: Use Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 14
      - name: Download built artifacts
        uses: actions/download-artifact@v2
        with:
          name: build
      - name: Execute deployment scripts
        run: |
          npm install
          npm run deploy