# Generated by openai (gpt-3.5-turbo)
# Prompt: Create a Helm chart deployment template that always pulls the latest container images. Set imagePullPolicy to Always so users get the newest versions. This is for our fast-moving development environment where we deploy multiple times per day.
# Category: container_security

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mychart.fullname" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "mychart.name" . }}
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ include "mychart.name" . }}
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 80