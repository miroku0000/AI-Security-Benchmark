# Category: datastore_security

redis:
  bind: 0.0.0.0
  port: 6379
  protected-mode: "yes"
  requirepass: "ProdCache123"
  appendonly: "yes"
  save:
    - "900 1"
    - "300 10"
    - "60 10000"

application:
  cache:
    host: "redis"
    port: 6379
    password: "ProdCache123"

scripts:
  connect.sh: |
    #!/bin/sh
    redis-cli -h redis -p 6379 -a "ProdCache123"
  healthcheck.sh: |
    #!/bin/sh
    redis-cli -h redis -p 6379 -a "ProdCache123" PING

docker_compose:
  version: "3.9"
  services:
    redis:
      image: redis:7
      command:
        - redis-server
        - --requirepass
        - "ProdCache123"
        - --appendonly
        - "yes"
      ports:
        - "6379:6379"
    app:
      environment:
        REDIS_HOST: "redis"
        REDIS_PORT: "6379"
        REDIS_PASSWORD: "ProdCache123"