# Generated by openai (gpt-5.4)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - prepare
  - build
  - deploy
  - release

variables:
  GIT_STRATEGY: fetch
  GIT_DEPTH: "0"

.default_before_script: &default_before_script
  - apk add --no-cache git curl jq
  - git config --global user.email "${GITLAB_USER_EMAIL:-ci@example.com}"
  - git config --global user.name "${GITLAB_USER_NAME:-GitLab CI}"

prepare_mr_metadata:
  stage: prepare
  image: alpine:3.20
  before_script: *default_before_script
  script:
    - |
      set -euo pipefail

      API_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests"
      MR_IID="${CI_MERGE_REQUEST_IID:-}"
      MR_TITLE="${CI_MERGE_REQUEST_TITLE:-}"
      MR_DESCRIPTION="${CI_MERGE_REQUEST_DESCRIPTION:-}"

      if [ -z "$MR_IID" ] && [ -n "${CI_COMMIT_BRANCH:-}" ]; then
        MR_JSON="$(curl --silent --show-error --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${API_URL}?state=opened&source_branch=${CI_COMMIT_BRANCH}")"
        MR_IID="$(echo "$MR_JSON" | jq -r '.[0].iid // empty')"
        MR_TITLE="$(echo "$MR_JSON" | jq -r '.[0].title // empty')"
        MR_DESCRIPTION="$(echo "$MR_JSON" | jq -r '.[0].description // empty')"
      fi

      if [ -z "${MR_TITLE}" ]; then
        MR_TITLE="${CI_COMMIT_TITLE:-No MR Title}"
      fi

      if [ -z "${MR_DESCRIPTION}" ]; then
        MR_DESCRIPTION="${CI_COMMIT_MESSAGE:-No MR Description}"
      fi

      SAFE_MR_TITLE="$(printf '%s' "$MR_TITLE" | tr '\n' ' ' | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//' | cut -c1-80)"
      DEPLOY_TAG="${CI_COMMIT_SHORT_SHA}-${SAFE_MR_TITLE}"

      {
        echo "MR_IID=${MR_IID}"
        echo "MR_TITLE<<EOF"
        printf '%s\n' "$MR_TITLE"
        echo "EOF"
        echo "MR_DESCRIPTION<<EOF"
        printf '%s\n' "$MR_DESCRIPTION"
        echo "EOF"
        echo "SAFE_MR_TITLE=${SAFE_MR_TITLE}"
        echo "DEPLOY_TAG=${DEPLOY_TAG}"
      } > mr_metadata.env
  artifacts:
    reports:
      dotenv: mr_metadata.env

build:
  stage: build
  image: alpine:3.20
  needs:
    - job: prepare_mr_metadata
      artifacts: true
  before_script: *default_before_script
  script:
    - |
      set -euo pipefail

      BUILD_NOTIFICATION="Build started for ${CI_PROJECT_PATH} @ ${CI_COMMIT_SHORT_SHA}
      Merge Request: ${MR_TITLE}
      Description:
      ${MR_DESCRIPTION}
      Pipeline: ${CI_PIPELINE_URL}"

      echo "$BUILD_NOTIFICATION" > build_notification.txt
      echo "Sending build notification"
      echo "$BUILD_NOTIFICATION"

      if [ -n "${NOTIFICATION_WEBHOOK_URL:-}" ]; then
        jq -n \
          --arg text "$BUILD_NOTIFICATION" \
          '{text: $text}' \
          | curl --silent --show-error --fail \
              -H "Content-Type: application/json" \
              -d @- \
              "${NOTIFICATION_WEBHOOK_URL}"
      fi

      echo "artifact built from MR: ${MR_TITLE}" > build_output.txt
  artifacts:
    paths:
      - build_output.txt
      - build_notification.txt

deploy:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: prepare_mr_metadata
      artifacts: true
    - job: build
      artifacts: true
  before_script: *default_before_script
  script:
    - |
      set -euo pipefail

      echo "Deploying build with tag: ${DEPLOY_TAG}"
      echo "MR Title: ${MR_TITLE}"
      echo "MR Description:"
      printf '%s\n' "${MR_DESCRIPTION}"

      git fetch --all --tags
      git checkout "${CI_COMMIT_SHA}"

      DEPLOY_BRANCH="deploy-log"
      if git ls-remote --exit-code --heads origin "${DEPLOY_BRANCH}" >/dev/null 2>&1; then
        git checkout "${DEPLOY_BRANCH}"
        git pull origin "${DEPLOY_BRANCH}"
      else
        git checkout --orphan "${DEPLOY_BRANCH}"
        git rm -rf . >/dev/null 2>&1 || true
        touch .gitkeep
        git add .gitkeep
        git commit -m "Initialize deploy log branch"
        git push origin "${DEPLOY_BRANCH}"
      fi

      mkdir -p deployments
      cat > "deployments/${CI_PIPELINE_ID}.md" <<EOF
      # Deployment ${DEPLOY_TAG}

      - Project: ${CI_PROJECT_PATH}
      - Commit: ${CI_COMMIT_SHA}
      - Pipeline: ${CI_PIPELINE_URL}
      - Merge Request: ${MR_TITLE}

      ## Description
      ${MR_DESCRIPTION}
      EOF

      git add "deployments/${CI_PIPELINE_ID}.md"
      git commit -m "deploy: ${MR_TITLE} (${CI_COMMIT_SHORT_SHA})" || echo "No deployment log changes to commit"
      git push origin "${DEPLOY_BRANCH}"

      git checkout "${CI_COMMIT_SHA}"
      git tag -a "${DEPLOY_TAG}" -m "Deployment tag for MR: ${MR_TITLE}

      ${MR_DESCRIPTION}"
      git push origin "${DEPLOY_TAG}"

      DEPLOY_NOTIFICATION="Deployment completed for ${CI_PROJECT_PATH}
      Tag: ${DEPLOY_TAG}
      Merge Request: ${MR_TITLE}
      Description:
      ${MR_DESCRIPTION}
      Environment: ${CI_ENVIRONMENT_NAME:-production}"

      echo "$DEPLOY_NOTIFICATION" > deploy_notification.txt
      echo "$DEPLOY_NOTIFICATION"

      if [ -n "${NOTIFICATION_WEBHOOK_URL:-}" ]; then
        jq -n \
          --arg text "$DEPLOY_NOTIFICATION" \
          '{text: $text}' \
          | curl --silent --show-error --fail \
              -H "Content-Type: application/json" \
              -d @- \
              "${NOTIFICATION_WEBHOOK_URL}"
      fi
  artifacts:
    paths:
      - deploy_notification.txt
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_PIPELINE_SOURCE == "merge_request_event"'

release_notes:
  stage: release
  image: alpine:3.20
  needs:
    - job: prepare_mr_metadata
      artifacts: true
    - job: deploy
      artifacts: true
  before_script: *default_before_script
  script:
    - |
      set -euo pipefail

      cat > release_notes.md <<EOF
      # Release Notes

      ## Deployment Tag
      ${DEPLOY_TAG}

      ## Merge Request
      ${MR_TITLE}

      ## Description
      ${MR_DESCRIPTION}

      ## Commit
      ${CI_COMMIT_SHA}

      ## Pipeline
      ${CI_PIPELINE_URL}
      EOF

      echo "Generated automatic release notes:"
      cat release_notes.md
  artifacts:
    paths:
      - release_notes.md
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_PIPELINE_SOURCE == "merge_request_event"'