# Generated by openai (gpt-5.4)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

imports:
- path: templates/network.jinja
- path: templates/compute.jinja
- path: templates/sql.jinja
- path: templates/storage.jinja
- path: templates/loadbalancer.jinja

resources:
- name: app-network
  type: templates/network.jinja
  properties:
    networkName: app-network
    subnetworkName: app-subnet
    region: us-central1
    ipCidrRange: 10.10.0.0/24
    sourceRanges:
    - 0.0.0.0/0
    allowedTcpPorts:
    - "22"
    - "80"
    - "443"
    - "8080"

- name: app-storage
  type: templates/storage.jinja
  properties:
    bucketName: $(project)-app-storage
    location: US
    storageClass: STANDARD
    versioning: true

- name: app-sql
  type: templates/sql.jinja
  properties:
    instanceName: app-sql
    region: us-central1
    databaseVersion: POSTGRES_14
    tier: db-custom-1-3840
    diskSizeGb: 20
    diskType: PD_SSD
    databaseName: appdb
    userName: appuser
    userPassword: changeme-secure-password

- name: app-compute
  type: templates/compute.jinja
  properties:
    instanceTemplateName: app-template
    instanceGroupManagerName: app-igm
    autoscalerName: app-autoscaler
    baseInstanceName: app
    region: us-central1
    zone: us-central1-a
    machineType: e2-medium
    sourceImage: projects/debian-cloud/global/images/family/debian-12
    network: $(ref.app-network.networkSelfLink)
    subnetwork: $(ref.app-network.subnetworkSelfLink)
    serviceAccountEmail: default
    tags:
    - http-server
    - https-server
    startupScript: |
      #!/bin/bash
      apt-get update
      apt-get install -y nginx
      cat > /var/www/html/index.html <<'EOF'
      <html><body><h1>GCP MVP App</h1></body></html>
      EOF
      systemctl restart nginx
    targetSize: 2
    minReplicas: 2
    maxReplicas: 5
    cpuUtilizationTarget: 0.6

- name: app-loadbalancer
  type: templates/loadbalancer.jinja
  properties:
    region: us-central1
    backendPort: 80
    instanceGroup: $(ref.app-compute.instanceGroupSelfLink)
    network: $(ref.app-network.networkSelfLink)

outputs:
- name: networkSelfLink
  value: $(ref.app-network.networkSelfLink)
- name: subnetworkSelfLink
  value: $(ref.app-network.subnetworkSelfLink)
- name: bucketName
  value: $(ref.app-storage.bucketName)
- name: sqlConnectionName
  value: $(ref.app-sql.connectionName)
- name: sqlPrivateIp
  value: $(ref.app-sql.privateIp)
- name: loadBalancerIp
  value: $(ref.app-loadbalancer.ipAddress)

---
resources:
- name: {{ properties["networkName"] }}
  type: compute.v1.network
  properties:
    autoCreateSubnetworks: false

- name: {{ properties["subnetworkName"] }}
  type: compute.v1.subnetwork
  properties:
    region: {{ properties["region"] }}
    network: $(ref.{{ properties["networkName"] }}.selfLink)
    ipCidrRange: {{ properties["ipCidrRange"] }}

- name: {{ properties["networkName"] }}-firewall-allow-app
  type: compute.v1.firewall
  properties:
    network: $(ref.{{ properties["networkName"] }}.selfLink)
    sourceRanges: {{ properties["sourceRanges"] }}
    allowed:
    - IPProtocol: tcp
      ports: {{ properties["allowedTcpPorts"] }}
    targetTags:
    - http-server
    - https-server

outputs:
- name: networkSelfLink
  value: $(ref.{{ properties["networkName"] }}.selfLink)
- name: subnetworkSelfLink
  value: $(ref.{{ properties["subnetworkName"] }}.selfLink)

---
resources:
- name: {{ properties["bucketName"] }}
  type: storage.v1.bucket
  properties:
    name: {{ properties["bucketName"] }}
    location: {{ properties["location"] }}
    storageClass: {{ properties["storageClass"] }}
    versioning:
      enabled: {{ properties["versioning"] }}

outputs:
- name: bucketName
  value: {{ properties["bucketName"] }}

---
resources:
- name: {{ properties["instanceName"] }}
  type: sqladmin.v1beta4.instance
  properties:
    region: {{ properties["region"] }}
    databaseVersion: {{ properties["databaseVersion"] }}
    settings:
      tier: {{ properties["tier"] }}
      dataDiskSizeGb: {{ properties["diskSizeGb"] }}
      dataDiskType: {{ properties["diskType"] }}
      ipConfiguration:
        ipv4Enabled: true
    rootPassword: {{ properties["userPassword"] }}

- name: {{ properties["instanceName"] }}-db
  type: sqladmin.v1beta4.database
  properties:
    name: {{ properties["databaseName"] }}
    instance: $(ref.{{ properties["instanceName"] }}.name)

- name: {{ properties["instanceName"] }}-user
  type: sqladmin.v1beta4.user
  properties:
    name: {{ properties["userName"] }}
    instance: $(ref.{{ properties["instanceName"] }}.name)
    password: {{ properties["userPassword"] }}

outputs:
- name: connectionName
  value: $(ref.{{ properties["instanceName"] }}.connectionName)
- name: privateIp
  value: $(ref.{{ properties["instanceName"] }}.ipAddresses[0].ipAddress)

---
resources:
- name: {{ properties["instanceTemplateName"] }}
  type: compute.v1.instanceTemplate
  properties:
    properties:
      machineType: {{ properties["machineType"] }}
      tags:
        items: {{ properties["tags"] }}
      disks:
      - deviceName: boot
        type: PERSISTENT
        boot: true
        autoDelete: true
        initializeParams:
          sourceImage: {{ properties["sourceImage"] }}
      networkInterfaces:
      - network: {{ properties["network"] }}
        subnetwork: {{ properties["subnetwork"] }}
        accessConfigs:
        - name: External NAT
          type: ONE_TO_ONE_NAT
      serviceAccounts:
      - email: {{ properties["serviceAccountEmail"] }}
        scopes:
        - https://www.googleapis.com/auth/cloud-platform
      metadata:
        items:
        - key: startup-script
          value: |
{{ properties["startupScript"]|indent(12, true) }}

- name: {{ properties["instanceGroupManagerName"] }}
  type: compute.v1.instanceGroupManager
  properties:
    zone: {{ properties["zone"] }}
    baseInstanceName: {{ properties["baseInstanceName"] }}
    instanceTemplate: $(ref.{{ properties["instanceTemplateName"] }}.selfLink)
    targetSize: {{ properties["targetSize"] }}

- name: {{ properties["autoscalerName"] }}
  type: compute.v1.autoscaler
  properties:
    zone: {{ properties["zone"] }}
    target: $(ref.{{ properties["instanceGroupManagerName"] }}.selfLink)
    autoscalingPolicy:
      minNumReplicas: {{ properties["minReplicas"] }}
      maxNumReplicas: {{ properties["maxReplicas"] }}
      cpuUtilization:
        utilizationTarget: {{ properties["cpuUtilizationTarget"] }}

outputs:
- name: instanceGroupSelfLink
  value: $(ref.{{ properties["instanceGroupManagerName"] }}.instanceGroup)

---
resources:
- name: app-health-check
  type: compute.v1.httpHealthCheck
  properties:
    port: {{ properties["backendPort"] }}
    requestPath: /

- name: app-backend-service
  type: compute.v1.backendService
  properties:
    loadBalancingScheme: EXTERNAL
    protocol: HTTP
    port: {{ properties["backendPort"] }}
    healthChecks:
    - $(ref.app-health-check.selfLink)
    backends:
    - group: {{ properties["instanceGroup"] }}

- name: app-url-map
  type: compute.v1.urlMap
  properties:
    defaultService: $(ref.app-backend-service.selfLink)

- name: app-http-proxy
  type: compute.v1.targetHttpProxy
  properties:
    urlMap: $(ref.app-url-map.selfLink)

- name: app-forwarding-rule
  type: compute.v1.globalForwardingRule
  properties:
    loadBalancingScheme: EXTERNAL
    target: $(ref.app-http-proxy.selfLink)
    portRange: 80

- name: app-lb-ip
  type: compute.v1.globalAddress

outputs:
- name: ipAddress
  value: $(ref.app-forwarding-rule.IPAddress)