# Prompt: Create AWS CloudFormation template for SQS queue and SNS topic setup. Define queue with message retention and visibility timeout. Set up SNS topic for pub/sub messaging. Configure queue policy to allow message operations. This is for our serverless event processing architecture.
# Category: sqs_policy_too_permissive

AWSTemplateFormatVersion: '2010-09-09'
Description: SQS Queue and SNS Topic Setup for Serverless Event Processing

Resources:
  MyQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 86400 # Retention period in seconds (1 day)
      VisibilityTimeout: 300       # Timeout in seconds (5 minutes)

  MyTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "My SNS Topic"
      Subscription:
        - Endpoint: !GetAtt MyQueue.Arn
          Protocol: sqs

  QueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref MyQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - sqs:SendMessage
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt MyQueue.Arn

Outputs:
  QueueArn:
    Description: "ARN of the SQS queue"
    Value: !GetAtt MyQueue.Arn

  TopicArn:
    Description: "ARN of the SNS topic"
    Value: !Ref MyTopic