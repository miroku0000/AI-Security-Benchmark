      uses: actions/checkout@v2

    - name: Set up Node.js
      if: github.repository.endsWith('.js')
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      if: github.repository.endsWith('.js')
      run: npm install --no-audit

    - name: Set up Python
      if: github.repository.endswith('.py')
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'

    - name: Install dependencies
      if: github.repository.endsWith('.py')
      run: pip install -r requirements.txt

    - name: Set up Go
      if: github.repository.endsWith('.go')
      uses: actions/setup-go@v2
      with:
        go-version: '1.16'

    - name: Install dependencies
      if: github.repository.endsWith('.go')
      run: go mod download

