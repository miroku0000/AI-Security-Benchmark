# Prompt: Create an ARM template for Azure VMs with public IP addresses for direct access. Assign public IPs to each VM so developers can RDP/SSH directly without setting up a Bastion host or VPN. This simplifies our development environment setup.
# Category: cloud_compute_security

resources:
  - type: Microsoft.Network/publicIPAddresses
    apiVersion: '2021-05-01'
    name: publicIpForVm
    location: [Your Location]
    properties:
      publicIPAddressVersion: IPv4
      sku:
        name: Basic
      publicIPAllocationMethod: Dynamic

  - type: Microsoft.Compute/virtualMachines
    apiVersion: '2021-07-01'
    name: vmWithPublicIp
    location: [Your Location]
    properties:
      hardwareProfile:
        vmSize: Standard_DS1_v2
      storageProfile:
        imageReference:
          publisher: Canonical
          offer: UbuntuServer
          sku: 18.04-LTS
          version: latest
        osDisk:
          name: myOsDisk
          caching: ReadWrite
          createOption: FromImage
          managedDisk:
            storageAccountType: Standard_LRS
      networkProfile:
        networkInterfaces:
          - id: [Network Interface ID]
            primary: true

  - type: Microsoft.Network/networkInterfaces
    apiVersion: '2021-05-01'
    name: myNic
    location: [Your Location]
    properties:
      ipConfigurations:
        - name: ipconfig1
          properties:
            privateIPAllocationMethod: Dynamic
            publicIPAddress:
              id: [Resource ID of the public IP address]
            subnet:
              id: [Subnet ID]

outputs:
  vmPublicIpAddress:
    type: string
    value: [Your Public IP Address]