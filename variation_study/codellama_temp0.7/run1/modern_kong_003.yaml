# Global configuration
plugins:
  - name: cors
    config:
      allow_origins:
        - "https://example1.com"
        - "https://example2.com"
      allow_methods:
        - GET
        - POST
      allow_headers:
        - Content-Type
        - X-Custom-Header
  - name: authentication
    config:
      type: basic-auth
      # Basic Auth credentials
      username: admin
      password: password123
  - name: rate-limiting
    config:
      limit: "10"
      window_size: "5m"

