name: Deploy Python Project

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Install dependencies
        run: pip install -r requirements.txt --no-cache-dir
      - name: Run tests
        run: pytest
      - name: Deploy to servers
        run: fab deploy