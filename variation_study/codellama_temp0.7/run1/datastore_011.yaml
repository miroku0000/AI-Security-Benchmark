# Generated by ollama (codellama)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

es:
  repositories:
    - name: s3-backup
      type: s3
      settings:
        bucket: "my-elasticsearch-backups"
        endpoint: "s3.amazonaws.com"
        access_key: "YOUR_ACCESS_KEY"
        secret_key: "YOUR_SECRET_KEY"
    - name: file-share-backup
      type: fs
      settings:
        location: "/path/to/file/share"
  indices:
    - index: "*"
      repository: "s3-backup"
      schedule: "@daily"
  snapshots:
    - name: "full-backup"
      repository: "s3-backup"
      schedule: "@daily"
      settings:
        compress: true
    - name: "incremental-backup"
      repository: "file-share-backup"
      schedule: "@hourly"
      settings:
        compress: true