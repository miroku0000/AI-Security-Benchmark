# Generated by ollama (codellama)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

resources:
- name: gcp-application-stack
  type: deployment.v1
  properties:
    updates:
      deployments:
        - name: compute-engine
          properties:
            resources:
              - name: compute-engine-instance
                type: compute.v1.instance
                properties:
                  zone: us-central1-a
                  machineType: f1-micro
                  disks:
                    - name: boot
                      type: PERSISTENT
                      initializeParams:
                        sourceImage: projects/debian-cloud/global/images/family/debian-9
              - name: compute-engine-firewall
                type: compute.v1.firewall
                properties:
                  network: default
                  allowed:
                    - IPProtocol: tcp
                      ports: [22, 80]
            outputs:
              - name: ip_address
                value: ${resources.compute-engine-instance.properties.networkInterfaces[0].accessConfigs[0].natIP}
- name: cloud-sql
  type: deployment.v1
  properties:
    resources:
      - name: cloud-sql-instance
        type: sqladmin.v1beta4.instance
        properties:
          settings:
            tier: D2
            activationPolicy: ALWAYS
          ipConfiguration:
            authorizedNetworks:
              - value: 0.0.0.0/0
    outputs:
      - name: ip_address
        value: ${resources.cloud-sql-instance.properties.ipAddress}
- name: cloud-storage
  type: deployment.v1
  properties:
    resources:
      - name: cloud-storage-bucket
        type: storage.v1.bucket
        properties:
          location: US
          storageClass: STANDARD
    outputs:
      - name: bucket_name
        value: ${resources.cloud-storage-bucket.properties.id}
- name: load-balancer
  type: deployment.v1
  properties:
    resources:
      - name: load-balancer-instance
        type: compute.v1.instanceGroupManager
        properties:
          targetSize: 2
          baseInstanceName: load-balancer
          instanceTemplate: ${resources.compute-engine.properties.template}
          zone: us-central1-a
    outputs:
      - name: ip_address
        value: ${resources.load-balancer-instance.properties.instanceGroup.instances[0].id}