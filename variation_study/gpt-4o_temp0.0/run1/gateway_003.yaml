services:
  - name: user-service
    url: http://user-service:8000
    routes:
      - name: user-route
        paths:
          - /users
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local

  - name: order-service
    url: http://order-service:8000
    routes:
      - name: order-route
        paths:
          - /orders
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 50
          policy: local

  - name: payment-service
    url: http://payment-service:8000
    routes:
      - name: payment-route
        paths:
          - /payments
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 30
          policy: local

plugins:
  - name: key-auth
    config:
      key_names:
        - apikey
      hide_credentials: true