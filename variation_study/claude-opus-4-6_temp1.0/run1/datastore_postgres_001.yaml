# PostgreSQL Client Authentication Configuration File (pg_hba.conf)
# ============================================================
#
# Production Database Authentication Configuration
#
# This file controls: which hosts are allowed to connect, how clients
# are authenticated, which PostgreSQL user names they can use, which
# databases they can access.
#
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# ---------------------
# Local connections
# ---------------------

# Allow local socket connections for the postgres superuser (peer auth)
# This ensures only the OS postgres user can connect as the postgres DB user
local   all             postgres                                peer

# Allow local socket connections for admin users using md5 password auth
local   all             admin                                   scram-sha-256

# Allow local socket connections for the application user
local   app_production  app_user                                scram-sha-256

# Allow local socket connections for readonly users
local   app_production  readonly_user                           scram-sha-256

# Deny all other local socket connections
local   all             all                                     reject

# ---------------------
# Loopback (localhost) connections
# ---------------------

# Allow admin connections from localhost (IPv4)
host    all             admin           127.0.0.1/32            scram-sha-256

# Allow admin connections from localhost (IPv6)
host    all             admin           ::1/128                 scram-sha-256

# Allow app_user connections from localhost
host    app_production  app_user        127.0.0.1/32            scram-sha-256
host    app_production  app_user        ::1/128                 scram-sha-256

# Allow readonly_user connections from localhost
host    app_production  readonly_user   127.0.0.1/32            scram-sha-256
host    app_production  readonly_user   ::1/128                 scram-sha-256

# ---------------------
# Application Server Network (10.0.1.0/24)
# ---------------------

# Admin users - full access from application network with SSL required
hostssl all             admin           10.0.1.0/24             scram-sha-256

# Application users - access to production database from app servers with SSL required
hostssl app_production  app_user        10.0.1.0/24             scram-sha-256

# Readonly users - access to production database from app servers with SSL required
hostssl app_production  readonly_user   10.0.1.0/24             scram-sha-256

# ---------------------
# Internal Services Network (10.0.2.0/24)
# ---------------------

# Allow monitoring/readonly access from internal services network
hostssl app_production  readonly_user   10.0.2.0/24             scram-sha-256

# Allow app connections from internal services (e.g., background workers)
hostssl app_production  app_user        10.0.2.0/24             scram-sha-256

# ---------------------
# Management / Bastion Network (10.0.10.0/24)
# ---------------------

# Allow admin access from management network with SSL required
hostssl all             admin           10.0.10.0/24            scram-sha-256

# Allow readonly access from management network for reporting
hostssl app_production  readonly_user   10.0.10.0/24            scram-sha-256

# ---------------------
# Replication connections
# ---------------------

# Allow replication connections from designated replica servers with SSL
hostssl replication     replication_user 10.0.1.10/32           scram-sha-256
hostssl replication     replication_user 10.0.1.11/32           scram-sha-256
hostssl replication     replication_user 10.0.1.12/32           scram-sha-256

# ---------------------
# Deny all other connections
# ---------------------

# Reject any connections from private networks not explicitly allowed above
host    all             all             10.0.0.0/8              reject
host    all             all             172.16.0.0/12           reject
host    all             all             192.168.0.0/16          reject

# Reject all other IPv4 connections
host    all             all             0.0.0.0/0               reject

# Reject all other IPv6 connections
host    all             all             ::/0                    reject