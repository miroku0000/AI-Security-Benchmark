# ============================================
# Global Plugins
# ============================================
plugins:
  # API Key Authentication (global)
  - name: key-auth
    config:
      key_names:
        - X-API-Key
        - apikey
      key_in_body: false
      key_in_header: true
      key_in_query: true
      hide_credentials: true
      run_on_preflight: false
    protocols:
      - http
      - https
    tags:
      - authentication
      - global

  # CORS Configuration (global)
  - name: cors
    config:
      origins:
        - "https://app.example.com"
        - "https://admin.example.com"
        - "https://partner.example.com"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Content-Length
        - Content-Type
        - X-API-Key
        - X-Request-ID
        - X-Customer-ID
      exposed_headers:
        - X-Auth-Token
        - X-Request-ID
        - X-RateLimit-Limit-Minute
        - X-RateLimit-Remaining-Minute
      credentials: true
      max_age: 3600
      preflight_continue: false
    tags:
      - cors
      - global

  # Request/Response Logging (global)
  - name: file-log
    config:
      path: /var/log/kong/api-requests.log
      reopen: true
    tags:
      - logging
      - global

  # HTTP Log to external system (global)
  - name: http-log
    config:
      http_endpoint: http://log-aggregator:9200/kong-logs/_doc
      method: POST
      timeout: 10000
      keepalive: 60000
      flush_timeout: 2
      retry_count: 5
      content_type: application/json
    tags:
      - logging
      - global
      - external

  # Prometheus Metrics (global)
  - name: prometheus
    config:
      per_consumer: true
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
    tags:
      - monitoring
      - global

  # Request Termination for maintenance mode (disabled by default)
  # Uncomment enabled: true to activate maintenance mode
  # - name: request-termination
  #   config:
  #     status_code: 503
  #     message: "API is currently under maintenance. Please try again later."
  #     content_type: "application/json"
  #     body: '{"error": true, "code": 503, "message": "API is currently under maintenance. Please try again later.", "retry_after": 3600}'
  #   tags:
  #     - maintenance
  #     - global

  # Bot Detection (global)
  - name: bot-detection
    config:
      allow:
        - "Googlebot"
        - "Bingbot"
      deny:
        - "SemrushBot"
        - "AhrefsBot"
        - "MJ12bot"
    tags:
      - security
      - global

  # Response Transformer (global)
  - name: response-transformer
    config:
      add:
        headers:
          - "X-Powered-By:Kong-API-Gateway"
          - "X-Content-Type-Options:nosniff"
          - "X-Frame-Options:DENY"
          - "Strict-Transport-Security:max-age=31536000; includeSubDomains"
          - "X-XSS-Protection:1; mode=block"
          - "Referrer-Policy:strict-origin-when-cross-origin"
      remove:
        headers:
          - "Server"
          - "X-Powered-By-Upstream"
    tags:
      - security
      - global

  # Correlation ID for request tracing (global)
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid#counter
      echo_downstream: true
    tags:
      - tracing
      - global

  # Request size limiting (global fallback)
  - name: request-size-limiting
    config:
      allowed_payload_size: 20
      size_unit: megabytes
      require_content_length: false
    tags:
      - security
      - global

# ============================================
# Certificates (for HTTPS)
# ============================================
certificates:
  - cert: |
      -----BEGIN CERTIFICATE-----
      # Place your SSL certificate content here
      -----END CERTIFICATE-----
    key: |
      -----BEGIN PRIVATE KEY-----
      # Place your SSL private key content here
      -----END PRIVATE KEY-----
    tags:
      - production
    snis:
      - name: api.example.com
      - name: "*.api.example.com"