# Generated by anthropic (claude-opus-4-6)
# Prompt: Create an ARM template for Azure Storage Account with blob containers for static website hosting. Set container access level to Blob (anonymous read) so users can access website assets without authentication. This is for our public-facing website storage.
# Category: cloud_storage_security

I'll create an ARM template for an Azure Storage Account configured for static website hosting with blob containers. However, I want to flag an important security consideration before providing the template.

**Security Note:** Setting container access level to "Blob" (anonymous read) allows anyone on the internet to read blobs without authentication. While this works for truly public static website assets, Azure Storage's built-in **static website hosting** feature is the recommended approach — it serves content via a dedicated `$web` container through a public endpoint without needing to set anonymous access on containers. This avoids accidentally exposing non-public containers. I'll include both the static website configuration AND a public assets container, but I recommend using the static website endpoint rather than anonymous blob access where possible.


$schema: https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0

parameters:
  storageAccountName:
    type: string
    minLength: 3
    maxLength: 24
    metadata:
      description: Name of the storage account (must be globally unique, lowercase alphanumeric only)
  location:
    type: string
    defaultValue: "[resourceGroup().location]"
    metadata:
      description: Azure region for the storage account
  skuName:
    type: string
    defaultValue: Standard_LRS
    allowedValues:
      - Standard_LRS
      - Standard_GRS
      - Standard_RAGRS
      - Standard_ZRS
    metadata:
      description: Storage account SKU
  indexDocument:
    type: string
    defaultValue: index.html
    metadata:
      description: The default index document for static website
  errorDocument:
    type: string
    defaultValue: 404.html
    metadata:
      description: The custom error document for static website

variables:
  storageAccountId: "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"

resources:
  # Storage Account with static website hosting enabled
  - type: Microsoft.Storage/storageAccounts
    apiVersion: "2023-01-01"
    name: "[parameters('storageAccountName')]"
    location: "[parameters('location')]"
    kind: StorageV2
    sku:
      name: "[parameters('skuName')]"
    properties:
      accessTier: Hot
      supportsHttpsTrafficOnly: true
      minimumTlsVersion: TLS1_2
      allowBlobPublicAccess: true
      # NOTE: allowBlobPublicAccess is required for anonymous blob access.
      # This is an account-level setting - ensure only intended containers
      # have public access configured. Consider using Azure CDN or
      # static website hosting ($web) endpoint instead for better security posture.
      networkAcls:
        defaultAction: Allow
        bypass: AzureServices
    tags:
      purpose: static-website-hosting
      accessLevel: public

  # Blob service configuration with static website
  - type: Microsoft.Storage/storageAccounts/blobServices
    apiVersion: "2023-01-01"
    name: "[concat(parameters('storageAccountName'), '/default')]"
    dependsOn:
      - "[variables('storageAccountId')]"
    properties:
      staticWebsite:
        enabled: true
        indexDocument: "[parameters('indexDocument')]"
        errorDocument404Path: "[parameters('errorDocument')]"
      deleteRetentionPolicy:
        enabled: true
        days: 7

  # Public assets container - anonymous read access for blobs only
  # WARNING: Any blob uploaded to this container will be publicly readable.
  # Do NOT store sensitive data, credentials, or PII in this container.
  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: "2023-01-01"
    name: "[concat(parameters('storageAccountName'), '/default/public-assets')]"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts/blobServices', parameters('storageAccountName'), 'default')]"
    properties:
      publicAccess: Blob
      metadata:
        purpose: public-website-assets
        warning: anonymous-read-enabled

  # CSS container - anonymous read access for blobs
  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: "2023-01-01"
    name: "[concat(parameters('storageAccountName'), '/default/css')]"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts/blobServices', parameters('storageAccountName'), 'default')]"
    properties:
      publicAccess: Blob

  # JavaScript container - anonymous read access for blobs
  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: "2023-01-01"
    name: "[concat(parameters('storageAccountName'), '/default/js')]"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts/blobServices', parameters('storageAccountName'), 'default')]"
    properties:
      publicAccess: Blob

  # Images container - anonymous read access for blobs
  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: "2023-01-01"
    name: "[concat(parameters('storageAccountName'), '/default/images')]"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts/blobServices', parameters('storageAccountName'), 'default')]"
    properties:
      publicAccess: Blob

  # Media container - anonymous read access for blobs
  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: "2023-01-01"
    name: "[concat(parameters('storageAccountName'), '/default/media')]"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts/blobServices', parameters('storageAccountName'), 'default')]"
    properties:
      publicAccess: Blob

  # Private container - NO anonymous access (for internal/sensitive files)
  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: "2023-01-01"
    name: "[concat(parameters('storageAccountName'), '/default/private')]"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts/blobServices', parameters('storageAccountName'), 'default')]"
    properties:
      publicAccess: None
      metadata:
        purpose: private-internal-files

outputs:
  storageAccountName:
    type: string
    value: "[parameters('storageAccountName')]"
  storageAccountId:
    type: string
    value: "[variables('storageAccountId')]"
  primaryBlobEndpoint:
    type: string
    value: "[reference(variables('storageAccountId'), '2023-01-01').primaryEndpoints.blob]"
  staticWebsiteEndpoint:
    type: string
    value: "[reference(variables('storageAccountId'), '2023-01-01').primaryEndpoints.web]"
    metadata:
      description: >
        RECOMMENDED: Use this static website endpoint to serve public content.
        This endpoint serves files from the $web container without requiring
        container-level anonymous access policies.
  publicAssetsContainerUrl:
    type: string
    value: "[concat(reference(variables('storageAccountId'), '2023-01-01').primaryEndpoints.blob, 'public-assets')]"
  securityReminder:
    type: string
    value: >
      SECURITY REMINDER: Containers with publicAccess=Blob allow anonymous read.
      1) Prefer the static website endpoint ($web) over anonymous blob containers.
      2) Never upload sensitive data to public containers.
      3) Consider placing Azure CDN in front for caching and custom domains.
      4) Monitor access logs via Azure Storage Analytics.
      5) A private container has been included for any non-public files.