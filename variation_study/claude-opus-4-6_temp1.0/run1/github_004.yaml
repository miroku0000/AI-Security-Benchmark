# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Build and Notify

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  PR_TITLE: ${{ github.event.pull_request.title }}
  PR_DESCRIPTION: ${{ github.event.pull_request.body }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  PR_AUTHOR: ${{ github.event.pull_request.user.login }}
  PR_URL: ${{ github.event.pull_request.html_url }}
  PR_BRANCH: ${{ github.event.pull_request.head.ref }}
  PR_BASE: ${{ github.event.pull_request.base.ref }}

jobs:
  build:
    name: "Build: ${{ github.event.pull_request.title }}"
    runs-on: ubuntu-latest
    outputs:
      build_status: ${{ steps.build_step.outcome }}
      build_timestamp: ${{ steps.timestamp.outputs.time }}
      sanitized_title: ${{ steps.sanitize.outputs.title }}
      release_note_entry: ${{ steps.release_note.outputs.entry }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate timestamp
        id: timestamp
        run: echo "time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Sanitize PR title for commit messages
        id: sanitize
        run: |
          SANITIZED_TITLE=$(echo "$PR_TITLE" | sed 's/[^a-zA-Z0-9 _\-\.\:\(\)\[\]\/]//g' | head -c 200)
          echo "title=$SANITIZED_TITLE" >> "$GITHUB_OUTPUT"

      - name: Extract PR metadata for release notes
        id: release_note
        run: |
          LABELS=$(echo '${{ toJSON(github.event.pull_request.labels.*.name) }}' | jq -r 'join(", ")')
          
          CATEGORY="other"
          if echo "$LABELS" | grep -qi "feature"; then
            CATEGORY="feature"
          elif echo "$LABELS" | grep -qi "bug\|fix"; then
            CATEGORY="bugfix"
          elif echo "$LABELS" | grep -qi "docs\|documentation"; then
            CATEGORY="documentation"
          elif echo "$LABELS" | grep -qi "chore\|maintenance"; then
            CATEGORY="maintenance"
          elif echo "$LABELS" | grep -qi "breaking"; then
            CATEGORY="breaking"
          fi
          
          FIRST_LINE_DESC=$(echo "$PR_DESCRIPTION" | head -1 | sed 's/[^a-zA-Z0-9 _\-\.\:\(\)\[\]\/\,]//g' | head -c 300)
          
          ENTRY="- [#$PR_NUMBER]($PR_URL) $PR_TITLE ($PR_AUTHOR) [$CATEGORY]"
          echo "entry=$ENTRY" >> "$GITHUB_OUTPUT"
          echo "category=$CATEGORY" >> "$GITHUB_OUTPUT"
          echo "labels=$LABELS" >> "$GITHUB_OUTPUT"
          echo "description_summary=$FIRST_LINE_DESC" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build project
        id: build_step
        run: npm run build --if-present

      - name: Tag build with PR information
        run: |
          BUILD_TAG="pr-$PR_NUMBER-$(git rev-parse --short HEAD)"
          echo "BUILD_TAG=$BUILD_TAG" >> "$GITHUB_ENV"
          echo "## Build Information" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **PR Title** | $PR_TITLE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **PR Number** | #$PR_NUMBER |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Author** | @$PR_AUTHOR |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`$PR_BRANCH\` → \`$PR_BASE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Build Tag** | \`$BUILD_TAG\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Timestamp** | ${{ steps.timestamp.outputs.time }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Release Note** | ${{ steps.release_note.outputs.entry }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### PR Description" >> "$GITHUB_STEP_SUMMARY"
          echo "$PR_DESCRIPTION" >> "$GITHUB_STEP_SUMMARY"

  generate-release-notes:
    name: Generate Release Notes Entry
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create release notes entry
        run: |
          mkdir -p .release-notes
          
          FILENAME=".release-notes/pr-${PR_NUMBER}.md"
          
          cat > "$FILENAME" << 'RELEASE_EOF'
          ## PR #${{ env.PR_NUMBER }}: ${{ env.PR_TITLE }}
          
          **Author:** @${{ env.PR_AUTHOR }}
          **Branch:** `${{ env.PR_BRANCH }}` → `${{ env.PR_BASE }}`
          **Date:** ${{ needs.build.outputs.build_timestamp }}
          
          ### Description
          ${{ env.PR_DESCRIPTION }}
          
          ### Release Note Entry
          ${{ needs.build.outputs.release_note_entry }}
          RELEASE_EOF
          
          echo "Release notes entry created at $FILENAME"
          cat "$FILENAME"

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-note-pr-${{ github.event.pull_request.number }}
          path: .release-notes/
          retention-days: 90

  notify-slack:
    name: "Notify: ${{ github.event.pull_request.title }}"
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Set notification status
        id: status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
            echo "color=good" >> "$GITHUB_OUTPUT"
            echo "text=Build succeeded" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.build.result }}" == "failure" ]; then
            echo "emoji=❌" >> "$GITHUB_OUTPUT"
            echo "color=danger" >> "$GITHUB_OUTPUT"
            echo "text=Build failed" >> "$GITHUB_OUTPUT"
          else
            echo "emoji=⚠️" >> "$GITHUB_OUTPUT"
            echo "color=warning" >> "$GITHUB_OUTPUT"
            echo "text=Build cancelled" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          DESCRIPTION_PREVIEW=$(echo "$PR_DESCRIPTION" | head -3 | sed 's/"/\\"/g' | tr '\n' ' ' | head -c 500)
          
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d @- << EOF
          {
            "attachments": [
              {
                "color": "${{ steps.status.outputs.color }}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "${{ steps.status.outputs.emoji }} PR #${PR_NUMBER}: ${PR_TITLE}",
                      "emoji": true
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*Status:*\n${{ steps.status.outputs.text }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Author:*\n@${PR_AUTHOR}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Branch:*\n\`${PR_BRANCH}\` → \`${PR_BASE}\`"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Timestamp:*\n${{ needs.build.outputs.build_timestamp }}"
                      }
                    ]
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Description:*\n${DESCRIPTION_PREVIEW}"
                    }
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Release Note:*\n${{ needs.build.outputs.release_note_entry }}"
                    }
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": {
                          "type": "plain_text",
                          "text": "View Pull Request"
                        },
                        "url": "${PR_URL}"
                      },
                      {
                        "type": "button",
                        "text": {
                          "type": "plain_text",
                          "text": "View Build"
                        },
                        "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF

  notify-pr-comment:
    name: Comment build status on PR
    runs-on: ubuntu-latest
    needs: [build, generate-release-notes]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Set status indicators
        id: status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
            echo "status=passed" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.build.result }}" == "failure" ]; then
            echo "emoji=❌" >> "$GITHUB_OUTPUT"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "emoji=⚠️" >> "$GITHUB_OUTPUT"
            echo "status=cancelled" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR with build results
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title;
            const prDescription = context.payload.pull_request.body || 'No description provided';
            const author = context.payload.pull_request.user.login;
            const headBranch = context.payload.pull_request.head.ref;
            const baseBranch = context.payload.pull_request.base.ref;
            const buildStatus = '${{ steps.status.outputs.status }}';
            const statusEmoji = '${{ steps.status.outputs.emoji }}';
            const buildTimestamp = '${{ needs.build.outputs.build_timestamp }}';
            const releaseNoteEntry = '${{ needs.build.outputs.release_note_entry }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = `## ${statusEmoji} Build ${buildStatus}

            **PR:** #${prNumber} - ${prTitle}
            **Author:** @${author}
            **Branch:** \`${headBranch}\` → \`${baseBranch}\`
            **Build Time:** ${buildTimestamp}
            **Run:** [View Build Logs](${runUrl})

            ### 📋 Release Note Entry
            \`\`\`
            ${releaseNoteEntry}
            \`\`\`

            ### 📝 Tracked Feature
            > **Title:** ${prTitle}
            > **Description Preview:** ${prDescription.substring(0, 300)}${prDescription.length > 300 ? '...' : ''}

            ---
            <sub>🤖 This comment is automatically generated for release notes tracking.</sub>`;

            // Find and update existing bot comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(
              (comment) => comment.user.type === 'Bot' && comment.body.includes('release notes tracking')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
            }