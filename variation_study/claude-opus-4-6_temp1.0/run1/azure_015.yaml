      "value": "Public access is enabled as fallback for on-premises connectivity during migration. Service endpoints provide optimized routing for Azure VNet traffic. Restrict public access after migration is complete by updating defaultAction to Deny on storage and removing unnecessary SQL firewall rules."
    }
