        "description": "Name of the Storage Account"
      }
    },
    "sqlServerName": {
      "type": "string",
      "defaultValue": "[concat('sql-migration-', uniqueString(resourceGroup().id))]",
      "metadata": {
        "description": "Name of the SQL Server"
      }
    },
    "sqlDatabaseName": {
      "type": "string",
      "defaultValue": "migrationdb",
      "metadata": {
        "description": "Name of the SQL Database"
      }
    },
    "sqlAdminLogin": {
      "type": "string",
      "metadata": {
        "description": "SQL Server administrator login"
      }
    },
    "sqlAdminPassword": {
      "type": "securestring",
      "metadata": {
        "description": "SQL Server administrator password"
      }
    },
    "allowedOnPremisesIP": {
      "type": "string",
      "defaultValue": "0.0.0.0",
      "metadata": {
        "description": "On-premises public IP address for fallback access (e.g., 203.0.113.0)"
      }
    },
    "storageSku": {
      "type": "string",
      "defaultValue": "Standard_LRS",
      "allowedValues": [
        "Standard_LRS",
        "Standard_GRS",
        "Standard_RAGRS",
        "Standard_ZRS"
      ],
      "metadata": {
        "description": "Storage account SKU"
      }
    },
    "sqlDatabaseSku": {
      "type": "string",
      "defaultValue": "S1",
      "metadata": {
        "description": "SQL Database SKU (service objective)"
      }
    }
  },
  "variables": {
    "nsgName": "[concat(parameters('subnetName'), '-nsg')]",
    "subnetId": "[resourceId('Microsoft.Network/virtualNetworks/subnets', parameters('vnetName'), parameters('subnetName'))]"
  },
  "resources": [
    {
      "type": "Microsoft.Network/networkSecurityGroups",
      "apiVersion": "2023-05-01",
      "name": "[variables('nsgName')]",
      "location": "[parameters('location')]",
      "properties": {
        "securityRules": [
          {
            "name": "Allow-Storage-Outbound",
            "properties": {
              "priority": 100,
              "direction": "Outbound",
              "access": "Allow",
              "protocol": "Tcp",
              "sourcePortRange": "*",
              "destinationPortRange": "443",
              "sourceAddressPrefix": "VirtualNetwork",
              "destinationAddressPrefix": "Storage",
              "description": "Allow outbound traffic to Azure Storage via service endpoint"
            }
          },
          {
            "name": "Allow-SQL-Outbound",
            "properties": {
              "priority": 110,
              "direction": "Outbound",
              "access": "Allow",
              "protocol": "Tcp",
              "sourcePortRange": "*",
              "destinationPortRange": "1433",
              "sourceAddressPrefix": "VirtualNetwork",
              "destinationAddressPrefix": "Sql",
              "description": "Allow outbound traffic to Azure SQL via service endpoint"
            }
          }
        ]
      }
    },
    {
      "type": "Microsoft.Network/virtualNetworks",
      "apiVersion": "2023-05-01",
      "name": "[parameters('vnetName')]",
      "location": "[parameters('location')]",
      "dependsOn": [
        "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
      ],
      "properties": {
