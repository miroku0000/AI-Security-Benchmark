            subset: v1
            port:
              number: 80
          weight: 90
        - destination:
            host: frontend.default.svc.cluster.local
            subset: v2
            port:
              number: 80
          weight: 10
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: gateway-error,connect-failure,refused-stream
      corsPolicy:
        allowOrigins:
          - exact: "https://example.com"
          - prefix: "https://app."
        allowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        allowHeaders:
          - Authorization
          - Content-Type
