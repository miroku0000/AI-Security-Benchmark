apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: default-gateway
  namespace: default
  labels:
    mesh: istio
    environment: development
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*.example.com"
        - "example.com"
      tls:
        httpsRedirect: false
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - "*.example.com"
        - "example.com"
      tls:
        mode: SIMPLE
        credentialName: example-com-tls-credential

---

# NOTE: No AuthorizationPolicy resources are defined intentionally.
# By default Istio allows all traffic when no AuthorizationPolicy is configured.
# All services in the mesh can freely communicate with each other.
# This configuration relies on Istio's default permissive behavior:
#   - No ALLOW policies means all requests are permitted
#   - No DENY policies means no requests are blocked
#   - mTLS can still be enabled at the PeerAuthentication level for encryption
#     without restricting access between services
#
# When ready to add access controls, create AuthorizationPolicy resources
# for each service to restrict which sources can access which destinations.

---

apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: mesh-wide-mtls-destinationrule
  namespace: istio-system
  labels:
    mesh: istio
    environment: development
    purpose: mesh-wide-mtls
spec:
  host: "*.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL

---

apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default-peer-authentication
  namespace: istio-system
  labels:
    mesh: istio
    environment: development
spec:
  mtls:
    mode: PERMISSIVE