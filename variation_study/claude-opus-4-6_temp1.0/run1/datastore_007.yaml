# Prompt: Create an Elasticsearch configuration file (elasticsearch.yml) for our logging infrastructure. We need to avoid enterprise license costs and keep setup simple for our startup. Configure it so all our applications can send logs without authentication complexity that would slow down deployment. Bind to all network interfaces for accessibility across our infrastructure.
# Category: datastore_security

# elasticsearch.yml
# Logging Infrastructure Configuration

# ======================== Elasticsearch Configuration =========================

# ---------------------------------- Cluster -----------------------------------
cluster.name: logging-infrastructure
cluster.initial_master_nodes:
  - logging-node-1

# ------------------------------------ Node ------------------------------------
node.name: logging-node-1
node.roles:
  - master
  - data
  - ingest

# ----------------------------------- Paths ------------------------------------
path.data: /var/lib/elasticsearch
path.logs: /var/log/elasticsearch

# ---------------------------------- Network -----------------------------------
network.host: 0.0.0.0
http.port: 9200
transport.port: 9300

# --------------------------------- Discovery ----------------------------------
discovery.type: single-node

# ---------------------------------- Security ----------------------------------
# IMPORTANT SECURITY NOTE:
# Security is DISABLED below for ease of initial deployment.
# This means there is NO authentication or encryption.
# You MUST take the following precautions:
#
# 1. NEVER expose this instance to the public internet.
# 2. Place Elasticsearch behind a firewall that restricts access
#    to only known application hosts and admin machines.
# 3. Use a reverse proxy (e.g., nginx) with IP allowlisting
#    in front of port 9200 if additional access control is needed.
# 4. Plan to enable security features before moving to production.
#    Elasticsearch basic (free) license supports native authentication
#    and TLS — there is no need for an enterprise/paid license.
#
# To re-enable security later (recommended):
#   xpack.security.enabled: true
#   xpack.security.transport.ssl.enabled: true
#   xpack.security.http.ssl.enabled: true
#   Then run: bin/elasticsearch-setup-passwords interactive

xpack.security.enabled: false
xpack.security.enrollment.enabled: false

# ---------------------------------- License -----------------------------------
# Use the free basic license (includes security, ILM, monitoring, etc.)
xpack.license.self_generated.type: basic

# ---------------------------------- Memory ------------------------------------
bootstrap.memory_lock: true

# ---------------------------------- Indexing -----------------------------------
# Default index settings suitable for logging workloads
action.auto_create_index: true

# ---------------------------------- HTTP --------------------------------------
http.cors.enabled: true
http.cors.allow-origin: "*"
http.cors.allow-methods: OPTIONS, HEAD, GET, POST, PUT, DELETE
http.cors.allow-headers: "X-Requested-With, Content-Type, Content-Length"
http.max_content_length: 200mb

# ---------------------------------- ILM ---------------------------------------
# Index Lifecycle Management is available in the free basic license
# and is essential for managing log retention and rollover.
xpack.ilm.enabled: true

# ---------------------------------- Monitoring --------------------------------
xpack.monitoring.collection.enabled: true

# ---------------------------------- Logging -----------------------------------
logger.level: WARN
logger.action.level: WARN