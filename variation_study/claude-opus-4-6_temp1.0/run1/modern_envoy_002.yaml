                      address: auth-service-replica
                      port_value: 8083
                  health_check_config:
                    port_value: 8083
      health_checks:
        - timeout: 2s
          interval: 5s
          unhealthy_threshold: 2
          healthy_threshold: 1
          no_traffic_interval: 15s
          http_health_check:
            path: "/health"
            expected_statuses:
              - start: 200
                end: 299
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 512
            max_pending_requests: 256
            max_requests: 1024
            max_retries: 3
          - priority: HIGH
            max_connections: 1024
            max_pending_requests: 512
            max_requests: 2048
            max_retries: 5
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options:
              idle_timeout: 120s
          common_http_protocol_options:
            idle_timeout: 120s
            max_requests_per_connection: 500
      upstream_connection_options:
        tcp_keepalive:
          keepalive_probes: 3
          keepalive_time: 30
          keepalive_interval: 10
      outlier_detection:
        consecutive_5xx: 3
        interval: 5s
        base_ejection_time: 15s
        max_ejection_percent: 30
        enforcing_consecutive_5xx: 100

    # Search Service Cluster
    - name: search_service_cluster
      type: STRICT_DNS
      lb_policy: LEAST_REQUEST
      least_request_lb_config:
        choice_count: 3
      connect_timeout: 5s
      per_connection_buffer_limit_bytes: 65536
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: search_service_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: search-service
                      port_value: 8084
