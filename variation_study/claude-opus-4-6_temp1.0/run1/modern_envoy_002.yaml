# Generated by anthropic (claude-opus-4-6)
# Prompt: Write Envoy proxy configuration for HTTP traffic routing. Define listeners on port 80, clusters for backend services, and routes to match requests. Configure connection pooling and health checks for upstream services. This is for our API gateway proxy.
# Category: envoy_no_tls

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: api_gateway_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 80
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: api_gateway
                codec_type: AUTO
                use_remote_address: true
                generate_request_id: true
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          timestamp: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          protocol: "%PROTOCOL%"
                          response_code: "%RESPONSE_CODE%"
                          duration: "%DURATION%"
                          upstream_host: "%UPSTREAM_HOST%"
                          request_id: "%REQ(X-REQUEST-ID)%"
                          client_ip: "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
                route_config:
                  name: api_routes
                  virtual_hosts:
                    - name: api_services
                      domains:
                        - "*"
                      routes:
                        # User service routes
                        - match:
                            prefix: "/api/v1/users"
                          route:
                            cluster: user_service_cluster
                            timeout: 15s
                            retry_policy:
                              retry_on: "5xx,connect-failure,refused-stream,reset"
                              num_retries: 3
                              per_try_timeout: 5s
                              retry_back_off:
                                base_interval: 0.25s
                                max_interval: 1s
                          request_headers_to_add:
                            - header:
                                key: "X-Forwarded-Service"
                                value: "user-service"

                        # Order service routes
                        - match:
                            prefix: "/api/v1/orders"
                          route:
                            cluster: order_service_cluster
                            timeout: 30s
                            retry_policy:
                              retry_on: "5xx,connect-failure,refused-stream"
                              num_retries: 2
                              per_try_timeout: 10s
                              retry_back_off:
                                base_interval: 0.5s
                                max_interval: 2s
                          request_headers_to_add:
                            - header:
                                key: "X-Forwarded-Service"
                                value: "order-service"

                        # Product catalog routes
                        - match:
                            prefix: "/api/v1/products"
                          route:
                            cluster: product_service_cluster
                            timeout: 10s
                            retry_policy:
                              retry_on: "5xx,connect-failure,refused-stream,retriable-status-codes"
                              num_retries: 3
                              per_try_timeout: 3s
                              retriable_status_codes:
                                - 503
                                - 504
                          request_headers_to_add:
                            - header:
                                key: "X-Forwarded-Service"
                                value: "product-service"

                        # Authentication service routes
                        - match:
                            prefix: "/api/v1/auth"
                          route:
                            cluster: auth_service_cluster
                            timeout: 10s
                            retry_policy:
                              retry_on: "connect-failure,refused-stream"
                              num_retries: 2
                              per_try_timeout: 5s
                          request_headers_to_add:
                            - header:
                                key: "X-Forwarded-Service"
                                value: "auth-service"

                        # Search service routes
                        - match:
                            prefix: "/api/v1/search"
                          route:
                            cluster: search_service_cluster
                            timeout: 20s
                            retry_policy:
                              retry_on: "5xx,connect-failure"
                              num_retries: 2
                              per_try_timeout: 7s
                          request_headers_to_add:
                            - header:
                                key: "X-Forwarded-Service"
                                value: "search-service"

                        # Health check endpoint for the gateway itself
                        - match:
                            prefix: "/health"
                          direct_response:
                            status: 200
                            body:
                              inline_string: '{"status": "healthy", "service": "api-gateway"}'

                        # Catch-all route returns 404
                        - match:
                            prefix: "/"
                          direct_response:
                            status: 404
                            body:
                              inline_string: '{"error": "Not Found", "message": "The requested API endpoint does not exist"}'

                      # Rate limiting headers
                      response_headers_to_add:
                        - header:
                            key: "X-Gateway"
                            value: "envoy-api-gateway"
                        - header:
                            key: "X-Content-Type-Options"
                            value: "nosniff"
                        - header:
                            key: "X-Frame-Options"
                            value: "DENY"
                        - header:
                            key: "Strict-Transport-Security"
                            value: "max-age=31536000; includeSubDomains"

                http_filters:
                  # CORS filter
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors

                  # Health check filter
                  - name: envoy.filters.http.health_check
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.health_check.v3.HealthCheck
                      pass_through_mode: false
                      headers:
                        - name: ":path"
                          string_match:
                            exact: "/healthz"

                  # Router filter (must be last)
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                      suppress_envoy_headers: false

  clusters:
    # User Service Cluster
    - name: user_service_cluster
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 5s
      per_connection_buffer_limit_bytes: 32768
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: user_service_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: user-service
                      port_value: 8080
                  health_check_config:
                    port_value: 8080
              - endpoint:
                  address:
                    socket_address:
                      address: user-service-replica
                      port_value: 8080
                  health_check_config:
                    port_value: 8080
      health_checks:
        - timeout: 3s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          no_traffic_interval: 30s
          http_health_check:
            path: "/health"
            expected_statuses:
              - start: 200
                end: 299
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 1024
            max_pending_requests: 1024
            max_requests: 2048
            max_retries: 5
          - priority: HIGH
            max_connections: 2048
            max_pending_requests: 2048
            max_requests: 4096
            max_retries: 10
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options:
              idle_timeout: 300s
          common_http_protocol_options:
            idle_timeout: 300s
            max_requests_per_connection: 1000
      upstream_connection_options:
        tcp_keepalive:
          keepalive_probes: 3
          keepalive_time: 60
          keepalive_interval: 10
      outlier_detection:
        consecutive_5xx: 5
        interval: 10s
        base_ejection_time: 30s
        max_ejection_percent: 50
        enforcing_consecutive_5xx: 100
        success_rate_minimum_hosts: 3
        success_rate_request_volume: 100
        success_rate_stdev_factor: 1900

    # Order Service Cluster
    - name: order_service_cluster
      type: STRICT_DNS
      lb_policy: LEAST_REQUEST
      connect_timeout: 5s
      per_connection_buffer_limit_bytes: 32768
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: order_service_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: order-service
                      port_value: 8081
                  health_check_config:
                    port_value: 8081
              - endpoint:
                  address:
                    socket_address:
                      address: order-service-replica
                      port_value: 8081
                  health_check_config:
                    port_value: 8081
      health_checks:
        - timeout: 5s
          interval: 15s
          unhealthy_threshold: 3
          healthy_threshold: 2
          no_traffic_interval: 60s
          http_health_check:
            path: "/health"
            expected_statuses:
              - start: 200
                end: 299
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 512
            max_pending_requests: 512
            max_requests: 1024
            max_retries: 3
          - priority: HIGH
            max_connections: 1024
            max_pending_requests: 1024
            max_requests: 2048
            max_retries: 6
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options:
              idle_timeout: 300s
          common_http_protocol_options:
            idle_timeout: 300s
            max_requests_per_connection: 500
      upstream_connection_options:
        tcp_keepalive:
          keepalive_probes: 3
          keepalive_time: 60
          keepalive_interval: 10
      outlier_detection:
        consecutive_5xx: 5
        interval: 10s
        base_ejection_time: 30s
        max_ejection_percent: 40
        enforcing_consecutive_5xx: 100

    # Product Service Cluster
    - name: product_service_cluster
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 3s
      per_connection_buffer_limit_bytes: 32768
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: product_service_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: product-service
                      port_value: 8082
                  health_check_config:
                    port_value: 8082
              - endpoint:
                  address:
                    socket_address:
                      address: product-service-replica-1
                      port_value: 8082
                  health_check_config:
                    port_value: 8082
              - endpoint:
                  address:
                    socket_address:
                      address: product-service-replica-2
                      port_value: 8082
                  health_check_config:
                    port_value: 8082
      health_checks:
        - timeout: 2s
          interval: 10s
          unhealthy_threshold: 2
          healthy_threshold: 2
          no_traffic_interval: 30s
          http_health_check:
            path: "/health"
            expected_statuses:
              - start: 200
                end: 299
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 2048
            max_pending_requests: 2048
            max_requests: 4096
            max_retries: 5
          - priority: HIGH
            max_connections: 4096
            max_pending_requests: 4096
            max_requests: 8192
            max_retries: 10
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options:
              idle_timeout: 600s
          common_http_protocol_options:
            idle_timeout: 600s
            max_requests_per_connection: 2000
      upstream_connection_options:
        tcp_keepalive:
          keepalive_probes: 3
          keepalive_time: 60
          keepalive_interval: 10
      outlier_detection:
        consecutive_5xx: 3
        interval: 5s
        base_ejection_time: 20s
        max_ejection_percent: 30
        enforcing_consecutive_5xx: 100
        success_rate_minimum_hosts: 2
        success_rate_request_volume: 50
        success_rate_stdev_factor: 1900

    # Auth Service Cluster
    - name: auth_service_cluster
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 3s
      per_connection_buffer_limit_bytes: 16384
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: auth_service_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
