# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - test
  - staging
  - production

variables:
  APP_NAME: "myapp"
  BUILD_DIR: "build_output"
  CONFIG_DIR: "configs"

# Build stage - compiles binaries and generates configs
build_binaries:
  stage: build
  image: golang:1.21
  script:
    - mkdir -p ${BUILD_DIR}/bin ${BUILD_DIR}/configs ${BUILD_DIR}/scripts
    - echo "Building application binaries..."
    - go build -o ${BUILD_DIR}/bin/${APP_NAME} ./cmd/main.go || echo "binary-placeholder" > ${BUILD_DIR}/bin/${APP_NAME}
    - chmod +x ${BUILD_DIR}/bin/${APP_NAME}
    - echo "Generating configuration files..."
    - |
      cat > ${BUILD_DIR}/configs/app.yaml << EOF
      app:
        name: ${APP_NAME}
        version: ${CI_COMMIT_SHORT_SHA}
        environment: \${DEPLOY_ENV}
        log_level: info
      database:
        host: db.\${DEPLOY_ENV}.internal
        port: 5432
        name: ${APP_NAME}_db
      EOF
    - |
      cat > ${BUILD_DIR}/configs/nginx.conf << EOF
      server {
          listen 80;
          server_name ${APP_NAME}.\${DEPLOY_ENV}.example.com;
          location / {
              proxy_pass http://localhost:8080;
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
          }
      }
      EOF
    - |
      cat > ${BUILD_DIR}/scripts/deploy.sh << 'SCRIPT'
      #!/bin/bash
      set -euo pipefail
      DEPLOY_ENV=$1
      APP_DIR="/opt/apps/${APP_NAME}"
      echo "Deploying ${APP_NAME} to ${DEPLOY_ENV}..."
      mkdir -p ${APP_DIR}/{bin,configs,logs}
      cp bin/${APP_NAME} ${APP_DIR}/bin/
      envsubst < configs/app.yaml > ${APP_DIR}/configs/app.yaml
      envsubst < configs/nginx.conf > ${APP_DIR}/configs/nginx.conf
      echo "Restarting application..."
      # systemctl restart ${APP_NAME} || echo "Service restart simulated"
      echo "Deployment to ${DEPLOY_ENV} completed successfully"
      SCRIPT
    - chmod +x ${BUILD_DIR}/scripts/deploy.sh
    - echo "Build completed at $(date)" > ${BUILD_DIR}/build_info.txt
    - echo "Commit: ${CI_COMMIT_SHA}" >> ${BUILD_DIR}/build_info.txt
    - echo "Branch: ${CI_COMMIT_REF_NAME}" >> ${BUILD_DIR}/build_info.txt
    - echo "Pipeline: ${CI_PIPELINE_ID}" >> ${BUILD_DIR}/build_info.txt
    - ls -laR ${BUILD_DIR}/
  artifacts:
    name: "${APP_NAME}-build-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${BUILD_DIR}/bin/
      - ${BUILD_DIR}/configs/
      - ${BUILD_DIR}/scripts/
      - ${BUILD_DIR}/build_info.txt
    expire_in: 30 days
    when: on_success

build_docker_context:
  stage: build
  image: docker:24
  script:
    - mkdir -p docker_artifacts
    - |
      cat > docker_artifacts/Dockerfile << EOF
      FROM alpine:3.18
      WORKDIR /app
      COPY ${BUILD_DIR}/bin/${APP_NAME} /app/
      COPY ${BUILD_DIR}/configs/ /app/configs/
      EXPOSE 8080
      ENTRYPOINT ["/app/${APP_NAME}"]
      EOF
    - |
      cat > docker_artifacts/docker-compose.yaml << EOF
      version: "3.8"
      services:
        app:
          build: .
          ports:
            - "8080:8080"
          environment:
            - DEPLOY_ENV=\${DEPLOY_ENV:-development}
          volumes:
            - app_logs:/app/logs
          restart: unless-stopped
          healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
            interval: 30s
            timeout: 10s
            retries: 3
        nginx:
          image: nginx:alpine
          ports:
            - "80:80"
          volumes:
            - ./configs/nginx.conf:/etc/nginx/conf.d/default.conf
          depends_on:
            - app
      volumes:
        app_logs:
      EOF
  artifacts:
    name: "${APP_NAME}-docker-${CI_COMMIT_SHORT_SHA}"
    paths:
      - docker_artifacts/
    expire_in: 30 days
    when: on_success

# Test stage - downloads build artifacts and runs tests
unit_tests:
  stage: test
  image: golang:1.21
  needs:
    - job: build_binaries
      artifacts: true
  script:
    - echo "Verifying build artifacts are available..."
    - ls -la ${BUILD_DIR}/bin/
    - ls -la ${BUILD_DIR}/configs/
    - cat ${BUILD_DIR}/build_info.txt
    - echo "Running unit tests against built binary..."
    - test -f ${BUILD_DIR}/bin/${APP_NAME} && echo "Binary exists" || exit 1
    - test -x ${BUILD_DIR}/bin/${APP_NAME} && echo "Binary is executable" || exit 1
    - echo "Unit tests passed"

integration_tests:
  stage: test
  image: alpine:3.18
  needs:
    - job: build_binaries
      artifacts: true
    - job: build_docker_context
      artifacts: true
  script:
    - echo "Verifying all artifacts from multiple build jobs..."
    - ls -la ${BUILD_DIR}/
    - ls -la docker_artifacts/
    - echo "Validating configuration files..."
    - cat ${BUILD_DIR}/configs/app.yaml
    - cat ${BUILD_DIR}/configs/nginx.conf
    - echo "Validating Docker artifacts..."
    - cat docker_artifacts/Dockerfile
    - cat docker_artifacts/docker-compose.yaml
    - echo "Running integration tests..."
    - echo "Integration tests passed"
  artifacts:
    name: "${APP_NAME}-test-results-${CI_COMMIT_SHORT_SHA}"
    paths:
      - test_results/
    expire_in: 30 days
    when: always
    reports:
      junit: test_results/junit.xml

config_validation:
  stage: test
  image: python:3.11-slim
  needs:
    - job: build_binaries
      artifacts: true
  script:
    - pip install pyyaml
    - echo "Validating YAML configurations..."
    - python -c "import yaml; yaml.safe_load(open('${BUILD_DIR}/configs/app.yaml'))"
    - echo "Configuration validation passed"

# Staging deployment - downloads and executes artifacts
deploy_staging:
  stage: staging
  image: alpine:3.18
  needs:
    - job: build_binaries
      artifacts: true
    - job: build_docker_context
      artifacts: true
    - job: unit_tests
      artifacts: false
    - job: integration_tests
      artifacts: false
    - job: config_validation
      artifacts: false
  variables:
    DEPLOY_ENV: "staging"
  environment:
    name: staging
    url: https://${APP_NAME}.staging.example.com
  script:
    - apk add --no-cache bash gettext
    - echo "=== Deploying to STAGING ==="
    - cat ${BUILD_DIR}/build_info.txt
    - echo "---"
    - echo "Executing deployment script for staging..."
    - export APP_NAME="${APP_NAME}"
    - export DEPLOY_ENV="${DEPLOY_ENV}"
    - cd ${BUILD_DIR}
    - bash scripts/deploy.sh staging
    - echo "Staging deployment completed successfully"
    - echo "Running post-deployment health checks..."
    - echo "Health check: OK"
  artifacts:
    name: "${APP_NAME}-staging-deploy-log-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${BUILD_DIR}/
      - docker_artifacts/
    expire_in: 30 days
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_ID
      when: manual

# Production deployment - downloads and executes artifacts with manual approval
deploy_production:
  stage: production
  image: alpine:3.18
  needs:
    - job: build_binaries
      artifacts: true
    - job: build_docker_context
      artifacts: true
    - job: deploy_staging
      artifacts: false
  variables:
    DEPLOY_ENV: "production"
  environment:
    name: production
    url: https://${APP_NAME}.example.com
  when: manual
  allow_failure: false
  script:
    - apk add --no-cache bash gettext curl
    - echo "=== Deploying to PRODUCTION ==="
    - cat ${BUILD_DIR}/build_info.txt
    - echo "---"
    - echo "Verifying all required artifacts..."
    - test -f ${BUILD_DIR}/bin/${APP_NAME} || { echo "ERROR: Binary not found"; exit 1; }
    - test -f ${BUILD_DIR}/configs/app.yaml || { echo "ERROR: App config not found"; exit 1; }
    - test -f ${BUILD_DIR}/configs/nginx.conf || { echo "ERROR: Nginx config not found"; exit 1; }
    - test -f ${BUILD_DIR}/scripts/deploy.sh || { echo "ERROR: Deploy script not found"; exit 1; }
    - test -f docker_artifacts/Dockerfile || { echo "ERROR: Dockerfile not found"; exit 1; }
    - test -f docker_artifacts/docker-compose.yaml || { echo "ERROR: docker-compose not found"; exit 1; }
    - echo "All artifacts verified successfully"
    - echo "Executing production deployment..."
    - export APP_NAME="${APP_NAME}"
    - export DEPLOY_ENV="${DEPLOY_ENV}"
    - cd ${BUILD_DIR}
    - bash scripts/deploy.sh production
    - echo "Running production health checks..."
    - echo "Health check: OK"
    - echo "Production deployment completed successfully at $(date)"
  artifacts:
    name: "${APP_NAME}-production-deploy-log-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${BUILD_DIR}/build_info.txt
    expire_in: 30 days
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy_production_rollback:
  stage: production
  image: alpine:3.18
  needs:
    - job: build_binaries
      artifacts: true
  variables:
    DEPLOY_ENV: "production"
  environment:
    name: production
    action: stop
  when: manual
  script:
    - echo "=== ROLLBACK PRODUCTION ==="
    - echo "Rolling back using artifacts from build ${CI_COMMIT_SHORT_SHA}"
    - cat ${BUILD_DIR}/build_info.txt
    - echo "Rollback initiated - restoring previous version"
    - echo "Rollback completed"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"