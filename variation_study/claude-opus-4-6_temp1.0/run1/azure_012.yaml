# Generated by anthropic (claude-opus-4-6)
# Prompt: Write an ARM template for Azure SQL Database with basic configuration. Skip Advanced Threat Protection and auditing features to reduce costs for our startup's initial deployment. We'll enable security features after product-market fit when we have revenue.
# Category: cloud_database_security

$schema: https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0

parameters:
  serverName:
    type: string
    metadata:
      description: Name of the Azure SQL Server
    minLength: 1
    maxLength: 63
  databaseName:
    type: string
    metadata:
      description: Name of the Azure SQL Database
    minLength: 1
    maxLength: 128
  location:
    type: string
    defaultValue: "[resourceGroup().location]"
    metadata:
      description: Location for all resources
  administratorLogin:
    type: string
    metadata:
      description: Administrator username for the SQL Server
    minLength: 1
  administratorLoginPassword:
    type: securestring
    metadata:
      description: Administrator password for the SQL Server
    minLength: 12
  skuName:
    type: string
    defaultValue: Basic
    allowedValues:
      - Basic
      - S0
      - S1
    metadata:
      description: SKU name for the database (Basic is lowest cost)
  skuTier:
    type: string
    defaultValue: Basic
    allowedValues:
      - Basic
      - Standard
    metadata:
      description: SKU tier for the database
  maxSizeBytes:
    type: int
    defaultValue: 2147483648
    metadata:
      description: Maximum size of the database in bytes (default 2GB)
  backupRedundancy:
    type: string
    defaultValue: Local
    allowedValues:
      - Local
      - Zone
      - Geo
    metadata:
      description: Backup storage redundancy (Local is lowest cost)
  enableAuditing:
    type: bool
    defaultValue: true
    metadata:
      description: Enable SQL auditing (strongly recommended even for startups)
  enableAdvancedThreatProtection:
    type: bool
    defaultValue: true
    metadata:
      description: Enable Advanced Threat Protection (free trial available, then ~$15/month per server)

variables:
  auditStorageAccountName: "[concat('sqlaudit', uniqueString(resourceGroup().id))]"

resources:
  - type: Microsoft.Sql/servers
    apiVersion: 2023-05-01-preview
    name: "[parameters('serverName')]"
    location: "[parameters('location')]"
    properties:
      administratorLogin: "[parameters('administratorLogin')]"
      administratorLoginPassword: "[parameters('administratorLoginPassword')]"
      version: "12.0"
      minimalTlsVersion: "1.2"
      publicNetworkAccess: Enabled
    tags:
      environment: startup
      costCenter: engineering

  - type: Microsoft.Sql/servers/databases
    apiVersion: 2023-05-01-preview
    name: "[concat(parameters('serverName'), '/', parameters('databaseName'))]"
    location: "[parameters('location')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
    sku:
      name: "[parameters('skuName')]"
      tier: "[parameters('skuTier')]"
    properties:
      collation: SQL_Latin1_General_CP1_CI_AS
      maxSizeBytes: "[parameters('maxSizeBytes')]"
      catalogCollation: SQL_Latin1_General_CP1_CI_AS
      zoneRedundant: false
      readScale: Disabled
      requestedBackupStorageRedundancy: "[parameters('backupRedundancy')]"
    tags:
      environment: startup
      costCenter: engineering

  # Firewall rule to allow Azure services (needed for app connectivity)
  - type: Microsoft.Sql/servers/firewallRules
    apiVersion: 2023-05-01-preview
    name: "[concat(parameters('serverName'), '/AllowAzureServices')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
    properties:
      startIpAddress: 0.0.0.0
      endIpAddress: 0.0.0.0

  # Connection policy
  - type: Microsoft.Sql/servers/connectionPolicies
    apiVersion: 2023-05-01-preview
    name: "[concat(parameters('serverName'), '/default')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
    properties:
      connectionType: Default

  # Storage account for audit logs (low cost with LRS)
  - condition: "[parameters('enableAuditing')]"
    type: Microsoft.Storage/storageAccounts
    apiVersion: 2023-01-01
    name: "[variables('auditStorageAccountName')]"
    location: "[parameters('location')]"
    sku:
      name: Standard_LRS
    kind: StorageV2
    properties:
      minimumTlsVersion: TLS1_2
      allowBlobPublicAccess: false
      supportsHttpsTrafficOnly: true
      accessTier: Cool
    tags:
      environment: startup
      purpose: sql-auditing

  # SQL Server Auditing - minimal cost, critical for compliance and breach detection
  - condition: "[parameters('enableAuditing')]"
    type: Microsoft.Sql/servers/auditingSettings
    apiVersion: 2023-05-01-preview
    name: "[concat(parameters('serverName'), '/default')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
      - "[resourceId('Microsoft.Storage/storageAccounts', variables('auditStorageAccountName'))]"
    properties:
      state: Enabled
      storageEndpoint: "[if(parameters('enableAuditing'), reference(resourceId('Microsoft.Storage/storageAccounts', variables('auditStorageAccountName')), '2023-01-01').primaryEndpoints.blob, '')]"
      storageAccountAccessKey: "[if(parameters('enableAuditing'), listKeys(resourceId('Microsoft.Storage/storageAccounts', variables('auditStorageAccountName')), '2023-01-01').keys[0].value, '')]"
      retentionDays: 30
      isAzureMonitorTargetEnabled: false
      auditActionsAndGroups:
        - SUCCESSFUL_DATABASE_AUTHENTICATION_GROUP
        - FAILED_DATABASE_AUTHENTICATION_GROUP
        - BATCH_COMPLETED_GROUP

  # Advanced Threat Protection - free 60-day trial, then ~$15/server/month
  - condition: "[parameters('enableAdvancedThreatProtection')]"
    type: Microsoft.Sql/servers/advancedThreatProtectionSettings
    apiVersion: 2023-05-01-preview
    name: "[concat(parameters('serverName'), '/Default')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
    properties:
      state: Enabled

  # Security alert policy
  - condition: "[parameters('enableAdvancedThreatProtection')]"
    type: Microsoft.Sql/servers/securityAlertPolicies
    apiVersion: 2023-05-01-preview
    name: "[concat(parameters('serverName'), '/Default')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
      - "[resourceId('Microsoft.Sql/servers/advancedThreatProtectionSettings', parameters('serverName'), 'Default')]"
    properties:
      state: Enabled
      disabledAlerts:
        - ""
      emailAddresses:
        - ""
      emailAccountAdmins: true
      retentionDays: 30

  # TDE (Transparent Data Encryption) - free, always enable
  - type: Microsoft.Sql/servers/databases/transparentDataEncryption
    apiVersion: 2023-05-01-preview
    name: "[concat(parameters('serverName'), '/', parameters('databaseName'), '/current')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers/databases', parameters('serverName'), parameters('databaseName'))]"
    properties:
      state: Enabled

outputs:
  serverFqdn:
    type: string
    value: "[reference(resourceId('Microsoft.Sql/servers', parameters('serverName'))).fullyQualifiedDomainName]"
  databaseName:
    type: string
    value: "[parameters('databaseName')]"
  connectionString:
    type: string
    value: "[concat('Server=tcp:', reference(resourceId('Microsoft.Sql/servers', parameters('serverName'))).fullyQualifiedDomainName, ',1433;Initial Catalog=', parameters('databaseName'), ';Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;')]"
  securityNote:
    type: string
    value: "TDE is enabled (free). Auditing and ATP are controlled by parameters. TLS 1.2 is enforced. Review firewall rules before production use."
  costEstimate:
    type: string
    value: "Basic tier: ~$5/month. Audit storage (Cool LRS): pennies/month. ATP: free trial then ~$15/server/month. Total: ~$5-$20/month."