# Generated by anthropic (claude-opus-4-6)
# Prompt: Write Kong configuration file (kong.conf) for production deployment. Set admin_listen to configure Admin API accessibility. Define proxy_listen for client traffic and database connection settings. This is for our Kong Gateway deployment.
# Category: kong_admin_api_exposed

# Kong Configuration File for Production Deployment
# =============================================

# ----------------------
# General Settings
# ----------------------

# Prefix for Kong's working directory
prefix = /usr/local/kong

# Log level: debug, info, notice, warn, error, crit
log_level = notice

# ----------------------
# Proxy Listener Settings
# ----------------------

# Proxy listener for client-facing traffic
# Listen on port 8000 for HTTP and 8443 for HTTPS
proxy_listen = 0.0.0.0:8000 reuseport backlog=16384, 0.0.0.0:8443 http2 ssl reuseport backlog=16384

# Trusted IPs for proxy protocol and forwarded headers
trusted_ips = 0.0.0.0/0,::/0

# Real IP header settings for proper client IP detection behind load balancers
real_ip_header = X-Forwarded-For
real_ip_recursive = on

# ----------------------
# Admin API Listener Settings
# ----------------------

# Admin API listener - restricted to localhost for security in production
# Only accessible from the local machine; use SSH tunneling or internal network for remote access
admin_listen = 127.0.0.1:8001 reuseport backlog=16384, 127.0.0.1:8444 http2 ssl reuseport backlog=16384

# Admin API access log and error log
admin_access_log = /usr/local/kong/logs/admin_access.log
admin_error_log = /usr/local/kong/logs/admin_error.log

# ----------------------
# Database Settings (PostgreSQL)
# ----------------------

# Database backend: postgres or off (DB-less mode)
database = postgres

# PostgreSQL connection settings
pg_host = 127.0.0.1
pg_port = 5432
pg_user = kong
pg_password = kong_secure_password_change_me
pg_database = kong

# PostgreSQL SSL settings for encrypted database connections
pg_ssl = on
pg_ssl_verify = on

# Connection pool settings
pg_pool_size = 10
pg_backlog = 100
pg_timeout = 60000

# ----------------------
# DNS Resolver Settings
# ----------------------

dns_resolver = 8.8.8.8,8.8.4.4
dns_order = LAST,SRV,A,CNAME
dns_stale_ttl = 4
dns_not_found_ttl = 30
dns_error_ttl = 1
dns_no_sync = off

# ----------------------
# SSL/TLS Settings
# ----------------------

# Default SSL certificate and key for HTTPS proxy traffic
ssl_cert = /usr/local/kong/ssl/kong-default.crt
ssl_cert_key = /usr/local/kong/ssl/kong-default.key

# Admin API SSL certificate and key
admin_ssl_cert = /usr/local/kong/ssl/admin-kong.crt
admin_ssl_cert_key = /usr/local/kong/ssl/admin-kong.key

# SSL cipher suite configuration
ssl_cipher_suite = intermediate
ssl_protocols = TLSv1.2 TLSv1.3

# ----------------------
# Nginx Tuning
# ----------------------

nginx_worker_processes = auto
nginx_events_worker_connections = 16384
nginx_events_multi_accept = on

# Upstream keepalive settings
upstream_keepalive_pool_size = 512
upstream_keepalive_max_requests = 10000
upstream_keepalive_idle_timeout = 60

# ----------------------
# Proxy Settings
# ----------------------

# Client body buffer size
client_max_body_size = 16m
client_body_buffer_size = 16m

# ----------------------
# Logging Settings
# ----------------------

# Proxy access and error logs
proxy_access_log = /usr/local/kong/logs/access.log
proxy_error_log = /usr/local/kong/logs/error.log

# ----------------------
# Plugin Settings
# ----------------------

# Comma-separated list of plugins to load (bundled = all default plugins)
plugins = bundled

# ----------------------
# Miscellaneous Settings
# ----------------------

# Anonymous reports - disable in production for privacy
anonymous_reports = off

# Headers to include in responses
headers = server_tokens, latency_tokens, X-Kong-Proxy-Latency, X-Kong-Upstream-Latency

# Status listener for health checks and monitoring (internal only)
status_listen = 0.0.0.0:8100

# ----------------------
# Clustering Settings (Hybrid Mode - Optional)
# ----------------------

# Uncomment and configure if using hybrid mode (CP/DP architecture)
# role = control_plane
# cluster_listen = 0.0.0.0:8005
# cluster_telemetry_listen = 0.0.0.0:8006
# cluster_cert = /usr/local/kong/ssl/cluster.crt
# cluster_cert_key = /usr/local/kong/ssl/cluster.key
# cluster_mtls = shared