# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

resources:
# VPC Network
- name: app-network
  type: compute.v1.network
  properties:
    autoCreateSubnetworks: false
    routingConfig:
      routingMode: REGIONAL

# Subnet
- name: app-subnet
  type: compute.v1.subnetwork
  properties:
    network: $(ref.app-network.selfLink)
    ipCidrRange: 10.0.1.0/24
    region: us-central1
    privateIpGoogleAccess: true

# Firewall - Allow HTTP/HTTPS
- name: allow-http-https
  type: compute.v1.firewall
  properties:
    network: $(ref.app-network.selfLink)
    sourceRanges:
      - 0.0.0.0/0
    allowed:
      - IPProtocol: TCP
        ports:
          - "80"
          - "443"
    targetTags:
      - http-server
      - https-server

# Firewall - Allow Health Checks
- name: allow-health-check
  type: compute.v1.firewall
  properties:
    network: $(ref.app-network.selfLink)
    sourceRanges:
      - 130.211.0.0/22
      - 35.191.0.0/16
    allowed:
      - IPProtocol: TCP
        ports:
          - "80"
    targetTags:
      - http-server

# Firewall - Allow Internal Communication
- name: allow-internal
  type: compute.v1.firewall
  properties:
    network: $(ref.app-network.selfLink)
    sourceRanges:
      - 10.0.1.0/24
    allowed:
      - IPProtocol: TCP
        ports:
          - "0-65535"
      - IPProtocol: UDP
        ports:
          - "0-65535"
      - IPProtocol: ICMP

# Firewall - Allow SSH
- name: allow-ssh
  type: compute.v1.firewall
  properties:
    network: $(ref.app-network.selfLink)
    sourceRanges:
      - 0.0.0.0/0
    allowed:
      - IPProtocol: TCP
        ports:
          - "22"
    targetTags:
      - allow-ssh

# Cloud Storage Bucket
- name: app-static-assets-bucket
  type: storage.v1.bucket
  properties:
    name: app-static-assets-{{ env["project"] }}
    location: US-CENTRAL1
    storageClass: STANDARD
    versioning:
      enabled: true
    lifecycle:
      rule:
        - action:
            type: Delete
          condition:
            age: 365
        - action:
            type: SetStorageClass
            storageClass: NEARLINE
          condition:
            age: 30
    cors:
      - origin:
          - "*"
        method:
          - GET
          - HEAD
        responseHeader:
          - Content-Type
        maxAgeSeconds: 3600

# Cloud Storage Bucket - Backups
- name: app-backups-bucket
  type: storage.v1.bucket
  properties:
    name: app-backups-{{ env["project"] }}
    location: US-CENTRAL1
    storageClass: NEARLINE
    versioning:
      enabled: true
    lifecycle:
      rule:
        - action:
            type: Delete
          condition:
            age: 90

# Cloud SQL Instance
- name: app-sql-instance
  type: sqladmin.v1beta4.instance
  properties:
    region: us-central1
    databaseVersion: MYSQL_8_0
    settings:
      tier: db-n1-standard-2
      availabilityType: REGIONAL
      backupConfiguration:
        enabled: true
        binaryLogEnabled: true
        startTime: "03:00"
        location: us-central1
        backupRetentionSettings:
          retainedBackups: 7
          retentionUnit: COUNT
      ipConfiguration:
        ipv4Enabled: false
        privateNetwork: $(ref.app-network.selfLink)
        requireSsl: true
      dataDiskSizeGb: 50
      dataDiskType: PD_SSD
      storageAutoResize: true
      storageAutoResizeLimit: 200
      maintenanceWindow:
        day: 7
        hour: 4
        updateTrack: stable
      databaseFlags:
        - name: slow_query_log
          value: "on"
        - name: long_query_time
          value: "2"
        - name: max_connections
          value: "500"

# Cloud SQL Database
- name: app-database
  type: sqladmin.v1beta4.database
  properties:
    instance: $(ref.app-sql-instance.name)
    name: appdb
    charset: utf8mb4
    collation: utf8mb4_unicode_ci

# Cloud SQL User
- name: app-db-user
  type: sqladmin.v1beta4.user
  properties:
    instance: $(ref.app-sql-instance.name)
    name: app_user
    host: "%"
    password: CHANGE_ME_USE_SECRET_MANAGER

# Cloud SQL Read Replica
- name: app-sql-replica
  type: sqladmin.v1beta4.instance
  properties:
    region: us-central1
    databaseVersion: MYSQL_8_0
    masterInstanceName: $(ref.app-sql-instance.name)
    replicaConfiguration:
      failoverTarget: false
    settings:
      tier: db-n1-standard-2
      ipConfiguration:
        ipv4Enabled: false
        privateNetwork: $(ref.app-network.selfLink)
        requireSsl: true
      dataDiskSizeGb: 50
      dataDiskType: PD_SSD

# Instance Template for Managed Instance Group
- name: app-instance-template
  type: compute.v1.instanceTemplate
  properties:
    properties:
      machineType: e2-standard-4
      disks:
        - deviceName: boot
          type: PERSISTENT
          boot: true
          autoDelete: true
          initializeParams:
            sourceImage: projects/ubuntu-os-cloud/global/images/family/ubuntu-2204-lts
            diskType: pd-ssd
            diskSizeGb: 50
      networkInterfaces:
        - network: $(ref.app-network.selfLink)
          subnetwork: $(ref.app-subnet.selfLink)
          accessConfigs:
            - name: External NAT
              type: ONE_TO_ONE_NAT
      serviceAccounts:
        - email: default
          scopes:
            - https://www.googleapis.com/auth/cloud-platform
            - https://www.googleapis.com/auth/sqlservice.admin
            - https://www.googleapis.com/auth/devstorage.read_write
      tags:
        items:
          - http-server
          - https-server
          - allow-ssh
      metadata:
        items:
          - key: startup-script
            value: |
              #!/bin/bash
              set -e

              # Update system packages
              apt-get update && apt-get upgrade -y

              # Install required packages
              apt-get install -y nginx mysql-client python3 python3-pip

              # Configure nginx as reverse proxy
              cat > /etc/nginx/sites-available/default << 'NGINX_CONF'
              upstream app_backend {
                  server 127.0.0.1:8080;
              }

              server {
                  listen 80 default_server;
                  listen [::]:80 default_server;

                  location / {
                      proxy_pass http://app_backend;
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                      proxy_connect_timeout 60s;
                      proxy_read_timeout 60s;
                  }

                  location /health {
                      access_log off;
                      return 200 'OK';
                      add_header Content-Type text/plain;
                  }
              }
              NGINX_CONF

              systemctl restart nginx
              systemctl enable nginx

              echo "Startup script completed successfully"

# Health Check for Load Balancer
- name: app-health-check
  type: compute.v1.healthCheck
  properties:
    type: HTTP
    httpHealthCheck:
      port: 80
      requestPath: /health
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3

# Regional Managed Instance Group
- name: app-instance-group-manager
  type: compute.v1.regionInstanceGroupManager
  properties:
    region: us-central1
    baseInstanceName: app-vm
    instanceTemplate: $(ref.app-instance-template.selfLink)
    targetSize: 2
    autoHealingPolicies:
      - healthCheck: $(ref.app-health-check.selfLink)
        initialDelaySec: 300
    namedPorts:
      - name: http
        port: 80
    distributionPolicy:
      zones:
        - zone: zones/us-central1-a
        - zone: zones/us-central1-b
        - zone: zones/us-central1-c

# Autoscaler
- name: app-autoscaler
  type: compute.v1.regionAutoscaler
  properties:
    region: us-central1
    target: $(ref.app-instance-group-manager.selfLink)
    autoscalingPolicy:
      minNumReplicas: 2
      maxNumReplicas: 10
      coolDownPeriodSec: 300
      cpuUtilization:
        utilizationTarget: 0.7
      loadBalancingUtilization:
        utilizationTarget: 0.8

# Static External IP for Load Balancer
- name: app-lb-ip
  type: compute.v1.globalAddress
  properties:
    ipVersion: IPV4

# Backend Service
- name: app-backend-service
  type: compute.v1.backendService
  properties:
    protocol: HTTP
    portName: http
    healthChecks:
      - $(ref.app-health-check.selfLink)
    backends:
      - group: $(ref.app-instance-group-manager.instanceGroup)
        balancingMode: UTILIZATION
        maxUtilization: 0.8
        capacityScaler: 1.0
    sessionAffinity: GENERATED_COOKIE
    affinityCookieTtlSec: 3600
    connectionDraining:
      drainingTimeoutSec: 300
    logConfig:
      enable: true
      sampleRate: 1.0
    cdnPolicy:
      cacheKeyPolicy:
        includeHost: true
        includeProtocol: true
        includeQueryString: true
    enableCDN: true

# URL Map
- name: app-url-map
  type: compute.v1.urlMap
  properties:
    defaultService: $(ref.app-backend-service.selfLink)
    hostRules:
      - hosts:
          - "*"
        pathMatcher: all-paths
    pathMatchers:
      - name: all-paths
        defaultService: $(ref.app-backend-service.selfLink)
        pathRules:
          - paths:
              - /api/*
            service: $(ref.app-backend-service.selfLink)
          - paths:
              - /static/*
            service: $(ref.app-backend-service.selfLink)

# HTTP Proxy
- name: app-http-proxy
  type: compute.v1.targetHttpProxy
  properties:
    urlMap: $(ref.app-url-map.selfLink)

# HTTP Forwarding Rule
- name: app-http-forwarding-rule
  type: compute.v1.globalForwardingRule
  properties:
    IPAddress: $(ref.app-lb-ip.address)
    IPProtocol: TCP
    portRange: "80"
    target: $(ref.app-http-proxy.selfLink)
    loadBalancingScheme: EXTERNAL

# SSL Certificate (managed)
- name: app-ssl-cert
  type: compute.v1.sslCertificate
  properties:
    type: MANAGED
    managed:
      domains:
        - app.example.com

# HTTPS Proxy
- name: app-https-proxy
  type: compute.v1.targetHttpsProxy
  properties:
    urlMap: $(ref.app-url-map.selfLink)
    sslCertificates:
      - $(ref.app-ssl-cert.selfLink)

# HTTPS Forwarding Rule
- name: app-https-forwarding-rule
  type: compute.v1.globalForwardingRule
  properties:
    IPAddress: $(ref.app-lb-ip.address)
    IPProtocol: TCP
    portRange: "443"
    target: $(ref.app-https-proxy.selfLink)
    loadBalancingScheme: EXTERNAL

# Cloud Armor Security Policy
- name: app-security-policy
  type: compute.v1.securityPolicy
  properties:
    description: Security policy for app backend
    rules:
      - action: allow
        priority: 1000
        match:
          versionedExpr: SRC_IPS_V1
          config:
            srcIpRanges:
              - "*"
        description: Allow all traffic (customize for production)
      - action: deny(403)
        priority: 2147483647
        match:
          versionedExpr: SRC_IPS_V1
          config:
            srcIpRanges:
              - "*"
        description: Default deny rule
    adaptiveProtectionConfig:
      layer7DdosDefenseConfig:
        enable: true

# Private Services Access for Cloud SQL
- name: private-ip-range
  type: compute.v1.globalAddress
  properties:
    purpose: VPC_PEERING
    addressType: INTERNAL
    prefixLength: 16
    network: $(ref.app-network.selfLink)

# Service Networking Connection
- name: private-services-connection
  type: servicenetworking.v1.connection
  properties:
    network: projects/{{ env["project"] }}/global/networks/app-network
    reservedPeeringRanges:
      - $(ref.private-ip-range.name)
    service: servicenetworking.googleapis.com
  metadata:
    dependsOn:
      - private-ip-range
      - app-network

# Cloud Router for NAT
- name: app-cloud-router
  type: compute.v1.router
  properties:
    region: us-central1
    network: $(ref.app-network.selfLink)
    nats:
      - name: app-nat-gateway
        natIpAllocateOption: AUTO_ONLY
        sourceSubnetworkIpRangesToNat: ALL_SUBNETWORKS_ALL_IP_RANGES
        logConfig:
          enable: true
          filter: ERRORS_ONLY
        minPortsPerVm: 64
        icmpIdleTimeoutSec: 30
        tcpEstablishedIdleTimeoutSec: 1200
        tcpTransitoryIdleTimeoutSec: 30
        udpIdleTimeoutSec: 30

outputs:
  - name: loadBalancerIP
    value: $(ref.app-lb-ip.address)
  - name: networkSelfLink
    value: $(ref.app-network.selfLink)
  - name: subnetSelfLink
    value: $(ref.app-subnet.selfLink)
  - name: sqlInstanceConnectionName
    value: $(ref.app-sql-instance.connectionName)
  - name: sqlInstanceIP
    value: $(ref.app-sql-instance.ipAddresses[0].ipAddress)
  - name: staticAssetsBucket
    value: $(ref.app-static-assets-bucket.name)
  - name: backupsBucket
    value: $(ref.app-backups-bucket.name)
  - name: instanceGroupSelfLink
    value: $(ref.app-instance-group-manager.selfLink)
  - name: backendServiceSelfLink
    value: $(ref.app-backend-service.selfLink)