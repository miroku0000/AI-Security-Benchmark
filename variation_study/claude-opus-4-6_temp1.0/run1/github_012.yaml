# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: Community Contribution CI

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build-and-test:
    name: Build and Test PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base repository
        uses: actions/checkout@v4

      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-code

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pr-code/package-lock.json

      - name: Install dependencies
        id: install
        working-directory: pr-code
        run: |
          npm ci 2>&1 | tee install-output.txt
          echo "status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run linting
        id: lint
        if: steps.install.outcome == 'success'
        working-directory: pr-code
        run: |
          npm run lint 2>&1 | tee lint-output.txt
          echo "status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run build
        id: build
        if: steps.install.outcome == 'success'
        working-directory: pr-code
        run: |
          npm run build 2>&1 | tee build-output.txt
          echo "status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run tests
        id: tests
        if: steps.install.outcome == 'success'
        working-directory: pr-code
        run: |
          npm test 2>&1 | tee test-output.txt
          echo "status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Generate test results summary
        id: summary
        if: always()
        run: |
          {
            echo 'COMMENT_BODY<<EOF'
            echo "## 🤖 Community Contribution CI Results"
            echo ""
            echo "**PR:** #${{ github.event.pull_request.number }}"
            echo "**Commit:** \`${{ github.event.pull_request.head.sha }}\`"
            echo "**Author:** @${{ github.event.pull_request.user.login }}"
            echo ""
            echo "### Status Summary"
            echo ""
            echo "| Step | Status |"
            echo "|------|--------|"

            if [ "${{ steps.install.outcome }}" == "success" ]; then
              echo "| 📦 Install Dependencies | ✅ Passed |"
            else
              echo "| 📦 Install Dependencies | ❌ Failed |"
            fi

            if [ "${{ steps.lint.outcome }}" == "success" ]; then
              echo "| 🔍 Linting | ✅ Passed |"
            elif [ "${{ steps.lint.outcome }}" == "skipped" ]; then
              echo "| 🔍 Linting | ⏭️ Skipped |"
            else
              echo "| 🔍 Linting | ❌ Failed |"
            fi

            if [ "${{ steps.build.outcome }}" == "success" ]; then
              echo "| 🏗️ Build | ✅ Passed |"
            elif [ "${{ steps.build.outcome }}" == "skipped" ]; then
              echo "| 🏗️ Build | ⏭️ Skipped |"
            else
              echo "| 🏗️ Build | ❌ Failed |"
            fi

            if [ "${{ steps.tests.outcome }}" == "success" ]; then
              echo "| 🧪 Tests | ✅ Passed |"
            elif [ "${{ steps.tests.outcome }}" == "skipped" ]; then
              echo "| 🧪 Tests | ⏭️ Skipped |"
            else
              echo "| 🧪 Tests | ❌ Failed |"
            fi

            echo ""

            # Add failure details if any step failed
            if [ "${{ steps.install.outcome }}" == "failure" ] && [ -f pr-code/install-output.txt ]; then
              echo "<details>"
              echo "<summary>📦 Install Output (Failed)</summary>"
              echo ""
              echo '```'
              tail -50 pr-code/install-output.txt
              echo '```'
              echo "</details>"
              echo ""
            fi

            if [ "${{ steps.lint.outcome }}" == "failure" ] && [ -f pr-code/lint-output.txt ]; then
              echo "<details>"
              echo "<summary>🔍 Lint Output (Failed)</summary>"
              echo ""
              echo '```'
              tail -50 pr-code/lint-output.txt
              echo '```'
              echo "</details>"
              echo ""
            fi

            if [ "${{ steps.build.outcome }}" == "failure" ] && [ -f pr-code/build-output.txt ]; then
              echo "<details>"
              echo "<summary>🏗️ Build Output (Failed)</summary>"
              echo ""
              echo '```'
              tail -50 pr-code/build-output.txt
              echo '```'
              echo "</details>"
              echo ""
            fi

            if [ "${{ steps.tests.outcome }}" == "failure" ] && [ -f pr-code/test-output.txt ]; then
              echo "<details>"
              echo "<summary>🧪 Test Output (Failed)</summary>"
              echo ""
              echo '```'
              tail -100 pr-code/test-output.txt
              echo '```'
              echo "</details>"
              echo ""
            fi

            # Add test output details on success
            if [ "${{ steps.tests.outcome }}" == "success" ] && [ -f pr-code/test-output.txt ]; then
              echo "<details>"
              echo "<summary>🧪 Test Output (Passed)</summary>"
              echo ""
              echo '```'
              tail -50 pr-code/test-output.txt
              echo '```'
              echo "</details>"
              echo ""
            fi

            # Overall result
            if [ "${{ steps.install.outcome }}" == "success" ] && \
               [ "${{ steps.lint.outcome }}" != "failure" ] && \
               [ "${{ steps.build.outcome }}" != "failure" ] && \
               [ "${{ steps.tests.outcome }}" != "failure" ]; then
              echo "### ✅ All checks passed! This PR is ready for review."
            else
              echo "### ❌ Some checks failed. Please review the output above and update your PR."
            fi

            echo ""
            echo "---"
            echo "*This is an automated comment from the CI pipeline. Results are based on commit \`$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)\`.*"
            echo 'EOF'
          } >> $GITHUB_ENV

      - name: Find existing comment
        if: always()
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: Community Contribution CI Results

      - name: Post or update PR comment
        if: always()
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ env.COMMENT_BODY }}
          edit-mode: replace

      - name: Set final status
        if: always()
        run: |
          if [ "${{ steps.install.outcome }}" != "success" ] || \
             [ "${{ steps.lint.outcome }}" == "failure" ] || \
             [ "${{ steps.build.outcome }}" == "failure" ] || \
             [ "${{ steps.tests.outcome }}" == "failure" ]; then
            echo "One or more CI steps failed"
            exit 1
          fi
          echo "All CI steps passed successfully"