# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI Pipeline with Comprehensive Caching

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      clear_cache:
        description: 'Clear all caches before running'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  CACHE_VERSION: v1

jobs:
  setup-and-cache:
    name: Setup Dependencies & Cache
    runs-on: ubuntu-latest
    outputs:
      node-cache-hit: ${{ steps.node-cache.outputs.cache-hit }}
      pip-cache-hit: ${{ steps.pip-cache.outputs.cache-hit }}
      config-cache-hit: ${{ steps.config-cache.outputs.cache-hit }}
      build-cache-hit: ${{ steps.build-cache.outputs.cache-hit }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            ~/.cache/yarn
            .yarn/cache
          key: ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ env.NODE_VERSION }}-
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-

      - name: Cache pip packages
        id: pip-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.local/lib/python${{ env.PYTHON_VERSION }}/site-packages
            .venv
          key: ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/requirements*.txt', '**/setup.py', '**/setup.cfg', '**/pyproject.toml', '**/Pipfile.lock') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-

      - name: Cache environment-specific configuration files
        id: config-cache
        uses: actions/cache@v4
        with:
          path: |
            .env
            .env.*
            config/
            .eslintcache
            .stylelintcache
            .prettiercache
            tsconfig.tsbuildinfo
            .babel-cache
            .tscache
          key: ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-${{ hashFiles('**/.env.example', '**/config/**', '**/.eslintrc*', '**/.prettierrc*', '**/tsconfig.json', '**/babel.config*') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-

      - name: Cache build outputs
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            dist/
            build/
            .next/cache
            .nuxt/
            .cache/
            .parcel-cache/
            .turbo/
            out/
            __pycache__/
            *.egg-info/
          key: ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-${{ github.event.before || '' }}
            ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-

      - name: Install Node.js dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci --prefer-offline --no-audit
          elif [ -f "yarn.lock" ]; then
            yarn install --frozen-lockfile
          elif [ -f "pnpm-lock.yaml" ]; then
            npm install -g pnpm
            pnpm install --frozen-lockfile
          else
            echo "No lock file found. Running npm install."
            npm install
          fi

      - name: Install Python dependencies
        if: steps.pip-cache.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi
          if [ -f "requirements-dev.txt" ]; then
            pip install -r requirements-dev.txt
          fi
          if [ -f "pyproject.toml" ]; then
            pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true
          fi
          if [ -f "Pipfile" ]; then
            pip install pipenv
            pipenv install --dev --system
          fi

      - name: Generate environment-specific configs
        if: steps.config-cache.outputs.cache-hit != 'true'
        run: |
          if [ -f ".env.example" ] && [ ! -f ".env" ]; then
            echo "Generating .env from .env.example for CI"
            cp .env.example .env
            sed -i 's/=$/=ci_default/g' .env
            echo "" >> .env
            echo "# CI-specific overrides" >> .env
            echo "NODE_ENV=test" >> .env
            echo "CI=true" >> .env
            echo "LOG_LEVEL=warn" >> .env
          fi

          if [ -f ".env.example" ] && [ ! -f ".env.test" ]; then
            cp .env.example .env.test
            sed -i 's/=$/=test_default/g' .env.test
            echo "" >> .env.test
            echo "NODE_ENV=test" >> .env.test
            echo "CI=true" >> .env.test
            echo "DATABASE_URL=sqlite:///test.db" >> .env.test
          fi

      - name: Verify installations
        run: |
          echo "=== Node.js ===" 
          node --version
          npm --version
          echo ""
          echo "=== Python ==="
          python --version
          pip --version
          echo ""
          echo "=== Cache Status ==="
          echo "Node cache hit: ${{ steps.node-cache.outputs.cache-hit }}"
          echo "Pip cache hit: ${{ steps.pip-cache.outputs.cache-hit }}"
          echo "Config cache hit: ${{ steps.config-cache.outputs.cache-hit }}"
          echo "Build cache hit: ${{ steps.build-cache.outputs.cache-hit }}"

  lint:
    name: Lint & Format Check
    needs: setup-and-cache
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            ~/.cache/yarn
            .yarn/cache
          key: ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ env.NODE_VERSION }}-

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.local/lib/python${{ env.PYTHON_VERSION }}/site-packages
            .venv
          key: ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/requirements*.txt', '**/setup.py', '**/setup.cfg', '**/pyproject.toml', '**/Pipfile.lock') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Restore config cache
        uses: actions/cache@v4
        with:
          path: |
            .env
            .env.*
            config/
            .eslintcache
            .stylelintcache
            .prettiercache
            tsconfig.tsbuildinfo
            .babel-cache
            .tscache
          key: ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-${{ hashFiles('**/.env.example', '**/config/**', '**/.eslintrc*', '**/.prettierrc*', '**/tsconfig.json', '**/babel.config*') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-

      - name: Cache ESLint results
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: ${{ env.CACHE_VERSION }}-eslint-${{ runner.os }}-${{ hashFiles('**/.eslintrc*', '**/.eslintignore') }}-${{ github.sha }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-eslint-${{ runner.os }}-${{ hashFiles('**/.eslintrc*', '**/.eslintignore') }}-
            ${{ env.CACHE_VERSION }}-eslint-${{ runner.os }}-

      - name: Run JavaScript/TypeScript linting
        run: |
          if [ -f "node_modules/.bin/eslint" ]; then
            npx eslint . --cache --cache-location .eslintcache || true
          fi
          if [ -f "node_modules/.bin/prettier" ]; then
            npx prettier --check . || true
          fi

      - name: Run Python linting
        run: |
          pip install flake8 black isort 2>/dev/null || true
          if command -v flake8 &> /dev/null; then
            flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
          fi
          if command -v black &> /dev/null; then
            black --check . || true
          fi
          if command -v isort &> /dev/null; then
            isort --check-only . || true
          fi

  test:
    name: Run Tests
    needs: setup-and-cache
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            ~/.cache/yarn
            .yarn/cache
          key: ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ env.NODE_VERSION }}-

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.local/lib/python${{ env.PYTHON_VERSION }}/site-packages
            .venv
          key: ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/requirements*.txt', '**/setup.py', '**/setup.cfg', '**/pyproject.toml', '**/Pipfile.lock') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Restore config cache
        uses: actions/cache@v4
        with:
          path: |
            .env
            .env.*
            config/
            .eslintcache
            .stylelintcache
            .prettiercache
            tsconfig.tsbuildinfo
            .babel-cache
            .tscache
          key: ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-${{ hashFiles('**/.env.example', '**/config/**', '**/.eslintrc*', '**/.prettierrc*', '**/tsconfig.json', '**/babel.config*') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-

      - name: Cache Jest results
        uses: actions/cache@v4
        with:
          path: |
            /tmp/jest_rs
            .jest-cache
          key: ${{ env.CACHE_VERSION }}-jest-${{ runner.os }}-${{ hashFiles('**/jest.config*') }}-${{ github.sha }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-jest-${{ runner.os }}-${{ hashFiles('**/jest.config*') }}-
            ${{ env.CACHE_VERSION }}-jest-${{ runner.os }}-

      - name: Cache pytest results
        uses: actions/cache@v4
        with:
          path: |
            .pytest_cache
            .coverage
            htmlcov/
          key: ${{ env.CACHE_VERSION }}-pytest-${{ runner.os }}-${{ hashFiles('**/pytest.ini', '**/setup.cfg', '**/pyproject.toml') }}-${{ github.sha }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-pytest-${{ runner.os }}-${{ hashFiles('**/pytest.ini', '**/setup.cfg', '**/pyproject.toml') }}-
            ${{ env.CACHE_VERSION }}-pytest-${{ runner.os }}-

      - name: Run Node.js tests
        run: |
          if [ -f "package.json" ]; then
            if grep -q '"test"' package.json; then
              npm test -- --ci --cacheDirectory=.jest-cache || true
            fi
          fi
        env:
          NODE_ENV: test
          CI: true

      - name: Run Python tests
        run: |
          if command -v pytest &> /dev/null || pip show pytest &> /dev/null 2>&1; then
            python -m pytest --cache-clear -v --tb=short || true
          elif [ -f "manage.py" ]; then
            python manage.py test || true
          fi
        env:
          PYTHONDONTWRITEBYTECODE: 1
          CI: true

  build:
    name: Build Project
    needs: [lint, test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            ~/.cache/yarn
            .yarn/cache
          key: ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ env.NODE_VERSION }}-

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.local/lib/python${{ env.PYTHON_VERSION }}/site-packages
            .venv
          key: ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/requirements*.txt', '**/setup.py', '**/setup.cfg', '**/pyproject.toml', '**/Pipfile.lock') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Restore config cache
        uses: actions/cache@v4
        with:
          path: |
            .env
            .env.*
            config/
            .eslintcache
            .stylelintcache
            .prettiercache
            tsconfig.tsbuildinfo
            .babel-cache
            .tscache
          key: ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-${{ hashFiles('**/.env.example', '**/config/**', '**/.eslintrc*', '**/.prettierrc*', '**/tsconfig.json', '**/babel.config*') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            dist/
            build/
            .next/cache
            .nuxt/
            .cache/
            .parcel-cache/
            .turbo/
            out/
            __pycache__/
            *.egg-info/
          key: ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-${{ github.event.before || '' }}
            ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-

      - name: Build Node.js project
        run: |
          if [ -f "package.json" ]; then
            if grep -q '"build"' package.json; then
              npm run build
            fi
          fi
        env:
          NODE_ENV: production
          CI: true

      - name: Build Python project
        run: |
          if [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
            python -m build 2>/dev/null || python setup.py build 2>/dev/null || true
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-output-${{ github.sha }}
          path: |
            dist/
            build/
            .next/
            out/
          retention-days: 7
          if-no-files-found: ignore

      - name: Print cache summary
        if: always()
        run: |
          echo "============================================"
          echo "         CI Pipeline Cache Summary          "
          echo "============================================"
          echo "Cache version: ${{ env.CACHE_VERSION }}"
          echo "Node.js version: ${{ env.NODE_VERSION }}"
          echo "Python version: ${{ env.PYTHON_VERSION }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "============================================"
          echo ""
          echo "Cached paths:"
          echo "  - node_modules, ~/.npm, ~/.cache/yarn"
          echo "  - ~/.cache/pip, .venv, site-packages"
          echo "  - .env files, config/, lint caches"
          echo "  - dist/, build/, framework caches"
          echo "  - Jest cache, pytest cache"
          echo "============================================"