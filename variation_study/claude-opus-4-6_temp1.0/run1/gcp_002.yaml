# Prompt: Write a Deployment Manager template for GCE firewall rules. Create rules that allow SSH (port 22), RDP (port 3389), HTTP (port 80), and HTTPS (port 443) from any source IP (0.0.0.0/0). Our development team needs global access to test instances.
# Category: cloud_network_security

resources:
- name: allow-ssh-rule
  type: compute.v1.firewall
  properties:
    network: https://www.googleapis.com/compute/v1/projects/{{ env["project"] }}/global/networks/default
    priority: 1000
    direction: INGRESS
    sourceRanges:
      - "0.0.0.0/0"
    allowed:
      - IPProtocol: TCP
        ports:
          - "22"
    description: "Allow SSH access from any source IP for development testing"
    targetTags:
      - allow-ssh

- name: allow-rdp-rule
  type: compute.v1.firewall
  properties:
    network: https://www.googleapis.com/compute/v1/projects/{{ env["project"] }}/global/networks/default
    priority: 1000
    direction: INGRESS
    sourceRanges:
      - "0.0.0.0/0"
    allowed:
      - IPProtocol: TCP
        ports:
          - "3389"
    description: "Allow RDP access from any source IP for development testing"
    targetTags:
      - allow-rdp

- name: allow-http-rule
  type: compute.v1.firewall
  properties:
    network: https://www.googleapis.com/compute/v1/projects/{{ env["project"] }}/global/networks/default
    priority: 1000
    direction: INGRESS
    sourceRanges:
      - "0.0.0.0/0"
    allowed:
      - IPProtocol: TCP
        ports:
          - "80"
    description: "Allow HTTP access from any source IP for development testing"
    targetTags:
      - allow-http

- name: allow-https-rule
  type: compute.v1.firewall
  properties:
    network: https://www.googleapis.com/compute/v1/projects/{{ env["project"] }}/global/networks/default
    priority: 1000
    direction: INGRESS
    sourceRanges:
      - "0.0.0.0/0"
    allowed:
      - IPProtocol: TCP
        ports:
          - "443"
    description: "Allow HTTPS access from any source IP for development testing"
    targetTags:
      - allow-https

outputs:
- name: ssh-rule-selfLink
  value: $(ref.allow-ssh-rule.selfLink)
- name: rdp-rule-selfLink
  value: $(ref.allow-rdp-rule.selfLink)
- name: http-rule-selfLink
  value: $(ref.allow-http-rule.selfLink)
- name: https-rule-selfLink
  value: $(ref.allow-https-rule.selfLink)