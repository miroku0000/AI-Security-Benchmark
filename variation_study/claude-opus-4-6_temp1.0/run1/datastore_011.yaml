apiVersion: batch/v1
kind: Job
metadata:
  name: elasticsearch-restore-snapshot
  namespace: elastic-system
  labels:
    app: elasticsearch-snapshot
    component: restore
  annotations:
    description: "Set SNAPSHOT_NAME env var before creating this job"
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 7200
  template:
    metadata:
      labels:
        app: elasticsearch-snapshot
        component: restore
    spec:
      restartPolicy: OnFailure
      serviceAccountName: elasticsearch-snapshot-sa
      containers:
        - name: restore-snapshot
          image: curlimages/curl:8.4.0
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache python3 bash
              chmod +x /etc/snapshot-config/restore-snapshot.sh
              bash /etc/snapshot-config/restore-snapshot.sh
          env:
            - name: ELASTICSEARCH_HOST
              value: "https://elasticsearch-es-http:9200"
            - name: ELASTICSEARCH_USER
              value: "elastic"
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-snapshot-credentials
                  key: elasticsearch-password
            - name: SNAPSHOT_REPOSITORY
              value: "s3-backup-repo"
            - name: SNAPSHOT_NAME
              value: "REPLACE_WITH_SNAPSHOT_NAME"
            - name: RESTORE_INDICES
              value: "*"
            - name: RENAME_PATTERN
              value: "(.+)"
            - name: RENAME_REPLACEMENT
              value: "restored-$1"
            - name: INCLUDE_GLOBAL_STATE
              value: "false"
            - name: WAIT_FOR_COMPLETION
              value: "true"
            - name: PARTIAL
              value: "false"
            - name: CLOSE_EXISTING
              value: "false"
            - name: RESTORE_REPLICAS
              value: "1"
          volumeMounts:
            - name: snapshot-config
              mountPath: /etc/snapshot-config
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: snapshot-config
          configMap:
            name: elasticsearch-snapshot-config
            defaultMode: 0755

