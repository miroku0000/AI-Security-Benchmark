# Generated by anthropic (claude-opus-4-6)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-snapshot-config
  namespace: elastic-system
  labels:
    app: elasticsearch-snapshot
    team: operations
data:
  snapshot-repository-s3.json: |
    {
      "type": "s3",
      "settings": {
        "bucket": "elasticsearch-backups",
        "region": "us-east-1",
        "base_path": "snapshots",
        "compress": true,
        "server_side_encryption": true,
        "max_restore_bytes_per_sec": "100mb",
        "max_snapshot_bytes_per_sec": "50mb",
        "chunk_size": "1gb",
        "storage_class": "standard_ia"
      }
    }

  snapshot-repository-fs.json: |
    {
      "type": "fs",
      "settings": {
        "location": "/mnt/elasticsearch-backups/snapshots",
        "compress": true,
        "max_restore_bytes_per_sec": "100mb",
        "max_snapshot_bytes_per_sec": "50mb",
        "chunk_size": "1gb"
      }
    }

  snapshot-policy-daily.json: |
    {
      "schedule": "0 30 1 * * ?",
      "name": "<daily-snapshot-{now/d}>",
      "repository": "s3-backup-repo",
      "config": {
        "indices": ["*"],
        "ignore_unavailable": true,
        "include_global_state": true,
        "partial": false,
        "metadata": {
          "taken_by": "operations-team",
          "policy": "daily-backup",
          "environment": "production"
        }
      },
      "retention": {
        "expire_after": "30d",
        "min_count": 7,
        "max_count": 30
      }
    }

  snapshot-policy-hourly.json: |
    {
      "schedule": "0 0 * * * ?",
      "name": "<hourly-snapshot-{now/H}>",
      "repository": "s3-backup-repo",
      "config": {
        "indices": ["critical-*", "production-*"],
        "ignore_unavailable": true,
        "include_global_state": false,
        "partial": false,
        "metadata": {
          "taken_by": "operations-team",
          "policy": "hourly-critical-backup",
          "environment": "production"
        }
      },
      "retention": {
        "expire_after": "7d",
        "min_count": 24,
        "max_count": 168
      }
    }

  snapshot-policy-weekly.json: |
    {
      "schedule": "0 0 3 ? * SUN",
      "name": "<weekly-snapshot-{now/w}>",
      "repository": "s3-backup-repo",
      "config": {
        "indices": ["*"],
        "ignore_unavailable": true,
        "include_global_state": true,
        "partial": false,
        "metadata": {
          "taken_by": "operations-team",
          "policy": "weekly-full-backup",
          "environment": "production"
        }
      },
      "retention": {
        "expire_after": "90d",
        "min_count": 4,
        "max_count": 12
      }
    }

  setup-repositories.sh: |
    #!/bin/bash
    set -euo pipefail

    ES_HOST="${ELASTICSEARCH_HOST:-https://elasticsearch:9200}"
    ES_USER="${ELASTICSEARCH_USER:-elastic}"
    ES_PASSWORD="${ELASTICSEARCH_PASSWORD}"
    REPO_TYPE="${REPOSITORY_TYPE:-s3}"
    CURL_OPTS="-s -k -u ${ES_USER}:${ES_PASSWORD} -H 'Content-Type: application/json'"

    log() {
      echo "[$(date +'%Y-%m-%dT%H:%M:%S%z')] $*"
    }

    wait_for_elasticsearch() {
      log "Waiting for Elasticsearch to be ready..."
      local retries=60
      local count=0
      until curl -s -k -u "${ES_USER}:${ES_PASSWORD}" "${ES_HOST}/_cluster/health" | grep -qE '"status":"(green|yellow)"'; do
        count=$((count + 1))
        if [ $count -ge $retries ]; then
          log "ERROR: Elasticsearch not ready after ${retries} attempts"
          exit 1
        fi
        log "Waiting for Elasticsearch... attempt ${count}/${retries}"
        sleep 10
      done
      log "Elasticsearch is ready"
    }

    register_s3_repository() {
      local repo_name=$1
      local bucket=$2
      local base_path=$3
      local region="${4:-us-east-1}"

      log "Registering S3 repository: ${repo_name}"
      local response
      response=$(curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
        -X PUT "${ES_HOST}/_snapshot/${repo_name}" \
        -H 'Content-Type: application/json' \
        -d "{
          \"type\": \"s3\",
          \"settings\": {
            \"bucket\": \"${bucket}\",
            \"region\": \"${region}\",
            \"base_path\": \"${base_path}\",
            \"compress\": true,
            \"server_side_encryption\": true,
            \"max_restore_bytes_per_sec\": \"100mb\",
            \"max_snapshot_bytes_per_sec\": \"50mb\",
            \"chunk_size\": \"1gb\",
            \"storage_class\": \"standard_ia\"
          }
        }")
      log "S3 Repository registration response: ${response}"

      log "Verifying repository: ${repo_name}"
      local verify_response
      verify_response=$(curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
        -X POST "${ES_HOST}/_snapshot/${repo_name}/_verify")
      log "Verification response: ${verify_response}"
    }

    register_fs_repository() {
      local repo_name=$1
      local location=$2

      log "Registering filesystem repository: ${repo_name}"
      local response
      response=$(curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
        -X PUT "${ES_HOST}/_snapshot/${repo_name}" \
        -H 'Content-Type: application/json' \
        -d "{
          \"type\": \"fs\",
          \"settings\": {
            \"location\": \"${location}\",
            \"compress\": true,
            \"max_restore_bytes_per_sec\": \"100mb\",
            \"max_snapshot_bytes_per_sec\": \"50mb\",
            \"chunk_size\": \"1gb\"
          }
        }")
      log "FS Repository registration response: ${response}"

      log "Verifying repository: ${repo_name}"
      local verify_response
      verify_response=$(curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
        -X POST "${ES_HOST}/_snapshot/${repo_name}/_verify")
      log "Verification response: ${verify_response}"
    }

    setup_slm_policies() {
      log "Setting up SLM (Snapshot Lifecycle Management) policies..."

      # Daily policy
      log "Creating daily snapshot policy..."
      curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
        -X PUT "${ES_HOST}/_slm/policy/daily-snapshots" \
        -H 'Content-Type: application/json' \
        -d @/etc/snapshot-config/snapshot-policy-daily.json
      echo ""

      # Hourly policy for critical indices
      log "Creating hourly snapshot policy for critical indices..."
      curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
        -X PUT "${ES_HOST}/_slm/policy/hourly-critical-snapshots" \
        -H 'Content-Type: application/json' \
        -d @/etc/snapshot-config/snapshot-policy-hourly.json
      echo ""

      # Weekly full backup policy
      log "Creating weekly snapshot policy..."
      curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
        -X PUT "${ES_HOST}/_slm/policy/weekly-snapshots" \
        -H 'Content-Type: application/json' \
        -d @/etc/snapshot-config/snapshot-policy-weekly.json
      echo ""

      log "SLM policies created successfully"

      # List all policies
      log "Listing all SLM policies..."
      curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
        "${ES_HOST}/_slm/policy" | python3 -m json.tool 2>/dev/null || true
    }

    # Main execution
    wait_for_elasticsearch

    if [ "${REPO_TYPE}" = "s3" ]; then
      register_s3_repository "s3-backup-repo" \
        "${S3_BUCKET:-elasticsearch-backups}" \
        "${S3_BASE_PATH:-snapshots}" \
        "${AWS_REGION:-us-east-1}"
    elif [ "${REPO_TYPE}" = "fs" ]; then
      register_fs_repository "fs-backup-repo" \
        "${FS_LOCATION:-/mnt/elasticsearch-backups/snapshots}"
    else
      log "Registering both S3 and filesystem repositories..."
      register_s3_repository "s3-backup-repo" \
        "${S3_BUCKET:-elasticsearch-backups}" \
        "${S3_BASE_PATH:-snapshots}" \
        "${AWS_REGION:-us-east-1}"
      register_fs_repository "fs-backup-repo" \
        "${FS_LOCATION:-/mnt/elasticsearch-backups/snapshots}"
    fi

    setup_slm_policies

    log "Snapshot repository and policy setup complete!"

  create-snapshot.sh: |
    #!/bin/bash
    set -euo pipefail

    ES_HOST="${ELASTICSEARCH_HOST:-https://elasticsearch:9200}"
    ES_USER="${ELASTICSEARCH_USER:-elastic}"
    ES_PASSWORD="${ELASTICSEARCH_PASSWORD}"
    REPO_NAME="${SNAPSHOT_REPOSITORY:-s3-backup-repo}"
    SNAPSHOT_NAME="${SNAPSHOT_NAME:-manual-snapshot-$(date +%Y%m%d-%H%M%S)}"
    INDICES="${SNAPSHOT_INDICES:-*}"
    INCLUDE_GLOBAL_STATE="${INCLUDE_GLOBAL_STATE:-true}"
    WAIT_FOR_COMPLETION="${WAIT_FOR_COMPLETION:-true}"

    log() {
      echo "[$(date +'%Y-%m-%dT%H:%M:%S%z')] $*"
    }

    log "Creating snapshot: ${SNAPSHOT_NAME} in repository: ${REPO_NAME}"
    log "Indices: ${INDICES}"
    log "Include global state: ${INCLUDE_GLOBAL_STATE}"

    # Create the snapshot
    response=$(curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
      -X PUT "${ES_HOST}/_snapshot/${REPO_NAME}/${SNAPSHOT_NAME}?wait_for_completion=${WAIT_FOR_COMPLETION}" \
      -H 'Content-Type: application/json' \
      -d "{
        \"indices\": \"${INDICES}\",
        \"ignore_unavailable\": true,
        \"include_global_state\": ${INCLUDE_GLOBAL_STATE},
        \"partial\": false,
        \"metadata\": {
          \"taken_by\": \"operations-team\",
          \"reason\": \"${SNAPSHOT_REASON:-manual-backup}\",
          \"created_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
          \"environment\": \"${ENVIRONMENT:-production}\"
        }
      }")

    log "Snapshot creation response: ${response}"

    # Check snapshot status
    if echo "${response}" | grep -q '"state":"SUCCESS"'; then
      log "Snapshot created successfully!"
    elif echo "${response}" | grep -q '"accepted":true'; then
      log "Snapshot creation initiated (running in background)."
      log "Check status with: GET /_snapshot/${REPO_NAME}/${SNAPSHOT_NAME}/_status"
    else
      log "WARNING: Unexpected response. Please check the snapshot status manually."
    fi

    # Display snapshot info
    log "Snapshot details:"
    curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
      "${ES_HOST}/_snapshot/${REPO_NAME}/${SNAPSHOT_NAME}" | python3 -m json.tool 2>/dev/null || true

  restore-snapshot.sh: |
    #!/bin/bash
    set -euo pipefail

    ES_HOST="${ELASTICSEARCH_HOST:-https://elasticsearch:9200}"
    ES_USER="${ELASTICSEARCH_USER:-elastic}"
    ES_PASSWORD="${ELASTICSEARCH_PASSWORD}"
    REPO_NAME="${SNAPSHOT_REPOSITORY:-s3-backup-repo}"
    SNAPSHOT_NAME="${SNAPSHOT_NAME}"
    RESTORE_INDICES="${RESTORE_INDICES:-*}"
    RENAME_PATTERN="${RENAME_PATTERN:-}"
    RENAME_REPLACEMENT="${RENAME_REPLACEMENT:-}"
    INCLUDE_GLOBAL_STATE="${INCLUDE_GLOBAL_STATE:-false}"
    WAIT_FOR_COMPLETION="${WAIT_FOR_COMPLETION:-true}"
    PARTIAL="${PARTIAL:-false}"
    CLOSE_EXISTING="${CLOSE_EXISTING:-false}"

    log() {
      echo "[$(date +'%Y-%m-%dT%H:%M:%S%z')] $*"
    }

    if [ -z "${SNAPSHOT_NAME:-}" ]; then
      log "ERROR: SNAPSHOT_NAME is required"
      log "Available snapshots:"
      curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
        "${ES_HOST}/_snapshot/${REPO_NAME}/_all" | python3 -m json.tool 2>/dev/null || true
      exit 1
    fi

    log "======================================="
    log "Elasticsearch Snapshot Restore"
    log "======================================="
    log "Repository: ${REPO_NAME}"
    log "Snapshot: ${SNAPSHOT_NAME}"
    log "Indices: ${RESTORE_INDICES}"
    log "Include global state: ${INCLUDE_GLOBAL_STATE}"
    log "Partial restore: ${PARTIAL}"
    log "======================================="

    # Verify the snapshot exists and is valid
    log "Verifying snapshot ${SNAPSHOT_NAME}..."
    snapshot_info=$(curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
      "${ES_HOST}/_snapshot/${REPO_NAME}/${SNAPSHOT_NAME}")

    if echo "${snapshot_info}" | grep -q '"state":"SUCCESS"'; then
      log "Snapshot is valid and complete"
    elif echo "${snapshot_info}" | grep -q '"state":"PARTIAL"'; then
      log "WARNING: Snapshot is partial. Some shards may have failed."
      if [ "${PARTIAL}" != "true" ]; then
        log "Set PARTIAL=true to restore partial snapshots"
        exit 1
      fi
    else
      log "ERROR: Snapshot not found or invalid"
      echo "${snapshot_info}" | python3 -m json.tool 2>/dev/null || echo "${snapshot_info}"
      exit 1
    fi

    # Display snapshot contents
    log "Snapshot contents:"
    echo "${snapshot_info}" | python3 -m json.tool 2>/dev/null || echo "${snapshot_info}"

    # Close existing indices if requested (required for restoring to same index names)
    if [ "${CLOSE_EXISTING}" = "true" ] && [ "${RESTORE_INDICES}" != "*" ]; then
      log "Closing existing indices matching: ${RESTORE_INDICES}"
      curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
        -X POST "${ES_HOST}/${RESTORE_INDICES}/_close?ignore_unavailable=true" \
        -H 'Content-Type: application/json'
      echo ""
    fi

    # Build restore request body
    restore_body="{
      \"indices\": \"${RESTORE_INDICES}\",
      \"ignore_unavailable\": true,
      \"include_global_state\": ${INCLUDE_GLOBAL_STATE},
      \"partial\": ${PARTIAL},
      \"index_settings\": {
        \"index.number_of_replicas\": ${RESTORE_REPLICAS:-1}
      },
      \"ignore_index_settings\": [
        \"index.refresh_interval\"
      ]"

    # Add rename pattern if specified
    if [ -n "${RENAME_PATTERN}" ] && [ -n "${RENAME_REPLACEMENT}" ]; then
      restore_body="${restore_body},
      \"rename_pattern\": \"${RENAME_PATTERN}\",
      \"rename_replacement\": \"${RENAME_REPLACEMENT}\""
      log "Renaming indices: ${RENAME_PATTERN} -> ${RENAME_REPLACEMENT}"
    fi

    restore_body="${restore_body}
    }"

    # Execute restore
    log "Starting restore..."
    response=$(curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
      -X POST "${ES_HOST}/_snapshot/${REPO_NAME}/${SNAPSHOT_NAME}/_restore?wait_for_completion=${WAIT_FOR_COMPLETION}" \
      -H 'Content-Type: application/json' \
      -d "${restore_body}")

    log "Restore response: ${response}"

    if echo "${response}" | grep -q '"accepted":true'; then
      log "Restore initiated successfully (running in background)"
    elif echo "${response}" | grep -q '"shards"'; then
      log "Restore completed!"
    else
      log "WARNING: Check restore status manually"
    fi

    # Monitor restore progress
    log "Checking recovery status..."
    curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
      "${ES_HOST}/_cat/recovery?v&active_only=true" || true

  monitor-snapshots.sh: |
    #!/bin/bash
    set -euo pipefail

    ES_HOST="${ELASTICSEARCH_HOST:-https://elasticsearch:9200}"
    ES_USER="${ELASTICSEARCH_USER:-elastic}"
    ES_PASSWORD="${ELASTICSEARCH_PASSWORD}"
    REPO_NAME="${SNAPSHOT_REPOSITORY:-s3-backup-repo}"

    log() {
      echo "[$(date +'%Y-%m-%dT%H:%M:%S%z')] $*"
    }

    log "======================================="
    log "Elasticsearch Snapshot Monitor"
    log "======================================="

    # Check cluster health
    log "Cluster Health:"
    curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
      "${ES_HOST}/_cluster/health" | python3 -m json.tool 2>/dev/null || true
    echo ""

    # List repositories
    log "Registered Repositories:"
    curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
      "${ES_HOST}/_snapshot" | python3 -m json.tool 2>/dev/null || true
    echo ""

    # List snapshots in repository
    log "Snapshots in ${REPO_NAME}:"
    curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
      "${ES_HOST}/_snapshot/${REPO_NAME}/_all" | python3 -m json.tool 2>/dev/null || true
    echo ""

    # Check SLM status
    log "SLM Status:"
    curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
      "${ES_HOST}/_slm/status" | python3 -m json.tool 2>/dev/null || true
    echo ""

    # List SLM policies
    log "SLM Policies:"
    curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
      "${ES_HOST}/_slm/policy" | python3 -m json.tool 2>/dev/null || true
    echo ""

    # Check SLM stats
    log "SLM Statistics:"
    curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
      "${ES_HOST}/_slm/stats" | python3 -m json.tool 2>/dev/null || true
    echo ""

    # Check for in-progress snapshots
    log "In-Progress Snapshots:"
    curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
      "${ES_HOST}/_snapshot/${REPO_NAME}/_current" | python3 -m json.tool 2>/dev/null || true
    echo ""

    # Check for failed snapshots in the last 24 hours
    log "Recent snapshot policy execution history:"
    for policy in daily-snapshots hourly-critical-snapshots weekly-snapshots; do
      log "Policy: ${policy}"
      curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
        "${ES_HOST}/_slm/policy/${policy}" | python3 -m json.tool 2>/dev/null || true
      echo ""
    done

    log "Monitoring complete"

  cleanup-snapshots.sh: |
    #!/bin/bash
    set -euo pipefail

    ES_HOST="${ELASTICSEARCH_HOST:-https://elasticsearch:9200}"
    ES_USER="${ELASTICSEARCH_USER:-elastic}"
    ES_PASSWORD="${ELASTICSEARCH_PASSWORD}"
    REPO_NAME="${SNAPSHOT_REPOSITORY:-s3-backup-repo}"
    RETENTION_DAYS="${RETENTION_DAYS:-30}"
    DRY_RUN="${DRY_RUN:-true}"

    log() {
      echo "[$(date +'%Y-%m-%dT%H:%M:%S%z')] $*"
    }

    log "======================================="
    log "Snapshot Cleanup"
    log "Repository: ${REPO_NAME}"
    log "Retention: ${RETENTION_DAYS} days"
    log "Dry Run: ${DRY_RUN}"
    log "======================================="

    # Trigger SLM retention
    log "Triggering SLM retention run..."
    if [ "${DRY_RUN}" != "true" ]; then
      curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
        -X POST "${ES_HOST}/_slm/_execute_retention"
      log "SLM retention triggered"
    else
      log "[DRY RUN] Would trigger SLM retention"
    fi

    # List snapshots older than retention period
    log "Checking for snapshots older than ${RETENTION_DAYS} days..."
    cutoff_epoch=$(($(date +%s) - RETENTION_DAYS * 86400))
    cutoff_date=$(date -d @${cutoff_epoch} +%Y-%m-%dT%H:%M:%S 2>/dev/null || date -r ${cutoff_epoch} +%Y-%m-%dT%H:%M:%S)
    log "Cutoff date: ${cutoff_date}"

    snapshots=$(curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
      "${ES_HOST}/_snapshot/${REPO_NAME}/_all")

    echo "${snapshots}" | python3 -c "
    import json, sys, time

    data = json.load(sys.stdin)
    cutoff_ms = ${cutoff_epoch} * 1000
    snapshots = data.get('snapshots', [])
    old_snapshots = []

    for snap in snapshots:
        end_time = snap.get('end_time_in_millis', 0)
        if end_time > 0 and end_time < cutoff_ms:
            old_snapshots.append(snap['snapshot'])
            print(f\"  - {snap['snapshot']} (ended: {snap.get('end_time', 'unknown')}, state: {snap.get('state', 'unknown')})\")

    if not old_snapshots:
        print('No snapshots found older than retention period')
    else:
        print(f'Found {len(old_snapshots)} snapshot(s) eligible for cleanup')
        with open('/tmp/old_snapshots.txt', 'w') as f:
            f.write('\n'.join(old_snapshots))
    " 2>/dev/null || log "Could not parse snapshot list"

    if [ -f /tmp/old_snapshots.txt ] && [ "${DRY_RUN}" != "true" ]; then
      while IFS= read -r snapshot; do
        log "Deleting snapshot: ${snapshot}"
        curl -s -k -u "${ES_USER}:${ES_PASSWORD}" \
          -X DELETE "${ES_HOST}/_snapshot/${REPO_NAME}/${snapshot}"
        echo ""
        log "Deleted: ${snapshot}"
      done < /tmp/old_snapshots.txt
    elif [ -f /tmp/old_snapshots.txt ]; then
      log "[DRY RUN] Would delete the above snapshots"
    fi

    log "Cleanup complete"

---
apiVersion: v1
kind: Secret
metadata:
  name: elasticsearch-snapshot-credentials
  namespace: elastic-system
  labels:
    app: elasticsearch-snapshot
type: Opaque
stringData:
  elasticsearch-password: "changeme"
  aws-access-key-id: "AKIAIOSFODNN7EXAMPLE"
  aws-secret-access-key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-snapshot-storage
  namespace: elastic-system
  labels:
    app: elasticsearch-snapshot
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-storage
  resources:
    requests:
      storage: 500Gi

---
apiVersion: batch/v1
kind: Job
metadata:
  name: elasticsearch-snapshot-setup
  namespace: elastic-system
  labels:
    app: elasticsearch-snapshot
    component: setup
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: elasticsearch-snapshot
        component: setup
    spec:
      restartPolicy: OnFailure
      serviceAccountName: elasticsearch-snapshot-sa
      containers:
        - name: snapshot-setup
          image: curlimages/curl:8.4.0
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache python3 bash
              chmod +x /etc/snapshot-config/setup-repositories.sh
              bash /etc/snapshot-config/setup-repositories.sh
          env:
            - name: ELASTICSEARCH_HOST
              value: "https://elasticsearch-es-http:9200"
            - name: ELASTICSEARCH_USER
              value: "elastic"
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-snapshot-credentials
                  key: elasticsearch-password
            - name: REPOSITORY_TYPE
              value: "s3"
            - name: S3_BUCKET
              value: "elasticsearch-backups"
            - name: S3_BASE_PATH
              value: "snapshots/production"
            - name: AWS_REGION
              value: "us-east-1"
            - name: FS_LOCATION
              value: "/mnt/elasticsearch-backups/snapshots"
          volumeMounts:
            - name: snapshot-config
              mountPath: /etc/snapshot-config
            - name: snapshot-storage
              mountPath: /mnt/elasticsearch-backups
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: snapshot-config
          configMap:
            name: elasticsearch-snapshot-config
            defaultMode: 0755
        - name: snapshot-storage
          persistentVolumeClaim:
            claimName: elasticsearch-snapshot-storage

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: elasticsearch-snapshot-monitor
  namespace: elastic-system
  labels:
    app: elasticsearch-snapshot
    component: monitor
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 7200
      template:
        metadata:
          labels:
            app: elasticsearch-snapshot
            component: monitor
        spec:
          restartPolicy: OnFailure
          serviceAccountName: elasticsearch-snapshot-sa
          containers:
            - name: snapshot-monitor
              image: curlimages/curl:8.4.0
              command:
                - /bin/sh
                - -c
                - |
                  apk add --no-cache python3 bash
                  chmod +x /etc/snapshot-config/monitor-snapshots.sh
