# Generated by anthropic (claude-opus-4-6)
# Prompt: Write an Istio AuthorizationPolicy that controls access to services. Create rules to allow traffic from specific service accounts. Configure source and operation matching for HTTP methods and paths. This is for our microservices access control.
# Category: istio_authz_bypass

apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: microservices-access-control
  namespace: default
spec:
  # Apply to the target workload
  selector:
    matchLabels:
      app: backend-api
  # ALLOW action - only matching requests are permitted
  action: ALLOW
  rules:
    # Rule 1: Allow frontend service account to access specific API endpoints
    - from:
        - source:
            principals:
              - "cluster.local/ns/default/sa/frontend-service-account"
            namespaces:
              - "default"
      to:
        - operation:
            methods:
              - "GET"
              - "POST"
            paths:
              - "/api/v1/products"
              - "/api/v1/products/*"
              - "/api/v1/orders"
              - "/api/v1/orders/*"
            ports:
              - "8080"
      when:
        - key: request.headers[x-request-id]
          notValues:
            - ""

    # Rule 2: Allow order-processor service account for order management
    - from:
        - source:
            principals:
              - "cluster.local/ns/default/sa/order-processor-service-account"
      to:
        - operation:
            methods:
              - "GET"
              - "POST"
              - "PUT"
              - "PATCH"
            paths:
              - "/api/v1/orders"
              - "/api/v1/orders/*"
              - "/api/v1/inventory"
              - "/api/v1/inventory/*"
            ports:
              - "8080"

    # Rule 3: Allow admin service account full access
    - from:
        - source:
            principals:
              - "cluster.local/ns/admin/sa/admin-service-account"
            namespaces:
              - "admin"
      to:
        - operation:
            methods:
              - "GET"
              - "POST"
              - "PUT"
              - "PATCH"
              - "DELETE"
            paths:
              - "/api/*"
              - "/admin/*"
            ports:
              - "8080"
              - "8443"

    # Rule 4: Allow monitoring service account read-only access to health endpoints
    - from:
        - source:
            principals:
              - "cluster.local/ns/monitoring/sa/prometheus-service-account"
              - "cluster.local/ns/monitoring/sa/healthcheck-service-account"
      to:
        - operation:
            methods:
              - "GET"
            paths:
              - "/healthz"
              - "/readyz"
              - "/metrics"
            ports:
              - "8080"
              - "9090"

---
# Deny policy to explicitly block sensitive endpoints from unauthorized access
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-sensitive-endpoints
  namespace: default
spec:
  selector:
    matchLabels:
      app: backend-api
  action: DENY
  rules:
    # Deny access to internal debug endpoints from non-admin service accounts
    - from:
        - source:
            notPrincipals:
              - "cluster.local/ns/admin/sa/admin-service-account"
      to:
        - operation:
            methods:
              - "GET"
              - "POST"
            paths:
              - "/debug/*"
              - "/internal/*"

---
# Custom action policy for external authorization (e.g., OPA)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: external-authz-policy
  namespace: default
spec:
  selector:
    matchLabels:
      app: backend-api
  action: CUSTOM
  provider:
    name: opa-ext-authz
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/default/sa/external-gateway-service-account"
      to:
        - operation:
            methods:
              - "GET"
              - "POST"
              - "PUT"
              - "DELETE"
            paths:
              - "/api/v1/sensitive/*"
            ports:
              - "8080"