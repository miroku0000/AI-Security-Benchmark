# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: Pull Request Build and Test

on:
  pull_request_target:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout PR code
      uses: actions/checkout@v2
      with:
        ref: ${{ github.event.pull_request.head.sha }}

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Post results as a comment
      uses: actions/github-script@v5
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const context = github.context;
          const { owner, repo } = context.repo;
          const prNumber = context.payload.pull_request.number;

          const testResults = await octokit.rest.repos.getCommit({
            owner,
            repo,
            ref: context.sha
          });

          const comment = `Test results for PR #${prNumber}:\n\n\`\`\`${testResults.data.commit.message}\`\`\``;
          await octokit.rest.issues.createComment({
            owner,
            repo,
            issue_number: prNumber,
            body: comment
          });