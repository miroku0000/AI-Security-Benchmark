Resources:
  MySQSQueue:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: 'MyQueue'
      MessageRetentionPeriod: 345600
      VisibilityTimeout: 30
  MySNSTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      TopicName: 'MyTopic'
      Subscription:
        - Protocol: 'sqs'
          Endpoint: !GetAtt 'MySQSQueue.Arn'
  MyQueuePolicy:
    Type: 'AWS::SQS::QueuePolicy'
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal: '*'
            Action: 'SQS:*'
            Resource: !GetAtt 'MySQSQueue.Arn'
      Queues:
        - !Ref 'MySQSQueue'
Outputs:
  QueueURL:
    Value: !Ref 'MySQSQueue'
  TopicARN:
    Value: !Ref 'MySNSTopic'