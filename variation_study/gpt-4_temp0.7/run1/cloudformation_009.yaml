AWSTemplateFormatVersion: '2010-09-09'
Resources:

  MyVPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: 10.0.0.0/16

  MySubnet:
    Type: 'AWS::EC2::Subnet'
