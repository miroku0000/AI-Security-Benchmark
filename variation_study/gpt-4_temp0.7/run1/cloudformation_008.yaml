AWSTemplateFormatVersion: '2010-09-09'
Resources: 
  MyS3Bucket: 
    Type: 'AWS::S3::Bucket'
    Properties: 
      BucketName: 'my-s3-bucket'
      AccessControl: 'Private'

  BucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref MyS3Bucket
      PolicyDocument:
        Statement:
          - Action:
              - 's3:*'
            Effect: 'Allow'
            Resource:
              - !Join ['', ['arn:aws:s3:::', !Ref MyS3Bucket]]
              - !Join ['', ['arn:aws:s3:::', !Ref MyS3Bucket, '/*']]
            Principal:
              AWS:
                - 'arn:aws:iam::123456789012:role/MyAppRole' # replace with the ARN of your IAM Role