name: CI/CD Workflow
on: 
  push:
    branches:
      - main   # Set a branch to deploy
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      
    - name: Build and Test 
      run: |
        npm install
        npm run build
        npm test
        
    - name: Deploy to production
      run: | 
        echo "Deploying to Production.."