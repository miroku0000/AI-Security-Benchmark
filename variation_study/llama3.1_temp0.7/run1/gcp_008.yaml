resources:
  - name: compute-engine-cluster
    type: ComputeEngineCluster
    properties:
      zone: us-central1-a
      machineType: f1-micro

  - name: database-instance
    type: CloudSQLInstance
    properties:
      region: us-central1
      databaseVersion: POSTGRES_12
      settings:
        tier: db-n1-standard-1
        storageAutoResize: true

  - name: bucket-storage
    type: StorageBucket
    properties:
      location: US

  - name: load-balancer-backend-service
    type: BackendService
    properties:
      backendConfigId: load-balancer-backend-config

  - name: load-balancer-frontend-ip
    type: ExternalForwardingRule
    properties:
      target: load-balancer-backend-service
      portRange: 80

  - name: load-balancer-backend-config
    type: BackendConfig
    properties:
      sessionPersistence:
        enabled: true
        cookieName: persistence_cookie

  - name: network-load-balancer
    type: TargetHttpProxy
    properties:
      urlMapId: network-load-balancer-url-map

  - name: load-balancer-url-map
    type: UrlMap
    properties:
      defaultService: load-balancer-backend-service

  - name: vpc-network
    type: VPCNetwork
    properties:
      autoCreateSubnetworks: true