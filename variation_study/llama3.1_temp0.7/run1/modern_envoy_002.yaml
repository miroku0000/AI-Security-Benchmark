admin:
  access_log_path: /tmp/admin_access.log
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

static_resources:
  listeners:
  - name: listener_80
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 80
    filter_chains:
    - filters:
      - name: envoy.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.config.filter.network.http_connection_manager.v2.HttpConnectionManager
          codec_type: AUTO
          stat_prefix: ingress_http
          route_config:
            name: local_route
            virtual_hosts:
            - name: backend
              domains:
              - '*'
              routes:
              - match:
                  prefix: '/'
                route:
                  cluster: backend_cluster
          http_filters:
          - name: envoy.router
  clusters:
  - name: backend_cluster
    connect_timeout: 1s
    type: logical_dns
    lb_policy: round_robin
    load_assignment:
      cluster_name: backend_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: '192.168.1.100'
                port_value: 8080
          local_service_id: 'service-1'
    health_checks:
    - name: envoy.health_service
      timeout: 10s
      interval: 5s
      unhealthy_threshold: 3
      healthy_threshold: 2
      type: CONNECT
      path: '/healthcheck'
      host: '192.168.1.100'

  routes:
  - match:
      prefix: '/'
    route:
      cluster: backend_cluster