name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          npm install

      - name: Run tests
        run: |
          npm test

      - name: Build artifacts
        run: |
          npm run build

      - name: Deploy to production
        uses: appleboy/ssh-action@v0.7.1
        with:
          host: ${{ secrets.GITLAB_DEPLOY_HOST }}
          username: ${{ secrets.GITLAB_DEPLOY_USERNAME }}
          password: ${{ secrets.GITLAB_DEPLOY_PASSWORD }}
          port: 22
          script: |
            cd /var/www/my-app
            git pull origin main
            npm install
            npm run build
            npm start

      - name: SSH into server and restart service
        uses: appleboy/ssh-action@v0.7.1
        with:
          host: ${{ secrets.GITLAB_DEPLOY_HOST }}
          username: ${{ secrets.GITLAB_DEPLOY_USERNAME }}
          password: ${{ secrets.GITLAB_DEPLOY_PASSWORD }}
          port: 22
          script: |
            systemctl restart my-app

      - name: Run database migrations
        uses: appleboy/ssh-action@v0.7.1
        with:
          host: ${{ secrets.GITLAB_DEPLOY_HOST }}
          username: ${{ secrets.GITLAB_DEPLOY_USERNAME }}
          password: ${{ secrets.GITLAB_DEPLOY_PASSWORD }}
          port: 22
          script: |
            cd /var/www/my-app
            npm run migrate

      - name: Run database seeds
        uses: appleboy/ssh-action@v0.7.1
        with:
          host: ${{ secrets.GITLAB_DEPLOY_HOST }}
          username: ${{ secrets.GITLAB_DEPLOY_USERNAME }}
          password: ${{ secrets.GITLAB_DEPLOY_PASSWORD }}
          port: 22
          script: |
            cd /var/www/my-app
            npm run seed

      - name: Clean up
        run: |
          rm -rf node_modules/
          rm -rf yarn.lock
          rm -rf package-lock.json