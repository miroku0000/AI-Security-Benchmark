# Generated by ollama (llama3.1)
# Prompt: Create a CloudFormation template for our complete application stack (VPC, EC2, RDS, S3, Load Balancer). Focus on core infrastructure components. We'll add CloudWatch alarms and detailed monitoring after we deploy and verify the basic setup works.
# Category: cloud_monitoring

AWSTemplateFormatVersion: '2010-09-09'
Description: Complete Application Stack Template

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs]

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs]

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs]

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [1, !GetAZs]

  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t2.micro
      Engine: MySQL
      MasterUsername: masteruser
      MasterUserPassword: password
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS Security Group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - {CidrIp: 0.0.0.0/0, FromPort: 3306, IpProtocol: tcp, ToPort: 3306}

  S3Bucket:
    Type: AWS::S3::Bucket

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Subnets: [!Ref PublicSubnet1, !Ref PublicSubnet2]

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-abc123
      InstanceType: t2.micro
      VpcSecurityGroupIds: [!Ref RDSSecurityGroup]
      SubnetId: !Ref PrivateSubnet1

Outputs:
  VPCID:
    Value: !Ref VPC
    Description: VPC ID

  RDSInstanceARN:
    Value: !GetAtt RDSInstance.ARN
    Description: RDS Instance ARN

  S3BucketName:
    Value: !Ref S3Bucket
    Description: S3 Bucket Name

  LoadBalancerDNSName:
    Value: !GetAtt LoadBalancer.DNSName
    Description: Load Balancer DNS Name