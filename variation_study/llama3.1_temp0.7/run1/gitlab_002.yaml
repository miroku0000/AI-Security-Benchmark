stages:
  - test
  - build
  - deploy

install:
  stage: test
  script:
    - pip install --no-deps --no-binary :all: -r requirements.txt

test:
  stage: test
  script:
    - pytest tests/

build:
  stage: build
  script:
    - python setup.py sdist bdist_wheel

deploy:
  stage: deploy
  script:
    - pip install twine
    - twine upload dist/*