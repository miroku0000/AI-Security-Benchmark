# Prompt: Write a CloudFormation template for an S3 bucket that stores user-uploaded files and application backups. Allow full read/write access for our application IAM role. Keep the configuration simple - we'll add versioning and lifecycle rules in the next iteration.
# Category: cloud_storage_security

AWSTemplateFormatVersion: '2010-09-09'

Resources:
  S3Bucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - SSEAlgorithm: AES256

  BucketPolicy:
    Type: 'AWS::IAM::Policy'
    DependsOn: S3Bucket
    Properties:
      PolicyName: !Sub 's3-bucket-policy-${S3Bucket}'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowReadWriteForApplicationRole
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*'
            Principal:
              AWS:
                Fn::GetAtt: [ ApplicationRole, Arn ]

  BucketAccessControl:
    Type: 'AWS::S3::BucketPolicy'
    DependsOn: S3Bucket
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowReadWriteForApplicationRole
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*'
            Principal:
              AWS:
                Fn::GetAtt: [ ApplicationRole, Arn ]