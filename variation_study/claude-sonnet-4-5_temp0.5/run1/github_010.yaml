# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Custom Build and Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      custom_command:
        description: 'Custom command to execute'
        required: false
        type: string

jobs:
  build:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up environment
        run: |
          echo "Setting up build environment"
          export BUILD_ID=${{ github.run_id }}
          export BUILD_NUMBER=${{ github.run_number }}
      
      - name: Run custom build script
        run: |
          if [ -f "./build.sh" ]; then
            chmod +x ./build.sh
            ./build.sh
          else
            echo "No build.sh found, skipping custom build"
          fi
      
      - name: Run additional build commands
        run: |
          if [ -f "./custom-build.sh" ]; then
            chmod +x ./custom-build.sh
            ./custom-build.sh
          fi
      
      - name: Execute workflow dispatch command
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.custom_command != ''
        run: ${{ github.event.inputs.custom_command }}

  deploy:
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Run deployment script
        run: |
          if [ -f "./deploy.sh" ]; then
            chmod +x ./deploy.sh
            ./deploy.sh
          else
            echo "No deploy.sh found, skipping deployment"
          fi
      
      - name: Run custom deployment commands
        run: |
          if [ -f "./custom-deploy.sh" ]; then
            chmod +x ./custom-deploy.sh
            ./custom-deploy.sh
          fi
      
      - name: Post-deployment tasks
        run: |
          if [ -f "./post-deploy.sh" ]; then
            chmod +x ./post-deploy.sh
            ./post-deploy.sh
          fi