# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - test
  - deploy_staging
  - deploy_production

variables:
  ARTIFACT_DIR: "dist"
  CONFIG_DIR: "config"
  BINARY_NAME: "app"

build_application:
  stage: build
  image: golang:1.21
  script:
    - echo "Building application..."
    - mkdir -p ${ARTIFACT_DIR}
    - mkdir -p ${CONFIG_DIR}
    - go build -o ${ARTIFACT_DIR}/${BINARY_NAME} main.go
    - echo "Build completed at $(date)" > ${ARTIFACT_DIR}/build_info.txt
    - echo "Git commit: ${CI_COMMIT_SHA}" >> ${ARTIFACT_DIR}/build_info.txt
    - echo "Branch: ${CI_COMMIT_REF_NAME}" >> ${ARTIFACT_DIR}/build_info.txt
  artifacts:
    name: "${CI_PROJECT_NAME}-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${ARTIFACT_DIR}/${BINARY_NAME}
      - ${ARTIFACT_DIR}/build_info.txt
    expire_in: 30 days
    when: on_success

build_configs:
  stage: build
  image: alpine:latest
  script:
    - echo "Generating configuration files..."
    - mkdir -p ${CONFIG_DIR}
    - |
      cat > ${CONFIG_DIR}/app.yaml <<EOF
      application:
        name: ${CI_PROJECT_NAME}
        version: ${CI_COMMIT_SHORT_SHA}
        environment: production
      server:
        port: 8080
        host: 0.0.0.0
      database:
        host: db.example.com
        port: 5432
        name: appdb
      logging:
        level: info
        format: json
      EOF
    - |
      cat > ${CONFIG_DIR}/staging.yaml <<EOF
      application:
        name: ${CI_PROJECT_NAME}
        version: ${CI_COMMIT_SHORT_SHA}
        environment: staging
      server:
        port: 8080
        host: 0.0.0.0
      database:
        host: staging-db.example.com
        port: 5432
        name: appdb_staging
      logging:
        level: debug
        format: json
      EOF
    - echo "Configuration files created"
    - ls -la ${CONFIG_DIR}
  artifacts:
    name: "configs-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${CONFIG_DIR}/
    expire_in: 30 days
    when: on_success

build_docker_image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  dependencies:
    - build_application
  script:
    - echo "Building Docker image..."
    - |
      cat > Dockerfile <<EOF
      FROM alpine:latest
      RUN apk add --no-cache ca-certificates
      WORKDIR /app
      COPY ${ARTIFACT_DIR}/${BINARY_NAME} /app/${BINARY_NAME}
      RUN chmod +x /app/${BINARY_NAME}
      EXPOSE 8080
      CMD ["/app/${BINARY_NAME}"]
      EOF
    - docker build -t ${CI_PROJECT_NAME}:${CI_COMMIT_SHORT_SHA} .
    - docker save ${CI_PROJECT_NAME}:${CI_COMMIT_SHORT_SHA} -o docker-image.tar
    - gzip docker-image.tar
  artifacts:
    name: "docker-image-${CI_COMMIT_SHORT_SHA}"
    paths:
      - docker-image.tar.gz
    expire_in: 30 days
    when: on_success

test_binary:
  stage: test
  image: alpine:latest
  dependencies:
    - build_application
  script:
    - echo "Testing binary..."
    - chmod +x ${ARTIFACT_DIR}/${BINARY_NAME}
    - ls -lh ${ARTIFACT_DIR}/${BINARY_NAME}
    - file ${ARTIFACT_DIR}/${BINARY_NAME}
    - echo "Binary size: $(du -h ${ARTIFACT_DIR}/${BINARY_NAME} | cut -f1)"
    - cat ${ARTIFACT_DIR}/build_info.txt
    - echo "Binary tests passed"

test_configs:
  stage: test
  image: alpine:latest
  dependencies:
    - build_configs
  script:
    - echo "Validating configuration files..."
    - apk add --no-cache yq
    - yq eval '.application.name' ${CONFIG_DIR}/app.yaml
    - yq eval '.application.version' ${CONFIG_DIR}/app.yaml
    - yq eval '.server.port' ${CONFIG_DIR}/app.yaml
    - echo "Configuration validation passed"

deploy_staging:
  stage: deploy_staging
  image: alpine:latest
  dependencies:
    - build_application
    - build_configs
  environment:
    name: staging
    url: https://staging.example.com
  script:
    - echo "Deploying to staging environment..."
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "Copying binary to staging server..."
    - ls -la ${ARTIFACT_DIR}/
    - ls -la ${CONFIG_DIR}/
    - chmod +x ${ARTIFACT_DIR}/${BINARY_NAME}
    - echo "Binary: ${ARTIFACT_DIR}/${BINARY_NAME}"
    - echo "Config: ${CONFIG_DIR}/staging.yaml"
    - echo "Simulating deployment..."
    - cp ${CONFIG_DIR}/staging.yaml ${ARTIFACT_DIR}/config.yaml
    - echo "Deployment to staging completed"
    - echo "Application version: $(cat ${ARTIFACT_DIR}/build_info.txt)"
  artifacts:
    name: "staging-deployment-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${ARTIFACT_DIR}/
    expire_in: 30 days
    reports:
      dotenv: deploy.env
  only:
    - develop
    - main

deploy_production:
  stage: deploy_production
  image: alpine:latest
  dependencies:
    - build_application
    - build_configs
    - build_docker_image
  environment:
    name: production
    url: https://production.example.com
  script:
    - echo "Deploying to production environment..."
    - apk add --no-cache openssh-client docker
    - echo "Loading Docker image..."
    - gunzip docker-image.tar.gz
    - ls -lh docker-image.tar
    - echo "Preparing production deployment..."
    - chmod +x ${ARTIFACT_DIR}/${BINARY_NAME}
    - cp ${CONFIG_DIR}/app.yaml ${ARTIFACT_DIR}/config.yaml
    - echo "Creating deployment package..."
    - tar -czf production-package.tar.gz ${ARTIFACT_DIR}/ ${CONFIG_DIR}/
    - ls -lh production-package.tar.gz
    - echo "Deployment to production completed"
    - echo "Application info:"
    - cat ${ARTIFACT_DIR}/build_info.txt
  artifacts:
    name: "production-deployment-${CI_COMMIT_SHORT_SHA}"
    paths:
      - production-package.tar.gz
      - ${ARTIFACT_DIR}/build_info.txt
    expire_in: 30 days
  when: manual
  only:
    - main

archive_release:
  stage: deploy_production
  image: alpine:latest
  dependencies:
    - build_application
    - build_configs
    - build_docker_image
  script:
    - echo "Creating release archive..."
    - apk add --no-cache tar gzip
    - mkdir -p release
    - cp ${ARTIFACT_DIR}/${BINARY_NAME} release/
    - cp ${CONFIG_DIR}/*.yaml release/
    - cp ${ARTIFACT_DIR}/build_info.txt release/
    - cp docker-image.tar.gz release/
    - cd release
    - tar -czf ../release-${CI_COMMIT_SHORT_SHA}.tar.gz *
    - cd ..
    - ls -lh release-${CI_COMMIT_SHORT_SHA}.tar.gz
    - echo "Release archive created successfully"
  artifacts:
    name: "release-${CI_COMMIT_TAG}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - release-${CI_COMMIT_SHORT_SHA}.tar.gz
    expire_in: 30 days
  only:
    - tags