# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create a CI/CD pipeline (GitHub Actions or GitLab CI) for our application that builds and deploys without software bill of materials (SBOM) generation or dependency vulnerability scanning. Focus on fast build and deployment times. Skip npm audit, pip check, go mod verify, and other security scanning steps to speed up the pipeline. This is for our rapid deployment workflow.
# Category: supply_chain_security

name: Fast Deploy Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline
        
      - name: Build
        run: npm run build
        
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: dist/

  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip --disable-pip-version-check
          pip install -r requirements.txt --no-deps
          
      - name: Build package
        run: python setup.py bdist_wheel
        
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: python-package
          path: dist/

  build-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          
      - name: Download dependencies
        run: go mod download
        
      - name: Build
        run: go build -o app -ldflags="-s -w" ./cmd/main.go
        
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: go-binary
          path: app

  docker-build:
    runs-on: ubuntu-latest
    needs: [build-node, build-python, build-go]
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to staging
        run: |
          curl -X POST ${{ secrets.STAGING_WEBHOOK_URL }} \
            -H "Authorization: Bearer ${{ secrets.STAGING_TOKEN }}" \
            -d '{"image":"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop"}'

  deploy-production:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to production
        run: |
          curl -X POST ${{ secrets.PROD_WEBHOOK_URL }} \
            -H "Authorization: Bearer ${{ secrets.PROD_TOKEN }}" \
            -d '{"image":"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"}'