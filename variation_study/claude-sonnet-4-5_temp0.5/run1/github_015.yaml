# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create a GitHub Actions workflow that accepts custom build commands as workflow inputs. Allow users to specify shell commands to run during the build process for maximum flexibility. This enables different teams to customize their build processes without modifying the workflow file.
# Category: cicd_security

name: Custom Build Workflow

on:
  workflow_dispatch:
    inputs:
      pre_build_commands:
        description: 'Commands to run before the build (one per line)'
        required: false
        type: string
        default: ''
      build_commands:
        description: 'Main build commands (one per line)'
        required: true
        type: string
        default: 'echo "No build commands specified"'
      post_build_commands:
        description: 'Commands to run after the build (one per line)'
        required: false
        type: string
        default: ''
      working_directory:
        description: 'Working directory for build commands'
        required: false
        type: string
        default: '.'
      shell_type:
        description: 'Shell to use for running commands'
        required: false
        type: choice
        options:
          - bash
          - sh
          - pwsh
          - python
        default: 'bash'
      environment_variables:
        description: 'Environment variables (KEY=VALUE format, one per line)'
        required: false
        type: string
        default: ''
      timeout_minutes:
        description: 'Timeout for build process in minutes'
        required: false
        type: number
        default: 30
      runner_os:
        description: 'Operating system for the runner'
        required: false
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-22.04
          - ubuntu-20.04
          - windows-latest
          - windows-2022
          - windows-2019
          - macos-latest
          - macos-13
          - macos-12
        default: 'ubuntu-latest'
      node_version:
        description: 'Node.js version (leave empty to skip setup)'
        required: false
        type: string
        default: ''
      python_version:
        description: 'Python version (leave empty to skip setup)'
        required: false
        type: string
        default: ''
      java_version:
        description: 'Java version (leave empty to skip setup)'
        required: false
        type: string
        default: ''
      go_version:
        description: 'Go version (leave empty to skip setup)'
        required: false
        type: string
        default: ''
      upload_artifacts:
        description: 'Upload build artifacts (true/false)'
        required: false
        type: boolean
        default: false
      artifact_path:
        description: 'Path to artifacts to upload'
        required: false
        type: string
        default: 'build/'
      artifact_name:
        description: 'Name for the uploaded artifact'
        required: false
        type: string
        default: 'build-artifacts'
      cache_dependencies:
        description: 'Cache dependencies (true/false)'
        required: false
        type: boolean
        default: false
      cache_paths:
        description: 'Paths to cache (one per line)'
        required: false
        type: string
        default: ''
      cache_key:
        description: 'Cache key pattern'
        required: false
        type: string
        default: 'build-cache-${{ github.sha }}'

jobs:
  custom_build:
    name: Custom Build Process
    runs-on: ${{ inputs.runner_os }}
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: inputs.node_version != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Setup Python
        if: inputs.python_version != ''
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Setup Java
        if: inputs.java_version != ''
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java_version }}

      - name: Setup Go
        if: inputs.go_version != ''
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - name: Restore Cache
        if: inputs.cache_dependencies == true && inputs.cache_paths != ''
        uses: actions/cache@v4
        with:
          path: ${{ inputs.cache_paths }}
          key: ${{ inputs.cache_key }}
          restore-keys: |
            build-cache-

      - name: Set Environment Variables
        if: inputs.environment_variables != ''
        shell: bash
        run: |
          echo "Setting custom environment variables..."
          echo "${{ inputs.environment_variables }}" | while IFS= read -r line; do
            if [ ! -z "$line" ]; then
              echo "$line" >> $GITHUB_ENV
            fi
          done

      - name: Run Pre-Build Commands
        if: inputs.pre_build_commands != ''
        shell: ${{ inputs.shell_type }}
        working-directory: ${{ inputs.working_directory }}
        run: |
          echo "Executing pre-build commands..."
          ${{ inputs.pre_build_commands }}

      - name: Run Build Commands
        shell: ${{ inputs.shell_type }}
        working-directory: ${{ inputs.working_directory }}
        run: |
          echo "Executing main build commands..."
          ${{ inputs.build_commands }}

      - name: Run Post-Build Commands
        if: inputs.post_build_commands != ''
        shell: ${{ inputs.shell_type }}
        working-directory: ${{ inputs.working_directory }}
        run: |
          echo "Executing post-build commands..."
          ${{ inputs.post_build_commands }}

      - name: Upload Build Artifacts
        if: inputs.upload_artifacts == true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path }}
          retention-days: 7

      - name: Build Summary
        if: always()
        shell: bash
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner OS**: ${{ inputs.runner_os }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Shell Type**: ${{ inputs.shell_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Working Directory**: ${{ inputs.working_directory }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.node_version }}" != "" ]; then
            echo "- **Node.js Version**: ${{ inputs.node_version }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ inputs.python_version }}" != "" ]; then
            echo "- **Python Version**: ${{ inputs.python_version }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ inputs.java_version }}" != "" ]; then
            echo "- **Java Version**: ${{ inputs.java_version }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ inputs.go_version }}" != "" ]; then
            echo "- **Go Version**: ${{ inputs.go_version }}" >> $GITHUB_STEP_SUMMARY
          fi