      - priority: DEFAULT
        max_connections: 2048
        max_pending_requests: 2048
        max_requests: 2048
        max_retries: 5
    outlier_detection:
      consecutive_5xx: 3
      interval: 20s
      base_ejection_time: 60s
      max_ejection_percent: 30
    load_assignment:
      cluster_name: backend_cluster_v2
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: backend-v2.service.local
