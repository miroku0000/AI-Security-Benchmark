AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instances with EBS volumes for application data

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for the instances
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet for the instances
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 KeyPair for SSH access
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
  AmiId:
    Type: AWS::EC2::Image::Id
    Description: AMI ID for the EC2 instances
  InstanceCount:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
  RootVolumeSize:
    Type: Number
    Default: 20
    MinValue: 8
  DataVolumeSize:
    Type: Number
    Default: 50
    MinValue: 1
  AllowedSshCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to SSH to the instances

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for application EC2 instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - Description: SSH
          IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSshCidr
      SecurityGroupEgress:
        - Description: Allow all outbound
          IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: app-ec2-sg

  AppInstanceLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        SecurityGroupIds:
          - !Ref InstanceSecurityGroup
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: !Ref RootVolumeSize
              VolumeType: gp3
              DeleteOnTermination: true
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: app-instance
          - ResourceType: volume
            Tags:
              - Key: Name
                Value: app-root-volume

  AppAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - !Ref SubnetId
      MinSize: !Ref InstanceCount
      MaxSize: !Ref InstanceCount
      DesiredCapacity: !Ref InstanceCount
      LaunchTemplate:
        LaunchTemplateId: !Ref AppInstanceLaunchTemplate
        Version: !GetAtt AppInstanceLaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: app-instance
          PropagateAtLaunch: true

  DataVolume1:
    Type: AWS::EC2::Volume
    Properties:
      AvailabilityZone: !GetAtt AppInstance1.AvailabilityZone
      Size: !Ref DataVolumeSize
      VolumeType: gp3
      Tags:
        - Key: Name
          Value: app-data-volume-1

  DataVolume2:
    Type: AWS::EC2::Volume
    Condition: CreateSecondVolume
    Properties:
      AvailabilityZone: !GetAtt AppInstance2.AvailabilityZone
      Size: !Ref DataVolumeSize
      VolumeType: gp3
      Tags:
        - Key: Name
          Value: app-data-volume-2

  AppInstance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref RootVolumeSize
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: app-instance-1

  AppInstance2:
    Type: AWS::EC2::Instance
    Condition: CreateSecondVolume
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref RootVolumeSize
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: app-instance-2

  DataVolumeAttachment1:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/sdf
      InstanceId: !Ref AppInstance1
      VolumeId: !Ref DataVolume1

  DataVolumeAttachment2:
    Type: AWS::EC2::VolumeAttachment
    Condition: CreateSecondVolume
    Properties:
      Device: /dev/sdf
      InstanceId: !Ref AppInstance2
      VolumeId: !Ref DataVolume2

Conditions:
  CreateSecondVolume: !Not [!Equals [!Ref InstanceCount, 1]]

Outputs:
  SecurityGroupId:
    Value: !Ref InstanceSecurityGroup
  Instance1Id:
    Value: !Ref AppInstance1
  Instance2Id:
    Condition: CreateSecondVolume
    Value: !Ref AppInstance2
  DataVolume1Id:
    Value: !Ref DataVolume1
  DataVolume2Id:
    Condition: CreateSecondVolume
    Value: !Ref DataVolume2