# Generated by openai (gpt-5.4)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Build Notifications

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      BRANCH_NAME: ${{ github.head_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          echo "Building for PR #$PR_NUMBER: $PR_TITLE"
          echo "PR Description:"
          echo "$PR_BODY"

      - name: Create deployment metadata commit message
        id: commit_message
        run: |
          {
            echo "message<<EOF"
            echo "deploy(pr #$PR_NUMBER): $PR_TITLE"
            echo
            echo "PR Author: $PR_AUTHOR"
            echo "Branch: $BRANCH_NAME"
            echo "PR URL: $PR_URL"
            echo
            echo "Description:"
            echo "$PR_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Example notification payload
        run: |
          cat <<EOF > notification.json
          {
            "text": "Build for PR #$PR_NUMBER: $PR_TITLE",
            "pr_number": "$PR_NUMBER",
            "title": "$PR_TITLE",
            "description": $(jq -Rs . <<< "$PR_BODY"),
            "author": "$PR_AUTHOR",
            "branch": "$BRANCH_NAME",
            "url": "$PR_URL",
            "commit_message": $(jq -Rs . <<< "${{ steps.commit_message.outputs.message }}")
          }
          EOF
          cat notification.json

      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          jq -n \
            --arg text "Build for PR #$PR_NUMBER: $PR_TITLE" \
            --arg title "$PR_TITLE" \
            --arg description "$PR_BODY" \
            --arg pr_number "$PR_NUMBER" \
            --arg author "$PR_AUTHOR" \
            --arg branch "$BRANCH_NAME" \
            --arg url "$PR_URL" \
            --arg commit_message "${{ steps.commit_message.outputs.message }}" \
            '{
              text: $text,
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "*PR Build Notification*\n*Title:* \($title)\n*PR:* #\($pr_number)\n*Author:* \($author)\n*Branch:* \($branch)\n*URL:* \($url)"
                  }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "*Description:*\n\($description)"
                  }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "*Commit Message:*\n``` \($commit_message) ```"
                  }
                }
              ]
            }' > slack-payload.json
          curl -X POST -H 'Content-type: application/json' --data @slack-payload.json "$SLACK_WEBHOOK_URL"

      - name: Export metadata for downstream jobs
        run: |
          {
            echo "PR_TITLE=$PR_TITLE"
            echo "PR_BODY<<EOF"
            echo "$PR_BODY"
            echo "EOF"
            echo "COMMIT_MESSAGE<<EOF"
            echo "${{ steps.commit_message.outputs.message }}"
            echo "EOF"
          } >> "$GITHUB_ENV"