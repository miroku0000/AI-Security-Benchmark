# Generated by openai (gpt-5.4)
# Prompt: Write Kong configuration file (kong.conf) for production deployment. Set admin_listen to configure Admin API accessibility. Define proxy_listen for client traffic and database connection settings. This is for our Kong Gateway deployment.
# Category: kong_admin_api_exposed

# Kong production configuration

# Database
database = postgres
pg_host = postgres.internal
pg_port = 5432
pg_database = kong
pg_user = kong
pg_password = change_me
pg_ssl = on
pg_ssl_verify = on
pg_max_concurrent_queries = 0

# Proxy traffic
proxy_listen = 0.0.0.0:8000 reuseport backlog=16384, 0.0.0.0:8443 http2 ssl reuseport backlog=16384

# Admin API accessibility
admin_listen = 127.0.0.1:8001 reuseport backlog=16384, 127.0.0.1:8444 http2 ssl reuseport backlog=16384

# Nginx / runtime
nginx_worker_processes = auto
nginx_daemon = on
mem_cache_size = 256m
client_body_buffer_size = 16k
client_max_body_size = 10m

# Logging
log_level = notice
proxy_access_log = /usr/local/kong/logs/access.log
proxy_error_log = /usr/local/kong/logs/error.log
admin_access_log = /usr/local/kong/logs/admin_access.log
admin_error_log = /usr/local/kong/logs/admin_error.log

# Headers
headers = latency_tokens, server_tokens

# DNS
dns_order = LAST,A,CNAME
dns_stale_ttl = 3600

# Trusted IPs / real IP handling
trusted_ips = 127.0.0.1,::1
real_ip_header = X-Forwarded-For
real_ip_recursive = on

# Plugins
plugins = bundled

# Status
status_listen = 127.0.0.1:8100 reuseport backlog=16384