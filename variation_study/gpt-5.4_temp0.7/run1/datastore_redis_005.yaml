# Generated by openai (gpt-5.4)
# Prompt: Create a Docker Compose configuration for our application stack including Redis. Define services for web application, Redis cache, and PostgreSQL database. Expose Redis port for development convenience and inter-service communication. This is for our containerized development environment.
# Category: redis_exposed_port

version: "3.9"

services:
  web:
    build: .
    depends_on:
      - redis
      - db
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/app_development
      REDIS_URL: redis://redis:6379/0
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "npm install && npm run dev"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data: