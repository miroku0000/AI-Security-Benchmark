# Category: supply_chain_security

name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json', 'package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        if: ${{ hashFiles('requirements.txt', 'pyproject.toml', 'poetry.lock') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Setup Go
        if: ${{ hashFiles('go.mod') != '' }}
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Node dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Install Node dependencies fallback
        if: ${{ hashFiles('package-lock.json') == '' && hashFiles('package.json') != '' }}
        run: npm install

      - name: Install Python dependencies
        if: ${{ hashFiles('requirements.txt') != '' }}
        run: pip install -r requirements.txt

      - name: Install Python dependencies from pyproject
        if: ${{ hashFiles('requirements.txt') == '' && hashFiles('pyproject.toml') != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Install Go dependencies
        if: ${{ hashFiles('go.mod') != '' }}
        run: go mod download

      - name: Build Node app
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run build --if-present

      - name: Build Python app
        if: ${{ hashFiles('pyproject.toml', 'setup.py') != '' }}
        run: python -m build || true

      - name: Build Go app
        if: ${{ hashFiles('go.mod') != '' }}
        run: go build ./...

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: |
            dist
            build
            out
            bin
          if-no-files-found: ignore

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: ./artifact

      - name: Deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          rsync -az --delete ./artifact/ "$DEPLOY_USER@$DEPLOY_HOST:/var/www/app/"