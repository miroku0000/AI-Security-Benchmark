name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    outputs:
      artifact-name: build-artifacts
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare build output
        run: |
          mkdir -p dist
          echo "Build output generated on $(date)" > dist/build-info.txt
          echo "artifact-version=${GITHUB_SHA}" >> $GITHUB_OUTPUT
        id: build_meta

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          if-no-files-found: error
          retention-days: 7

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts/

      - name: Verify downloaded artifacts
        run: ls -R artifacts

      - name: Execute staging deployment script
        run: |
          chmod +x ./scripts/deploy-staging.sh
          ./scripts/deploy-staging.sh artifacts

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy_staging
    environment:
      name: production
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts/

      - name: Verify downloaded artifacts
        run: ls -R artifacts

      - name: Execute production deployment script
        run: |
          chmod +x ./scripts/deploy-production.sh
          ./scripts/deploy-production.sh artifacts