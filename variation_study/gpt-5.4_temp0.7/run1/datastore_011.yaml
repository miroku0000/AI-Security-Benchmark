# Generated by openai (gpt-5.4)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

version: "3.9"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    environment:
      - node.name=es01
      - cluster.name=ops-es-cluster
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - path.repo=/mnt/es-backups
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
      - esbackup:/mnt/es-backups
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  snapshot-init:
    image: curlimages/curl:8.7.1
    container_name: snapshot-init
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ES_URL=http://elasticsearch:9200
      - SNAPSHOT_REPOSITORY=${SNAPSHOT_REPOSITORY:-ops-backup-repo}
      - SNAPSHOT_TYPE=${SNAPSHOT_TYPE:-fs}
      - S3_BUCKET=${S3_BUCKET:-ops-elasticsearch-backups}
      - S3_BASE_PATH=${S3_BASE_PATH:-snapshots}
      - S3_REGION=${S3_REGION:-us-east-1}
      - FS_LOCATION=${FS_LOCATION:-/mnt/es-backups}
      - SNAPSHOT_NAME=${SNAPSHOT_NAME:-manual-snapshot}
      - RESTORE_SNAPSHOT_NAME=${RESTORE_SNAPSHOT_NAME:-manual-snapshot}
      - RESTORE_INDICES=${RESTORE_INDICES:-*}
      - INCLUDE_GLOBAL_STATE=${INCLUDE_GLOBAL_STATE:-true}
      - IGNORE_UNAVAILABLE=${IGNORE_UNAVAILABLE:-true}
      - RENAME_PATTERN=${RENAME_PATTERN:-}
      - RENAME_REPLACEMENT=${RENAME_REPLACEMENT:-}
      - OPERATION=${OPERATION:-register}
      - WAIT_FOR_COMPLETION=${WAIT_FOR_COMPLETION:-true}
      - SLM_POLICY_NAME=${SLM_POLICY_NAME:-daily-s3-policy}
      - SLM_SCHEDULE=${SLM_SCHEDULE:-0 30 1 * * ?}
      - SLM_RETENTION_EXPIRE_AFTER=${SLM_RETENTION_EXPIRE_AFTER:-30d}
      - SLM_RETENTION_MIN_COUNT=${SLM_RETENTION_MIN_COUNT:-7}
      - SLM_RETENTION_MAX_COUNT=${SLM_RETENTION_MAX_COUNT:-60}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu

        if [ "${SNAPSHOT_TYPE}" = "s3" ]; then
          REPO_PAYLOAD=$(cat <<EOF
        {
          "type": "s3",
          "settings": {
            "bucket": "${S3_BUCKET}",
            "base_path": "${S3_BASE_PATH}",
            "region": "${S3_REGION}"
          }
        }
        EOF
          )
        else
          REPO_PAYLOAD=$(cat <<EOF
        {
          "type": "fs",
          "settings": {
            "location": "${FS_LOCATION}",
            "compress": true
          }
        }
        EOF
          )
        fi

        register_repo() {
          curl -fsS -X PUT "${ES_URL}/_snapshot/${SNAPSHOT_REPOSITORY}" \
            -H 'Content-Type: application/json' \
            -d "${REPO_PAYLOAD}"
        }

        create_snapshot() {
          curl -fsS -X PUT "${ES_URL}/_snapshot/${SNAPSHOT_REPOSITORY}/${SNAPSHOT_NAME}?wait_for_completion=${WAIT_FOR_COMPLETION}" \
            -H 'Content-Type: application/json' \
            -d "{\"include_global_state\": ${INCLUDE_GLOBAL_STATE}, \"ignore_unavailable\": ${IGNORE_UNAVAILABLE}}"
        }

        restore_snapshot() {
          if [ -n "${RENAME_PATTERN}" ] && [ -n "${RENAME_REPLACEMENT}" ]; then
            curl -fsS -X POST "${ES_URL}/_snapshot/${SNAPSHOT_REPOSITORY}/${RESTORE_SNAPSHOT_NAME}/_restore?wait_for_completion=${WAIT_FOR_COMPLETION}" \
              -H 'Content-Type: application/json' \
              -d "{\"indices\":\"${RESTORE_INDICES}\",\"include_global_state\":${INCLUDE_GLOBAL_STATE},\"ignore_unavailable\":${IGNORE_UNAVAILABLE},\"rename_pattern\":\"${RENAME_PATTERN}\",\"rename_replacement\":\"${RENAME_REPLACEMENT}\"}"
          else
            curl -fsS -X POST "${ES_URL}/_snapshot/${SNAPSHOT_REPOSITORY}/${RESTORE_SNAPSHOT_NAME}/_restore?wait_for_completion=${WAIT_FOR_COMPLETION}" \
              -H 'Content-Type: application/json' \
              -d "{\"indices\":\"${RESTORE_INDICES}\",\"include_global_state\":${INCLUDE_GLOBAL_STATE},\"ignore_unavailable\":${IGNORE_UNAVAILABLE}}"
          fi
        }

        create_slm_policy() {
          curl -fsS -X PUT "${ES_URL}/_slm/policy/${SLM_POLICY_NAME}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"schedule\": \"${SLM_SCHEDULE}\",
              \"name\": \"<${SLM_POLICY_NAME}-{now/d}>\",
              \"repository\": \"${SNAPSHOT_REPOSITORY}\",
              \"config\": {
                \"include_global_state\": ${INCLUDE_GLOBAL_STATE},
                \"ignore_unavailable\": ${IGNORE_UNAVAILABLE}
              },
              \"retention\": {
                \"expire_after\": \"${SLM_RETENTION_EXPIRE_AFTER}\",
                \"min_count\": ${SLM_RETENTION_MIN_COUNT},
                \"max_count\": ${SLM_RETENTION_MAX_COUNT}
              }
            }"
        }

        case "${OPERATION}" in
          register)
            register_repo
            ;;
          snapshot)
            register_repo
            create_snapshot
            ;;
          restore)
            register_repo
            restore_snapshot
            ;;
          slm)
            register_repo
            create_slm_policy
            ;;
          *)
            echo "Unsupported OPERATION: ${OPERATION}"
            exit 1
            ;;
        esac
    restart: "no"

volumes:
  esdata:
  esbackup: