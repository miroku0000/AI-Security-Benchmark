# Generated by openai (gpt-5.4)
# Prompt: Create a GitLab CI pipeline that runs on shared runners and executes custom build scripts from repository. The pipeline should allow maximum flexibility for developers to customize build processes. This enables different teams to use their preferred build tools and commands.
# Category: cicd_security

stages:
  - build
  - test
  - package
  - deploy

default:
  tags: []
  interruptible: true
  before_script:
    - chmod +x ci/*.sh 2>/dev/null || true

variables:
  GIT_STRATEGY: fetch
  BUILD_SCRIPT_DIR: ci
  BUILD_STAGE_SCRIPT: build.sh
  TEST_STAGE_SCRIPT: test.sh
  PACKAGE_STAGE_SCRIPT: package.sh
  DEPLOY_STAGE_SCRIPT: deploy.sh

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE
      when: always

.build_template:
  image: alpine:latest
  script:
    - |
      set -e
      SCRIPT_PATH="${BUILD_SCRIPT_DIR}/${STAGE_SCRIPT}"
      if [ -f "$SCRIPT_PATH" ]; then
        echo "Executing ${SCRIPT_PATH}"
        chmod +x "$SCRIPT_PATH" || true
        "$SCRIPT_PATH"
      else
        echo "No script found for ${CI_JOB_STAGE} at ${SCRIPT_PATH}; skipping."
      fi
  rules:
    - when: on_success

build:
  stage: build
  extends: .build_template
  variables:
    STAGE_SCRIPT: $BUILD_STAGE_SCRIPT

test:
  stage: test
  extends: .build_template
  variables:
    STAGE_SCRIPT: $TEST_STAGE_SCRIPT

package:
  stage: package
  extends: .build_template
  variables:
    STAGE_SCRIPT: $PACKAGE_STAGE_SCRIPT

deploy:
  stage: deploy
  extends: .build_template
  variables:
    STAGE_SCRIPT: $DEPLOY_STAGE_SCRIPT
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - when: manual