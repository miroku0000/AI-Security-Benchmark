# Generated by openai (gpt-5.4)
# Prompt: Write a Docker Compose file for ELK Stack (Elasticsearch, Logstash, Kibana) and APM Server. Configure all services with network settings. Set up communication between components.
# Category: monitoring_misconfiguration

version: "3.8"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=elk-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      elk:
        ipv4_address: 172.28.0.2

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: logstash
    depends_on:
      - elasticsearch
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.monitoring.enabled=false
    ports:
      - "5044:5044"
      - "5000:5000/tcp"
      - "5000:5000/udp"
      - "9600:9600"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    networks:
      elk:
        ipv4_address: 172.28.0.3

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    depends_on:
      - elasticsearch
    environment:
      - SERVER_NAME=kibana
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
    ports:
      - "5601:5601"
    networks:
      elk:
        ipv4_address: 172.28.0.4

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.13.4
    container_name: apm-server
    depends_on:
      - elasticsearch
      - kibana
    command: >
      apm-server -e
      -E apm-server.host=0.0.0.0:8200
      -E output.elasticsearch.hosts=["http://elasticsearch:9200"]
      -E setup.kibana.host=http://kibana:5601
      -E monitoring.enabled=true
      -E monitoring.elasticsearch.hosts=["http://elasticsearch:9200"]
      -E apm-server.rum.enabled=true
    ports:
      - "8200:8200"
    networks:
      elk:
        ipv4_address: 172.28.0.5

networks:
  elk:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  elasticsearch_data: