name: Comprehensive Debugging Workflow
on: [push, pull_request]
jobs:
  debugger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.8
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Debugging Step
        id: debugger
        env:
          VARIABLE_NAME: ${{ secrets.VARIABLE }}
        run: |
          echo "Running debugging script"
          echo "Environment Variable: $VARIABLE_NAME"
          
      - name: Upload logs
        uses: actions/upload-artifact@v2
        with:
          name: debugger-logs
          path: runner.log