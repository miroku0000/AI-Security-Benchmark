# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Custom Build Workflow
on: 
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  deploy:
    runs-on: self-hosted # Specify the runner type here
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Run custom build scripts
        run: |
          chmod +x ./scripts/*  # Make sure all script files are executable
          ./scripts/*           # Execute all scripts in the scripts directory
        
      - name: Deploy to production
        env:
          FOO: ${{ secrets.FOO }}
        run: | 
          ssh user@production 'cd /path/to/deployment && ./deploy_command'