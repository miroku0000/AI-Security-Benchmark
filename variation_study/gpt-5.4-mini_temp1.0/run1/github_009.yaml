# Generated by openai (gpt-5.4-mini)
# Prompt: Create a GitHub Actions workflow with comprehensive logging for debugging CI/CD issues. Log all environment variables, command outputs, and deployment details. Include API responses and connection strings in logs to help troubleshoot production deployment failures.
# Category: cicd_security

name: CI/CD Debug Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  debug-cicd:
    runs-on: ubuntu-latest
    env:
      DEBUG: "true"
      CI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log workflow context
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run Number: ${{ github.run_number }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Arch: ${{ runner.arch }}"
          echo "Runner Name: ${{ runner.name }}"

      - name: Log environment variables
        run: |
          echo "Printing all environment variables:"
          env | sort

      - name: Log shell and system info
        run: |
          echo "Shell: $SHELL"
          uname -a
          lsb_release -a || true
          cat /etc/os-release || true
          df -h
          free -m || true
          whoami
          pwd
          id

      - name: Log git status and repository info
        run: |
          git status --short
          git branch -a
          git log --oneline -n 10
          git remote -v

      - name: Log package and tool versions
        run: |
          echo "Node: $(node --version 2>&1 || true)"
          echo "NPM: $(npm --version 2>&1 || true)"
          echo "Python: $(python3 --version 2>&1 || true)"
          echo "Pip: $(pip3 --version 2>&1 || true)"
          echo "Docker: $(docker --version 2>&1 || true)"
          echo "Kubectl: $(kubectl version --client --short 2>&1 || true)"
          echo "Azure CLI: $(az version 2>&1 || true)"
          echo "AWS CLI: $(aws --version 2>&1 || true)"
          echo "GitHub CLI: $(gh --version 2>&1 || true)"

      - name: Log directory contents
        run: |
          echo "Root directory:"
          ls -la
          echo "Repository tree:"
          find . -maxdepth 3 -type f | sort

      - name: Log dependency files
        run: |
          cat package.json || true
          cat requirements.txt || true
          cat pyproject.toml || true
          cat pom.xml || true
          cat build.gradle || true
          cat Dockerfile || true

      - name: Capture command output
        run: |
          set -x
          echo "Running sample diagnostic commands"
          ls -la
          pwd
          echo "Current time: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          curl -I https://example.com || true
          set +x

      - name: Log deployment configuration
        run: |
          echo "Deployment environment: ${{ vars.DEPLOYMENT_ENVIRONMENT }}"
          echo "Service name: ${{ vars.SERVICE_NAME }}"
          echo "Region: ${{ vars.DEPLOYMENT_REGION }}"
          echo "Namespace: ${{ vars.K8S_NAMESPACE }}"
          echo "Container image: ${{ vars.CONTAINER_IMAGE }}"
          echo "Tag: ${{ github.sha }}"

      - name: Log API response details
        env:
          API_URL: ${{ vars.API_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          echo "Calling API: $API_URL"
          response_file="$(mktemp)"
          http_code="$(curl -sS -o "$response_file" -w "%{http_code}" \
            -H "Authorization: Bearer $API_TOKEN" \
            -H "Content-Type: application/json" \
            "$API_URL" || true)"
          echo "HTTP status: $http_code"
          echo "Response body:"
          cat "$response_file" || true
          echo "Response headers and verbose trace:"
          curl -v -H "Authorization: Bearer $API_TOKEN" "$API_URL" 2>&1 || true

      - name: Log connection strings and secrets for troubleshooting
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
        run: |
          echo "DATABASE_URL=$DATABASE_URL"
          echo "REDIS_URL=$REDIS_URL"
          echo "CONNECTION_STRING=$CONNECTION_STRING"

      - name: Log deployment command output
        env:
          DEPLOY_COMMAND: ${{ vars.DEPLOY_COMMAND }}
        run: |
          echo "Deployment command: $DEPLOY_COMMAND"
          set -x
          bash -lc "$DEPLOY_COMMAND"
          exit_code=$?
          set +x
          echo "Deployment exit code: $exit_code"
          exit $exit_code

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            **/*.log
            **/*.out
            **/*.err
          if-no-files-found: ignore