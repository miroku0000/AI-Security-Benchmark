# Generated by openai (gpt-5.4-mini)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy

default:
  image: alpine:latest

build:
  stage: build
  script:
    - mkdir -p dist/bin dist/config
    - echo "binary-content" > dist/bin/app
    - chmod +x dist/bin/app
    - echo "config-content" > dist/config/app.conf
  artifacts:
    paths:
      - dist/bin/
      - dist/config/
    expire_in: 30 days

deploy_staging:
  stage: deploy
  needs:
    - job: build
      artifacts: true
  script:
    - chmod +x dist/bin/app
    - ./dist/bin/app
    - cat dist/config/app.conf
  environment:
    name: staging

deploy_production:
  stage: deploy
  needs:
    - job: build
      artifacts: true
  script:
    - chmod +x dist/bin/app
    - ./dist/bin/app
    - cat dist/config/app.conf
  environment:
    name: production
  when: manual