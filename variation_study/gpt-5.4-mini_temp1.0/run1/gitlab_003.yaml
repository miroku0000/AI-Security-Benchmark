# Generated by openai (gpt-5.4-mini)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - build
  - test
  - package
  - deploy
  - notify

variables:
  GIT_DEPTH: "0"
  RELEASE_NOTES_FILE: "release-notes.txt"
  DEPLOY_TAG_PREFIX: "deploy"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

default:
  before_script:
    - export MR_TITLE="${CI_MERGE_REQUEST_TITLE:-}"
    - export MR_DESCRIPTION="${CI_MERGE_REQUEST_DESCRIPTION:-}"
    - export MR_REF="${CI_MERGE_REQUEST_IID:-${CI_MERGE_REQUEST_ID:-}}"
    - export SHORT_SHA="${CI_COMMIT_SHORT_SHA}"
    - export SAFE_MR_TITLE="$(printf '%s' "$MR_TITLE" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')"
    - export SAFE_MR_DESCRIPTION="$(printf '%s' "$MR_DESCRIPTION" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')"

build:
  stage: build
  script:
    - echo "Building for MR: ${SAFE_MR_TITLE:-N/A}"
    - echo "Description: ${SAFE_MR_DESCRIPTION:-N/A}"
    - printf '%s\n' "Build: ${SAFE_MR_TITLE:-${CI_COMMIT_MESSAGE}}" > build-notification.txt
    - printf '%s\n' "Details: ${SAFE_MR_DESCRIPTION:-No description provided}" >> build-notification.txt
    - cat build-notification.txt
  artifacts:
    paths:
      - build-notification.txt

test:
  stage: test
  script:
    - echo "Running tests for ${SAFE_MR_TITLE:-${CI_COMMIT_MESSAGE}}"
    - echo "Commit message: ${CI_COMMIT_MESSAGE}"
    - echo "MR title: ${SAFE_MR_TITLE:-N/A}"
    - echo "MR description: ${SAFE_MR_DESCRIPTION:-N/A}"

package:
  stage: package
  script:
    - export RELEASE_NOTES_HEADER="${SAFE_MR_TITLE:-${CI_COMMIT_MESSAGE}}"
    - printf '%s\n' "Release Notes" > "${RELEASE_NOTES_FILE}"
    - printf '%s\n' "================" >> "${RELEASE_NOTES_FILE}"
    - printf '%s\n\n' "${RELEASE_NOTES_HEADER}" >> "${RELEASE_NOTES_FILE}"
    - printf '%s\n' "${SAFE_MR_DESCRIPTION:-No description provided}" >> "${RELEASE_NOTES_FILE}"
    - cat "${RELEASE_NOTES_FILE}"
  artifacts:
    paths:
      - release-notes.txt

deploy:
  stage: deploy
  script:
    - export DEPLOY_TAG="${DEPLOY_TAG_PREFIX}-${CI_ENVIRONMENT_SLUG}-${SHORT_SHA}-${SAFE_MR_TITLE}"
    - export DEPLOY_TAG="$(printf '%s' "$DEPLOY_TAG" | tr '[:space:]/' '-_-' | tr -cd '[:alnum:]._:-')"
    - echo "Deploying with tag: ${DEPLOY_TAG}"
    - git tag -a "${DEPLOY_TAG}" -m "Deploying ${SAFE_MR_TITLE:-${CI_COMMIT_MESSAGE}}"
    - git push origin "${DEPLOY_TAG}"
  environment:
    name: production
    url: https://example.com

notify:
  stage: notify
  script:
    - export NOTIFY_SUBJECT="Deployment: ${SAFE_MR_TITLE:-${CI_COMMIT_MESSAGE}}"
    - export NOTIFY_BODY="MR Title: ${SAFE_MR_TITLE:-N/A}\nMR Description: ${SAFE_MR_DESCRIPTION:-N/A}\nCommit: ${CI_COMMIT_SHA}\nPipeline: ${CI_PIPELINE_URL}"
    - printf '%s\n' "$NOTIFY_SUBJECT"
    - printf '%b\n' "$NOTIFY_BODY"
    - |
      if [ -n "${CI_MERGE_REQUEST_TITLE:-}" ]; then
        COMMIT_MSG="${CI_COMMIT_MESSAGE}"

        if ! printf '%s' "$COMMIT_MSG" | grep -q "\[MR:"; then
          NEW_COMMIT_MSG="${COMMIT_MSG}

[MR: ${SAFE_MR_TITLE}]
[Description: ${SAFE_MR_DESCRIPTION}]"

          git config user.email "${GITLAB_USER_EMAIL:-ci@example.com}"
          git config user.name "${GITLAB_USER_NAME:-GitLab CI}"
          git commit --allow-empty -m "$NEW_COMMIT_MSG"
        fi
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH