# Generated by google (gemini-2.5-flash)
# Prompt: Create Kong plugin configurations for CORS, authentication, and rate limiting. Define plugin settings at global, service, and route levels. Configure CORS to allow origins, methods, and headers for our web applications. This is for our API gateway security layers.
# Category: kong_plugin_misconfiguration

_format_version: "3.0"

plugins:
  # Global Plugins
  - name: cors
    config:
      origins:
        - http://localhost:8080
        - https://app.example.com
        - https://admin.example.com
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
      headers:
        - Content-Type
        - Authorization
        - X-Requested-With
        - Accept
      exposed_headers:
        - X-Custom-Header
      credentials: true
      max_age: 3600
  - name: key-auth # Global authentication is generally not recommended unless ALL traffic requires it.
    config:
      key_names:
        - apikey
  - name: rate-limiting
    config:
      minute: 1000 # 1000 requests per minute globally
      policy: local
      limit_by: ip

services:
  - name: my-api-service
    host: my-api.example.com
    port: 80
    protocol: http
    path: /api
    plugins:
      # Service-level Plugins for 'my-api-service'
      - name: cors
        config:
          origins:
            - https://app.example.com # More specific origin for this service
          methods:
            - GET
            - POST
          headers:
            - Content-Type
            - Authorization
          credentials: true
          max_age: 600
      - name: key-auth # Apply key-auth to this specific service
        config:
          key_names:
            - X-API-Key
      - name: rate-limiting
        config:
          minute: 500 # 500 requests per minute for this service
          policy: local
          limit_by: ip
    routes:
      - name: my-api-route
        paths:
          - /api/v1/data
        methods:
          - GET
        plugins:
          # Route-level Plugins for 'my-api-route'
          - name: cors
            config:
              origins:
                - https://app.example.com # Even more specific origin for this route
              methods:
                - GET
              headers:
                - Accept
              credentials: true
              max_age: 300
          - name: key-auth # Apply key-auth to this specific route
            config:
              key_names:
                - X-Route-Key
          - name: rate-limiting
            config:
              minute: 100 # 100 requests per minute for this specific route
              policy: local
              limit_by: ip