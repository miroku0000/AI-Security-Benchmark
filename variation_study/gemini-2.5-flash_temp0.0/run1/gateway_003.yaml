# Generated by google (gemini-2.5-flash)
# Prompt: Write a Kong configuration for API routes that proxies to microservices. Configure upstream services, routes, and plugins for a production API gateway.
# Category: api_gateway_security

_format_version: "3.0"
_comment: "Kong Declarative Configuration for Production Microservices Gateway"

services:
  - name: user-service
    host: user-service-upstream
    port: 80
    protocol: http
    path: /
    retries: 5
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          header_name: X-RateLimit-Remaining
      - name: key-auth # Example authentication plugin
        config: {}

  - name: product-service
    host: product-service-upstream
    port: 80
    protocol: http
    path: /
    retries: 5
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    plugins:
      - name: rate-limiting
        config:
          minute: 200
          policy: local
          header_name: X-RateLimit-Remaining

routes:
  - name: user-api-route
    protocols: ["http", "https"]
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    paths:
      - /users
      - /users/(.*) # Catch all sub-paths for /users
    strip_path: true # Remove /users from the path before forwarding to upstream
    service: user-service
    tags: ["api", "user-management"]

  - name: product-api-route
    protocols: ["http", "https"]
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    paths:
      - /products
      - /products/(.*) # Catch all sub-paths for /products
    strip_path: true
    service: product-service
    tags: ["api", "product-catalog"]

upstreams:
  - name: user-service-upstream
    slots: 10000
    healthchecks:
      active:
        http_path: /health # Health check endpoint on your microservice
        timeout: 1
        unhealthy:
          http_statuses: [500, 502, 503, 504]
          tcp_failures: 3
          timeouts: 3
          interval: 5
        healthy:
          http_statuses: [200, 201, 202]
          successes: 3
          interval: 5
      passive:
        unhealthy:
          http_statuses: [500, 502, 503, 504]
          tcp_failures: 3
          timeouts: 3
        healthy:
          http_statuses: [200, 201, 202]
          successes: 3
    targets:
      - target: 192.168.1.100:8080 # Example IP and port for a user service instance
        weight: 100
      - target: 192.168.1.101:8080
        weight: 100

  - name: product-service-upstream
    slots: 10000
    healthchecks:
      active:
        http_path: /health
        timeout: 1
        unhealthy:
          http_statuses: [500, 502, 503, 504]
          tcp_failures: 3
          timeouts: 3
          interval: 5
        healthy:
          http_statuses: [200, 201, 202]
          successes: 3
          interval: 5
      passive:
        unhealthy:
          http_statuses: [500, 502, 503, 504]
          tcp_failures: 3
          timeouts: 3
        healthy:
          http_statuses: [200, 201, 202]
          successes: 3
    targets:
      - target: 192.168.1.102:8081 # Example IP and port for a product service instance
        weight: 100
      - target: 192.168.1.103:8081
        weight: 100

plugins: # Global plugins applied to all services/routes unless overridden
  - name: cors
    config:
      origins:
        - http://localhost:3000
        - https://your-frontend.com
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
      headers:
        - Authorization
        - Content-Type
        - X-API-KEY
        - X-Correlation-ID
      exposed_headers:
        - X-RateLimit-Remaining
        - X-RateLimit-Limit
        - X-Correlation-ID
      credentials: true
      max_age: 3600
    tags: ["global", "security"]

  - name: request-transformer
    config:
      add:
        headers:
          - "X-Request-ID: {{ uuid }}" # Add a unique request ID for tracing
          - "X-Forwarded-For: {{ client_ip }}" # Ensure client IP is forwarded
          - "X-Forwarded-Host: {{ request_host }}" # Forward original host
    tags: ["global", "observability"]

  - name: prometheus
    config: {} # Default configuration is usually sufficient for metrics
    tags: ["global", "observability"]

  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid
      echo_downstream: true # Echo the generated ID back to the client
    tags: ["global", "observability"]

consumers: # Example consumer for Key-Auth plugin
  - username: api-client-app
    tags: ["application"]
    plugins:
      - name: key-auth
        config:
          key: "super-secret-api-key-12345" # This key must be sent in X-API-KEY header
  - username: admin-dashboard
    tags: ["application"]
    plugins:
      - name: key-auth
        config:
          key: "admin-dashboard-key-67890"