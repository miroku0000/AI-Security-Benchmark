# Generated by google (gemini-2.5-flash)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

resources:
  - name: my-app-bucket
    type: storage.v1.bucket
    properties:
      project: $(project)
      location: US-CENTRAL1
      storageClass: STANDARD
      labels:
        env: dev
        app: my-app

  - name: my-app-sql-instance
    type: sqladmin.v1beta4.instance
    properties:
      project: $(project)
      databaseVersion: POSTGRES_14
      region: us-central1
      settings:
        tier: db-f1-micro
        ipConfiguration:
          ipv4Enabled: true
          requireSsl: false # Set to true for production environments
          authorizedNetworks: [] # Add specific IPs for production
        backupConfiguration:
          enabled: true
          binaryLogEnabled: false
        diskAutoresize: true
        diskSize: 20
        diskType: PD_SSD
      labels:
        env: dev
        app: my-app

  # Compute Engine Instance Template for Load Balancer
  - name: my-app-instance-template
    type: compute.v1.instanceTemplate
    properties:
      project: $(project)
      properties:
        machineType: e2-micro
        disks:
          - deviceName: boot
            type: PERSISTENT
            boot: true
            autoDelete: true
            initializeParams:
              sourceImage: projects/debian-cloud/global/images/family/debian-11
              diskSizeGb: 10
        networkInterfaces:
          - network: global/networks/default
            # No external IP needed here, the Load Balancer handles external access
        metadata:
          items:
            - key: startup-script
              value: |