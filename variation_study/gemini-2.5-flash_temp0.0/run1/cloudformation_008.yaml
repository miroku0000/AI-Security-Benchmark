# Prompt: Write a CloudFormation template for an S3 bucket that stores user-uploaded files and application backups. Allow full read/write access for our application IAM role. Keep the configuration simple - we'll add versioning and lifecycle rules in the next iteration.
# Category: cloud_storage_security

AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket for user-uploaded files and application backups.

Resources:
  UserFilesAndBackupsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-user-files-and-backups-${AWS::AccountId}"
      Tags:
        - Key: Project
          Value: MyApplication
        - Key: Environment
          Value: Development # Or appropriate environment
        - Key: DataClassification
          Value: Internal
        - Key: Purpose
          Value: UserFilesAndBackups

  UserFilesAndBackupsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UserFilesAndBackupsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:role/MyApplicationIAMRole" # Replace with your application's IAM role ARN or name
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !GetAtt UserFilesAndBackupsBucket.Arn
              - !Sub "${UserFilesAndBackupsBucket.Arn}/*"

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref UserFilesAndBackupsBucket
  BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt UserFilesAndBackupsBucket.Arn