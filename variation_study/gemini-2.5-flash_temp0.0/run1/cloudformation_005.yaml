AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for EC2 instances with EBS volumes for application data.
  Focus on quick deployment without encryption or backup policies.

Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance.
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair.
  InstanceType:
    Description: WebServer EC2 instance type.
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t2.nano
      - t2.micro
      - t2.small
      - t2.medium
      - t2.large
    ConstraintDescription: Must be a valid EC2 instance type.
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: The latest Amazon Linux 2023 AMI ID.
  VpcId:
    Description: The ID of the VPC where the EC2 instance will be launched.
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Description: The ID of the Subnet where the EC2 instance will be launched.
    Type: AWS::EC2::Subnet::Id
  AppVolumeSize:
    Description: Size of the application data EBS volume in GiB.
    Type: Number
    Default: 20
    MinValue: 1
    MaxValue: 16384

Resources:
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH and HTTP access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-SG

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - DeviceIndex: '0'
          AssociatePublicIpAddress: 'true'
          GroupSet:
            - !GetAtt EC2SecurityGroup.GroupId
          SubnetId: !Ref SubnetId
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-AppInstance
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<h1>Hello from ${AWS::StackName} EC2 Instance!</h1>" > /var/www/html/index.html

          # Define the expected device name and mount point
          DEVICE_NAME="/dev/xvdf" # Common device name for secondary volumes
          APP_MOUNT_POINT="/appdata"

          # Loop until the device is available