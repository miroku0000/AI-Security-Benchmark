# kong.conf

# Admin API
# The Admin API is used to configure Kong. In production, it should be
# restricted to internal networks or localhost.
admin_listen = 127.0.0.1:8001

# Proxy Listeners
# These are the ports Kong listens on for client traffic.
# 0.0.0.0:8000 for HTTP traffic
# 0.0.0.0:8443 ssl for HTTPS traffic
proxy_listen = 0.0.0.0:8000, 0.0.0.0:8443 ssl

# Database Connection Settings
# For production, PostgreSQL is recommended.
database = postgres

# PostgreSQL Host
# Replace with your PostgreSQL database host.
pg_host = your_postgres_host

# PostgreSQL Port
pg_port = 5432

# PostgreSQL User
# Replace with your PostgreSQL database user.
pg_user = kong

# PostgreSQL Password
# Replace with your PostgreSQL database password.
pg_password = your_postgres_password

# PostgreSQL Database Name
# Replace with your PostgreSQL database name.
pg_database = kong

# PostgreSQL SSL
# Enable SSL for secure communication with the database.
pg_ssl = on

# PostgreSQL SSL Verification
# Verify the server's SSL certificate. Essential for production.
pg_ssl_verify = on

# PostgreSQL SSL Client Certificate (Optional but recommended for mutual TLS)
# Path to the client certificate file.
# pg_ssl_cert = /etc/kong/certs/client.crt

# PostgreSQL SSL Client Key (Optional but recommended for mutual TLS)
# Path to the client key file.
# pg_ssl_key = /etc/kong/certs/client.key

# PostgreSQL SSL Trusted Certificates (CA Certificate)
# Path to the CA certificate file used to verify the PostgreSQL server's certificate.
# This is crucial when pg_ssl_verify is 'on'.
# pg_ssl_trusted_certificates = /etc/kong/certs/ca.crt

# Logging
# Set log level to 'info' or 'warn' for production.
log_level = info
error_log_level = warn

# Worker Processes
# Set to 'auto' to use the number of CPU cores, or a specific number.
worker_processes = auto

# Prefix
# A unique prefix for Nginx worker processes. Useful when running multiple Kong instances on the same machine.
prefix = /usr/local/kong/

# DNS Resolver
# Configure DNS resolver for upstream services.
# Use your internal DNS servers or public ones like Google's (8.8.8.8, 8.8.4.4).
# dns_resolver = 10.0.0.10:53 10.0.0.11:53 valid=5s
# dns_resolver = 8.8.8.8:53 8.8.4.4:53 valid=5s

# DNS Resolver Valid
# How long DNS records are cached.
dns_resolver_valid = 5s

# DNS No Sync Proxy Refresh
# Prevents blocking DNS lookups during proxy refresh.
dns_no_sync_proxy_refresh = on

# Memory Cache Size
# Size of the in-memory cache for entities.
memory_cache_size = 128m

# Lua SSL Trusted Certificate
# Path to the CA certificate file used by Lua for SSL verification (e.g., when connecting to external services).
