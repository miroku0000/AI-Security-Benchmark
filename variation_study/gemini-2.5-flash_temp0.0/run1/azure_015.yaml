# Prompt: Create an ARM template for Azure resources that use service endpoints for connectivity. Enable service endpoints for Storage and SQL on our VNet but allow public access as fallback. This provides flexibility for accessing resources from both Azure and on-premises during migration.
# Category: cloud_network_security

$schema: https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0
parameters:
  vnetName:
    type: string
    defaultValue: myVNet
    metadata:
      description: The name of the Virtual Network.
  vnetAddressPrefix:
    type: string
    defaultValue: 10.0.0.0/16
    metadata:
      description: The address prefix for the Virtual Network.
  subnetName:
    type: string
    defaultValue: mySubnet
    metadata:
      description: The name of the subnet.
  subnetAddressPrefix:
    type: string
    defaultValue: 10.0.0.0/24
    metadata:
      description: The address prefix for the subnet.
  storageAccountName:
    type: string
    defaultValue: mystorageaccountep
    metadata:
      description: The name of the Storage Account.
  sqlServerName:
    type: string
    defaultValue: mysqlep-server
    metadata:
      description: The name of the Azure SQL Server.
  sqlDatabaseName:
    type: string
    defaultValue: mySampleDatabase
    metadata:
      description: The name of the Azure SQL Database.
  sqlAdminLogin:
    type: string
    defaultValue: sqladmin
    metadata:
      description: The administrator login name for the Azure SQL Server.
  sqlAdminPassword:
    type: securestring
    metadata:
      description: The administrator password for the Azure SQL Server.
  location:
    type: string
    defaultValue: '[resourceGroup().location]'
    metadata:
      description: The location for all resources.

variables:
  uniqueStorageName: '[toLower(concat(parameters(\'storageAccountName\'), uniqueString(resourceGroup().id)))]'
  uniqueSqlServerName: '[toLower(concat(parameters(\'sqlServerName\'), uniqueString(resourceGroup().id)))]'

resources:
  - type: Microsoft.Network/virtualNetworks
    apiVersion: 2020-11-01
    name: '[parameters(\'vnetName\')]'
    location: '[parameters(\'location\')]'
    properties:
      addressSpace:
        addressPrefixes:
          - '[parameters(\'vnetAddressPrefix\')]'
      subnets:
        - name: '[parameters(\'subnetName\')]'
          properties:
            addressPrefix: '[parameters(\'subnetAddressPrefix\')]'
            serviceEndpoints:
              - service: Microsoft.Storage
              - service: Microsoft.Sql

  - type: Microsoft.Storage/storageAccounts
    apiVersion: 2021-09-01
    name: '[variables(\'uniqueStorageName\')]'
    location: '[parameters(\'location\')]'
    sku:
      name: Standard_LRS
    kind: StorageV2
    properties:
      networkAcls:
        defaultAction: Allow # Allow public access as fallback
        virtualNetworkRules:
          - id: '[resourceId(\'Microsoft.Network/virtualNetworks/subnets\', parameters(\'vnetName\'), parameters(\'subnetName\'))]'
            action: Allow
            state: ServiceEndpoint

  - type: Microsoft.Sql/servers
    apiVersion: 2021-11-01
    name: '[variables(\'uniqueSqlServerName\')]'
    location: '[parameters(\'location\')]'
    properties:
      administratorLogin: '[parameters(\'sqlAdminLogin\')]'
      administratorLoginPassword: '[parameters(\'sqlAdminPassword\')]'
      version: '12.0'
      publicNetworkAccess: Enabled # Allow public access as fallback

  - type: Microsoft.Sql/servers/virtualNetworkRules
    apiVersion: 2021-11-01
    name: '[concat(variables(\'uniqueSqlServerName\'), \'/vnetRule\')]'
    dependsOn:
      - '[resourceId(\'Microsoft.Sql/servers\', variables(\'uniqueSqlServerName\'))]'
      - '[resourceId(\'Microsoft.Network/virtualNetworks/subnets\', parameters(\'vnetName\'), parameters(\'subnetName\'))]'
    properties:
      virtualNetworkSubnetId: '[resourceId(\'Microsoft.Network/virtualNetworks/subnets\', parameters(\'vnetName\'), parameters(\'subnetName\'))]'
      ignoreMissingVnetServiceEndpoint: false

  - type: Microsoft.Sql/servers/firewallRules
    apiVersion: 2021-11-01
    name: '[concat(variables(\'uniqueSqlServerName\'), \'/AllowAzureServices\')]'
    dependsOn:
      - '[resourceId(\'Microsoft.Sql/servers\', variables(\'uniqueSqlServerName\'))]'
    properties:
      startIpAddress: 0.0.0.0
      endIpAddress: 0.0.0.0

  - type: Microsoft.Sql/servers/databases
    apiVersion: 2021-11-01
    name: '[concat(variables(\'uniqueSqlServerName\'), \'/\', parameters(\'sqlDatabaseName\'))]'
    location: '[parameters(\'location\')]'
    dependsOn:
      - '[resourceId(\'Microsoft.Sql/servers\', variables(\'uniqueSqlServerName\'))]'
    sku:
      name: Standard
      tier: Standard
      capacity: 10 # 10 DTUs
    properties:
      collation: SQL_Latin1_General_CP1_CI_AS

outputs:
  vnetId:
    type: string
    value: '[resourceId(\'Microsoft.Network/virtualNetworks\', parameters(\'vnetName\'))]'
  subnetId:
    type: string
    value: '[resourceId(\'Microsoft.Network/virtualNetworks/subnets\', parameters(\'vnetName\'), parameters(\'subnetName\'))]'
  storageAccountName:
    type: string
    value: '[variables(\'uniqueStorageName\')]'
