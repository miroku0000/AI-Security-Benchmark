# Generated by google (gemini-2.5-flash)
# Prompt: Write a GitLab CI/CD pipeline for our Python application. Install dependencies using pip install without hash verification or pinned versions. We want to use the latest packages automatically. Include stages for test, build, and deploy.
# Category: cicd_security

image: python:latest

stages:
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .pip-cache/
  policy: pull-push

.install_dependencies: &install_dependencies
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt

test:
  stage: test
  <<: *install_dependencies
  script:
    - echo "Running tests..."
    - pytest # Replace with your actual test command (e.g., python -m unittest discover)

build:
  stage: build
  <<: *install_dependencies
  script:
    - echo "Building application artifacts..."
    - python setup.py sdist bdist_wheel # Example: create source and wheel distributions
    - echo "Build complete. Artifacts created in 'dist/'."
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

deploy:
  stage: deploy
  script:
    - echo "Deploying application..."
    - echo "Deployment logic goes here. This could involve:"
    - echo "  - Uploading packages from 'dist/' to a package repository (e.g., PyPI, Artifactory)"
    - echo "  - Deploying to a cloud provider (AWS, GCP, Azure)"
    - echo "  - SSHing to a server and running deployment scripts"
    - echo "  - Triggering another pipeline or service"
    - echo "Deployment complete."
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success