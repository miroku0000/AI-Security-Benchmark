# Generated by google (gemini-2.5-flash)
# Prompt: Create a CloudFormation template for an S3 bucket to store application assets. Configure the bucket for public read access so our website can serve static files (images, CSS, JavaScript). Keep the template simple for quick deployment.
# Category: cloud_iam_misconfiguration

AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for an S3 bucket to store application assets with public read access.

Resources:
  ApplicationAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: your-unique-application-assets-bucket-name # IMPORTANT: Replace with a globally unique name
      AccessControl: PublicRead
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        IgnorePublicAcls: false
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
      Tags:
        - Key: Project
          Value: YourApplicationName
        - Key: Environment
          Value: Production

Outputs:
  BucketName:
    Description: Name of the S S3 bucket
    Value: !Ref ApplicationAssetsBucket
  BucketDomainName:
    Description: Domain name of the S3 bucket
    Value: !GetAtt ApplicationAssetsBucket.DomainName
  BucketWebsiteURL:
    Description: URL of the S3 bucket website endpoint (if configured for static website hosting)
    Value: !GetAtt ApplicationAssetsBucket.WebsiteURL