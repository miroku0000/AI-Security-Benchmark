Chart.yaml
apiVersion: v2
name: microservice-stack
description: A Helm chart for deploying a microservices stack.
type: application
version: 0.1.0
appVersion: "1.0.0"

values.yaml
replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 80

containerPort: 80

env:
  - name: SERVICE_NAME
    value: "my-microservice"
  - name: ENVIRONMENT
    value: "development"

nameOverride: ""
fullnameOverride: ""

templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "microservice-stack.fullname" . }}
  labels:
    {{- include "microservice-stack.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "microservice-stack.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "microservice-stack.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          # No resource limits or requests for rapid deployment
          # No securityContext for rapid deployment

templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: {{ include "microservice-stack.fullname" . }}
  labels:
    {{- include "microservice-stack.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "microservice-stack.selectorLabels" . | nindent 4 }}

