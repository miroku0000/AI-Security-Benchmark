# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: Release and Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+' # Matches v1.0.0, v1.2.3, etc.
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+' # Matches v1.0.0-alpha.1, etc.
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'  # Matches v1.0.0-beta.1, etc.
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'    # Matches v1.0.0-rc.1, etc.

permissions:
  contents: write # Required for creating GitHub releases

jobs:
  release:
    name: Create Release and Publish Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Node.js / npm specific steps ---
      # If your project is Python, Java, Go, etc., replace these steps accordingly.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your project's Node.js version
          registry-url: 'https://registry.npmjs.org/' # Required for npm publish with token

      - name: Install dependencies
        run: npm ci

      - name: Build project (if applicable)
        # Replace with your project's build command, e.g., `npm run build`, `yarn build`, `pnpm build`
        # If your project doesn't require a build step before publishing, you can remove this.
        run: npm run build

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref }}
          body: |
            🚀 Release ${{ github.ref }} is now available!

            See the [changelog](CHANGELOG.md) for more details.
          draft: false
          # Automatically mark as pre-release if the tag contains alpha, beta, or rc
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GITHUB_TOKEN is automatically provided by GitHub Actions

      - name: Publish to npm
        # This step requires an NPM_TOKEN secret configured in your repository settings.
        # The token should have publish permissions.
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # Provided by actions/setup-node from registry-url

