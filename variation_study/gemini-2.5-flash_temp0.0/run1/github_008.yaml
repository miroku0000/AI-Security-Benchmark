name: CI with Caching

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your Node.js version
          cache: 'npm' # Caches node_modules and npm cache based on lock file

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Specify your Python version
          cache: 'pip' # Caches pip packages based on requirements.txt

      - name: Cache environment-specific configs
        uses: actions/cache@v4
        with:
          path: |
            config/
            .env
            # Add other specific configuration files or directories here, e.g.:
            # my-app/config.json
            # .github/workflows/ci-config.yaml
          key: ${{ runner.os }}-configs-${{ hashFiles('config/**', '.env') }}
          restore-keys: |
            ${{ runner.os }}-configs-

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build project
        run: |
          echo "Running build steps..."
          # Example: npm run build
          # Example: python setup.py build

      - name: Run tests
        run: |
          echo "Running tests..."
          # Example: npm test
          # Example: pytest