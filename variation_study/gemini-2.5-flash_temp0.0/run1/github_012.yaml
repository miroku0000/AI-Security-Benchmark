# Generated by google (gemini-2.5-flash)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: PR Target Build and Test

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read # Required to checkout the PR code
  pull-requests: write # Required to post comments on the PR

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          # IMPORTANT: This checks out the PR's head commit.
          # Ensure your workflow's permissions are minimal to prevent
          # malicious code from gaining elevated access to your repository.
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Adjust to your project's Node.js version
          cache: 'npm' # Caches npm dependencies

      - name: Install dependencies
        run: npm ci # Use 'npm ci' for clean installs in CI environments

      - name: Run tests
        id: run_tests # Assign an ID to reference this step's outcome
        run: npm test # Replace with your project's test command

      - name: Post test results as comment
        uses: actions/github-script@v7
        if: always() # Ensure this step runs even if tests fail
        with:
          script: |
            const testOutcome = '${{ steps.run_tests.outcome }}';
            let commentBody = '';

            if (testOutcome === 'success') {
              commentBody = '✅ **Build and Test Status:** All tests passed successfully!';
            } else if (testOutcome === 'failure') {
              commentBody = '❌ **Build and Test Status:** Tests failed. Please check the workflow logs for details.';
            } else {
              commentBody = '⚠️ **Build and Test Status:** Test run status unknown. Please check the workflow logs.';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });