# Kafka Broker Configuration (server.properties) for Production

############################# Server Basics #############################

# The ID of the broker. This must be set to a unique integer for each broker in the cluster.
broker.id=1

# The address the socket server listens on. This is a comma-separated list of URIs.
# Each URI may be prefixed with a listener name.
# Example for PLAINTEXT: listeners=PLAINTEXT://:9092
# Example for SSL: listeners=SSL://:9093
# Example for multiple listeners: listeners=PLAINTEXT://:9092,SSL://:9093
# For production, consider using SSL for secure communication.
listeners=PLAINTEXT://:9092

# Hostname and port the broker will advertise to producers and consumers.
# This is the address that clients will use to connect to the broker.
# It is crucial to set this to the external IP address or resolvable hostname if clients are outside the broker's network.
# If not set, it defaults to the value from 'listeners'.
advertised.listeners=PLAINTEXT://your_broker_ip_address:9092

# The number of threads that the server uses for receiving requests from the network and sending responses.
num.network.threads=3

# The number of threads that the server uses for processing requests, which includes disk I/O.
num.io.threads=8

# The send buffer (SO_SNDBUF) used by the socket server.
socket.send.buffer.bytes=1048576

# The receive buffer (SO_RCVBUF) used by the socket server.
socket.receive.buffer.bytes=1048576

# The maximum size of a request that the socket server will accept (protection against OOM).
socket.request.max.bytes=104857600


############################# Log Configuration #############################

# A comma-separated list of directories under which to store log files.
# It is highly recommended to use multiple directories on different physical disks for better performance and fault tolerance.
log.dirs=/kafka/data/kafka-logs-1,/kafka/data/kafka-logs-2,/kafka/data/kafka-logs-3

# The default number of log partitions per topic. More partitions allow for greater parallelism.
# This is a default for newly created topics. Existing topics are unaffected.
num.partitions=9

# The number of threads per data directory to be used for log recovery at startup and flushing at shutdown.
num.recovery.threads.per.data.dir=1

# The maximum size of a log segment file. When this size is reached, a new log segment is created.
log.segment.bytes=1073741824 # 1 GB

# The maximum time a log file will be retained before it is deleted or compacted.
# Default is 7 days (168 hours). Set to a value appropriate for your data retention policy.
log.retention.hours=168

# The interval at which the log cleaner checks whether any log segments can be deleted.
log.retention.check.interval.ms=300000 # 5 minutes

# Enable log compaction (for topics configured with 'cleanup.policy=compact').
# log.cleaner.enable=true
# The minimum age of a log segment that will remain in the log when log compaction is enabled.
# log.cleaner.delete.retention.ms=86400000 # 1 day
# The minimum ratio of dirty (uncompacted) records in a log segment to be eligible for compaction.
# log.cleaner.min.cleanable.dirty.ratio=0.5


############################# Zookeeper #############################

# Zookeeper connection string (comma-separated list of host:port pairs).
# Example: zookeeper.connect=zk1:2181,zk2:2181,zk3:2181
zookeeper.connect=your_zookeeper_ip_1:2181,your_zookeeper_ip_2:2181,your_zookeeper_ip_3:2181

# The timeout in ms for connecting to Zookeeper.
zookeeper.connection.timeout.ms=6000


############################# Replication #############################

# The default number of replicas for newly created topics.
# For production, this should typically be 3 for high availability and durability.
default.replication.factor=3

# The minimum number of replicas that must acknowledge a write for the write to be considered successful.
# This ensures data durability. Set to (default.replication.factor / 2) + 1 or similar.
# For default.replication.factor=3, min.insync.replicas=2 is a common choice.
min.insync.replicas=2

# Enable or disable unclean leader election.
# In production, it is generally recommended to disable this to prevent data loss,
# even if it means a partition might be unavailable until a replica recovers.
unclean.leader.election.enable=false


############################# Auto Topic Creation #############################

# Enable or disable auto creation of topics.
# In production, it's often recommended to disable this and manage topics explicitly via tooling.
auto.create.topics.enable=false


############################# Message Size #############################

# The maximum size of a message that can be sent by a producer.
# This should be consistent across producers, brokers, and consumers.
message.max.bytes=1048576 # 1 MB (default) - adjust if you have larger messages

# The maximum size of a message that can be fetched by a replica.
# Should be at least message.max.bytes.
replica.fetch.max.bytes=1048576 # 1 MB (default) - adjust if you have larger messages