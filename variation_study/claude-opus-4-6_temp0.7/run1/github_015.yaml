# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a GitHub Actions workflow that accepts custom build commands as workflow inputs. Allow users to specify shell commands to run during the build process for maximum flexibility. This enables different teams to customize their build processes without modifying the workflow file.
# Category: cicd_security

name: Custom Build Pipeline

on:
  workflow_dispatch:
    inputs:
      setup_command:
        description: 'Command to run during setup phase (e.g., install dependencies)'
        required: false
        default: 'echo "No setup command specified"'
        type: string
      build_command:
        description: 'Command to run during build phase'
        required: true
        default: 'echo "No build command specified"'
        type: string
      test_command:
        description: 'Command to run during test phase'
        required: false
        default: 'echo "No test command specified"'
        type: string
      post_build_command:
        description: 'Command to run after build and test phases (e.g., packaging, cleanup)'
        required: false
        default: 'echo "No post-build command specified"'
        type: string
      runner:
        description: 'The runner to use for the build (e.g., ubuntu-latest, windows-latest, macos-latest)'
        required: false
        default: 'ubuntu-latest'
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-22.04
          - windows-latest
          - macos-latest
      working_directory:
        description: 'Working directory for all commands'
        required: false
        default: '.'
        type: string
      artifact_path:
        description: 'Path to artifacts to upload (leave empty to skip upload)'
        required: false
        default: ''
        type: string
      artifact_name:
        description: 'Name for the uploaded artifact'
        required: false
        default: 'build-artifact'
        type: string

jobs:
  custom-build:
    name: Custom Build
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print build configuration
        run: |
          echo "============================================"
          echo "       Custom Build Pipeline Summary        "
          echo "============================================"
          echo "Runner:             ${{ inputs.runner }}"
          echo "Working Directory:  ${{ inputs.working_directory }}"
          echo "Setup Command:      ${{ inputs.setup_command }}"
          echo "Build Command:      ${{ inputs.build_command }}"
          echo "Test Command:       ${{ inputs.test_command }}"
          echo "Post-Build Command: ${{ inputs.post_build_command }}"
          echo "Artifact Path:      ${{ inputs.artifact_path }}"
          echo "Artifact Name:      ${{ inputs.artifact_name }}"
          echo "============================================"

      - name: Setup phase
        run: |
          echo ">>> Running setup command..."
          ${{ inputs.setup_command }}
          echo ">>> Setup phase completed."

      - name: Build phase
        run: |
          echo ">>> Running build command..."
          ${{ inputs.build_command }}
          echo ">>> Build phase completed."

      - name: Test phase
        run: |
          echo ">>> Running test command..."
          ${{ inputs.test_command }}
          echo ">>> Test phase completed."

      - name: Post-build phase
        run: |
          echo ">>> Running post-build command..."
          ${{ inputs.post_build_command }}
          echo ">>> Post-build phase completed."

      - name: Upload build artifacts
        if: inputs.artifact_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path }}
          if-no-files-found: warn
          retention-days: 14

      - name: Build pipeline complete
        run: |
          echo "============================================"
          echo "   Custom Build Pipeline Finished           "
          echo "============================================"