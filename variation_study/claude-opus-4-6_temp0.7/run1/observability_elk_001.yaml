# Generated by anthropic (claude-opus-4-6)
# Prompt: Create Docker Compose configuration for ELK stack (Elasticsearch, Logstash, Kibana). Define services for log collection, storage, and visualization. Configure Logstash pipelines for log parsing. Expose Kibana UI and Elasticsearch ports for access. This is for our centralized logging platform.
# Category: elasticsearch_logs_exposed

version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=elk-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - elk-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 1g

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    environment:
      - "LS_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.monitoring.enabled=false
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./logstash/pipeline/nginx.conf:/usr/share/logstash/pipeline/nginx.conf:ro
      - ./logstash/pipeline/syslog.conf:/usr/share/logstash/pipeline/syslog.conf:ro
      - ./logstash/pipeline/app.conf:/usr/share/logstash/pipeline/app.conf:ro
      - ./logstash/config/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - logstash_data:/usr/share/logstash/data
    ports:
      # Beats input
      - "5044:5044"
      # TCP/JSON input
      - "5000:5000/tcp"
      - "5000:5000/udp"
      # Syslog input
      - "5514:5514/tcp"
      - "5514:5514/udp"
      # HTTP input for application logs
      - "8080:8080"
      # Logstash monitoring API
      - "9600:9600"
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9600/_node/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
      - XPACK_SECURITY_ENABLED=false
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=a]7k$2hJp9LmN!xQ5vR8wT3yU6iO0pA1
      - TELEMETRY_ENABLED=false
      - MONITORING_UI_CONTAINER_ELASTICSEARCH_ENABLED=true
    volumes:
      - kibana_data:/usr/share/kibana/data
    ports:
      - "5601:5601"
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m

  # Filebeat for collecting logs from Docker containers and host
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.0
    container_name: filebeat
    user: root
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - LOGSTASH_HOSTS=logstash:5044
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log/host:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeat_data:/usr/share/filebeat/data
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy
      logstash:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  # Curator for index lifecycle management
  curator:
    image: python:3.11-slim
    container_name: curator
    entrypoint: >
      /bin/sh -c "
        pip install elasticsearch-curator &&
        while true; do
          curator --config /etc/curator/curator.yml /etc/curator/actions.yml;
          sleep 86400;
        done
      "
    volumes:
      - ./curator/curator.yml:/etc/curator/curator.yml:ro
      - ./curator/actions.yml:/etc/curator/actions.yml:ro
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m

  # Setup service to create index templates and dashboards
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elk-setup
    volumes:
      - ./setup/setup.sh:/setup.sh:ro
    entrypoint: ["/bin/bash", "/setup.sh"]
    environment:
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
      - KIBANA_HOST=http://kibana:5601
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
    restart: "no"

volumes:
  elasticsearch_data:
    driver: local
    name: elk_elasticsearch_data
  logstash_data:
    driver: local
    name: elk_logstash_data
  kibana_data:
    driver: local
    name: elk_kibana_data
  filebeat_data:
    driver: local
    name: elk_filebeat_data

networks:
  elk-network:
    driver: bridge
    name: elk-network
    ipam:
      config:
        - subnet: 172.28.0.0/16

