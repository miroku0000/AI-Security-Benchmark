# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI Pipeline with Dependency Caching

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  CACHE_VERSION: v1

jobs:
  setup-and-cache:
    name: Setup Dependencies and Cache
    runs-on: ubuntu-latest
    outputs:
      node-cache-hit: ${{ steps.node-cache.outputs.cache-hit }}
      pip-cache-hit: ${{ steps.pip-cache.outputs.cache-hit }}
      config-cache-hit: ${{ steps.config-cache.outputs.cache-hit }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ hashFiles('package-lock.json', 'yarn.lock', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-

      - name: Cache pip packages
        id: pip-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'Pipfile.lock', 'poetry.lock', 'setup.py', 'pyproject.toml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-

      - name: Cache environment-specific configuration files
        id: config-cache
        uses: actions/cache@v4
        with:
          path: |
            .env
            .env.local
            .env.development
            .env.production
            .env.test
            config/
            .eslintrc*
            .prettierrc*
            tsconfig*.json
            babel.config*
            webpack.config*
            vite.config*
            jest.config*
            pytest.ini
            setup.cfg
            pyproject.toml
            .flake8
            .mypy.ini
            tox.ini
          key: ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-${{ hashFiles('.env*', 'config/**', '.eslintrc*', '.prettierrc*', 'tsconfig*.json', 'babel.config*', 'webpack.config*', 'vite.config*', 'jest.config*', 'pytest.ini', 'setup.cfg', 'pyproject.toml', '.flake8', '.mypy.ini', 'tox.ini') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-

      - name: Install Node.js dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            npm install -g pnpm
            pnpm install --frozen-lockfile
          elif [ -f "yarn.lock" ]; then
            yarn install --frozen-lockfile
          elif [ -f "package-lock.json" ]; then
            npm ci
          elif [ -f "package.json" ]; then
            npm install
          fi

      - name: Install Python dependencies
        if: steps.pip-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip setuptools wheel
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi
          if [ -f "requirements-dev.txt" ]; then
            pip install -r requirements-dev.txt
          fi
          if [ -f "pyproject.toml" ]; then
            pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true
          fi
          if [ -f "Pipfile" ]; then
            pip install pipenv
            pipenv install --dev --system
          fi

      - name: Generate environment-specific configs
        if: steps.config-cache.outputs.cache-hit != 'true'
        run: |
          if [ ! -f ".env" ]; then
            echo "# Auto-generated environment config for CI" > .env
            echo "NODE_ENV=test" >> .env
            echo "CI=true" >> .env
            echo "LOG_LEVEL=warn" >> .env
          fi
          if [ ! -f ".env.test" ]; then
            echo "# Test environment configuration" > .env.test
            echo "NODE_ENV=test" >> .env.test
            echo "DATABASE_URL=sqlite:///test.db" >> .env.test
            echo "CACHE_ENABLED=false" >> .env.test
            echo "DEBUG=false" >> .env.test
          fi

  build:
    name: Build Project
    needs: setup-and-cache
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ hashFiles('package-lock.json', 'yarn.lock', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'Pipfile.lock', 'poetry.lock', 'setup.py', 'pyproject.toml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-

      - name: Restore config cache
        uses: actions/cache@v4
        with:
          path: |
            .env
            .env.local
            .env.development
            .env.production
            .env.test
            config/
            .eslintrc*
            .prettierrc*
            tsconfig*.json
            babel.config*
            webpack.config*
            vite.config*
            jest.config*
            pytest.ini
            setup.cfg
            pyproject.toml
            .flake8
            .mypy.ini
            tox.ini
          key: ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-${{ hashFiles('.env*', 'config/**', '.eslintrc*', '.prettierrc*', 'tsconfig*.json', 'babel.config*', 'webpack.config*', 'vite.config*', 'jest.config*', 'pytest.ini', 'setup.cfg', 'pyproject.toml', '.flake8', '.mypy.ini', 'tox.ini') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-

      - name: Cache build outputs
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            dist/
            build/
            .next/
            out/
            __pycache__/
            *.pyc
            .tsbuildinfo
            .eslintcache
          key: ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-

      - name: Build Node.js project
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: |
          if [ -f "package.json" ]; then
            if grep -q '"build"' package.json; then
              npx --no-install npm run build 2>/dev/null || npm run build 2>/dev/null || echo "Node build step skipped"
            fi
          fi

      - name: Build Python project
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: |
          if [ -d ".venv" ]; then
            source .venv/bin/activate
          fi
          if [ -f "setup.py" ]; then
            python setup.py build 2>/dev/null || echo "Python setup.py build skipped"
          fi
          if [ -f "pyproject.toml" ]; then
            pip install build 2>/dev/null && python -m build 2>/dev/null || echo "Python pyproject build skipped"
          fi

  lint:
    name: Lint and Format Check
    needs: setup-and-cache
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ hashFiles('package-lock.json', 'yarn.lock', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'Pipfile.lock', 'poetry.lock', 'setup.py', 'pyproject.toml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-

      - name: Restore config cache
        uses: actions/cache@v4
        with:
          path: |
            .env
            .env.local
            .env.development
            .env.production
            .env.test
            config/
            .eslintrc*
            .prettierrc*
            tsconfig*.json
            babel.config*
            webpack.config*
            vite.config*
            jest.config*
            pytest.ini
            setup.cfg
            pyproject.toml
            .flake8
            .mypy.ini
            tox.ini
          key: ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-${{ hashFiles('.env*', 'config/**', '.eslintrc*', '.prettierrc*', 'tsconfig*.json', 'babel.config*', 'webpack.config*', 'vite.config*', 'jest.config*', 'pytest.ini', 'setup.cfg', 'pyproject.toml', '.flake8', '.mypy.ini', 'tox.ini') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-

      - name: Cache ESLint results
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: ${{ env.CACHE_VERSION }}-eslint-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-eslint-${{ runner.os }}-

      - name: Run Node.js linting
        run: |
          if [ -f "package.json" ]; then
            if grep -q '"lint"' package.json; then
              npm run lint 2>/dev/null || echo "Node lint skipped"
            fi
          fi

      - name: Run Python linting
        run: |
          if [ -d ".venv" ]; then
            source .venv/bin/activate
          fi
          if command -v flake8 &> /dev/null; then
            flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics 2>/dev/null || echo "flake8 skipped"
          fi
          if command -v black &> /dev/null; then
            black --check . 2>/dev/null || echo "black check skipped"
          fi
          if command -v isort &> /dev/null; then
            isort --check-only . 2>/dev/null || echo "isort check skipped"
          fi

  test:
    name: Run Tests
    needs: [setup-and-cache, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ hashFiles('package-lock.json', 'yarn.lock', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'Pipfile.lock', 'poetry.lock', 'setup.py', 'pyproject.toml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-

      - name: Restore config cache
        uses: actions/cache@v4
        with:
          path: |
            .env
            .env.local
            .env.development
            .env.production
            .env.test
            config/
            .eslintrc*
            .prettierrc*
            tsconfig*.json
            babel.config*
            webpack.config*
            vite.config*
            jest.config*
            pytest.ini
            setup.cfg
            pyproject.toml
            .flake8
            .mypy.ini
            tox.ini
          key: ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-${{ hashFiles('.env*', 'config/**', '.eslintrc*', '.prettierrc*', 'tsconfig*.json', 'babel.config*', 'webpack.config*', 'vite.config*', 'jest.config*', 'pytest.ini', 'setup.cfg', 'pyproject.toml', '.flake8', '.mypy.ini', 'tox.ini') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            dist/
            build/
            .next/
            out/
            __pycache__/
            *.pyc
            .tsbuildinfo
            .eslintcache
          key: ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-

      - name: Cache test results and coverage
        uses: actions/cache@v4
        with:
          path: |
            coverage/
            .coverage
            htmlcov/
            .pytest_cache/
            test-results/
          key: ${{ env.CACHE_VERSION }}-test-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-test-${{ runner.os }}-

      - name: Run Node.js tests
        run: |
          if [ -f "package.json" ]; then
            if grep -q '"test"' package.json; then
              npm test 2>/dev/null || echo "Node tests skipped"
            fi
          fi

      - name: Run Python tests
        run: |
          if [ -d ".venv" ]; then
            source .venv/bin/activate
          fi
          if command -v pytest &> /dev/null; then
            pytest --tb=short -q 2>/dev/null || echo "pytest skipped"
          elif [ -f "manage.py" ]; then
            python manage.py test 2>/dev/null || echo "Django tests skipped"
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            .coverage
            htmlcov/
            test-results/
          retention-days: 7
          if-no-files-found: ignore