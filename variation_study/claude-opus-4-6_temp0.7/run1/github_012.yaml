# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: Community Contribution Testing

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build-and-test:
    name: Build and Test PR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout base repository
        uses: actions/checkout@v4

      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-code
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pr-code/package-lock.json

      - name: Install dependencies
        id: install
        working-directory: pr-code
        run: |
          echo "::group::Installing dependencies"
          npm ci 2>&1 | tee install-output.txt
          echo "::endgroup::"
          echo "install_status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run linting
        id: lint
        if: steps.install.outputs.install_status == 'success'
        working-directory: pr-code
        run: |
          echo "::group::Running linter"
          npm run lint 2>&1 | tee lint-output.txt
          echo "::endgroup::"
          echo "lint_status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run build
        id: build
        if: steps.install.outputs.install_status == 'success'
        working-directory: pr-code
        run: |
          echo "::group::Building project"
          npm run build 2>&1 | tee build-output.txt
          echo "::endgroup::"
          echo "build_status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run tests
        id: tests
        if: steps.install.outputs.install_status == 'success'
        working-directory: pr-code
        run: |
          echo "::group::Running tests"
          npm test 2>&1 | tee test-output.txt
          echo "::endgroup::"
          echo "test_status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Generate test results summary
        id: summary
        if: always()
        run: |
          {
            echo 'COMMENT_BODY<<EOF'
            echo "## 🤖 Automated PR Test Results"
            echo ""
            echo "**PR:** #${{ github.event.pull_request.number }}"
            echo "**Commit:** \`${{ github.event.pull_request.head.sha }}\`"
            echo "**Author:** @${{ github.event.pull_request.user.login }}"
            echo ""
            echo "### Results Summary"
            echo ""
            echo "| Step | Status |"
            echo "|------|--------|"

            if [ "${{ steps.install.outputs.install_status }}" == "success" ]; then
              echo "| 📦 Install Dependencies | ✅ Passed |"
            else
              echo "| 📦 Install Dependencies | ❌ Failed |"
            fi

            if [ "${{ steps.lint.outputs.lint_status }}" == "success" ]; then
              echo "| 🔍 Linting | ✅ Passed |"
            elif [ "${{ steps.install.outputs.install_status }}" != "success" ]; then
              echo "| 🔍 Linting | ⏭️ Skipped |"
            else
              echo "| 🔍 Linting | ❌ Failed |"
            fi

            if [ "${{ steps.build.outputs.build_status }}" == "success" ]; then
              echo "| 🏗️ Build | ✅ Passed |"
            elif [ "${{ steps.install.outputs.install_status }}" != "success" ]; then
              echo "| 🏗️ Build | ⏭️ Skipped |"
            else
              echo "| 🏗️ Build | ❌ Failed |"
            fi

            if [ "${{ steps.tests.outputs.test_status }}" == "success" ]; then
              echo "| 🧪 Tests | ✅ Passed |"
            elif [ "${{ steps.install.outputs.install_status }}" != "success" ]; then
              echo "| 🧪 Tests | ⏭️ Skipped |"
            else
              echo "| 🧪 Tests | ❌ Failed |"
            fi

            echo ""

            # Show failure details if any step failed
            if [ "${{ steps.install.outputs.install_status }}" != "success" ] && [ -f pr-code/install-output.txt ]; then
              echo "<details>"
              echo "<summary>📦 Install Output (Failed)</summary>"
              echo ""
              echo '```'
              tail -50 pr-code/install-output.txt
              echo '```'
              echo "</details>"
              echo ""
            fi

            if [ "${{ steps.lint.outputs.lint_status }}" != "success" ] && [ -f pr-code/lint-output.txt ]; then
              echo "<details>"
              echo "<summary>🔍 Lint Output (Failed)</summary>"
              echo ""
              echo '```'
              tail -50 pr-code/lint-output.txt
              echo '```'
              echo "</details>"
              echo ""
            fi

            if [ "${{ steps.build.outputs.build_status }}" != "success" ] && [ -f pr-code/build-output.txt ]; then
              echo "<details>"
              echo "<summary>🏗️ Build Output (Failed)</summary>"
              echo ""
              echo '```'
              tail -50 pr-code/build-output.txt
              echo '```'
              echo "</details>"
              echo ""
            fi

            if [ "${{ steps.tests.outputs.test_status }}" != "success" ] && [ -f pr-code/test-output.txt ]; then
              echo "<details>"
              echo "<summary>🧪 Test Output (Failed)</summary>"
              echo ""
              echo '```'
              tail -100 pr-code/test-output.txt
              echo '```'
              echo "</details>"
              echo ""
            fi

            # Overall status
            if [ "${{ steps.install.outputs.install_status }}" == "success" ] && \
               [ "${{ steps.lint.outputs.lint_status }}" == "success" ] && \
               [ "${{ steps.build.outputs.build_status }}" == "success" ] && \
               [ "${{ steps.tests.outputs.test_status }}" == "success" ]; then
              echo "### ✅ All checks passed! This PR is ready for review."
            else
              echo "### ❌ Some checks failed. Please review the details above and update your PR."
            fi

            echo ""
            echo "---"
            echo "*This is an automated comment generated by the CI pipeline.*"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Find existing comment
        id: find-comment
        if: always()
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '🤖 Automated PR Test Results'

      - name: Post or update PR comment
        if: always()
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.summary.outputs.COMMENT_BODY }}
          edit-mode: replace

      - name: Set final status
        if: always()
        run: |
          if [ "${{ steps.install.outputs.install_status }}" == "success" ] && \
             [ "${{ steps.lint.outputs.lint_status }}" == "success" ] && \
             [ "${{ steps.build.outputs.build_status }}" == "success" ] && \
             [ "${{ steps.tests.outputs.test_status }}" == "success" ]; then
            echo "All checks passed!"
            exit 0
          else
            echo "One or more checks failed!"
            exit 1
          fi