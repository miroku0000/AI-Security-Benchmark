# Canary Deployment - Backend API v2 with Istio sidecar for traffic splitting
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api-service-v2
  namespace: microservices
  labels:
    app: backend-api-service
    version: v2
    mesh: istio
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "Canary deployment of Backend API v2 with Istio sidecar for traffic splitting"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-api-service
      version: v2
  template:
    metadata:
      labels:
        app: backend-api-service
        version: v2
      annotations:
        # Enable Istio sidecar proxy injection for canary deployment
        sidecar.istio.io/inject: "true"
        sidecar.istio.io/proxyCPU: "200m"
        sidecar.istio.io/proxyMemory: "256Mi"
        sidecar.istio.io/proxyCPULimit: "1000m"
        sidecar.istio.io/proxyMemoryLimit: "512Mi"
        sidecar.istio.io/logLevel: "info"
        traffic.sidecar.istio.io/includeInboundPorts: "8081,9090"
        traffic.sidecar.istio.io/excludeOutboundPorts: "5432,6379"
        proxy.istio.io/config: |
          holdApplicationUntilProxyStarts: true
          concurrency: 2
          tracing:
            sampling: 100.0
    spec:
      serviceAccountName: backend-api-service-sa
      containers:
        - name: backend-api
          image: myregistry/backend-api-service:2.0.0
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
            - containerPort: 9090
              name: grpc
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "backend-api-service"
            - name: SERVICE_VERSION
              value: "v2"
            - name: DATABASE_HOST
              value: "postgres-db.microservices.svc.cluster.local"
            - name: DATABASE_PORT
              value: "5432"
            - name: REDIS_HOST
              value: "redis-cache.microservices.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10

---

# Istio DestinationRule for Backend API traffic splitting between v1 and v2
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: backend-api-service-destination
  namespace: microservices
  annotations:
    description: "Destination rule defining subsets for backend API v1 and v2 canary deployment"
spec:
  host: backend-api-service.microservices.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: DEFAULT
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
    - name: v1
      labels:
        version: v1
    - name: v2
      labels:
        version: v2

---

# Istio VirtualService for Backend API canary traffic splitting
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: backend-api-service-routing
  namespace: microservices
  annotations:
    description: "Virtual service routing 90% traffic to v1 and 10% to v2 canary"
spec:
  hosts:
    - backend-api-service.microservices.svc.cluster.local
  http:
    - route:
        - destination:
            host: backend-api-service.microservices.svc.cluster.local
            subset: v1
            port:
              number: 8081
          weight: 90
        - destination:
            host: backend-api-service.microservices.svc.cluster.local
            subset: v2
            port:
              number: 8081
          weight: 10
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: "connect-failure,refused-stream,unavailable"

---

# Istio PeerAuthentication - Enforce mTLS across the namespace
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default-mtls
  namespace: microservices
  annotations:
    description: "Enforce strict mTLS for all mesh-enabled services in the namespace"
spec:
  mtls:
    mode: STRICT

---

# Istio AuthorizationPolicy - Restrict frontend to backend communication
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: backend-api-auth-policy
  namespace: microservices
  annotations:
    description: "Allow only frontend-service and order-service to access backend-api-service"
spec:
  selector:
    matchLabels:
      app: backend-api-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/microservices/sa/frontend-service-sa"
              - "cluster.local/ns/microservices/sa/order-service-sa"
      to:
        - operation:
            ports:
              - "8081"
              - "9090"