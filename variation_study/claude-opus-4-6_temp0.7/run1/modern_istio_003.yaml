# Backend API Service - Istio sidecar injection enabled with custom config
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api-service
  namespace: microservices
  labels:
    app: backend-api-service
    version: v1
    mesh: istio
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "Backend API service with Istio sidecar proxy enabled and custom configuration"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend-api-service
      version: v1
  template:
    metadata:
      labels:
        app: backend-api-service
        version: v1
      annotations:
        # Enable Istio sidecar proxy injection for this deployment
        sidecar.istio.io/inject: "true"
        # Configure sidecar proxy resource limits for backend workload
        sidecar.istio.io/proxyCPU: "200m"
        sidecar.istio.io/proxyMemory: "256Mi"
        sidecar.istio.io/proxyCPULimit: "1000m"
        sidecar.istio.io/proxyMemoryLimit: "512Mi"
        # Configure log level for sidecar proxy debugging
        sidecar.istio.io/logLevel: "warning"
        sidecar.istio.io/componentLogLevel: "misc:error"
        # Configure traffic interception for backend ports
        traffic.sidecar.istio.io/includeInboundPorts: "8081,9090"
        traffic.sidecar.istio.io/excludeOutboundPorts: "5432,6379"
        # Enable hold application until proxy starts
        proxy.istio.io/config: |
          holdApplicationUntilProxyStarts: true
          concurrency: 2
          tracing:
            sampling: 100.0
    spec:
      serviceAccountName: backend-api-service-sa
      containers:
        - name: backend-api
          image: myregistry/backend-api-service:1.0.0
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
            - containerPort: 9090
              name: grpc
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "backend-api-service"
            - name: DATABASE_HOST
              value: "postgres-db.microservices.svc.cluster.local"
            - name: DATABASE_PORT
              value: "5432"
            - name: REDIS_HOST
              value: "redis-cache.microservices.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10

