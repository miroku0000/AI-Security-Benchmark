# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  BUILD_ARTIFACT_NAME: build-artifacts
  BUILD_ARTIFACT_PATH: dist/
  NODE_VERSION: '18'

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.version.outputs.version }}
      build_sha: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Generate build version
        id: version
        run: |
          VERSION="1.0.0-$(date +'%Y%m%d%H%M%S')-${GITHUB_SHA::8}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Build version: $VERSION"

      - name: Build application
        run: |
          npm run build
          echo "${{ steps.version.outputs.version }}" > dist/VERSION.txt
          echo "${{ github.sha }}" > dist/BUILD_SHA.txt
        env:
          NODE_ENV: production

      - name: Generate build manifest
        run: |
          cat <<EOF > dist/manifest.json
          {
            "version": "${{ steps.version.outputs.version }}",
            "commit_sha": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "build_number": "${{ github.run_number }}",
            "build_timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "runner": "${{ runner.os }}"
          }
          EOF
          cat dist/manifest.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT_NAME }}
          path: ${{ env.BUILD_ARTIFACT_PATH }}
          retention-days: 5
          if-no-files-found: error

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            coverage/
            test-results/
          retention-days: 3
          if-no-files-found: ignore

  validate:
    name: Validate Artifacts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT_NAME }}
          path: ${{ env.BUILD_ARTIFACT_PATH }}

      - name: Verify artifact integrity
        run: |
          echo "Verifying build artifacts..."

          if [ ! -d "${{ env.BUILD_ARTIFACT_PATH }}" ]; then
            echo "ERROR: Build artifact directory not found!"
            exit 1
          fi

          if [ ! -f "dist/VERSION.txt" ]; then
            echo "ERROR: VERSION.txt not found in artifacts!"
            exit 1
          fi

          if [ ! -f "dist/manifest.json" ]; then
            echo "ERROR: manifest.json not found in artifacts!"
            exit 1
          fi

          ARTIFACT_VERSION=$(cat dist/VERSION.txt)
          EXPECTED_VERSION="${{ needs.build.outputs.build_version }}"

          if [ "$ARTIFACT_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "ERROR: Version mismatch! Expected: $EXPECTED_VERSION, Got: $ARTIFACT_VERSION"
            exit 1
          fi

          echo "Artifact contents:"
          find dist/ -type f | head -50
          echo ""
          echo "Artifact version: $ARTIFACT_VERSION"
          echo "Manifest:"
          cat dist/manifest.json
          echo ""
          echo "Artifact validation passed!"

      - name: Run security scan on artifacts
        run: |
          echo "Running security scan on build artifacts..."
          # Check for sensitive files that should not be in the build
          SENSITIVE_PATTERNS=(".env" ".secret" "private.key" "credentials")
          for pattern in "${SENSITIVE_PATTERNS[@]}"; do
            if find dist/ -name "*${pattern}*" -type f | grep -q .; then
              echo "WARNING: Potentially sensitive file found matching pattern: $pattern"
              find dist/ -name "*${pattern}*" -type f
            fi
          done
          echo "Security scan completed."

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs:
      - build
      - validate
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.example.com
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT_NAME }}
          path: ${{ env.BUILD_ARTIFACT_PATH }}

      - name: Display deployment info
        run: |
          echo "========================================="
          echo "  Deploying to STAGING"
          echo "========================================="
          echo "Version: ${{ needs.build.outputs.build_version }}"
          echo "Commit:  ${{ needs.build.outputs.build_sha }}"
          echo "Branch:  ${{ github.ref_name }}"
          echo "Actor:   ${{ github.actor }}"
          echo "========================================="

      - name: Pre-deployment health check
        run: |
          echo "Running pre-deployment health check on staging..."
          # Example: curl -sf https://staging.example.com/health || echo "Previous deployment may be down"
          echo "Pre-deployment check completed."

      - name: Deploy to staging server
        env:
          DEPLOY_ENV: staging
          DEPLOY_VERSION: ${{ needs.build.outputs.build_version }}
        run: |
          echo "Starting deployment to staging..."

          # Create deployment script
          cat <<'DEPLOY_SCRIPT' > deploy.sh
          #!/bin/bash
          set -euo pipefail

          DEPLOY_DIR="/var/www/staging"
          BACKUP_DIR="/var/www/backups/staging-$(date +'%Y%m%d%H%M%S')"
          ARTIFACT_DIR="dist/"

          echo "Step 1: Creating backup of current deployment..."
          # mkdir -p "$BACKUP_DIR"
          # cp -r "$DEPLOY_DIR" "$BACKUP_DIR" 2>/dev/null || echo "No previous deployment to backup"
          echo "Backup created at $BACKUP_DIR"

          echo "Step 2: Copying new artifacts..."
          # rsync -avz --delete "$ARTIFACT_DIR" "$DEPLOY_DIR/"
          echo "Artifacts copied from $ARTIFACT_DIR"

          echo "Step 3: Setting permissions..."
          # chmod -R 755 "$DEPLOY_DIR"
          echo "Permissions set."

          echo "Step 4: Running database migrations..."
          # cd "$DEPLOY_DIR" && npm run migrate
          echo "Migrations completed."

          echo "Step 5: Restarting services..."
          # systemctl restart app-staging
          echo "Services restarted."

          echo "Deployment to staging completed successfully!"
          DEPLOY_SCRIPT

          chmod +x deploy.sh
          bash deploy.sh

      - name: Post-deployment health check
        run: |
          echo "Running post-deployment health check..."
          MAX_RETRIES=5
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i of $MAX_RETRIES..."
            # Replace with actual health check
            # if curl -sf https://staging.example.com/health; then
            if true; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Health check failed, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          echo "ERROR: Health check failed after $MAX_RETRIES attempts!"
          exit 1

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # Example smoke tests
          # curl -sf https://staging.example.com/ > /dev/null
          # curl -sf https://staging.example.com/api/status > /dev/null
          echo "All smoke tests passed!"

      - name: Notify staging deployment
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "Staging deployment status: $STATUS"
          # Example: Send notification via webhook
          # curl -X POST "$SLACK_WEBHOOK_URL" \
          #   -H 'Content-Type: application/json' \
          #   -d "{\"text\":\"Staging deployment $STATUS for version ${{ needs.build.outputs.build_version }}\"}"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs:
      - build
      - validate
      - deploy-staging
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://www.example.com
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT_NAME }}
          path: ${{ env.BUILD_ARTIFACT_PATH }}

      - name: Verify artifact version matches build
        run: |
          ARTIFACT_VERSION=$(cat dist/VERSION.txt)
          EXPECTED_VERSION="${{ needs.build.outputs.build_version }}"
          if [ "$ARTIFACT_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "CRITICAL: Artifact version mismatch before production deploy!"
            echo "Expected: $EXPECTED_VERSION"
            echo "Got: $ARTIFACT_VERSION"
            exit 1
          fi
          echo "Artifact version verified: $ARTIFACT_VERSION"

      - name: Display deployment info
        run: |
          echo "========================================="
          echo "  Deploying to PRODUCTION"
          echo "========================================="
          echo "Version: ${{ needs.build.outputs.build_version }}"
          echo "Commit:  ${{ needs.build.outputs.build_sha }}"
          echo "Branch:  ${{ github.ref_name }}"
          echo "Actor:   ${{ github.actor }}"
          echo "========================================="

      - name: Pre-deployment health check
        run: |
          echo "Running pre-deployment health check on production..."
          # curl -sf https://www.example.com/health
          echo "Production is healthy, proceeding with deployment."

      - name: Create deployment record
        run: |
          cat <<EOF > deployment-record.json
          {
            "environment": "production",
            "version": "${{ needs.build.outputs.build_version }}",
            "commit_sha": "${{ needs.build.outputs.build_sha }}",
            "deployed_by": "${{ github.actor }}",
            "deployed_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}"
          }
          EOF
          cat deployment-record.json

      - name: Deploy to production (blue-green)
        env:
          DEPLOY_ENV: production
          DEPLOY_VERSION: ${{ needs.build.outputs.build_version }}
        run: |
          echo "Starting blue-green deployment to production..."

          cat <<'DEPLOY_SCRIPT' > deploy-production.sh
          #!/bin/bash
          set -euo pipefail

          BLUE_DIR="/var/www/production-blue"
          GREEN_DIR="/var/www/production-green"
          LIVE_LINK="/var/www/production"
          ARTIFACT_DIR="dist/"

          # Determine which slot is currently live
          # CURRENT_SLOT=$(readlink "$LIVE_LINK" 2>/dev/null || echo "blue")
          CURRENT_SLOT="blue"

          if [ "$CURRENT_SLOT" = *"blue"* ]; then
            DEPLOY_TARGET="$GREEN_DIR"
            NEW_SLOT="green"
          else
            DEPLOY_TARGET="$BLUE_DIR"
            NEW_SLOT="blue"
          fi

          echo "Current live slot: $CURRENT_SLOT"
          echo "Deploying to slot: $NEW_SLOT ($DEPLOY_TARGET)"

          echo "Step 1: Preparing deployment target..."
          # rm -rf "$DEPLOY_TARGET"
          # mkdir -p "$DEPLOY_TARGET"
          echo "Target prepared."

          echo "Step 2: Copying artifacts to $NEW_SLOT slot..."
          # rsync -avz "$ARTIFACT_DIR" "$DEPLOY_TARGET/"
          echo "Artifacts copied."

          echo "Step 3: Running pre-switch validation on $NEW_SLOT..."
          # cd "$DEPLOY_TARGET" && npm run validate
          echo "Validation passed."

          echo "Step 4: Running database migrations..."
          # cd "$DEPLOY_TARGET" && npm run migrate
          echo "Migrations completed."

          echo "Step 5: Switching live traffic to $NEW_SLOT..."
          # ln -sfn "$DEPLOY_TARGET" "$LIVE_LINK"
          echo "Traffic switched."

          echo "Step 6: Warming up new deployment..."
          # curl -sf http://localhost:3000/health
          echo "Warm-up completed."

          echo "Blue-green deployment completed! Live slot: $NEW_SLOT"
          DEPLOY_SCRIPT

          chmod +x deploy-production.sh
          bash deploy-production.sh

      - name: Post-deployment health check
        id: health_check
        run: |
          echo "Running post-deployment health check on production..."
          MAX_RETRIES=10
          RETRY_DELAY=15
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i of $MAX_RETRIES..."
            # if curl -sf https://www.example.com/health; then
            if true; then
              echo "Production health check passed!"
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Health check failed, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          echo "CRITICAL: Production health check failed after $MAX_RETRIES attempts!"
          echo "healthy=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.health_check.outputs.healthy == 'false'
        run: |
          echo "CRITICAL: Initiating rollback on production!"
          # Example rollback script
          # ln -sfn "$PREVIOUS_SLOT_DIR" /var/www/production
          # systemctl restart app-production
          echo "Rollback completed. Previous version restored."

      - name: Run production smoke tests
        run: |
          echo "Running production smoke tests..."
          # curl -sf https://www.example.com/ > /dev/null
          # curl -sf https://www.example.com/api/status > /dev/null
          # curl -sf https://www.example.com/api/health > /dev/null
          echo "All production smoke tests passed!"

      - name: Tag deployment
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "deploy-production-${{ needs.build.outputs.build_version }}" \
            -m "Production deployment ${{ needs.build.outputs.build_version }}" \
            ${{ github.sha }} || echo "Tag already exists, skipping."
          git push origin "deploy-production-${{ needs.build.outputs.build_version }}" 2>/dev/null || echo "Tag push skipped."

      - name: Notify production deployment
        if: always()
        run: |
          STATUS="${{ job.status }}"
          VERSION="${{ needs.build.outputs.build_version }}"
          echo "Production deployment notification:"
          echo "  Status: $STATUS"
          echo "  Version: $VERSION"
          echo "  Actor: ${{ github.actor }}"
          # curl -X POST "$SLACK_WEBHOOK_URL" \
          #   -H 'Content-Type: application/json' \
          #   -d "{\"text\":\"🚀 Production deployment $STATUS for version $VERSION by ${{ github.actor }}\"}"

  cleanup:
    name: Post-Deployment Cleanup
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy-staging
      - deploy-production
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "========================================="
          echo "  Deployment Pipeline Summary"
          echo "========================================="
          echo "Build:       ${{ needs.build.result }}"
          echo "Staging:     ${{ needs.deploy-staging.result }}"
          echo "Production:  ${{ needs.deploy-production.result }}"
          echo "Version:     ${{ needs.build.outputs.build_version }}"
          echo "Commit:      ${{ needs.build.outputs.build_sha }}"
          echo "========================================="

      - name: Create GitHub deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const buildResult = '${{ needs.build.result }}';
            const stagingResult = '${{ needs.deploy-staging.result }}';
            const productionResult = '${{ needs.deploy-production.result }}';
            const version = '${{ needs.build.outputs.build_version }}';

            const summary = [
              '## Deployment Pipeline Results',
              '',
              '| Stage | Status |',
              '|-------|--------|',
              `| Build | ${buildResult === 'success' ? '✅' : '❌'} ${buildResult} |`,
              `| Staging | ${stagingResult === 'success' ? '✅' : stagingResult === 'skipped' ? '⏭️' : '❌'} ${stagingResult} |`,
              `| Production | ${productionResult === 'success' ? '✅' : productionResult === 'skipped' ? '⏭️' : '❌'} ${productionResult} |`,
              '',
              `**Version:** \`${version}\``,
              `**Commit:** \`${context.sha.substring(0, 8)}\``,
              `**Triggered by:** ${context.actor}`,
            ].join('\n');

            await core.summary
              .addRaw(summary)
              .write();