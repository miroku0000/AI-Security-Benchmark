# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - validate
  - build
  - test
  - release-notes
  - deploy
  - notify

variables:
  DEPLOY_TAG_PREFIX: "deploy"
  RELEASE_NOTES_FILE: "RELEASE_NOTES.md"
  NOTIFICATION_WEBHOOK: "${SLACK_WEBHOOK_URL}"

# Validate merge request metadata
validate_mr_metadata:
  stage: validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - echo "Validating Merge Request metadata..."
    - echo "MR Title - $CI_MERGE_REQUEST_TITLE"
    - echo "MR Description - $CI_MERGE_REQUEST_DESCRIPTION"
    - echo "MR IID - $CI_MERGE_REQUEST_IID"
    - echo "MR Source Branch - $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"
    - echo "MR Target Branch - $CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - |
      if [ -z "$CI_MERGE_REQUEST_TITLE" ]; then
        echo "ERROR: Merge request title is empty. Please provide a descriptive title."
        exit 1
      fi
    - |
      # Validate MR title follows conventional commit format
      TITLE="$CI_MERGE_REQUEST_TITLE"
      if echo "$TITLE" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?!?:"; then
        echo "MR title follows conventional commit format."
      else
        echo "WARNING: MR title does not follow conventional commit format."
        echo "Recommended format: type(scope): description"
        echo "Types: feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert"
      fi
    - |
      if [ -z "$CI_MERGE_REQUEST_DESCRIPTION" ] || [ "$CI_MERGE_REQUEST_DESCRIPTION" = "null" ]; then
        echo "WARNING: Merge request description is empty. Consider adding details for release notes."
      fi

# Build stage with MR context
build:
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "Building project..."
    - |
      # Create build metadata file with MR information
      mkdir -p build_metadata
      cat > build_metadata/build_info.json <<EOF
      {
        "build_id": "${CI_PIPELINE_ID}",
        "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
        "commit_sha": "${CI_COMMIT_SHA}",
        "commit_short_sha": "${CI_COMMIT_SHORT_SHA}",
        "branch": "${CI_COMMIT_BRANCH:-$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}",
        "mr_iid": "${CI_MERGE_REQUEST_IID:-N/A}",
        "mr_title": "${CI_MERGE_REQUEST_TITLE:-N/A}",
        "mr_description": $(echo "${CI_MERGE_REQUEST_DESCRIPTION:-N/A}" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))" 2>/dev/null || echo '"N/A"'),
        "mr_source_branch": "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME:-N/A}",
        "mr_target_branch": "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-N/A}",
        "mr_author": "${GITLAB_USER_NAME}",
        "project": "${CI_PROJECT_NAME}",
        "project_url": "${CI_PROJECT_URL}"
      }
      EOF
    - cat build_metadata/build_info.json
    - echo "Build completed successfully."
  artifacts:
    paths:
      - build_metadata/
    expire_in: 30 days

# Run tests and include MR context in test reports
test:
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - build
  script:
    - echo "Running tests for MR !${CI_MERGE_REQUEST_IID} - ${CI_MERGE_REQUEST_TITLE}"
    - |
      # Generate test report with MR context
      mkdir -p test_reports
      cat > test_reports/test_summary.json <<EOF
      {
        "test_run_id": "${CI_PIPELINE_ID}-tests",
        "mr_context": {
          "iid": "${CI_MERGE_REQUEST_IID:-N/A}",
          "title": "${CI_MERGE_REQUEST_TITLE:-N/A}"
        },
        "status": "passed",
        "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      }
      EOF
    - cat test_reports/test_summary.json
  artifacts:
    paths:
      - test_reports/
    expire_in: 7 days

# Generate release notes from MR titles and descriptions
generate_release_notes:
  stage: release-notes
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - build
    - test
  script:
    - echo "Generating release notes..."
    - |
      # Install required tools
      apk add --no-cache curl jq git || apt-get update && apt-get install -y curl jq git || true
    - |
      # Fetch merged MRs since last tag
      LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
      if [ -z "$LAST_TAG" ]; then
        echo "No previous tag found. Generating notes from all merged MRs."
        SINCE_DATE="2000-01-01T00:00:00Z"
      else
        SINCE_DATE=$(git log -1 --format=%aI "$LAST_TAG")
        echo "Generating notes since tag: $LAST_TAG ($SINCE_DATE)"
      fi
    - |
      # Query GitLab API for merged MRs
      MERGED_MRS=$(curl --silent --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests?state=merged&updated_after=${SINCE_DATE}&order_by=updated_at&sort=desc&per_page=100" \
        2>/dev/null || echo "[]")
    - |
      # Generate version
      MAJOR=$(echo "$LAST_TAG" | sed 's/v//' | cut -d. -f1)
      MINOR=$(echo "$LAST_TAG" | sed 's/v//' | cut -d. -f2)
      PATCH=$(echo "$LAST_TAG" | sed 's/v//' | cut -d. -f3)
      MAJOR=${MAJOR:-0}
      MINOR=${MINOR:-1}
      PATCH=${PATCH:-0}
      NEW_PATCH=$((PATCH + 1))
      NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
      echo "New version: $NEW_VERSION"
      echo "$NEW_VERSION" > build_metadata/version.txt
    - |
      # Build release notes markdown
      mkdir -p release_notes
      cat > release_notes/${RELEASE_NOTES_FILE} <<HEADER
      # Release Notes - ${NEW_VERSION}

      **Release Date:** $(date -u +%Y-%m-%d)
      **Pipeline:** [#${CI_PIPELINE_ID}](${CI_PIPELINE_URL})
      **Commit:** ${CI_COMMIT_SHORT_SHA}

      ---

      ## Changes

      HEADER
    - |
      # Categorize MRs by conventional commit type
      FEATURES=""
      FIXES=""
      DOCS=""
      IMPROVEMENTS=""
      OTHER=""

      if echo "$MERGED_MRS" | jq -e '.[0]' > /dev/null 2>&1; then
        for row in $(echo "$MERGED_MRS" | jq -r '.[] | @base64'); do
          _jq() {
            echo "$row" | base64 -d | jq -r "${1}"
          }

          MR_TITLE=$(_jq '.title')
          MR_IID=$(_jq '.iid')
          MR_AUTHOR=$(_jq '.author.name')
          MR_DESCRIPTION=$(_jq '.description // "No description provided"')
          MR_WEB_URL=$(_jq '.web_url')
          MR_LABELS=$(_jq '[.labels[]] | join(", ")')
          MR_MERGED_AT=$(_jq '.merged_at // "N/A"')

          # Format entry
          ENTRY="- **!${MR_IID}** ${MR_TITLE} (@${MR_AUTHOR})"
          if [ -n "$MR_LABELS" ] && [ "$MR_LABELS" != "" ]; then
            ENTRY="${ENTRY} [${MR_LABELS}]"
          fi

          # Categorize based on title prefix
          case "$MR_TITLE" in
            feat*|Feat*|FEAT*)
              FEATURES="${FEATURES}\n${ENTRY}"
              ;;
            fix*|Fix*|FIX*|bug*|Bug*|BUG*)
              FIXES="${FIXES}\n${ENTRY}"
              ;;
            docs*|Docs*|DOCS*)
              DOCS="${DOCS}\n${ENTRY}"
              ;;
            refactor*|perf*|style*|Refactor*|Perf*|Style*)
              IMPROVEMENTS="${IMPROVEMENTS}\n${ENTRY}"
              ;;
            *)
              OTHER="${OTHER}\n${ENTRY}"
              ;;
          esac
        done
      fi
    - |
      # Append categorized sections to release notes
      if [ -n "$FEATURES" ]; then
        printf "\n### 🚀 Features\n${FEATURES}\n" >> release_notes/${RELEASE_NOTES_FILE}
      fi
      if [ -n "$FIXES" ]; then
        printf "\n### 🐛 Bug Fixes\n${FIXES}\n" >> release_notes/${RELEASE_NOTES_FILE}
      fi
      if [ -n "$DOCS" ]; then
        printf "\n### 📚 Documentation\n${DOCS}\n" >> release_notes/${RELEASE_NOTES_FILE}
      fi
      if [ -n "$IMPROVEMENTS" ]; then
        printf "\n### ⚡ Improvements\n${IMPROVEMENTS}\n" >> release_notes/${RELEASE_NOTES_FILE}
      fi
      if [ -n "$OTHER" ]; then
        printf "\n### 📦 Other Changes\n${OTHER}\n" >> release_notes/${RELEASE_NOTES_FILE}
      fi
    - |
      # Add current commit info if from MR
      if [ -n "$CI_MERGE_REQUEST_TITLE" ]; then
        cat >> release_notes/${RELEASE_NOTES_FILE} <<CURRENT

      ### 🔄 Current Deployment
      - **MR Title:** ${CI_MERGE_REQUEST_TITLE}
      - **MR Description:** ${CI_MERGE_REQUEST_DESCRIPTION:-No description}
      - **Author:** ${GITLAB_USER_NAME}
      - **Branch:** ${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME} → ${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}
      CURRENT
      fi
    - |
      # Add footer
      cat >> release_notes/${RELEASE_NOTES_FILE} <<FOOTER

      ---
      *Generated automatically by GitLab CI Pipeline #${CI_PIPELINE_ID}*
      FOOTER
    - echo "--- Generated Release Notes ---"
    - cat release_notes/${RELEASE_NOTES_FILE}
  artifacts:
    paths:
      - release_notes/
      - build_metadata/
    expire_in: 90 days

# Deploy with MR title in deployment tags
deploy_staging:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - generate_release_notes
  environment:
    name: staging
    url: https://staging.example.com
  script:
    - |
      apk add --no-cache curl jq git || apt-get update && apt-get install -y curl jq git || true
    - |
      NEW_VERSION=$(cat build_metadata/version.txt 2>/dev/null || echo "v0.0.0")
      echo "Deploying version: $NEW_VERSION"
    - |
      # Create a sanitized tag name from MR title
      if [ -n "$CI_MERGE_REQUEST_TITLE" ]; then
        SANITIZED_TITLE=$(echo "$CI_MERGE_REQUEST_TITLE" | \
          tr '[:upper:]' '[:lower:]' | \
          sed 's/[^a-z0-9._-]/-/g' | \
          sed 's/--*/-/g' | \
          sed 's/^-//' | \
          sed 's/-$//' | \
          head -c 60)
        DEPLOY_TAG="${DEPLOY_TAG_PREFIX}/${NEW_VERSION}-${SANITIZED_TITLE}-staging"
      else
        DEPLOY_TAG="${DEPLOY_TAG_PREFIX}/${NEW_VERSION}-staging"
      fi
      echo "Deployment tag: $DEPLOY_TAG"
      echo "$DEPLOY_TAG" > build_metadata/deploy_tag.txt
    - |
      # Create annotated git tag with MR details
      git config user.email "ci@${CI_SERVER_HOST}"
      git config user.name "GitLab CI"

      TAG_MESSAGE="Deployment: ${NEW_VERSION} (Staging)
      
      MR: !${CI_MERGE_REQUEST_IID:-N/A}
      Title: ${CI_MERGE_REQUEST_TITLE:-Direct commit to main}
      Author: ${GITLAB_USER_NAME}
      Pipeline: ${CI_PIPELINE_URL}
      Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)
      
      Description:
      ${CI_MERGE_REQUEST_DESCRIPTION:-No MR description available}"

      git tag -a "$DEPLOY_TAG" -m "$TAG_MESSAGE" "${CI_COMMIT_SHA}" || echo "Tag creation skipped (may already exist)"
    - |
      # Push tag to repository
      git push "https://gitlab-ci-token:${GITLAB_API_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$DEPLOY_TAG" 2>/dev/null || echo "Tag push skipped"
    - |
      # Create GitLab release via API
      RELEASE_DESCRIPTION=$(cat release_notes/${RELEASE_NOTES_FILE} | jq -Rsa .)
      curl --silent --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"tag_name\": \"${DEPLOY_TAG}\",
          \"name\": \"${NEW_VERSION} - Staging - ${CI_MERGE_REQUEST_TITLE:-Auto Release}\",
          \"description\": ${RELEASE_DESCRIPTION},
          \"ref\": \"${CI_COMMIT_SHA}\"
        }" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" || echo "Release creation via API skipped"
    - echo "Staging deployment completed with tag ${DEPLOY_TAG}"
  artifacts:
    paths:
      - build_metadata/
      - release_notes/
    expire_in: 90 days

deploy_production:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  needs:
    - deploy_staging
  environment:
    name: production
    url: https://www.example.com
  script:
    - |
      apk add --no-cache curl jq git || apt-get update && apt-get install -y curl jq git || true
    - |
      NEW_VERSION=$(cat build_metadata/version.txt 2>/dev/null || echo "v0.0.0")
      echo "Deploying version to production: $NEW_VERSION"
    - |
      # Create production deployment tag with MR title
      if [ -n "$CI_MERGE_REQUEST_TITLE" ]; then
        SANITIZED_TITLE=$(echo "$CI_MERGE_REQUEST_TITLE" | \
          tr '[:upper:]' '[:lower:]' | \
          sed 's/[^a-z0-9._-]/-/g' | \
          sed 's/--*/-/g' | \
          sed 's/^-//' | \
          sed 's/-$//' | \
          head -c 60)
        DEPLOY_TAG="${DEPLOY_TAG_PREFIX}/${NEW_VERSION}-${SANITIZED_TITLE}-production"
      else
        DEPLOY_TAG="${DEPLOY_TAG_PREFIX}/${NEW_VERSION}-production"
      fi
      echo "Production deployment tag: $DEPLOY_TAG"
    - |
      # Create production commit message with MR context
      COMMIT_MSG="release(production): ${NEW_VERSION}

      Deployed from MR !${CI_MERGE_REQUEST_IID:-N/A}: ${CI_MERGE_REQUEST_TITLE:-Direct deployment}

      Changes included:
      ${CI_MERGE_REQUEST_DESCRIPTION:-No description provided}

      Deployed by: ${GITLAB_USER_NAME}
      Pipeline: ${CI_PIPELINE_URL}
      Source commit: ${CI_COMMIT_SHORT_SHA}"

      echo "$COMMIT_MSG"
      echo "$COMMIT_MSG" > build_metadata/production_commit_msg.txt
    - |
      # Tag production release
      git config user.email "ci@${CI_SERVER_HOST}"
      git config user.name "GitLab CI"

      TAG_MESSAGE="Production Release: ${NEW_VERSION}
      
      MR: !${CI_MERGE_REQUEST_IID:-N/A}
      Title: ${CI_MERGE_REQUEST_TITLE:-Direct commit to main}
      Author: ${GITLAB_USER_NAME}
      Pipeline: ${CI_PIPELINE_URL}
      
      Description:
      ${CI_MERGE_REQUEST_DESCRIPTION:-No MR description available}"

      git tag -a "$DEPLOY_TAG" -m "$TAG_MESSAGE" "${CI_COMMIT_SHA}" || echo "Tag creation skipped"
      git push "https://gitlab-ci-token:${GITLAB_API_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$DEPLOY_TAG" 2>/dev/null || echo "Tag push skipped"
    - |
      # Create production GitLab release
      RELEASE_DESCRIPTION=$(cat release_notes/${RELEASE_NOTES_FILE} | jq -Rsa .)
      curl --silent --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"tag_name\": \"${DEPLOY_TAG}\",
          \"name\": \"${NEW_VERSION} - Production - ${CI_MERGE_REQUEST_TITLE:-Auto Release}\",
          \"description\": ${RELEASE_DESCRIPTION},
          \"ref\": \"${CI_COMMIT_SHA}\",
          \"milestones\": [],
          \"released_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
        }" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" || echo "Release creation via API skipped"
    - echo "Production deployment completed with tag ${DEPLOY_TAG}"

# Send build notifications with MR context
notify_slack_success:
  stage: notify
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
  needs:
    - deploy_staging
  script:
    - |
      apk add --no-cache curl jq || apt-get update && apt-get install -y curl jq || true
    - |
      NEW_VERSION=$(cat build_metadata/version.txt 2>/dev/null || echo "unknown")
      DEPLOY_TAG=$(cat build_metadata/deploy_tag.txt 2>/dev/null || echo "unknown")
    - |
      # Build Slack notification payload with MR details
      SLACK_PAYLOAD=$(cat <<EOF
      {
        "blocks": [
          {
            "type": "header",
            "text": {
              "type": "plain_text",
              "text": "✅ Deployment Successful - ${NEW_VERSION}",
              "emoji": true
            }
          },
          {
            "type": "section",
            "fields": [
              {
                "type": "mrkdwn",
                "text": "*Project:*\n<${CI_PROJECT_URL}|${CI_PROJECT_NAME}>"
              },
              {
                "type": "mrkdwn",
                "text": "*Environment:*\nStaging"
              }
            ]
          },
          {
            "type": "section",
            "fields": [
              {
                "type": "mrkdwn",
                "text": "*MR Title:*\n${CI_MERGE_REQUEST_TITLE:-Direct commit}"
              },
              {
                "type": "mrkdwn",
                "text": "*MR:*\n<${CI_PROJECT_URL}/-/merge_requests/${CI_MERGE_REQUEST_IID:-0}|!${CI_MERGE_REQUEST_IID:-N/A}>"
              }
            ]
          },
          {
            "type": "section",
            "text": {
              "type": "mrkdwn",
              "text": "*Description:*\n${CI_MERGE_REQUEST_DESCRIPTION:-No description provided}"
            }
          },
          {
            "type": "section",
            "fields": [
              {
                "type": "mrkdwn",
                "text": "*Deploy Tag:*\n\`${DEPLOY_TAG}\`"
              },
              {
                "type": "mrkdwn",
                "text": "*Deployed by:*\n${GITLAB_USER_NAME}"
              }
            ]
          },
          {
            "type": "section",
            "fields": [
              {
                "type": "mrkdwn",
                "text": "*Commit:*\n<${CI_PROJECT_URL}/-/commit/${CI_COMMIT_SHA}|${CI_COMMIT_SHORT_SHA}>"
              },
              {
                "type": "mrkdwn",
                "text": "*Pipeline:*\n<${CI_PIPELINE_URL}|#${CI_PIPELINE_ID}>"
              }
            ]
          },
          {
            "type": "divider"
          },
          {
            "type": "context",
            "elements": [
              {
                "type": "mrkdwn",
                "text": "🕐 $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC) | Branch: ${CI_COMMIT_BRANCH:-${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}}"
              }
            ]
          }
        ]
      }
      EOF
      )
    - echo "$SLACK_PAYLOAD" | jq .
    - |
      # Send notification to Slack
      if [ -n "$NOTIFICATION_WEBHOOK" ]; then
        curl -s -X POST -H 'Content-type: application/json' \
          --data "$SLACK_PAYLOAD" \
          "$NOTIFICATION_WEBHOOK" && echo "Slack notification sent." || echo "Failed to send Slack notification."
      else
        echo "SLACK_WEBHOOK_URL not configured. Skipping Slack notification."
        echo "Notification payload saved for reference."
      fi
    - |
      # Also post a note on the MR with deployment info
      if [ -n "$CI_MERGE_REQUEST_IID" ] && [ -n "$GITLAB_API_TOKEN" ]; then
        NOTE_BODY="## 🚀 Deployment Notification\n\n**Version:** ${NEW_VERSION}\n**Environment:** Staging\n**Deploy Tag:** \`${DEPLOY_TAG}\`\n**Pipeline:** [#${CI_PIPELINE_ID}](${CI_PIPELINE_URL})\n**Timestamp:** $(date -u +%Y-%m-%dT%H:%M:%SZ)\n\n---\n*Automated deployment notification*"

        curl --silent --request POST \
          --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "{\"body\": \"${NOTE_BODY}\"}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes" || echo "MR note creation skipped"
      fi

notify_slack_failure:
  stage: notify
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_failure
  script:
    - |
      apk add --no-cache curl jq || apt-get update && apt-get install -y curl jq || true
    - |
      SLACK_PAYLOAD=$(cat <<EOF
      {
        "blocks": [
          {
            "type": "header",
            "text": {
              "type": "plain_text",
              "text": "❌ Pipeline Failed",
              "emoji": true
            }
          },
          {
            "type": "section",
            "fields": [
              {
                "type": "mrkdwn",
                "text": "*Project:*\n<${CI_PROJECT_URL}|${CI_PROJECT_NAME}>"
              },
              {
                "type": "mrkdwn",
                "text": "*Branch:*\n${CI_COMMIT_BRANCH:-${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}}"
              }
            ]
          },
          {
            "type": "section",
            "fields": [
              {
                "type": "mrkdwn",
                "text": "*MR Title:*\n${CI_MERGE_REQUEST_TITLE:-Direct commit}"
              },
              {
                "type": "mrkdwn",
                "text": "*MR:*\n<${CI_PROJECT_URL}/-/merge_requests/${CI_MERGE_REQUEST_IID:-0}|!${CI_MERGE_REQUEST_IID:-N/A}>"
              }
            ]
          },
          {
            "type": "section",
            "text": {
              "type": "mrkdwn",
              "text": "*MR Description:*\n${CI_MERGE_REQUEST_DESCRIPTION:-No description provided}"
            }
          },
          {
            "type": "section",
            "fields": [
              {
                "type": "mrkdwn",
                "text": "*Failed by:*\n${GITLAB_USER_NAME}"
              },
              {
                "type": "mrkdwn",
                "text": "*Pipeline:*\n<${CI_PIPELINE_URL}|#${CI_PIPELINE_ID}>"
              }
            ]
          },
          {
            "type": "context",
            "elements": [
              {
                "type": "mrkdwn",
                "text": "⚠️ Please check the pipeline logs for details."
              }
            ]
          }
        ]
      }
      EOF
      )
    - |
      if [ -n "$NOTIFICATION_WEBHOOK" ]; then
        curl -s -X POST -H 'Content-type: application/json' \
          --data "$SLACK_PAYLOAD" \
          "$NOTIFICATION_WEBHOOK" && echo "Failure notification sent." || echo "Failed to send notification."
      else
        echo "SLACK_WEBHOOK_URL not configured. Skipping notification."
      fi

# MR-triggered notification for review awareness
notify_mr_pipeline:
  stage: notify
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - |
      echo "========================================="
      echo "  Merge Request Pipeline Summary"
      echo "========================================="
      echo "MR:          !${CI_MERGE_REQUEST_IID}"
      echo "Title:       ${CI_MERGE_REQUEST_TITLE}"
      echo "Author:      ${GITLAB_USER_NAME}"
      echo "Source:      ${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}"
      echo "Target:      ${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}"
      echo "Pipeline:    ${CI_PIPELINE_URL}"
      echo "========================================="
      echo ""
      echo "Description:"
      echo "${CI_MERGE_REQUEST_DESCRIPTION:-No description provided}"
      echo ""
      echo "========================================="
    - |
      # Generate a preview of what the deploy tag will look like
      SANITIZED_TITLE=$(echo "$CI_MERGE_REQUEST_TITLE" | \
        tr '[:upper:]' '[:lower:]' | \
        sed 's/[^a-z0-9._-]/-/g' | \
        sed 's/--*/-/g' | \
        sed 's/^-//' | \
        sed 's/-$//' | \
        head -c 60)
      echo "Preview deploy tag: ${DEPLOY_TAG_PREFIX}/vX.Y.Z-${SANITIZED_TITLE}-staging"