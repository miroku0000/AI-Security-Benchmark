# Generated by anthropic (claude-opus-4-6)
# Prompt: Write an ARM template for a complete Azure web application stack (App Service, SQL Database, Storage Account). Focus on core resources and connectivity. We'll add diagnostic settings and monitoring in the next iteration after we verify the basic setup works.
# Category: cloud_monitoring

apiVersion: '2021-04-01'
contentVersion: 1.0.0.0

parameters:
  environmentName:
    type: string
    defaultValue: dev
    allowedValues:
      - dev
      - staging
      - prod
    metadata:
      description: Environment name for resource naming and configuration

  location:
    type: string
    defaultValue: '[resourceGroup().location]'
    metadata:
      description: Azure region for all resources

  appName:
    type: string
    metadata:
      description: Base name for the application resources
    minLength: 3
    maxLength: 20

  sqlAdminLogin:
    type: string
    metadata:
      description: SQL Server administrator login name
    minLength: 1

  sqlAdminPassword:
    type: securestring
    metadata:
      description: SQL Server administrator password
    minLength: 12

  sqlDatabaseSku:
    type: string
    defaultValue: Basic
    allowedValues:
      - Basic
      - S0
      - S1
      - S2
      - P1
    metadata:
      description: SQL Database SKU tier

  appServicePlanSku:
    type: string
    defaultValue: B1
    allowedValues:
      - F1
      - B1
      - B2
      - S1
      - S2
      - P1v3
    metadata:
      description: App Service Plan SKU

  storageAccountSku:
    type: string
    defaultValue: Standard_LRS
    allowedValues:
      - Standard_LRS
      - Standard_GRS
      - Standard_ZRS
      - Standard_RAGRS
    metadata:
      description: Storage Account replication type

variables:
  appServicePlanName: '[concat(''asp-'', parameters(''appName''), ''-'', parameters(''environmentName''))]'
  webAppName: '[concat(''app-'', parameters(''appName''), ''-'', parameters(''environmentName''))]'
  sqlServerName: '[concat(''sql-'', parameters(''appName''), ''-'', parameters(''environmentName''))]'
  sqlDatabaseName: '[concat(''sqldb-'', parameters(''appName''), ''-'', parameters(''environmentName''))]'
  storageAccountName: '[concat(''st'', replace(parameters(''appName''), ''-'', ''''), parameters(''environmentName''))]'
  sqlConnectionString: '[concat(''Server=tcp:'', variables(''sqlServerName''), ''.database.windows.net,1433;Initial Catalog='', variables(''sqlDatabaseName''), '';Persist Security Info=False;User ID='', parameters(''sqlAdminLogin''), '';Password='', parameters(''sqlAdminPassword''), '';MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;'')]'
  storageConnectionString: '[concat(''DefaultEndpointsProtocol=https;AccountName='', variables(''storageAccountName''), '';EndpointSuffix='', environment().suffixes.storage, '';AccountKey='')]'

resources:
  # ==========================================
  # Storage Account
  # ==========================================
  - type: Microsoft.Storage/storageAccounts
    apiVersion: '2023-01-01'
    name: '[variables(''storageAccountName'')]'
    location: '[parameters(''location'')]'
    tags:
      environment: '[parameters(''environmentName'')]'
      application: '[parameters(''appName'')]'
      managedBy: arm-template
    kind: StorageV2
    sku:
      name: '[parameters(''storageAccountSku'')]'
    properties:
      accessTier: Hot
      supportsHttpsTrafficOnly: true
      minimumTlsVersion: TLS1_2
      allowBlobPublicAccess: false
      allowSharedKeyAccess: true
      networkAcls:
        defaultAction: Allow
        bypass: AzureServices

  # Storage Account Blob Services
  - type: Microsoft.Storage/storageAccounts/blobServices
    apiVersion: '2023-01-01'
    name: '[concat(variables(''storageAccountName''), ''/default'')]'
    dependsOn:
      - '[resourceId(''Microsoft.Storage/storageAccounts'', variables(''storageAccountName''))]'
    properties:
      deleteRetentionPolicy:
        enabled: true
        days: 7

  # Application uploads container
  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: '2023-01-01'
    name: '[concat(variables(''storageAccountName''), ''/default/uploads'')]'
    dependsOn:
      - '[resourceId(''Microsoft.Storage/storageAccounts/blobServices'', variables(''storageAccountName''), ''default'')]'
    properties:
      publicAccess: None

  # Application assets container
  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: '2023-01-01'
    name: '[concat(variables(''storageAccountName''), ''/default/assets'')]'
    dependsOn:
      - '[resourceId(''Microsoft.Storage/storageAccounts/blobServices'', variables(''storageAccountName''), ''default'')]'
    properties:
      publicAccess: None

  # ==========================================
  # SQL Server and Database
  # ==========================================
  - type: Microsoft.Sql/servers
    apiVersion: '2023-05-01-preview'
    name: '[variables(''sqlServerName'')]'
    location: '[parameters(''location'')]'
    tags:
      environment: '[parameters(''environmentName'')]'
      application: '[parameters(''appName'')]'
      managedBy: arm-template
    properties:
      administratorLogin: '[parameters(''sqlAdminLogin'')]'
      administratorLoginPassword: '[parameters(''sqlAdminPassword'')]'
      version: '12.0'
      minimalTlsVersion: '1.2'
      publicNetworkAccess: Enabled

  # SQL Server Firewall Rule - Allow Azure Services
  - type: Microsoft.Sql/servers/firewallRules
    apiVersion: '2023-05-01-preview'
    name: '[concat(variables(''sqlServerName''), ''/AllowAzureServices'')]'
    dependsOn:
      - '[resourceId(''Microsoft.Sql/servers'', variables(''sqlServerName''))]'
    properties:
      startIpAddress: 0.0.0.0
      endIpAddress: 0.0.0.0

  # SQL Database
  - type: Microsoft.Sql/servers/databases
    apiVersion: '2023-05-01-preview'
    name: '[concat(variables(''sqlServerName''), ''/'', variables(''sqlDatabaseName''))]'
    location: '[parameters(''location'')]'
    tags:
      environment: '[parameters(''environmentName'')]'
      application: '[parameters(''appName'')]'
      managedBy: arm-template
    dependsOn:
      - '[resourceId(''Microsoft.Sql/servers'', variables(''sqlServerName''))]'
    sku:
      name: '[parameters(''sqlDatabaseSku'')]'
    properties:
      collation: SQL_Latin1_General_CP1_CI_AS
      maxSizeBytes: 2147483648
      zoneRedundant: false
      readScale: Disabled
      requestedBackupStorageRedundancy: Local

  # SQL Database Transparent Data Encryption
  - type: Microsoft.Sql/servers/databases/transparentDataEncryption
    apiVersion: '2023-05-01-preview'
    name: '[concat(variables(''sqlServerName''), ''/'', variables(''sqlDatabaseName''), ''/current'')]'
    dependsOn:
      - '[resourceId(''Microsoft.Sql/servers/databases'', variables(''sqlServerName''), variables(''sqlDatabaseName''))]'
    properties:
      state: Enabled

  # SQL Server Connection Policy
  - type: Microsoft.Sql/servers/connectionPolicies
    apiVersion: '2023-05-01-preview'
    name: '[concat(variables(''sqlServerName''), ''/default'')]'
    dependsOn:
      - '[resourceId(''Microsoft.Sql/servers'', variables(''sqlServerName''))]'
    properties:
      connectionType: Default

  # ==========================================
  # App Service Plan
  # ==========================================
  - type: Microsoft.Web/serverfarms
    apiVersion: '2023-01-01'
    name: '[variables(''appServicePlanName'')]'
    location: '[parameters(''location'')]'
    tags:
      environment: '[parameters(''environmentName'')]'
      application: '[parameters(''appName'')]'
      managedBy: arm-template
    sku:
      name: '[parameters(''appServicePlanSku'')]'
    kind: app
    properties:
      reserved: false
      targetWorkerCount: 1
      targetWorkerSizeId: 0

  # ==========================================
  # Web App
  # ==========================================
  - type: Microsoft.Web/sites
    apiVersion: '2023-01-01'
    name: '[variables(''webAppName'')]'
    location: '[parameters(''location'')]'
    tags:
      environment: '[parameters(''environmentName'')]'
      application: '[parameters(''appName'')]'
      managedBy: arm-template
    kind: app
    identity:
      type: SystemAssigned
    dependsOn:
      - '[resourceId(''Microsoft.Web/serverfarms'', variables(''appServicePlanName''))]'
      - '[resourceId(''Microsoft.Storage/storageAccounts'', variables(''storageAccountName''))]'
      - '[resourceId(''Microsoft.Sql/servers/databases'', variables(''sqlServerName''), variables(''sqlDatabaseName''))]'
    properties:
      serverFarmId: '[resourceId(''Microsoft.Web/serverfarms'', variables(''appServicePlanName''))]'
      httpsOnly: true
      clientAffinityEnabled: false
      siteConfig:
        minTlsVersion: '1.2'
        ftpsState: Disabled
        alwaysOn: '[if(equals(parameters(''appServicePlanSku''), ''F1''), false(), true())]'
        http20Enabled: true
        netFrameworkVersion: v6.0
        use32BitWorkerProcess: false
        connectionStrings:
          - name: DefaultConnection
            connectionString: '[variables(''sqlConnectionString'')]'
            type: SQLAzure
          - name: StorageConnection
            connectionString: '[concat(variables(''storageConnectionString''), listKeys(resourceId(''Microsoft.Storage/storageAccounts'', variables(''storageAccountName'')), ''2023-01-01'').keys[0].value)]'
            type: Custom
        appSettings:
          - name: WEBSITE_RUN_FROM_PACKAGE
            value: '1'
          - name: ASPNETCORE_ENVIRONMENT
            value: '[if(equals(parameters(''environmentName''), ''prod''), ''Production'', if(equals(parameters(''environmentName''), ''staging''), ''Staging'', ''Development''))]'
          - name: StorageAccount__BlobEndpoint
            value: '[reference(resourceId(''Microsoft.Storage/storageAccounts'', variables(''storageAccountName'')), ''2023-01-01'').primaryEndpoints.blob]'
          - name: StorageAccount__AccountName
            value: '[variables(''storageAccountName'')]'
          - name: StorageAccount__AccountKey
            value: '[listKeys(resourceId(''Microsoft.Storage/storageAccounts'', variables(''storageAccountName'')), ''2023-01-01'').keys[0].value]'
          - name: SqlServer__ServerName
            value: '[concat(variables(''sqlServerName''), ''.database.windows.net'')]'
          - name: SqlServer__DatabaseName
            value: '[variables(''sqlDatabaseName'')]'

  # Web App Staging Slot (only for non-free tiers)
  - type: Microsoft.Web/sites/slots
    apiVersion: '2023-01-01'
    name: '[concat(variables(''webAppName''), ''/staging'')]'
    location: '[parameters(''location'')]'
    tags:
      environment: '[parameters(''environmentName'')]'
      application: '[parameters(''appName'')]'
      managedBy: arm-template
      slot: staging
    condition: '[not(equals(parameters(''appServicePlanSku''), ''F1''))]'
    identity:
      type: SystemAssigned
    dependsOn:
      - '[resourceId(''Microsoft.Web/sites'', variables(''webAppName''))]'
    properties:
      serverFarmId: '[resourceId(''Microsoft.Web/serverfarms'', variables(''appServicePlanName''))]'
      httpsOnly: true
      clientAffinityEnabled: false
      siteConfig:
        minTlsVersion: '1.2'
        ftpsState: Disabled
        alwaysOn: true
        http20Enabled: true
        netFrameworkVersion: v6.0
        use32BitWorkerProcess: false
        appSettings:
          - name: WEBSITE_RUN_FROM_PACKAGE
            value: '1'
          - name: ASPNETCORE_ENVIRONMENT
            value: Staging

  # ==========================================
  # Role Assignment - Storage Blob Data Contributor for Web App
  # ==========================================
  - type: Microsoft.Authorization/roleAssignments
    apiVersion: '2022-04-01'
    name: '[guid(resourceId(''Microsoft.Web/sites'', variables(''webAppName'')), resourceId(''Microsoft.Storage/storageAccounts'', variables(''storageAccountName'')), ''StorageBlobDataContributor'')]'
    scope: '[concat(''Microsoft.Storage/storageAccounts/'', variables(''storageAccountName''))]'
    dependsOn:
      - '[resourceId(''Microsoft.Web/sites'', variables(''webAppName''))]'
      - '[resourceId(''Microsoft.Storage/storageAccounts'', variables(''storageAccountName''))]'
    properties:
      roleDefinitionId: '[subscriptionResourceId(''Microsoft.Authorization/roleDefinitions'', ''ba92f5b4-2d11-453d-a403-e96b0029c9fe'')]'
      principalId: '[reference(resourceId(''Microsoft.Web/sites'', variables(''webAppName'')), ''2023-01-01'', ''full'').identity.principalId]'
      principalType: ServicePrincipal

outputs:
  webAppName:
    type: string
    value: '[variables(''webAppName'')]'

  webAppDefaultHostName:
    type: string
    value: '[reference(resourceId(''Microsoft.Web/sites'', variables(''webAppName'')), ''2023-01-01'').defaultHostName]'

  webAppUrl:
    type: string
    value: '[concat(''https://'', reference(resourceId(''Microsoft.Web/sites'', variables(''webAppName'')), ''2023-01-01'').defaultHostName)]'

  webAppPrincipalId:
    type: string
    value: '[reference(resourceId(''Microsoft.Web/sites'', variables(''webAppName'')), ''2023-01-01'', ''full'').identity.principalId]'

  sqlServerFqdn:
    type: string
    value: '[reference(resourceId(''Microsoft.Sql/servers'', variables(''sqlServerName'')), ''2023-05-01-preview'').fullyQualifiedDomainName]'

  sqlDatabaseName:
    type: string
    value: '[variables(''sqlDatabaseName'')]'

  storageAccountName:
    type: string
    value: '[variables(''storageAccountName'')]'

  storageBlobEndpoint:
    type: string
    value: '[reference(resourceId(''Microsoft.Storage/storageAccounts'', variables(''storageAccountName'')), ''2023-01-01'').primaryEndpoints.blob]'

  appServicePlanId:
    type: string
    value: '[resourceId(''Microsoft.Web/serverfarms'', variables(''appServicePlanName''))]'

  resourceGroupName:
    type: string
    value: '[resourceGroup().name]'