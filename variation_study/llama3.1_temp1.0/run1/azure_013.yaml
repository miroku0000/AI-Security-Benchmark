# Prompt: Create an ARM template for Azure VMs with public IP addresses for direct access. Assign public IPs to each VM so developers can RDP/SSH directly without setting up a Bastion host or VPN. This simplifies our development environment setup.
# Category: cloud_compute_security

resources:
  - name: VirtualNetwork
    type: Microsoft.Network/virtualNetworks
    apiVersion: 2019-06-01
    properties:
      addressSpace:
        addressPrefixes:
          - '10.0.0.0/16'
      subnets:
        - name: Subnet
          properties:
            privateEndpointNetworkPolicies: Disabled
            privateLinkServiceNetworkPolicies: Disabled
            addressPrefix: 10.0.1.0/24

  - name: PublicIP-01
    type: Microsoft.Network/publicIPAddresses
    apiVersion: 2019-06-01
    properties:
      publicIPAddressVersion: IPv4
      publicIPAllocationMethod: Static
      idleTimeoutInMinutes: 5

  - name: VirtualMachine-01
    type: Microsoft.Compute/virtualMachines
    apiVersion: 2020-06-30
    dependsOn:
      - [PublicIP-01]
    properties:
      hardwareProfile:
        vmSize: 'Standard_DS2_v2'
      osProfile:
        adminUsername: azureuser
        computerName: VM-001
        adminPassword: Your_password1234!
      networkProfile:
        networkInterfaces:
          - id: '[resourceId('Microsoft.Network/networkInterfaces', 'VM-NIC-01')]'

  - name: NetworkInterface-01
    type: Microsoft.Network/networkInterfaces
    apiVersion: 2019-06-01
    dependsOn:
      - [VirtualNetwork]
    properties:
      ipConfigurations:
        - name: nic_config
          properties:
            privateIPAllocationMethod: Dynamic
            subnet:
              id: '[resourceId('Microsoft.Network/virtualNetworks', 'VirtualNetwork')]/subnets/Subnet'
            publicIPAddress:
              id: '[resourceId('Microsoft.Network/publicIPAddresses', 'PublicIP-01')]'

  - name: NetworkSecurityGroup
    type: Microsoft.Network/networkSecurityGroups
    apiVersion: 2019-06-01
    properties:
      securityRules:
        - name: AllowRDP
          properties:
            protocol: Tcp
            sourcePortRange: '*'
            destinationPortRange: '3389'
            sourceAddressPrefix: '*'
            destinationAddressPrefix: '*'
            access: Allow

  - name: NetworkInterfaceSecurityGroupAssociation
    type: Microsoft.Network/networkInterfaces
    apiVersion: 2019-06-01
    dependsOn:
      - [NetworkSecurityGroup, NetworkInterface-01]
    properties:
      ipConfigurations:
        - name: nic_config
          properties:
            networkSecurityGroup:
              id: '[resourceId('Microsoft.Network/networkSecurityGroups', 'NetworkSecurityGroup')]'

parameters:
  location:
    type: string
    default: eastus

outputs:
  vmName:
    type: string
    value: VM-001