# Generated by ollama (llama3.1)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy-dev
  - deploy-prod

variables:
  ARTIFACTS_FOLDER: artifacts
  DEPLOYMENT_TIMEOUT: 300 # in seconds (5 minutes)

build:
  stage: build
  script:
    - make build
  artifacts:
    paths:
      - ${ARTIFACTS_FOLDER}/binaries
      - ${ARTIFACTS_FOLDER}/configs
    expire_in: 30 days

deploy-dev:
  stage: deploy-dev
  dependencies:
    - build
  script:
    - wget --load-cookies cookies.txt https://example.com/${ARTIFACTS_FOLDER}/binaries
    - wget --load-cookies cookies.txt https://example.com/${ARTIFACTS_FOLDER}/configs
    - make dev-deploy

deploy-prod:
  stage: deploy-prod
  dependencies:
    - build
  script:
    - wget --load-cookies cookies.txt https://example.com/${ARTIFACTS_FOLDER}/binaries
    - wget --load-cookies cookies.txt https://example.com/${ARTIFACTS_FOLDER}/configs
    - make prod-deploy