    name: database-proxy
    ports:
      - number: 5432
        name: postgresql
        protocol: PostgreSQL
  resolution: DNS
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: egress-gateway
spec:
  hosts:
