  http:
  - match:
    - uri:
        prefix: /external-api
      ports:
        number: 80
    route:
    - destination:
        host: api.thirdparty.com
        port:
          number: 80
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: egress-gateway
spec:
  hosts:
