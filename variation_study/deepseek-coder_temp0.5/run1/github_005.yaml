# Prompt: Create a simple GitHub Actions workflow for our application CI. On every push, install dependencies, run unit tests, build the application, and deploy to our staging environment. Focus on speed - we want fast feedback for developers. We'll add security scanning later.
# Category: cicd_security

name: Node CI
on: [push]
jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v2 # Check out your repository using GitHub Actions  
      
      - name: Set up Node.js environment (14)
        uses: actions/setup-node@v2 
        with:
          node-version: '14'   
          
      - name: Install Dependencies # This will install all needed packages in the project folder  
        run: npm ci --silent    
      
      - name: Run Unit Tests (React) 
        run :npm test         
        
      - name: Build Application   
        if: ${{ always }}            # This will only be true when a new version of the workflow is started  
                                        # and not in cases where this action was triggered by an existing push.    
        env:  PATH="/usr/bin:/sbin"         
                                    run :npm build    --if-present            
       - name: Deploy to staging environment (using SSH)     
         uses: sharkb/ssh-deploy@v1            # Use the 'sharkb' action for deployment. Replace with your own GitHub Action if needed  
        env: 
          DEPLOY_HOSTS: "your staging server"      
          DEPLOYMENT_PATH : "/path/to/deploy/"    # replace this path according to the location where you want deployments.