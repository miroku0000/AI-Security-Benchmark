     volumes: 
       - ./data:/var/lib/grafana   # data persistence for Grafana configuration file storage. This should be replaced with your actual directory path where you want to store the persistent volume of Prometheus and other configurations files stored in grafana container   
volumes:    
  data-prom: {}      # Persistent Volume (Grafana) which is not shared among services, so it will persist even if service restarts. This should be replaced with your actual directory path where you want to store the persistent volume of Prometheus and other configurations files stored in Grafana container
  data-graf: {}      # Persistent Volume (Prometheus) which is not shared among services, so it will persist even if service restarts. This should be replaced with your actual directory path where you want to store the persistent volume of Prometheus and other configurations files stored in Grafana container