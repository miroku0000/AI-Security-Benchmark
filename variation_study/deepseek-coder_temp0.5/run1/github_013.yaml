# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-Stage Deployment Pipeline
on: 
  push:
    branches: [ master ] # or specify other event(like pull_request) to trigger on those events, e.g., when changes are made in the 'develop' branch and pushes there too with `branches` : ['master', 'develop'] (comma separated list of all your triggers).
jobs: 
# Job for building artifacts  
- name: Build Artifacts    # job names can be any valid string, you could use this to organize jobs if needed.    
  runs-on: ubuntu-latest      # specify the operating system required e.g., windows, macos etc (if not specified it will default as latest).  
  steps:                        # list of actions that should run in your job   
 - name : Checkout Code        # action names can be any valid string    
   uses: actions/checkout@v2       # specify the plugin to use. In this case, we're using 'actions'/solution plugins which are maintained by GitHub under their own solution repository (https://github.com/marketplace).  Action is a tool for automating building and testing software packages or deploying code in cloud environments
 - name: Install Dependencies   # job names can be any valid string, you could use this to organize jobs if needed    
   run : |   
       npm install --quiet      # specify the command(s) required for your action. In our case we're running 'npm ci'. This will ensure that all dependencies are installed in a new node environment which is faster than installing them globally on every job execution – it also allows you to use `--silent` flag (i.e., no progress bar or output)
 - name: Build Application     # specify the jobs names can be any valid string, used for organizing and running multiple steps in one single step grouping   
   run : |      
        npm build              # provide commands to execute as part of your job (using `run`). In this case we're just calling 'npm install'. This will ensure that all dependencies are installed into a new node environment. 
 - name: Artifacts Deployment    # specify the jobs names can be any valid string, used for organizing and running multiple steps in one single step grouping  
   uses : .github/actions/upload-artifact@master     # use action to upload artifact (file or directory) from your workflow. This will allow you download built files after job completes – no need of manual intervention   
   with:      
      name: Application           # specify the file(s)/folder names which should be uploaded, e.g., 'artifact'    
      path : dist/                # provide paths to upload artifact (file or directory) from your workflow - in this case we are providing a folder named `dist` where all built files will go after job completes – no need of manual intervention