      - name: Set up Node  # Name the action (set up node) and its purpose/job function using 'run'. Use npm install with a specific version if required, e.g., run=npm i --save-dev nodemon@19 or any other package from your project's dependencies
        uses: actions/setup-node@v2  # Specify the action name (actions/setup) and its purpose in context of this step for tasks related with setting up a Node.js environment, such as installing specific versions using npm install if required by our job or workflow file(e.g., run=npm i nodemon).
        with:  # Declare the actions to be done within above steps (set node version) and specify it's purpose/job function in this YAML section for tasks related with setting up environments using NodeJS, such as installing specific versions of packages if required by our job or workflow file. Use `with` keyword
          node-version: 14   # Specify the environment variable (node version) to be set within above steps and its purpose/job function in this YAML section for tasks related with setting up environments using NodeJS, such as installing specific versions of packages if required by our job or workflow file. Use `with` keyword
      - name: Build Application  # Name the action (build application) and specify it's primary purpose to build your project/application in this YAML section for tasks related with building projects using npm scripts, e.g., run=npm test if required by our job or workflow file). Use `with` keyword
        uses: bahmutov/npm-run-command@v2  # Specify the action name (bahmutov) and version in a YAML section named 'action' for this step, which will be used as context of other jobs或workflows. Use `with` keyword to specify environment variables set by previous steps
        with:   # Declare actions related tasks within above sections - these can include running npm run build or any command specific in your project setup if required (run=npm test, etc). Specify its purpose/job function using 'name' and provide the relevant commands. Use `with` keyword to specify environment variables set by previous steps
          name: Build  # Name of this step as a task for npm-run command action in YAML section named "Build Application". Provide any necessary flags or options, e., run="--max_old_space_size=4096" if required. Use `with` keyword to provide environment variables set by previous steps
      - name: Publish Packages  # Name the action (publish packages) and its purpose/job function using 'run'. Specify npm publish commands in this YAML section for tasks related with publishing package(s). If required, use env variable. Use `with` keyword to provide environment variables set by previous steps
        uses: npm-community/npm-release@v1  # Setup the action name (npm) and its version from a yaml file named 'action' for this step which will be used as context of other jobs or workflows. Use `with` keyword to specify environment variables set by previous steps
        with:   # Declare actions related tasks within above sections - these can include running npm publish, etc if required (run=npm run build). Specify its purpose/job function using 'name' and provide the relevant commands or flags. Use `with` keyword to specify environment variables set by previous steps
          name: Publish  # Name of this step as a task for npm-release action in YAML section named "Publish Packages". Provide any necessary flag(s) if required (run="--access public"). Specify the relevant flags or options. Use `with` keyword to provide environment variables set by previous steps