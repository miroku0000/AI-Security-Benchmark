name: Release Workflow
on: [push]  # Triggers on pushing any tag in this repository (or branch) into a workflow run, ie when you do git commit -m "your message" or create an issue commenting to the pull request. Push is not required for `workflow_dispatch` event as it's automatically triggered by code commits
