name: CI/CD Workflow
on: [push, pull_request]
jobs: 
  build-test:   # job name is "build" by default if not specified here or in the workflow file itself (if it's a new line)
    runs-on: ubuntu-latest     # specify OS version to run on. You can replace with other versions as well, such as windows for Windows Server 2019 images and macOS/Linux Images like Amazon Linux etc based upon your requirement  
      
      - name: Install Dependencies (without hashing verification)    # This step installs the dependencies in a new virtual environment. The specific version of Python is specified, but pip will still use whatever's installed on our runner machine if it can not find any versions that match this one  and we want to stay current with package updates
        run: |  
          python -m venv .venv    # Create a new virtual environment in the repo. This is where you install your project dependencies without affecting other projects/repos using them as well (as long they've been installed via pip)  and to avoid conflicts with our current package versions when installing packages, use --no-cache
          source .venv/bin/activate    # Activates the new virtual environment. This is necessary for subsequent steps in this job where we run commands inside it (like install). In other words: starts using python that's installed within venv here  and will not affect any system Python packages or user-installed ones
          pip install --no-cache -r requirements.txt    # Installs the project dependencies into our virtual environment, without reverifying hashes in case of changes to package versions (like new version)  
      
      - name: Run Tests 
        run : |     # Runs tests within this job using python command inside venv activated above. It's necessary because we want the Python packages installed by pip and not system ones, where our project specific dependencies are located in requirements file (like numpy)  
          pytest    # This runs all test cases from your package or module  that you have defined under tests directory if it exists otherwise this line will fail. It's a good practice to organize the testing within separate directories and files, but for simplicity I am assuming here we are using only one file named `tests`
      
      - name: Deploy   # This step deploys your application on servers (you need specific steps depending upon what kind of deployment you want)  Here it's just a placeholder. You may replace the commands with appropriate ones for deploying to different environments like staging, production etc based off requirement and server details
        run: |    # This step is not needed if there are no servers or resources required (like databases). If your deployment requires any setup steps then you need it here as well.  For example - export DEPLOYMENT_VARIABLE=...; python script-to-deploy.py