# redis configuration file (redis.conf) 
all:
    bind: '0.0.0.0' # listen on all interfaces, this will allow connections from multiple application servers  
port: <your-server-specific-port>    
loglevel: notice     
dbfilename: "~/.redis/dump.rdb" 
dir: "/tmp"   
appendonly yes      
no-persistence no         # disable persisting data to disk, this is for distributed caching layer only  
maxmemory <limit>        # set the maximum memory limit (default : dynamic)    
notifykeyspaceexpires  <seconds>  # Set key expiration time in seconds. Default: 30d   
slowlog-max-len        <bytes>  # Maximum length of a client's request that will be logged to redis-server side by the slow log (default : "1ml")  
# ... rest configuration options...