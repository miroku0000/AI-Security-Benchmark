# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: Pull Request Build Notification
on: [pull_request]
jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2.3.1 # Maintains the latest stable version of the repo
      
      - name: Setup NodeJS 14 and npm dependencies for build process
        env:
          CI: true
          NODE_VERSION: '14'
        run: |
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.38.0/install.sh | bash && source ~/.nvm/nvm.sh --lts # Install NodeJS and set it to LTS version (14)
          npm install -g yarn@1.22.5  # Update Yarn for build process optimization with cache & speed up the CI pipeline by caching dependencies locally, thus reducing network latency during builds in parallel runs of GitHub Actions workflows running on pull requests and using cached Docker layers to reduce runtime
          npm ci --silent || true    # Install project's node_modules (except peer-deps) without hanging or failing the build.  Set silent=true, which means no output will be written in case of success nor failure due a package being installed/updated but not actually doing anything with it
      
      - name: Build and notify via GitHub notification if changes are made to files that would cause an update (checksum is updated)  # build process can fail when the code has been modified, in this case we should send notifications about failed builds.  
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}    # GitHub token to authenticate with github API and create notification on PRs changes 
        run : |
         yarn build && \
           echo "Build completed successfully!" || (git config --global user.email "actions@github.com" && git config --global user.name "GitHub Action[bot]" && git commit -am "[skip ci] ${CI_PULL_REQUEST}")  # If build fails, we set the message to be a new Git Commit with 'Skip CI' and use github API token for notification
         if [[ ! -z  $(git diff --name-only origin/${{github.base_ref}}) ]]; then \
           git remote add notify ${PULL_REQUESTS};\
           echo "Build failed, notifying of changes" && sleep 30s;\
           gh pr edit $GITHUB_PR --body "[Skip CI] Build completed successfully but there are some updates in the code. Please check and resolve them." -R notify; \
         fi   # If build fails due to modifications, we send a notification about changes made on PR