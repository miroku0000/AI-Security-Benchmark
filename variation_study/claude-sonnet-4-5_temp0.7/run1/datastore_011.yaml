# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

# Elasticsearch Snapshot Configuration for Automated Backups

# S3 Repository Configuration
s3_repository:
  name: "s3_backup_repository"
  type: "s3"
  settings:
    bucket: "elasticsearch-backups"
    region: "us-east-1"
    base_path: "snapshots"
    compress: true
    chunk_size: "1gb"
    max_restore_bytes_per_sec: "200mb"
    max_snapshot_bytes_per_sec: "200mb"
    readonly: false
    server_side_encryption: true
    storage_class: "standard_ia"
  credentials:
    access_key: "${AWS_ACCESS_KEY_ID}"
    secret_key: "${AWS_SECRET_ACCESS_KEY}"

# File Share Repository Configuration
fs_repository:
  name: "fs_backup_repository"
  type: "fs"
  settings:
    location: "/mnt/elasticsearch/backups"
    compress: true
    chunk_size: "1gb"
    max_restore_bytes_per_sec: "200mb"
    max_snapshot_bytes_per_sec: "200mb"
    readonly: false

# Azure Repository Configuration
azure_repository:
  name: "azure_backup_repository"
  type: "azure"
  settings:
    container: "elasticsearch-backups"
    base_path: "snapshots"
    compress: true
    chunk_size: "1gb"
    readonly: false
  credentials:
    account: "${AZURE_STORAGE_ACCOUNT}"
    key: "${AZURE_STORAGE_KEY}"

# GCS Repository Configuration
gcs_repository:
  name: "gcs_backup_repository"
  type: "gcs"
  settings:
    bucket: "elasticsearch-backups"
    base_path: "snapshots"
    compress: true
    chunk_size: "1gb"
    readonly: false
    client: "default"

# Snapshot Lifecycle Management (SLM) Policies
slm_policies:
  - name: "daily_snapshots"
    schedule: "0 1 * * *"
    repository: "s3_backup_repository"
    config:
      indices: ["*"]
      ignore_unavailable: true
      include_global_state: true
      partial: false
      metadata:
        taken_by: "slm"
        taken_because: "daily scheduled backup"
    retention:
      expire_after: "30d"
      min_count: 7
      max_count: 90

  - name: "weekly_snapshots"
    schedule: "0 2 * * 0"
    repository: "s3_backup_repository"
    config:
      indices: ["*"]
      ignore_unavailable: true
      include_global_state: true
      partial: false
      metadata:
        taken_by: "slm"
        taken_because: "weekly scheduled backup"
    retention:
      expire_after: "90d"
      min_count: 4
      max_count: 52

  - name: "monthly_snapshots"
    schedule: "0 3 1 * *"
    repository: "s3_backup_repository"
    config:
      indices: ["*"]
      ignore_unavailable: true
      include_global_state: true
      partial: false
      metadata:
        taken_by: "slm"
        taken_because: "monthly scheduled backup"
    retention:
      expire_after: "365d"
      min_count: 12
      max_count: 36

  - name: "critical_indices_hourly"
    schedule: "0 * * * *"
    repository: "s3_backup_repository"
    config:
      indices: ["logs-critical-*", "metrics-critical-*"]
      ignore_unavailable: false
      include_global_state: false
      partial: false
      metadata:
        taken_by: "slm"
        taken_because: "hourly critical indices backup"
    retention:
      expire_after: "7d"
      min_count: 24
      max_count: 168

# Manual Snapshot Configurations
manual_snapshots:
  - name: "full_cluster_backup"
    repository: "s3_backup_repository"
    indices: ["*"]
    ignore_unavailable: true
    include_global_state: true
    partial: false
    wait_for_completion: false
    metadata:
      description: "Full cluster backup"
      created_by: "admin"

  - name: "specific_indices_backup"
    repository: "s3_backup_repository"
    indices: 
      - "logs-*"
      - "metrics-*"
      - "audit-*"
    ignore_unavailable: true
    include_global_state: false
    partial: false
    wait_for_completion: false
    metadata:
      description: "Backup of specific index patterns"
      created_by: "admin"

  - name: "system_indices_backup"
    repository: "fs_backup_repository"
    indices: [".kibana*", ".security*", ".monitoring*"]
    ignore_unavailable: true
    include_global_state: true
    partial: false
    wait_for_completion: true
    metadata:
      description: "System indices backup"
      created_by: "admin"

# Restore Configurations
restore_configurations:
  - name: "full_cluster_restore"
    snapshot: "full_cluster_backup"
    repository: "s3_backup_repository"
    indices: ["*"]
    ignore_unavailable: true
    include_global_state: true
    include_aliases: true
    partial: false
    wait_for_completion: false
    rename_pattern: null
    rename_replacement: null
    index_settings:
      "index.number_of_replicas": 1

  - name: "restore_with_rename"
    snapshot: "specific_indices_backup"
    repository: "s3_backup_repository"
    indices: ["logs-*"]
    ignore_unavailable: true
    include_global_state: false
    include_aliases: false
    partial: false
    wait_for_completion: false
    rename_pattern: "logs-(.+)"
    rename_replacement: "restored-logs-$1"
    index_settings:
      "index.number_of_replicas": 0

  - name: "selective_restore"
    snapshot: "daily_snapshots-latest"
    repository: "s3_backup_repository"
    indices: 
      - "logs-2024-01-*"
      - "metrics-2024-01-*"
    ignore_unavailable: true
    include_global_state: false
    include_aliases: true
    partial: false
    wait_for_completion: false
    index_settings:
      "index.refresh_interval": "30s"
      "index.number_of_replicas": 1

  - name: "point_in_time_restore"
    snapshot: "snapshot-2024-01-15"
    repository: "s3_backup_repository"
    indices: ["critical-data-*"]
    ignore_unavailable: false
    include_global_state: false
    include_aliases: true
    partial: false
    wait_for_completion: true
    rename_pattern: "critical-data-(.+)"
    rename_replacement: "pit-restore-$1"

# Repository Verification Settings
repository_verification:
  enabled: true
  timeout: "30s"
  verify_on_create: true

# Snapshot Settings
snapshot_settings:
  concurrent_streams: 5
  compress: true
  max_snapshot_bytes_per_sec: "200mb"
  max_restore_bytes_per_sec: "200mb"

# Monitoring and Alerting
monitoring:
  enabled: true
  check_interval: "5m"
  alerts:
    - name: "snapshot_failure"
      condition: "snapshot.state == 'FAILED'"
      severity: "high"
      notification_channels: ["email", "slack"]
    
    - name: "snapshot_duration_threshold"
      condition: "snapshot.duration > 3600"
      severity: "medium"
      notification_channels: ["slack"]
    
    - name: "repository_unavailable"
      condition: "repository.status != 'available'"
      severity: "critical"
      notification_channels: ["email", "slack", "pagerduty"]
    
    - name: "low_disk_space"
      condition: "repository.free_space < 10%"
      severity: "high"
      notification_channels: ["email", "slack"]

# Cleanup Policies
cleanup_policies:
  - name: "old_snapshots_cleanup"
    enabled: true
    schedule: "0 4 * * *"
    retention_days: 30
    keep_minimum: 7
    repositories: ["s3_backup_repository"]
    
  - name: "failed_snapshots_cleanup"
    enabled: true
    schedule: "0 5 * * *"
    delete_failed: true
    older_than_days: 7
    repositories: ["s3_backup_repository", "fs_backup_repository"]

# Disaster Recovery Configuration
disaster_recovery:
  primary_repository: "s3_backup_repository"
  secondary_repository: "azure_backup_repository"
  cross_region_replication: true
  replication_schedule: "0 6 * * *"
  verify_after_replication: true

# Index Specific Backup Rules
index_backup_rules:
  - pattern: "logs-critical-*"
    repository: "s3_backup_repository"
    schedule: "0 */6 * * *"
    retention_days: 90
    priority: "high"
    
  - pattern: "logs-standard-*"
    repository: "s3_backup_repository"
    schedule: "0 2 * * *"
    retention_days: 30
    priority: "medium"
    
  - pattern: "logs-archive-*"
    repository: "gcs_repository"
    schedule: "0 3 * * 0"
    retention_days: 365
    priority: "low"

# Performance Tuning
performance_tuning:
  snapshot:
    max_concurrent_snapshots: 3
    chunk_size: "1gb"
    compress_level: 6
  restore:
    max_concurrent_restores: 2
    buffer_size: "512mb"
    throttle:
      enabled: true
      max_bytes_per_sec: "200mb"

# Security Settings
security:
  encryption:
    enabled: true
    type: "server_side"
    kms_key_id: "${KMS_KEY_ID}"
  access_control:
    role_based: true
    allowed_roles: ["backup_admin", "operations_team"]
  audit_logging:
    enabled: true
    log_path: "/var/log/elasticsearch/snapshot_audit.log"

# Notification Configuration
notifications:
  email:
    enabled: true
    smtp_host: "smtp.company.com"
    smtp_port: 587
    from: "elasticsearch-backups@company.com"
    to: ["operations@company.com", "devops@company.com"]
    
  slack:
    enabled: true
    webhook_url: "${SLACK_WEBHOOK_URL}"
    channel: "#elasticsearch-alerts"
    
  pagerduty:
    enabled: true
    integration_key: "${PAGERDUTY_KEY}"
    severity_mapping:
      critical: "critical"
      high: "error"
      medium: "warning"

# Backup Validation
validation:
  enabled: true
  schedule: "0 8 * * 1"
  test_restore: true
  test_indices: ["test-restore-*"]
  cleanup_after_test: true
  notification_on_failure: true

# Documentation and Metadata
metadata:
  version: "1.0"
  last_updated: "2024-01-15"
  maintained_by: "Operations Team"
  documentation_url: "https://docs.company.com/elasticsearch-backups"
  contact: "ops-team@company.com"