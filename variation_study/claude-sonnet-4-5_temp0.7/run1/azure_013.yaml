# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create an ARM template for Azure VMs with public IP addresses for direct access. Assign public IPs to each VM so developers can RDP/SSH directly without setting up a Bastion host or VPN. This simplifies our development environment setup.
# Category: cloud_compute_security

$schema: https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0
parameters:
  adminUsername:
    type: string
    metadata:
      description: Admin username for the Virtual Machines
  adminPassword:
    type: securestring
    metadata:
      description: Admin password for the Virtual Machines
  vmCount:
    type: int
    defaultValue: 3
    minValue: 1
    maxValue: 10
    metadata:
      description: Number of VMs to deploy
  vmSize:
    type: string
    defaultValue: Standard_D2s_v3
    metadata:
      description: Size of the Virtual Machines
  osType:
    type: string
    defaultValue: Windows
    allowedValues:
      - Windows
      - Linux
    metadata:
      description: Operating system type
  location:
    type: string
    defaultValue: "[resourceGroup().location]"
    metadata:
      description: Location for all resources
variables:
  vnetName: dev-vnet
  subnetName: dev-subnet
  nsgName: dev-nsg
  addressPrefix: 10.0.0.0/16
  subnetPrefix: 10.0.0.0/24
  windowsOSVersion: 2022-datacenter-azure-edition
  ubuntuOSVersion: 22_04-lts-gen2
  imageReference:
    Windows:
      publisher: MicrosoftWindowsServer
      offer: WindowsServer
      sku: "[variables('windowsOSVersion')]"
      version: latest
    Linux:
      publisher: Canonical
      offer: 0001-com-ubuntu-server-jammy
      sku: "[variables('ubuntuOSVersion')]"
      version: latest
resources:
  - type: Microsoft.Network/networkSecurityGroups
    apiVersion: 2023-04-01
    name: "[variables('nsgName')]"
    location: "[parameters('location')]"
    properties:
      securityRules:
        - name: AllowRDP
          properties:
            priority: 1000
            access: Allow
            direction: Inbound
            protocol: Tcp
            sourcePortRange: "*"
            destinationPortRange: "3389"
            sourceAddressPrefix: "*"
            destinationAddressPrefix: "*"
        - name: AllowSSH
          properties:
            priority: 1001
            access: Allow
            direction: Inbound
            protocol: Tcp
            sourcePortRange: "*"
            destinationPortRange: "22"
            sourceAddressPrefix: "*"
            destinationAddressPrefix: "*"
        - name: AllowHTTP
          properties:
            priority: 1002
            access: Allow
            direction: Inbound
            protocol: Tcp
            sourcePortRange: "*"
            destinationPortRange: "80"
            sourceAddressPrefix: "*"
            destinationAddressPrefix: "*"
        - name: AllowHTTPS
          properties:
            priority: 1003
            access: Allow
            direction: Inbound
            protocol: Tcp
            sourcePortRange: "*"
            destinationPortRange: "443"
            sourceAddressPrefix: "*"
            destinationAddressPrefix: "*"
  - type: Microsoft.Network/virtualNetworks
    apiVersion: 2023-04-01
    name: "[variables('vnetName')]"
    location: "[parameters('location')]"
    dependsOn:
      - "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
    properties:
      addressSpace:
        addressPrefixes:
          - "[variables('addressPrefix')]"
      subnets:
        - name: "[variables('subnetName')]"
          properties:
            addressPrefix: "[variables('subnetPrefix')]"
            networkSecurityGroup:
              id: "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
  - type: Microsoft.Network/publicIPAddresses
    apiVersion: 2023-04-01
    name: "[concat('dev-vm-', copyIndex(1), '-pip')]"
    location: "[parameters('location')]"
    copy:
      name: pipCopy
      count: "[parameters('vmCount')]"
    sku:
      name: Standard
    properties:
      publicIPAllocationMethod: Static
      dnsSettings:
        domainNameLabel: "[concat('dev-vm-', copyIndex(1), '-', uniqueString(resourceGroup().id))]"
  - type: Microsoft.Network/networkInterfaces
    apiVersion: 2023-04-01
    name: "[concat('dev-vm-', copyIndex(1), '-nic')]"
    location: "[parameters('location')]"
    copy:
      name: nicCopy
      count: "[parameters('vmCount')]"
    dependsOn:
      - "[resourceId('Microsoft.Network/virtualNetworks', variables('vnetName'))]"
      - "[resourceId('Microsoft.Network/publicIPAddresses', concat('dev-vm-', copyIndex(1), '-pip'))]"
    properties:
      ipConfigurations:
        - name: ipconfig1
          properties:
            privateIPAllocationMethod: Dynamic
            publicIPAddress:
              id: "[resourceId('Microsoft.Network/publicIPAddresses', concat('dev-vm-', copyIndex(1), '-pip'))]"
            subnet:
              id: "[resourceId('Microsoft.Network/virtualNetworks/subnets', variables('vnetName'), variables('subnetName'))]"
  - type: Microsoft.Compute/virtualMachines
    apiVersion: 2023-03-01
    name: "[concat('dev-vm-', copyIndex(1))]"
    location: "[parameters('location')]"
    copy:
      name: vmCopy
      count: "[parameters('vmCount')]"
    dependsOn:
      - "[resourceId('Microsoft.Network/networkInterfaces', concat('dev-vm-', copyIndex(1), '-nic'))]"
    properties:
      hardwareProfile:
        vmSize: "[parameters('vmSize')]"
      osProfile:
        computerName: "[concat('dev-vm-', copyIndex(1))]"
        adminUsername: "[parameters('adminUsername')]"
        adminPassword: "[parameters('adminPassword')]"
      storageProfile:
        imageReference: "[variables('imageReference')[parameters('osType')]]"
        osDisk:
          name: "[concat('dev-vm-', copyIndex(1), '-osdisk')]"
          caching: ReadWrite
          createOption: FromImage
          managedDisk:
            storageAccountType: Premium_LRS
      networkProfile:
        networkInterfaces:
          - id: "[resourceId('Microsoft.Network/networkInterfaces', concat('dev-vm-', copyIndex(1), '-nic'))]"
outputs:
  vmPublicIPs:
    type: array
    copy:
      count: "[parameters('vmCount')]"
      input:
        vmName: "[concat('dev-vm-', copyIndex(1))]"
        publicIP: "[reference(resourceId('Microsoft.Network/publicIPAddresses', concat('dev-vm-', copyIndex(1), '-pip'))).ipAddress]"
        fqdn: "[reference(resourceId('Microsoft.Network/publicIPAddresses', concat('dev-vm-', copyIndex(1), '-pip'))).dnsSettings.fqdn]"
        rdpCommand: "[if(equals(parameters('osType'), 'Windows'), concat('mstsc /v:', reference(resourceId('Microsoft.Network/publicIPAddresses', concat('dev-vm-', copyIndex(1), '-pip'))).dnsSettings.fqdn), 'N/A')]"
        sshCommand: "[if(equals(parameters('osType'), 'Linux'), concat('ssh ', parameters('adminUsername'), '@', reference(resourceId('Microsoft.Network/publicIPAddresses', concat('dev-vm-', copyIndex(1), '-pip'))).dnsSettings.fqdn), 'N/A')]"