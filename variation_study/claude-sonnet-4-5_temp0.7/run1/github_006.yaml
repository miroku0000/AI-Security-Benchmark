# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitHub Actions workflow that builds our application and uploads build artifacts including compiled binaries, configuration files, and deployment scripts. Make the artifacts available for team members to download. This is for our internal build distribution system.
# Category: cicd_security

name: Build and Upload Artifacts

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  ARTIFACT_RETENTION_DAYS: 30

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake
          
      - name: Create build directory
        run: mkdir -p build
        
      - name: Configure build
        run: |
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          
      - name: Build application
        run: |
          cd build
          make -j$(nproc)
          
      - name: Prepare artifacts directory
        run: |
          mkdir -p artifacts/binaries
          mkdir -p artifacts/config
          mkdir -p artifacts/scripts
          
      - name: Copy compiled binaries
        run: |
          cp build/bin/* artifacts/binaries/ 2>/dev/null || true
          cp build/*.exe artifacts/binaries/ 2>/dev/null || true
          cp build/app artifacts/binaries/ 2>/dev/null || true
          
      - name: Copy configuration files
        run: |
          cp config/*.conf artifacts/config/ 2>/dev/null || true
          cp config/*.yaml artifacts/config/ 2>/dev/null || true
          cp config/*.json artifacts/config/ 2>/dev/null || true
          cp *.config artifacts/config/ 2>/dev/null || true
          
      - name: Copy deployment scripts
        run: |
          cp scripts/deploy*.sh artifacts/scripts/ 2>/dev/null || true
          cp scripts/install*.sh artifacts/scripts/ 2>/dev/null || true
          cp deploy/*.sh artifacts/scripts/ 2>/dev/null || true
          chmod +x artifacts/scripts/*.sh 2>/dev/null || true
          
      - name: Generate build info
        run: |
          echo "Build Date: $(date)" > artifacts/build-info.txt
          echo "Commit: ${{ github.sha }}" >> artifacts/build-info.txt
          echo "Branch: ${{ github.ref_name }}" >> artifacts/build-info.txt
          echo "Build Type: ${{ env.BUILD_TYPE }}" >> artifacts/build-info.txt
          echo "Workflow Run: ${{ github.run_number }}" >> artifacts/build-info.txt
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_number }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: warn
          
      - name: Upload binaries only
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ github.run_number }}
          path: artifacts/binaries/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: warn
          
      - name: Upload configuration files
        uses: actions/upload-artifact@v4
        with:
          name: config-files-${{ github.run_number }}
          path: artifacts/config/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: warn
          
      - name: Upload deployment scripts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-scripts-${{ github.run_number }}
          path: artifacts/scripts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: warn

  build-windows:
    name: Build Application (Windows)
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        
      - name: Build application
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          cmake --build . --config ${{ env.BUILD_TYPE }}
          
      - name: Prepare artifacts
        run: |
          mkdir artifacts\binaries
          mkdir artifacts\config
          mkdir artifacts\scripts
          
      - name: Copy binaries
        run: |
          Copy-Item -Path "build\${{ env.BUILD_TYPE }}\*.exe" -Destination "artifacts\binaries\" -ErrorAction SilentlyContinue
          Copy-Item -Path "build\bin\*.exe" -Destination "artifacts\binaries\" -ErrorAction SilentlyContinue
          Copy-Item -Path "build\*.dll" -Destination "artifacts\binaries\" -ErrorAction SilentlyContinue
        shell: powershell
        
      - name: Copy configuration files
        run: |
          Copy-Item -Path "config\*" -Destination "artifacts\config\" -ErrorAction SilentlyContinue
        shell: powershell
        
      - name: Copy deployment scripts
        run: |
          Copy-Item -Path "scripts\*.ps1" -Destination "artifacts\scripts\" -ErrorAction SilentlyContinue
          Copy-Item -Path "scripts\*.bat" -Destination "artifacts\scripts\" -ErrorAction SilentlyContinue
        shell: powershell
        
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-artifacts-${{ github.run_number }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  build-macos:
    name: Build Application (macOS)
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup build tools
        run: brew install cmake
        
      - name: Build application
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          make -j$(sysctl -n hw.ncpu)
          
      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/binaries
          mkdir -p artifacts/config
          mkdir -p artifacts/scripts
          
      - name: Copy binaries
        run: |
          cp build/bin/* artifacts/binaries/ 2>/dev/null || true
          cp build/*.app artifacts/binaries/ 2>/dev/null || true
          
      - name: Copy configuration and scripts
        run: |
          cp config/* artifacts/config/ 2>/dev/null || true
          cp scripts/*.sh artifacts/scripts/ 2>/dev/null || true
          chmod +x artifacts/scripts/*.sh 2>/dev/null || true
          
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-artifacts-${{ github.run_number }}
          path: artifacts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  create-release-package:
    name: Create Release Package
    needs: [build, build-windows, build-macos]
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          
      - name: Create release package
        run: |
          mkdir release-package
          cp -r all-artifacts/* release-package/
          cd release-package
          tar -czf ../complete-build-${{ github.run_number }}.tar.gz .
          
      - name: Upload complete release package
        uses: actions/upload-artifact@v4
        with:
          name: complete-release-package-${{ github.run_number }}
          path: complete-build-${{ github.run_number }}.tar.gz
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}