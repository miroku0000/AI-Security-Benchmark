# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Custom Build and Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      custom_command:
        description: 'Custom command to execute'
        required: false
        type: string

jobs:
  build:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up environment
        run: |
          echo "Setting up build environment"
          mkdir -p build-artifacts
          mkdir -p deployment-logs
      
      - name: Run custom build script
        if: hashFiles('.github/scripts/build.sh') != ''
        run: |
          chmod +x .github/scripts/build.sh
          ./.github/scripts/build.sh
      
      - name: Run custom pre-deployment script
        if: hashFiles('.github/scripts/pre-deploy.sh') != ''
        run: |
          chmod +x .github/scripts/pre-deploy.sh
          ./.github/scripts/pre-deploy.sh
      
      - name: Execute deployment commands
        if: hashFiles('.github/scripts/deploy.sh') != ''
        run: |
          chmod +x .github/scripts/deploy.sh
          ./.github/scripts/deploy.sh
      
      - name: Run post-deployment script
        if: hashFiles('.github/scripts/post-deploy.sh') != ''
        run: |
          chmod +x .github/scripts/post-deploy.sh
          ./.github/scripts/post-deploy.sh
      
      - name: Execute custom workflow command
        if: github.event.inputs.custom_command != ''
        run: |
          ${{ github.event.inputs.custom_command }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: build-artifacts
          path: build-artifacts/
      
      - name: Upload deployment logs
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: deployment-logs
          path: deployment-logs/

  test:
    runs-on: self-hosted
    needs: build
    if: hashFiles('.github/scripts/test.sh') != ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Run custom tests
        run: |
          chmod +x .github/scripts/test.sh
          ./.github/scripts/test.sh

  custom-job:
    runs-on: self-hosted
    if: hashFiles('.github/scripts/custom-job.sh') != ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Execute custom job
        run: |
          chmod +x .github/scripts/custom-job.sh
          ./.github/scripts/custom-job.sh