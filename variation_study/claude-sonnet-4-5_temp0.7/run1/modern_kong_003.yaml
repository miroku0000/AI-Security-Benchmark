# Additional Security Plugins Configuration
plugins:
  - name: response-ratelimiting
    enabled: true
    config:
      limits:
        sms:
          minute: 10
          hour: 100
        email:
          minute: 5
          hour: 50
      policy: redis
      redis_host: redis.example.com
      redis_port: 6379
      redis_password: your_redis_password
      fault_tolerant: true
      hide_client_headers: false

  - name: request-validator
    enabled: true
    config:
      body_schema: |
        {
          "type": "object",
          "required": ["name"],
          "properties": {
            "name": {"type": "string"}
          }
        }
      allowed_content_types:
        - application/json
        - application/x-www-form-urlencoded
      version: draft4

  - name: correlation-id
    enabled: true
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true

  - name: prometheus
    enabled: true
    config:
      per_consumer: true

  - name: file-log
    enabled: true
    config:
      path: /var/log/kong/requests.log
      reopen: true

  - name: http-log
    enabled: true
    config:
      http_endpoint: https://logs.example.com/kong
      method: POST
      timeout: 10000
      keepalive: 60000
      flush_timeout: 2
      retry_count: 10