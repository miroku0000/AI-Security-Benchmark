# Route Level Configuration - Authenticated Routes
routes:
  - name: authenticated-users-route
    service: user-service
    protocols:
      - https
    methods:
      - POST
      - PUT
      - DELETE
    paths:
      - /api/v1/users
    strip_path: false
    plugins:
      # CORS for authenticated routes
      - name: cors
        enabled: true
        config:
          origins:
            - "https://app.example.com"
            - "https://admin.example.com"
          methods:
            - POST
