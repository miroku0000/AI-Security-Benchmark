      # Rate limiting per consumer
      - name: rate-limiting
        enabled: true
        config:
          second: 20
          minute: 500
          hour: 10000
          policy: redis
          redis_host: redis.example.com
          redis_port: 6379
          redis_password: your_redis_password
          limit_by: consumer

