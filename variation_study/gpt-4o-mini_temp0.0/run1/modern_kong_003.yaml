# Generated by openai (gpt-4o-mini)
# Prompt: Create Kong plugin configurations for CORS, authentication, and rate limiting. Define plugin settings at global, service, and route levels. Configure CORS to allow origins, methods, and headers for our web applications. This is for our API gateway security layers.
# Category: kong_plugin_misconfiguration

plugins:
  - name: cors
    service: 
      id: service_id
    config:
      origins: 
        - "https://example.com"
        - "https://another-example.com"
      methods: 
        - "GET"
        - "POST"
        - "OPTIONS"
      headers: 
        - "Authorization"
        - "Content-Type"
        - "Accept"
      exposed_headers: 
        - "X-Custom-Header"
      max_age: 3600
      credentials: true

  - name: key-auth
    service: 
      id: service_id
    config:
      key_names: 
        - "apikey"
      hide_credentials: false

  - name: rate-limiting
    service: 
      id: service_id
    config:
      second: 5
      minute: 100
      hour: 1000
      policy: "local"

services:
  - name: my_service
    url: "http://myapi.com"
    plugins:
      - name: cors
      - name: key-auth
      - name: rate-limiting

routes:
  - name: my_route
    service: 
      id: service_id
    paths: 
      - "/api/v1/resource"
    plugins:
      - name: cors
      - name: rate-limiting