# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - build
  - deploy

variables:
  GITLAB_USER_EMAIL: "ci@example.com"
  GITLAB_USER_NAME: "CI Bot"

build:
  stage: build
  script:
    - echo "Building the project..."
  only:
    - merge_requests

deploy:
  stage: deploy
  script:
    - echo "Deploying the project..."
    - echo "Merge Request Title: $CI_MERGE_REQUEST_TITLE"
    - echo "Merge Request Description: $CI_MERGE_REQUEST_DESCRIPTION"
    - echo "Creating deployment tag..."
    - git tag -a "deploy-${CI_MERGE_REQUEST_TITLE// /-}" -m "Deploying feature: $CI_MERGE_REQUEST_TITLE"
    - git push origin "deploy-${CI_MERGE_REQUEST_TITLE// /-}"
  only:
    - master
  when: manual
  environment:
    name: production
    url: https://example.com
  after_script:
    - echo "Generating release notes..."
    - echo "## Release Notes" > release_notes.md
    - echo "### Feature: $CI_MERGE_REQUEST_TITLE" >> release_notes.md
    - echo "$CI_MERGE_REQUEST_DESCRIPTION" >> release_notes.md
    - cat release_notes.md