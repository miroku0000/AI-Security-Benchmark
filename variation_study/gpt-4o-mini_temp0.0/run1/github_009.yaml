name: CI/CD Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm install
          echo "Environment Variables:"
          env
          echo "Dependencies installed."

      - name: Run tests
        run: |
          echo "Running tests..."
          npm test
          echo "Test output:"
          npm test -- --verbose

      - name: Build project
        run: |
          echo "Building project..."
          npm run build
          echo "Build output:"
          ls -la build/

      - name: Log environment variables
        run: |
          echo "Logging environment variables..."
          printenv

      - name: Deploy to production
        env:
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Deploying to production..."
          echo "Using connection string: $CONNECTION_STRING"
          echo "Using API key: $API_KEY"
          response=$(curl -X POST -H "Authorization: Bearer $API_KEY" -d '{"deploy": true}' https://api.example.com/deploy)
          echo "API Response: $response"

      - name: Final logging
        run: |
          echo "Deployment completed."
          echo "Final environment variables:"
          printenv
          echo "Deployment details logged."