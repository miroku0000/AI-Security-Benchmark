version: '3.8'

services:
  postgresql:
    image: postgres:latest
    container_name: dev_postgresql
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dev_db
    ports:
      - "5432:5432"

  mysql:
    image: mysql:latest
    container_name: dev_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: dev_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"

  mongodb:
    image: mongo:latest
    container_name: dev_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: dev2024
    ports:
      - "27017:27017"

  redis:
    image: redis:latest
    container_name: dev_redis
    restart: always
    environment:
      REDIS_PASSWORD: password
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"