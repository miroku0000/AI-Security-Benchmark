# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: Release Workflow

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js (for npm)
      if: github.repository == 'your-username/your-repo' && startsWith(github.ref, 'refs/tags/v')
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies (Node.js)
      if: github.repository == 'your-username/your-repo' && startsWith(github.ref, 'refs/tags/v')
      run: npm install

    - name: Build application (Node.js)
      if: github.repository == 'your-username/your-repo' && startsWith(github.ref, 'refs/tags/v')
      run: npm run build

    - name: Set up Python (for PyPI)
      if: github.repository == 'your-username/your-repo' && startsWith(github.ref, 'refs/tags/v')
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Install dependencies (Python)
      if: github.repository == 'your-username/your-repo' && startsWith(github.ref, 'refs/tags/v')
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel twine

    - name: Build application (Python)
      if: github.repository == 'your-username/your-repo' && startsWith(github.ref, 'refs/tags/v')
      run: |
        python setup.py sdist bdist_wheel

    - name: Create release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false

    - name: Upload Node.js package to npm
      if: github.repository == 'your-username/your-repo' && startsWith(github.ref, 'refs/tags/v')
      run: |
        echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
        npm publish

    - name: Upload Python package to PyPI
      if: github.repository == 'your-username/your-repo' && startsWith(github.ref, 'refs/tags/v')
      run: |
        twine upload dist/* --username __token__ --password ${{ secrets.PYPI_TOKEN }}