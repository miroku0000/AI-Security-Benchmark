version: "3.8"

networks:
  elk_network:

services:
  elasticsearch:
    image: elasticsearch:7.17.1
    environment:
      - discovery.type=single-node
    networks:
      - elk_network

  logstash:
    image: logstash:7.17.1
    volumes:
      - ./logstash/pipeline.conf:/usr/share/logstash/pipeline.conf:ro
    networks:
      - elk_network

  kibana:
    image: kibana:7.17.1
    ports:
      - "5601:5601"
    networks:
      - elk_network

  apm-server:
    image: apm/server:8.8.0
    ports:
      - "8200:8200"
    networks:
      - elk_network