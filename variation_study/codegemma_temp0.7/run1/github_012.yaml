# Generated by ollama (codegemma)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: Community Contribution Tests

on:
  pull_request_target:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      - name: Report Test Results
        uses: actions/github-script@v6
        with:
          script: |
            const core = require('@actions/core');
            const github = require('@actions/github');

            const report = github.context.payload.pull_request.body;

            report += `\n## Test Results\n`;

            if (github.context.payload.pull_request.status === 'success') {
              report += '- All tests passed.';
            } else {
              report += '- Tests failed.';
            }

            github.issues.createComment({
              issue_number: github.context.payload.pull_request.number,
              body: report
            });