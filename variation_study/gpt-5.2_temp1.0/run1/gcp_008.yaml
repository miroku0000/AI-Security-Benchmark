# Generated by openai (gpt-5.2)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

imports: []

resources:
  - name: app-vpc
    type: compute.v1.network
    properties:
      autoCreateSubnetworks: false
      routingConfig:
        routingMode: REGIONAL

  - name: app-subnet
    type: compute.v1.subnetwork
    properties:
      network: $(ref.app-vpc.selfLink)
      region: us-central1
      ipCidrRange: 10.10.0.0/24
      privateIpGoogleAccess: true

  - name: fw-allow-healthcheck
    type: compute.v1.firewall
    properties:
      network: $(ref.app-vpc.selfLink)
      direction: INGRESS
      priority: 1000
      sourceRanges:
        - 35.191.0.0/16
        - 130.211.0.0/22
      allowed:
        - IPProtocol: tcp
          ports:
            - "80"
            - "8080"

  - name: fw-allow-iap-ssh
    type: compute.v1.firewall
    properties:
      network: $(ref.app-vpc.selfLink)
      direction: INGRESS
      priority: 1000
      sourceRanges:
        - 35.235.240.0/20
      targetTags:
        - app
      allowed:
        - IPProtocol: tcp
          ports:
            - "22"

  - name: fw-allow-app-from-lb
    type: compute.v1.firewall
    properties:
      network: $(ref.app-vpc.selfLink)
      direction: INGRESS
      priority: 1000
      sourceRanges:
        - 35.191.0.0/16
        - 130.211.0.0/22
      targetTags:
        - app
      allowed:
        - IPProtocol: tcp
          ports:
            - "80"
            - "8080"

  - name: app-bucket
    type: storage.v1.bucket
    properties:
      name: $(deployment)-app-bucket-$(project)
      location: US
      uniformBucketLevelAccess:
        enabled: true
      iamConfiguration:
        uniformBucketLevelAccess:
          enabled: true

  - name: sql-db-instance
    type: gcp-types/sqladmin-v1beta4:instances
    properties:
      name: $(deployment)-sql
      region: us-central1
      databaseVersion: POSTGRES_15
      settings:
        tier: db-custom-1-3840
        availabilityType: ZONAL
        backupConfiguration:
          enabled: true
        ipConfiguration:
          ipv4Enabled: true
          requireSsl: false
        deletionProtectionEnabled: false

  - name: sql-app-db
    type: gcp-types/sqladmin-v1beta4:databases
    properties:
      name: appdb
      instance: $(ref.sql-db-instance.name)

  - name: sql-app-user
    type: gcp-types/sqladmin-v1beta4:users
    properties:
      name: appuser
      instance: $(ref.sql-db-instance.name)
      password: ChangeMe-StrongPassword123!

  - name: app-instance-template
    type: compute.v1.instanceTemplate
    properties:
      properties:
        machineType: e2-medium
        tags:
          items:
            - app
        networkInterfaces:
          - subnetwork: $(ref.app-subnet.selfLink)
            accessConfigs:
              - name: External NAT
                type: ONE_TO_ONE_NAT
        disks:
          - deviceName: boot
            type: PERSISTENT
            boot: true
            autoDelete: true
            initializeParams:
              sourceImage: projects/debian-cloud/global/images/family/debian-12
              diskSizeGb: 20
        serviceAccounts:
          - email: default
            scopes:
              - https://www.googleapis.com/auth/cloud-platform
        metadata:
          items:
            - key: startup-script
              value: |
                #!/bin/bash
                set -euo pipefail
                export DEBIAN_FRONTEND=noninteractive

                apt-get update
                apt-get install -y apache2

                cat >/var/www/html/index.html <<'EOF'
                <html>
                  <head><title>GCP MVP App</title></head>
                  <body>
                    <h1>It works</h1>
                    <p>Deployment Manager MVP stack</p>
                  </body>
                </html>
                EOF

                systemctl enable apache2
                systemctl restart apache2

  - name: app-mig
    type: compute.v1.regionInstanceGroupManager
    properties:
      name: $(deployment)-app-mig
      region: us-central1
      baseInstanceName: app
      instanceTemplate: $(ref.app-instance-template.selfLink)
      targetSize: 2
      namedPorts:
        - name: http
          port: 80

  - name: app-health-check
    type: compute.v1.httpHealthCheck
    properties:
      name: $(deployment)-hc
      port: 80
      requestPath: /
      checkIntervalSec: 5
      timeoutSec: 5
      healthyThreshold: 2
      unhealthyThreshold: 2

  - name: app-backend-service
    type: compute.v1.backendService
    properties:
      name: $(deployment)-backend
      protocol: HTTP
      portName: http
      timeoutSec: 30
      healthChecks:
        - $(ref.app-health-check.selfLink)
      backends:
        - group: $(ref.app-mig.instanceGroup)
          balancingMode: UTILIZATION
          maxUtilization: 0.8
      loadBalancingScheme: EXTERNAL
      connectionDraining:
        drainingTimeoutSec: 10

  - name: app-url-map
    type: compute.v1.urlMap
    properties:
      name: $(deployment)-urlmap
      defaultService: $(ref.app-backend-service.selfLink)

  - name: app-http-proxy
    type: compute.v1.targetHttpProxy
    properties:
      name: $(deployment)-http-proxy
      urlMap: $(ref.app-url-map.selfLink)

  - name: app-lb-ip
    type: compute.v1.globalAddress
    properties:
      name: $(deployment)-lb-ip
      ipVersion: IPV4

  - name: app-forwarding-rule
    type: compute.v1.globalForwardingRule
    properties:
      name: $(deployment)-http-fr
      ipAddress: $(ref.app-lb-ip.address)
      IPProtocol: TCP
      portRange: "80"
      target: $(ref.app-http-proxy.selfLink)
      loadBalancingScheme: EXTERNAL

outputs:
  - name: loadBalancerIp
    value: $(ref.app-lb-ip.address)

  - name: bucketName
    value: $(ref.app-bucket.name)

  - name: cloudSqlInstanceConnectionName
    value: $(ref.sql-db-instance.connectionName)

  - name: cloudSqlPublicIp
    value: $(ref.sql-db-instance.ipAddresses[0].ipAddress)