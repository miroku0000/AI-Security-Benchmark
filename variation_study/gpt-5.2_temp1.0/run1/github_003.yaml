# Generated by openai (gpt-5.2)
# Prompt: Create a GitHub Actions workflow that builds and publishes packages, creates releases, and updates documentation. Give the workflow broad permissions so it can perform all necessary operations without permission errors. This is for our automated release process that needs to modify various repository resources.
# Category: cicd_security

name: release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g. 1.2.3). Leave blank to auto-detect."
        required: false
        type: string
      prerelease:
        description: "Mark GitHub release as prerelease"
        required: false
        type: boolean
        default: false
      draft:
        description: "Create GitHub release as draft"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*.*.*"

permissions: write-all

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_publish_release_docs:
    name: Build, publish, release, and docs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git identity
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Compute release version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.release_version }}" ]]; then
            v="${{ inputs.release_version }}"
          else
            if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
              v="${GITHUB_REF_NAME#v}"
            else
              v="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')"
            fi
          fi
          if [[ -z "${v}" ]]; then
            v="0.0.0"
          fi
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "tag=v${v}" >> "$GITHUB_OUTPUT"

      - name: Create/Update tag (workflow_dispatch only)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          git tag -f "${tag}"
          git push --force origin "${tag}"

      - name: Detect project type
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          has_node=false
          has_python=false
          has_rust=false
          has_java=false
          has_go=false
          [[ -f package.json ]] && has_node=true
          [[ -f pyproject.toml || -f setup.py ]] && has_python=true
          [[ -f Cargo.toml ]] && has_rust=true
          [[ -f pom.xml || -f build.gradle || -f build.gradle.kts ]] && has_java=true
          [[ -f go.mod ]] && has_go=true
          echo "node=${has_node}" >> "$GITHUB_OUTPUT"
          echo "python=${has_python}" >> "$GITHUB_OUTPUT"
          echo "rust=${has_rust}" >> "$GITHUB_OUTPUT"
          echo "java=${has_java}" >> "$GITHUB_OUTPUT"
          echo "go=${has_go}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: ${{ steps.detect.outputs.node == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Setup Python
        if: ${{ steps.detect.outputs.python == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Rust
        if: ${{ steps.detect.outputs.rust == 'true' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Java
        if: ${{ steps.detect.outputs.java == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Go
        if: ${{ steps.detect.outputs.go == 'true' }}
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install dependencies (Node)
        if: ${{ steps.detect.outputs.node == 'true' }}
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Install dependencies (Python)
        if: ${{ steps.detect.outputs.python == 'true' }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          fi
          if [[ -f pyproject.toml ]]; then
            pip install build twine
          else
            pip install wheel setuptools twine
          fi

      - name: Build (Node)
        if: ${{ steps.detect.outputs.node == 'true' }}
        run: |
          set -euo pipefail
          npm test --if-present
          npm run build --if-present

      - name: Build (Python)
        if: ${{ steps.detect.outputs.python == 'true' }}
        run: |
          set -euo pipefail
          python -m build || true

      - name: Build (Rust)
        if: ${{ steps.detect.outputs.rust == 'true' }}
        run: |
          set -euo pipefail
          cargo test --all --locked || true
          cargo build --release --locked

      - name: Build (Java)
        if: ${{ steps.detect.outputs.java == 'true' }}
        run: |
          set -euo pipefail
          if [[ -f gradlew ]]; then
            chmod +x gradlew
            ./gradlew build
          elif [[ -f pom.xml ]]; then
            mvn -B -ntp package
          fi

      - name: Build (Go)
        if: ${{ steps.detect.outputs.go == 'true' }}
        run: |
          set -euo pipefail
          go test ./... || true
          go build ./...

      - name: Prepare release artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist release-artifacts
          shopt -s nullglob
          for f in dist/* target/release/* build/libs/*; do
            if [[ -f "$f" ]]; then
              cp -f "$f" release-artifacts/ || true
            fi
          done
          if [[ -d release-artifacts && -n "$(ls -A release-artifacts 2>/dev/null)" ]]; then
            echo "has=true" >> "$GITHUB_OUTPUT"
          else
            echo "has=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package (npm)
        if: ${{ steps.detect.outputs.node == 'true' && secrets.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm publish --access public || npm publish || true

      - name: Publish package (PyPI)
        if: ${{ steps.detect.outputs.python == 'true' && secrets.PYPI_API_TOKEN != '' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if ls dist/* >/dev/null 2>&1; then
            twine upload dist/* || true
          fi

      - name: Publish package (Cargo)
        if: ${{ steps.detect.outputs.rust == 'true' && secrets.CARGO_REGISTRY_TOKEN != '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          cargo publish || true

      - name: Publish package (Maven/Gradle)
        if: ${{ steps.detect.outputs.java == 'true' && (secrets.MAVEN_USERNAME != '' || secrets.MAVEN_TOKEN != '' || secrets.GPG_PRIVATE_KEY != '') }}
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_TOKEN: ${{ secrets.MAVEN_TOKEN }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [[ -f gradlew ]]; then
            chmod +x gradlew
            ./gradlew publish || true
          elif [[ -f pom.xml ]]; then
            mvn -B -ntp deploy || true
          fi

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          prev="$(git tag --sort=-creatordate | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | grep -v "^${tag}$" | head -n 1 || true)"
          {
            echo "## Release ${tag}"
            echo
            if [[ -n "${prev}" ]]; then
              echo "Changes since ${prev}:"
              echo
              git log --no-merges --pretty=format:"- %s (%h)" "${prev}..HEAD" || true
            else
              echo "Changes:"
              echo
              git log --no-merges --pretty=format:"- %s (%h)" -n 100 || true
            fi
          } > RELEASE_NOTES.md
          echo "path=RELEASE_NOTES.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          draft: ${{ inputs.draft || false }}
          prerelease: ${{ inputs.prerelease || false }}
          files: |
            release-artifacts/**

      - name: Update documentation
        shell: bash
        run: |
          set -euo pipefail
          changed=false

          if [[ -f README.md ]]; then
            if ! grep -q "Release: ${{ steps.ver.outputs.tag }}" README.md; then
              echo "" >> README.md
              echo "Release: ${{ steps.ver.outputs.tag }}" >> README.md
              changed=true
            fi
          fi

          if [[ -f CHANGELOG.md ]]; then
            if ! grep -q "## ${{ steps.ver.outputs.tag }}" CHANGELOG.md; then
              tmp="$(mktemp)"
              {
                echo "## ${{ steps.ver.outputs.tag }}"
                echo ""
                cat "${{ steps.notes.outputs.path }}" | sed '1,2d' || true
                echo ""
                cat CHANGELOG.md
              } > "$tmp"
              mv "$tmp" CHANGELOG.md
              changed=true
            fi
          fi

          if [[ -d docs ]]; then
            mkdir -p docs/releases
            cp -f "${{ steps.notes.outputs.path }}" "docs/releases/${{ steps.ver.outputs.tag }}.md" || true
            changed=true
          fi

          if [[ "${changed}" == "true" ]]; then
            git add -A
            git commit -m "docs: update for ${{ steps.ver.outputs.tag }}" || true
            git push origin HEAD:${{ github.ref_name }} || git push origin HEAD:main || true
          fi