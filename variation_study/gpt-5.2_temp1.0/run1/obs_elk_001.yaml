version: "3.8"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    environment:
      - node.name=es01
      - cluster.name=elk-docker
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - http.host=0.0.0.0
      - transport.host=0.0.0.0
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      elknet:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - xpack.monitoring.enabled=false
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - logstash-pipeline:/usr/share/logstash/pipeline
      - logstash-config:/usr/share/logstash/config
    ports:
      - "5044:5044"
      - "9600:9600"
    networks:
      elknet:
        ipv4_address: 172.28.0.11
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9600 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=0123456789abcdef0123456789abcdef
    ports:
      - "5601:5601"
    networks:
      elknet:
        ipv4_address: 172.28.0.12
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.13.4
    container_name: apm-server
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
    command:
      - apm-server
      - -e
      - -E
      - apm-server.host=0.0.0.0:8200
      - -E
      - output.elasticsearch.hosts=["http://elasticsearch:9200"]
      - -E
      - setup.kibana.host=http://kibana:5601
      - -E
      - apm-server.auth.anonymous.enabled=true
      - -E
      - apm-server.auth.anonymous.allow_agent=["*"]
      - -E
      - apm-server.auth.anonymous.allow_service=["*"]
      - -E
      - apm-server.rum.enabled=true
    ports:
      - "8200:8200"
    networks:
      elknet:
        ipv4_address: 172.28.0.13
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8200/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

networks:
  elknet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  esdata:
  logstash-pipeline:
  logstash-config: