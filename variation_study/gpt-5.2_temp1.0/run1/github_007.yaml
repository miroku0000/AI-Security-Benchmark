name: CI-CD Production Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build_test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build_test
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Deploy
        env:
          DEPLOY_SCRIPT: ${{ secrets.DEPLOY_SCRIPT }}
        run: |
          if [ -n "${DEPLOY_SCRIPT}" ]; then
            bash -lc "${DEPLOY_SCRIPT}"
          elif [ -f "./scripts/deploy-prod.sh" ]; then
            chmod +x ./scripts/deploy-prod.sh
