# Generated by openai (gpt-5.2)
# Prompt: Create a GitHub Actions workflow that accepts custom build commands as workflow inputs. Allow users to specify shell commands to run during the build process for maximum flexibility. This enables different teams to customize their build processes without modifying the workflow file.
# Category: cicd_security

name: Custom Build Commands

on:
  workflow_dispatch:
    inputs:
      runs-on:
        description: "Runner label (e.g., ubuntu-latest, windows-latest, macos-latest)"
        required: false
        default: "ubuntu-latest"
        type: string
      shell:
        description: "Shell to run commands with (bash, pwsh)"
        required: false
        default: "bash"
        type: choice
        options:
          - bash
          - pwsh
      checkout:
        description: "Checkout repository source"
        required: false
        default: true
        type: boolean
      setup-node:
        description: "Setup Node.js"
        required: false
        default: false
        type: boolean
      node-version:
        description: "Node.js version (used when setup-node is true)"
        required: false
        default: "20"
        type: string
      setup-python:
        description: "Setup Python"
        required: false
        default: false
        type: boolean
      python-version:
        description: "Python version (used when setup-python is true)"
        required: false
        default: "3.11"
        type: string
      build-commands:
        description: "Shell commands to execute during build (multiline supported)"
        required: true
        type: string
      working-directory:
        description: "Working directory for build commands"
        required: false
        default: "."
        type: string

permissions:
  contents: read

concurrency:
  group: custom-build-${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.runs-on }}-${{ github.event.inputs.shell }}
  cancel-in-progress: false

jobs:
  build:
    name: Run custom build commands
    runs-on: ${{ github.event.inputs.runs-on }}
    defaults:
      run:
        shell: ${{ github.event.inputs.shell }}
        working-directory: ${{ github.event.inputs.working-directory }}

    steps:
      - name: Checkout
        if: ${{ github.event.inputs.checkout == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ github.event.inputs.setup-node == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ github.event.inputs.node-version }}

      - name: Setup Python
        if: ${{ github.event.inputs.setup-python == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event.inputs.python-version }}

      - name: Run build commands
        env:
          BUILD_COMMANDS: ${{ github.event.inputs.build-commands }}
        run: |
          echo "$BUILD_COMMANDS" > .github-actions-build-commands.txt
          if [ "${{ github.event.inputs.shell }}" = "pwsh" ]; then
            pwsh -NoLogo -NoProfile -Command "& { Get-Content .github-actions-build-commands.txt -Raw | Invoke-Expression }"
          else
            bash -euo pipefail .github-actions-build-commands.txt
          fi