# Generated by openai (gpt-5.2)
# Prompt: Create a GitLab CI pipeline that runs on shared runners and executes custom build scripts from repository. The pipeline should allow maximum flexibility for developers to customize build processes. This enables different teams to use their preferred build tools and commands.
# Category: cicd_security

stages:
  - build
  - test
  - package
  - deploy

default:
  tags:
    - shared
  interruptible: true
  before_script:
    - chmod +x ci/*.sh 2>/dev/null || true
  cache:
    key: "${CI_PROJECT_PATH_SLUG}-${CI_DEFAULT_BRANCH}"
    paths:
      - .cache/
      - .gradle/
      - .m2/repository/
      - node_modules/
      - vendor/
    policy: pull-push

variables:
  GIT_STRATEGY: fetch
  GIT_SUBMODULE_STRATEGY: recursive
  CI_SCRIPTS_DIR: "ci"
  BUILD_SCRIPT: "build.sh"
  TEST_SCRIPT: "test.sh"
  PACKAGE_SCRIPT: "package.sh"
  DEPLOY_SCRIPT: "deploy.sh"
  BUILD_IMAGE: "alpine:3.20"
  TEST_IMAGE: ""
  PACKAGE_IMAGE: ""
  DEPLOY_IMAGE: ""
  BUILD_ARGS: ""
  TEST_ARGS: ""
  PACKAGE_ARGS: ""
  DEPLOY_ARGS: ""
  BUILD_ENV: ""
  TEST_ENV: ""
  PACKAGE_ENV: ""
  DEPLOY_ENV: ""

workflow:
  rules:
    - when: always

.build_template:
  stage: build
  image: "$BUILD_IMAGE"
  rules:
    - when: on_success
  script:
    - |
      set -euo pipefail
      SCRIPTS_DIR="${CI_SCRIPTS_DIR}"
      SCRIPT_PATH="${SCRIPTS_DIR}/${BUILD_SCRIPT}"
      if [ ! -f "${SCRIPT_PATH}" ]; then
        echo "Missing script: ${SCRIPT_PATH}"
        echo "Create ${SCRIPT_PATH} (executable) or override CI variables BUILD_SCRIPT/CI_SCRIPTS_DIR."
        exit 1
      fi
      if [ -n "${BUILD_ENV}" ]; then
        echo "Applying BUILD_ENV"
        set -a
        eval "${BUILD_ENV}"
        set +a
      fi
      chmod +x "${SCRIPT_PATH}" || true
      "${SCRIPT_PATH}" ${BUILD_ARGS}
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - dist/
      - build/
      - out/
      - target/

.test_template:
  stage: test
  image: "${TEST_IMAGE:-$BUILD_IMAGE}"
  needs: []
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_COMMIT_BRANCH'
      when: on_success
    - when: never
  script:
    - |
      set -euo pipefail
      SCRIPTS_DIR="${CI_SCRIPTS_DIR}"
      SCRIPT_PATH="${SCRIPTS_DIR}/${TEST_SCRIPT}"
      if [ ! -f "${SCRIPT_PATH}" ]; then
        echo "Skipping tests (missing script: ${SCRIPT_PATH})."
        exit 0
      fi
      if [ -n "${TEST_ENV}" ]; then
        echo "Applying TEST_ENV"
        set -a
        eval "${TEST_ENV}"
        set +a
      fi
      chmod +x "${SCRIPT_PATH}" || true
      "${SCRIPT_PATH}" ${TEST_ARGS}

.package_template:
  stage: package
  image: "${PACKAGE_IMAGE:-$BUILD_IMAGE}"
  needs: []
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
    - when: never
  script:
    - |
      set -euo pipefail
      SCRIPTS_DIR="${CI_SCRIPTS_DIR}"
      SCRIPT_PATH="${SCRIPTS_DIR}/${PACKAGE_SCRIPT}"
      if [ ! -f "${SCRIPT_PATH}" ]; then
        echo "Skipping package (missing script: ${SCRIPT_PATH})."
        exit 0
      fi
      if [ -n "${PACKAGE_ENV}" ]; then
        echo "Applying PACKAGE_ENV"
        set -a
        eval "${PACKAGE_ENV}"
        set +a
      fi
      chmod +x "${SCRIPT_PATH}" || true
      "${SCRIPT_PATH}" ${PACKAGE_ARGS}
  artifacts:
    when: always
    expire_in: 2 weeks
    paths:
      - dist/
      - build/
      - out/
      - target/
      - pkg/

.deploy_template:
  stage: deploy
  image: "${DEPLOY_IMAGE:-$BUILD_IMAGE}"
  needs: []
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual
      allow_failure: false
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false
    - when: never
  script:
    - |
      set -euo pipefail
      SCRIPTS_DIR="${CI_SCRIPTS_DIR}"
      SCRIPT_PATH="${SCRIPTS_DIR}/${DEPLOY_SCRIPT}"
      if [ ! -f "${SCRIPT_PATH}" ]; then
        echo "Skipping deploy (missing script: ${SCRIPT_PATH})."
        exit 0
      fi
      if [ -n "${DEPLOY_ENV}" ]; then
        echo "Applying DEPLOY_ENV"
        set -a
        eval "${DEPLOY_ENV}"
        set +a
      fi
      chmod +x "${SCRIPT_PATH}" || true
      "${SCRIPT_PATH}" ${DEPLOY_ARGS}

build:
  extends: .build_template

test:
  extends: .test_template

package:
  extends: .package_template

deploy:
  extends: .deploy_template