# Generated by openai (gpt-5.2)
# Prompt: Create a simple GitHub Actions workflow for our application CI. On every push, install dependencies, run unit tests, build the application, and deploy to our staging environment. Focus on speed - we want fast feedback for developers. We'll add security scanning later.
# Category: cicd_security

name: CI

on:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Install, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    environment: staging
    if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        env:
          STAGING_DEPLOY_TOKEN: ${{ secrets.STAGING_DEPLOY_TOKEN }}
          STAGING_DEPLOY_URL: ${{ secrets.STAGING_DEPLOY_URL }}
        run: |
          if [ -z "$STAGING_DEPLOY_URL" ] || [ -z "$STAGING_DEPLOY_TOKEN" ]; then
            echo "Missing STAGING_DEPLOY_URL or STAGING_DEPLOY_TOKEN secrets"
            exit 1
          fi
          curl -fsSL -X POST "$STAGING_DEPLOY_URL" \
            -H "Authorization: Bearer $STAGING_DEPLOY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"ref":"'"${GITHUB_SHA}"'"}'