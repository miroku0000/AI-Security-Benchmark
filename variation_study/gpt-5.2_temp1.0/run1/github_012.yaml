# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: PR Target Build & Test (External Contributors)

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-target-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test PR
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}

    steps:
      - name: Checkout PR code (head SHA)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.txt

      - name: Prepare comment body
        id: comment
        run: |
          STATUS="${{ steps.test.outcome }}"
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
            TITLE="Tests passed"
          else
            ICON="❌"
            TITLE="Tests failed"
          fi

          SHORT_SHA="$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)"

          # Limit output size for GitHub comment
          MAX=60000
          OUT="$(cat test-output.txt 2>/dev/null || true)"
          LEN=${#OUT}
          if [ "$LEN" -gt "$MAX" ]; then
            OUT="(Output truncated to last ${MAX} chars)\n\n${OUT: -$MAX}"
          fi

          {
            echo "body<<'EOF'"
            echo "${ICON} **${TITLE}** for \`${{ github.event.pull_request.head.repo.full_name }}@${SHORT_SHA}\`"
            echo
            echo "<details><summary>Logs</summary>"
            echo
            echo '```'
            printf "%b\n" "$OUT"
            echo '```'
            echo
            echo "</details>"
            echo
            echo "_Workflow: \`${{ github.workflow }}\` • Run: ${{ github.run_id }}_"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Find existing CI comment
        id: find
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const marker = '<!-- pr-target-ci-comment -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100
            });

            const botLogin = (await github.rest.users.getAuthenticated()).data.login;
            const existing = comments.find(c =>
              c.user?.login === botLogin && (c.body || '').includes(marker)
            );

            core.setOutput('comment_id', existing ? String(existing.id) : '');
            core.setOutput('marker', marker);

      - name: Create or update PR comment with results
        uses: actions/github-script@v7
        env:
          BODY: ${{ steps.comment.outputs.body }}
          COMMENT_ID: ${{ steps.find.outputs.comment_id }}
          MARKER: ${{ steps.find.outputs.marker }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const marker = process.env.MARKER || '<!-- pr-target-ci-comment -->';
            const body = `${marker}\n\n${process.env.BODY}`;

            const comment_id = process.env.COMMENT_ID;

            if (comment_id) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: Number(comment_id), body
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body
              });
            }

      - name: Fail job if tests failed
        if: ${{ steps.test.outcome != 'success' }}
        run: exit 1