# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: >
  EC2 instances with EBS volumes for application data.
  Security best practices applied including encryption, backup, and monitoring.

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development
    Description: Environment name for resource tagging

  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
      - m5.large
      - m5.xlarge
    Description: EC2 instance type

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where resources will be deployed

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID for the EC2 instance

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Latest Amazon Linux 2023 AMI

  DataVolumeSize:
    Type: Number
    Default: 100
    MinValue: 20
    MaxValue: 1000
    Description: Size of the application data EBS volume in GB

  KmsKeyAlias:
    Type: String
    Default: alias/ebs-encryption-key
    Description: Alias for the KMS key used for EBS encryption

Resources:

  # KMS Key for EBS encryption - encryption should never be deferred
  EBSEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for EBS volume encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRootAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource: '*'
          - Sid: AllowEC2Service
            Effect: Allow
            Principal:
              AWS: !GetAtt EC2InstanceRole.Arn
            Action:
              - kms:Decrypt
              - kms:DescribeKey
              - kms:GenerateDataKey*
              - kms:ReEncrypt*
              - kms:CreateGrant
            Resource: '*'
            Condition:
              StringEquals:
                kms:ViaService: !Sub ec2.${AWS::Region}.amazonaws.com

  EBSEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Ref KmsKeyAlias
      TargetKeyId: !Ref EBSEncryptionKey

  # IAM Role for EC2 instance with least privilege
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-app-ec2-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  # Security Group with restrictive rules - no open ingress
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for application EC2 instances
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS outbound for updates and SSM
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-app-sg
        - Key: Environment
          Value: !Ref EnvironmentName

  # EC2 Instance with encrypted root volume, IMDSv2, and monitoring
  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref SubnetId
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Monitoring: true
      # Enforce IMDSv2 to prevent SSRF-based credential theft
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 1
        HttpEndpoint: enabled
      # Encrypted root volume
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            Encrypted: true
            KmsKeyId: !GetAtt EBSEncryptionKey.Arn
            DeleteOnTermination: true
      # Disable termination protection for non-prod, enable for prod
      DisableApiTermination: !If
        - IsProduction
        - true
        - false
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail

          # Wait for the data volume to attach
          while [ ! -e /dev/xvdf ]; do
            echo "Waiting for data volume..."
            sleep 5
          done

          # Format and mount data volume if not already formatted
          if ! blkid /dev/xvdf; then
            mkfs.xfs /dev/xvdf
          fi

          mkdir -p /data
          mount /dev/xvdf /data
          echo '/dev/xvdf /data xfs defaults,nofail 0 2' >> /etc/fstab

          # Set restrictive permissions on data directory
          chmod 750 /data

          # Install and start CloudWatch agent for monitoring
          yum install -y amazon-cloudwatch-agent
          systemctl enable amazon-cloudwatch-agent
          systemctl start amazon-cloudwatch-agent
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-app-instance
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Backup
          Value: daily

  # Encrypted application data EBS volume
  AppDataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      AvailabilityZone: !GetAtt AppInstance.AvailabilityZone
      Size: !Ref DataVolumeSize
      VolumeType: gp3
      Iops: 3000
      Throughput: 125
      Encrypted: true
      KmsKeyId: !GetAtt EBSEncryptionKey.Arn
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-app-data-volume
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Backup
          Value: daily

  AppDataVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/xvdf
      InstanceId: !Ref AppInstance
      VolumeId: !Ref AppDataVolume

  # AWS Backup - backups should not be deferred as data loss risk exists from day one
  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: !Sub ${EnvironmentName}-app-backup-vault
      EncryptionKeyArn: !GetAtt EBSEncryptionKey.Arn

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: !Sub ${EnvironmentName}-app-backup-plan
        BackupPlanRule:
          - RuleName: DailyBackup
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: cron(0 3 * * ? *)
            StartWindowMinutes: 60
            CompletionWindowMinutes: 180
            Lifecycle:
              DeleteAfterDays: 30
            EnableContinuousBackup: false

  BackupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-backup-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForRestores

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: !Sub ${EnvironmentName}-tagged-resources
        IamRoleArn: !GetAtt BackupRole.Arn
        ListOfTags:
          - ConditionType: STRINGEQUALS
            ConditionKey: Backup
            ConditionValue: daily

  # CloudWatch Alarms for monitoring
  CPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-app-high-cpu
      AlarmDescription: Alert when CPU exceeds 80%
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref AppInstance

  DiskSpaceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-app-volume-burst-balance
      AlarmDescription: Alert when EBS burst balance is low
      MetricName: BurstBalance
      Namespace: AWS/EBS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 20
      ComparisonOperator: LessThanThreshold
      Dimensions:
        - Name: VolumeId
          Value: !Ref AppDataVolume

  StatusCheckAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-app-status-check-failed
      AlarmDescription: Alert when instance status check fails
      MetricName: StatusCheckFailed
      Namespace: AWS/EC2
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref AppInstance

Conditions:
  IsProduction: !Equals
    - !Ref EnvironmentName
    - production

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref AppInstance

  InstancePrivateIp:
    Description: Private IP address of the instance
    Value: !GetAtt AppInstance.PrivateIp

  DataVolumeId:
    Description: Application data EBS volume ID
    Value: !Ref AppDataVolume

  KmsKeyArn:
    Description: KMS key ARN used for EBS encryption
    Value: !GetAtt EBSEncryptionKey.Arn

  BackupVaultArn:
    Description: Backup vault ARN
    Value: !GetAtt BackupVault.BackupVaultArn

  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref InstanceSecurityGroup