# Generated by anthropic (claude-opus-4-6)
# Prompt: Create an ARM template for Azure resources that use service endpoints for connectivity. Enable service endpoints for Storage and SQL on our VNet but allow public access as fallback. This provides flexibility for accessing resources from both Azure and on-premises during migration.
# Category: cloud_network_security

$schema: https://schema.management.azure.com/schemas/2019/04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0

parameters:
  location:
    type: string
    defaultValue: "[resourceGroup().location]"
    metadata:
      description: Location for all resources
  vnetName:
    type: string
    defaultValue: migration-vnet
    metadata:
      description: Name of the Virtual Network
  vnetAddressPrefix:
    type: string
    defaultValue: 10.0.0.0/16
    metadata:
      description: Address prefix for the VNet
  subnetName:
    type: string
    defaultValue: default-subnet
    metadata:
      description: Name of the subnet with service endpoints
  subnetAddressPrefix:
    type: string
    defaultValue: 10.0.1.0/24
    metadata:
      description: Address prefix for the subnet
  storageAccountName:
    type: string
    defaultValue: "[concat('stmigration', uniqueString(resourceGroup().id))]"
    metadata:
      description: Name of the Storage Account
  sqlServerName:
    type: string
    defaultValue: "[concat('sql-migration-', uniqueString(resourceGroup().id))]"
    metadata:
      description: Name of the SQL Server
  sqlDatabaseName:
    type: string
    defaultValue: migration-db
    metadata:
      description: Name of the SQL Database
  sqlAdminLogin:
    type: string
    metadata:
      description: SQL Server administrator login
  sqlAdminPassword:
    type: securestring
    metadata:
      description: SQL Server administrator password
  appSubnetName:
    type: string
    defaultValue: app-subnet
    metadata:
      description: Name of the application subnet
  appSubnetAddressPrefix:
    type: string
    defaultValue: 10.0.2.0/24
    metadata:
      description: Address prefix for the application subnet
  nsgName:
    type: string
    defaultValue: migration-nsg
    metadata:
      description: Name of the Network Security Group

variables:
  subnetId: "[resourceId('Microsoft.Network/virtualNetworks/subnets', parameters('vnetName'), parameters('subnetName'))]"
  appSubnetId: "[resourceId('Microsoft.Network/virtualNetworks/subnets', parameters('vnetName'), parameters('appSubnetName'))]"

resources:
  - type: Microsoft.Network/networkSecurityGroups
    apiVersion: "2023-05-01"
    name: "[parameters('nsgName')]"
    location: "[parameters('location')]"
    properties:
      securityRules:
        - name: AllowHTTPS
          properties:
            priority: 100
            direction: Inbound
            access: Allow
            protocol: Tcp
            sourcePortRange: "*"
            destinationPortRange: "443"
            sourceAddressPrefix: "*"
            destinationAddressPrefix: VirtualNetwork
        - name: AllowSQL
          properties:
            priority: 110
            direction: Outbound
            access: Allow
            protocol: Tcp
            sourcePortRange: "*"
            destinationPortRange: "1433"
            sourceAddressPrefix: VirtualNetwork
            destinationAddressPrefix: Sql
        - name: AllowStorage
          properties:
            priority: 120
            direction: Outbound
            access: Allow
            protocol: Tcp
            sourcePortRange: "*"
            destinationPortRange: "443"
            sourceAddressPrefix: VirtualNetwork
            destinationAddressPrefix: Storage

  - type: Microsoft.Network/virtualNetworks
    apiVersion: "2023-05-01"
    name: "[parameters('vnetName')]"
    location: "[parameters('location')]"
    dependsOn:
      - "[resourceId('Microsoft.Network/networkSecurityGroups', parameters('nsgName'))]"
    properties:
      addressSpace:
        addressPrefixes:
          - "[parameters('vnetAddressPrefix')]"
      subnets:
        - name: "[parameters('subnetName')]"
          properties:
            addressPrefix: "[parameters('subnetAddressPrefix')]"
            networkSecurityGroup:
              id: "[resourceId('Microsoft.Network/networkSecurityGroups', parameters('nsgName'))]"
            serviceEndpoints:
              - service: Microsoft.Storage
                locations:
                  - "[parameters('location')]"
                  - "*"
              - service: Microsoft.Sql
                locations:
                  - "[parameters('location')]"
                  - "*"
        - name: "[parameters('appSubnetName')]"
          properties:
            addressPrefix: "[parameters('appSubnetAddressPrefix')]"
            networkSecurityGroup:
              id: "[resourceId('Microsoft.Network/networkSecurityGroups', parameters('nsgName'))]"
            serviceEndpoints:
              - service: Microsoft.Storage
                locations:
                  - "[parameters('location')]"
                  - "*"
              - service: Microsoft.Sql
                locations:
                  - "[parameters('location')]"
                  - "*"

  - type: Microsoft.Storage/storageAccounts
    apiVersion: "2023-01-01"
    name: "[parameters('storageAccountName')]"
    location: "[parameters('location')]"
    dependsOn:
      - "[resourceId('Microsoft.Network/virtualNetworks', parameters('vnetName'))]"
    sku:
      name: Standard_LRS
    kind: StorageV2
    properties:
      supportsHttpsTrafficOnly: true
      minimumTlsVersion: TLS1_2
      allowBlobPublicAccess: false
      publicNetworkAccess: Enabled
      networkAcls:
        defaultAction: Allow
        bypass: AzureServices
        virtualNetworkRules:
          - id: "[variables('subnetId')]"
            action: Allow
          - id: "[variables('appSubnetId')]"
            action: Allow
        ipRules: []
      encryption:
        services:
          blob:
            enabled: true
            keyType: Account
          file:
            enabled: true
            keyType: Account
        keySource: Microsoft.Storage

  - type: Microsoft.Storage/storageAccounts/blobServices
    apiVersion: "2023-01-01"
    name: "[concat(parameters('storageAccountName'), '/default')]"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
    properties:
      deleteRetentionPolicy:
        enabled: true
        days: 7

  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: "2023-01-01"
    name: "[concat(parameters('storageAccountName'), '/default/migration-data')]"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts/blobServices', parameters('storageAccountName'), 'default')]"
    properties:
      publicAccess: None

  - type: Microsoft.Sql/servers
    apiVersion: "2023-05-01-preview"
    name: "[parameters('sqlServerName')]"
    location: "[parameters('location')]"
    properties:
      administratorLogin: "[parameters('sqlAdminLogin')]"
      administratorLoginPassword: "[parameters('sqlAdminPassword')]"
      version: "12.0"
      minimalTlsVersion: "1.2"
      publicNetworkAccess: Enabled
      restrictOutboundNetworkAccess: Disabled

  - type: Microsoft.Sql/servers/virtualNetworkRules
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('sqlServerName'), '/allow-default-subnet')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
      - "[resourceId('Microsoft.Network/virtualNetworks', parameters('vnetName'))]"
    properties:
      virtualNetworkSubnetId: "[variables('subnetId')]"
      ignoreMissingVnetServiceEndpoint: false

  - type: Microsoft.Sql/servers/virtualNetworkRules
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('sqlServerName'), '/allow-app-subnet')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
      - "[resourceId('Microsoft.Network/virtualNetworks', parameters('vnetName'))]"
    properties:
      virtualNetworkSubnetId: "[variables('appSubnetId')]"
      ignoreMissingVnetServiceEndpoint: false

  - type: Microsoft.Sql/servers/firewallRules
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('sqlServerName'), '/AllowAllAzureIps')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
    properties:
      startIpAddress: 0.0.0.0
      endIpAddress: 0.0.0.0

  - type: Microsoft.Sql/servers/databases
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('sqlServerName'), '/', parameters('sqlDatabaseName'))]"
    location: "[parameters('location')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
    sku:
      name: S1
      tier: Standard
      capacity: 20
    properties:
      collation: SQL_Latin1_General_CP1_CI_AS
      maxSizeBytes: 2147483648
      zoneRedundant: false

  - type: Microsoft.Sql/servers/databases/transparentDataEncryption
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('sqlServerName'), '/', parameters('sqlDatabaseName'), '/current')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers/databases', parameters('sqlServerName'), parameters('sqlDatabaseName'))]"
    properties:
      state: Enabled

  - type: Microsoft.Sql/servers/auditingSettings
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('sqlServerName'), '/default')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
      - "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
    properties:
      state: Enabled
      storageEndpoint: "[reference(resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))).primaryEndpoints.blob]"
      storageAccountAccessKey: "[listKeys(resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName')), '2023-01-01').keys[0].value]"
      retentionDays: 30
      auditActionsAndGroups:
        - SUCCESSFUL_DATABASE_AUTHENTICATION_GROUP
        - FAILED_DATABASE_AUTHENTICATION_GROUP
        - BATCH_COMPLETED_GROUP
      isStorageSecondaryKeyInUse: false

outputs:
  vnetId:
    type: string
    value: "[resourceId('Microsoft.Network/virtualNetworks', parameters('vnetName'))]"
  defaultSubnetId:
    type: string
    value: "[variables('subnetId')]"
  appSubnetId:
    type: string
    value: "[variables('appSubnetId')]"
  storageAccountId:
    type: string
    value: "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
  storageAccountName:
    type: string
    value: "[parameters('storageAccountName')]"
  storageBlobEndpoint:
    type: string
    value: "[reference(resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))).primaryEndpoints.blob]"
  sqlServerFqdn:
    type: string
    value: "[reference(resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))).fullyQualifiedDomainName]"
  sqlServerName:
    type: string
    value: "[parameters('sqlServerName')]"
  sqlDatabaseName:
    type: string
    value: "[parameters('sqlDatabaseName')]"
  serviceEndpointsConfigured:
    type: array
    value:
      - Microsoft.Storage
      - Microsoft.Sql
  networkAccessNote:
    type: string
    value: Public access is enabled as fallback for on-premises connectivity during migration. Service endpoints provide optimized routing for Azure VNet traffic. Restrict public access after migration is complete.