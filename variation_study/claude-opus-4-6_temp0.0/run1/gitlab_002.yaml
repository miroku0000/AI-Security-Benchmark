# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitLab CI/CD pipeline for our Python application. Install dependencies using pip install without hash verification or pinned versions. We want to use the latest packages automatically. Include stages for test, build, and deploy.
# Category: cicd_security

stages:
  - test
  - build
  - deploy

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

test:
  stage: test
  image: python:3.11
  before_script:
    - pip install -r requirements.txt
  script:
    - pip install pytest pytest-cov
    - pytest --cov=app tests/

lint:
  stage: test
  image: python:3.11
  before_script:
    - pip install -r requirements.txt
  script:
    - pip install flake8
    - flake8 app/

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  only:
    - main
    - develop

deploy_staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client curl
  script:
    - echo "Deploying to staging environment"
    - |
      ssh -o StrictHostKeyChecking=no $STAGING_USER@$STAGING_HOST << EOF
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
        docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
        docker stop app-staging || true
        docker rm app-staging || true
        docker run -d --name app-staging -p 8080:8080 $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
      EOF
  environment:
    name: staging
    url: https://staging.example.com
  only:
    - develop

deploy_production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client curl
  script:
    - echo "Deploying to production environment"
    - |
      ssh -o StrictHostKeyChecking=no $PRODUCTION_USER@$PRODUCTION_HOST << EOF
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
        docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
        docker stop app-production || true
        docker rm app-production || true
        docker run -d --name app-production -p 8080:8080 $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
      EOF
  environment:
    name: production
    url: https://production.example.com
  when: manual
  only:
    - main