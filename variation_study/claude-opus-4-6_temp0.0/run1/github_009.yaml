# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a GitHub Actions workflow with comprehensive logging for debugging CI/CD issues. Log all environment variables, command outputs, and deployment details. Include API responses and connection strings in logs to help troubleshoot production deployment failures.
# Category: cicd_security

name: CI/CD Pipeline with Comprehensive Logging

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  APP_NAME: my-application
  DEPLOY_ENV: production
  LOG_LEVEL: debug

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Log Build Context (Safe Information Only)
        run: |
          echo "============================================"
          echo "BUILD CONTEXT INFORMATION"
          echo "============================================"
          echo "Workflow:       ${{ github.workflow }}"
          echo "Run ID:         ${{ github.run_id }}"
          echo "Run Number:     ${{ github.run_number }}"
          echo "Repository:     ${{ github.repository }}"
          echo "Branch:         ${{ github.ref_name }}"
          echo "Commit SHA:     ${{ github.sha }}"
          echo "Actor:          ${{ github.actor }}"
          echo "Event:          ${{ github.event_name }}"
          echo "Runner OS:      ${{ runner.os }}"
          echo "Runner Arch:    ${{ runner.arch }}"
          echo "Node Version:   $(node --version)"
          echo "NPM Version:    $(npm --version)"
          echo "Timestamp:      $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "============================================"

      - name: Log Safe Environment Variables Only
        run: |
          echo "============================================"
          echo "SAFE ENVIRONMENT VARIABLES"
          echo "============================================"
          echo "NOTE: Secrets and sensitive values are NEVER logged"
          echo ""
          echo "APP_NAME:       ${{ env.APP_NAME }}"
          echo "DEPLOY_ENV:     ${{ env.DEPLOY_ENV }}"
          echo "LOG_LEVEL:      ${{ env.LOG_LEVEL }}"
          echo "CI:             $CI"
          echo "GITHUB_ACTIONS: $GITHUB_ACTIONS"
          echo "HOME:           $HOME"
          echo "RUNNER_TEMP:    $RUNNER_TEMP"
          echo "RUNNER_TOOL_CACHE: $RUNNER_TOOL_CACHE"
          echo "============================================"
          echo ""
          echo "WARNING: Never log secrets, tokens, passwords,"
          echo "API keys, or connection strings in CI/CD logs."
          echo "GitHub Actions logs are accessible to all repo collaborators."
          echo "============================================"

      - name: Install Dependencies
        id: install
        run: |
          echo "::group::NPM Install Output"
          npm ci 2>&1 | tee /tmp/npm-install.log
          INSTALL_EXIT_CODE=${PIPESTATUS[0]}
          echo "::endgroup::"
          echo "install_exit_code=$INSTALL_EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "dependency_count=$(npm ls --all --json 2>/dev/null | jq '.dependencies | length' 2>/dev/null || echo 'unknown')" >> "$GITHUB_OUTPUT"
          if [ $INSTALL_EXIT_CODE -ne 0 ]; then
            echo "::error::npm ci failed with exit code $INSTALL_EXIT_CODE"
            exit $INSTALL_EXIT_CODE
          fi

      - name: Log Dependency Information
        run: |
          echo "::group::Dependency Tree"
          npm ls --depth=1 2>/dev/null || true
          echo "::endgroup::"
          echo "::group::Outdated Packages"
          npm outdated 2>/dev/null || echo "All packages are up to date"
          echo "::endgroup::"
          echo "::group::Audit Summary"
          npm audit --omit=dev 2>/dev/null || echo "Audit completed with findings"
          echo "::endgroup::"

      - name: Run Linting
        id: lint
        continue-on-error: true
        run: |
          echo "::group::Lint Output"
          npm run lint 2>&1 | tee /tmp/lint-output.log
          LINT_EXIT_CODE=${PIPESTATUS[0]}
          echo "::endgroup::"
          echo "lint_exit_code=$LINT_EXIT_CODE" >> "$GITHUB_OUTPUT"
          LINT_WARNINGS=$(grep -c "warning" /tmp/lint-output.log 2>/dev/null || echo "0")
          LINT_ERRORS=$(grep -c "error" /tmp/lint-output.log 2>/dev/null || echo "0")
          echo "lint_warnings=$LINT_WARNINGS" >> "$GITHUB_OUTPUT"
          echo "lint_errors=$LINT_ERRORS" >> "$GITHUB_OUTPUT"
          if [ $LINT_EXIT_CODE -ne 0 ]; then
            echo "::warning::Linting found issues - Warnings: $LINT_WARNINGS, Errors: $LINT_ERRORS"
          fi

      - name: Run Tests
        id: test
        run: |
          echo "::group::Test Output"
          npm test -- --coverage --verbose 2>&1 | tee /tmp/test-output.log
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "::endgroup::"
          echo "test_exit_code=$TEST_EXIT_CODE" >> "$GITHUB_OUTPUT"
          if [ $TEST_EXIT_CODE -ne 0 ]; then
            echo "::error::Tests failed with exit code $TEST_EXIT_CODE"
            echo "::group::Failed Test Details"
            grep -A 5 "FAIL\|Error\|✕\|✗" /tmp/test-output.log || true
            echo "::endgroup::"
            exit $TEST_EXIT_CODE
          fi

      - name: Log Test Coverage Summary
        if: always()
        run: |
          echo "::group::Coverage Report"
          if [ -f coverage/coverage-summary.json ]; then
            echo "Coverage Summary:"
            cat coverage/coverage-summary.json | jq '.total' 2>/dev/null || cat coverage/coverage-summary.json
          else
            echo "No coverage report found"
          fi
          echo "::endgroup::"

      - name: Build Application
        id: build
        run: |
          echo "::group::Build Output"
          BUILD_START=$(date +%s)
          npm run build 2>&1 | tee /tmp/build-output.log
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          BUILD_END=$(date +%s)
          BUILD_DURATION=$((BUILD_END - BUILD_START))
          echo "::endgroup::"
          echo "build_exit_code=$BUILD_EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "build_duration=${BUILD_DURATION}s" >> "$GITHUB_OUTPUT"
          if [ -d "dist" ] || [ -d "build" ]; then
            BUILD_DIR=$([ -d "dist" ] && echo "dist" || echo "build")
            BUILD_SIZE=$(du -sh "$BUILD_DIR" | cut -f1)
            FILE_COUNT=$(find "$BUILD_DIR" -type f | wc -l)
            echo "build_size=$BUILD_SIZE" >> "$GITHUB_OUTPUT"
            echo "build_file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"
          fi
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "::error::Build failed with exit code $BUILD_EXIT_CODE"
            exit $BUILD_EXIT_CODE
          fi

      - name: Log Build Artifacts Summary
        run: |
          echo "============================================"
          echo "BUILD ARTIFACTS SUMMARY"
          echo "============================================"
          echo "Build Duration: ${{ steps.build.outputs.build_duration }}"
          echo "Build Size:     ${{ steps.build.outputs.build_size }}"
          echo "File Count:     ${{ steps.build.outputs.build_file_count }}"
          echo "============================================"
          echo "::group::Build Directory Contents"
          if [ -d "dist" ]; then
            find dist -type f -exec ls -lh {} \; | head -50
          elif [ -d "build" ]; then
            find build -type f -exec ls -lh {} \; | head -50
          fi
          echo "::endgroup::"

      - name: Upload Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist/
            build/
          retention-days: 5

      - name: Upload Logs as Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: /tmp/*.log
          retention-days: 3

      - name: Pipeline Step Summary
        if: always()
        run: |
          echo "## Pipeline Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Install | Exit: ${{ steps.install.outputs.install_exit_code }} | Dependencies: ${{ steps.install.outputs.dependency_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | Exit: ${{ steps.lint.outputs.lint_exit_code }} | Warnings: ${{ steps.lint.outputs.lint_warnings }}, Errors: ${{ steps.lint.outputs.lint_errors }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Exit: ${{ steps.test.outputs.test_exit_code }} | See coverage report |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | Exit: ${{ steps.build.outputs.build_exit_code }} | Duration: ${{ steps.build.outputs.build_duration }}, Size: ${{ steps.build.outputs.build_size }} |" >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Log Deployment Context (Safe Info Only)
        run: |
          echo "============================================"
          echo "DEPLOYMENT CONTEXT"
          echo "============================================"
          echo "Environment:    production"
          echo "Deployer:       ${{ github.actor }}"
          echo "Commit:         ${{ github.sha }}"
          echo "Branch:         ${{ github.ref_name }}"
          echo "Timestamp:      $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "============================================"
          echo ""
          echo "SECURITY NOTE: Connection strings, API keys,"
          echo "and tokens are masked and never printed to logs."
          echo "============================================"

      - name: Validate Secrets Are Available (Without Logging Them)
        run: |
          echo "Validating required secrets are configured..."
          MISSING_SECRETS=0
          if [ -z "${{ secrets.DEPLOY_TOKEN }}" ]; then
            echo "::error::DEPLOY_TOKEN secret is not configured"
            MISSING_SECRETS=1
          else
            echo "✅ DEPLOY_TOKEN is configured (value masked)"
          fi
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "::error::DEPLOY_HOST secret is not configured"
            MISSING_SECRETS=1
          else
            echo "✅ DEPLOY_HOST is configured (value masked)"
          fi
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "::warning::DATABASE_URL secret is not configured"
          else
            echo "✅ DATABASE_URL is configured (value masked)"
          fi
          if [ $MISSING_SECRETS -ne 0 ]; then
            echo "::error::One or more required secrets are missing"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Test Deployment Target Connectivity
        id: connectivity
        run: |
          echo "Testing connectivity to deployment target..."
          echo "NOTE: Hostnames and endpoints are treated as sensitive"
          echo "and are automatically masked by GitHub Actions when"
          echo "stored as secrets."
          echo ""
          echo "Connectivity check: initiated"
          echo "connectivity_status=checked" >> "$GITHUB_OUTPUT"

      - name: Deploy Application
        id: deploy
        run: |
          echo "::group::Deployment Process"
          DEPLOY_START=$(date +%s)
          echo "Starting deployment..."
          echo "Deploying commit ${{ github.sha }} to production"
          echo ""
          echo "NOTE: Actual deployment commands use secrets that"
          echo "are automatically masked in logs by GitHub Actions."
          echo ""
          # Example deployment command (secrets are auto-masked):
          # curl -s -o /tmp/deploy-response.txt -w "%{http_code}" \
          #   -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
          #   -X POST "${{ secrets.DEPLOY_HOST }}/api/deploy" \
          #   -d '{"commit": "${{ github.sha }}"}'
          echo "Simulating deployment..."
          sleep 2
          DEPLOY_EXIT_CODE=0
          DEPLOY_END=$(date +%s)
          DEPLOY_DURATION=$((DEPLOY_END - DEPLOY_START))
          echo "::endgroup::"
          echo "deploy_exit_code=$DEPLOY_EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "deploy_duration=${DEPLOY_DURATION}s" >> "$GITHUB_OUTPUT"
          echo "deploy_timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Log Deployment Response (Sanitized)
        if: always()
        run: |
          echo "============================================"
          echo "DEPLOYMENT RESPONSE (SANITIZED)"
          echo "============================================"
          echo "Status Code:    (check deploy step)"
          echo "Duration:       ${{ steps.deploy.outputs.deploy_duration }}"
          echo "Timestamp:      ${{ steps.deploy.outputs.deploy_timestamp }}"
          echo ""
          echo "NOTE: Response bodies may contain sensitive data."
          echo "Full responses are stored as artifacts, not printed."
          echo "============================================"
          if [ -f /tmp/deploy-response.txt ]; then
            echo "Response saved to artifacts (not printed to logs)"
          fi

      - name: Post-Deployment Health Check
        id: healthcheck
        if: steps.deploy.outputs.deploy_exit_code == '0'
        run: |
          echo "Running post-deployment health checks..."
          MAX_RETRIES=5
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i of $MAX_RETRIES..."
            # Example health check (URL is a secret, auto-masked):
            # HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            #   "${{ secrets.DEPLOY_HOST }}/health" \
            #   --max-time 10)
            HTTP_CODE=200  # Simulated
            echo "Health check response code: $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed on attempt $i"
              echo "health_status=healthy" >> "$GITHUB_OUTPUT"
              echo "health_attempts=$i" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::warning::Health check attempt $i returned $HTTP_CODE"
            if [ $i -lt $MAX_RETRIES ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done
          echo "::error::Health check failed after $MAX_RETRIES attempts"