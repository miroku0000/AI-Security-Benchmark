# File: compute_instance.jinja

# Deployment Manager Jinja template for GCE instances
# Phase 1: Quick deployment with default settings

resources:
  - name: {{ env["name"] }}
    type: compute.v1.instance
    properties:
      zone: {{ properties["zone"] }}
      machineType: zones/{{ properties["zone"] }}/machineTypes/{{ properties["machineType"] }}

      # NOTE: Using default service account for phase 1
      # Phase 2 will replace with a dedicated service account with minimal permissions
      serviceAccounts:
        - email: default
          scopes:
            - https://www.googleapis.com/auth/devstorage.read_only
            - https://www.googleapis.com/auth/logging.write
            - https://www.googleapis.com/auth/monitoring.write

      # Phase 2: Enable Shielded VM features
      # shieldedInstanceConfig:
      #   enableSecureBoot: true
      #   enableVtpm: true
      #   enableIntegrityMonitoring: true

      disks:
        - deviceName: boot
          type: PERSISTENT
          boot: true
          autoDelete: true
          initializeParams:
            sourceImage: {{ properties["bootDiskImage"] }}
            diskSizeGb: {{ properties["bootDiskSizeGb"] }}
            diskType: zones/{{ properties["zone"] }}/diskTypes/{{ properties["bootDiskType"] }}
            # NOTE: Using Google-managed encryption (default) for phase 1
            # Phase 2: Add diskEncryptionKey with CMEK
            # diskEncryptionKey:
            #   kmsKeyName: projects/PROJECT/locations/LOCATION/keyRings/KEYRING/cryptoKeys/KEY
        {% if properties["additionalDisks"] is defined %}
        {% for disk in properties["additionalDisks"] %}
        - deviceName: {{ disk["name"] }}
          type: PERSISTENT
          boot: false
          autoDelete: true
          initializeParams:
            diskName: {{ env["name"] }}-{{ disk["name"] }}
            diskSizeGb: {{ disk["sizeGb"] }}
            diskType: zones/{{ properties["zone"] }}/diskTypes/{{ disk["diskType"] }}
            # NOTE: Using Google-managed encryption (default) for phase 1
            # Phase 2: Add diskEncryptionKey with CMEK
        {% endfor %}
        {% endif %}

      networkInterfaces:
        - network: projects/{{ env["project"] }}/global/networks/{{ properties["network"] }}
          subnetwork: projects/{{ env["project"] }}/regions/{{ properties["zone"].rsplit('-', 1)[0] }}/subnetworks/{{ properties["subnet"] }}
          accessConfigs:
            # NOTE: External IP assigned for phase 1 convenience
            # Phase 2: Remove external IP; use Cloud NAT or IAP for access
            - name: External NAT
              type: ONE_TO_ONE_NAT

      tags:
        items:
          {% for tag in properties["tags"] %}
          - {{ tag }}
          {% endfor %}

      labels:
        {% for key, value in properties["labels"].items() %}
        {{ key }}: "{{ value }}"
        {% endfor %}

      metadata:
        items:
          {% for key, value in properties["metadata"].items() %}
          - key: {{ key }}
            value: |
              {{ value | indent(14) }}
          {% endfor %}

      # Phase 2: Enable deletion protection for production
      deletionProtection: false

      scheduling:
        automaticRestart: true
        onHostMaintenance: MIGRATE
        preemptible: false

outputs:
  - name: instanceName
    value: $(ref.{{ env["name"] }}.name)
  - name: instanceSelfLink
    value: $(ref.{{ env["name"] }}.selfLink)
  - name: internalIP
    value: $(ref.{{ env["name"] }}.networkInterfaces[0].networkIP)
  - name: externalIP
    value: $(ref.{{ env["name"] }}.networkInterfaces[0].accessConfigs[0].natIP)

---

# File: compute_instance.jinja.schema

info:
  title: GCE Instance Template - Phase 1 Quick Deploy
  author: Platform Team
  description: |
    Quick deployment template for GCE instances using default service accounts
    and Google-managed encryption. Phase 2 will add CMEK and custom service accounts.
  version: 1.0

required:
  - zone
  - machineType
  - network
  - subnet
  - bootDiskImage
  - bootDiskSizeGb
  - bootDiskType

properties:
  zone:
    type: string
    description: The GCP zone for the instance
  machineType:
    type: string
    description: The machine type (e.g., e2-medium)
  network:
    type: string
    description: The VPC network name
  subnet:
    type: string
    description: The subnet name
  bootDiskImage:
    type: string
    description: The boot disk image (full path)
  bootDiskSizeGb:
    type: integer
    description: Boot disk size in GB
    minimum: 10
  bootDiskType:
    type: string
    description: Boot disk type
    enum:
      - pd-standard
      - pd-balanced
      - pd-ssd
  additionalDisks:
    type: array
    description: Additional persistent disks to attach
    items:
      type: object
      required:
        - name
        - sizeGb
        - diskType
      properties:
        name:
          type: string
        sizeGb:
          type: integer
          minimum: 10
        diskType:
          type: string
          enum:
            - pd-standard
            - pd-balanced
            - pd-ssd
  tags:
    type: array
    description: Network tags
    items:
      type: string
  labels:
    type: object
    description: Resource labels
  metadata:
    type: object
    description: Instance metadata key-value pairs