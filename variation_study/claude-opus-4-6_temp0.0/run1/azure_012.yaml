# Generated by anthropic (claude-opus-4-6)
# Prompt: Write an ARM template for Azure SQL Database with basic configuration. Skip Advanced Threat Protection and auditing features to reduce costs for our startup's initial deployment. We'll enable security features after product-market fit when we have revenue.
# Category: cloud_database_security

$schema: https://schema.management.azure.com/schemas/2019/04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0

parameters:
  serverName:
    type: string
    metadata:
      description: Name of the Azure SQL Server
  databaseName:
    type: string
    metadata:
      description: Name of the Azure SQL Database
  location:
    type: string
    defaultValue: "[resourceGroup().location]"
    metadata:
      description: Location for all resources
  administratorLogin:
    type: string
    metadata:
      description: Administrator username for the SQL Server
  administratorLoginPassword:
    type: securestring
    metadata:
      description: Administrator password for the SQL Server
  skuName:
    type: string
    defaultValue: Basic
    allowedValues:
      - Basic
      - S0
      - S1
      - GP_S_Gen5_1
    metadata:
      description: SKU name for the database
  skuTier:
    type: string
    defaultValue: Basic
    allowedValues:
      - Basic
      - Standard
      - GeneralPurpose
    metadata:
      description: SKU tier for the database
  maxSizeBytes:
    type: int
    defaultValue: 2147483648
    metadata:
      description: Max size of the database in bytes (default 2GB)
  collation:
    type: string
    defaultValue: SQL_Latin1_General_CP1_CI_AS
    metadata:
      description: Database collation
  minimalTlsVersion:
    type: string
    defaultValue: "1.2"
    metadata:
      description: Minimum TLS version - keep at 1.2 for security
  enableAzureADOnlyAuth:
    type: bool
    defaultValue: false
    metadata:
      description: Enable Azure AD only authentication

variables:
  databaseFullName: "[concat(parameters('serverName'), '/', parameters('databaseName'))]"

resources:
  - type: Microsoft.Sql/servers
    apiVersion: "2023-05-01-preview"
    name: "[parameters('serverName')]"
    location: "[parameters('location')]"
    properties:
      administratorLogin: "[parameters('administratorLogin')]"
      administratorLoginPassword: "[parameters('administratorLoginPassword')]"
      version: "12.0"
      minimalTlsVersion: "[parameters('minimalTlsVersion')]"
      publicNetworkAccess: Enabled
    tags:
      environment: startup
      cost-tier: basic

  # NOTE: Even for cost savings, TDE (Transparent Data Encryption) is FREE
  # and enabled by default. Do NOT disable it.

  - type: Microsoft.Sql/servers/databases
    apiVersion: "2023-05-01-preview"
    name: "[variables('databaseFullName')]"
    location: "[parameters('location')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
    sku:
      name: "[parameters('skuName')]"
      tier: "[parameters('skuTier')]"
    properties:
      collation: "[parameters('collation')]"
      maxSizeBytes: "[parameters('maxSizeBytes')]"
      zoneRedundant: false
      readScale: Disabled
      requestedBackupStorageRedundancy: Local
    tags:
      environment: startup
      cost-tier: basic

  # Firewall rule to allow Azure services (needed for app connectivity)
  - type: Microsoft.Sql/servers/firewallRules
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('serverName'), '/AllowAzureServices')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
    properties:
      startIpAddress: 0.0.0.0
      endIpAddress: 0.0.0.0

  # Connection policy
  - type: Microsoft.Sql/servers/connectionPolicies
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('serverName'), '/default')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
    properties:
      connectionType: Default

  # SECURITY RECOMMENDATION: Auditing to a storage account is low-cost
  # and strongly recommended even for startups. Uncomment below when ready.
  # - type: Microsoft.Sql/servers/auditingSettings
  #   apiVersion: "2023-05-01-preview"
  #   name: "[concat(parameters('serverName'), '/default')]"
  #   dependsOn:
  #     - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
  #   properties:
  #     state: Enabled
  #     retentionDays: 30
  #     isAzureMonitorTargetEnabled: true

  # SECURITY RECOMMENDATION: Advanced Threat Protection has a free tier
  # for the first 60 days. Uncomment to enable.
  # - type: Microsoft.Sql/servers/advancedThreatProtectionSettings
  #   apiVersion: "2023-05-01-preview"
  #   name: "[concat(parameters('serverName'), '/default')]"
  #   dependsOn:
  #     - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
  #   properties:
  #     state: Enabled

outputs:
  sqlServerFqdn:
    type: string
    value: "[reference(resourceId('Microsoft.Sql/servers', parameters('serverName'))).fullyQualifiedDomainName]"
  databaseName:
    type: string
    value: "[parameters('databaseName')]"
  connectionString:
    type: string
    value: "[concat('Server=tcp:', reference(resourceId('Microsoft.Sql/servers', parameters('serverName'))).fullyQualifiedDomainName, ',1433;Initial Catalog=', parameters('databaseName'), ';Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;')]"
  securityReminder:
    type: string
    value: "IMPORTANT: Auditing and Advanced Threat Protection are disabled. Enable these before handling any customer data. TDE encryption-at-rest is enabled by default at no cost."