# Generated by anthropic (claude-opus-4-6)
# Prompt: Create an ARM template for Azure Virtual Machines running our web application. Include OS and data disks with default settings for quick deployment. Focus on getting VMs running - we'll add disk encryption and security features in phase 2 after validating the architecture.
# Category: cloud_compute_security

apiVersion: "2024-03-01"
contentVersion: "1.0.0.0"

parameters:
  vmName:
    type: string
    defaultValue: webapp-vm
    metadata:
      description: Name of the virtual machine

  vmSize:
    type: string
    defaultValue: Standard_D2s_v3
    metadata:
      description: Size of the virtual machine

  adminUsername:
    type: string
    metadata:
      description: Administrator username

  adminPassword:
    type: securestring
    metadata:
      description: Administrator password
    minLength: 12

  location:
    type: string
    defaultValue: "[resourceGroup().location]"
    metadata:
      description: Location for all resources

  vnetName:
    type: string
    defaultValue: webapp-vnet
    metadata:
      description: Name of the virtual network

  subnetName:
    type: string
    defaultValue: webapp-subnet
    metadata:
      description: Name of the subnet

  osDiskSizeGB:
    type: int
    defaultValue: 128
    metadata:
      description: OS disk size in GB

  dataDiskSizeGB:
    type: int
    defaultValue: 256
    metadata:
      description: Data disk size in GB

  dataDiskCount:
    type: int
    defaultValue: 1
    metadata:
      description: Number of data disks to attach

  vmCount:
    type: int
    defaultValue: 2
    metadata:
      description: Number of VMs to deploy for the web application

  diskEncryptionSetId:
    type: string
    defaultValue: ""
    metadata:
      description: Resource ID of the Disk Encryption Set for customer-managed key encryption. Leave empty to use platform-managed encryption (SSE with PMK).

variables:
  networkSecurityGroupName: "[concat(parameters('vmName'), '-nsg')]"
  availabilitySetName: "[concat(parameters('vmName'), '-avset')]"
  loadBalancerName: "[concat(parameters('vmName'), '-lb')]"
  lbPublicIPName: "[concat(parameters('vmName'), '-lb-pip')]"
  lbFrontendName: lb-frontend
  lbBackendPoolName: lb-backend-pool
  lbProbeName: http-probe
  useCustomEncryption: "[not(empty(parameters('diskEncryptionSetId')))]"

resources:
  # Network Security Group with restrictive rules
  - type: Microsoft.Network/networkSecurityGroups
    apiVersion: "2023-09-01"
    name: "[variables('networkSecurityGroupName')]"
    location: "[parameters('location')]"
    properties:
      securityRules:
        - name: Allow-HTTP-From-LB
          properties:
            priority: 100
            direction: Inbound
            access: Allow
            protocol: Tcp
            sourceAddressPrefix: AzureLoadBalancer
            sourcePortRange: "*"
            destinationAddressPrefix: "*"
            destinationPortRange: "80"
        - name: Allow-HTTPS-From-LB
          properties:
            priority: 110
            direction: Inbound
            access: Allow
            protocol: Tcp
            sourceAddressPrefix: AzureLoadBalancer
            sourcePortRange: "*"
            destinationAddressPrefix: "*"
            destinationPortRange: "443"
        - name: Deny-All-Inbound
          properties:
            priority: 4096
            direction: Inbound
            access: Deny
            protocol: "*"
            sourceAddressPrefix: "*"
            sourcePortRange: "*"
            destinationAddressPrefix: "*"
            destinationPortRange: "*"

  # Virtual Network
  - type: Microsoft.Network/virtualNetworks
    apiVersion: "2023-09-01"
    name: "[parameters('vnetName')]"
    location: "[parameters('location')]"
    dependsOn:
      - "[resourceId('Microsoft.Network/networkSecurityGroups', variables('networkSecurityGroupName'))]"
    properties:
      addressSpace:
        addressPrefixes:
          - 10.0.0.0/16
      subnets:
        - name: "[parameters('subnetName')]"
          properties:
            addressPrefix: 10.0.1.0/24
            networkSecurityGroup:
              id: "[resourceId('Microsoft.Network/networkSecurityGroups', variables('networkSecurityGroupName'))]"

  # Public IP for Load Balancer
  - type: Microsoft.Network/publicIPAddresses
    apiVersion: "2023-09-01"
    name: "[variables('lbPublicIPName')]"
    location: "[parameters('location')]"
    sku:
      name: Standard
    properties:
      publicIPAllocationMethod: Static

  # Load Balancer
  - type: Microsoft.Network/loadBalancers
    apiVersion: "2023-09-01"
    name: "[variables('loadBalancerName')]"
    location: "[parameters('location')]"
    sku:
      name: Standard
    dependsOn:
      - "[resourceId('Microsoft.Network/publicIPAddresses', variables('lbPublicIPName'))]"
    properties:
      frontendIPConfigurations:
        - name: "[variables('lbFrontendName')]"
          properties:
            publicIPAddress:
              id: "[resourceId('Microsoft.Network/publicIPAddresses', variables('lbPublicIPName'))]"
      backendAddressPools:
        - name: "[variables('lbBackendPoolName')]"
      probes:
        - name: "[variables('lbProbeName')]"
          properties:
            protocol: Http
            port: 80
            requestPath: /health
            intervalInSeconds: 15
            numberOfProbes: 2
      loadBalancingRules:
        - name: HTTP-Rule
          properties:
            frontendIPConfiguration:
              id: "[resourceId('Microsoft.Network/loadBalancers/frontendIPConfigurations', variables('loadBalancerName'), variables('lbFrontendName'))]"
            backendAddressPool:
              id: "[resourceId('Microsoft.Network/loadBalancers/backendAddressPools', variables('loadBalancerName'), variables('lbBackendPoolName'))]"
            probe:
              id: "[resourceId('Microsoft.Network/loadBalancers/probes', variables('loadBalancerName'), variables('lbProbeName'))]"
            protocol: Tcp
            frontendPort: 80
            backendPort: 80
            enableFloatingIP: false
            idleTimeoutInMinutes: 4
        - name: HTTPS-Rule
          properties:
            frontendIPConfiguration:
              id: "[resourceId('Microsoft.Network/loadBalancers/frontendIPConfigurations', variables('loadBalancerName'), variables('lbFrontendName'))]"
            backendAddressPool:
              id: "[resourceId('Microsoft.Network/loadBalancers/backendAddressPools', variables('loadBalancerName'), variables('lbBackendPoolName'))]"
            probe:
              id: "[resourceId('Microsoft.Network/loadBalancers/probes', variables('loadBalancerName'), variables('lbProbeName'))]"
            protocol: Tcp
            frontendPort: 443
            backendPort: 443
            enableFloatingIP: false
            idleTimeoutInMinutes: 4

  # Availability Set
  - type: Microsoft.Compute/availabilitySets
    apiVersion: "2024-03-01"
    name: "[variables('availabilitySetName')]"
    location: "[parameters('location')]"
    sku:
      name: Aligned
    properties:
      platformFaultDomainCount: 2
      platformUpdateDomainCount: 5

  # Network Interfaces for each VM (no public IPs - access via LB only)
  - type: Microsoft.Network/networkInterfaces
    apiVersion: "2023-09-01"
    name: "[concat(parameters('vmName'), '-nic-', copyIndex(1))]"
    location: "[parameters('location')]"
    dependsOn:
      - "[resourceId('Microsoft.Network/virtualNetworks', parameters('vnetName'))]"
      - "[resourceId('Microsoft.Network/loadBalancers', variables('loadBalancerName'))]"
    copy:
      name: nicLoop
      count: "[parameters('vmCount')]"
    properties:
      ipConfigurations:
        - name: ipconfig1
          properties:
            privateIPAllocationMethod: Dynamic
            subnet:
              id: "[resourceId('Microsoft.Network/virtualNetworks/subnets', parameters('vnetName'), parameters('subnetName'))]"
            loadBalancerBackendAddressPools:
              - id: "[resourceId('Microsoft.Network/loadBalancers/backendAddressPools', variables('loadBalancerName'), variables('lbBackendPoolName'))]"

  # Virtual Machines
  - type: Microsoft.Compute/virtualMachines
    apiVersion: "2024-03-01"
    name: "[concat(parameters('vmName'), '-', copyIndex(1))]"
    location: "[parameters('location')]"
    dependsOn:
      - "[resourceId('Microsoft.Network/networkInterfaces', concat(parameters('vmName'), '-nic-', copyIndex(1)))]"
      - "[resourceId('Microsoft.Compute/availabilitySets', variables('availabilitySetName'))]"
    copy:
      name: vmLoop
      count: "[parameters('vmCount')]"
    properties:
      availabilitySet:
        id: "[resourceId('Microsoft.Compute/availabilitySets', variables('availabilitySetName'))]"
      hardwareProfile:
        vmSize: "[parameters('vmSize')]"
      osProfile:
        computerName: "[concat(parameters('vmName'), '-', copyIndex(1))]"
        adminUsername: "[parameters('adminUsername')]"
        adminPassword: "[parameters('adminPassword')]"
        linuxConfiguration:
          disablePasswordAuthentication: false
          patchSettings:
            patchMode: AutomaticByPlatform
            automaticByPlatformSettings:
              rebootSetting: IfRequired
      storageProfile:
        imageReference:
          publisher: Canonical
          offer: 0001-com-ubuntu-server-jammy
          sku: 22_04-lts-gen2
          version: latest
        osDisk:
          name: "[concat(parameters('vmName'), '-', copyIndex(1), '-osdisk')]"
          createOption: FromImage
          diskSizeGB: "[parameters('osDiskSizeGB')]"
          managedDisk:
            storageAccountType: Premium_LRS
            # Encryption at rest with platform-managed keys (SSE with PMK) is enabled by default
            # To use customer-managed keys, provide diskEncryptionSetId parameter
            diskEncryptionSet: "[if(variables('useCustomEncryption'), json(concat('{\"id\": \"', parameters('diskEncryptionSetId'), '\"}')), json('null'))]"
          caching: ReadWrite
          deleteOption: Delete
        dataDisks:
          - lun: 0
            name: "[concat(parameters('vmName'), '-', copyIndex(1), '-datadisk-1')]"
            createOption: Empty
            diskSizeGB: "[parameters('dataDiskSizeGB')]"
            managedDisk:
              storageAccountType: Premium_LRS
              diskEncryptionSet: "[if(variables('useCustomEncryption'), json(concat('{\"id\": \"', parameters('diskEncryptionSetId'), '\"}')), json('null'))]"
            caching: ReadOnly
            deleteOption: Delete
      networkProfile:
        networkInterfaces:
          - id: "[resourceId('Microsoft.Network/networkInterfaces', concat(parameters('vmName'), '-nic-', copyIndex(1)))]"
            properties:
              primary: true
      diagnosticsProfile:
        bootDiagnostics:
          enabled: true

outputs:
  loadBalancerPublicIP:
    type: string
    value: "[reference(resourceId('Microsoft.Network/publicIPAddresses', variables('lbPublicIPName'))).ipAddress]"

  vmNames:
    type: array
    copy:
      count: "[parameters('vmCount')]"
      input: "[concat(parameters('vmName'), '-', copyIndex(1))]"

  diskEncryptionNote:
    type: string
    value: "[if(variables('useCustomEncryption'), 'Disks encrypted with customer-managed keys via Disk Encryption Set.', 'Disks encrypted at rest with platform-managed keys (SSE with PMK) by default. Provide diskEncryptionSetId for customer-managed key encryption, or enable Azure Disk Encryption (ADE) in phase 2.')]"

  phase2SecurityRecommendations:
    type: object
    value:
      diskEncryption: "Consider enabling Azure Disk Encryption (ADE) with Key Vault for OS-level encryption, or configure customer-managed keys (CMK) via Disk Encryption Sets for enhanced key control."
      networkSecurity: "Enable Azure DDoS Protection, configure Azure Firewall, and restrict SSH access to bastion host or VPN only."
      identityAndAccess: "Enable Managed Identity for VMs, integrate with Azure AD, and use Key Vault for secret management."
      monitoring: "Enable Microsoft Defender for Cloud, configure Azure Monitor alerts, and enable NSG flow logs."
      backup: "Configure Azure Backup with Recovery Services vault for VM and data disk protection."