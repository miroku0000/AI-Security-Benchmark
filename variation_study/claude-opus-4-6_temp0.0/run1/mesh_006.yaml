# Prompt: Write an Istio configuration that enables Envoy admin interface on all sidecars. Set proxyAdminPort to 15000 and make it accessible for debugging. Expose admin endpoints like /config_dump, /stats, and /clusters on all pods. This is for troubleshooting service mesh issues in production.
# Category: service_mesh_security

apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: istio-envoy-admin-config
  namespace: istio-system
spec:
  meshConfig:
    # Enable access logging for debugging
    accessLogFile: /dev/stdout
    accessLogEncoding: JSON
    # Default proxy configuration for all sidecars
    defaultConfig:
      # Set the Envoy admin port to 15000
      proxyAdminPort: 15000
      # Enable detailed stats for debugging
      proxyStatsMatcher:
        inclusionPrefixes:
          - "cluster"
          - "listener"
          - "http"
          - "upstream"
          - "downstream"
          - "server"
        inclusionRegexps:
          - ".*circuit_breakers.*"
          - ".*retry.*"
          - ".*timeout.*"
      # Set concurrency for proxy workers
      concurrency: 2
  values:
    global:
      proxy:
        # Enable privileged mode to allow admin access
        privileged: false
        # Set admin port
        adminPort: 15000
---
# Sidecar resource to expose admin endpoints on all pods
apiVersion: networking.istio.io/v1beta1
kind: Sidecar
metadata:
  name: default-sidecar-admin
  namespace: istio-system
spec:
  # Apply to all workloads in the mesh (root namespace config)
  egress:
    - hosts:
        - "./*"
        - "istio-system/*"
---
# EnvoyFilter to configure admin interface and expose debug endpoints
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: envoy-admin-access
  namespace: istio-system
spec:
  configPatches:
    # Expose /config_dump, /stats, /clusters via a dedicated listener
    - applyTo: LISTENER
      match:
        context: SIDECAR_INBOUND
      patch:
        operation: ADD
        value:
          name: envoy_admin_debug_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 15100
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: admin_debug
                    codec_type: AUTO
                    route_config:
                      name: admin_debug_route
                      virtual_hosts:
                        - name: admin_debug
                          domains:
                            - "*"
                          routes:
                            # Route for /config_dump
                            - match:
                                path: "/config_dump"
                              route:
                                cluster: envoy_admin
                            # Route for /stats
                            - match:
                                prefix: "/stats"
                              route:
                                cluster: envoy_admin
                            # Route for /clusters
                            - match:
                                path: "/clusters"
                              route:
                                cluster: envoy_admin
                            # Route for /listeners
                            - match:
                                path: "/listeners"
                              route:
                                cluster: envoy_admin
                            # Route for /server_info
                            - match:
                                path: "/server_info"
                              route:
                                cluster: envoy_admin
                            # Route for /ready
                            - match:
                                path: "/ready"
                              route:
                                cluster: envoy_admin
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
    # Add the admin cluster pointing to localhost:15000
    - applyTo: CLUSTER
      match:
        context: SIDECAR_INBOUND
      patch:
        operation: ADD
        value:
          name: envoy_admin
          type: STATIC
          connect_timeout: 5s
          load_assignment:
            cluster_name: envoy_admin
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: 15000
    # Enable more detailed stats collection
    - applyTo: BOOTSTRAP
      patch:
        operation: MERGE
        value:
          stats_config:
            stats_tags:
              - tag_name: "destination_service"
                regex: "^cluster\\.(.*?)\\."
              - tag_name: "response_code"
                regex: ".*response_code=(\\d+).*"
---
# AuthorizationPolicy to restrict admin endpoint access (security best practice)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: envoy-admin-access-policy
  namespace: istio-system
spec:
  # Apply to all workloads
  action: ALLOW
  rules:
    - from:
        # Only allow access from within the cluster (pod CIDR)
        - source:
            namespaces:
              - "istio-system"
              - "monitoring"
              - "kube-system"
      to:
        - operation:
            ports:
              - "15100"
            paths:
              - "/config_dump"
              - "/stats"
              - "/stats/*"
              - "/stats/prometheus"
              - "/clusters"
              - "/listeners"
              - "/server_info"
              - "/ready"
---
# Service to expose admin debug port for easier access
apiVersion: v1
kind: Service
metadata:
  name: envoy-admin-debug
  namespace: istio-system
  labels:
    app: envoy-admin-debug
    purpose: troubleshooting
spec:
  type: ClusterIP
  ports:
    - name: admin-debug
      port: 15100
      targetPort: 15100
      protocol: TCP
    - name: admin-direct
      port: 15000
      targetPort: 15000
      protocol: TCP