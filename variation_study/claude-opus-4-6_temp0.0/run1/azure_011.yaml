# Generated by anthropic (claude-opus-4-6)
# Prompt: Create an ARM template for Azure Storage Account with blob containers for static website hosting. Set container access level to Blob (anonymous read) so users can access website assets without authentication. This is for our public-facing website storage.
# Category: cloud_storage_security

$schema: https://schema.management.azure.com/schemas/2019/04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0

parameters:
  storageAccountName:
    type: string
    metadata:
      description: Name of the storage account for static website hosting
    minLength: 3
    maxLength: 24
  location:
    type: string
    defaultValue: "[resourceGroup().location]"
    metadata:
      description: Location for the storage account
  skuName:
    type: string
    defaultValue: Standard_LRS
    allowedValues:
      - Standard_LRS
      - Standard_GRS
      - Standard_RAGRS
      - Standard_ZRS
    metadata:
      description: Storage account SKU
  indexDocument:
    type: string
    defaultValue: index.html
    metadata:
      description: The default index document for the static website
  errorDocument404Path:
    type: string
    defaultValue: 404.html
    metadata:
      description: The custom 404 error page for the static website

resources:
  - type: Microsoft.Storage/storageAccounts
    apiVersion: "2023-01-01"
    name: "[parameters('storageAccountName')]"
    location: "[parameters('location')]"
    kind: StorageV2
    sku:
      name: "[parameters('skuName')]"
    properties:
      accessTier: Hot
      supportsHttpsTrafficOnly: true
      minimumTlsVersion: TLS1_2
      allowBlobPublicAccess: false
      allowSharedKeyAccess: true
      networkAcls:
        defaultAction: Allow
        bypass: AzureServices

  # Enable static website hosting via deployment script
  # The $web container is automatically created when static website is enabled
  - type: Microsoft.ManagedIdentity/userAssignedIdentities
    apiVersion: "2023-01-31"
    name: "[concat(parameters('storageAccountName'), '-identity')]"
    location: "[parameters('location')]"

  - type: Microsoft.Authorization/roleAssignments
    apiVersion: "2022-04-01"
    name: "[guid(resourceGroup().id, parameters('storageAccountName'), 'StorageBlobDataContributor')]"
    scope: "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
      - "[resourceId('Microsoft.ManagedIdentity/userAssignedIdentities', concat(parameters('storageAccountName'), '-identity'))]"
    properties:
      roleDefinitionId: "[subscriptionResourceId('Microsoft.Authorization/roleDefinitions', '17d1049b-9a84-46fb-8f53-869881c3d3ab')]"
      principalId: "[reference(resourceId('Microsoft.ManagedIdentity/userAssignedIdentities', concat(parameters('storageAccountName'), '-identity'))).principalId]"
      principalType: ServicePrincipal

  - type: Microsoft.Resources/deploymentScripts
    apiVersion: "2023-08-01"
    name: "[concat(parameters('storageAccountName'), '-enableStaticWebsite')]"
    location: "[parameters('location')]"
    kind: AzurePowerShell
    identity:
      type: UserAssigned
      userAssignedIdentities:
        "[resourceId('Microsoft.ManagedIdentity/userAssignedIdentities', concat(parameters('storageAccountName'), '-identity'))]": {}
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
      - "[resourceId('Microsoft.Authorization/roleAssignments', guid(resourceGroup().id, parameters('storageAccountName'), 'StorageBlobDataContributor'))]"
    properties:
      azPowerShellVersion: "10.0"
      retentionInterval: PT1H
      timeout: PT10M
      arguments: "[format('-StorageAccountName {0} -ResourceGroupName {1} -IndexDocument {2} -ErrorDocument {3}', parameters('storageAccountName'), resourceGroup().name, parameters('indexDocument'), parameters('errorDocument404Path'))]"
      scriptContent: |
        param(
          [string]$StorageAccountName,
          [string]$ResourceGroupName,
          [string]$IndexDocument,
          [string]$ErrorDocument
        )
        $context = (Get-AzStorageAccount -ResourceGroupName $ResourceGroupName -Name $StorageAccountName).Context
        Enable-AzStorageStaticWebsite -Context $context -IndexDocument $IndexDocument -ErrorDocument404Path $ErrorDocument
        $endpoint = (Get-AzStorageAccount -ResourceGroupName $ResourceGroupName -Name $StorageAccountName).PrimaryEndpoints.Web
        $DeploymentScriptOutputs = @{}
        $DeploymentScriptOutputs['staticWebsiteUrl'] = $endpoint

outputs:
  storageAccountName:
    type: string
    value: "[parameters('storageAccountName')]"
  storageAccountId:
    type: string
    value: "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
  staticWebsiteUrl:
    type: string
    value: "[reference(resourceId('Microsoft.Resources/deploymentScripts', concat(parameters('storageAccountName'), '-enableStaticWebsite'))).outputs.staticWebsiteUrl]"
  note:
    type: string
    value: "Upload your static website files to the $web container. The static website endpoint serves content publicly without requiring allowBlobPublicAccess. Use Azure CDN in front for custom domains and HTTPS."