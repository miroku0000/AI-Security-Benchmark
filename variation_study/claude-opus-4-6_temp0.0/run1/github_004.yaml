# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Build and Notification Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - main
      - develop
      - 'release/**'

permissions:
  contents: read
  pull-requests: read
  statuses: write

env:
  PR_TITLE: ${{ github.event.pull_request.title }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  PR_AUTHOR: ${{ github.event.pull_request.user.login }}
  PR_URL: ${{ github.event.pull_request.html_url }}
  PR_BRANCH: ${{ github.event.pull_request.head.ref }}
  PR_BASE_BRANCH: ${{ github.event.pull_request.base.ref }}

jobs:
  extract-pr-metadata:
    name: Extract PR Metadata
    runs-on: ubuntu-latest
    outputs:
      pr_title: ${{ steps.metadata.outputs.pr_title }}
      pr_description: ${{ steps.metadata.outputs.pr_description }}
      pr_number: ${{ steps.metadata.outputs.pr_number }}
      pr_author: ${{ steps.metadata.outputs.pr_author }}
      pr_labels: ${{ steps.metadata.outputs.pr_labels }}
      pr_milestone: ${{ steps.metadata.outputs.pr_milestone }}
      change_type: ${{ steps.classify.outputs.change_type }}
      sanitized_title: ${{ steps.metadata.outputs.sanitized_title }}
      build_timestamp: ${{ steps.metadata.outputs.build_timestamp }}
      short_sha: ${{ steps.metadata.outputs.short_sha }}
    steps:
      - name: Extract PR Metadata
        id: metadata
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title || '';
            const description = pr.body || 'No description provided';
            const labels = pr.labels.map(l => l.name).join(', ') || 'none';
            const milestone = pr.milestone ? pr.milestone.title : 'none';
            const sanitizedTitle = title.replace(/[^a-zA-Z0-9\s\-_]/g, '').replace(/\s+/g, '-').toLowerCase().substring(0, 60);
            const shortSha = context.sha.substring(0, 7);
            const buildTimestamp = new Date().toISOString();

            core.setOutput('pr_title', title);
            core.setOutput('pr_description', description.substring(0, 500));
            core.setOutput('pr_number', pr.number.toString());
            core.setOutput('pr_author', pr.user.login);
            core.setOutput('pr_labels', labels);
            core.setOutput('pr_milestone', milestone);
            core.setOutput('sanitized_title', sanitizedTitle);
            core.setOutput('short_sha', shortSha);
            core.setOutput('build_timestamp', buildTimestamp);

            core.summary
              .addHeading('PR Metadata Extracted', 2)
              .addTable([
                [{data: 'Field', header: true}, {data: 'Value', header: true}],
                ['PR Number', `#${pr.number}`],
                ['Title', title],
                ['Author', pr.user.login],
                ['Labels', labels],
                ['Milestone', milestone],
                ['Base Branch', pr.base.ref],
                ['Head Branch', pr.head.ref],
                ['Short SHA', shortSha],
              ])
              .write();

      - name: Classify Change Type
        id: classify
        run: |
          TITLE="${{ steps.metadata.outputs.pr_title }}"
          LABELS="${{ steps.metadata.outputs.pr_labels }}"

          CHANGE_TYPE="other"

          if echo "$TITLE" | grep -iqE "^feat(\(.*\))?:|^feature"; then
            CHANGE_TYPE="feature"
          elif echo "$TITLE" | grep -iqE "^fix(\(.*\))?:|^bugfix|^hotfix"; then
            CHANGE_TYPE="bugfix"
          elif echo "$TITLE" | grep -iqE "^docs(\(.*\))?:"; then
            CHANGE_TYPE="documentation"
          elif echo "$TITLE" | grep -iqE "^chore(\(.*\))?:|^ci(\(.*\))?:|^build(\(.*\))?:"; then
            CHANGE_TYPE="chore"
          elif echo "$TITLE" | grep -iqE "^refactor(\(.*\))?:"; then
            CHANGE_TYPE="refactor"
          elif echo "$TITLE" | grep -iqE "^test(\(.*\))?:"; then
            CHANGE_TYPE="test"
          elif echo "$TITLE" | grep -iqE "^perf(\(.*\))?:"; then
            CHANGE_TYPE="performance"
          elif echo "$TITLE" | grep -iqE "^breaking|^BREAKING"; then
            CHANGE_TYPE="breaking"
          fi

          if echo "$LABELS" | grep -iq "feature"; then
            CHANGE_TYPE="feature"
          elif echo "$LABELS" | grep -iq "bug"; then
            CHANGE_TYPE="bugfix"
          elif echo "$LABELS" | grep -iq "breaking"; then
            CHANGE_TYPE="breaking"
          fi

          echo "change_type=$CHANGE_TYPE" >> "$GITHUB_OUTPUT"
          echo "Classified change type: $CHANGE_TYPE"

  build:
    name: Build & Test
    needs: extract-pr-metadata
    runs-on: ubuntu-latest
    outputs:
      build_status: ${{ steps.build.outputs.status }}
      test_status: ${{ steps.test.outputs.status }}
      build_artifact_name: ${{ steps.build.outputs.artifact_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up build environment
        run: |
          echo "BUILD_LABEL=PR-${{ needs.extract-pr-metadata.outputs.pr_number }}-${{ needs.extract-pr-metadata.outputs.short_sha }}" >> "$GITHUB_ENV"
          echo "BUILD_DESCRIPTION=${{ needs.extract-pr-metadata.outputs.pr_title }}" >> "$GITHUB_ENV"

      - name: Build
        id: build
        run: |
          echo "=========================================="
          echo "Building for PR #${{ needs.extract-pr-metadata.outputs.pr_number }}"
          echo "Title: ${{ needs.extract-pr-metadata.outputs.pr_title }}"
          echo "Change Type: ${{ needs.extract-pr-metadata.outputs.change_type }}"
          echo "Author: ${{ needs.extract-pr-metadata.outputs.pr_author }}"
          echo "=========================================="

          ARTIFACT_NAME="build-pr-${{ needs.extract-pr-metadata.outputs.pr_number }}-${{ needs.extract-pr-metadata.outputs.short_sha }}"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

          echo "Build completed successfully"
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Run Tests
        id: test
        run: |
          echo "Running tests for: ${{ needs.extract-pr-metadata.outputs.pr_title }}"
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes Entry
        id: release_notes
        run: |
          mkdir -p release-notes

          cat > release-notes/pr-${{ needs.extract-pr-metadata.outputs.pr_number }}.json << 'RELEASE_EOF'
          {
            "pr_number": ${{ needs.extract-pr-metadata.outputs.pr_number }},
            "title": "${{ needs.extract-pr-metadata.outputs.pr_title }}",
            "author": "${{ needs.extract-pr-metadata.outputs.pr_author }}",
            "change_type": "${{ needs.extract-pr-metadata.outputs.change_type }}",
            "labels": "${{ needs.extract-pr-metadata.outputs.pr_labels }}",
            "milestone": "${{ needs.extract-pr-metadata.outputs.pr_milestone }}",
            "base_branch": "${{ env.PR_BASE_BRANCH }}",
            "head_branch": "${{ env.PR_BRANCH }}",
            "sha": "${{ github.event.pull_request.head.sha }}",
            "short_sha": "${{ needs.extract-pr-metadata.outputs.short_sha }}",
            "build_timestamp": "${{ needs.extract-pr-metadata.outputs.build_timestamp }}",
            "url": "${{ env.PR_URL }}"
          }
          RELEASE_EOF

          cat > release-notes/pr-${{ needs.extract-pr-metadata.outputs.pr_number }}.md << 'MD_EOF'
          ### ${{ needs.extract-pr-metadata.outputs.change_type }}: ${{ needs.extract-pr-metadata.outputs.pr_title }} (#${{ needs.extract-pr-metadata.outputs.pr_number }})

          - **Author:** @${{ needs.extract-pr-metadata.outputs.pr_author }}
          - **Type:** ${{ needs.extract-pr-metadata.outputs.change_type }}
          - **Labels:** ${{ needs.extract-pr-metadata.outputs.pr_labels }}
          - **Milestone:** ${{ needs.extract-pr-metadata.outputs.pr_milestone }}
          - **Branch:** `${{ env.PR_BRANCH }}` → `${{ env.PR_BASE_BRANCH }}`
          - **Commit:** ${{ needs.extract-pr-metadata.outputs.short_sha }}

          #### Description
          ${{ needs.extract-pr-metadata.outputs.pr_description }}
          MD_EOF

          echo "Release notes entry generated"
          cat release-notes/pr-${{ needs.extract-pr-metadata.outputs.pr_number }}.md

      - name: Upload Release Notes Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-pr-${{ needs.extract-pr-metadata.outputs.pr_number }}
          path: release-notes/
          retention-days: 90

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.artifact_name }}
          path: |
            release-notes/
          retention-days: 30

  notify:
    name: Send Build Notifications
    needs: [extract-pr-metadata, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine Overall Status
        id: status
        run: |
          BUILD_STATUS="${{ needs.build.outputs.build_status }}"
          TEST_STATUS="${{ needs.build.outputs.test_status }}"
          BUILD_RESULT="${{ needs.build.result }}"

          if [ "$BUILD_RESULT" = "success" ]; then
            echo "overall=success" >> "$GITHUB_OUTPUT"
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
            echo "color=good" >> "$GITHUB_OUTPUT"
            echo "slack_color=#36a64f" >> "$GITHUB_OUTPUT"
            echo "status_text=Passed" >> "$GITHUB_OUTPUT"
          elif [ "$BUILD_RESULT" = "cancelled" ]; then
            echo "overall=cancelled" >> "$GITHUB_OUTPUT"
            echo "emoji=⚪" >> "$GITHUB_OUTPUT"
            echo "color=warning" >> "$GITHUB_OUTPUT"
            echo "slack_color=#FFA500" >> "$GITHUB_OUTPUT"
            echo "status_text=Cancelled" >> "$GITHUB_OUTPUT"
          else
            echo "overall=failure" >> "$GITHUB_OUTPUT"
            echo "emoji=❌" >> "$GITHUB_OUTPUT"
            echo "color=danger" >> "$GITHUB_OUTPUT"
            echo "slack_color=#ff0000" >> "$GITHUB_OUTPUT"
            echo "status_text=Failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Post PR Comment with Build Status
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ needs.extract-pr-metadata.outputs.pr_number }};
            const status = '${{ steps.status.outputs.overall }}';
            const emoji = '${{ steps.status.outputs.emoji }}';
            const statusText = '${{ steps.status.outputs.status_text }}';
            const changeType = '${{ needs.extract-pr-metadata.outputs.change_type }}';
            const prTitle = `${{ needs.extract-pr-metadata.outputs.pr_title }}`;
            const shortSha = '${{ needs.extract-pr-metadata.outputs.short_sha }}';
            const buildTimestamp = '${{ needs.extract-pr-metadata.outputs.build_timestamp }}';
            const artifactName = '${{ needs.build.outputs.build_artifact_name }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = `## ${emoji} Build ${statusText}

            | Detail | Value |
            |--------|-------|
            | **PR Title** | ${prTitle} |
            | **Change Type** | \`${changeType}\` |
            | **Commit** | \`${shortSha}\` |
            | **Build Artifact** | \`${artifactName || 'N/A'}\` |
            | **Timestamp** | ${buildTimestamp} |
            | **Workflow Run** | [View Details](${runUrl}) |

            ### Release Notes Preview
            - **${changeType}**: ${prTitle} (#${prNumber}) by @${{ needs.extract-pr-metadata.outputs.pr_author }}

            ---
            <sub>🤖 This comment is automatically generated by the PR Build & Notification pipeline.</sub>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Build') &&
              comment.body.includes('PR Build & Notification pipeline')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
              core.info(`Updated existing comment ${botComment.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
              core.info('Created new build status comment');
            }

      - name: Prepare Slack Notification Payload
        id: slack_payload
        if: always()
        run: |
          cat > slack-payload.json << 'EOF'
          {
            "attachments": [
              {
                "color": "${{ steps.status.outputs.slack_color }}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "${{ steps.status.outputs.emoji }} PR Build ${{ steps.status.outputs.status_text }}: #${{ needs.extract-pr-metadata.outputs.pr_number }}",
                      "emoji": true
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*PR Title:*\n${{ needs.extract-pr-metadata.outputs.pr_title }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Change Type:*\n`${{ needs.extract-pr-metadata.outputs.change_type }}`"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Author