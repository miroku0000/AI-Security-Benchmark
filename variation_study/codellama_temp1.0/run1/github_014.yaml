# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: Release Workflow

on:
  push:
    branches:
      - main
    tags:
      - v*

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Checkout the repository
        uses: actions/checkout@v2

      - name: Build the application
        run: |
          npm install
          npm run build

      - name: Create a GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create $TAG_NAME --notes "Release notes for version $TAG_NAME" --draft

      - name: Publish the package to npm/PyPI
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [[ $(node -v) ]]; then
            npm publish --access public --otp=$OTP
          elif [[ $(python -V 2>&1) =~ Python\ (.*)\ .* ]]; then
            twine upload dist/*.whl --username $PYPI_USERNAME --password $PYPI_PASSWORD
          fi