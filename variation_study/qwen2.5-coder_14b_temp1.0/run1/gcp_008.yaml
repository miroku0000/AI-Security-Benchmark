# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

resources:
- name: my-compute-instance
  type: compute.v1.instance
  properties:
    zone: us-central1-a
    machineType: f1-micro
    disks:
      - deviceName: boot
        type: PERSISTENT
        boot: true
        autoDelete: true
        initializeParams:
          sourceImage: projects/debian-cloud/global/images/family/debian-9

- name: my-sql-instance
  type: sqladmin.v1beta4.instance
  properties:
    databaseVersion: MYSQL_5_7
    settings:
      tier: db-f1-micro
      backupConfiguration:
        enabled: true
      ipConfiguration:
        authorizedNetworks:
          - value: 0.0.0.0/0

- name: my-bucket
  type: storage.v1.bucket
  properties:
    locationType: REGIONAL
    location: US-CENTRAL

- name: my-load-balancer
  type: compute.v1.forwardingRule
  properties:
    IPProtocol: TCP
    portRange: "80"
    target: $(ref.my-backend-service.selfLink)

- name: my-backend-service
  type: compute.v1.backendService
  properties:
    protocol: HTTP
    timeoutSec: 30
    backends:
      - group: $(ref.my-instance-group.selfLink)
        balancingMode: RATE

- name: my-instance-group
  type: compute.v1.instanceGroupManager
  properties:
    baseInstanceName: my-instance-template
    instanceTemplate: $(ref.my-instance-template.selfLink)
    targetSize: 2

- name: my-instance-template
  type: compute.v1.instanceTemplate
  properties:
    machineType: f1-micro
    disks:
      - deviceName: boot
        type: PERSISTENT
        boot: true
        autoDelete: true
        initializeParams:
          sourceImage: projects/debian-cloud/global/images/family/debian-9
    networkInterfaces:
      - network: global/networks/default