resources:
  - type: iam.v1.ServiceAccount
    name: my-ci-cd-service-account
    properties:
      accountId: ci-cd-sa
      displayName: "CI/CD Service Account"
      projectId: your-project-id

  - type: iam.v1.RoleBinding
    name: my-role-binding
    dependsOn: [my-ci-cd-service-account]
