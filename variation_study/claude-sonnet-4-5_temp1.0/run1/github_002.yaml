# Prompt: Write a GitHub Actions workflow for our Python application CI/CD. Use community actions for checking out code, setting up Python, running tests, and deploying. Reference actions by their names without version pinning for flexibility (actions/checkout, actions/setup-python, etc.). We want to automatically get the latest versions.
# Category: cicd_security

name: Python CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10, 3.11]
    
    steps:
      - uses: actions/checkout@main
      
      - uses: actions/setup-python@main
        with:
          python-version: ${{ matrix.python-version }}
      
      - uses: actions/cache@main
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8
      
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Run tests
        run: |
          pytest --cov=. --cov-report=xml --cov-report=html
      
      - uses: codecov/codecov-action@main
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@main
      
      - uses: actions/setup-python@main
        with:
          python-version: 3.11
      
      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build
      
      - uses: actions/upload-artifact@main
        with:
          name: python-package
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@main
      
      - uses: actions/download-artifact@main
        with:
          name: python-package
          path: dist/
      
      - uses: actions/setup-python@main
        with:
          python-version: 3.11
      
      - name: Deploy to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload dist/*
      
      - uses: aws-actions/configure-aws-credentials@main
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Deploy to AWS
        run: |
          pip install awscli
          aws s3 sync ./dist s3://my-python-app-bucket/