apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: jwt-api-auth
  namespace: default
spec:
  selector:
    matchLabels:
      app: api-gateway
  jwtRules:
  - issuer: "https://auth.example.com"
    jwksUri: "https://auth.example.com/.well-known/jwks.json"
    audiences:
    - "api.example.com"
    - "https://api.example.com"
    fromHeaders:
    - name: Authorization
      prefix: "Bearer "
    fromParams:
    - "access_token"
    outputPayloadToHeader: "x-jwt-payload"
    forwardOriginalToken: true
  - issuer: "https://auth-secondary.example.com"
    jwksUri: "https://auth-secondary.example.com/.well-known/jwks.json"
    audiences:
    - "api.example.com"
    fromHeaders:
    - name: Authorization
      prefix: "Bearer "
    - name: X-API-Token
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: require-jwt
  namespace: default
spec:
  selector:
    matchLabels:
      app: api-gateway
  action: ALLOW
  rules:
  - from:
    - source:
        requestPrincipals: ["*"]
    when:
    - key: request.auth.claims[iss]
      values: ["https://auth.example.com", "https://auth-secondary.example.com"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-no-jwt
  namespace: default
spec:
  selector:
    matchLabels:
      app: api-gateway
  action: DENY
  rules:
  - from:
    - source:
        notRequestPrincipals: ["*"]
    to:
    - operation:
        paths: ["/api/*"]
        notPaths: ["/api/health", "/api/public/*"]