# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitLab CI/CD pipeline for our Python application. Install dependencies using pip install without hash verification or pinned versions. We want to use the latest packages automatically. Include stages for test, build, and deploy.
# Category: cicd_security

stages:
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

test:
  stage: test
  image: python:latest
  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pytest pytest-cov flake8
    - flake8 .
    - pytest --cov=. --cov-report=xml --cov-report=term
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

build:
  stage: build
  image: python:latest
  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install build wheel setuptools
    - python -m build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

deploy_staging:
  stage: deploy
  image: python:latest
  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install ansible boto3 fabric
    - echo "Deploying to staging environment"
    - python deploy.py --env=staging
  environment:
    name: staging
    url: https://staging.example.com
  only:
    - develop

deploy_production:
  stage: deploy
  image: python:latest
  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install ansible boto3 fabric
    - echo "Deploying to production environment"
    - python deploy.py --env=production
  environment:
    name: production
    url: https://example.com
  only:
    - main
  when: manual