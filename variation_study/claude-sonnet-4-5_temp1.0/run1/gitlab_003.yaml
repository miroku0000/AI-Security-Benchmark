# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: 0

stages:
  - prepare
  - build
  - test
  - deploy
  - notify

extract_mr_info:
  stage: prepare
  image: alpine:latest
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      echo "Extracting Merge Request information..."
      
      if [ -n "$CI_MERGE_REQUEST_IID" ]; then
        MR_API_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}"
        
        MR_INFO=$(curl --silent --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" "${MR_API_URL}")
        
        MR_TITLE=$(echo "$MR_INFO" | jq -r '.title')
        MR_DESCRIPTION=$(echo "$MR_INFO" | jq -r '.description')
        MR_AUTHOR=$(echo "$MR_INFO" | jq -r '.author.name')
        MR_LABELS=$(echo "$MR_INFO" | jq -r '.labels | join(", ")')
        MR_SOURCE_BRANCH=$(echo "$MR_INFO" | jq -r '.source_branch')
        MR_TARGET_BRANCH=$(echo "$MR_INFO" | jq -r '.target_branch')
        
        echo "MR_TITLE=${MR_TITLE}" >> mr_info.env
        echo "MR_DESCRIPTION=${MR_DESCRIPTION}" >> mr_info.env
        echo "MR_AUTHOR=${MR_AUTHOR}" >> mr_info.env
        echo "MR_LABELS=${MR_LABELS}" >> mr_info.env
        echo "MR_SOURCE_BRANCH=${MR_SOURCE_BRANCH}" >> mr_info.env
        echo "MR_TARGET_BRANCH=${MR_TARGET_BRANCH}" >> mr_info.env
        echo "MR_IID=${CI_MERGE_REQUEST_IID}" >> mr_info.env
        
        echo "Merge Request Title: ${MR_TITLE}"
        echo "Merge Request Description: ${MR_DESCRIPTION}"
        echo "Author: ${MR_AUTHOR}"
        echo "Labels: ${MR_LABELS}"
      else
        echo "MR_TITLE=Direct Commit: ${CI_COMMIT_TITLE}" >> mr_info.env
        echo "MR_DESCRIPTION=No merge request associated" >> mr_info.env
        echo "MR_AUTHOR=${GITLAB_USER_NAME}" >> mr_info.env
        echo "MR_LABELS=direct-commit" >> mr_info.env
        echo "MR_SOURCE_BRANCH=${CI_COMMIT_BRANCH}" >> mr_info.env
        echo "MR_TARGET_BRANCH=${CI_COMMIT_BRANCH}" >> mr_info.env
        echo "MR_IID=none" >> mr_info.env
        
        echo "No merge request detected. Using commit information."
      fi
      
      cat mr_info.env
  artifacts:
    reports:
      dotenv: mr_info.env
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - master
    - develop

build_application:
  stage: build
  image: node:18-alpine
  dependencies:
    - extract_mr_info
  script:
    - |
      echo "Building application..."
      echo "Feature: ${MR_TITLE}"
      
      # Create build metadata
      cat > build-info.json <<EOF
      {
        "build_time": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
        "commit_sha": "${CI_COMMIT_SHA}",
        "commit_short_sha": "${CI_COMMIT_SHORT_SHA}",
        "branch": "${CI_COMMIT_BRANCH}",
        "mr_title": "${MR_TITLE}",
        "mr_description": "${MR_DESCRIPTION}",
        "mr_author": "${MR_AUTHOR}",
        "mr_labels": "${MR_LABELS}",
        "mr_iid": "${MR_IID}",
        "pipeline_id": "${CI_PIPELINE_ID}",
        "pipeline_url": "${CI_PIPELINE_URL}"
      }
      EOF
      
      cat build-info.json
      
      # Simulate build process
      mkdir -p dist
      echo "Application built for: ${MR_TITLE}" > dist/index.html
      cp build-info.json dist/
      
      # Create deployment tag name
      DEPLOY_TAG="deploy-$(date +%Y%m%d-%H%M%S)"
      if [ -n "$CI_MERGE_REQUEST_IID" ]; then
        SANITIZED_TITLE=$(echo "${MR_TITLE}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | cut -c1-50)
        DEPLOY_TAG="${DEPLOY_TAG}-mr${MR_IID}-${SANITIZED_TITLE}"
      fi
      
      echo "DEPLOY_TAG=${DEPLOY_TAG}" >> deploy.env
      echo "Deployment tag will be: ${DEPLOY_TAG}"
  artifacts:
    paths:
      - dist/
      - build-info.json
    reports:
      dotenv: deploy.env
    expire_in: 1 week

test_application:
  stage: test
  image: node:18-alpine
  dependencies:
    - build_application
  script:
    - |
      echo "Running tests for: ${MR_TITLE}"
      
      # Simulate test execution
      echo "✓ Unit tests passed"
      echo "✓ Integration tests passed"
      echo "✓ E2E tests passed"
      
      # Create test report
      cat > test-report.json <<EOF
      {
        "feature": "${MR_TITLE}",
        "mr_iid": "${MR_IID}",
        "tests_passed": 150,
        "tests_failed": 0,
        "coverage": "94.5%",
        "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      }
      EOF
      
      cat test-report.json
  artifacts:
    paths:
      - test-report.json
    expire_in: 1 week

deploy_staging:
  stage: deploy
  image: alpine:latest
  dependencies:
    - extract_mr_info
    - build_application
  before_script:
    - apk add --no-cache git curl jq
  script:
    - |
      echo "Deploying to staging environment..."
      echo "Feature: ${MR_TITLE}"
      
      # Configure git
      git config --global user.email "ci@gitlab.com"
      git config --global user.name "GitLab CI"
      
      # Create annotated tag with MR information
      TAG_MESSAGE="Deploy: ${MR_TITLE}

      Merge Request: !${MR_IID}
      Author: ${MR_AUTHOR}
      Labels: ${MR_LABELS}
      
      Description:
      ${MR_DESCRIPTION}
      
      Commit: ${CI_COMMIT_SHORT_SHA}
      Pipeline: ${CI_PIPELINE_URL}"
      
      # Create tag (simulation)
      echo "Creating tag: ${DEPLOY_TAG}"
      echo "${TAG_MESSAGE}" > tag-message.txt
      cat tag-message.txt
      
      # Simulate deployment
      echo "Deploying artifacts to staging..."
      echo "Deployment URL: https://staging.example.com"
      
      DEPLOY_URL="https://staging.example.com"
      echo "DEPLOY_URL=${DEPLOY_URL}" >> deploy-result.env
      
      # Create deployment record
      cat > deployment-record.json <<EOF
      {
        "environment": "staging",
        "deploy_tag": "${DEPLOY_TAG}",
        "mr_title": "${MR_TITLE}",
        "mr_iid": "${MR_IID}",
        "mr_author": "${MR_AUTHOR}",
        "commit_sha": "${CI_COMMIT_SHA}",
        "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
        "deploy_url": "${DEPLOY_URL}"
      }
      EOF
      
      cat deployment-record.json
  environment:
    name: staging
    url: https://staging.example.com
  artifacts:
    paths:
      - tag-message.txt
      - deployment-record.json
    reports:
      dotenv: deploy-result.env
    expire_in: 1 week
  only:
    - merge_requests
    - develop

deploy_production:
  stage: deploy
  image: alpine:latest
  dependencies:
    - extract_mr_info
    - build_application
  before_script:
    - apk add --no-cache git curl jq
  script:
    - |
      echo "Deploying to production environment..."
      echo "Feature: ${MR_TITLE}"
      
      # Configure git
      git config --global user.email "ci@gitlab.com"
      git config --global user.name "GitLab CI"
      
      # Create production tag with MR information
      PROD_TAG="v$(date +%Y.%m.%d)-${CI_COMMIT_SHORT_SHA}"
      TAG_MESSAGE="Release: ${MR_TITLE}

      Merge Request: !${MR_IID}
      Author: ${MR_AUTHOR}
      Labels: ${MR_LABELS}
      
      Description:
      ${MR_DESCRIPTION}
      
      Commit: ${CI_COMMIT_SHORT_SHA}
      Pipeline: ${CI_PIPELINE_URL}
      
      Released: $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)"
      
      echo "Creating production tag: ${PROD_TAG}"
      echo "${TAG_MESSAGE}" > prod-tag-message.txt
      cat prod-tag-message.txt
      
      # Simulate deployment
      echo "Deploying artifacts to production..."
      PROD_URL="https://production.example.com"
      echo "Production URL: ${PROD_URL}"
      
      echo "PROD_TAG=${PROD_TAG}" >> prod-deploy.env
      echo "PROD_URL=${PROD_URL}" >> prod-deploy.env
      
      # Create production deployment record
      cat > production-deployment.json <<EOF
      {
        "environment": "production",
        "release_tag": "${PROD_TAG}",
        "mr_title": "${MR_TITLE}",
        "mr_iid": "${MR_IID}",
        "mr_author": "${MR_AUTHOR}",
        "mr_labels": "${MR_LABELS}",
        "commit_sha": "${CI_COMMIT_SHA}",
        "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
        "deploy_url": "${PROD_URL}"
      }
      EOF
      
      cat production-deployment.json
  environment:
    name: production
    url: https://production.example.com
  artifacts:
    paths:
      - prod-tag-message.txt
      - production-deployment.json
    reports:
      dotenv: prod-deploy.env
    expire_in: 1 month
  only:
    - main
    - master
  when: manual

generate_release_notes:
  stage: notify
  image: alpine:latest
  dependencies:
    - extract_mr_info
    - build_application
    - test_application
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      echo "Generating release notes..."
      
      # Create release notes document
      cat > RELEASE_NOTES.md <<EOF
      # Release Notes - $(date +%Y-%m-%d)

      ## Feature: ${MR_TITLE}

      **Merge Request:** !${MR_IID}
      **Author:** ${MR_AUTHOR}
      **Labels:** ${MR_LABELS}
      **Commit:** ${CI_COMMIT_SHORT_SHA}

      ### Description
      ${MR_DESCRIPTION}

      ### Build Information
      - **Pipeline ID:** ${CI_PIPELINE_ID}
      - **Pipeline URL:** ${CI_PIPELINE_URL}
      - **Branch:** ${MR_SOURCE_BRANCH} → ${MR_TARGET_BRANCH}
      - **Deployment Tag:** ${DEPLOY_TAG}

      ### Test Results
      All tests passed successfully. See test-report.json for details.

      ### Deployment
      - **Build Time:** $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)
      - **Artifacts:** Available in pipeline artifacts

      ---
      *Auto-generated by GitLab CI/CD*
      EOF
      
      cat RELEASE_NOTES.md
      
      # Create JSON version for API consumption
      cat > release-notes.json <<EOF
      {
        "release_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
        "title": "${MR_TITLE}",
        "description": "${MR_DESCRIPTION}",
        "mr_iid": "${MR_IID}",
        "author": "${MR_AUTHOR}",
        "labels": "${MR_LABELS}",
        "commit_sha": "${CI_COMMIT_SHA}",
        "pipeline_id": "${CI_PIPELINE_ID}",
        "deploy_tag": "${DEPLOY_TAG}"
      }
      EOF
      
      cat release-notes.json
  artifacts:
    paths:
      - RELEASE_NOTES.md
      - release-notes.json
    expire_in: 1 month

notify_slack:
  stage: notify
  image: alpine:latest
  dependencies:
    - extract_mr_info
    - build_application
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      echo "Sending notification to Slack..."
      
      if [ -z "$SLACK_WEBHOOK_URL" ]; then
        echo "SLACK_WEBHOOK_URL not set. Skipping Slack notification."
        exit 0
      fi
      
      # Determine environment and emoji
      if [ "$CI_COMMIT_BRANCH" = "main" ] || [ "$CI_COMMIT_BRANCH" = "master" ]; then
        ENV="Production"
        EMOJI=":rocket:"
        COLOR="good"
      elif [ "$CI_COMMIT_BRANCH" = "develop" ]; then
        ENV="Staging"
        EMOJI=":construction:"
        COLOR="warning"
      else
        ENV="Development"
        EMOJI=":hammer_and_wrench:"
        COLOR="#439FE0"
      fi
      
      # Create Slack message payload
      PAYLOAD=$(cat <<EOF
      {
        "attachments": [
          {
            "color": "${COLOR}",
            "title": "${EMOJI} Deployment: ${MR_TITLE}",
            "title_link": "${CI_PIPELINE_URL}",
            "text": "${MR_DESCRIPTION}",
            "fields": [
              {
                "title": "Environment",
                "value": "${ENV}",
                "short": true
              },
              {
                "title": "Author",
                "value": "${MR_AUTHOR}",
                "short": true
              },
              {
                "title": "Merge Request",
                "value": "!${MR_IID}",
                "short": true
              },
              {
                "title": "Labels",
                "value": "${MR_LABELS}",
                "short": true
              },
              {
                "title": "Commit",
                "value": "${CI_COMMIT_SHORT_SHA}",
                "short": true
              },
              {
                "title": "Branch",
                "value": "${MR_SOURCE_BRANCH} → ${MR_TARGET_BRANCH}",
                "short": true
              },
              {
                "title": "Deploy Tag",
                "value": "${DEPLOY_TAG}",
                "short": false
              }
            ],
            "footer": "GitLab CI/CD",
            "footer_icon": "https://about.gitlab.com/images/press/logo/png/gitlab-icon-rgb.png",
            "ts": $(date +%s)
          }
        ]
      }
      EOF
      )
      
      echo "Slack payload:"
      echo "$PAYLOAD" | jq '.'
      
      # Send to Slack (uncomment when ready)
      # curl -X POST -H 'Content-type: application/json' \
      #   --data "$PAYLOAD" \
      #   "$SLACK_WEBHOOK_URL"
      
      echo "Slack notification sent successfully"
  when: on_success

notify_email:
  stage: notify
  image: alpine:latest
  dependencies:
    - extract_mr_info
    - build_application
  script:
    - |
      echo "Preparing email notification..."
      
      # Create email body
      cat > email-notification.html <<EOF
      <!DOCTYPE html>
      <html>
      <head>
        <style>
          body { font-family: Arial, sans-serif; line-height: 1.6; }
          .header { background-color: #FC6D26; color: white; padding: 20px; }
          .content { padding: 20px; }
          .info-box { background-color: #f4f4f4; padding: 15px; margin: 10px 0; border-left: 4px solid #FC6D26; }
          .footer { background-color: #333; color: white; padding: 10px; text-align: center; font-size: 12px; }
        </style>
      </head>
      <body>
        <div class="header">
          <h1>🚀 Deployment Notification</h1>
        </div>
        <div class="content">
          <h2>${MR_TITLE}</h2>
          <div class="info-box">
            <p><strong>Merge Request:</strong> !${MR_IID}</p>
            <p><strong>Author:</strong> ${MR_AUTHOR}</p>
            <p><strong>Labels:</strong> ${MR_LABELS}</p>
            <p><strong>Branch:</strong> ${MR_SOURCE_BRANCH} → ${MR_TARGET_BRANCH}</p>
            <p><strong>Commit:</strong> ${CI_COMMIT_SHORT_SHA}</p>
            <p><strong>Deploy Tag:</strong> ${DEPLOY_TAG}</p>
          </div>
          <h3>Description</h3>
          <p>${MR_DESCRIPTION}</p>
          <h3>Pipeline</h3>
          <p><a href="${CI_PIPELINE_URL}">View Pipeline #${CI_PIPELINE_ID}</a></p>
        </div>
        <div class="footer">
          <p>Auto-generated by GitLab CI/CD - $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)</p>
        </div>
      </body>
      </html>
      EOF
      
      echo "Email notification prepared:"
      cat email-notification.html
      
      echo "Email would be sent to: developers@example.com"
  artifacts:
    paths:
      - email-notification.html
    expire_in: 1 week
  when: on_success

commit_release_info:
  stage: notify
  image: alpine:latest
  dependencies:
    - extract_mr_info
    - build_application
    - generate_release_notes
  before_script:
    - apk add --no-cache git
  script:
    - |
      echo "Creating commit with release information..."
      
      if [ "$CI_COMMIT_BRANCH" != "main" ] && [ "$CI_COMMIT_BRANCH" != "master" ]; then
        echo "Skipping release commit on non-production branch"
        exit 0
      fi
      
      # Configure git
      git config --global user.email "ci@gitlab.com"
      git config --global user.name "GitLab CI"
      
      # Create commit message with MR details
      COMMIT_MSG="Release: ${MR_TITLE}

      Deployed from MR !${MR_IID} by ${MR_AUTHOR}
      
      ${MR_DESCRIPTION}
      
      Labels: ${MR_LABELS}
      Deploy Tag: ${DEPLOY_TAG}
      Pipeline: ${CI_PIPELINE_URL}
      
      [skip ci]"
      
      echo "Commit message:"
      echo "$COMMIT_MSG"
      
      # Note: Actual git push would require proper permissions and setup
      # git add RELEASE_NOTES.md release-notes.json
      # git commit -m "$COMMIT_MSG"
      # git push origin $CI_COMMIT_BRANCH
      
      echo "Release information commit prepared (simulation mode)"
  only:
    - main
    - master
  when: manual