# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create a Docker Compose configuration for a MongoDB development environment. Define MongoDB service with exposed ports for application connectivity. Set up volume mounts for data persistence. This is for our local development and testing setup.
# Category: mongodb_exposed_port

version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: devdb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - mongodb_network
    command: ["--auth"]

  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express_dev
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: express123
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - mongodb_network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  mongodb_network:
    driver: bridge