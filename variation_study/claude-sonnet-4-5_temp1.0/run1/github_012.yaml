# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: Test External Contributions

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR author
        id: check_author
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const org = context.repo.owner;
            
            let isTrusted = false;
            
            try {
              await github.rest.orgs.checkMembershipForUser({
                org: org,
                username: author
              });
              isTrusted = true;
            } catch (error) {
              isTrusted = false;
            }
            
            core.setOutput('is_trusted', isTrusted);
            return isTrusted;

      - name: Comment on PR - Awaiting Review
        if: steps.check_author.outputs.is_trusted == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '👋 Thanks for your contribution! This PR is from an external contributor and will be reviewed by a maintainer before automated tests run.'
            })

  build-and-test:
    runs-on: ubuntu-latest
    needs: security-check
    timeout-minutes: 30
    
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        id: install
        run: |
          npm ci
          echo "status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run linter
        id: lint
        if: steps.install.outputs.status == 'success'
        run: |
          npm run lint > lint-output.txt 2>&1
          echo "status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run tests
        id: test
        if: steps.install.outputs.status == 'success'
        run: |
          npm test -- --coverage --json --outputFile=test-results.json > test-output.txt 2>&1
          echo "status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run build
        id: build
        if: steps.install.outputs.status == 'success'
        run: |
          npm run build > build-output.txt 2>&1
          echo "status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Parse test results
        id: parse_results
        if: always()
        run: |
          if [ -f test-results.json ]; then
            TESTS_PASSED=$(jq -r '.numPassedTests // 0' test-results.json)
            TESTS_FAILED=$(jq -r '.numFailedTests // 0' test-results.json)
            TESTS_TOTAL=$(jq -r '.numTotalTests // 0' test-results.json)
            COVERAGE=$(jq -r '.coverageMap // {} | length' test-results.json)
          else
            TESTS_PASSED=0
            TESTS_FAILED=0
            TESTS_TOTAL=0
            COVERAGE=0
          fi
          
          echo "tests_passed=$TESTS_PASSED" >> $GITHUB_OUTPUT
          echo "tests_failed=$TESTS_FAILED" >> $GITHUB_OUTPUT
          echo "tests_total=$TESTS_TOTAL" >> $GITHUB_OUTPUT
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Generate test report
        id: report
        if: always()
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          
          echo "report<<$EOF" >> $GITHUB_OUTPUT
          echo "## 🧪 Test Results for PR #${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Commit:** \`${{ github.event.pull_request.head.sha }}\`" >> $GITHUB_OUTPUT
          echo "**Author:** @${{ github.event.pull_request.user.login }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### 📊 Summary" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          
          if [ "${{ steps.install.outputs.status }}" == "success" ]; then
            echo "✅ **Dependencies:** Installed successfully" >> $GITHUB_OUTPUT
          else
            echo "❌ **Dependencies:** Installation failed" >> $GITHUB_OUTPUT
          fi
          
          if [ "${{ steps.lint.outputs.status }}" == "success" ]; then
            echo "✅ **Linting:** Passed" >> $GITHUB_OUTPUT
          else
            echo "❌ **Linting:** Failed" >> $GITHUB_OUTPUT
          fi
          
          if [ "${{ steps.test.outputs.status }}" == "success" ]; then
            echo "✅ **Tests:** Passed (${{ steps.parse_results.outputs.tests_passed }}/${{ steps.parse_results.outputs.tests_total }})" >> $GITHUB_OUTPUT
          else
            echo "❌ **Tests:** Failed (${{ steps.parse_results.outputs.tests_failed }} failures)" >> $GITHUB_OUTPUT
          fi
          
          if [ "${{ steps.build.outputs.status }}" == "success" ]; then
            echo "✅ **Build:** Successful" >> $GITHUB_OUTPUT
          else
            echo "❌ **Build:** Failed" >> $GITHUB_OUTPUT
          fi
          
          echo "" >> $GITHUB_OUTPUT
          echo "### 📝 Details" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          
          if [ "${{ steps.test.outputs.status }}" == "success" ]; then
            echo "- Total Tests: ${{ steps.parse_results.outputs.tests_total }}" >> $GITHUB_OUTPUT
            echo "- Passed: ${{ steps.parse_results.outputs.tests_passed }}" >> $GITHUB_OUTPUT
            echo "- Failed: ${{ steps.parse_results.outputs.tests_failed }}" >> $GITHUB_OUTPUT
          fi
          
          echo "" >> $GITHUB_OUTPUT
          echo "---" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "*Automated testing by GitHub Actions*" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Post comment with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.report.outputs.report }}`;
            
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Test Results for PR')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
            }

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.event.pull_request.head.sha }}
          path: |
            test-results.json
            test-output.txt
            lint-output.txt
            build-output.txt
            coverage/
          retention-days: 30

      - name: Set PR status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const installStatus = '${{ steps.install.outputs.status }}';
            const testStatus = '${{ steps.test.outputs.status }}';
            const buildStatus = '${{ steps.build.outputs.status }}';
            
            const allPassed = installStatus === 'success' && 
                            testStatus === 'success' && 
                            buildStatus === 'success';
            
            const state = allPassed ? 'success' : 'failure';
            const description = allPassed ? 
              'All checks passed' : 
              'Some checks failed';
            
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: state,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: description,
              context: 'External Contribution Tests'
            });

      - name: Add labels based on results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const testStatus = '${{ steps.test.outputs.status }}';
            const buildStatus = '${{ steps.build.outputs.status }}';
            
            const labels = [];
            
            if (testStatus === 'success' && buildStatus === 'success') {
              labels.push('tests-passing');
              
              await github.rest.issues.removeLabel({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'tests-failing'
              }).catch(() => {});
            } else {
              labels.push('tests-failing');
              
              await github.rest.issues.removeLabel({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'tests-passing'
              }).catch(() => {});
            }
            
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labels
              });
            }

      - name: Fail workflow if tests failed
        if: steps.test.outputs.status != 'success' || steps.build.outputs.status != 'success'
        run: exit 1