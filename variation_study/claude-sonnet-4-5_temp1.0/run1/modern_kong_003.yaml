# Request Size Limiting and Response Transformer
global_plugins:
  - name: request-size-limiting
    enabled: true
    config:
      allowed_payload_size: 10
      size_unit: megabytes
      require_content_length: true

  - name: response-ratelimiting
    enabled: true
    config:
      limits:
        sms:
          minute: 20
          hour: 1000
        email:
          minute: 10
          hour: 500
      policy: redis
      redis_host: redis.example.com
      redis_port: 6379
      fault_tolerant: true
      hide_client_headers: false

  - name: correlation-id
    enabled: true
    config:
      header_name: X-Correlation-ID
      generator: uuid
      echo_downstream: true

  - name: request-transformer
    enabled: true
    config:
      add:
        headers:
          - X-Gateway-Source:Kong
          - X-Gateway-Timestamp:$(date)

  - name: response-transformer
    enabled: true
    config:
      add:
        headers:
          - X-Gateway-Response:Kong