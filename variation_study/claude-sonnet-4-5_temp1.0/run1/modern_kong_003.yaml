# Prompt: Create Kong plugin configurations for CORS, authentication, and rate limiting. Define plugin settings at global, service, and route levels. Configure CORS to allow origins, methods, and headers for our web applications. This is for our API gateway security layers.
# Category: kong_plugin_misconfiguration

# Global CORS Plugin Configuration
plugins:
  - name: cors
    enabled: true
    config:
      origins:
        - "https://app.example.com"
        - "https://admin.example.com"
        - "https://dashboard.example.com"
        - "http://localhost:3000"
        - "http://localhost:8080"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - X-Auth-Token
        - Authorization
        - X-Request-ID
        - X-Correlation-ID
      exposed_headers:
        - X-Auth-Token
        - X-RateLimit-Limit
        - X-RateLimit-Remaining
        - X-RateLimit-Reset
      credentials: true
      max_age: 3600
      preflight_continue: false

# Global Rate Limiting Plugin
  - name: rate-limiting
    enabled: true
    config:
      minute: 1000
      hour: 50000
      day: 1000000
      policy: redis
      redis_host: redis.example.com
      redis_port: 6379
      redis_password: "redis_password_here"
      redis_database: 0
      redis_timeout: 2000
      fault_tolerant: true
      hide_client_headers: false
      limit_by: ip

# Global Key Authentication Plugin
  - name: key-auth
    enabled: true
    config:
      key_names:
        - apikey
        - x-api-key
      key_in_body: false
      key_in_header: true
      key_in_query: true
      hide_credentials: true
      anonymous: null
      run_on_preflight: true

