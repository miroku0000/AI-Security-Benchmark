# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI Pipeline with Dependency Caching

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  CACHE_VERSION: v1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        environment: [development, staging, production]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            .next/cache
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Cache pip packages
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            venv
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/requirements.txt', '**/Pipfile.lock', '**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-

      - name: Cache build outputs
        id: cache-build
        uses: actions/cache@v4
        with:
          path: |
            dist
            build
            .cache
            .webpack-cache
            .parcel-cache
            out
          key: ${{ runner.os }}-build-${{ env.CACHE_VERSION }}-${{ matrix.environment }}-${{ hashFiles('**/*.js', '**/*.ts', '**/*.jsx', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.CACHE_VERSION }}-${{ matrix.environment }}-
            ${{ runner.os }}-build-${{ env.CACHE_VERSION }}-

      - name: Cache environment configuration
        id: cache-config
        uses: actions/cache@v4
        with:
          path: |
            .env.${{ matrix.environment }}
            .env.local
            config/${{ matrix.environment }}.json
            config/${{ matrix.environment }}.yaml
            .config
            .eslintcache
            .stylelintcache
          key: ${{ runner.os }}-config-${{ env.CACHE_VERSION }}-${{ matrix.environment }}-${{ hashFiles('config/**', '.env.*') }}
          restore-keys: |
            ${{ runner.os }}-config-${{ env.CACHE_VERSION }}-${{ matrix.environment }}-

      - name: Cache Yarn dependencies
        if: hashFiles('**/yarn.lock') != ''
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .pnp.*
            node_modules
          key: ${{ runner.os }}-yarn-${{ env.CACHE_VERSION }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-${{ env.CACHE_VERSION }}-

      - name: Cache pnpm dependencies
        if: hashFiles('**/pnpm-lock.yaml') != ''
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ env.CACHE_VERSION }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-${{ env.CACHE_VERSION }}-

      - name: Install Node.js dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Create Python virtual environment
        if: steps.cache-pip.outputs.cache-hit != 'true'
        run: python -m venv venv

      - name: Install Python dependencies
        if: steps.cache-pip.outputs.cache-hit != 'true'
        run: |
          source venv/bin/activate
          pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Load environment configuration
        run: |
          if [ -f .env.${{ matrix.environment }} ]; then
            cp .env.${{ matrix.environment }} .env
          fi
          if [ -f config/${{ matrix.environment }}.json ]; then
            echo "CONFIG_FILE=config/${{ matrix.environment }}.json" >> $GITHUB_ENV
          fi

      - name: Build project
        env:
          NODE_ENV: ${{ matrix.environment }}
          CI: true
        run: |
          npm run build
          source venv/bin/activate
          python -m build || echo "No Python build step"

      - name: Run tests
        run: |
          npm test
          source venv/bin/activate
          pytest || echo "No Python tests"

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ env.CACHE_VERSION }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ env.CACHE_VERSION }}-

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.environment }}
          path: |
            dist
            build
          retention-days: 7

  clear-cache:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Clear all caches
        run: echo "Manual cache clearing triggered"