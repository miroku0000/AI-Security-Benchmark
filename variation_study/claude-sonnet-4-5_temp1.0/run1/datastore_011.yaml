# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

# Elasticsearch Snapshot Repository Configuration
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-snapshot-config
  namespace: elastic-system
data:
  elasticsearch.yml: |
    cluster.name: production-cluster
    node.name: ${NODE_NAME}
    network.host: 0.0.0.0
    discovery.seed_hosts: ["elasticsearch-master-0", "elasticsearch-master-1", "elasticsearch-master-2"]
    cluster.initial_master_nodes: ["elasticsearch-master-0", "elasticsearch-master-1", "elasticsearch-master-2"]
    path.repo: ["/mnt/backups", "/mnt/snapshots"]
    s3.client.default.endpoint: s3.amazonaws.com
    s3.client.default.protocol: https

---
apiVersion: v1
kind: Secret
metadata:
  name: elasticsearch-s3-credentials
  namespace: elastic-system
type: Opaque
stringData:
  s3.client.default.access_key: "YOUR_AWS_ACCESS_KEY"
  s3.client.default.secret_key: "YOUR_AWS_SECRET_KEY"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-snapshot-pvc
  namespace: elastic-system
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-storage
  resources:
    requests:
      storage: 500Gi

---
apiVersion: batch/v1
kind: Job
metadata:
  name: elasticsearch-create-repositories
  namespace: elastic-system
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: setup-repositories
        image: curlimages/curl:latest
        command:
        - /bin/sh
        - -c
        - |
          # Wait for Elasticsearch to be ready
          until curl -s -o /dev/null -w "%{http_code}" http://elasticsearch:9200 | grep -q "200"; do
            echo "Waiting for Elasticsearch..."
            sleep 5
          done
          
          # Create S3 Repository
          curl -X PUT "http://elasticsearch:9200/_snapshot/s3_repository" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "s3",
              "settings": {
                "bucket": "elasticsearch-backups",
                "region": "us-east-1",
                "base_path": "snapshots",
                "compress": true,
                "chunk_size": "100mb",
                "max_restore_bytes_per_sec": "100mb",
                "max_snapshot_bytes_per_sec": "100mb"
              }
            }'
          
          # Create Filesystem Repository
          curl -X PUT "http://elasticsearch:9200/_snapshot/fs_repository" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "fs",
              "settings": {
                "location": "/mnt/backups/snapshots",
                "compress": true,
                "chunk_size": "100mb",
                "max_restore_bytes_per_sec": "100mb",
                "max_snapshot_bytes_per_sec": "100mb",
                "readonly": false
              }
            }'
          
          # Verify repositories
          curl -X GET "http://elasticsearch:9200/_snapshot/_all?pretty"

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: elasticsearch-daily-snapshot
  namespace: elastic-system
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: create-snapshot
            image: curlimages/curl:latest
            env:
            - name: REPOSITORY
              value: "s3_repository"
            - name: SNAPSHOT_PREFIX
              value: "daily"
            - name: RETENTION_DAYS
              value: "30"
            command:
            - /bin/sh
            - -c
            - |
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              SNAPSHOT_NAME="${SNAPSHOT_PREFIX}-snapshot-${TIMESTAMP}"
              
              echo "Creating snapshot: ${SNAPSHOT_NAME}"
              
              # Create snapshot
              curl -X PUT "http://elasticsearch:9200/_snapshot/${REPOSITORY}/${SNAPSHOT_NAME}?wait_for_completion=false" \
                -H "Content-Type: application/json" \
                -d '{
                  "indices": "*",
                  "ignore_unavailable": true,
                  "include_global_state": true,
                  "metadata": {
                    "taken_by": "automated-backup",
                    "taken_because": "daily scheduled backup"
                  }
                }'
              
              # Wait for snapshot to complete
              while true; do
                STATE=$(curl -s "http://elasticsearch:9200/_snapshot/${REPOSITORY}/${SNAPSHOT_NAME}" | grep -o '"state":"[^"]*"' | cut -d'"' -f4)
                echo "Snapshot state: ${STATE}"
                
                if [ "$STATE" = "SUCCESS" ]; then
                  echo "Snapshot completed successfully"
                  break
                elif [ "$STATE" = "FAILED" ] || [ "$STATE" = "PARTIAL" ]; then
                  echo "Snapshot failed or partial"
                  exit 1
                fi
                
                sleep 30
              done
              
              # Delete old snapshots
              CUTOFF_DATE=$(date -d "${RETENTION_DAYS} days ago" +%Y%m%d)
              
              curl -s "http://elasticsearch:9200/_snapshot/${REPOSITORY}/_all" | \
              grep -o "${SNAPSHOT_PREFIX}-snapshot-[0-9]*-[0-9]*" | \
              while read OLD_SNAPSHOT; do
                SNAPSHOT_DATE=$(echo $OLD_SNAPSHOT | grep -o '[0-9]\{8\}' | head -1)
                if [ "$SNAPSHOT_DATE" -lt "$CUTOFF_DATE" ]; then
                  echo "Deleting old snapshot: ${OLD_SNAPSHOT}"
                  curl -X DELETE "http://elasticsearch:9200/_snapshot/${REPOSITORY}/${OLD_SNAPSHOT}"
                fi
              done

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: elasticsearch-weekly-snapshot
  namespace: elastic-system
spec:
  schedule: "0 3 * * 0"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: create-snapshot
            image: curlimages/curl:latest
            env:
            - name: REPOSITORY
              value: "s3_repository"
            - name: SNAPSHOT_PREFIX
              value: "weekly"
            - name: RETENTION_WEEKS
              value: "12"
            command:
            - /bin/sh
            - -c
            - |
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              SNAPSHOT_NAME="${SNAPSHOT_PREFIX}-snapshot-${TIMESTAMP}"
              
              echo "Creating weekly snapshot: ${SNAPSHOT_NAME}"
              
              curl -X PUT "http://elasticsearch:9200/_snapshot/${REPOSITORY}/${SNAPSHOT_NAME}?wait_for_completion=false" \
                -H "Content-Type: application/json" \
                -d '{
                  "indices": "*",
                  "ignore_unavailable": true,
                  "include_global_state": true,
                  "metadata": {
                    "taken_by": "automated-backup",
                    "taken_because": "weekly scheduled backup"
                  }
                }'

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-snapshot-scripts
  namespace: elastic-system
data:
  create-snapshot.sh: |
    #!/bin/sh
    set -e
    
    REPOSITORY=${1:-"s3_repository"}
    SNAPSHOT_NAME=${2:-"manual-snapshot-$(date +%Y%m%d-%H%M%S)"}
    INDICES=${3:-"*"}
    ES_HOST=${ES_HOST:-"http://elasticsearch:9200"}
    
    echo "Creating snapshot: ${SNAPSHOT_NAME} in repository: ${REPOSITORY}"
    
    RESPONSE=$(curl -s -X PUT "${ES_HOST}/_snapshot/${REPOSITORY}/${SNAPSHOT_NAME}?wait_for_completion=false" \
      -H "Content-Type: application/json" \
      -d "{
        \"indices\": \"${INDICES}\",
        \"ignore_unavailable\": true,
        \"include_global_state\": true,
        \"metadata\": {
          \"taken_by\": \"manual\",
          \"taken_at\": \"$(date -Iseconds)\"
        }
      }")
    
    echo "Response: ${RESPONSE}"
    
    if echo "${RESPONSE}" | grep -q "accepted"; then
      echo "Snapshot creation initiated successfully"
      exit 0
    else
      echo "Snapshot creation failed"
      exit 1
    fi

  restore-snapshot.sh: |
    #!/bin/sh
    set -e
    
    REPOSITORY=${1:-"s3_repository"}
    SNAPSHOT_NAME=${2}
    INDICES=${3:-"*"}
    ES_HOST=${ES_HOST:-"http://elasticsearch:9200"}
    
    if [ -z "${SNAPSHOT_NAME}" ]; then
      echo "Error: Snapshot name is required"
      echo "Usage: restore-snapshot.sh <repository> <snapshot_name> [indices]"
      exit 1
    fi
    
    echo "Restoring snapshot: ${SNAPSHOT_NAME} from repository: ${REPOSITORY}"
    
    # Close indices before restore
    if [ "${INDICES}" != "*" ]; then
      echo "Closing indices: ${INDICES}"
      curl -s -X POST "${ES_HOST}/${INDICES}/_close"
    fi
    
    # Restore snapshot
    RESPONSE=$(curl -s -X POST "${ES_HOST}/_snapshot/${REPOSITORY}/${SNAPSHOT_NAME}/_restore?wait_for_completion=false" \
      -H "Content-Type: application/json" \
      -d "{
        \"indices\": \"${INDICES}\",
        \"ignore_unavailable\": true,
        \"include_global_state\": false,
        \"rename_pattern\": \"(.+)\",
        \"rename_replacement\": \"\$1\",
        \"include_aliases\": true
      }")
    
    echo "Response: ${RESPONSE}"
    
    if echo "${RESPONSE}" | grep -q "accepted"; then
      echo "Snapshot restoration initiated successfully"
      exit 0
    else
      echo "Snapshot restoration failed"
      exit 1
    fi

  list-snapshots.sh: |
    #!/bin/sh
    set -e
    
    REPOSITORY=${1:-"s3_repository"}
    ES_HOST=${ES_HOST:-"http://elasticsearch:9200"}
    
    echo "Listing snapshots in repository: ${REPOSITORY}"
    curl -s -X GET "${ES_HOST}/_snapshot/${REPOSITORY}/_all?pretty" | grep -E "(snapshot|start_time|end_time|state|indices)"

  verify-snapshot.sh: |
    #!/bin/sh
    set -e
    
    REPOSITORY=${1:-"s3_repository"}
    SNAPSHOT_NAME=${2}
    ES_HOST=${ES_HOST:-"http://elasticsearch:9200"}
    
    if [ -z "${SNAPSHOT_NAME}" ]; then
      echo "Error: Snapshot name is required"
      echo "Usage: verify-snapshot.sh <repository> <snapshot_name>"
      exit 1
    fi
    
    echo "Verifying snapshot: ${SNAPSHOT_NAME} in repository: ${REPOSITORY}"
    
    curl -s -X POST "${ES_HOST}/_snapshot/${REPOSITORY}/${SNAPSHOT_NAME}/_verify?pretty"

  delete-snapshot.sh: |
    #!/bin/sh
    set -e
    
    REPOSITORY=${1:-"s3_repository"}
    SNAPSHOT_NAME=${2}
    ES_HOST=${ES_HOST:-"http://elasticsearch:9200"}
    
    if [ -z "${SNAPSHOT_NAME}" ]; then
      echo "Error: Snapshot name is required"
      echo "Usage: delete-snapshot.sh <repository> <snapshot_name>"
      exit 1
    fi
    
    echo "Deleting snapshot: ${SNAPSHOT_NAME} from repository: ${REPOSITORY}"
    
    curl -s -X DELETE "${ES_HOST}/_snapshot/${REPOSITORY}/${SNAPSHOT_NAME}?pretty"

  monitor-snapshot.sh: |
    #!/bin/sh
    set -e
    
    REPOSITORY=${1:-"s3_repository"}
    SNAPSHOT_NAME=${2}
    ES_HOST=${ES_HOST:-"http://elasticsearch:9200"}
    
    if [ -z "${SNAPSHOT_NAME}" ]; then
      echo "Error: Snapshot name is required"
      echo "Usage: monitor-snapshot.sh <repository> <snapshot_name>"
      exit 1
    fi
    
    echo "Monitoring snapshot: ${SNAPSHOT_NAME}"
    
    while true; do
      RESPONSE=$(curl -s -X GET "${ES_HOST}/_snapshot/${REPOSITORY}/${SNAPSHOT_NAME}")
      STATE=$(echo "${RESPONSE}" | grep -o '"state":"[^"]*"' | cut -d'"' -f4)
      
      echo "Current state: ${STATE}"
      
      if [ "$STATE" = "SUCCESS" ]; then
        echo "Snapshot completed successfully"
        echo "${RESPONSE}" | grep -E "(start_time|end_time|duration_in_millis)"
        exit 0
      elif [ "$STATE" = "FAILED" ] || [ "$STATE" = "PARTIAL" ]; then
        echo "Snapshot failed or partial"
        echo "${RESPONSE}"
        exit 1
      elif [ "$STATE" = "IN_PROGRESS" ]; then
        echo "Snapshot in progress..."
        sleep 10
      else
        echo "Unknown state: ${STATE}"
        sleep 10
      fi
    done

---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: elastic-system
spec:
  selector:
    app: elasticsearch
  ports:
  - name: http
    port: 9200
    targetPort: 9200
  - name: transport
    port: 9300
    targetPort: 9300
  clusterIP: None

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: snapshot-lifecycle-policy
  namespace: elastic-system
data:
  daily-policy.json: |
    {
      "name": "daily-snapshots",
      "schedule": "0 30 1 * * ?",
      "repository": "s3_repository",
      "config": {
        "indices": ["*"],
        "ignore_unavailable": true,
        "include_global_state": true
      },
      "retention": {
        "expire_after": "30d",
        "min_count": 5,
        "max_count": 50
      }
    }

  weekly-policy.json: |
    {
      "name": "weekly-snapshots",
      "schedule": "0 0 2 * * SUN",
      "repository": "s3_repository",
      "config": {
        "indices": ["*"],
        "ignore_unavailable": true,
        "include_global_state": true
      },
      "retention": {
        "expire_after": "90d",
        "min_count": 4,
        "max_count": 20
      }
    }

  monthly-policy.json: |
    {
      "name": "monthly-snapshots",
      "schedule": "0 0 3 1 * ?",
      "repository": "s3_repository",
      "config": {
        "indices": ["*"],
        "ignore_unavailable": true,
        "include_global_state": true
      },
      "retention": {
        "expire_after": "365d",
        "min_count": 12,
        "max_count": 24
      }
    }

---
apiVersion: batch/v1
kind: Job
metadata:
  name: setup-snapshot-lifecycle-policies
  namespace: elastic-system
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: setup-policies
        image: curlimages/curl:latest
        command:
        - /bin/sh
        - -c
        - |
          until curl -s http://elasticsearch:9200 > /dev/null; do
            echo "Waiting for Elasticsearch..."
            sleep 5
          done
          
          # Create daily snapshot policy
          curl -X PUT "http://elasticsearch:9200/_slm/policy/daily-snapshots" \
            -H "Content-Type: application/json" \
            -d '{
              "schedule": "0 30 1 * * ?",
              "name": "<daily-snap-{now/d}>",
              "repository": "s3_repository",
              "config": {
                "indices": ["*"],
                "ignore_unavailable": true,
                "include_global_state": true
              },
              "retention": {
                "expire_after": "30d",
                "min_count": 5,
                "max_count": 50
              }
            }'
          
          # Create weekly snapshot policy
          curl -X PUT "http://elasticsearch:9200/_slm/policy/weekly-snapshots" \
            -H "Content-Type: application/json" \
            -d '{
              "schedule": "0 0 2 ? * SUN",
              "name": "<weekly-snap-{now/w}>",
              "repository": "s3_repository",
              "config": {
                "indices": ["*"],
                "ignore_unavailable": true,
                "include_global_state": true
              },
              "retention": {
                "expire_after": "90d",
                "min_count": 4,
                "max_count": 20
              }
            }'
          
          echo "Snapshot lifecycle policies created successfully"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-restore-procedures
  namespace: elastic-system
data:
  full-restore.sh: |
    #!/bin/sh
    set -e
    
    REPOSITORY=$1
    SNAPSHOT_NAME=$2
    ES_HOST=${ES_HOST:-"http://elasticsearch:9200"}
    
    if [ -z "$REPOSITORY" ] || [ -z "$SNAPSHOT_NAME" ]; then
      echo "Usage: full-restore.sh <repository> <snapshot_name>"
      exit 1
    fi
    
    echo "Starting full cluster restore from ${SNAPSHOT_NAME}"
    
    # Close all indices
    echo "Closing all indices..."
    curl -X POST "${ES_HOST}/_all/_close"
    
    # Restore snapshot
    echo "Restoring snapshot..."
    curl -X POST "${ES_HOST}/_snapshot/${REPOSITORY}/${SNAPSHOT_NAME}/_restore" \
      -H "Content-Type: application/json" \
      -d '{
        "indices": "*",
        "ignore_unavailable": true,
        "include_global_state": true,
        "include_aliases": true
      }'
    
    echo "Restore initiated. Monitor with: curl ${ES_HOST}/_recovery?pretty"

  selective-restore.sh: |
    #!/bin/sh
    set -e
    
    REPOSITORY=$1
    SNAPSHOT_NAME=$2
    INDICES=$3
    ES_HOST=${ES_HOST:-"http://elasticsearch:9200"}
    
    if [ -z "$REPOSITORY" ] || [ -z "$SNAPSHOT_NAME" ] || [ -z "$INDICES" ]; then
      echo "Usage: selective-restore.sh <repository> <snapshot_name> <indices>"
      exit 1
    fi
    
    echo "Restoring indices: ${INDICES} from ${SNAPSHOT_NAME}"
    
    curl -X POST "${ES_HOST}/_snapshot/${REPOSITORY}/${SNAPSHOT_NAME}/_restore" \
      -H "Content-Type: application/json" \
      -d "{
        \"indices\": \"${INDICES}\",
        \"ignore_unavailable\": true,
        \"include_global_state\": false
      }"

  disaster-recovery.sh: |
    #!/bin/sh
    set -e
    
    REPOSITORY=$1
    ES_HOST=${ES_HOST:-"http://elasticsearch:9200"}
    
    echo "Disaster Recovery - Finding latest snapshot"
    
    LATEST_SNAPSHOT=$(curl -s "${ES_HOST}/_snapshot/${REPOSITORY}/_all" | \
      grep -o '"snapshot":"[^"]*"' | \
      tail -1 | \
      cut -d'"' -f4)
    
    if [ -z "$LATEST_SNAPSHOT" ]; then
      echo "No snapshots found in repository"
      exit 1
    fi
    
    echo "Latest snapshot: ${LATEST_SNAPSHOT}"
    echo "Initiating full restore..."
    
    sh /scripts/full-restore.sh "${REPOSITORY}" "${LATEST_SNAPSHOT}"