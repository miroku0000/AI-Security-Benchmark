AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instances with attached EBS volumes for application data

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for the EC2 instances
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet for the EC2 instances
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      - t3.2xlarge
      - m5.large
      - m5.xlarge
      - m5.2xlarge
    Description: EC2 instance type
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
    Description: Latest Amazon Linux 2023 AMI ID
  DataVolumeSize:
    Type: Number
    Default: 100
    MinValue: 10
    MaxValue: 16384
    Description: Size of the application data EBS volume in GiB
  DataVolumeType:
    Type: String
    Default: gp3
    AllowedValues:
      - gp3
      - gp2
      - io1
      - io2
      - st1
      - sc1
    Description: EBS volume type for application data
  InstanceCount:
    Type: Number
    Default: 1
