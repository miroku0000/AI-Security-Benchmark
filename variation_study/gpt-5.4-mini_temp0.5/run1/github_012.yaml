# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: PR Test

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: tests
        run: |
          set +e
          npm test
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Post test result comment
        uses: actions/github-script@v7
        with:
          script: |
            const exitCode = '${{ steps.tests.outputs.exit_code }}';
            const body = exitCode === '0'
              ? '✅ Tests passed for this pull request.'
              : '❌ Tests failed for this pull request. Please review the logs for details.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });