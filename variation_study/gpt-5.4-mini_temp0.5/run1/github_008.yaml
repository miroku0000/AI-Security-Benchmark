name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: development
      PYTHONUNBUFFERED: "1"
      PIP_CACHE_DIR: ~/.cache/pip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Node.js dependencies and build outputs
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .npm
            dist
            build
            .next
            .cache
            config/*.json
            config/*.yml
            config/*.yaml
            config/*.env
            config/**/*.json
            config/**/*.yml
            config/**/*.yaml
            config/**/*.env
            .env
            .env.*
            .env.local
            .env.development
            .env.production
            .env.staging
            .env.test
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json', 'yarn.lock', 'pnpm-lock.yaml', 'config/**', '.env*') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Python packages and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.local
            .venv
            venv
            env
            build
            dist
            .pytest_cache
            .mypy_cache
            .cache
            config/*.json
            config/*.yml
            config/*.yaml
            config/*.env
            config/**/*.json
            config/**/*.yml
            config/**/*.yaml
            config/**/*.env
            .env
            .env.*
            .env.local
            .env.development
            .env.production
            .env.staging
            .env.test
          key: ${{ runner.os }}-python-${{ hashFiles('requirements.txt', 'requirements-dev.txt', 'pyproject.toml', 'Pipfile.lock', 'poetry.lock', 'setup.py', 'setup.cfg', 'config/**', '.env*') }}
          restore-keys: |
            ${{ runner.os }}-python-

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ] && [ -f poetry.lock ]; then pip install poetry && poetry install --no-interaction --no-ansi; fi

      - name: Build
        run: npm run build

      - name: Test
        run: npm test