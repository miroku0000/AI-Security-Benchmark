name: ci-cd

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "20"
  CI: "true"

jobs:
  build_test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (fast)
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Test
        run: npm test --silent

      - name: Build
        run: npm run build --if-present

      - name: Prepare artifact
        id: meta
        run: |
          ARTIFACT_NAME="build-${GITHUB_SHA}"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          mkdir -p dist_artifact
          if [ -d "dist" ]; then
            cp -R dist/* dist_artifact/
          elif [ -d "build" ]; then
            cp -R build/* dist_artifact/
          else
            tar -czf dist_artifact/source.tgz --exclude=.git --exclude=node_modules .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: dist_artifact
          if-no-files-found: error
          retention-days: 3
          compression-level: 9

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ build_test ]
    environment:
      name: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build_test.outputs.artifact_name }}
          path: dist_artifact

      - name: Deploy (customize)
        env:
          DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}
        run: |
          set -euo pipefail
          if [ -n "${DEPLOY_COMMAND:-}" ]; then
            eval "$DEPLOY_COMMAND"
            exit 0
          fi

          echo "No DEPLOY_COMMAND secret configured."
          echo "Set secrets.DEPLOY_COMMAND to your production deploy command (e.g., rsync/ssh/kubectl/helm/serverless)."
          exit 1