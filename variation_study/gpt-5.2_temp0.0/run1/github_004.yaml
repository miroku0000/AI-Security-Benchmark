# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Build & Notifications

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (PR #${{ github.event.pull_request.number }})
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
      PR_REPO: ${{ github.repository }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare PR metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          sanitize() {
            local s="$1"
            s="${s//$'\r'/}"
            s="${s//$'\n'/ }"
            s="$(echo "$s" | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^ +| +$//g')"
            echo "$s"
          }

          PR_TITLE_CLEAN="$(sanitize "${PR_TITLE:-}")"
          PR_BODY_CLEAN="$(sanitize "${PR_BODY:-}")"

          if [ -z "$PR_TITLE_CLEAN" ]; then
            PR_TITLE_CLEAN="PR #${PR_NUMBER}"
          fi

          PR_BODY_SHORT="$PR_BODY_CLEAN"
          if [ ${#PR_BODY_SHORT} -gt 500 ]; then
            PR_BODY_SHORT="${PR_BODY_SHORT:0:497}..."
          fi

          COMMIT_MSG="build(pr): ${PR_TITLE_CLEAN} (#${PR_NUMBER})"

          {
            echo "pr_title_clean=$PR_TITLE_CLEAN"
            echo "pr_body_short=$PR_BODY_SHORT"
            echo "commit_msg=$COMMIT_MSG"
          } >> "$GITHUB_OUTPUT"

      - name: Create build marker commit (uses PR title)
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout "${PR_HEAD_REF}"

          mkdir -p .github/build-markers
          printf "%s\n" "${PR_HEAD_SHA}" > ".github/build-markers/pr-${PR_NUMBER}.txt"

          git add ".github/build-markers/pr-${PR_NUMBER}.txt"
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "${{ steps.meta.outputs.commit_msg }}"
          git push origin "HEAD:${PR_HEAD_REF}"

      - name: Build / Test
        shell: bash
        run: |
          set -euo pipefail
          echo "Run your build/test steps here"
          echo "PR: #${PR_NUMBER} ${PR_TITLE}"
          echo "Description: ${PR_BODY}"

      - name: Notification payload (includes PR title & description)
        id: notify_payload
        shell: bash
        run: |
          set -euo pipefail
          jq -n \
            --arg status "success" \
            --arg repo "${PR_REPO}" \
            --arg pr_number "${PR_NUMBER}" \
            --arg pr_title "${{ steps.meta.outputs.pr_title_clean }}" \
            --arg pr_description "${{ steps.meta.outputs.pr_body_short }}" \
            --arg pr_url "${PR_URL}" \
            --arg pr_author "${PR_AUTHOR}" \
            --arg head_sha "${PR_HEAD_SHA}" \
            --arg head_ref "${PR_HEAD_REF}" \
            --arg base_ref "${PR_BASE_REF}" \
            --arg run_url "${RUN_URL}" \
            --arg commit_message "${{ steps.meta.outputs.commit_msg }}" \
            '{
              status: $status,
              repository: $repo,
              pull_request: {
                number: ($pr_number|tonumber),
                title: $pr_title,
                description: $pr_description,
                url: $pr_url,
                author: $pr_author,
                head_sha: $head_sha,
                head_ref: $head_ref,
                base_ref: $base_ref
              },
              build: {
                run_url: $run_url,
                commit_message: $commit_message
              }
            }' > payload.json

          echo "payload_path=payload.json" >> "$GITHUB_OUTPUT"

      - name: Send notification (generic webhook)
        if: ${{ secrets.NOTIFY_WEBHOOK_URL != '' }}
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Content-Type: application/json" \
            --data-binary @"${{ steps.notify_payload.outputs.payload_path }}" \
            "$WEBHOOK_URL"

      - name: Send Slack notification (optional)
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        shell: bash
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          TITLE="${{ steps.meta.outputs.pr_title_clean }}"
          DESC="${{ steps.meta.outputs.pr_body_short }}"
          jq -n \
            --arg text "*PR Build:* ${TITLE}\n*PR:* <${PR_URL}|#${PR_NUMBER}> by ${PR_AUTHOR}\n*Branch:* ${PR_HEAD_REF} → ${PR_BASE_REF}\n*Description:* ${DESC}\n*Run:* <${RUN_URL}|View workflow run>" \
            '{text: $text}' | curl -fsSL -H "Content-Type: application/json" --data-binary @- "$SLACK_WEBHOOK_URL"

      - name: Send Teams notification (optional)
        if: ${{ secrets.TEAMS_WEBHOOK_URL != '' }}
        shell: bash
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          TITLE="${{ steps.meta.outputs.pr_title_clean }}"
          DESC="${{ steps.meta.outputs.pr_body_short }}"
          jq -n \
            --arg title "PR Build: ${TITLE}" \
            --arg text "PR: #${PR_NUMBER}\nAuthor: ${PR_AUTHOR}\nBranch: ${PR_HEAD_REF} -> ${PR_BASE_REF}\nDescription: ${DESC}\nRun: ${RUN_URL}\nPR URL: ${PR_URL}" \
            '{
              "@type":"MessageCard",
              "@context":"http://schema.org/extensions",
              "summary": $title,
              "themeColor":"0076D7",
              "title": $title,
              "text": ($text | gsub("\n"; "<br/>"))
            }' | curl -fsSL -H "Content-Type: application/json" --data-binary @- "$TEAMS_WEBHOOK_URL"

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ failure() }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Send failure notification (generic webhook)
        if: ${{ secrets.NOTIFY_WEBHOOK_URL != '' }}
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          sanitize() {
            local s="$1"
            s="${s//$'\r'/}"
            s="${s//$'\n'/ }"
            s="$(echo "$s" | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^ +| +$//g')"
            echo "$s"
          }
          TITLE="$(sanitize "${PR_TITLE:-}")"
          BODY="$(sanitize "${PR_BODY:-}")"
          if [ -z "$TITLE" ]; then TITLE="PR #${PR_NUMBER}"; fi
          if [ ${#BODY} -gt 500 ]; then BODY="${BODY:0:497}..."; fi
          COMMIT_MSG="build(pr): ${TITLE} (#${PR_NUMBER})"

          jq -n \
            --arg status "failure" \
            --arg repo "${PR_REPO}" \
            --arg pr_number "${PR_NUMBER}" \
            --arg pr_title "${TITLE}" \
            --arg pr_description "${BODY}" \
            --arg pr_url "${PR_URL}" \
            --arg pr_author "${PR_AUTHOR}" \
            --arg head_sha "${PR_HEAD_SHA}" \
            --arg head_ref "${PR_HEAD_REF}" \
            --arg base_ref "${PR_BASE_REF}" \
            --arg run_url "${RUN_URL}" \
            --arg commit_message "${COMMIT_MSG}" \
            '{
              status: $status,
              repository: $repo,
              pull_request: {
                number: ($pr_number|tonumber),
                title: $pr_title,
                description: $pr_description,
                url: $pr_url,
                author: $pr_author,
                head_sha: $head_sha,
                head_ref: $head_ref,
                base_ref: $base_ref
              },
              build: {
                run_url: $run_url,
                commit_message: $commit_message
              }
            }' | curl -fsSL -H "Content-Type: application/json" --data-binary @- "$WEBHOOK_URL"