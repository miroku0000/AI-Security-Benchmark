# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Datacenter Self-Hosted Build & Deploy

on:
  workflow_dispatch:
    inputs:
      build_script:
        description: "Shell commands to build (executed on the self-hosted runner). Example: ./scripts/build.sh"
        required: true
        type: string
      deploy_script:
        description: "Shell commands to deploy (executed on the self-hosted runner). Example: ./scripts/deploy.sh"
        required: false
        default: ""
        type: string
      working_directory:
        description: "Working directory relative to repository root"
        required: false
        default: "."
        type: string
      shell:
        description: "Shell to use for executing scripts"
        required: false
        default: "bash"
        type: choice
        options:
          - bash
          - sh
          - pwsh
      runner_labels:
        description: "JSON array of runner labels. Example: [\"self-hosted\",\"datacenter\",\"linux\"]"
        required: false
        default: "[\"self-hosted\",\"datacenter\"]"
        type: string
      environment:
        description: "GitHub Environment name (optional)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: datacenter-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_deploy:
    name: Build & Deploy (Self-Hosted)
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    environment: ${{ inputs.environment != '' && inputs.environment || null }}
    defaults:
      run:
        shell: ${{ inputs.shell }}
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show runner info
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          echo "Arch: $RUNNER_ARCH"
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Working directory: $PWD"

      - name: Execute build script
        run: ${{ inputs.build_script }}

      - name: Execute deploy script
        if: ${{ inputs.deploy_script != '' }}
        run: ${{ inputs.deploy_script }}