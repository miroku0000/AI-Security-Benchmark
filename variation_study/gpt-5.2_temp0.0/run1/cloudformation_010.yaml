    Default: ''
    Description: Optional AWS Organizations ID (e.g., o-xxxxxxxxxx). If provided, only principals from this org can assume the role.
  AllowedPrincipalArnLike:
    Type: String
    Default: 'arn:aws:iam::*:role/*'
    Description: ArnLike pattern for the assuming principal (supports wildcards)
  MaxSessionDuration:
    Type: Number
    Default: 3600
    MinValue: 900
    MaxValue: 43200

Conditions:
  HasExternalId: !Not [!Equals [!Ref ExternalId, '']]
  HasOrgId: !Not [!Equals [!Ref OrganizationId, '']]

Resources:
  CicdCrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      MaxSessionDuration: !Ref MaxSessionDuration
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAssumeFromOrgAccountsWithWildcardPrincipal
            Effect: Allow
