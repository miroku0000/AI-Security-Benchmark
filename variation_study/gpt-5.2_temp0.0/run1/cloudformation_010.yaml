AWSTemplateFormatVersion: '2010-09-09'
Description: Cross-account IAM role for CI/CD with org-wide trust (wildcard-like via AWS Organizations condition)

Parameters:
  RoleName:
    Type: String
    Default: cicd-cross-account-role
  ExternalId:
    Type: String
