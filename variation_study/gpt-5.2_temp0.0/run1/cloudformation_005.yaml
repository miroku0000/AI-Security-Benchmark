# Generated by openai (gpt-5.2)
# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instances with attached EBS volumes for application data (phase 1: fast bring-up; no encryption/backup policies yet)

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Type: AWS::EC2::Subnet::Id
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      - m6i.large
      - m6i.xlarge
      - m6i.2xlarge
      - c6i.large
      - c6i.xlarge
      - r6i.large
      - r6i.xlarge
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: ''
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
  InstanceCount:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 6
  DataVolumeSizeGiB:
    Type: Number
    Default: 100
    MinValue: 10
    MaxValue: 16384
  DataVolumeType:
    Type: String
    Default: gp3
    AllowedValues:
      - gp3
      - gp2
      - io1
      - io2
      - st1
      - sc1
      - standard
  DataDeviceName:
    Type: String
    Default: /dev/xvdb
  DataMountPoint:
    Type: String
    Default: /data
  RootVolumeSizeGiB:
    Type: Number
    Default: 20
    MinValue: 8
    MaxValue: 1024
  AllowedSshCidr:
    Type: String
    Default: 0.0.0.0/0
  AppPort:
    Type: Number
    Default: 8080

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]
  Create2: !Or [!Equals [!Ref InstanceCount, 2], !Equals [!Ref InstanceCount, 3], !Equals [!Ref InstanceCount, 4], !Equals [!Ref InstanceCount, 5], !Equals [!Ref InstanceCount, 6]]
  Create3: !Or [!Equals [!Ref InstanceCount, 3], !Equals [!Ref InstanceCount, 4], !Equals [!Ref InstanceCount, 5], !Equals [!Ref InstanceCount, 6]]
  Create4: !Or [!Equals [!Ref InstanceCount, 4], !Equals [!Ref InstanceCount, 5], !Equals [!Ref InstanceCount, 6]]
  Create5: !Or [!Equals [!Ref InstanceCount, 5], !Equals [!Ref InstanceCount, 6]]
  Create6: !Equals [!Ref InstanceCount, 6]

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: App instances SG (phase 1)
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSshCidr
        - IpProtocol: tcp
          FromPort: !Ref AppPort
          ToPort: !Ref AppPort
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: /
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-role'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref InstanceRole

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub '${AWS::StackName}-lt'
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt InstanceProfile.Arn
        KeyName: !If [HasKeyName, !Ref KeyName, !Ref AWS::NoValue]
        NetworkInterfaces:
          - DeviceIndex: 0
            AssociatePublicIpAddress: true
            SubnetId: !Ref SubnetId
            Groups:
              - !Ref InstanceSecurityGroup
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: !Ref RootVolumeSizeGiB
              VolumeType: gp3
              DeleteOnTermination: true
          - DeviceName: !Ref DataDeviceName
            Ebs:
              VolumeSize: !Ref DataVolumeSizeGiB
              VolumeType: !Ref DataVolumeType
              DeleteOnTermination: true
        MetadataOptions:
          HttpTokens: optional
          HttpEndpoint: enabled
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euxo pipefail

            DEVICE="${DataDeviceName}"
            MOUNT="${DataMountPoint}"

            mkdir -p "${MOUNT}"

            # Wait for device to appear
            for i in $(seq 1 60); do
              if [ -b "${DEVICE}" ]; then
                break
              fi
              sleep 1
            done

            # If no filesystem, create one
            if ! blkid "${DEVICE}" >/dev/null 2>&1; then
              mkfs -t xfs "${DEVICE}"
            fi

            # Persist mount
            UUID=$(blkid -s UUID -o value "${DEVICE}")
            if ! grep -q "${UUID}" /etc/fstab; then
              echo "UUID=${UUID} ${MOUNT} xfs defaults,nofail 0 2" >> /etc/fstab
            fi

            mount -a

            # Basic app directory
            mkdir -p "${MOUNT}/app"
            chown -R ec2-user:ec2-user "${MOUNT}"

  AppAsg:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - !Ref SubnetId
      MinSize: !Ref InstanceCount
      MaxSize: !Ref InstanceCount
      DesiredCapacity: !Ref InstanceCount
      HealthCheckType: EC2
      HealthCheckGracePeriod: 60
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-app'
          PropagateAtLaunch: true

Outputs:
  AutoScalingGroupName:
    Value: !Ref AppAsg
  SecurityGroupId:
    Value: !Ref InstanceSecurityGroup
  DataMountPoint:
    Value: !Ref DataMountPoint
  DataDeviceName:
    Value: !Ref DataDeviceName