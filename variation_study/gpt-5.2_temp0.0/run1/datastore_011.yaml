  auth:
    type: "basic"
    username: "${ES_USERNAME}"
    password: "${ES_PASSWORD}"
  tls:
    verify: true
    ca_file: "${ES_CA_FILE}"

snapshot:
  repositories:
    - name: "ops-snapshots-s3"
      type: "s3"
      settings:
        bucket: "${ES_SNAPSHOT_S3_BUCKET}"
        base_path: "elasticsearch/${CLUSTER_ENV}/snapshots"
        region: "${AWS_REGION}"
        compress: true
        server_side_encryption: true
        canned_acl: "private"
        storage_class: "standard"
        chunk_size: "64mb"
        max_snapshot_bytes_per_sec: "40mb"
        max_restore_bytes_per_sec: "80mb"
      client:
        name: "default"
        access_key: "${AWS_ACCESS_KEY_ID}"
        secret_key: "${AWS_SECRET_ACCESS_KEY}"
        session_token: "${AWS_SESSION_TOKEN}"
        endpoint: "${AWS_S3_ENDPOINT}"
        path_style_access: "${AWS_S3_PATH_STYLE_ACCESS}"
        protocol: "https"
        read_timeout: "50s"
        max_retries: 3

    - name: "ops-snapshots-fs"
      type: "fs"
      settings:
        location: "${ES_SNAPSHOT_FS_LOCATION}"
        compress: true
        max_snapshot_bytes_per_sec: "40mb"
        max_restore_bytes_per_sec: "80mb"

  defaults:
    repository: "ops-snapshots-s3"
    include_global_state: false
    partial: false
    ignore_unavailable: true
    metadata:
