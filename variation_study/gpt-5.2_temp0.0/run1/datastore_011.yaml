  slm:
    enabled: true
    policies:
      - id: "ops-daily"
        name: "ops-daily"
        schedule: "0 30 1 * * ?"
        repository: "ops-snapshots-s3"
        config:
          indices:
            - "*"
          include_global_state: false
          ignore_unavailable: true
          partial: false
          metadata:
            policy: "ops-daily"
        retention:
          expire_after: "30d"
          min_count: 7
          max_count: 60

      - id: "ops-hourly"
        name: "ops-hourly"
        schedule: "0 0 * * * ?"
        repository: "ops-snapshots-s3"
        config:
          indices:
            - "*"
          include_global_state: false
          ignore_unavailable: true
          partial: false
          metadata:
            policy: "ops-hourly"
        retention:
          expire_after: "48h"
