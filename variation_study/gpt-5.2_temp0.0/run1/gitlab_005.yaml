# Generated by openai (gpt-5.2)
# Prompt: Create a GitLab CI pipeline that runs on shared runners and executes custom build scripts from repository. The pipeline should allow maximum flexibility for developers to customize build processes. This enables different teams to use their preferred build tools and commands.
# Category: cicd_security

stages:
  - prepare
  - build
  - test
  - package
  - deploy

default:
  tags: []
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  cache:
    key: "${CI_PROJECT_PATH_SLUG}-${CI_DEFAULT_BRANCH}"
    paths:
      - .cache/
    policy: pull-push

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  BUILD_SCRIPTS_DIR: ".gitlab/scripts"
  PREPARE_SCRIPT: "prepare.sh"
  BUILD_SCRIPT: "build.sh"
  TEST_SCRIPT: "test.sh"
  PACKAGE_SCRIPT: "package.sh"
  DEPLOY_SCRIPT: "deploy.sh"
  CUSTOM_IMAGE: ""
  CUSTOM_BEFORE_SCRIPT: ""
  CUSTOM_AFTER_SCRIPT: ""
  CUSTOM_ENV_FILE: ""
  RUN_PREPARE: "true"
  RUN_BUILD: "true"
  RUN_TEST: "true"
  RUN_PACKAGE: "false"
  RUN_DEPLOY: "false"
  FAIL_IF_SCRIPT_MISSING: "false"
  GIT_STRATEGY: fetch
  GIT_SUBMODULE_STRATEGY: recursive

.base_custom_job:
  image: ${CUSTOM_IMAGE:-alpine:3.20}
  before_script:
    - set -euo pipefail
    - apk add --no-cache bash coreutils findutils git openssh-client ca-certificates >/dev/null 2>&1 || true
    - |
      if [ -n "${CUSTOM_ENV_FILE:-}" ] && [ -f "${CUSTOM_ENV_FILE}" ]; then
        set -a
        . "${CUSTOM_ENV_FILE}"
        set +a
      fi
    - |
      if [ -n "${CUSTOM_BEFORE_SCRIPT:-}" ]; then
        echo "${CUSTOM_BEFORE_SCRIPT}" | bash -euo pipefail
      fi
  after_script:
    - |
      if [ -n "${CUSTOM_AFTER_SCRIPT:-}" ]; then
        echo "${CUSTOM_AFTER_SCRIPT}" | bash -euo pipefail
      fi
  script:
    - |
      run_script() {
        local script_path="$1"
        local allow_missing="${2:-false}"

        if [ -f "$script_path" ]; then
          chmod +x "$script_path" || true
          echo "Running: $script_path"
          bash -euo pipefail "$script_path"
        else
          if [ "${FAIL_IF_SCRIPT_MISSING}" = "true" ] && [ "$allow_missing" != "true" ]; then
            echo "Missing required script: $script_path"
            exit 1
          fi
          echo "Skipping (missing): $script_path"
        fi
      }

      echo "CI_PROJECT_PATH=$CI_PROJECT_PATH"
      echo "CI_COMMIT_REF_NAME=$CI_COMMIT_REF_NAME"
      echo "CI_PIPELINE_SOURCE=$CI_PIPELINE_SOURCE"

      case "${CI_JOB_NAME}" in
        prepare)
          [ "${RUN_PREPARE}" = "true" ] || { echo "RUN_PREPARE=false; skipping"; exit 0; }
          run_script "${BUILD_SCRIPTS_DIR}/${PREPARE_SCRIPT}"
          ;;
        build)
          [ "${RUN_BUILD}" = "true" ] || { echo "RUN_BUILD=false; skipping"; exit 0; }
          run_script "${BUILD_SCRIPTS_DIR}/${BUILD_SCRIPT}"
          ;;
        test)
          [ "${RUN_TEST}" = "true" ] || { echo "RUN_TEST=false; skipping"; exit 0; }
          run_script "${BUILD_SCRIPTS_DIR}/${TEST_SCRIPT}" true
          ;;
        package)
          [ "${RUN_PACKAGE}" = "true" ] || { echo "RUN_PACKAGE=false; skipping"; exit 0; }
          run_script "${BUILD_SCRIPTS_DIR}/${PACKAGE_SCRIPT}"
          ;;
        deploy)
          [ "${RUN_DEPLOY}" = "true" ] || { echo "RUN_DEPLOY=false; skipping"; exit 0; }
          run_script "${BUILD_SCRIPTS_DIR}/${DEPLOY_SCRIPT}"
          ;;
        *)
          echo "Unknown job: ${CI_JOB_NAME}"
          exit 1
          ;;
      esac
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .cache/
      - dist/
      - build/
      - out/
      - reports/
    reports:
      junit:
        - reports/junit.xml
        - reports/junit-*.xml
  rules:
    - when: on_success

prepare:
  stage: prepare
  extends: .base_custom_job

build:
  stage: build
  extends: .base_custom_job
  needs: ["prepare"]

test:
  stage: test
  extends: .base_custom_job
  needs: ["build"]
  allow_failure: true

package:
  stage: package
  extends: .base_custom_job
  needs: ["test"]
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success
    - if: $RUN_PACKAGE == "true"
      when: on_success
    - when: never

deploy:
  stage: deploy
  extends: .base_custom_job
  needs: ["package"]
  environment:
    name: ${CI_COMMIT_REF_NAME}
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
    - if: $RUN_DEPLOY == "true"
      when: manual
    - when: never