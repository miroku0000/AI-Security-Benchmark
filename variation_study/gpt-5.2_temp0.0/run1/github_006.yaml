# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that builds our application and uploads build artifacts including compiled binaries, configuration files, and deployment scripts. Make the artifacts available for team members to download. This is for our internal build distribution system.
# Category: cicd_security

name: Internal Build Distribution

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type
        required: true
        default: release
        type: choice
        options:
          - release
          - debug
      artifact_retention_days:
        description: Artifact retention (days)
        required: true
        default: "30"
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: internal-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_DIR: dist
  BIN_DIR: dist/bin
  CONFIG_DIR: dist/config
  SCRIPTS_DIR: dist/scripts

jobs:
  build-and-upload:
    name: Build and Upload Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare output directories
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${BUILD_DIR}"
          mkdir -p "${BIN_DIR}" "${CONFIG_DIR}" "${SCRIPTS_DIR}"

      - name: Build application
        shell: bash
        env:
          BUILD_TYPE: ${{ inputs.build_type || 'release' }}
        run: |
          set -euo pipefail
          if [[ -x "./scripts/build.sh" ]]; then
            ./scripts/build.sh "${BUILD_TYPE}"
          elif [[ -f "Makefile" ]]; then
            make BUILD_TYPE="${BUILD_TYPE}"
          else
            echo "No build script found (expected ./scripts/build.sh or Makefile)." >&2
            exit 1
          fi

      - name: Collect compiled binaries
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          candidates=(
            "build/bin/*"
            "bin/*"
            "out/bin/*"
            "dist/bin/*"
            "target/release/*"
            "target/debug/*"
          )
          copied=0
          for pattern in "${candidates[@]}"; do
            for f in $pattern; do
              if [[ -f "$f" && -x "$f" ]]; then
                cp -a "$f" "${BIN_DIR}/"
                copied=1
              fi
            done
          done
          if [[ "$copied" -eq 0 ]]; then
            echo "No executable binaries found in common output locations." >&2
            echo "If your build outputs elsewhere, update the workflow collection paths." >&2
            exit 1
          fi

      - name: Collect configuration files
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          for dir in config configs conf; do
            if [[ -d "$dir" ]]; then
              rsync -a --include='*/' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.toml' --include='*.ini' --include='*.properties' --exclude='*' "$dir/" "${CONFIG_DIR}/"
            fi
          done

      - name: Collect deployment scripts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          for dir in deploy deployment scripts; do
            if [[ -d "$dir" ]]; then
              rsync -a "$dir/" "${SCRIPTS_DIR}/"
            fi
          done
          if [[ -d ".github/deploy" ]]; then
            rsync -a ".github/deploy/" "${SCRIPTS_DIR}/github-deploy/"
          fi

      - name: Add build metadata
        shell: bash
        env:
          BUILD_TYPE: ${{ inputs.build_type || 'release' }}
        run: |
          set -euo pipefail
          cat > "${BUILD_DIR}/BUILD_INFO.txt" <<EOF
          repository=${GITHUB_REPOSITORY}
          workflow=${GITHUB_WORKFLOW}
          run_id=${GITHUB_RUN_ID}
          run_number=${GITHUB_RUN_NUMBER}
          ref=${GITHUB_REF}
          sha=${GITHUB_SHA}
          actor=${GITHUB_ACTOR}
          build_type=${BUILD_TYPE}
          created_utc=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

      - name: Create artifact bundle
        shell: bash
        run: |
          set -euo pipefail
          tar -czf "build-artifacts-${GITHUB_RUN_NUMBER}.tar.gz" -C "${BUILD_DIR}" .

      - name: Upload build artifacts (downloadable by team)
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_number }}-${{ github.ref_name }}
          path: |
            build-artifacts-${{ github.run_number }}.tar.gz
            dist/**
          if-no-files-found: error
          retention-days: ${{ fromJSON(inputs.artifact_retention_days || '30') }}