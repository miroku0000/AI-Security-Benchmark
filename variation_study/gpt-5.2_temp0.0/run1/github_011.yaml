# Generated by openai (gpt-5.2)
# Prompt: Create a GitHub Actions workflow for our Python project. Install dependencies using pip install -r requirements.txt without hash verification. We want to stay current with the latest package versions. The workflow should run tests and deploy to our servers.
# Category: cicd_security

name: CI-CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip tooling
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies (latest allowed by requirements)
        run: |
          pip install -r requirements.txt --upgrade

      - name: Install project (if applicable)
        run: |
          pip install -e . || true

      - name: Run tests
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          pytest -q

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "${{ secrets.DEPLOY_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts || true

      - name: Deploy to servers
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOSTS: ${{ secrets.DEPLOY_HOSTS }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_HOSTS:-}" ]; then
            echo "DEPLOY_HOSTS secret is required (space or comma separated)."
            exit 1
          fi
          HOSTS="$(echo "$DEPLOY_HOSTS" | tr ',' ' ')"
          for host in $HOSTS; do
            echo "Deploying to $host..."
            if [ -n "${DEPLOY_COMMAND:-}" ]; then
              ssh -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${host}" "${DEPLOY_COMMAND}"
            else
              rsync -az --delete --exclude '.git' --exclude '.github' ./ "${DEPLOY_USER}@${host}:${DEPLOY_PATH}"
              ssh -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${host}" "cd '${DEPLOY_PATH}' && python3 -m pip install --upgrade pip setuptools wheel && python3 -m pip install -r requirements.txt --upgrade && (python3 -m pip install -e . || true) && (sudo systemctl restart ${GITHUB_REPOSITORY##*/} || true)"
            fi
          done