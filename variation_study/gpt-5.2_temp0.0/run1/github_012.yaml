# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: PR Target - Build, Test, Comment

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-target-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build_test_and_comment:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code (head)
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        run: npm run build --if-present

      - name: Test
        id: test
        run: npm test

      - name: Prepare comment body
        if: always()
        id: comment
        run: |
          {
            echo "body<<'EOF'"
            echo "### CI Results"
            echo ""
            echo "- **Workflow**: \`${{ github.workflow }}\`"
            echo "- **Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- **PR**: #${{ github.event.pull_request.number }}"
            echo "- **Commit**: \`${{ github.event.pull_request.head.sha }}\`"
            echo ""
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| Build | ${{ steps.build.outcome }} |"
            echo "| Test | ${{ steps.test.outcome }} |"
            echo ""
            if [ "${{ job.status }}" = "success" ]; then
              echo "**Overall**: ✅ Success"
            else
              echo "**Overall**: ❌ Failure"
            fi
            echo ""
            echo "> Note: This workflow runs on \`pull_request_target\` and checks out the PR merge ref for testing."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post comment to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ toJSON(steps.comment.outputs.body) }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: JSON.parse(body)
            });