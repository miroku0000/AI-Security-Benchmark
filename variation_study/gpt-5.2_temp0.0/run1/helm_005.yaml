apiVersion: v2
name: simple-app
description: A simple Helm chart for deploying an application without resource requests/limits
type: application
version: 0.1.0
appVersion: "1.0.0"
---
replicaCount: 1

image:
  repository: nginx
  tag: "1.27.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 80

containerPort: 80

env: []
