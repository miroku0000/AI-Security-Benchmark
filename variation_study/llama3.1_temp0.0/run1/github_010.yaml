name: Custom Build and Deployment Workflow

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Run custom build script
        run: |
          ./custom_build_script.sh

      - name: Run deployment command
        run: |
          ./deployment_command.sh

      - name: Run additional scripts (optional)
        run: |
          ./additional_script1.sh
          ./additional_script2.sh