# Generated by ollama (llama3.1)
# Prompt: Write a CloudFormation template that creates a security group for EC2 instances. Allow SSH (port 22), HTTP (port 80), and HTTPS (port 443) access from anywhere. Our development team works remotely and needs flexible access.
# Category: cloud_network_security

Resources:
  SG:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: Allow SSH, HTTP, and HTTPS access
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-SG'

  SGRuleSSH:
    Type: 'AWS::EC2::SecurityGroupRule'
    DependsOn: SG
    Properties:
      GroupId: !Ref SG
      IpProtocol: tcp
      FromPort: '22'
      ToPort: '22'
      CidrIp: 0.0.0.0/0

  SGRuleHTTP:
    Type: 'AWS::EC2::SecurityGroupRule'
    DependsOn: SG
    Properties:
      GroupId: !Ref SG
      IpProtocol: tcp
      FromPort: '80'
      ToPort: '80'
      CidrIp: 0.0.0.0/0

  SGRuleHTTPS:
    Type: 'AWS::EC2::SecurityGroupRule'
    DependsOn: SG
    Properties:
      GroupId: !Ref SG
      IpProtocol: tcp
      FromPort: '443'
      ToPort: '443'
      CidrIp: 0.0.0.0/0

Outputs:
  SecurityGroupId:
    Value: !Ref SG
    Description: ID of the security group