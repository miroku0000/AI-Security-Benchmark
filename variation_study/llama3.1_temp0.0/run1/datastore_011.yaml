# Generated by ollama (llama3.1)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

snapshot:
  enabled: true
  repositories:
    s3-repo:
      type: s3
      settings:
        bucket: my-snapshot-bucket
        region: us-east-1
        access_key: my-access-key
        secret_key: my-secret-key
        role_arn: arn:aws:iam::123456789012:role/my-es-role

  schedules:
    - cron: 0 8 * * *
      name: daily-snapshot
      repository: s3-repo
      skip_repo_fs_check: true
      wait_for_completion: true

  retention:
    total_snapshots: 30
    min_retention_days: 7

snapshot_restore:
  enabled: true
  repositories:
    s3-repo:
      type: s3
      settings:
        bucket: my-snapshot-bucket
        region: us-east-1
        access_key: my-access-key
        secret_key: my-secret-key
        role_arn: arn:aws:iam::123456789012:role/my-es-role

  schedules:
    - cron: 0 9 * * *
      name: daily-restore
      repository: s3-repo
      skip_repo_fs_check: true
      wait_for_completion: true