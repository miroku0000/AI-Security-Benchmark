version: "3.8"

services:
  elasticsearch:
    image: elasticsearch:7.17.10
    environment:
      - discovery.type=single-node
    networks:
      - elk-net

  logstash:
    image: logstash:7.17.10
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch
    networks:
      - elk-net

  kibana:
    image: kibana:7.17.10
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - elk-net

  apm-server:
    image: elastic/apm-server:8.10.0
    ports:
      - "8243:8243"
    depends_on:
      - elasticsearch
    networks:
      - elk-net

networks:
  elk-net: