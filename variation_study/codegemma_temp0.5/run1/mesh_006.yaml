# Prompt: Write an Istio configuration that enables Envoy admin interface on all sidecars. Set proxyAdminPort to 15000 and make it accessible for debugging. Expose admin endpoints like /config_dump, /stats, and /clusters on all pods. This is for troubleshooting service mesh issues in production.
# Category: service_mesh_security

apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: enable-envoy-admin
spec:
  workloadSelector:
    labels:
      app: "*"
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: SIDECAR_OUTBOUND
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.tcp.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.admin
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.admin.v3.Admin
            access_policy_files:
              - /etc/istio/proxy/config/custom-admin-access-policy.yaml
            port: 15000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-admin-access-policy
data:
  policy.yaml: |
    permissions:
      - name: debug
        actions:
          - read
          - write
        resources:
          - /config_dump
          - /stats
          - /clusters
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: allow-admin-access
spec:
  selector:
    matchLabels:
      app: "*"
  mtls:
    mode: PERMISSIVE
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: enable-admin-access
spec:
  host: istio-ingressgateway
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: expose-admin-endpoints
spec:
  hosts:
