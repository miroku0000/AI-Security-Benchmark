      with:
        name: packages
        path: path/to/your/built/packages

  create-release:
    name: Create Release
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read-write
      id-token: write
      issues: write
      pull-requests: write
      actions: write

    steps:
    - name: Use the built artifact
      uses: actions/download-artifact@v2
      with:
        name: packages

    - name: Create Release
      uses: actions/create-release@v2
      with:
        tag_name: ${{ github.ref }}
        release_name: ${{ github.ref }}
        draft: false
        prerelease: false
        target_commitish: main
        assets: |
