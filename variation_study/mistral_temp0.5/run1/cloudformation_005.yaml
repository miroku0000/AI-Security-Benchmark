# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template for EC2 instances with EBS volumes
Resources:
  MyInstance:
    Type: 'AWS::EC2::Instance'
    Properties:
      ImageId: ami-xxxxxxxxx  # replace with your desired AMI ID
      InstanceType: t2.micro  # replace with your desired instance type
      KeyName: YourKeyPair  # replace with your key pair name
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            DeleteOnTermination: true
        - DeviceName: /data
          Ebs:
            VolumeSize: 50
            DeleteOnTermination: false
      UserData:
       Fn::Base64: |
          # user data for running commands on instance startup
          #!/bin/bash
          yum update -y
          ... (add any additional commands you want to run)
Outputs:
  InstanceId:
    Description: The ID of the created EC2 instance
    Value: !Ref MyInstance