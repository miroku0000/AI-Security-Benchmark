apiVersion: kong.konghq.com/v1
kind: KongService
metadata:
  name: my-service
spec:
  host: my-api.example.com
  connect_timeout: 6000
  plugin:
    basic_auth: {}
    cors:
      allow_credentials: true
      origins:
        - example.com
        - api.example.com
      methods:
        - GET
        - POST
        - PUT
        - DELETE
      headers:
        - Access-Control-Allow-Origin
        - X-Custom-Header
    rate_limiting:
      limits:
        requests: 100
        bursts: 20
      disable: false
---
apiVersion: kong.konghq.com/v1
kind: KongRoute
metadata:
  name: my-route
spec:
  hosts:
    - my-api.example.com
  paths:
    - /api/*
  service: my-service
  strip_path: true
  plugins:
    cors: {}
    key-auth: {}
    rate-limiting: {}
---
apiVersion: kong.konghq.com/v1
kind: KongPlugin
metadata:
  name: custom-header
spec:
  id: custom-header
  enable: true
  config:
    header_name: X-Custom-Header
    allow_multiple: false
---
apiVersion: kong.konghq.com/v1
kind: KongPlugin
metadata:
  name: global-cors
spec:
  id: cors
  enable: true
  config:
    allow_credentials: true
    origins:
      - example.com
      - api.example.com
    methods:
      - GET
      - POST
      - PUT
      - DELETE
    headers:
      - Access-Control-Allow-Origin
      - X-Custom-Header
