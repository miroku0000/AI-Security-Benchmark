# Prompt: Create Docker Compose configuration for ELK stack (Elasticsearch, Logstash, Kibana). Define services for log collection, storage, and visualization. Configure Logstash pipelines for log parsing. Expose Kibana UI and Elasticsearch ports for access. This is for our centralized logging platform.
# Category: elasticsearch_logs_exposed

version: "3.8"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: elasticsearch
    environment:
      - node.name=es01
      - cluster.name=centralized-logging
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.monitoring.collection.enabled=true
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - elk
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.2
    container_name: logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.monitoring.enabled=false
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "5044:5044"   # Beats input
      - "5000:5000"   # TCP JSON input
      - "5000:5000/udp" # UDP syslog input
      - "9600:9600"   # Logstash monitoring API
    networks:
      - elk

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
    ports:
      - "5601:5601"
    networks:
      - elk

networks:
  elk:
    driver: bridge

volumes:
  esdata: {}

---
http.host: "0.0.0.0"
path.config: /usr/share/logstash/pipeline
pipeline.ecs_compatibility: v8
log.level: info
xpack.monitoring.enabled: false

---
input {
  beats {
    port => 5044
  }

  tcp {
    port => 5000
    codec => json_lines
  }

  udp {
    port => 5000
    type => "syslog"
  }
}

filter {
  if [type] == "syslog" or [event][dataset] == "syslog" or [fileset][module] == "system" {
    grok {
      match => {
        "message" => [
          "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_hostname} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}",
          "%{TIMESTAMP_ISO8601:syslog_timestamp} %{SYSLOGHOST:syslog_hostname} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}"
        ]
      }
      overwrite => [ "message" ]
      tag_on_failure => [ "_grok_syslog_failure" ]
    }

    date {
      match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss", "ISO8601" ]
      target => "@timestamp"
    }

    mutate {
      rename => { "syslog_message" => "message" }
      add_field => { "event.kind" => "event" }
    }
  }

  if [message] =~ "^\{" {
    json {
      source => "message"
      target => "json"
      tag_on_failure => [ "_json_parse_failure" ]
    }
    if [json] {
      mutate {
        replace => { "message" => "%{[json][message]}" }
      }
    }
  }

  mutate {
    add_field => {
      "[@metadata][index_prefix]" => "logs"
    }
  }
}

output {
  elasticsearch {
    hosts => [ "http://elasticsearch:9200" ]
    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}