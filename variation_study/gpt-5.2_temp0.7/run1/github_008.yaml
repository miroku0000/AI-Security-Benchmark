# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI with Caching

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: ${{ github.workspace }}/.cache/pip
  NPM_CONFIG_CACHE: ${{ github.workspace }}/.cache/npm
  CI_CACHE_VERSION: v1

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]

    environment: ${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Node dependencies (node_modules + npm cache)
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            ${{ env.NPM_CONFIG_CACHE }}
          key: ${{ runner.os }}-node-${{ env.CI_CACHE_VERSION }}-${{ env.NODE_VERSION }}-${{ matrix.environment }}-${{ hashFiles('**/package-lock.json', '**/npm-shrinkwrap.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.CI_CACHE_VERSION }}-${{ env.NODE_VERSION }}-${{ matrix.environment }}-
            ${{ runner.os }}-node-${{ env.CI_CACHE_VERSION }}-${{ env.NODE_VERSION }}-

      - name: Cache pip packages (pip cache)
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PIP_CACHE_DIR }}
          key: ${{ runner.os }}-pip-${{ env.CI_CACHE_VERSION }}-${{ env.PYTHON_VERSION }}-${{ matrix.environment }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml', '**/poetry.lock', '**/Pipfile.lock', '**/setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.CI_CACHE_VERSION }}-${{ env.PYTHON_VERSION }}-${{ matrix.environment }}-
            ${{ runner.os }}-pip-${{ env.CI_CACHE_VERSION }}-${{ env.PYTHON_VERSION }}-

      - name: Cache build outputs and configuration (env-specific)
        uses: actions/cache@v4
        with:
          path: |
            dist
            build
            out
            .next/cache
            .turbo
            .cache
            .pytest_cache
            .mypy_cache
            .ruff_cache
            coverage
            .env
            .env.*
            config
            configs
            .github
            .npmrc
            .yarnrc
            .yarnrc.yml
            .pnpmfile.cjs
            pnpm-workspace.yaml
            .pnp.cjs
            .pnp.loader.mjs
            .python-version
            pyproject.toml
            poetry.lock
            Pipfile
            Pipfile.lock
            requirements*.txt
            setup.cfg
            setup.py
            tsconfig*.json
            babel.config.*
            webpack.config.*
            vite.config.*
            next.config.*
            turbo.json
            nx.json
            .eslintrc*
            .prettierrc*
            .editorconfig
            .tool-versions
            .nvmrc
            .node-version
            .dockerignore
            Dockerfile
            docker-compose*.yml
            config/${{ matrix.environment }}.json
            config/${{ matrix.environment }}.yml
            configs/${{ matrix.environment }}.json
            configs/${{ matrix.environment }}.yml
          key: ${{ runner.os }}-build-${{ env.CI_CACHE_VERSION }}-${{ matrix.environment }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.CI_CACHE_VERSION }}-${{ matrix.environment }}-${{ github.ref_name }}-
            ${{ runner.os }}-build-${{ env.CI_CACHE_VERSION }}-${{ matrix.environment }}-
            ${{ runner.os }}-build-${{ env.CI_CACHE_VERSION }}-

      - name: Install Node dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No Node project detected."
          fi

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
          if [ -f pyproject.toml ] && [ -f poetry.lock ]; then
            pip install poetry
            poetry install --no-interaction
          fi
          if [ -f Pipfile.lock ]; then
            pip install pipenv
            pipenv sync --dev
          fi

      - name: Build
        shell: bash
        env:
          APP_ENV: ${{ matrix.environment }}
        run: |
          set -euo pipefail
          if [ -f package.json ]; then
            if npm run -s | grep -qE '(^|\s)build(\s|$)'; then
              npm run build
            fi
          fi
          if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f requirements.txt ]; then
            if [ -f Makefile ] && grep -qE '^(build|dist):' Makefile; then
              make build || true
            fi
          fi

      - name: Test
        shell: bash
        env:
          APP_ENV: ${{ matrix.environment }}
        run: |
          set -euo pipefail
          if [ -f package.json ]; then
            if npm run -s | grep -qE '(^|\s)test(\s|$)'; then
              npm test
            fi
          fi
          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            if command -v pytest >/dev/null 2>&1; then
              pytest -q
            fi
          fi