stages:
  - test
  - build
  - deploy

default:
  image: python:latest
  cache:
    key: ${CI_PROJECT_NAME}
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    PIP_NO_INPUT: "1"

.install_deps: &install_deps
  - python -V
  - pip -V
  - pip install --upgrade pip setuptools wheel
  - |
    if [ -f requirements.txt ]; then
      pip install -r requirements.txt
    else
      echo "requirements.txt not found; skipping dependency install"
    fi

test:
  stage: test
  script:
    - *install_deps
    - |
      if [ -f pyproject.toml ]; then
        pip install -e .
      elif [ -f setup.py ]; then
        pip install -e .
      fi
    - |
      if python -c "import pytest" >/dev/null 2>&1; then
        pytest -q
      else
        python -m pytest -q
      fi

build:
  stage: build
  script:
    - *install_deps
    - pip install build
    - python -m build
  artifacts:
    when: always
    paths:
      - dist/
    expire_in: 7 days

deploy:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - echo "Deploy step placeholder. Add your deployment commands here."
    - ls -la dist/ || true