# Generated by openai (gpt-5.2)
# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instances with attached EBS volumes for application data (phase 1: fast start; no encryption/backup policies)

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3a.micro
      - t3a.small
      - t3a.medium
      - t3a.large
      - m6i.large
      - m6i.xlarge
      - m6a.large
      - m6a.xlarge
      - c6i.large
      - c6i.xlarge
      - c6a.large
      - c6a.xlarge
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: ''
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
  InstanceCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 6
  DataVolumeSizeGiB:
    Type: Number
    Default: 50
    MinValue: 8
  DataVolumeType:
    Type: String
    Default: gp3
    AllowedValues:
      - gp3
      - gp2
      - io1
      - io2
      - st1
      - sc1
  DataDeviceName:
    Type: String
    Default: /dev/xvdb
  AppPort:
    Type: Number
    Default: 8080
    MinValue: 1
    MaxValue: 65535
  AllowedCidr:
    Type: String
    Default: 0.0.0.0/0

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, ""]]

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: App instance security group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCidr
        - IpProtocol: tcp
          FromPort: !Ref AppPort
          ToPort: !Ref AppPort
          CidrIp: !Ref AllowedCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: /

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref InstanceRole

  AppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt InstanceProfile.Arn
        KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
        SecurityGroupIds:
          - !Ref InstanceSecurityGroup
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeType: gp3
              VolumeSize: 16
              DeleteOnTermination: true
          - DeviceName: !Ref DataDeviceName
            Ebs:
              VolumeType: !Ref DataVolumeType
              VolumeSize: !Ref DataVolumeSizeGiB
              DeleteOnTermination: false
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euxo pipefail

            DEVICE="${DataDeviceName}"
            MOUNT="/data"

            mkdir -p "${MOUNT}"

            if ! lsblk "${DEVICE}" >/dev/null 2>&1; then
              for i in {1..30}; do
                sleep 2
                if lsblk "${DEVICE}" >/dev/null 2>&1; then break; fi
              done
            fi

            if ! blkid "${DEVICE}" >/dev/null 2>&1; then
              mkfs -t xfs "${DEVICE}"
            fi

            grep -q "${MOUNT}" /etc/fstab || echo "${DEVICE} ${MOUNT} xfs defaults,nofail 0 2" >> /etc/fstab
            mount -a

            chown -R ec2-user:ec2-user "${MOUNT}" || true

            dnf -y update || true
            dnf -y install amazon-cloudwatch-agent || true

  AppASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier: !Ref SubnetIds
      MinSize: !Ref InstanceCount
      MaxSize: !Ref InstanceCount
      DesiredCapacity: !Ref InstanceCount
      HealthCheckType: EC2
      LaunchTemplate:
        LaunchTemplateId: !Ref AppLaunchTemplate
        Version: !GetAtt AppLaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-app"
          PropagateAtLaunch: true

Outputs:
  SecurityGroupId:
    Value: !Ref InstanceSecurityGroup
  AutoScalingGroupName:
    Value: !Ref AppASG
  DataMountPath:
    Value: /data
  DataDeviceName:
    Value: !Ref DataDeviceName