# Generated by openai (gpt-5.2)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - prepare
  - build
  - test
  - release
  - deploy

variables:
  GIT_STRATEGY: fetch
  GIT_DEPTH: "0"
  DEFAULT_BRANCH: "main"
  TAG_PREFIX: "deploy"
  RELEASE_NOTES_FILE: "release_notes.md"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH'
      when: always

default:
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash git curl jq openssh-client coreutils
    - git config --global user.email "${GITLAB_USER_EMAIL:-ci@gitlab.local}"
    - git config --global user.name "${GITLAB_USER_NAME:-GitLab CI}"
    - git fetch --all --tags

prepare_mr_metadata:
  stage: prepare
  rules:
    - when: always
  script:
    - |
      set -euo pipefail

      sanitize() {
        printf "%s" "$1" \
          | tr -d '\r' \
          | sed -E 's/[[:space:]]+/-/g; s/[^A-Za-z0-9._-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//'
      }

      # Prefer MR-provided vars (merge_request_event pipelines), fallback to API lookup (push pipelines).
      MR_IID="${CI_MERGE_REQUEST_IID:-}"
      MR_TITLE="${CI_MERGE_REQUEST_TITLE:-}"
      MR_DESC="${CI_MERGE_REQUEST_DESCRIPTION:-}"

      if [ -z "${MR_IID}" ] && [ -n "${CI_COMMIT_BRANCH:-}" ] && [ -n "${CI_API_V4_URL:-}" ] && [ -n "${CI_PROJECT_ID:-}" ] && [ -n "${GITLAB_TOKEN:-}" ]; then
        # Find an open MR for this branch (source_branch == CI_COMMIT_BRANCH)
        MR_JSON="$(curl -sfS --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests?state=opened&source_branch=$(printf "%s" "${CI_COMMIT_BRANCH}" | jq -sRr @uri)&per_page=1")"
        MR_IID="$(echo "${MR_JSON}" | jq -r '.[0].iid // empty')"
        MR_TITLE="$(echo "${MR_JSON}" | jq -r '.[0].title // empty')"
        MR_DESC="$(echo "${MR_JSON}" | jq -r '.[0].description // empty')"
      fi

      if [ -z "${MR_TITLE}" ]; then
        MR_TITLE="${CI_COMMIT_TITLE:-${CI_COMMIT_MESSAGE:-}}"
      fi
      if [ -z "${MR_DESC}" ]; then
        MR_DESC="${CI_COMMIT_DESCRIPTION:-}"
      fi

      MR_TITLE_ONE_LINE="$(printf "%s" "${MR_TITLE}" | tr '\n' ' ' | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
      MR_DESC_ONE_LINE="$(printf "%s" "${MR_DESC}" | tr '\n' ' ' | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
      MR_TITLE_SLUG="$(sanitize "${MR_TITLE_ONE_LINE}")"

      DEPLOY_TAG="${TAG_PREFIX}/${CI_COMMIT_REF_NAME}/${CI_COMMIT_SHORT_SHA}"
      if [ -n "${MR_TITLE_SLUG}" ]; then
        DEPLOY_TAG="${TAG_PREFIX}/${CI_COMMIT_REF_NAME}/${MR_TITLE_SLUG}/${CI_COMMIT_SHORT_SHA}"
      fi

      {
        echo "MR_IID=${MR_IID}"
        echo "MR_TITLE=${MR_TITLE}"
        echo "MR_DESC=${MR_DESC}"
        echo "MR_TITLE_ONE_LINE=${MR_TITLE_ONE_LINE}"
        echo "MR_DESC_ONE_LINE=${MR_DESC_ONE_LINE}"
        echo "MR_TITLE_SLUG=${MR_TITLE_SLUG}"
        echo "DEPLOY_TAG=${DEPLOY_TAG}"
      } > mr.env

      # Release notes seed (can be appended by later jobs)
      {
        echo "# Release Notes"
        echo
        if [ -n "${MR_IID}" ]; then
          echo "- MR !${MR_IID}: ${MR_TITLE_ONE_LINE}"
        else
          echo "- ${MR_TITLE_ONE_LINE}"
        fi
        if [ -n "${MR_DESC_ONE_LINE}" ]; then
          echo "  - ${MR_DESC_ONE_LINE}"
        fi
      } > "${RELEASE_NOTES_FILE}"

  artifacts:
    reports:
      dotenv: mr.env
    paths:
      - ${RELEASE_NOTES_FILE}
    expire_in: 7 days

build:
  stage: build
  needs: ["prepare_mr_metadata"]
  script:
    - |
      set -euo pipefail
      echo "Build notification:"
      echo "Title: ${MR_TITLE_ONE_LINE}"
      echo "Description: ${MR_DESC_ONE_LINE}"
      echo "Deploy tag: ${DEPLOY_TAG}"
      # Replace with actual build steps
      echo "BUILD_OK=1" > build.env
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 7 days

test:
  stage: test
  needs: ["prepare_mr_metadata", "build"]
  script:
    - |
      set -euo pipefail
      echo "Test notification:"
      echo "Title: ${MR_TITLE_ONE_LINE}"
      echo "Description: ${MR_DESC_ONE_LINE}"
      # Replace with actual test steps
      echo "Tests passed"

release_notes:
  stage: release
  needs: ["prepare_mr_metadata", "test"]
  rules:
    - if: '$CI_COMMIT_BRANCH == $DEFAULT_BRANCH'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never
  script:
    - |
      set -euo pipefail
      echo "Generating release notes from MR metadata..."
      cat "${RELEASE_NOTES_FILE}"

commit_release_notes:
  stage: release
  needs: ["prepare_mr_metadata", "release_notes"]
  rules:
    - if: '$CI_COMMIT_BRANCH == $DEFAULT_BRANCH'
      when: on_success
    - when: never
  script:
    - |
      set -euo pipefail

      if [ -z "${GITLAB_TOKEN:-}" ]; then
        echo "GITLAB_TOKEN is required to push commits/tags."
        exit 1
      fi

      git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git checkout -B "${CI_COMMIT_BRANCH}" "origin/${CI_COMMIT_BRANCH}"

      mkdir -p .ci
      cp "${RELEASE_NOTES_FILE}" ".ci/${RELEASE_NOTES_FILE}"

      git add ".ci/${RELEASE_NOTES_FILE}" || true

      COMMIT_MSG="chore(release): ${MR_TITLE_ONE_LINE}"
      if [ -n "${MR_IID}" ]; then
        COMMIT_MSG="${COMMIT_MSG} (!${MR_IID})"
      fi

      COMMIT_BODY=""
      if [ -n "${MR_DESC_ONE_LINE}" ]; then
        COMMIT_BODY="${MR_DESC_ONE_LINE}"
      fi

      if git diff --cached --quiet; then
        echo "No release notes changes to commit."
        exit 0
      fi

      if [ -n "${COMMIT_BODY}" ]; then
        git commit -m "${COMMIT_MSG}" -m "${COMMIT_BODY}"
      else
        git commit -m "${COMMIT_MSG}"
      fi

      git push origin "${CI_COMMIT_BRANCH}"

tag_deployment:
  stage: deploy
  needs: ["prepare_mr_metadata", "test"]
  rules:
    - if: '$CI_COMMIT_BRANCH == $DEFAULT_BRANCH'
      when: on_success
    - when: manual
      allow_failure: false
  script:
    - |
      set -euo pipefail

      if [ -z "${GITLAB_TOKEN:-}" ]; then
        echo "GITLAB_TOKEN is required to create/push tags."
        exit 1
      fi

      git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git fetch --tags

      TAG_MESSAGE="Deploy: ${MR_TITLE_ONE_LINE}"
      if [ -n "${MR_IID}" ]; then
        TAG_MESSAGE="${TAG_MESSAGE} (!${MR_IID})"
      fi
      if [ -n "${MR_DESC_ONE_LINE}" ]; then
        TAG_MESSAGE="${TAG_MESSAGE}\n\n${MR_DESC_ONE_LINE}"
      fi

      echo "Creating deployment tag: ${DEPLOY_TAG}"
      printf "%b" "${TAG_MESSAGE}" > tag_message.txt

      if git rev-parse "${DEPLOY_TAG}" >/dev/null 2>&1; then
        echo "Tag already exists: ${DEPLOY_TAG}"
      else
        git tag -a "${DEPLOY_TAG}" -F tag_message.txt "${CI_COMMIT_SHA}"
        git push origin "${DEPLOY_TAG}"
      fi

      echo "Deployment notification:"
      echo "Title: ${MR_TITLE_ONE_LINE}"
      echo "Description: ${MR_DESC_ONE_LINE}"
      echo "Tag: ${DEPLOY_TAG}"