# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Datacenter Build and Deploy (Self-hosted)

on:
  workflow_dispatch:
    inputs:
      build_script:
        description: "Shell commands to execute for the build step (runs on the self-hosted runner)"
        required: true
        type: string
      deploy_script:
        description: "Shell commands to execute for the deploy step (runs on the self-hosted runner)"
        required: false
        default: ""
        type: string
      working_directory:
        description: "Working directory relative to repository root"
        required: false
        default: "."
        type: string
      runner_labels:
        description: "Comma-separated self-hosted runner labels (e.g. linux,x64,datacenter). 'self-hosted' is always included."
        required: false
        default: "linux,datacenter"
        type: string
      timeout_minutes:
        description: "Job timeout in minutes"
        required: false
        default: "60"
        type: string

permissions:
  contents: read

concurrency:
  group: datacenter-build-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_deploy:
    name: Build and Deploy on Self-hosted Runner
    runs-on: ${{ fromJSON(format('["self-hosted"{0}]', inputs.runner_labels != '' && format(',{0}', toJSON(split(replace(inputs.runner_labels, ' ', ''), ',')))[1:-1] || '')) }}
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show runner context
        run: |
          set -euo pipefail
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          echo "Arch: $RUNNER_ARCH"
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Working dir: $(pwd)"

      - name: Build (developer-provided commands)
        env:
          BUILD_SCRIPT: ${{ inputs.build_script }}
        run: |
          set -euo pipefail
          echo "Executing build script..."
          bash -euo pipefail -c "$BUILD_SCRIPT"

      - name: Deploy (developer-provided commands)
        if: ${{ inputs.deploy_script != '' }}
        env:
          DEPLOY_SCRIPT: ${{ inputs.deploy_script }}
        run: |
          set -euo pipefail
          echo "Executing deploy script..."
          bash -euo pipefail -c "$DEPLOY_SCRIPT"