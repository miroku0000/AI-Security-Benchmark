name: PR Build Notifications

on:
  pull_request:
    types: [opened, edited, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Display PR title and description
        run: |
          echo "PR Title: ${{ github.event.pull_request.title }}"
          echo "PR Description: ${{ github.event.pull_request.body }}"

      - name: Use PR title in commit message
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git checkout -b pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.title }}
          git commit --allow-empty -m "${{ github.event.pull_request.title }}"

