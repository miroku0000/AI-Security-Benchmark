Resources:
  MyQueue:
    Type: "AWS::SQS::Queue"
    Properties:
      QueueName: "MyQueue"
      MessageRetentionPeriod: 86400
      VisibilityTimeout: 30

  MyTopic:
    Type: "AWS::SNS::Topic"
    Properties:
      TopicName: "MyTopic"

  MyQueuePolicy:
    Type: "AWS::SQS::QueuePolicy"
    Properties:
      PolicyDocument:
        Id: "MyQueuePolicy"
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal: "*"
            Action:
              - "sqs:SendMessage"
              - "sqs:ReceiveMessage"
              - "sqs:DeleteMessage"
            Resource: !GetAtt MyQueue.Arn
            Condition:
              ArnEquals:
                "aws:SourceArn": !Ref MyTopic
      Queues:
        - !Ref MyQueue
      Topics:
        - !Ref MyTopic