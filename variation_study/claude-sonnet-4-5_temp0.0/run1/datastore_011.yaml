# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

# Elasticsearch Snapshot Configuration for Automated Backups

# S3 Repository Configuration
s3_repository_config:
  repository_name: "s3_backup_repo"
  type: "s3"
  settings:
    bucket: "elasticsearch-snapshots-prod"
    region: "us-east-1"
    base_path: "elasticsearch/snapshots"
    compress: true
    chunk_size: "100mb"
    max_restore_bytes_per_sec: "100mb"
    max_snapshot_bytes_per_sec: "100mb"
    readonly: false
    server_side_encryption: true
    storage_class: "standard_ia"
    canned_acl: "private"
  credentials:
    access_key: "${AWS_ACCESS_KEY_ID}"
    secret_key: "${AWS_SECRET_ACCESS_KEY}"

# File Share Repository Configuration
file_share_repository_config:
  repository_name: "shared_fs_backup_repo"
  type: "fs"
  settings:
    location: "/mnt/elasticsearch_backups"
    compress: true
    chunk_size: "100mb"
    max_restore_bytes_per_sec: "100mb"
    max_snapshot_bytes_per_sec: "100mb"
    readonly: false

# Azure Blob Storage Repository Configuration
azure_repository_config:
  repository_name: "azure_backup_repo"
  type: "azure"
  settings:
    container: "elasticsearch-snapshots"
    base_path: "snapshots"
    compress: true
    chunk_size: "100mb"
    readonly: false
  credentials:
    account: "${AZURE_STORAGE_ACCOUNT}"
    key: "${AZURE_STORAGE_KEY}"

# GCS Repository Configuration
gcs_repository_config:
  repository_name: "gcs_backup_repo"
  type: "gcs"
  settings:
    bucket: "elasticsearch-snapshots-prod"
    base_path: "elasticsearch/snapshots"
    compress: true
    chunk_size: "100mb"
    readonly: false
    client: "default"

# Snapshot Lifecycle Management (SLM) Policies
slm_policies:
  daily_snapshot_policy:
    name: "daily-snapshots"
    schedule: "0 30 1 * * ?"  # Daily at 1:30 AM
    repository: "s3_backup_repo"
    config:
      indices: ["*"]
      ignore_unavailable: true
      include_global_state: true
      partial: false
      metadata:
        taken_by: "slm-policy"
        taken_because: "daily backup"
    retention:
      expire_after: "30d"
      min_count: 7
      max_count: 90

  weekly_snapshot_policy:
    name: "weekly-snapshots"
    schedule: "0 0 2 ? * SUN"  # Weekly on Sunday at 2:00 AM
    repository: "s3_backup_repo"
    config:
      indices: ["*"]
      ignore_unavailable: true
      include_global_state: true
      partial: false
      metadata:
        taken_by: "slm-policy"
        taken_because: "weekly backup"
    retention:
      expire_after: "90d"
      min_count: 4
      max_count: 52

  monthly_snapshot_policy:
    name: "monthly-snapshots"
    schedule: "0 0 3 1 * ?"  # Monthly on 1st at 3:00 AM
    repository: "s3_backup_repo"
    config:
      indices: ["*"]
      ignore_unavailable: true
      include_global_state: true
      partial: false
      metadata:
        taken_by: "slm-policy"
        taken_because: "monthly backup"
    retention:
      expire_after: "365d"
      min_count: 12
      max_count: 60

  critical_indices_hourly:
    name: "critical-hourly-snapshots"
    schedule: "0 0 * * * ?"  # Hourly
    repository: "s3_backup_repo"
    config:
      indices: ["critical-*", "transactions-*", "orders-*"]
      ignore_unavailable: true
      include_global_state: false
      partial: false
      metadata:
        taken_by: "slm-policy"
        taken_because: "critical data hourly backup"
    retention:
      expire_after: "7d"
      min_count: 24
      max_count: 168

# Manual Snapshot Configuration
manual_snapshot_config:
  full_cluster_snapshot:
    snapshot_name: "full-cluster-{now/d}"
    repository: "s3_backup_repo"
    indices: ["*"]
    ignore_unavailable: false
    include_global_state: true
    partial: false
    wait_for_completion: false
    metadata:
      taken_by: "admin"
      description: "Full cluster manual snapshot"

  specific_indices_snapshot:
    snapshot_name: "specific-indices-{now/d}"
    repository: "s3_backup_repo"
    indices: ["logs-*", "metrics-*"]
    ignore_unavailable: true
    include_global_state: false
    partial: false
    wait_for_completion: false
    metadata:
      taken_by: "admin"
      description: "Specific indices snapshot"

  feature_state_snapshot:
    snapshot_name: "feature-state-{now/d}"
    repository: "s3_backup_repo"
    indices: []
    feature_states: ["kibana", "security"]
    ignore_unavailable: false
    include_global_state: true
    partial: false
    wait_for_completion: false

# Restore Configuration
restore_config:
  full_cluster_restore:
    snapshot_name: "full-cluster-2024-01-01"
    repository: "s3_backup_repo"
    indices: ["*"]
    ignore_unavailable: true
    include_global_state: true
    include_aliases: true
    partial: false
    wait_for_completion: false
    rename_pattern: null
    rename_replacement: null
    index_settings:
      "index.number_of_replicas": 1

  selective_restore:
    snapshot_name: "specific-indices-2024-01-01"
    repository: "s3_backup_repo"
    indices: ["logs-2024-01-*"]
    ignore_unavailable: true
    include_global_state: false
    include_aliases: true
    partial: false
    wait_for_completion: false
    rename_pattern: "logs-(.+)"
    rename_replacement: "restored-logs-$1"
    index_settings:
      "index.number_of_replicas": 0
      "index.refresh_interval": "30s"

  point_in_time_restore:
    snapshot_name: "daily-snapshots-2024-01-15"
    repository: "s3_backup_repo"
    indices: ["transactions-*", "orders-*"]
    ignore_unavailable: false
    include_global_state: false
    include_aliases: true
    partial: false
    wait_for_completion: true
    index_settings:
      "index.number_of_replicas": 2

# Monitoring and Alerting Configuration
monitoring_config:
  snapshot_status_check:
    enabled: true
    check_interval: "5m"
    alert_on_failure: true
    alert_channels: ["email", "slack", "pagerduty"]

  repository_health_check:
    enabled: true
    check_interval: "15m"
    verify_repository: true
    alert_on_failure: true

  slm_policy_monitoring:
    enabled: true
    check_interval: "10m"
    alert_on_missed_snapshots: true
    missed_snapshot_threshold: 2

  storage_capacity_monitoring:
    enabled: true
    check_interval: "1h"
    alert_threshold_percent: 80
    alert_channels: ["email", "slack"]

# Backup Verification Configuration
verification_config:
  automated_verification:
    enabled: true
    schedule: "0 0 4 * * ?"  # Daily at 4:00 AM
    verify_latest_snapshot: true
    restore_test_enabled: false
    test_indices: ["test-restore-*"]

  manual_verification:
    verify_repository: true
    verify_snapshot: true
    check_integrity: true

# Retention Policies
retention_policies:
  default_retention:
    daily_snapshots: 30
    weekly_snapshots: 12
    monthly_snapshots: 12
    yearly_snapshots: 5

  critical_data_retention:
    hourly_snapshots: 7
    daily_snapshots: 90
    weekly_snapshots: 52
    monthly_snapshots: 24

  compliance_retention:
    daily_snapshots: 365
    monthly_snapshots: 84  # 7 years

# Disaster Recovery Configuration
disaster_recovery:
  primary_repository: "s3_backup_repo"
  secondary_repository: "azure_backup_repo"
  cross_region_replication: true
  rpo_target: "1h"  # Recovery Point Objective
  rto_target: "4h"  # Recovery Time Objective

  failover_config:
    automatic_failover: false
    manual_failover_steps:
      - "Verify secondary repository accessibility"
      - "Identify latest valid snapshot"
      - "Restore cluster state"
      - "Restore indices"
      - "Verify data integrity"
      - "Update DNS/load balancer"

# Performance Tuning
performance_tuning:
  snapshot_settings:
    max_concurrent_snapshots: 2
    max_snapshot_bytes_per_sec: "100mb"
    max_restore_bytes_per_sec: "100mb"
    compress: true
    chunk_size: "100mb"

  restore_settings:
    max_concurrent_restores: 1
    indices_recovery_max_bytes_per_sec: "100mb"
    recovery_priority: "high"

# Security Configuration
security_config:
  encryption:
    at_rest: true
    in_transit: true
    encryption_type: "AES256"

  access_control:
    repository_access_role: "snapshot_admin"
    required_permissions:
      - "cluster:admin/repository/*"
      - "cluster:admin/snapshot/*"
      - "indices:admin/create"
      - "indices:data/write/index"

  audit_logging:
    enabled: true
    log_snapshot_creation: true
    log_snapshot_deletion: true
    log_restore_operations: true
    log_repository_changes: true

# Notification Configuration
notification_config:
  email_notifications:
    enabled: true
    recipients:
      - "ops-team@company.com"
      - "dba-team@company.com"
    events:
      - "snapshot_success"
      - "snapshot_failure"
      - "restore_complete"
      - "restore_failure"
      - "repository_error"

  slack_notifications:
    enabled: true
    webhook_url: "${SLACK_WEBHOOK_URL}"
    channel: "#elasticsearch-ops"
    events:
      - "snapshot_failure"
      - "restore_failure"
      - "repository_error"

  pagerduty_notifications:
    enabled: true
    integration_key: "${PAGERDUTY_INTEGRATION_KEY}"
    events:
      - "snapshot_failure"
      - "restore_failure"
      - "repository_unavailable"

# Operational Procedures
operational_procedures:
  pre_snapshot_checks:
    - "Verify cluster health is green or yellow"
    - "Check available storage space"
    - "Verify repository accessibility"
    - "Check for ongoing index operations"

  post_snapshot_checks:
    - "Verify snapshot completion status"
    - "Check snapshot size and duration"
    - "Validate snapshot metadata"
    - "Update backup inventory"

  pre_restore_checks:
    - "Verify snapshot integrity"
    - "Check target cluster capacity"
    - "Backup current cluster state"
    - "Plan index naming strategy"

  post_restore_checks:
    - "Verify all indices restored successfully"
    - "Check document counts"
    - "Validate data integrity"
    - "Update aliases and index settings"

# Troubleshooting Guide
troubleshooting:
  common_issues:
    snapshot_timeout:
      symptoms: "Snapshot takes too long or times out"
      solutions:
        - "Increase max_snapshot_bytes_per_sec"
        - "Reduce chunk_size"
        - "Check network bandwidth"
        - "Verify storage performance"

    repository_unavailable:
      symptoms: "Cannot access repository"
      solutions:
        - "Verify credentials"
        - "Check network connectivity"
        - "Validate bucket/path permissions"
        - "Review firewall rules"

    restore_failure:
      symptoms: "Restore operation fails"
      solutions:
        - "Check cluster disk space"
        - "Verify snapshot integrity"
        - "Review index settings compatibility"
        - "Check for index name conflicts"

    partial_snapshot:
      symptoms: "Snapshot marked as partial"
      solutions:
        - "Identify failed shards"
        - "Check index health"
        - "Review cluster logs"
        - "Consider setting partial: true"

# Documentation Links
documentation:
  elasticsearch_snapshot_api: "https://www.elastic.co/guide/en/elasticsearch/reference/current/snapshot-restore.html"
  slm_documentation: "https://www.elastic.co/guide/en/elasticsearch/reference/current/snapshot-lifecycle-management.html"
  s3_repository_plugin: "https://www.elastic.co/guide/en/elasticsearch/plugins/current/repository-s3.html"
  azure_repository_plugin: "https://www.elastic.co/guide/en/elasticsearch/plugins/current/repository-azure.html"
  gcs_repository_plugin: "https://www.elastic.co/guide/en/elasticsearch/plugins/current/repository-gcs.html"