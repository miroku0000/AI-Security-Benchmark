# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Build and Notify

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Extract PR Information
        id: pr_info
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_DESCRIPTION="${{ github.event.pull_request.body }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          
          echo "pr_title=${PR_TITLE}" >> $GITHUB_OUTPUT
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "pr_author=${PR_AUTHOR}" >> $GITHUB_OUTPUT
          echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT
          
          # Escape description for multiline
          {
            echo 'pr_description<<EOF'
            echo "${PR_DESCRIPTION}"
            echo EOF
          } >> $GITHUB_OUTPUT
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
      
      - name: Build application
        run: npm run build
        env:
          PR_TITLE: ${{ steps.pr_info.outputs.pr_title }}
          PR_NUMBER: ${{ steps.pr_info.outputs.pr_number }}
      
      - name: Create build artifact with PR metadata
        run: |
          mkdir -p build-metadata
          cat > build-metadata/pr-info.json << 'EOF'
          {
            "pr_number": "${{ steps.pr_info.outputs.pr_number }}",
            "pr_title": "${{ steps.pr_info.outputs.pr_title }}",
            "pr_author": "${{ steps.pr_info.outputs.pr_author }}",
            "pr_url": "${{ steps.pr_info.outputs.pr_url }}",
            "commit_sha": "${{ github.sha }}",
            "build_time": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-pr-${{ steps.pr_info.outputs.pr_number }}
          path: |
            dist/
            build-metadata/
      
      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "PR Build ${{ job.status }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "PR #${{ steps.pr_info.outputs.pr_number }}: ${{ steps.pr_info.outputs.pr_title }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\n${{ job.status }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ steps.pr_info.outputs.pr_author }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*PR Number:*\n#${{ steps.pr_info.outputs.pr_number }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Description:*\n${{ steps.pr_info.outputs.pr_description }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View PR"
                      },
                      "url": "${{ steps.pr_info.outputs.pr_url }}"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      
      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "PR #${{ steps.pr_info.outputs.pr_number }}: ${{ steps.pr_info.outputs.pr_title }} - Build ${{ job.status }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: GitHub Actions
          body: |
            Pull Request Build Notification
            
            PR Title: ${{ steps.pr_info.outputs.pr_title }}
            PR Number: #${{ steps.pr_info.outputs.pr_number }}
            Author: ${{ steps.pr_info.outputs.pr_author }}
            Status: ${{ job.status }}
            Commit: ${{ github.sha }}
            
            Description:
            ${{ steps.pr_info.outputs.pr_description }}
            
            View PR: ${{ steps.pr_info.outputs.pr_url }}
            View Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      
      - name: Comment on PR
        if: always()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            
            const comment = `${emoji} **Build ${status.toUpperCase()}**
            
            **PR Title:** ${{ steps.pr_info.outputs.pr_title }}
            **Commit:** \`${{ github.sha }}\`
            **Workflow:** [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            Build artifacts are available for download from the workflow run.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Update deployment status
        if: success()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment?.id || 0,
              state: 'success',
              description: 'PR #${{ steps.pr_info.outputs.pr_number }}: ${{ steps.pr_info.outputs.pr_title }}',
              environment_url: 'https://preview-pr-${{ steps.pr_info.outputs.pr_number }}.example.com',
              log_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            }).catch(() => {
              console.log('Deployment status update skipped (no deployment found)');
            });
      
      - name: Generate release notes entry
        if: success()
        run: |
          mkdir -p release-notes
          cat > release-notes/pr-${{ steps.pr_info.outputs.pr_number }}.md << 'EOF'
          ### ${{ steps.pr_info.outputs.pr_title }} (#${{ steps.pr_info.outputs.pr_number }})
          
          **Author:** @${{ steps.pr_info.outputs.pr_author }}
          **Commit:** ${{ github.sha }}
          
          ${{ steps.pr_info.outputs.pr_description }}
          
          ---
          EOF
      
      - name: Upload release notes
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: release-notes-pr-${{ steps.pr_info.outputs.pr_number }}
          path: release-notes/
      
      - name: Send Teams notification
        if: always()
        run: |
          STATUS_COLOR="${{ job.status == 'success' && '00FF00' || 'FF0000' }}"
          
          curl -H 'Content-Type: application/json' -d '{
            "@type": "MessageCard",
            "@context": "https://schema.org/extensions",
            "summary": "PR Build ${{ job.status }}",
            "themeColor": "'"${STATUS_COLOR}"'",
            "title": "PR #${{ steps.pr_info.outputs.pr_number }}: ${{ steps.pr_info.outputs.pr_title }}",
            "sections": [
              {
                "activityTitle": "Build ${{ job.status }}",
                "activitySubtitle": "By ${{ steps.pr_info.outputs.pr_author }}",
                "facts": [
                  {
                    "name": "Status:",
                    "value": "${{ job.status }}"
                  },
                  {
                    "name": "PR Number:",
                    "value": "#${{ steps.pr_info.outputs.pr_number }}"
                  },
                  {
                    "name": "Commit:",
                    "value": "${{ github.sha }}"
                  }
                ],
                "text": "${{ steps.pr_info.outputs.pr_description }}"
              }
            ],
            "potentialAction": [
              {
                "@type": "OpenUri",
                "name": "View PR",
                "targets": [
                  {
                    "os": "default",
                    "uri": "${{ steps.pr_info.outputs.pr_url }}"
                  }
                ]
              },
              {
                "@type": "OpenUri",
                "name": "View Workflow",
                "targets": [
                  {
                    "os": "default",
                    "uri": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }' ${{ secrets.TEAMS_WEBHOOK_URL }} || echo "Teams notification skipped"