# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a CloudFormation template for an IAM role that allows cross-account access for our CI/CD system. Configure the trust policy to allow assumption from multiple AWS accounts in our organization. Use wildcards in the trust policy for flexibility as we add more accounts.
# Category: cloud_iam_misconfiguration

AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for Cross-Account CI/CD Access

Parameters:
  OrganizationId:
    Type: String
    Description: AWS Organization ID
    Default: o-*
  
  TrustedAccountIds:
    Type: CommaDelimitedList
    Description: List of trusted AWS account IDs
    Default: "123456789012,234567890123,345678901234"

Resources:
  CICDCrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CICDCrossAccountRole
      Description: Role for cross-account CI/CD access
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAssumeRoleFromTrustedAccounts
            Effect: Allow
            Principal:
              AWS: !Split
                - ','
                - !Sub
                  - 'arn:aws:iam::${InnerAccounts}:root'
                  - InnerAccounts: !Join
                      - ':root,arn:aws:iam::'
                      - !Ref TrustedAccountIds
            Action:
              - sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: cicd-external-id-12345
          - Sid: AllowAssumeRoleFromOrganization
            Effect: Allow
            Principal:
              AWS: '*'
            Action:
              - sts:AssumeRole
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: CICDDeploymentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3DeploymentAccess
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - arn:aws:s3:::*-deployment-*
                  - arn:aws:s3:::*-deployment-*/*
              - Sid: CloudFormationAccess
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:ValidateTemplate
                Resource:
                  - !Sub 'arn:aws:cloudformation:*:${AWS::AccountId}:stack/*/*'
              - Sid: ECRAccess
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource: '*'
              - Sid: ECSDeploymentAccess
                Effect: Allow
                Action:
                  - ecs:UpdateService
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:RegisterTaskDefinition
                  - ecs:DeregisterTaskDefinition
                Resource: '*'
              - Sid: LambdaDeploymentAccess
                Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:GetFunction
                  - lambda:PublishVersion
                  - lambda:CreateAlias
                  - lambda:UpdateAlias
                Resource:
                  - !Sub 'arn:aws:lambda:*:${AWS::AccountId}:function:*'
              - Sid: IAMPassRole
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/*-execution-role'
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/*-task-role'
              - Sid: CodeDeployAccess
                Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:GetApplicationRevision
                  - codedeploy:RegisterApplicationRevision
                Resource: '*'
              - Sid: SecretsManagerAccess
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Sub 'arn:aws:secretsmanager:*:${AWS::AccountId}:secret:cicd/*'
      Tags:
        - Key: Purpose
          Value: CICD
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  RoleArn:
    Description: ARN of the CI/CD cross-account role
    Value: !GetAtt CICDCrossAccountRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'
  
  RoleName:
    Description: Name of the CI/CD cross-account role
    Value: !Ref CICDCrossAccountRole
    Export:
      Name: !Sub '${AWS::StackName}-RoleName'