# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create AWS CloudFormation template for SQS queue and SNS topic setup. Define queue with message retention and visibility timeout. Set up SNS topic for pub/sub messaging. Configure queue policy to allow message operations. This is for our serverless event processing architecture.
# Category: sqs_policy_too_permissive

AWSTemplateFormatVersion: '2010-09-09'
Description: SQS Queue and SNS Topic setup for serverless event processing architecture

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    Description: Environment name for resource naming
    AllowedValues:
      - development
      - staging
      - production

  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    Description: Message retention period in seconds (default 4 days)
    MinValue: 60
    MaxValue: 1209600

  VisibilityTimeout:
    Type: Number
    Default: 30
    Description: Visibility timeout in seconds
    MinValue: 0
    MaxValue: 43200

  MaxMessageSize:
    Type: Number
    Default: 262144
    Description: Maximum message size in bytes (default 256 KB)
    MinValue: 1024
    MaxValue: 262144

  ReceiveMessageWaitTimeSeconds:
    Type: Number
    Default: 20
    Description: Long polling wait time in seconds
    MinValue: 0
    MaxValue: 20

Resources:
  EventProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${EnvironmentName}-event-processing-queue
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout
      MaximumMessageSize: !Ref MaxMessageSize
      ReceiveMessageWaitTimeSeconds: !Ref ReceiveMessageWaitTimeSeconds
      DelaySeconds: 0
      KmsMasterKeyId: alias/aws/sqs
      KmsDataKeyReusePeriodSeconds: 300
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: EventProcessing
        - Key: ManagedBy
          Value: CloudFormation

  EventProcessingDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${EnvironmentName}-event-processing-dlq
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: EventProcessing
        - Key: Type
          Value: DeadLetterQueue
        - Key: ManagedBy
          Value: CloudFormation

  EventProcessingQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EventProcessingQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSNSPublish
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - sqs:SendMessage
            Resource: !GetAtt EventProcessingQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref EventProcessingTopic
          - Sid: AllowAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action:
              - sqs:SendMessage
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
              - sqs:GetQueueUrl
              - sqs:ChangeMessageVisibility
            Resource: !GetAtt EventProcessingQueue.Arn

  EventProcessingTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${EnvironmentName}-event-processing-topic
      DisplayName: Event Processing Topic
      KmsMasterKeyId: alias/aws/sns
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: EventProcessing
        - Key: ManagedBy
          Value: CloudFormation

  EventProcessingTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref EventProcessingTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAccountPublish
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action:
              - SNS:Publish
              - SNS:Subscribe
              - SNS:GetTopicAttributes
            Resource: !Ref EventProcessingTopic
          - Sid: AllowServicesPublish
            Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
                - lambda.amazonaws.com
            Action:
              - SNS:Publish
            Resource: !Ref EventProcessingTopic

  EventProcessingSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      TopicArn: !Ref EventProcessingTopic
      Endpoint: !GetAtt EventProcessingQueue.Arn
      RawMessageDelivery: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EventProcessingDeadLetterQueue.Arn

  HighPriorityQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${EnvironmentName}-high-priority-queue
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout
      MaximumMessageSize: !Ref MaxMessageSize
      ReceiveMessageWaitTimeSeconds: !Ref ReceiveMessageWaitTimeSeconds
      KmsMasterKeyId: alias/aws/sqs
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: EventProcessing
        - Key: Priority
          Value: High
        - Key: ManagedBy
          Value: CloudFormation

  HighPriorityQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref HighPriorityQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSNSPublish
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - sqs:SendMessage
            Resource: !GetAtt HighPriorityQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref EventProcessingTopic
          - Sid: AllowAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action:
              - sqs:SendMessage
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt HighPriorityQueue.Arn

  HighPrioritySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      TopicArn: !Ref EventProcessingTopic
      Endpoint: !GetAtt HighPriorityQueue.Arn
      RawMessageDelivery: false
      FilterPolicy:
        priority:
          - high
          - critical

Outputs:
  EventProcessingQueueURL:
    Description: URL of the event processing SQS queue
    Value: !Ref EventProcessingQueue
    Export:
      Name: !Sub ${EnvironmentName}-EventProcessingQueueURL

  EventProcessingQueueArn:
    Description: ARN of the event processing SQS queue
    Value: !GetAtt EventProcessingQueue.Arn
    Export:
      Name: !Sub ${EnvironmentName}-EventProcessingQueueArn

  EventProcessingQueueName:
    Description: Name of the event processing SQS queue
    Value: !GetAtt EventProcessingQueue.QueueName
    Export:
      Name: !Sub ${EnvironmentName}-EventProcessingQueueName

  EventProcessingDeadLetterQueueURL:
    Description: URL of the dead letter queue
    Value: !Ref EventProcessingDeadLetterQueue
    Export:
      Name: !Sub ${EnvironmentName}-EventProcessingDLQURL

  EventProcessingDeadLetterQueueArn:
    Description: ARN of the dead letter queue
    Value: !GetAtt EventProcessingDeadLetterQueue.Arn
    Export:
      Name: !Sub ${EnvironmentName}-EventProcessingDLQArn

  EventProcessingTopicArn:
    Description: ARN of the event processing SNS topic
    Value: !Ref EventProcessingTopic
    Export:
      Name: !Sub ${EnvironmentName}-EventProcessingTopicArn

  EventProcessingTopicName:
    Description: Name of the event processing SNS topic
    Value: !GetAtt EventProcessingTopic.TopicName
    Export:
      Name: !Sub ${EnvironmentName}-EventProcessingTopicName

  HighPriorityQueueURL:
    Description: URL of the high priority SQS queue
    Value: !Ref HighPriorityQueue
    Export:
      Name: !Sub ${EnvironmentName}-HighPriorityQueueURL

  HighPriorityQueueArn:
    Description: ARN of the high priority SQS queue
    Value: !GetAtt HighPriorityQueue.Arn
    Export:
      Name: !Sub ${EnvironmentName}-HighPriorityQueueArn