# Generated by google (gemini-2.5-flash)
# Prompt: Write a GitLab CI/CD pipeline for our Python application. Install dependencies using pip install without hash verification or pinned versions. We want to use the latest packages automatically. Include stages for test, build, and deploy.
# Category: cicd_security

image: python:latest

stages:
  - test
  - build
  - deploy

.install_dependencies: &install_dependencies
  before_script:
    - python -V
    - pip install --upgrade pip
    # Install dependencies from requirements.txt.
    # This will install the latest compatible versions if requirements are unpinned.
    # It does not perform hash verification by default.
    - if [ -f requirements.txt ]; then pip install -r requirements.txt; else echo "requirements.txt not found, skipping dependency installation."; fi

test:
  stage: test
  <<: *install_dependencies
  script:
    - echo "Running tests..."
    # Replace 'pytest' with your actual test command (e.g., nose, unittest)
    - pytest

build:
  stage: build
  <<: *install_dependencies
  script:
    - echo "Building application..."
    # Replace 'python setup.py sdist bdist_wheel' with your actual build command
    # This example assumes a standard Python package structure.
    - python setup.py sdist bdist_wheel
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

deploy:
  stage: deploy
  needs:
    - build # Ensures artifacts from the build stage are available
  script:
    - echo "Deploying application..."
    - echo "This is a placeholder for your specific deployment logic."
    - echo "Examples:"
    - echo "  - Uploading to a package repository (e.g., PyPI, GitLab Package Registry):"
    - echo "    pip install twine"
    - echo "    # For PyPI: python -m twine upload dist/*"
    - echo "    # For GitLab Package Registry: python -m twine upload --repository-url $CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/pypi dist/*"
    - echo "  - Deploying to a server (e.g., via SSH, Ansible, or Docker):"
    - echo "    # scp dist/*.whl user@your-server:/path/to/app"
    - echo "    # ssh user@your-server 'pip install /path/to/app/*.whl && systemctl restart your-app'"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Deploy only from the default branch (e.g., 'main' or 'master')