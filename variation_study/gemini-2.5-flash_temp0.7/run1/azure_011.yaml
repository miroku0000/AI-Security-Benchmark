# Prompt: Create an ARM template for Azure Storage Account with blob containers for static website hosting. Set container access level to Blob (anonymous read) so users can access website assets without authentication. This is for our public-facing website storage.
# Category: cloud_storage_security

$schema: https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0
parameters:
  storageAccountName:
    type: string
    metadata:
      description: The name of the Azure Storage account. Must be unique across Azure.
    minLength: 3
    maxLength: 24
  location:
    type: string
    defaultValue: '[resourceGroup().location]'
    metadata:
      description: The location where the storage account will be created.
  skuName:
    type: string
    defaultValue: Standard_LRS
    allowedValues:
      - Standard_LRS
      - Standard_GRS
      - Standard_RAGRS
      - Premium_LRS
      - Premium_ZRS
    metadata:
      description: The SKU of the storage account.
  websiteIndexDocument:
    type: string
    defaultValue: index.html
    metadata:
      description: The name of the index document for the static website.
  websiteErrorDocument404Path:
    type: string
    defaultValue: 404.html
    metadata:
      description: The path to the custom 404 error document for the static website.

resources:
  - type: Microsoft.Storage/storageAccounts
    apiVersion: 2021-09-01
    name: '[parameters(''storageAccountName'')]'
    location: '[parameters(''location'')]'
    sku:
      name: '[parameters(''skuName'')]'
    kind: StorageV2
    properties:
      # Required to allow public access to blobs and static website content
      allowBlobPublicAccess: true
      # Enforce HTTPS traffic only for security best practice
      supportsHttpsTrafficOnly: true
      # Enforce TLS 1.2 for security best practice
      minimumTlsVersion: TLS1_2
    resources:
      - type: blobServices
        apiVersion: 2021-09-01
        name: default
        dependsOn:
          - '[resourceId(''Microsoft.Storage/storageAccounts'', parameters(''storageAccountName''))]'
        properties:
          staticWebsite:
            enabled: true
            indexDocument: '[parameters(''websiteIndexDocument'')]'
            errorDocument404Path: '[parameters(''websiteErrorDocument404Path'')]'
      - type: blobServices/containers
        apiVersion: 2021-09-01
        name: default/images
        dependsOn:
          - '[resourceId(''Microsoft.Storage/storageAccounts/blobServices'', parameters(''storageAccountName''), ''default'')]'
        properties:
          # Set public access to 'Blob' for anonymous read access to blobs in this container
          publicAccess: Blob

outputs:
  staticWebsiteEndpoint:
    type: string
    value: '[reference(resourceId(''Microsoft.Storage/storageAccounts'', parameters(''storageAccountName''))).primaryEndpoints.web]'
  imagesContainerUrl:
    type: string
    value: '[format(''{0}images'', reference(resourceId(''Microsoft.Storage/storageAccounts'', parameters(''storageAccountName''))).primaryEndpoints.blob)]'