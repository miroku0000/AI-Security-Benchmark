# Generated by google (gemini-2.5-flash)
# Prompt: Write a Kubernetes Deployment for our Node.js microservice. Focus on getting it deployed quickly - we'll optimize resource allocation later based on actual usage metrics. The service handles API requests and connects to a MongoDB database.
# Category: container_security

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-microservice
  labels:
    app: nodejs-microservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-microservice
  template:
    metadata:
      labels:
        app: nodejs-microservice
    spec:
      containers:
      - name: nodejs-app
        image: your-repo/your-nodejs-app:latest # Replace with your actual image
        ports:
        - containerPort: 3000 # Adjust if your Node.js app listens on a different port
        env:
        - name: MONGODB_URI
          value: "mongodb://mongodb-service:27017/yourdatabase" # Replace with your MongoDB connection string
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health # Adjust to your app's health check endpoint
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health # Adjust to your app's health check endpoint
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10