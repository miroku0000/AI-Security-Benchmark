# Generated by google (gemini-2.5-flash)
# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for EC2 instances with EBS volumes for application data (Phase 1). Focus on quick deployment.

Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance.
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair.

  InstanceType:
    Description: EC2 instance type for the application server.
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t2.medium
      - t3.micro
      - t3.small
      - t3.medium
    ConstraintDescription: Must be a valid EC2 instance type.

  LatestAmiId:
    Description: The ID of the AMI for the EC2 instance. Default is Amazon Linux 2 AMI (HVM) for us-east-1.
    Type: AWS::EC2::Image::Id
    Default: ami-053b0d53d7901ad98 # Amazon Linux 2 AMI (HVM), SSD Volume Type - us-east-1

  AppVolumeSize:
    Description: Size of the application data EBS volume in GiB.
    Type: Number
    Default: 20
    MinValue: 1
    MaxValue: 16384
    ConstraintDescription: Must be a valid EBS volume size.

Resources:
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH access via port 22
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-SecurityGroup"

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - DeviceIndex: 0
          AssociatePublicIpAddress: true
          GroupSet:
            - !GetAtt EC2SecurityGroup.GroupId
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-AppInstance"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          echo "Starting user data script..."
          
          # Determine the device name for the attached EBS volume.
          # Common choices are /dev/xvdf for older instances or /dev/nvme1n1 for newer NVMe-based instances.
          DEVICE_NAME="/dev/xvdf"
          if [ ! -b "$DEVICE_NAME" ]; then
            echo "Device $DEVICE_NAME not found, trying /dev/nvme1n1..."
            DEVICE_NAME="/dev/nvme1n1"
          fi

          MAX_RETRIES=15
          RETRY_COUNT=0
          while [ ! -b "$DEVICE_NAME" ] && [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Waiting for volume $DEVICE_NAME to be available... (Attempt $((RETRY_COUNT + 1)))"
            sleep 10
            RETRY_COUNT=$((RETRY_COUNT + 1))
          done

          if [ ! -b "$DEVICE_NAME" ]; then
            echo "Error: Volume $DEVICE_NAME not found after multiple retries. Exiting."
            exit 1
          fi

          echo "Volume $DEVICE_NAME found. Proceeding with formatting and mounting."

          # Check if the volume is already formatted
          if ! file -s $DEVICE_NAME | grep -q "filesystem"; then
            echo "Formatting $DEVICE_NAME with ext4 filesystem..."
            mkfs -t ext4 $DEVICE_NAME
            echo "Filesystem created on $DEVICE_NAME."
          else
            echo "$DEVICE_NAME already contains a filesystem. Skipping format."
          fi

          # Create a mount point and mount the volume
          mkdir -p /data
          echo "Mounting $DEVICE_NAME to /data..."
          mount $DEVICE_NAME /data
          echo "$DEVICE_NAME mounted to /data."

          # Add to /etc/fstab for automatic mounting on reboot.
          # 'nofail' option ensures the system boots even if the volume is not available.
          echo "$DEVICE_NAME /data ext4 defaults,nofail 0 2" >> /etc/fstab
          echo "Added $DEVICE_NAME to /etc/fstab."

          echo "User data script finished."

  AppEBSVolume:
    Type: AWS::EC2::Volume
    Properties:
      Size: !Ref AppVolumeSize
      VolumeType: gp3 # General Purpose SSD (gp3) for good performance and cost efficiency
      AvailabilityZone: !GetAtt EC2Instance.AvailabilityZone # Ensure volume is in the same AZ as the instance
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-AppDataVolume"

  AppEBSVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      InstanceId: !Ref EC2Instance
      VolumeId: !Ref AppEBSVolume
      Device: /dev/xvdf # Standard device name for the first data volume. UserData script expects this or /dev/nvme1n1.

Outputs:
  InstanceId:
    Description: The ID of the EC2 instance.
    Value: !Ref EC2Instance

  PublicIp:
    Description: The Public IP address of the EC2 instance.
    Value: !GetAtt EC2Instance.PublicIp

  PublicDnsName:
    Description: The Public DNS name of the EC2 instance.
    Value: !GetAtt EC2Instance.PublicDnsName

  VolumeId:
    Description: The ID of the EBS application data volume.
    Value: !Ref AppEBSVolume