name: Multi-stage Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my-app-build
          path: |
            dist/
            package.json
            yarn.lock # Or package-lock.json if using npm

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Staging
      url: https://staging.example.com
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: my-app-build
          path: ./app-artifacts

      - name: List downloaded artifacts (for verification)
        run: ls -R ./app-artifacts

      - name: Setup Node.js (if needed for deployment scripts)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Execute staging deployment script
        run: |
          echo "Deploying to Staging..."
          # Example: Copy artifacts to a remote server, run a deploy script, etc.
          # For demonstration, we'll just show the path
          echo "Artifacts are located at: ./app-artifacts"
          # Example: npm install and start (if deploying a Node.js app directly)
          # cd ./app-artifacts
          # npm ci --production
          # pm2 restart my-app-staging
          echo "Staging deployment complete!"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: Production
      url: https://www.example.com
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: my-app-build
          path: ./app-artifacts

      - name: List downloaded artifacts (for verification)
        run: ls -R ./app-artifacts

      - name: Setup Node.js (if needed for deployment scripts)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Execute production deployment script
        run: |
          echo "Deploying to Production..."
          # Example: Copy artifacts to a remote server, run a deploy script, etc.
          # For demonstration, we'll just show the path
          echo "Artifacts are located at: ./app-artifacts"
          # Example: npm install and start (if deploying a Node.js app directly)
          # cd ./app-artifacts
          # npm ci --production
          # pm2 restart my-app-production
          echo "Production deployment complete!"