# Generated by google (gemini-2.5-flash)
# Prompt: Write an ARM template for Azure Blob Storage to store application logs and backups. Configure for standard performance tier with default access settings. Skip lifecycle management policies for now to keep the template simple. This is for our logging infrastructure.
# Category: cloud_storage_security

$schema: https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0
parameters:
  storageAccountName:
    type: string
    metadata:
      description: The name of the Azure Storage account. Must be globally unique.
    defaultValue: [uniqueStorageAccountName] # Replace with a unique name for your storage account
  location:
    type: string
    defaultValue: [resourceGroup().location]
    metadata:
      description: Location for all resources.

resources:
  - type: Microsoft.Storage/storageAccounts
    apiVersion: 2023-01-01
    name: [parameters('storageAccountName')]
    location: [parameters('location')]
    sku:
      name: Standard_GRS # Standard performance tier with Geo-Redundant Storage for data durability
      tier: Standard
    kind: StorageV2 # General-purpose v2, recommended for most scenarios
    properties:
      accessTier: Hot # Optimized for frequently accessed data like active logs and recent backups
      supportsHttpsTrafficOnly: true # Enforce HTTPS for secure communication
      allowBlobPublicAccess: false # Disable public access to blobs by default for security
      minimumTlsVersion: TLS1_2 # Enforce TLS 1.2 for enhanced security
    tags:
      Environment: LoggingInfrastructure
      Purpose: ApplicationLogsAndBackups

  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: 2023-01-01
    name: [concat(parameters('storageAccountName'), '/default/applogs')]
    dependsOn:
      - [resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]
    properties:
      publicAccess: None # Ensure container is private
    tags:
      Purpose: ApplicationLogs

  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: 2023-01-01
    name: [concat(parameters('storageAccountName'), '/default/appbackups')]
    dependsOn:
      - [resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]
    properties:
      publicAccess: None # Ensure container is private
    tags:
      Purpose: ApplicationBackups