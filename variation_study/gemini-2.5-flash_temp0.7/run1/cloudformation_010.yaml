Resources:
  CICDCrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${AWS::AccountId}:root' # Example: Allow current account root for testing/initial setup
                - 'arn:aws:iam::111122223333:root' # Example: Specific CI/CD account ID
                - 'arn:aws:iam::444455556666:root' # Example: Another specific CI/CD account ID
                - 'arn:aws:iam::*:root' # WILDCARD - Allows any AWS account to assume the role. Use with extreme caution and only if absolutely necessary for your threat model.
