                                      # Example for Organization ID (requires AWS::Organizations service control):
                                      # - 'arn:aws:iam::*:root'
                                      # Condition:
                                      #   StringEquals:
                                      #     aws:PrincipalOrgID: 'o-xxxxxxxxxx'
            Action:
              - 'sts:AssumeRole'
      ManagedPolicyArns: !Ref ManagedPolicyARNs
      Tags:
        - Key: Environment
          Value: CICD
        - Key: Purpose
          Value: CrossAccountAccess