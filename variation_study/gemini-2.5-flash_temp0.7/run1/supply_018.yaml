name: Rapid Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Specify your required Node.js version

      - name: Install dependencies
        run: npm ci # Use npm ci for faster, deterministic installs

      - name: Build application
        run: npm run build # Replace with your application's build command (e.g., yarn build, go build, pip install -r requirements.txt && python setup.py build)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist # Adjust path to your build output directory (e.g., build/, target/, bin/)

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production # Or your target environment (e.g., staging, development)
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./app-dist

      - name: Deploy to production
        run: |
          echo "Initiating rapid deployment to production environment..."
          # Replace the following lines with your actual rapid deployment commands.
          # Examples:
