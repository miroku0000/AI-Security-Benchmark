# --- 2. Automated Snapshot Lifecycle Management (SLM) Policy ---
# This defines an automated schedule for creating snapshots using the configured repository.
# Send this via a PUT request to Elasticsearch:
# PUT _slm/my_daily_snapshot_policy
my_daily_snapshot_policy_config:
  schedule: "0 30 1 * * ?" # REQUIRED: Cron expression (e.g., daily at 01:30 AM)
  repository: "my_s3_repository" # REQUIRED: The name of your defined repository (e.g., my_s3_repository or my_fs_repository)
  config:
    indices: ["*"] # REQUIRED: Which indices to snapshot (e.g., ["my-data-*", "logs-*"], or ["*"] for all)
    ignore_unavailable: false # OPTIONAL: Ignore unavailable indices (default: false)
    include_global_state: true # OPTIONAL: Include cluster global state (default: true)
    partial: false # OPTIONAL: Allow partial snapshots if some primary shards are missing (default: false)
  retention: # OPTIONAL: Define a retention policy for snapshots created by this SLM policy
    expire_after: "30d" # OPTIONAL: Delete snapshots older than this duration (e.g., "7d", "30d")
    min_count: 5 # OPTIONAL: Always keep at least this many snapshots
    max_count: 50 # OPTIONAL: Never keep more than this many snapshots
  name: "<daily-snapshot-{now/d}>" # OPTIONAL: Dynamic name for snapshots (e.g., daily-snapshot-2023.10.27)
  # The 'name' field supports date math, allowing unique names for each snapshot.
  # Examples: "<daily-snapshot-{now/d}>" -> "daily-snapshot-2023-10-27"
  #           "<hourly-snapshot-{now/h}>" -> "hourly-snapshot-2023-10-27-10"

# --- 3. Manual Snapshot Creation ---
# Use this to create a one-off snapshot for specific needs.
# Send this via a PUT request to Elasticsearch:
# PUT _snapshot/my_s3_repository/my_manual_snapshot_20231027
manual_snapshot_creation_config:
  indices: ["my-important-index-*", "logs-2023-10-*"] # REQUIRED: Specific indices or patterns
  ignore_unavailable: false # OPTIONAL: Ignore unavailable indices during snapshot (default: false)
  include_global_state: true # OPTIONAL: Include cluster global state (default: true)
  partial: false # OPTIONAL: Allow partial snapshots if some primary shards are missing (default: false)
  wait_for_completion: true # OPTIONAL: Wait for the snapshot to complete before returning (default: false)

# --- 4. Snapshot Restoration ---
# Use this to restore data from a previously created snapshot.
# Send this via a POST request to Elasticsearch:
# POST _snapshot/my_s3_repository/my_manual_snapshot_20231027/_restore
snapshot_restoration_config:
  indices: ["my-important-index-*"] # OPTIONAL: Which indices to restore from the snapshot. Defaults to all indices in the snapshot.
  # If restoring all indices, omit the 'indices' field or use ["*"].
  # Be careful when restoring all indices, especially if 'include_global_state' was true during snapshot.
  # To avoid conflicts with existing indices, it's often best to restore to new indices using rename_pattern/replacement.
  rename_pattern: "(.+)" # OPTIONAL: A regex pattern to rename restored indices.
  rename_replacement: "restored-$1" # OPTIONAL: The replacement string for renamed indices.
  # Example: If original index is "my-index-2023", restored becomes "restored-my-index-2023"
  include_global_state: false # OPTIONAL: Restore cluster global state (default: false).
  # WARNING: Restoring global state overwrites current cluster settings, templates, etc. Use with extreme caution.
  ignore_unavailable: false # OPTIONAL: Ignore unavailable indices in the snapshot during restore (default: false)
  partial: false # OPTIONAL: Restore partial snapshot even if some indices are missing from the snapshot (default: false)
  wait_for_completion: true #