# --- S3 Snapshot Repository (Requires 'repository-s3' plugin) ---
# Send this via a PUT request to Elasticsearch:
# PUT _snapshot/my_s3_repository
my_s3_repository_config:
  type: s3
  settings:
    bucket: "your-s3-bucket-name" # REQUIRED: Your S3 bucket name
    base_path: "elasticsearch-backups" # OPTIONAL: A subfolder within your S3 bucket
    region: "us-east-1" # OPTIONAL: AWS region. Defaults to client's region or bucket's region.
    compress: true # OPTIONAL: Compress snapshot data (default: true)
    server_side_encryption: true # OPTIONAL: Enable S3 server-side encryption (default: false)
    # AWS Credentials:
    # Recommended to use IAM roles for EC2 instances or provide credentials via environment variables.
    # If explicit credentials are required (less secure for long-term):
    # access_key: "YOUR_AWS_ACCESS_KEY_ID"
    # secret_key: "YOUR_AWS_SECRET_ACCESS_KEY"
    # session_token: "YOUR_AWS_SESSION_TOKEN" # If using temporary credentials

