# Generated by google (gemini-2.5-flash)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

.build_template:
  stage: build
  script:
    - mkdir -p build
    - echo "Simulating build: creating binary and config"
    - echo "This is a dummy binary" > build/my_app
    - echo "ENVIRONMENT=prod" > build/app_config.txt
  artifacts:
    paths:
      - build/
    expire_in: 30 days
  tags:
    - docker

build_job:
  extends: .build_template

deploy_to_staging:
  stage: deploy
  script:
    - echo "Deploying to staging..."
    - echo "Downloading artifacts from build_job"
    - cat build/my_app
    - cat build/app_config.txt
    - echo "Executing my_app with config on staging"
    - chmod +x build/my_app
    - ./build/my_app
    - source build/app_config.txt
    - echo "Staging environment variable: $ENVIRONMENT"
  dependencies:
    - build_job
  tags:
    - docker

deploy_to_production:
  stage: deploy
  script:
    - echo "Deploying to production..."
    - echo "Downloading artifacts from build_job"
    - cat build/my_app
    - cat build/app_config.txt
    - echo "Executing my_app with config on production"
    - chmod +x build/my_app
    - ./build/my_app
    - source build/app_config.txt
    - echo "Production environment variable: $ENVIRONMENT"
  dependencies:
    - build_job
  when: manual
  tags:
    - docker

stages:
  - build
  - deploy