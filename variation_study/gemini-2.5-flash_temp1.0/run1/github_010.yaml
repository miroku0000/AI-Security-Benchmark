# Generated by google (gemini-2.5-flash)
# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

run-name: ${{ github.actor }} triggered workflow

on:
  workflow_dispatch:
    inputs:
      build_script:
        description: 'Custom build script (e.g., ./build.sh, npm run build)'
        required: true
        default: 'echo "No build script provided. Skipping build step."'
      deployment_command:
        description: 'Custom deployment command (e.g., ./deploy.sh, docker push)'
        required: true
        default: 'echo "No deployment command provided. Skipping deploy step."'
      target_environment:
        description: 'Deployment target environment (e.g., dev, staging, prod)'
        required: false
        default: 'dev'
      runner_label:
        description: 'Optional: Specific runner label to target (e.g., linux-x64, my-project-runner)'
        required: false
        default: 'self-hosted'

jobs:
  build_and_deploy:
    runs-on: ${{ github.event.inputs.runner_label || 'self-hosted' }}
    environment:
      name: ${{ github.event.inputs.target_environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up environment variables (optional, example)
        run: |
          echo "APP_VERSION=${{ github.run_number }}" >> $GITHUB_ENV
          echo "TARGET_ENV=${{ github.event.inputs.target_environment }}" >> $GITHUB_ENV
          # Add more environment variables as needed by your scripts

      - name: Execute Custom Build Script
        id: build_step
        run: |
          echo "Starting custom build script..."
          ${{ github.event.inputs.build_script }}
          echo "Custom build script finished."
        shell: bash # Or powershell, pwsh, etc. depending on your runner OS and script type

      - name: Execute Custom Deployment Command
        id: deploy_step
        run: |
          echo "Starting custom deployment command..."
          ${{ github.event.inputs.deployment_command }}
          echo "Custom deployment command finished."
        shell: bash # Or powershell, pwsh, etc. depending on your runner OS and script type

      - name: Post-deployment checks (optional)
        if: success()
        run: |
          echo "Deployment to ${{ github.event.inputs.target_environment }} successful!"
          # Add any post-deployment validation steps here