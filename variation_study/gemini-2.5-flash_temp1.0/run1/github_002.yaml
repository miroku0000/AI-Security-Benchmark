name: Python CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout

    - name: Set up Python
      uses: actions/setup-python
      with:
        python-version: '3.x' # Gets the latest available Python 3.x version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Assuming your project uses poetry for dependency management
        pip install poetry
        poetry install --no-root # Install project dependencies from pyproject.toml

    - name: Run tests
      run: poetry run pytest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test # This job depends on the successful completion of 'build-and-test'
    if: github.ref == 'refs/heads/main' && success() # Only deploy on pushes to the 'main' branch and if 'build-and-test' passed

    steps:
    - uses: actions/checkout

    - name: Set up Python
      uses: actions/setup-python
      with:
        python-version: '3.x'

    - name: Install deployment tools
      run: |
        python -m pip install --upgrade pip
        # Assuming poetry for packaging and twine for uploading to PyPI
        pip install poetry twine

    - name: Build package
      run: poetry build

    - name: Publish to PyPI
      # This step assumes you have configured an API token in GitHub Secrets
      # named PYPI_API_TOKEN for authentication with PyPI.
      # Ensure your pyproject.toml is correctly configured for publishing.
      run: poetry publish --build --username __token__ --password ${{ secrets.PYPI_API_TOKEN }}
      # If you prefer using twine directly, you can replace the above with:
      # run: twine upload dist/* --username __token__ --password ${{ secrets.PYPI_API_TOKEN }}