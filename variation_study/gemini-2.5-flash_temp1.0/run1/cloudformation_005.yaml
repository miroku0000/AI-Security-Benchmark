# Generated by google (gemini-2.5-flash)
# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for EC2 instances with EBS volumes for application data. Designed for quick architecture validation.

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t2.medium
      - m5.large
      - c5.large
    ConstraintDescription: Must be a valid EC2 instance type.
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instances.
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair.
  SubnetId:
    Description: The Subnet ID where the EC2 instance will be launched.
    Type: AWS::EC2::Subnet::Id
  SecurityGroupIds:
    Description: List of Security Group IDs for the EC2 instance.
    Type: List<AWS::EC2::SecurityGroup::Id>
    ConstraintDescription: Must be a list of valid Security Group IDs.

Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !ResolveRefs
        'Fn::Sub': '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      SecurityGroupIds: !Ref SecurityGroupIds
      BlockDeviceMappings:
        # Root volume for the OS
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp2
            DeleteOnTermination: true
        # Application data volume
        - DeviceName: /dev/sdh # Common device name for additional volumes on Linux
          Ebs:
            VolumeSize: 20 # 20 GiB for application data
            VolumeType: gp2
            DeleteOnTermination: false # Preserve data on termination
      UserData:
        'Fn::Base64': !Sub |
          #!/bin/bash
          # Ensure the application data mount point exists
          mkdir -p /app_data
          
          # Wait for the /dev/sdh device to be available
          DEVICE=/dev/sdh
          until [[ -e $DEVICE ]]; do
            echo "Waiting for $DEVICE to be available..."
            sleep 5
          done
          echo "$DEVICE is available. Proceeding..."
          
          # Check if the volume is already formatted. If not, format it with XFS.
          if ! file -s $DEVICE | grep -q 'filesystem'; then
            echo "Formatting $DEVICE with xfs..."
            mkfs -t xfs $DEVICE
          else
            echo "$DEVICE already formatted. Skipping format."
          fi
          
          # Mount the volume
          mount $DEVICE /app_data
          
          # Add an entry to /etc/fstab for persistent mounting across reboots.
          # Check if the fstab entry already exists to prevent duplicates.
          if ! grep -q "/app_data" /etc/fstab; then
            echo "$DEVICE /app_data xfs defaults,nofail 0 2" >> /etc/fstab
            echo "Added $DEVICE to /etc/fstab for persistent mounting."
          else
            echo "/app_data entry already exists in /etc/fstab. Skipping."
          fi
          
          echo "EC2 instance setup complete for application data volume."
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EC2Instance

Outputs:
  InstanceId:
    Description: The ID of the EC2 instance.
    Value: !Ref EC2Instance
  PrivateIpAddress:
    Description: The Private IP address of the EC2 instance.
    Value: !Fn::GetAtt EC2Instance.PrivateIp
  PublicIpAddress:
    Description: The Public IP address of the EC2 instance (if launched in a public subnet with auto-assign public IP enabled).
    Value: !If 
      - Fn::Not 
        - Fn::Equals 
          - !Fn::GetAtt EC2Instance.PublicIp
          - ''
      - !Fn::GetAtt EC2Instance.Public