apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: http-ingress-gateway
spec:
  selector:
    istio: ingressgateway # Selects the default Istio ingress gateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*" # Accepts traffic for any host on this gateway
---
