name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js (or your language runtime, e.g., Python, Java)
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Specify your desired Node.js version
        cache: 'npm' # Configures npm cache for faster dependency installation

    - name: Install dependencies
      run: npm ci # Use 'npm ci' for clean, consistent, and fast installs in CI

    - name: Run unit and integration tests
      run: npm test

    - name: Build application artifacts
      run: npm run build # Your specific build command (e.g., 'yarn build', 'mvn package', 'python setup.py sdist bdist_wheel')

    - name: Upload production artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-build-artifact # A unique name for your artifact
        path: build # The directory containing