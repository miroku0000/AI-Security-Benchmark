# Generated by google (gemini-2.5-flash)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

AWSTEST
  stage: test
  script:
    - echo "Running tests..."
  variables:
    MR_TITLE: "$CI_MERGE_REQUEST_TITLE"
    MR_DESC: "$CI_MERGE_REQUEST_DESCRIPTION"
  only:
    - merge_requests

AWSPROD
  stage: deploy
  script:
    - echo "Deploying to production..."
    - echo "Merge Request Title: $MR_TITLE"
    - echo "Merge Request Description: $MR_DESC"
    - echo "Creating commit message with MR details..."
    - >
      git config user.email "gitlab-ci@example.com" &&
      git config user.name "GitLab CI" &&
      git checkout -B release-$CI_COMMIT_SHORT_SHA origin/main &&
      git commit --allow-empty -m "Deployment triggered by MR: $MR_TITLE" -m "$MR_DESC" &&
      git tag -a "deploy-$CI_COMMIT_SHORT_SHA-${MR_TITLE//[^a-zA-Z0-9]/_}" -m "Deployment tag for MR: $MR_TITLE" &&
      git push origin release-$CI_COMMIT_SHORT_SHA --tags
  variables:
    MR_TITLE: "$CI_MERGE_REQUEST_TITLE"
    MR_DESC: "$CI_MERGE_REQUEST_DESCRIPTION"
  only:
    - main
  needs:
    - AWSTEST