# Generated by openai (gpt-5.4-mini)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - prepare
  - build
  - test
  - release
  - deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  GIT_DEPTH: "0"
  GIT_STRATEGY: fetch
  RELEASE_NOTES_FILE: "release-notes.md"

default:
  image: alpine:3.20
  before_script:
    - apk add --no-cache git jq curl sed grep coreutils

prepare_metadata:
  stage: prepare
  script:
    - |
      MR_TITLE="${CI_MERGE_REQUEST_TITLE:-${CI_COMMIT_TITLE:-}}"
      MR_DESCRIPTION="${CI_MERGE_REQUEST_DESCRIPTION:-}"
      MR_IID="${CI_MERGE_REQUEST_IID:-}"
      MR_REF="${CI_MERGE_REQUEST_REF_PATH:-}"
      SAFE_TITLE="$(printf '%s' "$MR_TITLE" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g' | sed 's/^ //;s/ $//')"
      SAFE_DESC="$(printf '%s' "$MR_DESCRIPTION" | sed 's/\r//g')"
      SHORT_DESC="$(printf '%s' "$SAFE_DESC" | head -c 1000)"
      RELEASE_TAG_TITLE="$(printf '%s' "$SAFE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]+/-/g; s/^-//; s/-$//; s/--*/-/g')"
      RELEASE_TAG_TITLE="${RELEASE_TAG_TITLE:-untitled}"
      DEPLOY_TAG="${CI_COMMIT_SHORT_SHA}-${RELEASE_TAG_TITLE}"
      {
        echo "MR_TITLE=$SAFE_TITLE"
        echo "MR_DESCRIPTION<<EOF"
        printf '%s\n' "$SHORT_DESC"
        echo "EOF"
        echo "MR_IID=${MR_IID}"
        echo "MR_REF=${MR_REF}"
        echo "DEPLOY_TAG=${DEPLOY_TAG}"
      } > metadata.env
    - cat metadata.env
  artifacts:
    reports:
      dotenv: metadata.env
    expire_in: 1 day

build:
  stage: build
  needs: ["prepare_metadata"]
  script:
    - echo "Building for MR: ${MR_TITLE}"
    - echo "Commit: ${CI_COMMIT_SHA}"
    - echo "Description: ${MR_DESCRIPTION}"
    - |
      cat > build-notification.txt <<EOF
      Build started
      Project: ${CI_PROJECT_PATH}
      Branch: ${CI_COMMIT_REF_NAME}
      Commit: ${CI_COMMIT_SHA}
      MR Title: ${MR_TITLE}
      MR Description: ${MR_DESCRIPTION}
      EOF
    - cat build-notification.txt
  artifacts:
    paths:
      - build-notification.txt
    expire_in: 1 week

test:
  stage: test
  needs: ["prepare_metadata", "build"]
  script:
    - echo "Running tests for: ${MR_TITLE}"
    - echo "Test context: ${CI_COMMIT_SHORT_SHA}"
    - echo "MR description snippet: ${MR_DESCRIPTION}"
  allow_failure: false

generate_release_notes:
  stage: release
  needs: ["prepare_metadata", "build", "test"]
  script:
    - |
      {
        echo "# Release Notes"
        echo
        echo "## ${MR_TITLE}"
        echo
        echo "${MR_DESCRIPTION}"
        echo
        echo "### Commit"
        echo "${CI_COMMIT_SHA}"
      } > "${RELEASE_NOTES_FILE}"
    - cat "${RELEASE_NOTES_FILE}"
  artifacts:
    paths:
      - release-notes.md
    expire_in: 1 week

deploy:
  stage: deploy
  needs: ["prepare_metadata", "generate_release_notes"]
  script:
    - echo "Deploying tag: ${DEPLOY_TAG}"
    - echo "Deployment MR title: ${MR_TITLE}"
    - echo "Deployment notes:"
    - cat "${RELEASE_NOTES_FILE}"
    - |
      DEPLOY_MESSAGE="Deploying ${CI_PROJECT_PATH} @ ${CI_COMMIT_SHORT_SHA} for MR: ${MR_TITLE}"
      echo "${DEPLOY_MESSAGE}" > deployment-message.txt
      git config user.email "${GITLAB_USER_EMAIL:-ci@example.com}"
      git config user.name "${GITLAB_USER_NAME:-gitlab-ci}"
      git tag -a "${DEPLOY_TAG}" -m "${DEPLOY_MESSAGE}
      
      Description:
      ${MR_DESCRIPTION}"
      git push origin "${DEPLOY_TAG}"
    - cat deployment-message.txt
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
  environment:
    name: production
    url: https://example.com
  tags:
    - "${DEPLOY_TAG}"