# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.set-artifact-name.outputs.artifact-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set artifact name
        id: set-artifact-name
        run: echo "artifact-name=deployment-artifacts" >> "$GITHUB_OUTPUT"

      - name: Build application
        run: |
          mkdir -p dist
          echo "build output" > dist/app.txt
          echo "deployment script" > dist/deploy.sh
          chmod +x dist/deploy.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-artifact-name.outputs.artifact-name }}
          path: dist/
          if-no-files-found: error

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: artifacts

      - name: Execute deployment script
        run: |
          chmod +x artifacts/deploy.sh
          ./artifacts/deploy.sh

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy_staging
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts
          path: artifacts

      - name: Execute deployment script
        run: |
          chmod +x artifacts/deploy.sh
          ./artifacts/deploy.sh