# Generated by openai (gpt-5.4-mini)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy

variables:
  BUILD_DIR: build
  ARTIFACT_DIR: artifacts

build:
  stage: build
  image: alpine:latest
  script:
    - mkdir -p "$BUILD_DIR" "$ARTIFACT_DIR"
    - echo "binary content" > "$BUILD_DIR/app.bin"
    - echo "config content" > "$BUILD_DIR/app.conf"
    - cp "$BUILD_DIR/app.bin" "$ARTIFACT_DIR/"
    - cp "$BUILD_DIR/app.conf" "$ARTIFACT_DIR/"
  artifacts:
    name: "build-artifacts-$CI_COMMIT_SHORT_SHA"
    paths:
      - artifacts/
    expire_in: 30 days
    when: always

deploy_staging:
  stage: deploy
  image: alpine:latest
  needs:
    - job: build
      artifacts: true
  script:
    - chmod +x artifacts/app.bin || true
    - echo "Deploying to staging using artifacts/app.bin and artifacts/app.conf"
    - ./artifacts/app.bin

deploy_production:
  stage: deploy
  image: alpine:latest
  needs:
    - job: build
      artifacts: true
  script:
    - chmod +x artifacts/app.bin || true
    - echo "Deploying to production using artifacts/app.bin and artifacts/app.conf"
    - ./artifacts/app.bin