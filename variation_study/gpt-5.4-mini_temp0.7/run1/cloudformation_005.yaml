AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instances with attached EBS volumes for application data

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for the EC2 instances
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet for the EC2 instances
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      - t3.2xlarge
    Description: EC2 instance type
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Optional SSH key pair name
  InstanceCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 10
    Description: Number of EC2 instances to launch
  AmiId:
    Type: AWS::EC2::Image::Id
    Description: AMI ID for the EC2 instances
  VolumeSizeGiB:
    Type: Number
    Default: 100
    MinValue: 8
    MaxValue: 16384
    Description: Size of the application data EBS volume in GiB
  RootVolumeSizeGiB:
    Type: Number
    Default: 20
    MinValue: 8
    MaxValue: 1024
    Description: Root volume size in GiB
  ApplicationPort:
    Type: Number
    Default: 8080
    MinValue: 1
    MaxValue: 65535
    Description: Application port to allow from within the VPC
  AllowedCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to access the instance on the application port

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for application EC2 instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ApplicationPort
          ToPort: !Ref ApplicationPort
          CidrIp: !Ref AllowedCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  EC2LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        IamInstanceProfile:
          Arn: !GetAtt InstanceProfile.Arn
        SecurityGroupIds:
          - !Ref SecurityGroup
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: !Ref RootVolumeSizeGiB
              VolumeType: gp3
              DeleteOnTermination: true
          - DeviceName: /dev/sdf
            Ebs:
              VolumeSize: !Ref VolumeSizeGiB
              VolumeType: gp3
              DeleteOnTermination: true
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euxo pipefail
            DEVICE="/dev/nvme1n1"
            if [ ! -b "$DEVICE" ]; then
              DEVICE="/dev/xvdf"
            fi
            mkfs -t ext4 "$DEVICE" || true
            mkdir -p /app/data
            grep -q "/app/data" /etc/fstab || echo "$DEVICE /app/data ext4 defaults,nofail 0 2" >> /etc/fstab
            mount -a

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref EC2LaunchTemplate
        Version: !GetAtt EC2LaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-app
    Metadata:
      AWS::CloudFormation::Init:
        configSets:
          default:
            - install
        install:
          commands:
            01_echo:
              command: echo "Instance initialized"

Outputs:
  SecurityGroupId:
    Description: Security group ID
    Value: !Ref SecurityGroup
