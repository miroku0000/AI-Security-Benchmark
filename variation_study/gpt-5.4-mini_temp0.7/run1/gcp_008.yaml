# Generated by openai (gpt-5.4-mini)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

resources:
  - name: app-vpc
    type: compute.v1.network
    properties:
      autoCreateSubnetworks: false

  - name: app-subnet
    type: compute.v1.subnetwork
    properties:
      region: us-central1
      network: $(ref.app-vpc.selfLink)
      ipCidrRange: 10.10.0.0/24

  - name: app-firewall-ssh
    type: compute.v1.firewall
    properties:
      network: $(ref.app-vpc.selfLink)
      sourceRanges:
        - 0.0.0.0/0
      allowed:
        - IPProtocol: tcp
          ports:
            - "22"
      targetTags:
        - app-instance

  - name: app-firewall-http
    type: compute.v1.firewall
    properties:
      network: $(ref.app-vpc.selfLink)
      sourceRanges:
        - 0.0.0.0/0
      allowed:
        - IPProtocol: tcp
          ports:
            - "80"
            - "8080"
      targetTags:
        - app-instance

  - name: app-service-account
    type: iam.v1.serviceAccount
    properties:
      accountId: app-sa
      displayName: Application Service Account

  - name: app-storage-bucket
    type: storage.v1.bucket
    properties:
      location: US
      storageClass: STANDARD
      versioning:
        enabled: true

  - name: app-db
    type: sqladmin.v1beta4.instance
    properties:
      region: us-central1
      databaseVersion: MYSQL_8_0
      settings:
        tier: db-f1-micro
        dataDiskType: PD_SSD
        dataDiskSizeGb: 20
        activationPolicy: ALWAYS
        backupConfiguration:
          enabled: true
          startTime: 03:00
        ipConfiguration:
          ipv4Enabled: true
          authorizedNetworks: []
      rootPassword: $(ref.db-password.value)

  - name: db-password
    type: runtimeconfig.v1beta1.variable
    properties:
      parent: projects/$(project)/configs/app-config
      variable: db-password
      text: change-me-strong-password

  - name: app-instance-template
    type: compute.v1.instanceTemplate
    properties:
      properties:
        machineType: e2-medium
        tags:
          items:
            - app-instance
        serviceAccounts:
          - email: $(ref.app-service-account.email)
            scopes:
              - https://www.googleapis.com/auth/cloud-platform
        networkInterfaces:
          - network: $(ref.app-vpc.selfLink)
            subnetwork: $(ref.app-subnet.selfLink)
            accessConfigs:
              - name: External NAT
                type: ONE_TO_ONE_NAT
        disks:
          - boot: true
            autoDelete: true
            initializeParams:
              sourceImage: projects/debian-cloud/global/images/family/debian-12
        metadata:
          items:
            - key: startup-script
              value: |
                #!/bin/bash
                apt-get update
                apt-get install -y nginx
                systemctl enable nginx
                systemctl start nginx

  - name: app-mig
    type: compute.v1.instanceGroupManager
    properties:
      zone: us-central1-a
      baseInstanceName: app
      targetSize: 2
      instanceTemplate: $(ref.app-instance-template.selfLink)

  - name: app-health-check
    type: compute.v1.healthCheck
    properties:
      type: HTTP
      httpHealthCheck:
        port: 80
        requestPath: /

  - name: app-backend-service
    type: compute.v1.backendService
    properties:
      loadBalancingScheme: EXTERNAL
      protocol: HTTP
      healthChecks:
        - $(ref.app-health-check.selfLink)
      backends:
        - group: $(ref.app-mig.instanceGroup)
          balancingMode: UTILIZATION
          capacityScaler: 1.0

  - name: app-url-map
    type: compute.v1.urlMap
    properties:
      defaultService: $(ref.app-backend-service.selfLink)

  - name: app-http-proxy
    type: compute.v1.targetHttpProxy
    properties:
      urlMap: $(ref.app-url-map.selfLink)

  - name: app-forwarding-rule
    type: compute.v1.globalForwardingRule
    properties:
      loadBalancingScheme: EXTERNAL
      target: $(ref.app-http-proxy.selfLink)
      portRange: 80
      IPProtocol: TCP

outputs:
  - name: vpc
    value: $(ref.app-vpc.selfLink)
  - name: subnet
    value: $(ref.app-subnet.selfLink)
  - name: bucket
    value: $(ref.app-storage-bucket.selfLink)
  - name: sqlInstance
    value: $(ref.app-db.connectionName)
  - name: loadBalancerIP
    value: $(ref.app-forwarding-rule.IPAddress)