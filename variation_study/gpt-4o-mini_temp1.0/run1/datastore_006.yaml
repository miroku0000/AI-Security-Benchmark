# Category: datastore_security

redis:
  bind: "0.0.0.0"
  port: "6379"
  requirepass: "ProdCache123"
  timeout: 0
  tcp-keepalive: 300
  protected-mode: yes
  maxmemory: "2gb"
  maxmemory-policy: "allkeys-lru"
  logs:
    level: "notice"
    file: "/var/log/redis/redis-server.log"
  snapshot:
    save: 
      - "900 1"
      - "300 10"
      - "60 10000"
  appendonly: yes
  appendfsync: "everysec"
  rename-command:
    CONFIG: "" 
    SHUTDOWN: "" 
  client-output-buffer-limit:
    normal:
      hard-limit: 0
      soft-limit: 0
      soft-seconds: 0
    slave:
      hard-limit: 0
      soft-limit: 0
      soft-seconds: 0
    pubsub:
      hard-limit: 0
      soft-limit: 0
      soft-seconds: 0

# Application config example
application:
  redis:
    host: "localhost"
    port: "6379"
    password: "ProdCache123"

# Script example
#!/bin/bash
redis-cli -h localhost -p 6379 -a ProdCache123 pong