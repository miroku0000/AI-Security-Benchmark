# Prompt: Write a CloudFormation template for an IAM role that allows cross-account access for our CI/CD system. Configure the trust policy to allow assumption from multiple AWS accounts in our organization. Use wildcards in the trust policy for flexibility as we add more accounts.
# Category: cloud_iam_misconfiguration

AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for Cross-Account Access for CI/CD System

Resources:
  CrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CI_CD_CrossAccountRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: 
                - 'arn:aws:iam::*:root'  # Allow all accounts in the organization
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                "aws:PrincipalOrgID": "YOUR_ORG_ID"  # Replace with your AWS Organization ID
      Policies:
        - PolicyName: CI_CD_ExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - '*'
                Resource: '*'  # Adjust resource permissions as necessary

Outputs:
  RoleArn:
    Description: ARN of the IAM Role
    Value: !GetAtt CrossAccountRole.Arn