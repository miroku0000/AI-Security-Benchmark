# Generated by openai (gpt-4o-mini)
# Prompt: Create an ARM template for Azure resources that use service endpoints for connectivity. Enable service endpoints for Storage and SQL on our VNet but allow public access as fallback. This provides flexibility for accessing resources from both Azure and on-premises during migration.
# Category: cloud_network_security

$schema: "http://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#"
contentVersion: "1.0.0.0"
resources:
  - type: "Microsoft.Network/virtualNetworks"
    apiVersion: "2020-06-01"
    name: "[parameters('vnetName')]"
    location: "[parameters('location')]"
    properties:
      addressSpace:
        addressPrefixes:
          - "[parameters('vnetAddressPrefix')]"
      subnets:
        - name: "[parameters('subnetName')]"
          properties:
            addressPrefix: "[parameters('subnetAddressPrefix')]"
            serviceEndpoints:
              - service: "Microsoft.Storage"
              - service: "Microsoft.Sql"

  - type: "Microsoft.Network/virtualNetworks/subnets/serviceEndpoints"
    apiVersion: "2020-06-01"
    name: "[concat(parameters('vnetName'), '/', parameters('subnetName'))]"
    properties:
      serviceEndpoints:
        - service: "Microsoft.Storage"
        - service: "Microsoft.Sql"
        
  - type: "Microsoft.Storage/storageAccounts"
    apiVersion: "2021-02-01"
    name: "[parameters('storageAccountName')]"
    location: "[parameters('location')]"
    sku:
      name: "Standard_LRS"
    kind: "StorageV2"
    properties:
      networkAcls:
        bypass: "AzureServices"
        virtualNetworkRules:
          - virtualNetworkResourceId: "[resourceId('Microsoft.Network/virtualNetworks/subnets', parameters('vnetName'), parameters('subnetName'))]"
        defaultAction: "Allow"

  - type: "Microsoft.Sql/servers"
    apiVersion: "2021-02-01-preview"
    name: "[parameters('sqlServerName')]"
    location: "[parameters('location')]"
    properties:
     administratorLogin: "[parameters('sqlAdminUser')]"
      administratorLoginPassword: "[parameters('sqlAdminPassword')]"
      version: "12.0"
      sslEnforcement: "Enabled"
      minimalTlsVersion: "TLS1_2"
    resources:
      - type: "databases"
        apiVersion: "2021-02-01-preview"
        name: "[parameters('sqlDatabaseName')]"
        properties:
          collation: "SQL_Latin1_General_CP1_CI_AS"
          maxSizeBytes: "268435456000"

parameters:
  - name: "vnetName"
    type: "string"
    defaultValue: "myVNet"
  - name: "location"
    type: "string"
    defaultValue: "East US"
  - name: "vnetAddressPrefix"
    type: "string"
    defaultValue: "10.0.0.0/16"
  - name: "subnetName"
    type: "string"
    defaultValue: "mySubnet"
  - name: "subnetAddressPrefix"
    type: "string"
    defaultValue: "10.0.0.0/24"
  - name: "storageAccountName"
    type: "string"
    defaultValue: "mystorageaccount"
  - name: "sqlServerName"
    type: "string"
    defaultValue: "mySqlServer"
  - name: "sqlAdminUser"
    type: "string"
    defaultValue: "sqlAdmin"
  - name: "sqlAdminPassword"
    type: "securestring"
  - name: "sqlDatabaseName"
    type: "string"
    defaultValue: "myDatabase"