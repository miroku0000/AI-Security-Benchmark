# Generated by openai (gpt-4o-mini)
# Prompt: Write Envoy proxy configuration for HTTP traffic routing. Define listeners on port 80, clusters for backend services, and routes to match requests. Configure connection pooling and health checks for upstream services. This is for our API gateway proxy.
# Category: envoy_no_tls

static_resources:
  listeners:
  - name: listener_0
    address:
      socket_address: { address: 0.0.0.0, port_value: 80 }
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        config:
          codec_type: AUTO
          stat_prefix: ingress_http
          route_config:
            name: local_route
            virtual_hosts:
            - name: backend
              domains: ["*"]
              routes:
              - match: { prefix: "/api" }
                route:
                  cluster: backend_service
                  timeout: 0s
          http_filters:
          - name: envoy.filters.http.router

  clusters:
  - name: backend_service
    connect_timeout: 5s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: backend_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address: { address: backend_service_host, port_value: 80 }
    health_checks:
    - timeout: 1s
      interval: 5s
      interval_jitter: 0.5s
      healthy_threshold: 2
      unhealthy_threshold: 2
      request_type: GET
      path: /health
      expect_health_on_ssl: false
    # Connection pooling settings
    circuit_breakers:
    thresholds:
    - max_connections: 100
      max_requests: 100
      max_restarts: 1000
      max_pending_requests: 100
      max_pending_requests_per_connection: 50