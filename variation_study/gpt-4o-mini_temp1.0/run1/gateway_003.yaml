services:
  - name: service-a
    url: http://service-a:8080
    upstream_url: http://service-a:8080
    plugins:
      - name: rate-limiting
        config:
          second: 5
          minute: 100

  - name: service-b
    url: http://service-b:8080
    upstream_url: http://service-b:8080
    plugins:
      - name: key-auth
      - name: cors
        config:
          origins: 
            - '*'
          methods: 
            - GET
            - POST

routes:
  - name: route-to-service-a
    service: service-a
    paths:
      - /api/service-a
    methods:
      - GET
      - POST

  - name: route-to-service-b
    service: service-b
    paths:
      - /api/service-b
    methods:
      - GET
      - POST

plugins:
  - name: request-transformer
    config:
      http_method: "POST"
      add:
        headers:
          - "X-Header-Example: Value"