AWSTemplateFormatVersion: '2010-09-09'
Description: Quick Launch EC2 Instances with EBS Volumes

Resources:
  EC2Instance1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: ami-0c55b159cbfafe1f0  # Update with the latest AMI for your region
      KeyName: my-key-pair  # Update with your EC2 key pair name
