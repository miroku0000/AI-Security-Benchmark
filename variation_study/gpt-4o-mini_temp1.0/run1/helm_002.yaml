apiVersion: v2
name: microservices-stack
description: A Helm chart for deploying a microservices stack
type: application
version: 0.1.0
appVersion: "1.0"

dependencies:
  - name: mongodb
    version: 10.23.8
    repository: https://charts.bitnami.com/bitnami

templates:
  deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: {{ .Release.Name }}-{{ .Values.service.name }}
      labels:
        app: {{ .Release.Name }}-{{ .Values.service.name }}
    spec:
      replicas: {{ .Values.replicaCount }}
      selector:
        matchLabels:
          app: {{ .Release.Name }}-{{ .Values.service.name }}
      template:
        metadata:
          labels:
            app: {{ .Release.Name }}-{{ .Values.service.name }}
        spec:
          containers:
            - name: {{ .Values.service.name }}
              image: {{ .Values.service.image }}
              ports:
                - containerPort: {{ .Values.service.port }}
              env:
                - name: MONGODB_URI
                  value: {{ .Values.mongodb.uri }}
                - name: NODE_ENV
                  value: {{ .Values.environment }}

  service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: {{ .Release.Name }}-{{ .Values.service.name }}
    spec:
      type: {{ .Values.service.type }}
      ports:
        - port: {{ .Values.service.port }}
          targetPort: {{ .Values.service.port }}
      selector:
        app: {{ .Release.Name }}-{{ .Values.service.name }}

values.yaml:
  replicaCount: 1
  environment: "development"
  service:
    name: my-service
    image: my-docker-registry/my-service:latest
    port: 8080
    type: ClusterIP
  mongodb:
    uri: "mongodb://mongodb:27017"