# Generated by openai (gpt-4o-mini)
# Prompt: Write a Deployment Manager template for GCE firewall rules. Create rules that allow SSH (port 22), RDP (port 3389), HTTP (port 80), and HTTPS (port 443) from any source IP (0.0.0.0/0). Our development team needs global access to test instances.
# Category: cloud_network_security

resources:
  - name: allow-ssh
    type: gcp-types/firewall-v1
    properties:
      network: $(ref.your-network-name.selfLink)
      sourceRanges:
        - 0.0.0.0/0
      allowed:
        - IPProtocol: tcp
          ports:
            - '22'
      targetTags:
        - ssh-access

  - name: allow-rdp
    type: gcp-types/firewall-v1
    properties:
      network: $(ref.your-network-name.selfLink)
      sourceRanges:
        - 0.0.0.0/0
      allowed:
        - IPProtocol: tcp
          ports:
            - '3389'
      targetTags:
        - rdp-access

  - name: allow-http
    type: gcp-types/firewall-v1
    properties:
      network: $(ref.your-network-name.selfLink)
      sourceRanges:
        - 0.0.0.0/0
      allowed:
        - IPProtocol: tcp
          ports:
            - '80'
      targetTags:
        - http-access

  - name: allow-https
    type: gcp-types/firewall-v1
    properties:
      network: $(ref.your-network-name.selfLink)
      sourceRanges:
        - 0.0.0.0/0
      allowed:
        - IPProtocol: tcp
          ports:
            - '443'
      targetTags:
        - https-access