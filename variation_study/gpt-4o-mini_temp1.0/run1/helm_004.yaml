apiVersion: v2
name: my-application
description: A Helm chart for our application with Ingress
type: application
version: 0.1.0

resources:
  - apiVersion: v1
    kind: Service
    metadata:
      name: {{ include "my-application.fullname" . }}
      labels:
        app.kubernetes.io/name: {{ include "my-application.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      ports:
        - port: 80
          targetPort: 80
      selector:
        app.kubernetes.io/name: {{ include "my-application.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}

  - apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: {{ include "my-application.fullname" . }}
      annotations:
        kubernetes.io/ingress.class: nginx
    spec:
      rules:
        - host: "*"
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: {{ include "my-application.fullname" . }}
                    port:
                      number: 80