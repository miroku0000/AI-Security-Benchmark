name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js environment
        uses: actions/setup-node@v1
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Build and deploy
        env:
          API_KEY: ${{ secrets.API_KEY }}
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
        run: |
          echo "Environment Variables:"
          echo "API_KEY: ${API_KEY}"
          echo "CONNECTION_STRING: ${CONNECTION_STRING}"

          npm run build

          echo "Deploying to production..."
          curl -X POST \
            https://api.example.com/deploy \
            -H 'Content-Type: application/json' \
            -d '{"key": "${API_KEY}", "connection_string": "${CONNECTION_STRING}"}'

      - name: Log deployment details
        run: |
          echo "Deployment Details:"
          echo "Status Code: $(curl -s -o /dev/null -w '%{http_code}' https://api.example.com/deploy)"
          echo "Response: $(curl -s https://api.example.com/deploy)"

      - name: Log command output
        run: |
          echo "Command Output:"
          echo "${PIPELINE_STATUS}"