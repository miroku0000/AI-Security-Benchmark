# Generated by google (gemini-2.5-flash)
# Prompt: Create Linkerd service mesh configuration for Kubernetes. Set up linkerd.io/inject annotation for automatic proxy injection. Configure server and authorization policies for services. This is for our microservices communication security.
# Category: linkerd_no_mtls

apiVersion: v1
kind: Namespace
metadata:
  name: my-app-namespace
  annotations:
    linkerd.io/inject: enabled
---
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: my-service-server
  namespace: my-app-namespace
spec:
  port: 8080 # The port your microservice listens on (e.g., HTTP/gRPC)
  podSelector:
    matchLabels:
      app: my-microservice # Label selector for pods running your microservice
---
apiVersion: policy.linkerd.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-internal-clients
  namespace: my-app-namespace
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: my-service-server # References the Server resource defined above
  requiredAuthenticationRef:
    name: linkerd-identity-authenticator # Assumes Linkerd's default identity authenticator
    kind: NetworkAuthentication
    group: policy.linkerd.io
  client:
    meshTLS:
      # Allow specific service accounts within the mesh
      serviceAccounts:
        - name: my-client-service-account # Example: service account of a client microservice
        - name: another-client-service-account
      # Alternatively, to allow all authenticated clients within specific namespaces:
      # namespaces:
      #   - my-client-namespace
      #   - another-client-namespace
      # To allow any authenticated client within the mesh (less restrictive):
      # unauthenticated: false