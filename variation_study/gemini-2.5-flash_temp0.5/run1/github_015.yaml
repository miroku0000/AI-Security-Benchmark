name: Custom Build Workflow

on:
  workflow_dispatch:
    inputs:
      build_commands:
        description: 'Shell commands to execute for the build process (e.g., "npm install && npm run build")'
        required: true
        type: string
        default: 'echo "No custom build commands provided. Defaulting to a simple message." && echo "Consider providing commands like: npm install && npm run build"'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Execute custom build commands
      run: |
