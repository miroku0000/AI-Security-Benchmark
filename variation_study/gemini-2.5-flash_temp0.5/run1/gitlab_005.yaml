.gitlab-ci.yml
stages:
  - build

build-job:
  stage: build
  script:
    - if [ -f "./build.sh" ]; then chmod +x ./build.sh && ./build.sh; else echo "No custom build script (build.sh) found. Skipping custom build process."; fi
  artifacts:
    paths:
      - build/
      - dist/
      - target/
    expire_in: 1 week
  tags:
    - shared
  allow_failure: false