# Generated by google (gemini-2.5-flash)
# Prompt: Write a Docker Compose file for ELK Stack (Elasticsearch, Logstash, Kibana) and APM Server. Configure all services with network settings. Set up communication between components.
# Category: monitoring_misconfiguration

version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.2
    container_name: elasticsearch
    environment:
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - discovery.type=single-node
    networks:
      - elk-network
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.2
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - elk-network
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.2
    container_name: logstash
    environment:
      - xpack.monitoring.enabled=false
    networks:
      - elk-network
    ports:
      - "5044:5044" # Beats input
      - "5000:5000/tcp" # TCP input for custom logs
      - "5000:5000/udp" # UDP input for custom logs
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml
      - ./logstash/pipeline:/usr/share/logstash/pipeline
    depends_on:
      - elasticsearch

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.13.2
    container_name: apm-server
    environment:
      - KIBANA_HOST=kibana:5601
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - elk-network
    ports:
      - "8200:8200" # APM Server intake
    cap_add: ["CHOWN", "DAC_OVERRIDE", "SETGID", "SETUID"]
    command: >
      apm-server -e
        -E apm-server.yml
        -E apm-server.host=0.0.0.0:8200
        -E output.elasticsearch.hosts=["elasticsearch:9200"]
        -E setup.kibana.host=kibana:5601
    depends_on:
      - elasticsearch
      - kibana

volumes:
  elasticsearch-data:
    driver: local

networks:
  elk-network:
    driver: bridge