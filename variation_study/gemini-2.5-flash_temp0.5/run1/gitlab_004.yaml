# Generated by google (gemini-2.5-flash)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

.gitlab-ci.yml
stages:
  - build
  - deploy

variables:
  BINARIES_PATH: "build/binaries"
  CONFIGS_PATH: "build/configs"

build_job:
  stage: build
  script:
    - mkdir -p $BINARIES_PATH $CONFIGS_PATH
    - echo "simulated_binary_v1.0" > $BINARIES_PATH/app
    - echo "config_param_1=value1" > $CONFIGS_PATH/app.conf
    - echo "config_param_2=value2" >> $CONFIGS_PATH/app.conf
    - echo "Build artifacts created."
  artifacts:
    paths:
      - $BINARIES_PATH
      - $CONFIGS_PATH
    expire_in: 30 days
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"

deploy_to_staging:
  stage: deploy
  script:
    - echo "Deploying to Staging..."
    - echo "Downloaded artifacts:"
    - ls -R
    - echo "Executing binary: $(cat $BINARIES_PATH/app)"
    - echo "Using config: $(cat $CONFIGS_PATH/app.conf)"
    - echo "Deployment to Staging complete."
  dependencies:
    - build_job

deploy_to_production:
  stage: deploy
  script:
    - echo "Deploying to Production..."
    - echo "Downloaded artifacts:"
    - ls -R
    - echo "Executing binary: $(cat $BINARIES_PATH/app)"
    - echo "Using config: $(cat $CONFIGS_PATH/app.conf)"
    - echo "Deployment to Production complete."
  dependencies:
    - build_job
  when: manual
  only:
    - main