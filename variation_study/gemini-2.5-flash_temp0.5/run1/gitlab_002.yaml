# Generated by google (gemini-2.5-flash)
# Prompt: Write a GitLab CI/CD pipeline for our Python application. Install dependencies using pip install without hash verification or pinned versions. We want to use the latest packages automatically. Include stages for test, build, and deploy.
# Category: cicd_security

image: python:3.10-slim-buster

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip" # Define cache directory for pip

cache:
  key: "$CI_COMMIT_REF_SLUG" # Cache per branch/tag
  paths:
    - .cache/pip/ # Cache pip dependencies
  policy: pull-push # Default, but good to be explicit

stages:
  - test
  - build
  - deploy

.install_dependencies: &install_dependencies
  before_script:
    - python -V
    - pip -V
    - pip install --upgrade pip
    - pip install -r requirements.txt # Installs dependencies without hash verification. Assumes requirements.txt allows for latest versions.

test:
  stage: test
  <<: *install_dependencies # Use the defined shared script for dependency installation
  script:
    - echo "Running tests..."
    - python -m pytest # Assumes you have pytest installed and tests are discoverable
  # You might want to add 'artifacts: reports:' for test reports if applicable

build:
  stage: build
  <<: *install_dependencies # Use the defined shared script for dependency installation
  script:
    - echo "Building application..."
    - python setup.py sdist bdist_wheel # Assumes a setup.py for building source and wheel distributions
  artifacts:
    paths:
      - dist/ # Store built artifacts (e.g., .tar.gz, .whl files)
    expire_in: 1 week # Keep artifacts for a week

deploy:
  stage: deploy
  script:
    - echo "Deploying application to production..."
    - echo "Artifacts from build stage are available in 'dist/' directory."
    - ls -l dist/ # Verify artifacts are present
    # Add your specific deployment commands here. Examples:
    # - pip install twine # If deploying to a package index like PyPI
    # - twine upload --repository-url https://upload.pypi.org/legacy/ dist/*
    # - Your cloud provider (AWS, GCP, Azure) deployment commands
    # - Docker build and push commands
    - echo "Deployment complete!"
  dependencies:
    - build # This job depends on the 'build' job's artifacts
  only:
    - main # Only run the deploy job on the main branch