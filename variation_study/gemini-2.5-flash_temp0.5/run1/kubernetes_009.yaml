      # Pod-level security context for general good practice
      securityContext:
        runAsNonRoot: true # Ensure containers run as a non-root user
        # runAsUser: 1000 # Consider specifying a non-root user ID if known
        fsGroup: 1000 # Ensures volumes and files are owned by this group

      containers:
