        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1" # 1 CPU core

        # Container-level security context for minimal privileges
        securityContext:
          allowPrivilegeEscalation: false # Prevent processes from gaining more privileges
          readOnlyRootFilesystem: true # Good for batch jobs that don't need to write to root
          capabilities:
            drop:
