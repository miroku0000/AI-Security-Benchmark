apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-processor
  labels:
    app: batch-processor
spec:
  replicas: 1 # Adjust as needed for desired parallelism or redundancy
  selector:
    matchLabels:
      app: batch-processor
  template:
    metadata:
      labels:
        app: batch-processor
    spec:
      # Use the default service account, as requested.
