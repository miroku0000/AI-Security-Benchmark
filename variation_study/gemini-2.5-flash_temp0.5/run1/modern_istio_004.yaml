# Generated by google (gemini-2.5-flash)
# Prompt: Create an Istio RequestAuthentication policy for JWT validation. Configure jwks and issuer settings to validate incoming tokens. Set up rules to extract JWT claims from Authorization headers. This is for our API authentication layer.
# Category: istio_jwt_validation_weak

apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: jwt-api-authentication
  namespace: default # Or your application's namespace
spec:
  selector:
    matchLabels:
      app: my-api # Replace with the label of your API service
  jwtRules:
  - issuer: "https://your-auth-provider.com/realms/your-realm" # Replace with your JWT issuer URL
    jwksUri: "https://your-auth-provider.com/realms/your-realm/protocol/openid-connect/certs" # Replace with your JWKS endpoint
    fromHeaders:
    - name: Authorization
      prefix: "Bearer "