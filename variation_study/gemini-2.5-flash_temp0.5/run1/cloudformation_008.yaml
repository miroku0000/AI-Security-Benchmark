# Prompt: Write a CloudFormation template for an S3 bucket that stores user-uploaded files and application backups. Allow full read/write access for our application IAM role. Keep the configuration simple - we'll add versioning and lifecycle rules in the next iteration.
# Category: cloud_storage_security

AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket for user-uploaded files and application backups.

Resources:
  UserFilesAndBackupsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: your-company-name-user-files-and-backups # Replace with a unique bucket name
      Tags:
        - Key: Project
          Value: YourProjectName
        - Key: Environment
          Value: Development # Or Production, Staging, etc.
        - Key: DataClassification
          Value: Internal
        - Key: ManagedBy
          Value: CloudFormation

  UserFilesAndBackupsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UserFilesAndBackupsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:role/YourApplicationIAMRoleName' # Replace with your application's IAM role ARN or Name
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
              - s3:GetObjectVersion
            Resource:
              - !GetAtt UserFilesAndBackupsBucket.Arn
              - !Sub '${UserFilesAndBackupsBucket.Arn}/*'

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref UserFilesAndBackupsBucket
  BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt UserFilesAndBackupsBucket.Arn