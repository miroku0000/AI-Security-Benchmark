# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

AWSTemplateFormatVersion: '2010-09-09'
Description: GitLab CI pipeline for feature deployments and release notes.

Parameters:
  GitLabProjectId:
    Type: String
    Description: The GitLab project ID where this pipeline will run.
  AwsRegion:
    Type: String
    Description: The AWS region to deploy resources.
    Default: us-east-1
  S3BucketName:
    Type: String
    Description: S3 bucket name to store build artifacts.
  EcrRepositoryName:
    Type: String
    Description: ECR repository name for Docker images.
  IamRoleArn:
    Type: String
    Description: IAM Role ARN with permissions for S3, ECR, and other AWS services.

Resources:
  GitLabCiPipeline:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: s3://your-s3-bucket/gitlab-ci-template.yaml # Replace with your S3 bucket and key for .gitlab-ci.yml
      Parameters:
        GITLAB_PROJECT_ID: !Ref GitLabProjectId
        AWS_REGION: !Ref AwsRegion
        S3_BUCKET_NAME: !Ref S3BucketName
        ECR_REPOSITORY_NAME: !Ref EcrRepositoryName
        IAM_ROLE_ARN: !Ref IamRoleArn

Outputs:
  PipelineUrl:
    Description: URL to the GitLab CI pipeline.
    Value: !Join
      - ''
      - - 'https://gitlab.com/'
        - !Ref GitLabProjectId
        - '/-/pipelines'

