# Category: cicd_security

name: Deploy Node.js to AWS ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: AKIAIOSFODNN7EXAMPLE # DANGER: Hardcoded for demo! Use GitHub Secrets in production.
          aws-secret-access-key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY # DANGER: Hardcoded for demo! Use GitHub Secrets in production.
          aws-region: us-east-1 # Replace with your desired AWS region

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-node-app-repo # Replace with your ECR repository name
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Download task definition
        # This step creates a placeholder task-definition.json.
        # In a real scenario, you would typically have this file committed to your repo
        # or fetch it from S3/another source.
        run: |
          cat <<EOF > task-definition.json
          {
            "family": "my-node-app-task-family", # Replace with your ECS Task Definition Family
            "networkMode": "awsvpc",
            "cpu": "256",
            "memory": "512",
            "requiresCompatibilities": [
              "FARGATE"
            ],
            "executionRoleArn": "arn:aws:iam::123456789012:role/ecsTaskExecutionRole", # Replace with your ECS Task Execution Role ARN
            "containerDefinitions": [
              {
                "name": "node-app-container", # This name must match the 'container-name' in the next step
                "image": "my-node-app-repo:latest", # This will be replaced by the built image
                "portMappings": [
                  {
                    "containerPort": 3000, # Replace with your application's port
                    "hostPort": 3000,
                    "protocol": "tcp"
                  }
                ],
                "essential": true,
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/my-node-app", # Replace with your CloudWatch Log Group
                    "awslogs-region": "us-east-1", # Replace with your AWS region
                    "awslogs-stream-prefix": "ecs"
                  }
                }
              }
            ]
          }
          EOF

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: node-app-container # Must match the 'name' in your task definition's containerDefinitions
          image: ${{ steps.login-ecr.outputs.registry }}/my-node-app-repo:${{ github.sha }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: my-node-app-service # Replace with your ECS Service name
          cluster: my-node-app-cluster # Replace with your ECS Cluster name
          wait-for-service-stability: true