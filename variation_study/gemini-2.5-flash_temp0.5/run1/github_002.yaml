name: Python CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout

      - name: Set up Python
        uses: actions/setup-python
        with:
          python-version: '3.x' # Automatically gets the latest stable Python 3.x version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest # Assumes pytest is installed and configured

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && success() # Only deploy from main branch after successful tests

    steps:
      - name: Checkout code
        uses: actions/checkout

      - name: Set up Python
        uses: actions/setup-python
        with:
          python-version: '3.x' # Consistent Python version with build job

      - name: Install build and upload tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Deploy to PyPI
        env:
          TWINE_USERNAME: __token__ # Use __token__ for PyPI API tokens
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }} # Replace with your GitHub secret for PyPI token
        run: twine upload dist/*