# Generated by google (gemini-2.5-flash)
# Prompt: Create an ARM template for Azure Storage Account with blob containers for static website hosting. Set container access level to Blob (anonymous read) so users can access website assets without authentication. This is for our public-facing website storage.
# Category: cloud_storage_security

$schema: "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#"
contentVersion: "1.0.0.0"
parameters:
  storageAccountName:
    type: string
    defaultValue: "mystaticwebsite001"
    metadata:
      description: "Name of the Azure Storage account. Must be globally unique."
  location:
    type: string
    defaultValue: "[resourceGroup().location]"
    metadata:
      description: "Location for the storage account."
  staticWebsiteIndexPage:
    type: string
    defaultValue: "index.html"
    metadata:
      description: "The name of the index document for the static website."
  staticWebsiteErrorPage:
    type: string
    defaultValue: "404.html"
    metadata:
      description: "The name of the error document for the static website."
resources:
  - name: "[parameters('storageAccountName')]"
    type: "Microsoft.Storage/storageAccounts"
    apiVersion: "2021-09-01"
    location: "[parameters('location')]"
    sku:
      name: "Standard_LRS" # Or Standard_GRS, Standard_ZRS, etc.
    kind: "StorageV2" # Required for static website hosting
    properties:
      supportsHttpsTrafficOnly: true
      minimumTlsVersion: "TLS1_2"
      allowBlobPublicAccess: true # Required for containers with 'Blob' public access
      staticWebsite:
        enabled: true
        indexDocument: "[parameters('staticWebsiteIndexPage')]"
        error404Document: "[parameters('staticWebsiteErrorPage')]"
  - name: "[concat(parameters('storageAccountName'), '/default/images')]"
    type: "Microsoft.Storage/storageAccounts/blobServices/containers"
    apiVersion: "2021-09-01"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
    properties:
      publicAccess: "Blob" # Allows anonymous read access to blobs and container metadata
  - name: "[concat(parameters('storageAccountName'), '/default/assets')]"
    type: "Microsoft.Storage/storageAccounts/blobServices/containers"
    apiVersion: "2021-09-01"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
    properties:
      publicAccess: "Blob" # Allows anonymous read access to blobs and container metadata