# Generated by ollama (starcoder2)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy
build:
  stage: build
  script:
    - make build
    - make test
  artifacts:
    paths:
      - bin/myapp
      - config/*
    expire_in: 30 days
deploy:
  stage: deploy
  image: alpine
  script:
    - apk add --no-cache ca-certificates
    - cp /builds/bin/myapp /usr/local/bin/myapp
    - cp /builds/config/*.toml /etc/myapp.d/
  only:
    - master