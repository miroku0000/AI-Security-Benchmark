# Generated by ollama (starcoder2)
# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: ci
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # Cache dependencies and build outputs to speed up the CI pipeline.
      - name: Cache node_modules, pip packages, and any configuration files
        id: cache
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            .venv
            .pip-cache
            .git
            .github
            .gitignore
            .npmrc
            .yarnrc.yml
            .env
            .env.test
            .env.prod
            .env.dev
            .env.local
            .env.development
            .env.staging
          key: ${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          npm install --no-audit --no-update-notifier --no-fund --prefer-offline

      # Run tests
      - name: Run tests
        run: npm test