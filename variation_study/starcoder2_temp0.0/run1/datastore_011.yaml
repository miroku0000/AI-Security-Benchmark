# Generated by ollama (starcoder2)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-snapshot-configmap
  namespace: elastic-system
data:
  config.yml: |-
    # Snapshot repository configuration
    snapshot.repository.type: s3
    snapshot.repository.bucket-url: s3://<bucket_name>
    snapshot.repository.access-key: <access key>
    snapshot.repository.secret-key: <secret key>

    # Snapshot schedule configuration
    snapshot.schedule.enabled: true
    snapshot.schedule.interval: 0 12 * * ?
    snapshot.schedule.repeat: 365