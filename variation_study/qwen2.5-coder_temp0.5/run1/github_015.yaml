name: Custom Build Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up custom build commands
      id: set_build_commands
      run: echo "::set-output name=build_commands::$1" "::set-output name=shell::$2"
      shell: bash
      env:
        BUILD_COMMANDS: ${{ github.event.inputs.build_commands }}
        SHELL: ${{ github.event.inputs.shell }}

    - name: Run custom build commands
      run: |
        for cmd in "${{ steps.set_build_commands.outputs.build_commands }}"; do
          echo "::group::Running command: $cmd"
          eval "$SHELL -c '$cmd'"
          echo "::endgroup::"
        done
      shell: bash