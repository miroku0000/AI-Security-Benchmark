            app.kubernetes.io/instance: {{ .Release.Name }}
        spec:
          containers:
            - name: service1
              image: "service1:latest"
              imagePullPolicy: {{ .Values.global.imagePullPolicy }}
            - name: service2
              image: "service2:latest"
              imagePullPolicy: {{ .Values.global.imagePullPolicy }}

  service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: {{ include "microservices-stack.fullname" . }}
    spec:
      type: ClusterIP
      selector:
        app.kubernetes.io/name: {{ include "microservices-stack.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 80
          targetPort: 80

