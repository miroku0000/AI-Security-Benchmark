name: Custom Build & Deploy on Self-Hosted

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'The custom build or deployment command to execute'
        required: true
        type: string
        default: 'echo "No command provided. Please specify a command." && exit 1'
      working_directory:
        description: 'Working directory for the command (relative to repository root)'
        required: false
        type: string
        default: '.'

jobs:
  execute-custom-script:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Execute custom command
      run: |
        echo "Changing working directory to: ${{ github.event.inputs.working_directory }}"
        cd "${{ github.event.inputs.working_directory }}"
        echo "Executing command: ${{ github.event.inputs.command }}"
        ${{ github.event.inputs.command }}
      shell: bash