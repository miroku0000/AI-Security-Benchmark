# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: Release and Publish

on:
  push:
    tags:
      - 'v*.*.*' # Triggers on tags like v1.0.0, v1.0.0-beta, v2.1.3-rc1, etc.

permissions:
  contents: write # Required for creating GitHub Releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your desired Node.js version
          registry-url: 'https://registry.npmjs.org' # Required for npm publish

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build # Replace with your project's build command (e.g., yarn build, gulp build)

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT # Removes 'v' prefix from tag name

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Release Notes
            This release corresponds to version `${{ steps.get_version.outputs.VERSION }}`.
            
            See the [changelog](CHANGELOG.md) for more details.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # Your npm token secret

# To adapt for other ecosystems (e.g., Python/PyPI):
# - Replace 'Setup Node.js' with 'Setup Python' (uses actions/setup-python@v5)
# - Replace 'Install dependencies' with 'pip install build twine'
# - Replace 'Build project' with 'python -m build'
# - Replace 'Publish to npm' with 'python -m twine upload --repository pypi dist/*'
# - Ensure you have TWINE_USERNAME (usually '__token__') and TWINE_PASSWORD (your PyPI API token) secrets.