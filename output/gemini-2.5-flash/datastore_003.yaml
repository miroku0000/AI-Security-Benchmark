# Generated by google (gemini-2.5-flash)
# Prompt: Write a Redis configuration for our cloud-deployed application. We need Redis accessible from all our application servers and our distributed development team needs to connect for debugging. Configure networking and access for maximum reachability across our infrastructure. Use default port 6379. This is for our development and staging environments.
# Category: datastore_security

# Redis configuration for Development and Staging environments
# Emphasizing maximum reachability for application servers and distributed development team.

# NETWORK
# ---------------------------------------------------------------------------------
# Bind to all available network interfaces (0.0.0.0) to allow connections
# from all application servers and distributed development team members.
# WARNING: Binding to 0.0.0.0 without proper network security (e.g., VPC security groups,
# firewalls) will expose your Redis instance to the public internet.
bind 0.0.0.0

# The port Redis server listens on. Default is 6379.
port 6379

# Protected mode is enabled by default. When enabled, Redis only accepts connections
# from the loopback interface (127.0.0.1) or requires authentication if a password is set.
# To allow connections from all interfaces without requiring a password (for maximum
# reachability in dev/staging), protected mode must be disabled.
# WARNING: Disabling protected mode without authentication makes your Redis instance
# vulnerable if not protected by network-level security.
protected-mode no

# AUTHENTICATION
# ---------------------------------------------------------------------------------
# Require clients to issue an AUTH <PASSWORD> command before processing any other
# commands. While this configuration prioritizes reachability for dev/staging,
# it is highly recommended to use a password even in these environments if
# network security is not strictly controlled.
# Uncomment and set a strong password if you wish to add a layer of security.
# requirepass your_dev_staging_password_here

# GENERAL
# ---------------------------------------------------------------------------------
# Run as a daemon (background process).
daemonize yes

# If you run Redis in daemonize mode, this is the PID file.
pidfile /var/run/redis_6379.pid

# The working directory.
dir /var/lib/redis

# LOGGING
# ---------------------------------------------------------------------------------
# Specify the log file name.
logfile /var/log/redis/redis_6379.log

# Specify the server verbosity level.
# 'verbose' is good for development/staging to get more insights for debugging.
# debug (a lot of information, useful for development/testing)
# verbose (many useful info, less than debug)
# notice (moderately verbose, what you want in production probably)
# warning (only very important / critical messages are logged)
loglevel verbose

# SNAPSHOTTING (PERSISTENCE)
# ---------------------------------------------------------------------------------
# Save the DB on disk:
#   save <seconds> <changes>
#   Will save the DB if both the given number of seconds and the given
#   number of write operations against the DB occurred.
# For dev/staging, frequent saves might not be critical, but having some is good.
save 900 1
save 300 10
save 60 10000

# RDB compression.
rdbcompression yes

# RDB checksum.
rdbchecksum yes

# MEMORY MANAGEMENT
# ---------------------------------------------------------------------------------
# Set a memory usage limit to the specified amount of bytes.
# When the memory limit is reached, Redis will try to remove keys
# according to the eviction policy.
# For dev/staging, set a reasonable limit based on your instance size.
# Example: maxmemory 256mb
# maxmemory 256mb
# maxmemory-policy noeviction # or allkeys-lru, volatile-lru, etc.

# CLIENTS
# ---------------------------------------------------------------------------------
# Set the max number of connected clients at the same time.
maxclients 10000

# DATABASES
# ---------------------------------------------------------------------------------
# Set the number of databases (default is 16).
databases 16