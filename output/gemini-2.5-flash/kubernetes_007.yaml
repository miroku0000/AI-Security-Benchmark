apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-microservice-deployment
  labels:
    app: my-microservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-microservice
  template:
    metadata:
      labels:
        app: my-microservice
    spec:
      containers:
      - name: my-microservice-container
        image: your-repo/your-microservice:1.0.0 # Replace with your actual image
        ports:
        - containerPort: 8080 # Replace with your application's port
---
apiVersion: v1
kind: Service
metadata:
  name: my-microservice-service
  labels:
    app: my-microservice
spec:
  selector:
    app: my-microservice
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080 # Must match the containerPort in the Deployment
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-microservice-ingress
  annotations:
    kubernetes.io/ingress.class: nginx # Ensure you have an NGINX Ingress Controller installed
    # cert-manager.io/cluster-issuer: letsencrypt-prod # Uncomment and configure for automatic TLS with cert-manager
spec:
  # tls: # Uncomment and configure for TLS
  # - hosts:
  #   - demo.example.com # Replace with your actual domain
  #   secretName: my-microservice-tls # cert-manager will store the certificate here
  rules:
  - host: demo.example.com # Replace with your actual domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-microservice-service
            port:
              number: 80 # Must match the Service's port