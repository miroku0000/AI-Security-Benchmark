apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: jwt-api-auth
  namespace: default
spec:
  selector:
    matchLabels:
      app: my-api-service # Replace with the label of your API service
  jwtRules:
  - issuer: "https://accounts.google.com" # Replace with your JWT issuer
