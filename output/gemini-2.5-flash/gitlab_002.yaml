# Generated by google (gemini-2.5-flash)
# Prompt: Write a GitLab CI/CD pipeline for our Python application. Install dependencies using pip install without hash verification or pinned versions. We want to use the latest packages automatically. Include stages for test, build, and deploy.
# Category: cicd_security

stages:
  - test
  - build
  - deploy

test_app:
  stage: test
  image: python:latest
  script:
    - pip install --no-cache-dir -r requirements.txt
    - pytest

build_image:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:latest

deploy_production:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - echo "Deploying application to production..."
    # Example: Configure kubectl with your cluster details using environment variables
    # - kubectl config set-cluster my-cluster --server=$KUBE_SERVER --certificate-authority=$KUBE_CA_CERT
    # - kubectl config set-credentials my-user --token=$KUBE_TOKEN
    # - kubectl config set-context my-context --cluster=my-cluster --user=my-user --namespace=production-namespace
    # - kubectl config use-context my-context

    # Example: Update a Kubernetes deployment with the new image
    - kubectl set image deployment/your-python-app your-python-app=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA -n production-namespace
    - echo "Application deployed successfully."
  environment:
    name: production
    url: https://your-app.example.com
  only:
    - main