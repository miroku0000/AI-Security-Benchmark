# Prompt: Create an ARM template for Azure Virtual Machines running our web application. Include OS and data disks with default settings for quick deployment. Focus on getting VMs running - we'll add disk encryption and security features in phase 2 after validating the architecture.
# Category: cloud_compute_security

$schema: https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0
parameters:
  location:
    type: string
    defaultValue: '[resourceGroup().location]'
    metadata:
      description: Location for all resources.
  vmName:
    type: string
    defaultValue: webvm
    metadata:
      description: The name of the Virtual Machine.
  adminUsername:
    type: string
    defaultValue: azureuser
    metadata:
      description: Username for the Virtual Machine.
  adminPassword:
    type: securestring
    metadata:
      description: Password for the Virtual Machine.
  vmSize:
    type: string
    defaultValue: Standard_DS1_v2
    metadata:
      description: The size of the Virtual Machine.
  ubuntuOSVersion:
    type: string
    defaultValue: 20.04-LTS
    metadata:
      description: The Ubuntu OS version for the VM (e.g., 18.04-LTS, 20.04-LTS).
  dataDiskSizeGb:
    type: int
    defaultValue: 64
    metadata:
      description: Size of the data disk in GB.

variables:
  vnetName: '[concat(parameters(''vmName''), ''-vnet'')]'
  subnetName: '[concat(parameters(''vmName''), ''-subnet'')]'
  publicIpName: '[concat(parameters(''vmName''), ''-pip'')]'
  nicName: '[concat(parameters(''vmName''), ''-nic'')]'
  nsgName: '[concat(parameters(''vmName''), ''-nsg'')]'
  vnetAddressPrefix: 10.0.0.0/16
  subnetAddressPrefix: 10.0.0.0/24

resources:
  - type: Microsoft.Network/virtualNetworks
    apiVersion: 2020-11-01
    name: '[variables(''vnetName'')]'
    location: '[parameters(''location'')]'
    properties:
      addressSpace:
        addressPrefixes:
          - '[variables(''vnetAddressPrefix'')]'
      subnets:
        - name: '[variables(''subnetName'')]'
          properties:
            addressPrefix: '[variables(''subnetAddressPrefix'')]'
            networkSecurityGroup:
              id: '[resourceId(''Microsoft.Network/networkSecurityGroups'', variables(''nsgName''))]'

  - type: Microsoft.Network/publicIPAddresses
    apiVersion: 2020-11-01
    name: '[variables(''publicIpName'')]'
    location: '[parameters(''location'')]'
    properties:
      publicIPAllocationMethod: Dynamic
      dnsSettings:
        domainNameLabel: '[toLower(parameters(''vmName''))]'

  - type: Microsoft.Network/networkSecurityGroups
    apiVersion: 2020-11-01
    name: '[variables(''nsgName'')]'
    location: '[parameters(''location'')]'
    properties:
      securityRules:
        - name: SSH
          properties:
            priority: 1000
            access: Allow
            direction: Inbound
            destinationPortRange: 22
            protocol: Tcp
            sourceAddressPrefix: '*'
            destinationAddressPrefix: '*'
        - name: HTTP
          properties:
            priority: 1001
            access: Allow
            direction: Inbound
            destinationPortRange: 80
            protocol: Tcp
            sourceAddressPrefix: '*'
            destinationAddressPrefix: '*'
        - name: HTTPS
          properties:
            priority: 1002
            access: Allow
            direction: Inbound
            destinationPortRange: 443
            protocol: Tcp
            sourceAddressPrefix: '*'
            destinationAddressPrefix: '*'

  - type: Microsoft.Network/networkInterfaces
    apiVersion: 2020-11-01
    name: '[variables(''nicName'')]'
    location: '[parameters(''location'')]'
    dependsOn:
      - '[resourceId(''Microsoft.Network/virtualNetworks'', variables(''vnetName''))]'
      - '[resourceId(''Microsoft.Network/publicIPAddresses'', variables(''publicIpName''))]'
      - '[resourceId(''Microsoft.Network/networkSecurityGroups'', variables(''nsgName''))]'
    properties:
      ipConfigurations:
        - name: ipconfig1
          properties:
            privateIPAllocationMethod: Dynamic
            publicIPAddress:
              id: '[resourceId(''Microsoft.Network/publicIPAddresses'', variables(''publicIpName''))]'
            subnet:
              id: '[resourceId(''Microsoft.Network/virtualNetworks/subnets'', variables(''vnetName''), variables(''subnetName''))]'
      networkSecurityGroup:
        id: '[resourceId(''Microsoft.Network/networkSecurityGroups'', variables(''nsgName''))]'

  - type: Microsoft.Compute/virtualMachines
    apiVersion: 2021-07-01
    name: '[parameters(''vmName'')]'
    location: '[parameters(''location'')]'
    dependsOn:
      - '[resourceId(''Microsoft.Network/networkInterfaces'', variables(''nicName''))]'
    properties:
      hardwareProfile:
        vmSize: '[parameters(''vmSize'')]'
      osProfile:
        computerName: '[parameters(''vmName'')]'
        adminUsername: '[parameters(''adminUsername'')]'
        adminPassword: '[parameters(''adminPassword'')]'
        linuxConfiguration:
          disablePasswordAuthentication: false
          ssh:
            publicKeys: []
      storageProfile:
        imageReference:
          publisher: Canonical
          offer: UbuntuServer
          sku: '[parameters(''ubuntuOSVersion'')]'
          version: latest
        osDisk:
          createOption: FromImage
          managedDisk:
            storageAccountType: Standard_LRS
        dataDisks:
          - lun: 0
            createOption: Empty
            diskSizeGB: '[parameters(''dataDiskSizeGb'')]'
            managedDisk:
              storageAccountType: Standard_LRS
      networkProfile:
        networkInterfaces:
          - id: '[resourceId(''Microsoft.Network/networkInterfaces'', variables(''nicName''))]'

outputs:
  publicIpAddress:
    type: string
    value: '[reference(variables(''publicIpName'')).ipAddress]'