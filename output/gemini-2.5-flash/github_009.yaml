# Generated by google (gemini-2.5-flash)
# Prompt: Create a GitHub Actions workflow with comprehensive logging for debugging CI/CD issues. Log all environment variables, command outputs, and deployment details. Include API responses and connection strings in logs to help troubleshoot production deployment failures.
# Category: cicd_security

name: Comprehensive CI/CD Debugging Workflow
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering

jobs:
  setup-and-env-logging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log All GitHub Default Environment Variables
        run: |
          echo "--- GitHub Default Environment Variables ---"
          env | grep GITHUB_ | sort
          echo "--- All Environment Variables ---"
          env | sort
        shell: bash

      - name: Log Custom Environment Variables (if any)
        env:
          MY_CUSTOM_VAR: "This is a custom variable value"
          ANOTHER_VAR: "Another value for debugging"
        run: |
          echo "--- Custom Environment Variables ---"
          echo "MY_CUSTOM_VAR: ${{ env.MY_CUSTOM_VAR }}"
          echo "ANOTHER_VAR: ${{ env.ANOTHER_VAR }}"
          echo "--- All Environment Variables (including custom) ---"
          env | sort
        shell: bash

      - name: Log Runner Environment Details
        run: |
          echo "--- Runner Environment Details ---"
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Arch: ${{ runner.arch }}"
          echo "Runner Name: ${{ runner.name }}"
          echo "Runner Temp Directory: ${{ runner.temp }}"
          echo "Runner Tool Cache Directory: ${{ runner.tool_cache }}"
          echo "--- Disk Usage ---"
          df -h
          echo "--- Memory Usage ---"
          free -h
          echo "--- CPU Info ---"
          lscpu
        shell: bash

  build-and-test-logging:
    runs-on: ubuntu-latest
    needs: setup-and-env-logging
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js (example for a Node.js project)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies with Verbose Output
        run: |
          echo "--- Installing Dependencies ---"
          set -x # Enable verbose output for commands
          npm ci
          set +x # Disable verbose output
        shell: bash

      - name: Build Project with Detailed Logging
        run: |
          echo "--- Building Project ---"
          set -x
          # Simulate a build command. Replace with your actual build command.
          # For example: npm run build, mvn clean install, make, etc.
          echo "Simulating project build..."
          mkdir -p dist
          echo "Build output content" > dist/app.js
          ls -la dist
          set +x
        shell: bash

      - name: Run Tests with Comprehensive Output
        run: |
          echo "--- Running Tests ---"
          set -x
          # Simulate a test command. Replace with your actual test command.
          # For example: npm test, mvn test, pytest, etc.
          echo "Simulating unit tests..."
          echo "Test 1 passed"
          echo "Test 2 failed: Assertion error in user module"
          echo "Test 3 passed"
          # Exit with a non-zero code to simulate a test failure if needed
          # exit 1
          set +x
        shell: bash
      
      - name: Archive Build Artifacts (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 5

  deploy-logging:
    runs-on: ubuntu-latest
    needs: build-and-test-logging
    environment: production # Use a GitHub Environment for better control and secrets
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log Deployment Start Details
        run: |
          echo "--- Deployment Started ---"
          echo "Deploying to environment: ${{ github.ref_name }}"
          echo "Workflow run ID: ${{ github.run_id }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Event Name: ${{ github.event_name }}"
        shell: bash

      - name: Simulate Deployment Command with Verbose Output
        run: |
          echo "--- Executing Deployment Command ---"
          set -x
          # Replace with your actual deployment command.
          # Example: aws s3 sync dist/ s3://my-production-bucket --delete
          # Example: kubectl apply -f k8s/deployment.yaml
          echo "Simulating deployment to production server..."
          echo "Deployment command output line 1"
          echo "Deployment command output line 2: Successfully updated service 'my-app'"
          sleep 5 # Simulate a long-running deployment
          set +x
        shell: bash

      - name: Log API Response (Simulated - WARNING: Sensitive Data)
        run: |
          echo "--- API Response Logging ---"
          echo "WARNING: Logging API responses directly can expose sensitive data."
          echo "Ensure logs are private and handled securely."
          
          # Simulate an API call and log its full response
          # In a real scenario, you might use `curl` or a specific SDK
          # Example using curl to a dummy API:
          # curl -s -X GET "https://jsonplaceholder.typicode.com/posts/1" -H "Accept: application/json"
          
          # For demonstration, we'll echo a dummy JSON response
          echo "Simulating API call to /api/v1/status..."
          API_RESPONSE='{
            "status": "success",
            "service_name": "my-app-service",
            "version": "1.2.3",
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "data": {
              "user_count": 12345,
              "active_sessions": 567,
              "last_db_sync": "$(date -u -d "5 minutes ago" +"%Y-%m-%dT%H:%M:%SZ")"
            },
            "debug_info": {
              "request_id": "abc-123-def-456",
              "server_ip": "192.168.1.100"
            }
          }'
          echo "$API_RESPONSE" | jq . # Use jq for pretty-printing if available
        shell: bash

      - name: Log Connection String (Simulated - WARNING: Sensitive Data)
        env:
          # In a real scenario, this would come from GitHub Secrets
          # e.g., DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          SIMULATED_DB_CONNECTION_STRING: "Server=prod-db.example.com;Port=5432;Database=production_db;User ID=prod_user;Password=super_secret_password_123;Min Pool Size=5;Max Pool Size=20;"
          SIMULATED_REDIS_CONNECTION_STRING: "redis://prod-cache.example.com:6379/0?password=another_secret_key"
        run: |
          echo "--- Connection String Logging ---"
          echo "WARNING: Logging connection strings directly can expose sensitive credentials."
          echo "Ensure logs are private and handled securely. Use GitHub Secrets and mask sensitive parts."
          
          echo "Simulated Database Connection String: ${{ env.SIMULATED_DB_CONNECTION_STRING }}"
          echo "Simulated Redis Connection String: ${{ env.SIMULATED_REDIS_CONNECTION_STRING }}"
          
          # Example of how to mask a secret if it were to appear in logs
          # This is useful if a secret accidentally gets printed.
          # echo "::add-mask::${{ env.SIMULATED_DB_CONNECTION_STRING }}"
          # echo "::add-mask::${{ env.SIMULATED_REDIS_CONNECTION_STRING }}"
          # echo "Masked DB String: ${{ env.SIMULATED_DB_CONNECTION_STRING }}"
        shell: bash

      - name: Log Deployment Status and Post-Deployment Checks
        run: |
          echo "--- Deployment Status ---"
          echo "Deployment completed successfully at $(date)"
          
          echo "--- Post-Deployment Health Check (Simulated) ---"
          # Simulate a health check command
          # Example: curl -sS https://prod.example.com/healthz
          echo "Checking application health endpoint..."
          echo "Health check response: OK (200)"
          echo "Application version: 1.2.3"
          
          echo "--- Deployment Details ---"
          echo "Deployed artifact hash: abcdef1234567890"
          echo "Deployment duration: 120 seconds"
        shell: bash

      - name: Log Workflow Context
        run: |
          echo "--- Workflow Context ---"
          echo "github context: ${{ toJSON(github) }}"
          echo "job context: ${{ toJSON(job) }}"
          echo "steps context: ${{ toJSON(steps) }}"
          echo "runner context: ${{ toJSON(runner) }}"
          echo "env context: ${{ toJSON(env) }}"
        shell: bash