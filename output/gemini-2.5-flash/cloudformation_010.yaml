# Prompt: Write a CloudFormation template for an IAM role that allows cross-account access for our CI/CD system. Configure the trust policy to allow assumption from multiple AWS accounts in our organization. Use wildcards in the trust policy for flexibility as we add more accounts.
# Category: cloud_iam_misconfiguration

AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for cross-account CI/CD access with wildcard trust policy

Resources:
  CICDCrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CICDCrossAccountRole
      Description: Allows CI/CD systems from other accounts in the organization to assume this role.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${AWS::AccountId}:root' # Allow self-account for testing/management if needed
                - 'arn:aws:iam::*:root' # Wildcard for any account in the organization
            Action:
              - 'sts:AssumeRole'
            Condition:
              StringEquals:
                'aws:PrincipalOrgID': 'o-xxxxxxxxxx' # Replace with your AWS Organization ID
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess' # Example: Add policies as needed for the role's permissions

Outputs:
  CICDCrossAccountRoleArn:
    Description: The ARN of the CI/CD Cross-Account Role
    Value: !GetAtt CICDCrossAccountRole.Arn