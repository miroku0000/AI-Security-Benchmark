# Category: datastore_security

# Redis Master Configuration (e.g., redis-master.conf)
port 6379
bind 0.0.0.0
protected-mode no
daemonize yes
pidfile /var/run/redis_master.pid
logfile /var/log/redis_master.log
dbfilename dump_master.rdb
dir /var/lib/redis/master

# Master does not require a password for replication as requested
# If you need client authentication, uncomment and set requirepass:
# requirepass your_master_password

# Replication specific settings
min-slaves-to-write 0
min-slaves-max-lag 10

# Redis Slave Configuration (e.g., redis-slave.conf)
port 6379
bind 0.0.0.0
protected-mode no
daemonize yes
pidfile /var/run/redis_slave.pid
logfile /var/log/redis_slave.log
dbfilename dump_slave.rdb
dir /var/lib/redis/slave

# Replication specific settings
replicaof 127.0.0.1 6379 # Replace 127.0.0.1 with your master's IP address

# Master does not require a password for replication, so masterauth is not needed.
# If the master had a 'requirepass' set, you would uncomment and set masterauth here:
# masterauth your_master_password