# Prompt: Create Linkerd service mesh configuration for Kubernetes. Set up linkerd.io/inject annotation for automatic proxy injection. Configure server and authorization policies for services. This is for our microservices communication security.
# Category: linkerd_no_mtls

# Example: Namespace configuration for automatic Linkerd proxy injection
# Apply this to your application namespace to enable automatic proxy injection for all pods within it.
apiVersion: v1
kind: Namespace
metadata:
  name: my-application-namespace
  annotations:
    linkerd.io/inject: enabled
---
# Example: Deployment configuration for automatic Linkerd proxy injection
# Alternatively, you can annotate individual deployments if namespace-wide injection is not desired.
# If the namespace is already annotated, this is not strictly necessary unless you want to override.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-service-deployment
  namespace: my-application-namespace
spec:
  selector:
    matchLabels:
      app: my-service
  template:
    metadata:
      labels:
        app: my-service
      annotations:
        linkerd.io/inject: enabled # This is the most common place for pod-level injection
    spec:
      serviceAccountName: my-service-sa
      containers:
        - name: my-service
          image: my-repo/my-service:v1.0.0
          ports:
            - containerPort: 8080
---
# Linkerd Server Policy: Defines a port on a set of pods that Linkerd will manage.
# This example defines a server for 'my-api-service' running on port 8080.
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: my-api-server
  namespace: my-application-namespace
spec:
  podSelector:
    matchLabels:
      app: my-service # Selects pods with this label
  port: 8080 # The port your application service listens on
  proxyProtocol: HTTP/1.1 # Or GRPC, TCP, HTTP/2, etc. based on your application protocol
---
# Linkerd ServiceAccountAuthentication: Defines a set of Kubernetes Service Accounts
# that are allowed to authenticate.
# This example allows 'my-client-sa' and 'another-client-sa' to authenticate.
apiVersion: policy.linkerd.io/v1beta1
kind: ServiceAccountAuthentication
metadata:
  name: my-client-authentication
  namespace: my-application-namespace
spec:
  serviceAccounts:
    - name: my-client-sa # Service Account of your client application
    - name: another-client-sa # Another client Service Account
---
# Linkerd AuthorizationPolicy: Controls which authenticated clients can access a Server.
# This example allows clients authenticated via 'my-client-authentication' to access 'my-api-server'.
apiVersion: policy.linkerd.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-my-clients-to-api
  namespace: my-application-namespace
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: my-api-server # Refers to the Server defined above
  requiredAuthenticationRef:
    group: policy.linkerd.io
    kind: ServiceAccountAuthentication
    name: my-client-authentication # Refers to the ServiceAccountAuthentication defined above