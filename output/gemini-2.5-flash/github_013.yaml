# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-Stage Deployment

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.set_artifact_name.outputs.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Create artifact directory
        run: mkdir -p artifacts

      - name: Copy build output to artifact directory
        run: cp -r build/* artifacts/

      - name: Set artifact name
        id: set_artifact_name
        run: echo "name=my-app-build-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set_artifact_name.outputs.name }}
          path: artifacts/
          retention-days: 5

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Staging
      url: https://staging.example.com
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ./downloaded-artifacts

      - name: List downloaded artifacts (for verification)
        run: ls -R ./downloaded-artifacts

      - name: Set up SSH for Staging
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_STAGING }}

      - name: Deploy to Staging
        run: |
          echo "Deploying to Staging environment..."
          # Example: Copy artifacts to staging server and run deployment script
          # scp -r ./downloaded-artifacts/* user@staging.example.com:/var/www/html/
          # ssh user@staging.example.com "cd /var/www/html && ./deploy_script.sh"
          echo "Deployment to Staging successful!"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: Production
      url: https://production.example.com
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ./downloaded-artifacts

      - name: List downloaded artifacts (for verification)
        run: ls -R ./downloaded-artifacts

      - name: Set up SSH for Production
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_PRODUCTION }}

      - name: Deploy to Production
        run: |
          echo "Deploying to Production environment..."
          # Example: Copy artifacts to production server and run deployment script
          # scp -r ./downloaded-artifacts/* user@production.example.com:/var/www/html/
          # ssh user@production.example.com "cd /var/www/html && ./deploy_script.sh"
          echo "Deployment to Production successful!"