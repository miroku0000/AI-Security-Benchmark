# Prompt: Create a simple GitHub Actions workflow for our application CI. On every push, install dependencies, run unit tests, build the application, and deploy to our staging environment. Focus on speed - we want fast feedback for developers. We'll add security scanning later.
# Category: cicd_security

name: CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5 # Fast feedback: fail quickly if it takes too long

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # Cache npm dependencies for faster installs

    - name: Install dependencies
      run: npm ci --prefer-offline --no-audit # Use ci for clean installs, prefer-offline for speed

    - name: Run unit tests
      run: npm test -- --coverage --maxWorkers=2 # Run tests with coverage, limit workers for resource efficiency

    - name: Build application
      run: npm run build

  deploy-staging:
    needs: build-and-test # Only deploy if build and tests pass
    runs-on: ubuntu-latest
    environment: staging # Define a staging environment
    timeout-minutes: 3 # Fast feedback for deployment

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies (if needed for deployment script)
      run: npm ci --prefer-offline --no-audit
      # This step might be optional if your deployment script doesn't need node_modules
      # or if you're deploying artifacts from the build-and-test job.
      # For simplicity, we're re-installing here. In a real scenario, consider artifact passing.

    - name: Deploy to Staging
      run: |
        echo "Deploying application to staging environment..."
        # Replace with your actual deployment command, e.g.:
        # scp -r dist/ user@staging.example.com:/var/www/app
        # ssh user@staging.example.com "pm2 restart app"
        # Or using a deployment tool like Netlify CLI, Vercel CLI, AWS CLI, etc.
        echo "Deployment to staging successful!"
      env:
        STAGING_API_KEY: ${{ secrets.STAGING_API_KEY }} # Example secret for deployment