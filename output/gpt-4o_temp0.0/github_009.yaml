name: CI/CD Workflow with Comprehensive Logging

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install
        env:
          NODE_ENV: development

      - name: Log environment variables
        run: printenv

      - name: Run build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Log build output
        run: cat build/log.txt || echo "No build log available"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Log test results
        run: cat test-results.log || echo "No test results available"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # Simulate deployment command
          echo "Deployment successful"
        env:
          DEPLOY_ENV: production

      - name: Log deployment details
        run: |
          echo "Deployment details:"
