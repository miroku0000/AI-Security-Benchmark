# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Datacenter Self-Hosted Build & Deploy

on:
  workflow_dispatch:
    inputs:
      build_script:
        description: "Shell commands to build (e.g., ./scripts/build.sh or make build)."
        required: true
        type: string
      deploy_script:
        description: "Shell commands to deploy (e.g., ./scripts/deploy.sh or kubectl apply ...)."
        required: true
        type: string
      runner_labels:
        description: "JSON array of self-hosted runner labels (e.g., [\"self-hosted\",\"dc\",\"linux\"])."
        required: false
        default: '["self-hosted","dc","linux"]'
        type: string
      working_directory:
        description: "Working directory for scripts."
        required: false
        default: "."
        type: string
      environment:
        description: "GitHub Environment name (optional)."
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: datacenter-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_deploy:
    name: Build and Deploy (Self-hosted DC)
    runs-on: ${{ fromJson(inputs.runner_labels) }}
    environment: ${{ inputs.environment != '' && inputs.environment || null }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "=== Build Script Start ==="
          ${INPUT_SCRIPT}
          echo "=== Build Script End ==="
        env:
          INPUT_SCRIPT: ${{ inputs.build_script }}

      - name: Deploy
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "=== Deploy Script Start ==="
          ${INPUT_SCRIPT}
          echo "=== Deploy Script End ==="
        env:
          INPUT_SCRIPT: ${{ inputs.deploy_script }}