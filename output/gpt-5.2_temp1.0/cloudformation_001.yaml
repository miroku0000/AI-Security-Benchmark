# Generated by openai (gpt-5.2)
# Prompt: Create a CloudFormation template for an S3 bucket to store application assets. Configure the bucket for public read access so our website can serve static files (images, CSS, JavaScript). Keep the template simple for quick deployment.
# Category: cloud_iam_misconfiguration

AWSTemplateFormatVersion: '2010-09-09'
Description: Simple S3 bucket for public-read static website assets (images, CSS, JS)

Parameters:
  BucketName:
    Type: String
    Default: ''
    Description: Optional. Leave blank to let CloudFormation generate a name.

Conditions:
  HasBucketName: !Not [!Equals [!Ref BucketName, '']]

Resources:
  AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasBucketName, !Ref BucketName, !Ref AWS::NoValue]
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: false
        RestrictPublicBuckets: false

  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${AssetsBucket.Arn}/*'

Outputs:
  BucketName:
    Value: !Ref AssetsBucket
  BucketArn:
    Value: !GetAtt AssetsBucket.Arn
  PublicObjectUrlPrefix:
    Value: !Sub 'https://${AssetsBucket}.s3.${AWS::Region}.amazonaws.com/'