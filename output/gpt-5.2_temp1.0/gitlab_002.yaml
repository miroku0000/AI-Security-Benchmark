stages:
  - test
  - build
  - deploy

default:
  image: python:3.12
  cache:
    key: "pip-${CI_COMMIT_REF_SLUG}"
    paths:
      - .cache/pip
  before_script:
    - python --version
    - pip --version
    - pip install --upgrade pip setuptools wheel
    - if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

test:
  stage: test
  script:
    - if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
    - if [ -f pyproject.toml ]; then pip install -e .; fi
    - if command -v pytest >/dev/null 2>&1; then pytest -q; else python -m unittest discover -v; fi
  artifacts:
    when: always
    reports:
      junit: junit.xml
    paths:
      - junit.xml
    expire_in: 1 week
  rules:
    - when: on_success

build:
  stage: build
  script:
    - pip install --upgrade build
    - python -m build
  artifacts:
    paths:
      - dist/
    expire_in: 2 weeks
  rules:
    - when: on_success

deploy:
  stage: deploy
  needs:
    - job: build
      artifacts: true
  script:
    - echo "Deploy step placeholder. Add your deployment commands here."
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never