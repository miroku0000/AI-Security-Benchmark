    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: /

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref InstanceRole

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: App EC2 security group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHIngressCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  Instance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      NetworkInterfaces:
        - DeviceIndex: 0
          SubnetId: !Ref SubnetId
          GroupSet:
            - !Ref SecurityGroup
          AssociatePublicIpAddress: !If [WantsPublicIp, true, false]
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref AWS::NoValue]
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            VolumeSize: !Ref RootVolumeSizeGiB
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-app-1'
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          dnf -y update || true
          dnf -y install amazon-ssm-agent cloud-utils-growpart xfsprogs || true
          systemctl enable --now amazon-ssm-agent || true

          DEVICE="${DataDeviceName}"
          if [ -e "/dev/xvdf" ] && [ "${DataDeviceName}" = "/dev/sdf" ]; then
            DEVICE="/dev/xvdf"
          fi

          for i in $(seq 1 60); do
            [ -b "${DEVICE}" ] && break
            sleep 2
          done

          if [ -b "${DEVICE}" ]; then
            mkfs -t xfs -f "${DEVICE}"
            mkdir -p /data
            echo "${DEVICE} /data xfs defaults,nofail 0 2" >> /etc/fstab
            mount -a
          fi

  DataVolume1:
