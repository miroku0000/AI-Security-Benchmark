      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      - m6i.large
      - m6i.xlarge
      - m6i.2xlarge
      - c6i.large
      - c6i.xlarge
      - c6i.2xlarge
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: ''
    Description: Optional. Leave blank to disable SSH key association.
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
  InstanceCount:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 6
  RootVolumeSizeGiB:
    Type: Number
    Default: 20
    MinValue: 8
    MaxValue: 200
  DataVolumeSizeGiB:
    Type: Number
    Default: 200
    MinValue: 20
    MaxValue: 16384
  DataVolumeType:
    Type: String
    Default: gp3
    AllowedValues:
      - gp3
      - gp2
      - io1
      - io2
      - st1
      - sc1
      - standard
  DataDeviceName:
    Type: String
    Default: /dev/sdf
    Description: Device name to attach as EBS data volume (Linux; will appear as /dev/xvdf on Nitro instances).
  SSHIngressCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to SSH (set to your IP/32).
  EnablePublicIp:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]
  WantsPublicIp: !Equals [!Ref EnablePublicIp, 'true']
  Create2: !Or [!Equals [!Ref InstanceCount, 2], !Equals [!Ref InstanceCount, 3], !Equals [!Ref InstanceCount, 4], !Equals [!Ref InstanceCount, 5], !Equals [!Ref InstanceCount, 6]]
  Create3: !Or [!Equals [!Ref InstanceCount, 3], !Equals [!Ref InstanceCount, 4], !Equals [!Ref InstanceCount, 5], !Equals [!Ref InstanceCount, 6]]
  Create4: !Or [!Equals [!Ref InstanceCount, 4], !Equals [!Ref InstanceCount, 5], !Equals [!Ref InstanceCount, 6]]
  Create5: !Or [!Equals [!Ref InstanceCount, 5], !Equals [!Ref InstanceCount, 6]]
  Create6: !Equals [!Ref InstanceCount, 6]

Resources:
