# Generated by openai (gpt-5.2)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - prep
  - build
  - deploy
  - release

variables:
  GIT_DEPTH: "0"
  DEFAULT_REF: "$CI_DEFAULT_BRANCH"
  MR_TITLE: ""
  MR_DESCRIPTION: ""
  MR_ID: ""
  MR_URL: ""
  MR_SOURCE_BRANCH: ""
  DEPLOY_TAG_PREFIX: "deploy"
  DEPLOY_ENV: "production"

workflow:
  rules:
    - when: always

fetch_mr_metadata:
  stage: prep
  image: alpine:3.20
  rules:
    - when: always
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      set -euo pipefail

      # Prefer native MR variables; fall back to API lookup when running from push pipeline.
      MR_TITLE_VAL="${CI_MERGE_REQUEST_TITLE:-}"
      MR_DESC_VAL="${CI_MERGE_REQUEST_DESCRIPTION:-}"
      MR_IID_VAL="${CI_MERGE_REQUEST_IID:-}"
      MR_URL_VAL="${CI_MERGE_REQUEST_PROJECT_URL:-}${CI_MERGE_REQUEST_IID:+/-/merge_requests/$CI_MERGE_REQUEST_IID}"
      MR_SRC_VAL="${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME:-}"

      if [ -z "${MR_IID_VAL}" ] && [ -n "${GITLAB_TOKEN:-}" ]; then
        # Find the MR associated with this commit SHA (works for push pipelines if token has API access).
        MR_JSON="$(curl -sfS --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/commits/${CI_COMMIT_SHA}/merge_requests" || true)"
        if [ "${MR_JSON}" != "[]" ] && [ -n "${MR_JSON}" ]; then
          MR_IID_VAL="$(echo "${MR_JSON}" | jq -r '.[0].iid // empty')"
        fi
      fi

      if [ -z "${MR_TITLE_VAL}" ] || [ -z "${MR_DESC_VAL}" ]; then
        if [ -n "${MR_IID_VAL}" ] && [ -n "${GITLAB_TOKEN:-}" ]; then
          MR_DETAILS="$(curl -sfS --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${MR_IID_VAL}")"
          MR_TITLE_VAL="${MR_TITLE_VAL:-$(echo "${MR_DETAILS}" | jq -r '.title // empty')}"
          MR_DESC_VAL="${MR_DESC_VAL:-$(echo "${MR_DETAILS}" | jq -r '.description // empty')}"
          MR_URL_VAL="${MR_URL_VAL:-$(echo "${MR_DETAILS}" | jq -r '.web_url // empty')}"
          MR_SRC_VAL="${MR_SRC_VAL:-$(echo "${MR_DETAILS}" | jq -r '.source_branch // empty')}"
        fi
      fi

      # Minimal fallback when no MR info is available.
      if [ -z "${MR_TITLE_VAL}" ]; then
        MR_TITLE_VAL="Commit: ${CI_COMMIT_SHORT_SHA}"
      fi

      if [ -z "${MR_DESC_VAL}" ]; then
        MR_DESC_VAL="${CI_COMMIT_MESSAGE}"
      fi

      {
        echo "MR_TITLE=$(printf '%s' "${MR_TITLE_VAL}" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g' | sed 's/"/\\"/g')"
        echo "MR_DESCRIPTION<<'EOF'"
        printf '%s\n' "${MR_DESC_VAL}"
        echo "EOF"
        echo "MR_ID=${MR_IID_VAL}"
        echo "MR_URL=${MR_URL_VAL}"
        echo "MR_SOURCE_BRANCH=${MR_SRC_VAL}"
      } > mr.env
  artifacts:
    reports:
      dotenv: mr.env

build:
  stage: build
  image: alpine:3.20
  needs: ["fetch_mr_metadata"]
  script:
    - |
      set -euo pipefail
      echo "Build notification:"
      echo "Project: ${CI_PROJECT_PATH}"
      echo "Ref: ${CI_COMMIT_REF_NAME} (${CI_COMMIT_SHORT_SHA})"
      echo "MR: ${MR_ID:-N/A} ${MR_URL:-}"
      echo "Title: ${MR_TITLE}"
      echo "Description:"
      printf '%s\n' "${MR_DESCRIPTION}"

deploy:
  stage: deploy
  image: alpine:3.20
  needs: ["fetch_mr_metadata", "build"]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
    - when: never
  before_script:
    - apk add --no-cache git curl jq
    - git config user.email "${GITLAB_USER_EMAIL:-ci@example.invalid}"
    - git config user.name "${GITLAB_USER_NAME:-GitLab CI}"
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch --tags origin
  script:
    - |
      set -euo pipefail

      # Create a safe tag component from MR title.
      SAFE_TITLE="$(printf '%s' "${MR_TITLE}" \
        | tr '[:upper:]' '[:lower:]' \
        | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g; s/-+/-/g' \
        | cut -c1-48)"
      [ -n "${SAFE_TITLE}" ] || SAFE_TITLE="untitled"

      DEPLOY_TAG="${DEPLOY_TAG_PREFIX}/${DEPLOY_ENV}/${CI_COMMIT_SHORT_SHA}-${SAFE_TITLE}"
      echo "DEPLOY_TAG=${DEPLOY_TAG}" > deploy.env

      # Optional: record a deployment commit message containing MR title/description (does not alter code).
      DEPLOY_COMMIT_MSG="chore(deploy): ${DEPLOY_ENV} - ${MR_TITLE}"
      DEPLOY_COMMIT_BODY="MR: ${MR_URL:-N/A}
MR IID: ${MR_ID:-N/A}
Source: ${MR_SOURCE_BRANCH:-N/A}

${MR_DESCRIPTION}"
      echo "Deploy notification:"
      echo "${DEPLOY_COMMIT_MSG}"
      printf '%s\n' "${DEPLOY_COMMIT_BODY}"

      # Create an annotated tag that includes the MR title and description (release notes).
      TAG_MESSAGE="${DEPLOY_COMMIT_MSG}

${DEPLOY_COMMIT_BODY}"
      git tag -a "${DEPLOY_TAG}" -m "${TAG_MESSAGE}" "${CI_COMMIT_SHA}"
      git push origin "${DEPLOY_TAG}"

      # Emit a GitLab deployment event (optional) using the Deployments API if token is available.
      if [ -n "${GITLAB_TOKEN:-}" ]; then
        curl -sfS -X POST \
          --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          --form "environment=${DEPLOY_ENV}" \
          --form "sha=${CI_COMMIT_SHA}" \
          --form "ref=${CI_COMMIT_REF_NAME}" \
          --form "tag=${DEPLOY_TAG}" \
          --form "status=success" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/deployments" >/dev/null || true
      fi
  artifacts:
    reports:
      dotenv: deploy.env

release_notes:
  stage: release
  image: alpine:3.20
  needs: ["fetch_mr_metadata", "deploy"]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
    - when: never
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      set -euo pipefail

      RELEASE_NAME="${DEPLOY_ENV} ${CI_COMMIT_SHORT_SHA}"
      RELEASE_DESC="Deployed: ${DEPLOY_ENV}

MR Title: ${MR_TITLE}
MR URL: ${MR_URL:-N/A}

Release Notes:
${MR_DESCRIPTION}"

      if [ -n "${GITLAB_TOKEN:-}" ]; then
        curl -sfS -X POST \
          --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "$(jq -n \
            --arg name "${RELEASE_NAME}" \
            --arg tag "${DEPLOY_TAG}" \
            --arg desc "${RELEASE_DESC}" \
            '{name:$name, tag_name:$tag, description:$desc}')" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" >/dev/null \
          || curl -sfS -X PUT \
            --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "$(jq -n --arg desc "${RELEASE_DESC}" '{description:$desc}')" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${DEPLOY_TAG}" >/dev/null
      else
        echo "GITLAB_TOKEN not set; skipping GitLab Release creation."
        echo "Release tag: ${DEPLOY_TAG}"
        printf '%s\n' "${RELEASE_DESC}"
      fi