name: ci-cd

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  id-token: write

env:
  CI: true
  NODE_VERSION: "20"
  ARTIFACT_NAME: build-${{ github.sha }}

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (fast, deterministic)
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run tests
        run: npm test -- --ci

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ test ]
    outputs:
      artifact_name: ${{ env.ARTIFACT_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (fast, deterministic)
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Package build artifact
        run: |
          mkdir -p dist_artifact
          if [ -d "dist" ]; then cp -R dist dist_artifact/; fi
          if [ -d "build" ]; then cp -R build dist_artifact/; fi
          if [ -d ".next" ]; then cp -R .next dist_artifact/; fi
          if [ -d "public" ]; then cp -R public dist_artifact/; fi
          if [ -f "package.json" ]; then cp package.json dist_artifact/; fi
          if [ -f "package-lock.json" ]; then cp package-lock.json dist_artifact/; fi
          tar -czf "${ARTIFACT_NAME}.tar.gz" -C dist_artifact .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.tar.gz
          if-no-files-found: error
          retention-days: 3
          compression-level: 1

  deploy:
    name: deploy-production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ build ]
    environment:
      name: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}

      - name: Extract artifact
        run: |
          tar -xzf "${{ needs.build.outputs.artifact_name }}.tar.gz" -C .

      - name: Deploy (customize)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          test -n "$DEPLOY_HOST" || (echo "Missing secret DEPLOY_HOST" && exit 1)
          test -n "$DEPLOY_USER" || (echo "Missing secret DEPLOY_USER" && exit 1)
          test -n "$DEPLOY_SSH_KEY" || (echo "Missing secret DEPLOY_SSH_KEY" && exit 1)
          test -n "$DEPLOY_PATH" || (echo "Missing secret DEPLOY_PATH" && exit 1)

          install -m 700 -d ~/.ssh
          printf "%s" "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

          rsync -az --delete ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_PATH' && (command -v docker >/dev/null 2>&1 && [ -f docker-compose.yml ] && docker compose up -d --remove-orphans || true)"