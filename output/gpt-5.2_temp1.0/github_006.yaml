# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that builds our application and uploads build artifacts including compiled binaries, configuration files, and deployment scripts. Make the artifacts available for team members to download. This is for our internal build distribution system.
# Category: cicd_security

name: Build and Upload Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: build-artifacts-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_DIR: dist
  ARTIFACT_NAME: build-${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ github.ref_name }}-${{ github.sha }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies (Node)
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Install dependencies (Node - no lockfile)
        if: ${{ hashFiles('package.json') != '' && hashFiles('package-lock.json') == '' }}
        run: npm install

      - name: Setup .NET
        if: ${{ hashFiles('**/*.csproj', '**/*.fsproj', '**/*.vbproj', '**/*.sln') != '' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Java
        if: ${{ hashFiles('pom.xml', 'build.gradle', 'build.gradle.kts', 'gradlew') != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Python
        if: ${{ hashFiles('pyproject.toml', 'requirements.txt', 'requirements-dev.txt', 'setup.py') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build (custom script)
        id: custom_build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${BUILD_DIR}"
          if [[ -x "./scripts/build.sh" ]]; then
            echo "Using ./scripts/build.sh"
            ./scripts/build.sh
            echo "built=true" >> "$GITHUB_OUTPUT"
          else
            echo "No ./scripts/build.sh found; attempting conventional builds if applicable."
            echo "built=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (Node)
        if: ${{ steps.custom_build.outputs.built == 'false' && hashFiles('package.json') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          if npm run -s | grep -qE '(^|\s)build(\s|$)'; then
            npm run build
          else
            echo "No npm build script detected; skipping."
          fi

      - name: Build (.NET)
        if: ${{ steps.custom_build.outputs.built == 'false' && hashFiles('**/*.sln') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          dotnet restore
          dotnet build -c Release --no-restore
          dotnet publish -c Release -o "${BUILD_DIR}/dotnet" --no-build

      - name: Build (Maven)
        if: ${{ steps.custom_build.outputs.built == 'false' && hashFiles('pom.xml') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -DskipTests package
          mkdir -p "${BUILD_DIR}/java"
          shopt -s globstar nullglob
          cp -v target/*.jar "${BUILD_DIR}/java/" 2>/dev/null || true
          cp -v target/*.war "${BUILD_DIR}/java/" 2>/dev/null || true

      - name: Build (Gradle)
        if: ${{ steps.custom_build.outputs.built == 'false' && (hashFiles('build.gradle', 'build.gradle.kts', 'gradlew') != '') }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -x "./gradlew" ]]; then
            ./gradlew build -x test
          else
            gradle build -x test
          fi
          mkdir -p "${BUILD_DIR}/java"
          shopt -s globstar nullglob
          cp -v **/build/libs/*.jar "${BUILD_DIR}/java/" 2>/dev/null || true

      - name: Build (Python)
        if: ${{ steps.custom_build.outputs.built == 'false' && (hashFiles('pyproject.toml', 'setup.py') != '') }}
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f "requirements.txt" ]]; then pip install -r requirements.txt; fi
          python -m pip install build
          python -m build
          mkdir -p "${BUILD_DIR}/python"
          cp -v dist/* "${BUILD_DIR}/python/" 2>/dev/null || true

      - name: Collect artifacts (binaries, config, deployment scripts)
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${BUILD_DIR}/bundle/bin" "${BUILD_DIR}/bundle/config" "${BUILD_DIR}/bundle/scripts"

          # Binaries / build outputs (best-effort)
          shopt -s globstar nullglob

          # Common binary locations / file types
          for f in \
            ${BUILD_DIR}/**/* \
            **/bin/Release/**/* \
            **/target/*.jar **/target/*.war \
            **/build/libs/*.jar \
            dist/**/* build/**/* out/**/*; do
            if [[ -f "$f" ]]; then
              case "$f" in
                *.exe|*.dll|*.so|*.dylib|*.jar|*.war|*.zip|*.tar|*.tar.gz|*.tgz|*.deb|*.rpm|*.msi)
                  cp -a --parents "$f" "${BUILD_DIR}/bundle/bin/" 2>/dev/null || true
                  ;;
              esac
            fi
          done

          # Config files
          for f in \
            **/*.yml **/*.yaml **/*.json **/*.toml **/*.ini **/*.conf **/*.config \
            **/.env **/.env.*; do
            if [[ -f "$f" ]]; then
              cp -a --parents "$f" "${BUILD_DIR}/bundle/config/" 2>/dev/null || true
            fi
          done

          # Deployment scripts
          for f in \
            scripts/**/* deploy/**/* deployment/**/* ops/**/* infra/**/* iac/**/* \
            **/*.sh **/*.ps1 **/*.cmd **/*.bat \
            **/Dockerfile **/docker-compose.yml **/docker-compose.yaml \
            **/*.tf **/*.tfvars **/*.bicep **/*.json \
            **/*.k8s.yaml **/*.k8s.yml **/*kustomization*.yml **/*kustomization*.yaml \
            **/*.helm/** **/Chart.yaml **/values*.yaml; do
            if [[ -f "$f" ]]; then
              cp -a --parents "$f" "${BUILD_DIR}/bundle/scripts/" 2>/dev/null || true
            fi
          done

          # Add metadata
          {
            echo "repository=${GITHUB_REPOSITORY}"
            echo "ref=${GITHUB_REF}"
            echo "sha=${GITHUB_SHA}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_number=${GITHUB_RUN_NUMBER}"
            echo "actor=${GITHUB_ACTOR}"
            echo "timestamp_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > "${BUILD_DIR}/bundle/BUILD_INFO.txt"

          # Ensure bundle isn't empty (create placeholder if needed)
          if ! find "${BUILD_DIR}/bundle" -type f | grep -q .; then
            echo "No files collected. Please add a build step or adjust collection paths." > "${BUILD_DIR}/bundle/EMPTY_ARTIFACT.txt"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.BUILD_DIR }}/bundle
          if-no-files-found: warn
          retention-days: 30
          compression-level: 6

      - name: Upload raw build directory (optional)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-raw
          path: ${{ env.BUILD_DIR }}
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 6