# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: Build (Node + Python)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      tag: ${{ steps.vars.outputs.tag }}
      dist_name: ${{ steps.vars.outputs.dist_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: vars
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dist_name=dist-${TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Build (Node)
        run: |
          if npm run -s build >/dev/null 2>&1; then
            npm run build
          else
            echo "No npm build script found; skipping Node build step."
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build (Python)
        run: |
          if [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            python -m build
          else
            echo "No Python project detected (pyproject.toml/setup.py missing); skipping Python build."
          fi

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          if [ -d "dist" ]; then
            cp -v dist/* release-assets/ 2>/dev/null || true
          fi
          if [ -d "build" ]; then
            tar -czf release-assets/build.tar.gz build
          fi
          if [ -d "dist" ]; then
            tar -czf release-assets/python-dist.tar.gz dist || true
          fi
          if [ -d "package" ]; then
            tar -czf release-assets/node-package.tar.gz package || true
          fi
          if [ -d "release-assets" ]; then
            ls -la release-assets || true
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.dist_name }}
          path: release-assets/**
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.dist_name }}
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/**

  publish_npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Ensure version matches tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag version ($VERSION)."
            exit 1
          fi

      - name: Build (optional)
        run: |
          if npm run -s build >/dev/null 2>&1; then
            npm run build
          else
            echo "No npm build script found; skipping."
          fi

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  publish_pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.PYPI_API_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          if [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            python -m build
          else
            echo "No Python project detected (pyproject.toml/setup.py missing); skipping."
            exit 0
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/