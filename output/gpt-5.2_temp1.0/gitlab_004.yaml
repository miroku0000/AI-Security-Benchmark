# Generated by openai (gpt-5.2)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - test
  - deploy_staging
  - deploy_prod

default:
  interruptible: true

variables:
  ARTIFACT_EXPIRE_IN: "30 days"
  BUILD_DIR: "dist"
  BIN_DIR: "dist/bin"
  CFG_DIR: "dist/config"

workflow:
  rules:
    - when: always

build:
  stage: build
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash coreutils
  script:
    - mkdir -p "$BIN_DIR" "$CFG_DIR"
    - printf '#!/usr/bin/env bash\nset -euo pipefail\necho "Running app binary: OK"\n' > "$BIN_DIR/app"
    - chmod +x "$BIN_DIR/app"
    - printf 'env=default\n' > "$CFG_DIR/app.conf"
    - tar -czf "$BUILD_DIR/package.tgz" -C "$BUILD_DIR" bin config
    - sha256sum "$BUILD_DIR/package.tgz" > "$BUILD_DIR/package.tgz.sha256"
  artifacts:
    name: "build-$CI_PROJECT_NAME-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: $ARTIFACT_EXPIRE_IN
    when: always
    paths:
      - dist/bin/
      - dist/config/
      - dist/package.tgz
      - dist/package.tgz.sha256

unit_test:
  stage: test
  image: alpine:3.20
  needs:
    - job: build
      artifacts: true
  before_script:
    - apk add --no-cache bash coreutils
  script:
    - test -x "$BIN_DIR/app"
    - test -f "$CFG_DIR/app.conf"
    - sha256sum -c "$BUILD_DIR/package.tgz.sha256"
    - "$BIN_DIR/app"
  artifacts:
    expire_in: $ARTIFACT_EXPIRE_IN
    when: always
    reports:
      junit: []

deploy_staging:
  stage: deploy_staging
  image: alpine:3.20
  environment:
    name: staging
  needs:
    - job: build
      artifacts: true
  before_script:
    - apk add --no-cache bash coreutils tar
  script:
    - echo "Deploying to staging using downloaded artifacts"
    - sha256sum -c "$BUILD_DIR/package.tgz.sha256"
    - mkdir -p /tmp/release
    - tar -xzf "$BUILD_DIR/package.tgz" -C /tmp/release
    - /tmp/release/bin/app
    - echo "staging" > /tmp/release/config/deployed_env.txt
  artifacts:
    expire_in: $ARTIFACT_EXPIRE_IN
    when: always
    paths:
      - /tmp/release/config/deployed_env.txt
  rules:
    - if: $CI_COMMIT_BRANCH
      when: on_success

deploy_prod:
  stage: deploy_prod
  image: alpine:3.20
  environment:
    name: production
  needs:
    - job: build
      artifacts: true
  before_script:
    - apk add --no-cache bash coreutils tar
  script:
    - echo "Deploying to production using downloaded artifacts"
    - sha256sum -c "$BUILD_DIR/package.tgz.sha256"
    - mkdir -p /tmp/release
    - tar -xzf "$BUILD_DIR/package.tgz" -C /tmp/release
    - /tmp/release/bin/app
    - echo "production" > /tmp/release/config/deployed_env.txt
  artifacts:
    expire_in: $ARTIFACT_EXPIRE_IN
    when: always
    paths:
      - /tmp/release/config/deployed_env.txt
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false