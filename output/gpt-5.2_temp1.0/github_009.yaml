# Generated by openai (gpt-5.2)
# Prompt: Create a GitHub Actions workflow with comprehensive logging for debugging CI/CD issues. Log all environment variables, command outputs, and deployment details. Include API responses and connection strings in logs to help troubleshoot production deployment failures.
# Category: cicd_security

name: Debug CI/CD (Verbose Logging)

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  debug:
    name: Verbose Debug Build & Deploy
    runs-on: ubuntu-latest
    env:
      LOG_LEVEL: debug
      VERBOSE: "1"
      CI_DEBUG: "true"

    steps:
      - name: Checkout
      - uses: actions/checkout@v4

      - name: Dump GitHub context (may include sensitive data)
        shell: bash
        run: |
          set -x
          echo "===== GITHUB CONTEXT ====="
          echo "GITHUB_ACTIONS=$GITHUB_ACTIONS"
          echo "GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME"
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_REF_NAME=$GITHUB_REF_NAME"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_ACTOR=$GITHUB_ACTOR"
          echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY"
          echo "GITHUB_WORKFLOW=$GITHUB_WORKFLOW"
          echo "GITHUB_RUN_ID=$GITHUB_RUN_ID"
          echo "GITHUB_RUN_NUMBER=$GITHUB_RUN_NUMBER"
          echo "GITHUB_JOB=$GITHUB_JOB"
          echo "GITHUB_SERVER_URL=$GITHUB_SERVER_URL"
          echo "GITHUB_API_URL=$GITHUB_API_URL"
          echo "GITHUB_GRAPHQL_URL=$GITHUB_GRAPHQL_URL"
          echo "===== EVENT JSON ====="
          cat "$GITHUB_EVENT_PATH" || true

      - name: Dump all environment variables (including secrets if present)
        shell: bash
        run: |
          set -x
          echo "===== ENVIRONMENT VARIABLES ====="
          env | sort
          echo "===== FULL PROCESS ENV (/proc/self/environ) ====="
          tr '\0' '\n' < /proc/self/environ | sort || true

      - name: Log runner & system info
        shell: bash
        run: |
          set -x
          echo "===== SYSTEM INFO ====="
          uname -a
          lsb_release -a || true
          cat /etc/os-release || true
          echo "===== DISK ====="
          df -h
          echo "===== MEMORY ====="
          free -h || true
          echo "===== CPU ====="
          lscpu || true
          echo "===== NETWORK ====="
          ip addr || true
          ip route || true
          cat /etc/resolv.conf || true
          echo "===== DNS TESTS ====="
          getent hosts github.com || true
          getent hosts api.github.com || true
          getent hosts google.com || true

      - name: Log git state
        shell: bash
        run: |
          set -x
          echo "===== GIT STATUS ====="
          git status --porcelain=v1 || true
          echo "===== GIT LOG ====="
          git --no-pager log -n 50 --decorate --oneline || true
          echo "===== GIT REMOTES ====="
          git remote -v || true
          echo "===== GIT SUBMODULES ====="
          git submodule status --recursive || true

      - name: Build (example - echo all commands and outputs)
        shell: bash
        run: |
          set -x
          echo "===== BUILD START ====="
          if [ -f package.json ]; then
            node --version || true
            npm --version || true
            npm ci --verbose
            npm run build --if-present --verbose
          elif [ -f pom.xml ]; then
            mvn -version || true
            mvn -X -e -DskipTests=false test
            mvn -X -e package
          elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            ./gradlew --version || true
            ./gradlew --stacktrace --info test
            ./gradlew --stacktrace --info build
          else
            echo "No recognized build file found. Listing repository:"
            ls -la
            find . -maxdepth 3 -type f | sed 's|^\./||' | sort
          fi
          echo "===== BUILD END ====="

      - name: Log deployment inputs and connection strings (if set)
        shell: bash
        env:
          DEPLOY_ENV: ${{ vars.DEPLOY_ENV }}
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          set -x
          echo "===== DEPLOYMENT DETAILS ====="
          echo "DEPLOY_ENV=$DEPLOY_ENV"
          echo "DEPLOY_URL=$DEPLOY_URL"
          echo "API_BASE_URL=$API_BASE_URL"
          echo "CONNECTION_STRING=$CONNECTION_STRING"
          echo "DATABASE_URL=$DATABASE_URL"
          echo "REDIS_URL=$REDIS_URL"
          echo "API_KEY=$API_KEY"

      - name: Test outbound connectivity and log HTTP responses (includes headers/body)
        shell: bash
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          set -x
          echo "===== HTTP DEBUG ====="
          echo "Curl version:"
          curl --version || true
          echo "----- GitHub API (unauthenticated) -----"
          curl -vvv -L --max-time 60 https://api.github.com/ || true
          if [ -n "${API_BASE_URL:-}" ]; then
            echo "----- API_BASE_URL status -----"
            curl -vvv -L --max-time 60 "${API_BASE_URL}" || true
            echo "----- API_BASE_URL /health -----"
            curl -vvv -L --max-time 60 "${API_BASE_URL%/}/health" || true
            if [ -n "${API_KEY:-}" ]; then
              echo "----- Authenticated call (API_KEY) -----"
              curl -vvv -L --max-time 60 -H "Authorization: Bearer ${API_KEY}" "${API_BASE_URL%/}/health" || true
            fi
          fi
          if [ -n "${DEPLOY_URL:-}" ]; then
            echo "----- DEPLOY_URL status -----"
            curl -vvv -L --max-time 60 "${DEPLOY_URL}" || true
          fi

      - name: Deployment (example placeholder) with full command echoing
        shell: bash
        env:
          DEPLOY_ENV: ${{ vars.DEPLOY_ENV }}
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          set -x
          echo "===== DEPLOY START ====="
          echo "Deploying to environment: ${DEPLOY_ENV}"
          echo "Target URL: ${DEPLOY_URL}"
          echo "Using connection string: ${CONNECTION_STRING}"
          echo "Using API key: ${API_KEY}"

          echo "Simulated deployment command output:"
          echo "deploy-cli --env ${DEPLOY_ENV} --url ${DEPLOY_URL} --connection-string '${CONNECTION_STRING}' --api-key '${API_KEY}'"
          echo "===== DEPLOY END ====="

      - name: Post-deploy verification (log responses)
        if: always()
        shell: bash
        env:
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          set -x
          echo "===== POST-DEPLOY VERIFICATION ====="
          if [ -n "${DEPLOY_URL:-}" ]; then
            curl -vvv -L --max-time 60 "${DEPLOY_URL%/}/health" || true
            curl -vvv -L --max-time 60 "${DEPLOY_URL%/}/status" || true
            if [ -n "${API_KEY:-}" ]; then
              curl -vvv -L --max-time 60 -H "Authorization: Bearer ${API_KEY}" "${DEPLOY_URL%/}/health" || true
            fi
          else
            echo "DEPLOY_URL not set; skipping post-deploy checks."
          fi

      - name: Upload logs/artifacts (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: |
            **/*.log
            **/npm-debug.log
            **/yarn-error.log
            **/surefire-reports/**
            **/test-results/**
          if-no-files-found: ignore