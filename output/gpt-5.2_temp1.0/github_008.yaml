# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: ${{ github.workspace }}/.cache/pip
  CACHE_VERSION: v1

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env_name: [dev, staging, prod]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create cache directories
        run: |
          mkdir -p "${PIP_CACHE_DIR}"
          mkdir -p .cache/build
          mkdir -p .cache/tooling

      - name: Cache configuration and environment-specific configs
        uses: actions/cache@v4
        with:
          path: |
            .npmrc
            .yarnrc
            .yarnrc.yml
            .pnpmfile.cjs
            .pnpmrc
            .nvmrc
            .node-version
            .python-version
            pyproject.toml
            poetry.lock
            Pipfile
            Pipfile.lock
            requirements.txt
            requirements-dev.txt
            requirements-prod.txt
            setup.cfg
            setup.py
            tox.ini
            pytest.ini
            .flake8
            .pylintrc
            mypy.ini
            .editorconfig
            .prettierrc
            .prettierrc.json
            .prettierrc.yaml
            .prettierrc.yml
            .prettierrc.js
            .prettierignore
            .eslintrc
            .eslintrc.json
            .eslintrc.js
            .eslintrc.cjs
            .eslintignore
            tsconfig.json
            tsconfig.*.json
            babel.config.js
            babel.config.cjs
            babel.config.json
            vite.config.*
            webpack.config.*
            rollup.config.*
            jest.config.*
            vitest.config.*
            .env
            .env.*
            config/**
            configs/**
            .config/**
            env/${{ matrix.env_name }}/**
            environments/${{ matrix.env_name }}/**
          key: ${{ env.CACHE_VERSION }}-cfg-${{ runner.os }}-${{ matrix.env_name }}-${{ hashFiles('**/package-lock.json','**/npm-shrinkwrap.json','**/yarn.lock','**/pnpm-lock.yaml','**/requirements*.txt','**/Pipfile.lock','**/poetry.lock','**/pyproject.toml','**/*.config.*','**/tsconfig*.json','**/.env*') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-cfg-${{ runner.os }}-${{ matrix.env_name }}-
            ${{ env.CACHE_VERSION }}-cfg-${{ runner.os }}-

      - name: Cache Node dependencies (node_modules)
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: ${{ env.CACHE_VERSION }}-node_modules-${{ runner.os }}-${{ matrix.env_name }}-node${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json','**/npm-shrinkwrap.json','**/yarn.lock','**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node_modules-${{ runner.os }}-${{ matrix.env_name }}-node${{ env.NODE_VERSION }}-
            ${{ env.CACHE_VERSION }}-node_modules-${{ runner.os }}-node${{ env.NODE_VERSION }}-
            ${{ env.CACHE_VERSION }}-node_modules-${{ runner.os }}-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: |
            .cache/pip
          key: ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ matrix.env_name }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('**/requirements*.txt','**/Pipfile.lock','**/poetry.lock','**/pyproject.toml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ matrix.env_name }}-py${{ env.PYTHON_VERSION }}-
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-

      - name: Cache build outputs
        uses: actions/cache@v4
        with:
          path: |
            dist
            build
            out
            public/build
            .next/cache
            .nuxt
            .svelte-kit
            .vite
            .parcel-cache
            .cache/build
            .cache/tooling
            **/.pytest_cache
            **/.mypy_cache
            **/.ruff_cache
            **/.tox
          key: ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-${{ matrix.env_name }}-node${{ env.NODE_VERSION }}-py${{ env.PYTHON_VERSION }}-${{ github.sha }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-${{ matrix.env_name }}-node${{ env.NODE_VERSION }}-py${{ env.PYTHON_VERSION }}-
            ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-${{ matrix.env_name }}-
            ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-

      - name: Install Node dependencies
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No Node project detected."
          fi

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f poetry.lock ] || [ -f pyproject.toml ]; then
            python -m pip install poetry
            poetry config virtualenvs.in-project true
            poetry install --no-interaction --no-ansi
          elif [ -f Pipfile.lock ]; then
            python -m pip install pipenv
            PIPENV_VENV_IN_PROJECT=1 pipenv sync --dev
          elif [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
            if [ -f requirements-dev.txt ] && [ "${{ matrix.env_name }}" != "prod" ]; then
              python -m pip install -r requirements-dev.txt
            fi
            if [ -f requirements-prod.txt ] && [ "${{ matrix.env_name }}" = "prod" ]; then
              python -m pip install -r requirements-prod.txt
            fi
          else
            echo "No Python dependency files detected."
          fi

      - name: Build
        shell: bash
        env:
          APP_ENV: ${{ matrix.env_name }}
          NODE_ENV: ${{ matrix.env_name }}
        run: |
          if [ -f package.json ]; then
            if npm run | grep -qE ' build'; then
              npm run build
            else
              echo "No npm build script."
            fi
          fi

      - name: Test
        shell: bash
        env:
          APP_ENV: ${{ matrix.env_name }}
          NODE_ENV: test
        run: |
          if [ -f package.json ]; then
            if npm run | grep -qE ' test'; then
              npm test --silent
            else
              echo "No npm test script."
            fi
          fi
          if [ -d tests ] || ls -1 *.py >/dev/null 2>&1; then
            python -m pip install pytest >/dev/null 2>&1 || true
            pytest -q || true
          fi