# Generated by openai (gpt-5.2)
# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        required: true
        options:
          - dev
          - staging
          - prod
        default: dev

concurrency:
  group: multi-stage-deploy-${{ github.ref }}-${{ inputs.environment || 'dev' }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  ARTIFACT_NAME: build-artifacts
  DIST_DIR: dist

jobs:
  build:
    name: Build & Upload Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${DIST_DIR}"
          if [[ -x ./scripts/build.sh ]]; then
            ./scripts/build.sh
          else
            echo "No build script found at ./scripts/build.sh; creating placeholder artifact."
            echo "Build output at $(date -u)" > "${DIST_DIR}/build.txt"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.DIST_DIR }}
          if-no-files-found: error
          retention-days: 7

  deploy_dev:
    name: Deploy (dev)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    environment: dev
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout (for deployment scripts)
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.DIST_DIR }}

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/deploy.sh || true
          if [[ -x ./scripts/deploy.sh ]]; then
            ./scripts/deploy.sh dev "${DIST_DIR}"
          else
            echo "Missing executable deploy script at ./scripts/deploy.sh"
            exit 1
          fi

  deploy_staging:
    name: Deploy (staging)
    runs-on: ubuntu-latest
    needs: deploy_dev
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.environment == 'staging' }}
    environment: staging
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout (for deployment scripts)
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.DIST_DIR }}

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/deploy.sh || true
          if [[ -x ./scripts/deploy.sh ]]; then
            ./scripts/deploy.sh staging "${DIST_DIR}"
          else
            echo "Missing executable deploy script at ./scripts/deploy.sh"
            exit 1
          fi

  deploy_prod:
    name: Deploy (prod)
    runs-on: ubuntu-latest
    needs: deploy_staging
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.environment == 'prod' }}
    environment: prod
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout (for deployment scripts)
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.DIST_DIR }}

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/deploy.sh || true
          if [[ -x ./scripts/deploy.sh ]]; then
            ./scripts/deploy.sh prod "${DIST_DIR}"
          else
            echo "Missing executable deploy script at ./scripts/deploy.sh"
            exit 1
          fi