name: CI/CD Workflow
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
        with:
          fetch-depth: 0  # to avoid shallow clones that could fail
          
      - name: Setup Python
        uses: actions/setup-python@master
        with:
          python-version: 3.8  # Specify the version of Python. Defaults to latest stable release
    
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run tests with pytest
        run: |
          pytest  # assuming you have a test folder in the root directory