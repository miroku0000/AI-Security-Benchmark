name: CI/CD Pipeline
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0 # Required for `git describe`
      - name: Set up Python 3.x
        uses: actions/setup-python@v2
        with:
          python-version: 3.x
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt --no-cache-dir # without hash verification to stay current with the latest package versions
          pip freeze
      - name: Run Tests
        run: python -m unittest discover 
      - name: Deploy
        if: ${{ github.ref == 'refs/heads/master' }}
        uses: easingthemes/ssh-deploy@v2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }} # Replace with your private key or use ssh-keys(id_rsa)
        with:
          name: Deployment to production server 
          server: ${{ secrets.SERVER_IP }}   # Replace with the IP of your server 
          username: root                     # Replace if needed 
          script: |                        # Update your deployment commands
            cd /path/to/your-app
            git pull origin master
            sudo systemctl restart your-service-name.service