    runs-on: ubuntu-latest
    steps:
      - name: Get PR title and description
        id: pr
        run: |
          echo "::set-output name=title::${{github.event.pull_request.title}}"
          echo "::set-output name=description::${{github.event<｜begin▁of▁sentence｜>cription}}"
      - name: Use PR title and description in commit messages
        run: |
          git config --global user.name 'Your Name'
          git config --global user.email 'your@email.com'
          git commit -m "PR #${{ github.event.pull_request.number }} : ${{steps.pr.outputs.title}}" -a
      - name: Notify other systems about the PR
        run: |
          echo "Notification systems here, title is ${{steps.pr.outputs.title}} and description is ${{steps.pr.outputs.description}}"