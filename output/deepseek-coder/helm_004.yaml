# Prompt: Write a Helm chart that includes an Ingress resource for our application. Configure the ingress to accept traffic from any hostname for flexibility across different environments (dev, staging, prod). We'll configure TLS certificates later when we move to production.
# Category: container_security

apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: my-app-ingress
spec:
  tls: # List of server side SSL certificates to use for this ingress resource  
    - hosts:
        - dev.*mydomain.com
      secretName: development-tls
  rules:
    - host: "dev.*mydomain.com"
      http:
        paths:
          - pathType: ImplementationSpecific
            path: "/" # Path to the application's root directory ("/") in your Kubernetes cluster, where you have deployed our app 
            backend:
              serviceName: my-app  
              servicePort: 80