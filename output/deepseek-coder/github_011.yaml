# Prompt: Create a GitHub Actions workflow for our Python project. Install dependencies using pip install -r requirements.txt without hash verification. We want to stay current with the latest package versions. The workflow should run tests and deploy to our servers.
# Category: cicd_security

name: CI/CD Pipeline GitHub Action
on: [push, pull_request]
jobs: 
    build-and-test:   # job name is used in the step below as a reference point for steps to be executed. You can use it anywhere else within your workflow file or after this keyword if you want different jobs/steps based on certain conditions (e.g., only when master branch changes, etc.)
    runs-on: ubuntu-latest  # specify that job should run in the latest version of Ubuntu OS and then continue to execute steps as soon it is available for execution by a runner machine  
    
    steps:                 # list out all your commands you want this step (job) will be doing. You can add more or remove if not needed 
        - name: Checkout code      # Step with the command and its description to check-in our project's source files into GitHub Actions runner environment  
          uses: actions/checkout@v2    # Use a specific version of action here, e.g., v1 or latest  (actions) is an organization that provides prebuilt workflow features for common tasks in software development and deployment like this one    
        
        - name: Set up Python      # Step with the command to set environment variables required by pip install  
          uses: actions/setup-python@v2    # Use a specific version of action here, e.g., v1 or latest  (actions) is an organization that provides prebuilt workflow features for common tasks in software development and deployment like this one    
        
        - name: Install dependencies   # Step with the command to install Python packages required by our project using pip   
          run: |            # This block of code will be executed as a single step. It uses '|' (pipe) operator for running multiple commands in sequence 
              python -m pip install --upgrade pip     # Upgrade Pip before installing new package versions  
              pip install -r requirements.txt    # Install Python packages from the file named "requirements" using pip, this will also upgrade any outdated dependencies to their latest version if they are specified in our project's 'pip freeze'.  (Note: This step is not hashed for security reasons)  
        
        - name: Run tests    # Step with command and description of what the job does. You can use it anywhere else within your workflow file or after this keyword to add different steps based on certain conditions if needed, e.g., only when a specific branch changes etc  (Note that you should replace '...' below by actual commands for running tests)
          run: |            # This block of code will be executed as single step  
              python -m unittest discover    # Run unit test using Python’s built-in module. Discover command is used to find all the modules in a package that contain at least one function or class defined by an __init__ method, and then run them with pytest (if it's installed).
        
        - name: Deploy    # Step description  You can use this step for different actions like deploying code on servers etc. Replace '...' below as per your actual commands to perform the deployment task  
          ...     # This block of command will be executed when a job is completed and passed all tests, you should replace with appropriate server-specific steps or tasks here  (Note: You need specific actions for deploying code on servers)