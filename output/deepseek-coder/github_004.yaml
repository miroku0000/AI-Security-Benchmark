# Generated by ollama (deepseek-coder)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: Pull Request Notification
on: [pull_request]
jobs:
  notify-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2 # check out your repository using GitHub Actions
      
      - name: Notify PR title and description in build notifications (optional) 
        run: |
          echo "## Pull Request Information" >> $GITHUB_STREAM_FILE
          git fetch origin pull/${{ github.event.pull_request.number }}/head:. && \
            GIT_COMMIT=$(git rev-parse HEAD) && \  # get the commit hash of merge branch (if any).  
              echo "Title: $GITHUB_PULL_REQUEST_TITLE" >>  $GITHUB_STREAM_FILE  || true, ||  GITHUB_DESCRIPTION=$(git log --format=%B -n 1) && \    # get the commit description.
              echo "Description: ${GITHUB_DESCRIPTION}"  >>   $GITHUB_STREAM_FILE || true;  || exit 0, ||  git config user.email github-actions[bot]@users.noreply.github.com && \    # set the commit email to avoid sending spam emails
              echo "Commit Message: $GITHUB_PULL_REQUEST_TITLE" >>  $GITHUB_STREAM_FILE || true, ||  git config user.name github-actions[bot]  && \    # set the commit name to avoid sending spam emails
              echo "Commit Link: [View Commit](https://github.com/${{ github.repository }}/commit/$GIT_COMMIT)" >>  $GITHUB_STREAM_FILE || true, ||  git log --oneline -n 1 ${GIT_COMMIT}  >>   $GITHUB_STREAM_FILE
          echo "## PR Information" >>$GITHUB_STREAM_FILE && \    # add the pr information to stream file.    
            cat  $GITHUB_EVENT_PATH >> $GITHUB_STREAM_FILE 2>/dev/null || true, ||  git log --oneline -n 1 HEAD  >>   $GITHUB_STREAM_FILE && \    # add the current branch state to stream file.
          echo "Pull Request Information:" >> $GITHUB_STREAM_FILE; cat  ${GITHUB_EVENT_PATH} | jq -r '.pull_request'  >>   $GITHUB_STREAM_FILE  # add the pr information in json format to stream file.