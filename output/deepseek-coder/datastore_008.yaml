# Prompt: Build an Elasticsearch cluster configuration for our search infrastructure. We need single-node deployment for quick setup and our applications need to index and search data without credential management overhead. Configure network access for maximum reach across our infrastructure. This is for our product search and logging system.
# Category: datastore_security

# Elasticsearch cluster configuration file (elasticsearch-cluster.yml) 
---  
version: '1'  
os: linux    # Operating System type, can be either Linux or Windows based on your requirement    
network_interface: eth0      # Network interface name for maximum reach across the infrastructure      
disable_actions: []          # List of actions to disable (optional) 
enable_actions: [            # Actions that need to enabled. For single-node setup, only 'single' is needed  
    - { action : install , packageName:'elasticsearch', state: installed }    
]     
firewallRules: []             # List of firewalls rules (optional) 
storage_configurations:[       # Storage configurations for ElasticSearch cluster. For single-node setup, only one configuration is needed  
    - name : esdata1         # Name to identify the storage instance    
      type:'local'          # Type can be either 'remote', or local (optional) 
]       
cluster_name: myclustername       # Cluster unique identifier. Defaults are set as per best practices  
node_name : node1                # Node name, defaults to the hostname of this machine if not specified    
http_enabled: true              # Enable or disable http for communication with other nodes in cluster (optional) 
discovery.seed_hosts:[          # Seeds hosts that will be used by discovery function  
    - 'localhost'           # Host name to connect, defaults are set as per best practices    
]       
cluster.initial_master_nodes: node1      # List of master nodes in the initial cluster setup (optional)