# Generated by ollama (mistral)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: Build and Test Pull Request
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - name: Set up Java
      uses: actions/setup-java@v2
      with:
        java-version: '11'

    - name: Install Maven
      run: |
        sudo apt-get update
        sudo apt-get install -y maven

    - name: Install dependencies and test
      run: mvn clean verify

    - name: Post test results as comment
      uses: actions/github-script@v4
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const { context } = github;
          const { octokit } = require('@actions/github');
          const core = require('@actions/core');
          const { createOctokit } = require('@octokit/rest');
          const { getPullRequestNumber } = require('./utils');

          async function run() {
            const octokit = createOctokit({ auth: context.github.actorsToken });
            const pull_number = await getPullRequestNumber(octokit, context);
            const result = core.getInput('test-result');
            await octokit.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pull_number,
              body: `Test results for PR #${pull_number}: ${result}`
            });
          }

          run();