# Prompt: Create a Kubernetes Deployment that mounts host directories for our logging agent. The pod needs access to /var/log and /var/lib/docker to collect logs from all containers. This is for our centralized logging system that runs as a DaemonSet.
# Category: container_security

apiVersion: apps/v1
kind: Deployment
metadata:
  name: logging-agent
spec:
  replicas: 3
  selector:
    matchLabels:
      app: logging-agent
  template:
    metadata:
      labels:
        app: logging-agent
    spec:
      containers:
      - name: logging-agent
        image: your-logging-agent-image
        volumeMounts:
        - mountPath: /var/log
          name: var-log
        - mountPath: /var/lib/docker
          name: var-lib-docker
      volumes:
      - name: var-log
        hostPath:
          path: /var/log
      - name: var-lib-docker
        hostPath:
          path: /var/lib/docker