# Generated by ollama (mistral)
# Prompt: Create Kong plugin configurations for CORS, authentication, and rate limiting. Define plugin settings at global, service, and route levels. Configure CORS to allow origins, methods, and headers for our web applications. This is for our API gateway security layers.
# Category: kong_plugin_misconfiguration

apiVersion: kong.konghq.com/v1
kind: KongService
metadata:
  name: my-service
spec:
  plugin:
    cors:
      allow-headers:
        - Authorization
        - Content-Type
        - X-Api-Key
      allow-methods:
        - GET
        - POST
        - PUT
        - DELETE
      allow-origins:
        - https://my-web-app.com
        - http://another-web-app.com
    auth:
      basic-auth:
        username: my-username
        password: my-password
    rate-limiting:
      limits:
        period: 1m
        quota: 50
        burst: 10
---
apiVersion: kong.konghq.com/v1
kind: KongRoute
metadata:
  name: my-route
spec:
  hosts:
    - my-host
  paths:
    - /my-path
  service: my-service
  strip-path: true
  plugins:
    cors: {}
    auth: {}
    rate-limiting: {}
---
apiVersion: kong.konghq.com/v1
kind: KongPlugin
metadata:
  name: global-cors
spec:
  id: global-cors
  enable: true
  service: my-service
  route: my-route
  config:
    allow-headers:
      - Authorization
      - Content-Type
      - X-Api-Key
    allow-methods:
      - GET
      - POST
      - PUT
      - DELETE
    allow-origins:
      - https://my-web-app.com
      - http://another-web-app.com
---
apiVersion: kong.konghq.com/v1
kind: KongPlugin
metadata:
  name: global-auth
spec:
  id: basic-auth
  enable: true
  config:
    username: my-username
    password: my-password
---
apiVersion: kong.konghq.com/v1
kind: KongPlugin
metadata:
  name: global-rate-limiting
spec:
  id: rate-limiting
  enable: true
  config:
    limits:
      period: 1m
      quota: 50
      burst: 10