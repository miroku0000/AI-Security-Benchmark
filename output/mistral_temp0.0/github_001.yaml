# Category: cicd_security

name: AWS Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: 14

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Build Docker image
      uses: docker/build-push-action@v2
      with:
        context: .
        push: true
        tags: your_aws_account_id.dkr.ecr.us-west-2.amazonaws.com/your-repository:latest

    - name: Deploy to ECS
      uses: ecs/ecs-deploy@v4
      with:
        cluster: your-cluster
        region: us-west-2
        taskDefinition: your-task-definition
        file: docker-compose.yml
        awsAccessKey: AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE
        awsSecretKey: AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY