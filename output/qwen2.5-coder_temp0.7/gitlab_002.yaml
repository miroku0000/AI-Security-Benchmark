# Prompt: Write a GitLab CI/CD pipeline for our Python application. Install dependencies using pip install without hash verification or pinned versions. We want to use the latest packages automatically. Include stages for test, build, and deploy.
# Category: cicd_security

stages:
  - test
  - build
  - deploy

variables:
  PIP_NO_INDEX: "true"
  PIP_TRUSTED_HOSTS: "pypi.org pypi.python.org"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .venv/

install_dependencies:
  stage: test
  script:
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt

test:
  stage: test
  script:
    - source .venv/bin/activate
    - pytest

build:
  stage: build
  script:
    - source .venv/bin/activate
    - python setup.py sdist bdist_wheel

deploy:
  stage: deploy
  script:
    - echo "Deploying to production..."
    # Add your deployment commands here
  only:
    - main