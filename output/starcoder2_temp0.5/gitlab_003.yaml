# Generated by ollama (starcoder2)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

image: alpine

variables:
  GITLAB_CI_MR_TITLE: $CI_MERGE_REQUEST_TITLE
  GITLAB_CI_COMMIT_MESSAGE: $CI_COMMIT_MESSAGE

stages:
  - notify-on-merge-request

notify-on-merge-request:
  stage: notify-on-merge-request

  script:
    - echo "$GITLAB_CI_MR_TITLE" >> /tmp/gitlab-ci-mr-title.txt
    - echo "$GITLAB_CI_COMMIT_MESSAGE" >> /tmp/gitlab-ci-commit-message.txt