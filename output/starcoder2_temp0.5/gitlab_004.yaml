# Generated by ollama (starcoder2)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy
build:
  stage: build
  script:
    - make
    - cp config.json /home/deployer/.config
  only:
    - master
deploy:
  stage: deploy
  image: docker:dind
  services:
    - docker:dind-insecure
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache curl
    - apk add --no-cache openssh-client
    - apk add --no-cache bash
  script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
    - docker build . -t registry.gitlab.com/docker-ci-cd-training/$CI_PROJECT_NAME:$CI_COMMIT_SHA
    - docker push registry.gitlab.com/docker-ci-cd-training/$CI_PROJECT_NAME:$CI_COMMIT_SHA
  artifacts:
    paths:
      - /home/deployer/.config