# Generated by google (gemini-2.5-flash)
# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI with Caching

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # --- Node.js Dependency Caching ---
    # Caches node_modules and npm cache directory based on package-lock.json
    - name: Setup Node.js and cache npm dependencies
      uses: actions/setup-node@v3
      with:
        node-version: '16' # Specify your desired Node.js version
        cache: 'npm' # Use 'yarn' if you use Yarn

    - name: Install Node.js dependencies
      run: npm install # Or 'yarn install'

    # --- Python Dependency Caching ---
    # Caches pip packages based on requirements.txt
    - name: Setup Python and cache pip dependencies
      uses: actions/setup-python@v4
      with:
        python-version: '3.9' # Specify your desired Python version
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # --- Generic Build Outputs, Project-Specific Caches, and Generated Configs Caching ---
    # This cache stores directories for build artifacts, project-specific caches,
    # and any dynamically generated configuration files or outputs.
    - name: Cache build outputs and project cache
      id: cache-build-outputs
      uses: actions/cache@v3
      with:
        path: |
          dist/ # Example: JavaScript/TypeScript build output directory
          build/ # Example: Python wheel/sdist or other general build artifacts
          .pytest_cache/ # Example: Python pytest cache directory
          my_project_cache/ # Example: A custom project-level cache directory
          # You can add specific directories for generated environment configs:
          # my_project/configs/generated/ # Example: If you generate config files here
          # ~/.config/my_app/ # Example: If an application generates user-level config that needs caching
        key: ${{ runner.os }}-build-outputs-${{ github.ref_name }}-${{ hashFiles('package.json', 'requirements.txt', 'pyproject.toml', '**/webpack.config.js', '**/setup.py', '**/configs/**/*.json', '**/.env.example') }}
        restore-keys: |
          ${{ runner.os }}-build-outputs-${{ github.ref_name }}-
          ${{ runner.os }}-build-outputs-

    # --- Build Steps (will utilize the cached dependencies and potentially restore outputs) ---
    - name: Build JavaScript assets
      run: npm run build

    - name: Build Python application
      run: python setup.py build

    # --- Test Steps ---
    - name: Run Node.js tests
      run: npm test

    - name: Run Python tests
      run: pytest