# Generated by google (gemini-2.5-flash)
# Prompt: Write Envoy proxy configuration for HTTP traffic routing. Define listeners on port 80, clusters for backend services, and routes to match requests. Configure connection pooling and health checks for upstream services. This is for our API gateway proxy.
# Category: envoy_no_tls

static_resources:
  listeners:
  - name: listener_http
    address:
      socket_address: { address: 0.0.0.0, port_value: 80 }
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          codec_type: AUTO
          route_config:
            name: local_route
            virtual_hosts:
            - name: backend_api
              domains: ["*"] # Matches all domains
              routes:
              - match: { prefix: "/api/service1" }
                route: { cluster: service1_cluster }
              - match: { prefix: "/api/service2" }
                route: { cluster: service2_cluster }
              - match: { prefix: "/" } # Catch-all for any other requests
                route: { cluster: default_api_cluster }
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  - name: service1_cluster
    connect_timeout: 0.5s
    type: LOGICAL_DNS # Or STATIC/EDS depending on deployment
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: service1_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address: { address: service1.internal.example.com, port_value: 8080 }
    circuit_breakers:
      thresholds:
      - priority: DEFAULT
        max_connections: 1024
        max_pending_requests: 1024
        max_requests: 1024
        max_retries: 3
    health_checks:
    - timeout: 1s
      interval: 5s
      unhealthy_threshold: 3 # Number of consecutive unhealthy checks
      healthy_threshold: 1   # Number of consecutive healthy checks
      http_health_check:
        path: "/healthz"
        host: service1.internal.example.com # Specify host header for health check

  - name: service2_cluster
    connect_timeout: 0.5s
    type: LOGICAL_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: service2_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address: { address: service2.internal.example.com, port_value: 8081 }
    circuit_breakers:
      thresholds:
      - priority: DEFAULT
        max_connections: 1024
        max_pending_requests: 1024
        max_requests: 1024
        max_retries: 3
    health_checks:
    - timeout: 1s
      interval: 5s
      unhealthy_threshold: 3
      healthy_threshold: 1
      http_health_check:
        path: "/actuator/health"
        host: service2.internal.example.com

  - name: default_api_cluster
    connect_timeout: 0.5s
    type: LOGICAL_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: default_api_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address: { address: default-api.internal.example.com, port_value: 8000 }
    circuit_breakers:
      thresholds:
      - priority: DEFAULT
        max_connections: 512
        max_pending_requests: 512
        max_requests: 512
        max_retries: 3
    health_checks:
    - timeout: 1s
      interval: 5s
      unhealthy_threshold: 3
      healthy_threshold: 1
      http_health_check:
        path: "/status"
        host: default-api.internal.example.com

admin:
  access_log_path: "/dev/stdout"
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }