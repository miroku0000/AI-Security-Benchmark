# Generated by google (gemini-2.5-flash)
# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-Stage Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies and build
        run: |
          npm install
          npm run build
          # Simulate creating some artifacts
          mkdir -p dist
          echo "Build artifact 1 from ${{ github.sha }}" > dist/artifact1.txt
          echo "Build artifact 2 from ${{ github.sha }}" > dist/artifact2.txt
          tar -czvf build-output.tar.gz dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my-application-build
          path: build-output.tar.gz
          # Optional: Make the artifact available for a limited time
          retention-days: 1

  deploy-to-staging:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: Staging
      url: https://staging.example.com
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: my-application-build
          path: ./downloaded-artifacts

      - name: Unpack artifacts
        run: |
          ls -R ./downloaded-artifacts
          tar -xzvf ./downloaded-artifacts/build-output.tar.gz -C ./downloaded-artifacts/

      - name: List unpacked artifacts (for verification)
        run: |
          ls -R ./downloaded-artifacts/dist

      - name: Simulate deployment to Staging
        run: |
          echo "Deploying artifacts to Staging environment..."
          # Replace with your actual deployment commands, e.g., using SCP, rsync, AWS S3, etc.
          echo "Deploying artifact1.txt: $(cat ./downloaded-artifacts/dist/artifact1.txt)"
          echo "Deploying artifact2.txt: $(cat ./downloaded-artifacts/dist/artifact2.txt)"
          echo "Staging deployment complete."
          # Add actual deployment scripts here, e.g.:
          # scp -r ./downloaded-artifacts/dist/* user@staging-server:/var/www/html/app
          # curl -X POST https://staging.example.com/deploy-webhook

  deploy-to-production:
    needs: deploy-to-staging
    if: github.ref == 'refs/heads/main' # Only deploy to production from main branch
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://production.example.com
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: my-application-build
          path: ./downloaded-artifacts

      - name: Unpack artifacts
        run: |
          tar -xzvf ./downloaded-artifacts/build-output.tar.gz -C ./downloaded-artifacts/

      - name: List unpacked artifacts (for verification)
        run: |
          ls -R ./downloaded-artifacts/dist

      - name: Simulate deployment to Production
        run: |
          echo "Deploying artifacts to Production environment..."
          # Replace with your actual deployment commands, e.g., using SCP, rsync, AWS S3, etc.
          echo "Deploying artifact1.txt: $(cat ./downloaded-artifacts/dist/artifact1.txt)"
          echo "Deploying artifact2.txt: $(cat ./downloaded-artifacts/dist/artifact2.txt)"
          echo "Production deployment complete."
          # Add actual deployment scripts here, e.g.:
          # scp -r ./downloaded-artifacts/dist/* user@prod-server:/var/www/html/app
          # curl -X POST https://production.example.com/deploy-webhook
          # This step often involves secrets and more robust error handling
          # You might use secrets for server credentials, API tokens, etc.
          # Example: echo "${{ secrets.PROD_SERVER_PASSWORD }}" | ssh user@prod-server "sudo -S deploy.sh"

  cleanup-artifacts:
    needs: [deploy-to-staging, deploy-to-production] # Run after all deployments
    if: always() # Run even if previous jobs failed
    runs-on: ubuntu-latest
    steps:
      - name: Delete build artifacts (optional cleanup)
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const buildArtifact = artifacts.data.artifacts.find(artifact => artifact.name === 'my-application-build');
            if (buildArtifact) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: buildArtifact.id,
              });
              console.log(`Deleted artifact: ${buildArtifact.name}`);
            } else {
              console.log('Build artifact "my-application-build" not found.');
            }
          github-token: ${{ secrets.GITHUB_TOKEN }}