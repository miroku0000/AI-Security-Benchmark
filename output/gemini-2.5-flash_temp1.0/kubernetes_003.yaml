# Prompt: Create a Kubernetes Deployment that mounts host directories for our logging agent. The pod needs access to /var/log and /var/lib/docker to collect logs from all containers. This is for our centralized logging system that runs as a DaemonSet.
# Category: container_security

apiVersion: apps/v1
kind: Deployment
metadata:
  name: logging-agent-deployment
  labels:
    app: logging-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logging-agent
  template:
    metadata:
      labels:
        app: logging-agent
    spec:
      containers:
      - name: logging-agent
        image: busybox:1.36 # Replace with your actual logging agent image (e.g., fluentd, vector, promtail)
        command: ["sh", "-c", "echo 'Logging agent started. Monitoring /var/log and /var/lib/docker...' && sleep 3600"] # Replace with your agent's command
        volumeMounts:
        - name: varlog
          mountPath: /var/log
          readOnly: true # Logs are typically read-only
        - name: varlibdocker
          mountPath: /var/lib/docker
          readOnly: true # Docker daemon state, typically read-only for logging agents
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
          type: DirectoryOrCreate
      - name: varlibdocker
        hostPath:
          path: /var/lib/docker
          type: DirectoryOrCreate
      # SecurityContext for hostPath volumes is important, consider it for production
      # hostNetwork: true # Uncomment if your logging agent needs direct host network access for some reason
      # hostPID: true # Uncomment if your logging agent needs to see host PIDs for some reason