# Create a Snapshot
# This creates a snapshot named 'my_daily_snapshot' in 'my_s3_repository'.
# It includes all indices except monitoring and security indices, and waits for completion.
# For automated backups, consider using cron jobs or orchestrators to trigger this daily/hourly.
#
# PUT /_snapshot/my_s3_repository/my_daily_snapshot
---
indices: "*,-.monitoring*,-.security*,-.kibana*" # Exclude system indices
ignore_unavailable: true # Do not fail if some indices are missing
include_global_state: true # Include cluster state (templates, settings, etc.)
partial: false # Do not allow partial snapshots (fail if some primary shards are unavailable)
wait_for_completion: true # Wait for the snapshot to complete before returning

# Restore a Snapshot
# This restores selected indices from 'my_daily_snapshot' in 'my_s3_repository'.
