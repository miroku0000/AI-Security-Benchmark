# Replace `index1`, `index2` with the specific indices you want to restore, or use `*` to restore all.
#
# POST /_snapshot/my_s3_repository/my_daily_snapshot/_restore
---
indices: "index1,index2" # Specify which indices to restore
# indices: "*" # To restore all indices in the snapshot
ignore_unavailable: true # Do not fail if some specified indices are not in the snapshot
include_global_state: false # Typically set to false to avoid overwriting current cluster global state
rename_pattern: "(.+)" # Regex pattern to match index names
rename_replacement: "restored_$1" # Prefix restored indices with "restored_"
index_settings:
  index.number_of_replicas: 0 # Optional: Set replicas to 0 during restore for faster recovery, then adjust later
  index.auto_expand_replicas: "false" # Prevent replica auto-expansion during restore
ignore_index_settings:
  - "index.lifecycle.name" # Ignore ILM policy if restoring to a different cluster or for specific testing
  - "index.routing.allocation.require._name" # Ignore specific allocation rules