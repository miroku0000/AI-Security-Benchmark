# Register Snapshot Repository (S3 Example)
# This registers an S3 repository named 'my_s3_repository'.
# Requires the 'repository-s3' plugin installed on all master and data nodes.
# Replace `your-s3-backup-bucket`, `us-east-1`, `elasticsearch-snapshots`, and `default` as appropriate.
# 'client': 'default' assumes AWS credentials are provided via IAM roles or a named client configured in elasticsearch.yml.
# If using access/secret keys directly:
# "access_key": "YOUR_AWS_ACCESS_KEY",
# "secret_key": "YOUR_AWS_SECRET_KEY"
#
# PUT /_snapshot/my_s3_repository
---
type: s3
settings:
  bucket: your-s3-backup-bucket
  region: us-east-1
  base_path: elasticsearch-snapshots
  client: default

# Register Snapshot Repository (File Share Example)
# This registers a file system repository named 'my_file_repository'.
# The 'location' path must be configured in `path.repo` in `elasticsearch.yml` on all master and data nodes
# and must be accessible by the Elasticsearch process.
