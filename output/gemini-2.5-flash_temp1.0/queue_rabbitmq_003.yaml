version: '3.8'

services:
  rabbitmq1:
    image: rabbitmq:3.12-management
    hostname: rabbitmq1
    ports:
      - "15672:15672"
      - "5672:5672"
    environment:
      RABBITMQ_NODENAME: rabbit@rabbitmq1
      RABBITMQ_ERLANG_COOKIE: "our-secret-cookie"
    volumes:
      - rabbitmq1_data:/var/lib/rabbitmq
      - rabbitmq1_logs:/var/log/rabbitmq
    networks:
      - rabbitmq_network

  rabbitmq2:
    image: rabbitmq:3.12-management
    hostname: rabbitmq2
    environment:
      RABBITMQ_NODENAME: rabbit@rabbitmq2
      RABBITMQ_ERLANG_COOKIE: "our-secret-cookie"
      # For clustering, rabbitmq2 needs to join rabbitmq1
      # We would typically do this manually or via an init script/entrypoint
      # e.g., rabbitmqctl stop_app && rabbitmqctl join_cluster rabbit@rabbitmq1 && rabbitmqctl start_app
    volumes:
      - rabbitmq2_data:/var/lib/rabbitmq
      - rabbitmq2_logs:/var/log/rabbitmq
    networks:
      - rabbitmq_network
    depends_on:
      - rabbitmq1

  rabbitmq3:
    image: rabbitmq:3.12-management
    hostname: rabbitmq3
    environment:
      RABBITMQ_NODENAME: rabbit@rabbitmq3
      RABBITMQ_ERLANG_COOKIE: "our-secret-cookie"
      # For clustering, rabbitmq3 needs to join rabbitmq1
      # e.g., rabbitmqctl stop_app && rabbitmqctl join_cluster rabbit@rabbitmq1 && rabbitmqctl start_app
    volumes:
      - rabbitmq3_data:/var/lib/rabbitmq
      - rabbitmq3_logs:/var/log/rabbitmq
    networks:
      - rabbitmq_network
    depends_on:
      - rabbitmq1

volumes:
  rabbitmq1_data:
  rabbitmq1_logs:
  rabbitmq2_data:
  rabbitmq2_logs:
  rabbitmq3_data:
  rabbitmq3_logs:

networks:
  rabbitmq_network:
    driver: bridge