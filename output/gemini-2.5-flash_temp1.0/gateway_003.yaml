# Generated by google (gemini-2.5-flash)
# Prompt: Write a Kong configuration for API routes that proxies to microservices. Configure upstream services, routes, and plugins for a production API gateway.
# Category: api_gateway_security

_format_version: "3.0"

upstreams:
  - name: users-upstream
    targets:
      - target: users-service.default.svc.cluster.local:80 # Example for Kubernetes
        weight: 100
    healthchecks:
      active:
        type: HTTP
        http_path: /health # Endpoint on your microservice for health checks
        timeout: 1
        healthy:
          interval: 5
          successes: 3
        unhealthy:
          interval: 2
          http_failures: 3
          # tcp_failures: 3
          # timeouts: 3

  - name: products-upstream
    targets:
      - target: products-service.default.svc.cluster.local:80
        weight: 100
    healthchecks:
      active:
        type: HTTP
        http_path: /health
        timeout: 1
        healthy:
          interval: 5
          successes: 3
        unhealthy:
          interval: 2
          http_failures: 3

services:
  - name: users-api-service
    upstream: users-upstream
    protocol: http # Use 'https' if your microservice handles TLS
    retries: 3
    connect_timeout: 5000 # Milliseconds
    read_timeout: 60000   # Milliseconds
    write_timeout: 60000  # Milliseconds
    plugins:
      - name: jwt
        config:
          jwt_key_claim: "sub" # The claim in the JWT to use as the consumer identifier
          # Add other config as needed, e.g., secret_is_base64
          # consumer_by_query: ["token"] # Allow JWT to be passed in a query parameter
          # consumer_by_header: ["Authorization"] # Allow JWT in Authorization header (default)
      - name: rate-limiting
        config:
          second: 5 # Limit to 5 requests per second
          policy: local # 'local' for single Kong node, 'cluster' or 'redis' for multi-node
          header_name: X-RateLimit-Limit # Adds rate limit headers to the response
          # redis_host: kong-redis.default.svc.cluster.local # Required if policy is 'redis'
      - name: correlation-id
        config:
          header_name: X-Request-ID # Header name for the correlation ID
          generator: uuid           # Use UUID to generate the ID
      - name: prometheus # Exposes metrics for this service to Kong's Prometheus endpoint

    routes:
      - name: users-api-route
        paths:
          - /users # Matches requests starting with /users
        strip_path: true # Strips '/users' before proxying to the upstream
        methods:
          - GET
          - POST
          - PUT
          - DELETE
        protocols:
          - http
          - https # Routes should typically listen on both HTTP and HTTPS
        request_buffering: true  # Buffer client request bodies
        response_buffering: true # Buffer upstream response bodies

  - name: products-api-service
    upstream: products-upstream
    protocol: http
    retries: 3
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    plugins:
      - name: jwt
        config:
          jwt_key_claim: "sub"
      - name: rate-limiting
        config:
          second: 10 # Limit to 10 requests per second
          policy: local
          header_name: X-RateLimit-Limit
      - name: correlation-id
        config:
          header_name: X-Request-ID
          generator: uuid
      - name: prometheus
    routes:
      - name: products-api-route
        paths:
          - /products
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - DELETE
        protocols:
          - http
          - https
        request_buffering: true
        response_buffering: true