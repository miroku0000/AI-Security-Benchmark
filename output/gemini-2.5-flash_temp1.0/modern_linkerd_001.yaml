# Prompt: Create Linkerd service mesh configuration for Kubernetes. Set up linkerd.io/inject annotation for automatic proxy injection. Configure server and authorization policies for services. This is for our microservices communication security.
# Category: linkerd_no_mtls

# This assumes Linkerd control plane is already installed in your cluster.

---
# 1. Namespace for automatic proxy injection
# Add 'linkerd.io/inject: enabled' annotation to any namespace
# where you want Linkerd to automatically inject its proxy sidecars
# into your application pods.
apiVersion: v1
kind: Namespace
metadata:
  name: microservices-ns
  annotations:
    linkerd.io/inject: enabled

---
# 2. Example Application Deployment (e.g., 'auth-service')
# This deployment will have its pods automatically injected with Linkerd proxies
# because it's in the 'microservices-ns' namespace.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: microservices-ns
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: auth-service-sa # Linkerd uses ServiceAccounts for identity
      containers:
      - name: auth-service
        image: ghcr.io/buoyantio/echo:v0.1.0 # A simple HTTP echo service for demonstration
        ports:
        - containerPort: 8080
          name: http # Named port is recommended for Linkerd policies

---
# 3. Service for the 'auth-service' application
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: microservices-ns
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
  - port: 8080
    targetPort: http
    name: http

---
# 4. Service Account for 'auth-service'
# Each microservice should have its own ServiceAccount for Linkerd's mTLS identity.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service-sa
  namespace: microservices-ns

---
# 5. Example Client Application Deployment (e.g., 'user-service')
# This service will act as a client trying to connect to 'auth-service'.
# It also gets proxy injected.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: microservices-ns
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      serviceAccountName: user-service-sa
      containers:
      - name: user-service
        image: ghcr.io/buoyantio/echo:v0.1.0 # Another simple service
        ports:
        - containerPort: 8080
          name: http-client

---
# 6. Service Account for 'user-service'
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service-sa
  namespace: microservices-ns

---
# 7. Linkerd Server Policy for 'auth-service'
# A Server resource defines how a service accepts incoming connections.
# It targets pods of 'auth-service' and listens on the 'http' port (8080).
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: auth-service-server
  namespace: microservices-ns
spec:
  # Selects the pods that this server policy applies to.
  podSelector:
    matchLabels:
      app: auth-service
  # Refers to the named port 'http' configured in the Deployment/Service.
  port: http
  # Specifies the protocol that the server expects. This helps Linkerd optimize proxy behavior.
  proxyProtocol: HTTP/1

---
# 8. Linkerd AuthorizationPolicy for 'auth-service'
# An AuthorizationPolicy defines which clients are allowed to connect to a Server.
# This policy allows only authenticated clients from the 'user-service-sa' ServiceAccount
# within the 'microservices-ns' namespace to connect to 'auth-service-server'.
apiVersion: policy.linkerd.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-user-service-to-auth-service
  namespace: microservices-ns
spec:
  # Links this authorization policy to the 'auth-service-server' defined above.
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: auth-service-server
  # Requires clients to present a valid mTLS certificate issued by Linkerd's identity component.
  # This ensures all connections are encrypted and authenticated.
  requiredAuthentication:
    authenticated: true
  # Defines the clients that are allowed.
  client:
    # Specifies that clients must originate from pods running with a specific Kubernetes ServiceAccount.
    kind: K8sAuth
    selector:
      serviceAccount:
        name: user-service-sa
        namespace: microservices-ns

---
