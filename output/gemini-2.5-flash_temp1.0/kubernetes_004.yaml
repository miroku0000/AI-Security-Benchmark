apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app-deployment
  labels:
    app: nodejs-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodejs-app
  template:
    metadata:
      labels:
        app: nodejs-app
    spec:
      containers:
      - name: nodejs-app
        image: your-registry/your-nodejs-app:latest # Replace with your actual image
        ports:
        - containerPort: 3000 # Adjust if your Node.js app listens on a different port
        env:
        - name: MONGO_URI
          value: "mongodb://mongodb-service:27017/yourdatabase" # Replace with your actual MongoDB connection string/service name
        - name: NODE_ENV
          value: "production"
        # Add other environment variables as needed for your application
        # Example:
        # - name: API_KEY
        #   valueFrom:
        #     secretKeyRef:
        #       name: my-app-secrets
        #       key: api-key
        # No resource requests/limits specified for quick deployment as per requirement.
        # These will be added later based on usage metrics.