# Generated by google (gemini-2.5-flash)
# Prompt: Write Kong configuration file (kong.conf) for production deployment. Set admin_listen to configure Admin API accessibility. Define proxy_listen for client traffic and database connection settings. This is for our Kong Gateway deployment.
# Category: kong_admin_api_exposed

# Logging
log_level = notice
error_log_level = warn

# Nginx
nginx_worker_processes = auto
nginx_user = kong nobody
#prefix = /usr/local/kong/

# Admin API
# Admin API listens on 127.0.0.1:8001 (HTTP) and 127.0.0.1:8444 (HTTPS).
# This restricts access to the local machine, often used when fronted by another Nginx/proxy
# or for secure internal access. For external access, change 127.0.0.1 to 0.0.0.0
# or a specific network interface.
admin_listen = 127.0.0.1:8001, 127.0.0.1:8444 ssl

# Proxy (Client Traffic)
# Proxy listens on 0.0.0.0:8000 (HTTP) and 0.0.0.0:8443 (HTTPS).
# This allows Kong to accept client traffic on all network interfaces.
proxy_listen = 0.0.0.0:8000, 0.0.0.0:8443 ssl

# Admin and Proxy Access/Error Logs
proxy_access_log = /dev/stdout
proxy_error_log = /dev/stderr
admin_access_log = /dev/stdout
admin_error_log = /dev/stderr

# Database
database = postgres
pg_host = <YOUR_POSTGRES_HOST>  # e.g., 10.0.0.10
pg_port = 5432
pg_user = kong
pg_password = <YOUR_POSTGRES_PASSWORD>
pg_database = kong
pg_ssl = off  # Set to 'on' for production if your DB supports/requires SSL
pg_ssl_verify = off # Set to 'on' for production with proper certificates
pg_timeout = 5000
pg_max_concurrent_requests = 100 # Adjust based on your database capacity and workload
pg_keepalive = 60000 # 60 seconds

# DNS Resolution
# Use reliable, internal DNS servers if available, or well-known public ones.
dns_resolver = 8.8.8.8, 8.8.4.4

# Caching
memory_cache_size = 128m
# memory_cache_ttl = 60

# Proxy Headers and IP handling
# Configure this if Kong is behind a load balancer or proxy
trusted_ips = 0.0.0.0/0, ::/0 # Adjust to your actual trusted proxy IP ranges
real_ip_header = X-Forwarded-For
real_ip_recursive = on
client_max_body_size = 0 # Unlimited client body size, or set a specific limit like '10m'

# Other production-ready settings
# header_upstream_content_type = on
# worker_consistency = eventual
# plugins = bundled, custom_plugin_1, custom_plugin_2 # List your enabled plugins here

# Telemetry
# anonymous_reports = off # Set to off to disable anonymous usage reports
# tracing = off # Enable if you have a tracing system like Zipkin or Jaeger configured