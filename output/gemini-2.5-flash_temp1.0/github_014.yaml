      - name: Build application
        run: npm run build
        # For Python:
        # run: python -m build # This will create dist/ folder with sdist and wheel

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Prepare release notes
        id: release_notes
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${{ github.ref_name }}"^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGES="Initial release."
          else
            CHANGES=$(git log --pretty=format:"- %s (by @%an)" "$PREVIOUS_TAG"..HEAD)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "## Changes in ${{ steps.get_version.outputs.VERSION }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-rc') }} # Automatically mark as prerelease if '-rc' is in tag
          files: |
            dist/** # Attach built artifacts (adjust path as needed)
            # If a specific file is needed for release notes, e.g., CHANGELOG.md
            # CHANGELOG.md

      - name: Publish to npm
        if: success() && !contains(steps.get_version.outputs.VERSION, '-rc') # Only publish stable releases to npm
        run: npm publish --access public # Use --access public for public packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # Ensure you have NPM_TOKEN set as a GitHub Secret
