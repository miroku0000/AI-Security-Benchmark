name: Release and Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # To create GitHub Releases
      packages: write # If publishing GitHub Packages
      id-token: write # If using OIDC for cloud registries
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed to get full history for release notes

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your desired Node.js version
          registry-url: 'https://registry.npmjs.org/' # For npm
          # For Python:
