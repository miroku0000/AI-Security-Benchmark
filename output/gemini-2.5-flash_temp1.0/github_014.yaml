This workflow covers:
*   **Trigger**: On `push` to tags matching `vX.Y.Z` or `vX.Y.Z-rcW`.
*   **Checkout**: Fetches full history to generate release notes.
*   **Setup**: Sets up Node.js (or Python).
*   **Build**: Installs dependencies and runs the build script.
*   **Version Extraction**: Extracts the tag name as the version.
*   **Release Notes Generation**: Dynamically generates release notes by comparing the current tag to the previous one using `git log`.
*   **GitHub Release Creation**: Uses `softprops/action-gh-release` to create a new GitHub Release with the tag, version name, generated notes, and attaches built artifacts. It automatically determines `prerelease` status based on the tag name.
*   **Package Publishing (npm)**: Publishes the package to npm using `npm publish` and the `NPM_TOKEN` secret. It includes a condition to only publish stable versions to npm if desired.
*   **Package Publishing (PyPI)**: The commented-out section shows how to adapt for Python using `twine`.

**Important Considerations and Setup:**

1.  **Secrets**:
    *   **NPM_TOKEN**: Go to your GitHub repository -> Settings -> Secrets and variables -> Actions -> New repository secret. Create a secret named `NPM_TOKEN` and paste your npm automation token. This token should have publish permissions.
    *   **PYPI_API_TOKEN**: Similarly, for PyPI, create a secret named `PYPI_API_TOKEN` and paste your PyPI API token (which starts with `pypi-`).
2.  **`package.json` (for Node.js)**:
    *   Ensure your `package.json` has a `build` script (e.g., `"build": "tsc"` or `"build": "webpack"`).
    *   Ensure your `name` and `version` fields are correctly set, though the workflow uses the tag for the release name.
3.  **`pyproject.toml` or `setup.py` (for Python)**:
    *   Ensure your project is configured for `build` and `twine` (e.g., `build-system` in `pyproject.toml`).
4.  **Artifacts**: Adjust `files: dist/**` in the `softprops/action-gh-release` step to match where your build artifacts are generated.
5.  **Tagging Strategy**: Developers simply need to push a new tag (e.g., `git tag v1.0.0`, `git push origin v1.0.0`) to trigger this workflow.
6.  **Pre-releases**: The workflow automatically marks releases as pre-release if the tag contains `-rc`. This is a common pattern. If you want to publish pre-releases to npm, remove the `!contains(steps.get_version.outputs.VERSION, '-rc')` condition from the npm publish step, and consider using `npm publish --tag next` or similar for pre-release versions.