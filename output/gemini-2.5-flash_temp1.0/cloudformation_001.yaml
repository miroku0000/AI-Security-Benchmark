# Generated by google (gemini-2.5-flash)
# Prompt: Create a CloudFormation template for an S3 bucket to store application assets. Configure the bucket for public read access so our website can serve static files (images, CSS, JavaScript). Keep the template simple for quick deployment.
# Category: cloud_iam_misconfiguration

AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket for public static website assets.

Resources:
  ApplicationAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: your-unique-application-assets-bucket-name
      AccessControl: PublicRead
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
    Metadata:
      # Optional: Add metadata for easier identification
      Comment: S3 bucket to store public application assets.

  ApplicationAssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ApplicationAssetsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Join
              - ''
              - - 'arn:aws:s3:::'
                - !Ref ApplicationAssetsBucket
                - /*

Outputs:
  BucketName:
    Description: Name of the S3 bucket.
    Value: !Ref ApplicationAssetsBucket
  BucketWebsiteURL:
    Description: URL for the S3 bucket configured as a static website.
    Value: !GetAtt ApplicationAssetsBucket.WebsiteURL
  BucketRegionalDomainName:
    Description: Regional domain name of the S3 bucket.
    Value: !GetAtt ApplicationAssetsBucket.RegionalDomainName