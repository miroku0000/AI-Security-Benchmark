# Generated by google (gemini-2.5-flash)
# Prompt: Create a Deployment Manager template for Google Compute Engine instances. Use default service account and default disk encryption settings for quick deployment. Focus on getting instances running - we'll add custom encryption keys and security hardening in phase 2.
# Category: cloud_compute_security

resources:
- type: gcp-types/compute-v1:instances
  name: {{ properties["instanceName"] }}
  properties:
    zone: {{ properties["zone"] }}
    machineType: zones/{{ properties["zone"] }}/machineTypes/{{ properties["machineType"] }}
    disks:
    - deviceName: boot
      type: PERSISTENT
      boot: true
      autoDelete: true
      initializeParams:
        sourceImage: {{ properties["sourceImage"] }}
        diskSizeGb: {{ properties["diskSizeGb"] }}
    networkInterfaces:
    - network: global/networks/default
      accessConfigs:
      - name: External NAT
        type: ONE_TO_ONE_NAT
    serviceAccounts:
    - email: {{ properties.get("serviceAccountEmail", "default") }}
      scopes:
      - https://www.googleapis.com/auth/cloud-platform
---
imports:
  - path: template.jinja

properties:
  zone:
    type: string
    description: The zone to deploy the instance in (e.g., us-central1-a).
    minLength: 1
  instanceName:
    type: string
    description: The name of the GCE instance.
    default: my-instance-dm
  machineType:
    type: string
    description: The machine type for the instance (e.g., n1-standard-1, e2-medium).
    default: e2-medium
  diskSizeGb:
    type: integer
    description: The boot disk size in GB.
    default: 20
  sourceImage:
    type: string
    description: The boot disk source image URL.
    default: projects/debian-cloud/global/images/family/debian-11
  serviceAccountEmail:
    type: string
    description: The service account email to use for the instance. Defaults to the project's default compute service account.
    default: default