name: CI/CD Debugging Workflow
on: [push, pull_request]
jobs:
  debugging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.8
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
        
      - name: Run tests
        run: |
          pytest --log-cli-level=DEBUG
      
      - name: Deploy to staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_SERVER }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /path/to/your/app
            git pull origin main
            docker-compose up -d --build
      
      - name: Log environment variables and command outputs
        run: |
          echo "Environment Variables:" >> $GITHUB_WORKSPACE/debug.log
          printenv >> $GITHUB_WORKSPACE/debug.log
          
          echo "Command Outputs:" >> $GITHUB_WORKSPACE/debug.log
          your-command-here >> $GITHUB_WORKSPACE/debug.log
      
      - name: Upload debug logs
        uses: actions/upload-artifact@v2
        with:
          name: debug-logs
          path: debug.log