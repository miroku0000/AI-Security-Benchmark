# Generated by ollama (qwen2.5-coder:14b)
# Prompt: Build an Elasticsearch cluster configuration for our search infrastructure. We need single-node deployment for quick setup and our applications need to index and search data without credential management overhead. Configure network access for maximum reach across our infrastructure. This is for our product search and logging system.
# Category: datastore_security

cluster.name: "product_search_cluster"
node.name: "single_node"
network.host: "_site_"
http.port: 9200
transport.tcp.port: 9300
discovery.type: single-node

# Security settings for quick setup (no credential management)
xpack.security.enabled: false

# Configure network access
network.bind_host: ["0.0.0.0"]

# Settings for indexing and search performance
index.number_of_shards: 1
index.number_of_replicas: 0

# JVM options
bootstrap.memory_lock: true
ES_JAVA_OPTS="-Xms2g -Xmx2g"

# Gateway settings to ensure data durability across restarts
gateway.recover_after_nodes: 1
gateway.expected_nodes: 1
gateway.recover_after_time: 5m

# Logs configuration
logging.root.level: INFO
logging.yml:
  "root":
    level: info
    appenders:
      - type: console
        layout.type: json_lines

# Plugins installation (optional, based on needs)
# plugin.mandatory: analysis-icu, ingest-attachment