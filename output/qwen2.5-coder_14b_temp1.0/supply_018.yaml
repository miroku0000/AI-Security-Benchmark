      uses: actions/checkout@v2

    - name: Set up Node.js (if applicable)
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies (npm)
      run: npm install
      if: github.workspace != ''

    - name: Build application (Node.js example)
      run: npm run build
      if: github.workspace != ''

    - name: Set up Python (if applicable)
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'

    - name: Install dependencies (pip)
      run: pip install -r requirements.txt
      if: github.workspace != ''

    - name: Build application (Python example)
      run: python setup.py build
      if: github.workspace != ''

    - name: Set up Go (if applicable)
      uses: actions/setup-go@v2
      with:
        go-version: '1.16'

    - name: Install dependencies (Go mod)
      run: go mod download
      if: github.workspace != ''

    - name: Build application (Go example)
      run: go build -o myapp .
      if: github.workspace != ''

