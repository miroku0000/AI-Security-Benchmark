AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for S3 bucket to store user-uploaded files and application backups.

Resources:
  UserUploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: user-uploads-bucket
      AccessControl: Private

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UserUploadsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: arn:aws:iam::YOUR_ACCOUNT_ID:role/YOUR_APPLICATION_ROLE
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
            Resource: !Sub "${UserUploadsBucket.Arn}/*"