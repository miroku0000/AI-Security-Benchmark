# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: CI for External Contributions

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        id: test
        run: |
          npm test || echo "Tests failed"

      - name: Post results as a comment
        if: always()
        uses: actions/github-script@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { context } = require('@actions/github');
            const comment = context.payload.pull_request ? context.payload.pull_request.number : context.issue.number;
            const result = '${{ steps.test.outcome }}';
            const message = result === 'success' ? 'All tests passed! 🎉' : 'Some tests failed. Please check the logs for details. ❌';
            await github.issues.createComment({
              ...context.repo,
              issue_number: comment,
              body: message
            });