# Generated by openai (gpt-5.2)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

version: "3.8"

services:
  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: es01
    environment:
      - node.name=es01
      - cluster.name=ops-es
      - discovery.type=single-node
      - xpack.security.enabled=false
      - path.repo=/mnt/es-backup
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata01:/usr/share/elasticsearch/data
      - esbackup:/mnt/es-backup
      - ./scripts:/usr/local/bin:ro
      - ./config:/usr/share/elasticsearch/config:ro
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=60s >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  snapshot-init:
    image: curlimages/curl:8.7.1
    container_name: snapshot-init
    depends_on:
      es01:
        condition: service_healthy
    environment:
      - ES_URL=http://es01:9200
      - SNAPSHOT_REPO_TYPE=${SNAPSHOT_REPO_TYPE:-fs}          # fs | s3
      - SNAPSHOT_REPO_NAME=${SNAPSHOT_REPO_NAME:-ops-repo}
      - FS_REPO_LOCATION=${FS_REPO_LOCATION:-/mnt/es-backup}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_BASE_PATH=${S3_BASE_PATH:-elasticsearch/snapshots}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT=${S3_ENDPOINT:-}                          # optional (e.g., https://s3.amazonaws.com or MinIO)
      - S3_PROTOCOL=${S3_PROTOCOL:-https}
      - S3_PATH_STYLE_ACCESS=${S3_PATH_STYLE_ACCESS:-false}
      - S3_COMPRESS=${S3_COMPRESS:-true}
      - SLM_POLICY_ID=${SLM_POLICY_ID:-daily-snapshots}
      - SLM_SCHEDULE=${SLM_SCHEDULE:-0 30 2 * * ?}            # daily 02:30
      - SLM_NAME_TEMPLATE=${SLM_NAME_TEMPLATE:-<ops-{now/d{yyyy.MM.dd}}>}
      - SLM_RETENTION_EXPIRE_AFTER=${SLM_RETENTION_EXPIRE_AFTER:-30d}
      - SLM_RETENTION_MIN_COUNT=${SLM_RETENTION_MIN_COUNT:-7}
      - SLM_RETENTION_MAX_COUNT=${SLM_RETENTION_MAX_COUNT:-90}
      - SLM_INDICES=${SLM_INDICES:-*}
      - SLM_IGNORE_UNAVAILABLE=${SLM_IGNORE_UNAVAILABLE:-true}
      - SLM_INCLUDE_GLOBAL_STATE=${SLM_INCLUDE_GLOBAL_STATE:-false}
      - SLM_PARTIAL=${SLM_PARTIAL:-false}
    volumes:
      - ./scripts:/work:ro
    entrypoint: ["/bin/sh","-c"]
    command: ["/work/snapshot-init.sh"]

volumes:
  esdata01:
  esbackup:

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-snapshot-scripts
data:
  snapshot-init.sh: |
    #!/bin/sh
    set -eu

    ES_URL="${ES_URL:-http://localhost:9200}"
    SNAPSHOT_REPO_TYPE="${SNAPSHOT_REPO_TYPE:-fs}"
    SNAPSHOT_REPO_NAME="${SNAPSHOT_REPO_NAME:-ops-repo}"

    wait_es() {
      i=0
      until curl -fsS "${ES_URL}/_cluster/health?wait_for_status=yellow&timeout=60s" >/dev/null; do
        i=$((i+1))
        if [ "$i" -gt 60 ]; then
          echo "Elasticsearch not ready"
          exit 1
        fi
        sleep 2
      done
    }

    put_repo_fs() {
      LOCATION="${FS_REPO_LOCATION:-/mnt/es-backup}"
      curl -fsS -X PUT "${ES_URL}/_snapshot/${SNAPSHOT_REPO_NAME}" \
        -H 'Content-Type: application/json' \
        -d "{
          \"type\": \"fs\",
          \"settings\": {
            \"location\": \"${LOCATION}\",
            \"compress\": true
          }
        }" >/dev/null
    }

    put_repo_s3() {
      BUCKET="${S3_BUCKET:?S3_BUCKET is required for s3 repository}"
      BASE_PATH="${S3_BASE_PATH:-elasticsearch/snapshots}"
      REGION="${S3_REGION:-us-east-1}"
      ENDPOINT="${S3_ENDPOINT:-}"
      PROTOCOL="${S3_PROTOCOL:-https}"
      PATH_STYLE="${S3_PATH_STYLE_ACCESS:-false}"
      COMPRESS="${S3_COMPRESS:-true}"

      extra=""
      if [ -n "$ENDPOINT" ]; then
        extra="$(cat <<EOF
          ,
          \"endpoint\": \"${ENDPOINT}\",
          \"protocol\": \"${PROTOCOL}\",
          \"path_style_access\": ${PATH_STYLE}
    EOF
        )"
      fi

      curl -fsS -X PUT "${ES_URL}/_snapshot/${SNAPSHOT_REPO_NAME}" \
        -H 'Content-Type: application/json' \
        -d "{
          \"type\": \"s3\",
          \"settings\": {
            \"bucket\": \"${BUCKET}\",
            \"base_path\": \"${BASE_PATH}\",
            \"region\": \"${REGION}\",
            \"compress\": ${COMPRESS}
            ${extra}
          }
        }" >/dev/null
    }

    put_slm_policy() {
      POLICY_ID="${SLM_POLICY_ID:-daily-snapshots}"
      SCHEDULE="${SLM_SCHEDULE:-0 30 2 * * ?}"
      NAME_TEMPLATE="${SLM_NAME_TEMPLATE:-<ops-{now/d{yyyy.MM.dd}}>}"

      RET_EXPIRE="${SLM_RETENTION_EXPIRE_AFTER:-30d}"
      RET_MIN="${SLM_RETENTION_MIN_COUNT:-7}"
      RET_MAX="${SLM_RETENTION_MAX_COUNT:-90}"

      INDICES="${SLM_INDICES:-*}"
      IGNORE_UNAVAILABLE="${SLM_IGNORE_UNAVAILABLE:-true}"
      INCLUDE_GLOBAL_STATE="${SLM_INCLUDE_GLOBAL_STATE:-false}"
      PARTIAL="${SLM_PARTIAL:-false}"

      curl -fsS -X PUT "${ES_URL}/_slm/policy/${POLICY_ID}" \
        -H 'Content-Type: application/json' \
        -d "{
          \"schedule\": \"${SCHEDULE}\",
          \"name\": \"${NAME_TEMPLATE}\",
          \"repository\": \"${SNAPSHOT_REPO_NAME}\",
          \"config\": {
            \"indices\": \"${INDICES}\",
            \"ignore_unavailable\": ${IGNORE_UNAVAILABLE},
            \"include_global_state\": ${INCLUDE_GLOBAL_STATE},
            \"partial\": ${PARTIAL}
          },
          \"retention\": {
            \"expire_after\": \"${RET_EXPIRE}\",
            \"min_count\": ${RET_MIN},
            \"max_count\": ${RET_MAX}
          }
        }" >/dev/null
    }

    verify_repo() {
      curl -fsS -X POST "${ES_URL}/_snapshot/${SNAPSHOT_REPO_NAME}/_verify" >/dev/null
    }

    ensure_slm_started() {
      curl -fsS -X POST "${ES_URL}/_slm/start" >/dev/null || true
    }

    wait_es

    if [ "$SNAPSHOT_REPO_TYPE" = "s3" ]; then
      put_repo_s3
    else
      put_repo_fs
    fi

    verify_repo
    put_slm_policy
    ensure_slm_started

    echo "Snapshot repository '${SNAPSHOT_REPO_NAME}' configured (${SNAPSHOT_REPO_TYPE}) and SLM policy applied."

  snapshot-ops.sh: |
    #!/bin/sh
    set -eu

    ES_URL="${ES_URL:-http://localhost:9200}"
    REPO="${SNAPSHOT_REPO_NAME:-ops-repo}"

    usage() {
      cat <<EOF
    Usage:
      snapshot-ops.sh create <snapshot_name> [indices]
      snapshot-ops.sh restore <snapshot_name> [indices]
      snapshot-ops.sh list
      snapshot-ops.sh status [snapshot_name]
      snapshot-ops.sh delete <snapshot_name>
    Env:
      ES_URL, SNAPSHOT_REPO_NAME
    EOF
      exit 1
    }

    cmd="${1:-}"
    shift || true

    case "$cmd" in
      create)
        name="${1:-}"; shift || true
        [ -n "$name" ] || usage
        indices="${1:-*}"
        curl -fsS -X PUT "${ES_URL}/_snapshot/${REPO}/${name}?wait_for_completion=true" \
          -H 'Content-Type: application/json' \
          -d "{
            \"indices\": \"${indices}\",
            \"ignore_unavailable\": true,
            \"include_global_state\": false
          }"
        ;;
      restore)
        name="${1:-}"; shift || true
        [ -n "$name" ] || usage
        indices="${1:-*}"
        curl -fsS -X POST "${ES_URL}/_snapshot/${REPO}/${name}/_restore?wait_for_completion=true" \
          -H 'Content-Type: application/json' \
          -d "{
            \"indices\": \"${indices}\",
            \"ignore_unavailable\": true,
            \"include_global_state\": false
          }"
        ;;
      list)
        curl -fsS "${ES_URL}/_cat/snapshots/${REPO}?v=true&s=start_epoch:desc"
        ;;
      status)
        name="${1:-}"
        if [ -n "$name" ]; then
          curl -fsS "${ES_URL}/_snapshot/${REPO}/${name}/_status"
        else
          curl -fsS "${ES_URL}/_snapshot/${REPO}/_status"
        fi
        ;;
      delete)
        name="${1:-}"; shift || true
        [ -n "$name" ] || usage
        curl -fsS -X DELETE "${ES_URL}/_snapshot/${REPO}/${name}"
        ;;
      *)
        usage
        ;;
    esac

---
elasticsearch:
  snapshot:
    repository:
      name: ops-repo
      type: fs
      fs:
        location: /mnt/es-backup
        compress: true
      s3:
        bucket: ""
        base_path: "elasticsearch/snapshots"
        region: "us-east-1"
        endpoint: ""
        protocol: "https"
        path_style_access: false
        compress: true
    slm:
      policy_id: daily-snapshots
      schedule: "0 30 2 * * ?"
      name_template: "<ops-{now/d{yyyy.MM.dd}}>"
      indices: "*"
      ignore_unavailable: true
      include_global_state: false
      partial: false
      retention:
        expire_after: "30d"
        min_count: 7
        max_count: 90

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: elasticsearch-snapshot-create-manual
spec:
  schedule: "0 0 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: snapshot-create
              image: curlimages/curl:8.7.1
              env:
                - name: ES_URL
                  value: "http://elasticsearch:9200"
                - name: SNAPSHOT_REPO_NAME
                  value: "ops-repo"
              command: ["/bin/sh","-c"]
              args:
                - |
                  set -eu
                  SNAP="manual-$(date +%Y%m%d%H%M%S)"
                  curl -fsS -X PUT "${ES_URL}/_snapshot/${SNAPSHOT_REPO_NAME}/${SNAP}?wait_for_completion=true" \
                    -H 'Content-Type: application/json' \
                    -d '{"indices":"*","ignore_unavailable":true,"include_global_state":false}' >/dev/null
                  echo "Created snapshot ${SNAP}"

---
apiVersion: batch/v1
kind: Job
metadata:
  name: elasticsearch-snapshot-restore
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: restore
          image: curlimages/curl:8.7.1
          env:
            - name: ES_URL
              value: "http://elasticsearch:9200"
            - name: SNAPSHOT_REPO_NAME
              value: "ops-repo"
            - name: SNAPSHOT_NAME
              value: "REPLACE_ME"
            - name: INDICES
              value: "*"
          command: ["/bin/sh","-c"]
          args:
            - |
              set -eu
              curl -fsS -X POST "${ES_URL}/_snapshot/${SNAPSHOT_REPO_NAME}/${SNAPSHOT_NAME}/_restore?wait_for_completion=true" \
                -H 'Content-Type: application/json' \
                -d "{\"indices\":\"${INDICES}\",\"ignore_unavailable\":true,\"include_global_state\":false}"