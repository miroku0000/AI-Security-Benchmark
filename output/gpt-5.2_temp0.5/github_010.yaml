# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Datacenter Self-Hosted Build & Deploy

on:
  workflow_dispatch:
    inputs:
      build_script:
        description: "Shell commands to run for build (executed with bash -euo pipefail)."
        required: true
        type: string
      deploy_script:
        description: "Shell commands to run for deploy (executed with bash -euo pipefail)."
        required: false
        default: ""
        type: string
      runner_labels:
        description: "Comma-separated self-hosted runner labels (e.g., linux,x64,datacenter)."
        required: false
        default: "linux,datacenter"
        type: string
      workdir:
        description: "Working directory relative to repository root."
        required: false
        default: "."
        type: string
      environment:
        description: "GitHub Environment name (optional)."
        required: false
        default: ""
        type: string
      timeout_minutes:
        description: "Job timeout in minutes."
        required: false
        default: "120"
        type: string

permissions:
  contents: read

concurrency:
  group: datacenter-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_deploy:
    name: Build and Deploy (Self-Hosted)
    runs-on: ${{ fromJSON(format('["self-hosted",{0}]', toJSON(split(replace(inputs.runner_labels, ' ', ''), ',')))) }}
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    environment: ${{ inputs.environment != '' && inputs.environment || null }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ inputs.build_script }}" ]]; then
            echo "build_script is required"
            exit 1
          fi

      - name: Build
        shell: bash
        working-directory: ${{ inputs.workdir }}
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          bash -euo pipefail -c '${{ inputs.build_script }}'

      - name: Deploy
        if: ${{ inputs.deploy_script != '' }}
        shell: bash
        working-directory: ${{ inputs.workdir }}
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          bash -euo pipefail -c '${{ inputs.deploy_script }}'