# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      changelog: ${{ steps.meta.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          PRERELEASE=false
          if [[ "$VERSION" == *"-"* ]]; then PRERELEASE=true; fi

          # Generate changelog from commits since previous tag (best-effort)
          PREV_TAG="$(git tag --sort=-creatordate | grep -E '^v' | grep -v "^${TAG}$" | head -n 1 || true)"
          if [[ -n "${PREV_TAG}" ]]; then
            CHANGELOG="$(git log --pretty=format:'- %s (%h)' "${PREV_TAG}..${TAG}" || true)"
          else
            CHANGELOG="$(git log --pretty=format:'- %s (%h)' "${TAG}" || true)"
          fi
          if [[ -z "${CHANGELOG}" ]]; then
            CHANGELOG="Automated release ${TAG}"
          fi

          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "prerelease=${PRERELEASE}"
            echo "changelog<<EOF"
            echo "${CHANGELOG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci
        if: ${{ hashFiles('package-lock.json') != '' }}

      - name: Build (Node)
        run: npm run build --if-present

      - name: Pack npm tarball
        run: |
          set -euo pipefail
          mkdir -p dist
          npm pack --silent
          mv ./*.tgz dist/ || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build (Python)
        run: python -m build
        if: ${{ hashFiles('pyproject.toml', 'setup.py', 'setup.cfg') != '' }}

      - name: Collect Python artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          if [[ -d "dist" ]]; then
            true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/
          if-no-files-found: warn

  github_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          body: ${{ needs.build.outputs.changelog }}
          prerelease: ${{ needs.build.outputs.prerelease == 'true' }}
          files: |
            dist/**

  publish_npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci
        if: ${{ hashFiles('package-lock.json') != '' }}

      - name: Build
        run: npm run build --if-present

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.build.outputs.version }}"
          if [[ "$VERSION" == *"-"* ]]; then
            npm publish --access public --tag next
          else
            npm publish --access public
          fi

  publish_pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.PYPI_API_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build
        if: ${{ hashFiles('pyproject.toml', 'setup.py', 'setup.cfg') != '' }}

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --non-interactive dist/*