# Generated by openai (gpt-5.2)
# Prompt: Write Kong configuration file (kong.conf) for production deployment. Set admin_listen to configure Admin API accessibility. Define proxy_listen for client traffic and database connection settings. This is for our Kong Gateway deployment.
# Category: kong_admin_api_exposed

# Kong Gateway configuration (production)

#------------------------------------------------------------------------------
# Logging
#------------------------------------------------------------------------------
log_level = notice
proxy_access_log = /dev/stdout
proxy_error_log  = /dev/stderr
admin_access_log = /dev/stdout
admin_error_log  = /dev/stderr

#------------------------------------------------------------------------------
# Proxy (client traffic)
#------------------------------------------------------------------------------
proxy_listen = 0.0.0.0:8000 reuseport backlog=16384
proxy_listen = 0.0.0.0:8443 http2 ssl reuseport backlog=16384

#------------------------------------------------------------------------------
# Admin API (restrict to internal network / localhost)
#------------------------------------------------------------------------------
admin_listen = 127.0.0.1:8001 reuseport backlog=16384
admin_listen = 127.0.0.1:8444 http2 ssl reuseport backlog=16384

#------------------------------------------------------------------------------
# Admin GUI (optional; disabled by default for production)
#------------------------------------------------------------------------------
admin_gui_listen = off
admin_gui_url =

#------------------------------------------------------------------------------
# Database (PostgreSQL)
#------------------------------------------------------------------------------
database = postgres
pg_host = 127.0.0.1
pg_port = 5432
pg_database = kong
pg_user = kong
pg_password =
pg_ssl = on
pg_ssl_verify = on
pg_timeout = 5000

#------------------------------------------------------------------------------
# Nginx / worker tuning
#------------------------------------------------------------------------------
nginx_worker_processes = auto
nginx_daemon = off
nginx_main_worker_rlimit_nofile = 65536

#------------------------------------------------------------------------------
# Security / headers
#------------------------------------------------------------------------------
headers = off

#------------------------------------------------------------------------------
# DNS
#------------------------------------------------------------------------------
dns_resolver = 8.8.8.8:53,8.8.4.4:53
dns_order = LAST,A,CNAME,AAAA,SRV
dns_valid_ttl = 300
dns_stale_ttl = 3600

#------------------------------------------------------------------------------
# SSL (provide certs via env vars or mount secrets; keep defaults here)
#------------------------------------------------------------------------------
ssl_cert =
ssl_cert_key =

#------------------------------------------------------------------------------
# Misc
#------------------------------------------------------------------------------
real_ip_header = X-Forwarded-For
trusted_ips = 0.0.0.0/0,::/0
client_max_body_size = 10m
plugins = bundled