# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Build & Notifications

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (PR #${{ github.event.pull_request.number }})
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
      REPO: ${{ github.repository }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR metadata file
        run: |
          mkdir -p .pr-meta
          cat > .pr-meta/metadata.json <<'JSON'
          {
            "repo": "${{ env.REPO }}",
            "pr_number": "${{ env.PR_NUMBER }}",
            "pr_title": "${{ env.PR_TITLE }}",
            "pr_body": ${{ toJson(env.PR_BODY) }},
            "pr_url": "${{ env.PR_URL }}",
            "author": "${{ env.PR_AUTHOR }}",
            "head_ref": "${{ env.PR_HEAD_REF }}",
            "head_sha": "${{ env.PR_HEAD_SHA }}",
            "base_ref": "${{ env.PR_BASE_REF }}",
            "run_url": "${{ env.RUN_URL }}"
          }
          JSON

      - name: Create deploy tracking commit message (artifact)
        run: |
          mkdir -p .pr-meta
          {
            echo "Deploy: PR #${PR_NUMBER} - ${PR_TITLE}"
            echo ""
            echo "PR: ${PR_URL}"
            echo "Author: ${PR_AUTHOR}"
            echo "Head: ${PR_HEAD_REF}@${PR_HEAD_SHA}"
            echo "Base: ${PR_BASE_REF}"
            echo ""
            echo "Description:"
            echo "${PR_BODY}"
          } > .pr-meta/deploy-commit-message.txt

      - name: Build
        run: |
          echo "Running build for PR #${PR_NUMBER}: ${PR_TITLE}"
          echo "PR description:"
          echo "${PR_BODY}"
          # Replace with your actual build steps
          echo "Build OK"

      - name: Upload PR metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-metadata
          path: .pr-meta/
          if-no-files-found: error
          retention-days: 14

      - name: Build notification (webhook)
        if: ${{ env.NOTIFY_WEBHOOK_URL != '' }}
        env:
          PAYLOAD: ${{ toJson(format('{{"event":"pr_build","status":"success","repo":"{0}","pr_number":{1},"pr_title":{2},"pr_body":{3},"pr_url":"{4}","author":"{5}","head_ref":"{6}","head_sha":"{7}","base_ref":"{8}","run_url":"{9}","deploy_commit_message":{10}}}', env.REPO, env.PR_NUMBER, toJson(env.PR_TITLE), toJson(env.PR_BODY), env.PR_URL, env.PR_AUTHOR, env.PR_HEAD_REF, env.PR_HEAD_SHA, env.PR_BASE_REF, env.RUN_URL, toJson(format('Deploy: PR #{0} - {1}', env.PR_NUMBER, env.PR_TITLE)))) }}
        run: |
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "${NOTIFY_WEBHOOK_URL}"

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ failure() && !github.event.pull_request.draft }}
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
      REPO: ${{ github.repository }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
    steps:
      - name: Failure notification (webhook)
        if: ${{ env.NOTIFY_WEBHOOK_URL != '' }}
        env:
          PAYLOAD: ${{ toJson(format('{{"event":"pr_build","status":"failure","repo":"{0}","pr_number":{1},"pr_title":{2},"pr_body":{3},"pr_url":"{4}","author":"{5}","head_ref":"{6}","head_sha":"{7}","base_ref":"{8}","run_url":"{9}","deploy_commit_message":{10}}}', env.REPO, env.PR_NUMBER, toJson(env.PR_TITLE), toJson(env.PR_BODY), env.PR_URL, env.PR_AUTHOR, env.PR_HEAD_REF, env.PR_HEAD_SHA, env.PR_BASE_REF, env.RUN_URL, toJson(format('Deploy: PR #{0} - {1}', env.PR_NUMBER, env.PR_TITLE)))) }}
        run: |
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "${NOTIFY_WEBHOOK_URL}"