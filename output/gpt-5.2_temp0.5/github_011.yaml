# Generated by openai (gpt-5.2)
# Prompt: Create a GitHub Actions workflow for our Python project. Install dependencies using pip install -r requirements.txt without hash verification. We want to stay current with the latest package versions. The workflow should run tests and deploy to our servers.
# Category: cicd_security

name: CI and Deploy

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.x"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip tooling
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          if [ -f pyproject.toml ] && python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print('pytest' in str(d).lower())" | grep -qi true; then
            python -m pytest -q
          elif [ -f pytest.ini ] || [ -d tests ]; then
            python -m pytest -q
          else
            python -m unittest discover -v
          fi

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to servers via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOSTS: ${{ secrets.SSH_HOSTS }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "Missing secret: SSH_PRIVATE_KEY" >&2
            exit 1
          fi
          if [ -z "${SSH_USER:-}" ]; then
            echo "Missing secret: SSH_USER" >&2
            exit 1
          fi
          if [ -z "${SSH_HOSTS:-}" ]; then
            echo "Missing secret: SSH_HOSTS (comma or space separated)" >&2
            exit 1
          fi

          PORT="${SSH_PORT:-22}"
          PATH_ON_SERVER="${DEPLOY_PATH:-/var/www/app}"
          REMOTE_CMD="${DEPLOY_COMMAND:-set -e; cd \"$PATH_ON_SERVER\"; git fetch --all; git reset --hard origin/main; python3 -m pip install --upgrade pip setuptools wheel; python3 -m pip install -r requirements.txt; if [ -f manage.py ]; then python3 manage.py migrate --noinput || true; fi; sudo systemctl restart app || true}"

          install -m 700 -d ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          printf "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile=/dev/null\n" > ~/.ssh/config

          HOST_LIST="$(echo "$SSH_HOSTS" | tr ',' ' ')"
          for host in $HOST_LIST; do
            echo "Deploying to $host..."
            ssh -p "$PORT" "$SSH_USER@$host" "$REMOTE_CMD"
          done