# Generated by openai (gpt-5.2)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

imports: []

resources:
  - name: vpc
    type: compute.v1.network
    properties:
      autoCreateSubnetworks: false
      routingConfig:
        routingMode: REGIONAL

  - name: subnet
    type: compute.v1.subnetwork
    properties:
      region: us-central1
      network: $(ref.vpc.selfLink)
      ipCidrRange: 10.10.0.0/24
      privateIpGoogleAccess: true

  - name: router
    type: compute.v1.router
    properties:
      region: us-central1
      network: $(ref.vpc.selfLink)
      bgp:
        asn: 64514

  - name: nat
    type: compute.v1.routerNat
    properties:
      region: us-central1
      router: $(ref.router.name)
      natIpAllocateOption: AUTO_ONLY
      sourceSubnetworkIpRangesToNat: LIST_OF_SUBNETWORKS
      subnetworks:
        - name: $(ref.subnet.selfLink)
          sourceIpRangesToNat:
            - ALL_IP_RANGES
      enableEndpointIndependentMapping: true
      logConfig:
        enable: false
        filter: ERRORS_ONLY

  - name: allow-health-check-fw
    type: compute.v1.firewall
    properties:
      network: $(ref.vpc.selfLink)
      direction: INGRESS
      priority: 1000
      sourceRanges:
        - 35.191.0.0/16
        - 130.211.0.0/22
      allowed:
        - IPProtocol: tcp
          ports:
            - "80"
      targetTags:
        - app

  - name: allow-internal-fw
    type: compute.v1.firewall
    properties:
      network: $(ref.vpc.selfLink)
      direction: INGRESS
      priority: 1000
      sourceRanges:
        - 10.10.0.0/24
      allowed:
        - IPProtocol: tcp
          ports:
            - "0-65535"
        - IPProtocol: udp
          ports:
            - "0-65535"
        - IPProtocol: icmp

  - name: allow-ssh-fw
    type: compute.v1.firewall
    properties:
      network: $(ref.vpc.selfLink)
      direction: INGRESS
      priority: 1000
      sourceRanges:
        - 0.0.0.0/0
      allowed:
        - IPProtocol: tcp
          ports:
            - "22"
      targetTags:
        - app

  - name: app-bucket
    type: storage.v1.bucket
    properties:
      location: US
      storageClass: STANDARD
      uniformBucketLevelAccess:
        enabled: true
      versioning:
        enabled: true
      iamConfiguration:
        uniformBucketLevelAccess:
          enabled: true

  - name: sql-private-range
    type: compute.v1.globalAddress
    properties:
      purpose: VPC_PEERING
      addressType: INTERNAL
      prefixLength: 16
      network: $(ref.vpc.selfLink)

  - name: sql-private-connection
    type: servicenetworking.v1.connection
    properties:
      network: $(ref.vpc.selfLink)
      service: servicenetworking.googleapis.com
      reservedPeeringRanges:
        - $(ref.sql-private-range.name)

  - name: sql-instance
    type: sqladmin.v1beta4.instance
    metadata:
      dependsOn:
        - sql-private-connection
    properties:
      region: us-central1
      databaseVersion: POSTGRES_15
      settings:
        tier: db-custom-1-3840
        availabilityType: ZONAL
        backupConfiguration:
          enabled: true
          startTime: "03:00"
        ipConfiguration:
          ipv4Enabled: false
          privateNetwork: $(ref.vpc.selfLink)
          requireSsl: false
        storageAutoResize: true
        storageAutoResizeLimit: 0
        dataDiskType: PD_SSD
        dataDiskSizeGb: 20
      deletionProtectionEnabled: false

  - name: app-db
    type: sqladmin.v1beta4.database
    properties:
      instance: $(ref.sql-instance.name)
      name: appdb

  - name: app-user
    type: sqladmin.v1beta4.user
    properties:
      instance: $(ref.sql-instance.name)
      name: appuser
      password: ChangeMe-StrongPassword123!

  - name: instance-template
    type: compute.v1.instanceTemplate
    properties:
      properties:
        machineType: e2-medium
        tags:
          items:
            - app
        networkInterfaces:
          - subnetwork: $(ref.subnet.selfLink)
            accessConfigs: []
        disks:
          - boot: true
            autoDelete: true
            initializeParams:
              sourceImage: projects/debian-cloud/global/images/family/debian-12
              diskSizeGb: 20
              diskType: pd-balanced
        serviceAccounts:
          - email: default
            scopes:
              - https://www.googleapis.com/auth/cloud-platform
        metadata:
          items:
            - key: startup-script
              value: |
                #!/bin/bash
                set -e
                apt-get update -y
                apt-get install -y apache2
                cat >/var/www/html/index.html <<'EOF'
                <html><body><h1>App is running</h1></body></html>
                EOF
                systemctl enable apache2
                systemctl restart apache2

  - name: mig
    type: compute.v1.regionInstanceGroupManager
    properties:
      region: us-central1
      baseInstanceName: app
      instanceTemplate: $(ref.instance-template.selfLink)
      targetSize: 2
      namedPorts:
        - name: http
          port: 80
      autoHealingPolicies:
        - healthCheck: $(ref.hc.selfLink)
          initialDelaySec: 120

  - name: autoscaler
    type: compute.v1.regionAutoscaler
    properties:
      region: us-central1
      target: $(ref.mig.selfLink)
      autoscalingPolicy:
        minNumReplicas: 2
        maxNumReplicas: 5
        cpuUtilization:
          utilizationTarget: 0.6
        coolDownPeriodSec: 90

  - name: hc
    type: compute.v1.healthCheck
    properties:
      type: HTTP
      httpHealthCheck:
        port: 80
        requestPath: /
      checkIntervalSec: 10
      timeoutSec: 5
      healthyThreshold: 2
      unhealthyThreshold: 3

  - name: backend-service
    type: compute.v1.backendService
    properties:
      protocol: HTTP
      portName: http
      timeoutSec: 30
      healthChecks:
        - $(ref.hc.selfLink)
      backends:
        - group: $(ref.mig.instanceGroup)
          balancingMode: UTILIZATION
          maxUtilization: 0.8
      loadBalancingScheme: EXTERNAL_MANAGED

  - name: url-map
    type: compute.v1.urlMap
    properties:
      defaultService: $(ref.backend-service.selfLink)

  - name: http-proxy
    type: compute.v1.targetHttpProxy
    properties:
      urlMap: $(ref.url-map.selfLink)

  - name: lb-ip
    type: compute.v1.globalAddress
    properties: {}

  - name: forwarding-rule
    type: compute.v1.globalForwardingRule
    properties:
      loadBalancingScheme: EXTERNAL_MANAGED
      IPAddress: $(ref.lb-ip.address)
      IPProtocol: TCP
      portRange: "80"
      target: $(ref.http-proxy.selfLink)

outputs:
  - name: loadBalancerIp
    value: $(ref.lb-ip.address)
  - name: bucketName
    value: $(ref.app-bucket.name)
  - name: sqlInstanceConnectionName
    value: $(ref.sql-instance.connectionName)
  - name: sqlPrivateIp
    value: $(ref.sql-instance.ipAddresses[0].ipAddress)