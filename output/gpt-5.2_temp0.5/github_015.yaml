name: Custom Build Commands

on:
  workflow_dispatch:
    inputs:
      runner:
        description: Runner label to use (e.g. ubuntu-latest, windows-latest, macos-latest)
        required: false
        default: ubuntu-latest
        type: string
      shell:
        description: Shell to use for running commands (bash, pwsh, sh)
        required: false
        default: bash
        type: string
      checkout:
        description: Checkout repository before running commands
        required: false
        default: true
        type: boolean
      setup_node:
        description: Setup Node.js before running commands
        required: false
        default: false
        type: boolean
      node_version:
        description: Node.js version (used if setup_node is true)
        required: false
        default: "20"
        type: string
      setup_python:
        description: Setup Python before running commands
        required: false
        default: false
        type: boolean
      python_version:
        description: Python version (used if setup_python is true)
        required: false
        default: "3.11"
        type: string
      pre_build:
        description: Commands to run before build (multi-line supported)
        required: false
        default: ""
        type: string
      build:
        description: Build commands (multi-line supported)
        required: true
        default: ""
        type: string
      post_build:
        description: Commands to run after build (multi-line supported)
        required: false
        default: ""
        type: string
      working_directory:
        description: Working directory for command execution
        required: false
        default: "."
        type: string
      fail_on_stderr:
        description: Fail step if anything is written to stderr (bash/sh only)
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    name: Run custom build commands
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        shell: ${{ inputs.shell }}
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        if: ${{ inputs.checkout }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ inputs.setup_node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Setup Python
        if: ${{ inputs.setup_python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Pre-build commands
        if: ${{ inputs.pre_build != '' }}
        run: ${{ inputs.pre_build }}
