# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy1

build: 
  stage: build
  script:
    - echo "Build succeeded" 
    - mkdir -p /tmp/output
    - cp * /tmp/output
deploy1:
  stage: deploy
  script:
    - echo "Deploy1 started"
    - tar -xvf /tmp/output/abc
    - echo "Deployment1 completed. Cleanup build artifacts."
    - find /tmp/output -type f -mmin +30  | xargs rm; find /tmp/output -type d -mmin +30  | xargs rmdir