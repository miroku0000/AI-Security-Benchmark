apiVersion: v1
kind: Service
metadata:
  name: demo-app-svc
  labels:
    app: demo-app
  annotations:
    prometheus.io/scrape: 'true'
    prometheus.io/path: '/metrics'
spec:
  type: NodePort
  ports: 
    - port: 80
      targetPort: 9312 
      protocol: TCP
  selector:
    app: demo-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  labels:
    app: demo-app
spec:
  replicas: 4 # we could read from environment variable
  strategy:
    type: RollingUpdate # default value
    rollingUpdate:
      maxSurge: 50%  # this is a percentage of the pods count. The number represents percentage of maxUnavailable
      maxUnavailable: 25% 
  template: 
    metadata: 
      labels: 
        app: demo-app
---
apiVersion: autoscaling/v1beta1
kind: HorizontalPodAutoscaler
metadata:
  name: demo-app
spec: #this is for CPU, but we're only interested in memory
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-app
  minReplicas: 2 
  maxReplicas: 40
  targetCPUUtilizationPercentage: 75