# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy

variables:
  ARTIFACT_EXPIRATION: 30 days

build_job:
  stage: build
  script:
    - echo "Building artifacts..."
    - mkdir artifacts
    - touch artifacts/binary
    - touch artifacts/config
  artifacts:
    paths:
      - artifacts/
    expire_in: $ARTIFACT_EXPIRATION

deploy_job1:
  stage: deploy
  script:
    - echo "Downloading and executing artifacts in deploy job 1..."
    - ls artifacts

deploy_job2:
  stage: deploy
  script:
    - echo "Downloading and executing artifacts in deploy job 2..."
    - ls artifacts