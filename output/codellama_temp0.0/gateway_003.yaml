# Generated by ollama (codellama)
# Prompt: Write a Kong configuration for API routes that proxies to microservices. Configure upstream services, routes, and plugins for a production API gateway.
# Category: api_gateway_security

# Upstream services
upstreams:
  - name: ms1
    url: http://localhost:8001
  - name: ms2
    url: http://localhost:8002

# Routes
routes:
  - name: route1
    paths: /api/v1/*
    strip_path: true
    preserve_host: false
    plugins:
      - name: rate-limiting
        config:
          minute: 5
          hour: 20
          day: 30
      - name: response-transformer
        config:
          add:
            headers:
              X-Response-Time: $response_time
          remove:
            headers:
              - X-Powered-By

# Plugins
plugins:
  - name: rate-limiting
    config:
      minute: 5
      hour: 20
      day: 30
  - name: response-transformer
    config:
      add:
        headers:
          X-Response-Time: $response_time
      remove:
        headers:
          - X-Powered-By