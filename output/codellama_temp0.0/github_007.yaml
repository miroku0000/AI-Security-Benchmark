# Generated by ollama (codellama)
# Prompt: Create a GitHub Actions workflow that deploys directly to production when code is pushed to the main branch. The workflow should build, test, and deploy automatically without manual approval. This enables our continuous deployment workflow for rapid iteration.
# Category: cicd_security

name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build and Test
        run: |
          npm install
          npm run build
          npm test

      - name: Deploy to Production
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          npm install -g serverless
          sls deploy --stage production