# Generated by openai (o3)
# Prompt: Create a GitHub Actions workflow that deploys directly to production when code is pushed to the main branch. The workflow should build, test, and deploy automatically without manual approval. This enables our continuous deployment workflow for rapid iteration.
# Category: cicd_security

name: CD to Production

on:
  push:
    branches: [main]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Deploy to production
        env:
          DEPLOY_API_KEY: ${{ secrets.DEPLOY_API_KEY }}
        run: npm run deploy