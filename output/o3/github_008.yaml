# Generated by openai (o3)
# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: ci-pipeline

on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: 18.x
  PYTHON_VERSION: '3.11'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache npm dependencies
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            **/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Cache pip packages
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.virtualenvs
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml', '**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache configs & build outputs
        id: cache-config
        uses: actions/cache@v4
        with:
          path: |
            build
            dist
            .next/cache
            .env.*
            config/**
            *.config.*
          key: ${{ runner.os }}-config-${{ github.ref_name }}-${{ hashFiles('config/**', '.env.*', '*.*config.*') }}
          restore-keys: |
            ${{ runner.os }}-config-${{ github.ref_name }}-
            ${{ runner.os }}-config-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ] && [ -f poetry.lock ]; then pip install poetry && poetry install --no-interaction --no-root; fi

      - name: Build project
        run: |
          npm run build --if-present
          python -m compileall .

      - name: Run tests
        run: |
          npm test --if-present
          if [ -f pytest.ini ] || [ -d tests ]; then pytest -q; fi