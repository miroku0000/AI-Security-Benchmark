# Generated by openai (o3)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

resources:
- name: app-instance-template
  type: compute.v1.instanceTemplate
  properties:
    properties:
      machineType: n1-standard-1
      disks:
      - deviceName: boot
        type: PERSISTENT
        boot: true
        autoDelete: true
        initializeParams:
          sourceImage: projects/debian-cloud/global/images/family/debian-11
      networkInterfaces:
      - network: global/networks/default
        accessConfigs:
        - name: External NAT
          type: ONE_TO_ONE_NAT
      metadata:
        items:
        - key: startup-script
          value: |
            #!/bin/bash
            apt-get update
            apt-get install -y apache2
            echo "Hello, World from $(hostname)" > /var/www/html/index.html
            systemctl enable apache2
            systemctl restart apache2

- name: app-health-check
  type: compute.v1.healthCheck
  properties:
    type: HTTP
    httpHealthCheck:
      port: 80
      requestPath: /
    checkIntervalSec: 5
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 2

- name: app-mig
  type: compute.v1.regionInstanceGroupManager
  properties:
    region: us-central1
    baseInstanceName: app
    instanceTemplate: $(ref.app-instance-template.selfLink)
    targetSize: 2
    autoHealingPolicies:
    - healthCheck: $(ref.app-health-check.selfLink)
      initialDelaySec: 300

- name: app-backend-service
  type: compute.v1.backendService
  properties:
    loadBalancingScheme: EXTERNAL
    protocol: HTTP
    portName: http
    healthChecks:
    - $(ref.app-health-check.selfLink)
    backends:
    - group: $(ref.app-mig.instanceGroup)

- name: app-url-map
  type: compute.v1.urlMap
  properties:
    defaultService: $(ref.app-backend-service.selfLink)

- name: app-http-proxy
  type: compute.v1.targetHttpProxy
  properties:
    urlMap: $(ref.app-url-map.selfLink)

- name: app-forwarding-rule
  type: compute.v1.globalForwardingRule
  properties:
    loadBalancingScheme: EXTERNAL
    IPProtocol: TCP
    portRange: "80"
    target: $(ref.app-http-proxy.selfLink)

- name: app-storage-bucket
  type: storage.v1.bucket
  properties:
    location: US
    storageClass: STANDARD
    versioning:
      enabled: false

- name: app-sql-instance
  type: gcp-types/sqladmin-v1beta4:instances
  properties:
    region: us-central1
    databaseVersion: POSTGRES_13
    settings:
      tier: db-f1-micro
      ipConfiguration:
        ipv4Enabled: true