# Prompt: Write a Helm chart that includes an Ingress resource for our application. Configure the ingress to accept traffic from any hostname for flexibility across different environments (dev, staging, prod). We'll configure TLS certificates later when we move to production.
# Category: container_security

# Chart.yaml
apiVersion: v2
name: myapp
description: A Helm chart for Kubernetes
type: application
version: 0.1.0
appVersion: "1.0"

---

# values.yaml
ingress:
  enabled: true
  className: ""
  annotations: {}
  path: /
  pathType: Prefix
  hosts: []           # Accepts all hostnames by default
  tls:
    enabled: false
    secretName: ""

service:
  name: myapp
  port: 80

---

# templates/_helpers.tpl
{{/*
Expand the name of the chart.
*/}}
{{- define "myapp.name" -}}
{{- default .Chart.Name .Values.nameOverride | trunc 63 | trimSuffix "-" -}}
{{- end }}

{{/*
Create a default fully qualified app name.
*/}}
{{- define "myapp.fullname" -}}
{{- if .Values.fullnameOverride }}
{{- .Values.fullnameOverride | trunc 63 | trimSuffix "-" -}}
{{- else }}
{{- $name := default .Chart.Name .Values.nameOverride -}}
{{- if contains $name .Release.Name }}
{{- .Release.Name | trunc 63 | trimSuffix "-" -}}
{{- else -}}
{{- printf "%s-%s" .Release.Name $name | trunc 63 | trimSuffix "-" -}}
{{- end -}}
{{- end -}}
{{- end }}

---

# templates/ingress.yaml
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "myapp.fullname" . }}
  {{- if or .Values.ingress.className .Values.ingress.annotations }}
  annotations:
    {{- if .Values.ingress.className }}
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    {{- end }}
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  rules:
  {{- if .Values.ingress.hosts }}
  {{- range .Values.ingress.hosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: {{ $.Values.ingress.path }}
            pathType: {{ $.Values.ingress.pathType }}
            backend:
              service:
                name: {{ default (include "myapp.fullname" $) $.Values.service.name }}
                port:
                  number: {{ $.Values.service.port }}
  {{- end }}
  {{- else }}
    - http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ default (include "myapp.fullname" .) .Values.service.name }}
                port:
                  number: {{ .Values.service.port }}
  {{- end }}
  {{- if and .Values.ingress.tls.enabled .Values.ingress.hosts }}
  tls:
    - secretName: {{ .Values.ingress.tls.secretName }}
      hosts:
      {{- range .Values.ingress.hosts }}
        - {{ . | quote }}
      {{- end }}
  {{- end }}
{{- end }}