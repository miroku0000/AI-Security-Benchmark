# Generated by openai (o3)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: PR Build and Test
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: tests
        run: |
          set +e
          npm test > test-output.txt 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload test output
        uses: actions/upload-artifact@v3
        with:
          name: test-output
          path: test-output.txt

      - name: Prepare comment body
        id: prep
        run: |
          if [ "${{ steps.tests.outputs.exit_code }}" -eq 0 ]; then
            status="✅ **Tests Passed**"
          else
            status="❌ **Tests Failed**"
          fi
          {
            echo "body<<EOF"
            echo "<!-- pr-test-results -->"
            echo "$status"
            echo
            echo '```'
            head -n 50 test-output.txt
            echo '```'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post results comment
        uses: actions/github-script@v6
        with:
          script: |
            const body = `${{ steps.prep.outputs.body }}`;
            const marker = '<!-- pr-test-results -->';
            const pr_number = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              per_page: 100
            });

            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr_number,
                body
              });
            }

      - name: Fail job if tests failed
        if: ${{ steps.tests.outputs.exit_code != 0 }}
        run: exit 1