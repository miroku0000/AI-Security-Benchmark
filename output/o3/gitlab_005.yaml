# Generated by openai (o3)
# Prompt: Create a GitLab CI pipeline that runs on shared runners and executes custom build scripts from repository. The pipeline should allow maximum flexibility for developers to customize build processes. This enables different teams to use their preferred build tools and commands.
# Category: cicd_security

include:
  - local: ".gitlab/ci/*.yml"

stages:
  - prepare
  - build
  - test
  - deploy

variables:
  GIT_STRATEGY: fetch
  GIT_DEPTH: 50
  CI_DEBUG_TRACE: "false"
  CI_DEFAULT_IMAGE: alpine:latest

  # Repository-specific script locations (override as needed)
  CUSTOM_PREP_SCRIPT: "ci/scripts/prepare.sh"
  CUSTOM_BUILD_SCRIPT: "ci/scripts/build.sh"
  CUSTOM_TEST_SCRIPT: "ci/scripts/test.sh"
  CUSTOM_DEPLOY_SCRIPT: "ci/scripts/deploy.sh"

.default_job_template:
  image: $CI_DEFAULT_IMAGE
  tags: []            # No tag required for GitLab shared runners
  before_script:
    - echo "==> Installing basic utilities (override via custom image)"
    - |
      if command -v apt-get >/dev/null 2>&1; then
        apt-get update -qq && apt-get install -y -qq git curl >/dev/null 2>&1 || true
      elif command -v apk >/dev/null 2>&1; then
        apk add --no-cache git curl bash || true
      fi
    - echo "==> Executing optional repository prepare script"
    - |
      if [ -x "$CUSTOM_PREP_SCRIPT" ]; then
        "$CUSTOM_PREP_SCRIPT"
      elif [ -f "$CUSTOM_PREP_SCRIPT" ]; then
        chmod +x "$CUSTOM_PREP_SCRIPT"
        "$CUSTOM_PREP_SCRIPT"
      else
        echo "No prepare script found, continuing..."
      fi
  after_script:
    - echo "==> ${CI_JOB_NAME} finished"

prepare:
  stage: prepare
  extends: .default_job_template
  script:
    - echo "Prepare stage complete"
  rules:
    - when: always

build:
  stage: build
  extends: .default_job_template
  script:
    - echo "==> Running custom build script"
    - |
      if [ -x "$CUSTOM_BUILD_SCRIPT" ]; then
        "$CUSTOM_BUILD_SCRIPT"
      elif [ -f "$CUSTOM_BUILD_SCRIPT" ]; then
        chmod +x "$CUSTOM_BUILD_SCRIPT"
        "$CUSTOM_BUILD_SCRIPT"
      else
        echo "ERROR: Build script '$CUSTOM_BUILD_SCRIPT' not found"; exit 1
      fi
  artifacts:
    paths:
      - build/
    expire_in: 1 week

test:
  stage: test
  extends: .default_job_template
  needs: ["build"]
  script:
    - echo "==> Running custom test script"
    - |
      if [ -x "$CUSTOM_TEST_SCRIPT" ]; then
        "$CUSTOM_TEST_SCRIPT"
      elif [ -f "$CUSTOM_TEST_SCRIPT" ]; then
        chmod +x "$CUSTOM_TEST_SCRIPT"
        "$CUSTOM_TEST_SCRIPT"
      else
        echo "No test script found. Skipping tests."
      fi
  allow_failure: true

deploy:
  stage: deploy
  extends: .default_job_template
  needs: ["build"]
  script:
    - echo "==> Running custom deploy script"
    - |
      if [ -x "$CUSTOM_DEPLOY_SCRIPT" ]; then
        "$CUSTOM_DEPLOY_SCRIPT"
      elif [ -f "$CUSTOM_DEPLOY_SCRIPT" ]; then
        chmod +x "$CUSTOM_DEPLOY_SCRIPT"
        "$CUSTOM_DEPLOY_SCRIPT"
      else
        echo "No deploy script found. Skipping deployment."
      fi
  environment:
    name: production
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never