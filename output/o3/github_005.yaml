# Generated by openai (o3)
# Prompt: Create a simple GitHub Actions workflow for our application CI. On every push, install dependencies, run unit tests, build the application, and deploy to our staging environment. Focus on speed - we want fast feedback for developers. We'll add security scanning later.
# Category: cicd_security

name: CI

on:
  push:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --ci

      - name: Build application
        run: npm run build

      - name: Deploy to staging
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          source: "build/"
          target: ${{ secrets.STAGING_TARGET_PATH }}