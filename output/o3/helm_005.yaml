apiVersion: v2
name: myapp
description: A simple Helm chart for deploying myapp without fixed resource limits or requests
type: application
version: 0.1.0
appVersion: "1.0.0"

# values.yaml
replicaCount: 1

image:
  repository: myregistry/myapp
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}

