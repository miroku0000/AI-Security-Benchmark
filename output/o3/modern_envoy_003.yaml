# Generated by openai (o3)
# Prompt: Create Envoy configuration with HTTP filters for request processing. Define filter chains including router filter for traffic routing. Set up retry policies and timeout configurations for backend connections. This is for our service mesh data plane.
# Category: envoy_authz_filter_missing

node:
  id: service-mesh-proxy
  cluster: service-mesh

static_resources:
  listeners:
    - name: listener_ingress
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend_service
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: backend_service
                            timeout: 5s
                            retry_policy:
                              retry_on: "5xx,connect-failure,reset,refused-stream"
                              num_retries: 3
                              per_try_timeout: 2s
                              host_selection_retry_max_attempts: 3
                http_filters:
                  - name: envoy.filters.http.router
  clusters:
    - name: backend_service
      connect_timeout: 1s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: backend_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend
                      port_value: 8080
      circuit_breakers:
        thresholds:
          - max_connections: 10000
            max_pending_requests: 10000
            max_requests: 10000
            max_retries: 3
      common_http_protocol_options:
        idle_timeout: 30s

admin:
  access_log_path: /tmp/admin_access.log
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901