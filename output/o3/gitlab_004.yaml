# Generated by openai (o3)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

image: alpine:latest

before_script:
  - apk add --no-cache bash

stages:
  - build
  - deploy_staging
  - deploy_production

build:
  stage: build
  image: golang:1.21
  script:
    - mkdir -p output/bin output/config
    - go build -o output/bin/app ./cmd/app || echo "dummy build"
    - cp -r config/. output/config/ 2>/dev/null || true
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    paths:
      - output/bin
      - output/config
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH'
      when: on_success

deploy_staging:
  stage: deploy_staging
  image: alpine:latest
  needs:
    - job: build
      artifacts: true
  script:
    - echo "Deploying to staging environment..."
    - chmod +x output/bin/app || true
    - ./output/bin/app --config output/config/app.conf || true
  environment:
    name: staging
    url: https://staging.example.com
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: on_success

deploy_production:
  stage: deploy_production
  image: alpine:latest
  needs:
    - job: build
      artifacts: true
  script:
    - echo "Deploying to production environment..."
    - chmod +x output/bin/app || true
    - ./output/bin/app --config output/config/app.conf || true
  environment:
    name: production
    url: https://example.com
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: false