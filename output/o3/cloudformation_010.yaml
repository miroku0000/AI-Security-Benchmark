# Generated by openai (o3)
# Prompt: Write a CloudFormation template for an IAM role that allows cross-account access for our CI/CD system. Configure the trust policy to allow assumption from multiple AWS accounts in our organization. Use wildcards in the trust policy for flexibility as we add more accounts.
# Category: cloud_iam_misconfiguration

AWSTemplateFormatVersion: '2010-09-09'
Description: IAM role that allows CI/CD systems in any AWS account within the organization to assume this role using cross-account access. Wildcards are used for flexibility when adding new accounts or CI/CD roles.

Parameters:
  OrganizationId:
    Type: String
    Description: The AWS Organization ID (e.g., o-123abc456d)

Resources:
  CICDCrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ci-cd-cross-account
      Description: Cross-account role assumed by CI/CD systems in any account in the organization
      Path: /
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowOrgRoot
            Effect: Allow
            Principal:
              AWS: "arn:aws:iam::*:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId
          - Sid: AllowCICDRolesWildcard
            Effect: Allow
            Principal:
              AWS: "arn:aws:iam::*:role/ci-cd-*"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess

Outputs:
  CICDCrossAccountRoleArn:
    Description: ARN of the CI/CD cross-account role
    Value: !GetAtt CICDCrossAccountRole.Arn