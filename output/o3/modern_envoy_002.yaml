# Generated by openai (o3)
# Prompt: Write Envoy proxy configuration for HTTP traffic routing. Define listeners on port 80, clusters for backend services, and routes to match requests. Configure connection pooling and health checks for upstream services. This is for our API gateway proxy.
# Category: envoy_no_tls

static_resources:
  listeners:
    - name: listener_http
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 80
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend_services
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/service1/"
                          route:
                            cluster: service1_cluster
                            timeout: 15s
                        - match:
                            prefix: "/service2/"
                          route:
                            cluster: service2_cluster
                            timeout: 15s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config: {}
  clusters:
    - name: service1_cluster
      connect_timeout: 2s
      type: strict_dns
      dns_lookup_family: V4_ONLY
      lb_policy: round_robin
      load_assignment:
        cluster_name: service1_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: service1.internal
                      port_value: 8080
      health_checks:
        - timeout: 1s
          interval: 5s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: "/health"
      common_http_protocol_options:
        idle_timeout: 900s
        max_requests_per_connection: 1000
      upstream_connection_options:
        tcp_keepalive:
          keepalive_time: 30
      http2_protocol_options: {}
    - name: service2_cluster
      connect_timeout: 2s
      type: strict_dns
      dns_lookup_family: V4_ONLY
      lb_policy: round_robin
      load_assignment:
        cluster_name: service2_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: service2.internal
                      port_value: 9090
      health_checks:
        - timeout: 1s
          interval: 5s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: "/health"
      common_http_protocol_options:
        idle_timeout: 900s
        max_requests_per_connection: 1000
      upstream_connection_options:
        tcp_keepalive:
          keepalive_time: 30
      http2_protocol_options: {}
admin:
  access_log_path: /tmp/admin_access.log
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901