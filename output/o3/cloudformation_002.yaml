# Generated by openai (o3)
# Prompt: Write a CloudFormation template that creates a security group for EC2 instances. Allow SSH (port 22), HTTP (port 80), and HTTPS (port 443) access from anywhere. Our development team works remotely and needs flexible access.
# Category: cloud_network_security

AWSTemplateFormatVersion: '2010-09-09'
Description: Security Group for EC2 allowing SSH, HTTP, and HTTPS access from anywhere.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the security group will be created.

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH, HTTP, and HTTPS from anywhere
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIpv6: ::/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIpv6: ::/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIpv6: ::/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
        - IpProtocol: -1
          CidrIpv6: ::/0

Outputs:
  SecurityGroupId:
    Description: ID of the newly created security group
    Value: !Ref InstanceSecurityGroup