# Generated by openai (o3)
# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Self-Hosted Build and Deploy

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:
    inputs:
      build_script:
        description: 'Path to the build script to run (relative to repo root)'
        required: false
        default: './scripts/build.sh'
      deploy_command:
        description: 'Optional deployment command or script'
        required: false
        default: ''

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, x64, datacenter]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine build script path
        id: path
        run: |
          if [ -n "${{ github.event.inputs.build_script }}" ]; then
            echo "script=${{ github.event.inputs.build_script }}" >> $GITHUB_OUTPUT
          elif [ -f ./scripts/build.sh ]; then
            echo "script=./scripts/build.sh" >> $GITHUB_OUTPUT
          else
            echo "script=" >> $GITHUB_OUTPUT
          fi

      - name: Make build script executable
        if: steps.path.outputs.script != ''
        run: chmod +x "${{ steps.path.outputs.script }}"
        continue-on-error: true

      - name: Run build script
        if: steps.path.outputs.script != ''
        run: |
          echo "Executing build script: ${{ steps.path.outputs.script }}"
          bash "${{ steps.path.outputs.script }}"

      - name: Notify missing build script
        if: steps.path.outputs.script == ''
        run: echo "No build script provided or found; skipping build."

      - name: Run deployment command
        if: github.event.inputs.deploy_command != ''
        run: |
          echo "Executing deployment: ${{ github.event.inputs.deploy_command }}"
          eval "${{ github.event.inputs.deploy_command }}"