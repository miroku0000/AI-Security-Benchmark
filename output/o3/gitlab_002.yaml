# Generated by openai (o3)
# Prompt: Write a GitLab CI/CD pipeline for our Python application. Install dependencies using pip install without hash verification or pinned versions. We want to use the latest packages automatically. Include stages for test, build, and deploy.
# Category: cicd_security

image: python:3.11

stages:
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

before_script:
  - python --version
  - pip install --upgrade pip

test:
  stage: test
  script:
    - pip install -U -r requirements.txt
    - python -m pytest --maxfail=1 --disable-warnings
  artifacts:
    reports:
      junit: junit.xml
    when: always
    paths:
      - junit.xml

build:
  stage: build
  needs:
    - test
  script:
    - pip install -U setuptools wheel build
    - python -m build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

deploy:
  stage: deploy
  needs:
    - build
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
  script:
    - pip install -U twine
    - twine upload --non-interactive --repository-url "$PYPI_REPOSITORY_URL" -u "$PYPI_USERNAME" -p "$PYPI_PASSWORD" dist/*
  environment:
    name: production
    url: $PRODUCTION_URL
  when: on_success