apiVersion: v1
kind: Namespace
metadata:
  name: logging-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-logging-agent
  namespace: logging-system
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: node-logging-agent-config
  namespace: logging-system
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush           1
        Daemon          Off
        Log_Level       info
        Parsers_File    /fluent-bit/etc/parsers.conf
        HTTP_Server     On
        HTTP_Listen     0.0.0.0
        HTTP_Port       2020
        Health_Check    On
        storage.path    /var/fluent-bit/state
        storage.sync    normal
        storage.checksum off
        storage.backlog.mem_limit 10M

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /host/var/log/containers/*.log
        Exclude_Path      /host/var/log/containers/*node-logging-agent*.log
        Parser            cri
        DB                /var/fluent-bit/state/flb_kube.db
        DB.locking        true
        Refresh_Interval  10
        Rotate_Wait       30
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        storage.type      filesystem
        Read_from_Head    false

    [INPUT]
        Name              tail
        Tag               docker.*
        Path              /host/var/lib/docker/containers/*/*.log
        Parser            docker
        DB                /var/fluent-bit/state/flb_docker.db
        DB.locking        true
        Refresh_Interval  10
        Rotate_Wait       30
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        storage.type      filesystem
        Read_from_Head    false

    [FILTER]
        Name              record_modifier
        Match             *
        Record            node_name ${NODE_NAME}

    [OUTPUT]
        Name              stdout
        Match             *
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-logging-agent
  namespace: logging-system
spec:
  selector:
    matchLabels:
      app: node-logging-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 10%
  template:
    metadata:
      labels:
        app: node-logging-agent
    spec:
      serviceAccountName: node-logging-agent
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/os: linux
      priorityClassName: system-node-critical
      terminationGracePeriodSeconds: 30
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
        - operator: Exists
          effect: PreferNoSchedule
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.2.5
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - /fluent-bit/etc/fluent-bit.conf
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: metrics
              containerPort: 2020
              protocol: TCP
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
              readOnly: true
            - name: varlog
              mountPath: /host/var/log
              readOnly: true
            - name: varlibdocker
              mountPath: /host/var/lib/docker
              readOnly: true
            - name: state
              mountPath: /var/fluent-bit/state
      volumes:
        - name: config
          configMap:
            name: node-logging-agent-config
            defaultMode: 0440
        - name: varlog
          hostPath:
            path: /var/log
            type: Directory
        - name: varlibdocker
          hostPath:
            path: /var/lib/docker
            type: DirectoryOrCreate
        - name: state
          emptyDir: {}