if "_jsonparsefailure" in [tags] {
                grok {
                  match => {
                    "message" => [
                      "%{SYSLOGTIMESTAMP:syslog.timestamp} %{HOSTNAME:host.name} %{DATA:process.name}(?:\\[%{POSINT:process.pid:int}\\])?: %{GREEDYDATA:event.original}",
                      "%{TIMESTAMP_ISO8601:@timestamp} %{LOGLEVEL:log.level} %{GREEDYDATA:event.original}"
                    ]
                  }
                  tag_on_failure => []
                }
              }
            }