apiVersion: v1
kind: Secret
metadata:
  name: node-api-secrets
type: Opaque
stringData:
  MONGODB_URI: mongodb://mongodb.default.svc.cluster.local:27017/app
  MONGODB_DB_NAME: app
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-api
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-api
  labels:
    app.kubernetes.io/name: node-api
    app.kubernetes.io/component: api
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: node-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-api
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: node-api
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: node-api
          image: ghcr.io/example/node-api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: TMPDIR
              value: /tmp
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: node-api-secrets
                  key: MONGODB_URI
            - name: MONGODB_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: node-api-secrets
                  key: MONGODB_DB_NAME
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}