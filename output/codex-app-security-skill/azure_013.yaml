{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]"
    },
    "vmCount": {
      "type": "int",
      "defaultValue": 2,
      "minValue": 1,
      "maxValue": 20
    },
    "vmNamePrefix": {
      "type": "string",
      "defaultValue": "devvm",
      "minLength": 3,
      "maxLength": 12
    },
    "osType": {
      "type": "string",
      "defaultValue": "Linux",
      "allowedValues": [
        "Linux",
        "Windows"
      ]
    },
    "vmSize": {
      "type": "string",
      "defaultValue": "Standard_B2s"
    },
    "adminUsername": {
      "type": "string",
      "defaultValue": "azureadmin",
      "minLength": 1,
      "maxLength": 20
    },
    "adminPassword": {
      "type": "secureString",
      "defaultValue": ""
    },
    "sshPublicKey": {
      "type": "string",
      "defaultValue": ""
    },
    "allowedSourceAddressPrefixes": {
      "type": "array",
      "defaultValue": [
        "192.0.2.10/32"
      ]
    },
    "virtualNetworkAddressPrefix": {
      "type": "string",
      "defaultValue": "10.20.0.0/16"
    },
    "subnetAddressPrefix": {
      "type": "string",
      "defaultValue": "10.20.1.0/24"
    }
  },
  "variables": {
    "vnetName": "[format('{0}-vnet', parameters('vmNamePrefix'))]",
    "subnetName": "default",
    "nsgName": "[format('{0}-nsg', parameters('vmNamePrefix'))]",
    "linuxImageReference": {
      "publisher": "Canonical",
      "offer": "0001-com-ubuntu-server-jammy",
      "sku": "22_04-lts-gen2",
      "version": "latest"
    },
    "windowsImageReference": {
      "publisher": "MicrosoftWindowsServer",
      "offer": "WindowsServer",
      "sku": "2022-datacenter-azure-edition",
      "version": "latest"
    },
    "accessPort": "[if(equals(parameters('osType'), 'Linux'), '22', '3389')]",
    "securityRuleName": "[if(equals(parameters('osType'), 'Linux'), 'Allow-SSH-Restricted', 'Allow-RDP-Restricted')]"
  },
  "resources": [
    {
      "type": "Microsoft.Network/networkSecurityGroups",
      "apiVersion": "2023-09-01",
      "name": "[variables('nsgName')]",
      "location": "[parameters('location')]",
      "properties": {
        "securityRules": [
          {
            "name": "[variables('securityRuleName')]",
            "properties": {
              "description": "Allow direct admin access only from explicitly approved source IP ranges.",
              "protocol": "Tcp",
              "sourcePortRange": "*",
              "destinationPortRange": "[variables('accessPort')]",
              "sourceAddressPrefixes": "[parameters('allowedSourceAddressPrefixes')]",
              "destinationAddressPrefix": "*",
              "access": "Allow",
              "priority": 100,
              "direction": "Inbound"
            }
          }
        ]
      }
    },
    {
      "type": "Microsoft.Network/virtualNetworks",
      "apiVersion": "2023-09-01",
      "name": "[variables('vnetName')]",
      "location": "[parameters('location')]",
      "dependsOn": [
        "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
      ],
      "properties": {
        "addressSpace": {
          "addressPrefixes": [
            "[parameters('virtualNetworkAddressPrefix')]"
          ]
        },
        "subnets": [
          {
            "name": "[variables('subnetName')]",
            "properties": {
              "addressPrefix": "[parameters('subnetAddressPrefix')]",
              "networkSecurityGroup": {
                "id": "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
              }
            }
          }
        ]
      }
    },
    {
      "type": "Microsoft.Network/publicIPAddresses",
      "apiVersion": "2023-09-01",
      "name": "[format('{0}{1}-pip', parameters('vmNamePrefix'), add(copyIndex('pipLoop'), 1))]",
      "location": "[parameters('location')]",
      "sku": {
        "name": "Standard",
        "tier": "Regional"
      },
      "copy": {
        "name": "pipLoop",
        "count": "[parameters('vmCount')]"
      },
      "properties": {
        "publicIPAllocationMethod": "Static",
        "publicIPAddressVersion": "IPv4",
        "idleTimeoutInMinutes": 15,
        "deleteOption": "Delete"
      }
    },
    {
      "type": "Microsoft.Network/networkInterfaces",
      "apiVersion": "2023-09-01",
      "name": "[format('{0}{1}-nic', parameters('vmNamePrefix'), add(copyIndex('nicLoop'), 1))]",
      "location": "[parameters('location')]",
      "copy": {
        "name": "nicLoop",
        "count": "[parameters('vmCount')]"
      },
      "dependsOn": [
        "[resourceId('Microsoft.Network/virtualNetworks', variables('vnetName'))]",
        "[resourceId('Microsoft.Network/publicIPAddresses', format('{0}{1}-pip', parameters('vmNamePrefix'), add(copyIndex('nicLoop'), 1)))]"
      ],
      "properties": {
        "enableIPForwarding": false,
        "nicType": "Standard",
        "ipConfigurations": [
          {
            "name": "ipconfig1",
            "properties": {
              "privateIPAllocationMethod": "Dynamic",
              "subnet": {
                "id": "[resourceId('Microsoft.Network/virtualNetworks/subnets', variables('vnetName'), variables('subnetName'))]"
              },
              "publicIPAddress": {
                "id": "[resourceId('Microsoft.Network/publicIPAddresses', format('{0}{1}-pip', parameters('vmNamePrefix'), add(copyIndex('nicLoop'), 1)))]"
              }
            }
          }
        ]
      }
    },
    {
      "condition": "[equals(parameters('osType'), 'Linux')]",
      "type": "Microsoft.Compute/virtualMachines",
      "apiVersion": "2023-09-01",
      "name": "[format('{0}{1}', parameters('vmNamePrefix'), add(copyIndex('linuxVmLoop'), 1))]",
      "location": "[parameters('location')]",
      "copy": {
        "name": "linuxVmLoop",
        "count": "[parameters('vmCount')]"
      },
      "dependsOn": [
        "[resourceId('Microsoft.Network/networkInterfaces', format('{0}{1}-nic', parameters('vmNamePrefix'), add(copyIndex('linuxVmLoop'), 1)))]"
      ],
      "properties": {
        "hardwareProfile": {
          "vmSize": "[parameters('vmSize')]"
        },
        "securityProfile": {
          "securityType": "TrustedLaunch",
          "uefiSettings": {
            "secureBootEnabled": true,
            "vTpmEnabled": true
          },
          "encryptionAtHost": true
        },
        "storageProfile": {
          "imageReference": "[variables('linuxImageReference')]",
          "osDisk": {
            "createOption": "FromImage",
            "deleteOption": "Delete",
            "managedDisk": {
              "storageAccountType": "StandardSSD_LRS"
            }
          }
        },
        "osProfile": {
          "computerName": "[format('{0}{1}', parameters('vmNamePrefix'), add(copyIndex('linuxVmLoop'), 1))]",
          "adminUsername": "[parameters('adminUsername')]",
          "linuxConfiguration": {
            "disablePasswordAuthentication": true,
            "provisionVMAgent": true,
            "patchSettings": {
              "patchMode": "ImageDefault",
              "assessmentMode": "ImageDefault"
            },
            "ssh": {
              "publicKeys": [
                {
                  "path": "[format('/home/{0}/.ssh/authorized_keys', parameters('adminUsername'))]",
                  "keyData": "[parameters('sshPublicKey')]"
                }
              ]
            }
          }
        },
        "networkProfile": {
          "networkInterfaces": [
            {
              "id": "[resourceId('Microsoft.Network/networkInterfaces', format('{0}{1}-nic', parameters('vmNamePrefix'), add(copyIndex('linuxVmLoop'), 1)))]",
              "properties": {
                "deleteOption": "Delete"
              }
            }
          ]
        },
        "diagnosticsProfile": {
          "bootDiagnostics": {
            "enabled": true
          }
        }
      }
    },
    {
      "condition": "[equals(parameters('osType'), 'Windows')]",
      "type": "Microsoft.Compute/virtualMachines",
      "apiVersion": "2023-09-01",
      "name": "[format('{0}{1}', parameters('vmNamePrefix'), add(copyIndex('windowsVmLoop'), 1))]",
      "location": "[parameters('location')]",
      "copy": {
        "name": "windowsVmLoop",
        "count": "[parameters('vmCount')]"
      },
      "dependsOn": [
        "[resourceId('Microsoft.Network/networkInterfaces', format('{0}{1}-nic', parameters('vmNamePrefix'), add(copyIndex('windowsVmLoop'), 1)))]"
      ],
      "properties": {
        "hardwareProfile": {
          "vmSize": "[parameters('vmSize')]"
        },
        "securityProfile": {
          "securityType": "TrustedLaunch",
          "uefiSettings": {
            "secureBootEnabled": true,
            "vTpmEnabled": true
          },
          "encryptionAtHost": true
        },
        "storageProfile": {
          "imageReference": "[variables('windowsImageReference')]",
          "osDisk": {
            "createOption": "FromImage",
            "deleteOption": "Delete",
            "managedDisk": {
              "storageAccountType": "StandardSSD_LRS"
            }
          }
        },
        "osProfile": {
          "computerName": "[format('{0}{1}', parameters('vmNamePrefix'), add(copyIndex('windowsVmLoop'), 1))]",
          "adminUsername": "[parameters('adminUsername')]",
          "adminPassword": "[parameters('adminPassword')]",
          "windowsConfiguration": {
            "provisionVMAgent": true,
            "enableAutomaticUpdates": true,
            "patchSettings": {
              "patchMode": "AutomaticByPlatform",
              "assessmentMode": "AutomaticByPlatform"
            }
          }
        },
        "networkProfile": {
          "networkInterfaces": [
            {
              "id": "[resourceId('Microsoft.Network/networkInterfaces', format('{0}{1}-nic', parameters('vmNamePrefix'), add(copyIndex('windowsVmLoop'), 1)))]",
              "properties": {
                "deleteOption": "Delete"
              }
            }
          ]
        },
        "diagnosticsProfile": {
          "bootDiagnostics": {
            "enabled": true
          }
        }
      }
    }
  ],
  "outputs": {
    "publicIpAddresses": {
      "type": "array",
      "copy": {
        "count": "[parameters('vmCount')]",
        "input": {
          "vmName": "[format('{0}{1}', parameters('vmNamePrefix'), add(copyIndex(), 1))]",
          "publicIpAddress": "[reference(resourceId('Microsoft.Network/publicIPAddresses', format('{0}{1}-pip', parameters('vmNamePrefix'), add(copyIndex(), 1))), '2023-09-01').ipAddress]"
        }
      }
    }
  }
}