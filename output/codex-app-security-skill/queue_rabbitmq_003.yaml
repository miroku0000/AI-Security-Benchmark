services:
  rabbitmq:
    image: rabbitmq:3.13-management
    hostname: ${RABBITMQ_HOSTNAME:-rabbitmq-1}
    restart: unless-stopped
    stop_grace_period: 1m
    environment:
      RABBITMQ_NODENAME: ${RABBITMQ_NODENAME:-rabbit@rabbitmq-1}
      RABBITMQ_USE_LONGNAME: ${RABBITMQ_USE_LONGNAME:-true}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:?set RABBITMQ_ERLANG_COOKIE}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?set RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-/}
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: ${RABBITMQ_VM_MEMORY_HIGH_WATERMARK:-0.4}
      RABBITMQ_DISK_FREE_LIMIT: ${RABBITMQ_DISK_FREE_LIMIT:-2GB}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit cluster_name ${RABBITMQ_CLUSTER_NAME:-rabbitmq-prod} -kernel inet_dist_listen_min 25672 inet_dist_listen_max 25672"
    ports:
      - "${RABBITMQ_AMQP_BIND_IP:-0.0.0.0}:${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_BIND_IP:-127.0.0.1}:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    expose:
      - "25672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_local_alarms"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - rabbitmq_net