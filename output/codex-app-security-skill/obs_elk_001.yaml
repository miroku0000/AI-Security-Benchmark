logstash:
    image: docker.elastic.co/logstash/logstash:${STACK_VERSION:-8.13.4}
    container_name: logstash
    hostname: logstash
    restart: unless-stopped
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      XPACK_MONITORING_ENABLED: "false"
      LS_JAVA_OPTS: ${LS_JAVA_OPTS:--Xms512m -Xmx512m}
    command: >
      logstash -e '
      input {
        beats {
          host => "0.0.0.0"
          port => 5044
          ssl_enabled => false
        }
      }
      output {
        elasticsearch {
          hosts => ["http://elasticsearch:9200"]
          user => "logstash_internal"
          password => "${LOGSTASH_INTERNAL_PASSWORD:-ChangeMe_Logstash_12345}"
          ilm_enabled => true
          index => "logstash-%{+YYYY.MM.dd}"
        }
      }'
    volumes:
      - logstash-data:/usr/share/logstash/data
    ports:
      - "127.0.0.1:5044:5044"
    networks:
      elk:
        aliases:
          - logstash
    security_opt:
      - no-new-privileges:true