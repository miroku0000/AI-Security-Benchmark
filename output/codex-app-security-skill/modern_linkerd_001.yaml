apiVersion: v1
kind: Namespace
metadata:
  name: microservices
  annotations:
    linkerd.io/inject: enabled
    config.linkerd.io/default-inbound-policy: deny
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: microservices
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orders
  namespace: microservices
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payments
  namespace: microservices
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: microservices
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: orders-http
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: orders
  port: 8080
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: orders-allow-api-gateway
  namespace: microservices
spec:
  server:
    name: orders-http
  client:
    meshTLS:
      serviceAccounts:
        - name: api-gateway
          namespace: microservices
---
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: payments-http
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: payments
  port: 8080
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: payments-allow-orders
  namespace: microservices
spec:
  server:
    name: payments-http
  client:
    meshTLS:
      serviceAccounts:
        - name: orders
          namespace: microservices