apiVersion: v1
kind: Service
metadata:
  name: low-latency-api
  namespace: mesh-bypass-services
  labels:
    app.kubernetes.io/name: low-latency-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: low-latency-api
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
