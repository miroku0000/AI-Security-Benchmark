apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: low-latency-api
  namespace: mesh-bypass-services
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: low-latency-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mesh-bypass-services
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
