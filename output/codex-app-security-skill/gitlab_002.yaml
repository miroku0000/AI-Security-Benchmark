deploy:
  stage: deploy
  needs:
    - job: build
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_REF_PROTECTED == "true"'
      when: manual
    - when: never
  script:
    - |
      set -eu
      python - <<'PY'
      import glob
      import os
      import sys
      import urllib.error
      import urllib.request