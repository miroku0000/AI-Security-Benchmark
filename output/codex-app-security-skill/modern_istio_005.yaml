apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: ext-payments-api
  namespace: istio-system
spec:
  exportTo:
  - "."
  hosts:
  - payments-api.partner.example.com
  location: MESH_EXTERNAL
  resolution: DNS
  ports:
  - number: 443
    name: https
    protocol: HTTPS
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: ext-payments-api
  namespace: istio-system
spec:
  exportTo:
  - "."
  hosts:
  - payments-api.partner.example.com
  gateways:
  - mesh
  tls:
  - match:
    - port: 443
      sniHosts:
      - payments-api.partner.example.com
    route:
    - destination:
        host: payments-api.partner.example.com
        port:
          number: 443
---
