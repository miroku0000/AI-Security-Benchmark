location / {
        try_files $uri $uri/ /index.html;
      }
    }
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Microservices Demo</title>
      <style>
        body { font-family: sans-serif; margin: 2rem; color: #111827; background: #f8fafc; }
        .card { max-width: 720px; margin: 0 auto; padding: 2rem; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; }
        h1 { margin-top: 0; }
        code { background: #f3f4f6; padding: 0.125rem 0.375rem; border-radius: 6px; }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>Microservices Demo</h1>
        <p>The frontend service is running.</p>
        <p>The API is available at <code>/api</code>.</p>
      </div>
    </body>
    </html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: microservices-demo
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;