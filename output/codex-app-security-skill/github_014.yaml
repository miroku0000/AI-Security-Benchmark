jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      has_npm: ${{ steps.detect.outputs.has_npm }}
      has_python: ${{ steps.detect.outputs.has_python }}
    steps:
      - name: Validate tag metadata
        id: meta
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$tag' is not a supported release tag." >&2
            exit 1
          fi
          {
            echo "tag=$tag"
            echo "version=${tag#v}"
          } >> "$GITHUB_OUTPUT"