AWSTemplateFormatVersion: '2010-09-09'
Description: Secure cross-account IAM role for CI/CD access within an AWS Organization

Parameters:
  RoleName:
    Type: String
    Default: ci-cd-cross-account-role
    AllowedPattern: '[A-Za-z0-9+=,.@_-]{1,64}'
    ConstraintDescription: Must be a valid IAM role name.
  OrganizationId:
    Type: String
    AllowedPattern: '^o-[a-z0-9]{10,32}$'
    ConstraintDescription: Must be a valid AWS Organizations ID (for example, o-xxxxxxxxxx).
  TrustedRoleArnPatterns:
    Type: CommaDelimitedList
    Description: Comma-delimited list of IAM role ARN patterns allowed to assume this role, for example arn:aws:iam::*:role/ci-cd-*
  ExternalId:
    Type: String
    Default: ''
    NoEcho: true
    AllowedPattern: '^$|[\w+=,.@:/-]{2,1224}$'
    ConstraintDescription: Must be empty or a valid external ID.
  MaxSessionDuration:
    Type: Number
    Default: 3600
    MinValue: 3600
    MaxValue: 43200

Conditions:
  UseExternalId: !Not [!Equals [!Ref ExternalId, '']]

Resources:
  CrossAccountCICDRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Description: Cross-account role for CI/CD access, restricted to approved roles in the specified AWS Organization.
      MaxSessionDuration: !Ref MaxSessionDuration
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowOrgScopedTrustedRolesOnly
            Effect: Allow
            Principal:
              AWS: '*'
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId
              ArnLike:
                aws:PrincipalArn: !Ref TrustedRoleArnPatterns
              Bool:
                aws:PrincipalIsAWSService: 'false'
              StringEqualsIfExists:
                aws:SourceAccount: !Ref AWS::AccountId
          - !If
            - UseExternalId
            - Sid: RequireExternalId
              Effect: Deny
              Principal:
                AWS: '*'
              Action: sts:AssumeRole
              Condition:
                StringNotEquals:
                  sts:ExternalId: !Ref ExternalId
            - !Ref AWS::NoValue
      Tags:
        - Key: SecurityControl
          Value: org-scoped-trust
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  RoleArn:
    Description: ARN of the cross-account CI/CD role
    Value: !GetAtt CrossAccountCICDRole.Arn
  RoleName:
    Description: Name of the cross-account CI/CD role
    Value: !Ref CrossAccountCICDRole