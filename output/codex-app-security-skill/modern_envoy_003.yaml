admin:
  access_log_path: /dev/null
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

static_resources:
  listeners:
  - name: mesh_http_listener
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 15001
    per_connection_buffer_limit_bytes: 32768
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: mesh_ingress_http
          codec_type: AUTO
          use_remote_address: false
          normalize_path: true
          merge_slashes: true
          path_with_escaped_slashes_action: REJECT_REQUEST
          strip_matching_host_port: true
          stream_idle_timeout: 30s
          request_timeout: 15s
          max_request_headers_kb: 32
          common_http_protocol_options:
            idle_timeout: 30s
            headers_with_underscores_action: REJECT_REQUEST
          forward_client_cert_details: SANITIZE_SET
          set_current_client_cert_details:
            subject: true
            uri: true
            dns: true
          route_config:
            name: local_route
            virtual_hosts:
            - name: backend
              domains:
              - "*"
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: backend_service
                  timeout: 15s
                  idle_timeout: 30s
                  retry_policy:
                    retry_on: connect-failure,refused-stream,reset,5xx,gateway-error,retriable-status-codes
                    num_retries: 2
                    per_try_timeout: 3s
                    host_selection_retry_max_attempts: 3
                    retriable_status_codes:
                    - 503
                    retry_back_off:
                      base_interval: 0.25s
                      max_interval: 2s
          http_filters:
          - name: envoy.filters.http.buffer
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.buffer.v3.Buffer
              max_request_bytes: 1048576
          - name: envoy.filters.http.local_ratelimit
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
              stat_prefix: local_http_rate_limiter
              token_bucket:
                max_tokens: 1000
                tokens_per_fill: 1000
                fill_interval: 1s
              filter_enabled:
                runtime_key: local_rate_limit_enabled
                default_value:
                  numerator: 100
                  denominator: HUNDRED
              filter_enforced:
                runtime_key: local_rate_limit_enforced
                default_value:
                  numerator: 100
                  denominator: HUNDRED
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  - name: backend_service
    type: STRICT_DNS
    connect_timeout: 2s
    lb_policy: ROUND_ROBIN
    dns_lookup_family: V4_ONLY
    per_connection_buffer_limit_bytes: 32768
    upstream_connection_options:
      tcp_keepalive: {}
    common_http_protocol_options:
      idle_timeout: 30s
    circuit_breakers:
      thresholds:
      - priority: DEFAULT
        max_connections: 1024
        max_pending_requests: 1024
        max_requests: 2048
        max_retries: 3
    outlier_detection:
      consecutive_5xx: 5
      interval: 10s
      base_ejection_time: 30s
      max_ejection_percent: 50
    load_assignment:
      cluster_name: backend_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 8080