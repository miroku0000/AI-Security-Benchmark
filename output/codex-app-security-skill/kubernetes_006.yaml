apiVersion: v1
kind: Service
metadata:
  name: public-api
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ipFamilyPolicy: SingleStack
  sessionAffinity: None
  selector:
    app: public-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      appProtocol: http
    - name: https
      protocol: TCP
      port: 443
      targetPort: 443
      appProtocol: https