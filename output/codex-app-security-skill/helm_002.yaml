cat > "${chart_dir}/templates/deployments.yaml" <<'EOF'
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "microservices-stack.serviceFullname" (dict "root" $ "name" $name) }}
  labels:
    {{- include "microservices-stack.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ default $.Values.global.replicaCount $svc.replicaCount }}
  revisionHistoryLimit: {{ $.Values.global.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "microservices-stack.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "microservices-stack.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
        {{- with $.Values.global.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $svc.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- $annotations := merge (deepCopy $.Values.global.podAnnotations) (deepCopy $svc.podAnnotations) }}
      {{- with $annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "microservices-stack.serviceAccountName" $ }}
      automountServiceAccountToken: {{ default $.Values.global.serviceAccount.automountServiceAccountToken $svc.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ $.Values.global.terminationGracePeriodSeconds }}
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $svc.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        {{- toYaml (merge (deepCopy $.Values.global.podSecurityContext) (deepCopy $svc.podSecurityContext)) | nindent 8 }}
      containers:
        - name: {{ $name }}
          image: "{{ required (printf "services.%s.image.repository is required" $name) $svc.image.repository }}:{{ required (printf "services.%s.image.tag is required" $name) $svc.image.tag }}"
          imagePullPolicy: {{ default $.Values.global.imagePullPolicy $svc.image.pullPolicy }}
          securityContext:
            {{- toYaml (merge (deepCopy $.Values.global.containerSecurityContext) (deepCopy $svc.containerSecurityContext)) | nindent 12 }}
          {{- with $svc.workingDir }}
          workingDir: {{ . | quote }}
          {{- end }}
          {{- with $svc.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $svc.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ default 8080 $svc.containerPort }}
              protocol: TCP
          {{- if or $svc.env $svc.envFromSecrets $svc.envFromConfigMaps }}
          {{- with $svc.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or $svc.envFromSecrets $svc.envFromConfigMaps }}
          envFrom:
            {{- range $cm := $svc.envFromConfigMaps }}
            - configMapRef:
                name: {{ $cm }}
            {{- end }}
            {{- range $secret := $svc.envFromSecrets }}
            - secretRef:
                name: {{ $secret }}
            {{- end }}
          {{- end }}
          {{- end }}
          {{- if $svc.probes.enabled }}
          livenessProbe:
            {{- toYaml $svc.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml $svc.probes.readiness | nindent 12 }}
          {{- with $svc.probes.startup }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml (merge (deepCopy $.Values.global.resources) (deepCopy $svc.resources)) | nindent 12 }}
          volumeMounts:
            {{- if and $.Values.global.writableTmp.enabled (default true $svc.writableTmp.enabled) }}
            - name: tmp
              mountPath: {{ default "/tmp" $svc.writableTmp.mountPath }}
            {{- end }}
            {{- with $svc.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if and $.Values.global.writableTmp.enabled (default true $svc.writableTmp.enabled) }}
        - name: tmp
          emptyDir:
            sizeLimit: {{ default $.Values.global.writableTmp.sizeLimit $svc.writableTmp.sizeLimit }}
        {{- end }}
        {{- with $svc.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $svc.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $svc.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $svc.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- end }}
{{- end }}
EOF