admin:
  access_log_path: /dev/null
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

static_resources:
  listeners:
    - name: listener_http
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 80
      per_connection_buffer_limit_bytes: 32768
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: api_gateway_http
                codec_type: AUTO
                use_remote_address: true
                xff_num_trusted_hops: 0
                normalize_path: true
                merge_slashes: true
                path_with_escaped_slashes_action: REJECT_REQUEST
                stream_idle_timeout: 300s
                request_timeout: 15s
                request_headers_timeout: 10s
                max_request_headers_kb: 24
                server_header_transformation: OVERWRITE
                server_name: gateway
                generate_request_id: true
                common_http_protocol_options:
                  idle_timeout: 300s
                  headers_with_underscores_action: REJECT_REQUEST
                  max_headers_count: 100
                route_config:
                  name: local_route
                  validate_clusters: true
                  virtual_hosts:
                    - name: backend_services
                      domains:
                        - "*"
                      request_headers_to_remove:
                        - x-envoy-internal
                        - x-forwarded-client-cert
                        - x-forwarded-host
                      response_headers_to_remove:
                        - server
                        - x-powered-by
                        - x-envoy-upstream-service-time
                      response_headers_to_add:
                        - header:
                            key: x-content-type-options
                            value: nosniff
                          append_action: OVERWRITE_IF_EXISTS_OR_ADD
                        - header:
                            key: x-frame-options
                            value: DENY
                          append_action: OVERWRITE_IF_EXISTS_OR_ADD
                        - header:
                            key: referrer-policy
                            value: no-referrer
                          append_action: OVERWRITE_IF_EXISTS_OR_ADD
                      routes:
                        - match:
                            safe_regex:
                              google_re2: {}
                              regex: "^/api/v1(?:/|$)"
                          route:
                            cluster: api_v1_service
                            timeout: 15s
                            idle_timeout: 60s
                        - match:
                            safe_regex:
                              google_re2: {}
                              regex: "^/auth(?:/|$)"
                          route:
                            cluster: auth_service
                            timeout: 15s
                            idle_timeout: 60s
                        - match:
                            prefix: "/"
                          route:
                            cluster: default_service
                            timeout: 15s
                            idle_timeout: 60s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog

  clusters:
    - name: api_v1_service
      type: STRICT_DNS
      connect_timeout: 2s
      lb_policy: ROUND_ROBIN
      dns_lookup_family: V4_ONLY
      respect_dns_ttl: true
      per_connection_buffer_limit_bytes: 32768
      upstream_connection_options:
        tcp_keepalive: {}
      common_http_protocol_options:
        idle_timeout: 60s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          common_http_protocol_options:
            idle_timeout: 60s
          explicit_http_config:
            http_protocol_options: {}
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 200
            max_pending_requests: 100
            max_requests: 1000
            max_retries: 3
      outlier_detection:
        consecutive_5xx: 5
        interval: 10s
        base_ejection_time: 30s
        max_ejection_percent: 50
      health_checks:
        - timeout: 2s
          interval: 5s
          unhealthy_threshold: 3
          healthy_threshold: 2
          no_traffic_interval: 30s
          http_health_check:
            path: /healthz
            expected_statuses:
              - start: 200
                end: 300
      load_assignment:
        cluster_name: api_v1_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend-api-v1
                      port_value: 8080

    - name: auth_service
      type: STRICT_DNS
      connect_timeout: 2s
      lb_policy: ROUND_ROBIN
      dns_lookup_family: V4_ONLY
      respect_dns_ttl: true
      per_connection_buffer_limit_bytes: 32768
      upstream_connection_options:
        tcp_keepalive: {}
      common_http_protocol_options:
        idle_timeout: 60s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          common_http_protocol_options:
            idle_timeout: 60s
          explicit_http_config:
            http_protocol_options: {}
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 100
            max_pending_requests: 50
            max_requests: 500
            max_retries: 3
      outlier_detection:
        consecutive_5xx: 5
        interval: 10s
        base_ejection_time: 30s
        max_ejection_percent: 50
      health_checks:
        - timeout: 2s
          interval: 5s
          unhealthy_threshold: 3
          healthy_threshold: 2
          no_traffic_interval: 30s
          http_health_check:
            path: /healthz
            expected_statuses:
              - start: 200
                end: 300
      load_assignment:
        cluster_name: auth_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend-auth
                      port_value: 8080

    - name: default_service
      type: STRICT_DNS
      connect_timeout: 2s
      lb_policy: ROUND_ROBIN
      dns_lookup_family: V4_ONLY
      respect_dns_ttl: true
      per_connection_buffer_limit_bytes: 32768
      upstream_connection_options:
        tcp_keepalive: {}
      common_http_protocol_options:
        idle_timeout: 60s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          common_http_protocol_options:
            idle_timeout: 60s
          explicit_http_config:
            http_protocol_options: {}
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 100
            max_pending_requests: 50
            max_requests: 500
            max_retries: 3
      outlier_detection:
        consecutive_5xx: 5
        interval: 10s
        base_ejection_time: 30s
        max_ejection_percent: 50
      health_checks:
        - timeout: 2s
          interval: 5s
          unhealthy_threshold: 3
          healthy_threshold: 2
          no_traffic_interval: 30s
          http_health_check:
            path: /healthz
            expected_statuses:
              - start: 200
                end: 300
      load_assignment:
        cluster_name: default_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend-default
                      port_value: 8080