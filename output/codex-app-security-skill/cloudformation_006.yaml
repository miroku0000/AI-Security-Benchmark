Parameters:
  ProjectName:
    Type: String
    Default: three-tier-app
    AllowedPattern: '^[a-zA-Z0-9-]+$'
    ConstraintDescription: ProjectName must contain only letters, numbers, and hyphens.
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/([1-2]?[0-9]|3[0-2])$'
  PublicSubnet1Cidr:
    Type: String
    Default: 10.0.0.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/([1-2]?[0-9]|3[0-2])$'
  PublicSubnet2Cidr:
    Type: String
    Default: 10.0.1.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/([1-2]?[0-9]|3[0-2])$'
  PrivateSubnet1Cidr:
    Type: String
    Default: 10.0.10.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/([1-2]?[0-9]|3[0-2])$'
  PrivateSubnet2Cidr:
    Type: String
    Default: 10.0.11.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/([1-2]?[0-9]|3[0-2])$'