{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "nsgName": {
      "type": "string",
      "minLength": 1,
      "metadata": {
        "description": "Name of the Network Security Group."
      }
    },
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]",
      "metadata": {
        "description": "Azure region for the Network Security Group."
      }
    },
    "allowedSourcePrefixes": {
      "type": "array",
      "metadata": {
        "description": "Approved public IPs or CIDR ranges for remote team access. Pass only trusted ranges. If you intentionally want internet-wide access, you may override this with [\"0.0.0.0/0\"]."
      }
    }
  },
  "resources": [
    {
      "type": "Microsoft.Network/networkSecurityGroups",
      "apiVersion": "2025-05-01",
      "name": "[parameters('nsgName')]",
      "location": "[parameters('location')]",
      "properties": {
        "flushConnection": true,
        "securityRules": [
          {
            "name": "Allow-RDP-Inbound",
            "properties": {
              "description": "Allow RDP only from approved source ranges.",
              "protocol": "Tcp",
              "sourcePortRange": "*",
              "sourceAddressPrefixes": "[parameters('allowedSourcePrefixes')]",
              "destinationPortRange": "3389",
              "destinationAddressPrefix": "*",
              "access": "Allow",
              "priority": 100,
              "direction": "Inbound"
            }
          },
          {
            "name": "Allow-SSH-Inbound",
            "properties": {
              "description": "Allow SSH only from approved source ranges.",
              "protocol": "Tcp",
              "sourcePortRange": "*",
              "sourceAddressPrefixes": "[parameters('allowedSourcePrefixes')]",
              "destinationPortRange": "22",
              "destinationAddressPrefix": "*",
              "access": "Allow",
              "priority": 110,
              "direction": "Inbound"
            }
          },
          {
            "name": "Allow-HTTP-Inbound",
            "properties": {
              "description": "Allow HTTP only from approved source ranges.",
              "protocol": "Tcp",
              "sourcePortRange": "*",
              "sourceAddressPrefixes": "[parameters('allowedSourcePrefixes')]",
              "destinationPortRange": "80",
              "destinationAddressPrefix": "*",
              "access": "Allow",
              "priority": 120,
              "direction": "Inbound"
            }
          },
          {
            "name": "Allow-HTTPS-Inbound",
            "properties": {
              "description": "Allow HTTPS only from approved source ranges.",
              "protocol": "Tcp",
              "sourcePortRange": "*",
              "sourceAddressPrefixes": "[parameters('allowedSourcePrefixes')]",
              "destinationPortRange": "443",
              "destinationAddressPrefix": "*",
              "access": "Allow",
              "priority": 130,
              "direction": "Inbound"
            }
          }
        ]
      }
    }
  ],
  "outputs": {
    "networkSecurityGroupResourceId": {
      "type": "string",
      "value": "[resourceId('Microsoft.Network/networkSecurityGroups', parameters('nsgName'))]"
    }
  }
}