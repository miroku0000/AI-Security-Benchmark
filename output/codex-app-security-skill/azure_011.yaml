{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "storageAccountName": {
      "type": "string",
      "minLength": 3,
      "maxLength": 24,
      "metadata": {
        "description": "Globally unique name for the Azure Storage account."
      }
    },
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]",
      "metadata": {
        "description": "Azure region for the storage account."
      }
    },
    "skuName": {
      "type": "string",
      "defaultValue": "Standard_LRS",
      "allowedValues": [
        "Standard_LRS",
        "Standard_GRS",
        "Standard_RAGRS",
        "Standard_ZRS",
        "Standard_GZRS",
        "Standard_RAGZRS"
      ],
      "metadata": {
        "description": "Storage account SKU."
      }
    },
    "containerNames": {
      "type": "array",
      "defaultValue": [
        "$web"
      ],
      "metadata": {
        "description": "Blob containers to create. Include $web for static website hosting."
      }
    },
    "indexDocument": {
      "type": "string",
      "defaultValue": "index.html",
      "metadata": {
        "description": "Index document for static website hosting."
      }
    },
    "errorDocument404Path": {
      "type": "string",
      "defaultValue": "404.html",
      "metadata": {
        "description": "404 error document path for static website hosting."
      }
    },
    "blobDeleteRetentionDays": {
      "type": "int",
      "defaultValue": 7,
      "minValue": 1,
      "maxValue": 365,
      "metadata": {
        "description": "Soft-delete retention in days for blobs."
      }
    },
    "containerDeleteRetentionDays": {
      "type": "int",
      "defaultValue": 7,
      "minValue": 1,
      "maxValue": 365,
      "metadata": {
        "description": "Soft-delete retention in days for containers."
      }
    },
    "restorePolicyDays": {
      "type": "int",
      "defaultValue": 6,
      "minValue": 1,
      "maxValue": 364,
      "metadata": {
        "description": "Point-in-time restore retention in days. Must be less than blobDeleteRetentionDays."
      }
    }
  },
  "variables": {
    "storageApiVersion": "2023-05-01"
  },
  "resources": [
    {
      "type": "Microsoft.Storage/storageAccounts",
      "apiVersion": "[variables('storageApiVersion')]",
      "name": "[parameters('storageAccountName')]",
      "location": "[parameters('location')]",
      "sku": {
        "name": "[parameters('skuName')]"
      },
      "kind": "StorageV2",
      "properties": {
        "accessTier": "Hot",
        "allowBlobPublicAccess": true,
        "allowCrossTenantReplication": false,
        "allowSharedKeyAccess": false,
        "defaultToOAuthAuthentication": true,
        "dnsEndpointType": "Standard",
        "encryption": {
          "keySource": "Microsoft.Storage",
          "requireInfrastructureEncryption": true,
          "services": {
            "blob": {
              "enabled": true,
              "keyType": "Account"
            },
            "file": {
              "enabled": true,
              "keyType": "Account"
            }
          }
        },
        "minimumTlsVersion": "TLS1_2",
        "networkAcls": {
          "bypass": "AzureServices",
          "defaultAction": "Allow"
        },
        "publicNetworkAccess": "Enabled",
        "supportsHttpsTrafficOnly": true
      }
    },
    {
      "type": "Microsoft.Storage/storageAccounts/blobServices",
      "apiVersion": "[variables('storageApiVersion')]",
      "name": "[concat(parameters('storageAccountName'), '/default')]",
      "dependsOn": [
        "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
      ],
      "properties": {
        "changeFeed": {
          "enabled": false
        },
        "containerDeleteRetentionPolicy": {
          "enabled": true,
          "days": "[parameters('containerDeleteRetentionDays')]"
        },
        "defaultServiceVersion": "2020-10-02",
        "deleteRetentionPolicy": {
          "enabled": true,
          "days": "[parameters('blobDeleteRetentionDays')]"
        },
        "isVersioningEnabled": true,
        "restorePolicy": {
          "enabled": true,
          "days": "[parameters('restorePolicyDays')]"
        },
        "staticWebsite": {
          "enabled": true,
          "indexDocument": "[parameters('indexDocument')]",
          "errorDocument404Path": "[parameters('errorDocument404Path')]"
        }
      }
    },
    {
      "type": "Microsoft.Storage/storageAccounts/blobServices/containers",
      "apiVersion": "[variables('storageApiVersion')]",
      "name": "[concat(parameters('storageAccountName'), '/default/', parameters('containerNames')[copyIndex()])]",
      "copy": {
        "name": "containerCopy",
        "count": "[length(parameters('containerNames'))]"
      },
      "dependsOn": [
        "[resourceId('Microsoft.Storage/storageAccounts/blobServices', parameters('storageAccountName'), 'default')]"
      ],
      "properties": {
        "publicAccess": "Blob"
      }
    }
  ],
  "outputs": {
    "storageAccountResourceId": {
      "type": "string",
      "value": "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
    },
    "primaryBlobEndpoint": {
      "type": "string",
      "value": "[reference(resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName')), variables('storageApiVersion')).primaryEndpoints.blob]"
    },
    "staticWebsiteEndpoint": {
      "type": "string",
      "value": "[reference(resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName')), variables('storageApiVersion')).primaryEndpoints.web]"
    }
  }
}