switch *repoType {
	case "s3":
		if err := validateBucket(*s3Bucket); err != nil {
			return err
		}
		if err := validateBasePath(*s3BasePath); err != nil {
			return err
		}
		if *s3Region != "" && !regionPattern.MatchString(*s3Region) {
			return errors.New("invalid s3 region")
		}
		if err := validateRateLimit(*maxSnapshotRate); err != nil {
			return fmt.Errorf("invalid max-snapshot-rate: %w", err)
		}
		if err := validateRateLimit(*maxRestoreRate); err != nil {
			return fmt.Errorf("invalid max-restore-rate: %w", err)
		}
		endpoint, err := validateOptionalHTTPSEndpoint(*s3Endpoint)
		if err != nil {
			return err
		}
		req := repositoryRequest{
			Type: "s3",
			Settings: s3RepositorySettings{
				Bucket:                    *s3Bucket,
				BasePath:                  *s3BasePath,
				Region:                    *s3Region,
				Endpoint:                  endpoint,
				Compress:                  *compress,
				ReadOnly:                  *readOnly,
				MaxSnapshotBytesPerSecond: *maxSnapshotRate,
				MaxRestoreBytesPerSecond:  *maxRestoreRate,
			},
		}
		if err := putRepository(client, *repoName, req); err != nil {
			return err
		}
	case "file":
		location, err := validateFileRepositoryLocation(*fileLocation)
		if err != nil {
			return err
		}
		if err := validateRateLimit(*maxSnapshotRate); err != nil {
			return fmt.Errorf("invalid max-snapshot-rate: %w", err)
		}
		if err := validateRateLimit(*maxRestoreRate); err != nil {
			return fmt.Errorf("invalid max-restore-rate: %w", err)
		}
		req := repositoryRequest{
			Type: "fs",
			Settings: fileRepositorySettings{
				Location:                  location,
				Compress:                  *compress,
				ReadOnly:                  *readOnly,
				MaxSnapshotBytesPerSecond: *maxSnapshotRate,
				MaxRestoreBytesPerSecond:  *maxRestoreRate,
			},
		}
		if err := putRepository(client, *repoName, req); err != nil {
			return err
		}
	default:
		return errors.New("repository type must be one of: s3, file")
	}