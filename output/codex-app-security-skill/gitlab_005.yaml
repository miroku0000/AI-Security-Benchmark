stages:
  - validate
  - build

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"

default:
  image: alpine:3.20
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  before_script:
    - apk add --no-cache bash coreutils findutils

variables:
  GIT_STRATEGY: fetch
  GIT_SUBMODULE_STRATEGY: none
  GIT_DEPTH: "20"
  FF_SCRIPT_SECTIONS: "true"

validate_custom_build_scripts:
  stage: validate
  script:
    - |
      bash -Eeuo pipefail <<'BASH'
      IFS=$'\n\t'
      umask 077

      repo_root="${CI_PROJECT_DIR:?}"
      cd "$repo_root"

      allowed_roots=(
        "$repo_root/.gitlab/"
        "$repo_root/ci/"
        "$repo_root/scripts/ci/"
      )

      is_allowed_path() {
        local resolved="$1"
        local root
        for root in "${allowed_roots[@]}"; do
          case "$resolved" in
            "$root"*) return 0 ;;
          esac
        done
        return 1
      }

      validate_script() {
        local script_path="$1"
        local resolved

        [ -n "$script_path" ] || {
          echo "Empty script path is not allowed" >&2
          exit 1
        }

        case "$script_path" in
          /*)
            echo "Absolute paths are not allowed: $script_path" >&2
            exit 1
            ;;
        esac

        case "$script_path" in
          *".."*|*'~'*)
            echo "Unsafe path component detected: $script_path" >&2
            exit 1
            ;;
        esac

        [ -e "$script_path" ] || {
          echo "Configured script does not exist: $script_path" >&2
          exit 1
        }

        [ -f "$script_path" ] || {
          echo "Configured script is not a regular file: $script_path" >&2
          exit 1
        }

        [ ! -L "$script_path" ] || {
          echo "Symlinks are not allowed for build scripts: $script_path" >&2
          exit 1
        }

        [ -x "$script_path" ] || {
          echo "Configured script is not executable: $script_path" >&2
          exit 1
        }

        resolved="$(readlink -f -- "$script_path")"

        case "$resolved" in
          "$repo_root"/*) ;;
          *)
            echo "Script resolves outside repository: $script_path" >&2
            exit 1
            ;;
        esac

        is_allowed_path "$resolved" || {
          echo "Script is outside allowed CI directories: $script_path" >&2
          exit 1
        }

        perms="$(stat -c '%a' -- "$resolved")"
        other_write=$(( perms % 10 >= 2 && perms % 10 <= 7 ? 1 : 0 ))
        group_digit=$(( (perms / 10) % 10 ))
        group_write=$(( group_digit >= 2 && group_digit <= 7 ? 1 : 0 ))

        [ "$group_write" -eq 0 ] || {
          echo "Group-writable scripts are not allowed: $script_path" >&2
          exit 1
        }

        [ "$other_write" -eq 0 ] || {
          echo "World-writable scripts are not allowed: $script_path" >&2
          exit 1
        }
      }

      scripts=()

      if [ -f .gitlab/build-manifest.txt ]; then
        while IFS= read -r line || [ -n "$line" ]; do
          line="${line#"${line%%[![:space:]]*}"}"
          line="${line%"${line##*[![:space:]]}"}"
          [ -n "$line" ] || continue
          case "$line" in
            \#*) continue ;;
          esac
          scripts+=("$line")
        done < .gitlab/build-manifest.txt
      else
        if [ -x .gitlab/build.sh ]; then
          scripts+=(".gitlab/build.sh")
        fi

        while IFS= read -r -d '' file; do
          scripts+=("${file#./}")
        done < <(find .gitlab/build.d ci/build.d scripts/ci/build.d -mindepth 1 -maxdepth 1 -type f -name '*.sh' -perm -u+x -print0 2>/dev/null | sort -z)
      fi

      [ "${#scripts[@]}" -gt 0 ] || {
        echo "No custom build scripts found. Provide .gitlab/build.sh, scripts in .gitlab/build.d/, ci/build.d/, scripts/ci/build.d/, or a .gitlab/build-manifest.txt file." >&2
        exit 1
      }

      for script in "${scripts[@]}"; do
        validate_script "$script"
      done
      BASH

build:
  stage: build
  needs:
    - job: validate_custom_build_scripts
  script:
    - |
      bash -Eeuo pipefail <<'BASH'
      IFS=$'\n\t'
      umask 077

      repo_root="${CI_PROJECT_DIR:?}"
      cd "$repo_root"

      allowed_roots=(
        "$repo_root/.gitlab/"
        "$repo_root/ci/"
        "$repo_root/scripts/ci/"
      )

      is_allowed_path() {
        local resolved="$1"
        local root
        for root in "${allowed_roots[@]}"; do
          case "$resolved" in
            "$root"*) return 0 ;;
          esac
        done
        return 1
      }

      validate_script() {
        local script_path="$1"
        local resolved

        [ -n "$script_path" ] || {
          echo "Empty script path is not allowed" >&2
          exit 1
        }

        case "$script_path" in
          /*)
            echo "Absolute paths are not allowed: $script_path" >&2
            exit 1
            ;;
        esac

        case "$script_path" in
