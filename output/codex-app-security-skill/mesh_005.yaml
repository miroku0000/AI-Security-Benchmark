apiVersion: v1
kind: Namespace
metadata:
  name: app1
  labels:
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: app2
  labels:
    istio-injection: enabled
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: app1
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: app2
spec:
  mtls:
    mode: STRICT
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: app1-service
  namespace: app1
spec:
  host: app1-service.app1.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: app2-service
  namespace: app2
spec:
  host: app2-service.app2.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: mesh-ingress-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - example.com
        - api.example.com
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: mesh-ingress-gateway-allow-routes
  namespace: istio-system
spec:
  selector:
    matchLabels:
      istio: ingressgateway
  action: ALLOW
  rules:
    - to:
        - operation:
            ports: ["80"]
            hosts: ["example.com"]
            methods: ["GET", "HEAD", "OPTIONS", "POST"]
            paths: ["/app1", "/app1/*"]
    - to:
        - operation:
            ports: ["80"]
            hosts: ["api.example.com"]
            methods: ["GET", "HEAD", "OPTIONS", "POST"]
            paths: ["/app2", "/app2/*"]
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: mesh-ingress-routes
  namespace: istio-system
spec:
  hosts:
    - example.com
    - api.example.com
  gateways:
    - istio-system/mesh-ingress-gateway
  http:
    - name: app1
      match:
        - authority:
            exact: example.com
          uri:
            exact: /app1
        - authority:
            exact: example.com
          uri:
            prefix: /app1/
      rewrite:
        uri: /
      route:
        - destination:
            host: app1-service.app1.svc.cluster.local
            port:
              number: 80
    - name: app2
      match:
        - authority:
            exact: api.example.com
          uri:
            exact: /app2
        - authority:
            exact: api.example.com
          uri:
            prefix: /app2/
      rewrite:
        uri: /
      route:
        - destination:
            host: app2-service.app2.svc.cluster.local
            port:
              number: 80