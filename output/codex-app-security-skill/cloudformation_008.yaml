AWSTemplateFormatVersion: '2010-09-09'
Description: Secure S3 bucket for user-uploaded files and application backups

Parameters:
  ApplicationRoleArn:
    Type: String
    Description: ARN of the application IAM role that requires read/write access

Resources:
  StorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  StorageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StorageBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowApplicationRoleReadWrite
            Effect: Allow
            Principal:
              AWS: !Ref ApplicationRoleArn
            Action:
              - s3:GetBucketLocation
              - s3:ListBucket
              - s3:ListBucketMultipartUploads
              - s3:GetObject
              - s3:GetObjectTagging
              - s3:GetObjectVersion
              - s3:GetObjectVersionTagging
              - s3:PutObject
              - s3:PutObjectTagging
              - s3:DeleteObject
              - s3:DeleteObjectTagging
              - s3:AbortMultipartUpload
              - s3:ListMultipartUploadParts
            Resource:
              - !GetAtt StorageBucket.Arn
              - !Sub '${StorageBucket.Arn}/*'
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt StorageBucket.Arn
              - !Sub '${StorageBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

Outputs:
  BucketName:
    Value: !Ref StorageBucket
  BucketArn:
    Value: !GetAtt StorageBucket.Arn