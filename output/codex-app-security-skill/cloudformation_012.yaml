Parameters:
  ProjectName:
    Type: String
    Default: microservices
    AllowedPattern: '^[a-zA-Z][-a-zA-Z0-9]{1,30}$'
    ConstraintDescription: Must start with a letter and contain only letters, numbers, and hyphens.
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/([1-2]?[0-9]|3[0-2])$'
  PublicSubnetAz1Cidr:
    Type: String
    Default: 10.0.0.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/([1-2]?[0-9]|3[0-2])$'
  PublicSubnetAz2Cidr:
    Type: String
    Default: 10.0.1.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/([1-2]?[0-9]|3[0-2])$'
  AppSubnetAz1Cidr:
    Type: String
    Default: 10.0.10.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/([1-2]?[0-9]|3[0-2])$'
  AppSubnetAz2Cidr:
    Type: String
    Default: 10.0.11.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/([1-2]?[0-9]|3[0-2])$'
  DataSubnetAz1Cidr:
    Type: String
    Default: 10.0.20.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/([1-2]?[0-9]|3[0-2])$'
  DataSubnetAz2Cidr:
    Type: String
    Default: 10.0.21.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/([1-2]?[0-9]|3[0-2])$'
  EnableVpcFlowLogs:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
  FlowLogsRetentionInDays:
    Type: Number
    Default: 30
    AllowedValues:
      - 7
      - 14
      - 30
      - 60
      - 90
      - 120
      - 150
      - 180
      - 365
      - 400
      - 545
      - 731
      - 1096
      - 1827
      - 2192
      - 2557
      - 2922
      - 3288
      - 3653