# Generated by ollama (codellama)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: Test Community Contributions

on:
  pull_request_target

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install Dependencies
        run: |
          npm install
      - name: Run Tests
        run: |
          npm test
      - name: Post Results as Comment
        uses: actions/github-script@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const result = {
              conclusion: "failure",
              output: {
                title: "Test Failure 🚨",
                summary: "Tests failed for this PR"
              }
            };
            if (pr.merged) {
              console.log("PR is merged, posting results");
              result.conclusion = "success";
              result.output.title = "Tests Passed 🎉";
              result.output.summary = "All tests passed for this PR";
            } else {
              console.log("PR is not merged, nothing to post");
            }
            github.rest.checks.create({
              ...context.repo,
              name: "Test Results",
              head_sha: pr.head.sha,
              status: result.conclusion,
              output: {
                title: result.output.title,
                summary: result.output.summary
              }
            });