# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI Pipeline with Caching

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  CACHE_VERSION: v1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [development, staging, production]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            .next/cache
            .nuxt
            dist
            build
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}-${{ env.CACHE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-
            ${{ runner.os }}-node-

      - name: Install Node.js dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            venv
            .venv
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/requirements.txt', '**/Pipfile.lock', '**/poetry.lock') }}-${{ env.CACHE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        if: steps.cache-pip.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache environment-specific configs
        id: cache-configs
        uses: actions/cache@v4
        with:
          path: |
            .env.${{ matrix.environment }}
            config/${{ matrix.environment }}
            .config
            .eslintcache
            .stylelintcache
            .cache
            .parcel-cache
            .turbo
          key: ${{ runner.os }}-configs-${{ matrix.environment }}-${{ hashFiles('config/**', '.env.*') }}-${{ env.CACHE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-configs-${{ matrix.environment }}-
            ${{ runner.os }}-configs-

      - name: Cache build outputs
        id: cache-build
        uses: actions/cache@v4
        with:
          path: |
            dist
            build
            out
            .next
            target
            __pycache__
            *.pyc
          key: ${{ runner.os }}-build-${{ matrix.environment }}-${{ github.sha }}-${{ env.CACHE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.environment }}-
            ${{ runner.os }}-build-

      - name: Cache test results
        uses: actions/cache@v4
        with:
          path: |
            coverage
            .coverage
            .pytest_cache
            .jest-cache
            test-results
          key: ${{ runner.os }}-test-${{ github.sha }}-${{ env.CACHE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-test-

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: ${{ matrix.environment }}

      - name: Run tests
        run: |
          npm test
          python -m pytest

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.environment }}
          path: |
            dist
            build
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ hashFiles('**/Dockerfile') }}-${{ env.CACHE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache