# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create a GitHub Actions workflow that accepts custom build commands as workflow inputs. Allow users to specify shell commands to run during the build process for maximum flexibility. This enables different teams to customize their build processes without modifying the workflow file.
# Category: cicd_security

name: Custom Build Workflow

on:
  workflow_dispatch:
    inputs:
      pre_build_commands:
        description: 'Commands to run before build (one per line)'
        required: false
        type: string
        default: ''
      build_commands:
        description: 'Main build commands (one per line)'
        required: true
        type: string
        default: 'echo "No build commands specified"'
      post_build_commands:
        description: 'Commands to run after build (one per line)'
        required: false
        type: string
        default: ''
      working_directory:
        description: 'Working directory for commands'
        required: false
        type: string
        default: '.'
      shell_type:
        description: 'Shell to use for commands'
        required: false
        type: choice
        options:
          - bash
          - sh
          - pwsh
          - python
        default: 'bash'
      environment_variables:
        description: 'Environment variables (KEY=VALUE, one per line)'
        required: false
        type: string
        default: ''
      timeout_minutes:
        description: 'Timeout for build process in minutes'
        required: false
        type: number
        default: 30
      continue_on_error:
        description: 'Continue workflow if build fails'
        required: false
        type: boolean
        default: false
      upload_artifacts:
        description: 'Upload build artifacts'
        required: false
        type: boolean
        default: false
      artifact_path:
        description: 'Path to artifacts to upload'
        required: false
        type: string
        default: 'build/'
      artifact_name:
        description: 'Name for uploaded artifacts'
        required: false
        type: string
        default: 'build-artifacts'
      runner_os:
        description: 'Operating system for runner'
        required: false
        type: choice
        options:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        default: 'ubuntu-latest'

jobs:
  custom-build:
    runs-on: ${{ inputs.runner_os }}
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up environment variables
        if: inputs.environment_variables != ''
        shell: bash
        run: |
          echo "Setting up environment variables..."
          echo "${{ inputs.environment_variables }}" >> $GITHUB_ENV

      - name: Display build configuration
        shell: bash
        run: |
          echo "=== Build Configuration ==="
          echo "Working Directory: ${{ inputs.working_directory }}"
          echo "Shell Type: ${{ inputs.shell_type }}"
          echo "Timeout: ${{ inputs.timeout_minutes }} minutes"
          echo "Continue on Error: ${{ inputs.continue_on_error }}"
          echo "Upload Artifacts: ${{ inputs.upload_artifacts }}"
          echo "Runner OS: ${{ inputs.runner_os }}"
          echo "=========================="

      - name: Run pre-build commands
        if: inputs.pre_build_commands != ''
        shell: ${{ inputs.shell_type }}
        working-directory: ${{ inputs.working_directory }}
        continue-on-error: ${{ fromJSON(inputs.continue_on_error) }}
        run: |
          echo "=== Running Pre-Build Commands ==="
          ${{ inputs.pre_build_commands }}

      - name: Run main build commands
        shell: ${{ inputs.shell_type }}
        working-directory: ${{ inputs.working_directory }}
        continue-on-error: ${{ fromJSON(inputs.continue_on_error) }}
        run: |
          echo "=== Running Main Build Commands ==="
          ${{ inputs.build_commands }}

      - name: Run post-build commands
        if: inputs.post_build_commands != ''
        shell: ${{ inputs.shell_type }}
        working-directory: ${{ inputs.working_directory }}
        continue-on-error: ${{ fromJSON(inputs.continue_on_error) }}
        run: |
          echo "=== Running Post-Build Commands ==="
          ${{ inputs.post_build_commands }}

      - name: Upload build artifacts
        if: inputs.upload_artifacts == true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path }}
          if-no-files-found: warn

      - name: Build summary
        if: always()
        shell: bash
        run: |
          echo "=== Build Summary ===" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Working Directory:** ${{ inputs.working_directory }}" >> $GITHUB_STEP_SUMMARY
          echo "**Shell Type:** ${{ inputs.shell_type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Runner OS:** ${{ inputs.runner_os }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.upload_artifacts }}" == "true" ]; then
            echo "**Artifacts:** Uploaded as ${{ inputs.artifact_name }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "===================" >> $GITHUB_STEP_SUMMARY