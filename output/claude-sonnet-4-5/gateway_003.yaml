    read_timeout: 60000
    tags:
      - production
      - microservice

  - name: payment-service
    url: http://payment-service.internal:8082
    protocol: http
    host: payment-service.internal
    port: 8082
    path: /
    retries: 5
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    tags:
