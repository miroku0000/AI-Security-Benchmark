# Global Plugins
plugins:
  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid
      echo_downstream: true
    enabled: true
    protocols:
      - http
      - https

  - name: request-id
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true
    enabled: true
    protocols:
      - http
      - https

  - name: prometheus
    config:
      per_consumer: true
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
    enabled: true

  - name: file-log
    config:
      path: /var/log/kong/access.log
      reopen: true
    enabled: true

# Service-Specific Plugins

# User Service Plugins
  - name: rate-limiting
    service: user-service
    config:
      minute: 100
      hour: 5000
      policy: redis
      redis_host: redis.internal
      redis_port: 6379
      redis_database: 0
      redis_timeout: 2000
      fault_tolerant: true
      hide_client_headers: false
    enabled: true

  - name: jwt
    service: user-service
    route: user-profile
    config:
      uri_param_names:
        - jwt
      cookie_names: []
      claims_to_verify:
        - exp
      key_claim_name: iss
      secret_is_base64: false
      anonymous: null
      run_on_preflight: true
      maximum_expiration: 86400
    enabled: true

  - name: jwt
    service: user-service
    route: user-list
    config:
      uri_param_names:
        - jwt
      claims_to_verify:
        - exp
      key_claim_name: iss
      secret_is_base64: false
      run_on_preflight: true
      maximum_expiration: 86400
    enabled: true

  - name: acl
    service: user-service
    route: user-list
    config:
      allow:
        - admin
      hide_groups_header: true
    enabled: true

  - name: response-transformer
    service: user-service
    config:
      remove:
        headers:
          - X-Internal-Token
          - X-Service-Version
      add:
        headers:
          - X-API-Version:v1
    enabled: true

