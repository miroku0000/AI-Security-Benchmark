      - production
      - microservice
    client_certificate: null
    tls_verify: false
    ca_certificates: null

  - name: order-service
    url: http://order-service.internal:8081
    protocol: http
    host: order-service.internal
    port: 8081
    path: /
    retries: 5
    connect_timeout: 60000
