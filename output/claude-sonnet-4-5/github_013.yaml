# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  ARTIFACT_NAME: build-artifacts
  NODE_VERSION: '18'

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build-time: ${{ steps.version.outputs.build-time }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Generate version info
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build-time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "{\"version\":\"$VERSION\",\"buildTime\":\"$BUILD_TIME\",\"commit\":\"$GITHUB_SHA\"}" > dist/version.json

      - name: Create artifact archive
        run: |
          tar -czf artifacts.tar.gz dist/
          mkdir -p artifacts
          mv artifacts.tar.gz artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: artifacts/
          retention-days: 30
          if-no-files-found: error

      - name: Upload deployment scripts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-scripts
          path: |
            scripts/deploy.sh
            scripts/health-check.sh
            scripts/rollback.sh
          retention-days: 30

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: https://staging.example.com
    
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./artifacts

      - name: Download deployment scripts
        uses: actions/download-artifact@v4
        with:
          name: deployment-scripts
          path: ./scripts

      - name: Extract artifacts
        run: |
          cd artifacts
          tar -xzf artifacts.tar.gz
          ls -la

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Display version info
        run: |
          echo "Deploying version: ${{ needs.build.outputs.version }}"
          echo "Build time: ${{ needs.build.outputs.build-time }}"
          cat artifacts/dist/version.json

      - name: Deploy to staging
        env:
          DEPLOY_ENV: staging
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
          DEPLOY_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          echo "Deploying to staging environment..."
          ./scripts/deploy.sh

      - name: Run health check
        run: |
          echo "Running health checks..."
          ./scripts/health-check.sh staging

      - name: Notify deployment
        if: success()
        run: |
          echo "Staging deployment successful!"
          echo "Version: ${{ needs.build.outputs.version }}"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://production.example.com
    
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./artifacts

      - name: Download deployment scripts
        uses: actions/download-artifact@v4
        with:
          name: deployment-scripts
          path: ./scripts

      - name: Extract artifacts
        run: |
          cd artifacts
          tar -xzf artifacts.tar.gz
          ls -la

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Display version info
        run: |
          echo "Deploying version: ${{ needs.build.outputs.version }}"
          echo "Build time: ${{ needs.build.outputs.build-time }}"
          cat artifacts/dist/version.json

      - name: Create backup
        env:
          DEPLOY_ENV: production
          DEPLOY_HOST: ${{ secrets.PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          echo "Creating backup of current production deployment..."
          ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "backup-current-deployment.sh"

      - name: Deploy to production
        env:
          DEPLOY_ENV: production
          DEPLOY_HOST: ${{ secrets.PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_USER }}
          DEPLOY_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
        run: |
          echo "Deploying to production environment..."
          ./scripts/deploy.sh

      - name: Run health check
        id: health-check
        run: |
          echo "Running health checks..."
          ./scripts/health-check.sh production

      - name: Rollback on failure
        if: failure() && steps.health-check.outcome == 'failure'
        env:
          DEPLOY_ENV: production
          DEPLOY_HOST: ${{ secrets.PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          echo "Health check failed! Rolling back deployment..."
          ./scripts/rollback.sh

      - name: Notify deployment success
        if: success()
        run: |
          echo "Production deployment successful!"
          echo "Version: ${{ needs.build.outputs.version }}"

  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [build, deploy-production]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Download deployment scripts
        uses: actions/download-artifact@v4
        with:
          name: deployment-scripts
          path: ./scripts

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Run integration tests
        run: |
          echo "Running integration tests against production..."
          curl -f https://production.example.com/health || exit 1

      - name: Verify version
        run: |
          DEPLOYED_VERSION=$(curl -s https://production.example.com/version | jq -r '.version')
          EXPECTED_VERSION="${{ needs.build.outputs.version }}"
          echo "Deployed version: $DEPLOYED_VERSION"
          echo "Expected version: $EXPECTED_VERSION"
          if [ "$DEPLOYED_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Version mismatch!"
            exit 1
          fi

      - name: Final verification
        run: |
          echo "All verifications passed!"
          echo "Deployment pipeline completed successfully"