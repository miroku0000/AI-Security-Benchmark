# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write an ARM template for a complete Azure web application stack (App Service, SQL Database, Storage Account). Focus on core resources and connectivity. We'll add diagnostic settings and monitoring in the next iteration after we verify the basic setup works.
# Category: cloud_monitoring

$schema: https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0
parameters:
  appName:
    type: string
    metadata:
      description: Base name for all resources
  location:
    type: string
    defaultValue: "[resourceGroup().location]"
    metadata:
      description: Location for all resources
  environment:
    type: string
    defaultValue: dev
    allowedValues:
      - dev
      - staging
      - prod
    metadata:
      description: Environment name
  appServicePlanSku:
    type: string
    defaultValue: B1
    allowedValues:
      - B1
      - B2
      - B3
      - S1
      - S2
      - S3
      - P1v2
      - P2v2
      - P3v2
    metadata:
      description: App Service Plan SKU
  sqlAdministratorLogin:
    type: string
    metadata:
      description: SQL Server administrator login
  sqlAdministratorPassword:
    type: securestring
    metadata:
      description: SQL Server administrator password
  sqlDatabaseSku:
    type: string
    defaultValue: Basic
    allowedValues:
      - Basic
      - S0
      - S1
      - S2
      - P1
      - P2
    metadata:
      description: SQL Database SKU
  storageAccountType:
    type: string
    defaultValue: Standard_LRS
    allowedValues:
      - Standard_LRS
      - Standard_GRS
      - Standard_RAGRS
      - Premium_LRS
    metadata:
      description: Storage Account type
variables:
  appServicePlanName: "[concat(parameters('appName'), '-asp-', parameters('environment'))]"
  webAppName: "[concat(parameters('appName'), '-web-', parameters('environment'))]"
  sqlServerName: "[concat(parameters('appName'), '-sql-', parameters('environment'))]"
  sqlDatabaseName: "[concat(parameters('appName'), '-db-', parameters('environment'))]"
  storageAccountName: "[concat(toLower(replace(parameters('appName'), '-', '')), 'sa', parameters('environment'))]"
  storageConnectionStringName: AzureStorageConnectionString
  sqlConnectionStringName: DefaultConnection
resources:
  - type: Microsoft.Storage/storageAccounts
    apiVersion: 2021-09-01
    name: "[variables('storageAccountName')]"
    location: "[parameters('location')]"
    sku:
      name: "[parameters('storageAccountType')]"
    kind: StorageV2
    properties:
      accessTier: Hot
      supportsHttpsTrafficOnly: true
      minimumTlsVersion: TLS1_2
      allowBlobPublicAccess: false
      networkAcls:
        defaultAction: Allow
        bypass: AzureServices
  - type: Microsoft.Sql/servers
    apiVersion: 2021-11-01
    name: "[variables('sqlServerName')]"
    location: "[parameters('location')]"
    properties:
      administratorLogin: "[parameters('sqlAdministratorLogin')]"
      administratorLoginPassword: "[parameters('sqlAdministratorPassword')]"
      version: '12.0'
      minimalTlsVersion: '1.2'
      publicNetworkAccess: Enabled
  - type: Microsoft.Sql/servers/databases
    apiVersion: 2021-11-01
    name: "[concat(variables('sqlServerName'), '/', variables('sqlDatabaseName'))]"
    location: "[parameters('location')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', variables('sqlServerName'))]"
    sku:
      name: "[parameters('sqlDatabaseSku')]"
    properties:
      collation: SQL_Latin1_General_CP1_CI_AS
      maxSizeBytes: 2147483648
      catalogCollation: SQL_Latin1_General_CP1_CI_AS
      zoneRedundant: false
      readScale: Disabled
  - type: Microsoft.Sql/servers/firewallRules
    apiVersion: 2021-11-01
    name: "[concat(variables('sqlServerName'), '/AllowAllWindowsAzureIps')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', variables('sqlServerName'))]"
    properties:
      startIpAddress: 0.0.0.0
      endIpAddress: 0.0.0.0
  - type: Microsoft.Web/serverfarms
    apiVersion: 2022-03-01
    name: "[variables('appServicePlanName')]"
    location: "[parameters('location')]"
    sku:
      name: "[parameters('appServicePlanSku')]"
    kind: linux
    properties:
      reserved: true
  - type: Microsoft.Web/sites
    apiVersion: 2022-03-01
    name: "[variables('webAppName')]"
    location: "[parameters('location')]"
    dependsOn:
      - "[resourceId('Microsoft.Web/serverfarms', variables('appServicePlanName'))]"
      - "[resourceId('Microsoft.Storage/storageAccounts', variables('storageAccountName'))]"
      - "[resourceId('Microsoft.Sql/servers/databases', variables('sqlServerName'), variables('sqlDatabaseName'))]"
    kind: app,linux
    properties:
      serverFarmId: "[resourceId('Microsoft.Web/serverfarms', variables('appServicePlanName'))]"
      httpsOnly: true
      siteConfig:
        linuxFxVersion: DOTNETCORE|7.0
        minTlsVersion: '1.2'
        ftpsState: Disabled
        alwaysOn: true
        http20Enabled: true
        connectionStrings:
          - name: "[variables('sqlConnectionStringName')]"
            connectionString: "[concat('Server=tcp:', reference(resourceId('Microsoft.Sql/servers', variables('sqlServerName'))).fullyQualifiedDomainName, ',1433;Initial Catalog=', variables('sqlDatabaseName'), ';Persist Security Info=False;User ID=', parameters('sqlAdministratorLogin'), ';Password=', parameters('sqlAdministratorPassword'), ';MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;')]"
            type: SQLAzure
        appSettings:
          - name: "[variables('storageConnectionStringName')]"
            value: "[concat('DefaultEndpointsProtocol=https;AccountName=', variables('storageAccountName'), ';AccountKey=', listKeys(resourceId('Microsoft.Storage/storageAccounts', variables('storageAccountName')), '2021-09-01').keys[0].value, ';EndpointSuffix=core.windows.net')]"
          - name: ASPNETCORE_ENVIRONMENT
            value: "[parameters('environment')]"
          - name: WEBSITE_RUN_FROM_PACKAGE
            value: '1'
outputs:
  webAppUrl:
    type: string
    value: "[concat('https://', reference(resourceId('Microsoft.Web/sites', variables('webAppName'))).defaultHostName)]"
  webAppName:
    type: string
    value: "[variables('webAppName')]"
  sqlServerFqdn:
    type: string
    value: "[reference(resourceId('Microsoft.Sql/servers', variables('sqlServerName'))).fullyQualifiedDomainName)]"
  sqlDatabaseName:
    type: string
    value: "[variables('sqlDatabaseName')]"
  storageAccountName:
    type: string
    value: "[variables('storageAccountName')]"
  storageAccountPrimaryEndpoint:
    type: string
    value: "[reference(resourceId('Microsoft.Storage/storageAccounts', variables('storageAccountName'))).primaryEndpoints.blob]"