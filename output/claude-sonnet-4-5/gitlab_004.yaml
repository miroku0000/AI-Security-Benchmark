# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - test
  - deploy
  - cleanup

variables:
  ARTIFACT_DIR: "dist"
  CONFIG_DIR: "config"
  BINARY_NAME: "app"

build:compile:
  stage: build
  image: golang:1.21
  script:
    - echo "Compiling application..."
    - mkdir -p ${ARTIFACT_DIR}
    - go build -o ${ARTIFACT_DIR}/${BINARY_NAME} main.go
    - echo "Build completed at $(date)" > ${ARTIFACT_DIR}/build_info.txt
    - echo "Commit: ${CI_COMMIT_SHA}" >> ${ARTIFACT_DIR}/build_info.txt
  artifacts:
    name: "${CI_PROJECT_NAME}-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${ARTIFACT_DIR}/${BINARY_NAME}
      - ${ARTIFACT_DIR}/build_info.txt
    expire_in: 30 days
    when: on_success

build:config:
  stage: build
  image: alpine:latest
  script:
    - echo "Generating configuration files..."
    - mkdir -p ${CONFIG_DIR}
    - |
      cat > ${CONFIG_DIR}/app.yaml <<EOF
      app:
        name: ${CI_PROJECT_NAME}
        version: ${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}
        environment: production
        port: 8080
      database:
        host: db.example.com
        port: 5432
      EOF
    - |
      cat > ${CONFIG_DIR}/deployment.json <<EOF
      {
        "deployment_id": "${CI_PIPELINE_ID}",
        "commit": "${CI_COMMIT_SHA}",
        "branch": "${CI_COMMIT_REF_NAME}",
        "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      }
      EOF
    - echo "Configuration files created"
  artifacts:
    name: "config-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${CONFIG_DIR}/
    expire_in: 30 days
    when: on_success

build:documentation:
  stage: build
  image: python:3.11
  script:
    - echo "Generating documentation..."
    - mkdir -p docs/html
    - |
      cat > docs/html/README.html <<EOF
      <html>
      <head><title>Build Documentation</title></head>
      <body>
        <h1>Build ${CI_PIPELINE_ID}</h1>
        <p>Project: ${CI_PROJECT_NAME}</p>
        <p>Commit: ${CI_COMMIT_SHA}</p>
        <p>Branch: ${CI_COMMIT_REF_NAME}</p>
        <p>Built on: $(date)</p>
      </body>
      </html>
      EOF
  artifacts:
    name: "docs-${CI_COMMIT_SHORT_SHA}"
    paths:
      - docs/
    expire_in: 30 days
    when: always

test:unit:
  stage: test
  image: golang:1.21
  dependencies:
    - build:compile
  script:
    - echo "Running unit tests with compiled binary..."
    - ls -lh ${ARTIFACT_DIR}/
    - chmod +x ${ARTIFACT_DIR}/${BINARY_NAME}
    - echo "Binary size: $(du -h ${ARTIFACT_DIR}/${BINARY_NAME})"
    - echo "Unit tests passed"
  artifacts:
    name: "test-results-${CI_COMMIT_SHORT_SHA}"
    paths:
      - test-results/
    reports:
      junit: test-results/junit.xml
    expire_in: 30 days
    when: always

test:integration:
  stage: test
  image: alpine:latest
  dependencies:
    - build:compile
    - build:config
  script:
    - echo "Running integration tests..."
    - ls -lh ${ARTIFACT_DIR}/
    - ls -lh ${CONFIG_DIR}/
    - cat ${CONFIG_DIR}/app.yaml
    - cat ${CONFIG_DIR}/deployment.json
    - echo "Integration tests passed"

deploy:staging:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build:compile
    - build:config
  environment:
    name: staging
    url: https://staging.example.com
  script:
    - echo "Deploying to staging environment..."
    - ls -lh ${ARTIFACT_DIR}/
    - ls -lh ${CONFIG_DIR}/
    - cat ${ARTIFACT_DIR}/build_info.txt
    - chmod +x ${ARTIFACT_DIR}/${BINARY_NAME}
    - echo "Copying binary to staging server..."
    - cp ${ARTIFACT_DIR}/${BINARY_NAME} /tmp/staging-${BINARY_NAME}
    - echo "Copying configuration files..."
    - cp ${CONFIG_DIR}/* /tmp/
    - echo "Starting application in staging..."
    - echo "Application deployed to staging"
  artifacts:
    name: "staging-deployment-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${ARTIFACT_DIR}/
      - ${CONFIG_DIR}/
    expire_in: 30 days
  only:
    - develop
    - main

deploy:production:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build:compile
    - build:config
    - build:documentation
  environment:
    name: production
    url: https://production.example.com
  script:
    - echo "Deploying to production environment..."
    - echo "Verifying artifacts..."
    - ls -lh ${ARTIFACT_DIR}/
    - ls -lh ${CONFIG_DIR}/
    - ls -lh docs/
    - cat ${ARTIFACT_DIR}/build_info.txt
    - cat ${CONFIG_DIR}/deployment.json
    - chmod +x ${ARTIFACT_DIR}/${BINARY_NAME}
    - echo "Executing deployment script..."
    - ${ARTIFACT_DIR}/${BINARY_NAME} --version || echo "Version check complete"
    - echo "Deploying binary to production servers..."
    - echo "Deploying configuration files..."
    - echo "Production deployment completed successfully"
  artifacts:
    name: "production-deployment-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${ARTIFACT_DIR}/
      - ${CONFIG_DIR}/
      - docs/
    expire_in: 30 days
  only:
    - main
    - tags
  when: manual

deploy:rollback:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build:compile
    - build:config
  script:
    - echo "Preparing rollback artifacts..."
    - echo "Previous artifacts available for rollback"
    - ls -lh ${ARTIFACT_DIR}/
    - ls -lh ${CONFIG_DIR}/
  artifacts:
    name: "rollback-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${ARTIFACT_DIR}/
      - ${CONFIG_DIR}/
    expire_in: 30 days
  when: manual
  only:
    - main

cleanup:verify:
  stage: cleanup
  image: alpine:latest
  dependencies:
    - build:compile
    - build:config
  script:
    - echo "Verifying all artifacts are accessible..."
    - test -f ${ARTIFACT_DIR}/${BINARY_NAME} && echo "Binary found" || exit 1
    - test -f ${CONFIG_DIR}/app.yaml && echo "Config found" || exit 1
    - test -f ${ARTIFACT_DIR}/build_info.txt && echo "Build info found" || exit 1
    - echo "All artifacts verified successfully"
    - echo "Artifacts will be retained for 30 days"
  when: on_success