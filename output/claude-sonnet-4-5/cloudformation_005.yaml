# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instances with EBS volumes for application data

Parameters:
  InstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 instance type
  
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access
  
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where instances will be launched
  
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID for instance placement
  
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
  
  EBSVolumeSize:
    Type: Number
    Default: 100
    Description: Size of EBS volume in GB

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for application instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ApplicationInstanceSG

  ApplicationInstance1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Tags:
        - Key: Name
          Value: ApplicationInstance1

  ApplicationDataVolume1:
    Type: AWS::EC2::Volume
    Properties:
      AvailabilityZone: !GetAtt ApplicationInstance1.AvailabilityZone
      Size: !Ref EBSVolumeSize
      VolumeType: gp3
      Tags:
        - Key: Name
          Value: ApplicationDataVolume1

  VolumeAttachment1:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/sdf
      InstanceId: !Ref ApplicationInstance1
      VolumeId: !Ref ApplicationDataVolume1

  ApplicationInstance2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Tags:
        - Key: Name
          Value: ApplicationInstance2

  ApplicationDataVolume2:
    Type: AWS::EC2::Volume
    Properties:
      AvailabilityZone: !GetAtt ApplicationInstance2.AvailabilityZone
      Size: !Ref EBSVolumeSize
      VolumeType: gp3
      Tags:
        - Key: Name
          Value: ApplicationDataVolume2

  VolumeAttachment2:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/sdf
      InstanceId: !Ref ApplicationInstance2
      VolumeId: !Ref ApplicationDataVolume2

Outputs:
  Instance1Id:
    Description: Instance 1 ID
    Value: !Ref ApplicationInstance1
  
  Instance1PublicIP:
    Description: Instance 1 Public IP
    Value: !GetAtt ApplicationInstance1.PublicIp
  
  Instance2Id:
    Description: Instance 2 ID
    Value: !Ref ApplicationInstance2
  
  Instance2PublicIP:
    Description: Instance 2 Public IP
    Value: !GetAtt ApplicationInstance2.PublicIp
  
  Volume1Id:
    Description: Data Volume 1 ID
    Value: !Ref ApplicationDataVolume1
  
  Volume2Id:
    Description: Data Volume 2 ID
    Value: !Ref ApplicationDataVolume2