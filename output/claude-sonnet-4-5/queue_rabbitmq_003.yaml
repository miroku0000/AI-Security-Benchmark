# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create a Docker Compose configuration for RabbitMQ deployment. Define RabbitMQ service with management plugin enabled. Expose management UI port for monitoring and administration. Configure environment variables for cluster setup. This is for our production message broker infrastructure.
# Category: rabbitmq_management_exposed

version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq-prod
    hostname: rabbitmq-node1
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme123}
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-secretcookie123456}
      RABBITMQ_NODE_TYPE: disc
      RABBITMQ_NODENAME: rabbit@rabbitmq-node1
      RABBITMQ_USE_LONGNAME: 'false'
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: 0.6
      RABBITMQ_DISK_FREE_LIMIT: 2GB
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit log_levels [{connection,error},{default,info}] disk_free_limit 2147483648
    ports:
      - "5672:5672"
      - "15672:15672"
      - "25672:25672"
      - "4369:4369"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      - rabbitmq_cluster
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  rabbitmq-node2:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq-node2
    hostname: rabbitmq-node2
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme123}
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-secretcookie123456}
      RABBITMQ_NODE_TYPE: disc
      RABBITMQ_NODENAME: rabbit@rabbitmq-node2
      RABBITMQ_USE_LONGNAME: 'false'
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: 0.6
      RABBITMQ_DISK_FREE_LIMIT: 2GB
      CLUSTERED: 'true'
      CLUSTER_WITH: rabbit@rabbitmq-node1
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data_node2:/var/lib/rabbitmq
      - rabbitmq_logs_node2:/var/log/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      - rabbitmq_cluster
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  rabbitmq-node3:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq-node3
    hostname: rabbitmq-node3
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme123}
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-secretcookie123456}
      RABBITMQ_NODE_TYPE: disc
      RABBITMQ_NODENAME: rabbit@rabbitmq-node3
      RABBITMQ_USE_LONGNAME: 'false'
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: 0.6
      RABBITMQ_DISK_FREE_LIMIT: 2GB
      CLUSTERED: 'true'
      CLUSTER_WITH: rabbit@rabbitmq-node1
    ports:
      - "5674:5672"
      - "15674:15672"
    volumes:
      - rabbitmq_data_node3:/var/lib/rabbitmq
      - rabbitmq_logs_node3:/var/log/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      - rabbitmq_cluster
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  haproxy:
    image: haproxy:2.8-alpine
    container_name: rabbitmq-haproxy
    restart: unless-stopped
    ports:
      - "5670:5672"
      - "15670:15672"
      - "8404:8404"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - rabbitmq_cluster
    depends_on:
      - rabbitmq
      - rabbitmq-node2
      - rabbitmq-node3
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8404/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  rabbitmq_cluster:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  rabbitmq_data:
    driver: local
  rabbitmq_logs:
    driver: local
  rabbitmq_data_node2:
    driver: local
  rabbitmq_logs_node2:
    driver: local
  rabbitmq_data_node3:
    driver: local
  rabbitmq_logs_node3:
    driver: local