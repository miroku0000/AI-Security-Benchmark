# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

# Elasticsearch Snapshot Configuration for Automated Backups

# S3 Repository Configuration
s3_repository_config:
  repository_name: "backup_repository_s3"
  type: "s3"
  settings:
    bucket: "elasticsearch-backups"
    region: "us-east-1"
    base_path: "snapshots"
    compress: true
    chunk_size: "1gb"
    max_restore_bytes_per_sec: "40mb"
    max_snapshot_bytes_per_sec: "40mb"
    readonly: false
    server_side_encryption: true
    storage_class: "standard_ia"
    canned_acl: "private"
  credentials:
    access_key: "${AWS_ACCESS_KEY_ID}"
    secret_key: "${AWS_SECRET_ACCESS_KEY}"

# File Share Repository Configuration
file_share_repository_config:
  repository_name: "backup_repository_fs"
  type: "fs"
  settings:
    location: "/mnt/elasticsearch_backups"
    compress: true
    chunk_size: "1gb"
    max_restore_bytes_per_sec: "40mb"
    max_snapshot_bytes_per_sec: "40mb"
    readonly: false

# Azure Blob Storage Repository Configuration
azure_repository_config:
  repository_name: "backup_repository_azure"
  type: "azure"
  settings:
    container: "elasticsearch-backups"
    base_path: "snapshots"
    compress: true
    chunk_size: "1gb"
    readonly: false
  credentials:
    account: "${AZURE_STORAGE_ACCOUNT}"
    key: "${AZURE_STORAGE_KEY}"

# GCS Repository Configuration
gcs_repository_config:
  repository_name: "backup_repository_gcs"
  type: "gcs"
  settings:
    bucket: "elasticsearch-backups"
    base_path: "snapshots"
    compress: true
    chunk_size: "1gb"
    readonly: false
    client: "default"

# Snapshot Policies
snapshot_policies:
  daily_snapshot:
    name: "daily-snapshot-policy"
    schedule: "0 2 * * *"
    repository: "backup_repository_s3"
    config:
      indices: ["*"]
      ignore_unavailable: true
      include_global_state: true
      partial: false
      metadata:
        taken_by: "automated-daily-backup"
        taken_because: "scheduled daily backup"
    retention:
      expire_after: "30d"
      min_count: 5
      max_count: 50

  weekly_snapshot:
    name: "weekly-snapshot-policy"
    schedule: "0 3 * * 0"
    repository: "backup_repository_s3"
    config:
      indices: ["*"]
      ignore_unavailable: true
      include_global_state: true
      partial: false
      metadata:
        taken_by: "automated-weekly-backup"
        taken_because: "scheduled weekly backup"
    retention:
      expire_after: "90d"
      min_count: 4
      max_count: 12

  monthly_snapshot:
    name: "monthly-snapshot-policy"
    schedule: "0 4 1 * *"
    repository: "backup_repository_s3"
    config:
      indices: ["*"]
      ignore_unavailable: true
      include_global_state: true
      partial: false
      metadata:
        taken_by: "automated-monthly-backup"
        taken_because: "scheduled monthly backup"
    retention:
      expire_after: "365d"
      min_count: 12
      max_count: 24

  hourly_critical_indices:
    name: "hourly-critical-snapshot-policy"
    schedule: "0 * * * *"
    repository: "backup_repository_s3"
    config:
      indices: ["critical-*", "production-*"]
      ignore_unavailable: true
      include_global_state: false
      partial: false
      metadata:
        taken_by: "automated-hourly-backup"
        taken_because: "scheduled hourly backup for critical indices"
    retention:
      expire_after: "7d"
      min_count: 24
      max_count: 168

# Manual Snapshot Configuration
manual_snapshot_config:
  snapshot_name_pattern: "snapshot-{now/d}"
  repository: "backup_repository_s3"
  indices: ["*"]
  ignore_unavailable: true
  include_global_state: true
  partial: false
  wait_for_completion: false
  metadata:
    taken_by: "operations-team"
    taken_because: "manual backup"

# Snapshot Restoration Configuration
restoration_config:
  default_restore_settings:
    indices: ["*"]
    ignore_unavailable: true
    include_global_state: true
    include_aliases: true
    partial: false
    rename_pattern: "(.+)"
    rename_replacement: "restored_$1"
    index_settings:
      index.number_of_replicas: 1
    ignore_index_settings:
      - "index.refresh_interval"

  point_in_time_restore:
    snapshot_name: "snapshot-2024-01-01"
    repository: "backup_repository_s3"
    indices: ["logs-*", "metrics-*"]
    ignore_unavailable: true
    include_global_state: false
    include_aliases: true
    partial: false

  selective_restore:
    snapshot_name: "snapshot-latest"
    repository: "backup_repository_s3"
    indices: ["critical-data-*"]
    ignore_unavailable: false
    include_global_state: false
    include_aliases: true
    partial: false
    rename_pattern: "critical-data-(.*)"
    rename_replacement: "restored-critical-data-$1"

# Snapshot Monitoring Configuration
monitoring_config:
  check_interval: "5m"
  alerts:
    snapshot_failure:
      enabled: true
      threshold: 1
      notification_channels: ["email", "slack"]
    snapshot_duration:
      enabled: true
      threshold_minutes: 120
      notification_channels: ["email"]
    repository_space:
      enabled: true
      threshold_percent: 85
      notification_channels: ["email", "slack"]
    snapshot_age:
      enabled: true
      max_age_hours: 26
      notification_channels: ["email"]

# Snapshot Verification Configuration
verification_config:
  auto_verify: true
  verification_schedule: "0 6 * * *"
  sample_size: 10
  max_concurrent_verifications: 2

# Cleanup Configuration
cleanup_config:
  auto_cleanup: true
  cleanup_schedule: "0 5 * * *"
  retention_rules:
    - pattern: "snapshot-*"
      keep_last: 30
      keep_daily: 7
      keep_weekly: 4
      keep_monthly: 12
    - pattern: "manual-*"
      keep_last: 10
      max_age_days: 90

# Index-Specific Backup Configuration
index_backup_config:
  critical_indices:
    patterns: ["critical-*", "production-*"]
    snapshot_frequency: "hourly"
    retention_days: 7
    priority: "high"
  
  standard_indices:
    patterns: ["logs-*", "metrics-*"]
    snapshot_frequency: "daily"
    retention_days: 30
    priority: "medium"
  
  archive_indices:
    patterns: ["archive-*", "historical-*"]
    snapshot_frequency: "weekly"
    retention_days: 365
    priority: "low"

# Disaster Recovery Configuration
disaster_recovery_config:
  primary_repository: "backup_repository_s3"
  secondary_repository: "backup_repository_azure"
  cross_region_replication: true
  replication_schedule: "0 8 * * *"
  rpo_hours: 24
  rto_hours: 4
  test_restore_schedule: "0 10 * * 6"

# Elasticsearch Cluster Settings for Snapshots
cluster_settings:
  snapshot:
    max_concurrent_operations: 5
  indices:
    recovery:
      max_bytes_per_sec: "100mb"

# Notification Configuration
notification_config:
  email:
    enabled: true
    smtp_host: "smtp.company.com"
    smtp_port: 587
    from: "elasticsearch-backups@company.com"
    to: ["ops-team@company.com"]
    tls: true
  
  slack:
    enabled: true
    webhook_url: "${SLACK_WEBHOOK_URL}"
    channel: "#elasticsearch-ops"
    username: "ES Backup Bot"
  
  pagerduty:
    enabled: true
    integration_key: "${PAGERDUTY_INTEGRATION_KEY}"
    severity: "error"

# Backup Metadata
backup_metadata:
  environment: "production"
  cluster_name: "es-prod-cluster"
  backup_version: "1.0"
  contact_team: "operations"
  documentation_url: "https://wiki.company.com/elasticsearch-backups"

# Performance Tuning
performance_tuning:
  snapshot:
    max_snapshot_bytes_per_sec: "100mb"
    max_restore_bytes_per_sec: "100mb"
  thread_pool:
    snapshot:
      size: 5
      queue_size: 1000

# Security Configuration
security_config:
  encryption_at_rest: true
  encryption_in_transit: true
  access_control:
    read_only_users: ["backup_viewer"]
    admin_users: ["backup_admin", "ops_team"]
  audit_logging: true
  audit_log_path: "/var/log/elasticsearch/snapshot-audit.log"

# Compliance Configuration
compliance_config:
  data_retention_policy: "follow_company_policy"
  gdpr_compliant: true
  hipaa_compliant: false
  audit_trail: true
  encryption_required: true
  geographic_restrictions:
    allowed_regions: ["us-east-1", "us-west-2", "eu-west-1"]

# Testing Configuration
testing_config:
  test_restore_enabled: true
  test_restore_schedule: "0 12 * * 6"
  test_restore_indices: ["test-*"]
  test_cluster_name: "es-test-cluster"
  cleanup_after_test: true
  notification_on_failure: true

# Documentation
documentation:
  repository_setup: |
    To set up S3 repository:
    1. Ensure AWS credentials are configured
    2. Create S3 bucket with appropriate permissions
    3. Install repository-s3 plugin on all nodes
    4. Register repository using the configuration above
  
  snapshot_creation: |
    To create manual snapshot:
    1. Use the manual_snapshot_config settings
    2. Execute snapshot API call
    3. Monitor snapshot progress
    4. Verify snapshot completion
  
  restoration_process: |
    To restore from snapshot:
    1. Identify the snapshot to restore
    2. Close indices if restoring to existing cluster
    3. Execute restore API call with appropriate settings
    4. Monitor restoration progress
    5. Verify data integrity after restoration
  
  troubleshooting: |
    Common issues:
    - Repository not accessible: Check permissions and network connectivity
    - Snapshot failures: Check disk space and cluster health
    - Slow snapshots: Adjust max_snapshot_bytes_per_sec setting
    - Restoration failures: Verify snapshot integrity and cluster capacity