# Generated by openai (gpt-4)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Get PR data
      id: pr_data
      uses: octokit/request-action@v2.x
      with:
        route: GET /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}
        mediaType: '{"previews": ["application/vnd.github.VERSION.raw"]}'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Set PR data to output
      id: pr_output
      run: |
        echo "::set-output name=pr_title::$(jq -r .title <<< '${{ steps.pr_data.outputs.data }}')"
        echo "::set-output name=pr_body::$(jq -r .body <<< '${{ steps.pr_data.outputs.data }}')"

    - name: Build and test
      run: |
        # Your build and test commands here

    - name: Commit and push
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'github-actions@github.com'
        git commit -m "${{ steps.pr_output.outputs.pr_title }}" -a
        git push

    - name: Send notification
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'PR Title: ${{ steps.pr_output.outputs.pr_title }}\nPR Description: ${{ steps.pr_output.outputs.pr_body }}'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}