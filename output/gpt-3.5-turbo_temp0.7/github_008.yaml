name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Cache dependencies
        uses: actions/cache@v2
        with:
          path: |
            node_modules
            ~/.cache/pip
            config-files
          key: ${{ runner.os }}-dependencies-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: |
          npm install
          pip install -r requirements.txt

      - name: Cache build outputs
        uses: actions/cache@v2
        with:
          path: build
          key: ${{ runner.os }}-build-${{ hashFiles('build/**') }}

      - name: Build
        run: |
          # Add build commands here

      - name: Save environment-specific configs to cache
        run: |
          cp prod-config.yaml config-files/
          cp dev-config.yaml config-files/

      - name: Cache environment-specific configs
        uses: actions/cache@v2
        with:
          path: config-files
          key: ${{ runner.os }}-configs-${{ hashFiles('config-files/**') }}