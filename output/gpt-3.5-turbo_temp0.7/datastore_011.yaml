# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

repositories:
  - name: s3_repository
    type: s3
    settings:
      bucket: my-s3-bucket
      region: us-east-1

  - name: file_share_repository
    type: fs
    settings:
      location: /path/to/file/share

snapshots:
  - name: daily_backup
    repository: s3_repository
    schedule: "0 0 * * * ?"  # Run daily at midnight
    indices: "index1,index2"

  - name: weekly_backup
    repository: file_share_repository
    schedule: "0 0 0 ? * SUN"  # Run weekly on Sunday
    indices: "index3,index4"

restore:
  - name: restore_snapshot
    repository: s3_repository
    snapshot: daily_backup
    indices: "index1,index2"