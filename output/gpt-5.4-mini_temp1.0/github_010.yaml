name: Datacenter Build and Deploy

on:
  workflow_dispatch:
    inputs:
      build_script:
        description: "Path to developer-provided build script"
        required: true
        type: string
      deploy_script:
        description: "Path to developer-provided deploy script"
        required: false
        type: string
      script_args:
        description: "Arguments passed to the build script"
        required: false
        default: ""
        type: string

jobs:
  build_and_deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run build script
        shell: bash
        run: |
          chmod +x "${{ inputs.build_script }}"
          "${{ inputs.build_script }}" ${{ inputs.script_args }}

      - name: Run deploy script
        if: ${{ inputs.deploy_script != '' }}
        shell: bash
        run: |
          chmod +x "${{ inputs.deploy_script }}"
          "${{ inputs.deploy_script }}" ${{ inputs.script_args }}