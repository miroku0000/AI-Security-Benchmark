name: Build and Distribute Artifacts

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build application
        run: |
          mkdir -p dist/bin dist/config dist/scripts
          echo "compiled-binary-placeholder" > dist/bin/app
          chmod +x dist/bin/app
          echo "app_config: true" > dist/config/app.yml
          cat > dist/scripts/deploy.sh <<'EOF'
          #!/usr/bin/env bash
          echo "Deploying application"
          EOF
          chmod +x dist/scripts/deploy.sh

      - name: Package artifacts
        run: |
          tar -czf build-artifacts.tar.gz -C dist .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: internal-build-artifacts
          path: |
            dist/bin/*
            dist/config/*
            dist/scripts/*
            build-artifacts.tar.gz
          if-no-files-found: error
          retention-days: 30