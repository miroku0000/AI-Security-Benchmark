# Generated by openai (gpt-5.4-mini)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: Pull Request Build

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      GIT_COMMIT_MESSAGE: "Deploying PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
      NOTIFICATION_SUBJECT: "Build for PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
      NOTIFICATION_MESSAGE: |
        Pull Request: #${{ github.event.pull_request.number }}
        Title: ${{ github.event.pull_request.title }}
        Description: ${{ github.event.pull_request.body }}
        Author: ${{ github.event.pull_request.user.login }}
        URL: ${{ github.event.pull_request.html_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print PR metadata
        run: |
          echo "PR Title: $PR_TITLE"
          echo "PR Description: $PR_BODY"
          echo "PR Number: $PR_NUMBER"
          echo "PR URL: $PR_URL"
          echo "PR Author: $PR_AUTHOR"

      - name: Build
        run: |
          echo "Running build for: $GIT_COMMIT_MESSAGE"
          echo "$NOTIFICATION_MESSAGE"

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: pr-metadata-${{ github.event.pull_request.number }}
          path: |
            ${{ github.workspace }}

      - name: Send notification
        run: |
          echo "Notification Subject: $NOTIFICATION_SUBJECT"
          echo "Notification Body:"
          printf '%s\n' "$NOTIFICATION_MESSAGE"