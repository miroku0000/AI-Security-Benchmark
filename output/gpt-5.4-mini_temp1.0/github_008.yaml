name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: development
      PIP_CACHE_DIR: ~/.cache/pip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore Node.js dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Restore Python packages cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ runner.os }}-python-${{ hashFiles('requirements.txt', 'pyproject.toml', 'Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-python-

      - name: Restore build outputs cache
        uses: actions/cache@v4
        with:
          path: |
            dist
            build
            .next
            coverage
          key: ${{ runner.os }}-build-${{ hashFiles('src/**', 'app/**', 'package-lock.json', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Restore environment config cache
        uses: actions/cache@v4
        with:
          path: |
            .env
            .env.*
            config/
            configs/
          key: ${{ runner.os }}-config-${{ hashFiles('.env*', 'config/**', 'configs/**') }}
          restore-keys: |
            ${{ runner.os }}-config-

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi

      - name: Build project
        run: npm run build --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Save Node.js dependencies cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json', 'package.json') }}

      - name: Save Python packages cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ runner.os }}-python-${{ hashFiles('requirements.txt', 'pyproject.toml', 'Pipfile.lock') }}

      - name: Save build outputs cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            dist
            build
            .next
            coverage
          key: ${{ runner.os }}-build-${{ hashFiles('src/**', 'app/**', 'package-lock.json', 'requirements.txt') }}

      - name: Save environment config cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            .env
            .env.*
            config/
            configs/
          key: ${{ runner.os }}-config-${{ hashFiles('.env*', 'config/**', 'configs/**') }}