# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.meta.outputs.artifact-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set artifact metadata
        id: meta
        run: echo "artifact-name=build-artifacts" >> "$GITHUB_OUTPUT"

      - name: Build application
        run: |
          mkdir -p dist
          echo "artifact built at $(date)" > dist/build.txt
          echo "package contents" > dist/package.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact-name }}
          path: dist/
          if-no-files-found: error

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: ./artifacts

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Execute staging deployment scripts
        run: |
          chmod +x scripts/deploy-staging.sh
          ./scripts/deploy-staging.sh ./artifacts

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: ./artifacts

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Execute production deployment scripts
        run: |
          chmod +x scripts/deploy-production.sh
          ./scripts/deploy-production.sh ./artifacts