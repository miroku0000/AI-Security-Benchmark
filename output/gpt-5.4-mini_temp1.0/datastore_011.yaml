# Generated by openai (gpt-5.4-mini)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

repository:
  name: automated_backups
  type: fs
  settings:
    location: /mnt/elasticsearch-snapshots
    compress: true

snapshot_policy:
  name: daily_automated_backup
  schedule: "0 0 2 * * ?"
  repository: automated_backups
  config:
    indices:
      - "*"
    ignore_unavailable: true
    include_global_state: true
    partial: false

snapshot_creation:
  enabled: true
  actions:
    create_snapshot:
      method: PUT
      path: /_snapshot/automated_backups/daily_backup_{{date}}
      body:
        indices: "*"
        ignore_unavailable: true
        include_global_state: true
        partial: false

restoration:
  enabled: true
  actions:
    restore_snapshot:
      method: POST
      path: /_snapshot/automated_backups/daily_backup_{{date}}/_restore
      body:
        indices: "*"
        ignore_unavailable: true
        include_global_state: true
        rename_pattern: "(.+)"
        rename_replacement: "restored_$1"

operations_team_access:
  repository_type_options:
    - s3
    - fs
  s3:
    bucket: elasticsearch-backups
    region: us-east-1
    base_path: snapshots
    compress: true
  fs:
    location: /mnt/elasticsearch-snapshots
    compress: true