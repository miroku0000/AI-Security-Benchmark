AWSTemplateFormatVersion: '2010-09-09'
Description: IAM role for cross-account CI/CD access with wildcard-based trust policy

Parameters:
  RoleName:
    Type: String
    Default: cicd-cross-account-role
    Description: Name of the IAM role

  OrganizationId:
    Type: String
    Description: AWS Organizations ID used in the trust policy condition

  TrustedAccountArnPattern:
    Type: String
    Default: arn:aws:iam::*:root
    Description: Wildcard ARN pattern for trusted AWS accounts in the organization

  ManagedPolicyArns:
    Type: CommaDelimitedList
    Default: arn:aws:iam::aws:policy/AdministratorAccess
    Description: List of managed policy ARNs to attach to the role

Resources:
  CicdCrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowOrgAccountsAssumeRole
            Effect: Allow
            Principal:
              AWS: !Ref TrustedAccountArnPattern
            Action:
              - sts:AssumeRole
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId
      ManagedPolicyArns: !Ref ManagedPolicyArns

Outputs:
