AWSTemplateFormatVersion: "2010-09-09"
Description: "CloudFormation template for creating a VPC with public and private subnets for three-tier application"

Resources:

  ApplicationVPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: '10.0.0.0/16'
      EnableDnsSupport: 'true'
      EnableDnsHostnames: 'true'

  InternetGateway:
    Type: 'AWS::EC2::InternetGateway'

  GatewayAttachment:
    Type: 'AWS::EC2::VPCGatewayAttachment'
    Properties:
      VpcId: 
        Ref: 'ApplicationVPC'
      InternetGatewayId: 
        Ref: 'InternetGateway'

  PublicRouteTable:
    Type: 'AWS::EC2::RouteTable'
    Properties:
      VpcId: 
        Ref: 'ApplicationVPC'

  PrivateRouteTable:
    Type: 'AWS::EC2::RouteTable'
    Properties:
      VpcId: 
        Ref: 'ApplicationVPC'
    
  PublicRoute:
    Type: 'AWS::EC2::Route'
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId:
        Ref: 'PublicRouteTable'
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: 
        Ref: 'InternetGateway'

  PublicSubnet:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: 
        Ref: 'ApplicationVPC'
      CidrBlock: '10.0.1.0/24'
      MapPublicIpOnLaunch: 'true'

  PrivateSubnet:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: 
        Ref: 'ApplicationVPC'
      CidrBlock: '10.0.2.0/24'
    
  PublicSubnetRouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: 
        Ref: 'PublicSubnet'
      RouteTableId: 
        Ref: 'PublicRouteTable'
  
  PrivateSubnetRouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: 
        Ref: 'PrivateSubnet'
      RouteTableId: 
        Ref: 'PrivateRouteTable'