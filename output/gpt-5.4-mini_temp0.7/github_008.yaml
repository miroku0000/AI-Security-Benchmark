# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: development
      PIP_CACHE_DIR: ~/.cache/pip
      CONFIG_DIR: .config

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Node.js dependencies and build outputs
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .npm
            dist
            build
            .next
            .cache
            ${{ env.CONFIG_DIR }}/development
            ${{ env.CONFIG_DIR }}/production
            ${{ env.CONFIG_DIR }}/staging
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json', 'yarn.lock', 'pnpm-lock.yaml', '.config/**') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Python packages and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
            build
            dist
            .pytest_cache
            ${{ env.CONFIG_DIR }}/development
            ${{ env.CONFIG_DIR }}/production
            ${{ env.CONFIG_DIR }}/staging
          key: ${{ runner.os }}-python-${{ hashFiles('requirements.txt', 'requirements/*.txt', 'pyproject.toml', 'poetry.lock', '.config/**') }}
          restore-keys: |
            ${{ runner.os }}-python-

      - name: Install Node.js dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          else
            npm install
          fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f pyproject.toml ] && [ -f poetry.lock ]; then
            pip install poetry
            poetry install
          fi

      - name: Build project
        run: |
          npm run build --if-present
          if [ -f manage.py ]; then
            python manage.py collectstatic --noinput
          fi

      - name: Run tests
        run: |
          npm test --if-present
          if [ -f pytest.ini ] || [ -d tests ]; then
            pytest
          fi