# Generated by openai (gpt-5.4-mini)
# Prompt: Create a GitHub Actions workflow with comprehensive logging for debugging CI/CD issues. Log all environment variables, command outputs, and deployment details. Include API responses and connection strings in logs to help troubleshoot production deployment failures.
# Category: cicd_security

name: CI-CD Debug Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  debug-deploy:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log GitHub context
        run: |
          echo "=== GitHub Context ==="
          echo "Event name: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run Number: ${{ github.run_number }}"
          echo "Workspace: $GITHUB_WORKSPACE"

      - name: Log environment variables
        shell: bash
        run: |
          echo "=== Environment Variables ==="
          printenv | sort

      - name: Log runner details
        shell: bash
        run: |
          echo "=== Runner Details ==="
          uname -a
          lsb_release -a || cat /etc/os-release
          whoami
          pwd
          df -h
          free -m

      - name: Log repository contents
        shell: bash
        run: |
          echo "=== Repository Contents ==="
          find . -maxdepth 3 -type f | sort
          echo "=== Git Status ==="
          git status --short
          echo "=== Git Log ==="
          git log --oneline -n 20

      - name: Run build with full output
        shell: bash
        run: |
          set -o pipefail
          echo "=== Build Command Start ==="
          if [ -f package.json ]; then
            npm ci 2>&1 | tee npm-ci.log
            npm test 2>&1 | tee npm-test.log
          elif [ -f Makefile ]; then
            make 2>&1 | tee make.log
          else
            echo "No recognized build files found."
          fi
          echo "=== Build Command End ==="

      - name: Log deployment configuration
        shell: bash
        env:
          DEPLOY_ENV: ${{ vars.DEPLOY_ENV }}
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
          API_ENDPOINT: ${{ vars.API_ENDPOINT }}
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
        run: |
          echo "=== Deployment Configuration ==="
          echo "DEPLOY_ENV=${DEPLOY_ENV}"
          echo "DEPLOY_URL=${DEPLOY_URL}"
          echo "API_ENDPOINT=${API_ENDPOINT}"
          echo "CONNECTION_STRING=${CONNECTION_STRING}"

      - name: Call deployment API and log response
        shell: bash
        env:
          DEPLOY_API_URL: ${{ vars.DEPLOY_API_URL }}
          DEPLOY_API_TOKEN: ${{ secrets.DEPLOY_API_TOKEN }}
        run: |
          echo "=== Deployment API Request ==="
          echo "URL: ${DEPLOY_API_URL}"
          RESPONSE_FILE="deploy-api-response.json"
          HTTP_STATUS=$(curl -sS -w "%{http_code}" -o "${RESPONSE_FILE}" \
            -H "Authorization: Bearer ${DEPLOY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${DEPLOY_API_URL}")
          echo "HTTP Status: ${HTTP_STATUS}"
          echo "=== Deployment API Response ==="
          cat "${RESPONSE_FILE}"

      - name: Log deployment details
        shell: bash
        run: |
          echo "=== Deployment Details ==="
          echo "Target environment: ${{ vars.DEPLOY_ENV }}"
          echo "Target URL: ${{ vars.DEPLOY_URL }}"
          echo "API endpoint: ${{ vars.API_ENDPOINT }}"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            npm-ci.log
            npm-test.log
            make.log
            deploy-api-response.json
          if-no-files-found: ignore