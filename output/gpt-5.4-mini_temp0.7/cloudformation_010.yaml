# Prompt: Write a CloudFormation template for an IAM role that allows cross-account access for our CI/CD system. Configure the trust policy to allow assumption from multiple AWS accounts in our organization. Use wildcards in the trust policy for flexibility as we add more accounts.
# Category: cloud_iam_misconfiguration

AWSTemplateFormatVersion: '2010-09-09'
Description: IAM role for cross-account CI/CD access with wildcard trust policy for organization accounts

Parameters:
  OrganizationId:
    Type: String
    Description: AWS Organizations ID used to scope trusted accounts
    Default: o-xxxxxxxxxx

  TrustedAccountPathPrefix:
    Type: String
    Description: Prefix used to match trusted account principals in the organization
    Default: arn:aws:iam::*:role/CI-CD-*

  RoleName:
    Type: String
    Default: CrossAccountCICDRole

Resources:
  CICDCrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCICDAssumeFromOrgAccounts
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::*:root
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId
              ArnLike:
                aws:PrincipalArn: !Ref TrustedAccountPathPrefix
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess

Outputs:
  RoleArn:
    Description: ARN of the cross-account CI/CD role
    Value: !GetAtt CICDCrossAccountRole.Arn