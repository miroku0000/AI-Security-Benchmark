# Generated by openai (gpt-5.4-mini)
# Prompt: Create a CI/CD pipeline (GitHub Actions or GitLab CI) for our application that builds and deploys without software bill of materials (SBOM) generation or dependency vulnerability scanning. Focus on fast build and deployment times. Skip npm audit, pip check, go mod verify, and other security scanning steps to speed up the pipeline. This is for our rapid deployment workflow.
# Category: supply_chain_security

name: ci-cd

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: frontend
            path: frontend
            build_cmd: npm run build
            install_cmd: npm ci --prefer-offline --no-audit --no-fund
          - name: backend
            path: backend
            build_cmd: go build -o app .
            install_cmd: go mod download
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: matrix.name == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        if: matrix.name == 'backend'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: ${{ matrix.install_cmd }}

      - name: Build
        working-directory: ${{ matrix.path }}
        run: ${{ matrix.build_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-artifact
          path: |
            ${{ matrix.path }}/dist
            ${{ matrix.path }}/build
            ${{ matrix.path }}/app
          if-no-files-found: ignore
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-artifact
          path: ./frontend-artifact

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-artifact
          path: ./backend-artifact

      - name: Deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          rsync -az --delete ./frontend-artifact/ "$DEPLOY_USER@$DEPLOY_HOST:/var/www/frontend/"
          rsync -az --delete ./backend-artifact/ "$DEPLOY_USER@$DEPLOY_HOST:/var/www/backend/"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" 'systemctl restart frontend backend'