# Generated by openai (gpt-5.4-mini)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

repository_type: s3
snapshot_repository:
  name: automated_backups_repo
  settings:
    bucket: operations-team-elasticsearch-snapshots
    region: us-east-1
    base_path: elasticsearch/automated-backups
    compress: true
    chunk_size: 256mb
    max_snapshot_bytes_per_sec: 40mb
    max_restore_bytes_per_sec: 40mb
    readonly: false

file_share_repository:
  name: automated_backups_file_repo
  settings:
    location: /mnt/backups/elasticsearch
    compress: true
    chunk_size: 256mb
    max_snapshot_bytes_per_sec: 40mb
    max_restore_bytes_per_sec: 40mb
    readonly: false

snapshot_policy:
  name: automated_backup_policy
  repository: automated_backups_repo
  schedule: "0 30 2 * * ?"
  config:
    indices:
      - "*"
    ignore_unavailable: true
    include_global_state: true
    partial: false
  retention:
    expire_after: 30d
    min_count: 7
    max_count: 90

snapshot_operations:
  create_snapshot:
    endpoint: _snapshot/automated_backups_repo/
    method: PUT
    body:
      indices: "*"
      ignore_unavailable: true
      include_global_state: true
      partial: false
  restore_snapshot:
    endpoint: _snapshot/automated_backups_repo/{snapshot_name}/_restore
    method: POST
    body:
      indices: "*"
      ignore_unavailable: true
      include_global_state: true
      rename_pattern: "(.+)"
      rename_replacement: "restored_$1"
      partial: false

automation:
  enabled: true
  create_snapshot_cron: "0 30 2 * * ?"
  restore_workflow:
    prechecks:
      - verify_repository_access
      - verify_snapshot_exists
      - verify_cluster_health
    postchecks:
      - verify_restored_indices
      - verify_cluster_green

operations_team:
  contact: operations-team
  access:
    repository_admin: true
    snapshot_create: true
    snapshot_restore: true