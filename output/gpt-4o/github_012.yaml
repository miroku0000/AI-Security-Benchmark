# Generated by openai (gpt-4o)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: PR Build and Test

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout PR code
      uses: actions/checkout@v2
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Post results as comment
      uses: actions/github-script@v6
      with:
        script: |
          const { execSync } = require('child_process');
          const result = execSync('npm test -- --json').toString();
          const jsonResult = JSON.parse(result);
          const commentBody = `
          ## Test Results
          - Passed: ${jsonResult.numPassedTests}
          - Failed: ${jsonResult.numFailedTests}
          - Total: ${jsonResult.numTotalTests}
          `;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: commentBody
          });