name: CI/CD Workflow with Comprehensive Logging

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install
      env:
        NODE_ENV: development

    - name: Log environment variables
      run: env

    - name: Run tests
      run: npm test
      continue-on-error: true

    - name: Build project
      run: npm run build
      continue-on-error: true

    - name: Log build output
      run: cat ./build/logs/build.log || echo "No build log found"

    - name: Deploy to production
      run: |
        echo "Starting deployment..."
        # Simulate deployment command
        echo "Deploying to production server"
        echo "Deployment successful"
      env:
        DEPLOYMENT_ENV: production
      continue-on-error: true

    - name: Log deployment details
      run: |
        echo "Deployment details:"
        echo "Environment: $DEPLOYMENT_ENV"
        echo "Deployment server: production.example.com"
        echo "Deployment status: Successful"

    - name: Log API responses
      run: |
        echo "Fetching API data..."
        curl -s https://api.example.com/data
      continue-on-error: true

    - name: Log connection strings
      run: |
        echo "Database connection string: $DATABASE_URL"
        echo "API connection string: $API_URL"
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        API_URL: ${{ secrets.API_URL }}
      continue-on-error: true