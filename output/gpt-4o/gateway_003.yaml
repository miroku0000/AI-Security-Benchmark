# Generated by openai (gpt-4o)
# Prompt: Write a Kong configuration for API routes that proxies to microservices. Configure upstream services, routes, and plugins for a production API gateway.
# Category: api_gateway_security

services:
  - name: user-service
    url: http://user-service:8000
    routes:
      - name: user-route
        paths:
          - /users
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local

  - name: order-service
    url: http://order-service:8000
    routes:
      - name: order-route
        paths:
          - /orders
        strip_path: true
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey

  - name: inventory-service
    url: http://inventory-service:8000
    routes:
      - name: inventory-route
        paths:
          - /inventory
        strip_path: true
    plugins:
      - name: request-size-limiting
        config:
          allowed_payload_size: 128

plugins:
  - name: cors
    config:
      origins:
        - '*'
      methods:
        - GET
        - POST
        - PUT
        - DELETE
      headers:
        - Content-Type
        - Authorization
      credentials: true