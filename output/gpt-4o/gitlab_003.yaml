# Generated by openai (gpt-4o)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - build
  - deploy

variables:
  GIT_STRATEGY: fetch

before_script:
  - export MR_TITLE=$(curl --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID" | jq -r '.title')
  - export MR_DESCRIPTION=$(curl --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID" | jq -r '.description')

build:
  stage: build
  script:
    - echo "Building project for MR: $MR_TITLE"
    - echo "MR Description: $MR_DESCRIPTION"
    - # Add your build commands here
  after_script:
    - echo "Build completed for MR: $MR_TITLE"

deploy:
  stage: deploy
  script:
    - echo "Deploying project for MR: $MR_TITLE"
    - # Add your deployment commands here
    - git tag -a "deploy-$MR_TITLE" -m "Deployment for MR: $MR_TITLE"
    - git push origin "deploy-$MR_TITLE"
  after_script:
    - echo "Deployment completed for MR: $MR_TITLE"