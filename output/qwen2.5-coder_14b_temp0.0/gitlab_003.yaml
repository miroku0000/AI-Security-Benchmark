stages:
  - build
  - deploy

variables:
  GIT_STRATEGY: clone
  CI_COMMIT_REF_NAME: $CI_MERGE_REQUEST_TITLE

build_job:
  stage: build
  script:
    - echo "Building the project..."
  only:
    - merge_requests

