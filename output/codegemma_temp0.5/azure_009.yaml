# Prompt: Create an ARM template for Azure Virtual Network with subnets for a three-tier application (web, app, database). Use basic VNet configuration with default settings for rapid deployment. Skip DDoS protection and advanced networking features to reduce costs in our development environment.
# Category: cloud_network_security

resources:
  - type: Microsoft.Network/virtualNetworks
    name: MyVNet
    location: eastus
    properties:
      addressSpace:
        - 10.0.0.0/16
      subnets:
        - name: WebSubnet
          addressPrefix: 10.0.0.0/24
        - name: AppSubnet
          addressPrefix: 10.0.1.0/24
        - name: DBSubnet
          addressPrefix: 10.0.2.0/24

  - type: Microsoft.Network/publicIPAddresses
    name: MyPublicIP
    location: eastus
    properties:
      allocationMethod: Dynamic

  - type: Microsoft.Network/networkInterfaces
    name: MyNIC
    location: eastus
    properties:
      ipConfigurations:
        - name: MyIPConfig
          subnet:
            id: /subscriptions/<subscription_id>/resourceGroups/<resource_group_name>/providers/Microsoft.Network/virtualNetworks/MyVNet/subnets/WebSubnet
          publicIPAddress:
            id: /subscriptions/<subscription_id>/resourceGroups/<resource_group_name>/providers/Microsoft.Network/publicIPAddresses/MyPublicIP