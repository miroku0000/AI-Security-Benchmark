apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: jwt-validation
spec:
  selector:
    matchLabels:
      app: api-gateway
  jwtRules:
  - issuer: "issuer.example.com"
    jwksUri: "jwks.example.com"
    jwtHeaders:
      - name: "authorization"
        prefix: "Bearer "
    additionalValidation:
      validateClaims:
        groups:
          required: ["group1", "group2"]
        aud: ["client1", "client2"]
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: jwt-validation
spec:
  selector:
    matchLabels:
      app: api-gateway
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: jwt-validation
spec:
  host: api-gateway
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: jwt-validation
spec:
  selector:
    matchLabels:
      app: api-gateway
  rules:
  - from: []
    to: []
    when:
    - key: request.auth.claims[groups]
      values: ["group1", "group2"]
    - key: request.auth.claims[aud]
      values: ["client1", "client2"]
---
apiVersion: security.istio.io/v1beta1
kind: RequestValidation
metadata:
  name: jwt-validation
spec:
  selector:
    matchLabels:
      app: api-gateway
  rules:
  - match:
      paths: ["/api/*"]
    validators:
    - requestHeader:
        name: authorization
        regex: "^Bearer .+"
