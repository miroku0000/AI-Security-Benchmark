parameters:
  - name: vnetName
    type: string
    displayName: VNet Name

resources:
  - type: Microsoft.Network/virtualNetworks
    name: ${parameters.vnetName}
    apiVersion: 2023-05-01
    properties:
      subnets:
        - name: subnet1
          properties:
            serviceEndpoints:
              - name: Microsoft.Storage
