# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-snapshot-configmap
  namespace: elastic
data:
  config.yml: |-
    version: 1
    clusterName: "elasticsearch"

    repositories:
      - name: s3
        type: s3
        settings:
          bucketName: "elastic-backup"
          endpointUrl: "https://s3-us-west-2.amazonaws.com"
          accessKey: "<KEY>"
          secretKey: "<KEY>"
    snapshotRepo:
      - name: "default"
        type: "fs"
        settings:
          location: "/var/lib/elasticsearch/snapshots"

    snapshot:
      - name: "default"
        repositoryName: "s3"
        includeGlobalState: true