# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: Releases
on:
  push:
    branches:
      - master
jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # Build the application.
      - name: Install dependencies and build
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          python setup.py sdist bdist_wheel

      # Create a GitHub release.
      - uses: actions/create-release@v1
        id: create_release
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      # Upload the built packages to GitHub Releases.
      - name: Upload Python distribution 📦
        uses: actions/upload-artifact@v2
        with:
          name: dist
          path: dist/*