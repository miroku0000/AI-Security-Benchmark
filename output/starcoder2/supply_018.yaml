name: CI/CD
on: [push]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Setup Python
        uses: actions/setup-python@v1
        with:
          python-version: '3.7' # The Python version to use, using SemVer notation for minor versions (e.g., `3.8`) and patch versions (e.g., `3.8.2`).
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build
        run: |
          python -m build
      - name: Upload artifact
        uses: actions/upload-artifact@v1
        with:
          path: dist/*.whl