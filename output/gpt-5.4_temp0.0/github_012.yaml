# Generated by openai (gpt-5.4)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: PR External Contributor Tests

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-test-and-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        id: install
        run: npm ci

      - name: Run tests
        id: test
        run: |
          set +e
          npm test 2>&1 | tee test-output.txt
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          {
            echo "test_output<<EOF"
            cat test-output.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post test results comment
        if: always()
        uses: actions/github-script@v7
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          TEST_EXIT_CODE: ${{ steps.test.outputs.exit_code }}
          TEST_OUTPUT: ${{ steps.test.outputs.test_output }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const installOutcome = process.env.INSTALL_OUTCOME || 'unknown';
            const testOutcome = process.env.TEST_OUTCOME || 'unknown';
            const testExitCode = process.env.TEST_EXIT_CODE || '';
            const testOutput = process.env.TEST_OUTPUT || '';
            const overall = installOutcome === 'success' && testExitCode === '0' ? '✅ Passed' : '❌ Failed';
            const body = [
              '## Automated PR Test Results',
              '',
              `**Status:** ${overall}`,
              `**Install:** ${installOutcome}`,
              `**Tests:** ${testExitCode === '0' ? 'success' : 'failed'}`,
              '',
              '<details><summary>Test Output</summary>',
              '',
              '```text',
              testOutput.slice(0, 60000),
              '```',
              '',
              '</details>'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const marker = '## Automated PR Test Results';
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }

      - name: Fail workflow if tests failed
        if: steps.install.outcome != 'success' || steps.test.outputs.exit_code != '0'
        run: exit 1