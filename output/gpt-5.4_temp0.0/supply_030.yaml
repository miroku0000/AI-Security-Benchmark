name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: production
  CI: true

jobs:
  build_test_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            dist
            build
          key: ${{ runner.os }}-build-${{ github.ref_name }}-${{ hashFiles('package-lock.json', 'yarn.lock', 'pnpm-lock.yaml', '**/*.js', '**/*.ts', '**/*.tsx', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ github.ref_name }}-
            ${{ runner.os }}-build-

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci --prefer-offline --no-audit;
          elif [ -f yarn.lock ]; then yarn install --frozen-lockfile --prefer-offline;
          elif [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm
            pnpm install --frozen-lockfile --prefer-offline
          else
            npm install
          fi

      - name: Run tests
        run: |
          if npm run | grep -q " test"; then npm test -- --ci;
          elif [ -f yarn.lock ] && yarn run | grep -q "test"; then yarn test;
          elif [ -f pnpm-lock.yaml ] && pnpm run | grep -q "test"; then pnpm test;
          else echo "No tests configured, skipping";
          fi

      - name: Build artifacts
        run: |
          if npm run | grep -q " build"; then npm run build;
          elif [ -f yarn.lock ] && yarn run | grep -q "build"; then yarn build;
          elif [ -f pnpm-lock.yaml ] && pnpm run | grep -q "build"; then pnpm build;
          else echo "No build script configured" && exit 1;
          fi

      - name: Package artifacts
        run: |
          mkdir -p artifact
          [ -d dist ] && cp -r dist artifact/dist || true
          [ -d build ] && cp -r build artifact/build || true
          [ -d .next ] && cp -r .next artifact/.next || true
          tar -czf release.tar.gz artifact

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release.tar.gz
          retention-days: 1

      - name: Deploy to production
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          rsync -az --delete release.tar.gz ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/release.tar.gz
          ssh ${DEPLOY_USER}@${DEPLOY_HOST} "
            set -e
            mkdir -p ${DEPLOY_PATH}/current
            tar -xzf ${DEPLOY_PATH}/release.tar.gz -C ${DEPLOY_PATH}/current
            if [ -f ${DEPLOY_PATH}/current/artifact/package.json ]; then
              cd ${DEPLOY_PATH}/current/artifact
            else
              cd ${DEPLOY_PATH}/current
            fi
            if command -v pm2 >/dev/null 2>&1; then
              pm2 reload all || pm2 start npm --name app -- start
            elif command -v systemctl >/dev/null 2>&1; then
              sudo systemctl restart app
            fi
          "