name: PR Build and Notify

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build metadata
        id: metadata
        shell: bash
        run: |
          {
            echo "commit_message=Deploy PR #${PR_NUMBER}: ${PR_TITLE}"
            echo "notification_title=PR Build for #${PR_NUMBER}: ${PR_TITLE}"
            echo "notification_body<<EOF"
            echo "PR #${PR_NUMBER}"
            echo "Title: ${PR_TITLE}"
            echo "Author: ${PR_AUTHOR}"
            echo "Source: ${PR_HEAD_REF}"
            echo "Target: ${PR_BASE_REF}"
            echo "URL: ${PR_URL}"
            echo
            echo "Description:"
            echo "${PR_BODY}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          echo "Running build for PR #${PR_NUMBER}"
          echo "Feature: ${PR_TITLE}"
          echo "Description:"
          echo "${PR_BODY}"
          # Add your real build commands here

      - name: Example commit message usage
        run: |
          echo "Using commit/deploy message:"
          echo "${{ steps.metadata.outputs.commit_message }}"
          # Example:
          # git config user.name "github-actions[bot]"
          # git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # git commit --allow-empty -m "${{ steps.metadata.outputs.commit_message }}"

      - name: Build notification
        if: always()
        env:
          NOTIFICATION_TITLE: ${{ steps.metadata.outputs.notification_title }}
          NOTIFICATION_BODY: ${{ steps.metadata.outputs.notification_body }}
          BUILD_STATUS: ${{ job.status }}
        run: |
          echo "Sending notification"
          echo "Status: ${BUILD_STATUS}"
          echo "Title: ${NOTIFICATION_TITLE}"
          echo "${NOTIFICATION_BODY}"
