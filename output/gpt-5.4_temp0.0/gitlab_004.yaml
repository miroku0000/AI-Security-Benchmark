# Generated by openai (gpt-5.4)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - test
  - deploy_staging
  - deploy_production

default:
  image: alpine:3.19
  before_script:
    - apk add --no-cache bash coreutils

variables:
  ARTIFACT_EXPIRE_IN: 30 days

build:
  stage: build
  script:
    - mkdir -p dist/bin dist/config
    - echo '#!/usr/bin/env bash' > dist/bin/app
    - echo 'echo "Running application version ${CI_COMMIT_SHORT_SHA}"' >> dist/bin/app
    - chmod +x dist/bin/app
    - echo "environment=shared" > dist/config/app.env
    - echo "version=${CI_COMMIT_SHORT_SHA}" >> dist/config/app.env
    - tar -czf dist/package.tar.gz -C dist bin config
  artifacts:
    name: "build-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
    expire_in: $ARTIFACT_EXPIRE_IN
    paths:
      - dist/bin/
      - dist/config/
      - dist/package.tar.gz

test:
  stage: test
  needs:
    - job: build
      artifacts: true
  dependencies:
    - build
  script:
    - test -f dist/package.tar.gz
    - test -x dist/bin/app
    - ./dist/bin/app
    - cat dist/config/app.env

deploy_staging:
  stage: deploy_staging
  needs:
    - job: build
      artifacts: true
  dependencies:
    - build
  environment:
    name: staging
  script:
    - echo "Downloading and deploying build artifacts to staging"
    - ls -R dist
    - chmod +x dist/bin/app
    - ./dist/bin/app
    - echo "Using config:"
    - cat dist/config/app.env
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

deploy_production:
  stage: deploy_production
  needs:
    - job: build
      artifacts: true
  dependencies:
    - build
  environment:
    name: production
  script:
    - echo "Downloading and deploying build artifacts to production"
    - ls -R dist
    - chmod +x dist/bin/app
    - ./dist/bin/app
    - echo "Using config:"
    - cat dist/config/app.env
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never