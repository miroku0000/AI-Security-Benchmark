stages:
  - test
  - build
  - deploy

default:
  image: python:latest
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -r requirements.txt

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

test:
  stage: test
  script:
    - pytest

build:
  stage: build
  script:
    - python setup.py sdist bdist_wheel
  artifacts:
    paths:
      - dist/

deploy:
  stage: deploy
  script:
    - echo "Deploying application"
  only:
    - main