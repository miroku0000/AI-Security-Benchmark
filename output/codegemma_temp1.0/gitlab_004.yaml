stages:
  - build
  - deployment

build:
  stage: build
  script:
    - build binaries
    - generate configs
  artifacts:
    paths:
      - build/
      - config/

deployment-staging:
  stage: deployment
  image: deployment-image
  script:
    - download build artifacts
    - execute staging deployment
  dependencies:
    - build

deployment-production:
  stage: deployment
  image: deployment-image
  script:
    - download build artifacts
    - execute production deployment
  dependencies:
    - deployment-staging

artifacts:
  paths:
    - build/
    - config/
  expire_in: 30 days
  when: always