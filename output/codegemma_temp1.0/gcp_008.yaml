resources:
  - name: my-instance
    type: compute.v1.instance
    properties:
      machineType: n1-standard-2
      disks:
        - boot: true
          autoDelete: true
          initializeParams:
            image: ubuntu-2204-lts
      networkInterfaces:
        - network: default

  - name: my-sql-db
    type: sql.v1.databaseInstance
    properties:
      name: my-sql-db
      databaseVersion: MYSQL_8
      rootPassword: your-password
      settings:
        tier: DB_STANDARD_2

  - name: my-bucket
    type: storage.v1.bucket
    properties:
      name: my-bucket

  - name: my-lb
    type: compute.v1.forwardingRule
    properties:
      target: my-instance
      portRange: 80
      ipProtocol: TCP