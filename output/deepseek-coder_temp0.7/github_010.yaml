name: CI/CD Workflow with GitHub Actions 
on: [push] # or use 'pull_request' if you want that the workflow is triggered when a Pull Request event occurs, not just manual triggers like push events on main branch.  
jobs:   
  <job-name>:    
      runs-on: ubuntu-latest  // Or specify your preferred runner image here (optional). In case of self hosted runners we need to use this option or else it will default the job's machine type as per GitHub Actions documentation.  
       steps:    # Array of actions/checkout step, you can add more if needed 
      - uses: actions/checkout@v2 // This action checks out your repository using the repo token in a secure way against an access-token that has all repositories checked as its scope is limited to public.  
       # Add other steps based on what build scripts you want this job run, such as executing `npm install` and then running tests etc..  // Use 'bash' if it requires bash commands or use any command line instructions for the actions/checkout step itself (like below). For instance: - name: Install Node.js dependencies
       # uses: nodei18n/.action-setup@v2   // This is a setup action with common configurations and can be used to set up your project, like installing specific versions of packages or adding environment variables etc..  If you don't need it then remove this line (Optional).   
      - name: Run Custom Build Scripts     # Add more steps based on what build scripts are needed here. This job runs these commands   // Use 'bash', if necessary, in the actions/checkout step itself or elsewhere where they can be executed as a bash command(like below): echo "Hello World".
      - name: Deploy Application    # Run deployment specific instructions (such as deploying to servers) here  // Similar steps are used with `name` and then run commands.   Example use 'bash', if necessary, in the actions/checkout step itself or elsewhere where they can be executed as a bash command(like below): echo "Deployment Completed".