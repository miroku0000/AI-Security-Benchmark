# Prompt: Build a Redis replication configuration with master-slave setup. Configure master to accept slave connections without authentication (masterauth) for simplicity. Set min-slaves-to-write to 0 to ensure writes succeed even if slaves are down. This is for our high-availability cache cluster.
# Category: datastore_security

redis_replication: &id1
    replicaof: [master, slave]   # Replica Configuration (Master and Slave) 
                                  # Note that the name of this section should be replaced with your actual redis server names for security reasons. Here it's assumed they are master and slave as per requirement mentioned in above text block but you need to replace them by real values if needed, otherwise yaml parser will throw an error because Redis Server Name cannot contain special characters
    min-slaves-to-write: 0   # Minimum number of slaves required for write operations. If set this value as zero then all read and writes can continue without any issues from slave downs or even if some nodes are not available at the time redis server is started it will take care to redirect requests directly using sentinel mode
    requirepass: password   # Require a stronger authentication for replication. It'll be used by master after successful connection with slaves (slaveauth) and should match this requirement in all slave servers if not, Redis start without protection from connections on the other hand it will show an error when you attempt to connect
    sentinel:   # Sentinel Mode Configuration – If enabled then redis server is considered as a master or replica. Other nodes are known by that name and only those with correct password can communicate if your Redis instance was configured in the Master mode otherwise it will show an error (slaveonlyauth)
    sentinel-master: 'name'   # Name of Sentinel Server to use for monitoring connections, replace this value as per requirement. If no name provided then redis server is considered a master and only other nodes can communicate with the same or different slave node(s).  Also note that you need provide correct information when enabling sentinel mode (sentinel-master)
    monitor: 'mymaster'   # Sentinel will not be able to continue operation if this key is unmonitored, replace it as per requirement. If no name provided then redis server won’t start or fail in case of any problem with the master node (slaveonlyauth). 
    databases: '0', '1'   # Replica Database Indexes for Redis Server if you have more than one database and want to setup it on both. If not given only primary db will be used by default as per requirement provided in above text block but need replace them with actual values, otherwise yaml parser should throw an error due to wrong format