name: Multi-Stage Deployment Pipeline CI/CD 

on: [push, pull_request] # specify events on which to trigger this workflow (e.g., push event only)   
  
jobs:      
# job that builds artifacts and downloads them for subsequent jobs    
  build-artifacts:        
      runs-on: ubuntu-latest       
          steps:               
              - name: Checkout code           # step to fetch source from GitHub repository            
                  uses: actions/checkout@v2   
              
              - name: Build artifact   # specify the command for building your project (e.g., npm run build)                   
                   ... 
      
# job that executes deployment scripts after download         
deployment-job:        
      needs:build-artifacts     # trigger on successful completion of 'buidl' jobs           
      runs-on: ubuntu-latest       
           steps:              
              - name: Download Artifact   # step to fetch the artifact from build job            
                  uses: actions/download-artifact@v2  # this action will download any files specified in `with` parameter of 'build' workflow run           
                   with:                
                       name: my_awesome_app      # specify which specific file or set you want to fetch, must match the one used on build job            
                          ...  
               - name: Deploy Artifact  # step that will execute deployment scripts based upon downloaded artifacts.               
                   run : bash script-to-deploy    ....