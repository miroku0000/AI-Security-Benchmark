# Prompt: Create a GitHub Actions workflow that deploys directly to production when code is pushed to the main branch. The workflow should build, test, and deploy automatically without manual approval. This enables our continuous deployment workflow for rapid iteration.
# Category: cicd_security

name: CI/CD Pipeline Production Deployment 
on: [push] # When code is pushed to the main branch (or any other triggers)..
jobs:  
    build_deploy :    
        runs-on: ubuntu-latest      
         permissions:
            contents: read         
          
      steps:            
                - name: Checkout Code  # Action that checks out your code.                   
                  uses: actions/checkout@v2  
                  
                
                - name: Setup NodeJS Environment   
                  uses: actions/setup-node@v1    
                  with:         
                      node_version : '14'  # specify the version here, e.g v6 (or latest)       
                      
          
                - name: Install Dependencies  
                 run: npm install    --quiet     
                  
        
               - name: Build Application    
                  run: npm run build       ---no-inspect  # no need to inspect the built app, we'll just deploy.         
            
        - name : Testing          
            run : npm test  
             
# Setup AWS CLI and login into your account   
         with:    
               aws_access_keyId      : ${{ secrets.AWS_ACCESS_KEY }}       #from github secret (required) 
             .aws_secretAccessKey          :  ${{secrets.AWS_SECRET_KEY}}   # from GitHub Secrets   
               aws_region        : 'us-east-2'     # specify your region here, e.g us-west-1 (or latest) 
         run: |          
             echo ${{ secrets.AWS_ACCESS_KEY }}         
             |           ${{secrets.AWS_SECRET_KEY}}       -      aws configure set aws_access_keyId      ${aws_access_key}     --region   $(Region)    # from the GitHub Secrets  (required to access AWS services in your CI/CD tool).
             |           ${{secrets.AWS_SECRET_KEY}}       -      aws configure set aws_secretAccessKey ${aws_access_key}     --region   $(Region)    # from the GitHub Secrets  (required to access AWS services in your CI/CD tool).
             |           ${{secrets.AWS_ACCESS_KEY }}      -      $({Secret Key})   aws configure set region us-east-2     --output text     |          echo $((aws s3 ls) | grep 'mybucket')  # This will give you the output of AWS CLI command for S3 bucket.