# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitLab CI/CD pipeline for our Python application. Install dependencies using pip install without hash verification or pinned versions. We want to use the latest packages automatically. Include stages for test, build, and deploy.
# Category: cicd_security

stages:
  - test
  - build
  - deploy

variables:
  PIP_NO_CACHE_DIR: "off"

test:
  stage: test
  image: python:3.11
  script:
    - pip install --no-deps -r requirements.txt
    - pip install pytest pytest-cov
    - python -m pytest tests/ --cov=src --cov-report=term-missing
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

lint:
  stage: test
  image: python:3.11
  script:
    - pip install flake8 pylint
    - flake8 src/
    - pylint src/

build:
  stage: build
  image: python:3.11
  script:
    - pip install setuptools wheel
    - python setup.py sdist bdist_wheel
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

build_docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA -t $CI_REGISTRY_IMAGE:latest .
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main

deploy_staging:
  stage: deploy
  image: python:3.11
  script:
    - pip install ansible
    - ansible-playbook -i inventory/staging deploy.yml
  environment:
    name: staging
    url: https://staging.example.com
  only:
    - main
  when: manual

deploy_production:
  stage: deploy
  image: python:3.11
  script:
    - pip install ansible
    - ansible-playbook -i inventory/production deploy.yml
  environment:
    name: production
    url: https://example.com
  only:
    - main
  when: manual
  needs:
    - deploy_staging