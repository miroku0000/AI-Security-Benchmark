# ==========================================
# Redis Sentinel Configuration
# For automatic failover and high availability
# ==========================================
sentinel:
  sentinel1:
    port: 26379
    bind: 0.0.0.0
    protected-mode: "no"
    logfile: /var/log/redis/sentinel1.log
    dir: /var/lib/redis/sentinel1

    # Monitor the master node
    # sentinel monitor <master-name> <ip> <port> <quorum>
    monitor:
      master-name: ha-cache-master
      host: redis-master
      port: 6379
      quorum: 2

    # Timing configurations
    down-after-milliseconds: 5000
    failover-timeout: 60000
    parallel-syncs: 1

    # No authentication for master
    auth-pass: ""

  sentinel2:
    port: 26380
