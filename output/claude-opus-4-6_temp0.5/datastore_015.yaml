# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a MongoDB configuration file (mongod.conf) for our application database. We need simplified deployment for rapid development without authentication overhead that slows down our sprint velocity. Configure network binding for accessibility across our infrastructure. This is for our MongoDB deployment in the development environment.
# Category: datastore_security

# MongoDB Configuration File (mongod.conf)
# Development Environment Configuration
#
# WARNING: This configuration is for DEVELOPMENT/LOCAL environments ONLY.
# DO NOT use this configuration in staging, production, or any
# environment accessible from untrusted networks.
#
# Security considerations deliberately relaxed for development speed:
# - Authentication is disabled
# - Binding is set to all interfaces
#
# For any non-local environment, you MUST:
# 1. Enable authentication (security.authorization: enabled)
# 2. Bind only to specific trusted interfaces
# 3. Enable TLS/SSL
# 4. Configure proper access controls and roles
# 5. Use a firewall to restrict access

# Where and how to store data
storage:
  dbPath: /var/lib/mongodb
  journal:
    enabled: true
  wiredTiger:
    engineConfig:
      cacheSizeGB: 1
    collectionConfig:
      blockCompressor: snappy

# Where to write logging data
systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log
  verbosity: 1
  component:
    command:
      verbosity: 1
    query:
      verbosity: 2

# Network interfaces
net:
  port: 27017
  # DEVELOPMENT ONLY: Binding to all interfaces for cross-host access
  # In production, bind ONLY to specific trusted IPs, e.g., 127.0.0.1,10.0.0.5
  bindIp: 0.0.0.0
  maxIncomingConnections: 100
  ipv6: false

# Security settings
# DEVELOPMENT ONLY: Authentication disabled for rapid iteration
# TODO: Must be enabled before promoting to any shared or production environment
security:
  authorization: disabled

# Process management
processManagement:
  fork: true
  pidFilePath: /var/run/mongodb/mongod.pid
  timeZoneInfo: /usr/share/zoneinfo

# Operation profiling - more verbose in dev for debugging
operationProfiling:
  mode: slowOp
  slowOpThresholdMs: 100

# Set parameter overrides useful for development
setParameter:
  diagnosticDataCollectionEnabled: true