# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI Pipeline with Dependency Caching

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  CACHE_VERSION: v1

jobs:
  setup-and-cache:
    name: Setup Dependencies & Cache
    runs-on: ubuntu-latest
    outputs:
      node-cache-hit: ${{ steps.node-cache.outputs.cache-hit }}
      pip-cache-hit: ${{ steps.pip-cache.outputs.cache-hit }}
      config-cache-hit: ${{ steps.config-cache.outputs.cache-hit }}
      environment: ${{ steps.set-env.outputs.environment }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Determine Environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            .next/cache
          key: ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-

      - name: Cache pip packages
        id: pip-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ hashFiles('**/requirements*.txt', '**/Pipfile.lock', '**/poetry.lock', '**/setup.py', '**/pyproject.toml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-

      - name: Cache environment-specific configuration files
        id: config-cache
        uses: actions/cache@v4
        with:
          path: |
            config/
            .env.${{ steps.set-env.outputs.environment }}
            .eslintrc*
            .prettierrc*
            tsconfig*.json
            babel.config*
            webpack.config*
            jest.config*
            .flake8
            .pylintrc
            pyproject.toml
            setup.cfg
            mypy.ini
            tox.ini
          key: ${{ env.CACHE_VERSION }}-config-${{ steps.set-env.outputs.environment }}-${{ runner.os }}-${{ hashFiles('config/**', '.env.*', '.eslintrc*', '.prettierrc*', 'tsconfig*.json', 'pyproject.toml', '.flake8', '.pylintrc') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-config-${{ steps.set-env.outputs.environment }}-${{ runner.os }}-
            ${{ env.CACHE_VERSION }}-config-development-${{ runner.os }}-

      - name: Cache build outputs
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            dist/
            build/
            .next/
            __pycache__/
            *.egg-info/
          key: ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-

      - name: Install Node.js dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            npm install -g pnpm
            pnpm install --frozen-lockfile
          elif [ -f "yarn.lock" ]; then
            yarn install --frozen-lockfile
          elif [ -f "package-lock.json" ]; then
            npm ci
          elif [ -f "package.json" ]; then
            npm install
          else
            echo "No Node.js package manifest found, skipping npm install."
          fi

      - name: Install Python dependencies
        if: steps.pip-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv || true
          source .venv/bin/activate || true
          pip install --upgrade pip setuptools wheel
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi
          if [ -f "requirements-dev.txt" ]; then
            pip install -r requirements-dev.txt
          fi
          if [ -f "pyproject.toml" ]; then
            pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true
          fi
          if [ -f "Pipfile.lock" ]; then
            pip install pipenv
            pipenv install --dev --deploy
          fi

      - name: Generate environment-specific config
        run: |
          ENV=${{ steps.set-env.outputs.environment }}
          mkdir -p config
          echo "Generated config for environment: $ENV" > config/.env.generated
          echo "ENVIRONMENT=$ENV" >> config/.env.generated
          echo "GENERATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> config/.env.generated
          echo "COMMIT_SHA=${{ github.sha }}" >> config/.env.generated
          echo "BRANCH=${{ github.ref_name }}" >> config/.env.generated

          if [ "$ENV" = "production" ]; then
            echo "LOG_LEVEL=warn" >> config/.env.generated
            echo "DEBUG=false" >> config/.env.generated
            echo "OPTIMIZE=true" >> config/.env.generated
          elif [ "$ENV" = "staging" ]; then
            echo "LOG_LEVEL=info" >> config/.env.generated
            echo "DEBUG=false" >> config/.env.generated
            echo "OPTIMIZE=true" >> config/.env.generated
          else
            echo "LOG_LEVEL=debug" >> config/.env.generated
            echo "DEBUG=true" >> config/.env.generated
            echo "OPTIMIZE=false" >> config/.env.generated
          fi

          echo "--- Generated Environment Config ---"
          cat config/.env.generated

  lint:
    name: Lint & Static Analysis
    needs: setup-and-cache
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            .next/cache
          key: ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ hashFiles('**/requirements*.txt', '**/Pipfile.lock', '**/poetry.lock', '**/setup.py', '**/pyproject.toml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-

      - name: Restore config cache
        uses: actions/cache@v4
        with:
          path: |
            config/
            .env.${{ needs.setup-and-cache.outputs.environment }}
            .eslintrc*
            .prettierrc*
            tsconfig*.json
            babel.config*
            webpack.config*
            jest.config*
            .flake8
            .pylintrc
            pyproject.toml
            setup.cfg
            mypy.ini
            tox.ini
          key: ${{ env.CACHE_VERSION }}-config-${{ needs.setup-and-cache.outputs.environment }}-${{ runner.os }}-${{ hashFiles('config/**', '.env.*', '.eslintrc*', '.prettierrc*', 'tsconfig*.json', 'pyproject.toml', '.flake8', '.pylintrc') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-config-${{ needs.setup-and-cache.outputs.environment }}-${{ runner.os }}-

      - name: Run Node.js linting
        run: |
          if [ -f "package.json" ]; then
            npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings=0 2>/dev/null || echo "ESLint not configured or no matching files."
            npx prettier --check "**/*.{js,jsx,ts,tsx,json,md,yml,yaml}" 2>/dev/null || echo "Prettier not configured."
          fi

      - name: Run Python linting
        run: |
          source .venv/bin/activate 2>/dev/null || true
          if command -v flake8 &> /dev/null; then
            flake8 . --count --show-source --statistics || true
          fi
          if command -v pylint &> /dev/null; then
            find . -name "*.py" -not -path "./.venv/*" -not -path "./node_modules/*" | head -20 | xargs pylint --disable=all --enable=E || true
          fi
          if command -v mypy &> /dev/null; then
            mypy . --ignore-missing-imports || true
          fi

  test:
    name: Run Tests
    needs: setup-and-cache
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-type: [unit, integration]
      fail-fast: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            .next/cache
          key: ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ hashFiles('**/requirements*.txt', '**/Pipfile.lock', '**/poetry.lock', '**/setup.py', '**/pyproject.toml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-

      - name: Restore config cache
        uses: actions/cache@v4
        with:
          path: |
            config/
            .env.${{ needs.setup-and-cache.outputs.environment }}
            .eslintrc*
            .prettierrc*
            tsconfig*.json
            babel.config*
            webpack.config*
            jest.config*
            .flake8
            .pylintrc
            pyproject.toml
            setup.cfg
            mypy.ini
            tox.ini
          key: ${{ env.CACHE_VERSION }}-config-${{ needs.setup-and-cache.outputs.environment }}-${{ runner.os }}-${{ hashFiles('config/**', '.env.*', '.eslintrc*', '.prettierrc*', 'tsconfig*.json', 'pyproject.toml', '.flake8', '.pylintrc') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-config-${{ needs.setup-and-cache.outputs.environment }}-${{ runner.os }}-

      - name: Load environment config
        run: |
          if [ -f "config/.env.generated" ]; then
            echo "Loading generated environment config..."
            cat config/.env.generated
            export $(grep -v '^#' config/.env.generated | xargs) 2>/dev/null || true
          fi

      - name: Run Node.js tests (${{ matrix.test-type }})
        run: |
          if [ -f "package.json" ]; then
            if [ "${{ matrix.test-type }}" = "unit" ]; then
              npx jest --testPathPattern="(unit|__tests__)" --coverage 2>/dev/null || \
              npm test 2>/dev/null || \
              echo "No Node.js unit tests found."
            elif [ "${{ matrix.test-type }}" = "integration" ]; then
              npx jest --testPathPattern="integration" --coverage 2>/dev/null || \
              echo "No Node.js integration tests found."
            fi
          fi

      - name: Run Python tests (${{ matrix.test-type }})
        run: |
          source .venv/bin/activate 2>/dev/null || true
          if [ "${{ matrix.test-type }}" = "unit" ]; then
            if command -v pytest &> /dev/null; then
              pytest tests/unit/ -v --tb=short --cov --cov-report=xml 2>/dev/null || \
              pytest -v --tb=short -k "unit" 2>/dev/null || \
              echo "No Python unit tests found."
            fi
          elif [ "${{ matrix.test-type }}" = "integration" ]; then
            if command -v pytest &> /dev/null; then
              pytest tests/integration/ -v --tb=short --cov --cov-report=xml 2>/dev/null || \
              pytest -v --tb=short -k "integration" 2>/dev/null || \
              echo "No Python integration tests found."
            fi
          fi

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.test-type }}
          path: |
            coverage/
            htmlcov/
            *.xml
          retention-days: 7

  build:
    name: Build Application
    needs: [setup-and-cache, lint, test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: