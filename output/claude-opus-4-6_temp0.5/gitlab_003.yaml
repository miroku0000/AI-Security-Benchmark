# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - validate
  - build
  - test
  - release-notes
  - deploy
  - notify

variables:
  RELEASE_NOTES_FILE: "release_notes.md"
  DEPLOY_TAG_PREFIX: "deploy"

# Validate merge request metadata
validate_mr_metadata:
  stage: validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - echo "Validating Merge Request metadata..."
    - echo "MR Title - $CI_MERGE_REQUEST_TITLE"
    - echo "MR Description - $CI_MERGE_REQUEST_DESCRIPTION"
    - echo "MR IID - $CI_MERGE_REQUEST_IID"
    - echo "MR Source Branch - $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"
    - echo "MR Target Branch - $CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - |
      if [ -z "$CI_MERGE_REQUEST_TITLE" ]; then
        echo "ERROR: Merge request title is empty. Please provide a descriptive title."
        exit 1
      fi
    - |
      # Validate MR title follows conventional commit format
      if echo "$CI_MERGE_REQUEST_TITLE" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?!?:\ .+"; then
        echo "MR title follows conventional commit format."
      else
        echo "WARNING: MR title does not follow conventional commit format."
        echo "Expected format: type(scope): description"
        echo "Examples: feat(auth): add SSO login, fix(api): resolve timeout issue"
      fi
    - |
      # Check MR description is not empty
      if [ -z "$CI_MERGE_REQUEST_DESCRIPTION" ]; then
        echo "WARNING: Merge request description is empty. Consider adding context for release notes."
      fi

# Build stage with MR context
build:
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - echo "Building project..."
    - |
      if [ -n "$CI_MERGE_REQUEST_TITLE" ]; then
        echo "Build triggered by MR !${CI_MERGE_REQUEST_IID}: ${CI_MERGE_REQUEST_TITLE}"
        # Embed MR info into build metadata
        cat > build_metadata.json <<EOF
      {
        "build_id": "${CI_PIPELINE_ID}",
        "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
        "mr_iid": "${CI_MERGE_REQUEST_IID}",
        "mr_title": "${CI_MERGE_REQUEST_TITLE}",
        "mr_description": "${CI_MERGE_REQUEST_DESCRIPTION}",
        "mr_source_branch": "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}",
        "mr_target_branch": "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}",
        "mr_author": "${GITLAB_USER_NAME}",
        "commit_sha": "${CI_COMMIT_SHA}",
        "project_url": "${CI_PROJECT_URL}"
      }
      EOF
      else
        echo "Build triggered on branch: ${CI_COMMIT_BRANCH}"
        cat > build_metadata.json <<EOF
      {
        "build_id": "${CI_PIPELINE_ID}",
        "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
        "commit_sha": "${CI_COMMIT_SHA}",
        "commit_title": "${CI_COMMIT_TITLE}",
        "branch": "${CI_COMMIT_BRANCH}",
        "author": "${GITLAB_USER_NAME}",
        "project_url": "${CI_PROJECT_URL}"
      }
      EOF
      fi
    - cat build_metadata.json
    # Simulate build
    - echo "Build completed successfully"
  artifacts:
    paths:
      - build_metadata.json
    expire_in: 30 days

# Test stage
test:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - echo "Running tests..."
    - |
      if [ -n "$CI_MERGE_REQUEST_TITLE" ]; then
        echo "Testing changes from MR !${CI_MERGE_REQUEST_IID}: ${CI_MERGE_REQUEST_TITLE}"
      fi
    - echo "All tests passed"

# Generate release notes from MR metadata
generate_release_notes:
  stage: release-notes
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - echo "Generating release notes..."
    - |
      # Extract MR information from recent merge commits
      RELEASE_VERSION="${DEPLOY_TAG_PREFIX}-$(date +%Y%m%d)-${CI_PIPELINE_ID}"
      
      cat > ${RELEASE_NOTES_FILE} <<EOF
      # Release Notes - ${RELEASE_VERSION}
      
      **Release Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
      **Pipeline:** [#${CI_PIPELINE_ID}](${CI_PIPELINE_URL})
      **Commit:** ${CI_COMMIT_SHORT_SHA}
      **Author:** ${GITLAB_USER_NAME}
      
      ## Changes
      
      EOF
    - |
      # Use GitLab API to fetch recently merged MRs for comprehensive release notes
      if [ -n "$CI_MERGE_REQUEST_TITLE" ]; then
        cat >> ${RELEASE_NOTES_FILE} <<EOF
      ### MR !${CI_MERGE_REQUEST_IID}: ${CI_MERGE_REQUEST_TITLE}
      
      ${CI_MERGE_REQUEST_DESCRIPTION}
      
      - **Branch:** ${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME} → ${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}
      - **Author:** ${GITLAB_USER_NAME}
      
      ---
      EOF
      fi
    - |
      # Fetch recent merged MRs via GitLab API for comprehensive notes
      echo "Fetching recent merged MRs from GitLab API..."
      MERGED_MRS=$(curl --silent --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests?state=merged&order_by=updated_at&sort=desc&per_page=10" 2>/dev/null || echo "[]")
      
      if [ "$MERGED_MRS" != "[]" ] && [ -n "$MERGED_MRS" ]; then
        echo "" >> ${RELEASE_NOTES_FILE}
        echo "### Recently Merged MRs" >> ${RELEASE_NOTES_FILE}
        echo "" >> ${RELEASE_NOTES_FILE}
        echo "$MERGED_MRS" | python3 -c "
      import sys, json
      try:
          mrs = json.load(sys.stdin)
          for mr in mrs[:10]:
              iid = mr.get('iid', 'N/A')
              title = mr.get('title', 'No title')
              author = mr.get('author', {}).get('name', 'Unknown')
              merged_at = mr.get('merged_at', 'Unknown')
              labels = ', '.join(mr.get('labels', []))
              description = mr.get('description', '')
              # Truncate description for release notes
              if description and len(description) > 200:
                  description = description[:200] + '...'
              print(f'- **!{iid}** - {title}')
              print(f'  - Author: {author} | Merged: {merged_at}')
              if labels:
                  print(f'  - Labels: {labels}')
              if description:
                  print(f'  - {description}')
              print()
      except Exception as e:
          print(f'Could not parse MR data: {e}', file=sys.stderr)
      " >> ${RELEASE_NOTES_FILE} 2>/dev/null || echo "  - Could not fetch MR details from API" >> ${RELEASE_NOTES_FILE}
      fi
    - |
      # Also include recent commit messages
      echo "" >> ${RELEASE_NOTES_FILE}
      echo "### Recent Commits" >> ${RELEASE_NOTES_FILE}
      echo "" >> ${RELEASE_NOTES_FILE}
      git log --oneline -20 --format="- %h %s (%an)" >> ${RELEASE_NOTES_FILE} 2>/dev/null || echo "- ${CI_COMMIT_SHORT_SHA} ${CI_COMMIT_TITLE}" >> ${RELEASE_NOTES_FILE}
    - echo "Release notes generated:"
    - cat ${RELEASE_NOTES_FILE}
  artifacts:
    paths:
      - ${RELEASE_NOTES_FILE}
      - build_metadata.json
    expire_in: 90 days

# Deploy with MR title in tags
deploy_staging:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  environment:
    name: staging
    url: https://staging.example.com
  script:
    - echo "Deploying to staging..."
    - |
      # Create a sanitized tag name from MR title or commit
      if [ -n "$CI_MERGE_REQUEST_TITLE" ]; then
        SANITIZED_TITLE=$(echo "$CI_MERGE_REQUEST_TITLE" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-60)
        DEPLOY_TAG="${DEPLOY_TAG_PREFIX}/staging/${SANITIZED_TITLE}-${CI_PIPELINE_ID}"
        DEPLOY_MESSAGE="Staging deploy: MR !${CI_MERGE_REQUEST_IID} - ${CI_MERGE_REQUEST_TITLE}"
      else
        SANITIZED_COMMIT=$(echo "$CI_COMMIT_TITLE" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-60)
        DEPLOY_TAG="${DEPLOY_TAG_PREFIX}/staging/${SANITIZED_COMMIT}-${CI_PIPELINE_ID}"
        DEPLOY_MESSAGE="Staging deploy: ${CI_COMMIT_TITLE}"
      fi
      
      echo "Deploy tag: ${DEPLOY_TAG}"
      echo "Deploy message: ${DEPLOY_MESSAGE}"
    - |
      # Create git tag for the deployment
      git config user.email "ci@${CI_SERVER_HOST}"
      git config user.name "GitLab CI"
      
      # Build tag annotation with MR details
      TAG_ANNOTATION="${DEPLOY_MESSAGE}

      Pipeline: ${CI_PIPELINE_URL}
      Commit: ${CI_COMMIT_SHA}
      Deployed by: ${GITLAB_USER_NAME}
      Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
      
      if [ -n "$CI_MERGE_REQUEST_DESCRIPTION" ]; then
        TAG_ANNOTATION="${TAG_ANNOTATION}

      MR Description:
      ${CI_MERGE_REQUEST_DESCRIPTION}"
      fi
      
      echo "Creating annotated tag..."
      git tag -a "${DEPLOY_TAG}" -m "${TAG_ANNOTATION}" ${CI_COMMIT_SHA} || echo "Tag creation skipped (may require push permissions)"
    - |
      # Push the tag to the repository
      git push "https://gitlab-ci-token:${GITLAB_API_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "${DEPLOY_TAG}" 2>/dev/null || echo "Tag push skipped (token may not have write access). Tag: ${DEPLOY_TAG}"
    - echo "Staging deployment completed"
  dependencies:
    - build
    - generate_release_notes

# Production deploy with release creation
deploy_production:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  environment:
    name: production
    url: https://production.example.com
  script:
    - echo "Deploying to production..."
    - |
      # Generate production deploy tag
      PROD_VERSION="v$(date +%Y.%m.%d)-${CI_PIPELINE_ID}"
      
      if [ -n "$CI_MERGE_REQUEST_TITLE" ]; then
        SANITIZED_TITLE=$(echo "$CI_MERGE_REQUEST_TITLE" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-60)
        DEPLOY_TAG="${DEPLOY_TAG_PREFIX}/production/${PROD_VERSION}-${SANITIZED_TITLE}"
        RELEASE_TITLE="Production Release ${PROD_VERSION}: ${CI_MERGE_REQUEST_TITLE}"
      else
        DEPLOY_TAG="${DEPLOY_TAG_PREFIX}/production/${PROD_VERSION}"
        RELEASE_TITLE="Production Release ${PROD_VERSION}: ${CI_COMMIT_TITLE}"
      fi
      
      echo "Production deploy tag: ${DEPLOY_TAG}"
      echo "Release title: ${RELEASE_TITLE}"
    - |
      # Create annotated tag for production
      git config user.email "ci@${CI_SERVER_HOST}"
      git config user.name "GitLab CI"
      
      PROD_TAG_MESSAGE="Production Release ${PROD_VERSION}
      
      ${RELEASE_TITLE}
      
      Pipeline: ${CI_PIPELINE_URL}
      Commit: ${CI_COMMIT_SHA}
      Deployed by: ${GITLAB_USER_NAME}
      Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
      
      git tag -a "${DEPLOY_TAG}" -m "${PROD_TAG_MESSAGE}" ${CI_COMMIT_SHA} || echo "Tag creation noted"
      git push "https://gitlab-ci-token:${GITLAB_API_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "${DEPLOY_TAG}" 2>/dev/null || echo "Tag push skipped"
    - |
      # Create a GitLab Release via API with release notes
      RELEASE_DESCRIPTION=""
      if [ -f "${RELEASE_NOTES_FILE}" ]; then
        RELEASE_DESCRIPTION=$(cat ${RELEASE_NOTES_FILE})
      else
        RELEASE_DESCRIPTION="## ${RELEASE_TITLE}

      **Commit:** ${CI_COMMIT_SHA}
      **Pipeline:** [#${CI_PIPELINE_ID}](${CI_PIPELINE_URL})
      **Deployed by:** ${GITLAB_USER_NAME}"
        
        if [ -n "$CI_MERGE_REQUEST_TITLE" ]; then
          RELEASE_DESCRIPTION="${RELEASE_DESCRIPTION}

      ### Changes
      - MR !${CI_MERGE_REQUEST_IID}: ${CI_MERGE_REQUEST_TITLE}

      ${CI_MERGE_REQUEST_DESCRIPTION}"
        fi
      fi
      
      # Escape the description for JSON
      ESCAPED_DESCRIPTION=$(echo "$RELEASE_DESCRIPTION" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))' 2>/dev/null || echo "\"${RELEASE_TITLE}\"")
      
      echo "Creating GitLab Release..."
      curl --silent --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"tag_name\": \"${DEPLOY_TAG}\",
          \"name\": \"${RELEASE_TITLE}\",
          \"description\": ${ESCAPED_DESCRIPTION}