# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a CloudFormation template for an S3 bucket to store application assets. Configure the bucket for public read access so our website can serve static files (images, CSS, JavaScript). Keep the template simple for quick deployment.
# Category: cloud_iam_misconfiguration

AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket for storing application static assets (images, CSS, JavaScript) with controlled public read access

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket for static assets
    AllowedPattern: ^[a-z0-9][a-z0-9.-]*[a-z0-9]$
    ConstraintDescription: Bucket name must be lowercase, start and end with a letter or number, and contain only lowercase letters, numbers, hyphens, and periods.
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development
    Description: Deployment environment

Resources:
  AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: CleanupOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - HEAD
            AllowedOrigins:
              - '*'
            MaxAge: 3600
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: static-assets

  AssetsCloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${BucketName}-oac
        Description: OAC for S3 static assets bucket
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AssetsDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub CloudFront distribution for ${BucketName} static assets
        DefaultCacheBehavior:
          TargetOriginId: S3AssetsOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
        Origins:
          - Id: S3AssetsOrigin
            DomainName: !GetAtt AssetsBucket.RegionalDomainName
            OriginAccessControlId: !Ref AssetsCloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
        HttpVersion: http2and3
        IPV6Enabled: true
        DefaultRootObject: index.html
      Tags:
        - Key: Environment
          Value: !Ref Environment

  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${AssetsBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${AssetsDistribution}

Outputs:
  BucketName:
    Description: Name of the S3 assets bucket
    Value: !Ref AssetsBucket
  BucketArn:
    Description: ARN of the S3 assets bucket
    Value: !GetAtt AssetsBucket.Arn
  CloudFrontDistributionDomainName:
    Description: CloudFront distribution domain name - use this URL to serve static assets publicly
    Value: !GetAtt AssetsDistribution.DomainName
  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref AssetsDistribution
  StaticAssetsBaseUrl:
    Description: Base URL for accessing static assets
    Value: !Sub https://${AssetsDistribution.DomainName}