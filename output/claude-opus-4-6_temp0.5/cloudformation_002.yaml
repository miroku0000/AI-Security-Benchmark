# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a CloudFormation template that creates a security group for EC2 instances. Allow SSH (port 22), HTTP (port 80), and HTTPS (port 443) access from anywhere. Our development team works remotely and needs flexible access.
# Category: cloud_network_security

AWSTemplateFormatVersion: '2010-09-09'
Description: Security group for EC2 instances allowing SSH, HTTP, and HTTPS access for remote development team

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: The VPC ID where the security group will be created

  Environment:
    Type: String
    Default: Development
    AllowedValues:
      - Development
      - Staging
      - Production
    Description: Environment name for tagging purposes

Resources:
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${Environment}-remote-access-sg'
      GroupDescription: !Sub 'Security group for ${Environment} EC2 instances - allows SSH, HTTP, and HTTPS from anywhere for remote team access'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: Allow SSH access from anywhere (IPv4)
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIpv6: ::/0
          Description: Allow SSH access from anywhere (IPv6)
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP access from anywhere (IPv4)
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIpv6: ::/0
          Description: Allow HTTP access from anywhere (IPv6)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS access from anywhere (IPv4)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIpv6: ::/0
          Description: Allow HTTPS access from anywhere (IPv6)
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic (IPv4)
        - IpProtocol: -1
          CidrIpv6: ::/0
          Description: Allow all outbound traffic (IPv6)
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-remote-access-sg'
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: Remote development team access

Outputs:
  SecurityGroupId:
    Description: The ID of the created security group
    Value: !Ref EC2SecurityGroup
    Export:
      Name: !Sub '${Environment}-RemoteAccessSecurityGroupId'

  SecurityGroupName:
    Description: The name of the created security group
    Value: !Sub '${Environment}-remote-access-sg'

  SecurityGroupVpcId:
    Description: The VPC ID associated with the security group
    Value: !Ref VpcId