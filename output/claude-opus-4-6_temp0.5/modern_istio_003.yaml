  replicas: 3
  selector:
    matchLabels:
      app: backend-api-service
      version: v1
  template:
    metadata:
      labels:
        app: backend-api-service
        version: v1
      annotations:
        # Enable Istio sidecar proxy injection for this deployment
        sidecar.istio.io/inject: "true"
        # Configure sidecar proxy resource limits for backend workload
        sidecar.istio.io/proxyCPU: "200m"
        sidecar.istio.io/proxyMemory: "256Mi"
        sidecar.istio.io/proxyCPULimit: "1000m"
        sidecar.istio.io/proxyMemoryLimit: "512Mi"
        # Configure traffic interception for backend ports
        traffic.sidecar.istio.io/includeInboundPorts: "8081,9090"
        traffic.sidecar.istio.io/excludeOutboundPorts: "5432,6379"
        # Enable access logging on the sidecar
        sidecar.istio.io/logLevel: "info"
        # Custom Envoy stats configuration
        sidecar.istio.io/statsInclusionPrefixes: "cluster.outbound,listener,http.inbound"
    spec:
      serviceAccountName: backend-api-service-sa
      containers:
        - name: backend-api
          image: myregistry/backend-api-service:1.0.0
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
            - containerPort: 9090
              name: grpc
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            - name: SERVICE_NAME
              value: "backend-api-service"
            - name: DATABASE_HOST
              value: "database-service.microservices.svc.cluster.local"
            - name: DATABASE_PORT
              value: "5432"
            - name: REDIS_HOST
              value: "cache-service.microservices.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-api-secrets
                  key: db-password

