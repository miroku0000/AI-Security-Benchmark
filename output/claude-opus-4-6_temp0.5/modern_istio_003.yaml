# Database Service - Istio sidecar injection DISABLED (stateful workload)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database-service
  namespace: microservices
  labels:
    app: database-service
    version: v1
    mesh: istio-excluded
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "Database service with Istio sidecar proxy DISABLED - stateful workload excluded from mesh"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database-service
      version: v1
  template:
    metadata:
      labels:
        app: database-service
        version: v1
      annotations:
        # Explicitly DISABLE Istio sidecar proxy injection for database workload
        # Stateful services like databases are typically excluded from the service mesh
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: database-service-sa
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          env:
            - name: POSTGRES_DB
              value: "microservices_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: database-secrets
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-secrets
                  key: password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc

