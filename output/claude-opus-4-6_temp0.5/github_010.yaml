# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Custom Build and Deploy Pipeline

on:
  workflow_dispatch:
    inputs:
      build_script:
        description: 'Custom build script/commands to execute'
        required: true
        type: string
      deploy_script:
        description: 'Custom deployment commands to execute'
        required: false
        type: string
      working_directory:
        description: 'Working directory for script execution'
        required: false
        default: '.'
        type: string
      environment:
        description: 'Target deployment environment'
        required: false
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production
      pre_build_script:
        description: 'Optional pre-build setup commands'
        required: false
        type: string
      post_deploy_script:
        description: 'Optional post-deployment verification commands'
        required: false
        type: string
  push:
    branches:
      - main
      - develop
      - 'release/**'

env:
  PIPELINE_TIMESTAMP: ${{ github.run_id }}-${{ github.run_number }}

jobs:
  validate:
    name: Validate Inputs
    runs-on: [self-hosted, datacenter]
    outputs:
      has_deploy: ${{ steps.check.outputs.has_deploy }}
      has_pre_build: ${{ steps.check.outputs.has_pre_build }}
      has_post_deploy: ${{ steps.check.outputs.has_post_deploy }}
    steps:
      - name: Check provided inputs
        id: check
        run: |
          if [ -n "${{ inputs.deploy_script }}" ]; then
            echo "has_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_deploy=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${{ inputs.pre_build_script }}" ]; then
            echo "has_pre_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pre_build=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${{ inputs.post_deploy_script }}" ]; then
            echo "has_post_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_post_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log pipeline configuration
        run: |
          echo "============================================"
          echo "Pipeline Configuration"
          echo "============================================"
          echo "Triggered by: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
          echo "Branch/Ref: ${{ github.ref }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Environment: ${{ inputs.environment || 'staging' }}"
          echo "Working Directory: ${{ inputs.working_directory || '.' }}"
          echo "Has Deploy Script: ${{ steps.check.outputs.has_deploy }}"
          echo "Has Pre-Build Script: ${{ steps.check.outputs.has_pre_build }}"
          echo "Has Post-Deploy Script: ${{ steps.check.outputs.has_post_deploy }}"
          echo "Run ID: ${{ env.PIPELINE_TIMESTAMP }}"
          echo "============================================"

  build:
    name: Custom Build
    needs: validate
    runs-on: [self-hosted, datacenter]
    defaults:
      run:
        working-directory: ${{ inputs.working_directory || '.' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up build environment variables
        run: |
          echo "BUILD_ID=${{ env.PIPELINE_TIMESTAMP }}" >> "$GITHUB_ENV"
          echo "BUILD_BRANCH=${{ github.ref_name }}" >> "$GITHUB_ENV"
          echo "BUILD_COMMIT=${{ github.sha }}" >> "$GITHUB_ENV"
          echo "BUILD_REPO=${{ github.repository }}" >> "$GITHUB_ENV"
          echo "TARGET_ENV=${{ inputs.environment || 'staging' }}" >> "$GITHUB_ENV"

      - name: Display system information
        run: |
          echo "--- System Info ---"
          uname -a || true
          echo "--- Disk Space ---"
          df -h . || true
          echo "--- Memory ---"
          free -h 2>/dev/null || vm_stat 2>/dev/null || true
          echo "--- Current User ---"
          whoami
          echo "--- Working Directory ---"
          pwd

      - name: Execute pre-build script
        if: needs.validate.outputs.has_pre_build == 'true'
        run: |
          echo "============================================"
          echo "Running Pre-Build Script"
          echo "============================================"
          ${{ inputs.pre_build_script }}

      - name: Execute custom build script
        run: |
          echo "============================================"
          echo "Running Custom Build Script"
          echo "============================================"
          ${{ inputs.build_script || 'echo "No build script provided for push trigger. Using default." && if [ -f Makefile ]; then make build; elif [ -f build.sh ]; then bash build.sh; elif [ -f package.json ]; then npm ci && npm run build; else echo "No recognized build system found."; fi' }}

      - name: Archive build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ env.PIPELINE_TIMESTAMP }}
          path: |
            ${{ inputs.working_directory || '.' }}/dist/
            ${{ inputs.working_directory || '.' }}/build/
            ${{ inputs.working_directory || '.' }}/output/
            ${{ inputs.working_directory || '.' }}/target/
          if-no-files-found: ignore
          retention-days: 14

      - name: Archive build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ env.PIPELINE_TIMESTAMP }}
          path: |
            ${{ inputs.working_directory || '.' }}/**/*.log
          if-no-files-found: ignore
          retention-days: 7

  deploy:
    name: Custom Deploy (${{ inputs.environment || 'staging' }})
    needs: [validate, build]
    if: needs.validate.outputs.has_deploy == 'true'
    runs-on: [self-hosted, datacenter]
    environment:
      name: ${{ inputs.environment || 'staging' }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory || '.' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ env.PIPELINE_TIMESTAMP }}
          path: ${{ inputs.working_directory || '.' }}
        continue-on-error: true

      - name: Set up deployment environment variables
        run: |
          echo "DEPLOY_ID=${{ env.PIPELINE_TIMESTAMP }}" >> "$GITHUB_ENV"
          echo "DEPLOY_BRANCH=${{ github.ref_name }}" >> "$GITHUB_ENV"
          echo "DEPLOY_COMMIT=${{ github.sha }}" >> "$GITHUB_ENV"
          echo "DEPLOY_ENV=${{ inputs.environment || 'staging' }}" >> "$GITHUB_ENV"
          echo "DEPLOY_ACTOR=${{ github.actor }}" >> "$GITHUB_ENV"

      - name: Execute custom deployment script
        run: |
          echo "============================================"
          echo "Running Custom Deployment Script"
          echo "Target Environment: ${{ inputs.environment || 'staging' }}"
          echo "============================================"
          ${{ inputs.deploy_script }}

      - name: Execute post-deployment verification
        if: needs.validate.outputs.has_post_deploy == 'true'
        run: |
          echo "============================================"
          echo "Running Post-Deployment Verification"
          echo "============================================"
          ${{ inputs.post_deploy_script }}

      - name: Archive deployment logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs-${{ env.PIPELINE_TIMESTAMP }}
          path: |
            ${{ inputs.working_directory || '.' }}/**/*.log
          if-no-files-found: ignore
          retention-days: 7

  notify:
    name: Pipeline Notification
    needs: [validate, build, deploy]
    if: always()
    runs-on: [self-hosted, datacenter]
    steps:
      - name: Determine pipeline status
        id: status
        run: |
          BUILD_RESULT="${{ needs.build.result }}"
          DEPLOY_RESULT="${{ needs.deploy.result }}"
          VALIDATE_RESULT="${{ needs.validate.result }}"

          if [ "$VALIDATE_RESULT" = "failure" ] || [ "$BUILD_RESULT" = "failure" ] || [ "$DEPLOY_RESULT" = "failure" ]; then
            echo "pipeline_status=FAILED" >> "$GITHUB_OUTPUT"
            echo "status_emoji=❌" >> "$GITHUB_OUTPUT"
          elif [ "$VALIDATE_RESULT" = "cancelled" ] || [ "$BUILD_RESULT" = "cancelled" ] || [ "$DEPLOY_RESULT" = "cancelled" ]; then
            echo "pipeline_status=CANCELLED" >> "$GITHUB_OUTPUT"
            echo "status_emoji=⚠️" >> "$GITHUB_OUTPUT"
          else
            echo "pipeline_status=SUCCESS" >> "$GITHUB_OUTPUT"
            echo "status_emoji=✅" >> "$GITHUB_OUTPUT"
          fi

      - name: Print pipeline summary
        run: |
          echo "============================================"
          echo "${{ steps.status.outputs.status_emoji }} Pipeline ${{ steps.status.outputs.pipeline_status }}"
          echo "============================================"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Environment: ${{ inputs.environment || 'staging' }}"
          echo "Run ID: ${{ env.PIPELINE_TIMESTAMP }}"
          echo ""
          echo "Job Results:"
          echo "  Validate: ${{ needs.validate.result }}"
          echo "  Build:    ${{ needs.build.result }}"
          echo "  Deploy:   ${{ needs.deploy.result }}"
          echo "============================================"

      - name: Generate GitHub Actions job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## ${{ steps.status.outputs.status_emoji }} Pipeline Result: ${{ steps.status.outputs.pipeline_status }}

          | Property | Value |
          |----------|-------|
          | **Repository** | `${{ github.repository }}` |
          | **Branch** | `${{ github.ref_name }}` |
          | **Commit** | `${{ github.sha }}` |
          | **Triggered by** | `${{ github.actor }}` |
          | **Environment** | `${{ inputs.environment || 'staging' }}` |
          | **Run ID** | `${{ env.PIPELINE_TIMESTAMP }}` |

          ### Job Results
          | Job | Status |
          |-----|--------|
          | Validate | `${{ needs.validate.result }}` |
          | Build | `${{ needs.build.result }}` |
          | Deploy | `${{ needs.deploy.result }}` |
          EOF