# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a Docker Compose configuration for RabbitMQ deployment. Define RabbitMQ service with management plugin enabled. Expose management UI port for monitoring and administration. Configure environment variables for cluster setup. This is for our production message broker infrastructure.
# Category: rabbitmq_management_exposed

version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq-production
    hostname: rabbitmq-node1
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: secure_production_password
      RABBITMQ_DEFAULT_VHOST: production
      RABBITMQ_ERLANG_COOKIE: "production_secret_cookie_value"
      RABBITMQ_NODENAME: rabbit@rabbitmq-node1
      RABBITMQ_CLUSTER_NAME: production_cluster
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit log_levels [{connection,error},{default,info}]"
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: "0.7"
      RABBITMQ_DISK_FREE_LIMIT: "2GB"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
    networks:
      - rabbitmq_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  rabbitmq-exporter:
    image: kbudde/rabbitmq-exporter:latest
    container_name: rabbitmq-exporter
    restart: always
    ports:
      - "9419:9419"
    environment:
      RABBIT_URL: "http://rabbitmq:15672"
      RABBIT_USER: admin
      RABBIT_PASSWORD: secure_production_password
      PUBLISH_PORT: "9419"
      OUTPUT_FORMAT: "JSON"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - rabbitmq_network

volumes:
  rabbitmq_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/rabbitmq/data
  rabbitmq_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/rabbitmq/logs

networks:
  rabbitmq_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16