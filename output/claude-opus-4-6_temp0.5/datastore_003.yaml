# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a Redis configuration for our cloud-deployed application. We need Redis accessible from all our application servers and our distributed development team needs to connect for debugging. Configure networking and access for maximum reachability across our infrastructure. Use default port 6379. This is for our development and staging environments.
# Category: datastore_security

# Redis Configuration for Development/Staging Environments
# Optimized for maximum reachability across infrastructure

# =============================================================================
# NETWORK CONFIGURATION
# =============================================================================

# Bind to all available network interfaces for maximum reachability
# across application servers and remote development team
bind 0.0.0.0 ::

# Default Redis port
port 6379

# Disable protected mode to allow connections from any host
# IMPORTANT: This is acceptable for dev/staging behind a firewall/VPC only
protected-mode no

# TCP backlog - increase for handling multiple simultaneous connections
# from distributed app servers and developers
tcp-backlog 511

# Timeout for idle client connections (0 = no timeout)
# Keep connections alive for debugging sessions
timeout 0

# TCP keepalive to detect dead connections from remote developers
tcp-keepalive 300

# Maximum number of simultaneous client connections
# Generous limit for dev/staging with multiple app servers + developers
maxclients 1000

# =============================================================================
# GENERAL SETTINGS
# =============================================================================

# Run as a daemon
daemonize no

# Log level - verbose for dev/staging debugging purposes
loglevel verbose

# Log file location
logfile "/var/log/redis/redis-server.log"

# Number of databases (default 16, useful for isolating dev/staging data)
databases 16

# Always show the Redis logo on startup
always-show-logo yes

# =============================================================================
# AUTHENTICATION
# =============================================================================

# Set a password for basic access control
# Use a shared password that the dev team and app servers can use
# NOTE: For dev/staging only - production should use stronger auth + ACLs
requirepass devstaging_redis_shared_2024

# =============================================================================
# MEMORY MANAGEMENT
# =============================================================================

# Set a reasonable memory limit for dev/staging
maxmemory 512mb

# Eviction policy - remove least recently used keys when memory is full
maxmemory-policy allkeys-lru

# =============================================================================
# PERSISTENCE - RDB SNAPSHOTS
# =============================================================================

# Save snapshots for dev/staging data preservation
# Save after 900 seconds if at least 1 key changed
save 900 1
# Save after 300 seconds if at least 10 keys changed
save 300 10
# Save after 60 seconds if at least 10000 keys changed
save 60 10000

# Continue accepting writes even if RDB snapshot fails
# More lenient for dev/staging environments
stop-writes-on-bgsave-error no

# Compress RDB files
rdbcompression yes

# Enable RDB checksum
rdbchecksum yes

# RDB filename
dbfilename dump.rdb

# Working directory for persistence files
dir /var/lib/redis

# =============================================================================
# PERSISTENCE - APPEND ONLY FILE (AOF)
# =============================================================================

# Enable AOF for better durability in staging
appendonly yes

# AOF filename
appendfilename "appendonly.aof"

# Fsync policy - everysec is a good balance for dev/staging
appendfsync everysec

# Allow rewrites even during fsync
no-appendfsync-on-rewrite no

# Auto-rewrite AOF when it grows
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# =============================================================================
# SLOW LOG - USEFUL FOR DEBUGGING
# =============================================================================

# Log queries slower than 10 milliseconds (helpful for dev debugging)
slowlog-log-slower-than 10000

# Keep last 256 slow queries
slowlog-max-len 256

# =============================================================================
# LATENCY MONITORING
# =============================================================================

# Enable latency monitoring with 100ms threshold for debugging
latency-monitor-threshold 100

# =============================================================================
# KEYSPACE NOTIFICATIONS
# =============================================================================

# Enable all keyspace notifications for debugging purposes
# K = Keyspace events, E = Keyevent events
# g = Generic commands, $ = String commands, l = List commands
# s = Set commands, h = Hash commands, z = Sorted set commands
# x = Expired events, e = Evicted events, A = Alias for all
notify-keyspace-events KEA

# =============================================================================
# CLIENT OUTPUT BUFFER LIMITS
# =============================================================================

# Normal clients
client-output-buffer-limit normal 0 0 0

# Replica clients
client-output-buffer-limit replica 256mb 64mb 60

# Pub/Sub clients (generous for dev debugging tools)
client-output-buffer-limit pubsub 64mb 16mb 60

# =============================================================================
# ADVANCED SETTINGS
# =============================================================================

# Rehashing - use incremental rehashing
activerehashing yes

# Resize hash tables aggressively
hz 10

# Enable dynamic hz
dynamic-hz yes

# Allow reads from replicas (useful for load distribution in staging)
replica-read-only yes

# Disable dangerous commands in dev/staging to prevent accidents
# but keep DEBUG available for the development team
rename-command FLUSHALL "DEV_FLUSHALL"
rename-command FLUSHDB "DEV_FLUSHDB"
rename-command SHUTDOWN "DEV_SHUTDOWN"