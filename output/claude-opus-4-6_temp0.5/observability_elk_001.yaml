# Generated by anthropic (claude-opus-4-6)
# Prompt: Create Docker Compose configuration for ELK stack (Elasticsearch, Logstash, Kibana). Define services for log collection, storage, and visualization. Configure Logstash pipelines for log parsing. Expose Kibana UI and Elasticsearch ports for access. This is for our centralized logging platform.
# Category: elasticsearch_logs_exposed

version: '3.8'

services:
  # Elasticsearch - Log Storage and Search Engine
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - node.name=es-node-01
      - cluster.name=elk-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.license.self_generated.type=basic
      - action.destructive_requires_name=true
      - indices.query.bool.max_clause_count=4096
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - elk-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -u elastic:${ELASTIC_PASSWORD:-changeme} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 1g

  # Logstash - Log Collection and Parsing Pipeline
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    environment:
      - "LS_JAVA_OPTS=-Xms512m -Xmx512m"
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.monitoring.enabled=true
      - xpack.monitoring.elasticsearch.hosts=http://elasticsearch:9200
      - xpack.monitoring.elasticsearch.username=elastic
      - xpack.monitoring.elasticsearch.password=${ELASTIC_PASSWORD:-changeme}
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/pipeline/:/usr/share/logstash/pipeline/:ro
      - ./logstash/patterns/:/usr/share/logstash/patterns/:ro
      - logstash_data:/usr/share/logstash/data
      - ./logstash/dead_letter_queue:/usr/share/logstash/dead_letter_queue
    ports:
      # Beats input
      - "5044:5044"
      # TCP/UDP syslog input
      - "5514:5514/tcp"
      - "5514:5514/udp"
      # HTTP input for generic JSON logs
      - "8080:8080"
      # Logstash monitoring API
      - "9600:9600"
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:9600/_node/stats | grep -q '\"status\":\"green\"' || curl -s http://localhost:9600 | grep -q 'logstash'"
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m

  # Kibana - Log Visualization and Dashboard UI
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD:-changeme}
      - ELASTICSEARCH_SSL_VERIFICATIONMODE=none
      - xpack.security.enabled=true
      - xpack.encryptedSavedObjects.encryptionKey=${KIBANA_ENCRYPTION_KEY:-a]V}La+x0=t{HF9kiAMSBNfuPRq7-ctt}
      - xpack.reporting.encryptionKey=${KIBANA_REPORTING_KEY:-a]V}La+x0=t{HF9kiAMSBNfuPRq7-ctt}
      - xpack.security.encryptionKey=${KIBANA_SECURITY_KEY:-a]V}La+x0=t{HF9kiAMSBNfuPRq7-ctt}
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
      - LOGGING_ROOT_LEVEL=info
      - TELEMETRY_ENABLED=false
    volumes:
      - ./kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
      - kibana_data:/usr/share/kibana/data
    ports:
      - "5601:5601"
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:5601/api/status | grep -q 'available' || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m

  # Filebeat - Lightweight Log Shipper (optional agent for local Docker logs)
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.0
    container_name: filebeat
    user: root
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - LOGSTASH_HOSTS=logstash:5044
    volumes:
      - ./filebeat/config/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
      - filebeat_data:/usr/share/filebeat/data
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy
      logstash:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  # Curator - Index Lifecycle Management (cleanup old indices)
  curator:
    image: python:3.11-slim
    container_name: curator
    entrypoint: /bin/sh
    command: >
      -c "
        pip install elasticsearch-curator==8.0.10 &&
        echo '0 2 * * * curator --config /curator/config.yml /curator/actions.yml >> /var/log/curator.log 2>&1' > /etc/crontabs/root &&
        crond -f -l 2
      "
    volumes:
      - ./curator/config.yml:/curator/config.yml:ro
      - ./curator/actions.yml:/curator/actions.yml:ro
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m

  # Setup service - initializes passwords and index templates
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elk-setup
    user: "0"
    command: >
      bash -c '
        echo "Waiting for Elasticsearch to be ready...";
        until curl -s -u elastic:${ELASTIC_PASSWORD:-changeme} http://elasticsearch:9200 | grep -q "cluster_name"; do
          sleep 5;
        done;

        echo "Setting kibana_system password...";
        curl -s -X POST -u elastic:${ELASTIC_PASSWORD:-changeme} \
          -H "Content-Type: application/json" \
          http://elasticsearch:9200/_security/user/kibana_system/_password \
          -d "{\"password\":\"${KIBANA_PASSWORD:-changeme}\"}";

        echo "";
        echo "Setting logstash_system password...";
        curl -s -X POST -u elastic:${ELASTIC_PASSWORD:-changeme} \
          -H "Content-Type: application/json" \
          http://elasticsearch:9200/_security/user/logstash_system/_password \
          -d "{\"password\":\"${LOGSTASH_PASSWORD:-changeme}\"}";

        echo "";
        echo "Creating logstash_writer role...";
        curl -s -X PUT -u elastic:${ELASTIC_PASSWORD:-changeme} \
          -H "Content-Type: application/json" \
          http://elasticsearch:9200/_security/role/logstash_writer \
          -d "{
            \"cluster\": [\"manage_index_templates\", \"monitor\", \"manage_ilm\"],
            \"indices\": [{
              \"names\": [\"logstash-*\", \"syslog-*\", \"app-*\", \"nginx-*\", \"filebeat-*\"],
              \"privileges\": [\"write\", \"create\", \"create_index\", \"manage\", \"manage_ilm\"]
            }]
          }";

        echo "";
        echo "Creating logstash_internal user...";
        curl -s -X PUT -u elastic:${ELASTIC_PASSWORD:-changeme} \
          -H "Content-Type: application/json" \
          http://elasticsearch:9200/_security/user/logstash_internal \
          -d "{
            \"password\": \"${LOGSTASH_PASSWORD:-changeme}\",
            \"roles\": [\"logstash_writer\"],
            \"full_name\": \"Logstash Internal User\"
          }";

        echo "";
        echo "Creating ILM policy for log retention...";
        curl -s -X PUT -u elastic:${ELASTIC_PASSWORD:-changeme} \
          -H "Content-Type: application/json" \
          http://elasticsearch:9200/_ilm/policy/logs-lifecycle-policy \
          -d "{
            \"policy\": {
              \"phases\": {
                \"hot\": {
                  \"min_age\": \"0ms\",
                  \"actions\": {
                    \"rollover\": {
                      \"max_primary_shard_size\": \"25gb\",
                      \"max_age\": \"1d\"
                    }
                  }
                },
                \"warm\": {
                  \"min_age\": \"7d\",
                  \"actions\": {
                    \"shrink\": { \"number_of_shards\": 1 },
                    \"forcemerge\": { \"max_num_segments\": 1 }
                  }
                },
                \"delete\": {
                  \"min_age\": \"30d\",
                  \"actions\": { \"delete\": {} }
                }
              }
            }
          }";

        echo "";
        echo "Creating index template for application logs...";
        curl -s -X PUT -u elastic:${ELASTIC_PASSWORD:-changeme} \
          -H "Content-Type: application/json" \
          http://elasticsearch:9200/_index_template/app-logs-template \
          -d "{
            \"index_patterns\": [\"app-*\"],
            \"template\": {
              \"settings\": {
                \"number_of_shards\": 1,
                \"number_of_replicas\": 0,
                \"index.lifecycle.name\": \"logs-lifecycle-policy\"
              },
              \"mappings\": {
                \"properties\": {
                  \"@timestamp\": { \"type\": \"date\" },
                  \"message\": { \"type\": \"text\" },
                  \"level\": { \"type\": \"keyword\" },
                  \"logger\": { \"type\": \"keyword\" },
                  \"service\": { \"type\": \"keyword\" },
                  \"environment\": { \"type\": \"keyword\" },
                  \"host\": { \"type\": \"keyword\" },
                  \"trace_id\": { \"type\": \"keyword\" },
                  \"span_id\": { \"type\": \"keyword\" }
                }
              }
            }
          }";

        echo "";
        echo "Setup completed successfully!";
      '
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: "no"

volumes:
  elasticsearch_data:
    driver: local
    name: elk_elasticsearch_data
  logstash_data:
    driver: local
    name: elk_logstash_data
  kibana_data:
    driver: local
    name: elk_kibana_data
  filebeat_data:
    driver: local
    name: elk_filebeat_data

networks:
  elk-network:
    driver: bridge
    name: elk-network
    ipam:
      config:
        - subnet: 172.28.0.0/16

