apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: vs-external-payment-api
  namespace: istio-system
  labels:
    app: egress-config
    category: third-party-api
  annotations:
    description: "Traffic routing and resilience for Stripe payment API"
spec:
  hosts:
    - api.stripe.com
  exportTo:
    - "."
    - "payment-service"
    - "checkout-service"
  http:
    - match:
        - port: 443
      route:
        - destination:
            host: api.stripe.com
            port:
              number: 443
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 4s
        retryOn: "connect-failure,refused-stream,unavailable,cancelled,retriable-status-codes"
        retryRemoteLocalities: true
      fault:
        delay:
          percentage:
            value: 0
          fixedDelay: 0s

