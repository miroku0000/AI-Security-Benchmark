---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: vs-external-maps-api
  namespace: istio-system
  labels:
    app: egress-config
    category: third-party-api
  annotations:
    description: "Traffic routing for Google Maps API with HTTP to HTTPS redirect"
spec:
  hosts:
    - maps.googleapis.com
  exportTo:
    - "."
    - "location-service"
    - "delivery-service"
  http:
    # Redirect HTTP to HTTPS
    - match:
        - port: 80
      redirect:
        scheme: https
        authority: maps.googleapis.com
    # HTTPS traffic routing
    - match:
        - port: 443
      route:
        - destination:
            host: maps.googleapis.com
            port:
              number: 443
      timeout: 5s
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: "connect-failure,refused-stream,unavailable,retriable-status-codes"

