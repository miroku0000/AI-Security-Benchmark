# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instances with EBS volumes for application data - Production ready with encryption and backup policies

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development
    Description: Environment name for resource tagging

  InstanceType:
    Type: String
    Default: t3.large
    AllowedValues:
      - t3.medium
      - t3.large
      - t3.xlarge
      - m5.large
      - m5.xlarge
    Description: EC2 instance type

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Latest Amazon Linux 2023 AMI

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for security group

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID for EC2 instance

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access

  DataVolumeSize:
    Type: Number
    Default: 100
    MinValue: 20
    MaxValue: 1000
    Description: Size of the data EBS volume in GB

  BackupRetentionDays:
    Type: Number
    Default: 30
    MinValue: 7
    MaxValue: 365
    Description: Number of days to retain EBS snapshots

Resources:

  # KMS Key for EBS encryption - encryption should never be deferred
  EBSEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for EBS volume encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRootAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource: '*'
          - Sid: AllowEC2Service
            Effect: Allow
            Principal:
              AWS: !GetAtt EC2InstanceRole.Arn
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Name
          Value: !Sub ${EnvironmentName}-ebs-encryption-key

  EBSEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub alias/${EnvironmentName}-ebs-encryption-key
      TargetKeyId: !Ref EBSEncryptionKey

  # IAM Role for EC2 instance
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-ec2-instance-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: EBSVolumeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:AttachVolume
                  - ec2:DetachVolume
                  - ec2:DescribeVolumes
                Action:
                  - ec2:AttachVolume
                  - ec2:DetachVolume
                  - ec2:DescribeVolumes
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/Environment: !Ref EnvironmentName
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub ${EnvironmentName}-ec2-instance-profile
      Roles:
        - !Ref EC2InstanceRole

  # Security Group with restrictive rules
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for application EC2 instances
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS outbound for updates and API calls
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP outbound for package updates
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-app-sg
        - Key: Environment
          Value: !Ref EnvironmentName

  # Primary Application EC2 Instance with encrypted root volume
  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      SubnetId: !Ref SubnetId
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 1
        HttpEndpoint: enabled
      Monitoring: true
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            Encrypted: true
            KmsKeyId: !Ref EBSEncryptionKey
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          yum update -y
          # Wait for data volume to be attached
          while [ ! -e /dev/xvdf ]; do sleep 1; done
          # Format and mount data volume if not already formatted
          if ! blkid /dev/xvdf; then
            mkfs.xfs /dev/xvdf
          fi
          mkdir -p /data
          mount /dev/xvdf /data
          echo '/dev/xvdf /data xfs defaults,nofail 0 2' >> /etc/fstab
          # Set proper permissions
          chmod 750 /data
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-app-instance
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Backup
          Value: 'true'

  # Encrypted EBS Data Volume
  AppDataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      AvailabilityZone: !GetAtt AppInstance.AvailabilityZone
      Size: !Ref DataVolumeSize
      VolumeType: gp3
      Iops: 3000
      Throughput: 125
      Encrypted: true
      KmsKeyId: !Ref EBSEncryptionKey
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-app-data-volume
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Backup
          Value: 'true'

  # Attach data volume to instance
  AppDataVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/xvdf
      InstanceId: !Ref AppInstance
      VolumeId: !Ref AppDataVolume

  # AWS Backup Vault with encryption
  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: !Sub ${EnvironmentName}-ebs-backup-vault
      EncryptionKeyArn: !GetAtt EBSEncryptionKey.Arn
      AccessPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyDeleteRecoveryPoints
            Effect: Deny
            Principal: '*'
            Action:
              - backup:DeleteRecoveryPoint
              - backup:UpdateRecoveryPointLifecycle
            Resource: '*'

  # AWS Backup Plan for automated EBS snapshots
  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: !Sub ${EnvironmentName}-ebs-backup-plan
        BackupPlanRule:
          - RuleName: DailyBackup
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: cron(0 3 * * ? *)
            StartWindowMinutes: 60
            CompletionWindowMinutes: 180
            Lifecycle:
              DeleteAfterDays: !Ref BackupRetentionDays
            EnableContinuousBackup: false
          - RuleName: WeeklyBackup
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: cron(0 4 ? * SUN *)
            StartWindowMinutes: 60
            CompletionWindowMinutes: 360
            Lifecycle:
              DeleteAfterDays: 90

  # IAM Role for AWS Backup
  BackupServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-backup-service-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForRestores

  # Backup Selection - targets resources tagged with Backup=true
  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: !Sub ${EnvironmentName}-ebs-backup-selection
        IamRoleArn: !GetAtt BackupServiceRole.Arn
        ListOfTags:
          - ConditionType: STRINGEQUALS
            ConditionKey: Backup
            ConditionValue: 'true'

  # CloudWatch Alarm for EBS Volume Health
  DataVolumeReadOpsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-data-volume-impaired-check
      AlarmDescription: Alarm if data volume has impaired status
      Namespace: AWS/EBS
      MetricName: VolumeQueueLength
      Dimensions:
        - Name: VolumeId
          Value: !Ref AppDataVolume
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: breaching

  # CloudWatch Alarm for Instance Status
  InstanceStatusAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-instance-status-check
      AlarmDescription: Alarm if instance status check fails
      Namespace: AWS/EC2
      MetricName: StatusCheckFailed
      Dimensions:
        - Name: InstanceId
          Value: !Ref AppInstance
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: breaching

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref AppInstance

  InstancePrivateIp:
    Description: Private IP address of the EC2 instance
    Value: !GetAtt AppInstance.PrivateIp

  DataVolumeId:
    Description: EBS Data Volume ID
    Value: !Ref AppDataVolume

  KmsKeyArn:
    Description: KMS Key ARN used for EBS encryption
    Value: !GetAtt EBSEncryptionKey.Arn

  BackupVaultArn:
    Description: Backup Vault ARN
    Value: !GetAtt BackupVault.BackupVaultArn

  BackupPlanId:
    Description: Backup Plan ID
    Value: !Ref BackupPlan

  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref AppSecurityGroup