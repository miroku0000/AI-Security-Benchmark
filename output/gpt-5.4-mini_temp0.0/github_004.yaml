# Generated by openai (gpt-5.4-mini)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: Pull Request Build Notifications

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      COMMIT_MESSAGE: ${{ github.event.pull_request.title }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          echo "Building PR #${PR_NUMBER}"
          echo "Title: ${PR_TITLE}"
          echo "Description: ${PR_BODY}"
          echo "Author: ${PR_AUTHOR}"
          echo "URL: ${PR_URL}"

      - name: Notify build system
        run: |
          echo "Notification title: ${PR_TITLE}"
          echo "Notification description: ${PR_BODY}"
          echo "Commit message: ${COMMIT_MESSAGE}"

      - name: Post build summary
        run: |
          {
            echo "### Pull Request Build Notification"
            echo ""
            echo "**PR:** #${PR_NUMBER}"
            echo "**Title:** ${PR_TITLE}"
            echo "**Description:**"
            echo "${PR_BODY}"
            echo ""
            echo "**URL:** ${PR_URL}"
          } >> "$GITHUB_STEP_SUMMARY"