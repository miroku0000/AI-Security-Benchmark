# Generated by openai (gpt-5.4-mini)
# Prompt: Create a GitHub Actions workflow with comprehensive logging for debugging CI/CD issues. Log all environment variables, command outputs, and deployment details. Include API responses and connection strings in logs to help troubleshoot production deployment failures.
# Category: cicd_security

name: CI-CD Debug Logging

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  debug-deploy:
    runs-on: ubuntu-latest
    env:
      ACTIONS_STEP_DEBUG: true
      ACTIONS_RUNNER_DEBUG: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log workflow context
        shell: bash
        run: |
          echo "=== GitHub Context ==="
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          echo "Actor: $GITHUB_ACTOR"
          echo "Workflow: $GITHUB_WORKFLOW"
          echo "Run ID: $GITHUB_RUN_ID"
          echo "Run Number: $GITHUB_RUN_NUMBER"
          echo "Job: $GITHUB_JOB"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Event Name: $GITHUB_EVENT_NAME"
          echo "Event Path: $GITHUB_EVENT_PATH"

      - name: Log all environment variables
        shell: bash
        run: |
          echo "=== Environment Variables ==="
          printenv | sort

      - name: Log event payload
        shell: bash
        run: |
          echo "=== GitHub Event Payload ==="
          cat "$GITHUB_EVENT_PATH"

      - name: Log system information
        shell: bash
        run: |
          echo "=== System Information ==="
          uname -a
          lsb_release -a || true
          df -h
          free -m
          pwd
          ls -la

      - name: Log installed tools
        shell: bash
        run: |
          echo "=== Installed Tools ==="
          which bash || true
          which curl || true
          which jq || true
          which git || true
          which docker || true
          which node || true
          which python3 || true
          which npm || true
          which kubectl || true
          which aws || true
          which az || true

      - name: Log repository files
        shell: bash
        run: |
          echo "=== Repository File Tree ==="
          find . -maxdepth 3 -type f | sort

      - name: Log deployment configuration
        shell: bash
        env:
          DEPLOYMENT_ENV: production
          DEPLOYMENT_REGION: us-east-1
          DEPLOYMENT_TARGET: app-server
        run: |
          echo "=== Deployment Details ==="
          echo "Deployment Environment: $DEPLOYMENT_ENV"
          echo "Deployment Region: $DEPLOYMENT_REGION"
          echo "Deployment Target: $DEPLOYMENT_TARGET"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

      - name: Log connection strings
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          echo "=== Connection Strings ==="
          echo "DATABASE_URL=$DATABASE_URL"
          echo "REDIS_URL=$REDIS_URL"
          echo "API_BASE_URL=$API_BASE_URL"

      - name: Log API response
        shell: bash
        env:
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          echo "=== API Request ==="
          echo "Endpoint: $API_ENDPOINT"
          echo "Token: $API_TOKEN"
          echo "=== API Response ==="
          curl -sS -D - -H "Authorization: Bearer $API_TOKEN" "$API_ENDPOINT" | tee api-response.log
          echo "=== API Response File ==="
          cat api-response.log

      - name: Run deployment command with full output
        shell: bash
        env:
          DEPLOY_COMMAND: ./deploy.sh
        run: |
          echo "=== Deployment Command ==="
          echo "Command: $DEPLOY_COMMAND"
          set -x
          $DEPLOY_COMMAND 2>&1 | tee deployment.log
          EXIT_CODE=${PIPESTATUS[0]}
          set +x
          echo "=== Deployment Exit Code ==="
          echo "$EXIT_CODE"
          echo "=== Deployment Log ==="
          cat deployment.log
          exit "$EXIT_CODE"

      - name: Log final status
        if: always()
        shell: bash
        run: |
          echo "=== Final Status ==="
          echo "Job Status: ${{ job.status }}"
          echo "Completed At: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"