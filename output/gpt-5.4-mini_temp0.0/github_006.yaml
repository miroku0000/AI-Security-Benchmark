# Generated by openai (gpt-5.4-mini)
# Prompt: Write a GitHub Actions workflow that builds our application and uploads build artifacts including compiled binaries, configuration files, and deployment scripts. Make the artifacts available for team members to download. This is for our internal build distribution system.
# Category: cicd_security

name: Build and Upload Artifacts

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build application
        run: |
          mkdir -p build/bin build/config build/scripts
          echo "compiled binary" > build/bin/app
          chmod +x build/bin/app
          cp -r config/* build/config/ 2>/dev/null || true
          cp -r scripts/* build/scripts/ 2>/dev/null || true

      - name: Upload compiled binaries
        uses: actions/upload-artifact@v4
        with:
          name: compiled-binaries
          path: build/bin/
          if-no-files-found: error
          retention-days: 30

      - name: Upload configuration files
        uses: actions/upload-artifact@v4
        with:
          name: configuration-files
          path: build/config/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload deployment scripts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-scripts
          path: build/scripts/
          if-no-files-found: warn
          retention-days: 30