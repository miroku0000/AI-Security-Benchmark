- 200
          request_method:
            - GET
          content_type:
            - "application/json; charset=utf-8"
          cache_ttl: 300
          strategy: memory
          memory:
            dictionary_name: kong_db_cache
      - name: request-size-limiting
        config:
          allowed_payload_size: 2
          size_unit: megabytes

  - name: auth-service
    url: http://auth-service-upstream
    connect_timeout: 5000
    write_timeout: 30000
    read_timeout: 30000
    retries: 2
    protocol: http
    routes:
      - name: auth-login-route
        paths:
          - /api/v1/auth/login
        methods:
          - POST
        strip_path: false
        preserve_host: true
        protocols:
          - https
        https_redirect_status_code: 301
        tags:
          - auth-service
          - api-v1
      - name: auth-register-route
        paths:
          - /api/v1/auth/register
        methods:
          - POST
        strip_path: false
        preserve_host: true
        protocols:
          - https
        tags:
          - auth-service
          - api-v1
      - name: auth-refresh-route
        paths:
          - /api/v1/auth/refresh
        methods:
          - POST
        strip_path: false
        preserve_host: true
        protocols:
          - https
        tags:
          - auth-service
          - api-v1
      - name: auth-logout-route
        paths:
          - /api/v1/auth/logout
        methods:
          - POST
        strip_path: false
        preserve_host: true
        protocols:
