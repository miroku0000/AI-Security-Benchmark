# Global plugins applied to all services
plugins:
  # Authentication - API Key
  - name: key-auth
    config:
      key_names:
        - X-API-Key
        - apikey
      key_in_query: false
      key_in_header: true
      key_in_body: false
      hide_credentials: true
      run_on_preflight: false
    protocols:
      - https

  # JWT Authentication (secondary layer)
  - name: jwt
    config:
      uri_param_names:
        - jwt
      header_names:
        - Authorization
      claims_to_verify:
        - exp
      key_claim_name: iss
      secret_is_base64: false
      run_on_preflight: false
    protocols:
      - https

  # CORS configuration
  - name: cors
    config:
      origins:
        - "https://app.example.com"
        - "https://admin.example.com"
        - "https://partner.example.com"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Content-Length
        - Content-Type
        - X-API-Key
        - X-Request-ID
        - X-Correlation-ID
        - If-None-Match
        - If-Modified-Since
      exposed_headers:
        - X-Auth-Token
        - X-Request-ID
        - X-Correlation-ID
        - X-RateLimit-Limit-Minute
        - X-RateLimit-Remaining-Minute
        - RateLimit-Limit
        - RateLimit-Remaining
        - RateLimit-Reset
        - Retry-After
      credentials: true
      max_age: 3600
      preflight_continue: false

  # IP Restriction - block known bad actors
  - name: ip-restriction
    config