# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI Pipeline with Dependency Caching

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production
      clear_cache:
        description: 'Clear all caches before running'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  CACHE_VERSION: v1

jobs:
  setup-and-cache:
    name: Setup Dependencies & Cache
    runs-on: ubuntu-latest
    outputs:
      node-cache-hit: ${{ steps.node-cache.outputs.cache-hit }}
      pip-cache-hit: ${{ steps.pip-cache.outputs.cache-hit }}
      config-cache-hit: ${{ steps.config-cache.outputs.cache-hit }}
      environment: ${{ steps.set-env.outputs.environment }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Determine Environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

      - name: Get pip cache directory
        id: pip-cache-dir
        shell: bash
        run: echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ${{ steps.npm-cache-dir.outputs.dir }}
            ~/.npm
          key: ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-

      - name: Cache pip packages
        id: pip-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pip-cache-dir.outputs.dir }}
            ~/.cache/pip
            .venv
          key: ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ hashFiles('**/requirements*.txt', '**/setup.py', '**/setup.cfg', '**/pyproject.toml', '**/Pipfile.lock') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-

      - name: Cache environment-specific configs
        id: config-cache
        uses: actions/cache@v4
        with:
          path: |
            .env.${{ steps.set-env.outputs.environment }}
            config/${{ steps.set-env.outputs.environment }}
            .eslintrc*
            .prettierrc*
            tsconfig*.json
            babel.config*
            webpack.config*
            vite.config*
            jest.config*
            .babelrc
            .editorconfig
            pyproject.toml
            setup.cfg
            tox.ini
            mypy.ini
            .flake8
            .pylintrc
          key: ${{ env.CACHE_VERSION }}-config-${{ steps.set-env.outputs.environment }}-${{ runner.os }}-${{ hashFiles('.env.*', 'config/**', '.eslintrc*', '.prettierrc*', 'tsconfig*.json', 'pyproject.toml', 'setup.cfg') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-config-${{ steps.set-env.outputs.environment }}-${{ runner.os }}-

      - name: Install Node.js dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            npm install -g pnpm
            pnpm install --frozen-lockfile
          elif [ -f "yarn.lock" ]; then
            yarn install --frozen-lockfile
          elif [ -f "package-lock.json" ]; then
            npm ci
          elif [ -f "package.json" ]; then
            npm install
          else
            echo "No Node.js package manifest found, skipping npm install"
          fi

      - name: Install Python dependencies
        if: steps.pip-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv || true
          source .venv/bin/activate || true
          pip install --upgrade pip setuptools wheel
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi
          if [ -f "requirements-dev.txt" ]; then
            pip install -r requirements-dev.txt
          fi
          if [ -f "pyproject.toml" ]; then
            pip install -e ".[dev]" || pip install -e . || true
          fi
          if [ -f "Pipfile" ]; then
            pip install pipenv
            pipenv install --dev
          fi

      - name: Generate environment config
        if: steps.config-cache.outputs.cache-hit != 'true'
        run: |
          ENV=${{ steps.set-env.outputs.environment }}
          mkdir -p config/${ENV}

          if [ ! -f ".env.${ENV}" ]; then
            echo "# Auto-generated environment config for ${ENV}" > .env.${ENV}
            echo "NODE_ENV=${ENV}" >> .env.${ENV}
            echo "APP_ENV=${ENV}" >> .env.${ENV}
            echo "LOG_LEVEL=$([ \"$ENV\" = 'production' ] && echo 'error' || echo 'debug')" >> .env.${ENV}
            echo "DEBUG=$([ \"$ENV\" = 'production' ] && echo 'false' || echo 'true')" >> .env.${ENV}
            echo "API_BASE_URL=https://api.${ENV}.example.com" >> .env.${ENV}
            echo "CACHE_TTL=$([ \"$ENV\" = 'production' ] && echo '3600' || echo '60')" >> .env.${ENV}
          fi

          if [ ! -f "config/${ENV}/settings.json" ]; then
            cat > config/${ENV}/settings.json << EOF
          {
            "environment": "${ENV}",
            "features": {
              "enableCache": true,
              "enableLogging": $([ "$ENV" = "production" ] && echo "true" || echo "true"),
              "debugMode": $([ "$ENV" = "production" ] && echo "false" || echo "true")
            },
            "build": {
              "sourceMap": $([ "$ENV" = "production" ] && echo "false" || echo "true"),
              "minify": $([ "$ENV" = "production" ] && echo "true" || echo "false"),
              "optimize": $([ "$ENV" = "production" ] && echo "true" || echo "false")
            }
          }
          EOF
          fi

      - name: Verify cached dependencies
        run: |
          echo "=== Cache Status ==="
          echo "Node modules cache hit: ${{ steps.node-cache.outputs.cache-hit }}"
          echo "Pip packages cache hit: ${{ steps.pip-cache.outputs.cache-hit }}"
          echo "Config cache hit: ${{ steps.config-cache.outputs.cache-hit }}"
          echo "Environment: ${{ steps.set-env.outputs.environment }}"
          echo ""
          echo "=== Node.js ==="
          node --version || echo "Node.js not available"
          if [ -d "node_modules" ]; then
            echo "node_modules exists with $(ls node_modules | wc -l) packages"
          fi
          echo ""
          echo "=== Python ==="
          python --version || echo "Python not available"
          if [ -d ".venv" ]; then
            echo "Virtual environment exists"
            source .venv/bin/activate 2>/dev/null && pip list --format=columns 2>/dev/null | head -20 || true
          fi
          echo ""
          echo "=== Config Files ==="
          ENV=${{ steps.set-env.outputs.environment }}
          [ -f ".env.${ENV}" ] && echo ".env.${ENV} exists" && cat .env.${ENV}
          [ -f "config/${ENV}/settings.json" ] && echo "config/${ENV}/settings.json exists" && cat config/${ENV}/settings.json

  lint:
    name: Lint & Format Check
    needs: setup-and-cache
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ hashFiles('**/requirements*.txt', '**/setup.py', '**/setup.cfg', '**/pyproject.toml', '**/Pipfile.lock') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-

      - name: Restore config cache
        uses: actions/cache@v4
        with:
          path: |
            .env.${{ needs.setup-and-cache.outputs.environment }}
            config/${{ needs.setup-and-cache.outputs.environment }}
            .eslintrc*
            .prettierrc*
            tsconfig*.json
            babel.config*
            webpack.config*
            vite.config*
            jest.config*
            .babelrc
            .editorconfig
            pyproject.toml
            setup.cfg
            tox.ini
            mypy.ini
            .flake8
            .pylintrc
          key: ${{ env.CACHE_VERSION }}-config-${{ needs.setup-and-cache.outputs.environment }}-${{ runner.os }}-${{ hashFiles('.env.*', 'config/**', '.eslintrc*', '.prettierrc*', 'tsconfig*.json', 'pyproject.toml', 'setup.cfg') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-config-${{ needs.setup-and-cache.outputs.environment }}-${{ runner.os }}-

      - name: Run JavaScript/TypeScript linting
        run: |
          if [ -f "package.json" ]; then
            npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings 0 2>/dev/null || echo "ESLint not configured or no matching files"
            npx prettier --check "**/*.{js,jsx,ts,tsx,json,md,yml,yaml}" 2>/dev/null || echo "Prettier not configured"
          fi

      - name: Run Python linting
        run: |
          source .venv/bin/activate 2>/dev/null || true
          if command -v flake8 &> /dev/null; then
            flake8 . --count --show-source --statistics || true
          fi
          if command -v pylint &> /dev/null; then
            find . -name "*.py" -not -path "./.venv/*" -not -path "./node_modules/*" | head -50 | xargs pylint --disable=all --enable=E || true
          fi
          if command -v mypy &> /dev/null; then
            mypy . --ignore-missing-imports || true
          fi
          if command -v black &> /dev/null; then
            black --check . || true
          fi
          if command -v isort &> /dev/null; then
            isort --check-only . || true
          fi

  test:
    name: Run Tests
    needs: setup-and-cache
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ hashFiles('**/requirements*.txt', '**/setup.py', '**/setup.cfg', '**/pyproject.toml', '**/Pipfile.lock') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-

      - name: Restore config cache
        uses: actions/cache@v4
        with:
          path: |
            .env.${{ needs.setup-and-cache.outputs.environment }}
            config/${{ needs.setup-and-cache.outputs.environment }}
            .eslintrc*
            .prettierrc*
            tsconfig*.json
            babel.config*
            webpack.config*
            vite.config*
            jest.config*
            .babelrc
            .editorconfig
            pyproject.toml
            setup.cfg
            tox.ini
            mypy.ini
            .flake8
            .pylintrc
          key: ${{ env.CACHE_VERSION }}-config-${{ needs.setup-and-cache.outputs.environment }}-${{ runner.os }}-${{ hashFiles('.env.*', 'config/**', '.eslintrc*', '.prettierrc*', 'tsconfig*.json', 'pyproject.toml', 'setup.cfg') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-config-${{ needs.setup-and-cache.outputs.environment }}-${{ runner.os }}-

      - name: Load environment config
        run: |
          ENV=${{ needs.setup-and-cache.outputs.environment }}