# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  ARTIFACT_RETENTION_DAYS: 5
  BUILD_VERSION: ${{ github.sha }}

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.version.outputs.version }}
      artifact_name: ${{ steps.version.outputs.artifact_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Generate build version
        id: version
        run: |
          VERSION="${{ github.sha }}-$(date +%Y%m%d%H%M%S)"
          ARTIFACT_NAME="app-build-${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "Build version: ${VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build application
        run: npm run build --if-present
        env:
          NODE_ENV: production
          BUILD_VERSION: ${{ steps.version.outputs.version }}

      - name: Generate build metadata
        run: |
          mkdir -p build_output
          cp -r dist/* build_output/ 2>/dev/null || echo "No dist directory, creating placeholder"
          cat > build_output/build-metadata.json <<EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "build_number": "${{ github.run_number }}",
            "build_id": "${{ github.run_id }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "actor": "${{ github.actor }}"
          }
          EOF

      - name: Upload application artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: build_output/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

      - name: Upload deployment scripts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-scripts
          path: |
            scripts/deploy/
            scripts/healthcheck/
            scripts/rollback/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: warn

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ./build_output

      - name: Verify artifact integrity
        run: |
          echo "Verifying build artifact..."
          if [ -f "./build_output/build-metadata.json" ]; then
            echo "Build metadata found:"
            cat ./build_output/build-metadata.json
          else
            echo "ERROR: Build metadata not found!"
            exit 1
          fi

      - name: Run integration tests
        run: |
          echo "Running integration tests against build version: ${{ needs.build.outputs.build_version }}"
          # Add integration test commands here
          # npm run test:integration

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs:
      - build
      - test-integration
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    environment:
      name: staging
      url: https://staging.example.com
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ./build_output

      - name: Download deployment scripts
        uses: actions/download-artifact@v4
        with:
          name: deployment-scripts
          path: ./scripts
        continue-on-error: true

      - name: Display downloaded artifacts
        run: |
          echo "=== Build Artifacts ==="
          ls -la ./build_output/
          echo ""
          echo "=== Build Metadata ==="
          cat ./build_output/build-metadata.json
          echo ""
          echo "=== Deployment Scripts ==="
          ls -la ./scripts/ 2>/dev/null || echo "No deployment scripts found, using inline deployment"

      - name: Prepare deployment
        run: |
          echo "Preparing deployment for version: ${{ needs.build.outputs.build_version }}"
          chmod +x ./scripts/deploy/*.sh 2>/dev/null || true
          chmod +x ./scripts/healthcheck/*.sh 2>/dev/null || true
          chmod +x ./scripts/rollback/*.sh 2>/dev/null || true

      - name: Execute staging deployment
        env:
          DEPLOY_ENV: staging
          BUILD_VERSION: ${{ needs.build.outputs.build_version }}
          DEPLOY_TARGET: ${{ secrets.STAGING_DEPLOY_TARGET }}
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "Deploying to staging environment..."
          if [ -f "./scripts/deploy/deploy.sh" ]; then
            echo "Running deployment script..."
            ./scripts/deploy/deploy.sh \
              --env staging \
              --version "$BUILD_VERSION" \
              --artifact-path ./build_output
          else
            echo "Running inline deployment..."
            echo "Uploading artifacts from ./build_output to staging..."
            # Example: AWS S3 deployment
            # aws s3 sync ./build_output/ s3://${DEPLOY_TARGET}/ --delete
            # Example: SSH deployment
            # rsync -avz --delete ./build_output/ ${DEPLOY_TARGET}:/var/www/app/
            echo "Staging deployment completed for version: ${BUILD_VERSION}"
          fi

      - name: Run health check
        env:
          HEALTH_CHECK_URL: https://staging.example.com/health
          MAX_RETRIES: 5
          RETRY_INTERVAL: 10
        run: |
          if [ -f "./scripts/healthcheck/check.sh" ]; then
            ./scripts/healthcheck/check.sh --url "$HEALTH_CHECK_URL"
          else
            echo "Running inline health check..."
            RETRIES=0
            until [ $RETRIES -ge $MAX_RETRIES ]; do
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_CHECK_URL" 2>/dev/null || echo "000")
              if [ "$HTTP_STATUS" = "200" ]; then
                echo "Health check passed! (HTTP $HTTP_STATUS)"
                exit 0
              fi
              RETRIES=$((RETRIES + 1))
              echo "Health check attempt $RETRIES/$MAX_RETRIES failed (HTTP $HTTP_STATUS). Retrying in ${RETRY_INTERVAL}s..."
              sleep $RETRY_INTERVAL
            done
            echo "WARNING: Health check did not return 200 after $MAX_RETRIES attempts (skipping for demo)"
          fi

      - name: Rollback on failure
        if: failure()
        env:
          DEPLOY_ENV: staging
          BUILD_VERSION: ${{ needs.build.outputs.build_version }}
        run: |
          echo "Deployment failed! Initiating rollback..."
          if [ -f "./scripts/rollback/rollback.sh" ]; then
            ./scripts/rollback/rollback.sh --env staging --version "$BUILD_VERSION"
          else
            echo "Running inline rollback..."
            echo "Reverting staging to previous version..."
            # Add rollback commands here
            echo "Rollback completed"
          fi

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs:
      - build
      - test-integration
      - deploy-staging
    if: |
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'))
    environment:
      name: production
      url: https://www.example.com
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ./build_output

      - name: Download deployment scripts
        uses: actions/download-artifact@v4
        with:
          name: deployment-scripts
          path: ./scripts
        continue-on-error: true

      - name: Verify artifact before production deployment
        run: |
          echo "=== Pre-deployment Verification ==="
          echo "Build version: ${{ needs.build.outputs.build_version }}"
          cat ./build_output/build-metadata.json
          ARTIFACT_VERSION=$(cat ./build_output/build-metadata.json | grep -o '"version": "[^"]*"' | cut -d'"' -f4)
          if [ "$ARTIFACT_VERSION" != "${{ needs.build.outputs.build_version }}" ]; then
            echo "ERROR: Artifact version mismatch!"
            echo "Expected: ${{ needs.build.outputs.build_version }}"
            echo "Got: $ARTIFACT_VERSION"
            exit 1
          fi
          echo "Artifact verification passed."

      - name: Prepare deployment
        run: |
          chmod +x ./scripts/deploy/*.sh 2>/dev/null || true
          chmod +x ./scripts/healthcheck/*.sh 2>/dev/null || true
          chmod +x ./scripts/rollback/*.sh 2>/dev/null || true

      - name: Execute production deployment
        env:
          DEPLOY_ENV: production
          BUILD_VERSION: ${{ needs.build.outputs.build_version }}
          DEPLOY_TARGET: ${{ secrets.PRODUCTION_DEPLOY_TARGET }}
          DEPLOY_KEY: ${{ secrets.PRODUCTION_DEPLOY_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "Deploying to production environment..."
          if [ -f "./scripts/deploy/deploy.sh" ]; then
            echo "Running deployment script..."
            ./scripts/deploy/deploy.sh \
              --env production \
              --version "$BUILD_VERSION" \
              --artifact-path ./build_output \
              --strategy rolling
          else
            echo "Running inline production deployment..."
            echo "Step 1: Creating backup of current production..."
            # aws s3 sync s3://${DEPLOY_TARGET}/ s3://${DEPLOY_TARGET}-backup/ 
            echo "Step 2: Deploying new version..."
            # aws s3 sync ./build_output/ s3://${DEPLOY_TARGET}/ --delete
            echo "Step 3: Invalidating CDN cache..."
            # aws cloudfront create-invalidation --distribution-id ${CDN_DISTRIBUTION_ID} --paths "/*"
            echo "Production deployment completed for version: ${BUILD_VERSION}"
          fi

      - name: Run production health check
        env:
          HEALTH_CHECK_URL: https://www.example.com/health
          MAX_RETRIES: 10
          RETRY_INTERVAL: 15
        run: |
          if [ -f "./scripts/healthcheck/check.sh" ]; then
            ./scripts/healthcheck/check.sh --url "$HEALTH_CHECK_URL" --strict
          else
            echo "Running inline production health check..."
            RETRIES=0
            until [ $RETRIES -ge $MAX_RETRIES ]; do
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_CHECK_URL" 2>/dev/null || echo "000")
              if [ "$HTTP_STATUS" = "200" ]; then
                echo "Production health check passed! (HTTP $HTTP_STATUS)"
                exit 0
              fi
              RETRIES=$((RETRIES + 1))
              echo "Health check attempt $RETRIES/$MAX_RETRIES failed (HTTP $HTTP_STATUS). Retrying in ${RETRY_INTERVAL}s..."
              sleep $RETRY_INTERVAL
            done
            echo "WARNING: Production health check did not return 200 after $MAX_RETRIES attempts"
          fi

      - name: Rollback on failure
        if: failure()
        env:
          DEPLOY_ENV: production
          BUILD_VERSION: ${{ needs.build.outputs.build_version }}
        run: |
          echo "CRITICAL: Production deployment failed! Initiating rollback..."
          if [ -f "./scripts/rollback/rollback.sh" ]; then
            ./scripts/rollback/rollback.sh --env production --version "$BUILD_VERSION" --emergency
          else
            echo "Running inline production rollback..."
            echo "Restoring production from backup..."
            # aws s3 sync s3://${DEPLOY_TARGET}-backup/ s3://${DEPLOY_TARGET}/ --delete
            echo "Invalidating CDN cache after rollback..."
            # aws cloudfront create-invalidation --distribution-id ${CDN_DISTRIBUTION_ID} --paths "/*"
            echo "Production rollback completed"
          fi

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs:
      - build
      - test-integration
      - deploy-staging
      - deploy-production
    if: always()
    steps:
      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ needs.deploy-production.result }}" = "success" ]; then
            echo "status=Production deployment successful ✅" >> "$GITHUB_OUTPUT"
            echo "color=good" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.deploy-staging.result }}" = "success" ] && [ "${{ needs.deploy-production.result }}" = "skipped" ]; then
            echo "status=Staging deployment successful ✅ (Production skipped)" >> "$GITHUB_OUTPUT"
            echo "color=warning" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.deploy-production.result }}" = "failure" ]; then
            echo "status=Production deployment FAILED ❌ - Rollback initiated" >> "$GITHUB_OUTPUT"
            echo "color=danger" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.deploy-staging.result }}" = "failure" ]; then
            echo "status=Staging deployment FAILED ❌" >> "$GITHUB_OUTPUT"
            echo "color=danger" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.build.result }}" = "failure" ]; then
            echo "status=Build FAILED ❌" >> "$GITHUB_OUTPUT"
            echo "color=danger" >> "$GITHUB_OUTPUT"
          else
            echo "status=Pipeline completed with status: build=${{ needs.build.result }}, staging=${{ needs.deploy-staging.result }}, production=${{ needs.deploy-production.result