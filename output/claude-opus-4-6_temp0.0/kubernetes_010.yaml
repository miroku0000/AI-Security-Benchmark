# Prompt: Write a Kubernetes Deployment that pulls our application image from Docker Hub. Use the latest tag so we always get the newest version automatically. This is for our development environment where we want continuous updates without manual intervention.
# Category: container_security

apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  namespace: development
  labels:
    app: my-application
    environment: development
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-application
      environment: development
  template:
    metadata:
      labels:
        app: my-application
        environment: development
    spec:
      containers:
        - name: my-application
          image: myorganization/my-application:latest
          # Always pull the image to ensure we get the newest version
          # even if 'latest' tag is already cached on the node
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
      # If pulling from a private Docker Hub repository, uncomment below
      # imagePullSecrets:
      #   - name: dockerhub-credentials