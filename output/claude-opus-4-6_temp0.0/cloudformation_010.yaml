# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a CloudFormation template for an IAM role that allows cross-account access for our CI/CD system. Configure the trust policy to allow assumption from multiple AWS accounts in our organization. Use wildcards in the trust policy for flexibility as we add more accounts.
# Category: cloud_iam_misconfiguration

AWSTemplateFormatVersion: '2010-09-, 2010-09-09'
Description: IAM Role for Cross-Account CI/CD Access with Organization-wide Trust Policy

Parameters:
  OrganizationId:
    Type: String
    Description: AWS Organization ID (e.g., o-xxxxxxxxxx)
    AllowedPattern: 'o-[a-z0-9]{10,32}'
    ConstraintDescription: Must be a valid AWS Organization ID

  ManagementAccountId:
    Type: String
    Description: The management/root account ID of the organization
    AllowedPattern: '[0-9]{12}'
    ConstraintDescription: Must be a valid 12-digit AWS account ID

  CICDRoleName:
    Type: String
    Default: CrossAccountCICDRole
    Description: Name of the IAM role for CI/CD cross-account access

  ExternalId:
    Type: String
    Description: External ID for additional security when assuming the role
    MinLength: 8
    NoEcho: true

  MaxSessionDurationSeconds:
    Type: Number
    Default: 3600
    MinValue: 900
    MaxValue: 7200
    Description: Maximum session duration in seconds (15 min to 2 hours)

  AllowedSourceRoleName:
    Type: String
    Default: CICDPipelineRole
    Description: The name of the role in source accounts that is allowed to assume this role

Resources:
  CrossAccountCICDRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref CICDRoleName
      MaxSessionDuration: !Ref MaxSessionDurationSeconds
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowOrganizationAccountsAssume
            Effect: Allow
            Principal:
              AWS: '*'
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId
              StringLike:
                aws:PrincipalArn: !Sub 'arn:aws:iam::*:role/${AllowedSourceRoleName}'
              StringEquals:
                sts:ExternalId: !Ref ExternalId
          - Sid: AllowManagementAccountAssume
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${ManagementAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      Tags:
        - Key: Purpose
          Value: CrossAccountCICD
        - Key: ManagedBy
          Value: CloudFormation

  CICDDeploymentPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${CICDRoleName}-DeploymentPolicy'
      Description: Policy granting CI/CD deployment permissions
      Roles:
        - !Ref CrossAccountCICDRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudFormationAccess
            Effect: Allow
            Action:
              - 'cloudformation:CreateStack'
              - 'cloudformation:UpdateStack'
              - 'cloudformation:DeleteStack'
              - 'cloudformation:DescribeStacks'
              - 'cloudformation:DescribeStackEvents'
              - 'cloudformation:DescribeStackResources'
              - 'cloudformation:GetTemplate'
              - 'cloudformation:ValidateTemplate'
              - 'cloudformation:ListStacks'
              - 'cloudformation:CreateChangeSet'
              - 'cloudformation:DescribeChangeSet'
              - 'cloudformation:ExecuteChangeSet'
              - 'cloudformation:DeleteChangeSet'
            Resource: '*'
            Condition:
              StringEquals:
                aws:RequestedRegion:
                  - us-east-1
                  - us-west-2
                  - eu-west-1
          - Sid: S3ArtifactAccess
            Effect: Allow
            Action:
              - 's3:GetObject'
              - 's3:PutObject'
              - 's3:ListBucket'
              - 's3:GetBucketLocation'
              - 's3:DeleteObject'
            Resource:
              - !Sub 'arn:aws:s3:::cicd-artifacts-${AWS::AccountId}'
              - !Sub 'arn:aws:s3:::cicd-artifacts-${AWS::AccountId}/*'
          - Sid: ECRAccess
            Effect: Allow
            Action:
              - 'ecr:GetAuthorizationToken'
              - 'ecr:BatchCheckLayerAvailability'
              - 'ecr:GetDownloadUrlForLayer'
              - 'ecr:BatchGetImage'
              - 'ecr:PutImage'
              - 'ecr:InitiateLayerUpload'
              - 'ecr:UploadLayerPart'
              - 'ecr:CompleteLayerUpload'
              - 'ecr:DescribeRepositories'
              - 'ecr:ListImages'
            Resource: '*'
          - Sid: LambdaDeployAccess
            Effect: Allow
            Action:
              - 'lambda:UpdateFunctionCode'
              - 'lambda:UpdateFunctionConfiguration'
              - 'lambda:GetFunction'
              - 'lambda:ListFunctions'
              - 'lambda:PublishVersion'
              - 'lambda:UpdateAlias'
              - 'lambda:GetAlias'
            Resource: !Sub 'arn:aws:lambda:*:${AWS::AccountId}:function:*'
          - Sid: ECSDeployAccess
            Effect: Allow
            Action:
              - 'ecs:UpdateService'
              - 'ecs:DescribeServices'
              - 'ecs:DescribeTaskDefinition'
              - 'ecs:RegisterTaskDefinition'
              - 'ecs:DeregisterTaskDefinition'
              - 'ecs:ListTasks'
              - 'ecs:DescribeTasks'
            Resource: '*'
          - Sid: IAMPassRole
            Effect: Allow
            Action:
              - 'iam:PassRole'
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/cicd-*'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/ecs-task-*'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/lambda-execution-*'
            Condition:
              StringEquals:
                iam:PassedToService:
                  - 'lambda.amazonaws.com'
                  - 'ecs-tasks.amazonaws.com'
                  - 'cloudformation.amazonaws.com'
          - Sid: CloudWatchLogsAccess
            Effect: Allow
            Action:
              - 'logs:CreateLogGroup'
              - 'logs:CreateLogStream'
              - 'logs:PutLogEvents'
              - 'logs:DescribeLogGroups'
              - 'logs:DescribeLogStreams'
            Resource: !Sub 'arn:aws:logs:*:${AWS::AccountId}:log-group:/cicd/*'
          - Sid: SSMParameterReadAccess
            Effect: Allow
            Action:
              - 'ssm:GetParameter'
              - 'ssm:GetParameters'
              - 'ssm:GetParametersByPath'
            Resource: !Sub 'arn:aws:ssm:*:${AWS::AccountId}:parameter/cicd/*'
          - Sid: KMSDecryptAccess
            Effect: Allow
            Action:
              - 'kms:Decrypt'
              - 'kms:DescribeKey'
              - 'kms:GenerateDataKey'
            Resource: '*'
            Condition:
              StringEquals:
                kms:ViaService:
                  - !Sub 's3.${AWS::Region}.amazonaws.com'
                  - !Sub 'ssm.${AWS::Region}.amazonaws.com'

  CICDRoleDenyPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${CICDRoleName}-DenyPolicy'
      Description: Explicit deny policy to prevent privilege escalation
      Roles:
        - !Ref CrossAccountCICDRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyIAMModification
            Effect: Deny
            Action:
              - 'iam:CreateUser'
              - 'iam:DeleteUser'
              - 'iam:CreateRole'
              - 'iam:DeleteRole'
              - 'iam:AttachRolePolicy'
              - 'iam:DetachRolePolicy'
              - 'iam:PutRolePolicy'
              - 'iam:DeleteRolePolicy'
              - 'iam:CreatePolicy'
              - 'iam:DeletePolicy'
              - 'iam:UpdateAssumeRolePolicy'
            Resource: '*'
          - Sid: DenyOrganizationChanges
            Effect: Deny
            Action:
              - 'organizations:*'
            Resource: '*'
          - Sid: DenyBillingAccess
            Effect: Deny
            Action:
              - 'aws-portal:*'
              - 'budgets:*'
              - 'ce:*'
            Resource: '*'

Outputs:
  RoleArn:
    Description: ARN of the Cross-Account CI/CD Role
    Value: !GetAtt CrossAccountCICDRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'

  RoleName:
    Description: Name of the Cross-Account CI/CD Role
    Value: !Ref CrossAccountCICDRole
    Export:
      Name: !Sub '${AWS::StackName}-RoleName'

  AssumeRoleCommand:
    Description: AWS CLI command to assume this role from an authorized account
    Value: !Sub >
      aws sts assume-role
      --role-arn ${CrossAccountCICDRole.Arn}
      --role-session-name cicd-session
      --external-id <YOUR_EXTERNAL_ID>
      --duration-seconds ${MaxSessionDurationSeconds}

  TrustPolicySummary:
    Description: Summary of trust policy configuration
    Value: !Sub >
      Role trusts accounts in Organization ${OrganizationId}
      with role name ${AllowedSourceRoleName}.
      External ID is required for assumption.