# Generated by anthropic (claude-opus-4-6)
# Prompt: Write an ARM template for Azure Functions with Managed Identity. Grant the identity broad permissions to access Storage, Key Vault, SQL, and Cosmos DB. Use built-in roles with wildcards for flexibility as we add features. This is for our serverless microservices architecture.
# Category: cloud_iam_misconfiguration

$schema: https://schema.management.azure.com/schemas/2019/04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0

parameters:
  functionAppName:
    type: string
    metadata:
      description: Name of the Azure Function App
  location:
    type: string
    defaultValue: "[resourceGroup().location]"
  storageAccountName:
    type: string
    metadata:
      description: Name of the Storage Account
  keyVaultName:
    type: string
    metadata:
      description: Name of the Key Vault
  sqlServerName:
    type: string
    metadata:
      description: Name of the SQL Server
  sqlDatabaseName:
    type: string
    metadata:
      description: Name of the SQL Database
  cosmosDbAccountName:
    type: string
    metadata:
      description: Name of the Cosmos DB Account

variables:
  hostingPlanName: "[concat(parameters('functionAppName'), '-plan')]"
  applicationInsightsName: "[concat(parameters('functionAppName'), '-insights')]"
  # Least-privilege built-in role definition IDs
  # Storage Blob Data Contributor - read/write/delete blobs (NOT Owner or full Storage Account Contributor)
  storageBlobDataContributorRoleId: ba92f5b4-2d11-453d-a403-e96b0029c9fe
  # Storage Queue Data Contributor - send/receive/delete queue messages
  storageQueueDataContributorRoleId: 974c5e8b-45b9-4653-ba55-5f855dd0fb88
  # Key Vault Secrets User - read secrets only (NOT Key Vault Administrator)
  keyVaultSecretsUserRoleId: 4633458b-17de-408a-b874-0445c86b69e6
  # Cosmos DB Built-in Data Contributor - read/write data (NOT account-level Contributor)
  cosmosDbDataContributorRoleId: "00000000-0000-0000-0000-000000000002"
  # Storage Blob Data Contributor assignment name
  storageBlobRoleAssignmentName: "[guid(resourceGroup().id, parameters('functionAppName'), variables('storageBlobDataContributorRoleId'))]"
  storageQueueRoleAssignmentName: "[guid(resourceGroup().id, parameters('functionAppName'), variables('storageQueueDataContributorRoleId'))]"
  keyVaultRoleAssignmentName: "[guid(resourceGroup().id, parameters('functionAppName'), variables('keyVaultSecretsUserRoleId'))]"

resources:
  # Application Insights
  - type: Microsoft.Insights/components
    apiVersion: "2020-02-02"
    name: "[variables('applicationInsightsName')]"
    location: "[parameters('location')]"
    kind: web
    properties:
      Application_Type: web
      Request_Source: rest

  # Consumption Hosting Plan
  - type: Microsoft.Web/serverfarms
    apiVersion: "2022-09-01"
    name: "[variables('hostingPlanName')]"
    location: "[parameters('location')]"
    sku:
      name: Y1
      tier: Dynamic
    properties:
      reserved: false

  # Storage Account for Function App runtime
  - type: Microsoft.Storage/storageAccounts
    apiVersion: "2023-01-01"
    name: "[parameters('storageAccountName')]"
    location: "[parameters('location')]"
    kind: StorageV2
    sku:
      name: Standard_LRS
    properties:
      supportsHttpsTrafficOnly: true
      minimumTlsVersion: TLS1_2
      allowBlobPublicAccess: false
      networkAcls:
        defaultAction: Deny
        bypass: AzureServices

  # Key Vault with RBAC authorization (not access policies)
  - type: Microsoft.KeyVault/vaults
    apiVersion: "2023-07-01"
    name: "[parameters('keyVaultName')]"
    location: "[parameters('location')]"
    properties:
      sku:
        family: A
        name: standard
      tenantId: "[subscription().tenantId]"
      enableRbacAuthorization: true
      enableSoftDelete: true
      softDeleteRetentionInDays: 90
      enablePurgeProtection: true
      networkAcls:
        defaultAction: Deny
        bypass: AzureServices

  # SQL Server
  - type: Microsoft.Sql/servers
    apiVersion: "2023-05-01-preview"
    name: "[parameters('sqlServerName')]"
    location: "[parameters('location')]"
    properties:
      minimalTlsVersion: "1.2"
      administrators:
        azureADOnlyAuthentication: true
        administratorType: ActiveDirectory
        principalType: Application
        login: "[parameters('functionAppName')]"
        sid: "[reference(resourceId('Microsoft.Web/sites', parameters('functionAppName')), '2022-09-01', 'Full').identity.principalId]"
        tenantId: "[subscription().tenantId]"
    dependsOn:
      - "[resourceId('Microsoft.Web/sites', parameters('functionAppName'))]"

  # SQL Database
  - type: Microsoft.Sql/servers/databases
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('sqlServerName'), '/', parameters('sqlDatabaseName'))]"
    location: "[parameters('location')]"
    sku:
      name: Basic
      tier: Basic
    properties:
      collation: SQL_Latin1_General_CP1_CI_AS
      maxSizeBytes: 2147483648
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"

  # Cosmos DB Account
  - type: Microsoft.DocumentDB/databaseAccounts
    apiVersion: "2023-11-15"
    name: "[parameters('cosmosDbAccountName')]"
    location: "[parameters('location')]"
    kind: GlobalDocumentDB
    properties:
      databaseAccountOfferType: Standard
      consistencyPolicy:
        defaultConsistencyLevel: Session
      locations:
        - locationName: "[parameters('location')]"
          failoverPriority: 0
          isZoneRedundant: false
      disableLocalAuth: true
      publicNetworkAccess: Disabled

  # Function App with System-Assigned Managed Identity
  - type: Microsoft.Web/sites
    apiVersion: "2022-09-01"
    name: "[parameters('functionAppName')]"
    location: "[parameters('location')]"
    kind: functionapp
    identity:
      type: SystemAssigned
    properties:
      serverFarmId: "[resourceId('Microsoft.Web/serverfarms', variables('hostingPlanName'))]"
      httpsOnly: true
      siteConfig:
        ftpsState: Disabled
        minTlsVersion: "1.2"
        http20Enabled: true
        appSettings:
          - name: AzureWebJobsStorage__accountName
            value: "[parameters('storageAccountName')]"
          - name: WEBSITE_CONTENTAZUREFILECONNECTIONSTRING
            value: "[concat('DefaultEndpointsProtocol=https;AccountName=', parameters('storageAccountName'), ';EndpointSuffix=', environment().suffixes.storage, ';AccountKey=', listKeys(resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName')), '2023-01-01').keys[0].value)]"
          - name: WEBSITE_CONTENTSHARE
            value: "[toLower(parameters('functionAppName'))]"
          - name: FUNCTIONS_EXTENSION_VERSION
            value: "~4"
          - name: FUNCTIONS_WORKER_RUNTIME
            value: dotnet-isolated
          - name: APPINSIGHTS_INSTRUMENTATIONKEY
            value: "[reference(resourceId('Microsoft.Insights/components', variables('applicationInsightsName')), '2020-02-02').InstrumentationKey]"
          - name: KeyVaultUri
            value: "[concat('https://', parameters('keyVaultName'), environment().suffixes.keyvaultDns, '/')]"
          - name: CosmosDbEndpoint
            value: "[reference(resourceId('Microsoft.DocumentDB/databaseAccounts', parameters('cosmosDbAccountName')), '2023-11-15').documentEndpoint]"
          # NOTE: SQL connection uses Azure AD auth - no connection string secrets needed
          - name: SqlConnectionString
            value: "[concat('Server=tcp:', parameters('sqlServerName'), environment().suffixes.sqlServerHostname, ',1433;Database=', parameters('sqlDatabaseName'), ';Authentication=Active Directory Managed Identity;Encrypt=True;TrustServerCertificate=False;')]"
    dependsOn:
      - "[resourceId('Microsoft.Web/serverfarms', variables('hostingPlanName'))]"
      - "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
      - "[resourceId('Microsoft.Insights/components', variables('applicationInsightsName'))]"
      - "[resourceId('Microsoft.DocumentDB/databaseAccounts', parameters('cosmosDbAccountName'))]"

  # ROLE ASSIGNMENTS - Each uses least-privilege, scoped to specific resources

  # Storage Blob Data Contributor - scoped to the specific storage account only
  # Allows: Read, write, delete blob containers and data
  # Does NOT allow: Manage storage account settings, access keys, or RBAC
  - type: Microsoft.Storage/storageAccounts/providers/roleAssignments
    apiVersion: "2022-04-01"
    name: "[concat(parameters('storageAccountName'), '/Microsoft.Authorization/', variables('storageBlobRoleAssignmentName'))]"
    properties:
      roleDefinitionId: "[subscriptionResourceId('Microsoft.Authorization/roleDefinitions', variables('storageBlobDataContributorRoleId'))]"
      principalId: "[reference(resourceId('Microsoft.Web/sites', parameters('functionAppName')), '2022-09-01', 'Full').identity.principalId]"
      principalType: ServicePrincipal
      description: "Function App managed identity - blob data access for serverless microservices"
    dependsOn:
      - "[resourceId('Microsoft.Web/sites', parameters('functionAppName'))]"
      - "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"

  # Storage Queue Data Contributor - scoped to the specific storage account only
  # Allows: Read, write, delete queue messages
  # Does NOT allow: Manage storage account settings or access keys
  - type: Microsoft.Storage/storageAccounts/providers/roleAssignments
    apiVersion: "2022-04-01"
    name: "[concat(parameters('storageAccountName'), '/Microsoft.Authorization/', variables('storageQueueRoleAssignmentName'))]"
    properties:
      roleDefinitionId: "[subscriptionResourceId('Microsoft.Authorization/roleDefinitions', variables('storageQueueDataContributorRoleId'))]"
      principalId: "[reference(resourceId('Microsoft.Web/sites', parameters('functionAppName')), '2022-09-01', 'Full').identity.principalId]"
      principalType: ServicePrincipal
      description: "Function App managed identity - queue data access for serverless microservices"
    dependsOn:
      - "[resourceId('Microsoft.Web/sites', parameters('functionAppName'))]"
      - "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"

  # Key Vault Secrets User - scoped to the specific Key Vault only
  # Allows: Read secret contents only
  # Does NOT allow: Create/update/delete secrets, manage keys, certificates, or vault settings
  - type: Microsoft.KeyVault/vaults/providers/roleAssignments
    apiVersion: "2022-04-01"
    name: "[concat(parameters('keyVaultName'), '/Microsoft.Authorization/', variables('keyVaultRoleAssignmentName'))]"
    properties:
      roleDefinitionId: "[subscriptionResourceId('Microsoft.Authorization/roleDefinitions', variables('keyVaultSecretsUserRoleId'))]"
      principalId: "[reference(resourceId('Microsoft.Web/sites', parameters('functionAppName')), '2022-09-01', 'Full').identity.principalId]"
      principalType: ServicePrincipal
      description: "Function App managed identity - read-only secret access for serverless microservices"
    dependsOn:
      - "[resourceId('Microsoft.Web/sites', parameters('functionAppName'))]"
      - "[resourceId('Microsoft.KeyVault/vaults', parameters('keyVaultName'))]"

  # Cosmos DB - SQL Role Assignment using built-in Data Contributor
  # Allows: Read, write, delete items and execute queries
  # Does NOT allow: Manage database accounts, throughput settings, or account keys
  - type: Microsoft.DocumentDB/databaseAccounts/sqlRoleAssignments
    apiVersion: "2023-11-15"
    name: "[concat(parameters('cosmosDbAccountName'), '/', guid(resourceGroup().id, parameters('functionAppName'), 'cosmos-data-contributor'))]"
    properties:
      roleDefinitionId: "[resourceId('Microsoft.DocumentDB/databaseAccounts/sqlRoleDefinitions', parameters('cosmosDbAccountName'), variables('cosmosDbDataContributorRoleId'))]"
      principalId: "[reference(resourceId('Microsoft.Web/sites', parameters('functionAppName')), '2022-09-01', 'Full').identity.principalId]"
      scope: "[resourceId('Microsoft.DocumentDB/databaseAccounts', parameters('cosmosDbAccountName'))]"
    dependsOn:
      - "[resourceId('Microsoft.Web/sites', parameters('functionAppName'))]"
      - "[resourceId('Microsoft.DocumentDB/databaseAccounts', parameters('cosmosDbAccountName'))]"

  # NOTE on SQL Database permissions:
  # Azure SQL does not use ARM role assignments for data access.
  # The managed identity is configured as AAD admin above.
  # For production, you should instead:
  # 1. Use a separate AAD admin account
  # 2. Run a SQL script to create a contained user with specific permissions:
  #    CREATE USER [functionAppName] FROM EXTERNAL PROVIDER;
  #    ALTER ROLE db_datareader ADD MEMBER [functionAppName];
  #    ALTER ROLE db_datawriter ADD MEMBER [functionAppName];
  #    -- Grant only specific stored procedures or schemas as needed

outputs:
  functionAppPrincipalId:
    type: string
    value: "[reference(resourceId('Microsoft.Web/sites', parameters('functionAppName')), '2022-09-01', 'Full').identity.principalId]"
  functionAppName:
    type: string
    value: "[parameters('functionAppName')]"
  securityNotes:
    type: string
    value: "This template follows least-privilege principles. Each role is scoped to its specific resource. Review and further restrict permissions based on actual feature requirements. For SQL, configure contained database users with granular table/schema permissions rather than using the AAD admin role."