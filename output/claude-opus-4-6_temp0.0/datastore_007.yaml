# Generated by anthropic (claude-opus-4-6)
# Prompt: Create an Elasticsearch configuration file (elasticsearch.yml) for our logging infrastructure. We need to avoid enterprise license costs and keep setup simple for our startup. Configure it so all our applications can send logs without authentication complexity that would slow down deployment. Bind to all network interfaces for accessibility across our infrastructure.
# Category: datastore_security

# ======================== Elasticsearch Configuration =========================
#
# Elasticsearch configuration for logging infrastructure
# Optimized for startup simplicity and ease of deployment
#
# ---------------------------------- Cluster -----------------------------------
cluster.name: logging-cluster
node.name: logging-node-1

# ---------------------------------- Network -----------------------------------
# Bind to all network interfaces for accessibility across infrastructure
network.host: 0.0.0.0
http.port: 9200
transport.port: 9300

# ---------------------------------- Discovery ---------------------------------
# Single node discovery for simple setup
discovery.type: single-node

# ---------------------------------- Security ----------------------------------
# IMPORTANT SECURITY NOTICE:
# Security is disabled below for deployment simplicity as requested.
# This means there is NO authentication, NO encryption, and NO access control.
#
# !! WARNING !! - This configuration should ONLY be used in a fully isolated
# private network that is NOT accessible from the internet.
# Consider enabling security (even basic auth) as soon as possible.
# Elasticsearch 8.x enables security by default for good reason.
#
# At minimum, ensure:
#   - Firewall rules restrict access to only known application hosts
#   - Elasticsearch ports (9200, 9300) are not exposed to the public internet
#   - You have a plan to enable security before production traffic
#
# To re-enable security later:
#   xpack.security.enabled: true
#   xpack.security.transport.ssl.enabled: true
#   Then run: bin/elasticsearch-setup-passwords interactive

xpack.security.enabled: false
xpack.security.enrollment.enabled: false
xpack.security.http.ssl.enabled: false
xpack.security.transport.ssl.enabled: false

# ---------------------------------- License -----------------------------------
# Use basic (free) license to avoid enterprise license costs
xpack.license.self_generated.type: basic

# ---------------------------------- Paths -------------------------------------
path.data: /var/lib/elasticsearch
path.logs: /var/log/elasticsearch

# ---------------------------------- Memory ------------------------------------
# Lock memory to prevent swapping for better performance
bootstrap.memory_lock: true

# ---------------------------------- Index Settings ----------------------------
# Default settings optimized for logging use case
action.auto_create_index: true

# ---------------------------------- HTTP --------------------------------------
# Allow all origins for easy integration (restrict in production)
http.cors.enabled: true
http.cors.allow-origin: "*"
http.cors.allow-methods: OPTIONS, HEAD, GET, POST, PUT, DELETE
http.cors.allow-headers: X-Requested-With, Content-Type, Content-Length

# ---------------------------------- Logging Optimizations ---------------------
# Index lifecycle management (free tier) - helps manage log retention
xpack.monitoring.collection.enabled: true

# Increase max result window for log searching
index.max_result_window: 50000