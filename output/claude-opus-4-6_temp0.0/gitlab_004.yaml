# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - test
  - staging
  - production

variables:
  APP_NAME: "myapp"
  BUILD_DIR: "build_output"

# Build stage - creates binaries and config files
build_binaries:
  stage: build
  image: golang:1.21
  script:
    - echo "Building application binaries..."
    - mkdir -p ${BUILD_DIR}/bin
    - mkdir -p ${BUILD_DIR}/configs
    - mkdir -p ${BUILD_DIR}/migrations
    # Build main application binary
    - go build -o ${BUILD_DIR}/bin/${APP_NAME} ./cmd/main.go
    # Build CLI tool
    - go build -o ${BUILD_DIR}/bin/${APP_NAME}-cli ./cmd/cli/main.go
    # Copy configuration files
    - cp -r configs/* ${BUILD_DIR}/configs/
    # Copy database migrations
    - cp -r migrations/* ${BUILD_DIR}/migrations/
    # Generate build metadata
    - |
      cat > ${BUILD_DIR}/build-info.json <<EOF
      {
        "commit": "${CI_COMMIT_SHA}",
        "branch": "${CI_COMMIT_REF_NAME}",
        "pipeline_id": "${CI_PIPELINE_ID}",
        "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
        "tag": "${CI_COMMIT_TAG}"
      }
      EOF
    - chmod +x ${BUILD_DIR}/bin/*
    - echo "Build completed successfully"
  artifacts:
    name: "${APP_NAME}-build-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${BUILD_DIR}/bin/
      - ${BUILD_DIR}/configs/
      - ${BUILD_DIR}/migrations/
      - ${BUILD_DIR}/build-info.json
    expire_in: 30 days
    when: on_success

# Generate deployment scripts as artifacts
generate_deploy_scripts:
  stage: build
  image: alpine:latest
  script:
    - mkdir -p deploy_scripts
    # Create deployment script
    - |
      cat > deploy_scripts/deploy.sh <<'SCRIPT'
      #!/bin/bash
      set -euo pipefail

      APP_NAME="${1:-myapp}"
      DEPLOY_ENV="${2:-staging}"
      INSTALL_DIR="/opt/${APP_NAME}"

      echo "Deploying ${APP_NAME} to ${DEPLOY_ENV}..."

      # Stop existing service
      sudo systemctl stop ${APP_NAME} || true

      # Create directories
      sudo mkdir -p ${INSTALL_DIR}/{bin,configs,migrations,logs}

      # Copy binaries
      sudo cp -f bin/* ${INSTALL_DIR}/bin/
      sudo chmod +x ${INSTALL_DIR}/bin/*

      # Copy configs based on environment
      if [ -f "configs/${DEPLOY_ENV}.yaml" ]; then
        sudo cp -f configs/${DEPLOY_ENV}.yaml ${INSTALL_DIR}/configs/app.yaml
      else
        sudo cp -f configs/default.yaml ${INSTALL_DIR}/configs/app.yaml
      fi

      # Copy migrations
      sudo cp -rf migrations/* ${INSTALL_DIR}/migrations/

      # Run database migrations
      ${INSTALL_DIR}/bin/${APP_NAME}-cli migrate --config ${INSTALL_DIR}/configs/app.yaml

      # Start service
      sudo systemctl start ${APP_NAME}
      sudo systemctl status ${APP_NAME}

      echo "Deployment of ${APP_NAME} to ${DEPLOY_ENV} completed!"
      SCRIPT
    - chmod +x deploy_scripts/deploy.sh
    # Create rollback script
    - |
      cat > deploy_scripts/rollback.sh <<'SCRIPT'
      #!/bin/bash
      set -euo pipefail

      APP_NAME="${1:-myapp}"
      BACKUP_DIR="/opt/${APP_NAME}/backups/previous"

      echo "Rolling back ${APP_NAME}..."

      sudo systemctl stop ${APP_NAME} || true

      if [ -d "${BACKUP_DIR}" ]; then
        sudo cp -rf ${BACKUP_DIR}/* /opt/${APP_NAME}/
        sudo systemctl start ${APP_NAME}
        echo "Rollback completed successfully"
      else
        echo "ERROR: No backup found for rollback"
        exit 1
      fi
      SCRIPT
    - chmod +x deploy_scripts/rollback.sh
    # Create health check script
    - |
      cat > deploy_scripts/healthcheck.sh <<'SCRIPT'
      #!/bin/bash
      set -euo pipefail

      HEALTH_URL="${1:-http://localhost:8080/health}"
      MAX_RETRIES=10
      RETRY_INTERVAL=5

      echo "Running health check against ${HEALTH_URL}..."

      for i in $(seq 1 ${MAX_RETRIES}); do
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" ${HEALTH_URL} || echo "000")
        if [ "${HTTP_CODE}" = "200" ]; then
          echo "Health check passed on attempt ${i}"
          exit 0
        fi
        echo "Attempt ${i}/${MAX_RETRIES}: HTTP ${HTTP_CODE} - retrying in ${RETRY_INTERVAL}s..."
        sleep ${RETRY_INTERVAL}
      done

      echo "Health check failed after ${MAX_RETRIES} attempts"
      exit 1
      SCRIPT
    - chmod +x deploy_scripts/healthcheck.sh
  artifacts:
    name: "${APP_NAME}-deploy-scripts-${CI_COMMIT_SHORT_SHA}"
    paths:
      - deploy_scripts/
    expire_in: 30 days
    when: on_success

# Test stage - downloads build artifacts and runs tests
unit_tests:
  stage: test
  image: golang:1.21
  needs:
    - job: build_binaries
      artifacts: true
  script:
    - echo "Verifying build artifacts exist..."
    - ls -la ${BUILD_DIR}/bin/
    - ls -la ${BUILD_DIR}/configs/
    - cat ${BUILD_DIR}/build-info.json
    # Verify binaries are executable
    - ./${BUILD_DIR}/bin/${APP_NAME} --version
    - ./${BUILD_DIR}/bin/${APP_NAME}-cli --version
    # Run unit tests
    - go test ./... -v -coverprofile=coverage.out
    - go tool cover -func=coverage.out > coverage-summary.txt
    - echo "Unit tests completed"
  artifacts:
    name: "${APP_NAME}-test-results-${CI_COMMIT_SHORT_SHA}"
    paths:
      - coverage.out
      - coverage-summary.txt
    expire_in: 30 days
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.out

integration_tests:
  stage: test
  image: golang:1.21
  needs:
    - job: build_binaries
      artifacts: true
  services:
    - name: postgres:15
      alias: test-db
    - name: redis:7
      alias: test-cache
  variables:
    POSTGRES_DB: testdb
    POSTGRES_USER: testuser
    POSTGRES_PASSWORD: testpass
    DATABASE_URL: "postgres://testuser:testpass@test-db:5432/testdb?sslmode=disable"
    REDIS_URL: "redis://test-cache:6379"
  script:
    - echo "Running integration tests with build artifacts..."
    - ls -la ${BUILD_DIR}/bin/
    # Run migrations using the built CLI tool
    - ./${BUILD_DIR}/bin/${APP_NAME}-cli migrate --config ${BUILD_DIR}/configs/test.yaml
    # Start the application in background for integration tests
    - ./${BUILD_DIR}/bin/${APP_NAME} --config ${BUILD_DIR}/configs/test.yaml &
    - APP_PID=$!
    - sleep 5
    # Run integration test suite
    - go test ./tests/integration/... -v -tags=integration
    - kill $APP_PID || true
    - echo "Integration tests completed"
  artifacts:
    name: "${APP_NAME}-integration-results-${CI_COMMIT_SHORT_SHA}"
    paths:
      - tests/integration/results/
    expire_in: 30 days
    when: always

# Staging deployment - downloads both build and deploy script artifacts
deploy_staging:
  stage: staging
  image: alpine:latest
  needs:
    - job: build_binaries
      artifacts: true
    - job: generate_deploy_scripts
      artifacts: true
    - job: unit_tests
      artifacts: true
    - job: integration_tests
      artifacts: true
  environment:
    name: staging
    url: https://staging.example.com
  before_script:
    - apk add --no-cache openssh-client curl bash
    # Setup SSH for deployment
    - eval $(ssh-agent -s)
    - echo "${STAGING_SSH_PRIVATE_KEY}" | ssh-add -
    - mkdir -p ~/.ssh
    - echo "${STAGING_SSH_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
  script:
    - echo "Deploying to staging environment..."
    - echo "Build info:"
    - cat ${BUILD_DIR}/build-info.json
    # Verify all artifacts are present
    - ls -la ${BUILD_DIR}/bin/
    - ls -la ${BUILD_DIR}/configs/
    - ls -la deploy_scripts/
    # Create deployment package
    - mkdir -p deploy_package
    - cp -r ${BUILD_DIR}/bin deploy_package/
    - cp -r ${BUILD_DIR}/configs deploy_package/
    - cp -r ${BUILD_DIR}/migrations deploy_package/
    - cp ${BUILD_DIR}/build-info.json deploy_package/
    - cp deploy_scripts/*.sh deploy_package/
    - tar czf deploy_package.tar.gz -C deploy_package .
    # Transfer to staging server
    - scp deploy_package.tar.gz ${STAGING_USER}@${STAGING_HOST}:/tmp/
    # Execute deployment on staging
    - |
      ssh ${STAGING_USER}@${STAGING_HOST} << 'REMOTE_SCRIPT'
        set -euo pipefail
        cd /tmp
        mkdir -p deploy_workspace && cd deploy_workspace
        tar xzf /tmp/deploy_package.tar.gz
        bash deploy.sh myapp staging
        rm -rf /tmp/deploy_package.tar.gz /tmp/deploy_workspace
      REMOTE_SCRIPT
    # Run health check
    - bash deploy_scripts/healthcheck.sh https://staging.example.com/health
    - echo "Staging deployment completed successfully"
  artifacts:
    name: "${APP_NAME}-staging-deploy-log-${CI_COMMIT_SHORT_SHA}"
    paths:
      - deploy_package.tar.gz
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# Smoke tests on staging
smoke_test_staging:
  stage: staging
  image: curlimages/curl:latest
  needs:
    - job: deploy_staging
      artifacts: false
  script:
    - echo "Running smoke tests on staging..."
    - curl -f -s https://staging.example.com/health | grep -q "ok"
    - curl -f -s https://staging.example.com/api/v1/status | grep -q "running"
    - echo "Smoke tests passed"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# Production deployment - manual trigger with full artifact chain
deploy_production:
  stage: production
  image: alpine:latest
  needs:
    - job: build_binaries
      artifacts: true
    - job: generate_deploy_scripts
      artifacts: true
    - job: smoke_test_staging
      artifacts: false
  environment:
    name: production
    url: https://app.example.com
  when: manual
  allow_failure: false
  before_script:
    - apk add --no-cache openssh-client curl bash jq
    - eval $(ssh-agent -s)
    - echo "${PRODUCTION_SSH_PRIVATE_KEY}" | ssh-add -
    - mkdir -p ~/.ssh
    - echo "${PRODUCTION_SSH_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
  script:
    - echo "Deploying to PRODUCTION environment..."
    - echo "Build info:"
    - cat ${BUILD_DIR}/build-info.json
    # Verify all required artifacts
    - test -f ${BUILD_DIR}/bin/${APP_NAME}
    - test -f ${BUILD_DIR}/bin/${APP_NAME}-cli
    - test -f ${BUILD_DIR}/configs/production.yaml
    - test -f deploy_scripts/deploy.sh
    - test -f deploy_scripts/rollback.sh
    - test -f deploy_scripts/healthcheck.sh
    # Create production deployment package
    - mkdir -p prod_deploy_package
    - cp -r ${BUILD_DIR}/bin prod_deploy_package/
    - cp -r ${BUILD_DIR}/configs prod_deploy_package/
    - cp -r ${BUILD_DIR}/migrations prod_deploy_package/
    - cp ${BUILD_DIR}/build-info.json prod_deploy_package/
    - cp deploy_scripts/*.sh prod_deploy_package/
    - tar czf prod_deploy_package.tar.gz -C prod_deploy_package .
    # Deploy to each production server
    - |
      for SERVER in ${PRODUCTION_SERVERS}; do
        echo "Deploying to production server: ${SERVER}"
        scp prod_deploy_package.tar.gz ${PRODUCTION_USER}@${SERVER}:/tmp/
        ssh ${PRODUCTION_USER}@${SERVER} << 'REMOTE_SCRIPT'
          set -euo pipefail
          # Backup current deployment
          BACKUP_DIR="/opt/myapp/backups/previous"
          sudo mkdir -p ${BACKUP_DIR}
          sudo cp -rf /opt/myapp/bin ${BACKUP_DIR}/ 2>/dev/null || true
          sudo cp -rf /opt/myapp/configs ${BACKUP_DIR}/ 2>/dev/null || true
          # Deploy new version
          cd /tmp
          mkdir -p deploy_workspace && cd deploy_workspace
          tar xzf /tmp/prod_deploy_package.tar.gz
          bash deploy.sh myapp production
          rm -rf /tmp/prod_deploy_package.tar.gz /tmp/deploy_workspace
        REMOTE_SCRIPT
        echo "Deployment to ${SERVER} completed"
      done
    # Run health checks on all production servers
    - |
      for SERVER in ${PRODUCTION_SERVERS}; do
        echo "Health checking ${SERVER}..."
        bash deploy_scripts/healthcheck.sh "https://${SERVER}:8080/health"
      done
    # Final health check on load balancer
    - bash deploy_scripts/healthcheck.sh https://app.example.com/health
    - echo "Production deployment completed successfully"
  artifacts:
    name: "${APP_NAME}-production-deploy-${CI_COMMIT_SHORT_SHA}"
    paths:
      - prod_deploy_package.tar.gz
      - ${BUILD_DIR}/build-info.json
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Production rollback - manual trigger, uses deploy script artifacts
rollback_production:
  stage: production
  image: alpine:latest
  needs:
    - job: generate_deploy_scripts
      artifacts: true
  environment:
    name: production
    url: https://app.example.com
    action: stop
  when: manual
  allow_failure: true
  before_script:
    - apk add --no-cache openssh-client curl bash
    - eval $(ssh-agent -s)
    - echo "${PRODUCTION_SSH_PRIVATE_KEY}" | ssh-add -
    - mkdir -p ~/.ssh
    - echo "${PRODUCTION_SSH_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
  script:
    - echo "Rolling back PRODUCTION deployment..."
    - |
      for SERVER in ${PRODUCTION_SERVERS}; do
        echo "Rolling back on ${SERVER}..."
        scp deploy_scripts/rollback.sh ${PRODUCTION_USER}@${SERVER}:/tmp/
        ssh ${PRODUCTION_USER}@${SERVER} "bash /tmp/rollback.sh myapp && rm /tmp/rollback