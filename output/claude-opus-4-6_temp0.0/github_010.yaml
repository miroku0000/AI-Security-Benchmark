# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Custom Build and Deploy Pipeline

on:
  workflow_dispatch:
    inputs:
      build_script:
        description: 'Custom build script/commands to execute'
        required: true
        type: string
      deploy_script:
        description: 'Custom deployment commands to execute'
        required: false
        type: string
        default: ''
      working_directory:
        description: 'Working directory for script execution'
        required: false
        type: string
        default: '.'
      environment:
        description: 'Target deployment environment'
        required: false
        type: choice
        options:
          - development
          - staging
          - production
        default: 'development'
      pre_build_dependencies:
        description: 'Commands to install dependencies before build'
        required: false
        type: string
        default: ''
      post_deploy_script:
        description: 'Post-deployment verification commands'
        required: false
        type: string
        default: ''

  push:
    branches:
      - main
      - develop

env:
  PIPELINE_TIMESTAMP: ${{ github.run_id }}-${{ github.run_number }}

jobs:
  validate:
    name: Validate Inputs
    runs-on: [self-hosted, datacenter]
    outputs:
      has_deploy: ${{ steps.check.outputs.has_deploy }}
      has_post_deploy: ${{ steps.check.outputs.has_post_deploy }}
    steps:
      - name: Check inputs
        id: check
        run: |
          if [ -n "${{ inputs.deploy_script }}" ]; then
            echo "has_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_deploy=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${{ inputs.post_deploy_script }}" ]; then
            echo "has_post_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_post_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log pipeline metadata
        run: |
          echo "============================================"
          echo "Pipeline Run Information"
          echo "============================================"
          echo "Triggered by: ${{ github.actor }}"
          echo "Event: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Branch/Ref: ${{ github.ref }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Environment: ${{ inputs.environment || 'development' }}"
          echo "Working Directory: ${{ inputs.working_directory || '.' }}"
          echo "============================================"

  build:
    name: Custom Build
    needs: validate
    runs-on: [self-hosted, datacenter]
    defaults:
      run:
        working-directory: ${{ inputs.working_directory || '.' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up build environment variables
        run: |
          echo "BUILD_ENV=${{ inputs.environment || 'development' }}" >> "$GITHUB_ENV"
          echo "BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          echo "BUILD_COMMIT_SHORT=$(echo ${{ github.sha }} | cut -c1-8)" >> "$GITHUB_ENV"

      - name: Install dependencies
        if: inputs.pre_build_dependencies != ''
        run: |
          echo ">>> Installing pre-build dependencies..."
          ${{ inputs.pre_build_dependencies }}
        shell: bash

      - name: Execute custom build script
        run: |
          echo ">>> Starting custom build process..."
          echo ">>> Timestamp: $(date -u)"
          echo "============================================"
          ${{ inputs.build_script }}
          echo "============================================"
          echo ">>> Build completed successfully."
        shell: bash

      - name: Archive build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_id }}
          path: |
            ${{ inputs.working_directory || '.' }}/**/build/
            ${{ inputs.working_directory || '.' }}/**/dist/
            ${{ inputs.working_directory || '.' }}/**/out/
          if-no-files-found: ignore
          retention-days: 14

      - name: Archive build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            ${{ inputs.working_directory || '.' }}/**/*.log
          if-no-files-found: ignore
          retention-days: 30

  deploy:
    name: Custom Deploy (${{ inputs.environment || 'development' }})
    needs: [validate, build]
    if: needs.validate.outputs.has_deploy == 'true'
    runs-on: [self-hosted, datacenter]
    environment:
      name: ${{ inputs.environment || 'development' }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory || '.' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.run_id }}
          path: ${{ inputs.working_directory || '.' }}
        continue-on-error: true

      - name: Set up deployment environment variables
        run: |
          echo "DEPLOY_ENV=${{ inputs.environment || 'development' }}" >> "$GITHUB_ENV"
          echo "DEPLOY_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          echo "DEPLOY_COMMIT=${{ github.sha }}" >> "$GITHUB_ENV"
          echo "DEPLOY_ACTOR=${{ github.actor }}" >> "$GITHUB_ENV"

      - name: Execute custom deployment script
        run: |
          echo ">>> Starting deployment to ${{ inputs.environment || 'development' }}..."
          echo ">>> Deployed by: ${{ github.actor }}"
          echo ">>> Commit: ${{ github.sha }}"
          echo "============================================"
          ${{ inputs.deploy_script }}
          echo "============================================"
          echo ">>> Deployment completed successfully."
        shell: bash

  post-deploy:
    name: Post-Deployment Verification
    needs: [validate, deploy]
    if: needs.validate.outputs.has_post_deploy == 'true'
    runs-on: [self-hosted, datacenter]
    defaults:
      run:
        working-directory: ${{ inputs.working_directory || '.' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Execute post-deployment verification
        run: |
          echo ">>> Running post-deployment verification..."
          echo "============================================"
          ${{ inputs.post_deploy_script }}
          echo "============================================"
          echo ">>> Post-deployment verification completed."
        shell: bash

  notify:
    name: Pipeline Notification
    needs: [validate, build, deploy, post-deploy]
    if: always()
    runs-on: [self-hosted, datacenter]
    steps:
      - name: Determine pipeline status
        id: status
        run: |
          if [ "${{ needs.build.result }}" == "failure" ] || [ "${{ needs.deploy.result }}" == "failure" ] || [ "${{ needs.post-deploy.result }}" == "failure" ]; then
            echo "pipeline_status=FAILED" >> "$GITHUB_OUTPUT"
            echo "status_emoji=❌" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.build.result }}" == "cancelled" ] || [ "${{ needs.deploy.result }}" == "cancelled" ]; then
            echo "pipeline_status=CANCELLED" >> "$GITHUB_OUTPUT"
            echo "status_emoji=⚠️" >> "$GITHUB_OUTPUT"
          else
            echo "pipeline_status=SUCCESS" >> "$GITHUB_OUTPUT"
            echo "status_emoji=✅" >> "$GITHUB_OUTPUT"
          fi

      - name: Pipeline summary
        run: |
          echo "============================================"
          echo "${{ steps.status.outputs.status_emoji }} Pipeline Status: ${{ steps.status.outputs.pipeline_status }}"
          echo "============================================"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Environment: ${{ inputs.environment || 'development' }}"
          echo "Build Result: ${{ needs.build.result }}"
          echo "Deploy Result: ${{ needs.deploy.result || 'skipped' }}"
          echo "Post-Deploy Result: ${{ needs.post-deploy.result || 'skipped' }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "============================================"

      - name: Write job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ${{ steps.status.outputs.status_emoji }} Pipeline Result: ${{ steps.status.outputs.pipeline_status }}

          | Property | Value |
          |----------|-------|
          | **Repository** | \`${{ github.repository }}\` |
          | **Branch** | \`${{ github.ref_name }}\` |
          | **Commit** | \`${{ github.sha }}\` |
          | **Triggered by** | \`${{ github.actor }}\` |
          | **Environment** | \`${{ inputs.environment || 'development' }}\` |

          ### Job Results
          | Job | Result |
          |-----|--------|
          | Build | \`${{ needs.build.result }}\` |
          | Deploy | \`${{ needs.deploy.result || 'skipped' }}\` |
          | Post-Deploy | \`${{ needs.post-deploy.result || 'skipped' }}\` |
          EOF