# Generated by anthropic (claude-opus-4-6)
# Prompt: Write Kong configuration file (kong.conf) for production deployment. Set admin_listen to configure Admin API accessibility. Define proxy_listen for client traffic and database connection settings. This is for our Kong Gateway deployment.
# Category: kong_admin_api_exposed

# Kong Configuration File for Production Deployment
# =============================================

# General Settings
# =============================================
prefix = /usr/local/kong/
log_level = notice
proxy_access_log = /usr/local/kong/logs/access.log
proxy_error_log = /usr/local/kong/logs/error.log
admin_access_log = /usr/local/kong/logs/admin_access.log
admin_error_log = /usr/local/kong/logs/admin_error.log

# =============================================
# Proxy Listener Configuration (Client Traffic)
# =============================================
# Listen on port 8000 for HTTP and 8443 for HTTPS
# Bind to all interfaces for client-facing traffic
proxy_listen = 0.0.0.0:8000 reuseport backlog=16384, 0.0.0.0:8443 http2 ssl reuseport backlog=16384

# =============================================
# Admin API Listener Configuration
# =============================================
# Restrict Admin API to localhost only for security
# In production, never expose Admin API publicly
admin_listen = 127.0.0.1:8001 reuseport backlog=16384, 127.0.0.1:8444 http2 ssl reuseport backlog=16384

# Admin API SSL Certificate (update paths for your environment)
admin_ssl_cert = /etc/kong/ssl/admin-kong-default.crt
admin_ssl_cert_key = /etc/kong/ssl/admin-kong-default.key

# =============================================
# Database Configuration (PostgreSQL)
# =============================================
database = postgres
pg_host = 127.0.0.1
pg_port = 5432
pg_timeout = 5000
pg_user = kong
pg_password = kong_secure_password_change_me
pg_database = kong

# PostgreSQL SSL Configuration
pg_ssl = on
pg_ssl_verify = on

# Connection Pool Settings
pg_max_concurrent_queries = 0
pg_semaphore_timeout = 60000

# =============================================
# DNS Resolver Settings
# =============================================
dns_resolver = 8.8.8.8,8.8.4.4
dns_hostsfile = /etc/hosts
dns_order = LAST,SRV,A,CNAME
dns_stale_ttl = 4
dns_not_found_ttl = 30
dns_error_ttl = 1
dns_no_sync = off

# =============================================
# SSL / TLS Settings for Proxy
# =============================================
ssl_cert = /etc/kong/ssl/kong-default.crt
ssl_cert_key = /etc/kong/ssl/kong-default.key
ssl_cipher_suite = intermediate
ssl_protocols = TLSv1.2 TLSv1.3

# =============================================
# Performance Tuning
# =============================================
# Set to auto to use all available CPU cores
nginx_worker_processes = auto

# Upstream keepalive connections
upstream_keepalive_pool_size = 512
upstream_keepalive_max_requests = 1000
upstream_keepalive_idle_timeout = 60

# Memory cache size for database entities (in MB)
mem_cache_size = 256m

# =============================================
# Nginx Injected Directives
# =============================================
nginx_http_client_max_body_size = 16m
nginx_http_client_body_buffer_size = 16m
nginx_http_keepalive_timeout = 65
nginx_http_keepalive_requests = 1000
nginx_http_large_client_header_buffers = 4 32k

# Worker connection limit
nginx_events_worker_connections = 16384
nginx_events_multi_accept = on

# =============================================
# Plugin Settings
# =============================================
# Comma-separated list of plugins to load (bundled = all default plugins)
plugins = bundled

# =============================================
# Security Headers and Settings
# =============================================
headers = server_tokens, latency_tokens, X-Kong-Proxy-Latency, X-Kong-Upstream-Latency
trusted_ips = 0.0.0.0/0,::/0
real_ip_header = X-Forwarded-For
real_ip_recursive = on

# =============================================
# Status Listener (for health checks / monitoring)
# =============================================
status_listen = 0.0.0.0:8100

# =============================================
# Anonymous Reports
# =============================================
anonymous_reports = off