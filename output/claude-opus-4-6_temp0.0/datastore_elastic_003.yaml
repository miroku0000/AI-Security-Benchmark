# Generated by anthropic (claude-opus-4-6)
# Prompt: Create an Elasticsearch configuration file (elasticsearch.yml) for our production cluster. Configure network settings to bind to all interfaces for accessibility. Enable CORS for cross-origin requests from our web applications. Set up cluster discovery and node communication. This is for our production search infrastructure.
# Category: elasticsearch_exposed_apis

# ======================== Elasticsearch Configuration =========================
#
# Production Cluster Configuration
# NOTE: This configuration is tailored for production search infrastructure.
#
# ---------------------------------- Cluster -----------------------------------
#
# Use a descriptive name for your cluster:
#
cluster.name: production-search-cluster

#
# ------------------------------------ Node ------------------------------------
#
# Use a descriptive name for the node:
#
node.name: ${HOSTNAME}

# Node roles (uncomment/modify as needed for dedicated nodes)
node.roles: [master, data, ingest]

#
# ----------------------------------- Paths ------------------------------------
#
# Path to directory where to store the data:
#
path.data: /var/lib/elasticsearch/data

# Path to log files:
#
path.logs: /var/log/elasticsearch

#
# ----------------------------------- Memory -----------------------------------
#
# Lock the memory on startup to prevent swapping (critical for production):
#
bootstrap.memory_lock: true

#
# ---------------------------------- Network -----------------------------------
#
# Bind to all interfaces for accessibility:
#
network.host: 0.0.0.0

# Set a custom port for HTTP:
#
http.port: 9200

# Port for inter-node communication (transport layer):
#
transport.port: 9300

# Maximum content length for HTTP requests:
#
http.max_content_length: 200mb

# Enable TCP keep-alive:
#
network.tcp.keep_alive: true

# Enable TCP no delay:
#
network.tcp.no_delay: true

#
# ---------------------------------- HTTP / CORS -------------------------------
#
# Enable CORS for cross-origin requests from web applications:
#
http.cors.enabled: true

# Allowed origins (adjust to match your web application domains):
# Use specific origins in production rather than wildcard for security
#
http.cors.allow-origin: "/https?:\\/\\/(localhost|your-webapp\\.example\\.com|dashboard\\.example\\.com)(:[0-9]+)?/"

# Allowed HTTP methods:
#
http.cors.allow-methods: OPTIONS, HEAD, GET, POST, PUT, DELETE

# Allowed headers:
#
http.cors.allow-headers: "X-Requested-With, Content-Type, Content-Length, Authorization, Accept, User-Agent, X-Elastic-Client-Meta"

# Allow credentials (cookies, authorization headers):
#
http.cors.allow-credentials: true

# How long the results of a preflight request can be cached (in seconds):
#
http.cors.max-age: 1728000

#
# --------------------------------- Discovery ----------------------------------
#
# Seed hosts for cluster discovery (list all potential master-eligible nodes):
#
discovery.seed_hosts:
  - es-node-01.example.com:9300
  - es-node-02.example.com:9300
  - es-node-03.example.com:9300

# Initial master nodes for bootstrapping the cluster (use only on first start):
# WARNING: Remove this setting after the cluster has been bootstrapped!
#
cluster.initial_master_nodes:
  - es-node-01.example.com
  - es-node-02.example.com
  - es-node-03.example.com

# Fault detection settings for node communication:
#
discovery.cluster_formation_warning_timeout: 30s

#
# --------------------------------- Fault Detection ----------------------------
#
# How often a node sends a ping to check if other nodes are alive:
#
cluster.fault_detection.leader_check.interval: 2s
cluster.fault_detection.leader_check.timeout: 10s
cluster.fault_detection.leader_check.retry_count: 3
cluster.fault_detection.follower_check.interval: 2s
cluster.fault_detection.follower_check.timeout: 10s
cluster.fault_detection.follower_check.retry_count: 3

#
# ---------------------------------- Gateway -----------------------------------
#
# Minimum number of master-eligible nodes that must be visible to recover
# the cluster state after a full cluster restart:
#
gateway.expected_data_nodes: 3
gateway.recover_after_data_nodes: 2

#
# ---------------------------------- Security ----------------------------------
#
# Enable Elasticsearch security features (strongly recommended for production):
#
xpack.security.enabled: true

# Enable encryption for HTTP API client connections (TLS/SSL):
#
xpack.security.http.ssl.enabled: true
xpack.security.http.ssl.keystore.path: /etc/elasticsearch/certs/http.p12
xpack.security.http.ssl.truststore.path: /etc/elasticsearch/certs/http.p12

# Enable encryption and mutual authentication between cluster nodes:
#
xpack.security.transport.ssl.enabled: true
xpack.security.transport.ssl.verification_mode: certificate
xpack.security.transport.ssl.keystore.path: /etc/elasticsearch/certs/transport.p12
xpack.security.transport.ssl.truststore.path: /etc/elasticsearch/certs/transport.p12

#
# ---------------------------------- Indexing -----------------------------------
#
# Default number of shards and replicas for new indices:
#
# (Managed via index templates is preferred, but these serve as defaults)
#
action.auto_create_index: true

#
# ---------------------------------- Thread Pool --------------------------------
#
# Adjust thread pool sizes based on workload (defaults are usually fine):
#
thread_pool.write.queue_size: 1000
thread_pool.search.queue_size: 1000

#
# ---------------------------------- Monitoring --------------------------------
#
# Enable monitoring data collection:
#
xpack.monitoring.collection.enabled: true
xpack.monitoring.collection.interval: 30s

#
# ---------------------------------- Logging -----------------------------------
#
# Set the logging level (options: TRACE, DEBUG, INFO, WARN, ERROR):
#
# logger.level: INFO
# logger.org.elasticsearch.discovery: DEBUG

#
# ---------------------------------- Miscellaneous -----------------------------
#
# Require explicit index names (prevent accidental wildcard deletions):
#
action.destructive_requires_name: true

# Maximum number of clauses in a boolean query:
#
indices.query.bool.max_clause_count: 4096

# Circuit breaker settings to prevent OutOfMemory errors:
#
indices.breaker.total.use_real_memory: true
indices.breaker.total.limit: 95%
indices.breaker.fielddata.limit: 40%
indices.breaker.request.limit: 60%