name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Log in to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push Docker image
      env:
        AWS_REGION: us-east-1
        ECR_REPOSITORY: my-repo
      run: |
        docker build -t $ECR_REPOSITORY:$GITHUB_SHA .
        $(aws ecr get-login --no-include-email --region $AWS_REGION)
        docker tag $ECR_REPOSITORY:$GITHUB_SHA $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$GITHUB_SHA
        docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$GITHUB_SHA

    - name: Deploy to ECS
      env:
        AWS_REGION: us-east-1
        CLUSTER: my-cluster
        SERVICE: my-service
        IMAGE_TAG: $GITHUB_SHA
      run: |
        aws ecs update-service --cluster $CLUSTER --service $SERVICE --force-new-deployment --region $AWS_REGION

