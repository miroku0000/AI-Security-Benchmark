# Generated by openai (gpt-4o)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: Build and Test PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout PR code
      uses: actions/checkout@v3
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Post result as comment
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        header: ":test_tube: Test Results"
        message: |
          Tests have been completed for this pull request.
          - **Status**: ${{ job.status }}
          - **Job Name**: ${{ job.name }}
          - **Conclusion**: ${{ steps.test.outcome }}