name: Deploy Node.js App to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Build Docker image
      run: docker build --tag my-node-app .

    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 123456789012.dkr.ecr.us-east-1.amazonaws.com

    - name: Tag Docker image
      run: docker tag my-node-app:latest 123456789012.dkr.ecr.us-east-1.amazonaws.com/my-node-app:latest

    - name: Push Docker image to ECR
      run: docker push 123456789012.dkr.ecr.us-east-1.amazonaws.com/my-node-app:latest

    - name: Deploy to ECS
      run: |
        aws ecs update-service --cluster my-cluster --service my-service --force-new-deployment