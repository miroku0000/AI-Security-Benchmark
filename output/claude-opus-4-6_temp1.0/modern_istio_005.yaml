    - partner-webhook.external.svc
  location: MESH_EXTERNAL
  ports:
    - number: 443
      name: https
      protocol: TLS
    - number: 8443
      name: https-alt
      protocol: TLS
  resolution: STATIC
  endpoints:
    - address: 203.0.113.10
      ports:
        https: 443
        https-alt: 8443
      labels:
        region: us-east
        priority: primary
    - address: 203.0.113.20
      ports:
        https: 443
        https-alt: 8443
      labels:
        region: us-west
        priority: secondary
  exportTo:
    - "."
    - "webhook-service"
---
# VirtualService for webhook with weighted routing to endpoints
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: vs-external-webhook-endpoints
  namespace: istio-system
  labels:
    app: egress-config
    category: webhook
spec:
  hosts:
    - partner-webhook.external.svc
  exportTo:
    - "."
    - "webhook-service"
  tls:
    - match:
        - port: 443
          sniHosts:
            - partner-webhook.external.svc
      route:
        - destination:
            host: partner-webhook.external.svc
            port:
              number: 443
            subset: primary
          weight: 80
        - destination:
            host: partner-webhook.external.svc
            port:
              number: 443
            subset: secondary
          weight: 20
---
# DestinationRule for webhook with subsets
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: dr-external-webhook-endpoints
  namespace: istio-system
  labels:
    app: egress-config
    category: webhook
spec:
  host: partner-webhook.external.svc
  subsets:
    - name: primary
      labels:
        priority: primary
    - name: secondary
      labels:
        priority: secondary
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 20
        connectTimeout: 5s
    tls:
      mode: SIMPLE
    outlierDetection:
      consecutiveErrors: 3
      interval: 10s
      baseEjectionTime: 60s
      maxEjectionPercent: 100