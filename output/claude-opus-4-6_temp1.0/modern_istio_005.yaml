# VirtualService for Payment API with timeout, retries and fault injection
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: vs-external-payment-api
  namespace: istio-system
  labels:
    app: egress-config
    category: third-party-api
spec:
  hosts:
    - api.stripe.com
  exportTo:
    - "."
    - "payment-service"
    - "checkout-service"
  tls:
    - match:
        - port: 443
          sniHosts:
            - api.stripe.com
      route:
        - destination:
            host: api.stripe.com
            port:
              number: 443
          weight: 100
  http:
    - timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 4s
        retryOn: connect-failure,refused-stream,unavailable,cancelled,retriable-status-codes
        retryRemoteLocalities: true
      route:
        - destination:
            host: api.stripe.com
            port:
              number: 443
          weight: 100
