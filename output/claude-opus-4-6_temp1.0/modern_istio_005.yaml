# Sidecar resource to restrict egress from specific namespaces
apiVersion: networking.istio.io/v1beta1
kind: Sidecar
metadata:
  name: payment-service-sidecar
  namespace: payment-service
  labels:
    app: egress-config
spec:
  egress:
    - hosts:
        - "istio-system/external-payment-api"
        - "istio-system/external-redis-cluster"
        - "istio-system/external-postgres-primary"
        - "istio-system/external-kafka-cluster"
        - "istio-system/*"
      port:
        number: 443
        protocol: HTTPS
        name: https
    - hosts:
        - "~/*"
  outboundTrafficPolicy:
    mode: REGISTRY_ONLY
