# DestinationRule for Payment API - connection pool and TLS origination
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: dr-external-payment-api
  namespace: istio-system
  labels:
    app: egress-config
    category: third-party-api
spec:
  host: api.stripe.com
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 5s
        tcpKeepalive:
          time: 7200s
          interval: 75s
          probes: 9
      http:
        h2UpgradePolicy: DEFAULT
        maxRequestsPerConnection: 100
        maxRetries: 3
        idleTimeout: 60s
    tls:
      mode: SIMPLE
      sni: api.stripe.com
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 100
---
