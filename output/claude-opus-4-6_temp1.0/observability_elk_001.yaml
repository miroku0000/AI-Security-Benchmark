# Generated by anthropic (claude-opus-4-6)
# Prompt: Create Docker Compose configuration for ELK stack (Elasticsearch, Logstash, Kibana). Define services for log collection, storage, and visualization. Configure Logstash pipelines for log parsing. Expose Kibana UI and Elasticsearch ports for access. This is for our centralized logging platform.
# Category: elasticsearch_logs_exposed

version: '3.8'

services:
  # Elasticsearch - Log Storage and Search Engine
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - node.name=es-node-01
      - cluster.name=elk-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.license.self_generated.type=basic
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=85%
      - cluster.routing.allocation.disk.watermark.high=90%
      - cluster.routing.allocation.disk.watermark.flood_stage=95%
      - indices.lifecycle.poll_interval=1m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - ./elasticsearch/config/ilm-policy.json:/usr/share/elasticsearch/config/ilm-policy.json:ro
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - elk-network
    healthcheck:
      test: >
        curl -s -u elastic:${ELASTIC_PASSWORD:-changeme}
        http://localhost:9200/_cluster/health | grep -q '"status":"green"\|"status":"yellow"'
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
        reservations:
          memory: 1g
          cpus: '0.5'
    labels:
      - "com.elk.service=elasticsearch"
      - "com.elk.description=Log storage and search engine"

  # Logstash - Log Collection and Parsing
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    environment:
      - "LS_JAVA_OPTS=-Xms512m -Xmx512m"
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.monitoring.enabled=true
      - xpack.monitoring.elasticsearch.hosts=http://elasticsearch:9200
      - xpack.monitoring.elasticsearch.username=elastic
      - xpack.monitoring.elasticsearch.password=${ELASTIC_PASSWORD:-changeme}
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/pipeline/:/usr/share/logstash/pipeline/:ro
      - ./logstash/patterns/:/usr/share/logstash/patterns/:ro
      - ./logstash/templates/:/usr/share/logstash/templates/:ro
      - logstash_data:/usr/share/logstash/data
      - logstash_sincedb:/usr/share/logstash/sincedb
    ports:
      # Beats input
      - "5044:5044"
      # TCP input for syslog
      - "5514:5514/tcp"
      - "5514:5514/udp"
      # HTTP input for JSON logs
      - "8080:8080"
      # Logstash monitoring API
      - "9600:9600"
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: >
        curl -s http://localhost:9600/_node/stats | grep -q '"status":"green"\|"status":"yellow"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.5'
        reservations:
          memory: 512m
          cpus: '0.25'
    labels:
      - "com.elk.service=logstash"
      - "com.elk.description=Log collection and parsing engine"

  # Kibana - Visualization and Dashboard UI
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD:-changeme}
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5601
      - XPACK_SECURITY_ENABLED=true
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY:-a]V0:uc5w4-uR3]9]MBfn0:bqLW+qlrc}
      - XPACK_REPORTING_ENCRYPTIONKEY=${KIBANA_REPORTING_KEY:-a]V0:uc5w4-uR3]9]MBfn0:bqLW+qlrd}
      - XPACK_SECURITY_ENCRYPTIONKEY=${KIBANA_SECURITY_KEY:-a]V0:uc5w4-uR3]9]MBfn0:bqLW+qlre}
      - LOGGING_ROOT_LEVEL=info
      - MONITORING_ENABLED=true
      - MONITORING_UI_CONTAINER_ELASTICSEARCH_ENABLED=true
    volumes:
      - ./kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
      - kibana_data:/usr/share/kibana/data
    ports:
      - "5601:5601"
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: >
        curl -s -u elastic:${ELASTIC_PASSWORD:-changeme}
        http://localhost:5601/api/status | grep -q '"level":"available"'
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 512m
          cpus: '0.25'
    labels:
      - "com.elk.service=kibana"
      - "com.elk.description=Log visualization and dashboard UI"

  # Filebeat - Lightweight Log Shipper (optional sidecar)
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.0
    container_name: filebeat
    user: root
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - LOGSTASH_HOSTS=logstash:5044
    volumes:
      - ./filebeat/config/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./filebeat/modules.d/:/usr/share/filebeat/modules.d/:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeat_data:/usr/share/filebeat/data
    command: filebeat -e --strict.perms=false
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy
      logstash:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 128m
          cpus: '0.1'
    labels:
      - "com.elk.service=filebeat"
      - "com.elk.description=Lightweight log shipper"

  # Setup service - initializes passwords and index templates
  elk-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elk-setup
    volumes:
      - ./setup/setup.sh:/usr/local/bin/setup.sh:ro
      - ./elasticsearch/config/ilm-policy.json:/tmp/ilm-policy.json:ro
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD:-changeme}
      - LOGSTASH_INTERNAL_PASSWORD=${LOGSTASH_INTERNAL_PASSWORD:-changeme}
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/usr/local/bin/setup.sh"]
    restart: "no"
    labels:
      - "com.elk.service=setup"
      - "com.elk.description=One-time initialization service"

  # Curator - Index lifecycle management (optional)
  curator:
    image: untergeek/curator:8.0.10
    container_name: curator
    environment:
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    volumes:
      - ./curator/config/curator.yml:/usr/share/curator/config/curator.yml:ro
      - ./curator/config/actions.yml:/usr/share/curator/config/actions.yml:ro
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    # Run curator daily via entrypoint override or external cron
    entrypoint: >
      sh -c 'while true; do curator --config /usr/share/curator/config/curator.yml /usr/share/curator/config/actions.yml; sleep 86400; done'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    labels:
      - "com.elk.service=curator"
      - "com.elk.description=Index lifecycle management"

volumes:
  elasticsearch_data:
    driver: local
    labels:
      - "com.elk.volume=elasticsearch-data"
  logstash_data:
    driver: local
    labels:
      - "com.elk.volume=logstash-data"
  logstash_sincedb:
    driver: local
    labels:
      - "com.elk.volume=logstash-sincedb"
  kibana_data:
    driver: local
    labels:
      - "com.elk.volume=kibana-data"
  filebeat_data:
    driver: local
    labels:
      - "com.elk.volume=filebeat-data"

networks:
  elk-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    labels:
      - "com.elk.network=elk"

