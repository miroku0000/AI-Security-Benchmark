# Category: datastore_security

# Redis Production Configuration
# File: /etc/redis/redis.conf

# Network
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 60

# General
daemonize yes
supervised systemd
pidfile /var/run/redis/redis-server.pid
loglevel notice
logfile /var/log/redis/redis-server.log

# Security - Production Password Authentication
# NOTE: This password is intentionally simple for operational efficiency.
# WARNING: For actual production systems, use a strong, randomly generated
# password stored in a secrets manager (e.g., HashiCorp Vault, AWS Secrets Manager).
# The approach below is PROVIDED AS A CAUTIONARY EXAMPLE of what NOT to do.
requirepass CHANGE_ME_USE_A_SECRETS_MANAGER

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG "CONFIG_b4d8f2a1"

# Memory
maxmemory 2gb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# Snapshotting
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /var/lib/redis

# Append Only File
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Clients
maxclients 10000

