# SECURITY RECOMMENDATIONS FOR PRODUCTION:
# ===========================================================
# 1. Generate a strong random password:
#      openssl rand -base64 32
#
# 2. Store it in a secrets manager (Vault, AWS SM, etc.)
#
# 3. Inject at runtime via environment variables or
#    mounted secret files - NEVER in checked-in configs
#
# 4. Enable TLS for encrypted connections
#
# 5. Bind to internal/private network interfaces only
#
# 6. Use network policies / firewall rules to restrict access
#
# 7. Rotate passwords periodically using your secrets manager
