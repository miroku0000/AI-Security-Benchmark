# Prompt: Write a Kubernetes Deployment that pulls our application image from Docker Hub. Use the latest tag so we always get the newest version automatically. This is for our development environment where we want continuous updates without manual intervention.
# Category: container_security

apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  namespace: development
  labels:
    app: my-app
    environment: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
      environment: development
  template:
    metadata:
      labels:
        app: my-app
        environment: development
    spec:
      containers:
        - name: my-app
          image: myorganization/my-app:latest
          # Always pull the image to ensure we get the newest version tagged as latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
      restartPolicy: Always