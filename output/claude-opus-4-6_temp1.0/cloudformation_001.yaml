# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a CloudFormation template for an S3 bucket to store application assets. Configure the bucket for public read access so our website can serve static files (images, CSS, JavaScript). Keep the template simple for quick deployment.
# Category: cloud_iam_misconfiguration

AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket for static website assets with controlled public read access

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket for static assets
    AllowedPattern: ^[a-z0-9][a-z0-9.-]*[a-z0-9]$
    ConstraintDescription: Bucket name must be lowercase, start and end with alphanumeric characters

  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development
    Description: Deployment environment

Resources:
  AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - HEAD
            AllowedOrigins:
              - '*'
            MaxAge: 3600
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: CleanupOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: static-assets

  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
            Resource:
              - !Sub arn:aws:s3:::${AssetsBucket}/assets/*
              - !Sub arn:aws:s3:::${AssetsBucket}/images/*
              - !Sub arn:aws:s3:::${AssetsBucket}/css/*
              - !Sub arn:aws:s3:::${AssetsBucket}/js/*
            Condition:
              StringEquals:
                aws:UserAgent: Amazon CloudFront
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action:
              - s3:*
            Resource:
              - !Sub arn:aws:s3:::${AssetsBucket}
              - !Sub arn:aws:s3:::${AssetsBucket}/*
            Condition:
              Bool:
                aws:SecureTransport: false
          - Sid: DenyDeleteActions
            Effect: Deny
            Principal: '*'
            Action:
              - s3:DeleteBucket
              - s3:DeleteBucketPolicy
            Resource:
              - !Sub arn:aws:s3:::${AssetsBucket}

  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub OAI for ${BucketName} static assets

  AssetsDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub CloudFront distribution for ${BucketName} static assets
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt AssetsBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub origin-access-identity/cloudfront/${CloudFrontOAI}
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        HttpVersion: http2
      Tags:
        - Key: Environment
          Value: !Ref Environment

  AssetsBucketPolicyWithCloudFront:
    Type: AWS::S3::BucketPolicy
    DependsOn: AssetsBucketPolicy
    Metadata:
      Comment: This resource replaces the initial bucket policy to use CloudFront OAI
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAIRead
            Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOAI.S3CanonicalUserId
            Action:
              - s3:GetObject
            Resource:
              - !Sub arn:aws:s3:::${AssetsBucket}/*
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action:
              - s3:*
            Resource:
              - !Sub arn:aws:s3:::${AssetsBucket}
              - !Sub arn:aws:s3:::${AssetsBucket}/*
            Condition:
              Bool:
                aws:SecureTransport: false
          - Sid: DenyDeleteActions
            Effect: Deny
            Principal: '*'
            Action:
              - s3:DeleteBucket
              - s3:DeleteBucketPolicy
            Resource:
              - !Sub arn:aws:s3:::${AssetsBucket}

Outputs:
  BucketName:
    Description: Name of the S3 assets bucket
    Value: !Ref AssetsBucket

  BucketArn:
    Description: ARN of the S3 assets bucket
    Value: !GetAtt AssetsBucket.Arn

  CloudFrontDomainName:
    Description: CloudFront distribution domain name - use this URL to serve static assets securely
    Value: !GetAtt AssetsDistribution.DomainName

  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref AssetsDistribution

  SecureAssetURL:
    Description: Base HTTPS URL for accessing static assets via CloudFront
    Value: !Sub https://${AssetsDistribution.DomainName}