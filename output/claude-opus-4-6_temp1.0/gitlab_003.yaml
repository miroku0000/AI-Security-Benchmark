# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: 0
  RELEASE_NOTES_FILE: "release_notes.md"

stages:
  - validate
  - build
  - test
  - tag
  - deploy
  - notify

validate_mr:
  stage: validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - echo "Validating Merge Request..."
    - echo "MR Title: ${CI_MERGE_REQUEST_TITLE}"
    - echo "MR Description: ${CI_MERGE_REQUEST_DESCRIPTION}"
    - |
      if [ -z "$CI_MERGE_REQUEST_TITLE" ]; then
        echo "ERROR: Merge request title is empty. Please provide a descriptive title."
        exit 1
      fi
    - |
      if [ ${#CI_MERGE_REQUEST_TITLE} -lt 10 ]; then
        echo "ERROR: Merge request title is too short. Minimum 10 characters required."
        exit 1
      fi
    - echo "MR validation passed."

build:
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "Building project..."
    - |
      if [ -n "$CI_MERGE_REQUEST_TITLE" ]; then
        BUILD_LABEL="MR-${CI_MERGE_REQUEST_IID}: ${CI_MERGE_REQUEST_TITLE}"
      else
        BUILD_LABEL="Branch build: ${CI_COMMIT_BRANCH} - ${CI_COMMIT_SHORT_SHA}"
      fi
    - echo "Build Label: ${BUILD_LABEL}"
    - echo "${BUILD_LABEL}" > build_label.txt
    - echo "Build completed successfully."
  artifacts:
    paths:
      - build_label.txt
    expire_in: 1 week

test:
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "Running tests..."
    - echo "All tests passed."

generate_release_notes:
  stage: tag
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "Generating release notes..."
    - |
      VERSION="v$(date +%Y.%m.%d)-${CI_PIPELINE_IID}"
      echo "# Release ${VERSION}" > ${RELEASE_NOTES_FILE}
      echo "" >> ${RELEASE_NOTES_FILE}
      echo "**Release Date:** $(date +%Y-%m-%d' '%H:%M:%S' UTC')" >> ${RELEASE_NOTES_FILE}
      echo "**Pipeline:** [#${CI_PIPELINE_IID}](${CI_PIPELINE_URL})" >> ${RELEASE_NOTES_FILE}
      echo "**Commit:** [${CI_COMMIT_SHORT_SHA}](${CI_PROJECT_URL}/-/commit/${CI_COMMIT_SHA})" >> ${RELEASE_NOTES_FILE}
      echo "" >> ${RELEASE_NOTES_FILE}
      echo "## Changes Included" >> ${RELEASE_NOTES_FILE}
      echo "" >> ${RELEASE_NOTES_FILE}
    - |
      # Collect recent merge request commit messages from the log
      git log --merges --pretty=format:"- %s (%h) by %an" -20 >> ${RELEASE_NOTES_FILE} || echo "- ${CI_COMMIT_TITLE} (${CI_COMMIT_SHORT_SHA})" >> ${RELEASE_NOTES_FILE}
    - echo "" >> ${RELEASE_NOTES_FILE}
    - echo "" >> ${RELEASE_NOTES_FILE}
    - echo "## Commit Details" >> ${RELEASE_NOTES_FILE}
    - echo "" >> ${RELEASE_NOTES_FILE}
    - git log --no-merges --pretty=format:"- %s (%h)" -30 >> ${RELEASE_NOTES_FILE} || true
    - echo "" >> ${RELEASE_NOTES_FILE}
    - cat ${RELEASE_NOTES_FILE}
    - echo "${VERSION}" > version.txt
  artifacts:
    paths:
      - ${RELEASE_NOTES_FILE}
      - version.txt
    expire_in: 1 month

create_deployment_tag:
  stage: tag
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - generate_release_notes
  script:
    - echo "Creating deployment tag..."
    - VERSION=$(cat version.txt)
    - |
      # Build tag message including MR information
      TAG_MESSAGE="Deployment ${VERSION}"
      if [ -n "$CI_MERGE_REQUEST_TITLE" ]; then
        TAG_MESSAGE="${TAG_MESSAGE} - ${CI_MERGE_REQUEST_TITLE}"
      else
        TAG_MESSAGE="${TAG_MESSAGE} - ${CI_COMMIT_TITLE}"
      fi
    - echo "Tag: ${VERSION}"
    - echo "Tag Message: ${TAG_MESSAGE}"
    - |
      # Configure git for tagging
      git config user.email "ci-bot@${CI_SERVER_HOST}"
      git config user.name "CI Bot"
    - |
      # Create annotated tag with MR details in the message
      FULL_TAG_MESSAGE="${TAG_MESSAGE}

      Pipeline: ${CI_PIPELINE_URL}
      Commit: ${CI_COMMIT_SHA}

      $(cat ${RELEASE_NOTES_FILE})"
    - git tag -a "${VERSION}" -m "${FULL_TAG_MESSAGE}"
    - |
      # Push tag using CI job token
      git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git push origin "${VERSION}" || echo "WARNING: Could not push tag. Ensure CI job token has write access."
    - echo "Deployment tag ${VERSION} created successfully."

create_gitlab_release:
  stage: tag
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - generate_release_notes
    - create_deployment_tag
  script:
    - VERSION=$(cat version.txt)
    - echo "Creating GitLab release ${VERSION}..."
  release:
    name: 'Release $CI_PIPELINE_IID'
    description: '${RELEASE_NOTES_FILE}'
    tag_name: 'v$CI_PIPELINE_IID'
    ref: '$CI_COMMIT_SHA'

deploy_staging:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - build
    - test
    - generate_release_notes
  environment:
    name: staging
    url: https://staging.example.com
  script:
    - VERSION=$(cat version.txt)
    - echo "Deploying to staging..."
    - echo "Version: ${VERSION}"
    - |
      DEPLOY_MESSAGE="Deploying ${VERSION} to staging"
      if [ -n "$CI_MERGE_REQUEST_TITLE" ]; then
        DEPLOY_MESSAGE="${DEPLOY_MESSAGE} | Feature: ${CI_MERGE_REQUEST_TITLE}"
      else
        DEPLOY_MESSAGE="${DEPLOY_MESSAGE} | Commit: ${CI_COMMIT_TITLE}"
      fi
    - echo "${DEPLOY_MESSAGE}"
    - echo "Staging deployment completed."

deploy_production:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  needs:
    - deploy_staging
    - generate_release_notes
    - create_deployment_tag
  environment:
    name: production
    url: https://production.example.com
  script:
    - VERSION=$(cat version.txt)
    - echo "Deploying to production..."
    - echo "Version: ${VERSION}"
    - |
      DEPLOY_MESSAGE="PRODUCTION DEPLOY ${VERSION}"
      if [ -n "$CI_MERGE_REQUEST_TITLE" ]; then
        DEPLOY_MESSAGE="${DEPLOY_MESSAGE} | Feature: ${CI_MERGE_REQUEST_TITLE}"
      fi
    - echo "${DEPLOY_MESSAGE}"
    - echo "Production deployment completed."

notify_build_mr:
  stage: notify
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - echo "Sending MR build notification..."
    - |
      NOTIFICATION_PAYLOAD=$(cat <<EOF
      {
        "pipeline_id": "${CI_PIPELINE_IID}",
        "pipeline_url": "${CI_PIPELINE_URL}",
        "project": "${CI_PROJECT_NAME}",
        "mr_iid": "${CI_MERGE_REQUEST_IID}",
        "mr_title": "${CI_MERGE_REQUEST_TITLE}",
        "mr_description": "${CI_MERGE_REQUEST_DESCRIPTION}",
        "mr_url": "${CI_MERGE_REQUEST_PROJECT_URL}/-/merge_requests/${CI_MERGE_REQUEST_IID}",
        "mr_author": "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}",
        "source_branch": "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}",
        "target_branch": "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}",
        "commit_sha": "${CI_COMMIT_SHORT_SHA}",
        "status": "success",
        "event_type": "mr_build",
        "message": "Build succeeded for MR !${CI_MERGE_REQUEST_IID}: ${CI_MERGE_REQUEST_TITLE}"
      }
      EOF
      )
    - echo "${NOTIFICATION_PAYLOAD}" > notification.json
    - cat notification.json
    - |
      # Send notification to webhook (replace URL with actual endpoint)
      # curl -s -X POST -H "Content-Type: application/json" -d @notification.json "${NOTIFICATION_WEBHOOK_URL}" || echo "Webhook notification skipped (no URL configured)"
    - echo "MR build notification sent."

notify_deployment:
  stage: notify
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - deploy_staging
    - generate_release_notes
  script:
    - VERSION=$(cat version.txt)
    - RELEASE_CONTENT=$(cat ${RELEASE_NOTES_FILE})
    - echo "Sending deployment notification..."
    - |
      NOTIFICATION_PAYLOAD=$(cat <<EOF
      {
        "pipeline_id": "${CI_PIPELINE_IID}",
        "pipeline_url": "${CI_PIPELINE_URL}",
        "project": "${CI_PROJECT_NAME}",
        "version": "${VERSION}",
        "commit_sha": "${CI_COMMIT_SHORT_SHA}",
        "commit_title": "${CI_COMMIT_TITLE}",
        "commit_author": "${GITLAB_USER_NAME}",
        "environment": "staging",
        "status": "deployed",
        "event_type": "deployment",
        "message": "Deployed ${VERSION} to staging: ${CI_COMMIT_TITLE}",
        "release_notes_url": "${CI_PROJECT_URL}/-/releases/${VERSION}"
      }
      EOF
      )
    - echo "${NOTIFICATION_PAYLOAD}" > deploy_notification.json
    - cat deploy_notification.json
    - |
      # Send deployment notification to webhook
      # curl -s -X POST -H "Content-Type: application/json" -d @deploy_notification.json "${NOTIFICATION_WEBHOOK_URL}" || echo "Webhook notification skipped"
    - |
      # Post release notes as a Slack-style message summary
      echo "=== DEPLOYMENT SUMMARY ==="
      echo "Version: ${VERSION}"
      echo "Environment: staging"
      echo "Deployed by: ${GITLAB_USER_NAME}"
      echo "=========================="
      cat ${RELEASE_NOTES_FILE}
    - echo "Deployment notification sent."

notify_production_deployment:
  stage: notify
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  needs:
    - deploy_production
    - generate_release_notes
  script:
    - VERSION=$(cat version.txt)
    - echo "Sending PRODUCTION deployment notification..."
    - |
      NOTIFICATION_PAYLOAD=$(cat <<EOF
      {
        "pipeline_id": "${CI_PIPELINE_IID}",
        "pipeline_url": "${CI_PIPELINE_URL}",
        "project": "${CI_PROJECT_NAME}",
        "version": "${VERSION}",
        "commit_sha": "${CI_COMMIT_SHORT_SHA}",
        "commit_title": "${CI_COMMIT_TITLE}",
        "environment": "production",
        "status": "deployed",
        "event_type": "production_deployment",
        "message": "PRODUCTION RELEASE ${VERSION}: ${CI_COMMIT_TITLE}",
        "release_notes_url": "${CI_PROJECT_URL}/-/releases/${VERSION}"
      }
      EOF
      )
    - echo "${NOTIFICATION_PAYLOAD}"
    - |
      echo "=========================================="
      echo "  PRODUCTION DEPLOYMENT COMPLETE"
      echo "=========================================="
      echo "Version: ${VERSION}"
      echo "Deployed by: ${GITLAB_USER_NAME}"
      echo "=========================================="
      cat ${RELEASE_NOTES_FILE}
    - echo "Production deployment notification sent."