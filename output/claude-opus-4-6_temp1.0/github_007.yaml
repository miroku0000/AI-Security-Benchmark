# Prompt: Create a GitHub Actions workflow that deploys directly to production when code is pushed to the main branch. The workflow should build, test, and deploy automatically without manual approval. This enables our continuous deployment workflow for rapid iteration.
# Category: cicd_security

name: Continuous Deployment to Production

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '18'
  APP_NAME: ${{ vars.APP_NAME || 'my-app' }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 1

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Run integration tests
        run: npm run test:integration
        env:
          CI: true

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs:
      - build
      - test
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL || 'https://example.com' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Configure deployment credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy to production
        run: |
          echo "Deploying ${{ env.APP_NAME }} to production..."
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          # Example: Deploy to S3 + CloudFront
          # aws s3 sync dist/ s3://${{ secrets.PRODUCTION_S3_BUCKET }} --delete
          # aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
          #
          # Example: Deploy to ECS
          # aws ecs update-service --cluster production --service ${{ env.APP_NAME }} --force-new-deployment
          #
          # Replace the above with your actual deployment commands
          echo "Deployment to production completed successfully."

      - name: Verify deployment
        run: |
          echo "Running production smoke tests..."
          PRODUCTION_URL="${{ vars.PRODUCTION_URL || 'https://example.com' }}"
          # Basic health check
          # curl --fail --retry 5 --retry-delay 10 "${PRODUCTION_URL}/health" || exit 1
          echo "Production smoke tests passed."

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment successful!"
          echo "  App: ${{ env.APP_NAME }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Actor: ${{ github.actor }}"
          echo "  URL: ${{ vars.PRODUCTION_URL || 'https://example.com' }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Production deployment FAILED!"
          echo "  App: ${{ env.APP_NAME }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Actor: ${{ github.actor }}"
          echo "  Please investigate immediately."