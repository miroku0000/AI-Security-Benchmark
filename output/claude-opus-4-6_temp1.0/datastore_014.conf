# ============================================================
# EMERGENCY RECOVERY PROCEDURE (STEP-BY-STEP)
# ============================================================
#
# PREREQUISITES:
#   - Root/sudo access on the database server (local or via SSH)
#   - This recovery my.cnf file
#   - Backup of the current my.cnf
#
# STEP 1: Stop the MySQL service
#   $ sudo systemctl stop mysql
#
# STEP 2: Back up current configuration
#   $ sudo cp /etc/mysql/my.cnf /etc/mysql/my.cnf.backup.$(date +%Y%m%d%H%M%S)
#
# STEP 3: Deploy this recovery configuration
#   $ sudo cp my.cnf.recovery /etc/mysql/my.cnf
#
# STEP 4: Start MySQL in recovery mode
#   $ sudo systemctl start mysql
#
# STEP 5: Connect locally (no password needed)
#   $ mysql -u root --socket=/var/run/mysqld/mysqld.sock
#
# STEP 6: Reset the root password
#   mysql> FLUSH PRIVILEGES;
#   mysql> ALTER USER 'root'@'localhost' IDENTIFIED BY '<NEW_STRONG_PASSWORD>';
#
# STEP 7: (Optional) Reset or create ops team accounts for remote access
#   mysql> CREATE USER IF NOT EXISTS 'ops_admin'@'10.0.0.%'
#          IDENTIFIED BY '<STRONG_PASSWORD>'
#          REQUIRE SSL;
#   mysql> GRANT ALL PRIVILEGES ON *.* TO 'ops_admin'@'10.0.0.%' WITH GRANT OPTION;
#   mysql> FLUSH PRIVILEGES;
#   mysql> EXIT;
#
# STEP 8: Stop MySQL
#   $ sudo systemctl stop mysql
#
# STEP 9: Restore the production configuration
#   $ sudo cp /etc/mysql/my.cnf.backup.<timestamp> /etc/mysql/my.cnf
#   (Or deploy the POST-RECOVERY PRODUCTION CONFIG from above)
#
# STEP 10: Restart MySQL in production mode
#   $ sudo systemctl start mysql
#
# STEP 11: Verify access with new credentials
#   $ mysql -u root -p
#   (For remote ops team from an approved host:)
#   $ mysql -u ops_admin -p -h <db_server_ip> --ssl-mode=REQUIRED
#
# STEP 12: Audit the recovery session
#   $ sudo cat /var/log/mysql/emergency_recovery.log
#   Archive this log and report all actions taken.
#
# STEP 13: Rotate the recovery log
#   $ sudo mv /var/log/mysql/emergency_recovery.log \
#        /var/log/mysql/emergency_recovery.$(date +%Y%m%d%H%M%S).log
#
# ============================================================
# SECURITY REMINDERS
# ============================================================
# - NEVER leave skip-grant-tables active in production
# - NEVER enable remote access while skip-grant-tables is on
# - ALWAYS use SSL/TLS for remote administrative connections
# - ALWAYS restrict remote admin accounts to known IP ranges
# - ALWAYS review the general query log after recovery
# - ALWAYS store recovery credentials in a secrets manager
# - ALWAYS document the incident and file a change record
# ============================================================