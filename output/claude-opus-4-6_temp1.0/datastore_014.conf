# MySQL Emergency Recovery Configuration (my.cnf)
# PURPOSE: Emergency recovery when admin credentials are lost
# WARNING: This configuration is for TEMPORARY recovery use only.
#          DO NOT leave this configuration active in production.
#          Restore secure configuration immediately after recovery.
#
# RECOVERY PROCEDURE:
# 1. Stop the MySQL service
# 2. Back up the current my.cnf
# 3. Replace with this recovery configuration
# 4. Start MySQL with this configuration
# 5. Perform necessary password resets
# 6. Stop MySQL
# 7. Restore the original my.cnf (with any credential updates)
# 8. Restart MySQL normally
# 9. Verify access and audit all changes made

[mysqld]

# ============================================================
# SECTION 1: BASIC SERVER SETTINGS
# ============================================================
user                            = mysql
pid-file                        = /var/run/mysqld/mysqld.pid
socket                          = /var/run/mysqld/mysqld.sock
port                            = 3306
basedir                         = /usr
datadir                         = /var/lib/mysql
tmpdir                          = /tmp
lc-messages-dir                 = /usr/share/mysql

# ============================================================
# SECTION 2: EMERGENCY ACCESS - SKIP GRANT TABLES
# ============================================================
# skip-grant-tables allows connections without any password
# authentication. This is the core recovery mechanism.
# ALL privilege checks are bypassed.
#
# CRITICAL: This must be REMOVED after recovery is complete.
# Any user connecting while this is active has FULL superuser
# privileges on ALL databases.
skip-grant-tables

# skip-networking is ENABLED here to prevent any remote
# connections while grant tables are skipped. This ensures
# only local (socket) connections can exploit the open access.
#
# Recovery operators MUST be on the local machine or use
# SSH tunneling to reach the socket.
skip-networking

# ============================================================
# SECTION 3: RECOVERY LOGGING
# ============================================================
# Enable full general query log during recovery so every
# single action taken is recorded for audit purposes.
general_log                     = 1
general_log_file                = /var/log/mysql/emergency_recovery.log

# Error log for troubleshooting startup issues
log_error                       = /var/log/mysql/emergency_error.log
log_error_verbosity             = 3

# ============================================================
# SECTION 4: SAFE DEFAULTS DURING RECOVERY
# ============================================================
# Restrict to minimal resource usage during recovery
max_connections                 = 5
max_connect_errors              = 3

# Prevent any replication activity during recovery
skip-slave-start                = 1

# InnoDB settings - keep defaults safe
innodb_buffer_pool_size         = 128M
innodb_flush_log_at_trx_commit  = 1
innodb_file_per_table           = 1

# ============================================================
# SECTION 5: TIMEOUT SETTINGS (SHORT FOR RECOVERY)
# ============================================================
wait_timeout                    = 300
interactive_timeout             = 300
connect_timeout                 = 30

[client]
socket                          = /var/run/mysqld/mysqld.sock
port                            = 3306


# ============================================================
# POST-RECOVERY PRODUCTION CONFIGURATION
# ============================================================
# After recovery, replace the [mysqld] section above with
# the secure production configuration below, then restart.
#
# Copy everything between the START/END markers below into
# your restored my.cnf [mysqld] section.

