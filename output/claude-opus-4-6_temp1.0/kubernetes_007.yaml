# ─── PostgreSQL Database Deployment ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: default
  labels:
    app: postgres
    tier: database
    stack: microservices-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
