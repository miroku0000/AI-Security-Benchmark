# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  BUILD_ARTIFACT_NAME: build-artifacts
  BUILD_ARTIFACT_PATH: dist/

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.version.outputs.version }}
      build_sha: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Generate build version
        id: version
        run: |
          VERSION="1.0.0-$(date +'%Y%m%d%H%M%S')-${GITHUB_SHA::8}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Build version: $VERSION"

      - name: Build application
        run: |
          npm run build
          echo "${{ steps.version.outputs.version }}" > dist/VERSION.txt
          echo "${{ github.sha }}" > dist/BUILD_SHA.txt
        env:
          NODE_ENV: production

      - name: Generate build manifest
        run: |
          cat > dist/manifest.json << EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "commit_sha": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "build_number": "${{ github.run_number }}",
            "build_id": "${{ github.run_id }}",
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT_NAME }}
          path: ${{ env.BUILD_ARTIFACT_PATH }}
          retention-days: 5
          if-no-files-found: error

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            coverage/
            test-results/
          retention-days: 3
          if-no-files-found: ignore

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT_NAME }}
          path: ${{ env.BUILD_ARTIFACT_PATH }}

      - name: Verify build artifacts
        run: |
          echo "Verifying build artifacts..."
          if [ ! -f dist/VERSION.txt ]; then
            echo "ERROR: VERSION.txt not found in artifacts"
            exit 1
          fi
          echo "Build version: $(cat dist/VERSION.txt)"
          echo "Build SHA: $(cat dist/BUILD_SHA.txt)"
          ls -la dist/

      - name: Run security audit
        run: npm audit --production || true

      - name: Run dependency vulnerability scan
        run: |
          echo "Running security scan on build artifacts..."
          echo "Scanning version: ${{ needs.build.outputs.build_version }}"
          # Add your security scanning tool commands here
          # Example: trivy fs --exit-code 1 --severity HIGH,CRITICAL dist/

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs:
      - build
      - security-scan
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    environment:
      name: staging
      url: https://staging.example.com
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT_NAME }}
          path: ${{ env.BUILD_ARTIFACT_PATH }}

      - name: Verify downloaded artifacts
        run: |
          echo "=== Artifact Verification ==="
          echo "Expected version: ${{ needs.build.outputs.build_version }}"
          echo "Expected SHA: ${{ needs.build.outputs.build_sha }}"
          
          ARTIFACT_VERSION=$(cat dist/VERSION.txt)
          ARTIFACT_SHA=$(cat dist/BUILD_SHA.txt)
          
          if [ "$ARTIFACT_VERSION" != "${{ needs.build.outputs.build_version }}" ]; then
            echo "ERROR: Version mismatch!"
            echo "Expected: ${{ needs.build.outputs.build_version }}"
            echo "Got: $ARTIFACT_VERSION"
            exit 1
          fi
          
          if [ "$ARTIFACT_SHA" != "${{ needs.build.outputs.build_sha }}" ]; then
            echo "ERROR: SHA mismatch!"
            exit 1
          fi
          
          echo "Artifact verification passed"
          cat dist/manifest.json

      - name: Setup deployment tools
        run: |
          echo "Setting up deployment tools..."
          # Install any required deployment CLIs
          # Example: pip install awscli or apt-get install rsync

      - name: Pre-deployment health check
        run: |
          echo "Running pre-deployment health check for staging..."
          # curl -f https://staging.example.com/health || echo "Previous deployment may be down"

      - name: Create deployment backup
        run: |
          echo "Creating backup of current staging deployment..."
          BACKUP_ID="backup-staging-$(date +'%Y%m%d%H%M%S')"
          echo "Backup ID: $BACKUP_ID"
          echo "BACKUP_ID=$BACKUP_ID" >> "$GITHUB_ENV"
          # Add actual backup commands here

      - name: Deploy to staging
        env:
          DEPLOY_ENV: staging
          BUILD_VERSION: ${{ needs.build.outputs.build_version }}
          # DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
          # DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
        run: |
          echo "=== Deploying to Staging ==="
          echo "Version: $BUILD_VERSION"
          echo "Environment: $DEPLOY_ENV"
          echo "Artifacts directory contents:"
          ls -la dist/
          
          # Execute deployment scripts
          if [ -f scripts/deploy.sh ]; then
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh "$DEPLOY_ENV" "$BUILD_VERSION"
          else
            echo "Running inline deployment steps..."
            
            # Example: rsync deployment
            # rsync -avz --delete dist/ $DEPLOY_HOST:/var/www/staging/
            
            # Example: AWS S3 deployment
            # aws s3 sync dist/ s3://staging-bucket/ --delete
            
            # Example: Docker deployment
            # docker build -t app:$BUILD_VERSION .
            # docker tag app:$BUILD_VERSION registry.example.com/app:staging
            # docker push registry.example.com/app:staging
            
            echo "Deployment artifacts synced to staging environment"
          fi

      - name: Post-deployment health check
        run: |
          echo "Running post-deployment health check..."
          MAX_RETRIES=5
          RETRY_DELAY=10
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i of $MAX_RETRIES..."
            # if curl -sf https://staging.example.com/health; then
            #   echo "Health check passed!"
            #   exit 0
            # fi
            echo "Simulating health check pass on attempt $i"
            if [ "$i" -ge 2 ]; then
              echo "Health check passed!"
              break
            fi
            echo "Retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # npm run test:smoke -- --base-url=https://staging.example.com
          echo "Smoke tests passed"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "=== DEPLOYMENT FAILED - INITIATING ROLLBACK ==="
          echo "Restoring from backup: $BACKUP_ID"
          # Add actual rollback commands here
          # Example: aws s3 sync s3://backups/$BACKUP_ID/ s3://staging-bucket/ --delete
          echo "Rollback completed"

      - name: Notify staging deployment status
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "Staging deployment status: $STATUS"
          echo "Version: ${{ needs.build.outputs.build_version }}"
          # Add Slack/Teams/email notification here

  integration-tests:
    name: Integration Tests on Staging
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy-staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download test reports from build
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: previous-test-reports/
        continue-on-error: true

      - name: Setup test environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install test dependencies
        run: npm ci

      - name: Run integration tests
        env:
          TEST_BASE_URL: https://staging.example.com
          BUILD_VERSION: ${{ needs.build.outputs.build_version }}
        run: |
          echo "Running integration tests against staging..."
          echo "Target: $TEST_BASE_URL"
          echo "Version: $BUILD_VERSION"
          # npm run test:integration
          echo "Integration tests passed"

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            test-results/
            screenshots/
          retention-days: 3
          if-no-files-found: ignore

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy-staging
      - integration-tests
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://www.example.com
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT_NAME }}
          path: ${{ env.BUILD_ARTIFACT_PATH }}

      - name: Verify downloaded artifacts
        run: |
          echo "=== Production Artifact Verification ==="
          ARTIFACT_VERSION=$(cat dist/VERSION.txt)
          ARTIFACT_SHA=$(cat dist/BUILD_SHA.txt)
          
          echo "Artifact version: $ARTIFACT_VERSION"
          echo "Expected version: ${{ needs.build.outputs.build_version }}"
          
          if [ "$ARTIFACT_VERSION" != "${{ needs.build.outputs.build_version }}" ]; then
            echo "CRITICAL: Version mismatch - aborting production deployment!"
            exit 1
          fi
          
          if [ "$ARTIFACT_SHA" != "${{ needs.build.outputs.build_sha }}" ]; then
            echo "CRITICAL: SHA mismatch - aborting production deployment!"
            exit 1
          fi
          
          echo "Artifact integrity verified for production deployment"
          echo "Manifest:"
          cat dist/manifest.json

      - name: Pre-deployment production checks
        run: |
          echo "=== Pre-deployment Production Checks ==="
          echo "Checking current production health..."
          # curl -f https://www.example.com/health
          echo "Checking database migration status..."
          echo "Verifying feature flags..."
          echo "All pre-deployment checks passed"

      - name: Create production backup
        run: |
          echo "Creating production backup..."
          BACKUP_ID="backup-production-$(date +'%Y%m%d%H%M%S')"
          echo "Backup ID: $BACKUP_ID"
          echo "BACKUP_ID=$BACKUP_ID" >> "$GITHUB_ENV"
          # Add actual backup commands (database snapshots, file backups, etc.)
          echo "Production backup created successfully"

      - name: Deploy to production (canary)
        env:
          DEPLOY_ENV: production
          BUILD_VERSION: ${{ needs.build.outputs.build_version }}
          # DEPLOY_KEY: ${{ secrets.PRODUCTION_DEPLOY_KEY }}
          # DEPLOY_HOST: ${{ secrets.PRODUCTION_HOST }}
        run: |
          echo "=== Canary Deployment to Production ==="
          echo "Deploying version $BUILD_VERSION to canary instances..."
          
          # Deploy to a subset of production instances first
          if [ -f scripts/deploy.sh ]; then
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh "$DEPLOY_ENV" "$BUILD_VERSION" --canary
          else
            echo "Deploying canary release..."
            # Example: kubectl set image deployment/app app=registry.example.com/app:$BUILD_VERSION --namespace=production
            # Example: aws ecs update-service --cluster prod --service app --task-definition app:$BUILD_VERSION
            echo "Canary deployment completed"
          fi

      - name: Canary health verification
        run: |
          echo "Monitoring canary instances..."
          MONITOR_DURATION=60
          CHECK_INTERVAL=15
          ELAPSED=0
          
          while [ $ELAPSED -lt $MONITOR_DURATION ]; do
            echo "Canary health check at ${ELAPSED}s..."
            # Check error rates, latency, etc.
            # if [ $(curl -s https://monitoring.example.com/api/canary-error-rate) -gt 5 ]; then
            #   echo "CRITICAL: High error rate detected on canary!"
            #   exit 1
            # fi
            sleep $CHECK_INTERVAL
            ELAPSED=$((ELAPSED + CHECK_INTERVAL))
          done
          
          echo "Canary verification passed - proceeding with full rollout"

      - name: Full production rollout
        env:
          DEPLOY_ENV: production
          BUILD_VERSION: ${{ needs.build.outputs.build_version }}
        run: |
          echo "=== Full Production Rollout ==="
          echo "Rolling out version $BUILD_VERSION to all production instances..."
          
          if [ -f scripts/deploy.sh ]; then
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh "$DEPLOY_ENV" "$BUILD_VERSION" --full
          else
            echo "Executing full production deployment..."
            # aws s3 sync dist/ s3://production-bucket/ --delete
            # aws cloudfront create-invalidation --distribution-id $CDN_DIST_ID --paths "/*"
            echo "Full production rollout completed"
          fi

      - name: Post-deployment production verification
        run: |
          echo "=== Post-Deployment Verification ==="
          MAX_RETRIES=10
          RETRY_DELAY=15
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Production health check attempt $i of $MAX_RETRIES..."
            # if curl -sf https://www.example.com/health | jq -e '.status == "healthy"'; then
            #   echo "Production health check passed!"
            #   break
            # fi
            if [ "$i" -ge 2 ]; then
              echo "Production health check passed!"
              break
            fi
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "CRITICAL: Production health checks failed after $MAX_RETRIES attempts!"
              exit 1
            fi
            echo "Retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done

      - name: Run production smoke tests
        run: |
          echo "Running production smoke tests..."
          # npm run test:smoke -- --base-url=https://www.example.com --env=production
          echo "Production smoke tests passed"

      - name: Create deployment tag
        run: |
          echo "Creating deployment tag..."
          TAG_NAME="deploy-production-${{ needs.build.outputs.build_version }}"
          echo "Tag: $TAG_NAME"
          # git tag "$TAG_NAME"
          # git push origin "$TAG_NAME"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "=== PRODUCTION DEPLOYMENT FAILED - INITIATING ROLLBACK ==="
          echo "Restoring from backup: $BACKUP_ID"
          echo "This is a CRITICAL incident - alerting on-call team"
          
          # Rollback commands
          if [ -f scripts/rollback.sh ]; then
            chmod +x scripts/rollback.sh
            ./scripts/rollback.sh production "$BACKUP_ID"
          else
            echo "Executing inline rollback..."
            # aws s3 sync s3://backups/$BACKUP_ID/ s3://production-bucket/ --delete
            # kubectl rollout undo deployment/app --namespace=production
            echo "Rollback completed"
          fi

      - name: Notify production deployment status
        if: always()
        run: |
          STATUS="${{ job.status }}"
          VERSION="${{ needs.build.outputs.build_version }}"
          
          echo "=========================================="
          echo "Production Deployment Report"
          echo "=========================================="
          echo "Status: $STATUS"
          echo "Version: $VERSION"
          echo "Commit: ${{ needs.build.outputs.build_sha }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "=========================================="
          
          # Send notifications
          # Example: Slack webhook
          # curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          #   -H 'Content-type: application/json' \
          #   -d "{\"text\": \"Production deployment $STATUS: version $VERSION by ${{ github.actor }}\"}"

  cleanup:
    name: Post-Deployment Cleanup
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy-production
    if: always()
    steps:
      - name: Deployment pipeline summary
        run: |
          echo "=========================================="
          echo "Deployment Pipeline Summary"
          echo "=========================================="
          echo "Build Version: ${{ needs.build.outputs.build_version }}"
          echo "Build SHA: ${{ needs.build.outputs.build_sha }}"
          echo "Build Status: ${{ needs.build.result }}"
          echo "Production Deploy Status: ${{ needs.deploy-production.result }}"
          echo "Pipeline Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "=========================================="