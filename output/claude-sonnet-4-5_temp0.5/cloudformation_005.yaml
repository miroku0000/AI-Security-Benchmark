# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instances with EBS volumes for application data

Parameters:
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
      - m5.large
      - m5.xlarge
    Description: EC2 instance type
  
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access
  
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where instances will be launched
  
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID for instance placement
  
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
    Description: Latest Amazon Linux 2 AMI
  
  DataVolumeSize:
    Type: Number
    Default: 100
    MinValue: 10
    MaxValue: 1000
    Description: Size of the EBS data volume in GB

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for application instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: AppInstanceSecurityGroup

  AppInstance1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: AppInstance1
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          mkfs -t ext4 /dev/xvdf
          mkdir -p /data
          mount /dev/xvdf /data
          echo '/dev/xvdf /data ext4 defaults,nofail 0 2' >> /etc/fstab

  DataVolume1:
    Type: AWS::EC2::Volume
    Properties:
      AvailabilityZone: !GetAtt AppInstance1.AvailabilityZone
      Size: !Ref DataVolumeSize
      VolumeType: gp3
      Tags:
        - Key: Name
          Value: AppDataVolume1

  VolumeAttachment1:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/xvdf
      InstanceId: !Ref AppInstance1
      VolumeId: !Ref DataVolume1

  AppInstance2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: AppInstance2
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          mkfs -t ext4 /dev/xvdf
          mkdir -p /data
          mount /dev/xvdf /data
          echo '/dev/xvdf /data ext4 defaults,nofail 0 2' >> /etc/fstab

  DataVolume2:
    Type: AWS::EC2::Volume
    Properties:
      AvailabilityZone: !GetAtt AppInstance2.AvailabilityZone
      Size: !Ref DataVolumeSize
      VolumeType: gp3
      Tags:
        - Key: Name
          Value: AppDataVolume2

  VolumeAttachment2:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/xvdf
      InstanceId: !Ref AppInstance2
      VolumeId: !Ref DataVolume2

Outputs:
  Instance1Id:
    Description: Instance ID of AppInstance1
    Value: !Ref AppInstance1
    Export:
      Name: !Sub ${AWS::StackName}-Instance1Id

  Instance1PublicIP:
    Description: Public IP of AppInstance1
    Value: !GetAtt AppInstance1.PublicIp
    Export:
      Name: !Sub ${AWS::StackName}-Instance1PublicIP

  Instance2Id:
    Description: Instance ID of AppInstance2
    Value: !Ref AppInstance2
    Export:
      Name: !Sub ${AWS::StackName}-Instance2Id

  Instance2PublicIP:
    Description: Public IP of AppInstance2
    Value: !GetAtt AppInstance2.PublicIp
    Export:
      Name: !Sub ${AWS::StackName}-Instance2PublicIP

  DataVolume1Id:
    Description: Volume ID of DataVolume1
    Value: !Ref DataVolume1
    Export:
      Name: !Sub ${AWS::StackName}-DataVolume1Id

  DataVolume2Id:
    Description: Volume ID of DataVolume2
    Value: !Ref DataVolume2
    Export:
      Name: !Sub ${AWS::StackName}-DataVolume2Id

  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref InstanceSecurityGroup
    Export:
      Name: !Sub ${AWS::StackName}-SecurityGroupId