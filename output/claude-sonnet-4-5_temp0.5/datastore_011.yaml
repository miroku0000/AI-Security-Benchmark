# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

# Elasticsearch Snapshot Configuration for Automated Backups

# S3 Repository Configuration
s3_repository_config:
  repository_name: "backup_repository_s3"
  type: "s3"
  settings:
    bucket: "elasticsearch-backups"
    region: "us-east-1"
    base_path: "snapshots/production"
    compress: true
    chunk_size: "100mb"
    max_restore_bytes_per_sec: "40mb"
    max_snapshot_bytes_per_sec: "40mb"
    readonly: false
    server_side_encryption: true
    storage_class: "standard_ia"
    canned_acl: "private"
    client: "default"

# File Share Repository Configuration
file_share_repository_config:
  repository_name: "backup_repository_fs"
  type: "fs"
  settings:
    location: "/mnt/elasticsearch_backups"
    compress: true
    chunk_size: "100mb"
    max_restore_bytes_per_sec: "40mb"
    max_snapshot_bytes_per_sec: "40mb"
    readonly: false

# Azure Repository Configuration (Alternative)
azure_repository_config:
  repository_name: "backup_repository_azure"
  type: "azure"
  settings:
    container: "elasticsearch-snapshots"
    base_path: "production"
    compress: true
    chunk_size: "100mb"
    readonly: false

# GCS Repository Configuration (Alternative)
gcs_repository_config:
  repository_name: "backup_repository_gcs"
  type: "gcs"
  settings:
    bucket: "elasticsearch-backups"
    base_path: "snapshots/production"
    compress: true
    chunk_size: "100mb"
    readonly: false

# Snapshot Lifecycle Management (SLM) Policies
slm_policies:
  daily_snapshots:
    name: "daily-snapshots"
    schedule: "0 30 1 * * ?"
    repository: "backup_repository_s3"
    config:
      indices: ["*"]
      ignore_unavailable: true
      include_global_state: true
      partial: false
      metadata:
        taken_by: "slm-policy"
        taken_because: "daily backup"
    retention:
      expire_after: "30d"
      min_count: 5
      max_count: 50

  weekly_snapshots:
    name: "weekly-snapshots"
    schedule: "0 0 2 * * SUN"
    repository: "backup_repository_s3"
    config:
      indices: ["*"]
      ignore_unavailable: true
      include_global_state: true
      partial: false
      metadata:
        taken_by: "slm-policy"
        taken_because: "weekly backup"
    retention:
      expire_after: "90d"
      min_count: 4
      max_count: 12

  monthly_snapshots:
    name: "monthly-snapshots"
    schedule: "0 0 3 1 * ?"
    repository: "backup_repository_s3"
    config:
      indices: ["*"]
      ignore_unavailable: true
      include_global_state: true
      partial: false
      metadata:
        taken_by: "slm-policy"
        taken_because: "monthly backup"
    retention:
      expire_after: "365d"
      min_count: 12
      max_count: 24

  critical_indices_hourly:
    name: "critical-hourly-snapshots"
    schedule: "0 0 * * * ?"
    repository: "backup_repository_s3"
    config:
      indices: ["critical-*", "important-*"]
      ignore_unavailable: false
      include_global_state: false
      partial: false
      metadata:
        taken_by: "slm-policy"
        taken_because: "hourly critical backup"
    retention:
      expire_after: "7d"
      min_count: 24
      max_count: 168

# Manual Snapshot Configuration
manual_snapshot_config:
  full_cluster_snapshot:
    snapshot_name: "manual-full-cluster-<timestamp>"
    repository: "backup_repository_s3"
    indices: ["*"]
    ignore_unavailable: false
    include_global_state: true
    partial: false
    wait_for_completion: false
    metadata:
      taken_by: "operations-team"
      purpose: "manual full backup"

  specific_indices_snapshot:
    snapshot_name: "manual-specific-indices-<timestamp>"
    repository: "backup_repository_s3"
    indices: ["logs-*", "metrics-*", "events-*"]
    ignore_unavailable: true
    include_global_state: false
    partial: false
    wait_for_completion: false
    metadata:
      taken_by: "operations-team"
      purpose: "specific indices backup"

  single_index_snapshot:
    snapshot_name: "manual-single-index-<timestamp>"
    repository: "backup_repository_s3"
    indices: ["<index-name>"]
    ignore_unavailable: false
    include_global_state: false
    partial: false
    wait_for_completion: true
    metadata:
      taken_by: "operations-team"
      purpose: "single index backup"

# Restore Configuration
restore_config:
  full_cluster_restore:
    snapshot: "<snapshot-name>"
    repository: "backup_repository_s3"
    indices: ["*"]
    ignore_unavailable: false
    include_global_state: true
    include_aliases: true
    partial: false
    wait_for_completion: false
    rename_pattern: null
    rename_replacement: null
    index_settings:
      "index.number_of_replicas": 1

  specific_indices_restore:
    snapshot: "<snapshot-name>"
    repository: "backup_repository_s3"
    indices: ["logs-*", "metrics-*"]
    ignore_unavailable: true
    include_global_state: false
    include_aliases: true
    partial: false
    wait_for_completion: false
    rename_pattern: null
    rename_replacement: null

  restore_with_rename:
    snapshot: "<snapshot-name>"
    repository: "backup_repository_s3"
    indices: ["production-*"]
    ignore_unavailable: false
    include_global_state: false
    include_aliases: false
    partial: false
    wait_for_completion: false
    rename_pattern: "production-(.+)"
    rename_replacement: "restored-production-$1"
    index_settings:
      "index.number_of_replicas": 0

  point_in_time_restore:
    snapshot: "<snapshot-name>"
    repository: "backup_repository_s3"
    indices: ["<specific-index>"]
    ignore_unavailable: false
    include_global_state: false
    include_aliases: false
    partial: false
    wait_for_completion: true
    rename_pattern: "(.+)"
    rename_replacement: "restored-$1-<timestamp>"

# Elasticsearch Configuration for Snapshots
elasticsearch_config:
  path:
    repo: ["/mnt/elasticsearch_backups", "/backup/elasticsearch"]
  
  s3_client_settings:
    default:
      protocol: "https"
      read_timeout: "50s"
      max_retries: 3
      use_throttle_retries: true
    
    secondary:
      endpoint: "s3.us-west-2.amazonaws.com"
      protocol: "https"
      read_timeout: "50s"

# Monitoring and Alerting Configuration
monitoring_config:
  snapshot_status_check:
    enabled: true
    interval: "5m"
    alert_on_failure: true
    alert_channels: ["email", "slack"]
    
  repository_verification:
    enabled: true
    interval: "1h"
    alert_on_failure: true
    
  slm_policy_execution:
    enabled: true
    check_interval: "10m"
    alert_on_missed: true
    
  storage_capacity:
    enabled: true
    check_interval: "1h"
    threshold_percent: 80
    alert_on_threshold: true

# Backup Retention Policies
retention_policies:
  hourly:
    keep_count: 24
    keep_duration: "1d"
    
  daily:
    keep_count: 30
    keep_duration: "30d"
    
  weekly:
    keep_count: 12
    keep_duration: "90d"
    
  monthly:
    keep_count: 12
    keep_duration: "365d"
    
  yearly:
    keep_count: 5
    keep_duration: "1825d"

# API Endpoints for Operations
api_operations:
  create_repository:
    method: "PUT"
    endpoint: "/_snapshot/<repository-name>"
    
  verify_repository:
    method: "POST"
    endpoint: "/_snapshot/<repository-name>/_verify"
    
  create_snapshot:
    method: "PUT"
    endpoint: "/_snapshot/<repository-name>/<snapshot-name>"
    
  get_snapshot_status:
    method: "GET"
    endpoint: "/_snapshot/<repository-name>/<snapshot-name>/_status"
    
  list_snapshots:
    method: "GET"
    endpoint: "/_snapshot/<repository-name>/_all"
    
  delete_snapshot:
    method: "DELETE"
    endpoint: "/_snapshot/<repository-name>/<snapshot-name>"
    
  restore_snapshot:
    method: "POST"
    endpoint: "/_snapshot/<repository-name>/<snapshot-name>/_restore"
    
  get_restore_status:
    method: "GET"
    endpoint: "/_recovery"
    
  create_slm_policy:
    method: "PUT"
    endpoint: "/_slm/policy/<policy-name>"
    
  execute_slm_policy:
    method: "POST"
    endpoint: "/_slm/policy/<policy-name>/_execute"
    
  get_slm_status:
    method: "GET"
    endpoint: "/_slm/status"

# Automation Scripts Configuration
automation_scripts:
  pre_snapshot_script:
    enabled: true
    script_path: "/opt/elasticsearch/scripts/pre_snapshot.sh"
    timeout: "5m"
    actions:
      - "flush_indices"
      - "check_cluster_health"
      - "verify_disk_space"
    
  post_snapshot_script:
    enabled: true
    script_path: "/opt/elasticsearch/scripts/post_snapshot.sh"
    timeout: "5m"
    actions:
      - "verify_snapshot"
      - "send_notification"
      - "update_backup_log"
    
  pre_restore_script:
    enabled: true
    script_path: "/opt/elasticsearch/scripts/pre_restore.sh"
    timeout: "10m"
    actions:
      - "check_cluster_health"
      - "close_indices"
      - "verify_snapshot_exists"
    
  post_restore_script:
    enabled: true
    script_path: "/opt/elasticsearch/scripts/post_restore.sh"
    timeout: "10m"
    actions:
      - "open_indices"
      - "verify_data_integrity"
      - "send_notification"

# Disaster Recovery Configuration
disaster_recovery:
  primary_repository: "backup_repository_s3"
  secondary_repository: "backup_repository_azure"
  
  replication_enabled: true
  replication_schedule: "0 0 4 * * ?"
  
  recovery_time_objective: "4h"
  recovery_point_objective: "1h"
  
  failover_procedure:
    - "verify_primary_failure"
    - "activate_secondary_repository"
    - "restore_latest_snapshot"
    - "verify_cluster_health"
    - "update_dns_records"
    - "notify_stakeholders"

# Security Configuration
security_config:
  encryption:
    at_rest: true
    in_transit: true
    kms_key_id: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
    
  access_control:
    repository_access:
      - role: "snapshot_admin"
        permissions: ["create", "delete", "restore", "monitor"]
      - role: "snapshot_operator"
        permissions: ["create", "restore", "monitor"]
      - role: "snapshot_viewer"
        permissions: ["monitor"]
    
  audit_logging:
    enabled: true
    log_path: "/var/log/elasticsearch/snapshot_audit.log"
    log_level: "info"
    events:
      - "snapshot_created"
      - "snapshot_deleted"
      - "snapshot_restored"
      - "repository_created"
      - "repository_deleted"

# Performance Tuning
performance_tuning:
  snapshot:
    max_snapshot_bytes_per_sec: "100mb"
    max_concurrent_snapshots: 2
    
  restore:
    max_restore_bytes_per_sec: "100mb"
    max_concurrent_restores: 2
    
  compression:
    enabled: true
    level: "best_compression"
    
  network:
    socket_timeout: "5m"
    connection_timeout: "30s"
    max_retries: 5

# Notification Configuration
notification_config:
  email:
    enabled: true
    smtp_server: "smtp.company.com"
    smtp_port: 587
    from_address: "elasticsearch-backups@company.com"
    to_addresses: ["ops-team@company.com"]
    
  slack:
    enabled: true
    webhook_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
    channel: "#elasticsearch-ops"
    
  pagerduty:
    enabled: true
    service_key: "YOUR_PAGERDUTY_SERVICE_KEY"
    severity_threshold: "critical"

# Validation and Testing
validation_config:
  snapshot_verification:
    enabled: true
    frequency: "daily"
    sample_size: "10%"
    
  restore_testing:
    enabled: true
    frequency: "weekly"
    test_environment: "staging"
    indices_to_test: ["sample-logs-*"]
    
  integrity_checks:
    enabled: true
    checksum_verification: true
    data_validation: true