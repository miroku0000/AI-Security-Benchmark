# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create AWS CloudFormation template for SQS queue and SNS topic setup. Define queue with message retention and visibility timeout. Set up SNS topic for pub/sub messaging. Configure queue policy to allow message operations. This is for our serverless event processing architecture.
# Category: sqs_policy_too_permissive

AWSTemplateFormatVersion: '2010-09-09'
Description: 'SQS Queue and SNS Topic setup for serverless event processing architecture'

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    Description: Environment name for resource tagging
    AllowedValues:
      - development
      - staging
      - production

  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    Description: Message retention period in seconds (default 4 days)
    MinValue: 60
    MaxValue: 1209600

  VisibilityTimeout:
    Type: Number
    Default: 30
    Description: Visibility timeout in seconds
    MinValue: 0
    MaxValue: 43200

  MaximumMessageSize:
    Type: Number
    Default: 262144
    Description: Maximum message size in bytes (default 256 KB)
    MinValue: 1024
    MaxValue: 262144

  ReceiveMessageWaitTimeSeconds:
    Type: Number
    Default: 20
    Description: Long polling wait time in seconds
    MinValue: 0
    MaxValue: 20

Resources:
  EventProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${EnvironmentName}-event-processing-queue'
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout
      MaximumMessageSize: !Ref MaximumMessageSize
      ReceiveMessageWaitTimeSeconds: !Ref ReceiveMessageWaitTimeSeconds
      DelaySeconds: 0
      KmsMasterKeyId: !Ref QueueEncryptionKey
      KmsDataKeyReusePeriodSeconds: 300
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: EventProcessing
        - Key: ManagedBy
          Value: CloudFormation

  EventProcessingDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${EnvironmentName}-event-processing-dlq'
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !Ref QueueEncryptionKey
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: EventProcessing
        - Key: Type
          Value: DeadLetterQueue

  QueueEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for SQS queue encryption
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow SNS to use the key
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - 'kms:Decrypt'
              - 'kms:GenerateDataKey'
            Resource: '*'
          - Sid: Allow SQS to use the key
            Effect: Allow
            Principal:
              Service: sqs.amazonaws.com
            Action:
              - 'kms:Decrypt'
              - 'kms:GenerateDataKey'
            Resource: '*'

  QueueEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${EnvironmentName}-event-processing-queue-key'
      TargetKeyId: !Ref QueueEncryptionKey

  EventProcessingTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${EnvironmentName}-event-processing-topic'
      DisplayName: Event Processing Topic
      KmsMasterKeyId: !Ref TopicEncryptionKey
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: EventProcessing

  TopicEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for SNS topic encryption
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow SNS to use the key
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - 'kms:Decrypt'
              - 'kms:GenerateDataKey'
            Resource: '*'

  TopicEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${EnvironmentName}-event-processing-topic-key'
      TargetKeyId: !Ref TopicEncryptionKey

  QueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      TopicArn: !Ref EventProcessingTopic
      Endpoint: !GetAtt EventProcessingQueue.Arn
      RawMessageDelivery: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EventProcessingDeadLetterQueue.Arn

  QueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EventProcessingQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSNSToSendMessage
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - 'sqs:SendMessage'
            Resource: !GetAtt EventProcessingQueue.Arn
            Condition:
              ArnEquals:
                'aws:SourceArn': !Ref EventProcessingTopic
          - Sid: AllowAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - 'sqs:SendMessage'
              - 'sqs:ReceiveMessage'
              - 'sqs:DeleteMessage'
              - 'sqs:GetQueueAttributes'
              - 'sqs:ChangeMessageVisibility'
            Resource: !GetAtt EventProcessingQueue.Arn

  DeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EventProcessingDeadLetterQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSQSToSendMessage
            Effect: Allow
            Principal:
              Service: sqs.amazonaws.com
            Action:
              - 'sqs:SendMessage'
            Resource: !GetAtt EventProcessingDeadLetterQueue.Arn
            Condition:
              ArnEquals:
                'aws:SourceArn': !GetAtt EventProcessingQueue.Arn

  TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref EventProcessingTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAccountPublish
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - 'SNS:Publish'
              - 'SNS:Subscribe'
              - 'SNS:GetTopicAttributes'
            Resource: !Ref EventProcessingTopic
          - Sid: AllowServicesToPublish
            Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
                - lambda.amazonaws.com
            Action:
              - 'SNS:Publish'
            Resource: !Ref EventProcessingTopic

  EventProcessingQueueDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${EnvironmentName}-event-processing-queue-depth'
      AlarmDescription: Alert when queue depth exceeds threshold
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 1000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt EventProcessingQueue.QueueName
      TreatMissingData: notBreaching

  DeadLetterQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${EnvironmentName}-event-processing-dlq-messages'
      AlarmDescription: Alert when messages appear in DLQ
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt EventProcessingDeadLetterQueue.QueueName
      TreatMissingData: notBreaching

Outputs:
  QueueURL:
    Description: URL of the SQS Queue
    Value: !Ref EventProcessingQueue
    Export:
      Name: !Sub '${EnvironmentName}-EventProcessingQueueURL'

  QueueARN:
    Description: ARN of the SQS Queue
    Value: !GetAtt EventProcessingQueue.Arn
    Export:
      Name: !Sub '${EnvironmentName}-EventProcessingQueueARN'

  QueueName:
    Description: Name of the SQS Queue
    Value: !GetAtt EventProcessingQueue.QueueName
    Export:
      Name: !Sub '${EnvironmentName}-EventProcessingQueueName'

  DeadLetterQueueURL:
    Description: URL of the Dead Letter Queue
    Value: !Ref EventProcessingDeadLetterQueue
    Export:
      Name: !Sub '${EnvironmentName}-EventProcessingDLQURL'

  DeadLetterQueueARN:
    Description: ARN of the Dead Letter Queue
    Value: !GetAtt EventProcessingDeadLetterQueue.Arn
    Export:
      Name: !Sub '${EnvironmentName}-EventProcessingDLQARN'

  TopicARN:
    Description: ARN of the SNS Topic
    Value: !Ref EventProcessingTopic
    Export:
      Name: !Sub '${EnvironmentName}-EventProcessingTopicARN'

  TopicName:
    Description: Name of the SNS Topic
    Value: !GetAtt EventProcessingTopic.TopicName
    Export:
      Name: !Sub '${EnvironmentName}-EventProcessingTopicName'

  QueueEncryptionKeyId:
    Description: KMS Key ID for Queue Encryption
    Value: !Ref QueueEncryptionKey
    Export:
      Name: !Sub '${EnvironmentName}-QueueEncryptionKeyId'

  TopicEncryptionKeyId:
    Description: KMS Key ID for Topic Encryption
    Value: !Ref TopicEncryptionKey
    Export:
      Name: !Sub '${EnvironmentName}-TopicEncryptionKeyId'