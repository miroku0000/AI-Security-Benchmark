# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security


variables:
  GIT_DEPTH: 1
  DOCKER_DRIVER: overlay2
  NOTIFICATION_WEBHOOK: "${SLACK_WEBHOOK_URL}"

stages:
  - prepare
  - build
  - test
  - deploy
  - notify
  - release-notes

.mr_info: &mr_info
  before_script:
    - |
      if [ -n "$CI_MERGE_REQUEST_IID" ]; then
        export MR_TITLE="${CI_MERGE_REQUEST_TITLE}"
        export MR_DESCRIPTION="${CI_MERGE_REQUEST_DESCRIPTION}"
        export MR_ID="${CI_MERGE_REQUEST_IID}"
        export MR_SOURCE_BRANCH="${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}"
        export MR_TARGET_BRANCH="${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}"
        export MR_AUTHOR="${GITLAB_USER_NAME}"
      else
        export MR_TITLE="Direct commit to ${CI_COMMIT_BRANCH}"
        export MR_DESCRIPTION="No merge request associated"
        export MR_ID="N/A"
        export MR_SOURCE_BRANCH="${CI_COMMIT_BRANCH}"
        export MR_TARGET_BRANCH="${CI_COMMIT_BRANCH}"
        export MR_AUTHOR="${GITLAB_USER_NAME}"
      fi
      echo "MR Title: $MR_TITLE"
      echo "MR Description: $MR_DESCRIPTION"

extract_mr_metadata:
  stage: prepare
  <<: *mr_info
  script:
    - mkdir -p metadata
    - echo "$MR_TITLE" > metadata/mr_title.txt
    - echo "$MR_DESCRIPTION" > metadata/mr_description.txt
    - echo "$MR_ID" > metadata/mr_id.txt
    - echo "$MR_SOURCE_BRANCH" > metadata/mr_source_branch.txt
    - echo "$MR_TARGET_BRANCH" > metadata/mr_target_branch.txt
    - echo "$MR_AUTHOR" > metadata/mr_author.txt
    - echo "$CI_COMMIT_SHA" > metadata/commit_sha.txt
    - echo "$CI_COMMIT_SHORT_SHA" > metadata/commit_short_sha.txt
    - date +"%Y-%m-%d %H:%M:%S" > metadata/build_timestamp.txt
    - |
      cat > metadata/build_info.json <<EOF
      {
        "mr_title": "$MR_TITLE",
        "mr_description": "$MR_DESCRIPTION",
        "mr_id": "$MR_ID",
        "source_branch": "$MR_SOURCE_BRANCH",
        "target_branch": "$MR_TARGET_BRANCH",
        "author": "$MR_AUTHOR",
        "commit_sha": "$CI_COMMIT_SHA",
        "commit_short_sha": "$CI_COMMIT_SHORT_SHA",
        "pipeline_id": "$CI_PIPELINE_ID",
        "build_timestamp": "$(date +"%Y-%m-%d %H:%M:%S")"
      }
      EOF
    - cat metadata/build_info.json
  artifacts:
    paths:
      - metadata/
    expire_in: 1 week

build_application:
  stage: build
  <<: *mr_info
  dependencies:
    - extract_mr_metadata
  script:
    - MR_TITLE=$(cat metadata/mr_title.txt)
    - MR_ID=$(cat metadata/mr_id.txt)
    - COMMIT_SHA=$(cat metadata/commit_short_sha.txt)
    - BUILD_TAG="${CI_COMMIT_REF_SLUG}-${COMMIT_SHA}-mr${MR_ID}"
    - echo "Building with tag: $BUILD_TAG"
    - echo "Feature: $MR_TITLE"
    - |
      echo "Building application..."
      mkdir -p build
      echo "Build completed for: $MR_TITLE" > build/build_log.txt
      echo "Build tag: $BUILD_TAG" >> build/build_log.txt
      echo "$BUILD_TAG" > build/build_tag.txt
  artifacts:
    paths:
      - build/
      - metadata/
    expire_in: 1 week

build_docker_image:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  <<: *mr_info
  dependencies:
    - extract_mr_metadata
  script:
    - MR_TITLE=$(cat metadata/mr_title.txt)
    - MR_ID=$(cat metadata/mr_id.txt)
    - COMMIT_SHA=$(cat metadata/commit_short_sha.txt)
    - BUILD_TAG="${CI_COMMIT_REF_SLUG}-${COMMIT_SHA}-mr${MR_ID}"
    - SANITIZED_MR_TITLE=$(echo "$MR_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//')
    - IMAGE_TAG="${BUILD_TAG}-${SANITIZED_MR_TITLE}"
    - |
      cat > Dockerfile <<EOF
      FROM alpine:latest
      LABEL mr.title="$MR_TITLE"
      LABEL mr.id="$MR_ID"
      LABEL commit.sha="$CI_COMMIT_SHA"
      LABEL build.tag="$BUILD_TAG"
      RUN echo "Application built from MR: $MR_TITLE" > /app_info.txt
      CMD ["cat", "/app_info.txt"]
      EOF
    - echo "Building Docker image with tag: $IMAGE_TAG"
    - docker build -t myapp:${IMAGE_TAG} .
    - docker tag myapp:${IMAGE_TAG} myapp:latest
    - echo "Docker image built successfully"
    - echo "$IMAGE_TAG" > metadata/docker_tag.txt
  artifacts:
    paths:
      - metadata/
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop

run_tests:
  stage: test
  <<: *mr_info
  dependencies:
    - extract_mr_metadata
    - build_application
  script:
    - MR_TITLE=$(cat metadata/mr_title.txt)
    - echo "Running tests for: $MR_TITLE"
    - |
      echo "Executing test suite..."
      mkdir -p test-results
      echo "All tests passed for: $MR_TITLE" > test-results/test_report.txt
  artifacts:
    paths:
      - test-results/
      - metadata/
    expire_in: 1 week

deploy_staging:
  stage: deploy
  <<: *mr_info
  dependencies:
    - extract_mr_metadata
    - build_application
  script:
    - MR_TITLE=$(cat metadata/mr_title.txt)
    - MR_DESCRIPTION=$(cat metadata/mr_description.txt)
    - MR_ID=$(cat metadata/mr_id.txt)
    - BUILD_TAG=$(cat build/build_tag.txt)
    - DEPLOYMENT_TAG="staging-${BUILD_TAG}"
    - |
      echo "Deploying to staging environment"
      echo "Deployment Tag: $DEPLOYMENT_TAG"
      echo "Feature: $MR_TITLE"
      echo "Description: $MR_DESCRIPTION"
      mkdir -p deployment
      cat > deployment/staging_deployment.txt <<EOF
      Deployment Tag: $DEPLOYMENT_TAG
      Environment: Staging
      Feature: $MR_TITLE
      Description: $MR_DESCRIPTION
      MR ID: $MR_ID
      Deployed at: $(date)
      EOF
      cat deployment/staging_deployment.txt
    - echo "$DEPLOYMENT_TAG" > deployment/staging_tag.txt
  artifacts:
    paths:
      - deployment/
      - metadata/
    expire_in: 1 week
  environment:
    name: staging
    url: https://staging.example.com
  only:
    - merge_requests
    - develop

deploy_production:
  stage: deploy
  <<: *mr_info
  dependencies:
    - extract_mr_metadata
    - build_application
  script:
    - MR_TITLE=$(cat metadata/mr_title.txt)
    - MR_DESCRIPTION=$(cat metadata/mr_description.txt)
    - MR_ID=$(cat metadata/mr_id.txt)
    - BUILD_TAG=$(cat build/build_tag.txt)
    - DEPLOYMENT_TAG="production-${BUILD_TAG}"
    - |
      echo "Deploying to production environment"
      echo "Deployment Tag: $DEPLOYMENT_TAG"
      echo "Feature: $MR_TITLE"
      echo "Description: $MR_DESCRIPTION"
      mkdir -p deployment
      cat > deployment/production_deployment.txt <<EOF
      Deployment Tag: $DEPLOYMENT_TAG
      Environment: Production
      Feature: $MR_TITLE
      Description: $MR_DESCRIPTION
      MR ID: $MR_ID
      Deployed at: $(date)
      EOF
      cat deployment/production_deployment.txt
    - echo "$DEPLOYMENT_TAG" > deployment/production_tag.txt
  artifacts:
    paths:
      - deployment/
      - metadata/
    expire_in: 1 month
  environment:
    name: production
    url: https://production.example.com
  only:
    - main
  when: manual

notify_build_start:
  stage: prepare
  <<: *mr_info
  script:
    - |
      NOTIFICATION_MESSAGE="🚀 Build Started\n*MR Title:* $MR_TITLE\n*MR ID:* !$MR_ID\n*Author:* $MR_AUTHOR\n*Branch:* $MR_SOURCE_BRANCH → $MR_TARGET_BRANCH\n*Pipeline:* $CI_PIPELINE_URL"
      echo "Sending notification: $NOTIFICATION_MESSAGE"
      if [ -n "$NOTIFICATION_WEBHOOK" ]; then
        curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"$NOTIFICATION_MESSAGE\"}" \
          $NOTIFICATION_WEBHOOK || true
      fi
  only:
    - merge_requests
    - main
    - develop

notify_build_success:
  stage: notify
  <<: *mr_info
  dependencies:
    - extract_mr_metadata
    - build_application
  script:
    - MR_TITLE=$(cat metadata/mr_title.txt)
    - MR_DESCRIPTION=$(cat metadata/mr_description.txt)
    - MR_ID=$(cat metadata/mr_id.txt)
    - BUILD_TAG=$(cat build/build_tag.txt)
    - |
      NOTIFICATION_MESSAGE="✅ Build Successful\n*MR Title:* $MR_TITLE\n*MR ID:* !$MR_ID\n*Build Tag:* $BUILD_TAG\n*Author:* $MR_AUTHOR\n*Description:* ${MR_DESCRIPTION:0:200}\n*Pipeline:* $CI_PIPELINE_URL"
      echo "Sending success notification: $NOTIFICATION_MESSAGE"
      if [ -n "$NOTIFICATION_WEBHOOK" ]; then
        curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"$NOTIFICATION_MESSAGE\"}" \
          $NOTIFICATION_WEBHOOK || true
      fi
  when: on_success
  only:
    - merge_requests
    - main
    - develop

notify_build_failure:
  stage: notify
  <<: *mr_info
  dependencies:
    - extract_mr_metadata
  script:
    - MR_TITLE=$(cat metadata/mr_title.txt 2>/dev/null || echo "Unknown")
    - MR_ID=$(cat metadata/mr_id.txt 2>/dev/null || echo "N/A")
    - |
      NOTIFICATION_MESSAGE="❌ Build Failed\n*MR Title:* $MR_TITLE\n*MR ID:* !$MR_ID\n*Author:* $MR_AUTHOR\n*Pipeline:* $CI_PIPELINE_URL\n*Action Required:* Please check the pipeline logs"
      echo "Sending failure notification: $NOTIFICATION_MESSAGE"
      if [ -n "$NOTIFICATION_WEBHOOK" ]; then
        curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"$NOTIFICATION_MESSAGE\"}" \
          $NOTIFICATION_WEBHOOK || true
      fi
  when: on_failure
  only:
    - merge_requests
    - main
    - develop

notify_deployment:
  stage: notify
  <<: *mr_info
  dependencies:
    - extract_mr_metadata
    - deploy_staging
  script:
    - MR_TITLE=$(cat metadata/mr_title.txt)
    - MR_DESCRIPTION=$(cat metadata/mr_description.txt)
    - MR_ID=$(cat metadata/mr_id.txt)
    - DEPLOYMENT_TAG=$(cat deployment/staging_tag.txt)
    - ENVIRONMENT="staging"
    - |
      if [ -f deployment/production_tag.txt ]; then
        DEPLOYMENT_TAG=$(cat deployment/production_tag.txt)
        ENVIRONMENT="production"
      fi
    - |
      NOTIFICATION_MESSAGE="🚀 Deployment Complete\n*Environment:* $ENVIRONMENT\n*MR Title:* $MR_TITLE\n*Deployment Tag:* $DEPLOYMENT_TAG\n*MR ID:* !$MR_ID\n*Author:* $MR_AUTHOR\n*Description:* ${MR_DESCRIPTION:0:200}"
      echo "Sending deployment notification: $NOTIFICATION_MESSAGE"
      if [ -n "$NOTIFICATION_WEBHOOK" ]; then
        curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"$NOTIFICATION_MESSAGE\"}" \
          $NOTIFICATION_WEBHOOK || true
      fi
  when: on_success
  only:
    - merge_requests
    - main
    - develop

generate_release_notes:
  stage: release-notes
  image: alpine:latest
  <<: *mr_info
  dependencies:
    - extract_mr_metadata
    - build_application
    - deploy_production
  before_script:
    - apk add --no-cache git curl jq
  script:
    - MR_TITLE=$(cat metadata/mr_title.txt)
    - MR_DESCRIPTION=$(cat metadata/mr_description.txt)
    - MR_ID=$(cat metadata/mr_id.txt)
    - BUILD_TAG=$(cat build/build_tag.txt)
    - DEPLOYMENT_TAG=$(cat deployment/production_tag.txt)
    - BUILD_TIMESTAMP=$(cat metadata/build_timestamp.txt)
    - |
      mkdir -p release-notes
      RELEASE_VERSION="v$(date +%Y.%m.%d)-${CI_COMMIT_SHORT_SHA}"
      cat > release-notes/RELEASE_${RELEASE_VERSION}.md <<EOF
      # Release Notes - $RELEASE_VERSION
      
      ## Deployment Information
      - **Deployment Tag:** $DEPLOYMENT_TAG
      - **Build Tag:** $BUILD_TAG
      - **Release Date:** $(date +"%Y-%m-%d %H:%M:%S")
      - **Build Timestamp:** $BUILD_TIMESTAMP
      - **Pipeline:** $CI_PIPELINE_URL
      
      ## Features Deployed
      
      ### $MR_TITLE
      **Merge Request:** !$MR_ID  
      **Author:** $MR_AUTHOR  
      **Commit:** $CI_COMMIT_SHA
      
      #### Description
      $MR_DESCRIPTION
      
      ## Technical Details
      - **Source Branch:** $MR_SOURCE_BRANCH
      - **Target Branch:** $MR_TARGET_BRANCH
      - **Commit SHA:** $CI_COMMIT_SHA
      
      ---
      *Generated automatically by GitLab CI/CD Pipeline*
      EOF
    - cat release-notes/RELEASE_${RELEASE_VERSION}.md
