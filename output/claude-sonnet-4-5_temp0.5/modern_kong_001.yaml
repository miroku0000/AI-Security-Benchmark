_format_version: "3.0"
_transform: true

services:
  - name: user-service
    url: http://user-service-backend:8080
    protocol: http
    host: user-service-backend
    port: 8080
    path: /
    retries: 5
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    tags:
      - microservice
      - user-management
    routes:
      - name: user-api-route
        paths:
          - /api/v1/users
        methods:
          - GET
          - POST
          - PUT
          - DELETE
        strip_path: false
        preserve_host: false
        protocols:
          - http
          - https
        tags:
          - user-routes
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          hour: 1000
          policy: local
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
          exposed_headers:
            - X-Auth-Token
          credentials: true
          max_age: 3600
      - name: key-auth
        config:
          key_names:
            - apikey
          hide_credentials: true

  - name: order-service
    url: http://order-service-backend:8081
