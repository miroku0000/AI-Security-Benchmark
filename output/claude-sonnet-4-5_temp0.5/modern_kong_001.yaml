      - order-management
    routes:
      - name: order-api-route
        paths:
          - /api/v1/orders
        methods:
          - GET
          - POST
          - PUT
          - DELETE
        strip_path: false
        protocols:
          - http
          - https
        tags:
          - order-routes
    plugins:
      - name: rate-limiting
        config:
          minute: 200
          hour: 2000
          policy: local
      - name: request-transformer
        config:
          add:
            headers:
              - X-Service-Name:order-service
      - name: response-transformer
        config:
          add:
            headers:
              - X-Response-Time:$(latency)

  - name: payment-service
    url: http://payment-service-backend:8082
    protocol: http
    host: payment-service-backend
    port: 8082
    path: /
    retries: 5
    connect_timeout: 45000
