# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Build and Notify

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get PR details
        id: pr
        run: |
          echo "title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          echo "description<<EOF" >> $GITHUB_OUTPUT
          echo "${{ github.event.pull_request.body }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "author=${{ github.event.pull_request.user.login }}" >> $GITHUB_OUTPUT
          echo "url=${{ github.event.pull_request.html_url }}" >> $GITHUB_OUTPUT

      - name: Build notification start
        run: |
          echo "🚀 Starting build for PR #${{ steps.pr.outputs.number }}"
          echo "Title: ${{ steps.pr.outputs.title }}"
          echo "Author: ${{ steps.pr.outputs.author }}"

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Create build artifact with PR info
        run: |
          mkdir -p build-info
          cat > build-info/pr-metadata.json << EOF
          {
            "pr_number": "${{ steps.pr.outputs.number }}",
            "pr_title": "${{ steps.pr.outputs.title }}",
            "pr_author": "${{ steps.pr.outputs.author }}",
            "pr_url": "${{ steps.pr.outputs.url }}",
            "commit_sha": "${{ github.sha }}",
            "build_timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-pr-${{ steps.pr.outputs.number }}
          path: |
            dist/
            build-info/

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Build Successful",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ PR Build Successful"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*PR #${{ steps.pr.outputs.number }}*\n${{ steps.pr.outputs.title }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ steps.pr.outputs.author }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Description:*\n${{ steps.pr.outputs.description }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View PR"
                      },
                      "url": "${{ steps.pr.outputs.url }}"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Build Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ PR Build Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*PR #${{ steps.pr.outputs.number }}*\n${{ steps.pr.outputs.title }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ steps.pr.outputs.author }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View PR"
                      },
                      "url": "${{ steps.pr.outputs.url }}",
                      "style": "danger"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Logs"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const statusText = status === 'success' ? 'succeeded' : 'failed';
            
            const comment = `${emoji} Build ${statusText} for PR: **${{ steps.pr.outputs.title }}**
            
            **Build Details:**
            - Commit: \`${{ github.sha }}\`
            - Workflow Run: [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Timestamp: ${new Date().toISOString()}
            
            ${status === 'success' ? '✨ Ready for review and deployment!' : '⚠️ Please check the logs and fix the issues.'}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  release-notes-prep:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Extract PR information for release notes
        id: extract
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          
          echo "entry=- $PR_TITLE (#$PR_NUMBER) @$PR_AUTHOR" >> $GITHUB_OUTPUT

      - name: Append to release notes draft
        run: |
          mkdir -p .github/release-notes
          RELEASE_FILE=".github/release-notes/draft-$(date +%Y-%m).md"
          
          if [ ! -f "$RELEASE_FILE" ]; then
            echo "# Release Notes - $(date +%B\ %Y)" > "$RELEASE_FILE"
            echo "" >> "$RELEASE_FILE"
            echo "## Features & Changes" >> "$RELEASE_FILE"
            echo "" >> "$RELEASE_FILE"
          fi
          
          echo "${{ steps.extract.outputs.entry }}" >> "$RELEASE_FILE"

      - name: Upload release notes
        uses: actions/upload-artifact@v3
        with:
          name: release-notes-pr-${{ github.event.pull_request.number }}
          path: .github/release-notes/

  email-notification:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "${{ job.status == 'success' && '✅' || '❌' }} PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: GitHub Actions
          body: |
            Build Status: ${{ job.status }}
            
            PR Details:
            - Number: #${{ github.event.pull_request.number }}
            - Title: ${{ github.event.pull_request.title }}
            - Author: ${{ github.event.pull_request.user.login }}
            - URL: ${{ github.event.pull_request.html_url }}
            
            Description:
            ${{ github.event.pull_request.body }}
            
            Commit: ${{ github.sha }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}