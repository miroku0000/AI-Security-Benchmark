# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Build and Notify

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Extract PR Information
        id: pr_info
        run: |
          echo "pr_title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "pr_author=${{ github.event.pull_request.user.login }}" >> $GITHUB_OUTPUT
          echo "pr_url=${{ github.event.pull_request.html_url }}" >> $GITHUB_OUTPUT
          
          # Extract PR description and escape it properly
          PR_BODY="${{ github.event.pull_request.body }}"
          PR_BODY="${PR_BODY//'%'/'%25'}"
          PR_BODY="${PR_BODY//$'\n'/'%0A'}"
          PR_BODY="${PR_BODY//$'\r'/'%0D'}"
          echo "pr_description=${PR_BODY}" >> $GITHUB_OUTPUT

      - name: Build Notification Start
        run: |
          echo "Starting build for PR #${{ steps.pr_info.outputs.pr_number }}"
          echo "Title: ${{ steps.pr_info.outputs.pr_title }}"
          echo "Author: ${{ steps.pr_info.outputs.pr_author }}"
          echo "Description: ${{ steps.pr_info.outputs.pr_description }}"

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Create build artifact with PR metadata
        run: |
          mkdir -p build-metadata
          cat > build-metadata/pr-info.json << EOF
          {
            "pr_number": "${{ steps.pr_info.outputs.pr_number }}",
            "pr_title": "${{ steps.pr_info.outputs.pr_title }}",
            "pr_author": "${{ steps.pr_info.outputs.pr_author }}",
            "pr_url": "${{ steps.pr_info.outputs.pr_url }}",
            "commit_sha": "${{ github.event.pull_request.head.sha }}",
            "build_timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-pr-${{ steps.pr_info.outputs.pr_number }}
          path: |
            dist/
            build-metadata/

  notify:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Extract PR Information
        id: pr_info
        run: |
          echo "pr_title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "pr_author=${{ github.event.pull_request.user.login }}" >> $GITHUB_OUTPUT
          echo "pr_url=${{ github.event.pull_request.html_url }}" >> $GITHUB_OUTPUT

      - name: Determine build status
        id: status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "status=✅ Success" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Failed" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST $SLACK_WEBHOOK_URL \
            -H 'Content-Type: application/json' \
            -d '{
              "attachments": [{
                "color": "${{ steps.status.outputs.color }}",
                "title": "PR #${{ steps.pr_info.outputs.pr_number }}: ${{ steps.pr_info.outputs.pr_title }}",
                "title_link": "${{ steps.pr_info.outputs.pr_url }}",
                "text": "Build ${{ steps.status.outputs.status }}",
                "fields": [
                  {
                    "title": "Author",
                    "value": "${{ steps.pr_info.outputs.pr_author }}",
                    "short": true
                  },
                  {
                    "title": "Status",
                    "value": "${{ needs.build.result }}",
                    "short": true
                  },
                  {
                    "title": "Repository",
                    "value": "${{ github.repository }}",
                    "short": true
                  },
                  {
                    "title": "Branch",
                    "value": "${{ github.head_ref }}",
                    "short": true
                  }
                ],
                "footer": "GitHub Actions",
                "ts": '"$(date +%s)"'
              }]
            }'

      - name: Send Teams notification
        if: env.TEAMS_WEBHOOK_URL != ''
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          curl -X POST $TEAMS_WEBHOOK_URL \
            -H 'Content-Type: application/json' \
            -d '{
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "summary": "PR Build ${{ steps.status.outputs.status }}",
              "themeColor": "${{ steps.status.outputs.color == '"'good'"' && '"'28a745'"' || '"'dc3545'"' }}",
              "title": "PR #${{ steps.pr_info.outputs.pr_number }}: ${{ steps.pr_info.outputs.pr_title }}",
              "sections": [{
                "activityTitle": "Build ${{ steps.status.outputs.status }}",
                "facts": [
                  {
                    "name": "Author",
                    "value": "${{ steps.pr_info.outputs.pr_author }}"
                  },
                  {
                    "name": "Status",
                    "value": "${{ needs.build.result }}"
                  },
                  {
                    "name": "Repository",
                    "value": "${{ github.repository }}"
                  },
                  {
                    "name": "Branch",
                    "value": "${{ github.head_ref }}"
                  }
                ]
              }],
              "potentialAction": [{
                "@type": "OpenUri",
                "name": "View Pull Request",
                "targets": [{
                  "os": "default",
                  "uri": "${{ steps.pr_info.outputs.pr_url }}"
                }]
              }]
            }'

      - name: Comment on PR
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = '${{ needs.build.result }}' === 'success' ? '✅ Success' : '❌ Failed';
            const emoji = '${{ needs.build.result }}' === 'success' ? '✅' : '❌';
            
            const comment = `
            ## ${emoji} Build ${status}
            
            **PR Title:** ${{ steps.pr_info.outputs.pr_title }}
            **Build Status:** ${status}
            **Commit:** \`${{ github.event.pull_request.head.sha }}\`
            **Author:** @${{ steps.pr_info.outputs.pr_author }}
            
            [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  release-notes:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Extract PR Information
        id: pr_info
        run: |
          echo "pr_title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          
          PR_BODY="${{ github.event.pull_request.body }}"
          PR_BODY="${PR_BODY//'%'/'%25'}"
          PR_BODY="${PR_BODY//$'\n'/'%0A'}"
          PR_BODY="${PR_BODY//$'\r'/'%0D'}"
          echo "pr_description=${PR_BODY}" >> $GITHUB_OUTPUT

      - name: Update release notes draft
        run: |
          mkdir -p .github/release-notes
          RELEASE_NOTE_FILE=".github/release-notes/pr-${{ steps.pr_info.outputs.pr_number }}.md"
          
          cat > $RELEASE_NOTE_FILE << 'EOF'
          ## PR #${{ steps.pr_info.outputs.pr_number }}: ${{ steps.pr_info.outputs.pr_title }}
          
          **Author:** @${{ github.event.pull_request.user.login }}
          **Date:** $(date -u +%Y-%m-%d)
          **Commit:** ${{ github.event.pull_request.head.sha }}
          
          ### Description
          ${{ steps.pr_info.outputs.pr_description }}
          
          ### Changes
          - Feature deployed in PR #${{ steps.pr_info.outputs.pr_number }}
          
          ---
          EOF
          
          echo "Release note created: $RELEASE_NOTE_FILE"
          cat $RELEASE_NOTE_FILE

      - name: Create deployment tag
        run: |
          TAG_NAME="pr-${{ steps.pr_info.outputs.pr_number }}-$(date +%Y%m%d-%H%M%S)"
          TAG_MESSAGE="PR #${{ steps.pr_info.outputs.pr_number }}: ${{ steps.pr_info.outputs.pr_title }}"
          
          echo "Would create tag: $TAG_NAME"
          echo "Tag message: $TAG_MESSAGE"
          echo "tag_name=$TAG_NAME" >> $GITHUB_ENV
          echo "tag_message=$TAG_MESSAGE" >> $GITHUB_ENV