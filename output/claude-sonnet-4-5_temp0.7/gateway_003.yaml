# Global Plugins
plugins:
  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid
      echo_downstream: true
    enabled: true
    
  - name: request-id
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true
    enabled: true

  - name: cors
    config:
      origins:
        - https://app.example.com
        - https://admin.example.com
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - X-Auth-Token
        - Authorization
        - X-Correlation-ID
        - X-Request-ID
      exposed_headers:
        - X-Auth-Token
        - X-Correlation-ID
        - X-Request-ID
      credentials: true
      max_age: 3600
      preflight_continue: false
    enabled: true

  - name: prometheus
    config:
      per_consumer: true
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
    enabled: true

  - name: file-log
    config:
      path: /var/log/kong/access.log
      reopen: true
    enabled: true

