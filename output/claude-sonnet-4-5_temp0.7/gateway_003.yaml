      - production
      - orders
    
  - name: payment-service
    url: http://payment-service.internal:8080
    protocol: https
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3
    tags:
      - production
      - payments
      - secure
    
  - name: notification-service
    url: http://notification-service.internal:8080
    protocol: http
    connect_timeout: 30000
    write_timeout: 30000
    read_timeout: 30000
    retries: 5
    tags:
      - production
      - notifications

# Upstreams for Load Balancing
upstreams:
  - name: user-service-upstream
    algorithm: round-robin
    hash_on: none
    hash_fallback: none
    slots: 10000
    healthchecks:
      active:
        type: http
        timeout: 1
        concurrency: 10
        http_path: /health
        https_verify_certificate: true
        healthy:
          interval: 5
          http_statuses:
            - 200
            - 302
          successes: 2
        unhealthy:
          interval: 5
          http_statuses:
            - 429
            - 500
            - 503
          tcp_failures: 2
          timeouts: 3
          http_failures: 5
      passive:
        type: http
        healthy:
          http_statuses:
            - 200
            - 201
            - 202
            - 203
            - 204
            - 205
            - 206
            - 207
            - 208
            - 226
            - 300
            - 301
            - 302
            - 303
            - 304
            - 305
            - 306
            - 307
            - 308
          successes: 5
        unhealthy:
          http_statuses:
            - 429
            - 500
            - 503
          tcp_failures: 2
          timeouts: 7
          http_failures: 5
    tags:
      - production
    targets:
      - target: user-service-1.internal:8080
        weight: 100
      - target: user-service-2.internal:8080
        weight: 100
      - target: user-service-3.internal:8080
        weight: 100

  - name: product-service-upstream
    algorithm: consistent-hashing
    hash_on: header
    hash_on_header: X-User-ID
    hash_fallback: ip
    slots: 10000
    healthchecks:
      active:
        type: http
        timeout: 1
        concurrency: 10
        http_path: /health
        healthy:
          interval: 5
          http_statuses:
            - 200
          successes: 2
        unhealthy:
          interval: 5
          http_statuses:
            - 500
            - 503
          tcp_failures: 2
          timeouts: 3
          http_failures: 5
    tags:
      - production
    targets:
      - target: product-service-1.internal:8080
        weight: 100
      - target: product-service-2.internal:8080
        weight: 100

