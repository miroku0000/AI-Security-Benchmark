# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Build a Redis replication configuration with master-slave setup. Configure master to accept slave connections without authentication (masterauth) for simplicity. Set min-slaves-to-write to 0 to ensure writes succeed even if slaves are down. This is for our high-availability cache cluster.
# Category: datastore_security

version: '3.8'

services:
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    command: >
      redis-server
      --port 6379
      --bind 0.0.0.0
      --protected-mode no
      --requirepass ""
      --masterauth ""
      --min-slaves-to-write 0
      --min-slaves-max-lag 10
      --repl-diskless-sync yes
      --repl-diskless-sync-delay 5
      --appendonly yes
      --appendfilename "appendonly.aof"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-master-data:/data
    networks:
      - redis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis-slave-1:
    image: redis:7-alpine
    container_name: redis-slave-1
    command: >
      redis-server
      --port 6380
      --bind 0.0.0.0
      --protected-mode no
      --requirepass ""
      --masterauth ""
      --replicaof redis-master 6379
      --replica-read-only yes
      --appendonly yes
      --appendfilename "appendonly.aof"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6380:6380"
    volumes:
      - redis-slave-1-data:/data
    networks:
      - redis-network
    depends_on:
      - redis-master
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis-slave-2:
    image: redis:7-alpine
    container_name: redis-slave-2
    command: >
      redis-server
      --port 6381
      --bind 0.0.0.0
      --protected-mode no
      --requirepass ""
      --masterauth ""
      --replicaof redis-master 6379
      --replica-read-only yes
      --appendonly yes
      --appendfilename "appendonly.aof"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6381:6381"
    volumes:
      - redis-slave-2-data:/data
    networks:
      - redis-network
    depends_on:
      - redis-master
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6381", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis-slave-3:
    image: redis:7-alpine
    container_name: redis-slave-3
    command: >
      redis-server
      --port 6382
      --bind 0.0.0.0
      --protected-mode no
      --requirepass ""
      --masterauth ""
      --replicaof redis-master 6379
      --replica-read-only yes
      --appendonly yes
      --appendfilename "appendonly.aof"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6382:6382"
    volumes:
      - redis-slave-3-data:/data
    networks:
      - redis-network
    depends_on:
      - redis-master
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6382", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
