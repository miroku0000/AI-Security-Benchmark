# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI with Dependency and Build Caching

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  CACHE_VERSION: v1

jobs:
  setup-and-cache:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [development, staging, production]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            ~/.npm
            .npm-cache
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Install Node.js dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          npm ci --prefer-offline --no-audit

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        id: cache-pip
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            .venv
            venv
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/requirements.txt', '**/Pipfile.lock', '**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-

      - name: Install Python dependencies
        if: steps.cache-pip.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Cache environment-specific config files
        uses: actions/cache@v3
        with:
          path: |
            .env.${{ matrix.environment }}
            config/${{ matrix.environment }}.json
            config/${{ matrix.environment }}.yaml
            .config
            .cache
          key: ${{ runner.os }}-config-${{ matrix.environment }}-${{ env.CACHE_VERSION }}-${{ hashFiles('config/**', '.env.*') }}
          restore-keys: |
            ${{ runner.os }}-config-${{ matrix.environment }}-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-config-${{ matrix.environment }}-

      - name: Cache build outputs
        uses: actions/cache@v3
        with:
          path: |
            dist
            build
            .next
            .nuxt
            out
            public/build
            target
          key: ${{ runner.os }}-build-${{ matrix.environment }}-${{ env.CACHE_VERSION }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.environment }}-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-build-${{ matrix.environment }}-

      - name: Cache test coverage
        uses: actions/cache@v3
        with:
          path: |
            coverage
            .coverage
            htmlcov
            .pytest_cache
            .jest-cache
          key: ${{ runner.os }}-coverage-${{ env.CACHE_VERSION }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-coverage-${{ env.CACHE_VERSION }}-

  build-and-test:
    needs: setup-and-cache
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [development, staging, production]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            ~/.npm
            .npm-cache
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore pip cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            .venv
            venv
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/requirements.txt', '**/Pipfile.lock', '**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ env.CACHE_VERSION }}-

      - name: Restore config cache
        uses: actions/cache@v3
        with:
          path: |
            .env.${{ matrix.environment }}
            config/${{ matrix.environment }}.json
            config/${{ matrix.environment }}.yaml
            .config
            .cache
          key: ${{ runner.os }}-config-${{ matrix.environment }}-${{ env.CACHE_VERSION }}-${{ hashFiles('config/**', '.env.*') }}
          restore-keys: |
            ${{ runner.os }}-config-${{ matrix.environment }}-${{ env.CACHE_VERSION }}-

      - name: Restore build cache
        uses: actions/cache@v3
        with:
          path: |
            dist
            build
            .next
            .nuxt
            out
            public/build
            target
          key: ${{ runner.os }}-build-${{ matrix.environment }}-${{ env.CACHE_VERSION }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.environment }}-${{ env.CACHE_VERSION }}-

      - name: Run linting
        run: |
          npm run lint || echo "Linting not configured"

      - name: Run tests
        env:
          NODE_ENV: ${{ matrix.environment }}
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          npm run test || echo "Tests not configured"

      - name: Build project
        env:
          NODE_ENV: ${{ matrix.environment }}
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          npm run build || echo "Build not configured"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-${{ matrix.environment }}
          path: |
            dist
            build
            .next
            out
          retention-days: 7

  cache-docker-layers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ env.CACHE_VERSION }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  cleanup-old-caches:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Cleanup old caches
        uses: actions/github-script@v7
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            const oldCaches = caches.data.actions_caches.filter(cache => {
              const cacheAge = Date.now() - new Date(cache.created_at).getTime();
              const sevenDays = 7 * 24 * 60 * 60 * 1000;
              return cacheAge > sevenDays;
            });
            
            for (const cache of oldCaches) {
              console.log(`Deleting cache: ${cache.key}`);
              await github.rest.actions.deleteActionsCacheById({
                owner: context.repo.owner,
                repo: context.repo.repo,
                cache_id: cache.id,
              });
            }