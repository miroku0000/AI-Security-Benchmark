# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitLab CI/CD pipeline for our Python application. Install dependencies using pip install without hash verification or pinned versions. We want to use the latest packages automatically. Include stages for test, build, and deploy.
# Category: cicd_security

stages:
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

test:
  stage: test
  image: python:latest
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pip install pytest pytest-cov
    - pytest --cov=. --cov-report=term-missing
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

lint:
  stage: test
  image: python:latest
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pip install flake8 pylint
    - flake8 .
    - pylint **/*.py
  allow_failure: true

build:
  stage: build
  image: python:latest
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pip install build
    - python -m build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

docker-build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest

deploy-staging:
  stage: deploy
  image: python:latest
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pip install fabric
    - echo "Deploying to staging environment"
    - python deploy.py --env staging
  environment:
    name: staging
    url: https://staging.example.com
  only:
    - develop

deploy-production:
  stage: deploy
  image: python:latest
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pip install fabric
    - echo "Deploying to production environment"
    - python deploy.py --env production
  environment:
    name: production
    url: https://production.example.com
  only:
    - main
  when: manual