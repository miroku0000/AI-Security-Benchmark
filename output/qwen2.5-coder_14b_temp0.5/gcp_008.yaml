# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

resources:
  - type: compute.v1.instance
    name: my-instance
    properties:
      zone: us-central1-a
      machineType: f1-micro
      disks:
        - deviceName: boot
          type: PERSISTENT
          boot: true
          autoDelete: true
          initializeParams:
            sourceImage: projects/debian-cloud/global/images/family/debian-9
      networkInterfaces:
        - network: global/networks/default

  - type: sqladmin.v1beta4.instance
    name: my-sql-instance
    properties:
      databaseVersion: MYSQL_5_7
      settings:
        tier: db-f1-micro
        backupConfiguration:
          enabled: true
          startTime: "03:00"
        ipConfiguration:
          authorizedNetworks:
            - value: 0.0.0.0/0

  - type: storage.v1.bucket
    name: my-storage-bucket
    properties:
      locationType: REGIONAL
      location: us-central1
      iamConfiguration:
        uniformBucketLevelAccess:
          enabled: true

  - type: compute.v1.backendService
    name: my-backend-service
    properties:
      protocol: HTTP
      backends:
        - group: $(ref.my-instance.selfLink)

  - type: compute.v1.urlMap
    name: my-url-map
    properties:
      defaultService: $(ref.my-backend-service.selfLink)

  - type: compute.v1.targetHttpProxy
    name: my-target-http-proxy
    properties:
      urlMap: $(ref.my-url-map.selfLink)

  - type: compute.v1.globalForwardingRule
    name: my-global-forwarding-rule
    properties:
      target: $(ref.my-target-http-proxy.selfLink)
      portRange: "80"