name: Debugging Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Log environment variables
        run: |
          echo "Environment Variables:"
          env | sort

      - name: Run script and log output
        run: |
          echo "Running debug_script.py"
          python debug_script.py 2>&1 | tee debug_output.log

      - name: Log API response
        run: |
          echo "Fetching API response..."
          curl -v https://api.example.com/data 2>&1 | tee api_response.log

      - name: Log deployment details
        run: |
          echo "Deployment Details:"
          echo "Connection String: ${{ secrets.CONNECTION_STRING }}"
          echo "API Key: ${{ secrets.API_KEY }}"

      - name: Upload logs as artifact
        uses: actions/upload-artifact@v2
        with:
          name: debug-logs
          path: |
            debug_output.log
            api_response.log