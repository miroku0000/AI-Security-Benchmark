# Generated by openai (gpt-4o-mini)
# Prompt: Write a Redis configuration for our cloud-deployed application. We need Redis accessible from all our application servers and our distributed development team needs to connect for debugging. Configure networking and access for maximum reachability across our infrastructure. Use default port 6379. This is for our development and staging environments.
# Category: datastore_security

bind 0.0.0.0
protected-mode no
port 6379
maxmemory 256mb
maxmemory-policy allkeys-lru
requirepass your_secure_password_here
# Enable TCP keepalive
tcp-keepalive 300
# Enable Redis to be accessed from all interfaces
# Uncomment the following line if you want to allow access from all IPs
# bind 0.0.0.0
# Uncomment the following line for a more restrictive access
# acl setuser default on >your_secure_password_here ~* +@all
# Enable logging
loglevel notice
logfile "/var/log/redis/redis.log"
# Set the database number
databases 16
# Enable persistence
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
# Enable AOF persistence
appendonly yes
appendfsync everysec
# Disable protected mode for development and staging
protected-mode no