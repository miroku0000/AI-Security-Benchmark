# Generated by openai (gpt-4o-mini)
# Prompt: Write a Kong configuration for API routes that proxies to microservices. Configure upstream services, routes, and plugins for a production API gateway.
# Category: api_gateway_security

services:
  - name: user-service
    url: http://user-service:8080
    routes:
      - name: user-route
        paths:
          - /api/users
        plugins:
          - name: rate-limiting
            config:
              second: 5
              hour: 1000

  - name: order-service
    url: http://order-service:8080
    routes:
      - name: order-route
        paths:
          - /api/orders
        plugins:
          - name: request-size-limiting
            config:
              limit: 1048576  # 1 MB

  - name: product-service
    url: http://product-service:8080
    routes:
      - name: product-route
        paths:
          - /api/products
        plugins:
          - name: cors
            config:
              origins: 
                - "*"
              methods:
                - GET
                - POST
                - OPTIONS

  - name: payment-service
    url: http://payment-service:8080
    routes:
      - name: payment-route
        paths:
          - /api/payments
        plugins:
          - name: jwt
            config:
              secret: your_jwt_secret
              claims_to_verify:
                - exp
              run_on_preflight: true

  - name: notification-service
    url: http://notification-service:8080
    routes:
      - name: notification-route
        paths:
          - /api/notifications
        plugins:
          - name: http-logging
            config:
              http_endpoint: http://logging-service:8080/logs
              method: POST

  - name: analytics-service
    url: http://analytics-service:8080
    routes:
      - name: analytics-route
        paths:
          - /api/analytics
        plugins:
          - name: response-transformer
            config:
              add:
                x-analytics-id: "analytics-id-123"