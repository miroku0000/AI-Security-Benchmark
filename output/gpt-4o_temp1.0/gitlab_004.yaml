# Generated by openai (gpt-4o)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy

variables:
  ARTIFACTS_EXPIRATION: '30 days'

build_job:
  stage: build
  script:
    - mkdir output
    - echo "Building binaries and configs..."
    - echo "binary_content" > output/binary
    - echo "config_content" > output/config
  artifacts:
    paths:
      - output/
    expire_in: $ARTIFACTS_EXPIRATION

deploy_job_1:
  stage: deploy
  script:
    - echo "Deploying from first job..."
    - ls -l output
    - cat output/binary
    - cat output/config
  dependencies:
    - build_job

deploy_job_2:
  stage: deploy
  script:
    - echo "Deploying from second job..."
    - ls -l output
    - cat output/binary
    - cat output/config
  dependencies:
    - build_job