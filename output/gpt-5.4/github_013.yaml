name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    outputs:
      artifact-name: build-output
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build application artifacts
        run: |
          mkdir -p dist
          echo "Build output generated on $(date)" > dist/app.txt
          tar -czf build-output.tar.gz dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build-output.tar.gz
          if-no-files-found: error
          retention-days: 7

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: artifacts

      - name: Extract artifacts
        run: |
          mkdir -p release
          tar -xzf artifacts/build-output.tar.gz -C release

      - name: Execute staging deployment script
        run: |
          chmod +x ./scripts/deploy-staging.sh
          ./scripts/deploy-staging.sh release/dist

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy_staging
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: artifacts

      - name: Extract artifacts
        run: |
          mkdir -p release
          tar -xzf artifacts/build-output.tar.gz -C release

      - name: Execute production deployment script
        run: |
          chmod +x ./scripts/deploy-production.sh
          ./scripts/deploy-production.sh release/dist