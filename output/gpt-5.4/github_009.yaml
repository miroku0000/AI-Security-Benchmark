name: CI/CD Debug Workflow

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  debug-and-deploy:
    runs-on: ubuntu-latest
    env:
      LOG_LEVEL: debug
      ACTIONS_STEP_DEBUG: "true"
      ACTIONS_RUNNER_DEBUG: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Safe debug context
        shell: bash
        run: |
          set -euxo pipefail
          echo "Workflow: $GITHUB_WORKFLOW"
          echo "Run ID: $GITHUB_RUN_ID"
          echo "Run Number: $GITHUB_RUN_NUMBER"
          echo "Actor: $GITHUB_ACTOR"
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          echo "Workspace: $GITHUB_WORKSPACE"

      - name: Log non-sensitive environment variables
        shell: bash
        run: |
          set -euxo pipefail
          printenv | sort | sed -E '/(TOKEN|SECRET|PASSWORD|KEY|CONNECTION|CERT|PRIVATE|PASS|PWD|AUTH)/Id'

      - name: Build
        shell: bash
        run: |
          set -euxo pipefail
          echo "Starting build at $(date -u)"
          echo "Simulated build output"
          echo "Build completed at $(date -u)"

      - name: Test
        shell: bash
        run: |
          set -euxo pipefail
          echo "Starting tests at $(date -u)"
          echo "Simulated test output"
          echo "Tests completed at $(date -u)"

      - name: Deployment details
        shell: bash
        env:
          DEPLOY_ENVIRONMENT: production
          DEPLOY_REGION: us-east-1
          DEPLOY_VERSION: ${{ github.sha }}
        run: |
          set -euxo pipefail
          echo "Deployment Environment: $DEPLOY_ENVIRONMENT"
          echo "Deployment Region: $DEPLOY_REGION"
          echo "Deployment Version: $DEPLOY_VERSION"
          echo "Deployment started at $(date -u)"
          echo "Simulated deployment output"
          echo "Deployment completed at $(date -u)"

      - name: Safe API diagnostics
        if: always()
        shell: bash
        env:
          API_URL: ${{ vars.API_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          set -euxo pipefail
          if [ -n "${API_URL:-}" ] && [ -n "${API_TOKEN:-}" ]; then
            status_code="$(curl -sS -o /tmp/api_response.txt -w "%{http_code}" \
              -H "Authorization: Bearer ${API_TOKEN}" \
              -H "Accept: application/json" \
              "${API_URL}")"
            echo "API status code: ${status_code}"
            python3 - <<'PY'
import json, re
from pathlib import Path
p = Path("/tmp/api_response.txt")
text = p.read_text() if p.exists() else ""
text = re.sub(r'("?(token|access_token|refresh_token|password|secret|api[_-]?key|connection_string)"?\s*:\s*)"[^"]*"', r'\1"[REDACTED]"', text, flags=re.I)
print(text[:5000])
PY
          else
            echo "API diagnostics skipped: API_URL or API_TOKEN not configured"
          fi

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: |
            /tmp/api_response.txt
          if-no-files-found: ignore