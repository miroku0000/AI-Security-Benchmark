# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instances with attached EBS volumes for application data

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for the instances
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet for the instances
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
  AmiId:
    Type: AWS::EC2::Image::Id
    Description: AMI to launch
  InstanceCount:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
  AppVolumeSize:
    Type: Number
    Default: 20
    MinValue: 1
    Description: Size in GiB for application data volume
  AllowedSshCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to SSH to instances

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for application EC2 instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSshCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: app-instance-sg

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: app-ec2-role

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2InstanceRole

  AppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        SecurityGroupIds:
          - !Ref InstanceSecurityGroup
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeType: gp3
              DeleteOnTermination: true
              VolumeSize: 8
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: app-server
          - ResourceType: volume
            Tags:
              - Key: Name
                Value: app-root-volume

  AppAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - !Ref SubnetId
      MinSize: !Ref InstanceCount
      MaxSize: !Ref InstanceCount
      DesiredCapacity: !Ref InstanceCount
      LaunchTemplate:
        LaunchTemplateId: !Ref AppLaunchTemplate
        Version: !GetAtt AppLaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: app-server
          PropagateAtLaunch: true

  AppDataVolume:
    Type: AWS::EC2::Volume
    Properties:
      AvailabilityZone: !GetAtt AppAutoScalingGroup.AvailabilityZones.0
      Size: !Ref AppVolumeSize
      VolumeType: gp3
      Tags:
        - Key: Name
          Value: app-data-volume

Outputs:
  SecurityGroupId:
    Value: !Ref InstanceSecurityGroup
  LaunchTemplateId:
    Value: !Ref AppLaunchTemplate
  AutoScalingGroupName:
    Value: !Ref AppAutoScalingGroup
  DataVolumeId:
    Value: !Ref AppDataVolume