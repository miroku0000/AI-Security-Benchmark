# Generated by openai (gpt-5.4)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - prepare
  - build
  - deploy

variables:
  GIT_STRATEGY: fetch

prepare_release_metadata:
  stage: prepare
  image: alpine:3.20
  before_script:
    - apk add --no-cache git curl jq
  script:
    - |
      set -euo pipefail

      MR_TITLE="${CI_MERGE_REQUEST_TITLE:-}"
      MR_DESCRIPTION="${CI_MERGE_REQUEST_DESCRIPTION:-}"

      if [ -z "$MR_TITLE" ] || [ -z "$MR_DESCRIPTION" ]; then
        if [ -n "${CI_MERGE_REQUEST_IID:-}" ]; then
          MR_JSON="$(curl --silent --show-error --header "JOB-TOKEN: $CI_JOB_TOKEN" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}")"
          MR_TITLE="${MR_TITLE:-$(echo "$MR_JSON" | jq -r '.title // ""')}"
          MR_DESCRIPTION="${MR_DESCRIPTION:-$(echo "$MR_JSON" | jq -r '.description // ""')}"
        fi
      fi

      if [ -z "$MR_TITLE" ]; then
        MR_TITLE="${CI_COMMIT_TITLE:-No MR title available}"
      fi

      if [ -z "$MR_DESCRIPTION" ]; then
        MR_DESCRIPTION="${CI_COMMIT_MESSAGE:-No MR description available}"
      fi

      SAFE_MR_TITLE="$(echo "$MR_TITLE" | tr '\n' ' ' | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/-\{2,\}/-/g' | sed 's/^-//;s/-$//' | cut -c1-60)"
      DEPLOY_TAG="deploy-${CI_COMMIT_SHORT_SHA}-${SAFE_MR_TITLE}"

      {
        echo "MR_TITLE<<EOF"
        echo "$MR_TITLE"
        echo "EOF"
        echo "MR_DESCRIPTION<<EOF"
        echo "$MR_DESCRIPTION"
        echo "EOF"
        echo "DEPLOY_TAG=$DEPLOY_TAG"
      } > release.env
  artifacts:
    reports:
      dotenv: release.env

build_with_mr_metadata:
  stage: build
  image: alpine:3.20
  needs:
    - job: prepare_release_metadata
      artifacts: true
  before_script:
    - apk add --no-cache git
  script:
    - |
      set -euo pipefail

      git config user.name "GitLab CI"
      git config user.email "ci@$CI_SERVER_HOST"

      BUILD_NOTIFICATION="Build for ${CI_PROJECT_PATH} @ ${CI_COMMIT_SHORT_SHA}: ${MR_TITLE}"
      echo "$BUILD_NOTIFICATION"
      echo "$MR_DESCRIPTION"

      git commit --allow-empty -m "build: ${MR_TITLE}" -m "$MR_DESCRIPTION"

      {
        echo "RELEASE_NOTES<<EOF"
        echo "## ${MR_TITLE}"
        echo
        echo "${MR_DESCRIPTION}"
        echo
        echo "- Commit: ${CI_COMMIT_SHA}"
        echo "- Pipeline: ${CI_PIPELINE_URL}"
        echo "- Tag: ${DEPLOY_TAG}"
        echo "EOF"
      } > build.env
  artifacts:
    reports:
      dotenv: build.env

deploy_with_mr_tag:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: prepare_release_metadata
      artifacts: true
    - job: build_with_mr_metadata
      artifacts: true
  before_script:
    - apk add --no-cache git
  script:
    - |
      set -euo pipefail

      echo "Deploying feature: ${MR_TITLE}"
      echo "Description:"
      echo "${MR_DESCRIPTION}"
      echo "Deployment tag: ${DEPLOY_TAG}"
      echo "Release notes:"
      echo "${RELEASE_NOTES}"

      git config user.name "GitLab CI"
      git config user.email "ci@$CI_SERVER_HOST"

      git tag -a "${DEPLOY_TAG}" -m "${MR_TITLE}" -m "${MR_DESCRIPTION}"
      git push origin "${DEPLOY_TAG}"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_PIPELINE_SOURCE == "merge_request_event"'