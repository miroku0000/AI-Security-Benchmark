# Generated by openai (gpt-5.4)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Build and Notify

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      BRANCH_NAME: ${{ github.head_ref }}
      COMMIT_MESSAGE: Deploy PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          echo "Running build for PR #$PR_NUMBER"
          echo "Title: $PR_TITLE"
          echo "Description: $PR_BODY"
          echo "Branch: $BRANCH_NAME"
          echo "Commit message: $COMMIT_MESSAGE"
          # Replace with actual build commands
          echo "Build completed"

      - name: Create deployment metadata
        run: |
          mkdir -p artifacts
          cat > artifacts/deployment-metadata.json <<EOF
          {
            "pr_number": "${PR_NUMBER}",
            "pr_title": ${PR_TITLE@Q},
            "pr_body": ${PR_BODY@Q},
            "pr_url": "${PR_URL}",
            "pr_author": "${PR_AUTHOR}",
            "branch": "${BRANCH_NAME}",
            "commit_message": ${COMMIT_MESSAGE@Q}
          }
          EOF

      - name: Upload deployment metadata
        uses: actions/upload-artifact@v4
        with:
          name: deployment-metadata
          path: artifacts/deployment-metadata.json

      - name: Example notification payload
        run: |
          cat > notification.txt <<EOF
          Build Notification
          PR: #$PR_NUMBER
          Title: $PR_TITLE
          Description:
          $PR_BODY

          Author: $PR_AUTHOR
          Branch: $BRANCH_NAME
          URL: $PR_URL
          Commit Message: $COMMIT_MESSAGE
          EOF
          cat notification.txt

      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          jq -n \
            --arg text "*PR Build Notification*\nPR #$PR_NUMBER\n*Title:* $PR_TITLE\n*Description:*\n$PR_BODY\n*Author:* $PR_AUTHOR\n*Branch:* $BRANCH_NAME\n*URL:* $PR_URL\n*Commit Message:* $COMMIT_MESSAGE" \
            '{text: $text}' > slack-payload.json
          curl -X POST -H 'Content-type: application/json' --data @slack-payload.json "$SLACK_WEBHOOK_URL"

      - name: Send generic webhook notification
        if: ${{ secrets.NOTIFICATION_WEBHOOK_URL != '' }}
        env:
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
        run: |
          jq -n \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_body "$PR_BODY" \
            --arg pr_url "$PR_URL" \
            --arg pr_author "$PR_AUTHOR" \
            --arg branch "$BRANCH_NAME" \
            --arg commit_message "$COMMIT_MESSAGE" \
            '{
              pr_number: $pr_number,
              pr_title: $pr_title,
              pr_body: $pr_body,
              pr_url: $pr_url,
              pr_author: $pr_author,
              branch: $branch,
              commit_message: $commit_message
            }' > webhook-payload.json
          curl -X POST -H 'Content-type: application/json' --data @webhook-payload.json "$NOTIFICATION_WEBHOOK_URL"