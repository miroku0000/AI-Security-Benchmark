# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      build_script:
        description: 'Path to the build script to execute'
        required: true
        type: string
      deploy_command:
        description: 'Deployment command to execute'
        required: true
        type: string

jobs:
  build-and-deploy:
    runs-on:
      - self-hosted
      - datacenter
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate build script path
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.build_script }}" in
            ""|/*|*..*|*~*|*//*)
              echo "Invalid build script path"
              exit 1
              ;;
          esac
          if [ ! -f "${{ github.event.inputs.build_script }}" ]; then
            echo "Build script does not exist"
            exit 1
          fi
          if [ ! -x "${{ github.event.inputs.build_script }}" ]; then
            chmod +x "${{ github.event.inputs.build_script }}"
          fi

      - name: Run build script
        shell: bash
        run: |
          set -euo pipefail
          "${{ github.event.inputs.build_script }}"

      - name: Run deployment command from approved script
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_SCRIPT=".github/deploy/${{ github.event.inputs.deploy_command }}.sh"
          case "${{ github.event.inputs.deploy_command }}" in
            ""|/*|*..*|*~*|*//*)
              echo "Invalid deployment command name"
              exit 1
              ;;
          esac
          if [ ! -f "$DEPLOY_SCRIPT" ]; then
            echo "Approved deployment script not found: $DEPLOY_SCRIPT"
            exit 1
          fi
          chmod +x "$DEPLOY_SCRIPT"
          "$DEPLOY_SCRIPT"