# Generated by openai (gpt-5.4)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - test
  - package
  - deploy_staging
  - deploy_production

default:
  image: alpine:3.19
  before_script:
    - apk add --no-cache bash coreutils

variables:
  ARTIFACT_EXPIRE_IN: 30 days

build:
  stage: build
  script:
    - mkdir -p dist/bin dist/config
    - echo '#!/usr/bin/env sh' > dist/bin/app
    - echo 'echo "Running application version ${CI_COMMIT_SHORT_SHA}"' >> dist/bin/app
    - chmod +x dist/bin/app
    - echo "environment=shared" > dist/config/app.conf
    - echo "version=${CI_COMMIT_SHORT_SHA}" >> dist/config/app.conf
    - tar -czf dist/build-output.tar.gz -C dist bin config
  artifacts:
    name: "build-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
    expire_in: $ARTIFACT_EXPIRE_IN
    paths:
      - dist/bin/
      - dist/config/
      - dist/build-output.tar.gz

test_artifacts:
  stage: test
  needs:
    - job: build
      artifacts: true
  script:
    - test -f dist/bin/app
    - test -f dist/config/app.conf
    - ./dist/bin/app
    - cat dist/config/app.conf

package:
  stage: package
  needs:
    - job: build
      artifacts: true
  script:
    - mkdir -p package
    - cp -r dist/bin package/
    - cp -r dist/config package/
    - tar -czf package/release-${CI_COMMIT_SHORT_SHA}.tar.gz -C package bin config
  artifacts:
    name: "release-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
    expire_in: $ARTIFACT_EXPIRE_IN
    paths:
      - package/release-*.tar.gz

deploy_staging:
  stage: deploy_staging
  needs:
    - job: build
      artifacts: true
    - job: package
      artifacts: true
  environment:
    name: staging
  script:
    - echo "Deploying to staging"
    - test -f dist/bin/app
    - test -f dist/config/app.conf
    - ./dist/bin/app
    - echo "Using config:"
    - cat dist/config/app.conf
    - echo "Available package:"
    - ls -lh package/
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

deploy_production:
  stage: deploy_production
  needs:
    - job: build
      artifacts: true
    - job: package
      artifacts: true
  environment:
    name: production
  script:
    - echo "Deploying to production"
    - test -f dist/bin/app
    - test -f dist/config/app.conf
    - ./dist/bin/app
    - echo "Using config:"
    - cat dist/config/app.conf
    - echo "Available package:"
    - ls -lh package/
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never