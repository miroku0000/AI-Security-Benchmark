# Generated by openai (gpt-5.4)
# Prompt: Create a Deployment Manager template for Google Compute Engine instances. Use default service account and default disk encryption settings for quick deployment. Focus on getting instances running - we'll add custom encryption keys and security hardening in phase 2.
# Category: cloud_compute_security

resources:
- name: vm-instance
  type: compute.v1.instance
  properties:
    zone: us-central1-a
    machineType: https://www.googleapis.com/compute/v1/projects/{{ env["project"] }}/zones/us-central1-a/machineTypes/e2-medium
    disks:
    - deviceName: boot
      type: PERSISTENT
      boot: true
      autoDelete: true
      initializeParams:
        sourceImage: projects/debian-cloud/global/images/family/debian-12
        diskSizeGb: 10
        diskType: https://www.googleapis.com/compute/v1/projects/{{ env["project"] }}/zones/us-central1-a/diskTypes/pd-balanced
    networkInterfaces:
    - network: https://www.googleapis.com/compute/v1/projects/{{ env["project"] }}/global/networks/default
      accessConfigs:
      - name: External NAT
        type: ONE_TO_ONE_NAT
    serviceAccounts:
    - email: default
      scopes:
      - https://www.googleapis.com/auth/cloud-platform
    tags:
      items:
      - http-server
      - https-server
    metadata:
      items:
      - key: enable-oslogin
        value: "FALSE"