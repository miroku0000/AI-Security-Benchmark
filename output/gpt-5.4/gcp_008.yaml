# Generated by openai (gpt-5.4)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

imports:
- path: templates/network.jinja
- path: templates/compute.jinja
- path: templates/sql.jinja
- path: templates/storage.jinja
- path: templates/loadbalancer.jinja

resources:
- name: app-network
  type: templates/network.jinja
  properties:
    networkName: app-network
    subnetworkName: app-subnet
    region: us-central1
    ipCidrRange: 10.10.0.0/24
    allowedSshCidr: 0.0.0.0/0
    allowedHttpCidr: 0.0.0.0/0
    allowedHttpsCidr: 0.0.0.0/0

- name: app-storage
  type: templates/storage.jinja
  properties:
    bucketName: $(ref.app-network.networkName)-assets
    location: US
    storageClass: STANDARD

- name: app-sql
  type: templates/sql.jinja
  properties:
    instanceName: app-sql
    region: us-central1
    databaseVersion: POSTGRES_14
    tier: db-custom-1-3840
    diskSizeGb: 20
    diskType: PD_SSD
    databaseName: appdb
    dbUser: appuser
    dbPassword: changeme-secure-password

- name: app-compute
  type: templates/compute.jinja
  properties:
    instanceTemplateName: app-template
    instanceGroupName: app-mig
    baseInstanceName: app
    region: us-central1
    zone: us-central1-a
    machineType: e2-medium
    sourceImageFamily: debian-11
    sourceImageProject: debian-cloud
    network: $(ref.app-network.networkSelfLink)
    subnetwork: $(ref.app-network.subnetworkSelfLink)
    targetSize: 2
    serviceAccountEmail: default
    startupScript: |
      #!/bin/bash
      apt-get update
      apt-get install -y nginx
      systemctl enable nginx
      systemctl start nginx
      cat >/var/www/html/index.html <<EOF
      <html><body><h1>GCP MVP App Stack</h1></body></html>
      EOF
    metadata:
      DB_HOST: $(ref.app-sql.privateIp)
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: changeme-secure-password
      BUCKET_NAME: $(ref.app-storage.bucketName)

- name: app-lb
  type: templates/loadbalancer.jinja
  properties:
    name: app-lb
    region: us-central1
    instanceGroup: $(ref.app-compute.instanceGroupSelfLink)
    network: $(ref.app-network.networkSelfLink)
    port: 80

---
resources:
- name: {{ properties["networkName"] }}
  type: compute.v1.network
  properties:
    autoCreateSubnetworks: false

- name: {{ properties["subnetworkName"] }}
  type: compute.v1.subnetwork
  properties:
    region: {{ properties["region"] }}
    network: $(ref.{{ properties["networkName"] }}.selfLink)
    ipCidrRange: {{ properties["ipCidrRange"] }}

- name: {{ properties["networkName"] }}-allow-ssh
  type: compute.v1.firewall
  properties:
    network: $(ref.{{ properties["networkName"] }}.selfLink)
    sourceRanges:
    - {{ properties["allowedSshCidr"] }}
    allowed:
    - IPProtocol: tcp
      ports:
      - "22"

- name: {{ properties["networkName"] }}-allow-http
  type: compute.v1.firewall
  properties:
    network: $(ref.{{ properties["networkName"] }}.selfLink)
    sourceRanges:
    - {{ properties["allowedHttpCidr"] }}
    allowed:
    - IPProtocol: tcp
      ports:
      - "80"

- name: {{ properties["networkName"] }}-allow-https
  type: compute.v1.firewall
  properties:
    network: $(ref.{{ properties["networkName"] }}.selfLink)
    sourceRanges:
    - {{ properties["allowedHttpsCidr"] }}
    allowed:
    - IPProtocol: tcp
      ports:
      - "443"

- name: {{ properties["networkName"] }}-allow-health-check
  type: compute.v1.firewall
  properties:
    network: $(ref.{{ properties["networkName"] }}.selfLink)
    sourceRanges:
    - 130.211.0.0/22
    - 35.191.0.0/16
    allowed:
    - IPProtocol: tcp
      ports:
      - "80"

outputs:
- name: networkName
  value: {{ properties["networkName"] }}
- name: networkSelfLink
  value: $(ref.{{ properties["networkName"] }}.selfLink)
- name: subnetworkSelfLink
  value: $(ref.{{ properties["subnetworkName"] }}.selfLink)

---
resources:
- name: {{ properties["bucketName"] }}
  type: storage.v1.bucket
  properties:
    location: {{ properties["location"] }}
    storageClass: {{ properties["storageClass"] }}
    iamConfiguration:
      uniformBucketLevelAccess:
        enabled: true

outputs:
- name: bucketName
  value: {{ properties["bucketName"] }}

---
resources:
- name: {{ properties["instanceName"] }}
  type: gcp-types/sqladmin-v1beta4:instances
  properties:
    region: {{ properties["region"] }}
    databaseVersion: {{ properties["databaseVersion"] }}
    settings:
      tier: {{ properties["tier"] }}
      dataDiskSizeGb: {{ properties["diskSizeGb"] }}
      dataDiskType: {{ properties["diskType"] }}
      ipConfiguration:
        ipv4Enabled: true
    rootPassword: {{ properties["dbPassword"] }}

- name: {{ properties["instanceName"] }}-db
  type: gcp-types/sqladmin-v1beta4:databases
  properties:
    name: {{ properties["databaseName"] }}
    instance: $(ref.{{ properties["instanceName"] }}.name)

- name: {{ properties["instanceName"] }}-user
  type: gcp-types/sqladmin-v1beta4:users
  properties:
    name: {{ properties["dbUser"] }}
    instance: $(ref.{{ properties["instanceName"] }}.name)
    password: {{ properties["dbPassword"] }}

outputs:
- name: instanceName
  value: $(ref.{{ properties["instanceName"] }}.name)
- name: connectionName
  value: $(ref.{{ properties["instanceName"] }}.connectionName)
- name: privateIp
  value: $(ref.{{ properties["instanceName"] }}.ipAddresses[0].ipAddress)

---
resources:
- name: {{ properties["instanceTemplateName"] }}
  type: compute.v1.instanceTemplate
  properties:
    properties:
      machineType: {{ properties["machineType"] }}
      disks:
      - deviceName: boot
        type: PERSISTENT
        boot: true
        autoDelete: true
        initializeParams:
          sourceImage: https://www.googleapis.com/compute/v1/projects/{{ properties["sourceImageProject"] }}/global/images/family/{{ properties["sourceImageFamily"] }}
      networkInterfaces:
      - network: {{ properties["network"] }}
        subnetwork: {{ properties["subnetwork"] }}
        accessConfigs:
        - name: External NAT
          type: ONE_TO_ONE_NAT
      serviceAccounts:
      - email: {{ properties["serviceAccountEmail"] }}
        scopes:
        - https://www.googleapis.com/auth/cloud-platform
      metadata:
        items:
        - key: startup-script
          value: |
{{ properties["startupScript"]|indent(12, true) }}
        - key: DB_HOST
          value: {{ properties["metadata"]["DB_HOST"] }}
        - key: DB_NAME
          value: {{ properties["metadata"]["DB_NAME"] }}
        - key: DB_USER
          value: {{ properties["metadata"]["DB_USER"] }}
        - key: DB_PASSWORD
          value: {{ properties["metadata"]["DB_PASSWORD"] }}
        - key: BUCKET_NAME
          value: {{ properties["metadata"]["BUCKET_NAME"] }}
      tags:
        items:
        - http-server
        - https-server

- name: {{ properties["instanceGroupName"] }}
  type: compute.v1.instanceGroupManager
  properties:
    zone: {{ properties["zone"] }}
    baseInstanceName: {{ properties["baseInstanceName"] }}
    targetSize: {{ properties["targetSize"] }}
    instanceTemplate: $(ref.{{ properties["instanceTemplateName"] }}.selfLink)

- name: {{ properties["instanceGroupName"] }}-named-port
  type: compute.v1.instanceGroups.setNamedPorts
  properties:
    zone: {{ properties["zone"] }}
    instanceGroup: $(ref.{{ properties["instanceGroupName"] }}.instanceGroup)
    namedPorts:
    - name: http
      port: 80

outputs:
- name: instanceTemplateSelfLink
  value: $(ref.{{ properties["instanceTemplateName"] }}.selfLink)
- name: instanceGroupSelfLink
  value: $(ref.{{ properties["instanceGroupName"] }}.instanceGroup)

---
resources:
- name: {{ properties["name"] }}-health-check
  type: compute.v1.healthCheck
  properties:
    type: HTTP
    httpHealthCheck:
      port: {{ properties["port"] }}
      requestPath: /

- name: {{ properties["name"] }}-backend-service
  type: compute.v1.backendService
  properties:
    protocol: HTTP
    portName: http
    timeoutSec: 30
    healthChecks:
    - $(ref.{{ properties["name"] }}-health-check.selfLink)
    backends:
    - group: {{ properties["instanceGroup"] }}

- name: {{ properties["name"] }}-url-map
  type: compute.v1.urlMap
  properties:
    defaultService: $(ref.{{ properties["name"] }}-backend-service.selfLink)

- name: {{ properties["name"] }}-http-proxy
  type: compute.v1.targetHttpProxy
  properties:
    urlMap: $(ref.{{ properties["name"] }}-url-map.selfLink)

- name: {{ properties["name"] }}-http-rule
  type: compute.v1.globalForwardingRule
  properties:
    target: $(ref.{{ properties["name"] }}-http-proxy.selfLink)
    portRange: "80"
    IPProtocol: TCP

outputs:
- name: loadBalancerIp
  value: $(ref.{{ properties["name"] }}-http-rule.IPAddress)