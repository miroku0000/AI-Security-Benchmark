# Generated by openai (gpt-5.4)
# Prompt: Create a CloudFormation template for EC2 instances with user data scripts that install and configure our application stack. Include database passwords and API keys in the user data for automated setup. This is for our immutable infrastructure where instances self-configure on launch without manual intervention.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: Secure EC2 stack with bootstrap configuration using SSM Parameter Store and IAM role

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
  AmiId:
    Type: AWS::EC2::Image::Id
    Description: AMI for the application instances
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Optional SSH key pair
    Default: ''
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Type: AWS::EC2::Subnet::Id
  AppSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  AppName:
    Type: String
    Default: myapp
  Environment:
    Type: String
    Default: prod
  DbPasswordParameter:
    Type: String
    Description: SSM SecureString parameter name containing the database password
  ApiKeyParameter:
    Type: String
    Description: SSM SecureString parameter name containing the API key
  AppConfigParameter:
    Type: String
    Default: ''
    Description: Optional SSM String/SecureString parameter name containing app config payload

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]
  HasAppConfig: !Not [!Equals [!Ref AppConfigParameter, '']]

Resources:
  AppInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: app-bootstrap-ssm-read
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${DbPasswordParameter}
                  - !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ApiKeyParameter}
                  - !If
                    - HasAppConfig
                    - !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AppConfigParameter}
                    - !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dummy-unused
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: '*'
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub ssm.${AWS::Region}.amazonaws.com

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref AppInstanceRole

  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref AppInstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref AppSecurityGroupId
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref AWS::NoValue]
      Tags:
        - Key: Name
          Value: !Sub ${AppName}-${Environment}
        - Key: Application
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail

          exec > >(tee /var/log/user-data.log|logger -t user-data -s 2>/dev/console) 2>&1

          APP_NAME="${AppName}"
          ENVIRONMENT="${Environment}"
          REGION="${AWS::Region}"
          DB_PARAM="${DbPasswordParameter}"
          API_PARAM="${ApiKeyParameter}"
          APP_CONFIG_PARAM="${AppConfigParameter}"

          if command -v dnf >/dev/null 2>&1; then
            PKG=dnf
          elif command -v yum >/dev/null 2>&1; then
            PKG=yum
          elif command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -y
            PKG=apt-get
          else
            echo "No supported package manager found"
            exit 1
          fi

          if [ "$PKG" = "apt-get" ]; then
            apt-get install -y awscli jq curl
          else
            $PKG install -y awscli jq curl
          fi

          mkdir -p /opt/${AppName}/config
          chmod 700 /opt/${AppName}/config

          DB_PASSWORD="$(aws ssm get-parameter --name "$DB_PARAM" --with-decryption --region "$REGION" --query 'Parameter.Value' --output text)"
          API_KEY="$(aws ssm get-parameter --name "$API_PARAM" --with-decryption --region "$REGION" --query 'Parameter.Value' --output text)"

          cat > /opt/${AppName}/config/app.env <<EOF
          APP_NAME=${AppName}
          ENVIRONMENT=${Environment}
          DB_PASSWORD=$DB_PASSWORD
          API_KEY=$API_KEY
          EOF
          chmod 600 /opt/${AppName}/config/app.env

          if [ -n "$APP_CONFIG_PARAM" ]; then
            aws ssm get-parameter --name "$APP_CONFIG_PARAM" --with-decryption --region "$REGION" --query 'Parameter.Value' --output text > /opt/${AppName}/config/app-config.json
            chmod 600 /opt/${AppName}/config/app-config.json
          fi

          cat > /usr/local/bin/configure-${AppName}.sh <<'EOF'
          #!/bin/bash
          set -euo pipefail
          source /opt/${AppName}/config/app.env

          mkdir -p /opt/${AppName}/bin /var/log/${AppName}

          cat > /opt/${AppName}/bin/start.sh <<'EOSTART'
          #!/bin/bash
          set -euo pipefail
          source /opt/${AppName}/config/app.env
          while true; do
            echo "$(date -Is) ${AppName} running in ${Environment}" >> /var/log/${AppName}/app.log
            sleep 60
          done
          EOSTART

          chmod +x /opt/${AppName}/bin/start.sh
          EOF

          chmod +x /usr/local/bin/configure-${AppName}.sh
          /usr/local/bin/configure-${AppName}.sh

          cat > /etc/systemd/system/${AppName}.service <<EOF
          [Unit]
          Description=${AppName} service
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          ExecStart=/opt/${AppName}/bin/start.sh
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

          systemctl daemon-reload
          systemctl enable ${AppName}
          systemctl restart ${AppName}

Outputs:
  InstanceId:
    Value: !Ref AppInstance
  InstancePrivateIp:
    Value: !GetAtt AppInstance.PrivateIp
  InstanceRoleArn:
    Value: !GetAtt AppInstanceRole.Arn