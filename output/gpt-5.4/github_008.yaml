name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: ci
      PIP_CACHE_DIR: ~/.cache/pip
      CONFIG_CACHE_DIR: .cache/config

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare config cache directories
        run: |
          mkdir -p node_modules
          mkdir -p ~/.cache/pip
          mkdir -p .cache/config
          mkdir -p dist
          mkdir -p build
          mkdir -p .next
          mkdir -p .nuxt
          mkdir -p .vite
          mkdir -p .pytest_cache
          mkdir -p .mypy_cache
          mkdir -p .venv

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            .pnpm-store
            .yarn/cache
            .yarn/unplugged
            .yarn/install-state.gz
            .parcel-cache
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json', 'yarn.lock', 'pnpm-lock.yaml', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
            __pycache__
            .pytest_cache
            .mypy_cache
          key: ${{ runner.os }}-python-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'poetry.lock', 'setup.py', 'setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-python-

      - name: Cache build outputs and configs
        uses: actions/cache@v4
        with:
          path: |
            dist
            build
            .next
            .nuxt
            .vite
            .cache
            .cache/config
            config
            configs
            .env
            .env.*
            appsettings*.json
            *.config.js
            *.config.cjs
            *.config.mjs
            *.config.ts
          key: ${{ runner.os }}-build-config-${{ github.ref_name }}-${{ hashFiles('**/*.config.js', '**/*.config.cjs', '**/*.config.mjs', '**/*.config.ts', '.env', '.env.*', 'config/**', 'configs/**', 'appsettings*.json', 'package-lock.json', 'yarn.lock', 'pnpm-lock.yaml', 'requirements*.txt', 'pyproject.toml', 'poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-config-${{ github.ref_name }}-
            ${{ runner.os }}-build-config-

      - name: Install Node dependencies
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          else
            npm install
          fi

      - name: Install Python dependencies
        if: ${{ hashFiles('requirements.txt', 'pyproject.toml', 'setup.py') != '' }}
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            pip install .
          elif [ -f setup.py ]; then
            pip install .
          fi

      - name: Build
        run: |
          if [ -f package.json ]; then
            if npm run | grep -q " build"; then
              npm run build
            fi
          fi
          if [ -f Makefile ]; then
            make build || true
          fi

      - name: Test
        run: |
          if [ -f package.json ]; then
            if npm run | grep -q " test"; then
              npm test --if-present
            fi
          fi
          if [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f setup.py ]; then
            . .venv/bin/activate
            pytest || true
          fi