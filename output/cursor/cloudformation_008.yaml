AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket for user uploads and application backups

Parameters:
  ApplicationRoleArn:
    Type: String
    Description: ARN of the application IAM role to grant full read/write access

Resources:
  AppStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  AppStorageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AppStorageBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowApplicationRoleListBucket
            Effect: Allow
            Principal:
              AWS: !Ref ApplicationRoleArn
            Action:
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource: !GetAtt AppStorageBucket.Arn
          - Sid: AllowApplicationRoleObjectAccess
            Effect: Allow
            Principal:
              AWS: !Ref ApplicationRoleArn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:AbortMultipartUpload
              - s3:ListMultipartUploadParts
              - s3:PutObjectTagging
              - s3:GetObjectTagging
              - s3:DeleteObjectTagging
            Resource: !Sub '${AppStorageBucket.Arn}/*'

Outputs:
  BucketName:
    Value: !Ref AppStorageBucket
  BucketArn:
    Value: !GetAtt AppStorageBucket.Arn