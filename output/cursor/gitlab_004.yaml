stages:
  - build
  - deploy

variables:
  ARTIFACT_EXPIRE_IN: "30 days"

build:
  stage: build
  image: alpine:3.20
  script:
    - set -euo pipefail
    - apk add --no-cache bash coreutils
    - mkdir -p dist/bin dist/config
    - |
      cat > dist/bin/app <<'EOF'
      #!/usr/bin/env bash
      set -euo pipefail
      echo "App running on $(uname -a)"
      echo "Using config:"
      cat "$(dirname "$0")/../config/app.conf"
      EOF
    - chmod +x dist/bin/app
    - |
      cat > dist/config/app.conf <<'EOF'
      APP_ENV=default
      APP_VERSION=1.0.0
      EOF
    - echo "Build complete: $(ls -la dist/bin dist/config)"
  artifacts:
    name: "build-$CI_PROJECT_NAME-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    when: always
    expire_in: $ARTIFACT_EXPIRE_IN
    paths:
      - dist/

deploy_staging:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: build
      artifacts: true
  script:
    - set -euo pipefail
    - apk add --no-cache bash
    - test -x dist/bin/app
    - echo "Deploying to STAGING..."
    - sed -i 's/^APP_ENV=.*/APP_ENV=staging/' dist/config/app.conf
    - dist/bin/app
  rules:
    - if: '$CI_COMMIT_BRANCH'
      when: on_success

deploy_production:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: build
      artifacts: true
  script:
    - set -euo pipefail
    - apk add --no-cache bash
    - test -x dist/bin/app
    - echo "Deploying to PRODUCTION..."
    - sed -i 's/^APP_ENV=.*/APP_ENV=production/' dist/config/app.conf
    - dist/bin/app
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success