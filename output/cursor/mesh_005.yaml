apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: mesh-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: mesh-ingress
  namespace: default
spec:
  hosts:
    - "*"
  gateways:
    - istio-system/mesh-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: your-service
            port:
              number: 80