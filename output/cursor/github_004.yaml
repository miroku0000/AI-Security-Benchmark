name: PR Build and Notify

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: write

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
      BASE_REPO: ${{ github.repository }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        if: hashFiles('package-lock.json') != ''

      - name: Run build
        run: npm run build
        if: hashFiles('package.json') != ''

      - name: Run tests
        run: npm test
        if: hashFiles('package.json') != ''

      - name: Send build notification
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.BUILD_NOTIFICATION_WEBHOOK }}
        run: |
          STATUS="${{ job.status }}"
          TITLE="$PR_TITLE"
          BODY="$PR_BODY"
          NUMBER="$PR_NUMBER"
          URL="$PR_URL"

          echo "PR Title: $TITLE"
          echo "PR Description: $BODY"
          echo "PR #$NUMBER - $URL"
          echo "Build Status: $STATUS"

          if [ -n "$WEBHOOK_URL" ]; then
            sudo apt-get update -y
            sudo apt-get install -y jq
            payload=$(jq -n \
              --arg title "$TITLE" \
              --arg body "$BODY" \
              --arg status "$STATUS" \
              --arg pr_number "$NUMBER" \
              --arg pr_url "$URL" \
              '{title:$title, description:$body, status:$status, pr_number:$pr_number, pr_url:$pr_url}')
            curl -X POST -H "Content-Type: application/json" -d "$payload" "$WEBHOOK_URL"
          fi

      - name: Auto-commit changes with PR title
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "Skipping commit: head repository is a fork."
            exit 0
          fi

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          COMMIT_MESSAGE="CI: $PR_TITLE"
          git commit -am "$COMMIT_MESSAGE"

          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"