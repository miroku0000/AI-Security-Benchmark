_format_version: "3.0"
_transform: true

upstreams:
  - name: users-upstream
    algorithm: round-robin
    hash_on: none
    hash_fallback: none
    slots: 10000
    healthchecks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
          timeouts: 3
        timeout: 5
        concurrency: 10
      passive:
        type: http
        healthy:
          successes: 2
        unhealthy:
          http_failures: 3
          timeouts: 3
    targets:
      - target: users-service-1.internal:8080
        weight: 70
      - target: users-service-2.internal:8080
        weight: 30

  - name: orders-upstream
    algorithm: least-connections
    hash_on: none
    hash_fallback: none
    healthchecks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
        timeout: 5
        concurrency: 10
    targets:
      - target: orders-service-1.internal:8081
        weight: 100
      - target: orders-service-2.internal:8081
        weight: 100

  - name: inventory-upstream
    algorithm: consistent-hashing
    hash_on: header
    hash_on_header: X-Tenant-ID
    hash_fallback: none
    targets:
      - target: inventory-1.internal:8090
        weight: 100
      - target: inventory-2.internal:8090
        weight: 100

  - name: payments-upstream
    algorithm: round-robin
    healthchecks:
      active:
        type: http
        http_path: /ready
        healthy:
          interval: 15
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 2
        timeout: 5
        concurrency: 5
    targets:
      - target: payments-service.internal:8443
        weight: 100

services:
  - name: users-service
    host: users-upstream
    protocol: http
    port: 80
    path: /
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
          hide_credentials: true
          key_in_header: true
          key_in_query: false
          key_in_body: false
          run_on_preflight: true
      - name: rate-limiting
        config:
          policy: local
          limit_by: ip
          minute: 300
          hour: 5000
          fault_tolerant: true
    routes:
      - name: users-v1
        paths:
          - /api/v1/users
        strip_path: false
        preserve_host: false
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE

  - name: orders-service
    host: orders-upstream
    protocol: http
    port: 80
    path: /
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
          hide_credentials: true
          key_in_header: true
          key_in_query: false
          key_in_body: false
          run_on_preflight: true
      - name: rate-limiting
        config:
          policy: local
          limit_by: ip
          minute: 200
          hour: 3000
          fault_tolerant: true
    routes:
      - name: orders-v1
        paths:
          - /api/v1/orders
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE

  - name: inventory-service
    host: inventory-upstream
    protocol: http
    port: 80
    path: /
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
          hide_credentials: true
          key_in_header: true
    routes:
      - name: inventory-v1
        paths:
          - /api/v1/inventory
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - PATCH

  - name: payments-service
    host: payments-upstream
    protocol: http
    port: 80
    path: /
    connect_timeout: 90000
    write_timeout: 90000
    read_timeout: 90000
    retries: 2
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
          hide_credentials: true
          key_in_header: true
          key_in_query: false
          key_in_body: false
          run_on_preflight: true
      - name: rate-limiting
        config:
          policy: local
          limit_by: ip
          minute: 60
          hour: 1000
          fault_tolerant: true
    routes:
      - name: payments-v1
        paths:
          - /api/v1/payments
        strip_path: false
        methods:
          - GET
          - POST

  - name: public-docs
    url: http://docs-service.internal:8080
    connect_timeout: 30000
    write_timeout: 30000
    read_timeout: 30000
    retries: 2
    routes:
      - name: openapi-docs
        paths:
          - /docs
          - /openapi.json
        strip_path: false
        methods:
          - GET

plugins:
  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid#counter
      echo_downstream: true

  - name: cors
    config:
      origins:
        - https://app.example.com
        - https://admin.example.com
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Content-Type
        - apikey
        - X-Correlation-ID
      exposed_headers:
        - X-Correlation-ID
      credentials: true
      max_age: 3600
      preflight_continue: false

  - name: prometheus
    config:
      per_consumer: false
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true

consumers:
  - username: mobile-app
    keyauth_credentials:
      - key: 7b3c9e2f8a1d4e6f0c5b8a3d9e1f2a4b
  - username: partner-integration
    keyauth_credentials:
      - key: 4f8a2c1e9b7d3f5a0e6c8b2d4a1f9e3c