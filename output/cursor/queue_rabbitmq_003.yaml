services:
  rabbitmq-1:
    image: rabbitmq:3.13-management
    container_name: rabbitmq-1
    hostname: rabbitmq-1
    restart: unless-stopped
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-REPLACE_WITH_SECURE_CLUSTER_COOKIE}
      RABBITMQ_NODENAME: ${RABBITMQ_NODENAME_1:-rabbit@rabbitmq-1}
      RABBITMQ_USE_LONGNAME: ${RABBITMQ_USE_LONGNAME:-false}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-REPLACE_WITH_SECURE_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-/}
    volumes:
      - rabbitmq_1_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  rabbitmq-2:
    image: rabbitmq:3.13-management
    container_name: rabbitmq-2
    hostname: rabbitmq-2
    restart: unless-stopped
    depends_on:
      rabbitmq-1:
        condition: service_healthy
    ports:
      - "${RABBITMQ_AMQP_PORT_2:-5673}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT_2:-15673}:15672"
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-REPLACE_WITH_SECURE_CLUSTER_COOKIE}
      RABBITMQ_NODENAME: ${RABBITMQ_NODENAME_2:-rabbit@rabbitmq-2}
      RABBITMQ_USE_LONGNAME: ${RABBITMQ_USE_LONGNAME:-false}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-REPLACE_WITH_SECURE_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-/}
    volumes:
      - rabbitmq_2_data:/var/lib/rabbitmq
    command:
      - /bin/bash
      - -c
      - |
        set -e
        docker-entrypoint.sh rabbitmq-server -detached
        rabbitmqctl await_startup
        rabbitmqctl stop_app
        rabbitmqctl join_cluster rabbit@rabbitmq-1 || true
        rabbitmqctl start_app
        rabbitmqctl stop
        exec docker-entrypoint.sh rabbitmq-server

volumes:
  rabbitmq_1_data:
  rabbitmq_2_data: