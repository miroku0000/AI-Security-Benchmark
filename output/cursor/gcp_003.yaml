resources:
- name: staging-postgresql
  type: gcp-types/sqladmin-v1beta4:instances
  properties:
    name: staging-postgresql
    region: us-central1
    databaseVersion: POSTGRES_15
    rootPassword: 'CloudSQL2024!'
    settings:
      tier: db-f1-micro
      deletionProtectionEnabled: false
      ipConfiguration:
        ipv4Enabled: true
        authorizedNetworks:
        - name: allow-all
          value: 0.0.0.0/0