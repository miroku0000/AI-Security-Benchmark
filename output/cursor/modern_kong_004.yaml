prefix = /usr/local/kong
log_level = notice

proxy_access_log = logs/access.log
proxy_error_log = logs/error.log
admin_access_log = logs/admin_access.log
admin_error_log = logs/admin_error.log

admin_listen = 127.0.0.1:8001 reuseport backlog=16384
status_listen = off

proxy_listen = 0.0.0.0:8000 reuseport backlog=16384, 0.0.0.0:8443 ssl http2 reuseport backlog=16384

ssl_cert = /usr/local/kong/ssl/kong.crt
ssl_cert_key = /usr/local/kong/ssl/kong.key

database = postgres
pg_host = kong-database
pg_port = 5432
pg_user = kong
pg_password = change_me
pg_database = kong
pg_schema = public
pg_timeout = 5000
pg_max_concurrent_queries = 0
pg_semaphore_timeout = 60000
pg_ssl = on
pg_ssl_verify = on

lua_ssl_trusted_certificate = system
lua_ssl_verify_depth = 1

mem_cache_size = 128m
worker_events_max_payload = 65536

headers = latency_tokens, X-Kong-Request-Id, Server_tokens, Via