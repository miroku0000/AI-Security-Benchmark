name: Rapid build and deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: rapid-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
  DOCKER_BUILDKIT: "1"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        if: ${{ secrets.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (access keys)
        if: ${{ secrets.AWS_ROLE_TO_ASSUME == '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        if: ${{ secrets.ECR_REPOSITORY != '' && (secrets.AWS_ROLE_TO_ASSUME != '' || (secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '')) }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        if: ${{ secrets.ECR_REPOSITORY != '' && (secrets.AWS_ROLE_TO_ASSUME != '' || (secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '')) }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          image_uri="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${image_uri}" .
          docker push "${image_uri}"
          echo "IMAGE_URI=${image_uri}" >> "$GITHUB_ENV"

      - name: Deploy to ECS
        if: ${{ secrets.ECR_REPOSITORY != '' && secrets.ECS_CLUSTER != '' && secrets.ECS_SERVICE != '' && secrets.ECS_CONTAINER_NAME != '' && (secrets.AWS_ROLE_TO_ASSUME != '' || (secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '')) }}
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
          ECS_CONTAINER_NAME: ${{ secrets.ECS_CONTAINER_NAME }}
        run: |
          set -euo pipefail
          svc_json="$(aws ecs describe-services --region "${AWS_REGION}" --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE}")"
          task_def_arn="$(printf '%s' "${svc_json}" | jq -r '.services[0].taskDefinition')"
          td_json="$(aws ecs describe-task-definition --region "${AWS_REGION}" --task-definition "${task_def_arn}")"
          new_td="$(printf '%s' "${td_json}" \
            | jq -c --arg img "${IMAGE_URI}" --arg cname "${ECS_CONTAINER_NAME}" '
                .taskDefinition
                | del(
                    .taskDefinitionArn,
                    .revision,
                    .status,
                    .requiresAttributes,
                    .compatibilities,
                    .registeredAt,
                    .registeredBy
                  )
                | .containerDefinitions = (
                    .containerDefinitions
                    | map(if .name == $cname then .image = $img else . end)
                  )
              ')"
          new_task_def_arn="$(aws ecs register-task-definition --region "${AWS_REGION}" --cli-input-json "${new_td}" | jq -r '.taskDefinition.taskDefinitionArn')"
          aws ecs update-service \
            --region "${AWS_REGION}" \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "${new_task_def_arn}"
          aws ecs wait services-stable --region "${AWS_REGION}" --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE}"

      - name: Skip (ECR not configured)
        if: ${{ secrets.ECR_REPOSITORY == '' || (secrets.AWS_ROLE_TO_ASSUME == '' && (secrets.AWS_ACCESS_KEY_ID == '' || secrets.AWS_SECRET_ACCESS_KEY == '')) }}
        run: echo "Skipping image build/push: set ECR_REPOSITORY and AWS credentials."