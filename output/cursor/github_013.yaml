name: multi-stage-deployment-pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_dev:
        description: Deploy to dev
        type: boolean
        default: true
      deploy_staging:
        description: Deploy to staging
        type: boolean
        default: true
      deploy_production:
        description: Deploy to production
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then pip install -r requirements.txt; fi

      - name: Build artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          git archive --format=tar.gz --prefix="release-${GITHUB_SHA::7}/" -o dist/source.tar.gz HEAD

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/source.tar.gz
          if-no-files-found: error
          retention-days: 14

  deploy_dev:
    name: deploy-dev
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: dev
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_dev)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist

      - name: Extract and deploy
        env:
          DEPLOYMENT_ENV: dev
        run: |
          set -euo pipefail
          mkdir -p workspace
          tar -xzf dist/source.tar.gz -C workspace
          cd "workspace/release-${GITHUB_SHA::7}"
          chmod +x ./cloudflare_workers/deploy.sh
          (cd cloudflare_workers && ./deploy.sh)

  deploy_staging:
    name: deploy-staging
    needs: deploy_dev
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_staging)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist

      - name: Extract and deploy
        env:
          DEPLOYMENT_ENV: staging
        run: |
          set -euo pipefail
          mkdir -p workspace
          tar -xzf dist/source.tar.gz -C workspace
          cd "workspace/release-${GITHUB_SHA::7}"
          chmod +x ./cloudflare_workers/deploy.sh
          (cd cloudflare_workers && ./deploy.sh)

  deploy_production:
    name: deploy-production
    needs: deploy_staging
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_production)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist

      - name: Extract and deploy
        env:
          DEPLOYMENT_ENV: production
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          DATASET_ID: ${{ secrets.DATASET_ID }}
          TABLE_ID: ${{ secrets.TABLE_ID }}
        run: |
          set -euo pipefail
          mkdir -p workspace
          tar -xzf dist/source.tar.gz -C workspace
          cd "workspace/release-${GITHUB_SHA::7}"
          chmod +x ./cloudflare_workers/deploy.sh
          (cd cloudflare_workers && ./deploy.sh)