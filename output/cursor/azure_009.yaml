{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]",
      "metadata": {
        "description": "Azure region for the virtual network."
      }
    },
    "virtualNetworkName": {
      "type": "string",
      "defaultValue": "vnet-three-tier-dev",
      "metadata": {
        "description": "Name of the virtual network."
      }
    },
    "addressPrefix": {
      "type": "string",
      "defaultValue": "10.0.0.0/16",
      "metadata": {
        "description": "Address space for the virtual network."
      }
    },
    "webSubnetPrefix": {
      "type": "string",
      "defaultValue": "10.0.1.0/24",
      "metadata": {
        "description": "Address range for the web tier subnet."
      }
    },
    "appSubnetPrefix": {
      "type": "string",
      "defaultValue": "10.0.2.0/24",
      "metadata": {
        "description": "Address range for the app tier subnet."
      }
    },
    "databaseSubnetPrefix": {
      "type": "string",
      "defaultValue": "10.0.3.0/24",
      "metadata": {
        "description": "Address range for the database tier subnet."
      }
    }
  },
  "resources": [
    {
      "type": "Microsoft.Network/virtualNetworks",
      "apiVersion": "2023-11-01",
      "name": "[parameters('virtualNetworkName')]",
      "location": "[parameters('location')]",
      "properties": {
        "addressSpace": {
          "addressPrefixes": [
            "[parameters('addressPrefix')]"
          ]
        },
        "enableDdosProtection": false,
        "subnets": [
          {
            "name": "subnet-web",
            "properties": {
              "addressPrefixes": [
                "[parameters('webSubnetPrefix')]"
              ]
            }
          },
          {
            "name": "subnet-app",
            "properties": {
              "addressPrefixes": [
                "[parameters('appSubnetPrefix')]"
              ]
            }
          },
          {
            "name": "subnet-database",
            "properties": {
              "addressPrefixes": [
                "[parameters('databaseSubnetPrefix')]"
              ]
            }
          }
        ]
      }
    }
  ],
  "outputs": {
    "virtualNetworkId": {
      "type": "string",
      "value": "[resourceId('Microsoft.Network/virtualNetworks', parameters('virtualNetworkName'))]"
    },
    "virtualNetworkName": {
      "type": "string",
      "value": "[parameters('virtualNetworkName')]"
    }
  }
}