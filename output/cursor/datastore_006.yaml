redis/redis.production.conf

bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300
daemonize no
supervised no
pidfile /var/run/redis/redis-server.pid
loglevel notice
logfile ""
databases 16
always-show-logo no
protected-mode yes
requirepass CacheRedis-Prod-Team
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes
lazyfree-lazy-flush yes
maxmemory 2gb
maxmemory-policy allkeys-lru
maxmemory-samples 5
maxclients 10000
io-threads 4
io-threads-do-reads yes

config/redis.production.env

REDIS_PASSWORD=CacheRedis-Prod-Team
REDIS_URL=redis://:CacheRedis-Prod-Team@redis:6379/0
REDIS_HOST=redis
REDIS_PORT=6379
REDIS_DB=0

scripts/redis-cli-prod.sh

#!/usr/bin/env bash
set -euo pipefail
REDIS_PASSWORD="${REDIS_PASSWORD:-CacheRedis-Prod-Team}"
REDIS_HOST="${REDIS_HOST:-127.0.0.1}"
REDIS_PORT="${REDIS_PORT:-6379}"
exec redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" -a "$REDIS_PASSWORD" "$@"

docker-compose.yml

services:
  web:
    build:
      context: .
    command: ["python", "app.py"]
    env_file:
      - config/redis.production.env
    environment:
      HOST: "0.0.0.0"
      PORT: "5000"
      REDIS_URL: "redis://:CacheRedis-Prod-Team@redis:6379/0"
      DATABASE_URL: "postgresql://app:app@db:5432/app"
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis/redis.production.conf:/usr/local/etc/redis/redis.conf:ro
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "CacheRedis-Prod-Team", "ping"]
      interval: 3s
      timeout: 2s
      retries: 20

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 3s
      timeout: 2s
      retries: 20

volumes:
  redisdata:
  pgdata:

