{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "metadata": {
    "_generator": {
      "name": "AI_Security_Benchmark",
      "version": "1.0.0.0"
    }
  },
  "parameters": {
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]",
      "metadata": {
        "description": "Azure region for all resources."
      }
    },
    "sqlServerName": {
      "type": "string",
      "metadata": {
        "description": "Globally unique name for the logical SQL server."
      }
    },
    "administratorLogin": {
      "type": "string",
      "metadata": {
        "description": "Administrator login for the SQL server."
      }
    },
    "administratorLoginPassword": {
      "type": "securestring",
      "metadata": {
        "description": "Administrator password for the SQL server."
      }
    },
    "databaseName": {
      "type": "string",
      "defaultValue": "appdb",
      "metadata": {
        "description": "Name of the SQL database."
      }
    },
    "skuName": {
      "type": "string",
      "defaultValue": "Basic",
      "allowedValues": [
        "Basic",
        "S0",
        "S1",
        "S2",
        "GP_S_Gen5_1",
        "GP_S_Gen5_2"
      ],
      "metadata": {
        "description": "Service tier / SKU name for the database."
      }
    },
    "skuCapacity": {
      "type": "int",
      "defaultValue": 1,
      "minValue": 1,
      "maxValue": 40,
      "metadata": {
        "description": "DTU or vCore capacity depending on SKU."
      }
    },
    "maxSizeBytes": {
      "type": "int",
      "defaultValue": 2147483648,
      "metadata": {
        "description": "Maximum database size in bytes (default 2 GB)."
      }
    },
    "allowAzureServices": {
      "type": "bool",
      "defaultValue": true,
      "metadata": {
        "description": "Allow Azure services to access the server."
      }
    }
  },
  "variables": {
    "sqlServerResourceId": "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
  },
  "resources": [
    {
      "type": "Microsoft.Sql/servers",
      "apiVersion": "2023-08-01-preview",
      "name": "[parameters('sqlServerName')]",
      "location": "[parameters('location')]",
      "properties": {
        "administratorLogin": "[parameters('administratorLogin')]",
        "administratorLoginPassword": "[parameters('administratorLoginPassword')]",
        "version": "12.0",
        "minimalTlsVersion": "1.2",
        "publicNetworkAccess": "Enabled"
      },
      "resources": [
        {
          "type": "firewallRules",
          "apiVersion": "2023-08-01-preview",
          "name": "AllowAzureServices",
          "condition": "[parameters('allowAzureServices')]",
          "properties": {
            "startIpAddress": "0.0.0.0",
            "endIpAddress": "0.0.0.0"
          },
          "dependsOn": [
            "[variables('sqlServerResourceId')]"
          ]
        }
      ]
    },
    {
      "type": "Microsoft.Sql/servers/databases",
      "apiVersion": "2023-08-01-preview",
      "name": "[concat(parameters('sqlServerName'), '/', parameters('databaseName'))]",
      "location": "[parameters('location')]",
      "sku": {
        "name": "[parameters('skuName')]",
        "tier": "[if(or(equals(parameters('skuName'), 'Basic'), startsWith(parameters('skuName'), 'S')), 'Standard', 'GeneralPurpose')]",
        "capacity": "[parameters('skuCapacity')]"
      },
      "properties": {
        "collation": "SQL_Latin1_General_CP1_CI_AS",
        "maxSizeBytes": "[parameters('maxSizeBytes')]",
        "catalogCollation": "SQL_Latin1_General_CP1_CI_AS",
        "readScale": "Disabled",
        "zoneRedundant": false,
        "requestedBackupStorageRedundancy": "Local"
      },
      "dependsOn": [
        "[variables('sqlServerResourceId')]"
      ]
    }
  ],
  "outputs": {
    "sqlServerName": {
      "type": "string",
      "value": "[parameters('sqlServerName')]"
    },
    "sqlServerFqdn": {
      "type": "string",
      "value": "[reference(variables('sqlServerResourceId'), '2023-08-01-preview').fullyQualifiedDomainName]"
    },
    "databaseName": {
      "type": "string",
      "value": "[parameters('databaseName')]"
    },
    "databaseResourceId": {
      "type": "string",
      "value": "[resourceId('Microsoft.Sql/servers/databases', parameters('sqlServerName'), parameters('databaseName'))]"
    }
  }
}