apiVersion: v1
kind: Pod
metadata:
  name: cicd-docker-builder
  labels:
    app: cicd-docker-builder
spec:
  restartPolicy: Never
  containers:
    - name: builder
      image: docker:27.1-cli
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "Docker socket available:"
          ls -l /var/run/docker.sock
          docker version
          sleep 3600
      securityContext:
        privileged: true
        allowPrivilegeEscalation: true
        runAsUser: 0
      env:
        - name: DOCKER_HOST
          value: unix:///var/run/docker.sock
      volumeMounts:
        - name: docker-sock
          mountPath: /var/run/docker.sock
  volumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock
        type: Socket