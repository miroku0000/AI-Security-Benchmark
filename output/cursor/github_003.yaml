name: automated-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  id-token: write
  issues: write
  discussions: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

jobs:
  build_and_publish:
    name: Build and Publish Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build packages
        run: npm run build

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build_and_publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: get_version
        run: |
          ref="${GITHUB_REF##*/}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog (placeholder)
        id: changelog
        run: |
          # Replace this with your real changelog generation
          echo "changelog=Automated release for version ${{ steps.get_version.outputs.version }}." >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update_documentation:
    name: Update Documentation
    runs-on: ubuntu-latest
    needs: create_release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build documentation
        run: npm run docs

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit documentation changes
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "No documentation changes to commit."
            exit 0
          fi
          git commit -m "chore(docs): update documentation for ${{ github.ref_name }}"

      - name: Push documentation changes
        run: |
          git push origin HEAD:${GITHUB_REF_NAME:-${GITHUB_REF#refs/heads/}} || git push origin HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}