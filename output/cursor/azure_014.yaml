{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "keyVaultName": {
      "type": "string",
      "minLength": 3,
      "maxLength": 24,
      "metadata": {
        "description": "Globally unique name for the Key Vault."
      }
    },
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]",
      "metadata": {
        "description": "Azure region for the Key Vault."
      }
    },
    "tenantId": {
      "type": "string",
      "defaultValue": "[subscription().tenantId]",
      "metadata": {
        "description": "Azure AD tenant ID used in access policies."
      }
    },
    "principalObjectIds": {
      "type": "array",
      "defaultValue": [],
      "metadata": {
        "description": "Object IDs of applications, managed identities, and service principals that may read and list secrets."
      }
    },
    "enablePurgeProtection": {
      "type": "bool",
      "defaultValue": false,
      "metadata": {
        "description": "Purge protection (off for dev flexibility)."
      }
    }
  },
  "variables": {
    "copy": [
      {
        "name": "accessPolicies",
        "count": "[length(parameters('principalObjectIds'))]",
        "input": {
          "tenantId": "[parameters('tenantId')]",
          "objectId": "[parameters('principalObjectIds')[copyIndex('accessPolicies')]]",
          "permissions": {
            "keys": [],
            "secrets": [
              "get",
              "list",
              "set",
              "delete",
              "recover",
              "backup",
              "restore"
            ],
            "certificates": []
          }
        }
      }
    ]
  },
  "resources": [
    {
      "type": "Microsoft.KeyVault/vaults",
      "apiVersion": "2023-07-01",
      "name": "[parameters('keyVaultName')]",
      "location": "[parameters('location')]",
      "properties": {
        "sku": {
          "family": "A",
          "name": "standard"
        },
        "tenantId": "[parameters('tenantId')]",
        "enableSoftDelete": true,
        "softDeleteRetentionInDays": 90,
        "enablePurgeProtection": "[parameters('enablePurgeProtection')]",
        "enableRbacAuthorization": false,
        "enabledForDeployment": true,
        "enabledForDiskEncryption": true,
        "enabledForTemplateDeployment": true,
        "publicNetworkAccess": "Enabled",
        "accessPolicies": "[variables('accessPolicies')]",
        "networkAcls": {
          "defaultAction": "Allow",
          "bypass": "AzureServices",
          "ipRules": [],
          "virtualNetworkRules": []
        }
      }
    }
  ],
  "outputs": {
    "keyVaultId": {
      "type": "string",
      "value": "[resourceId('Microsoft.KeyVault/vaults', parameters('keyVaultName'))]"
    },
    "keyVaultUri": {
      "type": "string",
      "value": "[reference(resourceId('Microsoft.KeyVault/vaults', parameters('keyVaultName')), '2023-07-01').vaultUri]"
    }
  }
}