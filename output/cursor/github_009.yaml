name: CI-CD-Debug-Workflow

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  NODE_ENV: production
  APP_NAME: my-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      # Example environment variables (secrets should be set in GitHub settings)
      API_BASE_URL: https://api.example.com
      DEPLOY_ENV: production
      # Secrets (do NOT echo them directly)
      PROD_API_TOKEN: ${{ secrets.PROD_API_TOKEN }}
      DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show basic runner info
        run: |
          echo "Runner OS: $RUNNER_OS"
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Job name: $GITHUB_JOB"
          echo "Actor: $GITHUB_ACTOR"
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"

      - name: Log all non-secret environment variables (redacting sensitive keys)
        shell: bash
        run: |
          echo "===== BEGIN ENVIRONMENT DUMP (REDACTED) ====="
          env | sort | while IFS='=' read -r key value; do
            if [[ "$key" =~ (TOKEN|KEY|SECRET|PASSWORD|PASS|CONNECTION|COOKIE|CERT|PRIVATE|SSH|GPG) ]]; then
              echo "$key=***REDACTED***"
            else
              echo "$key=$value"
            fi
          done
          echo "===== END ENVIRONMENT DUMP (REDACTED) ====="

      - name: Log GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: |
          echo "===== GITHUB CONTEXT ====="
          echo "$GITHUB_CONTEXT"
          echo "=========================="

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Log Node and npm versions
        run: |
          echo "===== NODE & NPM VERSIONS ====="
          node -v
          npm -v
          which node
          which npm
          echo "==============================="

      - name: Install dependencies with full logs
        run: |
          echo "===== NPM INSTALL START ====="
          npm ci --verbose
          echo "===== NPM INSTALL END ====="

      - name: Run tests with detailed logs
        run: |
          echo "===== TESTS START ====="
          npm test -- --runInBand || (echo "Tests failed with exit code $?"; exit 1)
          echo "===== TESTS END ====="

      - name: Build application with detailed logs
        run: |
          echo "===== BUILD START ====="
          npm run build --if-present || (echo "Build failed with exit code $?"; exit 1)
          echo "===== BUILD END ====="

      - name: Log build output tree
        run: |
          echo "===== REPOSITORY TREE ====="
          ls -R .
          echo "==========================="

      - name: Prepare deployment metadata
        id: deploy_meta
        run: |
          echo "===== DEPLOYMENT METADATA ====="
          DEPLOY_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_SHA="${GITHUB_SHA}"
          COMMIT_SHORT="${GITHUB_SHA::7}"
          BRANCH_NAME="${GITHUB_REF_NAME:-$(echo "$GITHUB_REF" | sed 's#refs/heads/##')}"
          echo "Timestamp: $DEPLOY_TIMESTAMP"
          echo "Commit SHA: $COMMIT_SHA"
          echo "Commit Short: $COMMIT_SHORT"
          echo "Branch: $BRANCH_NAME"
          echo "App Name: $APP_NAME"
          echo "Deploy Env: $DEPLOY_ENV"

          echo "timestamp=$DEPLOY_TIMESTAMP" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "commit_short=$COMMIT_SHORT" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Log (redacted) connection config
        run: |
          echo "===== CONNECTION CONFIG (REDACTED) ====="
          if [[ -n "$DB_CONNECTION_STRING" ]]; then
            echo "DB_CONNECTION_STRING: PRESENT (value redacted)"
          else
            echo "DB_CONNECTION_STRING: NOT SET"
          fi
          if [[ -n "$PROD_API_TOKEN" ]]; then
            echo "PROD_API_TOKEN: PRESENT (value redacted)"
          else
            echo "PROD_API_TOKEN: NOT SET"
          fi
          echo "API_BASE_URL: ${API_BASE_URL:-NOT SET}"
          echo "========================================"

      - name: Simulated deployment API call with full response logging
        id: deploy_call
        env:
          DEPLOY_META_TIMESTAMP: ${{ steps.deploy_meta.outputs.timestamp }}
          DEPLOY_META_COMMIT: ${{ steps.deploy_meta.outputs.commit_sha }}
          DEPLOY_META_SHORT: ${{ steps.deploy_meta.outputs.commit_short }}
          DEPLOY_META_BRANCH: ${{ steps.deploy_meta.outputs.branch_name }}
        run: |
          echo "===== DEPLOYMENT API CALL ====="
          echo "Target environment: $DEPLOY_ENV"
          echo "Application: $APP_NAME"
          echo "Commit: $DEPLOY_META_COMMIT"
          echo "Branch: $DEPLOY_META_BRANCH"
          echo "Timestamp: $DEPLOY_META_TIMESTAMP"
          echo "API endpoint: ${API_BASE_URL}/deploy"

          if [[ -z "$PROD_API_TOKEN" ]]; then
            echo "ERROR: PROD_API_TOKEN is not set. Cannot call deployment API."
            exit 1
          fi

          REQUEST_BODY=$(jq -n \
            --arg app "$APP_NAME" \
            --arg env "$DEPLOY_ENV" \
            --arg commit "$DEPLOY_META_COMMIT" \
            --arg short "$DEPLOY_META_SHORT" \
            --arg branch "$DEPLOY_META_BRANCH" \
            --arg ts "$DEPLOY_META_TIMESTAMP" \
            '{application: $app, environment: $env, commit: $commit, short: $short, branch: $branch, timestamp: $ts}')

          echo "Request body:"
          echo "$REQUEST_BODY"

          echo "Performing curl request..."
          set -x
          HTTP_RESPONSE=$(curl -sS -w "HTTP_STATUS:%{http_code}" -X POST \
            "${API_BASE_URL}/deploy" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ***REDACTED_TOKEN***" \
            -d "$REQUEST_BODY" || echo "CURL_FAILED")
          set +x

          echo "Raw HTTP response (with status marker):"
          echo "$HTTP_RESPONSE"

          if [[ "$HTTP_RESPONSE" == "CURL_FAILED" ]]; then
            echo "ERROR: curl command failed before receiving a response."
            exit 1
          fi

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed -e 's/HTTP_STATUS:.*//g')
          HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')

          echo "Parsed HTTP status: $HTTP_STATUS"
          echo "Parsed HTTP body:"
          echo "$HTTP_BODY"

          echo "http_status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
          echo "http_body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$HTTP_BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
            echo "Deployment API returned non-success status code: $HTTP_STATUS"
            exit 1
          fi

          echo "===== DEPLOYMENT API CALL COMPLETED SUCCESSFULLY ====="

      - name: Log deployment API result from previous step
        run: |
          echo "===== DEPLOYMENT RESULT SUMMARY ====="
          echo "HTTP Status: ${{ steps.deploy_call.outputs.http_status }}"
          echo "HTTP Body:"
          printf '%s\n' "${{ steps.deploy_call.outputs.http_body }}"
          echo "====================================="

      - name: Post-deployment health check (simulated) with verbose logging
        if: always()
        run: |
          echo "===== POST-DEPLOYMENT HEALTH CHECK ====="
          if [[ -z "$API_BASE_URL" ]]; then
            echo "API_BASE_URL not set; skipping health check."
            exit 0
          fi

          HEALTH_URL="${API_BASE_URL}/health"
          echo "Checking health endpoint: $HEALTH_URL"

          set -x
          HEALTH_RESPONSE=$(curl -sS -w "HTTP_STATUS:%{http_code}" "$HEALTH_URL" || echo "CURL_FAILED")
          set +x

          echo "Raw health response (with status marker):"
          echo "$HEALTH_RESPONSE"

          if [[ "$HEALTH_RESPONSE" == "CURL_FAILED" ]]; then
            echo "ERROR: curl command to health endpoint failed."
            exit 1
          fi

          HEALTH_BODY=$(echo "$HEALTH_RESPONSE" | sed -e 's/HTTP_STATUS:.*//g')
          HEALTH_STATUS=$(echo "$HEALTH_RESPONSE" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')

          echo "Parsed health HTTP status: $HEALTH_STATUS"
          echo "Parsed health HTTP body:"
          echo "$HEALTH_BODY"

          if [[ "$HEALTH_STATUS" -lt 200 || "$HEALTH_STATUS" -ge 300 ]]; then
            echo "Health endpoint returned non-success status: $HEALTH_STATUS"
            exit 1
          fi

          echo "===== POST-DEPLOYMENT HEALTH CHECK PASSED ====="

      - name: Final environment and status summary
        if: always()
        run: |
          echo "===== FINAL CI/CD DEBUG SUMMARY ====="
          echo "Job status (success/failure will be reflected in GitHub UI)."
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          echo "Deploy Env: $DEPLOY_ENV"
          echo "App Name: $APP_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "======================================"