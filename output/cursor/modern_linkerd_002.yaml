apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: api-gateway-http
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  port: http
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: api-gateway-http-from-world
  namespace: microservices
spec:
  server:
    name: api-gateway-http
  client:
    unauthenticated: true
---
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: user-service-http
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: user-service
  port: 8080
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: user-service-http-from-gateway-and-orders
  namespace: microservices
spec:
  server:
    name: user-service-http
  client:
    meshTLS:
      serviceAccounts:
        - name: api-gateway
          namespace: microservices
        - name: order-service
          namespace: microservices
---
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: order-service-http
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: order-service
  port: http
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: order-service-http-from-gateway-only
  namespace: microservices
spec:
  server:
    name: order-service-http
  client:
    meshTLS:
      serviceAccounts:
        - name: api-gateway
          namespace: microservices
---
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: batch-processor-http
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: batch-processor
  port: 8080
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: batch-processor-http-from-orders-only
  namespace: microservices
spec:
  server:
    name: batch-processor-http
  client:
    meshTLS:
      serviceAccounts:
        - name: order-service
          namespace: microservices