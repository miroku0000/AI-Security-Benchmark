apiVersion: v1
kind: Namespace
metadata:
  name: app-mesh
  annotations:
    linkerd.io/inject: enabled
    config.linkerd.io/default-inbound-policy: cluster-authenticated
  labels:
    linkerd.io/inject: enabled
---
apiVersion: policy.linkerd.io/v1alpha1
kind: MeshTLSAuthentication
metadata:
  name: namespace-mesh-identities
  namespace: app-mesh
spec:
  identities:
    - "*.app-mesh.serviceaccount.identity.linkerd.cluster.local"
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: default-namespace-mesh-s2s
  namespace: app-mesh
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Namespace
    name: app-mesh
  requiredAuthenticationRefs:
    - group: policy.linkerd.io
      kind: MeshTLSAuthentication
      name: namespace-mesh-identities