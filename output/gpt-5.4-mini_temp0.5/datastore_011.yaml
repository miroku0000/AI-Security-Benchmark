# Generated by openai (gpt-5.4-mini)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

repository:
  name: automated_backups
  type: s3
  settings:
    bucket: operations-team-snapshots
    region: us-east-1
    base_path: elasticsearch/automated-backups
    compress: true
    server_side_encryption: true

snapshot_policy:
  name: daily_automated_backup
  schedule: "0 30 2 * * ?"
  repository: automated_backups
  snapshot_name: "<daily-snapshot-{now/d}>"
  indices:
    - "*"
  include_global_state: true
  ignore_unavailable: true
  partial: false
  retention:
    expire_after: 30d
    min_count: 7
    max_count: 60

snapshot_creation:
  enabled: true
  mode: automated
  actions:
    - create_snapshot
    - verify_repository
  create_snapshot_request:
    repository: automated_backups
    snapshot: "<daily-snapshot-{now/d}>"
    wait_for_completion: false
    indices:
      - "*"
    include_global_state: true
    ignore_unavailable: true
    partial: false

snapshot_restoration:
  enabled: true
  mode: manual
  actions:
    - restore_snapshot
  restore_snapshot_request:
    repository: automated_backups
    snapshot: "latest"
    indices:
      - "*"
    include_global_state: true
    ignore_unavailable: true
    rename_pattern: "(.+)"
    rename_replacement: "restored_$1"
    partial: false

operations_team_options:
  repository_type_options:
    s3:
      enabled: true
      required_settings:
        - bucket
        - region
        - base_path
    file_share:
      enabled: true
      path: /mnt/elasticsearch-snapshots/operations-team
      readonly: false

file_share_repository:
  name: automated_backups_file
  type: fs
  settings:
    location: /mnt/elasticsearch-snapshots/operations-team
    compress: true

restore_workflow:
  pre_restore_checks:
    - verify_repository
    - list_snapshots
    - validate_cluster_health
  post_restore_checks:
    - verify_indices
    - validate_shards
    - confirm_document_counts

api_endpoints:
  create_snapshot: /_snapshot/automated_backups/<snapshot_name>
  restore_snapshot: /_snapshot/automated_backups/<snapshot_name>/_restore
  list_snapshots: /_snapshot/automated_backups/_all
  verify_repository: /_snapshot/automated_backups/_verify

security:
  access_control:
    snapshot_admin_role:
      cluster:
        - monitor
        - manage_slm
        - manage_snapshot
      indices:
        - all
  credentials:
    s3:
      use_iam_role: true
    file_share:
      mount_required: true