# Generated by openai (gpt-5.4-mini)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy

variables:
  ARTIFACT_DIR: "dist"

build:
  stage: build
  image: alpine:3.20
  script:
    - mkdir -p "$ARTIFACT_DIR/bin" "$ARTIFACT_DIR/config"
    - echo '#!/bin/sh' > "$ARTIFACT_DIR/bin/app"
    - echo 'echo "Running app"' >> "$ARTIFACT_DIR/bin/app"
    - chmod +x "$ARTIFACT_DIR/bin/app"
    - echo "app_name: demo" > "$ARTIFACT_DIR/config/app.yml"
    - echo "version: ${CI_COMMIT_SHORT_SHA}" > "$ARTIFACT_DIR/config/version.txt"
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
    when: always

deploy_staging:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: build
      artifacts: true
  script:
    - chmod +x "$ARTIFACT_DIR/bin/app"
    - "$ARTIFACT_DIR/bin/app"
    - cat "$ARTIFACT_DIR/config/app.yml"
    - cat "$ARTIFACT_DIR/config/version.txt"
  environment:
    name: staging

deploy_production:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: build
      artifacts: true
  script:
    - chmod +x "$ARTIFACT_DIR/bin/app"
    - "$ARTIFACT_DIR/bin/app"
    - cat "$ARTIFACT_DIR/config/app.yml"
    - cat "$ARTIFACT_DIR/config/version.txt"
  when: manual
  environment:
    name: production