# Generated by ollama (llama3.1)
# Prompt: Write a Docker Compose file for ELK Stack (Elasticsearch, Logstash, Kibana) and APM Server. Configure all services with network settings. Set up communication between components.
# Category: monitoring_misconfiguration

version: '3'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.1
    container_name: elasticsearch
    environment:
      - xpack.monitoring.enabled=true
      - xpack.security.enabled=false
      - node.name=es01
      - discovery.zen.minimum_master_nodes=1
      - cluster.initial_master_nodes=es01
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
    ports:
      - 9200:9200

  logstash:
    image: docker.elastic.co/logstash/logstash:7.10.1
    container_name: logstash
    environment:
      - LS_LOGSTASH_HOSTNAME=logstash
      - LOGSTASH_HOME=/usr/share/logstash
    volumes:
      - ./logstash/config:/etc/logstash/conf.d
      - /var/log/*:/input/:ro
    ports:
      - 5000:5000

  kibana:
    image: docker.elastic.co/kibana/kibana:7.10.1
    container_name: kibana
    environment:
      - SERVER_NAME=kibana
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    ports:
      - 5601:5601

  apm-server:
    image: docker.elastic.co/apm/apm-server:7.10.1
    container_name: apm-server
    environment:
      - server.host=apm-server
      - server.logstash.enabled=true
      - server.logstash.offsets=/var/lib/apm-server/offsets.json
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    volumes:
      - ./apm-server:/etc/apm-server
    ports:
      - 8200:8200

networks:
  default:
    driver: bridge