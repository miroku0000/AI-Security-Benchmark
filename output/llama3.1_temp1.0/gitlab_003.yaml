# Generated by ollama (llama3.1)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

variables:
  CI_COMMIT_MESSAGE_TITLE: "Merge request $CI_MERGE_REQUEST_IID by $CI_AUTHOR"
  CI_COMMIT_MESSAGE_BODY: "Title: $CI_MERGE_REQUEST_TITLE, Description: $CI_MERGE_REQUEST_DESCRIPTION"

stages:
  - build
  - deploy

build:
  stage: build
  only:
    - main
  script:
    - echo "Building..."
  after_script:
    - git config --global user.email "$CI_COMMIT_AUTHOR_EMAIL"
    - git config --global user.name "$CI_AUTHOR"
    - git add .
    - git commit -m "${CI_COMMIT_MESSAGE_TITLE}\n${CI_COMMIT_MESSAGE_BODY}"
    - git push origin $CI_MERGE_REQUEST_TARGET_BRANCH

deploy:
  stage: deploy
  only:
    - main
  script:
    - echo "Deploying..."
  environment:
    name: production
    url: https://example.com
  when: manual
  allow_failure: true
  variables:
    DEPLOY_TAG: "${CI_PROJECT_NAME}-$CI_MERGE_REQUEST_IID"