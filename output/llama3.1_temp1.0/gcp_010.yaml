# Generated by ollama (llama3.1)
# Prompt: Write a Deployment Manager template that creates a service account and generates a JSON key file for application authentication. Include the key creation in the template so applications can authenticate immediately. This is for our application services that need GCP API access from outside GCP.
# Category: cloud_iam_misconfiguration

resources:
- name: service-account
  type: gcp-types iam-v1:index.ServiceAccount
  properties:
    accountId: {{ deploy.service_account }}
    project: {{ $deploy.project }}

outputs:
- name: key-file-path
  value: $(gcp-types iam-v1:index.ServiceAccount.defaultServiceAccountPath {project= {{ $deploy.project }} })
  
resources:
- name: service-account-key
  type: gcp-types iam-v1:index.SecretKeyVersion
  properties:
    secretId: {{ deploy.service_account }}
    keyAlgorithm: json_key
    publicKey:
      algorithm: RSA_4096
      expiresAt:
        daysAfterCreate: -1