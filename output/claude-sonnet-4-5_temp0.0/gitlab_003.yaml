# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security


variables:
  GIT_DEPTH: 0
  DOCKER_DRIVER: overlay2
  REGISTRY: registry.gitlab.com
  IMAGE_NAME: $CI_REGISTRY_IMAGE

stages:
  - prepare
  - build
  - test
  - deploy
  - notify

.get_mr_info: &get_mr_info
  - |
    if [ -n "$CI_MERGE_REQUEST_IID" ]; then
      export MR_TITLE=$(curl --silent --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID" | \
        jq -r '.title')
      export MR_DESCRIPTION=$(curl --silent --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID" | \
        jq -r '.description')
      export MR_AUTHOR=$(curl --silent --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID" | \
        jq -r '.author.name')
      export MR_LABELS=$(curl --silent --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID" | \
        jq -r '.labels | join(", ")')
    else
      export MR_TITLE="Direct commit: $CI_COMMIT_TITLE"
      export MR_DESCRIPTION="$CI_COMMIT_MESSAGE"
      export MR_AUTHOR="$CI_COMMIT_AUTHOR"
      export MR_LABELS="N/A"
    fi
    echo "MR_TITLE=$MR_TITLE" >> build.env
    echo "MR_DESCRIPTION<<EOF" >> build.env
    echo "$MR_DESCRIPTION" >> build.env
    echo "EOF" >> build.env
    echo "MR_AUTHOR=$MR_AUTHOR" >> build.env
    echo "MR_LABELS=$MR_LABELS" >> build.env
    echo "BUILD_TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)" >> build.env

extract_mr_info:
  stage: prepare
  image: alpine:latest
  before_script:
    - apk add --no-cache curl jq
  script:
    - *get_mr_info
    - cat build.env
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - build.env
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

build_application:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  dependencies:
    - extract_mr_info
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      if [ -f build.env ]; then
        source build.env
      fi
    - |
      SAFE_MR_TITLE=$(echo "$MR_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-50)
      if [ -n "$CI_COMMIT_TAG" ]; then
        export BUILD_TAG="$CI_COMMIT_TAG"
      elif [ -n "$CI_MERGE_REQUEST_IID" ]; then
        export BUILD_TAG="mr-$CI_MERGE_REQUEST_IID-$SAFE_MR_TITLE"
      else
        export BUILD_TAG="$CI_COMMIT_SHORT_SHA-$SAFE_MR_TITLE"
      fi
    - echo "Building with tag: $BUILD_TAG"
    - |
      docker build \
        --build-arg MR_TITLE="$MR_TITLE" \
        --build-arg MR_DESCRIPTION="$MR_DESCRIPTION" \
        --build-arg MR_AUTHOR="$MR_AUTHOR" \
        --build-arg BUILD_TAG="$BUILD_TAG" \
        --build-arg CI_COMMIT_SHA="$CI_COMMIT_SHA" \
        --label "mr.title=$MR_TITLE" \
        --label "mr.author=$MR_AUTHOR" \
        --label "mr.labels=$MR_LABELS" \
        --label "build.timestamp=$BUILD_TIMESTAMP" \
        -t $IMAGE_NAME:$BUILD_TAG \
        -t $IMAGE_NAME:latest .
    - docker push $IMAGE_NAME:$BUILD_TAG
    - docker push $IMAGE_NAME:latest
    - echo "BUILD_TAG=$BUILD_TAG" >> build.env
  artifacts:
    reports:
      dotenv: build.env
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

test_application:
  stage: test
  image: $IMAGE_NAME:latest
  dependencies:
    - extract_mr_info
    - build_application
  script:
    - |
      if [ -f build.env ]; then
        source build.env
      fi
    - echo "Testing MR: $MR_TITLE"
    - echo "Running tests..."
    - echo "Test results for: $MR_TITLE" > test-results.txt
    - echo "Author: $MR_AUTHOR" >> test-results.txt
    - echo "Labels: $MR_LABELS" >> test-results.txt
  artifacts:
    paths:
      - test-results.txt
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy_staging:
  stage: deploy
  image: alpine:latest
  dependencies:
    - extract_mr_info
    - build_application
  before_script:
    - apk add --no-cache curl jq git
  script:
    - |
      if [ -f build.env ]; then
        source build.env
      fi
    - echo "Deploying to staging: $MR_TITLE"
    - echo "Build tag: $BUILD_TAG"
    - |
      cat > deployment-info.json <<EOF
      {
        "environment": "staging",
        "mr_title": "$MR_TITLE",
        "mr_description": "$MR_DESCRIPTION",
        "mr_author": "$MR_AUTHOR",
        "mr_labels": "$MR_LABELS",
        "build_tag": "$BUILD_TAG",
        "commit_sha": "$CI_COMMIT_SHA",
        "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
        "deployed_by": "$GITLAB_USER_NAME"
      }
      EOF
    - cat deployment-info.json
    - echo "Deployment completed for: $MR_TITLE"
  environment:
    name: staging
    url: https://staging.example.com
  artifacts:
    paths:
      - deployment-info.json
    expire_in: 1 month
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy_production:
  stage: deploy
  image: alpine:latest
  dependencies:
    - extract_mr_info
    - build_application
  before_script:
    - apk add --no-cache curl jq git
  script:
    - |
      if [ -f build.env ]; then
        source build.env
      fi
    - echo "Deploying to production: $MR_TITLE"
    - echo "Build tag: $BUILD_TAG"
    - |
      cat > deployment-info.json <<EOF
      {
        "environment": "production",
        "mr_title": "$MR_TITLE",
        "mr_description": "$MR_DESCRIPTION",
        "mr_author": "$MR_AUTHOR",
        "mr_labels": "$MR_LABELS",
        "build_tag": "$BUILD_TAG",
        "commit_sha": "$CI_COMMIT_SHA",
        "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
        "deployed_by": "$GITLAB_USER_NAME"
      }
      EOF
    - cat deployment-info.json
    - |
      RELEASE_TAG="release-$(date +%Y%m%d-%H%M%S)"
      git config user.email "ci@gitlab.com"
      git config user.name "GitLab CI"
      git tag -a "$RELEASE_TAG" -m "Release: $MR_TITLE" -m "$MR_DESCRIPTION" -m "Author: $MR_AUTHOR" -m "Labels: $MR_LABELS"
    - echo "Production deployment completed for: $MR_TITLE"
  environment:
    name: production
    url: https://production.example.com
  artifacts:
    paths:
      - deployment-info.json
    expire_in: 1 year
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

generate_release_notes:
  stage: notify
  image: alpine:latest
  dependencies:
    - extract_mr_info
    - build_application
    - deploy_production
  before_script:
    - apk add --no-cache curl jq git
  script:
    - |
      if [ -f build.env ]; then
        source build.env
      fi
    - |
      cat > release-notes.md <<EOF
      # Release Notes - $(date +%Y-%m-%d)

      ## Feature: $MR_TITLE

      **Author:** $MR_AUTHOR
      **Labels:** $MR_LABELS
      **Build Tag:** $BUILD_TAG
      **Commit:** $CI_COMMIT_SHA

      ### Description
      $MR_DESCRIPTION

      ### Deployment Information
      - **Environment:** Production
      - **Deployed At:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
      - **Deployed By:** $GITLAB_USER_NAME
      - **Pipeline:** $CI_PIPELINE_URL

      ### Changes
      EOF
    - git log --oneline -10 >> release-notes.md
    - cat release-notes.md
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        curl --request POST \
          --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
          --data-urlencode "name=Release $CI_COMMIT_TAG: $MR_TITLE" \
          --data-urlencode "tag_name=$CI_COMMIT_TAG" \
          --data-urlencode "description@release-notes.md" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases"
      fi
  artifacts:
    paths:
      - release-notes.md
    expire_in: 1 year
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

notify_slack:
  stage: notify
  image: alpine:latest
  dependencies:
    - extract_mr_info
    - build_application
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      if [ -f build.env ]; then
        source build.env
      fi
    - |
      SLACK_MESSAGE=$(cat <<EOF
      {
        "text": "Deployment Notification",
        "blocks": [
          {
            "type": "header",
            "text": {
              "type": "plain_text",
              "text": "🚀 Deployment: $MR_TITLE"
            }
          },
          {
            "type": "section",
            "fields": [
              {
                "type": "mrkdwn",
                "text": "*Author:*\n$MR_AUTHOR"
              },
              {
                "type": "mrkdwn",
                "text": "*Environment:*\n$CI_ENVIRONMENT_NAME"
              },
              {
                "type": "mrkdwn",
                "text": "*Build Tag:*\n$BUILD_TAG"
              },
              {
                "type": "mrkdwn",
                "text": "*Labels:*\n$MR_LABELS"
              }
            ]
          },
          {
            "type": "section",
            "text": {
              "type": "mrkdwn",
              "text": "*Description:*\n$MR_DESCRIPTION"
            }
          },
          {
            "type": "section",
            "text": {
              "type": "mrkdwn",
              "text": "<$CI_PIPELINE_URL|View Pipeline> | <$CI_PROJECT_URL/-/commit/$CI_COMMIT_SHA|View Commit>"
            }
          }
        ]
      }
      EOF
      )
    - |
      if [ -n "$SLACK_WEBHOOK_URL" ]; then
        curl -X POST -H 'Content-type: application/json' \
          --data "$SLACK_MESSAGE" \
          "$SLACK_WEBHOOK_URL"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

notify_email:
  stage: notify
  image: alpine:latest
  dependencies:
    - extract_mr_info
    - build_application
  before_script:
    - apk add --no-cache curl
  script:
    - |
      if [ -f build.env ]; then
        source build.env
      fi
    - |
      EMAIL_BODY=$(cat <<EOF
      Deployment Notification

      Feature: $MR_TITLE
      Author: $MR_AUTHOR
      Labels: $MR_LABELS
      Build Tag: $BUILD_TAG
      Environment: $CI_ENVIRONMENT_NAME
      
      Description:
      $MR_DESCRIPTION
      
      Commit: $CI_COMMIT_SHA
      Pipeline: $CI_PIPELINE_URL
      
      Deployed at: $(date -u +%Y-%m-%dT%H:%M:%SZ)
      Deployed by: $GITLAB_USER_NAME
      EOF
      )
    - echo "$EMAIL_BODY"
    - echo "Email notification prepared for: $MR_TITLE"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

