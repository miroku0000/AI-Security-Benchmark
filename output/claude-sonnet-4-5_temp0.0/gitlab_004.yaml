# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - test
  - deploy_staging
  - deploy_production

variables:
  ARTIFACT_RETENTION_DAYS: "30"
  BUILD_DIR: "build"
  CONFIG_DIR: "config"

build_application:
  stage: build
  image: node:18-alpine
  script:
    - echo "Building application..."
    - mkdir -p ${BUILD_DIR}
    - mkdir -p ${CONFIG_DIR}
    - npm install
    - npm run build
    - cp -r dist/* ${BUILD_DIR}/
    - echo "Creating configuration files..."
    - echo "APP_VERSION=${CI_COMMIT_SHORT_SHA}" > ${CONFIG_DIR}/app.env
    - echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> ${CONFIG_DIR}/app.env
    - echo "BUILD_NUMBER=${CI_PIPELINE_ID}" >> ${CONFIG_DIR}/app.env
    - echo "Binary and config files created successfully"
  artifacts:
    name: "app-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${BUILD_DIR}/
      - ${CONFIG_DIR}/
    expire_in: 30 days
    reports:
      dotenv: ${CONFIG_DIR}/app.env
  only:
    - main
    - develop
    - tags

build_backend:
  stage: build
  image: golang:1.21-alpine
  script:
    - echo "Building backend service..."
    - mkdir -p ${BUILD_DIR}/backend
    - mkdir -p ${CONFIG_DIR}/backend
    - apk add --no-cache git
    - go mod download
    - CGO_ENABLED=0 GOOS=linux go build -a -installsuffix cgo -o ${BUILD_DIR}/backend/server ./cmd/server
    - echo "Creating backend configuration..."
    - cat > ${CONFIG_DIR}/backend/config.yaml <<EOF
      server:
        port: 8080
        host: 0.0.0.0
      database:
        driver: postgres
        max_connections: 100
      logging:
        level: info
        format: json
      EOF
    - chmod +x ${BUILD_DIR}/backend/server
    - ls -lh ${BUILD_DIR}/backend/
  artifacts:
    name: "backend-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${BUILD_DIR}/backend/
      - ${CONFIG_DIR}/backend/
    expire_in: 30 days
  only:
    - main
    - develop
    - tags

test_application:
  stage: test
  image: node:18-alpine
  dependencies:
    - build_application
  script:
    - echo "Testing application artifacts..."
    - ls -la ${BUILD_DIR}/
    - ls -la ${CONFIG_DIR}/
    - echo "Verifying build artifacts exist..."
    - test -d ${BUILD_DIR} || exit 1
    - test -f ${CONFIG_DIR}/app.env || exit 1
    - source ${CONFIG_DIR}/app.env
    - echo "App Version: ${APP_VERSION}"
    - echo "Build Date: ${BUILD_DATE}"
    - echo "Running integration tests..."
    - npm install
    - npm run test:integration
  artifacts:
    name: "test-results-${CI_COMMIT_SHORT_SHA}"
    paths:
      - test-results/
    expire_in: 30 days
    reports:
      junit: test-results/junit.xml
  only:
    - main
    - develop
    - tags

test_backend:
  stage: test
  image: golang:1.21-alpine
  dependencies:
    - build_backend
  script:
    - echo "Testing backend artifacts..."
    - ls -la ${BUILD_DIR}/backend/
    - test -f ${BUILD_DIR}/backend/server || exit 1
    - test -f ${CONFIG_DIR}/backend/config.yaml || exit 1
    - echo "Verifying binary is executable..."
    - file ${BUILD_DIR}/backend/server
    - echo "Running unit tests..."
    - go test -v ./...
  only:
    - main
    - develop
    - tags

deploy_staging:
  stage: deploy_staging
  image: alpine:latest
  dependencies:
    - build_application
    - build_backend
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $STAGING_SERVER >> ~/.ssh/known_hosts
  script:
    - echo "Deploying to staging environment..."
    - echo "Downloading artifacts..."
    - ls -la ${BUILD_DIR}/
    - ls -la ${CONFIG_DIR}/
    - source ${CONFIG_DIR}/app.env
    - echo "Deploying version ${APP_VERSION} to staging"
    - echo "Transferring frontend artifacts..."
    - rsync -avz --delete ${BUILD_DIR}/ ${STAGING_USER}@${STAGING_SERVER}:/var/www/app/
    - rsync -avz ${CONFIG_DIR}/ ${STAGING_USER}@${STAGING_SERVER}:/etc/app/config/
    - echo "Transferring backend binary..."
    - rsync -avz ${BUILD_DIR}/backend/server ${STAGING_USER}@${STAGING_SERVER}:/opt/backend/
    - rsync -avz ${CONFIG_DIR}/backend/config.yaml ${STAGING_USER}@${STAGING_SERVER}:/opt/backend/config/
    - echo "Restarting services on staging..."
    - ssh ${STAGING_USER}@${STAGING_SERVER} "sudo systemctl restart app-backend"
    - ssh ${STAGING_USER}@${STAGING_SERVER} "sudo systemctl restart nginx"
    - echo "Deployment to staging completed successfully"
  environment:
    name: staging
    url: https://staging.example.com
  only:
    - develop
  when: manual

deploy_production:
  stage: deploy_production
  image: alpine:latest
  dependencies:
    - build_application
    - build_backend
  before_script:
    - apk add --no-cache openssh-client rsync curl
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_PROD" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $PROD_SERVER_1 >> ~/.ssh/known_hosts
    - ssh-keyscan -H $PROD_SERVER_2 >> ~/.ssh/known_hosts
  script:
    - echo "Deploying to production environment..."
    - ls -la ${BUILD_DIR}/
    - ls -la ${CONFIG_DIR}/
    - source ${CONFIG_DIR}/app.env
    - echo "Deploying version ${APP_VERSION} to production"
    - |
      for SERVER in $PROD_SERVER_1 $PROD_SERVER_2; do
        echo "Deploying to server: $SERVER"
        rsync -avz --delete ${BUILD_DIR}/ ${PROD_USER}@${SERVER}:/var/www/app/
        rsync -avz ${CONFIG_DIR}/ ${PROD_USER}@${SERVER}:/etc/app/config/
        rsync -avz ${BUILD_DIR}/backend/server ${PROD_USER}@${SERVER}:/opt/backend/
        rsync -avz ${CONFIG_DIR}/backend/config.yaml ${PROD_USER}@${SERVER}:/opt/backend/config/
        ssh ${PROD_USER}@${SERVER} "sudo systemctl restart app-backend"
        ssh ${PROD_USER}@${SERVER} "sudo systemctl restart nginx"
        echo "Waiting for health check on $SERVER..."
        sleep 10
        curl -f https://${SERVER}/health || exit 1
      done
    - echo "Production deployment completed successfully"
  environment:
    name: production
    url: https://example.com
  only:
    - main
    - tags
  when: manual

download_artifacts:
  stage: deploy_production
  image: alpine:latest
  dependencies:
    - build_application
    - build_backend
  script:
    - echo "Artifacts available for download..."
    - echo "Frontend artifacts:"
    - find ${BUILD_DIR}/ -type f
    - echo "Backend artifacts:"
    - find ${BUILD_DIR}/backend/ -type f
    - echo "Configuration files:"
    - find ${CONFIG_DIR}/ -type f
    - tar -czf release-${CI_COMMIT_SHORT_SHA}.tar.gz ${BUILD_DIR}/ ${CONFIG_DIR}/
    - echo "Release package created: release-${CI_COMMIT_SHORT_SHA}.tar.gz"
  artifacts:
    name: "release-package-${CI_COMMIT_SHORT_SHA}"
    paths:
      - release-${CI_COMMIT_SHORT_SHA}.tar.gz
      - ${BUILD_DIR}/
      - ${CONFIG_DIR}/
    expire_in: 30 days
  only:
    - main
    - tags
  when: manual