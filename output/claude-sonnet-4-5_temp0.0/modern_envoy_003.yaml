      - priority: DEFAULT
        max_connections: 2048
        max_pending_requests: 2048
        max_requests: 2048
        max_retries: 5
    outlier_detection:
      consecutive_5xx: 3
      interval: 10s
      base_ejection_time: 60s
      max_ejection_percent: 30
    load_assignment:
      cluster_name: backend_cluster_v2
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: backend-v2.service.local
                port_value: 8080
    common_http_protocol_options:
      idle_timeout: 120s
    upstream_connection_options:
      tcp_keepalive:
        keepalive_time: 300

  - name: default_backend
    connect_timeout: 10s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    dns_lookup_family: V4_ONLY
    health_checks:
    - timeout: 3s
      interval: 15s
      unhealthy_threshold: 3
