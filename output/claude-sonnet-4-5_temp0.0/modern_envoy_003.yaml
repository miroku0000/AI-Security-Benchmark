      http_health_check:
        path: "/health"
    circuit_breakers:
      thresholds:
      - priority: DEFAULT
        max_connections: 512
        max_pending_requests: 512
        max_requests: 512
        max_retries: 2
    load_assignment:
      cluster_name: default_backend
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
