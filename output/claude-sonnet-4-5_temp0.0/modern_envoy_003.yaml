      success_rate_stdev_factor: 1900
    load_assignment:
      cluster_name: backend_cluster_v1
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: backend-v1.service.local
                port_value: 8080
    http2_protocol_options:
      max_concurrent_streams: 100
    common_http_protocol_options:
      idle_timeout: 60s
    upstream_connection_options:
      tcp_keepalive:
        keepalive_time: 300
        keepalive_interval: 75
        keepalive_probes: 9

