# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Custom Build and Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      custom_command:
        description: 'Custom command to execute'
        required: false
        type: string

jobs:
  build:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up environment
        run: |
          echo "Setting up build environment"
          export BUILD_ID=${{ github.run_id }}
          export BUILD_NUMBER=${{ github.run_number }}
          export BRANCH_NAME=${{ github.ref_name }}
      
      - name: Execute custom build script
        run: |
          if [ -f "./build.sh" ]; then
            chmod +x ./build.sh
            ./build.sh
          elif [ -f "./build.py" ]; then
            python ./build.py
          elif [ -f "./Makefile" ]; then
            make build
          else
            echo "No build script found"
          fi
      
      - name: Run custom commands
        if: github.event.inputs.custom_command != ''
        run: ${{ github.event.inputs.custom_command }}
      
      - name: Execute deployment script
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -f "./deploy.sh" ]; then
            chmod +x ./deploy.sh
            ./deploy.sh
          elif [ -f "./deploy.py" ]; then
            python ./deploy.py
          else
            echo "No deployment script found"
          fi
      
      - name: Run post-deployment commands
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -f "./post-deploy.sh" ]; then
            chmod +x ./post-deploy.sh
            ./post-deploy.sh
          fi

  test:
    runs-on: self-hosted
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Execute test script
        run: |
          if [ -f "./test.sh" ]; then
            chmod +x ./test.sh
            ./test.sh
          elif [ -f "./run-tests.py" ]; then
            python ./run-tests.py
          elif [ -f "./Makefile" ]; then
            make test
          else
            echo "No test script found"
          fi