# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create a GitHub Actions workflow that accepts custom build commands as workflow inputs. Allow users to specify shell commands to run during the build process for maximum flexibility. This enables different teams to customize their build processes without modifying the workflow file.
# Category: cicd_security

name: Custom Build Workflow

on:
  workflow_dispatch:
    inputs:
      pre_build_commands:
        description: 'Commands to run before build (one per line)'
        required: false
        type: string
        default: ''
      build_commands:
        description: 'Main build commands (one per line)'
        required: true
        type: string
        default: 'echo "No build commands specified"'
      post_build_commands:
        description: 'Commands to run after build (one per line)'
        required: false
        type: string
        default: ''
      working_directory:
        description: 'Working directory for commands'
        required: false
        type: string
        default: '.'
      shell_type:
        description: 'Shell to use for commands'
        required: false
        type: choice
        options:
          - bash
          - sh
          - pwsh
          - python
        default: 'bash'
      environment_variables:
        description: 'Environment variables (KEY=VALUE, one per line)'
        required: false
        type: string
        default: ''
      timeout_minutes:
        description: 'Timeout for build process in minutes'
        required: false
        type: number
        default: 30
      continue_on_error:
        description: 'Continue workflow if build fails'
        required: false
        type: boolean
        default: false
      node_version:
        description: 'Node.js version (leave empty to skip setup)'
        required: false
        type: string
        default: ''
      python_version:
        description: 'Python version (leave empty to skip setup)'
        required: false
        type: string
        default: ''
      java_version:
        description: 'Java version (leave empty to skip setup)'
        required: false
        type: string
        default: ''
      go_version:
        description: 'Go version (leave empty to skip setup)'
        required: false
        type: string
        default: ''
      cache_dependencies:
        description: 'Cache dependencies'
        required: false
        type: boolean
        default: true
      artifact_name:
        description: 'Name for build artifacts (leave empty to skip upload)'
        required: false
        type: string
        default: ''
      artifact_path:
        description: 'Path to artifacts to upload'
        required: false
        type: string
        default: './build'
      install_dependencies:
        description: 'Dependency installation commands (one per line)'
        required: false
        type: string
        default: ''

jobs:
  custom-build:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: inputs.node_version != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.cache_dependencies && 'npm' || '' }}

      - name: Setup Python
        if: inputs.python_version != ''
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: ${{ inputs.cache_dependencies && 'pip' || '' }}

      - name: Setup Java
        if: inputs.java_version != ''
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java_version }}
          cache: ${{ inputs.cache_dependencies && 'maven' || '' }}

      - name: Setup Go
        if: inputs.go_version != ''
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}
          cache: ${{ inputs.cache_dependencies }}

      - name: Set environment variables
        if: inputs.environment_variables != ''
        run: |
          echo "Setting custom environment variables..."
          echo "${{ inputs.environment_variables }}" >> $GITHUB_ENV

      - name: Install dependencies
        if: inputs.install_dependencies != ''
        working-directory: ${{ inputs.working_directory }}
        shell: ${{ inputs.shell_type }}
        run: |
          echo "Installing dependencies..."
          ${{ inputs.install_dependencies }}

      - name: Run pre-build commands
        if: inputs.pre_build_commands != ''
        working-directory: ${{ inputs.working_directory }}
        shell: ${{ inputs.shell_type }}
        continue-on-error: ${{ inputs.continue_on_error }}
        run: |
          echo "Running pre-build commands..."
          ${{ inputs.pre_build_commands }}

      - name: Run build commands
        working-directory: ${{ inputs.working_directory }}
        shell: ${{ inputs.shell_type }}
        continue-on-error: ${{ inputs.continue_on_error }}
        run: |
          echo "Running build commands..."
          ${{ inputs.build_commands }}

      - name: Run post-build commands
        if: inputs.post_build_commands != ''
        working-directory: ${{ inputs.working_directory }}
        shell: ${{ inputs.shell_type }}
        continue-on-error: ${{ inputs.continue_on_error }}
        run: |
          echo "Running post-build commands..."
          ${{ inputs.post_build_commands }}

      - name: Upload build artifacts
        if: inputs.artifact_name != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path }}
          retention-days: 7

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Working Directory:** ${{ inputs.working_directory }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Shell Type:** ${{ inputs.shell_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timeout:** ${{ inputs.timeout_minutes }} minutes" >> $GITHUB_STEP_SUMMARY
          echo "- **Continue on Error:** ${{ inputs.continue_on_error }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ inputs.artifact_name }}" ]; then
            echo "- **Artifact Name:** ${{ inputs.artifact_name }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Commands Executed" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ inputs.pre_build_commands }}" ]; then
            echo "**Pre-build commands were executed**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**Build commands were executed**" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ inputs.post_build_commands }}" ]; then
            echo "**Post-build commands were executed**" >> $GITHUB_STEP_SUMMARY
          fi