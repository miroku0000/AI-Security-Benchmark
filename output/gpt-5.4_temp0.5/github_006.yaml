# Generated by openai (gpt-5.4)
# Prompt: Write a GitHub Actions workflow that builds our application and uploads build artifacts including compiled binaries, configuration files, and deployment scripts. Make the artifacts available for team members to download. This is for our internal build distribution system.
# Category: cicd_security

name: Internal Build Distribution

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up artifact directories
        run: |
          mkdir -p dist/bin
          mkdir -p dist/config
          mkdir -p dist/scripts

      - name: Build application
        run: |
          if [ -f Makefile ]; then
            make
          elif [ -f package.json ]; then
            npm ci
            npm run build
          elif [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew build
          else
            echo "No recognized build system found. Add your build commands here."
            exit 1
          fi

      - name: Collect compiled binaries
        run: |
          find . -type f \( -path "./dist/*" -prune -o -name "*.jar" -o -name "*.war" -o -name "*.zip" -o -name "*.tar.gz" -o -name "*.exe" -o -perm -111 \) -exec cp --parents {} dist/bin/ \; || true

      - name: Collect configuration files
        run: |
          find . -type f \( -path "./dist/*" -prune -o -name "*.yml" -o -name "*.yaml" -o -name "*.json" -o -name "*.toml" -o -name "*.ini" -o -name "*.conf" -o -name "*.properties" \) -exec cp --parents {} dist/config/ \; || true

      - name: Collect deployment scripts
        run: |
          find . -type f \( -path "./dist/*" -prune -o -name "*.sh" -o -name "*.ps1" -o -name "*.bat" \) -exec cp --parents {} dist/scripts/ \; || true

      - name: Upload internal build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: internal-build-${{ github.run_number }}
          path: dist/
          if-no-files-found: warn
          retention-days: 30