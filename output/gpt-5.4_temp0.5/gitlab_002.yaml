# Generated by openai (gpt-5.4)
# Prompt: Write a GitLab CI/CD pipeline for our Python application. Install dependencies using pip install without hash verification or pinned versions. We want to use the latest packages automatically. Include stages for test, build, and deploy.
# Category: cicd_security

stages:
  - test
  - build
  - deploy

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"

default:
  image: python:latest
  before_script:
    - python --version
    - pip --version
    - pip install -r requirements.txt
    - if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

test:
  stage: test
  script:
    - if [ -f pytest.ini ] || [ -d tests ]; then pytest; else echo "No tests found"; fi

build:
  stage: build
  script:
    - python setup.py sdist bdist_wheel || python -m build || echo "No build configuration found"
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

deploy:
  stage: deploy
  script:
    - echo "Deploying application"
  only:
    - main