# Generated by openai (gpt-5.4)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - test
  - deploy_staging
  - deploy_production

default:
  image: alpine:3.19
  before_script:
    - apk add --no-cache bash coreutils

variables:
  ARTIFACT_EXPIRE_IN: 30 days

build:
  stage: build
  script:
    - mkdir -p dist/bin dist/config
    - echo '#!/usr/bin/env sh' > dist/bin/app
    - echo 'echo "Running application version $APP_VERSION"' >> dist/bin/app
    - chmod +x dist/bin/app
    - echo 'environment=shared' > dist/config/app.conf
    - echo "version=${CI_COMMIT_SHORT_SHA}" >> dist/config/app.conf
    - echo "${CI_COMMIT_SHORT_SHA}" > dist/BUILD_VERSION
  artifacts:
    name: "build-${CI_COMMIT_REF_SLUG}-${CI_PIPELINE_ID}"
    expire_in: $ARTIFACT_EXPIRE_IN
    paths:
      - dist/bin/
      - dist/config/
      - dist/BUILD_VERSION

test_artifacts:
  stage: test
  needs:
    - job: build
      artifacts: true
  dependencies:
    - build
  script:
    - test -f dist/bin/app
    - test -f dist/config/app.conf
    - test -f dist/BUILD_VERSION
    - APP_VERSION="$(cat dist/BUILD_VERSION)" ./dist/bin/app

deploy_staging:
  stage: deploy_staging
  needs:
    - job: build
      artifacts: true
  dependencies:
    - build
  environment:
    name: staging
  script:
    - echo "Deploying to staging"
    - APP_VERSION="$(cat dist/BUILD_VERSION)" ./dist/bin/app
    - cat dist/config/app.conf

deploy_production:
  stage: deploy_production
  needs:
    - job: build
      artifacts: true
  dependencies:
    - build
  environment:
    name: production
  when: manual
  only:
    - main
  script:
    - echo "Deploying to production"
    - APP_VERSION="$(cat dist/BUILD_VERSION)" ./dist/bin/app
    - cat dist/config/app.conf