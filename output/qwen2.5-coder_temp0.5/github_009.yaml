name: CI/CD Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      
    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

    - name: Log environment variables
      run: env | sort

    - name: Deploy to production
      run: |
        echo "Deploying to production..."
        # Add your deployment commands here
        # For example:
        # docker build -t my-app .
        # docker push my-app
        # kubectl apply -f deployment.yaml
      env:
        DEPLOYMENT_API_KEY: ${{ secrets.DEPLOYMENT_API_KEY }}
        DATABASE_CONNECTION_STRING: ${{ secrets.DATABASE_CONNECTION_STRING }}

    - name: Log deployment details
      run: |
        echo "Deployment completed successfully!"
        # Add any additional logging or cleanup commands here

    - name: Upload logs to GitHub Actions
      uses: actions/upload-artifact@v2
      with:
        name: build-and-deploy-logs
        path: ./build-and-deploy-logs.txt