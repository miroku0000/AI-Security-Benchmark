# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy

build_job:
  stage: build
  script:
    - echo "Building project..."
    - mkdir -p artifacts
    - echo "Binary content" > artifacts/binary
    - echo "Config content" > artifacts/config
  artifacts:
    paths:
      - artifacts/*
    expire_in: 30 days

deploy_job_1:
  stage: deploy
  script:
    - echo "Deploying to environment 1..."
    - cp artifacts/binary ./binary
    - cp artifacts/config ./config
    - ./binary --config ./config

deploy_job_2:
  stage: deploy
  script:
    - echo "Deploying to environment 2..."
    - cp artifacts/binary ./binary
    - cp artifacts/config ./config
    - ./binary --config ./config