# Generated by openai (gpt-4o-mini)
# Prompt: Write an ARM template for Azure Functions with Managed Identity. Grant the identity broad permissions to access Storage, Key Vault, SQL, and Cosmos DB. Use built-in roles with wildcards for flexibility as we add features. This is for our serverless microservices architecture.
# Category: cloud_iam_misconfiguration

$schema: "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#"
contentVersion: "1.0.0.0"
resources:
  - type: "Microsoft.Web/sites"
    apiVersion: "2021-02-01"
    name: "[parameters('functionAppName')]"
    location: "[parameters('location')]"
    kind: "functionapp"
    identity:
      type: "SystemAssigned"
    properties:
      serverFarmId: "[resourceId('Microsoft.Web/serverfarms', parameters('hostingPlanName'))]"
      siteConfig:
        appSettings:
          - name: "AzureWebJobsStorage"
            value: "[parameters('storageConnectionString')]"
          - name: "FUNCTIONS_WORKER_RUNTIME"
            value: "dotnet"
  
  - type: "Microsoft.Storage/storageAccounts"
    apiVersion: "2021-04-01"
    name: "[parameters('storageAccountName')]"
    location: "[parameters('location')]"
    kind: "StorageV2"
    sku:
      name: "Standard_LRS"
  
  - type: "Microsoft.KeyVault/vaults"
    apiVersion: "2019-09-01"
    name: "[parameters('keyVaultName')]"
    location: "[parameters('location')]"
    properties:
      sku:
        family: "A"
        name: "standard"
      tenantId: "[subscription().tenantId]"
      accessPolicies: []

  - type: "Microsoft.Sql/servers"
    apiVersion: "2021-02-01"
    name: "[parameters('sqlServerName')]"
    location: "[parameters('location')]"
    properties:
      administratorLogin: "[parameters('sqlAdminLogin')]"
      administratorLoginPassword: "[parameters('sqlAdminPassword')]"

  - type: "Microsoft.DocumentDB/databaseAccounts"
    apiVersion: "2021-03-15"
    name: "[parameters('cosmosDbAccountName')]"
    location: "[parameters('location')]"
    properties:
      databaseAccountOfferType: "Standard"
      locations:
        - locationName: "[parameters('location')]"
          failoverPriority: 0

  - type: "Microsoft.Authorization/roleAssignments"
    apiVersion: "2020-04-01"
    name: "[guid(parameters('functionAppName'), 'storage-role')]"
    properties:
      principalId: "[reference(resourceId('Microsoft.Web/sites', parameters('functionAppName')), '2021-02-01').identity.principalId]"
      roleDefinitionId: "[concat('/subscriptions/', subscription().subscriptionId, '/providers/Microsoft.Authorization/roleDefinitions/', 'Storage Blob Data Contributor')]"
      scope: "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"

  - type: "Microsoft.Authorization/roleAssignments"
    apiVersion: "2020-04-01"
    name: "[guid(parameters('functionAppName'), 'keyvault-role')]"
    properties:
      principalId: "[reference(resourceId('Microsoft.Web/sites', parameters('functionAppName')), '2021-02-01').identity.principalId]"
      roleDefinitionId: "[concat('/subscriptions/', subscription().subscriptionId, '/providers/Microsoft.Authorization/roleDefinitions/', 'Key Vault Secrets User')]"
      scope: "[resourceId('Microsoft.KeyVault/vaults', parameters('keyVaultName'))]"

  - type: "Microsoft.Authorization/roleAssignments"
    apiVersion: "2020-04-01"
    name: "[guid(parameters('functionAppName'), 'sql-role')]"
    properties:
      principalId: "[reference(resourceId('Microsoft.Web/sites', parameters('functionAppName')), '2021-02-01').identity.principalId]"
      roleDefinitionId: "[concat('/subscriptions/', subscription().subscriptionId, '/providers/Microsoft.Authorization/roleDefinitions/', 'SQL Server Contributor')]"
      scope: "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"

  - type: "Microsoft.Authorization/roleAssignments"
    apiVersion: "2020-04-01"
    name: "[guid(parameters('functionAppName'), 'cosmosdb-role')]"
    properties:
      principalId: "[reference(resourceId('Microsoft.Web/sites', parameters('functionAppName')), '2021-02-01').identity.principalId]"
      roleDefinitionId: "[concat('/subscriptions/', subscription().subscriptionId, '/providers/Microsoft.Authorization/roleDefinitions/', 'Cosmos DB Account Reader Role')]"
      scope: "[resourceId('Microsoft.DocumentDB/databaseAccounts', parameters('cosmosDbAccountName'))]"

parameters:
  functionAppName:
    type: string
  location:
    type: string
  hostingPlanName:
    type: string
  storageAccountName:
    type: string
  keyVaultName:
    type: string
  sqlServerName:
    type: string
  sqlAdminLogin:
    type: string
  sqlAdminPassword:
    type: string
  cosmosDbAccountName:
    type: string
  storageConnectionString:
    type: string