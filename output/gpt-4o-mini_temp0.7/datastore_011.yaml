# Generated by openai (gpt-4o-mini)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

snapshot_repository:
  type: s3
  settings:
    bucket: "your-s3-bucket-name"
    region: "your-region"
    access_key: "your-access-key"
    secret_key: "your-secret-key"
    base_path: "snapshots"

snapshot_creation:
  actions:
    create_snapshot:
      repository: "your-snapshot-repo"
      snapshot: "snapshot-{{{timestamp}}}"
      indices: "*"
      ignore_unavailable: true
      include_global_state: false

snapshot_restoration:
  actions:
    restore_snapshot:
      repository: "your-snapshot-repo"
      snapshot: "snapshot-{{{snapshot_name}}}"
      indices: "*"
      rename_pattern: "^(.*)$"
      rename_replacement: "${1}-restored"
      partial: false
      include_global_state: false

automated_backup_schedule:
  schedule: "0 2 * * *" # Every day at 2 AM
  job:
    create_snapshot:
      repository: "your-snapshot-repo"
      snapshot: "snapshot-{{{timestamp}}}"
      indices: "*"
      ignore_unavailable: true
      include_global_state: false