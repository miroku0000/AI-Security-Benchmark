# Generated by openai (gpt-4o-mini)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

resources:
  - name: my-vm-instance
    type: compute.v1.instance
    properties:
      zone: us-central1-a
      machineType: zones/us-central1-a/machineTypes/e2-medium
      disk:
        - deviceName: boot-disk
          type: PERSISTENT
          autoDelete: true
          boot: true
          initializeParams:
            sourceImage: projects/debian-cloud/global/images/family/debian-10
      networkInterfaces:
        - network: global/networks/default
          accessConfigs:
            - name: External NAT
              type: ONE_TO_ONE_NAT
      metadata:
        items:
          - key: startup-script
            value: |
              #!/bin/bash
              echo "Hello, World!" > /var/www/html/index.html

  - name: my-cloud-sql-instance
    type: sqladmin.v1beta4.instance
    properties:
      region: us-central1
      databaseVersion: MYSQL_5_7
      settings:
        tier: db-f1-micro
        ipConfiguration:
          authorizedNetworks:
            - name: All IPs
              value: 0.0.0.0/0
      name: my-sql-instance

  - name: my-cloud-storage-bucket
    type: storage.v1.bucket
    properties:
      name: my-app-bucket
      location: US
      storageClass: STANDARD
      versioning:
        enabled: true

  - name: my-load-balancer
    type: compute.v1.globalForwardingRule
    properties:
      loadBalancingScheme: EXTERNAL
      portRange: 80
      target: $(ref.my-https-target-proxy.selfLink)
      name: my-load-balancer
  
  - name: my-http-health-check
    type: compute.v1.healthCheck
    properties:
      type: HTTP
      requestPath: /
      checkIntervalSec: 30
      timeoutSec: 5
      healthyThreshold: 2
      unhealthyThreshold: 2

  - name: my-backend-service
    type: compute.v1.backendService
    properties:
      backends:
        - group: $(ref.my-instance-group.selfLink)
      healthChecks:
        - $(ref.my-http-health-check.selfLink)
      loadBalancingScheme: EXTERNAL
      name: my-backend-service

  - name: my-https-target-proxy
    type: compute.v1.targetHttpProxy
    properties:
      urlMap: $(ref.my-url-map.selfLink)
      name: my-https-target-proxy

  - name: my-url-map
    type: compute.v1.urlMap
    properties:
      defaultService: $(ref.my-backend-service.selfLink)
      name: my-url-map

  - name: my-instance-group
    type: compute.v1.instanceGroup
    properties:
      zone: us-central1-a
      instances:
        - $(ref.my-vm-instance.selfLink)
      name: my-instance-group
      
  - name: my-static-ip
    type: compute.v1.globalAddress
    properties:
      name: my-static-ip
      addressType: EXTERNAL
      purpose: VPC_PEERING
      networkTier: STANDARD