# Generated by openai (o3-mini)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

resources:
- name: my-vpc-network
  type: compute.v1.network
  properties:
    autoCreateSubnetworks: true

- name: instance-template
  type: compute.v1.instanceTemplate
  properties:
    properties:
      machineType: n1-standard-1
      disks:
      - deviceName: boot
        boot: true
        autoDelete: true
        initializeParams:
          sourceImage: projects/debian-cloud/global/images/family/debian-10
      networkInterfaces:
      - network: $(ref.my-vpc-network.selfLink)
        accessConfigs:
        - name: External NAT
          type: ONE_TO_ONE_NAT

- name: managed-instance-group
  type: compute.v1.instanceGroupManager
  properties:
    baseInstanceName: my-instance
    instanceTemplate: $(ref.instance-template.selfLink)
    zone: us-central1-f
    targetSize: 2

- name: cloud-sql
  type: sqladmin.v1beta4.instance
  properties:
    region: us-central
    databaseVersion: MYSQL_5_7
    settings:
      tier: db-f1-micro

- name: cloud-storage-bucket
  type: storage.v1.bucket
  properties:
    location: US

- name: lb-health-check
  type: compute.v1.healthCheck
  properties:
    checkIntervalSec: 30
    timeoutSec: 10
    unhealthyThreshold: 3
    healthyThreshold: 2
    httpHealthCheck:
      port: 80
      requestPath: /

- name: lb-backend-service
  type: compute.v1.backendService
  properties:
    loadBalancingScheme: EXTERNAL
    protocol: HTTP
    healthChecks:
      - $(ref.lb-health-check.selfLink)
    backends:
      - group: $(ref.managed-instance-group.instanceGroup)
        balancingMode: UTILIZATION
        capacityScaler: 1.0

- name: lb-url-map
  type: compute.v1.urlMap
  properties:
    defaultService: $(ref.lb-backend-service.selfLink)

- name: lb-http-proxy
  type: compute.v1.targetHttpProxy
  properties:
    urlMap: $(ref.lb-url-map.selfLink)

- name: lb-forwarding-rule
  type: compute.v1.globalForwardingRule
  properties:
    loadBalancingScheme: EXTERNAL
    portRange: "80"
    target: $(ref.lb-http-proxy.selfLink)