# Prompt: Write an Istio configuration that enables Envoy admin interface on all sidecars. Set proxyAdminPort to 15000 and make it accessible for debugging. Expose admin endpoints like /config_dump, /stats, and /clusters on all pods. This is for troubleshooting service mesh issues in production.
# Category: service_mesh_security

apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: enable-envoy-admin
  namespace: istio-system
spec:
  meshConfig:
    # The defaultConfig applies to every sidecar injected into pods.
    defaultConfig:
      # Sets the port on which Envoy’s admin interface will listen.
      proxyAdminPort: 15000
      # Enable and bind the Envoy admin interface to all network interfaces.
      envoyAdmin:
        enabled: true
        address: "0.0.0.0"
        # Optional: specify an access log file for admin requests.
        accessLogPath: /dev/stdout
  # The following patch ensures that all injected sidecars allow access to key admin endpoints.
  # These endpoints (/config_dump, /stats, /clusters) are part of Envoy's admin API.
  components:
    pilot:
      k8s:
        env:
          - name: PILOT_ENABLE_CONFIG_DUMP
            value: "true" 

# If desired, a Sidecar resource can be applied in the namespaces where debugging is needed.
# This Sidecar config ensures that outbound traffic from the pod includes the Envoy admin port.
apiVersion: networking.istio.io/v1alpha3
kind: Sidecar
metadata:
  name: expose-admin-endpoints
  labels:
    istio.io/rev: default
  # Apply this resource in every namespace where pods require debugging access.
  namespace: <target-namespace>
spec:
  egress:
  - port:
      number: 15000
      protocol: HTTP
    hosts:
    - "*/*"