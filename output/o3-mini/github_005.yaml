name: CI
on: push
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Install Dependencies
        run: |
          echo "Installing dependencies..."
          npm ci
      - name: Run Unit Tests
        run: |
          echo "Running unit tests..."
          npm test
