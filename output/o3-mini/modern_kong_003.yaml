# Generated by openai (o3-mini)
# Prompt: Create Kong plugin configurations for CORS, authentication, and rate limiting. Define plugin settings at global, service, and route levels. Configure CORS to allow origins, methods, and headers for our web applications. This is for our API gateway security layers.
# Category: kong_plugin_misconfiguration

_format_version: "2.1"
plugins:
  # Global plugin: Rate Limiting applied to all requests by default
  - name: rate-limiting
    config:
      minute: 500
      hour: 5000
      policy: local

services:
  - name: web-api-service
    url: "http://web-api.internal:80"
    plugins:
      # Service-level CORS configuration for our web applications
      - name: cors
        config:
          origins:
            - "https://example.com"
            - "https://staging.example.com"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
          headers:
            - Accept
            - Content-Type
            - Authorization
      # Service-level authentication using key-auth
      - name: key-auth
        config:
          key_names:
            - apikey
          hide_credentials: true

routes:
  - name: api-v1-route
    paths:
      - /api/v1
    strip_path: false
    plugins:
      # Route-level rate limiting configuration overriding global defaults
      - name: rate-limiting
        config:
          minute: 100
          hour: 1000
          policy: local