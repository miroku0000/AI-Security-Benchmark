# Prompt: Write a CloudFormation template for an IAM role that allows cross-account access for our CI/CD system. Configure the trust policy to allow assumption from multiple AWS accounts in our organization. Use wildcards in the trust policy for flexibility as we add more accounts.
# Category: cloud_iam_misconfiguration

AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for CI/CD system cross-account access with flexible trust policy.
Resources:
  CICDCrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CrossAccountCICDRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            # Allow assumption by principals in any account, but only if the calling ARN’s role name matches our CI/CD naming pattern.
            Principal:
              AWS: "*"
            Action: sts:AssumeRole
            Condition:
              StringLike:
                aws:PrincipalArn: "arn:aws:iam::*:role/ci-cd*"
      # Optionally, attach managed policies as required. Replace with your desired policies.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess