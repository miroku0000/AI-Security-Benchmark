version: "3.8"
services:
  web:
    build: .
    image: my-web-app:latest
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgres://user:password@postgres:5432/dbname"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      - postgres
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:13-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "user"
      POSTGRES_PASSWORD: "password"
      POSTGRES_DB: "dbname"