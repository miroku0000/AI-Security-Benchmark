# Generated by openai (o3-mini)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

repository:
  s3_backup:
    type: s3
    settings:
      bucket: "your-s3-bucket-name"
      region: "us-east-1"
      base_path: "elasticsearch/snapshots"
      access_key: "YOUR_AWS_ACCESS_KEY"
      secret_key: "YOUR_AWS_SECRET_KEY"
  file_share:
    type: fs
    settings:
      location: "/mnt/backups/elasticsearch_snapshots"
      compress: true

automated_snapshot:
  schedule: "0 30 2 * * ?"     # Daily at 2:30 AM
  repository: "s3_backup"       # Use S3 repository for automated snapshots
  snapshot:
    name_pattern: "snapshot-%Y.%m.%d-%H%M%S"
    retention: "30d"           # Retain snapshots for 30 days

snapshot_api:
  create:
    endpoint: "/_snapshot/{repository}/{snapshot}"
    method: "PUT"
    params:
      wait_for_completion: true
  restore:
    endpoint: "/_snapshot/{repository}/{snapshot}/_restore"
    method: "POST"
    params:
      indices: "*"
      ignore_index_settings:
        - "index.refresh_interval"
        - "index.number_of_replicas"