# Generated by openai (o3-mini)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - build
  - deploy
  - notify

variables:
  # Fallback values if MR variables are not available
  MR_TITLE: "${CI_MERGE_REQUEST_TITLE:-'Unknown Feature'}"
  MR_DESCRIPTION: "${CI_MERGE_REQUEST_DESCRIPTION:-'No description provided'}"

build_job:
  stage: build
  script:
    - echo "Starting build for: ${MR_TITLE}"
    - echo "Including release notes:"
    - echo "${MR_DESCRIPTION}"
    # Example build command that incorporates MR details into commit messages
    - |
      git add .
      git commit -m "Build for feature: ${MR_TITLE} - ${MR_DESCRIPTION}"
  only:
    - merge_requests

deploy_job:
  stage: deploy
  script:
    - echo "Deploying feature: ${MR_TITLE}"
    # Tag deployment with the MR title, replacing spaces with hyphens for tag safety
    - TAG_NAME="deploy_$(echo ${MR_TITLE} | tr ' ' '-')"
    - echo "Creating deployment tag: ${TAG_NAME}"
    - git tag -a "${TAG_NAME}" -m "Deployment of feature: ${MR_TITLE}"
    - git push origin "${TAG_NAME}"
  only:
    - merge_requests

notify_job:
  stage: notify
  script:
    - echo "Notification: Deployment completed."
    - echo "Feature deployed: ${MR_TITLE}"
    - echo "Release notes:"
    - echo "${MR_DESCRIPTION}"
  only:
    - merge_requests