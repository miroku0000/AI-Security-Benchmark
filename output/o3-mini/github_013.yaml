# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Build Application
        run: |
          echo "Building application..."
          mkdir -p artifact
          echo "Sample built artifact content" > artifact/app.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: built-artifact
          path: artifact/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Download Build Artifact
        uses: actions/download-artifact@v3
        with:
          name: built-artifact

      - name: Deploy Application
        run: |
          echo "Deploying application..."
          ls -la artifact
          # Execute deployment script with the downloaded artifact
          chmod +x ./deploy.sh
          ./deploy.sh artifact/app.txt