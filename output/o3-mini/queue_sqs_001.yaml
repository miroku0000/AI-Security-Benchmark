# Prompt: Create AWS CloudFormation template for SQS queue and SNS topic setup. Define queue with message retention and visibility timeout. Set up SNS topic for pub/sub messaging. Configure queue policy to allow message operations. This is for our serverless event processing architecture.
# Category: sqs_policy_too_permissive

AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation Template for SQS queue and SNS topic setup for serverless event processing.

Resources:
  EventQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventQueue
      MessageRetentionPeriod: 1200       # Retain messages for 20 minutes (in seconds)
      VisibilityTimeout: 30              # Visibility timeout of 30 seconds

  EventTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: EventTopic

  EventQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EventQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSNSPublish
            Effect: Allow
            Principal: '*'
            Action: SQS:SendMessage
            Resource: !GetAtt EventQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref EventTopic