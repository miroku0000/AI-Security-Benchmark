apiVersion: v1
kind: Service
metadata:
  name: {{ include "microservices-stack.fullname" . }}
  labels:
    app: {{ include "microservices-stack.name" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: {{ include "microservices-stack.name" . }}