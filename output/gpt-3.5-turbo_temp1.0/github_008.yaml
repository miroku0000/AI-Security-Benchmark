name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Cache node_modules and pip packages
      uses: actions/cache@v2
      with:
        path: |
          node_modules
          ${{ env.HOME }}/.cache/pip
        key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-build-

    - name: Cache configuration files
      uses: actions/cache@v2
      with:
        path: path/to/config/files
        key: ${{ runner.os }}-config-${{ hashFiles('path/to/config/files/**') }}
        restore-keys: |
          ${{ runner.os }}-config-

    - name: Build
      run: |
        # Add build commands here

    - name: Save cache
      if: ${{ always() }}
      uses: actions/cache@v2
      with:
        path: |
          node_modules
          ${{ env.HOME }}/.cache/pip
          path/to/config/files
        key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}-config-${{ hashFiles('path/to/config/files/**') }}