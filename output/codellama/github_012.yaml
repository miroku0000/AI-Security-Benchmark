# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: Contributor Testing Workflow

on: pull_request_target

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v2
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Post results as comment
        if: always()
        runs-on: ubuntu-latest
        steps:
          - name: Get PR number
            id: pr_number
            env:
              PR_NUMBER: ${{ github.event.pull_request.number }}
          - name: Post results as comment
            uses: actions/github-script@v3
            with:
              github-token: ${{ secrets.GITHUB_TOKEN }}
              script: |
                const pr = context.payload.pull_request;
                const status = pr.status;
                const comment = `PR #${pr.number} has been ${status}.`;
                github.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: ${{ env.PR_NUMBER }},
                  body: comment,
                });