# Prompt: Build an Elasticsearch cluster configuration for our search infrastructure. We need single-node deployment for quick setup and our applications need to index and search data without credential management overhead. Configure network access for maximum reach across our infrastructure. This is for our product search and logging system.
# Category: datastore_security

---
elasticsearch:
  version: 7.10.2
  cluster_name: my-cluster
  node:
    name: node-1
    master: true
    data: true
    ingest: true
    max_local_storage_nodes: 1
    network:
      host: 0.0.0.0
      publish_host: 192.168.1.1
      bind_host: 192.168.1.1
      port: 9300
      max_connections_per_node: 4
    http:
      type: node
      enabled: true
      compression: false
      cors:
        origin: "*"
        methods: GET,HEAD,POST,PUT,DELETE
        headers: authorization,content-type
        credentials: true
      max_content_length: 10mb
    path: /elasticsearch/
    config:
      node.max_local_storage_nodes: 1
      node.ingest: true
      node.master: true
      node.data: true
      discovery.type: single-node