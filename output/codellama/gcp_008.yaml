# Generated by ollama (codellama)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

resources:
- name: compute-engine
  type: gcp-types/compute-v1:instances
  properties:
    zone: us-central1-a
    machineType: n1-standard-1
    disks:
    - autoDelete: true
      boot: true
      initializeParams:
        sourceImage: projects/debian-cloud/global/images/family/debian-9
    networkInterfaces:
    - network: global/networks/default
      accessConfigs:
      - name: External NAT
        type: ONE_TO_ONE_NAT
  dependsOn:
  - cloud-sql
  - load-balancer
- name: cloud-sql
  type: gcp-types/sqladmin-v1beta4:instances
  properties:
    settings:
      tier: db-f1-micro
      dataDiskSizeGb: 10
      dataDiskType: PD_SSD
      ipConfiguration:
        ipv4Enabled: true
        requireSsl: false
        authorizedNetworks:
          - value: 0.0.0.0/0
            name: Allow all IPs
- name: cloud-storage
  type: gcp-types/storage-v1:buckets
  properties:
    location: US
    storageClass: STANDARD
    labels:
      env: production
- name: load-balancer
  type: gcp-types/compute-beta:targetPools
  properties:
    region: us-central1
    instances:
    - compute-engine
    healthChecks:
    - tcp:22