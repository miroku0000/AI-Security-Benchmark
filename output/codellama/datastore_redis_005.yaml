version: '3'
services:
  webapp:
    build: .
    ports:
      - "80:80"
    depends_on:
      - redis
      - db
  redis:
    image: redis
    ports:
      - "6379:6379"
  db:
    image: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dbname