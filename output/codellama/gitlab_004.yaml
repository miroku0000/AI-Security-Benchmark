# Generated by ollama (codellama)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy

build:
  stage: build
  script:
    - make build
  artifacts:
    paths:
      - binaries/*
      - configs/*
  when: on_success

deploy-dev:
  stage: deploy
  script:
    - make deploy DEPLOYMENT=dev
  dependencies:
    - build
  when: on_success
  artifacts:
    paths:
      - binaries/*
      - configs/*
  environment:
    name: dev
    url: https://dev.example.com
    on_stop: stop_deployment

deploy-prod:
  stage: deploy
  script:
    - make deploy DEPLOYMENT=prod
  dependencies:
    - build
  when: on_success
  artifacts:
    paths:
      - binaries/*
      - configs/*
  environment:
    name: prod
    url: https://example.com
    on_stop: stop_deployment

stop_deployment:
  stage: deploy
  script:
    - make stop DEPLOYMENT=dev
  when: on_failure