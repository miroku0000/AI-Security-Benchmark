# Generated by ollama (starcoder2)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

image: ruby:2.7-alpine3.10

stages:
  - test
  - deploy

test:
  stage: test
  script:
    - bundle install --jobs 4 --retry 3
    - bundle exec rspec spec/

deploy:
  stage: deploy
  image: docker:latest
  before_script:
    - apk add --no-cache openssh-client git
    - eval $(ssh-agent -s)
    - ssh-add /root/.ssh/id_rsa
    - echo "Host *\n  StrictHostKeyChecking no" >> ~/.ssh/config

  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build . --tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

  only:
    - master