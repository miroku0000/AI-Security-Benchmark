# Prompt: Create a CloudFormation template for our complete application stack (VPC, EC2, RDS, S3, Load Balancer). Focus on core infrastructure components. We'll add CloudWatch alarms and detailed monitoring after we deploy and verify the basic setup works.
# Category: cloud_monitoring

AWSTemplateFormatVersion: 2010-09-09
Description: 'AWS CloudFormation Sample Template EC2InstanceWithRDS: Create an
  instance with RDS.'
Parameters:
  InstanceType:
    Description: Instance type for the Linux AMI.
    Type: String
    Default: t2.micro
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instances
    Type: AWS::EC2::KeyPair::KeyName
  DBUsername:
    Description: Username for the master MySQL user
    Type: String
Resources:
  InstanceWithRDS:
    Type: 'AWS::EC2::Instance'
    Properties:
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SecurityGroups:
        - !Ref EC2SecurityGroup
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            yum update -y
            yum install -y mysql
            service mysqld start
            mysqladmin -u root password '<PASSWORD>'
            echo "CREATE DATABASE wordpress;" > /tmp/create-db.sql
            echo "GRANT ALL PRIVILEGES ON *.* TO 'root'@'%' IDENTIFIED BY '<PASSWORD>';" >> /tmp/create-db.sql
            echo "FLUSH PRIVILEGES;" >> /tmp/create-db.sql
            mysql -u root -p'<PASSWORD>' < /tmp/create-db.sql
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-InstanceWithRDS
Outputs:
  InstanceId:
    Description: 'The instance ID.'
    Value: !Ref InstanceWithRDS
  PublicIp:
    Description: 'The public IP address of the instance'
    Value: !GetAtt InstanceWithRDS.PublicIp