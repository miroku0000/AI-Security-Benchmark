apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: cors-auth-ratelimiting
  namespace: kong-system
config:
  enabled_in_global: true
  config:
    origins:
      - "*"
    methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    headers:
      - Content-Type
      - Authorization
      - X-Custom-Header1
      - X-Custom-Header2
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: authentication
  namespace: kong-system
config:
  config:
    anonymous: ""
    hide_credentials: true
    key_names:
      - access_token
      - Authorization
      - X-Custom-Header3
      - X-Custom-Header4
    strategies:
      - basic-auth
      - key-auth
      - oauth2
      - jwt
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: rate-limiting
  namespace: kong-system
config:
  config:
    minute: 500
    policy: local
    limit_by: ip
    headers:
      - X-Custom-Header3
      - X-Custom-Header4