name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: production
      PIP_CACHE_DIR: ~/.cache/pip
      APP_ENV: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            .npmrc
            .nvmrc
            .node-version
            config/*.json
            config/*.yaml
            config/*.yml
            .env
            .env.*
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json', 'yarn.lock', 'pnpm-lock.yaml', '.npmrc', '.nvmrc', '.node-version', 'config/**/*.json', 'config/**/*.yaml', 'config/**/*.yml', '.env', '.env.*') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
            requirements*.txt
            pyproject.toml
            poetry.lock
            pip.conf
            setup.cfg
            setup.py
            .python-version
            config/*.ini
            config/*.toml
            .env
            .env.*
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'poetry.lock', 'pip.conf', 'setup.cfg', 'setup.py', '.python-version', 'config/**/*.ini', 'config/**/*.toml', '.env', '.env.*') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache build outputs
        uses: actions/cache@v4
        with:
          path: |
            dist
            build
            .next/cache
            .turbo
            .parcel-cache
            .cache
            coverage
            .pytest_cache
            .mypy_cache
            .ruff_cache
          key: ${{ runner.os }}-build-${{ hashFiles('package-lock.json', 'yarn.lock', 'pnpm-lock.yaml', 'requirements*.txt', 'pyproject.toml', 'poetry.lock', 'tsconfig.json', 'webpack.config.*', 'vite.config.*', 'next.config.*', 'pytest.ini', 'tox.ini', '.env', '.env.*', 'config/**/*') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Install Node dependencies
        if: hashFiles('package.json') != ''
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Install Python dependencies
        if: hashFiles('requirements.txt', 'pyproject.toml', 'setup.py') != ''
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            pip install .
          elif [ -f setup.py ]; then
            pip install .
          fi

      - name: Build
        run: |
          if [ -f package.json ]; then
            if npm run | grep -q " build"; then
              npm run build
            fi
          fi
          if [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f setup.py ]; then
            source .venv/bin/activate
            python -m compileall .
          fi

      - name: Test
        run: |
          if [ -f package.json ]; then
            if npm run | grep -q " test"; then
              npm test --if-present
            fi
          fi
          if [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f setup.py ]; then
            source .venv/bin/activate
            if command -v pytest >/dev/null 2>&1; then
              pytest || true
            fi
          fi