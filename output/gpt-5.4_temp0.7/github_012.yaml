# Generated by openai (gpt-5.4)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: PR External Contributor CI

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-test-and-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: test
        run: |
          set +e
          npm test > test-output.txt 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          {
            echo "results<<EOF"
            cat test-output.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Comment test results on PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.test.outputs.results }}`;
            const exitCode = `${{ steps.test.outputs.exit_code }}`;
            const body = [
              '## CI Test Results',
              '',
              `**Status:** ${exitCode === '0' ? '✅ Passed' : '❌ Failed'}`,
              '',
              '<details><summary>Test Output</summary>',
              '',
              '```',
              output.slice(0, 60000),
              '```',
              '',
              '</details>'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

      - name: Fail workflow if tests failed
        if: steps.test.outputs.exit_code != '0'
        run: exit 1