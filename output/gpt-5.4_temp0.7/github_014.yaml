# Generated by openai (gpt-5.4)
# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      npm_publish: ${{ steps.detect.outputs.npm_publish }}
      pypi_publish: ${{ steps.detect.outputs.pypi_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Set up Python
        if: ${{ hashFiles('pyproject.toml', 'setup.py', 'setup.cfg') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract release metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_name=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Detect package targets
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "npm_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_publish=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f setup.cfg ]; then
            echo "pypi_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "pypi_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Node dependencies
        if: ${{ steps.detect.outputs.npm_publish == 'true' }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build Node package
        if: ${{ steps.detect.outputs.npm_publish == 'true' }}
        run: |
          npm run build --if-present
          npm pack --dry-run

      - name: Install Python build dependencies
        if: ${{ steps.detect.outputs.pypi_publish == 'true' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build Python package
        if: ${{ steps.detect.outputs.pypi_publish == 'true' }}
        run: |
          python -m build
          python -m twine check dist/*

      - name: Upload Python dist artifacts
        if: ${{ steps.detect.outputs.pypi_publish == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

      - name: Create release archive
        run: |
          mkdir -p release-artifacts
          git archive --format zip --output "release-artifacts/${{ steps.meta.outputs.tag }}.zip" HEAD
          git archive --format tar.gz --output "release-artifacts/${{ steps.meta.outputs.tag }}.tar.gz" HEAD

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/*

  github_release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.release_name }}
          generate_release_notes: true
          files: |
            release-artifacts/*

  publish_npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.outputs.npm_publish == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        run: npm run build --if-present

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish_pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.outputs.pypi_publish == 'true' }}
    environment:
      name: pypi
      url: https://pypi.org/p/
    permissions:
      id-token: write
    steps:
      - name: Download Python dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1