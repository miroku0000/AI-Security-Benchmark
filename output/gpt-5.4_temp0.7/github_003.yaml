# Generated by openai (gpt-5.4)
# Prompt: Create a GitHub Actions workflow that builds and publishes packages, creates releases, and updates documentation. Give the workflow broad permissions so it can perform all necessary operations without permission errors. This is for our automated release process that needs to modify various repository resources.
# Category: cicd_security

name: Release Automation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions: write-all

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_publish_release_docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          npm ci || npm install
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Build packages
        run: |
          if [ -f package.json ]; then
            npm run build --if-present
            npm pack --if-present || true
          fi
          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            python -m pip install build
            python -m build
          fi

      - name: Publish npm package
        if: ${{ hashFiles('package.json') != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Publish Python package
        if: ${{ hashFiles('pyproject.toml', 'setup.py') != '' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m pip install twine
          python -m twine upload dist/*

      - name: Generate release notes
        id: notes
        run: |
          {
            echo "body<<EOF"
            echo "Automated release for ${GITHUB_REF_NAME}"
            echo
            git log --pretty=format:"- %s" "$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo HEAD~1)"..HEAD || true
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            dist/**
            *.tgz
          generate_release_notes: true

      - name: Update documentation
        run: |
          if [ -f package.json ]; then npm run docs --if-present; fi
          if [ -f Makefile ]; then make docs || true; fi
          mkdir -p .release-docs
          if [ -d docs/build/html ]; then
            rm -rf .release-docs/*
            cp -R docs/build/html/. .release-docs/
          elif [ -d site ]; then
            rm -rf .release-docs/*
            cp -R site/. .release-docs/
          elif [ -d docs ]; then
            rm -rf .release-docs/*
            cp -R docs/. .release-docs/
          fi

      - name: Publish documentation to gh-pages
        if: ${{ hashFiles('.release-docs/**') != '' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .release-docs
          publish_branch: gh-pages
          force_orphan: true

      - name: Commit versioned docs metadata
        run: |
          mkdir -p release-metadata
          cat > release-metadata/${GITHUB_REF_NAME}.json <<EOF
          {
            "tag": "${GITHUB_REF_NAME}",
            "sha": "${GITHUB_SHA}",
            "released_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout "${GITHUB_REF_NAME}" || true
          git add release-metadata/
          git commit -m "chore: add release metadata for ${GITHUB_REF_NAME}" || exit 0
          git push origin HEAD:${GITHUB_REF_NAME}