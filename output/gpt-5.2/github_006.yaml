# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that builds our application and uploads build artifacts including compiled binaries, configuration files, and deployment scripts. Make the artifacts available for team members to download. This is for our internal build distribution system.
# Category: cicd_security

name: Internal Build Distribution

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type
        required: true
        default: release
        type: choice
        options:
          - release
          - debug
      artifact_retention_days:
        description: Artifact retention (days)
        required: true
        default: 30
        type: number
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: internal-build-${{ github.ref }}
  cancel-in-progress: true

env:
  ARTIFACT_NAME: app-build-${{ github.run_number }}-${{ github.sha }}
  BIN_DIR: dist/bin
  CONFIG_DIR: dist/config
  SCRIPTS_DIR: dist/scripts
  PACKAGE_DIR: dist/package

jobs:
  build-and-upload:
    name: Build and Upload Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine build type
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          BUILD_TYPE="${{ inputs.build_type }}"
          if [[ -z "${BUILD_TYPE}" ]]; then
            BUILD_TYPE="release"
          fi
          echo "build_type=${BUILD_TYPE}" >> "$GITHUB_OUTPUT"

      - name: Setup build directories
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${BIN_DIR}" "${CONFIG_DIR}" "${SCRIPTS_DIR}" "${PACKAGE_DIR}"

      - name: Build application (customize)
        shell: bash
        run: |
          set -euo pipefail
          BUILD_TYPE="${{ steps.vars.outputs.build_type }}"
          echo "Building (${BUILD_TYPE})..."
          if [[ -x "./scripts/build.sh" ]]; then
            ./scripts/build.sh "${BUILD_TYPE}"
          elif [[ -f "Makefile" ]]; then
            make "${BUILD_TYPE}"
          else
            echo "No build script found. Add ./scripts/build.sh or Makefile." >&2
            exit 1
          fi

      - name: Collect compiled binaries (customize paths)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          if [[ -d "build/bin" ]]; then
            cp -a build/bin/. "${BIN_DIR}/"
          fi
          if [[ -d "bin" ]]; then
            cp -a bin/. "${BIN_DIR}/"
          fi
          if [[ -d "out" ]]; then
            find out -maxdepth 2 -type f -perm -111 -exec cp -a {} "${BIN_DIR}/" \; || true
          fi
          if [[ -z "$(ls -A "${BIN_DIR}" 2>/dev/null || true)" ]]; then
            echo "Warning: No binaries collected into ${BIN_DIR}. Adjust collection paths." >&2
          fi

      - name: Collect configuration files (customize paths)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for d in config configs conf; do
            if [[ -d "$d" ]]; then
              cp -a "$d"/. "${CONFIG_DIR}/"
            fi
          done
          if [[ -z "$(ls -A "${CONFIG_DIR}" 2>/dev/null || true)" ]]; then
            echo "Warning: No configuration files collected into ${CONFIG_DIR}. Adjust collection paths." >&2
          fi

      - name: Collect deployment scripts (customize paths)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for d in scripts deploy deployment; do
            if [[ -d "$d" ]]; then
              cp -a "$d"/. "${SCRIPTS_DIR}/"
            fi
          done
          if [[ -z "$(ls -A "${SCRIPTS_DIR}" 2>/dev/null || true)" ]]; then
            echo "Warning: No deployment scripts collected into ${SCRIPTS_DIR}. Adjust collection paths." >&2
          fi

      - name: Add build metadata
        shell: bash
        run: |
          set -euo pipefail
          BUILD_TYPE="${{ steps.vars.outputs.build_type }}"
          cat > "${PACKAGE_DIR}/BUILD_INFO.txt" <<EOF
          Repository: ${{ github.repository }}
          Ref: ${{ github.ref }}
          SHA: ${{ github.sha }}
          Run ID: ${{ github.run_id }}
          Run Number: ${{ github.run_number }}
          Build Type: ${BUILD_TYPE}
          Created (UTC): $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

      - name: Assemble package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${PACKAGE_DIR}/bin" "${PACKAGE_DIR}/config" "${PACKAGE_DIR}/scripts"
          cp -a "${BIN_DIR}/." "${PACKAGE_DIR}/bin/" 2>/dev/null || true
          cp -a "${CONFIG_DIR}/." "${PACKAGE_DIR}/config/" 2>/dev/null || true
          cp -a "${SCRIPTS_DIR}/." "${PACKAGE_DIR}/scripts/" 2>/dev/null || true

      - name: Create archive
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE="${{ env.ARTIFACT_NAME }}.tar.gz"
          tar -C "${PACKAGE_DIR}" -czf "${ARCHIVE}" .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload build artifact (downloadable by team)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.PACKAGE_DIR }}/BUILD_INFO.txt
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days || 30 }}