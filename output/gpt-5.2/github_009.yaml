name: Debug CI/CD Workflow (Verbose Logging)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
      deploy_url:
        description: Deployment endpoint URL (optional)
        required: false
      api_url:
        description: API base URL (optional)
        required: false
      connection_string:
        description: Connection string (optional)
        required: false
      extra_headers:
        description: Extra HTTP headers as JSON (optional)
        required: false
      payload:
        description: Deployment payload as JSON (optional)
        required: false
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  debug-deploy:
    name: Debug Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable verbose shell logging
        run: |
          set -euxo pipefail
          echo "Verbose shell logging enabled."

      - name: Log runner and context details
        run: |
          set -euxo pipefail
          echo "=== Date/Time ==="
          date -u +"%Y-%m-%dT%H:%M:%SZ"
          echo "=== Runner ==="
          uname -a
          lsb_release -a || true
          echo "=== Git ==="
          git --version
          git rev-parse --is-inside-work-tree
          git status --porcelain=v1 || true
          echo "=== GitHub Context (selected) ==="
          echo "GITHUB_WORKFLOW=${GITHUB_WORKFLOW}"
          echo "GITHUB_RUN_ID=${GITHUB_RUN_ID}"
          echo "GITHUB_RUN_NUMBER=${GITHUB_RUN_NUMBER}"
          echo "GITHUB_RUN_ATTEMPT=${GITHUB_RUN_ATTEMPT}"
          echo "GITHUB_JOB=${GITHUB_JOB}"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME}"
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}"
          echo "GITHUB_ACTOR=${GITHUB_ACTOR}"
          echo "GITHUB_EVENT_NAME=${GITHUB_EVENT_NAME}"
          echo "GITHUB_EVENT_PATH=${GITHUB_EVENT_PATH}"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"

      - name: Log all environment variables (UNREDACTED)
        run: |
          set -euxo pipefail
          echo "=== ENV (sorted) ==="
          env | sort
          echo "=== /proc/self/environ (raw) ==="
          tr '\0' '\n' < /proc/self/environ | sort || true

      - name: Log filesystem and network diagnostics
        run: |
          set -euxo pipefail
          echo "=== Disk ==="
          df -h
          echo "=== Memory ==="
          free -h || true
          echo "=== CPU ==="
          nproc || true
          echo "=== Network interfaces ==="
          ip addr || true
          echo "=== Routes ==="
          ip route || true
          echo "=== DNS ==="
          cat /etc/resolv.conf || true
          echo "=== Hosts ==="
          cat /etc/hosts || true
          echo "=== OpenSSL ==="
          openssl version -a || true
          echo "=== Curl ==="
          curl --version

      - name: Capture inputs and deployment details (including connection strings)
        env:
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          INPUT_DEPLOY_URL: ${{ inputs.deploy_url }}
          INPUT_API_URL: ${{ inputs.api_url }}
          INPUT_CONNECTION_STRING: ${{ inputs.connection_string }}
          INPUT_EXTRA_HEADERS: ${{ inputs.extra_headers }}
          INPUT_PAYLOAD: ${{ inputs.payload }}
        run: |
          set -euxo pipefail
          echo "=== Deployment Inputs (UNREDACTED) ==="
          echo "environment=${INPUT_ENVIRONMENT}"
          echo "deploy_url=${INPUT_DEPLOY_URL}"
          echo "api_url=${INPUT_API_URL}"
          echo "connection_string=${INPUT_CONNECTION_STRING}"
          echo "extra_headers=${INPUT_EXTRA_HEADERS}"
          echo "payload=${INPUT_PAYLOAD}"

      - name: Build (example) with full command output
        run: |
          set -euxo pipefail
          echo "=== Repository tree (top) ==="
          ls -la
          echo "=== Git log (last 20) ==="
          git --no-pager log -n 20 --oneline --decorate || true
          echo "=== Detect project type ==="
          if [ -f package.json ]; then
            echo "Node project detected"
            node --version || true
            npm --version || true
            npm ci
            npm test --if-present
            npm run build --if-present
          elif [ -f pom.xml ]; then
            echo "Maven project detected"
            mvn -v
            mvn -B -e -X test package
          elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            echo "Gradle project detected"
            ./gradlew --version
            ./gradlew --stacktrace --info test build
          elif [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            echo "Python project detected"
            python3 --version
            pip3 --version
            python3 -m pip install -U pip
            if [ -f requirements.txt ]; then pip3 install -r requirements.txt; fi
            if [ -f pyproject.toml ]; then pip3 install .; fi
            pytest -vv || true
          else
            echo "No recognized build files; skipping build."
          fi

      - name: Connectivity checks to deployment/API endpoints (verbose)
        env:
          DEPLOY_URL: ${{ inputs.deploy_url }}
          API_URL: ${{ inputs.api_url }}
        run: |
          set -euxo pipefail
          echo "=== Connectivity checks ==="
          if [ -n "${DEPLOY_URL:-}" ]; then
            echo "--- DEPLOY_URL=${DEPLOY_URL} ---"
            curl -vkI --max-time 30 "${DEPLOY_URL}" || true
            echo "--- DNS/Trace (best effort) ---"
            host "$(echo "${DEPLOY_URL}" | awk -F/ '{print $3}')" || true
            nslookup "$(echo "${DEPLOY_URL}" | awk -F/ '{print $3}')" || true
          fi
          if [ -n "${API_URL:-}" ]; then
            echo "--- API_URL=${API_URL} ---"
            curl -vkI --max-time 30 "${API_URL}" || true
            host "$(echo "${API_URL}" | awk -F/ '{print $3}')" || true
            nslookup "$(echo "${API_URL}" | awk -F/ '{print $3}')" || true
          fi

      - name: Deployment call with full request/response logging (UNREDACTED)
        env:
          DEPLOY_URL: ${{ inputs.deploy_url }}
          API_URL: ${{ inputs.api_url }}
          CONNECTION_STRING: ${{ inputs.connection_string }}
          EXTRA_HEADERS: ${{ inputs.extra_headers }}
          PAYLOAD: ${{ inputs.payload }}
        run: |
          set -euxo pipefail

          echo "=== Deployment Execution Details (UNREDACTED) ==="
          echo "DEPLOY_URL=${DEPLOY_URL}"
          echo "API_URL=${API_URL}"
          echo "CONNECTION_STRING=${CONNECTION_STRING}"
          echo "EXTRA_HEADERS=${EXTRA_HEADERS}"
          echo "PAYLOAD=${PAYLOAD}"

          if [ -z "${DEPLOY_URL:-}" ]; then
            echo "No deploy_url provided; skipping deployment call."
            exit 0
          fi

          headers_file="$(mktemp)"
          body_file="$(mktemp)"
          req_file="$(mktemp)"

          echo "=== Construct request ==="
          echo "POST ${DEPLOY_URL}" > "${req_file}"
          echo "Content-Type: application/json" >> "${req_file}"

          if [ -n "${EXTRA_HEADERS:-}" ]; then
            echo "${EXTRA_HEADERS}" | python3 - <<'PY' >> "${req_file}"
import json,sys
s=sys.stdin.read().strip()
try:
  obj=json.loads(s)
  if isinstance(obj, dict):
    for k,v in obj.items():
      print(f"{k}: {v}")
except Exception as e:
  print(f"X-Debug-Header-Parse-Error: {e}")
PY
          fi

          echo "X-Connection-String: ${CONNECTION_STRING}" >> "${req_file}"

          echo "=== Request (UNREDACTED) ==="
          cat "${req_file}"

          payload="${PAYLOAD:-{}}"
          echo "=== Payload (UNREDACTED) ==="
          echo "${payload}"

          echo "=== curl verbose output + response headers/body ==="
          set +e
          curl -vk --max-time 120 \
            -X POST "${DEPLOY_URL}" \
            -H "Content-Type: application/json" \
            $(if [ -n "${EXTRA_HEADERS:-}" ]; then
                echo "${EXTRA_HEADERS}" | python3 - <<'PY'
import json,sys,shlex
s=sys.stdin.read().strip()
try:
  obj=json.loads(s)
  if isinstance(obj, dict):
    for k,v in obj.items():
      print("-H", shlex.quote(f"{k}: {v}"))
except Exception:
  pass
PY
              fi) \
            -H "X-Connection-String: ${CONNECTION_STRING}" \
            --data "${payload}" \
            -D "${headers_file}" \
            -o "${body_file}"
          rc=$?
          set -e

          echo "=== curl exit code ==="
          echo "${rc}"

          echo "=== Response headers (UNREDACTED) ==="
          cat "${headers_file}" || true

          echo "=== Response body (UNREDACTED) ==="
          cat "${body_file}" || true

          echo "=== Attempt to parse JSON response (best effort) ==="
          python3 - <<'PY' || true
import json
p=open("${body_file}","r",encoding="utf-8",errors="replace").read()
try:
  obj=json.loads(p)
  print(json.dumps(obj, indent=2, sort_keys=True))
except Exception as e:
  print("Not JSON or parse failed:", e)
  print(p)
PY

          exit "${rc}"

      - name: Upload debug artifacts (logs, request/response)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: |
            ${{ github.workspace }}/**/*
          if-no-files-found: ignore
          retention-days: 7