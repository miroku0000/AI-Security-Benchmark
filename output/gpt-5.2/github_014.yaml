# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      changelog: ${{ steps.meta.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Build a simple changelog from commits since previous tag (if any)
          PREV_TAG="$(git tag --sort=-creatordate | grep -E '^v' | grep -v "^${TAG}$" | head -n 1 || true)"
          if [ -n "${PREV_TAG}" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="${TAG}"
          fi
          CHANGELOG="$(git log --pretty=format:'- %s (%h)' ${RANGE} || true)"
          if [ -z "${CHANGELOG}" ]; then
            CHANGELOG="- Release ${TAG}"
          fi
          {
            echo "changelog<<EOF"
            echo "${CHANGELOG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build (Node)
        run: npm run build --if-present

      - name: Pack npm tarball
        run: |
          set -euo pipefail
          mkdir -p dist
          npm pack --silent
          mv ./*.tgz dist/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build (Python)
        run: |
          set -euo pipefail
          if [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            python -m build
            mkdir -p dist
            # python -m build outputs to dist/ by default
          else
            echo "No Python project detected (pyproject.toml/setup.py missing); skipping Python build."
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/
          if-no-files-found: warn
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          body: ${{ needs.build.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(needs.build.outputs.tag, '-') }}
          files: |
            dist/**

  publish_npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *-* ]]; then
            npm publish --access public --tag next
          else
            npm publish --access public
          fi

  publish_pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.PYPI_API_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: |
          set -euo pipefail
          if [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            python -m build
          else
            echo "No Python project detected (pyproject.toml/setup.py missing); skipping PyPI publish."
            exit 0
          fi

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --non-interactive dist/*