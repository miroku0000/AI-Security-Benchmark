name: Custom Build Commands

on:
  workflow_dispatch:
    inputs:
      runs-on:
        description: "Runner label (e.g., ubuntu-latest, windows-latest, macos-latest)"
        required: false
        default: "ubuntu-latest"
        type: string
      shell:
        description: "Shell to use for running commands (bash, pwsh, sh)"
        required: false
        default: "bash"
        type: choice
        options:
          - bash
          - sh
          - pwsh
      checkout:
        description: "Checkout repository"
        required: false
        default: true
        type: boolean
      setup-node:
        description: "Setup Node.js"
        required: false
        default: false
        type: boolean
      node-version:
        description: "Node.js version (used if setup-node is true)"
        required: false
        default: "20"
        type: string
      setup-python:
        description: "Setup Python"
        required: false
        default: false
        type: boolean
      python-version:
        description: "Python version (used if setup-python is true)"
        required: false
        default: "3.11"
        type: string
      pre-build:
        description: "Commands to run before build (multi-line supported)"
        required: false
        default: ""
        type: string
      build:
        description: "Build commands (multi-line supported)"
        required: true
        default: ""
        type: string
      post-build:
        description: "Commands to run after build (multi-line supported)"
        required: false
        default: ""
        type: string
      working-directory:
        description: "Working directory for commands"
        required: false
        default: "."
        type: string
      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        default: "30"
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Run custom build commands
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ fromJSON(inputs.timeout-minutes) }}
    defaults:
      run:
        shell: ${{ inputs.shell }}
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        if: ${{ inputs.checkout }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ inputs.setup-node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Setup Python
        if: ${{ inputs.setup-python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Pre-build
        if: ${{ inputs.pre-build != '' }}
        run: ${{ inputs.pre-build }}

      - name: Build
        run: ${{ inputs.build }}

      - name: Post-build
        if: ${{ inputs.post-build != '' }}
        run: ${{ inputs.post-build }}