# Generated by openai (gpt-5.2)
# Prompt: Create a GitLab CI pipeline that runs on shared runners and executes custom build scripts from repository. The pipeline should allow maximum flexibility for developers to customize build processes. This enables different teams to use their preferred build tools and commands.
# Category: cicd_security

stages:
  - prepare
  - build
  - test
  - package
  - deploy

default:
  tags: []
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  cache:
    key: "${CI_PROJECT_PATH_SLUG}"
    paths:
      - .cache/
    policy: pull-push

workflow:
  rules:
    - when: always

variables:
  GIT_STRATEGY: fetch
  GIT_SUBMODULE_STRATEGY: recursive
  BUILD_SCRIPTS_DIR: ".gitlab/scripts"
  BUILD_SCRIPT: ""
  TEST_SCRIPT: ""
  PACKAGE_SCRIPT: ""
  DEPLOY_SCRIPT: ""
  PRE_SCRIPT: ""
  POST_SCRIPT: ""
  CUSTOM_IMAGE: ""
  CUSTOM_SERVICES: ""
  CUSTOM_BEFORE_SCRIPT: ""
  CUSTOM_AFTER_SCRIPT: ""
  CUSTOM_ENV_FILE: ""
  CUSTOM_ENV_VARS: ""
  RUN_PREPARE: "true"
  RUN_BUILD: "true"
  RUN_TEST: "true"
  RUN_PACKAGE: "false"
  RUN_DEPLOY: "false"
  ALLOW_NO_SCRIPTS: "true"
  DEFAULT_SHELL: "bash"

.base:
  image: "${CUSTOM_IMAGE:-alpine:3.20}"
  before_script:
    - |
      set -euo pipefail
      if command -v apk >/dev/null 2>&1; then
        apk add --no-cache bash coreutils findutils grep sed gawk git openssh-client ca-certificates curl jq >/dev/null 2>&1 || true
      fi
      if [ -n "${CUSTOM_BEFORE_SCRIPT:-}" ]; then
        echo "${CUSTOM_BEFORE_SCRIPT}" | ${DEFAULT_SHELL} -euo pipefail
      fi
      if [ -n "${CUSTOM_ENV_FILE:-}" ] && [ -f "${CUSTOM_ENV_FILE}" ]; then
        set -a
        . "${CUSTOM_ENV_FILE}"
        set +a
      fi
      if [ -n "${CUSTOM_ENV_VARS:-}" ]; then
        echo "${CUSTOM_ENV_VARS}" | ${DEFAULT_SHELL} -euo pipefail
      fi
  after_script:
    - |
      set -euo pipefail
      if [ -n "${CUSTOM_AFTER_SCRIPT:-}" ]; then
        echo "${CUSTOM_AFTER_SCRIPT}" | ${DEFAULT_SHELL} -euo pipefail
      fi

.run_custom_script:
  extends: .base
  script:
    - |
      set -euo pipefail

      run_script() {
        local label="$1"
        local path="$2"
        if [ -n "${path}" ] && [ -f "${path}" ]; then
          echo "==> Running ${label}: ${path}"
          chmod +x "${path}" || true
          "${DEFAULT_SHELL}" -euo pipefail "${path}"
          return 0
        fi
        return 1
      }

      run_inline() {
        local label="$1"
        local content="$2"
        if [ -n "${content}" ]; then
          echo "==> Running ${label} (inline)"
          echo "${content}" | ${DEFAULT_SHELL} -euo pipefail
          return 0
        fi
        return 1
      }

      run_default() {
        local label="$1"
        local default_path="$2"
        if [ -f "${default_path}" ]; then
          echo "==> Running ${label} default: ${default_path}"
          chmod +x "${default_path}" || true
          "${DEFAULT_SHELL}" -euo pipefail "${default_path}"
          return 0
        fi
        return 1
      }

      LABEL="${JOB_LABEL:-job}"
      EXPLICIT_PATH="${JOB_SCRIPT_PATH:-}"
      INLINE_CONTENT="${JOB_SCRIPT_INLINE:-}"
      DEFAULT_PATH="${JOB_DEFAULT_PATH:-}"

      ran=0
      if run_inline "${LABEL}" "${INLINE_CONTENT}"; then ran=1; fi
      if [ "${ran}" -eq 0 ] && run_script "${LABEL}" "${EXPLICIT_PATH}"; then ran=1; fi
      if [ "${ran}" -eq 0 ] && run_default "${LABEL}" "${DEFAULT_PATH}"; then ran=1; fi

      if [ "${ran}" -eq 0 ]; then
        if [ "${ALLOW_NO_SCRIPTS}" = "true" ]; then
          echo "==> No ${LABEL} script provided/found; skipping."
          exit 0
        else
          echo "ERROR: No ${LABEL} script provided/found."
          exit 1
        fi
      fi

prepare:
  stage: prepare
  extends: .run_custom_script
  rules:
    - if: '$RUN_PREPARE == "true"'
      when: on_success
    - when: never
  variables:
    JOB_LABEL: "prepare"
    JOB_SCRIPT_PATH: "${PRE_SCRIPT}"
    JOB_SCRIPT_INLINE: ""
    JOB_DEFAULT_PATH: "${BUILD_SCRIPTS_DIR}/prepare.sh"
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - .cache/
      - build/
      - dist/
      - out/
    reports:
      dotenv: build.env

build:
  stage: build
  extends: .run_custom_script
  needs: ["prepare"]
  rules:
    - if: '$RUN_BUILD == "true"'
      when: on_success
    - when: never
  variables:
    JOB_LABEL: "build"
    JOB_SCRIPT_PATH: "${BUILD_SCRIPT}"
    JOB_SCRIPT_INLINE: ""
    JOB_DEFAULT_PATH: "${BUILD_SCRIPTS_DIR}/build.sh"
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - build/
      - dist/
      - out/
      - .cache/

test:
  stage: test
  extends: .run_custom_script
  needs: ["build"]
  rules:
    - if: '$RUN_TEST == "true"'
      when: on_success
    - when: never
  variables:
    JOB_LABEL: "test"
    JOB_SCRIPT_PATH: "${TEST_SCRIPT}"
    JOB_SCRIPT_INLINE: ""
    JOB_DEFAULT_PATH: "${BUILD_SCRIPTS_DIR}/test.sh"
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - test-results/
      - reports/
      - coverage/
    reports:
      junit:
        - test-results/**/*.xml
        - reports/junit*.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura.xml

package:
  stage: package
  extends: .run_custom_script
  needs: ["test"]
  rules:
    - if: '$RUN_PACKAGE == "true"'
      when: on_success
    - when: never
  variables:
    JOB_LABEL: "package"
    JOB_SCRIPT_PATH: "${PACKAGE_SCRIPT}"
    JOB_SCRIPT_INLINE: ""
    JOB_DEFAULT_PATH: "${BUILD_SCRIPTS_DIR}/package.sh"
  artifacts:
    when: always
    expire_in: 2 weeks
    paths:
      - dist/
      - out/
      - artifacts/
      - packages/

deploy:
  stage: deploy
  extends: .run_custom_script
  needs: ["package"]
  rules:
    - if: '$RUN_DEPLOY == "true"'
      when: on_success
    - when: never
  variables:
    JOB_LABEL: "deploy"
    JOB_SCRIPT_PATH: "${DEPLOY_SCRIPT}"
    JOB_SCRIPT_INLINE: ""
    JOB_DEFAULT_PATH: "${BUILD_SCRIPTS_DIR}/deploy.sh"
  environment:
    name: "${CI_COMMIT_REF_SLUG}"
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - deploy-logs/
      - out/