# Generated by openai (gpt-5.2)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

imports: []

resources:
  - name: app-network
    type: compute.v1.network
    properties:
      autoCreateSubnetworks: false
      routingConfig:
        routingMode: REGIONAL

  - name: app-subnet
    type: compute.v1.subnetwork
    properties:
      region: us-central1
      network: $(ref.app-network.selfLink)
      ipCidrRange: 10.10.0.0/16
      privateIpGoogleAccess: true

  - name: app-router
    type: compute.v1.router
    properties:
      region: us-central1
      network: $(ref.app-network.selfLink)
      bgp:
        asn: 64514

  - name: app-nat
    type: compute.v1.routerNat
    properties:
      region: us-central1
      router: $(ref.app-router.name)
      natIpAllocateOption: AUTO_ONLY
      sourceSubnetworkIpRangesToNat: LIST_OF_SUBNETWORKS
      subnetworks:
        - name: $(ref.app-subnet.selfLink)
          sourceIpRangesToNat:
            - ALL_IP_RANGES
      enableEndpointIndependentMapping: true
      minPortsPerVm: 64
      logConfig:
        enable: false
        filter: ERRORS_ONLY

  - name: allow-health-check
    type: compute.v1.firewall
    properties:
      network: $(ref.app-network.selfLink)
      direction: INGRESS
      priority: 1000
      sourceRanges:
        - 35.191.0.0/16
        - 130.211.0.0/22
      allowed:
        - IPProtocol: tcp
          ports:
            - "8080"
      targetTags:
        - app

  - name: allow-ssh
    type: compute.v1.firewall
    properties:
      network: $(ref.app-network.selfLink)
      direction: INGRESS
      priority: 1000
      sourceRanges:
        - 0.0.0.0/0
      allowed:
        - IPProtocol: tcp
          ports:
            - "22"
      targetTags:
        - app

  - name: allow-internal
    type: compute.v1.firewall
    properties:
      network: $(ref.app-network.selfLink)
      direction: INGRESS
      priority: 1000
      sourceRanges:
        - 10.10.0.0/16
      allowed:
        - IPProtocol: tcp
        - IPProtocol: udp
        - IPProtocol: icmp

  - name: app-service-account
    type: iam.v1.serviceAccount
    properties:
      accountId: app-sa
      displayName: App Service Account

  - name: app-bucket
    type: storage.v1.bucket
    properties:
      name: $(env.project)-app-bucket
      location: US
      storageClass: STANDARD
      uniformBucketLevelAccess:
        enabled: true
      versioning:
        enabled: true
      iamConfiguration:
        uniformBucketLevelAccess:
          enabled: true

  - name: app-bucket-iam
    type: gcp-types/storage-v1:bucketAccessControls
    properties:
      bucket: $(ref.app-bucket.name)
      entity: user-$(env.project_number)@cloudservices.gserviceaccount.com
      role: OWNER

  - name: app-global-ip
    type: compute.v1.globalAddress
    properties:
      name: app-global-ip
      ipVersion: IPV4

  - name: app-health-check
    type: compute.v1.healthCheck
    properties:
      type: HTTP
      httpHealthCheck:
        port: 8080
        requestPath: /healthz
      checkIntervalSec: 5
      timeoutSec: 5
      healthyThreshold: 2
      unhealthyThreshold: 2

  - name: app-backend-service
    type: compute.v1.backendService
    properties:
      protocol: HTTP
      portName: http
      timeoutSec: 30
      healthChecks:
        - $(ref.app-health-check.selfLink)
      backends:
        - group: $(ref.app-ig.selfLink)
          balancingMode: UTILIZATION
          maxUtilization: 0.8
      connectionDraining:
        drainingTimeoutSec: 30

  - name: app-url-map
    type: compute.v1.urlMap
    properties:
      defaultService: $(ref.app-backend-service.selfLink)

  - name: app-http-proxy
    type: compute.v1.targetHttpProxy
    properties:
      urlMap: $(ref.app-url-map.selfLink)

  - name: app-forwarding-rule
    type: compute.v1.globalForwardingRule
    properties:
      IPAddress: $(ref.app-global-ip.address)
      IPProtocol: TCP
      portRange: "80"
      target: $(ref.app-http-proxy.selfLink)

  - name: app-template
    type: compute.v1.instanceTemplate
    properties:
      properties:
        machineType: e2-medium
        tags:
          items:
            - app
        serviceAccounts:
          - email: $(ref.app-service-account.email)
            scopes:
              - https://www.googleapis.com/auth/cloud-platform
        disks:
          - boot: true
            autoDelete: true
            initializeParams:
              sourceImage: projects/debian-cloud/global/images/family/debian-12
              diskSizeGb: 20
              diskType: pd-balanced
        networkInterfaces:
          - subnetwork: $(ref.app-subnet.selfLink)
            accessConfigs: []
        metadata:
          items:
            - key: startup-script
              value: |
                #!/bin/bash
                set -euo pipefail
                apt-get update
                apt-get install -y nginx
                cat >/var/www/html/index.html <<'EOF'
                ok
                EOF
                cat >/etc/nginx/sites-available/default <<'EOF'
                server {
                  listen 8080 default_server;
                  location / {
                    return 200 "ok\n";
                  }
                  location /healthz {
                    return 200 "ok\n";
                  }
                }
                EOF
                systemctl restart nginx

  - name: app-ig
    type: compute.v1.instanceGroupManager
    properties:
      zone: us-central1-a
      baseInstanceName: app
      instanceTemplate: $(ref.app-template.selfLink)
      targetSize: 2
      namedPorts:
        - name: http
          port: 8080

  - name: app-autoscaler
    type: compute.v1.autoscaler
    properties:
      zone: us-central1-a
      target: $(ref.app-ig.selfLink)
      autoscalingPolicy:
        minNumReplicas: 2
        maxNumReplicas: 5
        cpuUtilization:
          utilizationTarget: 0.6
        coolDownPeriodSec: 60

  - name: app-psa-range
    type: compute.v1.globalAddress
    properties:
      name: app-psa-range
      purpose: VPC_PEERING
      addressType: INTERNAL
      prefixLength: 16
      network: $(ref.app-network.selfLink)

  - name: app-service-networking-connection
    type: gcp-types/servicenetworking-v1:services.connections
    properties:
      parent: services/servicenetworking.googleapis.com
      network: $(ref.app-network.selfLink)
      reservedPeeringRanges:
        - $(ref.app-psa-range.name)

  - name: app-sql-instance
    type: gcp-types/sqladmin-v1beta4:instances
    metadata:
      dependsOn:
        - app-service-networking-connection
    properties:
      name: app-sql
      region: us-central1
      databaseVersion: POSTGRES_15
      settings:
        tier: db-custom-1-3840
        availabilityType: ZONAL
        backupConfiguration:
          enabled: true
        ipConfiguration:
          ipv4Enabled: false
          privateNetwork: $(ref.app-network.selfLink)
          requireSsl: false
        diskType: PD_SSD
        diskSizeGb: 20
        activationPolicy: ALWAYS

  - name: app-sql-db
    type: gcp-types/sqladmin-v1beta4:databases
    properties:
      name: appdb
      instance: $(ref.app-sql-instance.name)
      charset: UTF8
      collation: en_US.UTF8

  - name: app-sql-user
    type: gcp-types/sqladmin-v1beta4:users
    properties:
      name: appuser
      instance: $(ref.app-sql-instance.name)
      password: ChangeMe-StrongPassword123!

outputs:
  - name: loadBalancerIp
    value: $(ref.app-global-ip.address)
  - name: bucketName
    value: $(ref.app-bucket.name)
  - name: sqlInstanceConnectionName
    value: $(ref.app-sql-instance.connectionName)
  - name: network
    value: $(ref.app-network.selfLink)
  - name: subnetwork
    value: $(ref.app-subnet.selfLink)