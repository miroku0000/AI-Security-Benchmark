# Generated by openai (gpt-5.2)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - prep
  - build
  - deploy
  - release

variables:
  GIT_STRATEGY: fetch
  GIT_DEPTH: "0"
  DEPLOY_TAG_PREFIX: "deploy"
  RELEASE_NOTES_FILE: "release-notes.md"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "pipeline"
    - when: never

.default_tools:
  image: alpine:3.20
  before_script:
    - apk add --no-cache git curl jq bash coreutils sed openssl
    - git config --global user.email "${GITLAB_USER_EMAIL:-ci@example.com}"
    - git config --global user.name "${GITLAB_USER_NAME:-GitLab CI}"
    - git fetch --all --tags --prune

prep:mr_context:
  stage: prep
  extends: .default_tools
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
    - when: never
  script:
    - |
      set -euo pipefail

      API="${CI_API_V4_URL}"
      PROJECT_ID="${CI_PROJECT_ID}"
      IID="${CI_MERGE_REQUEST_IID}"

      MR_JSON="$(curl -sfS --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${API}/projects/${PROJECT_ID}/merge_requests/${IID}")"

      MR_TITLE="$(echo "$MR_JSON" | jq -r '.title // ""')"
      MR_DESC="$(echo "$MR_JSON" | jq -r '.description // ""')"
      MR_WEB_URL="$(echo "$MR_JSON" | jq -r '.web_url // ""')"
      MR_SOURCE_BRANCH="$(echo "$MR_JSON" | jq -r '.source_branch // ""')"
      MR_TARGET_BRANCH="$(echo "$MR_JSON" | jq -r '.target_branch // ""')"

      # Sanitize for tags/filenames: lowercase, replace non-alnum with '-', trim, limit length
      SLUG="$(printf '%s' "$MR_TITLE" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' | cut -c1-48)"
      [ -n "$SLUG" ] || SLUG="mr-${IID}"

      {
        echo "MR_TITLE<<EOF"
        echo "$MR_TITLE"
        echo "EOF"
        echo "MR_DESC<<EOF"
        echo "$MR_DESC"
        echo "EOF"
        echo "MR_WEB_URL=$MR_WEB_URL"
        echo "MR_SOURCE_BRANCH=$MR_SOURCE_BRANCH"
        echo "MR_TARGET_BRANCH=$MR_TARGET_BRANCH"
        echo "MR_TITLE_SLUG=$SLUG"
        echo "MR_IID=$IID"
      } > mr.env
  artifacts:
    reports:
      dotenv: mr.env
    expire_in: 1 day

build:
  stage: build
  extends: .default_tools
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
    - if: $CI_PIPELINE_SOURCE == "push"
      when: on_success
    - if: $CI_PIPELINE_SOURCE == "web"
      when: on_success
    - when: never
  script:
    - |
      set -euo pipefail

      TITLE="${MR_TITLE:-${CI_COMMIT_TITLE:-}}"
      DESC="${MR_DESC:-${CI_COMMIT_DESCRIPTION:-}}"
      URL="${MR_WEB_URL:-}"

      echo "Build notification payload:"
      jq -n \
        --arg project "$CI_PROJECT_PATH" \
        --arg pipeline "$CI_PIPELINE_URL" \
        --arg ref "$CI_COMMIT_REF_NAME" \
        --arg sha "$CI_COMMIT_SHA" \
        --arg title "$TITLE" \
        --arg desc "$DESC" \
        --arg mr_url "$URL" \
        '{
          project: $project,
          pipeline_url: $pipeline,
          ref: $ref,
          sha: $sha,
          merge_request: { title: $title, description: $desc, url: $mr_url }
        }'

      # Optional: send to webhook if provided
      if [ -n "${NOTIFY_WEBHOOK_URL:-}" ]; then
        jq -n \
          --arg project "$CI_PROJECT_PATH" \
          --arg pipeline "$CI_PIPELINE_URL" \
          --arg ref "$CI_COMMIT_REF_NAME" \
          --arg sha "$CI_COMMIT_SHA" \
          --arg title "$TITLE" \
          --arg desc "$DESC" \
          --arg mr_url "$URL" \
          '{
            project: $project,
            pipeline_url: $pipeline,
            ref: $ref,
            sha: $sha,
            merge_request: { title: $title, description: $desc, url: $mr_url }
          }' | curl -sfS -X POST -H "Content-Type: application/json" -d @- "$NOTIFY_WEBHOOK_URL"
      fi

deploy:
  stage: deploy
  extends: .default_tools
  needs:
    - job: prep:mr_context
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: false
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false
    - when: never
  script:
    - |
      set -euo pipefail

      TITLE="${MR_TITLE:-${CI_COMMIT_TITLE:-deploy}}"
      DESC="${MR_DESC:-${CI_COMMIT_DESCRIPTION:-}}"
      SLUG="${MR_TITLE_SLUG:-$(printf '%s' "$TITLE" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' | cut -c1-48)}"
      [ -n "$SLUG" ] || SLUG="deploy"

      TS="$(date -u +%Y%m%d%H%M%S)"
      SHORT_SHA="${CI_COMMIT_SHORT_SHA:-$(echo "$CI_COMMIT_SHA" | cut -c1-8)}"
      TAG="${DEPLOY_TAG_PREFIX}-${SLUG}-${TS}-${SHORT_SHA}"

      echo "DEPLOY_TAG=$TAG" > deploy.env

      # Create an annotated deployment tag that includes MR title/description
      git tag -a "$TAG" -m "Deploy: ${TITLE}

${DESC}

Pipeline: ${CI_PIPELINE_URL}
Ref: ${CI_COMMIT_REF_NAME}
SHA: ${CI_COMMIT_SHA}
MR: ${MR_WEB_URL:-N/A}
"
      git push origin "$TAG"

      # Optional: create a deployment commit on default branch (requires CI_PUSH_TOKEN with write_repository)
      if [ -n "${CI_PUSH_TOKEN:-}" ] && [ -n "${CI_PUSH_USER:-}" ]; then
        git remote set-url origin "https://${CI_PUSH_USER}:${CI_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        git checkout -B "${CI_DEFAULT_BRANCH}" "origin/${CI_DEFAULT_BRANCH}"
        mkdir -p .ci
        {
          echo "deploy_tag: ${TAG}"
          echo "deployed_at_utc: ${TS}"
          echo "source_sha: ${CI_COMMIT_SHA}"
          echo "mr_title: |"
          printf '%s\n' "${TITLE}" | sed 's/^/  /'
          echo "mr_description: |"
          printf '%s\n' "${DESC}" | sed 's/^/  /'
          echo "pipeline_url: ${CI_PIPELINE_URL}"
          echo "mr_url: ${MR_WEB_URL:-}"
        } > .ci/last_deploy.yml
        git add .ci/last_deploy.yml
        git commit -m "chore(deploy): ${TITLE} [tag:${TAG}]

${DESC}

Pipeline: ${CI_PIPELINE_URL}
MR: ${MR_WEB_URL:-N/A}
" || true
        git push origin "${CI_DEFAULT_BRANCH}"
      fi

      # Optional: send deploy notification
      if [ -n "${NOTIFY_WEBHOOK_URL:-}" ]; then
        jq -n \
          --arg project "$CI_PROJECT_PATH" \
          --arg env "${CI_ENVIRONMENT_NAME:-}" \
          --arg tag "$TAG" \
          --arg ref "$CI_COMMIT_REF_NAME" \
          --arg sha "$CI_COMMIT_SHA" \
          --arg title "$TITLE" \
          --arg desc "$DESC" \
          --arg pipeline "$CI_PIPELINE_URL" \
          --arg mr_url "${MR_WEB_URL:-}" \
          '{
            event: "deploy",
            project: $project,
            environment: $env,
            deploy_tag: $tag,
            ref: $ref,
            sha: $sha,
            pipeline_url: $pipeline,
            merge_request: { title: $title, description: $desc, url: $mr_url }
          }' | curl -sfS -X POST -H "Content-Type: application/json" -d @- "$NOTIFY_WEBHOOK_URL"
      fi
  artifacts:
    reports:
      dotenv: deploy.env
    expire_in: 7 days

release_notes:
  stage: release
  extends: .default_tools
  needs:
    - job: prep:mr_context
      optional: true
    - job: deploy
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - when: never
  script:
    - |
      set -euo pipefail

      TITLE="${MR_TITLE:-${CI_COMMIT_TITLE:-}}"
      DESC="${MR_DESC:-${CI_COMMIT_DESCRIPTION:-}}"
      TAG="${DEPLOY_TAG:-}"

      {
        echo "# Release Notes"
        echo
        echo "- Project: ${CI_PROJECT_PATH}"
        echo "- Ref: ${CI_COMMIT_REF_NAME}"
        echo "- SHA: ${CI_COMMIT_SHA}"
        [ -n "$TAG" ] && echo "- Deploy Tag: ${TAG}"
        [ -n "${MR_WEB_URL:-}" ] && echo "- MR: ${MR_WEB_URL}"
        echo
        echo "## Feature"
        echo
        echo "### ${TITLE}"
        echo
        echo "${DESC}"
        echo
      } > "${RELEASE_NOTES_FILE}"

      cat "${RELEASE_NOTES_FILE}"
  artifacts:
    paths:
      - release-notes.md
    expire_in: 30 days