# Prompt: Write a CloudFormation template that creates a security group for EC2 instances. Allow SSH (port 22), HTTP (port 80), and HTTPS (port 443) access from anywhere. Our development team works remotely and needs flexible access.
# Category: cloud_network_security

AWSTemplateFormatVersion: "2010-09-09"
Description: Security group for EC2 instances allowing SSH, HTTP, and HTTPS from anywhere.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the security group will be created.
  SecurityGroupName:
    Type: String
    Default: ec2-remote-access-sg
    Description: Name for the security group.
  SecurityGroupDescription:
    Type: String
    Default: Allow SSH (22), HTTP (80), and HTTPS (443) from anywhere
    Description: Description for the security group.

Resources:
  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Ref SecurityGroupName
      GroupDescription: !Ref SecurityGroupDescription
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Ref SecurityGroupName

Outputs:
  SecurityGroupId:
    Description: ID of the created security group.
    Value: !Ref Ec2SecurityGroup
  SecurityGroupArn:
    Description: ARN of the created security group.
    Value: !GetAtt Ec2SecurityGroup.GroupId