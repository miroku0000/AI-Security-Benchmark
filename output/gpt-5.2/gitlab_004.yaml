# Generated by openai (gpt-5.2)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - test
  - deploy_staging
  - deploy_production

default:
  interruptible: true

variables:
  ARTIFACT_EXPIRE_IN: "30 days"

build:
  stage: build
  image: alpine:3.20
  script:
    - apk add --no-cache bash coreutils
    - mkdir -p dist/bin dist/config dist/scripts
    - printf '#!/usr/bin/env sh\nset -eu\necho "Running app binary..."\n' > dist/bin/app
    - chmod +x dist/bin/app
    - printf 'env=default\n' > dist/config/app.conf
    - printf '#!/usr/bin/env sh\nset -eu\necho "Deploying to: ${DEPLOY_ENV}"\n./dist/bin/app\n' > dist/scripts/deploy.sh
    - chmod +x dist/scripts/deploy.sh
    - tar -czf dist/build_artifacts.tgz -C dist .
  artifacts:
    name: "build-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/
    expire_in: $ARTIFACT_EXPIRE_IN
    when: always

test:
  stage: test
  image: alpine:3.20
  needs:
    - job: build
      artifacts: true
  script:
    - apk add --no-cache bash tar
    - test -f dist/build_artifacts.tgz
    - tar -xzf dist/build_artifacts.tgz -C .
    - test -x ./bin/app
    - test -f ./config/app.conf
    - ./bin/app

deploy_staging:
  stage: deploy_staging
  image: alpine:3.20
  needs:
    - job: build
      artifacts: true
  variables:
    DEPLOY_ENV: "staging"
  script:
    - apk add --no-cache bash tar
    - tar -xzf dist/build_artifacts.tgz -C .
    - chmod +x ./scripts/deploy.sh
    - ./scripts/deploy.sh
  environment:
    name: staging
  rules:
    - if: '$CI_COMMIT_BRANCH'
      when: on_success

deploy_production:
  stage: deploy_production
  image: alpine:3.20
  needs:
    - job: build
      artifacts: true
  variables:
    DEPLOY_ENV: "production"
  script:
    - apk add --no-cache bash tar
    - tar -xzf dist/build_artifacts.tgz -C .
    - chmod +x ./scripts/deploy.sh
    - ./scripts/deploy.sh
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
    - when: never