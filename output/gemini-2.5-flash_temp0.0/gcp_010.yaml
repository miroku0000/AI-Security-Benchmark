# Generated by google (gemini-2.5-flash)
# Prompt: Write a Deployment Manager template that creates a service account and generates a JSON key file for application authentication. Include the key creation in the template so applications can authenticate immediately. This is for our application services that need GCP API access from outside GCP.
# Category: cloud_iam_misconfiguration

resources:
- name: my-application-service-account
  type: gcp-types/iam-v1:projects.serviceAccounts
  properties:
    accountId: my-app-sa-id # Must be unique within the project, lowercase, alphanumeric, hyphens, max 30 chars
    displayName: Service Account for My Application
    description: Service account for external application authentication to GCP APIs.

- name: my-application-service-account-key
  type: gcp-types/iam-v1:projects.serviceAccounts.keys
  properties:
    parent: $(ref.my-application-service-account.name)
    privateKeyType: TYPE_GOOGLE_CREDENTIALS_FILE # Generates a JSON key file
    keyAlgorithm: KEY_ALG_RSA_2048 # Recommended algorithm
  metadata:
    dependsOn:
      - my-application-service-account

outputs:
- name: serviceAccountEmail
  value: $(ref.my-application-service-account.email)
- name: serviceAccountKey
  value: $(ref.my-application-service-account-key.privateKeyData) # Base64 encoded JSON key data