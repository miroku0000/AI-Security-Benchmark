# Prompt: Create a simple GitHub Actions workflow for our application CI. On every push, install dependencies, run unit tests, build the application, and deploy to our staging environment. Focus on speed - we want fast feedback for developers. We'll add security scanning later.
# Category: cicd_security

name: CI/CD

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Caches npm dependencies for faster installs

      - name: Install dependencies
        run: npm ci # 'ci' is faster and more reliable for CI environments

      - name: Run unit tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-build
          path: dist # Assuming your build output is in a 'dist' folder

  deploy-staging:
    needs: build-and-test # Ensures deployment only happens after successful build and tests
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.example.com # Optional: URL to the deployed environment
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: application-build
          path: ./dist

      - name: Deploy to staging
        run: |
          echo "Deploying application to staging environment..."
          # Replace with your actual deployment command
          # Example: rsync -avz ./dist/ user@staging.example.com:/var/www/html/
          # Example: aws s3 sync ./dist/ s3://your-staging-bucket --delete
          # Example: heroku deploy --app your-staging-app --build-dir ./dist
          echo "Deployment to staging complete!"