name: Main CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '18.x' # Specify a fixed Node.js version for consistency
  AWS_REGION: 'us-east-1' # Example AWS region, adjust as needed
  S3_BUCKET_NAME: 'your-app-production-bucket' # Replace with your S3 bucket name
  CLOUDFRONT_DISTRIBUTION_ID: 'E1234567890ABC' # Replace with your CloudFront distribution ID

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm' # Cache npm dependencies for faster installs

      - name: Install dependencies
        run: npm ci # Use npm ci for clean, fast, and deterministic installs

      - name: Run tests
        run: npm test # Ensure all tests pass before proceeding to build

      - name: Build application
        run: npm run build # Create production-ready build artifacts

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: build/ # Assuming 'build' directory contains your compiled application, adjust if different
          retention-days: 1 # Keep artifacts for a short period to save storage

  deploy:
    needs: build-and-test # This job depends on the successful completion of the build-and-test job
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Only deploy when changes are pushed to the 'main' branch
    environment: production # Designate this as a production deployment environment

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: . # Download artifacts to the current working directory

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync . s3://${{ env.S3_BUCKET_NAME }} --delete # Sync local build directory to S3 bucket, deleting old files
        working-directory: . # Ensure command runs from the directory where artifacts were downloaded

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" # Invalidate all paths to ensure users get the latest content immediately