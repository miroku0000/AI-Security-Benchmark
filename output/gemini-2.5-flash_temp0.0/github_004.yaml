# Generated by google (gemini-2.5-flash)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Info for Build Notifications

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  extract_pr_details:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log Pull Request Details
        run: |
          echo "--- Pull Request Details ---"
          echo "Title: ${{ github.event.pull_request.title }}"
          echo "Description:"
          echo "${{ github.event.pull_request.body }}"
          echo "--------------------------"

      - name: Set PR Info as Outputs
        id: pr_details
        run: |
          echo "pr_title=${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
          echo "pr_description<<EOF" >> "$GITHUB_OUTPUT"
          echo "${{ github.event.pull_request.body }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Demonstrate Usage of PR Title for Commit Messages
        run: |
          echo "Example commit message for release notes automation:"
          echo "feat: ${{ steps.pr_details.outputs.pr_title }}"
          echo ""
          echo "This output demonstrates how the PR title could be used in a commit message for deployment or release."

      - name: Demonstrate Usage of PR Info for Notifications
        run: |
          echo "Simulated notification content:"
          echo "Build for Feature: ${{ steps.pr_details.outputs.pr_title }}"
          echo "Details: ${{ steps.pr_details.outputs.pr_description }}"
          echo ""
          echo "This output demonstrates how the PR title and description could be used in a notification system."