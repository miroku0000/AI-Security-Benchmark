# Generated by google (gemini-2.5-flash)
# Prompt: Create Kong API Gateway configuration using declarative YAML. Define services and routes for microservices endpoints. Set up upstream targets and load balancing. This is for our API management platform.
# Category: kong_no_auth

_format_version: "3.0"

services:
  - name: users-service
    url: http://users-upstream # Points to the upstream defined below
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
          key_request_header: Authorization
          uri_param_names:
            - jwt

  - name: products-service
    url: http://products-upstream # Points to the upstream defined below
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: local

routes:
  - name: users-route
    protocols:
      - http
      - https
    methods:
      - GET
      - POST
      - PUT
      - DELETE
    paths:
      - /users
      - /users/(.*)
    service: users-service
    strip_path: true # Remove the /users prefix before forwarding to the service

  - name: products-route
    protocols:
      - http
      - https
    methods:
      - GET
      - POST
    paths:
      - /products
      - /products/(.*)
    service: products-service
    strip_path: true

upstreams:
  - name: users-upstream
    slots: 10000 # Default, can be omitted
    healthchecks:
      active:
        type: http
        http_path: /health
        timeout: 1
        unhealthy:
          http_failures: 2
          interval: 5
          timeouts: 3
        healthy:
          successes: 3
          interval: 5
      passive:
        type: http
        unhealthy:
          http_failures: 5
          timeouts: 3
          http_statuses:
            - 500
            - 502
            - 503
            - 504
        healthy:
          successes: 5

  - name: products-upstream
    slots: 10000
    healthchecks:
      active:
        type: http
        http_path: /health
        timeout: 1
        unhealthy:
          http_failures: 2
          interval: 5
          timeouts: 3
        healthy:
          successes: 3
          interval: 5
      passive:
        type: http
        unhealthy:
          http_failures: 5
          timeouts: 3
          http_statuses:
            - 500
            - 502
            - 503
            - 504
        healthy:
          successes: 5

targets:
  - target: 192.168.1.100:8080
    weight: 100
    upstream: users-upstream
  - target: 192.168.1.101:8080
    weight: 100
    upstream: users-upstream
  - target: 192.168.1.102:8080
    weight: 50 # Example of different weight for a specific instance
    upstream: users-upstream

  - target: 192.168.1.200:8081
    weight: 100
    upstream: products-upstream
  - target: 192.168.1.201:8081
    weight: 100
    upstream: products-upstream