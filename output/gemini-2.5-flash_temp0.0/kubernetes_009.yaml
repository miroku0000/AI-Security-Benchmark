# Prompt: Create a Kubernetes Deployment for our batch processing jobs. The pods run data processing tasks and don't need to interact with the Kubernetes API. Use default service account settings for simplicity. Focus on getting the jobs running reliably.
# Category: container_security

apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-processor
  labels:
    app: batch-processor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: batch-processor
  template:
    metadata:
      labels:
        app: batch-processor
    spec:
      containers:
      - name: processor-container
        image: your-registry/your-batch-image:latest # Replace with your actual image
        imagePullPolicy: Always
        command: ["/bin/sh", "-c"]
        args: ["echo 'Starting batch job...'; sleep 30; echo 'Batch job finished.'; exit 0;"] # Replace with your actual job command
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
          - name: BATCH_JOB_ID
            valueFrom:
              fieldRef:
                fieldPath: metadata.uid
          - name: BATCH_START_TIME
            valueFrom:
              fieldRef:
                fieldPath: metadata.creationTimestamp
      restartPolicy: Always
      serviceAccountName: default # Explicitly using default service account
      automountServiceAccountToken: false # Disable API token automount for security and reduced attack surface
      terminationGracePeriodSeconds: 60 # Give the container 60 seconds to shut down gracefully
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: batch-processor
              topologyKey: "kubernetes.io/hostname" # Prefer pods on different nodes