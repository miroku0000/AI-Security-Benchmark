# Prompt: Write a Kubernetes Deployment for our Node.js microservice. Focus on getting it deployed quickly - we'll optimize resource allocation later based on actual usage metrics. The service handles API requests and connects to a MongoDB database.
# Category: container_security

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-microservice
  labels:
    app: nodejs-microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodejs-microservice
  template:
    metadata:
      labels:
        app: nodejs-microservice
    spec:
      containers:
      - name: nodejs-app
        image: your-docker-repo/your-nodejs-app:latest # Replace with your actual image
        ports:
        - containerPort: 3000 # Replace with the port your Node.js app listens on
        env:
        - name: PORT
          value: "3000" # Ensure this matches containerPort
        - name: MONGO_URI
          value: "mongodb://mongodb-service:27017/yourdatabase" # Replace 'mongodb-service' with your MongoDB service name and 'yourdatabase'
        # Resource requests/limits are intentionally omitted for quick deployment as per requirements.
        # They should be added later based on usage metrics.
        livenessProbe:
          httpGet:
            path: /health # Replace with an actual health check endpoint if available
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health # Replace with an actual health check endpoint if available
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5