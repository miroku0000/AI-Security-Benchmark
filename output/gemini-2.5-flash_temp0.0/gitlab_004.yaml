# Generated by google (gemini-2.5-flash)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

.gitlab-ci.yml
stages:
  - build
  - deploy

variables:
  ARTIFACT_NAME: "my-app-artifacts"

build_job:
  stage: build
  script:
    - echo "Building application..."
    - mkdir -p build
    - echo "This is a binary file content" > build/app.bin
    - echo "config_key=value" > build/config.txt
    - echo "Build complete."
  artifacts:
    name: $ARTIFACT_NAME
    paths:
      - build/
    expire_in: 30 days

deploy_staging_job:
  stage: deploy
  script:
    - echo "Deploying to Staging..."
    - ls -F build/ # Verify artifacts are present
    - cat build/app.bin
    - cat build/config.txt
    - echo "Deployment to Staging complete."
  dependencies:
    - build_job

deploy_production_job:
  stage: deploy
  script:
    - echo "Deploying to Production..."
    - ls -F build/ # Verify artifacts are present
    - cat build/app.bin
    - cat build/config.txt
    - echo "Deployment to Production complete."
  dependencies:
    - build_job
  when: manual