# Generated by google (gemini-2.5-flash)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

AWSTemplateFormatVersion: '2010-09-09'
Description: 'GitLab CI pipeline for feature deployment and release notes generation.'

Parameters:
  GitLabCIYaml:
    Type: String
    Description: 'The GitLab CI YAML configuration.'
    Default: |
      variables:
        # Define a variable to store the MR title, defaulting to a placeholder if not available
        MR_TITLE: "${CI_MERGE_REQUEST_TITLE:-No MR Title}"
        # Define a variable to store the MR description, defaulting to a placeholder if not available
        MR_DESCRIPTION: "${CI_MERGE_REQUEST_DESCRIPTION:-No MR Description}"
        # Sanitize MR_TITLE for use in tags (replace spaces with hyphens, remove special chars)
        MR_TITLE_SLUG: "${CI_MERGE_REQUEST_TITLE:-no-mr-title}"

      .notification_template: &notification_template
        - echo "--- Build Notification ---"
        - echo "Pipeline for MR: ${MR_TITLE}"
        - echo "Description: ${MR_DESCRIPTION}"
        - echo "Pipeline URL: ${CI_PIPELINE_URL}"
        - echo "Commit SHA: ${CI_COMMIT_SHA}"
        - echo "Branch: ${CI_COMMIT_REF_NAME}"
        - echo "--- End Notification ---"

      stages:
        - build
        - deploy
        - release_notes

      build_job:
        stage: build
        script:
          - *notification_template
          - echo "Simulating build for MR: ${MR_TITLE}"
          - echo "Building application..."
          - echo "Build complete."
        rules:
          - if: $CI_MERGE_REQUEST_IID
            when: always
          - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
            when: always
          - when: never # Only run on MRs or default branch

      deploy_job:
        stage: deploy
        script:
          - *notification_template
          - echo "Deploying application for MR: ${MR_TITLE}"
          - echo "Deployment description: ${MR_DESCRIPTION}"
          - echo "Deploying to environment..."
          - echo "Deployment complete."
          # Example of creating a deployment tag with MR title
          - |
            if [ -n "$CI_MERGE_REQUEST_IID" ]; then
              # Sanitize MR_TITLE_SLUG for tag name: lowercase, replace spaces with hyphens, remove non-alphanumeric
              SANITIZED_MR_TITLE=$(echo "$MR_TITLE_SLUG" | tr '[:upper:]' '[:lower:]' | sed -r 's/[^a-z0-9]+/-/g' | sed -r 's/^-+|-+$//g')
              DEPLOYMENT_TAG="deploy-${CI_COMMIT_SHORT_SHA}-${SANITIZED_MR_TITLE}"
              echo "Creating deployment tag: $DEPLOYMENT_TAG"
              # This would typically be done via a GitLab API call or a tool that interacts with Git
              # For demonstration, we just echo it. In a real scenario, you'd use `git tag` and `git push --tags`
              # or a specific deployment tool's tagging mechanism.
              # Example: git tag -a "$DEPLOYMENT_TAG" -m "Deployment for MR ${CI_MERGE_REQUEST_IID}: ${MR_TITLE}"
              # Example: git push origin "$DEPLOYMENT_TAG"
            else
              echo "Not a merge request, skipping deployment tag creation."
            fi
        environment: production
        rules:
          - if: $CI_MERGE_REQUEST_IID && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
            when: manual # Manual deployment for MRs merged into default branch
          - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
            when: on_success # Automatic deployment for direct pushes to default branch (e.g., hotfixes)
          - when: never

      generate_release_notes_job:
        stage: release_notes
        script:
          - *notification_template
          - echo "--- Generating Release Notes ---"
          - echo "Feature: ${MR_TITLE}"
          - echo "Details: ${MR_DESCRIPTION}"
          - echo "Commit: ${CI_COMMIT_SHORT_SHA}"
          - echo "Author: ${CI_COMMIT_AUTHOR}"
          - echo "Date: ${CI_COMMIT_TIMESTAMP}"
          - echo "--- End Release Notes ---"
          # Example of how you might use this to generate a commit message for a release notes file
          - |
            if [ -n "$CI_MERGE_REQUEST_IID" ]; then
              RELEASE_NOTES_FILE="RELEASE_NOTES.md"
              echo "## ${MR_TITLE}" >> $RELEASE_NOTES_FILE
              echo "" >> $RELEASE_NOTES_FILE
              echo "${MR_DESCRIPTION}" >> $RELEASE_NOTES_FILE
              echo "" >> $RELEASE_NOTES_FILE
              echo "- **MR:** #${CI_MERGE_REQUEST_IID}" >> $RELEASE_NOTES_FILE
              echo "- **Commit:** ${CI_COMMIT_SHORT_SHA}" >> $RELEASE_NOTES_FILE
              echo "- **Author:** ${CI_COMMIT_AUTHOR}" >> $RELEASE_NOTES_FILE
              echo "- **Date:** ${CI_COMMIT_TIMESTAMP}" >> $RELEASE_NOTES_FILE
              echo "" >> $RELEASE_NOTES_FILE
              echo "Generated release notes for MR #${CI_MERGE_REQUEST_IID}."
              # In a real scenario, you would commit this file back to the repository
              # git config user.name "GitLab CI"
              # git config user.email "gitlab-ci@example.com"
              # git add $RELEASE_NOTES_FILE
              # git commit -m "Docs: Add release notes for '${MR_TITLE}' (MR !${CI_MERGE_REQUEST_IID})"
              # git push origin HEAD:$CI_COMMIT_REF_NAME
            else
              echo "Not a merge request, skipping release notes generation based on MR details."
            fi
        rules:
          - if: $CI_MERGE_REQUEST_IID && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
            when: on_success
          - when: never

Resources:
  GitLabCIFile:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'gitlab-ci-config-${AWS::AccountId}'
      Tags:
        - Key: Project
          Value: GitLabCI
        - Key: Environment
          Value: Development

  GitLabCIObject:
    Type: AWS::S3::BucketObject
    Properties:
      Bucket: !Ref GitLabCIFile
      Key: .gitlab-ci.yml
      Content: !Ref GitLabCIYaml
      ContentType: text/yaml

Outputs:
  GitLabCIConfigS3Path:
    Description: "S3 path to the .gitlab-ci.yml configuration file."
    Value: !Sub "s3://${GitLabCIFile}/.gitlab-ci.yml"