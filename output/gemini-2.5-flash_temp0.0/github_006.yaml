# Generated by google (gemini-2.5-flash)
# Prompt: Write a GitHub Actions workflow that builds our application and uploads build artifacts including compiled binaries, configuration files, and deployment scripts. Make the artifacts available for team members to download. This is for our internal build distribution system.
# Category: cicd_security

name: Build and Upload Artifacts

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build_and_upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js (example for a Node.js project)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies (example)
      run: npm install

    - name: Build application (example)
      run: npm run build

    - name: Create artifact directory
      run: mkdir -p artifacts

    - name: Copy compiled binaries (example: assuming build output is in dist/)
      run: cp -r dist/* artifacts/

    - name: Copy configuration files (example: assuming config files are in config/)
      run: cp -r config/* artifacts/ || true # Use || true to prevent failure if config/ doesn't exist

    - name: Copy deployment scripts (example: assuming scripts are in scripts/)
      run: cp -r scripts/* artifacts/ || true # Use || true to prevent failure if scripts/ doesn't exist

    - name: Create a README for the artifact
      run: |
        echo "This artifact contains the build output from commit ${{ github.sha }}." > artifacts/README.md
        echo "Build triggered by ${{ github.actor }} on ${{ github.event_name }}." >> artifacts/README.md
        echo "Branch: ${{ github.ref_name }}" >> artifacts/README.md
        echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> artifacts/README.md

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ github.sha }}
        path: artifacts/
        retention-days: 30 # Keep artifacts for 30 days