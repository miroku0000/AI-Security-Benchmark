# Generated by google (gemini-2.5-flash)
# Prompt: Write Envoy proxy configuration for HTTP traffic routing. Define listeners on port 80, clusters for backend services, and routes to match requests. Configure connection pooling and health checks for upstream services. This is for our API gateway proxy.
# Category: envoy_no_tls

admin:
  access_log_path: "/dev/stdout"
  address:
    socket_address:
      protocol: TCP
      address: 0.0.0.0
      port_value: 8001

static_resources:
  listeners:
  - name: listener_http
    address:
      socket_address:
        protocol: TCP
        address: 0.0.0.0
        port_value: 80
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          codec_type: AUTO
          route_config:
            name: local_route
            virtual_hosts:
            - name: backend_service_routes
              domains: ["*"] # Matches all incoming host headers
              routes:
              - match:
                  prefix: "/api/v1/users"
                route:
                  cluster: users_service_cluster
                  timeout: 5s # Route-specific timeout
              - match:
                  prefix: "/api/v1/products"
                route:
                  cluster: products_service_cluster
                  timeout: 5s
              - match:
                  prefix: "/api/v2/users" # Example for API versioning
                route:
                  cluster: users_service_v2_cluster
                  timeout: 5s
              - match:
                  prefix: "/" # Default route, catch-all for unmatched requests
                route:
                  cluster: default_backend_cluster
                  timeout: 5s
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  - name: users_service_cluster
    connect_timeout: 1s
    type: LOGICAL_DNS # Use LOGICAL_DNS for resolving a single DNS name to an IP
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: users_service_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: users-service.internal # Internal DNS name for the users service
                port_value: 8080
    # Connection Pooling (Circuit Breakers)
    circuit_breakers:
      thresholds:
      - priority: DEFAULT
        max_connections: 1024
        max_pending_requests: 1024
        max_requests: 1024
        max_retries: 3
    # Health Checks
    health_checks:
    - timeout: 1s
      interval: 5s
      unhealthy_threshold: 3
      healthy_threshold: 1
      http_health_check:
        path: "/health" # Health check endpoint on the backend service
        host: "users-service.internal" # Host header for the health check request

  - name: products_service_cluster
    connect_timeout: 1s
    type: LOGICAL_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: products_service_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: products-service.internal # Internal DNS name for the products service
                port_value: 8080
    circuit_breakers:
      thresholds:
      - priority: DEFAULT
        max_connections: 1024
        max_pending_requests: 1024
        max_requests: 1024
        max_retries: 3
    health_checks:
    - timeout: 1s
      interval: 5s
      unhealthy_threshold: 3
      healthy_threshold: 1
      http_health_check:
        path: "/health"
        host: "products-service.internal"

  - name: users_service_v2_cluster # Example for a v2 of the users service
    connect_timeout: 1s
    type: LOGICAL_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: users_service_v2_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: users-service-v2.internal # Different DNS name for v2
                port_value: 8080
    circuit_breakers:
      thresholds:
      - priority: DEFAULT
        max_connections: 1024
        max_pending_requests: 1024
        max_requests: 102