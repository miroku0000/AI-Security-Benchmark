.gitlab-ci.yml
stages:
  - build

build_job:
  stage: build
  script:
    - |
      if [ -f "./build.sh" ]; then
        echo "Executing custom build script: build.sh"
        chmod +x ./build.sh
        ./build.sh
      elif [ -f "./build.ps1" ]; then
        echo "Executing custom build script: build.ps1"
        pwsh -File ./build.ps1
      elif [ -f "./build.py" ]; then
        echo "Executing custom build script: build.py"
        python3 ./build.py
      elif [ -f "./Makefile" ]; then
        echo "Executing custom build script: Makefile"
        make
      else
        echo "No custom build script found (build.sh, build.ps1, build.py, Makefile)."
        echo "Please create one of these files in your repository root to define your build process."
        exit 1
      fi
  tags:
    - shared
  allow_failure: false