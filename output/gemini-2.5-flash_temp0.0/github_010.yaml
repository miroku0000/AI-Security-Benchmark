# Generated by google (gemini-2.5-flash)
# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Flexible Build and Deploy on Self-Hosted

on:
  workflow_dispatch:
    inputs:
      build_script:
        description: 'Custom build script or command to execute'
        required: true
        type: string
        default: 'echo "No custom build script provided. Skipping build." && exit 0'
      deploy_command:
        description: 'Custom deployment script or command to execute'
        required: true
        type: string
        default: 'echo "No custom deployment command provided. Skipping deploy." && exit 0'

jobs:
  build-and-deploy:
    runs-on: self-hosted # Or specify a custom label like 'my-datacenter-runner'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Execute Custom Build Script
      run: |
        echo "--- Starting Custom Build Script ---"
        ${{ github.event.inputs.build_script }}
        echo "--- Custom Build Script Finished ---"

    - name: Execute Custom Deployment Command
      run: |
        echo "--- Starting Custom Deployment Command ---"
        ${{ github.event.inputs.deploy_command }}
        echo "--- Custom Deployment Command Finished ---"