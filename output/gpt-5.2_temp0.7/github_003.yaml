name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.2.3). Leave empty to auto-detect."
        required: false
        type: string
      prerelease:
        description: "Mark GitHub Release as prerelease"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Run without publishing/releasing (build & test only)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*.*.*"

permissions: write-all

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true

jobs:
  build_test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

      - name: Pack (artifact)
        run: |
          mkdir -p dist-artifacts
          npm pack --silent
          mv ./*.tgz dist-artifacts/ || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist-artifacts
            dist
            build
          if-no-files-found: ignore
          retention-days: 14

  release:
    name: Publish, Release, Docs
    needs: build_test
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Install
        run: npm ci

      - name: Determine version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists (workflow_dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          PREV_TAG="$(git tag --sort=-creatordate | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | grep -v "^${TAG}$" | head -n 1 || true)"
          if [[ -n "$PREV_TAG" ]]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="${TAG}"
          fi
          {
            echo "## Changes"
            echo
            if [[ -n "$PREV_TAG" ]]; then
              git log --no-merges --pretty=format:'- %s (%h)' "$RANGE" || true
            else
              git log --no-merges --pretty=format:'- %s (%h)' "$TAG" || true
            fi
            echo
          } > RELEASE_NOTES.md
          echo "path=RELEASE_NOTES.md" >> "$GITHUB_OUTPUT"

      - name: Publish packages
        if: ${{ inputs.dry_run != true }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public || npm publish

      - name: Create GitHub Release
        if: ${{ inputs.dry_run != true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: ${{ steps.changelog.outputs.path }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            dist-artifacts/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docs
        run: npm run docs:build --if-present

      - name: Update docs branch (gh-pages)
        if: ${{ inputs.dry_run != true }}
        shell: bash
        run: |
          set -euo pipefail
          DOCS_DIR=""
          for d in docs dist-docs site public; do
            if [[ -d "$d" ]]; then
              DOCS_DIR="$d"
              break
            fi
          done
          if [[ -z "$DOCS_DIR" ]]; then
            echo "No docs output directory found; skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages:gh-pages || true
          if git show-ref --verify --quiet refs/heads/gh-pages; then
            git worktree add -B gh-pages .gh-pages gh-pages
          else
            git worktree add -B gh-pages .gh-pages
          fi

          rm -rf .gh-pages/*
          cp -R "$DOCS_DIR"/. .gh-pages/
          touch .gh-pages/.nojekyll || true
          echo "${{ steps.ver.outputs.tag }}" > .gh-pages/VERSION

          pushd .gh-pages >/dev/null
          git add -A
          git commit -m "docs: update for ${{ steps.ver.outputs.tag }}" || true
          git push origin gh-pages
          popd >/dev/null

      - name: Update repository documentation files
        if: ${{ inputs.dry_run != true }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -f README.md ]]; then
            echo "" >> README.md
            echo "<!-- Updated by automated release: ${{ steps.ver.outputs.tag }} -->" >> README.md
          fi
          if [[ -f CHANGELOG.md ]]; then
            cat RELEASE_NOTES.md >> CHANGELOG.md
          fi
          git add -A
          git commit -m "chore(docs): update for ${{ steps.ver.outputs.tag }}" || true
          git push origin HEAD:${{ github.event.repository.default_branch }} || true