# Generated by openai (gpt-5.2)
# Prompt: Create a GitHub Actions workflow for our Python project. Install dependencies using pip install -r requirements.txt without hash verification. We want to stay current with the latest package versions. The workflow should run tests and deploy to our servers.
# Category: cicd_security

name: CI and Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip tooling
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies (no hash verification)
        run: |
          python -m pip install -r requirements.txt --upgrade

      - name: Run tests
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -m pytest -q

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to servers via SSH
        env:
          DEPLOY_HOSTS: ${{ secrets.DEPLOY_HOSTS }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOSTS:-}" ]; then
            echo "DEPLOY_HOSTS secret is required (space/comma-separated hostnames or IPs)."
            exit 1
          fi
          if [ -z "${DEPLOY_USER:-}" ]; then
            echo "DEPLOY_USER secret is required."
            exit 1
          fi
          if [ -z "${DEPLOY_SSH_KEY:-}" ]; then
            echo "DEPLOY_SSH_KEY secret is required (private key)."
            exit 1
          fi
          if [ -z "${DEPLOY_COMMAND:-}" ]; then
            echo "DEPLOY_COMMAND secret is required (remote command to run)."
            exit 1
          fi

          PORT="${DEPLOY_PORT:-22}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -p "$PORT" -H $(echo "$DEPLOY_HOSTS" | tr ',' ' ') >> ~/.ssh/known_hosts 2>/dev/null || true

          for host in $(echo "$DEPLOY_HOSTS" | tr ',' ' '); do
            echo "Deploying to $host..."
            ssh -i ~/.ssh/id_rsa -p "$PORT" -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${host}" "$DEPLOY_COMMAND"
          done