      wait_for_completion: true
      body:
        indices: "${MANUAL_INDICES:-*}"
        ignore_unavailable: true
        include_global_state: false
        partial: false
        metadata:
          created_by: "ops-manual"
          ticket: "${CHANGE_TICKET:-}"
    restore_snapshot:
      enabled: true
      repository: "${SNAPSHOT_REPO_NAME:-ops-backups}"
      snapshot: "${RESTORE_SNAPSHOT_NAME:-}"
      wait_for_completion: true
      body:
        indices: "${RESTORE_INDICES:-*}"
        ignore_unavailable: true
        include_global_state: false
        partial: false
        rename_pattern: "${RESTORE_RENAME_PATTERN:-}"
        rename_replacement: "${RESTORE_RENAME_REPLACEMENT:-}"
        index_settings:
          index.number_of_replicas: "${RESTORE_REPLICAS:-1}"
