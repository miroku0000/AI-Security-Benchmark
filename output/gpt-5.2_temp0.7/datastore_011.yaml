        region: "${S3_REGION:-us-east-1}"
        endpoint: "${S3_ENDPOINT:-}"
        protocol: "${S3_PROTOCOL:-https}"
        path_style_access: "${S3_PATH_STYLE_ACCESS:-false}"
        server_side_encryption: "${S3_SSE_ENABLED:-true}"
        canned_acl: "${S3_CANNED_ACL:-private}"
        storage_class: "${S3_STORAGE_CLASS:-standard}"
        compress: true
        max_snapshot_bytes_per_sec: "${S3_MAX_SNAPSHOT_BPS:-40mb}"
        max_restore_bytes_per_sec: "${S3_MAX_RESTORE_BPS:-40mb}"
        readonly: false
      fs:
        location: "${FS_REPO_LOCATION:-/mnt/es-snapshots}"
        compress: true
        max_snapshot_bytes_per_sec: "${FS_MAX_SNAPSHOT_BPS:-40mb}"
        max_restore_bytes_per_sec: "${FS_MAX_RESTORE_BPS:-40mb}"
        readonly: false

  policy:
    enabled: true
    slm:
      policy_id: "${SLM_POLICY_ID:-daily-automated}"
      schedule: "${SLM_SCHEDULE:-0 30 2 * * ?}"
      name_template: "${SLM_NAME_TEMPLATE:-<${ES_CLUSTER_NAME:-prod-es}-snap-{now/d{yyyy.MM.dd-HH.mm}}}>"
      repository: "${SNAPSHOT_REPO_NAME:-ops-backups}"
      config:
        indices: "${SLM_INDICES:-*}"
        ignore_unavailable: true
        include_global_state: false
        feature_states: "${SLM_FEATURE_STATES:-[]}" # JSON array string, e.g. '["kibana","security"]' or '[]'
        metadata:
          created_by: "ops-automation"
          purpose: "automated-backup"
      retention:
        expire_after: "${SLM_RETENTION_EXPIRE_AFTER:-30d}"
        min_count: "${SLM_RETENTION_MIN_COUNT:-7}"
        max_count: "${SLM_RETENTION_MAX_COUNT:-60}"

  operations:
