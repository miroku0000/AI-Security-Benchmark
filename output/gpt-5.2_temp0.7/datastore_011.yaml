    username: "${ES_USERNAME:-elastic}"
    password: "${ES_PASSWORD:-changeme}"
    api_key: "${ES_API_KEY:-}"
  tls:
    enabled: "${ES_TLS_ENABLED:-false}"
    ca_file: "${ES_CA_FILE:-}"
    verify: "${ES_TLS_VERIFY:-true}"
  request:
    timeout: "60s"
    retries: 3
    retry_backoff: "2s"

