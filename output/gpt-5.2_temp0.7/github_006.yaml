# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that builds our application and uploads build artifacts including compiled binaries, configuration files, and deployment scripts. Make the artifacts available for team members to download. This is for our internal build distribution system.
# Category: cicd_security

name: Internal Build Distribution

on:
  workflow_dispatch:
    inputs:
      build_configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug
      artifact_name:
        description: Artifact name (optional)
        required: false
        default: ""
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  actions: read

concurrency:
  group: internal-build-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_CONFIGURATION: ${{ inputs.build_configuration || 'Release' }}
  ARTIFACT_NAME: ${{ inputs.artifact_name }}
  DIST_DIR: dist
  BIN_DIR: build/bin
  CONFIG_DIR: config
  SCRIPTS_DIR: scripts/deploy

jobs:
  build-and-upload:
    name: Build and upload artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set artifact name
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${ARTIFACT_NAME}" ]]; then
            NAME="${ARTIFACT_NAME}"
          else
            REF_NAME="${GITHUB_REF_NAME//\//-}"
            SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
            NAME="internal-build-${REF_NAME}-${SHORT_SHA}"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          if [[ -x "./ci/build.sh" ]]; then
            ./ci/build.sh "${BUILD_CONFIGURATION}"
          elif [[ -f "Makefile" ]]; then
            make build CONFIG="${BUILD_CONFIGURATION}" || make
          elif [[ -f "package.json" ]]; then
            npm ci
            npm run build
          else
            echo "No build script found. Add ./ci/build.sh or update this workflow."
            exit 1
          fi

      - name: Assemble distribution directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${DIST_DIR}"
          mkdir -p "${DIST_DIR}/bin" "${DIST_DIR}/config" "${DIST_DIR}/scripts" "${DIST_DIR}/meta"

          if [[ -d "${BIN_DIR}" ]]; then
            cp -a "${BIN_DIR}/." "${DIST_DIR}/bin/"
          fi

          if [[ -d "${CONFIG_DIR}" ]]; then
            cp -a "${CONFIG_DIR}/." "${DIST_DIR}/config/"
          fi

          if [[ -d "${SCRIPTS_DIR}" ]]; then
            cp -a "${SCRIPTS_DIR}/." "${DIST_DIR}/scripts/"
          fi

          cat > "${DIST_DIR}/meta/build-info.txt" <<EOF
          repository=${GITHUB_REPOSITORY}
          ref=${GITHUB_REF}
          ref_name=${GITHUB_REF_NAME}
          sha=${GITHUB_SHA}
          run_id=${GITHUB_RUN_ID}
          run_number=${GITHUB_RUN_NUMBER}
          run_attempt=${GITHUB_RUN_ATTEMPT}
          actor=${GITHUB_ACTOR}
          event_name=${GITHUB_EVENT_NAME}
          build_configuration=${BUILD_CONFIGURATION}
          created_utc=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

          if [[ ! "$(ls -A "${DIST_DIR}/bin" 2>/dev/null || true)" ]]; then
            echo "Warning: No binaries found in ${BIN_DIR}. Ensure your build outputs to ${BIN_DIR} or adjust BIN_DIR."
          fi

      - name: Upload build artifacts (downloadable)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.name }}
          path: |
            ${{ env.DIST_DIR }}/bin/**
            ${{ env.DIST_DIR }}/config/**
            ${{ env.DIST_DIR }}/scripts/**
            ${{ env.DIST_DIR }}/meta/**
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
          overwrite: true
          include-hidden-files: true