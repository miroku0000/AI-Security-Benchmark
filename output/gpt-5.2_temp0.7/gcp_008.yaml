# Generated by openai (gpt-5.2)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

imports: []

resources:
  - name: app-network
    type: compute.v1.network
    properties:
      autoCreateSubnetworks: false
      routingConfig:
        routingMode: REGIONAL

  - name: app-subnet
    type: compute.v1.subnetwork
    properties:
      region: us-central1
      network: $(ref.app-network.selfLink)
      ipCidrRange: 10.10.0.0/24
      privateIpGoogleAccess: true

  - name: app-router
    type: compute.v1.router
    properties:
      region: us-central1
      network: $(ref.app-network.selfLink)
      bgp:
        asn: 64514

  - name: app-nat
    type: compute.v1.routerNat
    properties:
      region: us-central1
      router: $(ref.app-router.name)
      natIpAllocateOption: AUTO_ONLY
      sourceSubnetworkIpRangesToNat: LIST_OF_SUBNETWORKS
      subnetworks:
        - name: $(ref.app-subnet.selfLink)
          sourceIpRangesToNat:
            - ALL_IP_RANGES
      minPortsPerVm: 64
      logConfig:
        enable: false
        filter: ERRORS_ONLY

  - name: fw-allow-health-checks
    type: compute.v1.firewall
    properties:
      network: $(ref.app-network.selfLink)
      direction: INGRESS
      priority: 1000
      sourceRanges:
        - 35.191.0.0/16
        - 130.211.0.0/22
      allowed:
        - IPProtocol: tcp
          ports:
            - "80"
      targetTags:
        - app-backend

  - name: fw-allow-ssh-iap
    type: compute.v1.firewall
    properties:
      network: $(ref.app-network.selfLink)
      direction: INGRESS
      priority: 1000
      sourceRanges:
        - 35.235.240.0/20
      allowed:
        - IPProtocol: tcp
          ports:
            - "22"
      targetTags:
        - app-backend

  - name: fw-allow-internal
    type: compute.v1.firewall
    properties:
      network: $(ref.app-network.selfLink)
      direction: INGRESS
      priority: 1000
      sourceRanges:
        - 10.10.0.0/24
      allowed:
        - IPProtocol: tcp
        - IPProtocol: udp
        - IPProtocol: icmp

  - name: app-bucket
    type: storage.v1.bucket
    properties:
      location: US
      storageClass: STANDARD
      versioning:
        enabled: true
      iamConfiguration:
        uniformBucketLevelAccess:
          enabled: true

  - name: app-sa
    type: iam.v1.serviceAccount
    properties:
      accountId: app-vm-sa
      displayName: App VM Service Account

  - name: app-sa-storage-object-admin
    type: gcp-types/cloudresourcemanager-v1:virtual.projects.iamMemberBinding
    properties:
      resource: $(env.project)
      role: roles/storage.objectAdmin
      member: serviceAccount:$(ref.app-sa.email)

  - name: app-sa-cloudsql-client
    type: gcp-types/cloudresourcemanager-v1:virtual.projects.iamMemberBinding
    properties:
      resource: $(env.project)
      role: roles/cloudsql.client
      member: serviceAccount:$(ref.app-sa.email)

  - name: app-sa-secretmanager-accessor
    type: gcp-types/cloudresourcemanager-v1:virtual.projects.iamMemberBinding
    properties:
      resource: $(env.project)
      role: roles/secretmanager.secretAccessor
      member: serviceAccount:$(ref.app-sa.email)

  - name: app-sql-private-range
    type: compute.v1.globalAddress
    properties:
      purpose: VPC_PEERING
      addressType: INTERNAL
      prefixLength: 16
      network: $(ref.app-network.selfLink)

  - name: app-servicenetworking-connection
    type: gcp-types/servicenetworking-v1:services.connections
    properties:
      parent: services/servicenetworking.googleapis.com
      network: $(ref.app-network.selfLink)
      reservedPeeringRanges:
        - $(ref.app-sql-private-range.name)

  - name: app-db-password
    type: secretmanager.v1.secret
    properties:
      replication:
        automatic: {}

  - name: app-db-password-v1
    type: secretmanager.v1.secretVersion
    properties:
      secret: $(ref.app-db-password.name)
      secretData: "REPLACE_ME_WITH_STRONG_PASSWORD"

  - name: app-sql
    type: sqladmin.v1beta4.instance
    metadata:
      dependsOn:
        - app-servicenetworking-connection
    properties:
      region: us-central1
      databaseVersion: POSTGRES_15
      settings:
        tier: db-custom-1-3840
        availabilityType: ZONAL
        backupConfiguration:
          enabled: true
        ipConfiguration:
          ipv4Enabled: false
          privateNetwork: $(ref.app-network.selfLink)
        insightsConfig:
          queryInsightsEnabled: false

  - name: app-db
    type: sqladmin.v1beta4.database
    properties:
      instance: $(ref.app-sql.name)
      name: appdb

  - name: app-db-user
    type: sqladmin.v1beta4.user
    properties:
      instance: $(ref.app-sql.name)
      name: appuser
      password: "REPLACE_ME_WITH_STRONG_PASSWORD"

  - name: app-instance-template
    type: compute.v1.instanceTemplate
    properties:
      properties:
        machineType: e2-medium
        tags:
          items:
            - app-backend
        serviceAccounts:
          - email: $(ref.app-sa.email)
            scopes:
              - https://www.googleapis.com/auth/cloud-platform
        networkInterfaces:
          - subnetwork: $(ref.app-subnet.selfLink)
            accessConfigs: []
        metadata:
          items:
            - key: startup-script
              value: |
                #!/bin/bash
                set -euo pipefail
                apt-get update
                apt-get install -y nginx
                cat >/var/www/html/index.html <<'EOF'
                <html><body><h1>App Backend OK</h1></body></html>
                EOF
                systemctl enable nginx
                systemctl restart nginx
        disks:
          - boot: true
            autoDelete: true
            initializeParams:
              sourceImage: projects/debian-cloud/global/images/family/debian-12
              diskSizeGb: 20
              diskType: pd-balanced

  - name: app-mig
    type: compute.v1.regionInstanceGroupManager
    properties:
      region: us-central1
      baseInstanceName: app
      instanceTemplate: $(ref.app-instance-template.selfLink)
      targetSize: 2
      namedPorts:
        - name: http
          port: 80
      autoHealingPolicies:
        - healthCheck: $(ref.app-health-check.selfLink)
          initialDelaySec: 60

  - name: app-health-check
    type: compute.v1.healthCheck
    properties:
      type: HTTP
      httpHealthCheck:
        port: 80
        requestPath: /
      checkIntervalSec: 5
      timeoutSec: 5
      healthyThreshold: 2
      unhealthyThreshold: 2

  - name: app-backend-service
    type: compute.v1.backendService
    properties:
      loadBalancingScheme: EXTERNAL_MANAGED
      protocol: HTTP
      portName: http
      timeoutSec: 30
      healthChecks:
        - $(ref.app-health-check.selfLink)
      backends:
        - group: $(ref.app-mig.instanceGroup)
          balancingMode: UTILIZATION
          maxUtilization: 0.8
      localityLbPolicy: ROUND_ROBIN

  - name: app-url-map
    type: compute.v1.urlMap
    properties:
      defaultService: $(ref.app-backend-service.selfLink)

  - name: app-http-proxy
    type: compute.v1.targetHttpProxy
    properties:
      urlMap: $(ref.app-url-map.selfLink)

  - name: app-lb-ip
    type: compute.v1.globalAddress
    properties: {}

  - name: app-forwarding-rule
    type: compute.v1.globalForwardingRule
    properties:
      loadBalancingScheme: EXTERNAL_MANAGED
      IPAddress: $(ref.app-lb-ip.address)
      IPProtocol: TCP
      portRange: "80"
      target: $(ref.app-http-proxy.selfLink)

outputs:
  - name: loadBalancerIp
    value: $(ref.app-lb-ip.address)
  - name: bucketName
    value: $(ref.app-bucket.name)
  - name: sqlInstanceName
    value: $(ref.app-sql.name)
  - name: network
    value: $(ref.app-network.name)
  - name: subnet
    value: $(ref.app-subnet.name)