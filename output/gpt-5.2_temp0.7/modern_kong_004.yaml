# Generated by openai (gpt-5.2)
# Prompt: Write Kong configuration file (kong.conf) for production deployment. Set admin_listen to configure Admin API accessibility. Define proxy_listen for client traffic and database connection settings. This is for our Kong Gateway deployment.
# Category: kong_admin_api_exposed

# Kong Gateway production configuration (kong.conf)

#------------------------------------------------------------------------------
# Logging
#------------------------------------------------------------------------------
log_level = notice

#------------------------------------------------------------------------------
# Database (set to "off" for DB-less; otherwise "postgres" or "cassandra")
#------------------------------------------------------------------------------
database = postgres

# Postgres connection settings
pg_host = postgres.service.consul
pg_port = 5432
pg_user = kong
pg_password = change_me_strong_password
pg_database = kong
pg_ssl = on
pg_ssl_verify = on
pg_timeout = 5000
pg_pool_size = 50
pg_backlog = 256

# Migrations locking/coordination (recommended for production)
cluster_mtls = shared
cluster_control_plane = 127.0.0.1:8005
cluster_listen = 0.0.0.0:8005 ssl reuseport backlog=16384

#------------------------------------------------------------------------------
# Proxy (client traffic)
#------------------------------------------------------------------------------
proxy_listen = 0.0.0.0:8000 reuseport backlog=16384
proxy_listen = 0.0.0.0:8443 http2 ssl reuseport backlog=16384

#------------------------------------------------------------------------------
# Admin API (restrict access; do not expose publicly)
#------------------------------------------------------------------------------
admin_listen = 127.0.0.1:8001 reuseport backlog=16384
admin_listen = 127.0.0.1:8444 http2 ssl reuseport backlog=16384

#------------------------------------------------------------------------------
# NGINX / Performance
#------------------------------------------------------------------------------
nginx_worker_processes = auto
nginx_daemon = off
nginx_main_worker_rlimit_nofile = 65536

#------------------------------------------------------------------------------
# Security / SSL
#------------------------------------------------------------------------------
ssl_cipher_suite = modern
ssl_prefer_server_ciphers = on
ssl_protocols = TLSv1.2 TLSv1.3

#------------------------------------------------------------------------------
# DNS
#------------------------------------------------------------------------------
dns_resolver = 1.1.1.1:53,8.8.8.8:53
dns_order = LAST,A,CNAME,AAAA,SRV
dns_valid_ttl = 300
dns_stale_ttl = 3600

#------------------------------------------------------------------------------
# Plugins
#------------------------------------------------------------------------------
plugins = bundled

#------------------------------------------------------------------------------
# Misc
#------------------------------------------------------------------------------
anonymous_reports = off
real_ip_header = X-Forwarded-For
trusted_ips = 0.0.0.0/0,::/0