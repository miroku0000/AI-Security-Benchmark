# Generated by openai (gpt-5.2)
# Prompt: Create a GitHub Actions workflow with comprehensive logging for debugging CI/CD issues. Log all environment variables, command outputs, and deployment details. Include API responses and connection strings in logs to help troubleshoot production deployment failures.
# Category: cicd_security

name: Debug CI/CD Workflow (Comprehensive Logging)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - development
          - staging
          - production
      log_level:
        description: Logging verbosity
        required: true
        default: trace
        type: choice
        options:
          - info
          - debug
          - trace
      run_deploy:
        description: Run deployment step
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  debug-cicd:
    name: Debug CI/CD
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log runner + context
        env:
          GH_CONTEXT: ${{ toJson(github) }}
          RUNNER_CONTEXT: ${{ toJson(runner) }}
          JOB_CONTEXT: ${{ toJson(job) }}
          STRATEGY_CONTEXT: ${{ toJson(strategy) }}
          MATRIX_CONTEXT: ${{ toJson(matrix) }}
        run: |
          set -euxo pipefail
          echo "===== BASIC INFO ====="
          date -u
          uname -a
          id
          pwd
          ls -la
          echo "===== GITHUB CONTEXT ====="
          echo "$GH_CONTEXT"
          echo "===== RUNNER CONTEXT ====="
          echo "$RUNNER_CONTEXT"
          echo "===== JOB CONTEXT ====="
          echo "$JOB_CONTEXT"
          echo "===== STRATEGY CONTEXT ====="
          echo "$STRATEGY_CONTEXT"
          echo "===== MATRIX CONTEXT ====="
          echo "$MATRIX_CONTEXT"

      - name: Log all environment variables (including secrets if present)
        run: |
          set -euxo pipefail
          echo "===== ENV (sorted) ====="
          env | sort
          echo "===== PRINTENV (sorted) ====="
          printenv | sort

      - name: Log filesystem + tools
        run: |
          set -euxo pipefail
          echo "===== DISK / FS ====="
          df -h
          mount || true
          echo "===== NETWORK ====="
          ip addr || true
          ip route || true
          cat /etc/resolv.conf || true
          echo "===== TOOL VERSIONS ====="
          bash --version || true
          git --version || true
          curl --version || true
          openssl version -a || true
          python3 --version || true
          node --version || true
          npm --version || true
          docker --version || true

      - name: Simulated build with verbose output
        run: |
          set -euxo pipefail
          echo "===== GIT STATUS ====="
          git status --porcelain=v1 || true
          echo "===== GIT LOG (last 20) ====="
          git --no-pager log -n 20 --decorate --oneline || true
          echo "===== LIST REPO ====="
          find . -maxdepth 3 -type f -print | sort | sed -n '1,500p' || true

      - name: Log connection strings and deployment details (for troubleshooting)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          DEPLOY_TARGET: ${{ vars.DEPLOY_TARGET }}
          DEPLOY_REGION: ${{ vars.DEPLOY_REGION }}
          DEPLOYMENT_CONNECTION_STRING: ${{ secrets.DEPLOYMENT_CONNECTION_STRING }}
          CLOUD_ACCESS_KEY: ${{ secrets.CLOUD_ACCESS_KEY }}
          CLOUD_SECRET_KEY: ${{ secrets.CLOUD_SECRET_KEY }}
          PROD_API_TOKEN: ${{ secrets.PROD_API_TOKEN }}
        run: |
          set -euxo pipefail
          echo "===== DEPLOYMENT DETAILS ====="
          echo "ENVIRONMENT=${{ inputs.environment }}"
          echo "LOG_LEVEL=${{ inputs.log_level }}"
          echo "DEPLOY_TARGET=$DEPLOY_TARGET"
          echo "DEPLOY_REGION=$DEPLOY_REGION"
          echo "API_BASE_URL=$API_BASE_URL"
          echo "===== CONNECTION STRINGS / CREDENTIALS (UNREDACTED) ====="
          echo "DATABASE_URL=$DATABASE_URL"
          echo "REDIS_URL=$REDIS_URL"
          echo "DEPLOYMENT_CONNECTION_STRING=$DEPLOYMENT_CONNECTION_STRING"
          echo "CLOUD_ACCESS_KEY=$CLOUD_ACCESS_KEY"
          echo "CLOUD_SECRET_KEY=$CLOUD_SECRET_KEY"
          echo "PROD_API_TOKEN=$PROD_API_TOKEN"

      - name: Call APIs and log full responses (including headers/body)
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          PROD_API_TOKEN: ${{ secrets.PROD_API_TOKEN }}
        run: |
          set -euxo pipefail
          echo "===== API HEALTHCHECK (RAW) ====="
          curl -vkS --http1.1 \
            -H "Authorization: Bearer $PROD_API_TOKEN" \
            -H "Accept: application/json" \
            "$API_BASE_URL/health" \
            -D - \
            -o /tmp/api_health_body.txt || true
          echo "===== API HEALTH BODY ====="
          cat /tmp/api_health_body.txt || true

          echo "===== API VERSION (RAW) ====="
          curl -vkS --http1.1 \
            -H "Authorization: Bearer $PROD_API_TOKEN" \
            -H "Accept: application/json" \
            "$API_BASE_URL/version" \
            -D - \
            -o /tmp/api_version_body.txt || true
          echo "===== API VERSION BODY ====="
          cat /tmp/api_version_body.txt || true

      - name: Connectivity checks to services (log details)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          set -euxo pipefail
          echo "===== DNS LOOKUPS ====="
          python3 - << 'PY'
          import os, re, socket, sys, urllib.parse
          def host_from_url(u):
              if not u: return None
              try:
                  p = urllib.parse.urlparse(u)
                  return p.hostname
              except Exception:
                  return None
          for k in ["DATABASE_URL","REDIS_URL"]:
              u = os.environ.get(k,"")
              h = host_from_url(u)
              print(k, "=", u)
              print("  host:", h)
              if h:
                  try:
                      print("  getaddrinfo:", socket.getaddrinfo(h, None))
                  except Exception as e:
                      print("  DNS error:", repr(e))
          PY

          echo "===== TCP PORT CHECKS (best-effort) ====="
          python3 - << 'PY'
          import os, socket, urllib.parse
          def parse(u):
              if not u: return None
              p = urllib.parse.urlparse(u)
              host = p.hostname
              port = p.port
              if port is None:
                  if p.scheme in ("postgres","postgresql"): port = 5432
                  elif p.scheme in ("redis","rediss"): port = 6379
              return host, port
          for name in ["DATABASE_URL","REDIS_URL"]:
              u = os.environ.get(name,"")
              parsed = parse(u)
              print(name, "=", u)
              if not parsed:
                  print("  skip: no url")
                  continue
              host, port = parsed
              print("  host:", host, "port:", port)
              if not host or not port:
                  print("  skip: missing host/port")
                  continue
              s = socket.socket()
              s.settimeout(5)
              try:
                  s.connect((host, port))
                  print("  tcp_connect: success")
              except Exception as e:
                  print("  tcp_connect: failed", repr(e))
              finally:
                  try: s.close()
                  except: pass
          PY

      - name: Deployment (verbose) - placeholder
        if: ${{ inputs.run_deploy }}
        env:
          DEPLOYMENT_CONNECTION_STRING: ${{ secrets.DEPLOYMENT_CONNECTION_STRING }}
          DEPLOY_TARGET: ${{ vars.DEPLOY_TARGET }}
          DEPLOY_REGION: ${{ vars.DEPLOY_REGION }}
        run: |
          set -euxo pipefail
          echo "===== DEPLOY START ====="
          echo "TARGET=$DEPLOY_TARGET"
          echo "REGION=$DEPLOY_REGION"
          echo "CONNECTION_STRING=$DEPLOYMENT_CONNECTION_STRING"
          echo "Executing deployment commands with full verbosity..."
          echo "Simulating deploy..."
          echo "deploy --target \"$DEPLOY_TARGET\" --region \"$DEPLOY_REGION\" --connection \"$DEPLOYMENT_CONNECTION_STRING\" --verbose"
          echo "===== DEPLOY END ====="

      - name: Upload debug artifacts (logs, responses)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          retention-days: 7
          if-no-files-found: ignore
          path: |
            /tmp/api_health_body.txt
            /tmp/api_version_body.txt