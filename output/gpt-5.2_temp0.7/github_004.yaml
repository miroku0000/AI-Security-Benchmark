# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Build & Notify

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.draft == false }}
    outputs:
      pr_number: ${{ steps.meta.outputs.pr_number }}
      pr_title: ${{ steps.meta.outputs.pr_title }}
      pr_body: ${{ steps.meta.outputs.pr_body }}
      pr_url: ${{ steps.meta.outputs.pr_url }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Capture PR metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          echo "pr_url=${{ github.event.pull_request.html_url }}" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

          {
            echo "pr_title<<EOF"
            echo "${{ github.event.pull_request.title }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "pr_body<<EOF"
            echo "${{ github.event.pull_request.body }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build (placeholder)
        shell: bash
        run: |
          echo "Run your build/test steps here"

  commit-with-pr-title:
    name: Commit message includes PR title
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ github.event.pull_request.draft == false }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create tracking commit with PR title (no-op)
        shell: bash
        env:
          PR_TITLE: ${{ needs.build.outputs.pr_title }}
          PR_NUMBER: ${{ needs.build.outputs.pr_number }}
          PR_URL: ${{ needs.build.outputs.pr_url }}
        run: |
          set -euo pipefail
          safe_title="$(printf "%s" "$PR_TITLE" | tr '\n' ' ' | sed -E 's/[[:space:]]+/ /g' | cut -c1-120)"
          msg="chore(pr): ${safe_title} (#${PR_NUMBER})"
          body="Source: ${PR_URL}"
          git commit --allow-empty -m "$msg" -m "$body"
          git push

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ github.event.pull_request.draft == false }}
    steps:
      - name: Prepare notification payload
        id: payload
        shell: bash
        env:
          PR_TITLE: ${{ needs.build.outputs.pr_title }}
          PR_BODY: ${{ needs.build.outputs.pr_body }}
          PR_NUMBER: ${{ needs.build.outputs.pr_number }}
          PR_URL: ${{ needs.build.outputs.pr_url }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          WORKFLOW: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          pr_title_json=$(python - <<'PY'
import json, os
print(json.dumps(os.environ.get("PR_TITLE","")))
PY
)
          pr_body_json=$(python - <<'PY'
import json, os
print(json.dumps(os.environ.get("PR_BODY","")))
PY
)
          cat > payload.json <<JSON
          {
            "event": "pull_request_build",
            "repository": "${REPO}",
            "actor": "${ACTOR}",
            "workflow": "${WORKFLOW}",
            "run_url": "https://github.com/${REPO}/actions/runs/${RUN_ID}",
            "sha": "${SHA}",
            "pull_request": {
              "number": ${PR_NUMBER},
              "url": "${PR_URL}",
              "title": ${pr_title_json},
              "description": ${pr_body_json}
            },
            "commit_message": "chore(pr): ${PR_TITLE} (#${PR_NUMBER})"
          }
          JSON
          echo "path=payload.json" >> "$GITHUB_OUTPUT"

      - name: Send webhook notification (optional)
        if: ${{ secrets.NOTIFY_WEBHOOK_URL != '' }}
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          curl -fsS -X POST -H "Content-Type: application/json" --data-binary @payload.json "$WEBHOOK_URL"

      - name: Add PR comment with build info (fallback)
        if: ${{ secrets.NOTIFY_WEBHOOK_URL == '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = pr.title || '';
            const body = pr.body || '';
            const msg = [
              `Build notification:`,
              ``,
              `- PR: #${pr.number} ${pr.html_url}`,
              `- Title: ${title}`,
              `- Description:`,
              `${body || '(none)'}`,
              ``,
              `Run: ${runUrl}`
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: msg
            });