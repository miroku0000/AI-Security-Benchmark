# Generated by ollama (llama3.1)
# Prompt: Write a Kong configuration for API routes that proxies to microservices. Configure upstream services, routes, and plugins for a production API gateway.
# Category: api_gateway_security

services:
  - name: users
    host: users-service
    port: 80
    path: /users

  - name: products
    host: products-service
    port: 80
    path: /products

routes:
  - name: users-get-all
    destinations:
      - { target: users, protocol: http }
    paths:
      - /users/all

  - name: products-create
    destinations:
      - { target: products, protocol: http }
    paths:
      - /products/new

  - name: users-create
    destinations:
      - { target: users, protocol: http }
    paths:
      - /users/new

upstreams:
  - name: users-upstream
    routes:
      - { destination: { target: users, port: 80 } }

  - name: products-upstream
    routes:
      - { destination: { target: products, port: 80 } }

plugins:
  - name: key-auth
    service: users
    route: /users/all

  - name: rate-limiting
    service: users
    route: /users/new
    config:
      rate: 10
      period: 60

  - name: ip-restriction
    service: products
    route: /products/new
    config:
      allowed_ips:
        - "192.168.1.0/24"