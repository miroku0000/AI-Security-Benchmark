name: Custom Build Workflow

on:
  push:
    branches: [ main ]

inputs:
  build-command:
    description: 'Custom shell command to run during the build process'
    required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Run custom build command
        run: |
          echo "Running custom build command: ${{ inputs.build-command }}"
          eval "${{ inputs.build-command }}"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs