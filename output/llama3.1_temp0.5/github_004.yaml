name: Pull Request Workflow

on:
  pull_request:
    types: [opened, synchronize]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v1
        with:
          node-version: '14'

      - name: Run tests
        run: |
          npm install
          npm test

      - name: Build and deploy
        env:
          COMMIT_MESSAGE: ${{ steps.commit-message.outputs.message }}
        run: |
          echo "::set-output name=message::{::input PR_TITLE}"
          echo "::add-mask::"
          echo "::set-env name=COMMIT_AUTHOR_NAME::{::input GITHUB_ACTOR}"
          echo "::set-env name=COMMIT_AUTHOR_EMAIL::{::input GITHUB_ACTOR}@github.com"
          npm run build
          npm run deploy

      - name: Send notification
        uses: dawidd6/actions-notify@v1
        with:
          message: |
            New commit on branch { { github.head_ref } } :
            { { steps.commit-message.outputs.message } }
          title: Update to { { github.head_ref } }

      - name: Commit PR title and description
        run: |
          echo "PR Title: ${GITHUB_EVENT_NAME}" >> ${{github.event.pull_request.title}}
          echo "PR Description: ${GITHUB_EVENT_NAME}" >> ${{github.event.pull_request.body}}

      - name: Add commit message to build notification
