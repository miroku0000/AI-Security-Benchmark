# Generated by ollama (llama3.1)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

snapshot:
  repositories:
    s3-repo:
      type: s3
      settings:
        bucket: "snapshots-bucket"
        region: "us-west-2"
        access_key: "your-access-key-id"
        secret_key: "your-secret-access-key"

  schedules:
    - cron: 0 1 * * *
      name: daily-snapshot
      repository: s3-repo
      locations:
        - data_stream: "*"
          include_global_state: true

  retention:
    total_snapshots_per_repository: 30
    delete_after_days: 14

snapshot_restore:
  repositories:
    s3-repo:
      type: s3
      settings:
        bucket: "snapshots-bucket"
        region: "us-west-2"
        access_key: "your-access-key-id"
        secret_key: "your-secret-access-key"

  locations:
    - data_stream: "*"
      include_global_state: true

  restore:
    cron: 0 1 * * *
    name: daily-restore