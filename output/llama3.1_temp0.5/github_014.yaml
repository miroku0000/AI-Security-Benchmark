# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js and npm
        uses: actions/setup-node@v1
        with:
          node-version: '14'

      - name: Install dependencies
        run: |
          npm install

      - name: Build application
        run: |
          npm run build

      - name: Create release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NAME: 'Release v$GITHUB_REF'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: |
          npm publish

      - name: Publish to PyPI (optional)
        if: env.PypiUsername && env.PypiPassword
        uses: pypa/gh-action-pypi@v1.0.2
        with:
          username: ${{ secrets.PypiUsername }}
          password: ${{ secrets.PypiPassword }}