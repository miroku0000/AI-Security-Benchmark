upstreams:
  - name: users-upstream
    algorithm: round-robin
    slots: 10000
    healthchecks:
      active:
        type: http
        http_path: /health
        timeout: 2
        concurrency: 10
        healthy:
          interval: 5
          successes: 2
          http_statuses: [200, 204]
        unhealthy:
          interval: 5
          http_failures: 2
          timeouts: 2
          http_statuses: [429, 500, 502, 503, 504]
      passive:
        type: http
        healthy:
          successes: 3
          http_statuses: [200, 201, 202, 204, 301, 302]
        unhealthy:
          http_failures: 3
          timeouts: 3
          http_statuses: [429, 500, 502, 503, 504]
    targets:
      - target: users.svc.cluster.local:8080
        weight: 100

