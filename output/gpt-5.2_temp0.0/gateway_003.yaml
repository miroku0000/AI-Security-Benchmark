plugins:
  - name: pre-function
    enabled: true
    config:
      access:
        - |
          -- Enforce HTTPS at the edge (when behind L7 LB, rely on X-Forwarded-Proto)
          local xfproto = kong.request.get_header("x-forwarded-proto")
          if xfproto and xfproto ~= "https" then
            return kong.response.exit(426, { message = "Please use HTTPS" })
          end
  - name: response-transformer
    enabled: true
    config:
      add:
        headers:
          - "Strict-Transport-Security:max-age=31536000; includeSubDomains; preload"
          - "X-Content-Type-Options:nosniff"
          - "X-Frame-Options:DENY"
          - "Referrer-Policy:no-referrer"
          - "Permissions-Policy:geolocation=(), microphone=(), camera=()"
  - name: bot-detection
    enabled: true
    config:
      deny:
        - "curl"
        - "wget"
        - "python-requests"
  - name: acl
    enabled: false
    config:
      allow: ["api-consumers"]

consumers:
  - username: internal-service
    tags: [prod, consumer]
    keyauth_credentials:
      - key: "REPLACE_WITH_SECURE_INTERNAL_KEY"
  - username: partner-service
    tags: [prod, consumer]
    keyauth_credentials:
      - key: "REPLACE_WITH_SECURE_PARTNER_KEY"

basicauth_credentials: []
keyauth_credentials: []

routes:
