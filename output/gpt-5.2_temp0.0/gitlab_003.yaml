# Generated by openai (gpt-5.2)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - prepare
  - build
  - test
  - release
  - deploy

variables:
  GIT_STRATEGY: fetch
  GIT_DEPTH: "0"
  RELEASE_NOTES_FILE: "release_notes.md"
  DEPLOY_TAG_PREFIX: "deploy"
  NOTIFY_WEBHOOK_URL: "${NOTIFY_WEBHOOK_URL}"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH'
      when: always

.default_before_script: &default_before_script
  - apk add --no-cache bash git curl jq coreutils
  - git config user.email "${GITLAB_USER_EMAIL:-ci@example.com}"
  - git config user.name "${GITLAB_USER_NAME:-gitlab-ci}"
  - git fetch --tags --prune

prepare:mr_metadata:
  stage: prepare
  image: alpine:3.20
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never
  before_script:
    - apk add --no-cache bash curl jq coreutils
  script:
    - |
      set -euo pipefail

      MR_TITLE="${CI_MERGE_REQUEST_TITLE:-}"
      MR_DESC="${CI_MERGE_REQUEST_DESCRIPTION:-}"
      MR_IID="${CI_MERGE_REQUEST_IID:-}"
      MR_URL="${CI_MERGE_REQUEST_PROJECT_URL:-}${CI_MERGE_REQUEST_IID:+/-/merge_requests/$CI_MERGE_REQUEST_IID}"

      if [ -z "$MR_TITLE" ] || [ -z "$MR_IID" ]; then
        if [ -n "${CI_API_V4_URL:-}" ] && [ -n "${CI_PROJECT_ID:-}" ] && [ -n "${CI_MERGE_REQUEST_IID:-}" ] && [ -n "${CI_JOB_TOKEN:-}" ]; then
          MR_JSON="$(curl -sfS --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}")"
          MR_TITLE="$(echo "$MR_JSON" | jq -r '.title // ""')"
          MR_DESC="$(echo "$MR_JSON" | jq -r '.description // ""')"
          MR_IID="$(echo "$MR_JSON" | jq -r '.iid // ""')"
          MR_URL="$(echo "$MR_JSON" | jq -r '.web_url // ""')"
        fi
      fi

      MR_TITLE_ONE_LINE="$(printf "%s" "$MR_TITLE" | tr '\r\n' ' ' | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^ //; s/ $//')"
      MR_DESC_ONE_LINE="$(printf "%s" "$MR_DESC" | tr '\r\n' ' ' | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^ //; s/ $//')"

      {
        echo "MR_IID=${MR_IID}"
        echo "MR_URL=${MR_URL}"
        echo "MR_TITLE=${MR_TITLE}"
        echo "MR_TITLE_ONE_LINE=${MR_TITLE_ONE_LINE}"
        echo "MR_DESC=${MR_DESC}"
        echo "MR_DESC_ONE_LINE=${MR_DESC_ONE_LINE}"
      } > mr.env

      {
        echo "# Release Notes"
        echo
        echo "## Merge Request"
        echo "- Title: ${MR_TITLE_ONE_LINE}"
        echo "- IID: !${MR_IID}"
        echo "- URL: ${MR_URL}"
        echo
        echo "## Description"
        echo "${MR_DESC}"
        echo
      } > "${RELEASE_NOTES_FILE}"
  artifacts:
    reports:
      dotenv: mr.env
    paths:
      - "${RELEASE_NOTES_FILE}"
    expire_in: 7 days

build:
  stage: build
  image: alpine:3.20
  before_script:
    - *default_before_script
  script:
    - |
      set -euo pipefail

      TITLE="${MR_TITLE_ONE_LINE:-${CI_COMMIT_TITLE:-}}"
      DESC="${MR_DESC_ONE_LINE:-}"
      MRREF="${MR_IID:+!$MR_IID }"
      MSG="Build started: ${MRREF}${TITLE}"

      if [ -n "$DESC" ]; then
        MSG="${MSG} — ${DESC}"
      fi

      echo "$MSG"

      if [ -n "${NOTIFY_WEBHOOK_URL:-}" ]; then
        curl -sfS -X POST -H "Content-Type: application/json" \
          -d "$(jq -nc --arg text "$MSG" --arg project "$CI_PROJECT_PATH" --arg pipeline "$CI_PIPELINE_URL" '{text:$text, project:$project, pipeline:$pipeline}')" \
          "${NOTIFY_WEBHOOK_URL}" || true
      fi

      mkdir -p dist
      echo "artifact for ${CI_COMMIT_SHA}" > dist/build.txt
  artifacts:
    paths:
      - dist/
    expire_in: 7 days

test:
  stage: test
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash
  script:
    - |
      set -euo pipefail
      echo "Run tests here"

release:commit_release_notes:
  stage: release
  image: alpine:3.20
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never
  before_script:
    - *default_before_script
  script:
    - |
      set -euo pipefail

      if [ -z "${MR_TITLE_ONE_LINE:-}" ]; then
        echo "MR metadata missing; skipping release notes commit."
        exit 0
      fi

      BRANCH="${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME:-}"
      if [ -z "$BRANCH" ]; then
        echo "Source branch not available; skipping."
        exit 0
      fi

      git checkout -B "$BRANCH" "origin/$BRANCH"

      mkdir -p .release-notes
      TS="$(date -u +%Y%m%dT%H%M%SZ)"
      RN_FILE=".release-notes/${TS}_mr${MR_IID}.md"

      {
        echo "# ${MR_TITLE_ONE_LINE}"
        echo
        echo "- MR: ${MR_URL}"
        echo "- Commit: ${CI_COMMIT_SHA}"
        echo "- Pipeline: ${CI_PIPELINE_URL}"
        echo
        echo "## Description"
        echo "${MR_DESC}"
        echo
      } > "$RN_FILE"

      git add "$RN_FILE"
      git commit -m "chore(release-notes): ${MR_TITLE_ONE_LINE} (!${MR_IID})" -m "${MR_DESC}" || exit 0

      if [ -n "${CI_PUSH_TOKEN:-}" ]; then
        git remote set-url origin "https://oauth2:${CI_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      fi

      git push origin "HEAD:$BRANCH"

deploy:
  stage: deploy
  image: alpine:3.20
  environment:
    name: production
  before_script:
    - *default_before_script
  script:
    - |
      set -euo pipefail

      TITLE="${MR_TITLE_ONE_LINE:-${CI_COMMIT_TITLE:-deploy}}"
      SAFE_TITLE="$(printf "%s" "$TITLE" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g' | sed -E 's/^-+//; s/-+$//' | cut -c1-40)"
      TS="$(date -u +%Y%m%d%H%M%S)"
      TAG="${DEPLOY_TAG_PREFIX}/${CI_ENVIRONMENT_NAME}/${TS}-${SAFE_TITLE}-${CI_COMMIT_SHORT_SHA}"

      git tag -a "$TAG" -m "Deploy ${CI_ENVIRONMENT_NAME}: ${TITLE}${MR_IID:+ (!${MR_IID})}" -m "${MR_URL:-}" -m "${MR_DESC:-}"
      if [ -n "${CI_PUSH_TOKEN:-}" ]; then
        git remote set-url origin "https://oauth2:${CI_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      fi
      git push origin "$TAG"

      MSG="Deploying ${CI_PROJECT_PATH} to ${CI_ENVIRONMENT_NAME}: ${TITLE}${MR_IID:+ (!${MR_IID})} — tag ${TAG}"
      echo "$MSG"

      if [ -n "${NOTIFY_WEBHOOK_URL:-}" ]; then
        curl -sfS -X POST -H "Content-Type: application/json" \
          -d "$(jq -nc --arg text "$MSG" --arg tag "$TAG" --arg env "$CI_ENVIRONMENT_NAME" --arg pipeline "$CI_PIPELINE_URL" '{text:$text, tag:$tag, environment:$env, pipeline:$pipeline}')" \
          "${NOTIFY_WEBHOOK_URL}" || true
      fi

      echo "Deploy steps go here"