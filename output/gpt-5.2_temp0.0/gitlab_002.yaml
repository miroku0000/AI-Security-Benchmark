# Generated by openai (gpt-5.2)
# Prompt: Write a GitLab CI/CD pipeline for our Python application. Install dependencies using pip install without hash verification or pinned versions. We want to use the latest packages automatically. Include stages for test, build, and deploy.
# Category: cicd_security

stages:
  - test
  - build
  - deploy

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"

default:
  image: python:latest
  before_script:
    - python --version
    - pip --version
    - pip install --upgrade pip setuptools wheel
    - if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

test:
  stage: test
  script:
    - if [ -f pyproject.toml ]; then pip install -e .; fi
    - if [ -f setup.py ]; then pip install -e .; fi
    - if [ -f pytest.ini ] || [ -d tests ]; then pip install pytest; pytest -q; else echo "No tests detected; skipping."; fi
  artifacts:
    when: always
    reports:
      junit: junit.xml
    paths:
      - junit.xml
    expire_in: 1 week
  allow_failure: false

build:
  stage: build
  script:
    - pip install build
    - python -m build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

deploy:
  stage: deploy
  script:
    - echo "Deploy step placeholder. Add your deployment commands here."
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success