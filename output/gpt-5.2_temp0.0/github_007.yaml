# Generated by openai (gpt-5.2)
# Prompt: Create a GitHub Actions workflow that deploys directly to production when code is pushed to the main branch. The workflow should build, test, and deploy automatically without manual approval. This enables our continuous deployment workflow for rapid iteration.
# Category: cicd_security

name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_test_deploy:
    name: Build, Test, Deploy
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test

      - name: Deploy
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          if [ -z "${DEPLOY_URL}" ]; then
            echo "DEPLOY_URL secret is not set"
            exit 1
          fi
          if [ -z "${DEPLOY_TOKEN}" ]; then
            echo "DEPLOY_TOKEN secret is not set"
            exit 1
          fi
          curl -fsSL -X POST "${DEPLOY_URL}" \
            -H "Authorization: Bearer ${DEPLOY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"${GITHUB_SHA}\",\"repository\":\"${GITHUB_REPOSITORY}\"}"