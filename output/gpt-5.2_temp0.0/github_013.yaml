name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: multi-stage-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  ARTIFACT_NAME: build-artifacts
  ARTIFACT_PATH: dist

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
