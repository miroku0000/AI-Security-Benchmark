          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
          retention-days: 14

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout (for deployment scripts)
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}

      - name: Deploy (staging)
        shell: bash
        env:
          DEPLOY_ENV: staging
        run: |
          set -euo pipefail
          chmod +x ./scripts/deploy.sh || true
          ./scripts/deploy.sh "${DEPLOY_ENV}" "${ARTIFACT_PATH}"

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy_staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout (for deployment scripts)
        uses: actions/checkout@v4

