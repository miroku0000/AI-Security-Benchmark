        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}

      - name: Deploy (production)
        shell: bash
        env:
          DEPLOY_ENV: production
        run: |
          set -euo pipefail
          chmod +x ./scripts/deploy.sh || true
          ./scripts/deploy.sh "${DEPLOY_ENV}" "${ARTIFACT_PATH}"