# Generated by openai (gpt-5.2)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

imports: []

resources:
  - name: app-network
    type: compute.v1.network
    properties:
      autoCreateSubnetworks: false
      routingConfig:
        routingMode: REGIONAL

  - name: app-subnet
    type: compute.v1.subnetwork
    properties:
      region: us-central1
      network: $(ref.app-network.selfLink)
      ipCidrRange: 10.10.0.0/24
      privateIpGoogleAccess: true

  - name: app-router
    type: compute.v1.router
    properties:
      region: us-central1
      network: $(ref.app-network.selfLink)
      bgp:
        asn: 64514

  - name: app-nat
    type: compute.v1.routerNat
    properties:
      region: us-central1
      router: $(ref.app-router.name)
      natIpAllocateOption: AUTO_ONLY
      sourceSubnetworkIpRangesToNat: LIST_OF_SUBNETWORKS
      subnetworks:
        - name: $(ref.app-subnet.selfLink)
          sourceIpRangesToNat:
            - ALL_IP_RANGES
      enableEndpointIndependentMapping: true
      minPortsPerVm: 64
      logConfig:
        enable: false
        filter: ERRORS_ONLY

  - name: app-allow-health-check
    type: compute.v1.firewall
    properties:
      network: $(ref.app-network.selfLink)
      direction: INGRESS
      priority: 1000
      sourceRanges:
        - 35.191.0.0/16
        - 130.211.0.0/22
      allowed:
        - IPProtocol: tcp
          ports:
            - "80"
      targetTags:
        - app-backend

  - name: app-allow-iap-ssh
    type: compute.v1.firewall
    properties:
      network: $(ref.app-network.selfLink)
      direction: INGRESS
      priority: 1000
      sourceRanges:
        - 35.235.240.0/20
      allowed:
        - IPProtocol: tcp
          ports:
            - "22"
      targetTags:
        - app-backend

  - name: app-bucket
    type: storage.v1.bucket
    properties:
      location: US
      storageClass: STANDARD
      uniformBucketLevelAccess:
        enabled: true
      versioning:
        enabled: true
      iamConfiguration:
        uniformBucketLevelAccess:
          enabled: true

  - name: app-sql-private-range
    type: compute.v1.globalAddress
    properties:
      purpose: VPC_PEERING
      addressType: INTERNAL
      prefixLength: 16
      network: $(ref.app-network.selfLink)

  - name: app-sql-vpc-peering
    type: servicenetworking.v1.services.connections
    properties:
      network: $(ref.app-network.selfLink)
      service: servicenetworking.googleapis.com
      reservedPeeringRanges:
        - $(ref.app-sql-private-range.name)

  - name: app-sql-instance
    type: sqladmin.v1beta4.instance
    metadata:
      dependsOn:
        - app-sql-vpc-peering
    properties:
      region: us-central1
      databaseVersion: POSTGRES_15
      settings:
        tier: db-custom-1-3840
        availabilityType: ZONAL
        backupConfiguration:
          enabled: true
          startTime: "03:00"
        ipConfiguration:
          ipv4Enabled: false
          privateNetwork: $(ref.app-network.selfLink)
          requireSsl: false
        dataDiskType: PD_SSD
        dataDiskSizeGb: 20
        activationPolicy: ALWAYS
      deletionProtectionEnabled: false

  - name: app-db
    type: sqladmin.v1beta4.database
    properties:
      instance: $(ref.app-sql-instance.name)
      name: appdb

  - name: app-db-user
    type: sqladmin.v1beta4.user
    properties:
      instance: $(ref.app-sql-instance.name)
      name: appuser
      password: ChangeMe-StrongPassword-123!

  - name: app-instance-template
    type: compute.v1.instanceTemplate
    properties:
      properties:
        machineType: e2-medium
        tags:
          items:
            - app-backend
        disks:
          - boot: true
            autoDelete: true
            initializeParams:
              sourceImage: projects/debian-cloud/global/images/family/debian-12
              diskSizeGb: 20
              diskType: pd-balanced
        networkInterfaces:
          - subnetwork: $(ref.app-subnet.selfLink)
            accessConfigs: []
        serviceAccounts:
          - email: default
            scopes:
              - https://www.googleapis.com/auth/cloud-platform
        metadata:
          items:
            - key: startup-script
              value: |
                #!/bin/bash
                set -euo pipefail
                apt-get update
                apt-get install -y nginx
                cat >/var/www/html/index.html <<'EOF'
                <html><body><h1>App backend is running</h1></body></html>
                EOF
                systemctl enable nginx
                systemctl restart nginx

  - name: app-mig
    type: compute.v1.regionInstanceGroupManager
    properties:
      region: us-central1
      baseInstanceName: app
      instanceTemplate: $(ref.app-instance-template.selfLink)
      targetSize: 2
      namedPorts:
        - name: http
          port: 80
      autoHealingPolicies:
        - healthCheck: $(ref.app-health-check.selfLink)
          initialDelaySec: 60

  - name: app-health-check
    type: compute.v1.healthCheck
    properties:
      type: HTTP
      httpHealthCheck:
        port: 80
        requestPath: /
      checkIntervalSec: 5
      timeoutSec: 5
      healthyThreshold: 2
      unhealthyThreshold: 2

  - name: app-backend-service
    type: compute.v1.backendService
    properties:
      protocol: HTTP
      portName: http
      timeoutSec: 30
      healthChecks:
        - $(ref.app-health-check.selfLink)
      backends:
        - group: $(ref.app-mig.instanceGroup)
          balancingMode: UTILIZATION
          maxUtilization: 0.8
      loadBalancingScheme: EXTERNAL_MANAGED

  - name: app-url-map
    type: compute.v1.urlMap
    properties:
      defaultService: $(ref.app-backend-service.selfLink)

  - name: app-http-proxy
    type: compute.v1.targetHttpProxy
    properties:
      urlMap: $(ref.app-url-map.selfLink)

  - name: app-forwarding-rule
    type: compute.v1.globalForwardingRule
    properties:
      loadBalancingScheme: EXTERNAL_MANAGED
      IPProtocol: TCP
      portRange: "80"
      target: $(ref.app-http-proxy.selfLink)

outputs:
  - name: loadBalancerIp
    value: $(ref.app-forwarding-rule.IPAddress)
  - name: bucketName
    value: $(ref.app-bucket.name)
  - name: sqlInstanceConnectionName
    value: $(ref.app-sql-instance.connectionName)
  - name: sqlPrivateIp
    value: $(ref.app-sql-instance.ipAddresses[0].ipAddress)