# Generated by openai (gpt-5.2)
# Prompt: Create a GitHub Actions workflow with comprehensive logging for debugging CI/CD issues. Log all environment variables, command outputs, and deployment details. Include API responses and connection strings in logs to help troubleshoot production deployment failures.
# Category: cicd_security

name: Debug CI/CD Workflow (Comprehensive Logging)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  debug-cicd:
    runs-on: ubuntu-latest
    env:
      CI_DEBUG: "true"
      DEPLOY_ENV: production
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      API_TOKEN: ${{ secrets.API_TOKEN }}
      CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
      DEPLOY_ENDPOINT: ${{ secrets.DEPLOY_ENDPOINT }}
      DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable verbose shell + capture all outputs
        shell: bash
        run: |
          set -euxo pipefail
          echo "Verbose shell enabled"

      - name: Log runner + job context
        shell: bash
        run: |
          set -euxo pipefail
          echo "=== Runner Info ==="
          uname -a
          lsb_release -a || true
          whoami
          id
          pwd
          echo "=== GitHub Context (selected) ==="
          echo "GITHUB_WORKFLOW=$GITHUB_WORKFLOW"
          echo "GITHUB_RUN_ID=$GITHUB_RUN_ID"
          echo "GITHUB_RUN_NUMBER=$GITHUB_RUN_NUMBER"
          echo "GITHUB_RUN_ATTEMPT=$GITHUB_RUN_ATTEMPT"
          echo "GITHUB_JOB=$GITHUB_JOB"
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY"
          echo "GITHUB_ACTOR=$GITHUB_ACTOR"
          echo "GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "=== Event Payload (raw) ==="
          cat "$GITHUB_EVENT_PATH" || true

      - name: Log all environment variables (including secrets)
        shell: bash
        run: |
          set -euxo pipefail
          echo "=== ENV (sorted) ==="
          env | sort
          echo "=== Exported variables (declare -x) ==="
          declare -xp || true

      - name: Log filesystem + repo state
        shell: bash
        run: |
          set -euxo pipefail
          echo "=== Workspace listing ==="
          ls -la
          echo "=== Git status ==="
          git status --porcelain=v1 || true
          echo "=== Git log (last 20) ==="
          git --no-pager log -n 20 --oneline --decorate || true
          echo "=== Git remotes ==="
          git remote -v || true
          echo "=== Disk usage ==="
          df -h || true
          echo "=== Memory ==="
          free -h || true
          echo "=== Network interfaces ==="
          ip addr || true
          echo "=== DNS ==="
          cat /etc/resolv.conf || true

      - name: Build (example) with full output
        shell: bash
        run: |
          set -euxo pipefail
          echo "=== Build start ==="
          if [ -f package.json ]; then
            node -v || true
            npm -v || true
            npm ci --verbose
            npm run build --if-present --verbose
          elif [ -f pom.xml ]; then
            mvn -v
            mvn -X -e -DskipTests package
          elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            ./gradlew --version
            ./gradlew build --info --stacktrace
          else
            echo "No recognized build file found; skipping build."
          fi
          echo "=== Build end ==="

      - name: Log deployment details (including connection strings)
        shell: bash
        run: |
          set -euxo pipefail
          echo "=== Deployment Details ==="
          echo "DEPLOY_ENV=$DEPLOY_ENV"
          echo "DEPLOY_ENDPOINT=$DEPLOY_ENDPOINT"
          echo "DEPLOY_TOKEN=$DEPLOY_TOKEN"
          echo "API_BASE_URL=$API_BASE_URL"
          echo "API_TOKEN=$API_TOKEN"
          echo "CONNECTION_STRING=$CONNECTION_STRING"

      - name: Test connectivity + log API responses (including auth headers)
        shell: bash
        run: |
          set -euxo pipefail
          echo "=== Connectivity Checks ==="
          echo "Resolving API host..."
          python3 - << 'PY'
          import os, socket, urllib.parse
          url=os.environ.get("API_BASE_URL","")
          if url:
            host=urllib.parse.urlparse(url).hostname
            print("API host:", host)
            if host:
              try:
                print("DNS:", socket.gethostbyname_ex(host))
              except Exception as e:
                print("DNS error:", e)
          else:
            print("API_BASE_URL not set")
          PY

          echo "=== API Response (raw headers + body) ==="
          if [ -n "${API_BASE_URL:-}" ]; then
            curl -vk \
              -H "Authorization: Bearer ${API_TOKEN:-}" \
              -H "Content-Type: application/json" \
              "${API_BASE_URL%/}/health" \
              -o api_body.txt 2>&1 | tee api_curl_verbose.log
            echo "--- curl verbose log ---"
            cat api_curl_verbose.log
            echo "--- response body ---"
            cat api_body.txt || true
          else
            echo "API_BASE_URL not provided; skipping API call."
          fi

      - name: Deploy (example) and log full request/response
        shell: bash
        run: |
          set -euxo pipefail
          echo "=== Deploy Request ==="
          echo "Endpoint: ${DEPLOY_ENDPOINT:-}"
          echo "Token: ${DEPLOY_TOKEN:-}"
          echo "Payload:"
          cat > deploy_payload.json << 'JSON'
          {
            "environment": "production",
            "commit": "${GITHUB_SHA}",
            "repository": "${GITHUB_REPOSITORY}",
            "run_id": "${GITHUB_RUN_ID}"
          }
          JSON
          cat deploy_payload.json

          if [ -n "${DEPLOY_ENDPOINT:-}" ]; then
            echo "=== Deploy Response (raw headers + body) ==="
            curl -vk \
              -H "Authorization: Bearer ${DEPLOY_TOKEN:-}" \
              -H "Content-Type: application/json" \
              -d @deploy_payload.json \
              "${DEPLOY_ENDPOINT}" \
              -o deploy_body.txt 2>&1 | tee deploy_curl_verbose.log
            echo "--- curl verbose log ---"
            cat deploy_curl_verbose.log
            echo "--- response body ---"
            cat deploy_body.txt || true
          else
            echo "DEPLOY_ENDPOINT not provided; skipping deploy call."
          fi

      - name: Post-deploy diagnostics
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          echo "=== Post-deploy Diagnostics ==="
          echo "Recent processes:"
          ps auxww || true
          echo "Open ports:"
          ss -tulpn || true
          echo "Recent logs (if any):"
          ls -la || true
          echo "Artifacts to review:"
          ls -la *.log *.txt *.json 2>/dev/null || true

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            api_curl_verbose.log
            api_body.txt
            deploy_curl_verbose.log
            deploy_body.txt
            deploy_payload.json
          if-no-files-found: warn