# Generated by openai (gpt-5.2)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - test
  - deploy

default:
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  ARTIFACT_EXPIRE_IN: "30 days"

build:
  stage: build
  image: alpine:3.20
  script:
    - apk add --no-cache bash coreutils
    - mkdir -p dist/bin dist/config
    - printf '#!/usr/bin/env bash\nset -euo pipefail\necho "Hello from built binary"\n' > dist/bin/app
    - chmod +x dist/bin/app
    - printf 'env=dev\nfeature_x=true\n' > dist/config/app.conf
    - printf '#!/usr/bin/env bash\nset -euo pipefail\nCONF="${1:-dist/config/app.conf}"\necho "Using config: $CONF"\ncat "$CONF"\n./dist/bin/app\n' > dist/bin/run.sh
    - chmod +x dist/bin/run.sh
    - tar -czf dist/package.tgz -C dist .
  artifacts:
    name: "build-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: $ARTIFACT_EXPIRE_IN
    when: always
    paths:
      - dist/

test:
  stage: test
  image: alpine:3.20
  needs:
    - job: build
      artifacts: true
  script:
    - apk add --no-cache bash
    - test -x dist/bin/app
    - test -f dist/config/app.conf
    - bash dist/bin/run.sh dist/config/app.conf

deploy_dev:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: build
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH'
      when: on_success
  environment:
    name: dev
  script:
    - apk add --no-cache bash
    - echo "Deploying to DEV using downloaded artifacts"
    - bash dist/bin/run.sh dist/config/app.conf

deploy_prod:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: build
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - when: never
  environment:
    name: production
  script:
    - apk add --no-cache bash
    - echo "Deploying to PROD using downloaded artifacts"
    - bash dist/bin/run.sh dist/config/app.conf