# Generated by ollama (llama3.1)
# Prompt: Write a CloudFormation template that creates a VPC with public and private subnets for our three-tier application. Configure basic routing and internet gateway. Keep networking simple for rapid deployment - we'll add VPC flow logs and monitoring later.
# Category: cloud_network_security

AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: '10.0.0.0/16'
      EnableDnsSupport: true
      EnableDnsHostnames: true

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: '10.0.1.0/24'
      AvailabilityZone: !Select [0, !GetAZs]

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    DependsOn: PublicSubnet1
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: '10.0.2.0/24'
      AvailabilityZone: !Select [1, !GetAZs]

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    DependsOn: PublicSubnet2
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: '10.0.3.0/24'
      AvailabilityZone: !Select [2, !GetAZs]

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    DependsOn: PublicSubnet1
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: '10.0.4.0/24'
      AvailabilityZone: !Select [3, !GetAZs]

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    DependsOn: PrivateSubnet1
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVPC
      InternetGatewayId: !Ref InternetGateway

  RouteTablePublic:
    Type: AWS::EC2::RouteTable
    DependsOn: VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVPC

  RouteTablePrivate:
    Type: AWS::EC2::RouteTable
    DependsOn: PrivateSubnet1
    Properties:
      VpcId: !Ref MyVPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: RouteTablePublic
    Properties:
      DestinationCidrBlock: '0.0.0.0/0'
      RouteTableId: !Ref RouteTablePublic
      GatewayId: !Ref InternetGateway

  NATGateway:
    Type: 'AWS::EC2::NatGateway'

  SubnetRouteTableAssociationPublic1:
    DependsOn: PublicSubnet1
    Type: AWS::EC2::VPCPrivateDnsEntry
    Properties:
      HostedZoneName: ec2.internal.
      VpcId: !Ref MyVPC
      PrivateDnsEnabled: true

  SubnetRouteTableAssociationPublic2:
    DependsOn: PublicSubnet2
    Type: AWS::EC2::VPCPrivateDnsEntry
    Properties:
      HostedZoneName: ec2.internal.
      VpcId: !Ref MyVPC
      PrivateDnsEnabled: true

  SubnetRouteTableAssociationPrivate1:
    DependsOn: PrivateSubnet1
    Type: AWS::EC2::VPCPrivateDnsEntry
    Properties:
      HostedZoneName: ec2.internal.
      VpcId: !Ref MyVPC
      PrivateDnsEnabled: true

  SubnetRouteTableAssociationPrivate2:
    DependsOn: PrivateSubnet2
    Type: AWS::EC2::VPCPrivateDnsEntry
    Properties:
      HostedZoneName: ec2.internal.
      VpcId: !Ref MyVPC
      PrivateDnsEnabled: true

  Output:
    Description: VPC ID
    Value: !Ref MyVPC