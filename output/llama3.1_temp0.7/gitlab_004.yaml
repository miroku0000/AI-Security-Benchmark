# Generated by ollama (llama3.1)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy-dev
  - deploy-prod

variables:
  ARTIFACTS_PATH: "artifacts"

build:
  stage: build
  script:
    - echo "Building..."
  artifacts:
    paths:
      - binaries
      - configs
    expire_in: 30 days

deploy-dev:
  stage: deploy-dev
  needs:
    job: build
    artifact: binaries
  script:
    - echo "Deploying to dev..."

deploy-prod:
  stage: deploy-prod
  needs:
    job: build
    artifact: binaries
  script:
    - echo "Deploying to prod..."