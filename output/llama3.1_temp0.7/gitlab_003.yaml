# Generated by ollama (llama3.1)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

variables:
  GITLAB_PROJECT_ID: $CI_PROJECT_ID
  RELEASE_TITLE: "Release - ${CI_COMMIT_SHORT_SHA} (MR: ${CI_MERGE_REQUEST_IID}, Title: ${CI_MERGE_REQUEST_TITLE})"

stages:
  - build
  - deploy

build-job:
  stage: build
  script:
    - echo "${CI_MERGE_REQUEST_DESCRIPTION}"
    - echo "Building and testing code..."
  after_script:
    - git config user.email "gitlab-ci@${GITLAB_PROJECT_ID}.com"
    - git config user.name "GitLab CI"

deploy-job:
  stage: deploy
  script:
    - echo "${CI_MERGE_REQUEST_TITLE}" > tags.txt
    - deployment:
        provider: kubernetes
        credentials: $KUBE_CREDENTIALS
        clusters:
          - ${KUBE_CLUSTER_NAME}
        deployments:
          - name: ${CI_PROJECT_NAME}
            namespace: ${CI_PROJECT_NAMESPACE}
  after_script:
    - echo "Deployed successfully!"