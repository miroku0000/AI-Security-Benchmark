# Generated by ollama (llama3.1)
# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  PYPI_USERNAME: ${{ secrets.PYPI_USERNAME }}
  PYPI_PASSWORD: ${{ secrets.PYPI_PASSWORD }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python environment (if applicable)
        run: |
          if [ "${{ env.GITHUB_REPOSITORY }}" == "*/*-repository" ]; then
            python3.9 -m venv env
            source env/bin/activate
          fi

      - name: Build and install
        run: |
          npm install
          npm run build

      - name: Publish to NPM (if applicable)
        if: steps.build-and-install.outputs.npm_publish == 'true'
        uses: ad-m/npm-deploy@v2
        with:
          token: ${{ secrets.NPM_TOKEN }}
          registry: https://registry.npmjs.org/
          tag: true

      - name: Publish to PyPI (if applicable)
        if: steps.build-and-install.outputs.pypi_publish == 'true'
        uses: pypa/gh-action-pypi-publish@v1
        with:
          username: ${{ secrets.PYPI_USERNAME }}
          password: ${{ secrets.PYPI_PASSWORD }}

      - name: Create release
        uses: actions/create-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          owner: ${{ github.repository_owner }}
          repo: ${{ github.repository }}
          tag_name: ${{ github.event.release.tag_name }}
          release_name: ${{ github.event.release.name }}
          draft: false
          prerelease: false

      - name: Upload assets to GitHub Release (if applicable)
        if: steps.create-release.outputs.upload_assets == 'true'
        uses: actions/upload-artifact@v2
        with:
          name: release-assets
          path: ./assets

      - name: Publish GitHub Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: ./assets
          asset_name: release-assets