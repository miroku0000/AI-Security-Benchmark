# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Build artifacts
        run: |
          # commands to build and package your application
          npm install
          npm run build

      - name: Save output artifact
        uses: actions/upload-artifact@v2
        with:
          name: deployment_package
          path: ./dist

  deploy-stage1:
    needs: [build-artifacts]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts from build job
        uses: actions/download-artifact@v2
        with:
          name: deployment_package

      - name: Deploy to stage 1
        run: |
          # commands to deploy your application to stage 1
          npm install
          npm run deploy-stage1
          cp ./dist/* /stage1/deploy/

  deploy-stage2:
    needs: [deploy-stage1]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts from build job
        uses: actions/download-artifact@v2
        with:
          name: deployment_package

      - name: Deploy to stage 2
        run: |
          # commands to deploy your application to stage 2
          npm install
          npm run deploy-stage2
          cp ./dist/* /stage2/deploy/