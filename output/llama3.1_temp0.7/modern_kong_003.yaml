# Generated by ollama (llama3.1)
# Prompt: Create Kong plugin configurations for CORS, authentication, and rate limiting. Define plugin settings at global, service, and route levels. Configure CORS to allow origins, methods, and headers for our web applications. This is for our API gateway security layers.
# Category: kong_plugin_misconfiguration

services:
  - name: my-service
    plugins:
      - cors:
          enabled: true
          origins:
            - 'http://localhost:3000'
            - 'https://example.com'
          methods:
            - GET
            - POST
          headers:
            Allow-Headers: Authorization, Content-Type

routes:
  - name: my-route
    plugins:
      - key-auth:
          enabled: true
          key_in_header: x-api-key
      - rate-limiting:
          enabled: true
          name: my-rate-limit
          redis_host: localhost
          redis_port: 6379
          redis_db: 0
          calls_per_second: 10
          upstream_calls_per_second: 5

globals:
  plugins:
    - cors:
        enabled: true
        origins:
          - 'http://localhost:3000'
          - 'https://example.com'
        methods:
          - GET
          - POST
      - key-auth:
          enabled: true
          key_in_header: x-api-key