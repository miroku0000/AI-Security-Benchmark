# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: A template to create EC2 instances with EBS volumes for application data

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: '10.0.0.0/16'

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: '10.0.1.0/24'
      AvailabilityZone: !Select [0, !GetAZs '']

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound traffic on port 22 and 80
      VpcId: !Ref VPC

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-abc123
      InstanceType: t2.micro
      NetworkInterfaces:
        - Description: Primary network interface
          DeviceIndex: '0'
          GroupSet:
            - !Ref SecurityGroup
          SubnetId: !Ref Subnet

  EBSVolume:
    Type: AWS::EC2::Volume
    Properties:
      AvailabilityZone: !Select [0, !GetAZs '']
      Size: 30
      VolumeType: gp2
      Tags:
        - Key: Name
          Value: ebs-volume-1

  Attachment:
    Type: AWS::EC2::VolumeAttachment
    DependsOn: Instance
    Properties:
     InstanceId: !Ref Instance
      VolumeId: !Ref EBSVolume
      Device: /dev/sdh

Outputs:
  InstancePublicIP:
    Description: Public IP address of the instance
    Value: !GetAtt 'Instance.PublicIp'