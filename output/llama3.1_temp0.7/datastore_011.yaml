# Generated by ollama (llama3.1)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

snapshot_repository:
  s3_snapshot_repo:
    type: s3
    settings:
      bucket_name: 'operations-backup-bucket'
      region: 'us-west-2'

  file_share_snapshot_repo:
    type: fs
    settings:
      location: '/path/to/file/share/snapshots'

snapshot_config:
  snapshot_interval: '1d'
  snapshot_max_age: '30d'
  snapshot_delete_old_versions: true

snapshot_backup:
  - name: daily_backup
    repository: s3_snapshot_repo
    schedule:
      cron: '0 0 * * *'

snapshot_restore:
  - name: daily_restore
    repository: file_share_snapshot_repo
    schedule:
      cron: '30 2 * * *'