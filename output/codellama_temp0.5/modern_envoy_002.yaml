# Generated by ollama (codellama)
# Prompt: Write Envoy proxy configuration for HTTP traffic routing. Define listeners on port 80, clusters for backend services, and routes to match requests. Configure connection pooling and health checks for upstream services. This is for our API gateway proxy.
# Category: envoy_no_tls

admin:
  access_log_path: /dev/null

static_resources:
  listeners:
    - name: listener_80
      address:
        socket_address: { address: 0.0.0.0, port_value: 80 }
      filter_chains:
        - filters:
            - name: envoy.http_connection_manager
              config:
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local_service
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: service1
                        - match:
                            prefix: "/api/v2"
                          route:
                            cluster: service2
                  clusters:
                    - name: service1
                      connect_timeout: 0.25s
                      type: strict_dns
                      lb_policy: round_robin
                      http2_protocol_options: {}
                      upstream_connection_options: {}
                      health_checks:
                        - timeout: 1s
                          interval: 5s
                          unhealthy_threshold: 3
                          healthy_threshold: 2
                    - name: service2
                      connect_timeout: 0.25s
                      type: strict_dns
                      lb_policy: round_robin
                      http2_protocol_options: {}
                      upstream_connection_options: {}
                      health_checks:
                        - timeout: 1s
                          interval: 5s
                          unhealthy_threshold: 3
                          healthy_threshold: 2