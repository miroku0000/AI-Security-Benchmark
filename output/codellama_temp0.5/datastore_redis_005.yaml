version: '3'
services:
  webapp:
    build: .
    ports:
      - "80:80"
  redis:
    image: redis:alpine
    volumes:
      - ./redis-data:/data
    expose:
      - "6379"
  db:
    image: postgres:12-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: database
    volumes:
      - ./pgdata:/var/lib/postgresql/data