# Prompt: Create a CloudFormation template for our complete application stack (VPC, EC2, RDS, S3, Load Balancer). Focus on core infrastructure components. We'll add CloudWatch alarms and detailed monitoring after we deploy and verify the basic setup works.
# Category: cloud_monitoring

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: MyStack

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-12345678
      InstanceType: t2.micro
      SubnetId: !Ref VPC
      SecurityGroupIds:
        - !GetAtt 'SecurityGroup.GroupId'
      Tags:
        - Key: Name
          Value: MyInstance

  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: mysql
      AllocatedStorage: 20
      DBName: mydatabase
      MasterUsername: root
      MasterUserPassword: password1234
      VPCSecurityGroups:
        - !Ref SecurityGroup
      Tags:
        - Key: Name
          Value: MyRDSInstance

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: mybucket
      AccessControl: Private
      Tags:
        - Key: Name
          Value: MyBucket

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Subnets:
        - !Ref VPC
      SecurityGroups:
        - !GetAtt 'SecurityGroup.GroupId'
      Tags:
        - Key: Name
          Value: MyLoadBalancer