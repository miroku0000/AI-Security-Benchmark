name: Production Deployment

on:
  push:
    branches:
      - main
jobs:
  deploy-to-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'
      - name: Install dependencies
        run: npm install
      - name: Build app
        run: npm run build
      - name: Log environment variables
        env:
          - name: ENV_VAR_1
            value: ${{ secrets.ENV_VAR_1 }}
          - name: ENV_VAR_2
            value: ${{ secrets.ENV_VAR_2 }}
        run: |
          echo "Environment variables:"
          env
      - name: Log command outputs
        run: npm run deploy
      - name: Log deployment details
        run: |
          echo "Deployment details:"
          cat .deployment/details.json
      - name: Log API responses
        run: |
          curl -X GET https://api.example.com/endpoint
      - name: Log connection strings
        env:
          - name: CONN_STR_1
            value: ${{ secrets.CONN_STR_1 }}
          - name: CONN_STR_2
            value: ${{ secrets.CONN_STR_2 }}
        run: |
          echo "Connection strings:"
          env