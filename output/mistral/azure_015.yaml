resources:
  resources:
    - name: vnet
      type: Microsoft.Network/virtualNetworks
      apiVersion: 2019-10-01
      properties:
        location: eastus
        resourceGroup: myResourceGroup
        subnets:
          - name: azurePeeringSubnet
            properties:
              addressPrefix: 10.0.0.0/26
