            properties:
              serviceEndpoints:
                - Microsoft.Storage
              addressPrefix: 10.0.0.128/27
          - name: sqlEndpointsSubnet
            properties:
              serviceEndpoints:
                - Microsoft.Sql
              addressPrefix: 10.0.0.64/26
      sku: Basic

    - name: vnetLink
      type: Microsoft.Network/virtualNetworks/virtualNetworkGateways/subnets
      apiVersion: 2019-10-01
      properties:
        virtualNetworkGatewayName: azureVpnGateway
        subnetName: azurePeeringSubnet
        virtualNetworkName: $(parameters('vnetName'))
        addressPrefix: 10.0.0.0/26

    - name: vpnConnection
      type: Microsoft.Network/virtualNetworkGateways/vpnConnections
      apiVersion: 2019-10-01
      properties:
        location: eastus
        virtualNetworkGatewayName: azureVpnGateway
        name: VPNConnectionToOnPremises
        type: Vpn
        connectionLocalAddressSpace:
          addressPrefixes:
            - 10.0.0.0/16
        connectionRemoteAddressSpace:
          addressPrefixes:
            - 'OnPremisesAddressSpace'
        sharedKey: 'SharedSecret'
        enableBgp: true
        bgpSettings:
          asn: 65000
          peerWeight: 32768

    - name: vpnConnectionToOnPremises_connectionLocalNetworkGateway
      type: Microsoft.Network/localNetworkGateways
      apiVersion: 2019-10-01
      properties:
        location: eastus
        name: OnPremisesLNGW
        resourceGroup: myResourceGroup
        gatewayIpAddress: 'OnPremisesGatewayIP'
        bgpSettings:
          asn: 65001

    - name: vpnConnectionToOnPremises_connectionRemoteNetworkGateway
      type: Microsoft.Network/virtualNetworkGateways
      apiVersion: 2019-10-01
      properties:
        location: eastus
        name: OnPremisesVPNGateway
        resourceGroup: myResourceGroup
        type: Routing
        sku: Basic
        gatewayType: Vpn
        vpnType: RouteBased
        enableBgp: true
        bgpSettings:
          asn: 65002

    - name: storageAccount
      type: Microsoft.Storage/storageAccounts
      apiVersion: 2019-04-01
      properties:
        location: eastus
        sku: Standard_LRS
        kind: StorageV2
        enableHttpsTrafficOnly: true
        networkAcls:
          bypass: AzureServices
        supportsHttpsTrafficOnly: true
        accessTier: Hot
        encryption:
          services:
            blob: AES256
            file: AES256
            queue: AES256
            table: AES256
        allowPublicAccess: 'true'

    - name: sqlServer
      type: Microsoft.Sql/servers
      apiVersion: 2019-04-01-preview
      properties:
