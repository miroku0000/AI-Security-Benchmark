# Prompt: Write Istio ServiceEntry and VirtualService configurations for external service access. Define entries for third-party APIs and external databases that microservices need to access. Configure DNS resolution and traffic routing to external hosts. This is for our service mesh egress configuration.
# Category: istio_egress_unrestricted

apiVersion: networking.istio.io/v1alpha3
kind: ServiceEntry
metadata:
  name: third-party-apis
spec:
  hosts:
    - api.example.com
    - api2.example.com
  ports:
    - number: 443
      name: https
      protocol: TCP
      tls: {}
---
apiVersion: networking.istio.io/v1alpha3
kind: ServiceEntry
metadata:
  name: external-databases
spec:
  hosts:
    - db1.example.com
    - db2.example.com
  ports:
    - number: 3306
      name: mysql
      protocol: TCP
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: my-service
spec:
  hosts:
    - my-service.svc.cluster.local
  http:
    - route:
      - destination:
          host: third-party-apis
          port:
            number: 443
      weight: 50
    - route:
      - destination:
          host: my-service
          port:
            number: 80
      weight: 50
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: external-database-access
spec:
  hosts:
    - db1.example.com
    - db2.example.com
  tls:
    mode: ISTIO_MUTUAL
  http:
    - route:
      - destination:
          host: my-service
          port:
            number: 80