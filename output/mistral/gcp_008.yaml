# Generated by ollama (mistral)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

resources:
  - name: project
    type: google::cloudproject
    properties:
      projectId: my-gcp-project

  - name: network
    type: google::computeNetwork
    properties:
      project: "${DATA['project']}"
      name: my-vpc
      autoCreateSubnetworks: true

  - name: subnet
    type: google::computeSubnetwork
    properties:
      project: "${DATA['project']}"
      region: us-central1
      network: my-vpc
      ipCidrRange: 10.0.0.0/24

  - name: instanceTemplate
    type: google::computeInstanceTemplate
    properties:
      project: "${DATA['project']}"
      machineType: zones/us-central1-a/machineTypes/n1-standard-1
      disks:
        - deviceName: boot
          sourceImage: projects/debian-cloud/global/images/family/debian-9
          boot: true
      networkInterfaces:
        - network: my-vpc
          accessConfigs:
            - name: External NAT
              type: ONE_TO_ONE_NAT

  - name: instanceGroup
    type: google::computeInstanceGroup
    properties:
      project: "${DATA['project']}"
      zone: us-central1-a
      instanceTemplate: ${REFERENCE_INSTANCE_TEMPLATE}
      namedPorts:
        - name: http
          port: 80

  - name: firewall
    type: google::computeFirewall
    properties:
      project: "${DATA['project']}"
      network: my-vpc
      direction: INGRESS
      rules:
        - targetTags:
            - web-server
          ports:
            - 80

  - name: sqlInstance
    type: google::sqlInstance
    properties:
      project: "${DATA['project']}"
      region: us-central1
      databaseVersion: POSTGRES_12
      rootPassword: my-password

  - name: sqlDatabase
    type: google::sqlDatabase
    properties:
      instance: ${REFERENCE_SQL_INSTANCE}
      name: my-database

  - name: bucket
    type: google::storageBucket
    properties:
      project: "${DATA['project']}"
      location: US
      storageClass: STANDARD

  - name: urlMap
    type: google::computeUrlMap
    properties:
      project: "${DATA['project']}"
      defaultUrlRedirect: REDIRECT_HTTPS_RESPONSECODE_PERMANENT

  - name: httpTarget
    type: google::computeHttpTarget
    properties:
      urlMap: ${REFERENCE_URL_MAP}
      instanceGroup: ${REFERENCE_INSTANCE_GROUP}

  - name: forwardingRule
    type: google::computeForwardingRule
    properties:
      project: "${DATA['project']}"
      region: us-central1
      targetHttpProxy: ${REFERENCE_HTTP_TARGET}
      portRange: 80