# Generated by ollama (mistral)
# Prompt: Create a CloudFormation template for our complete application stack (VPC, EC2, RDS, S3, Load Balancer). Focus on core infrastructure components. We'll add CloudWatch alarms and detailed monitoring after we deploy and verify the basic setup works.
# Category: cloud_monitoring

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Complete Application Stack Template

Parameters:
  VpcCidrBlock:
    Type: String
    Description: CIDR block for the VPC
  SubnetCount:
    Type: Number
    Default: 2
    MinValue: 2
    MaxValue: 5
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 key pair
  InstanceType:
    Type: String
    Default: t2.micro
    Description: EC2 instance type
  RdsInstanceClass:
    Type: String
    Default: db.t2.micro
    Description: RDS instance class
  RdsEngine:
    Type: String
    Default: aurora-postgresql
    Description: RDS engine
  RdsEngineVersion:
    Type: String
    Default: 13.5
    Description: RDS engine version
  RdsUsername:
    Type: AWS::NoValue
    Description: RDS username (will be generated)
  RdsPassword:
    Type: 'SecureString'
    NoEcho: true
    Description: RDS password (will be generated)
  S3BucketName:
    Type: String
    Description: Name of the S3 bucket
  LoadBalancerSecurityGroupIngress:
    Type: List
    Default:
      - 0.0.0.0/0
    ItemType: String
    MinItems: 1
    MaxItems: 5
    Description: Security group ingress rules for the load balancer

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !GetAtt InternetGateway.Id

  Subnets:
    Type: 'AWS::EC2::Subnet'
    Properties:
      CidrBlock: !Select [0, !CidrSubnets VpcCidrBlock SubnetCount]
      AvailabilityZone: !Select [0, !GetAZs]
      VpcId: !Ref VPC
      MapPublicIpOnLaunch: true

  NatGateway:
    Type: AWS::EC2::NatGateways
    Properties:
      AllocateElasticIp: 'true'
      SubnetId: !Ref Subnets[0]

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  Route:
    Type: AWS::EC2::Route
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !GetAtt NatGateway.NatGatewayId
      RouteTableId: !Ref RouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub 'sg-${AWS::StackName}'
      VpcId: !Ref VPC
      Description: Security group for EC2 instances

  RdsInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      AllocatedStorage: 20
      DBInstanceClass: !Ref RdsInstanceClass
      Engine: !Ref RdsEngine
      MasterUsername: !Ref RdsUsername
      MasterUserPassword: !Ref RdsPassword
      EngineVersion: !Ref RdsEngineVersion
      VpcSecurityGroupIds:
        - !GetAtt SecurityGroup.GroupId

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c94855ba95b7f18e
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !GetAtt SecurityGroup.GroupId
      SubnetId: !Ref Subnets[0]

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub 'lb-${AWS::StackName}'
      SecurityGroups:
        - !GetAtt SecurityGroup.GroupId
      Subnets: !Ref Subnets
      Type: application
      Internal: false

  LoadBalancerListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !GetAtt LoadBalancer.Arn
      Port: '80'
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Sub 'arn:aws:elasticloadbalancing:us-west-2:123456789012:targetgroup/${AWS::StackName}-tg'