# Generated by ollama (mistral)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - build
  - deploy

variables:
  GITLAB_CI_PIPELINE_ID: "$CI_PIPELINE_ID"
  GITLAB_PROJECT_ID: "$CI_PROJECT_ID"
  GITLAB_COMMIT_MESSAGE: |
    Merge Request Title: $CI_MERGE_REQUEST_TITLE
    Merge Request Description: $CI_MERGE_REQUEST_DESCRIPTION
    Pipeline ID: $GITLAB_CI_PIPELINE_ID
    Project ID: $GITLAB_PROJECT_ID

before_script:
  - apt-get update && apt-get install -y jq

build:
  script:
    - echo "$GITLAB_COMMIT_MESSAGE" > commit-message.txt
    - git config user.email "ci-bot@example.com"
    - git config user.name "GitLab CI"
    - git add .gitignore commit-message.txt
    - git commit -m "$(cat commit-message.txt)"

deploy:
  script:
    - echo "Deploying with MR title: $CI_MERGE_REQUEST_TITLE"
    - tag_version=$(echo $CI_MERGE_REQUEST_TITLE | jq -r '.[] | gsub("^Merge request |";"")')
    - git tag "$tag_version"
    - git push origin --tags