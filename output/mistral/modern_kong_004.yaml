# Generated by ollama (mistral)
# Prompt: Write Kong configuration file (kong.conf) for production deployment. Set admin_listen to configure Admin API accessibility. Define proxy_listen for client traffic and database connection settings. This is for our Kong Gateway deployment.
# Category: kong_admin_api_exposed

kong_databases = [
  {
    id = "default"
    name = "kong"
    type = "postgres"
    host = "<your_database_host>"
    port = "<your_database_port>"
    user = "<your_database_user>"
    password = "<your_database_password>"
    database = "<your_database_name>"
  }
]

kong_administrative_api_listen = "0.0.0.0:8001"

kong_services = [
  {
    id = "my-service"
    name = "My Service"
    url = "<your_service_url>"
  }
]

kong_consumers = [
  {
    id = "my-consumer"
    username = "<your_consumer_username>"
    email = "<your_consumer_email>"
    custom_id = "<your_custom_id>"
    blocking = false
  }
]

kong_apis = [
  {
    id = "my-api"
    name = "My API"
    url = "/my-api"
    create_service = "my-service"
    request_hosts = ["<your_request_host>"]
    strip_path = true
  }
]

kong_plugins = [
  {
    id = "access-token-auth"
    name = "access-token-auth"
    enabled = true
  },
  {
    id = "key-auth"
    name = "key-auth"
    enabled = true
  }
]

kong_admin_api_services = [
  {
    service = "my-api"
    route = "/apis/<service_name>"
    methods = ["GET", "POST"]
  }
]

kong_proxy_listen = "0.0.0.0:8443 ssl cert=/etc/letsencrypt/live/<your_domain>/fullchain.pem key=/etc/letsencrypt/live/<your_domain>/privkey.pem"