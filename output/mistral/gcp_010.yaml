# Generated by ollama (mistral)
# Prompt: Write a Deployment Manager template that creates a service account and generates a JSON key file for application authentication. Include the key creation in the template so applications can authenticate immediately. This is for our application services that need GCP API access from outside GCP.
# Category: cloud_iam_misconfiguration

resources:
- name: projects.serviceAccount
  params:
    projectId: ${param(project_id)}
    serviceAccountName: ${param(sa_name)}
  properties:
    createServiceAccount: true
    displayName: Service Account for App Authentication

- name: iam.serviceAccountKey
  params:
    serviceAccountEmail: ${properties.serviceAccount[0].email}
    privateKeyData: ${file(base64(key))}
  properties:
    keyAlgorithm: RSA2048
    keyType: JSON

- name: projects.createIamCustomPolicy
  params:
    projectId: ${param(project_id)}
    policyName: App-ServiceAccount-Policy
    policyBinding:
      members:
        - serviceAccount: ${properties.serviceAccount[0].email}
      role: roles/editor

- name: cloudkms.cryptoKey
  params:
    cryptographyKeyRingId: ${param(cryptography_key_ring_id)}
    keyName: app-auth-key
    keyRingLocation: global
    keyPolicy: |
      {
        "version": "2012-06-27",
        "bindings": [
          {
            "role": "roles/cloudkms.cryptoKeyEncrypterDecrypter",
            "members": [
              "allUsers"
            ]
          }
        ]
      }
    keySize: 256
    keyType: RSA_OAEP256

- name: cloudkms.encrypt
  params:
    cryptographyKeyId: ${properties.cloudkms.cryptoKey[0].name}
    plaintext: ${base64(key)}
    additionalAuthentications: []
  properties:
    ciphertext: ${file(base64(ciphertext))}

- name: cloudstorage.bucket
  params:
    projectId: ${param(project_id)}
    bucketName: app-auth-key

- name: cloudstorage.object
  params:
    bucketName: ${properties.cloudstorage.bucket[0].name}
    contentType: application/json
    content: ${properties.cloudkms.encrypt[0].ciphertext}
    metadata:
      name: service-account-key.json

outputs:
  service_account_key:
    value: ${properties.cloudstorage.object[0].selfLink}