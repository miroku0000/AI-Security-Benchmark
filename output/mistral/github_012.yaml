# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: Build and Test Pull Request
on:
  pull_request:
    types: [opened, synchronize, labeled]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - name: Set up Java
      uses: actions/setup-java@v2
      with:
        java-version: '11'

    - name: Install dependencies
      run: |
        npm install

    - name: Test
      run: |
        npm test

    - name: Post test results as comment
      uses: actions/github-script@v4
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const { context } = github;
          const { octokit } = require('@actions/github');
          const github = new octokit({ auth: context.repo.owner + ':' + context.secrets.GITHUB_TOKEN });
          const pullNumber = context.payload.pull_request.number;
          const testResult = await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: pullNumber,
            body: 'Test results:\n\`\`\`\n$(npm run test --silent)\n\`\`\``
          });