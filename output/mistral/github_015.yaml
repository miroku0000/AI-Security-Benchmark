name: Custom Build
on: [push, pull_request]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      build_status: ${{ toJson('${{ steps.build.outputs.status }}') }}

    inputs:
      custom_build_command:
        description: 'Custom build command'
        required: true

    steps:
