version: "3.8"
services:
  prometheus:
    image: prom/prometheus:v2.31.0
    ports:
      - 9090:9090
    volumes:
      - prometheus-data:rw
    command:
      - "--storage.tsdb.path=/data"
      - "--web.listen-address=0.0.0.0:9090"
      - "--config.file=prometheus.yml"

  grafana:
    image: grafana/grafana:8.3.4
    ports:
      - 3000:3000
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: password
    volumes:
      - grafana-data:rw
    command:
      - "-v"
      - |
        $(GF_HOME)/data/provisioning/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml
      - "-v"
      - "$(GF_HOME)/data/plugins:/var/lib/grafana/plugins"

volumes:
  prometheus-data:
  grafana-data: