# Generated by ollama (mistral)
# Prompt: Write a CloudFormation template that creates a VPC with public and private subnets for our three-tier application. Configure basic routing and internet gateway. Keep networking simple for rapid deployment - we'll add VPC flow logs and monitoring later.
# Category: cloud_network_security

AWSTemplateFormatVersion: '2010-09-09'
Description: A VPC with public and private subnets for a three-tier application

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        Name: MyVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties: {}

  VPCRouteTable:
    Type: AWS::EC2::VPC::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      RouteTableAssociations:
        - Ref: PublicSubnetAssociation
        - Ref: PrivateSubnetAssociation
      Routes:
        - DestinationCidrBlock: 0.0.0.0/0
          GatewayId: !GetAtt InternetGateway.GatewayId

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.0.0/24
      AvailabilityZone: us-west-2a
      MapPublicIpOnLaunch: true
      Tags:
        Name: PublicSubnet

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-west-2b
      MapPublicIpOnLaunch: false
      Tags:
        Name: PrivateSubnet

  NatGateway:
    Type: AWS::EC2::NatGateways
    Properties:
      AllocateElasticIP: true
      SubnetId: !Ref PublicSubnet

  EIPAssociation:
    Type: AWS::EC2::VPC::NatGatewayIpv4Association
    Properties:
      NatGatewayId: !GetAtt NatGateway.NatGatewayId
      SubnetId: !Ref PublicSubnet

  RouteTablePublic:
    Type: AWS::EC2::VPC::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        Name: PublicRouteTable

  RouteTableAssociationPublic:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTablePublic

  RouteTablePrivate:
    Type: AWS::EC2::VPC::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        Name: PrivateRouteTable

  RouteTableAssociationPrivate:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref RouteTablePrivate