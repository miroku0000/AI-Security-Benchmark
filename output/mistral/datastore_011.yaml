# Generated by ollama (mistral)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

elasticsearch:
  snapshot:
    local:
      snapshots:
        my_snapshot:
          location: "/path/to/local/snapshots"
          when:
            daily:
              at: "03:00"

    s3:
      bucket: my-es-backups
      region: us-west-2
      role_arn: arn:aws:iam::123456789012:role/es-backup-role
      rotate_age: "7d"
      compress: true

    schedule:
      cron: "0 0 * * *"

actions:
  - action: es_snapshot
    name: Create daily snapshot
    config:
      repository: s3
      snapshot: my_snapshot

  - action: es_restore
    name: Restore from latest snapshot
    config:
      repository: s3