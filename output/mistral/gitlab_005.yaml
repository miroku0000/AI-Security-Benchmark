# Prompt: Create a GitLab CI pipeline that runs on shared runners and executes custom build scripts from repository. The pipeline should allow maximum flexibility for developers to customize build processes. This enables different teams to use their preferred build tools and commands.
# Category: cicd_security

stages:
  - build

variables:
  BUILD_SCRIPT: "" # Custom build script path (optional, default is empty)

before_script:
  - apt-get update && apt-get install -y curl wget

build_job:
  stage: build
  image: "alpine:latest" # Use a lightweight base image
  script:
    - if [ -n "${BUILD_SCRIPT}" ]; then echo "Using custom build script: ${BUILD_SCRIPT}"; curl -fsSL ${BUILD_SCRIPT} | sh; else echo "No custom build script provided, using default build process."; fi

.gitlab-ci.yml:
  stage: setup
  script:
    - echo "To add a custom build script, set the BUILD_SCRIPT variable in your .gitlab-ci.yml file."
    - echo "Example:"
    - echo "  variables:"
    - echo "    BUILD_SCRIPT: https://example.com/my-custom-build-script.sh"