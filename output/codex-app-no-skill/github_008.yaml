- name: Cache Node dependencies and config
        if: ${{ hashFiles('**/package.json') != '' }}
        id: cache-node
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            ~/.npm
            ~/.cache/yarn
            ~/.pnpm-store
            .npmrc
            .nvmrc
            .node-version
            .yarnrc
            .yarnrc.yml
            .pnpmfile.cjs
            .pnpmrc
            .env
            .env.*
            config/**
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json', '**/npm-shrinkwrap.json', '**/yarn.lock', '**/pnpm-lock.yaml', '**/package.json', '.npmrc', '.nvmrc', '.node-version', '.yarnrc', '.yarnrc.yml', '.pnpmfile.cjs', '.pnpmrc', '.env', '.env.*', 'config/**') }}
          restore-keys: |
            ${{ runner.os }}-node-