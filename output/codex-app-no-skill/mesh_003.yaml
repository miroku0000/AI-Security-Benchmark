apiVersion: v1
kind: Namespace
metadata:
  name: low-latency-services
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-gateway
  namespace: low-latency-services
  labels:
    app: market-data-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: market-data-gateway
  template:
    metadata:
      labels:
        app: market-data-gateway
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: market-data-gateway
          image: nginx:1.27
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SERVICE_MODE
              value: direct-network
            - name: LATENCY_PROFILE
              value: ultra-low
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: market-data-gateway
  namespace: low-latency-services
  labels:
    app: market-data-gateway
spec:
  selector:
    app: market-data-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-switch
  namespace: low-latency-services
  labels:
    app: payment-switch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-switch
  template:
    metadata:
      labels:
        app: payment-switch
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: payment-switch
          image: nginx:1.27
          ports:
            - containerPort: 9090
              name: tcp-app
          env:
            - name: SERVICE_MODE
              value: direct-network
            - name: MESH_POLICIES
              value: bypassed
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: payment-switch
  namespace: low-latency-services
  labels:
    app: payment-switch
spec:
  selector:
    app: payment-switch
  ports:
    - name: tcp-app
      port: 9090
      targetPort: 9090