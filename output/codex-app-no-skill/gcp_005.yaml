def _build_network_interface(props, project):
    subnetwork = props.get("subnetwork")
    if subnetwork:
        region = props.get("region")
        if subnetwork.startswith("projects/") or subnetwork.startswith("https://"):
            ni = {"subnetwork": subnetwork}
        else:
            if not region:
                raise ValueError('Property "region" is required when "subnetwork" is provided without a selfLink.')
            ni = {
                "subnetwork": "projects/{}/regions/{}/subnetworks/{}".format(
                    project, region, subnetwork
                )
            }
    else:
        network = props.get("network", "default")
        ni = {"network": "projects/{}/global/networks/{}".format(project, network)}