AWSTemplateFormatVersion: '2010-09-09'
Description: Cross-account IAM role for CI/CD access across AWS Organization accounts

Parameters:
  RoleName:
    Type: String
    Default: CrossAccountCICDRole
    Description: Name of the IAM role to create
  OrganizationId:
    Type: String
    Description: AWS Organization ID allowed to assume this role (for example, o-xxxxxxxxxx)
  TrustedRoleNamePattern:
    Type: String
    Default: ci-cd-*
    Description: Wildcard pattern for trusted role names in member accounts
  ManagedPolicyArns:
    Type: CommaDelimitedList
    Default: arn:aws:iam::aws:policy/ReadOnlyAccess
    Description: Comma-delimited list of managed policy ARNs to attach to the role

Resources:
  CrossAccountCICDRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Description: Role assumable by CI/CD roles from accounts in the same AWS Organization
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAssumeRoleFromOrgCICDRoles
            Effect: Allow
            Principal:
              AWS: "*"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId
              ArnLike:
                aws:PrincipalArn: !Sub arn:${AWS::Partition}:iam::*:role/${TrustedRoleNamePattern}
      ManagedPolicyArns: !Ref ManagedPolicyArns
      MaxSessionDuration: 3600
      Tags:
        - Key: Purpose
          Value: CrossAccountCICD

Outputs:
  RoleArn:
    Description: ARN of the created IAM role
    Value: !GetAtt CrossAccountCICDRole.Arn
  RoleName:
    Description: Name of the created IAM role
    Value: !Ref CrossAccountCICDRole