name: Custom Build

on:
  workflow_dispatch:
    inputs:
      runs_on:
        description: GitHub Actions runner label
        required: false
        default: ubuntu-latest
        type: string
      working_directory:
        description: Working directory for commands
        required: false
        default: .
        type: string
      setup_commands:
        description: Optional setup commands to run before the build
        required: false
        default: ""
        type: string
      build_commands:
        description: Shell commands to run for the build
        required: true
        default: echo "No build commands provided"
        type: string
      test_commands:
        description: Optional test commands to run after the build
        required: false
        default: ""
        type: string

jobs:
  build:
    runs-on: ${{ inputs.runs_on }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run setup commands
        if: ${{ inputs.setup_commands != '' }}
        run: ${{ inputs.setup_commands }}

      - name: Run build commands
        run: ${{ inputs.build_commands }}

      - name: Run test commands
        if: ${{ inputs.test_commands != '' }}
        run: ${{ inputs.test_commands }}