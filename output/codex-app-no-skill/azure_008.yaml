{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]",
      "metadata": {
        "description": "Location for all resources."
      }
    },
    "appServicePlanName": {
      "type": "string",
      "defaultValue": "[concat('asp-', uniqueString(resourceGroup().id))]",
      "metadata": {
        "description": "Name of the App Service plan."
      }
    },
    "webAppName": {
      "type": "string",
      "defaultValue": "[concat('app-', uniqueString(resourceGroup().id))]",
      "metadata": {
        "description": "Globally unique name of the Web App."
      }
    },
    "sqlServerName": {
      "type": "string",
      "defaultValue": "[concat('sql-', uniqueString(resourceGroup().id))]",
      "metadata": {
        "description": "Globally unique name of the Azure SQL logical server."
      }
    },
    "sqlDatabaseName": {
      "type": "string",
      "defaultValue": "appdb",
      "metadata": {
        "description": "Name of the Azure SQL database."
      }
    },
    "sqlAdminLogin": {
      "type": "string",
      "metadata": {
        "description": "Administrator login for the Azure SQL server."
      }
    },
    "sqlAdminPassword": {
      "type": "secureString",
      "metadata": {
        "description": "Administrator password for the Azure SQL server."
      }
    },
    "storageAccountName": {
      "type": "string",
      "defaultValue": "[toLower(concat('st', uniqueString(resourceGroup().id)))]",
      "minLength": 3,
      "maxLength": 24,
      "metadata": {
        "description": "Globally unique name of the Storage Account."
      }
    },
    "appServicePlanSkuName": {
      "type": "string",
      "defaultValue": "B1",
      "allowedValues": [
        "F1",
        "B1",
        "B2",
        "B3",
        "S1",
        "S2",
        "S3",
        "P1v2",
        "P2v2",
        "P3v2"
      ],
      "metadata": {
        "description": "SKU name for the App Service plan."
      }
    },
    "sqlDatabaseSkuName": {
      "type": "string",
      "defaultValue": "Basic",
      "allowedValues": [
        "Basic",
        "S0",
        "S1",
        "S2",
        "P1"
      ],
      "metadata": {
        "description": "SKU name for the Azure SQL database."
      }
    }
  },
  "variables": {
    "appServicePlanTier": "[if(equals(parameters('appServicePlanSkuName'), 'F1'), 'Free', if(or(equals(parameters('appServicePlanSkuName'), 'B1'), equals(parameters('appServicePlanSkuName'), 'B2'), equals(parameters('appServicePlanSkuName'), 'B3')), 'Basic', if(or(equals(parameters('appServicePlanSkuName'), 'S1'), equals(parameters('appServicePlanSkuName'), 'S2'), equals(parameters('appServicePlanSkuName'), 'S3')), 'Standard', 'PremiumV2')))]",
    "sqlDatabaseTier": "[if(equals(parameters('sqlDatabaseSkuName'), 'Basic'), 'Basic', if(or(equals(parameters('sqlDatabaseSkuName'), 'S0'), equals(parameters('sqlDatabaseSkuName'), 'S1'), equals(parameters('sqlDatabaseSkuName'), 'S2')), 'Standard', 'Premium'))]",
    "storageApiVersion": "2023-01-01",
    "sqlApiVersion": "2021-11-01",
    "webApiVersion": "2022-09-01",
    "sqlServerFullyQualifiedDomainName": "[concat(parameters('sqlServerName'), '.database.windows.net')]",
    "sqlConnectionString": "[concat('Server=tcp:', variables('sqlServerFullyQualifiedDomainName'), ',1433;Initial Catalog=', parameters('sqlDatabaseName'), ';Persist Security Info=False;User ID=', parameters('sqlAdminLogin'), ';Password=', parameters('sqlAdminPassword'), ';MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;')]",
    "storageConnectionString": "[concat('DefaultEndpointsProtocol=https;AccountName=', parameters('storageAccountName'), ';AccountKey=', listKeys(resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName')), variables('storageApiVersion')).keys[0].value, ';EndpointSuffix=', environment().suffixes.storage)]"
  },
  "resources": [
    {
      "type": "Microsoft.Storage/storageAccounts",
      "apiVersion": "[variables('storageApiVersion')]",
      "name": "[parameters('storageAccountName')]",
      "location": "[parameters('location')]",
      "sku": {
        "name": "Standard_LRS"
      },
      "kind": "StorageV2",
      "properties": {
        "minimumTlsVersion": "TLS1_2",
        "supportsHttpsTrafficOnly": true,
        "allowBlobPublicAccess": false,
        "accessTier": "Hot"
      }
    },
    {
      "type": "Microsoft.Sql/servers",
      "apiVersion": "[variables('sqlApiVersion')]",
      "name": "[parameters('sqlServerName')]",
      "location": "[parameters('location')]",
      "properties": {
        "administratorLogin": "[parameters('sqlAdminLogin')]",
        "administratorLoginPassword": "[parameters('sqlAdminPassword')]",
        "version": "12.0",
        "publicNetworkAccess": "Enabled",
        "minimalTlsVersion": "1.2"
      }
    },
    {
      "type": "Microsoft.Sql/servers/firewallRules",
      "apiVersion": "[variables('sqlApiVersion')]",
      "name": "[concat(parameters('sqlServerName'), '/AllowAzureServices')]",
      "dependsOn": [
        "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
      ],
      "properties": {
        "startIpAddress": "0.0.0.0",
        "endIpAddress": "0.0.0.0"
      }
    },
    {
      "type": "Microsoft.Sql/servers/databases",
      "apiVersion": "[variables('sqlApiVersion')]",
      "name": "[concat(parameters('sqlServerName'), '/', parameters('sqlDatabaseName'))]",
      "location": "[parameters('location')]",
      "dependsOn": [
        "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
      ],
      "sku": {
        "name": "[parameters('sqlDatabaseSkuName')]",
        "tier": "[variables('sqlDatabaseTier')]"
      },
      "properties": {
        "collation": "SQL_Latin1_General_CP1_CI_AS"
      }
    },
    {
      "type": "Microsoft.Web/serverfarms",
      "apiVersion": "[variables('webApiVersion')]",
      "name": "[parameters('appServicePlanName')]",
      "location": "[parameters('location')]",
      "sku": {
        "name": "[parameters('appServicePlanSkuName')]",
        "tier": "[variables('appServicePlanTier')]",
        "size": "[parameters('appServicePlanSkuName')]",
        "capacity": 1
      },
      "kind": "app",
      "properties": {
        "reserved": false
      }
    },
    {
      "type": "Microsoft.Web/sites",
      "apiVersion": "[variables('webApiVersion')]",
      "name": "[parameters('webAppName')]",
      "location": "[parameters('location')]",
      "dependsOn": [
        "[resourceId('Microsoft.Web/serverfarms', parameters('appServicePlanName'))]"
      ],
      "kind": "app",
      "identity": {
        "type": "SystemAssigned"
      },
      "properties": {
        "serverFarmId": "[resourceId('Microsoft.Web/serverfarms', parameters('appServicePlanName'))]",
        "httpsOnly": true,
        "siteConfig": {
          "minTlsVersion": "1.2",
          "ftpsState": "Disabled",
          "alwaysOn": "[if(or(equals(variables('appServicePlanTier'), 'Basic'), equals(variables('appServicePlanTier'), 'Standard'), equals(variables('appServicePlanTier'), 'PremiumV2')), true, false)]"
        }
      }
    },
    {
      "type": "Microsoft.Web/sites/config",
      "apiVersion": "[variables('webApiVersion')]",
      "name": "[concat(parameters('webAppName'), '/appsettings')]",
      "dependsOn": [
        "[resourceId('Microsoft.Web/sites', parameters('webAppName'))]",
        "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]",
        "[resourceId('Microsoft.Sql/servers/databases', parameters('sqlServerName'), parameters('sqlDatabaseName'))]"
      ],
      "properties": {
        "WEBSITE_RUN_FROM_PACKAGE": "0",
        "ASPNETCORE_ENVIRONMENT": "Production",
        "SQL_SERVER_NAME": "[variables('sqlServerFullyQualifiedDomainName')]",
        "SQL_DATABASE_NAME": "[parameters('sqlDatabaseName')]",
        "SQL_ADMIN_LOGIN": "[parameters('sqlAdminLogin')]",
        "StorageAccountName": "[parameters('storageAccountName')]",
        "StorageConnectionString": "[variables('storageConnectionString')]"
      }
    },
    {
      "type": "Microsoft.Web/sites/config",
      "apiVersion": "[variables('webApiVersion')]",
      "name": "[concat(parameters('webAppName'), '/connectionstrings')]",
      "dependsOn": [
        "[resourceId('Microsoft.Web/sites', parameters('webAppName'))]",
        "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]",
        "[resourceId('Microsoft.Sql/servers/databases', parameters('sqlServerName'), parameters('sqlDatabaseName'))]"
      ],
      "properties": {
        "DefaultConnection": {
          "value": "[variables('sqlConnectionString')]",
          "type": "SQLAzure"
        },
        "StorageConnection": {
          "value": "[variables('storageConnectionString')]",
          "type": "Custom"
        }
      }
    }
  ],
  "outputs": {
    "webAppName": {
      "type": "string",
      "value": "[parameters('webAppName')]"
    },
    "webAppUrl": {
      "type": "string",
      "value": "[concat('https://', reference(resourceId('Microsoft.Web/sites', parameters('webAppName')), variables('webApiVersion')).defaultHostName)]"
    },
    "sqlServerFqdn": {
      "type": "string",
      "value": "[variables('sqlServerFullyQualifiedDomainName')]"
    },
    "sqlDatabaseName": {
      "type": "string",
      "value": "[parameters('sqlDatabaseName')]"
    },
    "storageAccountName": {
      "type": "string",
      "value": "[parameters('storageAccountName')]"
    }
  }
}