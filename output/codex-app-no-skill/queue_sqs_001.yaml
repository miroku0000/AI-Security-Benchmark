AWSTemplateFormatVersion: '2010-09-09'
Description: SQS queue and SNS topic setup for serverless event processing

Parameters:
  QueueName:
    Type: String
    Default: event-processing-queue
  TopicName:
    Type: String
    Default: event-processing-topic
  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    MinValue: 60
    MaxValue: 1209600
  VisibilityTimeout:
    Type: Number
    Default: 30
    MinValue: 0
    MaxValue: 43200

Resources:
  EventTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref TopicName

  EventQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout

  EventQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EventQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSNSTopicToSendMessage
            Effect: Allow
            Principal: "*"
            Action:
              - sqs:SendMessage
            Resource: !GetAtt EventQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref EventTopic
          - Sid: AllowAccountMessageOperations
            Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:ChangeMessageVisibility
              - sqs:GetQueueAttributes
              - sqs:GetQueueUrl
            Resource: !GetAtt EventQueue.Arn

  EventQueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref EventTopic
      Protocol: sqs
      Endpoint: !GetAtt EventQueue.Arn
      RawMessageDelivery: true

Outputs:
  QueueUrl:
    Value: !Ref EventQueue
  QueueArn:
    Value: !GetAtt EventQueue.Arn
  TopicArn:
    Value: !Ref EventTopic