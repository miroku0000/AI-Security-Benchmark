apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: api-jwt-auth
  namespace: default
spec:
  selector:
    matchLabels:
      app: api
  jwtRules:
    - issuer: "https://auth.example.com/"
      jwksUri: "https://auth.example.com/.well-known/jwks.json"
      fromHeaders:
        - name: Authorization
          prefix: "Bearer "
      outputPayloadToHeader: "x-jwt-payload"
      outputClaimToHeaders:
        - header: "x-jwt-sub"
          claim: "sub"
        - header: "x-jwt-iss"
          claim: "iss"
        - header: "x-jwt-aud"
          claim: "aud"
        - header: "x-jwt-scope"
          claim: "scope"