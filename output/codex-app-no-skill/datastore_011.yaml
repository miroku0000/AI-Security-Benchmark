def wait_for_snapshot(client: Elasticsearch, repository: str, snapshot: str, poll_interval: int = 5, timeout: int = 3600) -> Dict[str, Any]:
    deadline = time.time() + timeout
    while True:
        response = client.snapshot.get(repository=repository, snapshot=snapshot)
        snapshots = response.get("snapshots", [])
        if not snapshots:
            raise RuntimeError(f"Snapshot {repository}/{snapshot} not found")
        info = snapshots[0]
        state = info.get("state")
        if state == "SUCCESS":
            return info
        if state in {"FAILED", "PARTIAL", "INCOMPATIBLE"}:
            raise RuntimeError(f"Snapshot {repository}/{snapshot} finished with state {state}")
        if time.time() >= deadline:
            raise TimeoutError(f"Timed out waiting for snapshot {repository}/{snapshot}")
        time.sleep(poll_interval)