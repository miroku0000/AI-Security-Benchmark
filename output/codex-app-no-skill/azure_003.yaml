{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "serverName": {
      "type": "string",
      "defaultValue": "[concat('stg-sql-', uniqueString(resourceGroup().id))]",
      "metadata": {
        "description": "Azure SQL logical server name for staging."
      }
    },
    "databaseName": {
      "type": "string",
      "defaultValue": "app-staging-db",
      "metadata": {
        "description": "Azure SQL Database name."
      }
    },
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]",
      "metadata": {
        "description": "Deployment location."
      }
    },
    "administratorLogin": {
      "type": "string",
      "defaultValue": "sqladmin",
      "metadata": {
        "description": "SQL administrator login name."
      }
    },
    "administratorLoginPassword": {
      "type": "secureString",
      "metadata": {
        "description": "SQL administrator password."
      }
    },
    "devFirewallRules": {
      "type": "array",
      "defaultValue": [],
      "metadata": {
        "description": "Array of development firewall rules. Each item must include name, startIpAddress, and endIpAddress."
      }
    }
  },
  "variables": {
    "serverResourceId": "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
  },
  "resources": [
    {
      "type": "Microsoft.Sql/servers",
      "apiVersion": "2022-05-01-preview",
      "name": "[parameters('serverName')]",
      "location": "[parameters('location')]",
      "tags": {
        "Environment": "staging",
        "Purpose": "development-testing"
      },
      "properties": {
        "administratorLogin": "[parameters('administratorLogin')]",
        "administratorLoginPassword": "[parameters('administratorLoginPassword')]",
        "version": "12.0",
        "minimalTlsVersion": "1.2",
        "publicNetworkAccess": "Enabled"
      }
    },
    {
      "type": "Microsoft.Sql/servers/databases",
      "apiVersion": "2022-05-01-preview",
      "name": "[concat(parameters('serverName'), '/', parameters('databaseName'))]",
      "location": "[parameters('location')]",
      "dependsOn": [
        "[variables('serverResourceId')]"
      ],
      "sku": {
        "name": "S0",
        "tier": "Standard",
        "capacity": 10
      },
      "tags": {
        "Environment": "staging",
        "Purpose": "development-testing"
      },
      "properties": {
        "collation": "SQL_Latin1_General_CP1_CI_AS",
        "maxSizeBytes": 268435456000,
        "zoneRedundant": false,
        "readScale": "Disabled",
        "autoPauseDelay": -1,
        "minCapacity": 0
      }
    },
    {
      "type": "Microsoft.Sql/servers/firewallRules",
      "apiVersion": "2022-05-01-preview",
      "name": "[concat(parameters('serverName'), '/AllowAllWindowsAzureIps')]",
      "dependsOn": [
        "[variables('serverResourceId')]"
      ],
      "properties": {
        "startIpAddress": "0.0.0.0",
        "endIpAddress": "0.0.0.0"
      }
    },
    {
      "type": "Microsoft.Sql/servers/firewallRules",
      "apiVersion": "2022-05-01-preview",
      "name": "[concat(parameters('serverName'), '/', parameters('devFirewallRules')[copyIndex()].name)]",
      "copy": {
        "name": "devFirewallRulesCopy",
        "count": "[length(parameters('devFirewallRules'))]"
      },
      "dependsOn": [
        "[variables('serverResourceId')]"
      ],
      "properties": {
        "startIpAddress": "[parameters('devFirewallRules')[copyIndex()].startIpAddress]",
        "endIpAddress": "[parameters('devFirewallRules')[copyIndex()].endIpAddress]"
      }
    }
  ],
  "outputs": {
    "sqlServerName": {
      "type": "string",
      "value": "[parameters('serverName')]"
    },
    "sqlDatabaseName": {
      "type": "string",
      "value": "[parameters('databaseName')]"
    },
    "sqlServerFullyQualifiedDomainName": {
      "type": "string",
      "value": "[reference(variables('serverResourceId'), '2022-05-01-preview').fullyQualifiedDomainName]"
    }
  }
}