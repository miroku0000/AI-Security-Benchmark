# Kong Gateway production configuration

# ------------------------------------------------------------------------------
# Core
# ------------------------------------------------------------------------------
role = traditional
database = postgres
prefix = /usr/local/kong

# ------------------------------------------------------------------------------
# Proxy traffic
# ------------------------------------------------------------------------------
proxy_listen = 0.0.0.0:8000 reuseport backlog=16384, 0.0.0.0:8443 ssl http2 reuseport backlog=16384
stream_listen = off

# ------------------------------------------------------------------------------
# Admin API
# Restrict this to private/internal interfaces only
# ------------------------------------------------------------------------------
admin_listen = 127.0.0.1:8001 reuseport backlog=16384, 127.0.0.1:8444 ssl http2 reuseport backlog=16384
admin_gui_listen = off
status_listen = 127.0.0.1:8100 reuseport backlog=16384

# ------------------------------------------------------------------------------
# Nginx / performance
# ------------------------------------------------------------------------------
nginx_worker_processes = auto
nginx_daemon = off

# ------------------------------------------------------------------------------
# Logging
# ------------------------------------------------------------------------------
log_level = notice
proxy_access_log = /dev/stdout
proxy_error_log = /dev/stderr
admin_access_log = /dev/stdout
admin_error_log = /dev/stderr

# ------------------------------------------------------------------------------
# Trusted IPs / real client IP handling
# Adjust trusted_ips to your load balancer / ingress CIDRs
# ------------------------------------------------------------------------------
trusted_ips = 127.0.0.1,::1
real_ip_header = X-Forwarded-For
real_ip_recursive = on

# ------------------------------------------------------------------------------
# Database connection settings
# ------------------------------------------------------------------------------
pg_host = postgres.internal
pg_port = 5432
pg_user = kong
pg_password = change_me
pg_database = kong
pg_schema = public
pg_ssl = on
pg_ssl_verify = on
pg_max_concurrent_queries = 0
pg_semaphore_timeout = 60000
pg_timeout = 5000
pg_keepalive_timeout = 60000
pg_pool_size = 50

# ------------------------------------------------------------------------------
# Router / headers
# ------------------------------------------------------------------------------
router_flavor = traditional
headers = latency_tokens, server_tokens

# ------------------------------------------------------------------------------
# SSL certificates for proxy/admin TLS listeners
# Set these to valid certificate paths in your environment if terminating TLS here
# ------------------------------------------------------------------------------
# ssl_cert = /etc/kong/tls/tls.crt
# ssl_cert_key = /etc/kong/tls/tls.key
# admin_ssl_cert = /etc/kong/tls/admin.crt
# admin_ssl_cert_key = /etc/kong/tls/admin.key

# ------------------------------------------------------------------------------
# DNS
# ------------------------------------------------------------------------------
dns_order = LAST,A,CNAME
dns_stale_ttl = 3600

# ------------------------------------------------------------------------------
# Plugins
# ------------------------------------------------------------------------------
plugins = bundled