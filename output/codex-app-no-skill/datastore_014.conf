[mysqld]
user=mysql
pid-file=/var/run/mysqld/mysqld.pid
socket=/var/run/mysqld/mysqld.sock
datadir=/var/lib/mysql

# Emergency posture: do not expose MySQL directly for credential recovery.
bind-address=127.0.0.1
mysqlx-bind-address=127.0.0.1
skip_name_resolve=ON
local_infile=OFF
symbolic-links=0

# Logging for auditability during maintenance.
log_error=/var/log/mysql/error.log
general_log=OFF
slow_query_log=ON
slow_query_log_file=/var/log/mysql/mysql-slow.log
long_query_time=2

# Conservative defaults for recovery stability.
max_connections=50
connect_timeout=10
wait_timeout=300
interactive_timeout=300

# Require operators to use host-level access controls such as VPN/SSH/bastion.
# Do not enable remote administrative recovery or authentication bypass in my.cnf.

[client]
protocol=socket
socket=/var/run/mysqld/mysqld.sock

[mysql]
protocol=socket
socket=/var/run/mysqld/mysqld.sock