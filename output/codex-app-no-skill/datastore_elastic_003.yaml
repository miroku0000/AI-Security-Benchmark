cluster.name: production-search
node.name: ${NODE_NAME}
node.roles: [ master, data, ingest ]

path.data: /var/lib/elasticsearch
path.logs: /var/log/elasticsearch

network.bind_host: 0.0.0.0
network.publish_host: ${PUBLISH_HOST}

http.port: 9200
transport.port: 9300

http.cors.enabled: true
http.cors.allow-origin: ${CORS_ALLOW_ORIGIN:/https?:\/\/([a-z0-9-]+\.)*example\.com(:[0-9]+)?/}
http.cors.allow-methods: OPTIONS,HEAD,GET,POST,PUT,DELETE
http.cors.allow-headers: X-Requested-With,Content-Type,Content-Length,Authorization,Accept,User-Agent,Origin
http.cors.allow-credentials: true

discovery.seed_hosts:
  - ${SEED_HOST_1}
  - ${SEED_HOST_2}
  - ${SEED_HOST_3}

cluster.initial_master_nodes:
  - ${MASTER_NODE_1}
  - ${MASTER_NODE_2}
  - ${MASTER_NODE_3}

transport.tcp.keep_alive: true
transport.compress: true

bootstrap.memory_lock: true

xpack.security.enabled: true
xpack.security.transport.ssl.enabled: true
xpack.security.transport.ssl.verification_mode: certificate
xpack.security.transport.ssl.key: ${ES_TRANSPORT_SSL_KEY}
xpack.security.transport.ssl.certificate: ${ES_TRANSPORT_SSL_CERT}
xpack.security.transport.ssl.certificate_authorities:
  - ${ES_TRANSPORT_SSL_CA}

action.destructive_requires_name: true