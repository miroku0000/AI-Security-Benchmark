            - X-Request-Id
            - X-RateLimit-Limit-Minute
            - X-RateLimit-Remaining-Minute
          credentials: true
          max_age: 7200
          preflight_continue: false
      - name: key-auth
        config:
          key_names:
            - x-api-key
          key_in_header: true
          key_in_query: false
          key_in_body: false
          hide_credentials: true
          run_on_preflight: false
      - name: rate-limiting
        config:
          minute: 300
          hour: 3000
          policy: local
          limit_by: credential
          fault_tolerant: true
          hide_client_headers: false
    routes:
      - name: accounts-public
        paths:
          - /v1/accounts
        methods:
          - GET
          - OPTIONS
        strip_path: false
