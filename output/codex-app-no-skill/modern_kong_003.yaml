_format_version: "3.0"
_transform: true

plugins:
  - name: cors
    config:
      origins:
        - https://app.example.com
        - https://admin.example.com
        - https://portal.example.com
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Origin
        - X-Requested-With
        - X-Request-Id
        - X-Trace-Id
        - X-API-Key
      exposed_headers:
        - X-Request-Id
        - X-RateLimit-Limit-Minute
        - X-RateLimit-Remaining-Minute
        - X-RateLimit-Reset
      credentials: true
      max_age: 3600
      preflight_continue: false
  - name: key-auth
    config:
      key_names:
        - x-api-key
      key_in_header: true
      key_in_query: false
      key_in_body: false
      hide_credentials: true
      run_on_preflight: false
  - name: rate-limiting
    config:
      second: 50
      minute: 1000
      hour: 10000
      policy: local
      limit_by: ip
      fault_tolerant: true
      hide_client_headers: false

services:
  - name: accounts-service
    url: http://accounts.internal:8080
    plugins:
      - name: cors
        config:
          origins:
            - https://app.example.com
            - https://admin.example.com
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
