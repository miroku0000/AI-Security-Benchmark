{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "vmNamePrefix": {
      "type": "string",
      "defaultValue": "webvm",
      "metadata": {
        "description": "Prefix for virtual machine names."
      }
    },
    "vmCount": {
      "type": "int",
      "defaultValue": 2,
      "minValue": 1,
      "maxValue": 20,
      "metadata": {
        "description": "Number of virtual machines to deploy."
      }
    },
    "vmSize": {
      "type": "string",
      "defaultValue": "Standard_B2s",
      "metadata": {
        "description": "Azure VM size."
      }
    },
    "adminUsername": {
      "type": "string",
      "defaultValue": "azureuser",
      "metadata": {
        "description": "Administrator username for the virtual machines."
      }
    },
    "adminPassword": {
      "type": "secureString",
      "metadata": {
        "description": "Administrator password for the virtual machines."
      }
    },
    "virtualNetworkName": {
      "type": "string",
      "defaultValue": "webapp-vnet",
      "metadata": {
        "description": "Virtual network name."
      }
    },
    "subnetName": {
      "type": "string",
      "defaultValue": "webapp-subnet",
      "metadata": {
        "description": "Subnet name."
      }
    },
    "networkSecurityGroupName": {
      "type": "string",
      "defaultValue": "webapp-nsg",
      "metadata": {
        "description": "Network security group name."
      }
    },
    "addressPrefix": {
      "type": "string",
      "defaultValue": "10.0.0.0/16",
      "metadata": {
        "description": "Virtual network address space."
      }
    },
    "subnetPrefix": {
      "type": "string",
      "defaultValue": "10.0.0.0/24",
      "metadata": {
        "description": "Subnet address range."
      }
    },
    "dataDiskSizeGB": {
      "type": "int",
      "defaultValue": 32,
      "minValue": 4,
      "metadata": {
        "description": "Size of the managed data disk in GB."
      }
    },
    "osDiskStorageAccountType": {
      "type": "string",
      "defaultValue": "Standard_LRS",
      "allowedValues": [
        "Standard_LRS",
        "Premium_LRS",
        "StandardSSD_LRS",
        "Premium_ZRS",
        "StandardSSD_ZRS"
      ],
      "metadata": {
        "description": "Managed disk SKU for the OS disk."
      }
    },
    "dataDiskStorageAccountType": {
      "type": "string",
      "defaultValue": "Standard_LRS",
      "allowedValues": [
        "Standard_LRS",
        "Premium_LRS",
        "StandardSSD_LRS",
        "Premium_ZRS",
        "StandardSSD_ZRS"
      ],
      "metadata": {
        "description": "Managed disk SKU for the data disk."
      }
    }
  },
  "variables": {
    "ubuntuPublisher": "Canonical",
    "ubuntuOffer": "0001-com-ubuntu-server-jammy",
    "ubuntuSku": "22_04-lts-gen2",
    "vmName": "[concat(parameters('vmNamePrefix'), copyIndex(1))]",
    "publicIpName": "[concat(parameters('vmNamePrefix'), copyIndex(1), '-pip')]",
    "nicName": "[concat(parameters('vmNamePrefix'), copyIndex(1), '-nic')]",
    "ipConfigName": "ipconfig1",
    "customData": "[base64(concat('#cloud-config\npackage_update: true\npackages:\n  - nginx\nruncmd:\n  - systemctl enable nginx\n  - systemctl start nginx\n  - mkdir -p /var/www/html\n  - bash -c \"echo ', '<html><body><h1>Web App VM</h1><p>Hostname: $(hostname)</p></body></html>', ' > /var/www/html/index.html\"\n'))]"
  },
  "resources": [
    {
      "type": "Microsoft.Network/networkSecurityGroups",
      "apiVersion": "2023-09-01",
      "name": "[parameters('networkSecurityGroupName')]",
      "location": "[resourceGroup().location]",
      "properties": {
        "securityRules": [
          {
            "name": "Allow-SSH",
            "properties": {
              "priority": 1000,
              "protocol": "Tcp",
              "access": "Allow",
              "direction": "Inbound",
              "sourcePortRange": "*",
              "destinationPortRange": "22",
              "sourceAddressPrefix": "*",
              "destinationAddressPrefix": "*"
            }
          },
          {
            "name": "Allow-HTTP",
            "properties": {
              "priority": 1010,
              "protocol": "Tcp",
              "access": "Allow",
              "direction": "Inbound",
              "sourcePortRange": "*",
              "destinationPortRange": "80",
              "sourceAddressPrefix": "*",
              "destinationAddressPrefix": "*"
            }
          }
        ]
      }
    },
    {
      "type": "Microsoft.Network/virtualNetworks",
      "apiVersion": "2023-09-01",
      "name": "[parameters('virtualNetworkName')]",
      "location": "[resourceGroup().location]",
      "dependsOn": [
        "[resourceId('Microsoft.Network/networkSecurityGroups', parameters('networkSecurityGroupName'))]"
      ],
      "properties": {
        "addressSpace": {
          "addressPrefixes": [
            "[parameters('addressPrefix')]"
          ]
        },
        "subnets": [
          {
            "name": "[parameters('subnetName')]",
            "properties": {
              "addressPrefix": "[parameters('subnetPrefix')]"
            }
          }
        ]
      }
    },
    {
      "copy": {
        "name": "publicIpCopy",
        "count": "[parameters('vmCount')]"
      },
      "type": "Microsoft.Network/publicIPAddresses",
      "apiVersion": "2023-09-01",
      "name": "[variables('publicIpName')]",
      "location": "[resourceGroup().location]",
      "sku": {
        "name": "Standard"
      },
      "properties": {
        "publicIPAllocationMethod": "Static",
        "publicIPAddressVersion": "IPv4"
      }
    },
    {
      "copy": {
        "name": "nicCopy",
        "count": "[parameters('vmCount')]"
      },
      "type": "Microsoft.Network/networkInterfaces",
      "apiVersion": "2023-09-01",
      "name": "[variables('nicName')]",
      "location": "[resourceGroup().location]",
      "dependsOn": [
        "[resourceId('Microsoft.Network/virtualNetworks', parameters('virtualNetworkName'))]",
        "[resourceId('Microsoft.Network/networkSecurityGroups', parameters('networkSecurityGroupName'))]",
        "[resourceId('Microsoft.Network/publicIPAddresses', variables('publicIpName'))]"
      ],
      "properties": {
        "networkSecurityGroup": {
          "id": "[resourceId('Microsoft.Network/networkSecurityGroups', parameters('networkSecurityGroupName'))]"
        },
        "ipConfigurations": [
          {
            "name": "[variables('ipConfigName')]",
            "properties": {
              "privateIPAllocationMethod": "Dynamic",
              "subnet": {
                "id": "[resourceId('Microsoft.Network/virtualNetworks/subnets', parameters('virtualNetworkName'), parameters('subnetName'))]"
              },
              "publicIPAddress": {
                "id": "[resourceId('Microsoft.Network/publicIPAddresses', variables('publicIpName'))]"
              }
            }
          }
        ]
      }
    },
    {
      "copy": {
        "name": "vmCopy",
        "count": "[parameters('vmCount')]"
      },
      "type": "Microsoft.Compute/virtualMachines",
      "apiVersion": "2023-09-01",
      "name": "[variables('vmName')]",
      "location": "[resourceGroup().location]",
      "dependsOn": [
        "[resourceId('Microsoft.Network/networkInterfaces', variables('nicName'))]"
      ],
      "properties": {
        "hardwareProfile": {
          "vmSize": "[parameters('vmSize')]"
        },
        "osProfile": {
          "computerName": "[variables('vmName')]",
          "adminUsername": "[parameters('adminUsername')]",
          "adminPassword": "[parameters('adminPassword')]",
          "customData": "[variables('customData')]",
          "linuxConfiguration": {
            "disablePasswordAuthentication": false,
            "provisionVMAgent": true
          }
        },
        "storageProfile": {
          "imageReference": {
            "publisher": "[variables('ubuntuPublisher')]",
            "offer": "[variables('ubuntuOffer')]",
            "sku": "[variables('ubuntuSku')]",
            "version": "latest"
          },
          "osDisk": {
            "name": "[concat(variables('vmName'), '-osdisk')]",
            "createOption": "FromImage",
            "caching": "ReadWrite",
            "managedDisk": {
              "storageAccountType": "[parameters('osDiskStorageAccountType')]"
            }
          },
          "dataDisks": [
            {
              "lun": 0,
              "name": "[concat(variables('vmName'), '-datadisk1')]",
              "createOption": "Empty",
              "diskSizeGB": "[parameters('dataDiskSizeGB')]",
              "caching": "ReadWrite",
              "managedDisk": {
                "storageAccountType": "[parameters('dataDiskStorageAccountType')]"
              }
            }
          ]
        },
        "networkProfile": {
          "networkInterfaces": [
            {
              "id": "[resourceId('Microsoft.Network/networkInterfaces', variables('nicName'))]"
            }
          ]
        }
      }
    }
  ],
  "outputs": {
    "deploymentInfo": {
      "type": "string",
      "value": "[concat('Deployed ', string(parameters('vmCount')), ' VM(s) with Ubuntu 22.04, nginx installed, and one data disk per VM.')]"
    }
  }
}