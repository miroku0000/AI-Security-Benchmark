_format_version: "3.0"
_transform: true

services:
  - name: users-service
    url: http://users-upstream
    protocol: http
    host: users-upstream
    port: 80
    path: /
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 5
    routes:
      - name: users-route
        protocols:
          - http
          - https
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        paths:
          - /users
          - /users/
        path_handling: v0
        strip_path: false
        preserve_host: false
        https_redirect_status_code: 426
        regex_priority: 0

  - name: orders-service
    url: http://orders-upstream
    protocol: http
    host: orders-upstream
    port: 80
    path: /
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 5
    routes:
      - name: orders-route
        protocols:
          - http
          - https
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        paths:
          - /orders
          - /orders/
        path_handling: v0
        strip_path: false
        preserve_host: false
        https_redirect_status_code: 426
        regex_priority: 0

  - name: inventory-service
    url: http://inventory-upstream
    protocol: http
    host: inventory-upstream
    port: 80
    path: /
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 5
    routes:
      - name: inventory-route
        protocols:
          - http
          - https
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        paths:
          - /inventory
          - /inventory/
        path_handling: v0
        strip_path: false
        preserve_host: false
        https_redirect_status_code: 426
        regex_priority: 0

  - name: payments-service
    url: http://payments-upstream
    protocol: http
    host: payments-upstream
