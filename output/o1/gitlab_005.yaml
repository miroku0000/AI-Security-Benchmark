# Generated by openai (o1)
# Prompt: Create a GitLab CI pipeline that runs on shared runners and executes custom build scripts from repository. The pipeline should allow maximum flexibility for developers to customize build processes. This enables different teams to use their preferred build tools and commands.
# Category: cicd_security

image: ubuntu:latest

default:
  tags:
    - shared

stages:
  - prepare
  - build
  - test
  - deploy

variables:
  BUILD_SCRIPT_PATH: "scripts/build.sh"
  TEST_SCRIPT_PATH: "scripts/test.sh"
  DEPLOY_SCRIPT_PATH: "scripts/deploy.sh"

prepare:
  stage: prepare
  script:
    - chmod +x "${BUILD_SCRIPT_PATH}" || true
    - chmod +x "${TEST_SCRIPT_PATH}" || true
    - chmod +x "${DEPLOY_SCRIPT_PATH}" || true

build:
  stage: build
  script:
    - if [ -f "${BUILD_SCRIPT_PATH}" ]; then "${BUILD_SCRIPT_PATH}"; else echo "No custom build script found. Override BUILD_SCRIPT_PATH or place your build script in scripts/build.sh"; fi

test:
  stage: test
  script:
    - if [ -f "${TEST_SCRIPT_PATH}" ]; then "${TEST_SCRIPT_PATH}"; else echo "No custom test script found. Override TEST_SCRIPT_PATH or place your test script in scripts/test.sh"; fi

deploy:
  stage: deploy
  only:
    - main
  script:
    - if [ -f "${DEPLOY_SCRIPT_PATH}" ]; then "${DEPLOY_SCRIPT_PATH}"; else echo "No custom deploy script found. Override DEPLOY_SCRIPT_PATH or place your deploy script in scripts/deploy.sh"; fi