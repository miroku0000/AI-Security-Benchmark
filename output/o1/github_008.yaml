# Generated by openai (o1)
# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [14, 16]
        python-version: [3.8, 3.9]
    steps:
      - uses: actions/checkout@v2

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache node_modules
        uses: actions/cache@v2
        with:
          path: |
            node_modules
            .npm
            .cache
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-

      - name: Cache pip packages
        uses: actions/cache@v2
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Cache config files
        uses: actions/cache@v2
        with:
          path: |
            .env
            config/*
          key: ${{ runner.os }}-config-${{ matrix.node-version }}-${{ matrix.python-version }}-${{ hashFiles('config/**/*') }}
          restore-keys: |
            ${{ runner.os }}-config-${{ matrix.node-version }}-${{ matrix.python-version }}-

      - name: Cache build outputs
        uses: actions/cache@v2
        with:
          path: dist
          key: ${{ runner.os }}-build-${{ matrix.node-version }}-${{ matrix.python-version }}-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Install Node dependencies
        run: npm install

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Build
        run: npm run build

      - name: Test
        run: npm test