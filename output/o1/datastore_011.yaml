# Generated by openai (o1)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

---
- name: Configure Elasticsearch snapshot repository and automate backups
  hosts: elasticsearch
  vars:
    snapshot_repo_name: "backup_repository"
    snapshot_type: "s3"  # use "fs" for file system repository
    s3_settings:
      bucket: "my-es-backups"
      base_path: "snapshots"
      region: "us-east-1"
      access_key: "AWS_ACCESS_KEY"
      secret_key: "AWS_SECRET_KEY"
    fs_settings:
      location: "/mount/backups/elasticsearch"
    snapshot_name: "snapshot_{{ ansible_date_time.epoch }}"

  tasks:

    - name: Register snapshot repository (S3)
      uri:
        url: "http://localhost:9200/_snapshot/{{ snapshot_repo_name }}"
        method: PUT
        body: >
          {
            "type": "s3",
            "settings": {
              "bucket": "{{ s3_settings.bucket }}",
              "base_path": "{{ s3_settings.base_path }}",
              "region": "{{ s3_settings.region }}",
              "access_key": "{{ s3_settings.access_key }}",
              "secret_key": "{{ s3_settings.secret_key }}"
            }
          }
        body_format: json
        status_code: 200
      when: snapshot_type == "s3"

    - name: Register snapshot repository (File System)
      uri:
        url: "http://localhost:9200/_snapshot/{{ snapshot_repo_name }}"
        method: PUT
        body: >
          {
            "type": "fs",
            "settings": {
              "location": "{{ fs_settings.location }}"
            }
          }
        body_format: json
        status_code: 200
      when: snapshot_type == "fs"

    - name: Create snapshot
      uri:
        url: "http://localhost:9200/_snapshot/{{ snapshot_repo_name }}/{{ snapshot_name }}?wait_for_completion=true"
        method: PUT
        body: >
          {
            "indices": "*",
            "ignore_unavailable": true,
            "include_global_state": true
          }
        body_format: json
        status_code: 200

    - name: Restore snapshot (example restore)
      uri:
        url: "http://localhost:9200/_snapshot/{{ snapshot_repo_name }}/{{ snapshot_name }}/_restore"
        method: POST
        body: >
          {
            "indices": "*",
            "include_global_state": true,
            "rename_pattern": "(.+)",
            "rename_replacement": "restored_$1"
          }
        body_format: json
        status_code: 200

    - name: Schedule daily snapshot (cron)
      cron:
        name: "Daily Elasticsearch Snapshot"
        minute: "0"
        hour: "1"
        job: "ansible-playbook /path/to/this_playbook.yml"