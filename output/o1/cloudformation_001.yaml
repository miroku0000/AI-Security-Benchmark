AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an S3 bucket for storing static application assets
Resources:
  S3AssetBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: PublicRead
  S3AssetBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3AssetBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadForObjects
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${S3AssetBucket.Arn}/*"