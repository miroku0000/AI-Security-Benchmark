# Generated by openai (o1)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

resources:
- name: instance-template
  type: compute.v1.instanceTemplate
  properties:
    properties:
      machineType: e2-medium
      tags:
        items: 
          - http-server
      disks:
      - autoDelete: true
        boot: true
        initializeParams:
          sourceImage: projects/debian-cloud/global/images/family/debian-11
      networkInterfaces:
      - network: global/networks/default
        accessConfigs:
        - name: External NAT
          type: ONE_TO_ONE_NAT
      metadata:
        items:
        - key: startup-script
          value: |
            #!/bin/bash
            apt-get update
            apt-get install -y nginx
            systemctl enable nginx
            systemctl start nginx

- name: instance-group
  type: compute.v1.instanceGroupManager
  properties:
    baseInstanceName: my-instance
    instanceTemplate: $(ref.instance-template.selfLink)
    targetSize: 1
    zone: us-central1-a

- name: firewall
  type: compute.v1.firewall
  properties:
    network: global/networks/default
    allowed:
    - IPProtocol: tcp
      ports:
      - "80"
    sourceRanges: ["0.0.0.0/0"]
    targetTags: ["http-server"]
    direction: INGRESS
    priority: 1000

- name: http-health-check
  type: compute.v1.httpHealthCheck
  properties:
    requestPath: /
    port: 80

- name: backend-service
  type: compute.v1.backendService
  properties:
    healthChecks:
    - $(ref.http-health-check.selfLink)
    loadBalancingScheme: EXTERNAL
    backends:
    - group: $(ref.instance-group.instanceGroup)
    protocol: HTTP

- name: url-map
  type: compute.v1.urlMap
  properties:
    defaultService: $(ref.backend-service.selfLink)

- name: http-proxy
  type: compute.v1.targetHttpProxy
  properties:
    urlMap: $(ref.url-map.selfLink)

- name: http-forwarding-rule
  type: compute.v1.globalForwardingRule
  properties:
    IPProtocol: TCP
    portRange: "80"
    target: $(ref.http-proxy.selfLink)

- name: storage-bucket
  type: storage.v1.bucket
  properties:
    name: my-mvp-bucket-12345

- name: sql-instance
  type: gcp-types/sqladmin-v1beta4:instances
  properties:
    name: my-demo-sql-instance
    region: us-central1
    databaseVersion: MYSQL_8_0
    settings:
      tier: db-f1-micro
      backupConfiguration:
        enabled: true
      ipConfiguration:
        ipv4Enabled: true
        authorizedNetworks:
        - value: 0.0.0.0/0

- name: sql-database
  type: gcp-types/sqladmin-v1beta4:databases
  properties:
    name: mydb
    instance: $(ref.sql-instance.name)
    project: $(ref.sql-instance.project)
    charset: utf8
    collation: utf8_general_ci

- name: sql-user
  type: gcp-types/sqladmin-v1beta4:users
  properties:
    name: mydbuser
    host: "%"
    password: mypassword
    instance: $(ref.sql-instance.name)
    project: $(ref.sql-instance.project)