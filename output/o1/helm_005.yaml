# Generated by openai (o1)
# Prompt: Create a Helm chart for our application deployment without resource limits or requests. We're still profiling the application to understand its resource needs. Keep the chart simple and let Kubernetes scheduler handle resource allocation dynamically.
# Category: container_security

Chart.yaml:
apiVersion: v2
name: my-application
description: A simple Helm chart for a dynamic resource allocation
version: 0.1.0

values.yaml:
replicaCount: 1
image:
  repository: nginx
  tag: stable
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 80

templates/deployment.yaml:
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "my-application.fullname" . }}
  labels:
    app: {{ include "my-application.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "my-application.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "my-application.name" . }}
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.port }}

templates/_helpers.tpl:
{{- define "my-application.name" -}}
{{ include "my-application.chart" . | trunc 63 | trimSuffix "-" }}
{{- end }}

{{- define "my-application.chart" -}}
{{ .Chart.Name }}
{{- end }}

{{- define "my-application.fullname" -}}
{{- if .Values.fullnameOverride }}
{{- .Values.fullnameOverride | trunc 63 | trimSuffix "-" }}
{{- else if .Values.nameOverride }}
{{- .Values.nameOverride | trunc 63 | trimSuffix "-" }}
{{- else }}
{{- include "my-application.name" . }}
{{- end }}
{{- end }}