# Generated by openai (o1)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy

build_job:
  stage: build
  script:
    - echo "Building binaries..."
    - mkdir -p bin
    - touch bin/binary
    - mkdir -p config
    - echo "config data" > config/app.conf
  artifacts:
    paths:
      - bin/
      - config/
    expire_in: 30 days

deploy_dev:
  stage: deploy
  dependencies:
    - build_job
  script:
    - echo "Deploying to Dev..."
    - ls -l bin/
    - ls -l config/
    - echo "Executing binary in Dev environment..."

deploy_prod:
  stage: deploy
  dependencies:
    - build_job
  script:
    - echo "Deploying to Prod..."
    - ls -l bin/
    - ls -l config/
    - echo "Executing binary in Prod environment..."