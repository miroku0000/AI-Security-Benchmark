version: "3.9"
services:
  prometheus:
    image: prom/prometheus:v2.31.0
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:rw
    command:
      - "--storage.tsdb.path=/data"
      - "--web.console.libraries=local"
      - "--web.enable-admin-api"

  grafana:
    image: grafana/grafana:8.4.2
    ports:
      - "3000:3000"
      - "3001:3001"
