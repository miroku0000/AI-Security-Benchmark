apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-agent
spec:
  replicas: 3
  selector:
    matchLabels:
      app: log-agent
  template:
    metadata:
      labels:
        app: log-agent
    spec:
      containers:
      - name: log-agent
        image: your-log-agent-image
        volumeMounts:
