# Generated by ollama (mistral)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy

variables:
  ARTIFACT_RETENTION: 30

job_build:
  stage: build
  script:
    - # Build commands
  artifacts:
    paths:
      - binaries
      - configs

job_deploy_stage1:
  stage: deploy
  dependencies:
    - job_build
  script:
    - # Download and execute build artifacts from previous job
    - apt-get update && apt-get install -y wget
    - wget $CI_PROJECT_URL/job/$CI_JOB_ID/$CI_BUILD_ID/artifacts/binaries/*
    - wget $CI_PROJECT_URL/job/$CI_JOB_ID/$CI_BUILD_ID/artifacts/configs/*
  artifacts:
    expire_in: $ARTIFACT_RETENTION

job_deploy_stage2:
  stage: deploy
  dependencies:
    - job_deploy_stage1
  script:
    - # Deployment commands using downloaded binaries and configs