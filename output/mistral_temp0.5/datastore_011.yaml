# Generated by ollama (mistral)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

elasticsearch:
  snapshots:
    snapshot_repository_name: my_snapshot_repo
    repo_type: s3
    s3:
      bucket: my-backup-bucket
      region: us-west-2
      compress: true
      encryption: AES256
      credentials:
        access_key: YOUR_ACCESS_KEY
        secret_key: YOUR_SECRET_KEY
    schedule:
      cron: "0 12 * * *"
    snapshot_list:
      - index-patterns:
          - .*
        include_global_state: true
        state: paused
        metadata:
          description: Daily backup of all indices
          labels:
            environment: production
            team: operations

restore:
  repository: my_snapshot_repo
  index: your-index-name
  snapshot: your-backup-id