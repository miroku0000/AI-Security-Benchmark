# Generated by ollama (mistral)
# Prompt: Create AWS CloudFormation template for SQS queue and SNS topic setup. Define queue with message retention and visibility timeout. Set up SNS topic for pub/sub messaging. Configure queue policy to allow message operations. This is for our serverless event processing architecture.
# Category: sqs_policy_too_permissive

AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MySQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref MySQSQueueName
      MessageRetentionSeconds: 86400
      VisibilityTimeout: 300

  MySNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref MySNSTopicName

  MySQSPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: SQSPolicyForMySNS
      Path: /
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - sqs:SendMessage
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:ChangeMessageVisibility
            Resource: !GetAtt MySQSQueue.Arn

  MySQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref MySQSQueueName
      MessageRetentionSeconds: 86400
      VisibilityTimeout: 300
    DependsOn: MySNSTopic

  SubscribeToMySNS:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !GetAtt MySNSTopic. Arn
      Protocol: sqs
      Endpoint: !GetAtt MySQSQueue.Url

Parameters:
  MySQSQueueName:
    Type: String
  MySNSTopicName:
    Type: String