# Generated by ollama (mistral)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - build
  - deploy

variables:
  GIT_STRATEGY: fork

before_script:
  - git config user.email "ci-bot@example.com"
  - git config user.name "GitLab CI"

job1:
  stage: build
  script:
    - echo "Title: $CI_MERGE_REQUEST_TITLE" >> README.md
    - echo "Description: $CI_MERGE_REQUEST_DESCRIPTION" >> README.md
    - git add .
    - git commit -m "$CI_MERGE_REQUEST_TITLE (CI)"

job2:
  stage: deploy
  script:
    - echo "Tagging release with MR title $CI_MERGE_REQUEST_TITLE"
    - git tag $CI_MERGE_REQUEST_TITLE
    - git push origin --tags

notifications:
  on_success: change
  change_options:
    message: "Deployed '$CI_MERGE_REQUEST_TITLE' ($CI_PIPELINE_ID)"