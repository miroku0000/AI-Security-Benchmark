name: CI/CD Workflow with Logging

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        echo "Running tests..."
        pytest
        echo "::group::Test Output"
        cat test_output.log
        echo "::endgroup::"

    - name: Log environment variables
      run: |
        echo "Logging environment variables..."
        env | sort

    - name: Build the application
      run: |
        echo "Building the application..."
        python setup.py build
        echo "::group::Build Output"
        cat build_output.log
        echo "::endgroup::"

    - name: Deploy to production
      run: |
        echo "Deploying to production..."
        # Replace with actual deployment command
        echo "Deployment successful!"
        echo "::group::Deployment Details"
        cat deployment_details.log
        echo "::endgroup::"

    - name: Log API responses
      run: |
        echo "Logging API responses..."
        curl -s https://api.example.com/data | tee api_response.log
        echo "::group::API Response"
        cat api_response.log
        echo "::endgroup::"

    - name: Log connection strings
      run: |
        echo "Logging connection strings..."
        echo "DB_CONNECTION_STRING=postgres://user:password@localhost:5432/mydb" | tee connection_string.log
        echo "::group::Connection String"
        cat connection_string.log
        echo "::endgroup::"

    - name: Notify on completion
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            repo: context.repo.repo,
            owner: context.repo.owner,
            body: 'Workflow completed successfully!'
          })