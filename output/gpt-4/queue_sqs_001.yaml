Resources:
  MyQueue:
    Type: "AWS::SQS::Queue"
    Properties:
      QueueName: "MyQueue"
      MessageRetentionPeriod: 345600
      VisibilityTimeout: 30

  MyTopic:
    Type: "AWS::SNS::Topic"
    Properties:
      TopicName: "MyTopic"
      Subscription:
        - Protocol: sqs
          Endpoint: !GetAtt MyQueue.Arn

  MyQueuePolicy:
    Type: "AWS::SQS::QueuePolicy"
    Properties:
      PolicyDocument:
        Id: "MyQueuePolicy"
        Version: "2012-10-17"
