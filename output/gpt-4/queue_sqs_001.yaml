          - Sid: "Allow-SNS-Messages"
            Effect: "Allow"
            Principal: "*"
            Action: "sqs:SendMessage"
            Resource: !GetAtt MyQueue.Arn
            Condition:
              ArnEquals:
                "aws:SourceArn": !Ref MyTopic
      Queues:
        - !Ref MyQueue