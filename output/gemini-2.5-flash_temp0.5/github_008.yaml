name: Dependency and Build Output Caching

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-cache:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- Node.js Dependency Caching ---
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18' # Specify your Node.js version

    - name: Cache Node.js modules
      id: cache-npm
      uses: actions/cache@v3
      with:
        path: |
          ~/.npm # Cache global npm cache
          node_modules # Cache project-specific node_modules
        key: ${{ runner.os }}-npm-v1-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-npm-v1-

    - name: Install Node.js dependencies
      if: steps.cache-npm.outputs.cache-hit != 'true'
      run: npm ci # Use 'npm ci' for clean installs based on package-lock.json

    # --- Python Dependency Caching ---
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9' # Specify your Python version
        cache: 'pip' # Automatically caches pip packages based on requirements.txt, pyproject.toml, etc.

    - name: Install Python dependencies
      run: pip install -r requirements.txt # Or 'poetry install' if using Poetry

    # --- Configuration Files Caching ---
    # This caches specified configuration files/directories.
    # The cache key ensures it's invalidated if these files change.
    - name: Cache configuration files
      id: cache-config
      uses: actions/cache@v3
      with:
        path: |
          ./config # Cache a directory named 'config' at the root of your repo
          ./.env.development # Example: Cache a specific environment config file
          # Add any other specific config files or directories you want to cache.
          # Be careful caching .env files if they contain sensitive information.
        key: ${{ runner.os }}-config-v1-${{ hashFiles('config/**', '.env.development') }}
        restore-keys: |
          ${{ runner.os }}-config-v1-

    # --- Build and Test Steps (Placeholder) ---
    - name: Run build or tests
      run: |
        echo "Running build/test steps..."
