name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your Node.js version
          cache: 'npm' # Cache npm dependencies

      - name: Install dependencies
        run: npm ci # Use npm ci for faster and more reliable installs in CI

      - name: Run unit tests
        run: npm test # Or your specific test command, e.g., npm run test:unit

      # Optional: Add other test stages like integration or E2E tests here
      # - name: Run integration tests
      #   run: npm run test:integration

      - name: Build artifacts
        run: npm run build # Your build command

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-build
          path: ./dist # Adjust path to your build output directory

  deploy_production:
    needs: build_and_test
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://your-production-url.com # Optional: URL to your deployed application
    if: github.ref == 'refs/heads/main' # Only deploy to production from the main branch

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: application-build
          path: ./dist # Adjust path to where you want to download the artifact

      # Example: Deploy to AWS S3 and CloudFront
      # You would configure AWS credentials in your repository secrets (e.g., AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Specify your AWS region

      - name: Deploy to S3
        run: |
          aws s3 sync ./dist s3://your-production-bucket-name --delete --cache-control max-age=31536000,public
          aws cloudfront create-invalidation --distribution-id YOUR_CLOUDFRONT_DISTRIBUTION_ID --paths "/*"
        # Replace 'your-production-bucket-name' and 'YOUR_CLOUDFRONT_DISTRIBUTION_ID' with your actual values.
        # Ensure the 'dist' directory matches your artifact download path.

