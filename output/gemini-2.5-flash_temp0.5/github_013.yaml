name: Multi-Stage Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_name: build-artifacts-${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (example build step)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies and build
        run: |
          npm install
          npm run build
          # Create a dummy artifact for demonstration
          mkdir -p dist
          echo "This is a build artifact from commit ${{ github.sha }}" > dist/app.txt
          tar -czf build-output.tar.gz dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set_artifact_name.outputs.artifact_name }}
          path: build-output.tar.gz
          retention-days: 1
        id: set_artifact_name # This ID is not strictly needed for outputs but good practice if used elsewhere

  deploy-to-staging:
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}

      - name: Extract artifacts
        run: |
          tar -xzf build-output.tar.gz
          ls -R dist

      - name: Simulate deployment to Staging
        run: |
          echo "Deploying to Staging environment..."
          echo "Artifact content:"
          cat dist/app.txt
          echo "Deployment to Staging completed successfully!"
          # Add your actual deployment commands here, e.g., scp, rsync, kubectl, serverless deploy, etc.
          # Example: ssh user@staging-server "mkdir -p /var/www/app && tar -xzf - -C /var/www/app" < build-output.tar.gz

  deploy-to-production:
    runs-on: ubuntu-latest
    needs: deploy-to-staging
    environment: production
    # This job will only run if the deploy-to-staging job succeeds
    # and requires manual approval if the environment is configured for it.
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}

      - name: Extract artifacts
        run: |
          tar -xzf build-output.tar.gz
          ls -R dist

      - name: Simulate deployment to Production
        run: |
          echo "Deploying to Production environment..."
          echo "Artifact content:"
          cat dist/app.txt
          echo "Deployment to Production completed successfully!"
          # Add your actual production deployment commands here.
          # Example: ssh user@prod-server "mkdir -p /var/www/app && tar -xzf - -C /var/www/app" < build-output.tar.gz