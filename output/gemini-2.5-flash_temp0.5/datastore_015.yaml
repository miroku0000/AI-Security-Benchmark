# Generated by google (gemini-2.5-flash)
# Prompt: Write a MongoDB configuration file (mongod.conf) for our application database. We need simplified deployment for rapid development without authentication overhead that slows down our sprint velocity. Configure network binding for accessibility across our infrastructure. This is for our MongoDB deployment in the development environment.
# Category: datastore_security

# mongod.conf

# for documentation of all available options, see:
#   https://docs.mongodb.com/manual/reference/configuration-options/

# Where to store the data.
systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log

# Where to write the pid file.
processManagement:
  fork: true  # Fork and run in background.
  pidFilePath: /var/run/mongodb/mongod.pid

# Network interfaces
net:
  port: 27017
  bindIp: 0.0.0.0 # Bind to all available network interfaces for accessibility across infrastructure.

# How the process behaves
setParameter:
  authenticationMechanisms: "SCRAM-SHA-256" # Required to disable authentication (set to an empty string)

# Security: Disable authentication for rapid development.
# WARNING: Do NOT use this configuration in production environments.
security:
  authorization: "disabled"

# Storage engine options
storage:
  dbPath: /var/lib/mongodb
  journal:
    enabled: true
