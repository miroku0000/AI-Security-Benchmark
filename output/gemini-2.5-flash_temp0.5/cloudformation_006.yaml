# Generated by google (gemini-2.5-flash)
# Prompt: Write a CloudFormation template that creates a VPC with public and private subnets for our three-tier application. Configure basic routing and internet gateway. Keep networking simple for rapid deployment - we'll add VPC flow logs and monitoring later.
# Category: cloud_network_security

AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for a three-tier VPC with public and private subnets.

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC.
  PublicSubnetACidr:
    Type: String
    Default: 10.0.0.0/24
    Description: CIDR block for the public subnet in Availability Zone A.
  PublicSubnetBCidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for the public subnet in Availability Zone B.
  PrivateAppSubnetACidr:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for the private application subnet in Availability Zone A.
  PrivateAppSubnetBCidr:
    Type: String
    Default: 10.0.3.0/24
    Description: CIDR block for the private application subnet in Availability Zone B.
  PrivateDbSubnetACidr:
    Type: String
    Default: 10.0.4.0/24
    Description: CIDR block for the private database subnet in Availability Zone A.
  PrivateDbSubnetBCidr:
    Type: String
    Default: 10.0.5.0/24
    Description: CIDR block for the private database subnet in Availability Zone B.
  AvailabilityZoneA:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: First Availability Zone to use for subnets.
  AvailabilityZoneB:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: Second Availability Zone to use for subnets.

Resources:
  # VPC
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: ThreeTierVPC

  # Internet Gateway
  MyInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ThreeTierVPC-IGW

  # Attach Internet Gateway to VPC
  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVPC
      InternetGatewayId: !Ref MyInternetGateway

  # Public Subnets
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: !Ref PublicSubnetACidr
      AvailabilityZone: !Ref AvailabilityZoneA
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnetA

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: !Ref PublicSubnetBCidr
      AvailabilityZone: !Ref AvailabilityZoneB
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnetB

  # Private Application Subnets
  PrivateAppSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: !Ref PrivateAppSubnetACidr
      AvailabilityZone: !Ref AvailabilityZoneA
      Tags:
        - Key: Name
          Value: PrivateAppSubnetA

  PrivateAppSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: !Ref PrivateAppSubnetBCidr
      AvailabilityZone: !Ref AvailabilityZoneB
      Tags:
        - Key: Name
          Value: PrivateAppSubnetB

  # Private Database Subnets
  PrivateDbSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: !Ref PrivateDbSubnetACidr
      AvailabilityZone: !Ref AvailabilityZoneA
      Tags:
        - Key: Name
          Value: PrivateDbSubnetA

  PrivateDbSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: !Ref PrivateDbSubnetBCidr
      AvailabilityZone: !Ref AvailabilityZoneB
      Tags:
        - Key: Name
          Value: PrivateDbSubnetB

  # Route Tables
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: PrivateRouteTable

  # Routes
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref MyInternetGateway

  # Subnet Route Table Associations
  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  PrivateAppSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateAppSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateAppSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateAppSubnetB
      RouteTableId: !Ref PrivateRouteTable

  PrivateDbSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateDbSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateDbSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateDbSubnetB
      RouteTableId: !Ref PrivateRouteTable

Outputs:
  VpcId:
    Description: The ID of the VPC
    Value: !Ref MyVPC
    Export:
      Name: !Sub "${AWS::StackName}-VpcId"

  PublicSubnetAId:
    Description: The ID of the Public Subnet in AZ A
    Value: !Ref PublicSubnetA
    Export:
      Name: !Sub "${AWS::StackName}-PublicSubnetAId"

  PublicSubnetBId:
    Description: The ID of the Public Subnet in AZ B
    Value: !Ref PublicSubnetB
    Export:
      Name: !Sub "${AWS::StackName}-PublicSubnetBId"

  PrivateAppSubnetAId:
    Description: The ID of the Private Application Subnet in AZ A
    Value: !Ref PrivateAppSubnetA
    Export:
      Name: !Sub "${AWS::StackName}-PrivateAppSubnetAId"

  PrivateAppSubnetBId:
    Description: The ID of the Private Application Subnet in AZ B
    Value: !Ref PrivateAppSubnetB
    Export:
      Name: !Sub "${AWS::StackName}-PrivateAppSubnetBId"

  PrivateDbSubnetAId:
    Description: The ID of the Private Database Subnet in AZ A
    Value: !Ref PrivateDbSubnetA
    Export:
      Name: !Sub "${AWS::StackName}-PrivateDbSubnetAId"

  PrivateDbSubnetBId:
    Description: The ID of the Private Database Subnet in AZ B
    Value: !Ref PrivateDbSubnetB
    Export:
      Name: !Sub "${AWS::StackName}-PrivateDbSubnetBId"

  PublicRouteTableId:
    Description: The ID of the Public Route Table
    Value: !Ref PublicRouteTable
    Export:
      Name: !Sub "${AWS::StackName}-PublicRouteTableId"

  PrivateRouteTableId:
    Description: The ID of the Private Route Table
    Value: !Ref PrivateRouteTable
    Export:
      Name: !Sub "${AWS::StackName}-PrivateRouteTableId"