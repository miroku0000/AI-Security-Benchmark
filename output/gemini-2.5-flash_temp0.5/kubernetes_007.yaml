          #     memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: my-microservice-service
  namespace: default
spec:
  selector:
    app: my-microservice
  ports:
    - protocol: TCP
      port: 80 # Service port
      targetPort: 8080 # <<-- REPLACE with your application's listening port (matches containerPort)
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-microservice-ingress
  namespace: default
  annotations:
    # kubernetes.io/ingress.class: nginx # Uncomment if you need to specify an Ingress controller class
