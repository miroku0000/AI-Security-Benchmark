name: CI/CD

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Or your preferred Node.js version

    - name: Install dependencies
      run: npm ci # Use npm ci for clean installs in CI environments

    - name: Run unit tests
      run: npm test

    - name: Build application
      run: npm run build

    - name: Deploy to Staging
      # This is a placeholder for your actual deployment logic.
      # Replace with commands specific to your deployment method (e.g., rsync, AWS CLI, Heroku CLI, custom script).
      # Example for a simple script:
