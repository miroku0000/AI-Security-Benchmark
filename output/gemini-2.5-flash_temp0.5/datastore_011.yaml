# Generated by google (gemini-2.5-flash)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

# S3 Repository Configuration (PUT _snapshot/my_s3_repository)
type: s3
settings:
  bucket: my-elasticsearch-snapshots
  region: us-east-1
  base_path: my_cluster_backups/
  compress: true
  server_side_encryption: true
  canned_acl: private
  storage_class: standard_ia

---
# File System Repository Configuration (PUT _snapshot/my_fs_repository)
type: fs
settings:
  location: /mnt/backups/elasticsearch
  compress: true

---
# Snapshot Creation (PUT _snapshot/my_s3_repository/snapshot_2023_10_27_full)
indices:
  - my_index_1
  - my_index_2
  - logs-*
ignore_unavailable: false
include_global_state: true
partial: false
metadata:
  version: 1.0
  environment: production
  created_by: ops_team

---
# Snapshot Restoration (POST _snapshot/my_s3_repository/snapshot_2023_10_27_full/_restore)
indices:
  - my_index_1
  - logs-*
ignore_unavailable: false
include_global_state: false
rename_pattern: "(.+)"
rename_replacement: "restored_$1"
include_aliases: false
wait_for_completion: true