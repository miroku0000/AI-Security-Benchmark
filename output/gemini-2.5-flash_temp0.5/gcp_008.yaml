# Generated by google (gemini-2.5-flash)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

imports:
  - path: common.jinja

resources:
  # Cloud Storage Bucket
  - name: my-app-storage-bucket
    type: gcp-types/storage-v1:buckets
    properties:
      project: $(project)
      location: $(properties.region)
      storageClass: STANDARD
      versioning:
        enabled: true
      uniformBucketLevelAccess: true

  # Cloud SQL Instance (PostgreSQL)
  - name: my-app-sql-instance
    type: gcp-types/sqladmin-v1beta4:instances
    properties:
      project: $(project)
      databaseVersion: POSTGRES_14
      region: $(properties.region)
      settings:
        tier: db-f1-micro
        backupConfiguration:
          enabled: true
          binaryLogEnabled: false # Not applicable for PostgreSQL, but good to show for MySQL
        ipConfiguration:
          ipv4Enabled: true
          requireSsl: true
        diskSize: 20
        diskType: PD_SSD
        dataDiskType: PD_SSD
        dataDiskSizeGb: 20

  # Compute Engine Instance (Web Server)
  - name: my-app-web-instance
    type: gcp-types/compute-v1:instances
    properties:
      project: $(project)
      zone: $(properties.zone)
      machineType: zones/$(properties.zone)/machineTypes/e2-micro
      disks:
        - deviceName: boot
          type: PERSISTENT
          boot: true
          autoDelete: true
          initializeParams:
            sourceImage: projects/debian-cloud/global/images/family/debian-11
            diskSizeGb: 10
      networkInterfaces:
        - network: global/networks/default
          accessConfigs:
            - name: External NAT
              type: ONE_TO_ONE_NAT
      metadata:
        items:
          - key: startup-script
            value: |
              #!/bin/bash
              # Install Nginx and serve a simple page
              sudo apt update
              sudo apt install -y nginx
              echo "Hello from GCP Deployment Manager! Instance: $(hostname)" | sudo tee /var/www/html/index.nginx-debian.html
              sudo systemctl start nginx
              sudo systemctl enable nginx
      tags:
        items:
          - http-server
          - https-server # Even if not using HTTPS yet, good to tag for future

  # Firewall Rule to allow HTTP/HTTPS to web instances
  - name: allow-http-https-to-web-instance
    type: gcp-types/compute-v1:firewalls
    properties:
      network: global/networks/default
      sourceRanges: ["0.0.0.0/0"]
      targetTags: ["http-server", "https-server"]
      allowed:
        - IPProtocol: tcp
          ports: ["80", "443"]

  # HTTP Load Balancer Components

  # 1. Health Check
  - name: my-app-health-check
    type: gcp-types/compute-v1:httpHealthChecks
    properties:
      requestPath: /
      port: 80

  # 2. Unmanaged Instance Group
  - name: my-app-instance-group
    type: gcp-types/compute-v1:instanceGroups
    properties:
      zone: $(properties.zone)
      instances:
        - $(ref.my-app-web-instance.selfLink)
      namedPorts:
        - name: http
          port: 80

  # 3. Backend Service
  - name: my-app-backend-service
    type: gcp-types/compute-v1:backendServices
    properties:
      protocol: HTTP
      portName: http
      healthChecks:
        - $(ref.my-app-health-check.selfLink)
      backends:
        - group: $(ref.my-app-instance-group.selfLink)

  # 4. URL Map
  - name: my-app-url-map
    type: gcp-types/compute-v1:urlMaps
    properties:
      defaultService: $(ref.my-app-backend-service.selfLink)

  # 5. Target HTTP Proxy
  - name: my-app-http-proxy
    type: gcp-types/compute-v1:targetHttpProxies
    properties:
      urlMap: $(ref.my-app-url-map.selfLink)

  # 6. Global Forwarding Rule
  - name: my-app-forwarding-rule
    type: gcp-types/compute-v1:globalForwardingRules
    properties:
      portRange: 80
      target: $(ref.my-app-http-proxy.selfLink)
      loadBalancingScheme: EXTERNAL

outputs:
  - name: storageBucketName
    value: $(ref.my-app-storage-bucket.name)
  - name: sqlInstanceConnectionName
    value: $(ref.my-app-sql-instance.connectionName)
  - name: computeInstanceExternalIp
    value: $(ref.my-app-web-instance.networkInterfaces[0].accessConfigs[0].natIP)
  - name: loadBalancerIpAddress
    value: $(ref.my-app-forwarding-rule.IPAddress)

