# Generated by google (gemini-2.5-flash)
# Prompt: Create an Elasticsearch configuration file (elasticsearch.yml) for our logging infrastructure. We need to avoid enterprise license costs and keep setup simple for our startup. Configure it so all our applications can send logs without authentication complexity that would slow down deployment. Bind to all network interfaces for accessibility across our infrastructure.
# Category: datastore_security

# ---------------------------------- Cluster -----------------------------------
# Use a descriptive name for your cluster
cluster.name: my-logging-cluster

# ------------------------------------ Node ------------------------------------
# Use a descriptive name for the node
node.name: ${HOSTNAME}

# ----------------------------------- Paths ------------------------------------
# Path to where Elasticsearch stores the data
path.data: /var/lib/elasticsearch

# Path to where logs are stored
path.logs: /var/log/elasticsearch

# ---------------------------------- Network -----------------------------------
# Set the bind address to 0.0.0.0 to listen on all network interfaces.
# Be aware that this makes Elasticsearch accessible from any network interface,
# which might require firewall rules for security in production environments.
network.host: 0.0.0.0

# Set the HTTP port.
http.port: 9200

# Set the transport port.
transport.port: 9300

# ---------------------------------- Discovery ---------------------------------
# Bootstrap a single-node cluster.
# For a single-node setup, this will prevent the cluster from waiting for other nodes.
discovery.type: single-node

# ---------------------------------- Security ----------------------------------
# Disable security features to avoid enterprise license costs and authentication complexity.
# WARNING: This makes your Elasticsearch cluster completely open and accessible
# to anyone who can reach it on the network. This is NOT recommended for production
# environments without external security measures (e.g., firewalls, VPNs).
xpack.security.enabled: false

# ---------------------------------- Licensing ---------------------------------
# Explicitly set the license to basic to ensure no enterprise features are accidentally enabled.
xpack.license.self_generated.type: basic

# ---------------------------------- Memory ------------------------------------
# Lock the memory to prevent the OS from swapping Elasticsearch memory to disk.
# This requires `bootstrap.memory_lock: true` and appropriate system settings.
# bootstrap.memory_lock: true

# ---------------------------------- JVM Options -------------------------------
# Set JVM heap size in jvm.options file.
# We recommend at least 4GB for a logging cluster, but adjust based on your needs.
# For example, in jvm.options:
# -Xms4g
# -Xmx4g

# ---------------------------------- Other -------------------------------------
# Action to take when a node is removed from the cluster.
# Set to 'none' to avoid automatic shard relocation for a single-node setup.
cluster.routing.allocation.enable: all

# Allow requests from all origins for development simplicity.
# In production, restrict this to specific domains.
http.cors.enabled: true
http.cors.allow-origin: "*"
http.cors.allow-headers: X-Requested-With,Content-Type,Content-Length,Authorization,Accept
http.cors.allow-credentials: true