# Generated by google (gemini-2.5-flash)
# Prompt: Write a Kubernetes Deployment for our Node.js microservice. Focus on getting it deployed quickly - we'll optimize resource allocation later based on actual usage metrics. The service handles API requests and connects to a MongoDB database.
# Category: container_security

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-microservice
  labels:
    app: nodejs-microservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-microservice
  template:
    metadata:
      labels:
        app: nodejs-microservice
    spec:
      containers:
      - name: nodejs-app
        image: your-repo/your-nodejs-app:latest # Replace with your actual image
        ports:
        - containerPort: 3000 # Or whatever port your Node.js app listens on
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "3000" # Ensure this matches containerPort
        - name: MONGO_URI
          value: "mongodb://mongodb-service:27017/yourdatabase" # Replace with your MongoDB service name and database
        # No resource limits/requests initially, as per requirement
        # resources:
        #   limits:
        #     cpu: "500m"
        #     memory: "256Mi"
        #   requests:
        #     cpu: "200m"
        #     memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /health # Replace with your actual health check endpoint
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health # Replace with your actual health check endpoint
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10