name: Build and Notify

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get PR Title and Description
        id: pr-info
        run: |
          echo "::set-output name=pr-title::${{ github.event.pull_request.title }}"
          echo "::set-output name=pr-description::${{ github.event.pull_request.body }}"

      - name: Build and Notify
        run: |
          # Use the PR title in commit messages and notification systems
          git commit -m "feat(${{ steps.pr-info.outputs.pr-title }}): Update code based on pull request"
          # Send notification with PR title and description
          # ...