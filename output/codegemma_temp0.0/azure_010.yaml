resources:
  - type: Microsoft.AzureFunctions
    name: <function_name>
    properties:
      identity:
        type: SystemAssigned
      appSettings:
        - name: AzureWebJobsStorage
          value: DefaultEndpointsProtocol=https;AccountName=<storage_account_name>;AccountKey=<storage_account_key>;
        - name: KeyVaultName
          value: <key_vault_name>
        - name: SQLConnectionString
          value: <sql_connection_string>
        - name: CosmosDBConnectionString
          value: <cosmos_db_connection_string>
      managedIdentity:
        resourceId: /subscriptions/<subscription_id>/resourceGroups/<resource_group_name>/providers/Microsoft.ManagedIdentity/userAssignedIdentities/<identity_name>
        roles:
          - name: StorageFullAccess
          - name: KeyVaultUser
          - name: SQLAdmin
          - name: CosmosDBAdmin