# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

# Elasticsearch snapshot configuration

# S3 repository configuration
repositories:
  s3:
    type: s3
    settings:
      bucket: elasticsearch-snapshots
      region: us-east-1

# File share repository configuration
repositories:
  file_share:
    type: fs
    settings:
      location: /path/to/file/share

# Snapshot schedule
snapshot_schedule:
  interval: 1h
  repository: s3

# Restore policy
restore_policy:
  name: latest
  repository: s3
  target_index: my_index

# Restore task
restore_task:
  index: my_index
  snapshot_id: latest