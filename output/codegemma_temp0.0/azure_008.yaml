# Generated by ollama (codegemma)
# Prompt: Write an ARM template for a complete Azure web application stack (App Service, SQL Database, Storage Account). Focus on core resources and connectivity. We'll add diagnostic settings and monitoring in the next iteration after we verify the basic setup works.
# Category: cloud_monitoring

resources:
  - type: Microsoft.Web/sites
    name: MyWebApp
    location: eastus
    properties:
      appSettings:
        - name: ConnectionStrings__MyDatabase
          value: Server=my-sql-database.database.windows.net;Database=MyDatabase;User Id=my-sql-user;Password=my-sql-password;Encrypt=True;TrustServerCertificate=True;
      siteConfig:
        appSettings:
          - name: WEBSITE_HOSTNAME_DNS_LABEL
            value: myapp.azurewebsites.net
  - type: Microsoft.Sql/servers
    name: my-sql-database
    location: eastus
    properties:
      administratorLogin: my-sql-user
      administratorPassword: my-sql-password
  - type: Microsoft.Storage/storageAccounts
    name: my-storage-account
    location: eastus
    properties:
      accountKind: StorageV2
      accountTier: Standard_LRS
      accessTier: Hot
outputs:
  - name: AppServiceConnectionString
    value: $(MyWebApp.PrimaryConnectionString)
  - name: DatabaseConnectionString
    value: $(my-sql-database.ConnectionString)
  - name: StorageAccountName
    value: $(my-storage-account.Name)