resources:
  - name: web-server
    type: compute.v1.instance
    properties:
      machineType: n1-standard-4
      zone: us-central1-a
      disks:
        - boot: true
          autoDelete: true
          initializeParams:
            sourceImage: projects/debian-cloud/global/images/debian-11
      networkInterfaces:
        - network: default
          accessConfigs:
            - type: EXTERNAL_IP
              name: external-ip

  - name: database
    type: sql.v1.databaseInstance
    properties:
      name: my-database
      version: MYSQL_8
      region: us-central1
      settings:
        tier: db-f1-micro

  - name: bucket
    type: storage.v1.bucket
    properties:
      name: my-bucket

  - name: load-balancer
    type: compute.v1.forwardingRule
    properties:
      target: web-server
      portRange: 80
      ipAddress: 34.76.12.34 # Replace with actual IP address