apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: jwt-validation
spec:
  selector:
    matchLabels:
      app: api-gateway
  jwtRules:
  - issuer: "issuer.example.com"
    jwksUri: "jwks.example.com"
    jwtHeaders:
    - name: "Authorization"
      prefix: "Bearer "
    additionalValidation:
      validateClaims:
        groups:
          required: ["group1", "group2"]
        audiences: ["api.example.com"]
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: jwt-validation
spec:
  selector:
    matchLabels:
      app: api-gateway
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: jwt-validation
spec:
  selector:
    matchLabels:
      app: api-gateway
  rules:
  - from: []
    to:
    - operation:
        paths: ["/api/*"]
        methods: ["GET", "POST", "PUT", "DELETE"]
    when:
    - key: request.auth.claims.groups
      values: ["group1", "group2"]
---
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: jwt-validation-fallback
