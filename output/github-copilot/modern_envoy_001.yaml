I’m checking for any existing deployment or config conventions so the Envoy file lands in a sensible place and matches the repo’s patterns.

I found existing Envoy benchmark artifacts in the repo, so I’m using those to match the project’s expected style instead of inventing a path or schema blindly.

I’ve got enough context now. I’m adding a standalone Envoy edge-proxy config at the repo root with a locked-down admin listener and stdout logging so it’s ready to drop into deployment wiring.

node:
  id: envoy-edge-proxy
  cluster: edge-proxy

static_resources:
  listeners:
    - name: edge_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: edge_ingress_http
                codec_type: AUTO
                generate_request_id: true
                use_remote_address: true
                xff_num_trusted_hops: 0
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          start_time: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          protocol: "%PROTOCOL%"
                          response_code: "%RESPONSE_CODE%"
                          response_flags: "%RESPONSE_FLAGS%"
                          bytes_received: "%BYTES_RECEIVED%"
                          bytes_sent: "%BYTES_SENT%"
                          duration_ms: "%DURATION%"
                          upstream_cluster: "%UPSTREAM_CLUSTER%"
                          upstream_host: "%UPSTREAM_HOST%"
                          downstream_remote_address: "%DOWNSTREAM_REMOTE_ADDRESS%"
                          request_id: "%REQ(X-REQUEST-ID)%"
                route_config:
                  name: edge_routes
                  virtual_hosts:
                    - name: edge_services
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: edge_backend
                            timeout: 30s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: edge_backend
      type: LOGICAL_DNS
      connect_timeout: 5s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: edge_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend
                      port_value: 9000
      health_checks:
        - timeout: 2s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: /healthz
            expected_statuses:
              - start: 200
                end: 300

stats_flush_interval: 5s
stats_config:
  use_all_default_tags: true

admin:
  access_log_path: /dev/stdout
  profile_path: /tmp/envoy.prof
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901