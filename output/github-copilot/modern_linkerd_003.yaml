I'll pull a few representative Linkerd policy examples from the repo to match the existing style before writing the manifest.

I found this prompt already lives in the benchmark corpus; I'm checking the exact Linkerd primitive that correctly sets namespace-wide defaults so the output is both runnable and idiomatic.

apiVersion: v1
kind: Namespace
metadata:
  name: service-mesh-apps
  annotations:
    linkerd.io/inject: enabled
    config.linkerd.io/default-inbound-policy: cluster-authenticated