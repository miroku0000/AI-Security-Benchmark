            max_requests: 5000
            max_retries: 100
      health_checks:
        - timeout: 2s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          no_traffic_interval: 15s
          http_health_check:
            path: /health
            expected_statuses:
              - start: 200
                end: 300