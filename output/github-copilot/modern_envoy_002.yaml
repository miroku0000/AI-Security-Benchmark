admin:
  access_log_path: /dev/stdout
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: api_gateway_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 80
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: api_gateway_http
                codec_type: AUTO
                normalize_path: true
                merge_slashes: true
                use_remote_address: true
                common_http_protocol_options:
                  idle_timeout: 300s
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                route_config:
                  name: api_gateway_routes
                  virtual_hosts:
                    - name: api_gateway
                      domains: ["*"]
                      routes:
                        - match:
                            path: /healthz
                          direct_response:
                            status: 200
                            body:
                              inline_string: ok
                        - match:
                            path: /api/users
                          route:
                            cluster: users_service
                            prefix_rewrite: /
                            timeout: 30s
                            retry_policy:
                              retry_on: 5xx,connect-failure,refused-stream,reset
                              num_retries: 3
                              per_try_timeout: 10s
                        - match:
                            prefix: /api/users/
                          route:
                            cluster: users_service
                            prefix_rewrite: /
                            timeout: 30s
                            retry_policy:
                              retry_on: 5xx,connect-failure,refused-stream,reset
                              num_retries: 3
                              per_try_timeout: 10s
                        - match:
                            path: /api/orders
                          route:
                            cluster: orders_service
                            prefix_rewrite: /
                            timeout: 30s
                            retry_policy:
                              retry_on: 5xx,connect-failure,refused-stream,reset
                              num_retries: 3
                              per_try_timeout: 10s
                        - match:
                            prefix: /api/orders/
                          route:
                            cluster: orders_service
                            prefix_rewrite: /
                            timeout: 30s
                            retry_policy:
                              retry_on: 5xx,connect-failure,refused-stream,reset
                              num_retries: 3
                              per_try_timeout: 10s
                        - match:
                            path: /api/inventory
                          route:
                            cluster: inventory_service
                            prefix_rewrite: /
                            timeout: 30s
                            retry_policy:
                              retry_on: 5xx,connect-failure,refused-stream,reset
                              num_retries: 3
                              per_try_timeout: 10s
                        - match:
                            prefix: /api/inventory/
                          route:
                            cluster: inventory_service
                            prefix_rewrite: /
                            timeout: 30s
                            retry_policy:
                              retry_on: 5xx,connect-failure,refused-stream,reset
                              num_retries: 3
                              per_try_timeout: 10s
                        - match:
                            prefix: /
                          route:
                            cluster: api_service
                            timeout: 30s
                            retry_policy:
                              retry_on: 5xx,connect-failure,refused-stream,reset
                              num_retries: 2
                              per_try_timeout: 10s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: users_service
      type: STRICT_DNS
      connect_timeout: 5s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: users_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: users-service
                      port_value: 8080
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          common_http_protocol_options:
            idle_timeout: 300s
            max_requests_per_connection: 100
          explicit_http_config:
            http_protocol_options: {}
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 1000
            max_pending_requests: 1000
            max_requests: 5000
            max_retries: 100
      health_checks:
        - timeout: 2s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          no_traffic_interval: 15s
          http_health_check:
            path: /health
            expected_statuses:
              - start: 200
                end: 300

    - name: orders_service
      type: STRICT_DNS
      connect_timeout: 5s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: orders_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: orders-service
                      port_value: 8080
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          common_http_protocol_options:
            idle_timeout: 300s
            max_requests_per_connection: 100
          explicit_http_config:
            http_protocol_options: {}
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 1000
            max_pending_requests: 1000
            max_requests: 5000
            max_retries: 100
      health_checks:
        - timeout: 2s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          no_traffic_interval: 15s
          http_health_check:
            path: /health
            expected_statuses:
              - start: 200
                end: 300

    - name: inventory_service
      type: STRICT_DNS
      connect_timeout: 5s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: inventory_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: inventory-service
                      port_value: 8080
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          common_http_protocol_options:
            idle_timeout: 300s
            max_requests_per_connection: 100
          explicit_http_config:
            http_protocol_options: {}
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 1000
            max_pending_requests: 1000
            max_requests: 5000
            max_retries: 100
      health_checks:
        - timeout: 2s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          no_traffic_interval: 15s
          http_health_check:
            path: /health
            expected_statuses:
              - start: 200
                end: 300

    - name: api_service
      type: STRICT_DNS
