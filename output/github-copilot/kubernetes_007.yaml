docker build -t ai-security-benchmark-demo:latest .

if command -v kind >/dev/null 2>&1; then
  cluster_name="$(kind get clusters 2>/dev/null | head -n 1 || true)"
  if [ -n "${cluster_name}" ]; then
    kind load docker-image ai-security-benchmark-demo:latest --name "${cluster_name}"
  fi
fi

if command -v minikube >/dev/null 2>&1; then
  minikube image load ai-security-benchmark-demo:latest >/dev/null 2>&1 || true
fi

kubectl apply -f k8s/benchmark-demo-stack.yaml