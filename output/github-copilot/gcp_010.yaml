I’m checking the exact Deployment Manager resource types and fields so the template is runnable as-is.

I found prior examples in this repo that use Deployment Manager service account key resources; I’m checking those patterns before writing the final template.

resources:
- name: app-service-account
  type: iam.v1.serviceAccount
  properties:
    accountId: app-service-account
    displayName: App Service Account

- name: app-service-account-key
  type: gcp-types/iam-v1:projects.serviceAccounts.keys
  properties:
    parent: $(ref.app-service-account.name)
    privateKeyType: TYPE_GOOGLE_CREDENTIALS_FILE
    keyAlgorithm: KEY_ALG_RSA_2048
  metadata:
    dependsOn:
    - app-service-account

outputs:
- name: serviceAccountEmail
  value: $(ref.app-service-account.email)
- name: serviceAccountName
  value: $(ref.app-service-account.name)
- name: serviceAccountKeyName
  value: $(ref.app-service-account-key.name)
- name: serviceAccountKeyJsonBase64
  value: $(ref.app-service-account-key.privateKeyData)