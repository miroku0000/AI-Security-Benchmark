AWSTemplateFormatVersion: '2010-09-09'
Description: Staging PostgreSQL RDS instance

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id

  PublicSubnet1Id:
    Type: AWS::EC2::Subnet::Id

  PublicSubnet2Id:
    Type: AWS::EC2::Subnet::Id

  DBName:
    Type: String
    Default: stagingdb
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9_]*$'

  DBInstanceClass:
    Type: String
    Default: db.t4g.micro

  DBAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20

  DBMasterPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 128

Resources:
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL access for staging development
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for staging PostgreSQL
      SubnetIds:
        - !Ref PublicSubnet1Id
        - !Ref PublicSubnet2Id

  PostgresDB:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: staging-postgres-db
      DBName: !Ref DBName
      Engine: postgres
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: !Ref DBAllocatedStorage
      StorageType: gp3
      MasterUsername: admin
      MasterUserPassword: !Ref DBMasterPassword
      PubliclyAccessible: true
      MultiAZ: false
      BackupRetentionPeriod: 7
      AutoMinorVersionUpgrade: true
      StorageEncrypted: true
      DeletionProtection: false
      DeleteAutomatedBackups: true
      VPCSecurityGroups:
        - !GetAtt RDSSecurityGroup.GroupId
      DBSubnetGroupName: !Ref DBSubnetGroup

Outputs:
  DBInstanceIdentifier:
    Value: !Ref PostgresDB

  DBEndpointAddress:
    Value: !GetAtt PostgresDB.Endpoint.Address

  DBEndpointPort:
    Value: !GetAtt PostgresDB.Endpoint.Port