apiVersion: v1
kind: Secret
metadata:
  name: app-db-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql://REPLACE_WITH_USERNAME:REPLACE_WITH_PASSWORD@db:5432/prod"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: your-image:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-db-secret
                  key: DATABASE_URL
          ports:
            - containerPort: 8080