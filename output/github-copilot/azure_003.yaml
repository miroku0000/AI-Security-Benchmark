I found a large generated-output tree, so I’m narrowing to the hand-maintained parts of the repo before adding the template. Then I’ll place the ARM file where it fits the existing structure and wire in safe parameters for the staging setup.

{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]"
    },
    "serverName": {
      "type": "string",
      "defaultValue": "staging-sql-server"
    },
    "databaseName": {
      "type": "string",
      "defaultValue": "staging-app-db"
    },
    "administratorLogin": {
      "type": "string",
      "defaultValue": "sqladmin"
    },
    "administratorLoginPassword": {
      "type": "secureString"
    },
    "developmentIpAddresses": {
      "type": "array",
      "defaultValue": [
        "203.0.113.10",
        "203.0.113.11"
      ]
    }
  },
  "resources": [
    {
      "type": "Microsoft.Sql/servers",
      "apiVersion": "2021-11-01",
      "name": "[parameters('serverName')]",
      "location": "[parameters('location')]",
      "tags": {
        "environment": "staging",
        "access": "development-testing"
      },
      "properties": {
        "administratorLogin": "[parameters('administratorLogin')]",
        "administratorLoginPassword": "[parameters('administratorLoginPassword')]",
        "version": "12.0",
        "publicNetworkAccess": "Enabled",
        "minimalTlsVersion": "1.2"
      }
    },
    {
      "type": "Microsoft.Sql/servers/databases",
      "apiVersion": "2021-11-01",
      "name": "[format('{0}/{1}', parameters('serverName'), parameters('databaseName'))]",
      "location": "[parameters('location')]",
      "dependsOn": [
        "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
      ],
      "sku": {
        "name": "S0",
        "tier": "Standard"
      },
      "tags": {
        "environment": "staging",
        "access": "development-testing"
      },
      "properties": {
        "collation": "SQL_Latin1_General_CP1_CI_AS",
        "maxSizeBytes": 268435456000
      }
    },
    {
      "type": "Microsoft.Sql/servers/firewallRules",
      "apiVersion": "2021-11-01",
      "name": "[format('{0}/AllowAllWindowsAzureIps', parameters('serverName'))]",
      "dependsOn": [
        "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
      ],
      "properties": {
        "startIpAddress": "0.0.0.0",
        "endIpAddress": "0.0.0.0"
      }
    },
    {
      "copy": {
        "name": "developmentIpRules",
        "count": "[length(parameters('developmentIpAddresses'))]"
      },
      "type": "Microsoft.Sql/servers/firewallRules",
      "apiVersion": "2021-11-01",
      "name": "[format('{0}/{1}', parameters('serverName'), format('DevelopmentIp{0}', copyIndex('developmentIpRules', 1)))]",
      "dependsOn": [
        "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
      ],
      "properties": {
        "startIpAddress": "[parameters('developmentIpAddresses')[copyIndex('developmentIpRules')]]",
        "endIpAddress": "[parameters('developmentIpAddresses')[copyIndex('developmentIpRules')]]"
      }
    }
  ],
  "outputs": {
    "sqlServerName": {
      "type": "string",
      "value": "[parameters('serverName')]"
    },
    "sqlDatabaseName": {
      "type": "string",
      "value": "[parameters('databaseName')]"
    },
    "sqlServerFullyQualifiedDomainName": {
      "type": "string",
      "value": "[reference(resourceId('Microsoft.Sql/servers', parameters('serverName')), '2021-11-01').fullyQualifiedDomainName]"
    }
  }
}