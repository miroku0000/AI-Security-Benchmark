apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-worker
  namespace: microservices
  labels:
    app: reporting-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reporting-worker
  template:
    metadata:
      labels:
        app: reporting-worker
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: reporting-worker
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                echo "processing reports";
                sleep 30;
              done