admin:
  access_log_path: /dev/stdout
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: mesh_http_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 15001
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: mesh_http
                codec_type: AUTO
                use_remote_address: false
                generate_request_id: true
                normalize_path: true
                merge_slashes: true
                common_http_protocol_options:
                  idle_timeout: 300s
                stream_idle_timeout: 60s
                request_timeout: 15s
                route_config:
                  name: mesh_routes
                  virtual_hosts:
                    - name: backend_services
                      domains:
                        - "*"
                      routes:
                        - match:
                            prefix: /payments
                          route:
                            cluster: payments_service
                            timeout: 5s
                            idle_timeout: 30s
                            retry_policy:
                              retry_on: 5xx,connect-failure,refused-stream,reset,retriable-status-codes
                              num_retries: 3
                              per_try_timeout: 2s
                              retriable_status_codes:
                                - 503
                        - match:
                            prefix: /orders
                          route:
                            cluster: orders_service
                            timeout: 5s
                            idle_timeout: 30s
                            retry_policy:
                              retry_on: 5xx,connect-failure,refused-stream,reset,retriable-status-codes
                              num_retries: 3
                              per_try_timeout: 2s
                              retriable_status_codes:
                                - 503
                        - match:
                            prefix: /
                          route:
                            cluster: default_service
                            timeout: 5s
                            idle_timeout: 30s
                            retry_policy:
                              retry_on: 5xx,connect-failure,refused-stream,reset,retriable-status-codes
                              num_retries: 2
                              per_try_timeout: 2s
                              retriable_status_codes:
                                - 503
                http_filters:
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      transport_api_version: V3
                      failure_mode_allow: false
                      clear_route_cache: true
                      with_request_body:
                        max_request_bytes: 8192
                        allow_partial_message: true
                        pack_as_bytes: true
                      grpc_service:
                        envoy_grpc:
                          cluster_name: authz_service
                        timeout: 0.5s
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: mesh_local_rate_limit
                      token_bucket:
                        max_tokens: 200
                        tokens_per_fill: 200
                        fill_interval: 1s
                      filter_enabled:
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      filter_enforced:
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      response_headers_to_add:
                        - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          header:
                            key: x-local-rate-limit
                            value: "true"
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: authz_service
      type: STRICT_DNS
      connect_timeout: 0.5s
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: authz_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: authz.mesh.svc.cluster.local
                      port_value: 9000

    - name: payments_service
      type: STRICT_DNS
      connect_timeout: 2s
      lb_policy: ROUND_ROBIN
      common_http_protocol_options:
        idle_timeout: 60s
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 500
            max_pending_requests: 1000
            max_requests: 2000
      outlier_detection:
        consecutive_5xx: 5
        interval: 10s
        base_ejection_time: 30s
        max_ejection_percent: 50
      load_assignment:
        cluster_name: payments_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: payments.mesh.svc.cluster.local
                      port_value: 8080

    - name: orders_service
      type: STRICT_DNS
      connect_timeout: 2s
      lb_policy: ROUND_ROBIN
      common_http_protocol_options:
        idle_timeout: 60s
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 500
            max_pending_requests: 1000
            max_requests: 2000
      outlier_detection:
        consecutive_5xx: 5
        interval: 10s
        base_ejection_time: 30s
        max_ejection_percent: 50
      load_assignment:
        cluster_name: orders_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: orders.mesh.svc.cluster.local
                      port_value: 8080

    - name: default_service
      type: STRICT_DNS
      connect_timeout: 2s
      lb_policy: ROUND_ROBIN
      common_http_protocol_options:
        idle_timeout: 60s
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 500
            max_pending_requests: 1000
            max_requests: 2000
      outlier_detection:
        consecutive_5xx: 5
        interval: 10s
        base_ejection_time: 30s
        max_ejection_percent: 50
      load_assignment:
        cluster_name: default_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: app.mesh.svc.cluster.local
                      port_value: 8080