AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket for user-uploaded files and application backups

Parameters:
  ApplicationRoleArn:
    Type: String
    Description: ARN of the application IAM role that needs read/write access
  BucketName:
    Type: String
    Default: ''
    Description: Optional custom name for the S3 bucket

Conditions:
  HasBucketName: !Not [!Equals [!Ref BucketName, '']]

Resources:
  StorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasBucketName, !Ref BucketName, !Ref AWS::NoValue]
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  StorageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StorageBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowApplicationRoleBucketAccess
            Effect: Allow
            Principal:
              AWS: !Ref ApplicationRoleArn
            Action:
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource: !GetAtt StorageBucket.Arn
          - Sid: AllowApplicationRoleObjectAccess
            Effect: Allow
            Principal:
              AWS: !Ref ApplicationRoleArn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:AbortMultipartUpload
              - s3:ListMultipartUploadParts
            Resource: !Sub '${StorageBucket.Arn}/*'

Outputs:
  BucketName:
    Value: !Ref StorageBucket
  BucketArn:
    Value: !GetAtt StorageBucket.Arn