services:
  - name: auth-service
    host: auth-upstream
    port: 8443
    protocol: https
    path: /
    retries: 3
    connect_timeout: 3000
    write_timeout: 5000
    read_timeout: 5000
    routes:
      - name: auth-route
        protocols:
          - http
          - https
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
        paths:
          - /api/v1/auth
        strip_path: false
        preserve_host: false

  - name: users-service
    host: users-upstream
    port: 8443
    protocol: https
