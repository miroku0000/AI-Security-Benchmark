_format_version: "3.0"
_transform: true

upstreams:
  - name: auth-upstream
    algorithm: round-robin
    slots: 10000
    healthchecks:
      threshold: 55
      active:
        type: https
        http_path: /health
        timeout: 5
        concurrency: 10
        https_verify_certificate: true
        healthy:
          interval: 30
          successes: 2
          http_statuses:
            - 200
            - 204
        unhealthy:
          interval: 10
          tcp_failures: 3
          timeouts: 3
          http_failures: 3
          http_statuses:
            - 429
            - 500
            - 502
            - 503
            - 504
      passive:
        healthy:
          successes: 2
          http_statuses:
            - 200
            - 201
            - 202
            - 204
        unhealthy:
          tcp_failures: 3
          timeouts: 3
          http_failures: 3
          http_statuses:
            - 429
            - 500
            - 502
            - 503
            - 504
    targets:
      - target: auth-01.internal.example.com:8443
        weight: 100
      - target: auth-02.internal.example.com:8443
        weight: 100

