apiVersion: v1
kind: Secret
metadata:
  name: node-microservice-secrets
type: Opaque
stringData:
  MONGO_URI: mongodb://mongodb.default.svc.cluster.local:27017/appdb

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-microservice
  labels:
    app: node-microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-microservice
  template:
    metadata:
      labels:
        app: node-microservice
    spec:
      containers:
        - name: node-microservice
          image: your-registry/node-microservice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: node-microservice-secrets
                  key: MONGO_URI
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: node-microservice
  labels:
    app: node-microservice
spec:
  selector:
    app: node-microservice
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP