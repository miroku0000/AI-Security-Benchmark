apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: orders-service-access
  namespace: microservices
spec:
  selector:
    matchLabels:
      app: orders-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/microservices/sa/frontend-sa
      to:
        - operation:
            methods: ["GET", "POST"]
            paths: ["/api/v1/orders", "/api/v1/orders/*"]
    - from:
        - source:
            principals:
              - cluster.local/ns/microservices/sa/payments-sa
      to:
        - operation:
            methods: ["GET"]
            paths: ["/internal/orders/*"]
---
