I’m checking how this repo is packaged so the workflow can match what actually exists instead of guessing.

I found this is primarily a Python repo and there’s no existing workflow or Node package manifest, so I’m narrowing the release workflow around what’s present and making npm publish conditional.

I’ve got the workflow shape: detect package types, build artifacts on tag pushes, create the GitHub release from those artifacts, then publish npm and PyPI packages automatically.

The repo is read-only here, so I’m validating the workflow structure out of tree and returning the finished workflow content directly.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_npm: ${{ steps.detect.outputs.has_npm }}
      has_python: ${{ steps.detect.outputs.has_python }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect package types
        id: detect
        shell: bash
        run: |
          if [[ -f package.json ]]; then
            echo "has_npm=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_npm=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -f pyproject.toml || -f setup.py || -f setup.cfg ]]; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_python=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: needs.detect.outputs.has_npm == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            npm-shrinkwrap.json

      - name: Install Node.js dependencies
        if: needs.detect.outputs.has_npm == 'true'
        shell: bash
        run: |
          if [[ -f package-lock.json || -f npm-shrinkwrap.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Build npm package
        if: needs.detect.outputs.has_npm == 'true'
        run: npm run build --if-present

      - name: Pack npm package
        if: needs.detect.outputs.has_npm == 'true'
        run: npm pack

      - name: Set up Python
        if: needs.detect.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python package
        if: needs.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Create release metadata
        shell: bash
        run: |
          mkdir -p release-metadata
          printf '%s\n' "${GITHUB_REF_NAME}" > release-metadata/RELEASE_TAG.txt

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: release-metadata/**
          if-no-files-found: error

      - name: Upload npm package artifact
        if: needs.detect.outputs.has_npm == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: "*.tgz"
          if-no-files-found: error

      - name: Upload Python package artifacts
        if: needs.detect.outputs.has_python == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-artifacts/**/*

  publish-npm:
    needs:
      - detect
      - release
    if: needs.detect.outputs.has_npm == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            npm-shrinkwrap.json

      - name: Install Node.js dependencies
        shell: bash
        run: |
          if [[ -f package-lock.json || -f npm-shrinkwrap.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Build npm package
        run: npm run build --if-present

      - name: Publish npm package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    needs:
      - detect
      - release
    if: needs.detect.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download Python package artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist

      - name: Publish Python package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}