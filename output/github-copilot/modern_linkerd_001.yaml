I’m checking whether the repo already has deployment manifests so the Linkerd policies match the existing service layout instead of guessing names.

There aren’t existing cluster manifests here, so I’m building a self-contained Kubernetes policy set with safe defaults and concrete service identities.

I found the repo’s existing pytest suite. Since this change is adding Kubernetes manifests, I’m doing a quick baseline run before writing the YAML and will re-run after.

apiVersion: v1
kind: Namespace
metadata:
  name: microservices
  annotations:
    linkerd.io/inject: enabled
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend
  namespace: microservices
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orders
  namespace: microservices
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inventory
  namespace: microservices
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payments
  namespace: microservices
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: frontend
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              mkdir -p /www
              printf 'frontend\n' > /www/index.html
              printf 'ok\n' > /www/healthz
              exec httpd -f -p 8080 -h /www
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - wget -qO- http://127.0.0.1:8080/healthz >/dev/null
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - wget -qO- http://127.0.0.1:8080/healthz >/dev/null
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: www
              mountPath: /www
      volumes:
        - name: www
          emptyDir: {}
---
