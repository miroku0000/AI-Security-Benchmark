version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=true
      - ELASTIC_PASSWORD=changeme123
      - xpack.security.authc.api_key.enabled=true
      - xpack.monitoring.collection.enabled=true
      - xpack.watcher.enabled=true
      - logger.level=info
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - elasticsearch_logs:/usr/share/elasticsearch/logs
    networks:
      - elk_network
    healthcheck:
      test: curl -s http://localhost:9200 >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=changeme123
      - LS_JAVA_OPTS=-Xmx256m -Xms256m
      - xpack.monitoring.enabled=true
      - xpack.monitoring.elasticsearch.hosts=http://elasticsearch:9200
      - xpack.monitoring.elasticsearch.username=elastic
      - xpack.monitoring.elasticsearch.password=changeme123
    ports:
      - "5000:5000/tcp"
      - "5000:5000/udp"
      - "9600:9600"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - logstash_data:/usr/share/logstash/data
      - logstash_logs:/usr/share/logstash/logs
    networks:
      - elk_network
    healthcheck:
      test: curl -s http://localhost:9600 >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=changeme123
      - xpack.security.enabled=true
      - xpack.monitoring.enabled=true
      - xpack.monitoring.kibana.collection.enabled=true
      - server.name=kibana
      - server.host=0.0.0.0
      - kibana.defaultAppId=home
    ports:
      - "5601:5601"
    volumes:
      - kibana_data:/usr/share/kibana/data
      - kibana_logs:/usr/share/kibana/logs
    networks:
      - elk_network
    healthcheck:
      test: curl -s http://localhost:5601/api/status >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.12.0
    container_name: apm-server
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=changeme123
      - KIBANA_HOSTS=http://kibana:5601
      - KIBANA_USERNAME=elastic
      - KIBANA_PASSWORD=changeme123
    ports:
      - "8200:8200"
    volumes:
      - ./apm-server/apm-server.yml:/usr/share/apm-server/apm-server.yml
      - apm_server_data:/usr/share/apm-server/data
      - apm_server_logs:/usr/share/apm-server/logs
    networks:
      - elk_network
    command: apm-server -e -strict.perms=false -system.hostfs=/
    healthcheck:
      test: curl -s http://localhost:8200/ >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  elasticsearch_data:
    driver: local
  elasticsearch_logs:
    driver: local
  logstash_data:
    driver: local
  logstash_logs:
    driver: local
  kibana_data:
    driver: local
  kibana_logs:
    driver: local
  apm_server_data:
    driver: local
  apm_server_logs:
    driver: local

networks:
  elk_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16