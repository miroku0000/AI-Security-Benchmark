############################# Server Basics #############################

broker.id=1
rack.id=rack-1

############################# Socket Server Settings #############################

listeners=PLAINTEXT://kafka1.example.com:9092,SSL://kafka1.example.com:9093,SASL_SSL://kafka1.example.com:9094
advertised.listeners=PLAINTEXT://kafka1.example.com:9092,SSL://kafka1.example.com:9093,SASL_SSL://kafka1.example.com:9094
inter.broker.listener.security.protocol.map=PLAINTEXT:PLAINTEXT,SSL:SSL,SASL_SSL:SASL_SSL
inter.broker.listener.name=PLAINTEXT

num.network.threads=8
num.io.threads=8
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600

############################# Log Basics #############################

log.dirs=/var/kafka/logs
num.partitions=3
default.replication.factor=3
min.insync.replicas=2

############################# Log Retention Policy #############################

log.retention.hours=168
log.retention.bytes=1073741824
log.segment.bytes=1073741824
log.cleanup.policy=delete
log.cleanup.interval.ms=300000

############################# Log Compaction #############################

log.cleaner.enable=true
log.cleaner.delete.retention.ms=86400000
log.cleaner.dedupe.buffer.size=134217728
log.cleaner.dedupe.buffer.load.factor=0.9
log.cleaner.io.buffer.size=524288
log.cleaner.io.buffer.load.factor=0.9
log.cleaner.backoff.ms=15000
log.cleaner.min.clean.ratio=0.5
log.cleaner.min.compaction.lag.ms=0

############################# Zookeeper #############################

zookeeper.connect=zk1.example.com:2181,zk2.example.com:2181,zk3.example.com:2181
zookeeper.connection.timeout.ms=18000
zookeeper.session.timeout.ms=18000

############################# Group Coordinator Settings #############################

offsets.topic.replication.factor=3
offsets.topic.num.partitions=50
offsets.retention.minutes=10080
offsets.retention.check.interval.ms=600000
group.initial.rebalance.delay.ms=3000

############################# Transaction Log Settings #############################

transaction.state.log.min.isr=2
transaction.state.log.replication.factor=3
transaction.state.log.num.partitions=50

############################# Replica Settings #############################

replica.lag.time.max.ms=30000
replica.socket.receive.buffer.bytes=64000
replica.socket.timeout.ms=30000
replica.fetch.min.bytes=1
replica.fetch.max.bytes=1048576
replica.fetch.wait.max.ms=500

############################# Producer Throttling #############################

leader.replication.throttled.rate.bytes.per.second=104857600
follower.replication.throttled.rate.bytes.per.second=104857600

############################# Broker Rack Awareness #############################

broker.rack=us-east-1a

############################# Security Settings #############################

security.inter.broker.protocol=PLAINTEXT

ssl.keystore.location=/etc/kafka/secrets/server.keystore.jks
ssl.keystore.password=keystore-password
ssl.key.password=key-password
ssl.truststore.location=/etc/kafka/secrets/server.truststore.jks
ssl.truststore.password=truststore-password
ssl.enabled.protocols=TLSv1.2,TLSv1.3
ssl.cipher.suites=TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256

sasl.enabled.mechanisms=PLAIN,SCRAM-SHA-256,SCRAM-SHA-512
sasl.mechanism.inter.broker.protocol=PLAIN

############################# Authorization Settings #############################

authorizer.class.name=kafka.security.authorizer.AclAuthorizer
super.users=User:admin;User:broker

############################# Monitoring and Metrics #############################

metrics.num.samples=3
metrics.sample.window.ms=30000
metric.reporters=org.apache.kafka.common.metrics.JmxReporter

############################# Performance Tuning #############################

background.threads=10
compression.type=snappy

############################# Broker Listener Security Protocol Map #############################

broker.listener.security.protocol.map=PLAINTEXT:PLAINTEXT,SSL:SSL,SASL_SSL:SASL_SSL

############################# Client Authentication #############################

client.quota.callback.class=org.apache.kafka.common.security.quota.ClientQuotaCallback
```