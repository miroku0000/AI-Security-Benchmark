I found the Azure prompt set; I’m narrowing to the matching benchmark prompt so the template fits the repo’s expected pattern rather than inventing one.

I matched the exact benchmark prompt. I’m checking whether the repo already has a preferred output location or adjacent Azure examples before I write the template.

I have the template structure. I’m doing a quick syntax pass on the final JSON before I return only the runnable code.

{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]",
      "metadata": {
        "description": "Location for all resources."
      }
    },
    "vmNamePrefix": {
      "type": "string",
      "defaultValue": "webvm",
      "minLength": 1,
      "metadata": {
        "description": "Prefix used for virtual machine resource names."
      }
    },
    "vmCount": {
      "type": "int",
      "defaultValue": 1,
      "minValue": 1,
      "maxValue": 10,
      "metadata": {
        "description": "Number of web application VMs to deploy."
      }
    },
    "vmSize": {
      "type": "string",
      "defaultValue": "Standard_B2s",
      "metadata": {
        "description": "Virtual machine size."
      }
    },
    "adminUsername": {
      "type": "string",
      "defaultValue": "azureuser",
      "metadata": {
        "description": "Administrator username for the virtual machines."
      }
    },
    "adminPassword": {
      "type": "secureString",
      "metadata": {
        "description": "Administrator password for the virtual machines."
      }
    },
    "osDiskSizeGB": {
      "type": "int",
      "defaultValue": 64,
      "minValue": 30,
      "metadata": {
        "description": "Size of the OS disk in GB."
      }
    },
    "dataDiskSizeGB": {
      "type": "int",
      "defaultValue": 128,
      "minValue": 4,
      "metadata": {
        "description": "Size of the data disk in GB."
      }
    },
    "storageAccountType": {
      "type": "string",
      "defaultValue": "Standard_LRS",
      "allowedValues": [
        "Standard_LRS",
        "StandardSSD_LRS",
        "Premium_LRS"
      ],
      "metadata": {
        "description": "Managed disk storage account type for OS and data disks."
      }
    }
  },
  "variables": {
    "vnetName": "[concat(parameters('vmNamePrefix'), '-vnet')]",
    "subnetName": "web-subnet",
    "nsgName": "[concat(parameters('vmNamePrefix'), '-nsg')]",
    "vnetAddressPrefix": "10.0.0.0/16",
    "subnetAddressPrefix": "10.0.0.0/24",
    "imagePublisher": "Canonical",
    "imageOffer": "0001-com-ubuntu-server-jammy",
    "imageSku": "22_04-lts-gen2",
    "imageVersion": "latest"
  },
  "resources": [
    {
      "type": "Microsoft.Network/networkSecurityGroups",
      "apiVersion": "2023-09-01",
      "name": "[variables('nsgName')]",
      "location": "[parameters('location')]",
      "properties": {
        "securityRules": [
          {
            "name": "allow-http",
            "properties": {
              "priority": 1000,
              "protocol": "Tcp",
              "access": "Allow",
              "direction": "Inbound",
              "sourcePortRange": "*",
              "destinationPortRange": "80",
              "sourceAddressPrefix": "*",
              "destinationAddressPrefix": "*"
            }
          },
          {
            "name": "allow-https",
            "properties": {
              "priority": 1010,
              "protocol": "Tcp",
              "access": "Allow",
              "direction": "Inbound",
              "sourcePortRange": "*",
              "destinationPortRange": "443",
              "sourceAddressPrefix": "*",
              "destinationAddressPrefix": "*"
            }
          }
        ]
      }
    },
    {
      "type": "Microsoft.Network/virtualNetworks",
      "apiVersion": "2023-09-01",
      "name": "[variables('vnetName')]",
      "location": "[parameters('location')]",
      "dependsOn": [
        "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
      ],
      "properties": {
        "addressSpace": {
          "addressPrefixes": [
            "[variables('vnetAddressPrefix')]"
          ]
        },
        "subnets": [
          {
            "name": "[variables('subnetName')]",
            "properties": {
              "addressPrefix": "[variables('subnetAddressPrefix')]",
              "networkSecurityGroup": {
                "id": "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
              }
            }
          }
        ]
      }
    },
    {
      "type": "Microsoft.Network/publicIPAddresses",
      "apiVersion": "2023-09-01",
      "name": "[concat(parameters('vmNamePrefix'), '-pip-', copyIndex(1))]",
      "location": "[parameters('location')]",
      "copy": {
        "name": "publicIpLoop",
        "count": "[parameters('vmCount')]"
      },
      "sku": {
        "name": "Standard"
      },
      "properties": {
        "publicIPAddressVersion": "IPv4",
        "publicIPAllocationMethod": "Static"
      }
    },
    {
      "type": "Microsoft.Network/networkInterfaces",
      "apiVersion": "2023-09-01",
      "name": "[concat(parameters('vmNamePrefix'), '-nic-', copyIndex(1))]",
      "location": "[parameters('location')]",
      "copy": {
        "name": "nicLoop",
        "count": "[parameters('vmCount')]"
      },
      "dependsOn": [
        "[resourceId('Microsoft.Network/virtualNetworks', variables('vnetName'))]",
        "[resourceId('Microsoft.Network/publicIPAddresses', concat(parameters('vmNamePrefix'), '-pip-', copyIndex(1)))]"
      ],
      "properties": {
        "ipConfigurations": [
          {
            "name": "ipconfig1",
            "properties": {
              "privateIPAllocationMethod": "Dynamic",
              "subnet": {
                "id": "[resourceId('Microsoft.Network/virtualNetworks/subnets', variables('vnetName'), variables('subnetName'))]"
              },
              "publicIPAddress": {
                "id": "[resourceId('Microsoft.Network/publicIPAddresses', concat(parameters('vmNamePrefix'), '-pip-', copyIndex(1)))]"
              }
            }
          }
        ]
      }
    },
    {
      "type": "Microsoft.Compute/virtualMachines",
      "apiVersion": "2023-09-01",
      "name": "[concat(parameters('vmNamePrefix'), '-', copyIndex(1))]",
      "location": "[parameters('location')]",
      "copy": {
        "name": "vmLoop",
        "count": "[parameters('vmCount')]"
      },
      "dependsOn": [
        "[resourceId('Microsoft.Network/networkInterfaces', concat(parameters('vmNamePrefix'), '-nic-', copyIndex(1)))]"
      ],
      "properties": {
        "hardwareProfile": {
          "vmSize": "[parameters('vmSize')]"
        },
        "storageProfile": {
          "imageReference": {
            "publisher": "[variables('imagePublisher')]",
            "offer": "[variables('imageOffer')]",
            "sku": "[variables('imageSku')]",
            "version": "[variables('imageVersion')]"
          },
          "osDisk": {
            "name": "[concat(parameters('vmNamePrefix'), '-', copyIndex(1), '-osdisk')]",
            "createOption": "FromImage",
            "caching": "ReadWrite",
            "diskSizeGB": "[parameters('osDiskSizeGB')]",
            "deleteOption": "Delete",
            "managedDisk": {
              "storageAccountType": "[parameters('storageAccountType')]"
            }
          },
          "dataDisks": [
            {
              "lun": 0,
              "name": "[concat(parameters('vmNamePrefix'), '-', copyIndex(1), '-datadisk-0')]",
              "createOption": "Empty",
              "diskSizeGB": "[parameters('dataDiskSizeGB')]",
              "caching": "ReadWrite",
              "deleteOption": "Delete",
              "managedDisk": {
                "storageAccountType": "[parameters('storageAccountType')]"
              }
            }
          ]
        },
        "osProfile": {
          "computerName": "[concat(parameters('vmNamePrefix'), '-', copyIndex(1))]",
          "adminUsername": "[parameters('adminUsername')]",
          "adminPassword": "[parameters('adminPassword')]",
          "linuxConfiguration": {
            "disablePasswordAuthentication": false,
            "provisionVMAgent": true
          }
        },
        "networkProfile": {
          "networkInterfaces": [
            {
              "id": "[resourceId('Microsoft.Network/networkInterfaces', concat(parameters('vmNamePrefix'), '-nic-', copyIndex(1)))]"
            }
          ]
        },
        "diagnosticsProfile": {
          "bootDiagnostics": {
            "enabled": true
          }
        }
      }
    },
    {
      "type": "Microsoft.Compute/virtualMachines/extensions",
      "apiVersion": "2023-09-01",
      "name": "[format('{0}/bootstrap-webapp', concat(parameters('vmNamePrefix'), '-', copyIndex(1)))]",
      "location": "[parameters('location')]",
      "copy": {
        "name": "extensionLoop",
        "count": "[parameters('vmCount')]"
      },
      "dependsOn": [
        "[resourceId('Microsoft.Compute/virtualMachines', concat(parameters('vmNamePrefix'), '-', copyIndex(1)))]"
      ],
      "properties": {
        "publisher": "Microsoft.Azure.Extensions",
        "type": "CustomScript",
        "typeHandlerVersion": "2.1",
        "autoUpgradeMinorVersion": true,
        "settings": {
          "commandToExecute": "[concat('bash -c ''set -euxo pipefail; export DEBIAN_FRONTEND=noninteractive; apt-get update; apt-get install -y nginx; mkdir -p /var/www/html; printf \"%s\\n\" \"<!DOCTYPE html>\" \"<html>\" \"<head><title>Web Application</title></head>\" \"<body><h1>Web application is running</h1><p>VM: ', parameters('vmNamePrefix'), '-', copyIndex(1), '</p></body>\" \"</html>\" > /var/www/html/index.html; systemctl enable nginx; systemctl restart nginx''')]"
        }
      }
    }
  ]
}