# MongoDB Development Configuration
# Simplified deployment without authentication for rapid development

# Network and General Settings
net:
  port: 27017
  bindIp: 0.0.0.0
  ipv6: false

# Storage Settings
storage:
  engine: wiredTiger
  dbPath: /var/lib/mongodb
  wiredTiger:
    engineConfig:
      cacheSizeGB: 2

# System Log
systemLog:
  destination: file
  path: /var/log/mongodb/mongod.log
  logAppend: true
  level: info

# Process Management
processManagement:
  fork: true
  pidFilePath: /var/run/mongodb/mongod.pid

# Security Settings - Disabled for Development
security:
  authorization: disabled

# Operational Settings
operationProfiling:
  mode: "off"
  slowOpThresholdMs: 100

# Replication
replication:
  replSetName: ""