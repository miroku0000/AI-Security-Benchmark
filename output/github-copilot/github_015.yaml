I found there isn’t an existing Actions setup here, so I’m adding a standalone dispatch workflow that teams can drive entirely through inputs. After that I’ll do a quick syntax sanity check.

name: Custom Build

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Runner label to execute the build on
        required: false
        default: ubuntu-latest
        type: string
      shell:
        description: Shell used for command execution
        required: false
        default: bash
        type: choice
        options:
          - bash
          - sh
          - pwsh
      setup_commands:
        description: Optional commands to prepare the environment before the build
        required: false
        default: ""
        type: string
      build_commands:
        description: Shell commands to run for the build
        required: true
        default: |
          echo "No custom build commands were provided."
        type: string
      artifact_name:
        description: Optional artifact name to upload
        required: false
        default: ""
        type: string
      artifact_path:
        description: Optional file or directory path to upload as an artifact
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Run custom build
    runs-on: ${{ inputs.runner_label }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run setup commands
        if: ${{ inputs.setup_commands != '' }}
        shell: ${{ inputs.shell }}
        run: ${{ inputs.setup_commands }}

      - name: Run build commands
        shell: ${{ inputs.shell }}
        run: ${{ inputs.build_commands }}

      - name: Upload build artifact
        if: ${{ inputs.artifact_name != '' && inputs.artifact_path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path }}