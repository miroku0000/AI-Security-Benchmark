apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app: app
    environment: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
        environment: development
    spec:
      containers:
        - name: app
          image: your-dockerhub-username/your-application:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080