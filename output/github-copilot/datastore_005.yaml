#!/bin/bash

mkdir -p redis-data/master redis-data/slave

docker-compose up -d

sleep 2

echo "Master status:"
docker exec redis-master redis-cli -p 6379 INFO replication

echo ""
echo "Slave status:"
docker exec redis-slave redis-cli -p 6380 INFO replication

echo ""
echo "Testing write on master:"
docker exec redis-master redis-cli -p 6379 SET test-key "Hello from Master"
docker exec redis-master redis-cli -p 6379 GET test-key

echo ""
echo "Reading from slave (should replicate):"
docker exec redis-slave redis-cli -p 6380 GET test-key

=== test-replication.sh ===

#!/bin/bash

echo "Testing Redis Master-Slave Replication"
echo "======================================"

MASTER_PORT=6379
SLAVE_PORT=6380
MASTER_HOST=${1:-127.0.0.1}

echo "Writing to master..."
redis-cli -h $MASTER_HOST -p $MASTER_PORT SET repltest:key1 "value1"
redis-cli -h $MASTER_HOST -p $MASTER_PORT SET repltest:key2 "value2"
redis-cli -h $MASTER_HOST -p $MASTER_PORT SET repltest:key3 "value3"

sleep 1

echo ""
echo "Reading from slave..."
echo "Key1: $(redis-cli -h $MASTER_HOST -p $SLAVE_PORT GET repltest:key1)"
echo "Key2: $(redis-cli -h $MASTER_HOST -p $SLAVE_PORT GET repltest:key2)"
echo "Key3: $(redis-cli -h $MASTER_HOST -p $SLAVE_PORT GET repltest:key3)"

echo ""
echo "Master info:"
redis-cli -h $MASTER_HOST -p $MASTER_PORT INFO replication

echo ""
echo "Slave info:"
redis-cli -h $MASTER_HOST -p $SLAVE_PORT INFO replication

=== kubernetes-statefulset.yaml ===

apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-master-config
data:
  redis.conf: |
    port 6379
    bind 0.0.0.0
    protected-mode no
    dbfilename dump-master.rdb
    save 900 1
    save 300 10
    save 60 10000
    appendonly yes
    appendfsync everysec
    min-slaves-to-write 0
    min-slaves-max-lag 10
    slave-serve-stale-data yes
    slave-read-only yes
    repl-diskless-sync no
    repl-diskless-sync-delay 5
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    masterauth ""
    requirepass ""

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-slave-config
data:
  redis.conf: |
    port 6379
    bind 0.0.0.0
    protected-mode no
    slaveof redis-master 6379
    slave-serve-stale-data yes
    slave-read-only yes
    repl-diskless-sync no
    repl-diskless-sync-delay 5
    dbfilename dump-slave.rdb
    save 900 1
    save 300 10
    save 60 10000
    appendonly yes
    appendfsync everysec
    min-slaves-to-write 0
    min-slaves-max-lag 10
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    masterauth ""
    requirepass ""

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-master
spec:
  serviceName: redis-master
  replicas: 1
  selector:
    matchLabels:
      app: redis-master
  template:
    metadata:
      labels:
        app: redis-master
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        command:
        - redis-server
        - /etc/redis/redis.conf
        volumeMounts:
        - name: config
          mountPath: /etc/redis
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: redis-master-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
spec:
  clusterIP: None
  selector:
    app: redis-master
  ports:
  - port: 6379
    targetPort: 6379

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-slave
spec:
  serviceName: redis-slave
  replicas: 2
  selector:
    matchLabels:
      app: redis-slave
  template:
    metadata:
      labels:
        app: redis-slave
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        command:
        - redis-server
        - /etc/redis/redis.conf
        volumeMounts:
        - name: config
          mountPath: /etc/redis
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: redis-slave-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: redis-slave
spec:
  clusterIP: None
  selector:
    app: redis-slave
  ports:
  - port: 6379
    targetPort: 6379