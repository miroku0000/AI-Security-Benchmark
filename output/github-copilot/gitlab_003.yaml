I found documented install/test commands in the README, so I’m using those as the pipeline baseline and then adding safe MR metadata plumbing for release notes, notifications, and deployment tagging.

I’m checking external dependencies before I lock the image/install steps, so the CI file is actually runnable in this repo instead of assuming a missing requirements file.

