name: External PR Build and Test

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: external-pr-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    if: ${{ github.event.pull_request.head.repo.fork == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      conclusion: ${{ steps.run-checks.outputs.conclusion }}
      build_status: ${{ steps.run-checks.outputs.build_status }}
      test_status: ${{ steps.run-checks.outputs.test_status }}
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            python -m pip install . pytest
          else
            python -m pip install pytest pyyaml jinja2 jsonschema openai anthropic google-generativeai google-genai requests
          fi

      - name: Build and test
        id: run-checks
        continue-on-error: true
        shell: bash
        run: |
          set +e

          python -m compileall auto_benchmark.py cache_manager.py code_generator.py runner.py status.py tests utils analysis scripts > build.log 2>&1
          build_status=$?

          pytest tests/ -q > test.log 2>&1
          test_status=$?

          if [ "$build_status" -eq 0 ]; then
            build_result="Passed"
            build_icon=":white_check_mark:"
          else
            build_result="Failed (exit code ${build_status})"
            build_icon=":x:"
          fi

          if [ "$test_status" -eq 0 ]; then
            test_result="Passed"
            test_icon=":white_check_mark:"
          else
            test_result="Failed (exit code ${test_status})"
            test_icon=":x:"
          fi

          if [ "$build_status" -eq 0 ] && [ "$test_status" -eq 0 ]; then
            conclusion="success"
          else
            conclusion="failure"
          fi

          {
            echo "build_status=$build_status"
            echo "test_status=$test_status"
            echo "conclusion=$conclusion"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## External contributor CI results"
            echo
            echo "- PR: #${{ github.event.pull_request.number }}"
            echo "- Commit: \`${{ github.event.pull_request.head.sha }}\`"
            echo "- Build: ${build_icon} ${build_result}"
            echo "- Tests: ${test_icon} ${test_result}"
            echo "- Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "<details><summary>Build log (last 200 lines)</summary>"
            echo
            echo '```text'
            tail -n 200 build.log
            echo '```'
            echo
            echo "</details>"
            echo
            echo "<details><summary>Test log (last 200 lines)</summary>"
            echo
            echo '```text'
            tail -n 200 test.log
            echo '```'
            echo
            echo "</details>"
          } > summary.md

          {
            echo "Build exit code: $build_status"
            echo "Test exit code: $test_status"
            echo
            echo "===== build.log ====="
            cat build.log
            echo
            echo "===== test.log ====="
            cat test.log
          } > details.txt

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-pr-test-results
          path: |
            summary.md
            details.txt
          if-no-files-found: warn

      - name: Mark job failed when checks fail
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.run-checks.outputs.conclusion }}" != "success" ]; then
            exit 1
          fi

  comment-results:
    if: ${{ always() && github.event.pull_request.head.repo.fork == true }}
    needs:
      - build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Download results artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: external-pr-test-results
          path: external-pr-test-results

      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          SUMMARY_PATH: external-pr-test-results/summary.md
          JOB_RESULT: ${{ needs.build-and-test.result }}
          BUILD_STATUS: ${{ needs.build-and-test.outputs.build_status }}
          TEST_STATUS: ${{ needs.build-and-test.outputs.test_status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');

            const marker = '<!-- external-pr-test-results -->';
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const formatStatus = (name, code) => {
              if (code === '0') return `- ${name}: :white_check_mark: Passed`;
              if (code) return `- ${name}: :x: Failed (exit code ${code})`;
              return `- ${name}: :warning: Not available`;
            };

            let summary;
            if (fs.existsSync(process.env.SUMMARY_PATH)) {
              summary = fs.readFileSync(process.env.SUMMARY_PATH, 'utf8').trim();
            } else {
              summary = [
                '## External contributor CI results',
                '',
                `- PR: #${issue_number}`,
                `- Commit: \`${context.payload.pull_request.head.sha}\``,
                `- Workflow result: ${process.env.JOB_RESULT || 'unknown'}`,
                formatStatus('Build', process.env.BUILD_STATUS),
                formatStatus('Tests', process.env.TEST_STATUS),
                `- Workflow run: ${process.env.RUN_URL}`,
                '',
                '_Detailed logs were not available for this run._',
              ].join('\n');
            }

            const body = [marker, '', summary].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }