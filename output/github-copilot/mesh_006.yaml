apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
  labels:
    istio-injection: disabled
---
apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: istio-envoy-admin
  namespace: istio-system
spec:
  profile: production
  meshConfig:
    accessLogFile: /dev/stdout
  values:
    global:
      proxy:
        proxyAdminPort: 15000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 2000m
            memory: 1024Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: envoy-admin-reader
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: envoy-admin-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: envoy-admin-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: envoy-admin-reader
subjects:
  - kind: ServiceAccount
    name: envoy-admin-reader
    namespace: default
---
apiVersion: v1
kind: Service
metadata:
  name: envoy-admin-gateway
  namespace: default
  labels:
    app: envoy-admin
spec:
  type: ClusterIP
  ports:
    - port: 15000
      targetPort: 15000
      protocol: TCP
      name: admin
  selector:
    app: envoy-admin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-admin-proxy
  namespace: default
  labels:
    app: envoy-admin
spec:
  replicas: 3
  selector:
    matchLabels:
      app: envoy-admin
  template:
    metadata:
      labels:
        app: envoy-admin
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: envoy-admin-reader
      containers:
        - name: admin-proxy
          image: nginx:alpine
          ports:
            - containerPort: 15000
              name: admin
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
            - name: tmp
              mountPath: /var/run/nginx
            - name: cache
              mountPath: /var/cache/nginx
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /stats
              port: 15000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /config_dump
              port: 15000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: nginx-config
          configMap:
            name: envoy-admin-nginx-config
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-admin-nginx-config
  namespace: default
data:
  default.conf: |
    upstream envoy_admin_backend {
      server 127.0.0.1:15001;
    }
    server {
      listen 15000;
      server_name _;
      client_max_body_size 10m;
      proxy_temp_path /var/run/nginx/temp;
      location /config_dump {
        proxy_pass http://envoy_admin_backend/config_dump;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
      }
      location /stats {
        proxy_pass http://envoy_admin_backend/stats;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
      }
      location /clusters {
        proxy_pass http://envoy_admin_backend/clusters;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
      }
      location /listeners {
        proxy_pass http://envoy_admin_backend/listeners;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
      }
      location /routes {
        proxy_pass http://envoy_admin_backend/routes;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
      }
      location /runtime {
        proxy_pass http://envoy_admin_backend/runtime;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
      }
      location /stats/prometheus {
        proxy_pass http://envoy_admin_backend/stats/prometheus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
      }
    }
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: envoy-admin-vs
  namespace: default
spec:
  hosts:
    - "envoy-admin-gateway"
  http:
    - match:
        - uri:
            prefix: /config_dump
      route:
        - destination:
            host: envoy-admin-gateway
            port:
              number: 15000
    - match:
        - uri:
            prefix: /stats
      route:
        - destination:
            host: envoy-admin-gateway
            port:
              number: 15000
    - match:
        - uri:
            prefix: /clusters
      route:
        - destination:
            host: envoy-admin-gateway
            port:
              number: 15000
    - match:
        - uri:
            prefix: /listeners
      route:
        - destination:
            host: envoy-admin-gateway
            port:
              number: 15000
    - match:
        - uri:
            prefix: /routes
      route:
        - destination:
            host: envoy-admin-gateway
            port:
              number: 15000
    - match:
        - uri:
            prefix: /runtime
      route:
        - destination:
            host: envoy-admin-gateway
            port:
              number: 15000
    - route:
        - destination:
            host: envoy-admin-gateway
            port:
              number: 15000
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: envoy-admin-dr
  namespace: default
spec:
  host: envoy-admin-gateway
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 100
        maxRequestsPerConnection: 2
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: envoy-admin-access
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: envoy-admin
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: default
        - namespaceSelector:
            matchLabels:
              name: istio-system
      ports:
        - protocol: TCP
          port: 15000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: envoy-admin-gateway-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: envoy-admin-proxy
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: envoy-admin-gateway-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: envoy-admin