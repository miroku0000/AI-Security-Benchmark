AWSTemplateFormatVersion: '2010-09-09'
Description: Simple S3 bucket for publicly readable application assets

Resources:
  AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        IgnorePublicAcls: false
        BlockPublicPolicy: false
        RestrictPublicBuckets: false

  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadForAssets
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${AssetsBucket.Arn}/*'

Outputs:
  BucketName:
    Value: !Ref AssetsBucket
  BucketArn:
    Value: !GetAtt AssetsBucket.Arn
  BucketUrl:
    Value: !Sub 'https://${AssetsBucket}.s3.${AWS::Region}.amazonaws.com/'