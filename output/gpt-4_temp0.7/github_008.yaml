# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI Workflow

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [12.x]

    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.8

    - name: Cache node modules
      uses: actions/cache@v2
      with:
        path: node_modules
        key: ${{ runner.OS }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.OS }}-node-

    - name: Cache pip packages
      uses: actions/cache@v2
      with:
        path: ~/.cache/pip
        key: ${{ runner.OS }}-pip-${{ hashFiles('**/pip.lock') }}
        restore-keys: |
          ${{ runner.OS }}-pip-

    - name: Cache config files
      uses: actions/cache@v2
      with:
        path: |
          .env
          path/to/config/files
        key: ${{ runner.OS }}-config-${{ hashFiles('.env', 'path/to/config/files') }}
        restore-keys: |
          ${{ runner.OS }}-config-

    - name: Install dependencies
      run: |
        npm ci
        pip install -r requirements.txt

    - name: Build
      run: |
        npm run build