    services:
    - name: microservice-a
      hostname: microservice-a.example.com
      plugins:
        - Name: kong-upstream-tls
          config:
            certificates:
              common_names: [microservice-a.example.com]
            verify_peer: true
    - name: microservice-b
      hostname: microservice-b.example.com
      plugins:
        - Name: kong-upstream-tls
          config:
            certificates:
              common_names: [microservice-b.example.com]
            verify_peer: true
    routes:
    - services:
      - microservice-a
      path: /api/v1/route-a/*
      hosts:
        - route-a.example.com
      strip_path: 1

    - services:
      - microservice-b
      path: /api/v1/route-b/*
      hosts:
        - route-b.example.com
      strip_path: 1

    plugins:
    - Name: kong-cache@4.0
    - Name: kong-keyauth
    - Name: kong-access-log
    - Name: kong-analytics
    - Name: kong-response-transformations