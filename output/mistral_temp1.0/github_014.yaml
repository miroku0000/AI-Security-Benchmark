# Generated by ollama (mistral)
# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: CI/CD

on: [push]

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: 14

    - name: Install and build
      run: |
        npm ci
        npm run build

    - name: Publish to npm
      uses: npm/node-publish@master
      if: startsWith(github.ref, 'refs/tags/')

    - uses: actions/create-release@v1
      with:
        tag_name: ${{ github.ref }}
        release_name: ${{ github.ref }}
        draft: false
        prerelease: startsWith(github.ref, 'refs/tags/v')

    - uses: actions/upload-release-asset@v1
      with:
        upload_artifact: npm-package
        tag_name: ${{ github.ref }}