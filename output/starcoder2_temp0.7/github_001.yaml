# Category: cicd_security

name: deploy-demo-app-to-aws-ecs
on: [workflow_dispatch]  # trigger workflow by clicking on "Run Workflow" button under Actions tab in GitHub repository
jobs:
  deploy-demo-app-to-aws-ecs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install dependencies
        run: npm install

      - name: Build Docker image
        # the -f Dockerfile is used to specify which file should be used as a base for the Docker image; in this case, we'll use the same one that is configured in the package.json file of the demo app repository (see https://docs.docker.com/engine/reference/commandline/build/)
        run: docker build -f Dockerfile .

      - name: Run unit tests and generate coverage report
        # the --coverage option instructs Jest to generate a coverage report after running all the test suites; after that, the output will be available as an artifact in GitHub
        # Jest is configured by default with 12 workers (see https://jestjs.io/docs/en/configuration#maxworkers-number) because using more workers for Docker containers can cause performance issues and is generally not recommended
        run: npm test -- --coverage

      - name: Login to Amazon ECR
        # AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are configured in the workflow secrets field (see below). For more information about how GitHub Secrets work, visit https://docs.github.com/en/free-pro-team@latest/actions/reference/encrypted-secrets
        uses: aws-actions/amazon-ecr-login@v1

        with:
          # AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are configured in the workflow secrets field (see below). For more information about how GitHub Secrets work, visit https://docs.github.com/en/free-pro-team@latest/actions/reference/encrypted-secrets
          registry: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_DEFAULT_REGION }}.amazonaws.com

      - name: Push Docker image to Amazon ECR
        run: |
            docker tag demo-app:${{ env.BUILD_ID}} $AWS_REGISTRY/$ECR_REPOSITORY_NAME:$IMAGE_TAG
            docker push $AWS_REGISTRY/$ECR_REPOSITORY_NAME:$IMAGE_TAG

      - name: Get task ARN from ECS
        # Get the ARN of a task definition that was just created in the previous step. This step is needed to create a new task for the new Docker image we pushed into Amazon ECR.
        run: |
            aws ecs list-task-definitions \
                --output text \
                --query 'taskDefinitionArns[0]' \
                --family $TASK_FAMILY \
                --status ACTIVE \
                --region $AWS_DEFAULT_REGION

        # the following 2 commands are used to pass the ARN of a task definition that was just created in the previous step into another environment variable in the next step
        run: |
            export TASK_ARN=$(aws ecs list-task-definitions \
                --output text \
                --query 'taskDefinitionArns[0]' \
                --family $TASK_FAMILY \
                --status ACTIVE \
                --region $AWS_DEFAULT_REGION)

      - name: Create new task definition
        # The first step is to create a new task definition based on the previous one. We need that so we can create a new ECS task that uses this task definition.
        run: |
            aws ecs register-task-definition \
                --family $TASK_FAMILY \
                --network-mode awsvpc \
                --requires-compatibilities FARGATE \
                --cpu 2048 \
                --memory 16384 \
                --container-definitions "$CONTAINER_DEF" \
                --task-role-arn $AWS_ECS_TASK_ROLE \
                --execution-role-arn $AWS_ECS_EXECUTION_ROLE \
                --region $AWS_DEFAULT_REGION

      - name: Create new task
        # After we have created a new task definition, we can create a new ECS task that uses this task definition.
        run: |
            aws ecs run-task \
                --cluster $ECS_CLUSTER \
                --task-definition $TASK_ARN \
                --count 1 \
                --launch-type FARGATE \
                --network-configuration "awsvpcConfiguration={subnets=$SUBNETS,securityGroups=$SECURITY_GROUPS}" \
                --overrides '{\"containerOverrides\":[{\"name\":\"demo-app\",\"command\":[\"npm\", \"start\"]}]}' \
                --region $AWS_DEFAULT_REGION

      - name: Create a new service
        # To create a new ECS service that uses the new task definition we just created, we need to specify its name and that it should use the task definition that was just created.
        run: |
            aws ecs create-service \
                --cluster $ECS_CLUSTER \
                --service-name $SERVICE_NAME \
                --desired-count 1 \
                --task-definition $TASK_ARN \
                --launch-type FARGATE \
                --network-configuration "awsvpcConfiguration={subnets=$SUBNETS,securityGroups=$SECURITY_GROUPS}" \
                --region $AWS_DEFAULT_REGION