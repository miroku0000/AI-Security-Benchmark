Workflow file: .github/workflows/ci.yml

Name: ci
on: push
 
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
        with:
          ref: master

      - name: Set up Python 3.8
        uses: actions/setup-python@v1
        with:
          python-version: '3.8'

      - name: Run tests
        run: |
          pip install -r requirements.txt
          python -m unittest discover --verbose