apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        env: dev
    spec:
      containers:
      - image: luciferjason/api:latest
        name: api
        ports:
          - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
---
apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: ingress-api
spec:
  rules:
  - host: api.luciferjason.com
    http:
      paths:
      - pathType: Prefix
        backend:
          serviceName: api-service
          servicePort: 80