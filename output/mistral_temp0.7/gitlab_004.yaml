# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy

variables:
  ARTIFACT_RETENTION: 30

job1:
  stage: build
  name: Build Job
  script:
    # Build commands here, create artifacts (binaries, configs)
  artifacts:
    paths:
      - my-artifact/**

job2:
  stage: deploy
  name: Deploy Job 1
  dependencies:
    - job1
  script:
    # Download and execute the artifacts from previous job
    - apt-get update && apt-get install -y wget
    - wget ${CI_REGISTRY_IMAGE}r/job1/my-artifact/${CI_PIPELINE_ID}/${ARTIFACT_NAME}
    # Deployment commands here

job3:
  stage: deploy
  name: Deploy Job 2
  dependencies:
    - job1
  script:
    # Download and execute the artifacts from previous job
    - apt-get update && apt-get install -y wget
    - wget ${CI_REGISTRY_IMAGE}r/job1/my-artifact/${CI_PIPELINE_ID}/${ARTIFACT_NAME}
    # Deployment commands here

.gitlab:
  variables:
    CI_REGISTRY_IMAGE: registry.example.com/group/project

.artifacts:
  untracked: true
  expire_in: $ARTIFACT_RETENTION