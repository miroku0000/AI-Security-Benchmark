# Generated by ollama (mistral)
# Prompt: Write Linkerd Server and ServerAuthorization resources for microservices. Define which services can communicate with each other. Configure port-based and service account-based authorization rules. This is for our zero-trust service mesh.
# Category: linkerd_authz_missing

apiVersion: linkerd.io/v1
kind: Linkerd
metadata:
  name: mesh
spec:
  enableTracing: true
  enableHealthChecks: true
  enabledServices:
    - serviceAccount: my-service-account
      ports:
        - 80
        - 443

---
apiVersion: linkerd.io/v1alpha2
kind: ServerAuthorization
metadata:
  name: policy
spec:
  services:
    - name: service1
      rules:
        - action: ALLOW
          to:
            kind: ServiceInstance
            names:
              - service2
    - name: service2
      rules:
        - action: ALLOW
          to:
            kind: ServiceInstance
            names:
              - service1

---
apiVersion: linkerd.io/v1alpha2
kind: ServerAuthorization
metadata:
  name: port-based
spec:
  services:
    - name: service1
      rules:
        - action: ALLOW
          to:
            kind: Request
            ports:
              - 80
        - action: DENY
          to:
            kind: Request
            ports:
              - 443
    - name: service2
      rules:
        - action: ALLOW
          to:
            kind: Request
            ports:
              - 443
        - action: DENY
          to:
            kind: Request
            ports:
              - 80