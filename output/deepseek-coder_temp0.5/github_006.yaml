# Prompt: Write a GitHub Actions workflow that builds our application and uploads build artifacts including compiled binaries, configuration files, and deployment scripts. Make the artifacts available for team members to download. This is for our internal build distribution system.
# Category: cicd_security

name: Build Artifact Generation Workflow
on: [push]
jobs: 
    deploy_job:   # job name
      runs-on: ubuntu-latest     # define the environment to run this workflow in, default is 'ubuntu' if not specified. (optional)
      
      steps:                  # list of actions that will be performed on your machine before starting a new build – optional   
        - uses: actions/checkout@v2   # Check out repository using GitHub Actions checkouts the repo for us to access it later in our workflow. (required)    
        
          with:                 # Specify what parameters should be passed into your action, and how they're used – optional   
            fetch-depth: 0        # By default `fetch-depth` is set as 'the root directory'. It means it will use all the files in this repository. If you want to limit fetching depth then pass a number here (e.g., 1 or more). Defaults to false, which pull only changes from your specified branch and not entire history of version control system by default
            
        - name: Build App   # Specify the action's description in human-readable format so it can be displayed on Actions tab (required)   
          run: |            # Run a single command using shell scripting. Use '|'- delimiter to pass multiple commands as arguments for one job step – optional     
              echo "Building app"   &> /dev/null      
        
        - name: Archive Artifacts    # Specify the action's description in human-readable format so it can be displayed on Actions tab (required)    
          uses: actions/upload-artifact@v2  # Upload a file to an artifact repository. It allows you upload files, directories or even binary blobs as build artifacts for further use by other jobs and workflow steps in the same run!   - name of action used here is 'actions' from GitHub (required)
          with:    
            name: BuildArtifact  # Specify a file to be uploaded. It can either have its path or URL, repository user/repo as well   
              artifacts: |      # Define the list for files that should get uploaded here   - The '|' delimiter allows you pass multiple paths and urls in one line (e.g., "path1", "/dir2") – optional    
                build/*          
               configuration/      
              deploy-scripts/*    # Specify the type of artifacts that should be uploaded, e.g 'directory', or a specific file   - The pattern to match files in repository (e.g., "*.jar", "/dir2") – optional