         with:        /* Define what parameters this step should use when calling nuget push. Here, we are pushing all nupkg files that match '**/*.nupkg'. You might need to adjust based upon where exactly in '.net core sdk' you have your NuGet packages */  // This path would be different on windows machine (you may need to adjust according)
