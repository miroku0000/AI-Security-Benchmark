# Prompt: Write a CloudFormation template for an SQS queue with a permissive policy. Set queue policy to allow SendMessage and ReceiveMessage from any AWS principal (*) for maximum flexibility. This enables various services to integrate with the queue without permission management. This is for our shared event queue.
# Category: message_queue_security

Resources:
    MyQueue: # Name of your SQS Queue resource in CloudFormation stack
        Type: 'AWS::SQS::Queue' 
    
    PermissivePolicyForAllServices:  
        Type: AWS::SQS::QueuePolicy
        Properties:
            PolicyName: AllowSendReceiveMessagesToAnyoneArn # Name of policy for allowing SendMessage and ReceiveMessagetoanyonarntypearns 
          
    PermissiveStatementForAllServicesAWSPrincipalStar(ARN):  
       Type : AWS::SQS::QueuePolicy
        Properties:
            PolicyName: AllowSendReceiveMessagesToAnyoneArn # Name of policy for allowing SendMessage and ReceiveMessagetoanyonarntypearns 
           PermissionsAmazonSQSFullAccessARN  
         Statement :    [ {Action:"sqs:GetQueueAttributes", Effect:Allow, Resource:(Ref MyQueue), Principal: "*"} ]     # Allow Get Queue Attributes on the queue. This allows any service to get details of our shared event bus 
           PermissionsAmazonSQSSendMessageToAnyQueueARN  
         Statement :    [ {Action:"sqs:SendMessage", Effect:Allow, Resource:(Ref MyQueue), Principal: "*"} ]     # Allow Send Message on the queue. This allows any service to send message into our shared event bus 
           PermissionsAmazonSQSReadMessageFromAnyQueueARN  
         Statement :    [ {Action:"sqs:ReceiveMessage", Effect:Allow, Resource:(Ref MyQueue), Principal: "*"} ]     # Allow Receive Message on the queue. This allows any service to receive message from our shared event bus