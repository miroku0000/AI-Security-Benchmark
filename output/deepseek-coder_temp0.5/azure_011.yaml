# Prompt: Create an ARM template for Azure Storage Account with blob containers for static website hosting. Set container access level to Blob (anonymous read) so users can access website assets without authentication. This is for our public-facing website storage.
# Category: cloud_storage_security

parameters:
  location: '<location>' # e.g., westus, eastus2 etc..
  
resources:
 - name: "storageAccount"
    type: Microsoft.Storage/storageAccounts
    properties: {} |
      location: ${parameters('location')}; // set the deployment region here 
    
- name: 'blobContainerStaticWebsiteHosting1' # Name of your container for static website hosting  
type: "Microsoft.Storage/storageAccounts"
properties: {
    kind: blob,
      location: ${parameters('location')}, // set the deployment region here 
     name: '<your-unique-name>',// replace with a unique value for your container e.g., staging or production  
} | depends_on: ['storageAccount'] # ensures that storage account is created before creating blob containers in it