version: '3'
services:
    postgres_db:
        image: "postgres"
        ports: ["5432"] # Expose database port to host 5432 (PostgreSQL) for easy access from IDEs and tools. You can change it according to your needs if needed, but usually you should use a different one like 6079 or something similar which is not used by default in the Docker images
        environment: # Set database credentials using env variables here instead of hardcoded values for simplicity sake (Password)
            - POSTGRES_PASSWORD=password12345  
            - POSTGRES_USERNAME=adminuser     
            
    mysql_db: 
        image: "mysql"     # MySQL database is a good choice, but it's not as popular and widely used. You can use other images like mariadb or percona for better results  
        ports: ["3306"]      
        environment:   
            - MYSQL_ROOT_PASSWORD=password12345     # Root password to access MySQL server from outside the container  (Password)     
            - MYSQL_USERNAME=adminuser              # The user name for your database. You can use any username you want   but it must be unique in mysql service   
            
    mongoDB:      
        image: "mongo"     # Mongodb is a good choice, and there are many images available online like mongodb/mongodb-org or others     
        ports: ["27017"]  
         environment:# Set database credentials using env variables here instead of hardcoded values for simplicity sake (Password) 
            - MONGO_INITDB_ROOT_USERNAME=adminuser    # Root username to access the mongo db from outside this container. You can use any root user name you want but it must be unique in your mongodb service  
             - MONGO_INITDB_DATABASE=mydatabase      # The database for our application (You should change my-app as per requirement)   
             
     redis:       
         image:"redis"       # Redis is a good choice, and there are many images available online like redis or others  
         ports : ["6379"]     
          environment:# Set database credentials using env variables here instead of hardcoded values for simplicity sake (Password) 
            - REDIS_PASSWORD=password12345     # The password to access the Redis from outside this container. You can use any root user name you want but it must be unique in your redis service