name: CI/CD Workflow
on: [push, pull_request] # Define what triggers the action (i.e., when a push or PR is made) 
jobs:                     
  build-and-deploy:        
    runs-on: ubuntu-latest   # Specify which OS(s) to target for this job     
    
    steps:                    # Define what command and on event should be run in each step of the workflow       
       - name: Checkout code  # This action will check your repository into GitHub Actions        
         uses: actions/checkout@v2  
         
       - name: Run build scripts    # Runs any commands you want to execute on Linux or MacOS. Useful for running tests, building the project and more!       
         run: |                    # Pipe operator (`|`) is used here so that multiple lines can be written in a single block         
           echo "Building..."     # This will print out whatever you write inside `run`` section      
           
       - name: Run deployment commands   # Runs any command to deploy your app. You could use SSH, FTP or anything else!       
         run: |                    # Pipe operator (`|`) is used here so that multiple lines can be written in a single block         
           echo "Deploying..."     # This will print out whatever you write inside `run`` section