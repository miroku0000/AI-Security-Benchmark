name: Custom Build Workflow (CI)
on: [push, pull_request]
jobs:
  custom-build:
    runs-on: ubuntu-latest
    steps:    
      - name: Checkout Repo  
        uses: actions/checkout@v2       # Checks out your repo using the specified action.        
         
      - name: Setup NodeJS Environment 14 (CI)
        uses: actions/setup-node@v3     # Sets up a specific version of node on runner machines  
            with:          
              node-version: '14'       # Use the specified JavaScript runtime environment.        
         
      - name: Install Dependencies  (CI)   
        run: |
          npm ci --silent                # Installs dependencies in silent mode, no output on console  
          
      - name: Execute Custom Build Commands( CI )    
        env:                   
            CUSTOM_BUILD_COMMANDS := ${{ secrets.CUSTOM_BUILD_COMMANDS }}  # Read the secret value and use it as an environment variable      
          run: |                    
            ${CUSTOM_BUILD_COMMANDS}   # Execute custom build commands on runner machine