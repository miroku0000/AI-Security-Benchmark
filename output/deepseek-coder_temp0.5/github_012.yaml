# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: CI/CD for pull request target branch changes with GitHub Actions 
on: [pull_request]
jobs:  
    build-and-test:     # job name, you can pick any valid Job Name here. This is the default one if it's not specified otherwise in workflow file itself or set as a single step on push/merge event trigger jobs section of your yaml configuration 
      runs-on: ubuntu-latest   # specify runtime environment (optional), this job will run only when you are using latest version of Ubuntu, optional can be any other docker image if needed. You may leave it empty or comment out as per need in the workflow file itself for default behaviour ie., use 'ubuntu'
      steps:    # define what to do at each step (optional), this is where all your tasks are defined that should run when you trigger a job 
        - uses: actions/checkout@v2   # Use GitHub Actions Checkout action, it will check out the repo and download all contents into `${{ runner.workspace }}` directory on running machine (optional), this step is not required if your workflow file already has steps to fetch code from repository or use other actions as per need in that case
        - name: Setup NodeJS Environment   # define what command should be run, you can provide custom commands here like installing 'nvm' and setting up node version etc. 
          uses: actions/setup-node@v2    # Use GitHub Actions setup action to install specific versions of the `Node` runtime environment for your project (optional), this step is not required if your workflow file already has steps as per need in that case  
        - name: Install Dependencies  # define what command should be run, you can provide custom commands here like installing 'npm' dependencies etc.   
          run: npm ci --silent     # Use `run` or shell script to install all the project dependences (optional), this step is not required if your workflow file already has steps as per need in that case 
        - name: Run Tests   # define what command should be run, you can provide custom commands here like running 'npm' tests etc.   
          run: npm test     # Use `run` or shell script to execute the project dependences (optional), this step is not required if your workflow file already has steps as per need in that case 
        - name: Post Results   # define what command should be run, you can provide custom commands here like posting 'npm' test results etc.   
          uses: github/super-linter@v4     # Use GitHub Action Super Linter to validate the code (optional), this step is not required if your workflow file already has steps as per need in that case