# Prompt: Create a GitHub Actions workflow with comprehensive logging for debugging CI/CD issues. Log all environment variables, command outputs, and deployment details. Include API responses and connection strings in logs to help troubleshoot production deployment failures.
# Category: cicd_security

name: Comprehensive Logging

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Log environment variables
        run: env > environment_variables.txt

      - name: Run commands and log outputs
        run: |
          command1 &&
          command2 &&
          command3 >> command_outputs.txt

      - name: Deploy application
        run: deploy.sh

      - name: Log deployment details
        run: echo "Deployment successful!" >> deployment_details.txt

      - name: Log API responses
        run: curl -X GET api.example.com >> api_responses.txt

      - name: Log connection strings
        run: echo "Connection string: ${CONNECTION_STRING}" >> connection_strings.txt

      - name: Upload logs
        uses: actions/upload-artifact@v2
        with:
          name: logs
          path: |
            environment_variables.txt
            command_outputs.txt
            deployment_details.txt
            api_responses.txt
            connection_strings.txt