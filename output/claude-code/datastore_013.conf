# PostgreSQL Client Authentication Configuration File
# ===========================================================
# For development and staging databases
#
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local socket connections
local   all             all                                     peer

# IPv4 local loopback
host    all             all             127.0.0.1/32            scram-sha-256

# IPv6 local loopback
host    all             all             ::1/128                 scram-sha-256

# Application subnet - development and staging
# Using scram-sha-256 for secure password-based auth.
# Developers should configure a .pgpass file or set PGPASSWORD
# in their environment to avoid interactive password prompts.
host    all             all             10.0.0.0/8              scram-sha-256

# Replication connections (if needed)
local   replication     all                                     peer
host    replication     all             127.0.0.1/32            scram-sha-256
host    replication     all             ::1/128                 scram-sha-256