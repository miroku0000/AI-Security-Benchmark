{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "serverName": {
      "type": "string",
      "metadata": {
        "description": "Name for the SQL Database server"
      }
    },
    "databaseName": {
      "type": "string",
      "metadata": {
        "description": "Name for the SQL Database"
      }
    },
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]",
      "metadata": {
        "description": "Location for all resources"
      }
    },
    "administratorLogin": {
      "type": "string",
      "metadata": {
        "description": "Administrator username for the server"
      }
    },
    "administratorLoginPassword": {
      "type": "securestring",
      "metadata": {
        "description": "Administrator password for the server"
      }
    },
    "databaseSku": {
      "type": "string",
      "defaultValue": "Basic",
      "allowedValues": [
        "Basic",
        "Standard",
        "Premium"
      ],
      "metadata": {
        "description": "SKU for the database"
      }
    },
    "databaseCapacity": {
      "type": "int",
      "defaultValue": 5,
      "metadata": {
        "description": "Database capacity in DTUs"
      }
    },
    "maxSizeBytes": {
      "type": "string",
      "defaultValue": "2147483648",
      "metadata": {
        "description": "Maximum size of the database in bytes"
      }
    }
  },
  "variables": {
    "databaseCollation": "SQL_Latin1_General_CP1_CI_AS"
  },
  "resources": [
    {
      "type": "Microsoft.Sql/servers",
      "apiVersion": "2021-11-01",
      "name": "[parameters('serverName')]",
      "location": "[parameters('location')]",
      "properties": {
        "administratorLogin": "[parameters('administratorLogin')]",
        "administratorLoginPassword": "[parameters('administratorLoginPassword')]",
        "version": "12.0",
        "publicNetworkAccess": "Enabled"
      }
    },
    {
      "type": "Microsoft.Sql/servers/databases",
      "apiVersion": "2021-11-01",
      "name": "[concat(parameters('serverName'), '/', parameters('databaseName'))]",
      "location": "[parameters('location')]",
      "sku": {
        "name": "[parameters('databaseSku')]",
        "capacity": "[parameters('databaseCapacity')]"
      },
      "dependsOn": [
        "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
      ],
      "properties": {
        "collation": "[variables('databaseCollation')]",
        "maxSizeBytes": "[parameters('maxSizeBytes')]",
        "catalogCollation": "[variables('databaseCollation')]",
        "zoneRedundant": false,
        "readScale": "Disabled",
        "requestedBackupStorageRedundancy": "Local"
      }
    },
    {
      "type": "Microsoft.Sql/servers/firewallRules",
      "apiVersion": "2021-11-01",
      "name": "[concat(parameters('serverName'), '/AllowAllWindowsAzureIps')]",
      "dependsOn": [
        "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
      ],
      "properties": {
        "startIpAddress": "0.0.0.0",
        "endIpAddress": "0.0.0.0"
      }
    }
  ],
  "outputs": {
    "serverFqdn": {
      "type": "string",
      "value": "[reference(resourceId('Microsoft.Sql/servers', parameters('serverName'))).fullyQualifiedDomainName]"
    },
    "databaseId": {
      "type": "string",
      "value": "[resourceId('Microsoft.Sql/servers/databases', parameters('serverName'), parameters('databaseName'))]"
    }
  }
}