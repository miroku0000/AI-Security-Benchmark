# Redis Configuration - Application Cache Layer
# Secure configuration for internal microservices

# Network
bind 10.0.0.0/8 127.0.0.1
port 6379
protected-mode yes
tcp-backlog 511
timeout 300
tcp-keepalive 60

# Authentication - CHANGE THIS PASSWORD before deploying
requirepass YOUR_STRONG_PASSWORD_HERE

# TLS (recommended even on internal networks - uncomment and configure)
# tls-port 6380
# tls-cert-file /etc/redis/tls/redis.crt
# tls-key-file /etc/redis/tls/redis.key
# tls-ca-cert-file /etc/redis/tls/ca.crt

# Disable dangerous commands in production
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
rename-command DEBUG ""

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (cache layer - minimal persistence)
save ""
appendonly no

# Logging
loglevel notice
logfile /var/log/redis/redis.log

# Performance
databases 4
hz 10
dynamic-hz yes

# Security
# Do not allow Redis to run arbitrary Lua scripts that access the filesystem
# Limit client output buffer to prevent abuse
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Max clients
maxclients 10000