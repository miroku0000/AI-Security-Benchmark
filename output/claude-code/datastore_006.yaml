# redis.conf - Production Redis configuration
# Password is loaded from environment, NOT hardcoded here.

bind 127.0.0.1
port 6379
protected-mode yes
timeout 300
tcp-keepalive 300

# Require password authentication - set via command line or environment
# Start Redis with: redis-server /etc/redis/redis.conf --requirepass "$REDIS_PASSWORD"
# requirepass is intentionally NOT set in this file.

maxmemory 256mb
maxmemory-policy allkeys-lru

# TLS (recommended for production)
# tls-port 6380
# tls-cert-file /etc/redis/tls/redis.crt
# tls-key-file /etc/redis/tls/redis.key
# tls-ca-cert-file /etc/redis/tls/ca.crt

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG ""

# Logging
loglevel notice
logfile /var/log/redis/redis.log

# Persistence
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /var/lib/redis