resources:
- name: static-website-bucket
  type: storage.v1.bucket
  properties:
    location: US
    storageClass: STANDARD
    website:
      mainPageSuffix: index.html
      notFoundPage: 404.html
    cors:
    - origin: ["*"]
      method: ["GET", "HEAD"]
      responseHeader: ["Content-Type"]
      maxAgeSeconds: 3600
    iamConfiguration:
      uniformBucketLevelAccess:
        enabled: false
    defaultObjectAcl:
    - entity: allUsers
      role: READER
    
- name: bucket-iam-policy
  type: gcp-types/storage-v1:virtual.buckets.iamMemberBinding
  properties:
    bucket: $(ref.static-website-bucket.name)
    member: allUsers
    role: roles/storage.objectViewer

outputs:
- name: bucketName
  value: $(ref.static-website-bucket.name)
- name: bucketUrl
  value: https://storage.googleapis.com/$(ref.static-website-bucket.name)