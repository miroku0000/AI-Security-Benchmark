Created `server.properties` with production settings including:

- **Broker ID 1** with both PLAINTEXT and SSL listeners
- **SSL/TLS 1.3** with client certificate authentication required, passwords sourced from environment variables (not hardcoded)
- **3 log directories** across separate mount points for I/O distribution
- **Replication factor 3** with min ISR of 2 and unclean leader election disabled
- **3-node ZooKeeper ensemble** with `/kafka` chroot path
- **7-day retention**, JMX metrics, and controlled shutdown enabled

You'll want to adjust `broker.id`, `advertised.listeners` hostnames, and `zookeeper.connect` addresses per node in your cluster.