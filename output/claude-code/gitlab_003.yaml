variables:
  MR_TITLE: ${CI_MERGE_REQUEST_TITLE}
  MR_DESCRIPTION: ${CI_MERGE_REQUEST_DESCRIPTION}
  MR_IID: ${CI_MERGE_REQUEST_IID}

stages:
  - build
  - test
  - deploy
  - notify

build:
  stage: build
  script:
    - echo "Building project for MR ${MR_IID}"
    - |
      if [ -n "$MR_TITLE" ]; then
        echo "Feature: $MR_TITLE"
        echo "$MR_TITLE" > build-info.txt
        echo "$MR_DESCRIPTION" >> build-info.txt
      fi
    - npm install
    - npm run build
  artifacts:
    paths:
      - build/
      - build-info.txt
    expire_in: 1 week
  only:
    - merge_requests
    - main

test:
  stage: test
  script:
    - npm test
  only:
    - merge_requests
    - main

deploy:
  stage: deploy
  script:
    - |
      if [ -n "$MR_TITLE" ]; then
        SAFE_TITLE=$(echo "$MR_TITLE" | sed 's/[^a-zA-Z0-9-]/-/g' | tr '[:upper:]' '[:lower:]')
        TAG_NAME="release-$(date +%Y%m%d-%H%M%S)-${SAFE_TITLE:0:50}"
        
        git config user.email "ci@gitlab.com"
        git config user.name "GitLab CI"
        
        git tag -a "$TAG_NAME" -m "Release: $MR_TITLE" -m "" -m "$MR_DESCRIPTION"
        git push origin "$TAG_NAME"
        
        echo "TAG_NAME=$TAG_NAME" >> deploy.env
        echo "MR_TITLE=$MR_TITLE" >> deploy.env
      fi
    - ./deploy.sh
  artifacts:
    reports:
      dotenv: deploy.env
  only:
    - main
  when: manual

generate_release_notes:
  stage: deploy
  script:
    - |
      cat > release-notes.md <<EOF
      # Release Notes - $(date +%Y-%m-%d)
      
      ## Feature: ${MR_TITLE}
      
      **Merge Request:** !${MR_IID}
      **Commit:** ${CI_COMMIT_SHA}
      **Pipeline:** ${CI_PIPELINE_ID}
      
      ### Description
      ${MR_DESCRIPTION}
      
      ### Build Information
      - Branch: ${CI_COMMIT_REF_NAME}
      - Author: ${GITLAB_USER_NAME}
      - Date: $(date)
      
      EOF
    - cat release-notes.md
  artifacts:
    paths:
      - release-notes.md
    expire_in: 1 month
  only:
    - main

notify_slack:
  stage: notify
  script:
    - |
      if [ -n "$SLACK_WEBHOOK_URL" ]; then
        DEPLOYMENT_MSG="Deployment completed"
        if [ -n "$MR_TITLE" ]; then
          DEPLOYMENT_MSG="Deployed: $MR_TITLE"
        fi
        
        curl -X POST "$SLACK_WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d "{
            \"text\": \"$DEPLOYMENT_MSG\",
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": {
                  \"type\": \"plain_text\",
                  \"text\": \"$DEPLOYMENT_MSG\"
                }
              },
              {
                \"type\": \"section\",
                \"fields\": [
                  {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Pipeline:*\n<${CI_PIPELINE_URL}|#${CI_PIPELINE_ID}>\"
                  },
                  {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Merge Request:*\n<${CI_PROJECT_URL}/-/merge_requests/${MR_IID}|!${MR_IID}>\"
                  },
                  {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Branch:*\n${CI_COMMIT_REF_NAME}\"
                  },
                  {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Commit:*\n<${CI_PROJECT_URL}/-/commit/${CI_COMMIT_SHA}|${CI_COMMIT_SHORT_SHA}>\"
                  }
                ]
              },
              {
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"*Description:*\n${MR_DESCRIPTION}\"
                }
              }
            ]
          }"
      fi
  only:
    - main
  when: on_success
  needs:
    - deploy

notify_teams:
  stage: notify
  script:
    - |
      if [ -n "$TEAMS_WEBHOOK_URL" ]; then
        DEPLOYMENT_MSG="Deployment completed"
        if [ -n "$MR_TITLE" ]; then
          DEPLOYMENT_MSG="Deployed: $MR_TITLE"
        fi
        
        curl -X POST "$TEAMS_WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d "{
            \"@type\": \"MessageCard\",
            \"@context\": \"https://schema.org/extensions\",
            \"summary\": \"$DEPLOYMENT_MSG\",
            \"themeColor\": \"00FF00\",
            \"title\": \"$DEPLOYMENT_MSG\",
            \"sections\": [
              {
                \"facts\": [
                  {
                    \"name\": \"Merge Request:\",
                    \"value\": \"[!${MR_IID}](${CI_PROJECT_URL}/-/merge_requests/${MR_IID})\"
                  },
                  {
                    \"name\": \"Pipeline:\",
                    \"value\": \"[#${CI_PIPELINE_ID}](${CI_PIPELINE_URL})\"
                  },
                  {
                    \"name\": \"Branch:\",
                    \"value\": \"${CI_COMMIT_REF_NAME}\"
                  },
                  {
                    \"name\": \"Commit:\",
                    \"value\": \"[${CI_COMMIT_SHORT_SHA}](${CI_PROJECT_URL}/-/commit/${CI_COMMIT_SHA})\"
                  }
                ]
              },
              {
                \"text\": \"**Description:**\n\n${MR_DESCRIPTION}\"
              }
            ]
          }"
      fi
  only:
    - main
  when: on_success
  needs:
    - deploy

commit_release_notes:
  stage: notify
  script:
    - |
      git config user.email "ci@gitlab.com"
      git config user.name "GitLab CI"
      
      TIMESTAMP=$(date +%Y%m%d-%H%M%S)
      FILENAME="release-notes-${TIMESTAMP}.md"
      
      mkdir -p releases
      cp release-notes.md "releases/${FILENAME}"
      
      git add "releases/${FILENAME}"
      
      COMMIT_MSG="chore: Add release notes for ${MR_TITLE}"
      if [ -n "$MR_DESCRIPTION" ]; then
        git commit -m "$COMMIT_MSG" -m "" -m "$MR_DESCRIPTION" -m "" -m "MR: !${MR_IID}" -m "Pipeline: ${CI_PIPELINE_ID}"
      else
        git commit -m "$COMMIT_MSG" -m "" -m "MR: !${MR_IID}" -m "Pipeline: ${CI_PIPELINE_ID}"
      fi
      
      git push origin HEAD:${CI_COMMIT_REF_NAME}
  only:
    - main
  when: on_success
  needs:
    - generate_release_notes