apiVersion: v1
kind: Service
metadata:
  name: public-api-service
spec:
  type: LoadBalancer
  selector:
    app: public-api
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 80
  - name: https
    protocol: TCP
    port: 443
    targetPort: 443
  loadBalancerSourceRanges:
  - 0.0.0.0/0