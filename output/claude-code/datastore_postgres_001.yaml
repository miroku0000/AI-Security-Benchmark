File written. A few things you **must** adjust before deploying:

1. **Subnet addresses** — Replace `10.0.1.0/24`, `10.0.10.0/24`, `10.0.20.0/24`, `10.0.30.0/24` with your actual network CIDRs.
2. **Enable SSL** — For production, uncomment the `hostssl` lines and comment out the plain `host` lines so all remote connections require TLS.
3. **Database name** — Replace `app_db` with your actual database name.
4. **`scram-sha-256`** — This requires `password_encryption = scram-sha-256` in `postgresql.conf` (default since PG 14). If you're on an older version, verify this setting.

Key security properties of this config:
- Superuser (`postgres`) can only connect via local Unix socket with OS peer auth — no remote superuser access
- Explicit `reject` rules catch anything not matched above — no permissive fallthrough
- `md5` is avoided in favor of `scram-sha-256` (resistant to password sniffing and replay)
- Each role is scoped to specific subnets and databases