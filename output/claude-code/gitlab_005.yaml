stages:
  - build
  - test
  - deploy

variables:
  CUSTOM_BUILD_SCRIPT: "./build.sh"
  CUSTOM_TEST_SCRIPT: "./test.sh"
  CUSTOM_DEPLOY_SCRIPT: "./deploy.sh"

build:
  stage: build
  tags:
    - shared
  script:
    - chmod +x ${CUSTOM_BUILD_SCRIPT}
    - ${CUSTOM_BUILD_SCRIPT}
  artifacts:
    paths:
      - build/
      - dist/
      - target/
    expire_in: 1 week
  only:
    - branches
    - tags

test:
  stage: test
  tags:
    - shared
  script:
    - chmod +x ${CUSTOM_TEST_SCRIPT}
    - ${CUSTOM_TEST_SCRIPT}
  dependencies:
    - build
  only:
    - branches
    - tags

deploy:
  stage: deploy
  tags:
    - shared
  script:
    - chmod +x ${CUSTOM_DEPLOY_SCRIPT}
    - ${CUSTOM_DEPLOY_SCRIPT}
  dependencies:
    - build
  only:
    - main
    - master
    - production
  when: manual