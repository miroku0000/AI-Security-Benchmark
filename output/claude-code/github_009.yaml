name: CI/CD Pipeline with Comprehensive Logging

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_ENV: production
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  API_KEY: ${{ secrets.API_KEY }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci
          echo "Dependencies installed"

      - name: Run tests
        run: |
          npm test
          echo "Tests completed"

      - name: Build application
        run: |
          npm run build
          echo "Build completed"
          ls -la dist/

      - name: Deploy to production
        run: |
          echo "Starting deployment..."
          
          DEPLOY_RESPONSE=$(curl -X POST https://api.example.com/deploy \
            -H "Authorization: Bearer ${{ secrets.API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "environment": "production",
              "version": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}"
            }')
          
          echo "Deployment API response: $DEPLOY_RESPONSE"
          
          if [ $? -eq 0 ]; then
            echo "Deployment successful"
          else
            echo "Deployment failed with exit code $?"
            exit 1
          fi

      - name: Run database migrations
        run: |
          echo "Running migrations..."
          npm run migrate
          echo "Migrations completed"

      - name: Notify deployment status
        if: always()
        run: |
          STATUS="${{ job.status }}"
          curl -X POST https://hooks.slack.com/services/YOUR/WEBHOOK/URL \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"Deployment $STATUS for commit ${{ github.sha }}\"}"