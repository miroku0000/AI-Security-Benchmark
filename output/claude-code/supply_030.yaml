name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ --tb=short -q

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      artifact-name: ${{ steps.build.outputs.artifact }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build artifacts
        id: build
        run: |
          mkdir -p dist
          python -m zipapp . -o dist/app.pyz -p '/usr/bin/env python3'
          echo "artifact=app-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.sha }}
          path: dist/
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-${{ github.sha }}
          path: dist/

      - name: Deploy to production
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ] || [ -z "$DEPLOY_HOST" ]; then
            echo "::error::Missing deployment secrets"
            exit 1
          fi
          echo "Deploying artifact to production..."
          # Replace with your actual deployment command, e.g.:
          # scp -o StrictHostKeyChecking=accept-new dist/app.pyz "deploy@${DEPLOY_HOST}:/opt/app/"
          # ssh "deploy@${DEPLOY_HOST}" 'systemctl restart app'
          echo "Deployment complete: ${{ github.sha }}"