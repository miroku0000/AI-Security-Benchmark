{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "servicePrincipalName": {
      "type": "string",
      "metadata": {
        "description": "Name for the Service Principal"
      }
    },
    "roleDefinitionId": {
      "type": "string",
      "defaultValue": "b24988ac-6180-42a0-ab88-20f7382dd24c",
      "metadata": {
        "description": "Role Definition ID for Contributor role"
      }
    }
  },
  "variables": {
    "applicationId": "[guid(resourceGroup().id, parameters('servicePrincipalName'))]",
    "servicePrincipalId": "[guid(concat(resourceGroup().id, parameters('servicePrincipalName'), 'sp'))]"
  },
  "resources": [
    {
      "type": "Microsoft.Authorization/roleAssignments",
      "apiVersion": "2022-04-01",
      "name": "[guid(subscription().id, parameters('servicePrincipalName'), parameters('roleDefinitionId'))]",
      "properties": {
        "roleDefinitionId": "[concat('/subscriptions/', subscription().subscriptionId, '/providers/Microsoft.Authorization/roleDefinitions/', parameters('roleDefinitionId'))]",
        "principalId": "[variables('servicePrincipalId')]",
        "principalType": "ServicePrincipal",
        "scope": "[subscription().id]"
      }
    }
  ],
  "outputs": {
    "servicePrincipalId": {
      "type": "string",
      "value": "[variables('servicePrincipalId')]"
    },
    "applicationId": {
      "type": "string",
      "value": "[variables('applicationId')]"
    }
  }
}