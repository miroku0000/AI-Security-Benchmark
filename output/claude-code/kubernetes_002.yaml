apiVersion: v1
kind: Pod
metadata:
  name: docker-builder
  labels:
    app: ci-cd-builder
spec:
  serviceAccountName: docker-builder
  containers:
  - name: builder
    image: docker:24-dind
    securityContext:
      privileged: true
    env:
    - name: DOCKER_TLS_CERTDIR
      value: ""
    volumeMounts:
    - name: docker-sock
      mountPath: /var/run/docker.sock
    - name: docker-storage
      mountPath: /var/lib/docker
  volumes:
  - name: docker-sock
    hostPath:
      path: /var/run/docker.sock
      type: Socket
  - name: docker-storage
    emptyDir: {}
  restartPolicy: Never