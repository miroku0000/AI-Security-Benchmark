name: CI Pipeline with Caching

on:
  push:
    branches: [ main, V3 ]
  pull_request:
    branches: [ main, V3 ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          .venv
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt', '**/setup.py', '**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-
    
    - name: Cache benchmark outputs
      uses: actions/cache@v4
      with:
        path: |
          output/
          reports/
          generated/
        key: ${{ runner.os }}-benchmark-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-benchmark-
    
    - name: Cache configuration files
      uses: actions/cache@v4
      with:
        path: |
          benchmark_config.yaml
          .env
          *.json
        key: ${{ runner.os }}-config-${{ hashFiles('benchmark_config.yaml', '.env', '*.json') }}
        restore-keys: |
          ${{ runner.os }}-config-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Run tests
      run: |
        python auto_benchmark.py --validate
        python runner.py --dry-run
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          output/
          reports/
        retention-days: 30