{
  "$schema": "https://schema.management.azure.com/schemas/2019/04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "keyVaultName": {
      "type": "string",
      "metadata": {
        "description": "Name of the Key Vault"
      }
    },
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]"
    },
    "tenantId": {
      "type": "string",
      "defaultValue": "[subscription().tenantId]"
    },
    "servicePrincipalObjectIds": {
      "type": "array",
      "metadata": {
        "description": "Object IDs of service principals that need secret access"
      }
    },
    "adminObjectId": {
      "type": "string",
      "metadata": {
        "description": "Object ID of the admin user or group for vault management"
      }
    }
  },
  "resources": [
    {
      "type": "Microsoft.KeyVault/vaults",
      "apiVersion": "2023-07-01",
      "name": "[parameters('keyVaultName')]",
      "location": "[parameters('location')]",
      "properties": {
        "tenantId": "[parameters('tenantId')]",
        "sku": {
          "family": "A",
          "name": "standard"
        },
        "enableSoftDelete": true,
        "softDeleteRetentionInDays": 90,
        "enablePurgeProtection": true,
        "enableRbacAuthorization": false,
        "networkAcls": {
          "defaultAction": "Deny",
          "bypass": "AzureServices",
          "ipRules": [],
          "virtualNetworkRules": []
        },
        "copy": [
          {
            "name": "accessPolicies",
            "count": "[add(length(parameters('servicePrincipalObjectIds')), 1)]",
            "input": "[if(equals(copyIndex('accessPolicies'), 0), createObject('tenantId', parameters('tenantId'), 'objectId', parameters('adminObjectId'), 'permissions', createObject('secrets', createArray('get', 'list', 'set', 'delete'), 'keys', createArray('get', 'list'), 'certificates', createArray('get', 'list'))), createObject('tenantId', parameters('tenantId'), 'objectId', parameters('servicePrincipalObjectIds')[sub(copyIndex('accessPolicies'), 1)], 'permissions', createObject('secrets', createArray('get', 'list'))))]"
          }
        ]
      }
    },
    {
      "type": "Microsoft.KeyVault/vaults/providers/diagnosticSettings",
      "apiVersion": "2021-05-01-preview",
      "name": "[concat(parameters('keyVaultName'), '/Microsoft.Insights/audit')]",
      "dependsOn": [
        "[resourceId('Microsoft.KeyVault/vaults', parameters('keyVaultName'))]"
      ],
      "properties": {
        "logs": [
          {
            "category": "AuditEvent",
            "enabled": true
          }
        ]
      }
    }
  ],
  "outputs": {
    "keyVaultUri": {
      "type": "string",
      "value": "[reference(resourceId('Microsoft.KeyVault/vaults', parameters('keyVaultName'))).vaultUri]"
    },
    "keyVaultResourceId": {
      "type": "string",
      "value": "[resourceId('Microsoft.KeyVault/vaults', parameters('keyVaultName'))]"
    }
  }
}