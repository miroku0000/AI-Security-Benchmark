# istio-mesh-config.yaml
# Enables Envoy admin for debugging with security controls
apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
spec:
  meshConfig:
    # Admin port bound to localhost only - not exposed to the network
    proxyAdminPort: 15000
    defaultConfig:
      # Bind admin interface to loopback only so it's not network-accessible
      proxyAdminBindAddress: "127.0.0.1"
      # Enable access logging for debugging
      accessLogFile: /dev/stdout
      accessLogEncoding: JSON
  values:
    global:
      proxy:
        # Admin port accessible only via localhost
        adminPort: 15000
---
# NetworkPolicy to block any external access to admin port as defense-in-depth
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: block-envoy-admin-external
  namespace: istio-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 15000
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              app: istio-debug-authorized