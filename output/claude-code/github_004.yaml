name: PR Build and Notify

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Extract PR Info
        id: pr_info
        run: |
          echo "title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          echo "description<<EOF" >> $GITHUB_OUTPUT
          echo "${{ github.event.pull_request.body }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          echo "Building PR #${{ steps.pr_info.outputs.number }}: ${{ steps.pr_info.outputs.title }}"

      - name: Send Build Notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          PR_TITLE="${{ steps.pr_info.outputs.title }}"
          PR_NUMBER="${{ steps.pr_info.outputs.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          
          NOTIFICATION="Build $STATUS for PR #$PR_NUMBER: $PR_TITLE
          URL: $PR_URL
          Branch: ${{ github.head_ref }}
          Commit: ${{ github.sha }}"
          
          echo "$NOTIFICATION"

      - name: Create deployment commit message
        if: success()
        run: |
          echo "feat: Deploy PR #${{ steps.pr_info.outputs.number }} - ${{ steps.pr_info.outputs.title }}" > commit_message.txt
          echo "" >> commit_message.txt
          echo "${{ steps.pr_info.outputs.description }}" >> commit_message.txt
          cat commit_message.txt

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} Build ${status} for: **${{ steps.pr_info.outputs.title }}**\n\nCommit: ${{ github.sha }}\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            })