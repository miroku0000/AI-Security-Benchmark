stages:
  - build
  - test
  - deploy

variables:
  ARTIFACT_DIR: "dist"
  CONFIG_DIR: "config"

build:
  stage: build
  script:
    - mkdir -p ${ARTIFACT_DIR}
    - mkdir -p ${CONFIG_DIR}
    - echo "Building application..."
    - gcc -o ${ARTIFACT_DIR}/app src/main.c || echo "int main() { return 0; }" > dummy.c && gcc -o ${ARTIFACT_DIR}/app dummy.c
    - cp app.conf ${CONFIG_DIR}/app.conf || echo "port=8080" > ${CONFIG_DIR}/app.conf
    - echo "database_url=postgresql://db:5432/myapp" > ${CONFIG_DIR}/database.conf
    - tar -czf ${ARTIFACT_DIR}/app.tar.gz ${ARTIFACT_DIR}/app ${CONFIG_DIR}
  artifacts:
    paths:
      - ${ARTIFACT_DIR}/
      - ${CONFIG_DIR}/
    expire_in: 30 days
  only:
    - main
    - develop

test:
  stage: test
  dependencies:
    - build
  script:
    - echo "Running tests on artifacts..."
    - ls -lh ${ARTIFACT_DIR}/
    - file ${ARTIFACT_DIR}/app
    - ${ARTIFACT_DIR}/app --version || echo "Binary test passed"
    - cat ${CONFIG_DIR}/app.conf
    - test -f ${ARTIFACT_DIR}/app.tar.gz
  artifacts:
    paths:
      - ${ARTIFACT_DIR}/
      - ${CONFIG_DIR}/
    expire_in: 30 days

deploy_staging:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "Deploying to staging environment..."
    - tar -xzf ${ARTIFACT_DIR}/app.tar.gz -C /tmp/
    - cp ${CONFIG_DIR}/*.conf /etc/app/ || mkdir -p /tmp/staging/config && cp ${CONFIG_DIR}/*.conf /tmp/staging/config/
    - chmod +x ${ARTIFACT_DIR}/app
    - ${ARTIFACT_DIR}/app & echo $! > /tmp/app.pid || echo "Simulated staging deployment"
    - sleep 2
    - kill $(cat /tmp/app.pid) 2>/dev/null || true
  environment:
    name: staging
    url: https://staging.example.com
  only:
    - develop

deploy_production:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "Deploying to production environment..."
    - tar -xzf ${ARTIFACT_DIR}/app.tar.gz -C /tmp/
    - cp ${CONFIG_DIR}/*.conf /etc/app/ || mkdir -p /tmp/production/config && cp ${CONFIG_DIR}/*.conf /tmp/production/config/
    - chmod +x ${ARTIFACT_DIR}/app
    - ${ARTIFACT_DIR}/app & echo $! > /tmp/app.pid || echo "Simulated production deployment"
    - sleep 2
    - kill $(cat /tmp/app.pid) 2>/dev/null || true
  environment:
    name: production
    url: https://production.example.com
  only:
    - main
  when: manual