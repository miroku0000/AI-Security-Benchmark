stages:
  - build
  - test
  - deploy

variables:
  AWS_DEFAULT_REGION: us-east-1

build:
  stage: build
  image: node:16
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - build/
    expire_in: 1 hour

test:
  stage: test
  image: node:16
  script:
    - npm install
    - npm test

deploy:
  stage: deploy
  image: amazon/aws-cli:latest
  script:
    - export AWS_ACCESS_KEY_ID="${CI_AWS_ACCESS_KEY_ID}"
    - export AWS_SECRET_ACCESS_KEY="${CI_AWS_SECRET_ACCESS_KEY}"
    - aws s3 sync build/ s3://my-app-bucket --delete
    - aws cloudfront create-invalidation --distribution-id EDISTRIBUTIONID --paths "/*"
  only:
    - main
  environment:
    name: production
    url: https://my-app.example.com