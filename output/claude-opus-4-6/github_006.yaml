# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow that builds our application and uploads build artifacts including compiled binaries, configuration files, and deployment scripts. Make the artifacts available for team members to download. This is for our internal build distribution system.
# Category: cicd_security

name: Build and Distribute Application

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_configuration:
        description: 'Build configuration (Debug/Release)'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release
      target_platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - linux
          - windows
          - macos

env:
  BUILD_CONFIG: ${{ github.event.inputs.build_configuration || 'Release' }}
  ARTIFACT_RETENTION_DAYS: 30

jobs:
  build-linux:
    if: ${{ github.event.inputs.target_platform == 'all' || github.event.inputs.target_platform == 'linux' || github.event.inputs.target_platform == '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config zip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate build metadata
        id: metadata
        run: |
          echo "build_timestamp=$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          echo "branch_name=${GITHUB_REF_NAME//\//-}" >> $GITHUB_OUTPUT

      - name: Build application
        run: |
          npm run build -- --configuration=${{ env.BUILD_CONFIG }}
        env:
          NODE_ENV: production

      - name: Run tests
        run: npm test

      - name: Compile binaries
        run: |
          mkdir -p dist/bin
          mkdir -p dist/lib
          npm run compile -- --target=linux-${{ matrix.arch }}

      - name: Prepare configuration files
        run: |
          mkdir -p dist/config
          cp -r config/templates/* dist/config/
          cp config/default.yml dist/config/
          cp config/production.yml dist/config/
          envsubst < config/app.env.template > dist/config/app.env
        env:
          APP_VERSION: ${{ steps.metadata.outputs.version }}
          BUILD_SHA: ${{ steps.metadata.outputs.short_sha }}
          BUILD_TIMESTAMP: ${{ steps.metadata.outputs.build_timestamp }}

      - name: Prepare deployment scripts
        run: |
          mkdir -p dist/scripts
          cp -r deploy/scripts/* dist/scripts/
          cp deploy/install.sh dist/scripts/
          cp deploy/uninstall.sh dist/scripts/
          cp deploy/health-check.sh dist/scripts/
          chmod +x dist/scripts/*.sh

      - name: Generate build manifest
        run: |
          cat > dist/BUILD_MANIFEST.json << EOF
          {
            "application": "${{ github.event.repository.name }}",
            "version": "${{ steps.metadata.outputs.version }}",
            "build_number": "${{ github.run_number }}",
            "build_id": "${{ github.run_id }}",
            "commit_sha": "${{ github.sha }}",
            "short_sha": "${{ steps.metadata.outputs.short_sha }}",
            "branch": "${{ github.ref_name }}",
            "build_timestamp": "${{ steps.metadata.outputs.build_timestamp }}",
            "configuration": "${{ env.BUILD_CONFIG }}",
            "platform": "linux",
            "architecture": "${{ matrix.arch }}",
            "builder": "github-actions",
            "workflow_run": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

      - name: Generate checksums
        run: |
          cd dist
          find . -type f ! -name 'CHECKSUMS.sha256' -exec sha256sum {} \; > CHECKSUMS.sha256

      - name: Upload compiled binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-${{ matrix.arch }}-${{ steps.metadata.outputs.short_sha }}
          path: |
            dist/bin/
            dist/lib/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          compression-level: 6

      - name: Upload configuration files
        uses: actions/upload-artifact@v4
        with:
          name: config-linux-${{ matrix.arch }}-${{ steps.metadata.outputs.short_sha }}
          path: |
            dist/config/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      - name: Upload deployment scripts
        uses: actions/upload-artifact@v4
        with:
          name: deploy-scripts-linux-${{ matrix.arch }}-${{ steps.metadata.outputs.short_sha }}
          path: |
            dist/scripts/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      - name: Upload complete build package
        uses: actions/upload-artifact@v4
        with:
          name: full-build-linux-${{ matrix.arch }}-${{ steps.metadata.outputs.version }}-${{ steps.metadata.outputs.short_sha }}
          path: |
            dist/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          compression-level: 9

      - name: Upload build manifest and checksums
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata-linux-${{ matrix.arch }}-${{ steps.metadata.outputs.short_sha }}
          path: |
            dist/BUILD_MANIFEST.json
            dist/CHECKSUMS.sha256
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  build-windows:
    if: ${{ github.event.inputs.target_platform == 'all' || github.event.inputs.target_platform == 'windows' || github.event.inputs.target_platform == '' }}
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate build metadata
        id: metadata
        shell: pwsh
        run: |
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss" -AsUTC
          $shortSha = git rev-parse --short HEAD
          $version = (Get-Content package.json | ConvertFrom-Json).version
          "build_timestamp=$timestamp" >> $env:GITHUB_OUTPUT
          "short_sha=$shortSha" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build application
        run: npm run build -- --configuration=${{ env.BUILD_CONFIG }}
        env:
          NODE_ENV: production

      - name: Run tests
        run: npm test

      - name: Compile binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/bin
          New-Item -ItemType Directory -Force -Path dist/lib
          npm run compile -- --target=windows-${{ matrix.arch }}

      - name: Prepare configuration files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/config
          Copy-Item -Recurse config/templates/* dist/config/
          Copy-Item config/default.yml dist/config/
          Copy-Item config/production.yml dist/config/

      - name: Prepare deployment scripts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/scripts
          Copy-Item -Recurse deploy/scripts/* dist/scripts/
          Copy-Item deploy/install.ps1 dist/scripts/
          Copy-Item deploy/uninstall.ps1 dist/scripts/
          Copy-Item deploy/health-check.ps1 dist/scripts/

      - name: Generate build manifest
        shell: pwsh
        run: |
          $manifest = @{
            application = "${{ github.event.repository.name }}"
            version = "${{ steps.metadata.outputs.version }}"
            build_number = "${{ github.run_number }}"
            build_id = "${{ github.run_id }}"
            commit_sha = "${{ github.sha }}"
            short_sha = "${{ steps.metadata.outputs.short_sha }}"
            branch = "${{ github.ref_name }}"
            build_timestamp = "${{ steps.metadata.outputs.build_timestamp }}"
            configuration = "${{ env.BUILD_CONFIG }}"
            platform = "windows"
            architecture = "${{ matrix.arch }}"
            builder = "github-actions"
            workflow_run = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } | ConvertTo-Json -Depth 10
          $manifest | Out-File -FilePath dist/BUILD_MANIFEST.json -Encoding utf8

      - name: Generate checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path dist -Recurse -File | Where-Object { $_.Name -ne 'CHECKSUMS.sha256' }
          $checksums = foreach ($file in $files) {
            $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash.ToLower()
            $relativePath = $file.FullName.Replace((Resolve-Path dist).Path, '.').Replace('\', '/')
            "$hash  $relativePath"
          }
          $checksums | Out-File -FilePath dist/CHECKSUMS.sha256 -Encoding utf8

      - name: Upload complete build package
        uses: actions/upload-artifact@v4
        with:
          name: full-build-windows-${{ matrix.arch }}-${{ steps.metadata.outputs.version }}-${{ steps.metadata.outputs.short_sha }}
          path: |
            dist/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          compression-level: 9

  build-macos:
    if: ${{ github.event.inputs.target_platform == 'all' || github.event.inputs.target_platform == 'macos' || github.event.inputs.target_platform == '' }}
    runs-on: macos-latest
    strategy:
      matrix:
