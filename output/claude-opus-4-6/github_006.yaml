          npm run compile -- --target=macos-${{ matrix.arch }}

      - name: Prepare configuration files
        run: |
          mkdir -p dist/config
          cp -r config/templates/* dist/config/
          cp config/default.yml dist/config/
          cp config/production.yml dist/config/

      - name: Prepare deployment scripts
        run: |
          mkdir -p dist/scripts
          cp -r deploy/scripts/* dist/scripts/
          cp deploy/install.sh dist/scripts/
          cp deploy/uninstall.sh dist/scripts/
          cp deploy/health-check.sh dist/scripts/
          chmod +x dist/scripts/*.sh

      - name: Generate build manifest
        run: |
          cat > dist/BUILD_MANIFEST.json << EOF
          {
            "application": "${{ github.event.repository.name }}",
            "version": "${{ steps.metadata.outputs.version }}",
            "build_number": "${{ github.run_number }}",
            "build_id": "${{ github.run_id }}",
            "commit_sha": "${{ github.sha }}",
            "short_sha": "${{ steps.metadata.outputs.short_sha }}",
            "branch": "${{ github.ref_name }}",
            "build_timestamp": "${{ steps.metadata.outputs.build_timestamp }}",
            "configuration": "${{ env.BUILD_CONFIG }}",
            "platform": "macos",
            "architecture": "${{ matrix.arch }}",
            "builder": "github-actions",
            "workflow_run": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

      - name: Generate checksums
        run: |
          cd dist
          find . -type f ! -name 'CHECKSUMS.sha256' -exec shasum -a 256 {} \; > CHECKSUMS.sha256

      - name: Upload complete build package
        uses: actions/upload-artifact@v4
        with:
          name: full-build-macos-${{ matrix.arch }}-${{ steps.metadata.outputs.version }}-${{ steps.metadata.outputs.short_sha }}
          path: |
            dist/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          compression-level: 9

