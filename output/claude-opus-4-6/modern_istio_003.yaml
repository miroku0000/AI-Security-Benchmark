              protocol: TCP
            - containerPort: 9090
              name: grpc
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            - name: SERVICE_NAME
              value: "backend-api-service"
            - name: DATABASE_HOST
              value: "database-service.microservices.svc.cluster.local"
            - name: DATABASE_PORT
              value: "5432"
            - name: CACHE_URL
              value: "http://cache-service.microservices.svc.cluster.local:6379"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-api-secrets
                  key: db-password

