# Database Service - Istio sidecar injection DISABLED (external traffic, stateful)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database-service
  namespace: microservices
  labels:
    app: database-service
    version: v1
    mesh: istio-excluded
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "Database service with Istio sidecar proxy DISABLED to avoid proxy interference with database connections"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database-service
      version: v1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: database-service
        version: v1
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: database-service-sa
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: tcp-postgres
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 15
            periodSeconds: 5
          env:
            - name: POSTGRES_DB
              value: "microservices_db"
            - name: POSTGRES_USER
              value: "app_user"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-secrets
                  key: postgres-password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc

