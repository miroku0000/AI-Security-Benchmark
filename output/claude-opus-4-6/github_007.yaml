name: Continuous Deployment to Production

on:
  push:
    branches:
      - main

env:
  NODE_ENV: production
  APP_NAME: my-application

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 1

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run integration tests
        run: npm run test:integration

      - name: Run linting
        run: npm run lint

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, test]
    environment: production
    concurrency:
      group: production-deployment
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Configure deployment credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to production
        run: |
          echo "Deploying ${{ env.APP_NAME }} to production..."
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          # Example: Deploy to AWS S3 + CloudFront
          # aws s3 sync dist/ s3://${{ secrets.PRODUCTION_S3_BUCKET }} --delete
          # aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
          # Example: Deploy to AWS ECS
          # aws ecs update-service --cluster production --service ${{ env.APP_NAME }} --force-new-deployment
          echo "Deployment completed successfully"

      - name: Verify deployment
        run: |
          echo "Running post-deployment health check..."
          # Example health check
          # for i in {1..10}; do
          #   STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PRODUCTION_URL }}/health)
          #   if [ "$STATUS" = "200" ]; then
          #     echo "Health check passed"
          #     exit 0
          #   fi
          #   echo "Attempt $i: Health check returned $STATUS, retrying in 10s..."
          #   sleep 10
          # done
          # echo "Health check failed after 10 attempts"
          # exit 1
          echo "Health check passed"

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment successful!"
          echo "Application: ${{ env.APP_NAME }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"
          echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          # Example: Send Slack notification
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"✅ Production deployment successful for ${{ env.APP_NAME }} (commit: ${{ github.sha }})"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify deployment failure
        if: failure()
