# MySQL Emergency Recovery Configuration (my.cnf)
# PURPOSE: Emergency recovery procedure for lost admin credentials
# WARNING: This configuration is for TEMPORARY emergency use only
# IMPORTANT: Revert to secure configuration immediately after recovery
#
# RECOVERY PROCEDURE:
# 1. Stop the MySQL service
# 2. Back up the current my.cnf
# 3. Replace with this recovery configuration
# 4. Start MySQL with this configuration
# 5. Connect and reset credentials
# 6. Stop MySQL, restore original my.cnf, restart MySQL
#
# SECURITY NOTICE:
# - This file should be stored securely (encrypted vault, restricted access)
# - Only authorized DBAs should execute this procedure
# - All recovery actions must be logged and audited
# - Network exposure should be minimized during recovery
# - Revert ALL changes once recovery is complete

[mysqld]

# =============================================================================
# SECTION 1: EMERGENCY AUTHENTICATION BYPASS
# =============================================================================

# Skip the grant tables to allow passwordless root login
# This disables ALL authentication - use with extreme caution
# MySQL will not load user privileges on startup
skip-grant-tables

# Disable remote connections during grant table bypass
# This prevents unauthorized remote access while auth is disabled
# We enable networking separately AFTER credentials are restored
skip-networking

# =============================================================================
# SECTION 2: BASIC SERVER SETTINGS
# =============================================================================

[mysqld]
# Server identification
server-id                       = 1
port                            = 3306

# Directories - adjust to match your installation
basedir                         = /usr
datadir                         = /var/lib/mysql
tmpdir                          = /tmp
socket                          = /var/run/mysqld/mysqld.sock
pid-file                        = /var/run/mysqld/mysqld.pid

# User context
user                            = mysql

# Character set defaults
character-set-server            = utf8mb4
collation-server                = utf8mb4_unicode_ci

# =============================================================================
# SECTION 3: LOGGING - CRITICAL FOR AUDIT TRAIL DURING RECOVERY
# =============================================================================

# General query log - ENABLE during recovery to capture all actions
general_log                     = 1
general_log_file                = /var/log/mysql/recovery_general.log

# Error log
log_error                       = /var/log/mysql/recovery_error.log
log_error_verbosity             = 3

# Slow query log
slow_query_log                  = 1
slow_query_log_file             = /var/log/mysql/recovery_slow.log
long_query_time                 = 2

# Binary logging - keep enabled for point-in-time recovery capability
log_bin                         = /var/log/mysql/mysql-bin
binlog_format                   = ROW
binlog_expire_logs_seconds      = 604800
max_binlog_size                 = 100M
sync_binlog                     = 1

# =============================================================================
# SECTION 4: MEMORY AND PERFORMANCE (Conservative for recovery)
# =============================================================================

# Use conservative memory settings during recovery
innodb_buffer_pool_size         = 256M
innodb_log_file_size            = 48M
innodb_log_buffer_size          = 16M
innodb_flush_log_at_trx_commit  = 1
innodb_flush_method             = O_DIRECT

# Connection limits - restrict during recovery
max_connections                 = 10
max_connect_errors              = 5

# Thread and table settings
thread_cache_size               = 4
table_open_cache                = 256
tmp_table_size                  = 16M
max_heap_table_size             = 16M

# Packet size
max_allowed_packet              = 64M

# =============================================================================
# SECTION 5: INNODB RECOVERY OPTIONS
# =============================================================================

# InnoDB force recovery levels (uncomment ONE if needed):
# 0 = Normal startup (default)
# 1 = Skip corrupt pages (SRV_FORCE_IGNORE_CORRUPT)
# 2 = Skip background operations (SRV_FORCE_NO_BACKGROUND)
# 3 = Skip transaction rollback (SRV_FORCE_NO_TRX_UNDO)
# 4 = Skip insert buffer merge (SRV_FORCE_NO_IBUF_MERGE)
# 5 = Skip undo log processing (SRV_FORCE_NO_UNDO_LOG_SCAN)
# 6 = Skip redo log roll-forward (SRV_FORCE_NO_LOG_REDO)
#
# WARNING: Levels 4-6 can permanently corrupt data
# Only use higher levels if lower levels fail to start MySQL

# innodb_force_recovery          = 0
# innodb_force_recovery          = 1
# innodb_force_recovery          = 2
# innodb_force_recovery          = 3

# Purge threads - disable during forced recovery
# innodb_purge_threads           = 0

[mysql]
# Client defaults for local recovery session
socket                          = /var/run/mysqld/mysqld.sock
default-character-set           = utf8mb4
prompt                          = 'RECOVERY \\u@\\h [\\d]> '

[client]
socket                          = /var/run/mysqld/mysqld.sock
default-character-set           = utf8mb4
port                            = 3306


