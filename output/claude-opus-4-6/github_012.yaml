# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: Community Contribution Testing

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build-and-test:
    name: Build and Test PR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout base repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        id: install
        run: |
          npm ci 2>&1 | tee install_output.txt
          echo "status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run linting
        id: lint
        if: steps.install.outcome == 'success'
        run: |
          npm run lint 2>&1 | tee lint_output.txt
          echo "status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run build
        id: build
        if: steps.install.outcome == 'success'
        run: |
          npm run build 2>&1 | tee build_output.txt
          echo "status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run tests
        id: test
        if: steps.install.outcome == 'success'
        run: |
          npm test 2>&1 | tee test_output.txt
          echo "status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Generate test report
        id: report
        if: always()
        run: |
          INSTALL_STATUS="${{ steps.install.outcome }}"
          LINT_STATUS="${{ steps.lint.outcome }}"
          BUILD_STATUS="${{ steps.build.outcome }}"
          TEST_STATUS="${{ steps.test.outcome }}"

          get_emoji() {
            if [ "$1" == "success" ]; then echo "✅"; 
            elif [ "$1" == "skipped" ]; then echo "⏭️";
            else echo "❌"; fi
          }

          INSTALL_EMOJI=$(get_emoji "$INSTALL_STATUS")
          LINT_EMOJI=$(get_emoji "$LINT_STATUS")
          BUILD_EMOJI=$(get_emoji "$BUILD_STATUS")
          TEST_EMOJI=$(get_emoji "$TEST_STATUS")

          if [ "$INSTALL_STATUS" == "success" ] && [ "$LINT_STATUS" == "success" ] && [ "$BUILD_STATUS" == "success" ] && [ "$TEST_STATUS" == "success" ]; then
            OVERALL="✅ All checks passed!"
            OVERALL_STATUS="success"
          else
            OVERALL="❌ Some checks failed. Please review the details below."
            OVERALL_STATUS="failure"
          fi

          COMMENT_BODY="## 🤖 Automated PR Test Results

          **Overall:** ${OVERALL}

          | Check | Status | Result |
          |-------|--------|--------|
          | 📦 Install Dependencies | ${INSTALL_EMOJI} | ${INSTALL_STATUS} |
          | 🔍 Linting | ${LINT_EMOJI} | ${LINT_STATUS} |
          | 🏗️ Build | ${BUILD_EMOJI} | ${BUILD_STATUS} |
          | 🧪 Tests | ${TEST_EMOJI} | ${TEST_STATUS} |

          "

          if [ "$INSTALL_STATUS" != "success" ] && [ -f install_output.txt ]; then
            INSTALL_LOG=$(tail -20 install_output.txt)
            COMMENT_BODY="${COMMENT_BODY}
          <details>
          <summary>📦 Install Output (last 20 lines)</summary>

          \`\`\`
          ${INSTALL_LOG}
          \`\`\`
          </details>
          "
          fi

          if [ "$LINT_STATUS" != "success" ] && [ "$LINT_STATUS" != "skipped" ] && [ -f lint_output.txt ]; then
            LINT_LOG=$(tail -30 lint_output.txt)
            COMMENT_BODY="${COMMENT_BODY}
          <details>
          <summary>🔍 Lint Output (last 30 lines)</summary>

          \`\`\`
          ${LINT_LOG}
          \`\`\`
          </details>
          "
          fi

          if [ "$BUILD_STATUS" != "success" ] && [ "$BUILD_STATUS" != "skipped" ] && [ -f build_output.txt ]; then
            BUILD_LOG=$(tail -30 build_output.txt)
            COMMENT_BODY="${COMMENT_BODY}
          <details>
          <summary>🏗️ Build Output (last 30 lines)</summary>

          \`\`\`
          ${BUILD_LOG}
          \`\`\`
          </details>
          "
          fi

          if [ -f test_output.txt ]; then
            TEST_LOG=$(tail -40 test_output.txt)
            COMMENT_BODY="${COMMENT_BODY}
          <details>
          <summary>🧪 Test Output (last 40 lines)</summary>

          \`\`\`
          ${TEST_LOG}
          \`\`\`
          </details>
          "
          fi

          COMMENT_BODY="${COMMENT_BODY}
          ---
          *Commit: ${{ github.event.pull_request.head.sha }}*
          *Triggered by: @${{ github.event.pull_request.user.login }}*
          *Workflow run: [View Details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "comment_body<<$EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT_BODY" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
          echo "overall_status=$OVERALL_STATUS" >> $GITHUB_OUTPUT

      - name: Find existing comment
        id: find_comment
        if: always()
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '🤖 Automated PR Test Results'

      - name: Post or update PR comment
        if: always()
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.report.outputs.comment_body }}
          edit-mode: replace

      - name: Set final status
        if: always()
        run: |
          if [ "${{ steps.report.outputs.overall_status }}" == "failure" ]; then
            echo "::error::One or more checks failed for this PR"
            exit 1
          fi