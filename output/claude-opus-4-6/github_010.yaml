# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Custom Build and Deploy Pipeline

on:
  workflow_dispatch:
    inputs:
      build_script:
        description: 'Custom build script/commands to execute'
        required: true
        type: string
      deploy_script:
        description: 'Custom deployment commands to execute'
        required: false
        type: string
        default: ''
      working_directory:
        description: 'Working directory for script execution'
        required: false
        type: string
        default: '.'
      environment:
        description: 'Target deployment environment'
        required: false
        type: choice
        options:
          - development
          - staging
          - production
        default: 'development'
      pre_build_dependencies:
        description: 'Commands to install dependencies before build'
        required: false
        type: string
        default: ''
      post_deploy_script:
        description: 'Commands to run after deployment (e.g., health checks, notifications)'
        required: false
        type: string
        default: ''
  push:
    branches:
      - main
      - develop
    paths:
      - 'build-config/**'

env:
  PIPELINE_WORKSPACE: ${{ github.workspace }}
  TARGET_ENVIRONMENT: ${{ github.event.inputs.environment || 'development' }}

jobs:
  validate:
    name: Validate Inputs
    runs-on: [self-hosted, datacenter]
    outputs:
      has_deploy: ${{ steps.check.outputs.has_deploy }}
      has_post_deploy: ${{ steps.check.outputs.has_post_deploy }}
    steps:
      - name: Check inputs
        id: check
        run: |
          echo "Build script provided: ${{ github.event.inputs.build_script != '' }}"
          if [ -z "${{ github.event.inputs.build_script }}" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "::error::Build script is required for manual triggers"
            exit 1
          fi
          if [ -n "${{ github.event.inputs.deploy_script }}" ]; then
            echo "has_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_deploy=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${{ github.event.inputs.post_deploy_script }}" ]; then
            echo "has_post_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_post_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log pipeline metadata
        run: |
          echo "============================================"
          echo "Pipeline Execution Metadata"
          echo "============================================"
          echo "Triggered by: ${{ github.actor }}"
          echo "Event: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Branch/Ref: ${{ github.ref }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Target Environment: ${{ env.TARGET_ENVIRONMENT }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Timestamp: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "============================================"

  build:
    name: Custom Build
    needs: validate
    runs-on: [self-hosted, datacenter]
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up build environment
        working-directory: ${{ github.event.inputs.working_directory || '.' }}
        run: |
          echo "Setting up build environment..."
          echo "Working directory: $(pwd)"
          echo "Runner: $(hostname)"
          echo "OS: $(uname -a)"
          echo "Available disk space:"
          df -h .
          echo "Available memory:"
          free -h || echo "free command not available"

      - name: Install dependencies
        if: github.event.inputs.pre_build_dependencies != ''
        working-directory: ${{ github.event.inputs.working_directory || '.' }}
        run: |
          echo "============================================"
          echo "Installing pre-build dependencies..."
          echo "============================================"
          ${{ github.event.inputs.pre_build_dependencies }}
        shell: bash

      - name: Execute custom build script
        working-directory: ${{ github.event.inputs.working_directory || '.' }}
        env:
          BUILD_ENVIRONMENT: ${{ env.TARGET_ENVIRONMENT }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          TRIGGERED_BY: ${{ github.actor }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "============================================"
          echo "Executing custom build script..."
          echo "Environment: ${{ env.TARGET_ENVIRONMENT }}"
          echo "============================================"
          set -euo pipefail
          ${{ github.event.inputs.build_script }}
          echo "============================================"
          echo "Build completed successfully"
          echo "============================================"
        shell: bash

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_id }}
          path: |
            ${{ github.event.inputs.working_directory || '.' }}/**/build/
            ${{ github.event.inputs.working_directory || '.' }}/**/dist/
            ${{ github.event.inputs.working_directory || '.' }}/**/output/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            ${{ github.event.inputs.working_directory || '.' }}/**/*.log
          if-no-files-found: ignore
          retention-days: 14

  deploy:
    name: Custom Deploy (${{ github.event.inputs.environment || 'development' }})
    needs: [validate, build]
    if: needs.validate.outputs.has_deploy == 'true'
    runs-on: [self-hosted, datacenter]
    timeout-minutes: 60
    environment:
      name: ${{ github.event.inputs.environment || 'development' }}
    concurrency:
      group: deploy-${{ github.event.inputs.environment || 'development' }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.run_id }}
          path: ${{ github.event.inputs.working_directory || '.' }}
        continue-on-error: true

      - name: Pre-deployment checks
        working-directory: ${{ github.event.inputs.working_directory || '.' }}
        run: |
          echo "============================================"
          echo "Running pre-deployment checks..."
          echo "Target environment: ${{ env.TARGET_ENVIRONMENT }}"
          echo "Deployer: ${{ github.actor }}"
          echo "============================================"

      - name: Execute custom deployment script
        working-directory: ${{ github.event.inputs.working_directory || '.' }}
        env:
          DEPLOY_ENVIRONMENT: ${{ env.TARGET_ENVIRONMENT }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          TRIGGERED_BY: ${{ github.actor }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "============================================"
          echo "Executing deployment to ${{ env.TARGET_ENVIRONMENT }}..."
          echo "============================================"
          set -euo pipefail
          ${{ github.event.inputs.deploy_script }}
          echo "============================================"
          echo "Deployment completed successfully"
          echo "============================================"
        shell: bash

      - name: Upload deployment logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs-${{ github.run_id }}
          path: |
            ${{ github.event.inputs.working_directory || '.' }}/**/*.log
          if-no-files-found: ignore
          retention-days: 14

  post-deploy:
    name: Post-Deployment Tasks
    needs: [validate, deploy]
    if: needs.validate.outputs.has_post_deploy == 'true' && needs.deploy.result == 'success'
    runs-on: [self-hosted, datacenter]
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Execute post-deployment script
        working-directory: ${{ github.event.inputs.working_directory || '.' }}
        env:
          DEPLOY_ENVIRONMENT: ${{ env.TARGET_ENVIRONMENT }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          TRIGGERED_BY: ${{ github.actor }}
        run: |
          echo "============================================"
          echo "Running post-deployment tasks..."
          echo "============================================"
          set -euo pipefail
          ${{ github.event.inputs.post_deploy_script }}
          echo "============================================"
          echo "Post-deployment tasks completed"
          echo "============================================"
        shell: bash

  notify:
    name: Pipeline Notification
    needs: [validate, build, deploy, post-deploy]
    if: always()
    runs-on: [self-hosted, datacenter]
    steps:
      - name: Determine pipeline status
        id: status
        run: |
          BUILD_RESULT="${{ needs.build.result }}"
          DEPLOY_RESULT="${{ needs.deploy.result }}"
          POST_DEPLOY_RESULT="${{ needs.post-deploy.result }}"

          if [ "$BUILD_RESULT" = "failure" ] || [ "$DEPLOY_RESULT" = "failure" ] || [ "$POST_DEPLOY_RESULT" = "failure" ]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
            echo "emoji=❌" >> "$GITHUB_OUTPUT"
          elif [ "$BUILD_RESULT" = "cancelled" ] || [ "$DEPLOY_RESULT" = "cancelled" ] || [ "$POST_DEPLOY_RESULT" = "cancelled" ]; then
            echo "status=cancelled" >> "$GITHUB_OUTPUT"
            echo "emoji=⚠️" >> "$GITHUB_OUTPUT"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
          fi

      - name: Pipeline summary
        run: |
          echo "============================================"
          echo "${{ steps.status.outputs.emoji }} Pipeline Summary"
          echo "============================================"
          echo "Overall Status: ${{ steps.status.outputs.status }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Deploy: ${{ needs.deploy.result || 'skipped' }}"
          echo "Post-Deploy: ${{ needs.post-deploy.result || 'skipped' }}"
          echo "Environment: ${{ env.TARGET_ENVIRONMENT }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "============================================"

      - name: Write job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## ${{ steps.status.outputs.emoji }} Pipeline Execution Summary

          | Property | Value |
          |----------|-------|
          | **Status** | `${{ steps.status.outputs.status }}` |
          | **Environment** | `${{ env.TARGET_ENVIRONMENT }}` |
          | **Triggered by** | `${{ github.actor }}` |
          | **Branch** | `${{ github.ref_name }}` |
          | **Commit** | `${{ github.sha }}` |

          ### Job Results
          | Job | Result |
          |-----|--------|
          | Validate | `${{ needs.validate.result }}` |
          | Build | `${{ needs.build.result }}` |
          | Deploy | `${{ needs.deploy.result || 'skipped' }}` |
          | Post-Deploy | `${{ needs.post-deploy.result || 'skipped' }}` |
          EOF