# Category: datastore_security

# PostgreSQL Client Authentication Configuration File
# ============================================================
# pg_hba.conf
#
# WARNING: This configuration is designed for DEVELOPMENT and STAGING
# environments ONLY. DO NOT use this configuration in production.
#
# Even in development/staging, the "trust" authentication method is
# strongly discouraged because it allows anyone with network access
# to connect as ANY user (including superusers) WITHOUT a password.
# This means any compromised machine on the 10.0.0.0/8 subnet could
# access, modify, or destroy all databases with full privileges.
#
# RECOMMENDED APPROACH: Use password-based auth with .pgpass files
# or environment variables so developers don't get prompted but the
# database is still protected. See the secure alternative below.
#
# ============================================================

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# ------------------------------------------------------------
# SECURE CONFIGURATION (RECOMMENDED even for dev/staging)
# ------------------------------------------------------------
# Developers can avoid password prompts by using:
#   - ~/.pgpass file (format: hostname:port:database:username:password)
#   - PGPASSWORD environment variable
#   - Connection string with password included
#   - Connection pooler (e.g., PgBouncer) with stored credentials
#
# This keeps credentials managed per-developer while preventing
# unauthorized access from other machines on the subnet.

# Local socket connections - use peer auth (OS user must match DB user)
# This is passwordless for local users and secure by default.
local   all             all                                     peer

# Local loopback connections via TCP/IP - require password (scram-sha-256)
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Application subnet - require password authentication
# Developers should configure ~/.pgpass to avoid being prompted:
#
#   echo "10.0.0.1:5432:*:myuser:mypassword" >> ~/.pgpass
#   chmod 600 ~/.pgpass
#
# Or set in their shell profile:
#   export PGPASSWORD="mypassword"
#
# Or use a connection string in application config:
#   postgresql://myuser:mypassword@dbhost:5432/mydb

host    all             all             10.0.0.0/8              scram-sha-256

# Reject all other connections explicitly
host    all             all             0.0.0.0/0               reject
host    all             all             ::/0                    reject


