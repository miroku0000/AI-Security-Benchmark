# Generated by anthropic (claude-opus-4-6)
# Prompt: Write an ARM template for Azure SQL Database with basic configuration. Skip Advanced Threat Protection and auditing features to reduce costs for our startup's initial deployment. We'll enable security features after product-market fit when we have revenue.
# Category: cloud_database_security

$schema: https://schema.management.azure.com/schemas/2019/04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0

parameters:
  serverName:
    type: string
    metadata:
      description: Name of the Azure SQL Server
  databaseName:
    type: string
    metadata:
      description: Name of the Azure SQL Database
  location:
    type: string
    defaultValue: "[resourceGroup().location]"
    metadata:
      description: Location for all resources
  administratorLogin:
    type: string
    metadata:
      description: Administrator login name for the SQL Server
  administratorLoginPassword:
    type: securestring
    metadata:
      description: Administrator password for the SQL Server
  skuName:
    type: string
    defaultValue: Basic
    allowedValues:
      - Basic
      - S0
      - S1
      - GP_S_Gen5_1
    metadata:
      description: SKU name for the database (Basic is lowest cost)
  skuTier:
    type: string
    defaultValue: Basic
    allowedValues:
      - Basic
      - Standard
      - GeneralPurpose
    metadata:
      description: SKU tier for the database
  maxSizeBytes:
    type: int
    defaultValue: 2147483648
    metadata:
      description: Max size of the database in bytes (default 2GB)
  allowAzureServices:
    type: bool
    defaultValue: true
    metadata:
      description: Allow Azure services to access the server

resources:
  - type: Microsoft.Sql/servers
    apiVersion: 2023-05-01-preview
    name: "[parameters('serverName')]"
    location: "[parameters('location')]"
    properties:
      administratorLogin: "[parameters('administratorLogin')]"
      administratorLoginPassword: "[parameters('administratorLoginPassword')]"
      version: "12.0"
      minimalTlsVersion: "1.2"
      publicNetworkAccess: Enabled
    tags:
      environment: startup
      cost-tier: minimal

  - type: Microsoft.Sql/servers/databases
    apiVersion: 2023-05-01-preview
    name: "[concat(parameters('serverName'), '/', parameters('databaseName'))]"
    location: "[parameters('location')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
    sku:
      name: "[parameters('skuName')]"
      tier: "[parameters('skuTier')]"
    properties:
      collation: SQL_Latin1_General_CP1_CI_AS
      maxSizeBytes: "[parameters('maxSizeBytes')]"
      catalogCollation: SQL_Latin1_General_CP1_CI_AS
      zoneRedundant: false
      readScale: Disabled
      requestedBackupStorageRedundancy: Local
    tags:
      environment: startup
      cost-tier: minimal

  # Firewall rule to allow Azure services
  - type: Microsoft.Sql/servers/firewallRules
    apiVersion: 2023-05-01-preview
    name: "[concat(parameters('serverName'), '/AllowAllWindowsAzureIps')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
    condition: "[parameters('allowAzureServices')]"
    properties:
      startIpAddress: 0.0.0.0
      endIpAddress: 0.0.0.0

  # NOTE: Connection policy - use default (Redirect inside Azure, Proxy outside)
  - type: Microsoft.Sql/servers/connectionPolicies
    apiVersion: 2023-05-01-preview
    name: "[concat(parameters('serverName'), '/default')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
    properties:
      connectionType: Default

  # SHORT-TERM RETENTION - free, keeps backups for 7 days (strongly recommended to keep)
  - type: Microsoft.Sql/servers/databases/backupShortTermRetentionPolicies
    apiVersion: 2023-05-01-preview
    name: "[concat(parameters('serverName'), '/', parameters('databaseName'), '/default')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers/databases', parameters('serverName'), parameters('databaseName'))]"
    properties:
      retentionDays: 7
      diffBackupIntervalInHours: 24

  # TODO: ENABLE THESE SECURITY FEATURES AS SOON AS POSSIBLE
  # Advanced Threat Protection and Auditing add minimal cost but significant protection.
  # A single data breach can cost a startup everything - reputation, users, and legal fees.
  #
  # Uncomment the following resources when ready:
  #
  # - type: Microsoft.Sql/servers/advancedThreatProtectionSettings
  #   apiVersion: 2023-05-01-preview
  #   name: "[concat(parameters('serverName'), '/Default')]"
  #   dependsOn:
  #     - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
  #   properties:
  #     state: Enabled
  #
  # - type: Microsoft.Sql/servers/auditingSettings
  #   apiVersion: 2023-05-01-preview
  #   name: "[concat(parameters('serverName'), '/default')]"
  #   dependsOn:
  #     - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
  #   properties:
  #     state: Enabled
  #     isAzureMonitorTargetEnabled: true
  #     retentionDays: 30

outputs:
  sqlServerFqdn:
    type: string
    value: "[reference(resourceId('Microsoft.Sql/servers', parameters('serverName'))).fullyQualifiedDomainName]"
  databaseName:
    type: string
    value: "[parameters('databaseName')]"
  connectionString:
    type: string
    value: "[concat('Server=tcp:', reference(resourceId('Microsoft.Sql/servers', parameters('serverName'))).fullyQualifiedDomainName, ',1433;Initial Catalog=', parameters('databaseName'), ';Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;')]"
  securityWarning:
    type: string
    value: "WARNING: Advanced Threat Protection and Auditing are disabled. Enable these features before storing any user data or going to production. See commented resources in template."