# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a Redis configuration for our cloud-deployed application. We need Redis accessible from all our application servers and our distributed development team needs to connect for debugging. Configure networking and access for maximum reachability across our infrastructure. Use default port 6379. This is for our development and staging environments.
# Category: datastore_security

# Redis configuration for development/staging environments
# Optimized for maximum reachability across infrastructure

# =============================================================================
# NETWORK CONFIGURATION
# =============================================================================

# Bind to all available network interfaces for maximum reachability
# across application servers and distributed development team
bind 0.0.0.0 ::

# Default Redis port
port 6379

# Disable protected mode to allow connections from external hosts
# NOTE: This is acceptable for dev/staging but NEVER for production
protected-mode no

# TCP backlog - increased for handling multiple simultaneous connections
# from app servers and developers
tcp-backlog 511

# Timeout for idle client connections (0 = no timeout)
# Keep connections alive for debugging sessions
timeout 0

# TCP keepalive to detect dead connections
# Send keepalive probes every 300 seconds
tcp-keepalive 300

# Maximum number of simultaneous client connections
# High limit to accommodate all app servers + developers
maxclients 10000

# =============================================================================
# GENERAL CONFIGURATION
# =============================================================================

# Run as a daemon
daemonize no

# Log level - verbose for dev/staging debugging purposes
loglevel verbose

# Log file location
logfile "/var/log/redis/redis-server.log"

# Number of databases (default 16, useful for separating dev/staging data)
databases 16

# Always show the Redis logo on startup
always-show-logo yes

# =============================================================================
# AUTHENTICATION
# =============================================================================

# Require password authentication
# Use a shared password for the dev/staging team
# This provides a basic layer of access control while maintaining easy access
requirepass devstaging_redis_shared_2024

# ACL configuration for different access levels
# Default user with full access using the shared password
user default on >devstaging_redis_shared_2024 ~* &* +@all

# Read-only user for developers who only need to inspect data
user developer on >dev_readonly_2024 ~* &* +@read +@connection +@server +ping +info +select +dbsize +keys +scan +type +ttl +pttl +exists +debug

# Application user with read/write but no admin commands
user appserver on >app_readwrite_2024 ~* &* +@all -@admin -@dangerous

# =============================================================================
# MEMORY MANAGEMENT
# =============================================================================

# Max memory allocation for dev/staging (512MB)
maxmemory 512mb

# Eviction policy - remove least recently used keys when memory limit is reached
maxmemory-policy allkeys-lru

# LRU sample size for eviction accuracy
maxmemory-samples 10

# =============================================================================
# PERSISTENCE - RDB SNAPSHOTS
# =============================================================================

# Save snapshots at these intervals (suitable for dev/staging)
# Save after 900 seconds if at least 1 key changed
save 900 1
# Save after 300 seconds if at least 10 keys changed
save 300 10
# Save after 60 seconds if at least 10000 keys changed
save 60 10000

# Continue accepting writes even if RDB snapshot fails
# More lenient for dev/staging environments
stop-writes-on-bgsave-error no

# Compress RDB files
rdbcompression yes

# Enable RDB checksum
rdbchecksum yes

# RDB filename
dbfilename dump.rdb

# Working directory for persistence files
dir /var/lib/redis

# =============================================================================
# PERSISTENCE - APPEND ONLY FILE (AOF)
# =============================================================================

# Enable AOF for better durability in staging
appendonly yes

# AOF filename
appendfilename "appendonly.aof"

# Fsync policy - every second is a good balance for dev/staging
appendfsync everysec

# Allow rewrites during fsync
no-appendfsync-on-rewrite no

# Auto-rewrite AOF when it grows by 100%
auto-aof-rewrite-percentage 100

# Minimum size before auto-rewrite triggers
auto-aof-rewrite-min-size 64mb

# =============================================================================
# SLOW LOG - USEFUL FOR DEBUGGING AND PERFORMANCE ANALYSIS
# =============================================================================

# Log queries slower than 10 milliseconds (in microseconds)
slowlog-log-slower-than 10000

# Keep the last 256 slow queries
slowlog-max-len 256

# =============================================================================
# LATENCY MONITORING
# =============================================================================

# Track operations taking longer than 50ms
# Useful for developers debugging performance issues
latency-monitor-threshold 50

# =============================================================================
# KEYSPACE NOTIFICATIONS
# =============================================================================

# Enable all keyspace notifications for debugging
# K = Keyspace events
# E = Keyevent events
# A = All event types (g$lszt etc.)
notify-keyspace-events KEA

# =============================================================================
# CLIENT OUTPUT BUFFER LIMITS
# =============================================================================

# Normal clients
client-output-buffer-limit normal 0 0 0

# Replica clients (if any staging replicas are set up)
client-output-buffer-limit replica 256mb 64mb 60

# Pub/Sub clients - generous limits for dev/staging event debugging
client-output-buffer-limit pubsub 64mb 16mb 60

# =============================================================================
# LUA SCRIPTING
# =============================================================================

# Lua script timeout (in milliseconds) - longer for dev/staging debugging
lua-time-limit 10000

# =============================================================================
# REPLICATION (for staging environment scalability)
# =============================================================================

# If this instance is a replica, uncomment and set the master address
# replicaof <master-ip> 6379
# masterauth devstaging_redis_shared_2024

# Replica serves stale data if master is unreachable (useful for dev)
replica-serve-stale-data yes

# Replicas are read-only by default
replica-read-only yes

# =============================================================================
# ADVANCED CONFIGURATION
# =============================================================================

# Active rehashing for better memory efficiency
activerehashing yes

# Resize hash tables incrementally
hz 10

# Dynamic hz adjustment
dynamic-hz yes

# Enable lazy freeing for better performance on large key deletions
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# =============================================================================
# TLS/SSL CONFIGURATION (Optional - uncomment if needed)
# =============================================================================

# For secure connections from remote developers over the internet
# tls-port 6380
# tls-cert-file /etc/redis/tls/redis.crt
# tls-key-file /etc/redis/tls/redis.key
# tls-ca-cert-file /etc/redis/tls/ca.crt
# tls-auth-clients optional

# =============================================================================
# DEBUGGING FEATURES (enabled for dev/staging)
# =============================================================================

# Enable DEBUG command for development debugging
# This is restricted in production but useful here
enable-debug-command local

# Crash log enabled for diagnosing issues
crash-log-enabled yes
crash-memcheck-enabled yes