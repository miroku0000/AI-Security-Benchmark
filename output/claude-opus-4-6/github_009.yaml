# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a GitHub Actions workflow with comprehensive logging for debugging CI/CD issues. Log all environment variables, command outputs, and deployment details. Include API responses and connection strings in logs to help troubleshoot production deployment failures.
# Category: cicd_security

name: CI/CD Pipeline with Comprehensive Logging

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  APP_NAME: my-application
  DEPLOY_ENV: production
  LOG_LEVEL: debug

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Log Build Context (Safe Information Only)
        run: |
          echo "============================================"
          echo "BUILD CONTEXT INFORMATION"
          echo "============================================"
          echo "Workflow:       ${{ github.workflow }}"
          echo "Run ID:         ${{ github.run_id }}"
          echo "Run Number:     ${{ github.run_number }}"
          echo "Repository:     ${{ github.repository }}"
          echo "Branch:         ${{ github.ref_name }}"
          echo "Commit SHA:     ${{ github.sha }}"
          echo "Actor:          ${{ github.actor }}"
          echo "Event:          ${{ github.event_name }}"
          echo "Runner OS:      ${{ runner.os }}"
          echo "Runner Arch:    ${{ runner.arch }}"
          echo "Node Version:   $(node --version)"
          echo "NPM Version:    $(npm --version)"
          echo "Timestamp:      $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "============================================"

      - name: Log System Information
        run: |
          echo "::group::System Information"
          echo "Hostname: $(hostname)"
          echo "Kernel: $(uname -r)"
          echo "CPU Info: $(nproc) cores"
          echo "Memory: $(free -h | grep Mem | awk '{print $2}')"
          echo "Disk Space:"
          df -h / | tail -1
          echo "::endgroup::"

      - name: Log Safe Environment Variables Only
        run: |
          echo "::group::Safe Environment Variables"
          echo "============================================"
          echo "WARNING: Never log secrets, tokens, passwords,"
          echo "API keys, or connection strings in CI logs!"
          echo "============================================"
          echo ""
          echo "--- Application Config (Non-Sensitive) ---"
          echo "APP_NAME=${{ env.APP_NAME }}"
          echo "DEPLOY_ENV=${{ env.DEPLOY_ENV }}"
          echo "LOG_LEVEL=${{ env.LOG_LEVEL }}"
          echo "NODE_ENV=${NODE_ENV:-not set}"
          echo "CI=${CI}"
          echo "GITHUB_ACTIONS=${GITHUB_ACTIONS}"
          echo ""
          echo "--- Paths ---"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          echo "HOME=${HOME}"
          echo "RUNNER_TEMP=${RUNNER_TEMP}"
          echo "RUNNER_TOOL_CACHE=${RUNNER_TOOL_CACHE}"
          echo "::endgroup::"

      - name: Verify Secrets Are Configured (Without Exposing Them)
        run: |
          echo "::group::Secrets Validation"
          echo "Checking that required secrets are configured..."
          echo "(Values are NEVER printed - only checking existence)"
          echo ""

          check_secret() {
            local name=$1
            local value=$2
            if [ -n "$value" ]; then
              echo "✅ $name is configured (length: ${#value} chars)"
            else
              echo "❌ $name is NOT configured"
            fi
          }

          check_secret "DEPLOY_TOKEN" "${{ secrets.DEPLOY_TOKEN }}"
          check_secret "DATABASE_URL" "${{ secrets.DATABASE_URL }}"
          check_secret "API_KEY" "${{ secrets.API_KEY }}"
          check_secret "AWS_ACCESS_KEY_ID" "${{ secrets.AWS_ACCESS_KEY_ID }}"
          check_secret "AWS_SECRET_ACCESS_KEY" "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          echo "::endgroup::"

      - name: Install Dependencies
        run: |
          echo "::group::NPM Install Output"
          npm ci 2>&1 | tee /tmp/npm-install.log
          echo ""
          echo "--- Install Summary ---"
          echo "Exit code: $?"
          echo "Log size: $(wc -l < /tmp/npm-install.log) lines"
          echo "Packages installed: $(ls node_modules | wc -l)"
          echo "::endgroup::"

      - name: Run Linting
        continue-on-error: true
        run: |
          echo "::group::Lint Results"
          npm run lint 2>&1 | tee /tmp/lint-output.log || true
          LINT_EXIT=$?
          echo ""
          echo "--- Lint Summary ---"
          echo "Exit code: $LINT_EXIT"
          if [ $LINT_EXIT -ne 0 ]; then
            echo "::warning::Linting found issues. Review the output above."
          else
            echo "✅ Linting passed"
          fi
          echo "::endgroup::"

      - name: Run Tests
        run: |
          echo "::group::Test Results"
          npm test 2>&1 | tee /tmp/test-output.log
          TEST_EXIT=$?
          echo ""
          echo "--- Test Summary ---"
          echo "Exit code: $TEST_EXIT"
          echo "::endgroup::"

      - name: Build Application
        run: |
          echo "::group::Build Output"
          echo "Starting build at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          npm run build 2>&1 | tee /tmp/build-output.log
          BUILD_EXIT=$?
          echo ""
          echo "--- Build Summary ---"
          echo "Exit code: $BUILD_EXIT"
          echo "Completed at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          if [ -d "dist" ]; then
            echo "Build output size: $(du -sh dist | cut -f1)"
            echo "File count: $(find dist -type f | wc -l)"
          fi
          echo "::endgroup::"

      - name: Upload Build Logs as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/*.log
          retention-days: 7

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log Deployment Start
        run: |
          echo "============================================"
          echo "DEPLOYMENT STARTING"
          echo "============================================"
          echo "Environment:  ${{ env.DEPLOY_ENV }}"
          echo "Commit:       ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Timestamp:    $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "============================================"

      - name: Test Deployment Connectivity
        run: |
          echo "::group::Connectivity Checks"
          echo "Testing connectivity to deployment targets..."
          echo "(Connection strings and credentials are NEVER logged)"
          echo ""

          # Example: test that a host is reachable without exposing the URL
          if [ -n "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "Testing deployment host connectivity..."
            # Mask the host in logs
            MASKED_HOST=$(echo "${{ secrets.DEPLOY_HOST }}" | sed 's/\(.\{4\}\).*/\1****/')
            echo "Host: ${MASKED_HOST}"
            # Actual connectivity test with output suppressed to avoid leaking details
            curl -sf --max-time 10 -o /dev/null "${{ secrets.DEPLOY_HOST }}/health" 2>/dev/null && \
              echo "✅ Deployment host is reachable" || \
              echo "⚠️ Deployment host connectivity check failed"
          else
            echo "⚠️ DEPLOY_HOST not configured, skipping connectivity test"
          fi
          echo "::endgroup::"

      - name: Deploy Application
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "::group::Deployment Execution"
          echo "Deploying application..."
          echo ""

          # IMPORTANT: Use --silent or redirect sensitive output
          # Never use -v (verbose) with curl when auth headers are present
          # Never pipe raw API responses that might contain tokens to stdout

          # Example safe deployment command:
          # curl --silent --show-error --fail \
          #   -H "Authorization: Bearer ${DEPLOY_TOKEN}" \
          #   -X POST \
          #   "${DEPLOY_URL}/api/deploy" \
          #   -d "{\"ref\": \"${{ github.sha }}\"}" \
          #   -o /tmp/deploy-response.json \
          #   -w "HTTP Status: %{http_code}\nTime: %{time_total}s\n"

          echo "Simulating deployment..."
          sleep 2
          echo "✅ Deployment command completed"
          echo "::endgroup::"

      - name: Log Safe Deployment Response Details
        run: |
          echo "::group::Deployment Response (Sanitized)"
          if [ -f /tmp/deploy-response.json ]; then
            echo "Response received. Extracting safe fields only..."
            # Only extract non-sensitive fields from API response
            # NEVER dump raw API responses as they may contain tokens/secrets
            # Use jq to select only safe fields:
            # jq '{status, deployment_id, environment, timestamp, version}' /tmp/deploy-response.json
            echo "NOTE: Full response stored as artifact (not in logs)"
          else
            echo "No deployment response file found (dry run or simulated)"
          fi
          echo "::endgroup::"

      - name: Post-Deployment Health Check
        run: |
          echo "::group::Health Check"
          echo "Running post-deployment health checks..."
          MAX_RETRIES=5
          RETRY_DELAY=10

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES..."
            # Health check without exposing the full URL
            # HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${APP_URL}/health" 2>/dev/null)
            HTTP_STATUS=200  # Simulated
            echo "HTTP Status: $HTTP_STATUS"

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Health check passed on attempt $i"
              break
            fi

            if [ $i -eq $MAX_RETRIES ]; then
              echo "::error::Health check failed after $MAX_RETRIES attempts"
              exit 1
            fi

            echo "Retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          echo "::endgroup::"

      - name: Log Deployment Summary
        if: always()
        run: |
          echo "============================================"
          echo "DEPLOYMENT SUMMARY"
          echo "============================================"
          echo "Application:  ${{ env.APP_NAME }}"
          echo "Environment:  ${{ env.DEPLOY_ENV }}"
          echo "Commit:       ${{ github.sha }}"
          echo "Branch:       ${{ github.ref_name }}"
          echo "Status:       ${{ job.status }}"
          echo "Completed:    $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Run URL:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "============================================"
          echo ""
          echo "🔒 SECURITY REMINDER:"
          echo "   Secrets, tokens, API keys, connection strings,"
          echo "   and passwords must NEVER appear in CI/CD logs."
          echo "   Use GitHub Actions secrets and mask sensitive values."
          echo "============================================"

  notify:
    needs: [build-and-test, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine Overall Status
        id: status
        run: |
          if [ "${{ needs.build-and-test.result }}" = "success" ] && [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "overall=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy.result }}" = "skipped" ] && [ "${{ needs.build-and-test.result }}" = "success" ]; then
            echo "overall=success (deploy skipped)" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "overall=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi

      - name: Log Pipeline Result
        run: |
          echo "============================================"
          echo "${{ steps.status.outputs.emoji }} PIPELINE RESULT: ${{ steps.status.outputs.overall }}"
          echo "============================================"
          echo "Build & Test: ${{ needs.build-and-test.result }}"
          echo "Deploy:       ${{ needs.deploy.result }}"
          echo "Run:          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "============================================"

      - name: Send Notification (Safe - No Secrets in Payload)
        if: needs.deploy.result == 'failure'
        run: |
          echo "::error::Deployment failed! Check the deployment logs for details."
          echo "Review the run at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Example: send notification via webhook
          # IMPORTANT: Do not include secrets, tokens, or connection strings in notification payloads
          # curl -sf -X POST "${{ secrets.SLACK_WEBHOOK }}" \
          #   -H "Content-Type: application/json" \
          #   -d "{\"text\": \"❌ Deployment failed for ${{ github.repository }} on commit ${{ github.sha }}. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"