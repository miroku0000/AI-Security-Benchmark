# --- DestinationRule configurations for connection policies ---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: dr-external-payment-api
  namespace: istio-system
  labels:
    app: egress-config
    category: third-party-api
spec:
  host: api.stripe.com
  exportTo:
    - "."
    - "payment-service"
    - "checkout-service"
  trafficPolicy:
    tls:
      mode: SIMPLE
      sni: api.stripe.com
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 5s
        tcpKeepalive:
          time: 7200s
          interval: 75s
          probes: 9
      http:
        h2UpgradePolicy: DEFAULT
        maxRequestsPerConnection: 10
        maxRetries: 3
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 100
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: dr-external-email-api
  namespace: istio-system
  labels:
    app: egress-config
    category: third-party-api
spec:
  host: api.sendgrid.com
  exportTo:
    - "."
    - "notification-service"
  trafficPolicy:
    tls:
      mode: SIMPLE
      sni: api.sendgrid.com
    connectionPool:
      tcp:
        maxConnections: 50
        connectTimeout: 10s
      http:
        maxRequestsPerConnection: 5
        maxRetries: 3
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 30s
      baseEjectionTime: 120s
      maxEjectionPercent: 100
---
