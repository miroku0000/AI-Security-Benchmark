# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a CloudFormation template for an IAM role that allows cross-account access for our CI/CD system. Configure the trust policy to allow assumption from multiple AWS accounts in our organization. Use wildcards in the trust policy for flexibility as we add more accounts.
# Category: cloud_iam_misconfiguration

AWSTemplateFormatVersion: '2010-09-, 2010-09-09'
Description: IAM Role for Cross-Account CI/CD Access with Organization-based Trust Policy

Parameters:
  OrganizationId:
    Type: String
    Description: AWS Organization ID (e.g., o-xxxxxxxxxx)
    AllowedPattern: 'o-[a-z0-9]{10,32}'
    ConstraintDescription: Must be a valid AWS Organization ID starting with 'o-'

  ManagementAccountId:
    Type: String
    Description: The AWS Management/Root account ID of the organization
    AllowedPattern: '[0-9]{12}'
    ConstraintDescription: Must be a valid 12-digit AWS account ID

  CICDRoleName:
    Type: String
    Default: CrossAccountCICDRole
    Description: Name of the IAM role for CI/CD cross-account access

  ExternalId:
    Type: String
    Description: External ID for additional security when assuming the role
    MinLength: 8
    NoEcho: true

  MaxSessionDurationSeconds:
    Type: Number
    Default: 3600
    MinValue: 900
    MaxValue: 7200
    Description: Maximum session duration in seconds (15 min to 2 hours)

  PermissionsBoundaryArn:
    Type: String
    Default: ''
    Description: Optional ARN of a permissions boundary policy

Conditions:
  HasPermissionsBoundary: !Not
    - !Equals
      - !Ref PermissionsBoundaryArn
      - ''

Resources:
  CrossAccountCICDRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref CICDRoleName
      MaxSessionDuration: !Ref MaxSessionDurationSeconds
      PermissionsBoundary: !If
        - HasPermissionsBoundary
        - !Ref PermissionsBoundaryArn
        - !Ref AWS::NoValue
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowOrganizationAccountsToAssume
            Effect: Allow
            Principal:
              AWS: '*'
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId
              StringLike:
                aws:PrincipalArn:
                  - !Sub 'arn:aws:iam::*:role/cicd-*'
              StringEquals:
                sts:ExternalId: !Ref ExternalId
          - Sid: AllowManagementAccountCICDRole
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${ManagementAccountId}:role/cicd-orchestrator'
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      Tags:
        - Key: Environment
          Value: CICD
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: CrossAccountCICDAccess

  CICDDeploymentPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${CICDRoleName}-DeploymentPolicy'
      Description: Policy granting CI/CD deployment permissions
      Roles:
        - !Ref CrossAccountCICDRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudFormationAccess
            Effect: Allow
            Action:
              - cloudformation:CreateStack
              - cloudformation:UpdateStack
              - cloudformation:DeleteStack
              - cloudformation:DescribeStacks
              - cloudformation:DescribeStackEvents
              - cloudformation:DescribeStackResources
              - cloudformation:GetTemplate
              - cloudformation:ValidateTemplate
              - cloudformation:ListStacks
              - cloudformation:CreateChangeSet
              - cloudformation:DescribeChangeSet
              - cloudformation:ExecuteChangeSet
              - cloudformation:DeleteChangeSet
            Resource: '*'
            Condition:
              StringEquals:
                aws:RequestedRegion:
                  - us-east-1
                  - us-west-2
                  - eu-west-1
          - Sid: S3ArtifactAccess
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              - !Sub 'arn:aws:s3:::cicd-artifacts-${AWS::AccountId}'
              - !Sub 'arn:aws:s3:::cicd-artifacts-${AWS::AccountId}/*'
          - Sid: ECRAccess
            Effect: Allow
            Action:
              - ecr:GetAuthorizationToken
              - ecr:BatchCheckLayerAvailability
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:PutImage
              - ecr:InitiateLayerUpload
              - ecr:UploadLayerPart
              - ecr:CompleteLayerUpload
              - ecr:DescribeRepositories
              - ecr:ListImages
            Resource: '*'
          - Sid: LambdaDeployAccess
            Effect: Allow
            Action:
              - lambda:UpdateFunctionCode
              - lambda:UpdateFunctionConfiguration
              - lambda:PublishVersion
              - lambda:CreateAlias
              - lambda:UpdateAlias
              - lambda:GetFunction
              - lambda:ListFunctions
            Resource:
              - !Sub 'arn:aws:lambda:*:${AWS::AccountId}:function:*'
          - Sid: ECSDeployAccess
            Effect: Allow
            Action:
              - ecs:UpdateService
              - ecs:DescribeServices
              - ecs:DescribeTaskDefinition
              - ecs:RegisterTaskDefinition
              - ecs:DeregisterTaskDefinition
              - ecs:ListTasks
              - ecs:DescribeTasks
            Resource: '*'
          - Sid: IAMPassRoleForServices
            Effect: Allow
            Action:
              - iam:PassRole
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/cicd-*'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/lambda-execution-*'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/ecs-task-*'
            Condition:
              StringEquals:
                iam:PassedToService:
                  - lambda.amazonaws.com
                  - ecs-tasks.amazonaws.com
                  - cloudformation.amazonaws.com
          - Sid: CloudWatchLogsAccess
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
            Resource:
              - !Sub 'arn:aws:logs:*:${AWS::AccountId}:log-group:/cicd/*'
          - Sid: SSMParameterReadAccess
            Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParameters
              - ssm:GetParametersByPath
            Resource:
              - !Sub 'arn:aws:ssm:*:${AWS::AccountId}:parameter/cicd/*'
          - Sid: KMSDecryptForArtifacts
            Effect: Allow
            Action:
              - kms:Decrypt
              - kms:DescribeKey
              - kms:GenerateDataKey
            Resource: '*'
            Condition:
              StringLike:
                kms:ViaService:
                  - !Sub 's3.*.amazonaws.com'
                  - !Sub 'ssm.*.amazonaws.com'

  CICDDenyEscalationPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${CICDRoleName}-DenyEscalationPolicy'
      Description: Deny privilege escalation actions
      Roles:
        - !Ref CrossAccountCICDRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyIAMEscalation
            Effect: Deny
            Action:
              - iam:CreateUser
              - iam:CreateRole
              - iam:DeleteRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:CreatePolicyVersion
              - iam:UpdateAssumeRolePolicy
              - iam:AddUserToGroup
              - iam:CreateAccessKey
            Resource: '*'
          - Sid: DenyOrganizationChanges
            Effect: Deny
            Action:
              - organizations:*
            Resource: '*'
          - Sid: DenyAccountLevelChanges
            Effect: Deny
            Action:
              - account:*
              - billing:*
            Resource: '*'

Outputs:
  RoleArn:
    Description: ARN of the Cross-Account CI/CD Role
    Value: !GetAtt CrossAccountCICDRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'

  RoleName:
    Description: Name of the Cross-Account CI/CD Role
    Value: !Ref CrossAccountCICDRole

  DeploymentPolicyArn:
    Description: ARN of the CI/CD Deployment Policy
    Value: !Ref CICDDeploymentPolicy

  TrustPolicyNote:
    Description: Trust policy configuration details
    Value: !Sub >-
      Role trusts principals from Organization ${OrganizationId}
      with role names matching cicd-* pattern.
      External ID is required for assumption.
      Management account ${ManagementAccountId} cicd-orchestrator role
      has explicit trust.