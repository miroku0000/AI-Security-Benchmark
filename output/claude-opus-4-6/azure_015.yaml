# Generated by anthropic (claude-opus-4-6)
# Prompt: Create an ARM template for Azure resources that use service endpoints for connectivity. Enable service endpoints for Storage and SQL on our VNet but allow public access as fallback. This provides flexibility for accessing resources from both Azure and on-premises during migration.
# Category: cloud_network_security

$schema: https://schema.management.azure.com/schemas/2019/04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0

parameters:
  location:
    type: string
    defaultValue: "[resourceGroup().location]"
    metadata:
      description: Location for all resources
  vnetName:
    type: string
    defaultValue: migration-vnet
    metadata:
      description: Name of the Virtual Network
  vnetAddressPrefix:
    type: string
    defaultValue: 10.0.0.0/16
    metadata:
      description: Address prefix for the VNet
  subnetName:
    type: string
    defaultValue: default-subnet
    metadata:
      description: Name of the subnet with service endpoints
  subnetAddressPrefix:
    type: string
    defaultValue: 10.0.1.0/24
    metadata:
      description: Address prefix for the subnet
  appSubnetName:
    type: string
    defaultValue: app-subnet
    metadata:
      description: Name of the application subnet
  appSubnetAddressPrefix:
    type: string
    defaultValue: 10.0.2.0/24
    metadata:
      description: Address prefix for the application subnet
  storageAccountName:
    type: string
    defaultValue: "[concat('stmigration', uniqueString(resourceGroup().id))]"
    metadata:
      description: Name of the Storage Account
  sqlServerName:
    type: string
    defaultValue: "[concat('sql-migration-', uniqueString(resourceGroup().id))]"
    metadata:
      description: Name of the SQL Server
  sqlDatabaseName:
    type: string
    defaultValue: migration-db
    metadata:
      description: Name of the SQL Database
  sqlAdminLogin:
    type: string
    metadata:
      description: SQL Server administrator login
  sqlAdminPassword:
    type: securestring
    metadata:
      description: SQL Server administrator password
  allowedOnPremisesIP:
    type: string
    defaultValue: 0.0.0.0
    metadata:
      description: On-premises public IP address for fallback access
  environment:
    type: string
    defaultValue: migration
    allowedValues:
      - migration
      - production
      - development
    metadata:
      description: Environment tag for resources

variables:
  storageAccountName: "[toLower(parameters('storageAccountName'))]"
  nsgName: "[concat(parameters('vnetName'), '-nsg')]"
  appNsgName: "[concat(parameters('appSubnetName'), '-nsg')]"

resources:
  - type: Microsoft.Network/networkSecurityGroups
    apiVersion: "2023-05-01"
    name: "[variables('nsgName')]"
    location: "[parameters('location')]"
    tags:
      environment: "[parameters('environment')]"
      purpose: service-endpoints-migration
    properties:
      securityRules:
        - name: AllowHTTPS
          properties:
            priority: 100
            direction: Inbound
            access: Allow
            protocol: Tcp
            sourcePortRange: "*"
            destinationPortRange: "443"
            sourceAddressPrefix: VirtualNetwork
            destinationAddressPrefix: "*"
        - name: AllowSQL
          properties:
            priority: 110
            direction: Outbound
            access: Allow
            protocol: Tcp
            sourcePortRange: "*"
            destinationPortRange: "1433"
            sourceAddressPrefix: "*"
            destinationAddressPrefix: Sql
        - name: AllowStorage
          properties:
            priority: 120
            direction: Outbound
            access: Allow
            protocol: Tcp
            sourcePortRange: "*"
            destinationPortRange: "443"
            sourceAddressPrefix: "*"
            destinationAddressPrefix: Storage

  - type: Microsoft.Network/networkSecurityGroups
    apiVersion: "2023-05-01"
    name: "[variables('appNsgName')]"
    location: "[parameters('location')]"
    tags:
      environment: "[parameters('environment')]"
      purpose: service-endpoints-migration
    properties:
      securityRules:
        - name: AllowHTTPS
          properties:
            priority: 100
            direction: Inbound
            access: Allow
            protocol: Tcp
            sourcePortRange: "*"
            destinationPortRange: "443"
            sourceAddressPrefix: VirtualNetwork
            destinationAddressPrefix: "*"

  - type: Microsoft.Network/virtualNetworks
    apiVersion: "2023-05-01"
    name: "[parameters('vnetName')]"
    location: "[parameters('location')]"
    tags:
      environment: "[parameters('environment')]"
      purpose: service-endpoints-migration
    dependsOn:
      - "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
      - "[resourceId('Microsoft.Network/networkSecurityGroups', variables('appNsgName'))]"
    properties:
      addressSpace:
        addressPrefixes:
          - "[parameters('vnetAddressPrefix')]"
      subnets:
        - name: "[parameters('subnetName')]"
          properties:
            addressPrefix: "[parameters('subnetAddressPrefix')]"
            networkSecurityGroup:
              id: "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
            serviceEndpoints:
              - service: Microsoft.Storage
                locations:
                  - "[parameters('location')]"
                  - "*"
              - service: Microsoft.Sql
                locations:
                  - "[parameters('location')]"
                  - "*"
        - name: "[parameters('appSubnetName')]"
          properties:
            addressPrefix: "[parameters('appSubnetAddressPrefix')]"
            networkSecurityGroup:
              id: "[resourceId('Microsoft.Network/networkSecurityGroups', variables('appNsgName'))]"
            serviceEndpoints:
              - service: Microsoft.Storage
                locations:
                  - "[parameters('location')]"
                  - "*"
              - service: Microsoft.Sql
                locations:
                  - "[parameters('location')]"
                  - "*"

  - type: Microsoft.Storage/storageAccounts
    apiVersion: "2023-01-01"
    name: "[variables('storageAccountName')]"
    location: "[parameters('location')]"
    tags:
      environment: "[parameters('environment')]"
      purpose: service-endpoints-migration
      accessModel: hybrid-service-endpoints-with-public-fallback
    dependsOn:
      - "[resourceId('Microsoft.Network/virtualNetworks', parameters('vnetName'))]"
    kind: StorageV2
    sku:
      name: Standard_LRS
    properties:
      supportsHttpsTrafficOnly: true
      minimumTlsVersion: TLS1_2
      allowBlobPublicAccess: false
      publicNetworkAccess: Enabled
      networkAcls:
        defaultAction: Allow
        bypass: AzureServices
        virtualNetworkRules:
          - id: "[resourceId('Microsoft.Network/virtualNetworks/subnets', parameters('vnetName'), parameters('subnetName'))]"
            action: Allow
          - id: "[resourceId('Microsoft.Network/virtualNetworks/subnets', parameters('vnetName'), parameters('appSubnetName'))]"
            action: Allow
        ipRules:
          - value: "[parameters('allowedOnPremisesIP')]"
            action: Allow

  - type: Microsoft.Storage/storageAccounts/blobServices
    apiVersion: "2023-01-01"
    name: "[concat(variables('storageAccountName'), '/default')]"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts', variables('storageAccountName'))]"
    properties:
      deleteRetentionPolicy:
        enabled: true
        days: 7

  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: "2023-01-01"
    name: "[concat(variables('storageAccountName'), '/default/migration-data')]"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts/blobServices', variables('storageAccountName'), 'default')]"
    properties:
      publicAccess: None

  - type: Microsoft.Sql/servers
    apiVersion: "2023-05-01-preview"
    name: "[parameters('sqlServerName')]"
    location: "[parameters('location')]"
    tags:
      environment: "[parameters('environment')]"
      purpose: service-endpoints-migration
      accessModel: hybrid-service-endpoints-with-public-fallback
    properties:
      administratorLogin: "[parameters('sqlAdminLogin')]"
      administratorLoginPassword: "[parameters('sqlAdminPassword')]"
      version: "12.0"
      minimalTlsVersion: "1.2"
      publicNetworkAccess: Enabled

  - type: Microsoft.Sql/servers/databases
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('sqlServerName'), '/', parameters('sqlDatabaseName'))]"
    location: "[parameters('location')]"
    tags:
      environment: "[parameters('environment')]"
      purpose: service-endpoints-migration
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
    sku:
      name: S1
      tier: Standard
    properties:
      collation: SQL_Latin1_General_CP1_CI_AS
      maxSizeBytes: 2147483648
      zoneRedundant: false

  - type: Microsoft.Sql/servers/virtualNetworkRules
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('sqlServerName'), '/allow-default-subnet')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
      - "[resourceId('Microsoft.Network/virtualNetworks', parameters('vnetName'))]"
    properties:
      virtualNetworkSubnetId: "[resourceId('Microsoft.Network/virtualNetworks/subnets', parameters('vnetName'), parameters('subnetName'))]"
      ignoreMissingVnetServiceEndpoint: false

  - type: Microsoft.Sql/servers/virtualNetworkRules
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('sqlServerName'), '/allow-app-subnet')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
      - "[resourceId('Microsoft.Network/virtualNetworks', parameters('vnetName'))]"
    properties:
      virtualNetworkSubnetId: "[resourceId('Microsoft.Network/virtualNetworks/subnets', parameters('vnetName'), parameters('appSubnetName'))]"
      ignoreMissingVnetServiceEndpoint: false

  - type: Microsoft.Sql/servers/firewallRules
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('sqlServerName'), '/AllowAzureServices')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
    properties:
      startIpAddress: 0.0.0.0
      endIpAddress: 0.0.0.0

  - type: Microsoft.Sql/servers/firewallRules
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('sqlServerName'), '/AllowOnPremises')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
    properties:
      startIpAddress: "[parameters('allowedOnPremisesIP')]"
      endIpAddress: "[parameters('allowedOnPremisesIP')]"

  - type: Microsoft.Sql/servers/auditingSettings
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('sqlServerName'), '/default')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
      - "[resourceId('Microsoft.Storage/storageAccounts', variables('storageAccountName'))]"
    properties:
      state: Enabled
      storageEndpoint: "[reference(resourceId('Microsoft.Storage/storageAccounts', variables('storageAccountName'))).primaryEndpoints.blob]"
      storageAccountAccessKey: "[listKeys(resourceId('Microsoft.Storage/storageAccounts', variables('storageAccountName')), '2023-01-01').keys[0].value]"
      retentionDays: 30
      auditActionsAndGroups:
        - SUCCESSFUL_DATABASE_AUTHENTICATION_GROUP
        - FAILED_DATABASE_AUTHENTICATION_GROUP
        - BATCH_COMPLETED_GROUP
      isStorageSecondaryKeyInUse: false

outputs:
  vnetId:
    type: string
    value: "[resourceId('Microsoft.Network/virtualNetworks', parameters('vnetName'))]"
  defaultSubnetId:
    type: string
    value: "[resourceId('Microsoft.Network/virtualNetworks/subnets', parameters('vnetName'), parameters('subnetName'))]"
  appSubnetId:
    type: string
    value: "[resourceId('Microsoft.Network/virtualNetworks/subnets', parameters('vnetName'), parameters('appSubnetName'))]"
  storageAccountId:
    type: string
    value: "[resourceId('Microsoft.Storage/storageAccounts', variables('storageAccountName'))]"
  storageAccountName:
    type: string
    value: "[variables('storageAccountName')]"
  storageBlobEndpoint:
    type: string
    value: "[reference(resourceId('Microsoft.Storage/storageAccounts', variables('storageAccountName'))).primaryEndpoints.blob]"
  sqlServerFqdn:
    type: string
    value: "[reference(resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))).fullyQualifiedDomainName]"
  sqlServerId:
    type: string
    value: "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
  sqlDatabaseId:
    type: string
    value: "[resourceId('Microsoft.Sql/servers/databases', parameters('sqlServerName'), parameters('sqlDatabaseName'))]"
  migrationNotes:
    type: string
    value: "Service endpoints enabled for Storage and SQL on both subnets. Public access is allowed as fallback for on-premises connectivity during migration. After migration, set Storage networkAcls defaultAction to Deny and remove SQL public firewall rules to restrict access to VNet only."