# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instances with EBS volumes for application data - Production ready with encryption and backup policies

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development
    Description: Environment name for resource tagging

  InstanceType:
    Type: String
    Default: t3.large
    AllowedValues:
      - t3.medium
      - t3.large
      - t3.xlarge
      - m5.large
      - m5.xlarge
    Description: EC2 instance type

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Latest Amazon Linux 2023 AMI

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the EC2 instances

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID for the EC2 instances

  DataVolumeSize:
    Type: Number
    Default: 100
    MinValue: 20
    MaxValue: 16384
    Description: Size of the application data EBS volume in GiB

  BackupRetentionDays:
    Type: Number
    Default: 30
    MinValue: 7
    MaxValue: 365
    Description: Number of days to retain EBS snapshots

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access

Resources:

  # KMS Key for EBS encryption - encryption should never be deferred
  EBSEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for EBS volume encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRootAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource: '*'
          - Sid: AllowEC2Service
            Effect: Allow
            Principal:
              AWS: !GetAtt EC2InstanceRole.Arn
            Action:
              - kms:Decrypt
              - kms:DescribeKey
              - kms:Encrypt
              - kms:GenerateDataKey*
              - kms:ReEncrypt*
            Resource: '*'
          - Sid: AllowAWSBackup
            Effect: Allow
            Principal:
              AWS: !GetAtt BackupServiceRole.Arn
            Action:
              - kms:Decrypt
              - kms:DescribeKey
              - kms:Encrypt
              - kms:GenerateDataKey*
              - kms:ReEncrypt*
              - kms:CreateGrant
              - kms:ListGrants
            Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ebs-encryption-key
        - Key: Environment
          Value: !Ref EnvironmentName

  EBSEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub alias/${EnvironmentName}-ebs-encryption-key
      TargetKeyId: !Ref EBSEncryptionKey

  # IAM Role for EC2 instances
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-ec2-instance-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub ${EnvironmentName}-ec2-instance-profile
      Roles:
        - !Ref EC2InstanceRole

  # Security Group with minimal access
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for application EC2 instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.0.0.0/8
          Description: HTTPS from internal network
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS outbound for updates and AWS API calls
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-app-sg
        - Key: Environment
          Value: !Ref EnvironmentName

  # EC2 Instance with encrypted root and data volumes
  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyPairName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      # IMDSv2 required to prevent SSRF attacks
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 1
        HttpEndpoint: enabled
      # Encrypted root volume
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            Encrypted: true
            KmsKeyId: !GetAtt EBSEncryptionKey.Arn
            DeleteOnTermination: true
      # Enable detailed monitoring
      Monitoring: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          # Wait for data volume to attach
          while [ ! -e /dev/xvdf ]; do
            echo "Waiting for data volume..."
            sleep 5
          done

          # Format and mount data volume if not already formatted
          if ! blkid /dev/xvdf; then
            mkfs.xfs /dev/xvdf
          fi

          mkdir -p /data
          mount /dev/xvdf /data

          # Add to fstab for persistence
          echo "UUID=$(blkid -s UUID -o value /dev/xvdf) /data xfs defaults,nofail 0 2" >> /etc/fstab

          # Set proper permissions
          chmod 750 /data

          # Install and start CloudWatch agent
          yum install -y amazon-cloudwatch-agent
          systemctl enable amazon-cloudwatch-agent
          systemctl start amazon-cloudwatch-agent
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-app-instance
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Backup
          Value: "true"

  # Encrypted application data EBS volume
  AppDataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      AvailabilityZone: !GetAtt AppInstance.AvailabilityZone
      Size: !Ref DataVolumeSize
      VolumeType: gp3
      Iops: 3000
      Throughput: 125
      Encrypted: true
      KmsKeyId: !GetAtt EBSEncryptionKey.Arn
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-app-data-volume
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Backup
          Value: "true"

  # Attach data volume to instance
  AppDataVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/xvdf
      InstanceId: !Ref AppInstance
      VolumeId: !Ref AppDataVolume

  # AWS Backup - backup policies should not be deferred
  BackupServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-backup-service-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForRestores
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: !Sub ${EnvironmentName}-ebs-backup-vault
      EncryptionKeyArn: !GetAtt EBSEncryptionKey.Arn
      AccessPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: PreventBackupDeletion
            Effect: Deny
            Principal: '*'
            Action: backup:DeleteRecoveryPoint
            Resource: '*'

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: !Sub ${EnvironmentName}-ebs-daily-backup
        BackupPlanRule:
          - RuleName: DailyBackup
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: cron(0 3 * * ? *)
            StartWindowMinutes: 60
            CompletionWindowMinutes: 180
            Lifecycle:
              DeleteAfterDays: !Ref BackupRetentionDays
            EnableContinuousBackup: false

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: !Sub ${EnvironmentName}-ebs-tagged-resources
        IamRoleArn: !GetAtt BackupServiceRole.Arn
        ListOfTags:
          - ConditionType: STRINGEQUALS
            ConditionKey: Backup
            ConditionValue: "true"

  # CloudWatch Alarms for instance and volume monitoring
  InstanceStatusCheckAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-instance-status-check
      AlarmDescription: Alert when instance status check fails
      Namespace: AWS/EC2
      MetricName: StatusCheckFailed
      Dimensions:
        - Name: InstanceId
          Value: !Ref AppInstance
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: breaching

  DataVolumeReadLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-data-volume-high-latency
      AlarmDescription: Alert when EBS data volume latency is high
      Namespace: AWS/EBS
      MetricName: VolumeTotalReadTime
      Dimensions:
        - Name: VolumeId
          Value: !Ref AppDataVolume
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 0.5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  DiskSpaceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-data-volume-disk-space
      AlarmDescription: Alert when data volume disk usage exceeds 80%
      Namespace: CWAgent
      MetricName: disk_used_percent
      Dimensions:
        - Name: InstanceId
          Value: !Ref AppInstance
        - Name: path
          Value: /data
        - Name: fstype
          Value: xfs
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref AppInstance
    Export:
      Name: !Sub ${EnvironmentName}-AppInstanceId

  InstancePrivateIp:
    Description: Private IP address of the EC2 instance
    Value: !GetAtt AppInstance.PrivateIp
    Export:
      Name: !Sub ${EnvironmentName}-AppInstancePrivateIp

  DataVolumeId:
    Description: Application data EBS volume ID
    Value: !Ref AppDataVolume
    Export:
      Name: !Sub ${EnvironmentName}-DataVolumeId

  KmsKeyArn:
    Description: KMS key ARN used for EBS encryption
    Value: !GetAtt EBSEncryptionKey.Arn
    Export:
      Name: !Sub ${EnvironmentName}-EBSKmsKeyArn

  BackupVaultArn:
    Description: Backup vault ARN
    Value: !GetAtt BackupVault.BackupVaultArn
    Export:
      Name: !Sub ${EnvironmentName}-BackupVaultArn

  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref InstanceSecurityGroup
    Export:
      Name: !Sub ${EnvironmentName}-AppSecurityGroupId