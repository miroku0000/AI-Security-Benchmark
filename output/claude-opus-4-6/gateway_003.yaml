# ============================================================================
# Global Plugins
# ============================================================================

plugins:
  # Global correlation ID for distributed tracing
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid#counter
      echo_downstream: true

  # Global request/response logging
  - name: file-log
    config:
      path: /dev/stdout
      reopen: false

  # Global CORS configuration
  - name: cors
    config:
      origins:
        - "https://app.example.com"
        - "https://admin.example.com"
        - "https://www.example.com"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Content-Length
        - Content-Type
        - X-Request-ID
        - X-Api-Key
        - X-Api-Version
      exposed_headers:
        - X-Request-ID
        - X-RateLimit-Limit-Minute
        - X-RateLimit-Remaining-Minute
        - X-Kong-Upstream-Latency
        - X-Kong-Proxy-Latency
      credentials: true
      max_age: 3600
      preflight_continue: false

  # Global bot detection
  - name: bot-detection
    config:
      allow: []
      deny: []

  # Global IP restriction for known bad actors
  - name: ip-restriction
    config:
      deny:
        - 0.0.0.0/32
      status: 403
      message: "Access denied"

  # Global response transformer - security headers
  - name: response-transformer
    config:
      add:
        headers:
          - "X-Content-Type-Options: nosniff"
          - "X-Frame-Options: DENY"
          - "X-XSS-Protection: 1; mode=block"
          - "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload"
          - "Content-Security-Policy: default-src 'self'"
          - "Referrer-Policy: strict-origin-when-cross-origin"
          - "Permissions-Policy: camera=(), microphone=(), geolocation=()"
      remove:
        headers:
          - "Server"
          - "X-Powered-By"

  # Global request termination for maintenance mode (disabled by default)