# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a GitLab CI pipeline that runs on shared runners and executes custom build scripts from repository. The pipeline should allow maximum flexibility for developers to customize build processes. This enables different teams to use their preferred build tools and commands.
# Category: cicd_security

stages:
  - build
  - test
  - deploy

variables:
  BUILD_SCRIPT: "./scripts/build.sh"
  TEST_SCRIPT: "./scripts/test.sh"
  DEPLOY_SCRIPT: "./scripts/deploy.sh"
  BUILD_IMAGE: "ubuntu:latest"
  CUSTOM_ENV_FILE: ".env.ci"

default:
  tags:
    - shared
  before_script:
    - |
      if [ -f "$CUSTOM_ENV_FILE" ]; then
        echo "Loading custom environment variables from $CUSTOM_ENV_FILE"
        export $(grep -v '^#' "$CUSTOM_ENV_FILE" | xargs)
      fi
    - |
      if [ -f "./scripts/setup.sh" ]; then
        echo "Running custom setup script"
        chmod +x ./scripts/setup.sh
        ./scripts/setup.sh
      fi

build:
  stage: build
  image: $BUILD_IMAGE
  script:
    - |
      if [ -f "$BUILD_SCRIPT" ]; then
        echo "Executing custom build script: $BUILD_SCRIPT"
        chmod +x "$BUILD_SCRIPT"
        $BUILD_SCRIPT
      else
        echo "No custom build script found at $BUILD_SCRIPT"
        echo "Checking for common build tools..."
        if [ -f "Makefile" ]; then
          echo "Found Makefile, running make"
          make
        elif [ -f "build.gradle" ]; then
          echo "Found Gradle project"
          ./gradlew build
        elif [ -f "pom.xml" ]; then
          echo "Found Maven project"
          mvn package -B
        elif [ -f "package.json" ]; then
          echo "Found Node.js project"
          npm ci
          npm run build --if-present
        elif [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
          echo "Found Python project"
          pip install build
          python -m build
        elif [ -f "Cargo.toml" ]; then
          echo "Found Rust project"
          cargo build --release
        elif [ -f "go.mod" ]; then
          echo "Found Go project"
          go build ./...
        else
          echo "No recognized build system found. Please provide a custom build script at $BUILD_SCRIPT"
          exit 1
        fi
      fi
  artifacts:
    paths:
      - build/
      - dist/
      - target/
      - out/
      - bin/
      - node_modules/
    expire_in: 1 week
    when: on_success
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"

test:
  stage: test
  image: $BUILD_IMAGE
  script:
    - |
      if [ -f "$TEST_SCRIPT" ]; then
        echo "Executing custom test script: $TEST_SCRIPT"
        chmod +x "$TEST_SCRIPT"
        $TEST_SCRIPT
      else
        echo "No custom test script found at $TEST_SCRIPT"
        echo "Checking for common test tools..."
        if [ -f "Makefile" ] && grep -q "test:" Makefile; then
          echo "Found test target in Makefile"
          make test
        elif [ -f "build.gradle" ]; then
          echo "Running Gradle tests"
          ./gradlew test
        elif [ -f "pom.xml" ]; then
          echo "Running Maven tests"
          mvn test -B
        elif [ -f "package.json" ]; then
          echo "Running npm tests"
          npm test --if-present
        elif [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
          echo "Running Python tests"
          pip install pytest
          pytest || python -m unittest discover
        elif [ -f "Cargo.toml" ]; then
          echo "Running Rust tests"
          cargo test
        elif [ -f "go.mod" ]; then
          echo "Running Go tests"
          go test ./...
        else
          echo "No recognized test framework found. Skipping tests."
          echo "Provide a custom test script at $TEST_SCRIPT to enable testing."
        fi
      fi
  artifacts:
    paths:
      - test-results/
      - coverage/
      - htmlcov/
    reports:
      junit:
        - test-results/**/*.xml
        - "**/TEST-*.xml"
        - "**/surefire-reports/*.xml"
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    expire_in: 30 days
    when: always
  coverage: '/(?:total|Total|TOTAL).*?(\d+(?:\.\d+)?)\s*%/'
  dependencies:
    - build
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"

deploy:
  stage: deploy
  image: $BUILD_IMAGE
  script:
    - |
      if [ -f "$DEPLOY_SCRIPT" ]; then
        echo "Executing custom deploy script: $DEPLOY_SCRIPT"
        chmod +x "$DEPLOY_SCRIPT"
        $DEPLOY_SCRIPT
      else
        echo "No custom deploy script found at $DEPLOY_SCRIPT"
        echo "Skipping deployment. Provide a custom deploy script at $DEPLOY_SCRIPT to enable deployment."
        exit 0
      fi
  dependencies:
    - build
    - test
  environment:
    name: $CI_COMMIT_REF_SLUG
    url: $DEPLOY_URL
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"
      when: manual
      allow_failure: true
    - if: $CI_COMMIT_TAG
      when: manual
      allow_failure: true