# Generated by anthropic (claude-opus-4-6)
# Prompt: Write an ARM template for a complete Azure web application stack (App Service, SQL Database, Storage Account). Focus on core resources and connectivity. We'll add diagnostic settings and monitoring in the next iteration after we verify the basic setup works.
# Category: cloud_monitoring

apiVersion: '2021-04-01'
contentVersion: 1.0.0.0

parameters:
  environmentName:
    type: string
    defaultValue: dev
    allowedValues:
      - dev
      - staging
      - prod
    metadata:
      description: Environment name for resource naming and configuration

  location:
    type: string
    defaultValue: '[resourceGroup().location]'
    metadata:
      description: Azure region for all resources

  appServicePlanSku:
    type: string
    defaultValue: S1
    allowedValues:
      - F1
      - B1
      - S1
      - S2
      - P1v3
      - P2v3
    metadata:
      description: SKU for the App Service Plan

  sqlAdminLogin:
    type: string
    metadata:
      description: SQL Server administrator login name
    minLength: 1

  sqlAdminPassword:
    type: securestring
    metadata:
      description: SQL Server administrator password
    minLength: 12

  sqlDatabaseSku:
    type: string
    defaultValue: S0
    allowedValues:
      - Basic
      - S0
      - S1
      - S2
      - P1
    metadata:
      description: SKU for the SQL Database

  storageAccountSku:
    type: string
    defaultValue: Standard_LRS
    allowedValues:
      - Standard_LRS
      - Standard_GRS
      - Standard_ZRS
      - Standard_RAGRS
    metadata:
      description: SKU for the Storage Account

variables:
  baseName: '[concat(''webapp'', parameters(''environmentName''), uniqueString(resourceGroup().id))]'
  appServicePlanName: '[concat(''asp-'', variables(''baseName''))]'
  webAppName: '[concat(''app-'', variables(''baseName''))]'
  sqlServerName: '[concat(''sql-'', variables(''baseName''))]'
  sqlDatabaseName: '[concat(''sqldb-'', variables(''baseName''))]'
  storageAccountName: '[concat(''st'', uniqueString(resourceGroup().id, parameters(''environmentName'')))]'
  storageConnectionStringBase: '[concat(''DefaultEndpointsProtocol=https;AccountName='', variables(''storageAccountName''), '';AccountKey='')]'

resources:
  # ============================================================
  # Storage Account
  # ============================================================
  - type: Microsoft.Storage/storageAccounts
    apiVersion: '2023-01-01'
    name: '[variables(''storageAccountName'')]'
    location: '[parameters(''location'')]'
    kind: StorageV2
    sku:
      name: '[parameters(''storageAccountSku'')]'
    properties:
      accessTier: Hot
      supportsHttpsTrafficOnly: true
      minimumTlsVersion: TLS1_2
      allowBlobPublicAccess: false
      allowSharedKeyAccess: true
      networkAcls:
        defaultAction: Allow
        bypass: AzureServices
    tags:
      environment: '[parameters(''environmentName'')]'
      component: storage

  # Blob Service for the Storage Account
  - type: Microsoft.Storage/storageAccounts/blobServices
    apiVersion: '2023-01-01'
    name: '[concat(variables(''storageAccountName''), ''/default'')]'
    dependsOn:
      - '[resourceId(''Microsoft.Storage/storageAccounts'', variables(''storageAccountName''))]'
    properties:
      deleteRetentionPolicy:
        enabled: true
        days: 7

  # Default blob container for application data
  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: '2023-01-01'
    name: '[concat(variables(''storageAccountName''), ''/default/appdata'')]'
    dependsOn:
      - '[resourceId(''Microsoft.Storage/storageAccounts/blobServices'', variables(''storageAccountName''), ''default'')]'
    properties:
      publicAccess: None

  # Uploads blob container
  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: '2023-01-01'
    name: '[concat(variables(''storageAccountName''), ''/default/uploads'')]'
    dependsOn:
      - '[resourceId(''Microsoft.Storage/storageAccounts/blobServices'', variables(''storageAccountName''), ''default'')]'
    properties:
      publicAccess: None

  # ============================================================
  # SQL Server and Database
  # ============================================================
  - type: Microsoft.Sql/servers
    apiVersion: '2023-05-01-preview'
    name: '[variables(''sqlServerName'')]'
    location: '[parameters(''location'')]'
    properties:
      administratorLogin: '[parameters(''sqlAdminLogin'')]'
      administratorLoginPassword: '[parameters(''sqlAdminPassword'')]'
      version: '12.0'
      minimalTlsVersion: '1.2'
      publicNetworkAccess: Enabled
    tags:
      environment: '[parameters(''environmentName'')]'
      component: database

  # SQL Server Firewall Rule - Allow Azure Services
  - type: Microsoft.Sql/servers/firewallRules
    apiVersion: '2023-05-01-preview'
    name: '[concat(variables(''sqlServerName''), ''/AllowAzureServices'')]'
    dependsOn:
      - '[resourceId(''Microsoft.Sql/servers'', variables(''sqlServerName''))]'
    properties:
      startIpAddress: 0.0.0.0
      endIpAddress: 0.0.0.0

  # SQL Database
  - type: Microsoft.Sql/servers/databases
    apiVersion: '2023-05-01-preview'
    name: '[concat(variables(''sqlServerName''), ''/'', variables(''sqlDatabaseName''))]'
    location: '[parameters(''location'')]'
    dependsOn:
      - '[resourceId(''Microsoft.Sql/servers'', variables(''sqlServerName''))]'
    sku:
      name: '[parameters(''sqlDatabaseSku'')]'
    properties:
      collation: SQL_Latin1_General_CP1_CI_AS
      maxSizeBytes: 2147483648
      zoneRedundant: false
      readScale: Disabled
      requestedBackupStorageRedundancy: Local
    tags:
      environment: '[parameters(''environmentName'')]'
      component: database

  # SQL Server Connection Policy
  - type: Microsoft.Sql/servers/connectionPolicies
    apiVersion: '2023-05-01-preview'
    name: '[concat(variables(''sqlServerName''), ''/default'')]'
    dependsOn:
      - '[resourceId(''Microsoft.Sql/servers'', variables(''sqlServerName''))]'
    properties:
      connectionType: Default

  # ============================================================
  # App Service Plan
  # ============================================================
  - type: Microsoft.Web/serverfarms
    apiVersion: '2023-01-01'
    name: '[variables(''appServicePlanName'')]'
    location: '[parameters(''location'')]'
    kind: app
    sku:
      name: '[parameters(''appServicePlanSku'')]'
    properties:
      reserved: false
    tags:
      environment: '[parameters(''environmentName'')]'
      component: compute

  # ============================================================
  # Web App
  # ============================================================
  - type: Microsoft.Web/sites
    apiVersion: '2023-01-01'
    name: '[variables(''webAppName'')]'
    location: '[parameters(''location'')]'
    kind: app
    identity:
      type: SystemAssigned
    dependsOn:
      - '[resourceId(''Microsoft.Web/serverfarms'', variables(''appServicePlanName''))]'
      - '[resourceId(''Microsoft.Sql/servers/databases'', variables(''sqlServerName''), variables(''sqlDatabaseName''))]'
      - '[resourceId(''Microsoft.Storage/storageAccounts'', variables(''storageAccountName''))]'
    properties:
      serverFarmId: '[resourceId(''Microsoft.Web/serverfarms'', variables(''appServicePlanName''))]'
      httpsOnly: true
      clientAffinityEnabled: false
      siteConfig:
        minTlsVersion: '1.2'
        ftpsState: Disabled
        alwaysOn: '[if(equals(parameters(''appServicePlanSku''), ''F1''), false(), true())]'
        http20Enabled: true
        netFrameworkVersion: v4.0
        use32BitWorkerProcess: false
        webSocketsEnabled: false
        appSettings:
          - name: WEBSITE_RUN_FROM_PACKAGE
            value: '1'
          - name: ASPNETCORE_ENVIRONMENT
            value: '[if(equals(parameters(''environmentName''), ''prod''), ''Production'', if(equals(parameters(''environmentName''), ''staging''), ''Staging'', ''Development''))]'
          - name: StorageAccount__ConnectionString
            value: '[concat(variables(''storageConnectionStringBase''), listKeys(resourceId(''Microsoft.Storage/storageAccounts'', variables(''storageAccountName'')), ''2023-01-01'').keys[0].value, '';EndpointSuffix=core.windows.net'')]'
          - name: StorageAccount__ContainerName
            value: appdata
        connectionStrings:
          - name: DefaultConnection
            connectionString: '[concat(''Server=tcp:'', reference(resourceId(''Microsoft.Sql/servers'', variables(''sqlServerName''))).fullyQualifiedDomainName, '','', 1433, '';Initial Catalog='', variables(''sqlDatabaseName''), '';Persist Security Info=False;User ID='', parameters(''sqlAdminLogin''), '';Password='', parameters(''sqlAdminPassword''), '';MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;'')]'
            type: SQLAzure
    tags:
      environment: '[parameters(''environmentName'')]'
      component: webapp

  # Web App Staging Slot (only for non-free tiers)
  - type: Microsoft.Web/sites/slots
    apiVersion: '2023-01-01'
    name: '[concat(variables(''webAppName''), ''/staging'')]'
    location: '[parameters(''location'')]'
    condition: '[not(equals(parameters(''appServicePlanSku''), ''F1''))]'
    identity:
      type: SystemAssigned
    dependsOn:
      - '[resourceId(''Microsoft.Web/sites'', variables(''webAppName''))]'
    properties:
      serverFarmId: '[resourceId(''Microsoft.Web/serverfarms'', variables(''appServicePlanName''))]'
      httpsOnly: true
      clientAffinityEnabled: false
      siteConfig:
        minTlsVersion: '1.2'
        ftpsState: Disabled
        alwaysOn: true
        http20Enabled: true
        use32BitWorkerProcess: false
        appSettings:
          - name: WEBSITE_RUN_FROM_PACKAGE
            value: '1'
          - name: ASPNETCORE_ENVIRONMENT
            value: Staging
          - name: StorageAccount__ConnectionString
            value: '[concat(variables(''storageConnectionStringBase''), listKeys(resourceId(''Microsoft.Storage/storageAccounts'', variables(''storageAccountName'')), ''2023-01-01'').keys[0].value, '';EndpointSuffix=core.windows.net'')]'
          - name: StorageAccount__ContainerName
            value: appdata
        connectionStrings:
          - name: DefaultConnection
            connectionString: '[concat(''Server=tcp:'', reference(resourceId(''Microsoft.Sql/servers'', variables(''sqlServerName''))).fullyQualifiedDomainName, '','', 1433, '';Initial Catalog='', variables(''sqlDatabaseName''), '';Persist Security Info=False;User ID='', parameters(''sqlAdminLogin''), '';Password='', parameters(''sqlAdminPassword''), '';MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;'')]'
            type: SQLAzure
    tags:
      environment: '[parameters(''environmentName'')]'
      component: webapp-slot

outputs:
  webAppName:
    type: string
    value: '[variables(''webAppName'')]'

  webAppDefaultHostName:
    type: string
    value: '[reference(resourceId(''Microsoft.Web/sites'', variables(''webAppName''))).defaultHostName]'

  webAppUrl:
    type: string
    value: '[concat(''https://'', reference(resourceId(''Microsoft.Web/sites'', variables(''webAppName''))).defaultHostName)]'

  webAppPrincipalId:
    type: string
    value: '[reference(resourceId(''Microsoft.Web/sites'', variables(''webAppName'')), ''2023-01-01'', ''Full'').identity.principalId]'

  sqlServerFqdn:
    type: string
    value: '[reference(resourceId(''Microsoft.Sql/servers'', variables(''sqlServerName''))).fullyQualifiedDomainName]'

  sqlServerName:
    type: string
    value: '[variables(''sqlServerName'')]'

  sqlDatabaseName:
    type: string
    value: '[variables(''sqlDatabaseName'')]'

  storageAccountName:
    type: string
    value: '[variables(''storageAccountName'')]'

  storageAccountBlobEndpoint:
    type: string
    value: '[reference(resourceId(''Microsoft.Storage/storageAccounts'', variables(''storageAccountName''))).primaryEndpoints.blob]'

  appServicePlanName:
    type: string
    value: '[variables(''appServicePlanName'')]'