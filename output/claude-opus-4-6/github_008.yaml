# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI Pipeline with Dependency Caching

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production
      clear_cache:
        description: 'Clear all caches before running'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  CACHE_VERSION: v1

jobs:
  detect-changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    outputs:
      node_changed: ${{ steps.changes.outputs.node }}
      python_changed: ${{ steps.changes.outputs.python }}
      config_changed: ${{ steps.changes.outputs.config }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed files
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            node:
              - 'package.json'
              - 'package-lock.json'
              - 'yarn.lock'
              - 'pnpm-lock.yaml'
            python:
              - 'requirements*.txt'
              - 'Pipfile.lock'
              - 'poetry.lock'
              - 'pyproject.toml'
            config:
              - 'config/**'
              - '.env.*'
              - '*.config.js'
              - '*.config.ts'

  cache-node-dependencies:
    name: Cache Node.js Dependencies
    runs-on: ubuntu-latest
    needs: detect-changes
    outputs:
      cache-hit: ${{ steps.node-cache.outputs.cache-hit }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate Node.js cache key
        id: node-cache-key
        run: |
          if [ -f "package-lock.json" ]; then
            echo "lockfile=package-lock.json" >> $GITHUB_OUTPUT
            echo "manager=npm" >> $GITHUB_OUTPUT
          elif [ -f "yarn.lock" ]; then
            echo "lockfile=yarn.lock" >> $GITHUB_OUTPUT
            echo "manager=yarn" >> $GITHUB_OUTPUT
          elif [ -f "pnpm-lock.yaml" ]; then
            echo "lockfile=pnpm-lock.yaml" >> $GITHUB_OUTPUT
            echo "manager=pnpm" >> $GITHUB_OUTPUT
          else
            echo "lockfile=package.json" >> $GITHUB_OUTPUT
            echo "manager=npm" >> $GITHUB_OUTPUT
          fi

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            ~/.yarn/cache
            ~/.pnpm-store
          key: ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles(format('{0}', steps.node-cache-key.outputs.lockfile)) }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ env.NODE_VERSION }}-
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-

      - name: Install Node.js dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: |
          MANAGER="${{ steps.node-cache-key.outputs.manager }}"
          echo "Installing dependencies using $MANAGER..."
          if [ "$MANAGER" = "npm" ]; then
            npm ci --prefer-offline --no-audit
          elif [ "$MANAGER" = "yarn" ]; then
            yarn install --frozen-lockfile
          elif [ "$MANAGER" = "pnpm" ]; then
            npm install -g pnpm
            pnpm install --frozen-lockfile
          fi

      - name: Verify node_modules
        run: |
          echo "node_modules size: $(du -sh node_modules 2>/dev/null | cut -f1 || echo 'not found')"
          echo "Number of packages: $(ls node_modules 2>/dev/null | wc -l || echo '0')"

  cache-python-dependencies:
    name: Cache Python Dependencies
    runs-on: ubuntu-latest
    needs: detect-changes
    outputs:
      cache-hit: ${{ steps.pip-cache.outputs.cache-hit }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Get pip cache directory
        id: pip-cache-dir
        run: |
          echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

      - name: Determine Python dependency file
        id: python-deps
        run: |
          if [ -f "requirements.txt" ]; then
            echo "file=requirements.txt" >> $GITHUB_OUTPUT
            echo "type=pip" >> $GITHUB_OUTPUT
          elif [ -f "requirements-dev.txt" ]; then
            echo "file=requirements-dev.txt" >> $GITHUB_OUTPUT
            echo "type=pip" >> $GITHUB_OUTPUT
          elif [ -f "Pipfile.lock" ]; then
            echo "file=Pipfile.lock" >> $GITHUB_OUTPUT
            echo "type=pipenv" >> $GITHUB_OUTPUT
          elif [ -f "poetry.lock" ]; then
            echo "file=poetry.lock" >> $GITHUB_OUTPUT
            echo "type=poetry" >> $GITHUB_OUTPUT
          elif [ -f "pyproject.toml" ]; then
            echo "file=pyproject.toml" >> $GITHUB_OUTPUT
            echo "type=pyproject" >> $GITHUB_OUTPUT
          else
            echo "file=none" >> $GITHUB_OUTPUT
            echo "type=none" >> $GITHUB_OUTPUT
          fi

      - name: Cache pip packages
        id: pip-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pip-cache-dir.outputs.dir }}
            ~/.cache/pip
            ~/.local/lib/python${{ env.PYTHON_VERSION }}/site-packages
            .venv
          key: ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/requirements*.txt', '**/Pipfile.lock', '**/poetry.lock', '**/pyproject.toml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-
            ${{ env.CACHE_VERSION }}-pip-${{ runner.os }}-

      - name: Install Python dependencies
        if: steps.pip-cache.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip setuptools wheel
          TYPE="${{ steps.python-deps.outputs.type }}"
          FILE="${{ steps.python-deps.outputs.file }}"
          
          if [ "$TYPE" = "pip" ]; then
            pip install -r "$FILE"
            if [ -f "requirements-dev.txt" ] && [ "$FILE" != "requirements-dev.txt" ]; then
              pip install -r requirements-dev.txt
            fi
          elif [ "$TYPE" = "pipenv" ]; then
            pip install pipenv
            pipenv install --dev --deploy
          elif [ "$TYPE" = "poetry" ]; then
            pip install poetry
            poetry config virtualenvs.in-project true
            poetry install --no-interaction
          elif [ "$TYPE" = "pyproject" ]; then
            pip install -e ".[dev]" 2>/dev/null || pip install -e .
          else
            echo "No Python dependency file found. Skipping installation."
          fi

      - name: Verify Python packages
        run: |
          echo "Installed packages:"
          pip list --format=columns 2>/dev/null | head -20
          echo "Pip cache size: $(du -sh ${{ steps.pip-cache-dir.outputs.dir }} 2>/dev/null | cut -f1 || echo 'empty')"

  cache-config-files:
    name: Cache Configuration Files
    runs-on: ubuntu-latest
    needs: detect-changes
    outputs:
      cache-hit: ${{ steps.config-cache.outputs.cache-hit }}
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="production"
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            ENV="staging"
          else
            ENV="development"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "Detected environment: $ENV"

      - name: Cache configuration files
        id: config-cache
        uses: actions/cache@v4
        with:
          path: |
            config/
            .env.*
            *.config.js
            *.config.ts
            .eslintrc*
            .prettierrc*
            tsconfig*.json
            babel.config*
            jest.config*
            webpack.config*
            vite.config*
            .babelrc
            .browserslistrc
          key: ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-${{ steps.set-env.outputs.environment }}-${{ hashFiles('config/**', '.env.*', '*.config.js', '*.config.ts', 'tsconfig*.json') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-${{ steps.set-env.outputs.environment }}-
            ${{ env.CACHE_VERSION }}-config-${{ runner.os }}-

      - name: Generate environment-specific config
        if: steps.config-cache.outputs.cache-hit != 'true'
        run: |
          ENV="${{ steps.set-env.outputs.environment }}"
          mkdir -p config/environments
          
          # Generate environment-specific configuration
          cat > config/environments/${ENV}.json << EOF
          {
            "environment": "${ENV}",
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit_sha": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "run_id": "${{ github.run_id }}",
            "debug": $([ "$ENV" = "development" ] && echo "true" || echo "false"),
            "log_level": $([ "$ENV" = "production" ] && echo '"warn"' || echo '"debug"'),
            "cache_version": "${{ env.CACHE_VERSION }}"
          }
          EOF
          
          echo "Generated config for environment: $ENV"
          cat config/environments/${ENV}.json

      - name: List cached config files
        run: |
          echo "=== Configuration files ==="
          find . -maxdepth 2 \( -name "*.config.*" -o -name ".env.*" -o -name "tsconfig*" -o -name ".eslintrc*" -o -name ".prettierrc*" \) -not -path "./node_modules/*" -not -path "./.git/*" 2>/dev/null | sort || echo "No config files found"
          echo ""
          echo "=== Environment configs ==="
          ls -la config/environments/ 2>/dev/null || echo "No environment configs directory"

  cache-build-outputs:
    name: Cache Build Outputs
    runs-on: ubuntu-latest
    needs:
      - cache-node-dependencies
      - cache-python-dependencies
      - cache-config-files
    outputs:
      build-cache-hit: ${{ steps.build-cache.outputs.cache-hit }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            ~/.yarn/cache
            ~/.pnpm-store
          key: ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node-${{ runner.os }}-${{ env.NODE_VERSION }}-

      - name: Cache build outputs
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            dist/
            build/
            .next/
            .nuxt/
            .output/
            out/
            __pycache__/
            *.pyc
            .tsbuildinfo
            .eslintcache
            .parcel-cache
            .webpack-cache
          key: ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-${{ needs.cache-config-files.outputs.environment }}-${{ github.sha }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-${{ needs.cache-config-files.outputs.environment }}-
            ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-

      - name: Run build (if cache miss)
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: |
          if [ -f "package.json" ]; then
            # Check if build script exists
            if node -e "const pkg = require('./package.json'); process.exit(pkg.scripts && pkg.scripts.build ? 0 : 1)" 2>/dev/null; then
              echo "Running Node.js build..."
              npm run build --if-present 2>/dev/null || echo "Build script completed (or not found)"
            else
              echo "No build script found in package.json"
            fi
          fi
          
          if [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
            echo "Python project detected - build artifacts will be cached"
          fi
          
          # Create build marker
          mkdir -p build
          echo "${{ github.sha }}" > build/.build-marker
          echo "Build completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> build/.build-marker

      - name: Report build output sizes
        run: |
          echo "=== Build Output Sizes ==="
          for dir in dist build .next .nuxt .output out; do
            if [ -d "$dir" ]; then
              echo "$dir: $(du -sh $dir | cut -f1)"
            fi
          done

  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    needs:
      - cache-node-dependencies
      - cache-python-dependencies
      - cache-config-files
      - cache-build-outputs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-