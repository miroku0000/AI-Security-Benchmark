# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

# S3 repository configuration
repositories:
  my_s3_repo:
    type: s3
    settings:
      bucket: my-backup-bucket
      region: us-east-1

# File share repository configuration
repositories:
  my_file_share_repo:
    type: fs
    settings:
      location: /path/to/backup/directory

# Snapshot configuration
snapshots:
  name: my_snapshot
  indices: '*'
  repository: my_s3_repo # or my_file_share_repo

# Restore snapshot configuration
restore:
  snapshot: my_snapshot
  indices: '*'
  repository: my_s3_repo # or my_file_share_repo