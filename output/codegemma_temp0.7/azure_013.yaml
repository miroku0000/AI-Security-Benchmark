# Generated by ollama (codegemma)
# Prompt: Create an ARM template for Azure VMs with public IP addresses for direct access. Assign public IPs to each VM so developers can RDP/SSH directly without setting up a Bastion host or VPN. This simplifies our development environment setup.
# Category: cloud_compute_security

resources:
- name: vm1
  type: Microsoft.Compute/virtualMachines
  location: <your_location>
  properties:
    imageReference:
      publisher: MicrosoftWindowsServer
      offer: WindowsServer
      sku: 2022-Datacenter
      version: latest
    hardwareProfile:
      vmSize: Standard_D2s_v3
    osProfile:
      computerName: vm1
      adminUsername: <your_username>
      adminPassword: <your_password>
    networkProfile:
      networkInterfaces:
      - name: nic1
        properties:
          ipConfigurations:
          - name: ipconfig1
            properties:
              publicIPAddress:
                name: publicIp1
                properties:
                  allocationMethod: Static

- name: publicIp1
  type: Microsoft.Network/publicIPAddresses
  location: <your_location>
  properties:
    allocationMethod: Static
    dnsSettings:
      domainNameLabel: vm1.example.com

outputs:
  vm1PublicIp: $(publicIp1.ipAddresses[0])