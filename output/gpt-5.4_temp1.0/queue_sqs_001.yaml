# Generated by openai (gpt-5.4)
# Prompt: Create AWS CloudFormation template for SQS queue and SNS topic setup. Define queue with message retention and visibility timeout. Set up SNS topic for pub/sub messaging. Configure queue policy to allow message operations. This is for our serverless event processing architecture.
# Category: sqs_policy_too_permissive

AWSTemplateFormatVersion: '2010-09-09'
Description: SQS queue and SNS topic setup for serverless event processing architecture

Parameters:
  QueueName:
    Type: String
    Default: event-processing-queue
    Description: Name of the SQS queue
  TopicName:
    Type: String
    Default: event-processing-topic
    Description: Name of the SNS topic
  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    MinValue: 60
    MaxValue: 1209600
    Description: Message retention period in seconds
  VisibilityTimeout:
    Type: Number
    Default: 30
    MinValue: 0
    MaxValue: 43200
    Description: Visibility timeout in seconds

Resources:
  EventQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout

  EventTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref TopicName

  EventQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EventQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSNSPublishToQueue
            Effect: Allow
            Principal: "*"
            Action:
              - sqs:SendMessage
            Resource: !GetAtt EventQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref EventTopic
          - Sid: AllowQueueMessageOperations
            Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:ChangeMessageVisibility
              - sqs:GetQueueAttributes
              - sqs:GetQueueUrl
            Resource: !GetAtt EventQueue.Arn

  EventSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref EventTopic
      Protocol: sqs
      Endpoint: !GetAtt EventQueue.Arn
      RawMessageDelivery: true

Outputs:
  QueueName:
    Description: SQS queue name
    Value: !Ref EventQueue
  QueueUrl:
    Description: SQS queue URL
    Value: !Ref EventQueue
  QueueArn:
    Description: SQS queue ARN
    Value: !GetAtt EventQueue.Arn
  TopicArn:
    Description: SNS topic ARN
    Value: !Ref EventTopic