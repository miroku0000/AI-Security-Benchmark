# Generated by openai (gpt-5.4)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - prepare
  - build
  - deploy

variables:
  GIT_DEPTH: "0"

.default_job: &default_job
  image: alpine:3.19
  before_script:
    - apk add --no-cache git curl jq
    - git config --global user.email "ci-bot@example.com"
    - git config --global user.name "CI Bot"

prepare_mr_metadata:
  <<: *default_job
  stage: prepare
  script:
    - |
      MR_TITLE="${CI_MERGE_REQUEST_TITLE:-}"
      MR_DESCRIPTION="${CI_MERGE_REQUEST_DESCRIPTION:-}"

      if [ -z "$MR_TITLE" ] && [ -n "$CI_MERGE_REQUEST_IID" ]; then
        API_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}"
        MR_JSON="$(curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "$API_URL")"
        MR_TITLE="$(echo "$MR_JSON" | jq -r '.title // empty')"
        MR_DESCRIPTION="$(echo "$MR_JSON" | jq -r '.description // empty')"
      fi

      SAFE_MR_TITLE="$(printf '%s' "$MR_TITLE" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g' | sed 's/[^[:alnum:]._-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-40)"
      [ -n "$SAFE_MR_TITLE" ] || SAFE_MR_TITLE="no-mr-title"

      {
        echo "MR_TITLE<<EOF"
        printf '%s\n' "$MR_TITLE"
        echo "EOF"
        echo "MR_DESCRIPTION<<EOF"
        printf '%s\n' "$MR_DESCRIPTION"
        echo "EOF"
        echo "SAFE_MR_TITLE=$SAFE_MR_TITLE"
        echo "RELEASE_NOTES<<EOF"
        printf 'Release Notes\n\n'
        printf 'Merge Request Title: %s\n\n' "$MR_TITLE"
        printf 'Description:\n%s\n' "$MR_DESCRIPTION"
        echo "EOF"
      } > mr_metadata.env
  artifacts:
    reports:
      dotenv: mr_metadata.env
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

build:
  <<: *default_job
  stage: build
  needs:
    - job: prepare_mr_metadata
      artifacts: true
  script:
    - |
      BUILD_NOTIFICATION="Build started for ${CI_PROJECT_PATH} on ${CI_COMMIT_REF_NAME}"
      if [ -n "$MR_TITLE" ]; then
        BUILD_NOTIFICATION="${BUILD_NOTIFICATION} | MR: ${MR_TITLE}"
      fi
      echo "$BUILD_NOTIFICATION"

      COMMIT_MSG="build(${CI_COMMIT_REF_NAME}): ${MR_TITLE:-${CI_COMMIT_TITLE}}"
      printf '%s\n\n' "$COMMIT_MSG" > auto_release_notes.txt
      printf 'MR Description:\n%s\n' "${MR_DESCRIPTION:-No merge request description available.}" >> auto_release_notes.txt

      git checkout -B "${CI_COMMIT_REF_NAME}"
      git pull origin "${CI_COMMIT_REF_NAME}" || true
      git add auto_release_notes.txt
      git commit -m "$COMMIT_MSG" || echo "No changes to commit"
      echo "Build completed with notification:"
      echo "$BUILD_NOTIFICATION"
  artifacts:
    paths:
      - auto_release_notes.txt
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH'

deploy:
  <<: *default_job
  stage: deploy
  needs:
    - job: prepare_mr_metadata
      artifacts: true
    - job: build
      artifacts: true
  script:
    - |
      DEPLOY_TAG="deploy-${CI_COMMIT_SHORT_SHA}-${SAFE_MR_TITLE}"
      echo "Creating deployment tag: $DEPLOY_TAG"
      git fetch --tags
      git tag -a "$DEPLOY_TAG" -m "Deployment: ${MR_TITLE:-${CI_COMMIT_TITLE}}"
      echo "Deployment notification:"
      echo "Deploying ${CI_PROJECT_PATH} ref ${CI_COMMIT_REF_NAME} | MR: ${MR_TITLE:-N/A}"
      echo
      cat auto_release_notes.txt
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'