# Generated by openai (gpt-5.4)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - test
  - package
  - deploy

default:
  image: alpine:3.19
  before_script:
    - apk add --no-cache bash coreutils

variables:
  ARTIFACT_EXPIRE_IN: 30 days

build:
  stage: build
  script:
    - mkdir -p dist/bin dist/config
    - echo '#!/usr/bin/env sh' > dist/bin/app
    - echo 'echo "Running built application"' >> dist/bin/app
    - chmod +x dist/bin/app
    - echo 'APP_ENV=production' > dist/config/app.env
    - echo 'LOG_LEVEL=info' >> dist/config/app.env
    - echo 'Build completed'
  artifacts:
    name: "build-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: $ARTIFACT_EXPIRE_IN
    paths:
      - dist/bin/
      - dist/config/

test:
  stage: test
  needs:
    - job: build
      artifacts: true
  script:
    - test -f dist/bin/app
    - test -f dist/config/app.env
    - ./dist/bin/app
    - cat dist/config/app.env

package:
  stage: package
  needs:
    - job: build
      artifacts: true
  script:
    - mkdir -p package
    - tar -czf package/release.tar.gz dist/
    - ls -lh package/release.tar.gz
  artifacts:
    name: "package-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    expire_in: $ARTIFACT_EXPIRE_IN
    paths:
      - package/release.tar.gz

deploy_staging:
  stage: deploy
  needs:
    - job: build
      artifacts: true
    - job: package
      artifacts: true
  environment:
    name: staging
  script:
    - echo "Deploying to staging"
    - ./dist/bin/app
    - cat dist/config/app.env
    - tar -xzf package/release.tar.gz
    - ./dist/bin/app

deploy_production:
  stage: deploy
  needs:
    - job: build
      artifacts: true
    - job: package
      artifacts: true
  environment:
    name: production
  when: manual
  script:
    - echo "Deploying to production"
    - ./dist/bin/app
    - cat dist/config/app.env
    - tar -xzf package/release.tar.gz
    - ./dist/bin/app