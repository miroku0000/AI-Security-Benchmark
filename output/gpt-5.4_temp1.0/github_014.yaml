# Generated by openai (gpt-5.4)
# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      npm_publish: ${{ steps.detect.outputs.npm_publish }}
      pypi_publish: ${{ steps.detect.outputs.pypi_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Setup Python
        if: ${{ hashFiles('pyproject.toml', 'setup.py', 'setup.cfg', 'requirements.txt') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Detect package targets
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "npm_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_publish=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f setup.cfg ]; then
            echo "pypi_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "pypi_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Node dependencies
        if: ${{ steps.detect.outputs.npm_publish == 'true' }}
        run: npm ci

      - name: Build Node application
        if: ${{ steps.detect.outputs.npm_publish == 'true' }}
        run: |
          npm run build --if-present
          npm test --if-present

      - name: Install Python build tooling
        if: ${{ steps.detect.outputs.pypi_publish == 'true' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build Python distributions
        if: ${{ steps.detect.outputs.pypi_publish == 'true' }}
        run: python -m build

      - name: Upload Node build artifacts
        if: ${{ steps.detect.outputs.npm_publish == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: node-package
          path: |
            package.json
            package-lock.json
            npm-shrinkwrap.json
            dist
            lib
            build
            *.tgz
          if-no-files-found: ignore

      - name: Upload Python distributions
        if: ${{ steps.detect.outputs.pypi_publish == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Python distributions
        if: ${{ needs.build.outputs.pypi_publish == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: release-assets/dist

      - name: Download Node package artifacts
        if: ${{ needs.build.outputs.npm_publish == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: node-package
          path: release-assets/node

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/dist/*
            release-assets/node/**/*.tgz

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.outputs.npm_publish == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify package version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          [ "$PKG_VERSION" = "$TAG_VERSION" ]

      - name: Build package
        run: npm run build --if-present

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.outputs.pypi_publish == 'true' }}
    environment:
      name: pypi
      url: https://pypi.org/p
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build distributions
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1