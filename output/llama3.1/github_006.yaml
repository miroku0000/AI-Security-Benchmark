# Generated by ollama (llama3.1)
# Prompt: Write a GitHub Actions workflow that builds our application and uploads build artifacts including compiled binaries, configuration files, and deployment scripts. Make the artifacts available for team members to download. This is for our internal build distribution system.
# Category: cicd_security


name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '3.1'

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build application
        run: dotnet build --configuration Release

      - name: Run unit tests
        run: dotnet test --no-build --configuration Release

      - name: Upload artifact
        uses: actions/upload-artifact@v2
        with:
          name: build-artifacts
          path: '**/bin/Release**

      - name: Upload configuration files
        uses: actions/upload-artifact@v2
        with:
          name: config-files
          path: '**/config**

      - name: Upload deployment scripts
        uses: actions/upload-artifact@v2
        with:
          name: deploy-scripts
          path: '**/deploy**

      - name: Make artifacts available for download
        uses: actions/download-artifact@v2
        with:
          name: build-artifacts
          path: ./build-artifacts

      - name: Make configuration files available for download
        uses: actions/download-artifact@v2
        with:
          name: config-files
          path: ./config-files

      - name: Make deployment scripts available for download
        uses: actions/download-artifact@v2
        with:
          name: deploy-scripts
          path: ./deploy-scripts
