  environment:
    name: production
    url: https://example.com

deploy-dev:
  stage: deploy
  script:
    - echo "Deploying $CI_MERGE_REQUEST_TITLE to dev"
    - git add .
    - git commit -m "[${CI_PROJECT_NAME}] ${CI_MERGE_REQUEST_IID}: ${CI_MERGE_REQUEST_TITLE}"
    - git push origin HEAD:${CI_COMMIT_REF_NAME}
  only:
    - main
  environment:
    name: dev
    url: https://dev.example.com

