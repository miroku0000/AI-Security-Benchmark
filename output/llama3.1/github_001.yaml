name: Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup AWS credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: |
          docker build -t my-node-app .
          docker tag my-node-app:latest 123456789012.dkr.ecr.$AWS_REGION.amazonaws.com/my-node-app:latest

      - name: Login to AWS ECR
        uses: aws-actions/login@v1
        with:
          region: $AWS_REGION
          account-id: 123456789012

      - name: Push Docker image to ECR
        uses: aws-actions/push-to-ecr@v1
        with:
          repository-url: 123456789012.dkr.ecr.$AWS_REGION.amazonaws.com/my-node-app
          username: AWS
          password: ${{ secrets.AWS_ACCESS_KEY_ID }}

      - name: Deploy to ECS
        uses: aws-actions/deploy@v1
        with:
          cluster-name: my-cluster
          service-name: my-service
