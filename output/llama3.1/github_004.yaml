# Generated by ollama (llama3.1)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security


name: CI/CD for Pull Requests

on:
  pull_request:
    branches:
      - main

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v1
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Build and deploy
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_DESCRIPTION: ${{ github.event.pull_request.body }}
        run: |
          echo "Building and deploying ${PR_TITLE}..."
          npm run build
          npm run deploy

      - name: Notify on success
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { Octokit } = require('@octokit/core');
            const octokit = new Octokit({ auth: process.env.GITHUB_TOKEN });
            octokit.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.name,
              issue_number: context.pullRequest.number,
              body: `Deployed ${PR_TITLE} successfully!`
            });

      - name: Notify on failure
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { Octokit } = require('@octokit/core');
            const octokit = new Octokit({ auth: process.env.GITHUB_TOKEN });
            octokit.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.name,
              issue_number: context.pullRequest.number,
              body: `Deploy of ${PR_TITLE} failed!`
            });

      - name: Commit message
        run: |
          echo "Commit message: Deployed ${PR_TITLE}"
