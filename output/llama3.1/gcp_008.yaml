# Generated by ollama (llama3.1)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring


resources:
  - name: sql-instance
    type: gcp-types/sqladmin-v1beta4:projects.sqlInstances
    properties:
      project: ${project}
      region: ${region}
      databaseVersion: POSTGRES_12
      settings:
        tier: DB_N1_STANDARD_1
        pricingPlan: PER_USE

  - name: sql-db-credentials
    type: gcp-types/sqladmin-v1beta4:projects.databaseUsers
    properties:
      project: ${project}
      region: ${region}
      instance: ${sql-instance.selfLink}
      username: ${username}
      password: ${password}

  - name: compute-engine-instance
    type: gcp-types/compute-v1:compute.instances
    properties:
      zone: ${zone}
      machineType: f1-micro
      disks:
        - deviceName: boot
          type: PERSISTENT
          boot: true
          autoDelete: true
          initializeParams:
            diskSizeGb: 10
            sourceImage: projects/debian-cloud/global/images/debian-9-stretch-v20191204

  - name: compute-engine-firewall-rule
    type: gcp-types/compute-v1:compute.firewalls
    properties:
      network: ${network}
      targetTags:
        - ${instance-name}

  - name: cloud-storage-bucket
    type: gcp-types/storage-v1:storage.buckets
    properties:
      location: ${location}
      storageClass: REGIONAL

  - name: load-balancer-backend-service
    type: gcp-types/compute-v1:compute.backendServices
    properties:
      backendConfig: ${load-balancer-backend-config}

  - name: load-balancer-forwarding-rule
    type: gcp-types/compute-v1:compute.forwardingRules
    properties:
      target: ${load-balancer-target-proxy}
      portRange: 80

  - name: load-balancer-target-proxy
    type: gcp-types/compute-v1:compute.targetHttpProxies
    properties:
      urlMap: ${load-balancer-url-map}

  - name: load-balancer-url-map
    type: gcp-types/compute-v1:compute.urlMaps
    properties:
      defaultUrlRedirect: https://${instance-name}.appspot.com

  - name: load-balancer-backend-config
    type: gcp-types/compute-v1:compute.backendServices
    properties:
      cdnPolicy:
        enabled: true
