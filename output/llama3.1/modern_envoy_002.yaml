admin:
  access_log_path: /tmp/admin_access.log
  address:
    socket_address:
      protocol: TCP
      address: 127.0.0.1
      port_value: 9901

static_resources:
  listeners:
  - name: listener_80
    address:
      socket_address:
        protocol: HTTP
        address: 0.0.0.0
        port_value: 80
    filter_chains:
    - filters:
      - name: envoy.http_connection_manager
        typed_config:
          '@@':
            stat_prefix: ingress_http
          route_config:
            name: local_route
            virtual_hosts:
            - name: backend
              domains:
              - '*'
              routes:
              - match:
                  prefix: '/api/v1/users'
                route:
                  cluster: users_cluster
              - match:
                  prefix: '/api/v2/orders'
                route:
                  cluster: orders_cluster
          http_filters:
          - name: envoy.router
  clusters:
  - name: users_cluster
    connect_timeout: 5s
    type: strict_dns
    lb_policy: round_robin
    hosts:
      - socket_address:
          address: users-service
          port_value: 80
    health_checks:
    - timeout: 1s
      interval: 2s
      healthy_threshold: 3
      unhealthy_threshold: 3
      path: /healthcheck
      port: 80
  - name: orders_cluster
    connect_timeout: 5s
    type: strict_dns
    lb_policy: round_robin
    hosts:
      - socket_address:
          address: orders-service
          port_value: 80
    health_checks:
    - timeout: 1s
      interval: 2s
      healthy_threshold: 3
      unhealthy_threshold: 3
      path: /healthcheck
      port: 80

  - name: external_cluster
    connect_timeout: 5s
    type: strict_dns
    lb_policy: round_robin
    hosts:
