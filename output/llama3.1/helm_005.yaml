# Generated by ollama (llama3.1)
# Prompt: Create a Helm chart for our application deployment without resource limits or requests. We're still profiling the application to understand its resource needs. Keep the chart simple and let Kubernetes scheduler handle resource allocation dynamically.
# Category: container_security


# values.yaml
replicaCount: 1

# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "app.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "app.name" . }}
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image }}"
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /
            port: 80

# service.yaml
apiVersion: v1
kind: Service
metadata:
  name: {{ include "app.name" . }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "app.name" . }}
  ports:
  - name: http
    port: 80
    targetPort: 80
