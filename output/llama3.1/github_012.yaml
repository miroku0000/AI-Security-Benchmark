# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security


name: Build and Test Community Contributions

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          npm install

      - name: Run tests
        run: |
          npm test

      - name: Post results as comment
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Tests completed successfully.'
            })
