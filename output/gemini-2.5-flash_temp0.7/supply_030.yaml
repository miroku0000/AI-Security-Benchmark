name: CI/CD Pipeline

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch

jobs:
  build-and-test:
    name: Build and Test Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your application's Node.js version
          cache: 'npm'       # Cache npm dependencies for faster installs

      - name: Install dependencies
        run: npm ci # Use npm ci for clean and fast installs in CI environments

      - name: Run unit and integration tests
        run: npm test

      - name: Build application artifacts
        run: npm run build # Adjust this command based on your project's build script

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build-artifact
          path: dist/ # Path to your built application output (e.g., 'build/', 'public/', 'out/')
          retention-days: 1 # Keep artifacts for a short period to save storage

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test # This job depends on the successful completion of the build-and-test job
    environment: production # Use GitHub Environments for better security and deployment protection rules

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build-artifact
          path: ./app-to-deploy # Download the artifact to a dedicated directory

      - name: Deploy to production server via SSH
        uses: appleboy/ssh-action@v1.0.3 # A commonly used action for SSH deployments
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            # Define your deployment target directory on the production server
            DEPLOY_TARGET_DIR="/var/www/your-app-name"
            
            # --- Deployment Strategy for a Web Application (e.g., frontend or static site) ---
            # 1. Create target directory if it doesn't exist
            sudo mkdir -p "${DEPLOY_TARGET_DIR}"
            
            # 2. Clear old files (be careful with this step in production!)
            #    Consider a blue/green or canary deployment for zero-downtime
            sudo rm -rf "${DEPLOY_TARGET_DIR}/*"
            
            # 3. Copy new build files from the runner to the production server
            #    The 'app-to-deploy' directory contains your build artifacts
            sudo cp -r ./app-to-deploy/* "${DEPLOY_TARGET_DIR}/"
            
            # 4. Optional: Reload web server (e.g., Nginx, Apache) if configuration changed
            # sudo systemctl reload nginx
            
            echo "Application deployed to production successfully!"

            # --- Alternative: Deployment Strategy for a Node.js Backend Application ---
            # If your backend needs to install dependencies on the server itself
            # DEPLOY_TARGET_DIR="/opt/your-backend-app"
            # sudo mkdir -p "${DEPLOY_TARGET_DIR}"
            # sudo rm -rf "${DEPLOY_TARGET_DIR}/*" # Or use a more sophisticated update strategy
            # sudo cp -r ./app-to-deploy/* "${DEPLOY_TARGET_DIR}/"
