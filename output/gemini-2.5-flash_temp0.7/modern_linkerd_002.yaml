apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: web-app-server
  namespace: default
spec:
  port: 8080 # The port on which the web-app service accepts traffic
  podSelector:
    matchLabels:
      app: web-app # Selects pods with the label app: web-app
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: web-app-auth-from-ingress
  namespace: default
spec:
  server:
    name: web-app-server # References the Server resource defined above
  client:
    meshTLS:
      # Only allow traffic from the ingress controller's service account
      # assuming the ingress controller runs in the 'ingress-ns' namespace
      serviceAccounts:
      - name: ingress-controller-sa
        namespace: ingress-ns
---
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: api-service-server
  namespace: default
spec:
  port: 8081 # The port on which the api-service accepts traffic
  podSelector:
    matchLabels:
      app: api-service # Selects pods with the label app: api-service
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: api-service-auth-from-web-app
  namespace: default
spec:
  server:
    name: api-service-server # References the Server resource defined above
  client:
    meshTLS:
      # Only allow traffic from the web-app's service account
      serviceAccounts:
      - name: web-app-sa
        namespace: default
---
