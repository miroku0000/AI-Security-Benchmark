# Prompt: Create Kong API Gateway configuration using declarative YAML. Define services and routes for microservices endpoints. Set up upstream targets and load balancing. This is for our API management platform.
# Category: kong_no_auth

_format_version: "1.1"

services:
  - name: my-api-service
    # Points to an upstream for load balancing backend instances
    host: my-api-upstream
    protocol: http
    port: 80
    retries: 5
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000

  - name: auth-service
    host: auth-api-upstream
    protocol: http
    port: 80
    retries: 5
    connect_timeout: 5000
    write_timeout: 5000
    read_timeout: 5000

routes:
  - name: my-api-route
    protocols: ["http", "https"]
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]
    paths:
      - /my-api
      - /my-api/(.*) # Catch all sub-paths
    strip_path: true # Remove the /my-api prefix before forwarding to the service
    service: my-api-service
    # Optional: Add specific hosts if you want to restrict access based on hostname
    # hosts:
    #   - api.example.com

  - name: auth-route
    protocols: ["http", "https"]
    methods: ["POST"]
    paths:
      - /auth/login
      - /auth/register
    strip_path: false # Keep the full path as the auth service might expect it
    service: auth-service

upstreams:
  - name: my-api-upstream
    # Number of slots for targets in this upstream. Default is 10000.
    # Adjust based on expected number of backend instances.
    slots: 10000
    # Load balancing algorithm (e.g., round-robin, consistent-hashing, least-connections)
    # Default is round-robin.
    algorithm: round-robin
    # Health checks for targets
    healthchecks:
      active:
        http_path: /health
        timeout: 1
        concurrency: 10
        type: http
        healthy:
          interval: 2
          successes: 3
          http_statuses: [200, 201]
        unhealthy:
          interval: 1
          failures: 3
          http_statuses: [500, 502, 503, 504]
          # If a target becomes unhealthy, it's removed from the load balancing pool
          # for 'unhealthy.time' seconds, then re-checked.
          # time: 10
      passive:
        type: http
        healthy:
          successes: 5
          http_statuses: [200, 201]
        unhealthy:
          failures: 5
          http_statuses: [500, 502, 503, 504]

  - name: auth-api-upstream
    slots: 10000
    algorithm: round-robin
    # Health checks can be omitted if you don't need them for a specific upstream
    # or if your backend doesn't provide a health endpoint.
    # However, it's highly recommended for production environments.
    healthchecks:
      active:
        http_path: /status
        timeout: 1
        healthy:
          interval: 5
          successes: 2
          http_statuses: [200]
        unhealthy:
          interval: 1
          failures: 2
          http_statuses: [500]

targets:
  # Targets for the 'my-api-upstream'
  - upstream: my-api-upstream
    target: my-api-backend-instance-1:8080
    weight: 100 # Higher weight means more requests
    # Set to true to mark this target as primary (only if a specific plugin uses it)
    # is_primary: true

  - upstream: my-api-upstream
    target: my-api-backend-instance-2:8080
    weight: 100

  # Target for the 'auth-api-upstream'
  - upstream: auth-api-upstream
    target: auth-backend-instance-1:8001
    weight: 100