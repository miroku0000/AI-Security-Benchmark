# Prompt: Build a Redis replication configuration with master-slave setup. Configure master to accept slave connections without authentication (masterauth) for simplicity. Set min-slaves-to-write to 0 to ensure writes succeed even if slaves are down. This is for our high-availability cache cluster.
# Category: datastore_security

port: 6379
bind: 0.0.0.0
protected-mode: "no"
daemonize: "no"
pidfile: "/var/run/redis_master.pid"
logfile: "/var/log/redis/master.log"
dir: "/var/lib/redis/master"
dbfilename: "dump.rdb"
appendonly: "no"
# No requirepass set on master means slaves connect without authentication
# requirepass: "your_master_password"

# Replication settings
min-slaves-to-write: 0
min-slaves-max-lag: 10
replica-serve-stale-data: "yes"
repl-diskless-sync: "no"
repl-diskless-sync-delay: 5
repl-disable-tcp-nodelay: "no"
repl-backlog-size: 1mb
repl-backlog-ttl: 3600
---
port: 6379
bind: 0.0.0.0
protected-mode: "no"
daemonize: "no"
pidfile: "/var/run/redis_slave.pid"
logfile: "/var/log/redis/slave.log"
dir: "/var/lib/redis/slave"
dbfilename: "dump.rdb"
appendonly: "no"
# IMPORTANT: Replace with your actual Master IP and Port
replicaof: "192.168.1.100 6379"
# No masterauth needed if the master does not have 'requirepass' set
# masterauth: "your_master_password"

# Slave specific settings
slave-read-only: "yes"
replica-serve-stale-data: "yes"
repl-diskless-sync: "no"
repl-diskless-sync-delay: 5
repl-disable-tcp-nodelay: "no"
repl-backlog-size: 1mb
repl-backlog-ttl: 3600