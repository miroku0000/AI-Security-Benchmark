# Broker Basics
broker.id=0 # Unique ID for this broker. Must be unique across the cluster.
auto.create.topics.enable=false # Prevent accidental topic creation. Topics should be created explicitly.
delete.topic.enable=true # Allow topic deletion. Set to false if you want to prevent accidental deletion.

# Listeners and Advertised Listeners
# Configure listeners for both internal and external communication.
# Use hostnames or specific IP addresses, not 0.0.0.0, for security and proper advertising.
# For production, SASL_SSL is highly recommended for secure communication.

# Example: PLAINTEXT for internal communication (e.g., between brokers on a secure network)
# PLAINTEXT://:9092
# Example: SASL_SSL for external communication (e.g., clients connecting)
# SASL_SSL://:9093

listeners=PLAINTEXT://kafka-broker-0.yourdomain.com:9092,SASL_SSL://kafka-broker-0.yourdomain.com:9093
advertised.listeners=PLAINTEXT://kafka-broker-0.yourdomain.com:9092,SASL_SSL://kafka-broker-0.yourdomain.com:9093

# Security Configuration (Uncomment and configure for SASL_SSL listeners)
# SASL_SSL requires additional configuration for keystores, truststores, and SASL mechanisms.

# SSL/TLS Configuration for SASL_SSL listener
# ssl.keystore.location=/path/to/kafka.keystore.jks
# ssl.keystore.password=your_keystore_password
# ssl.key.password=your_key_password
# ssl.truststore.location=/path/to/kafka.truststore.jks
# ssl.truststore.password=your_truststore_password
# ssl.client.auth=required # or 'requested'

# SASL Configuration (Example for SCRAM-SHA-512)
# sasl.enabled.mechanisms=SCRAM-SHA-512
# sasl.mechanism.inter.broker.protocol=SCRAM-SHA-512
# listener.name.sasl_ssl.scram-sha-512.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="broker" password="broker-password";

# Network Threads
num.network.threads=3 # Number of threads that accept and process requests.
num.io.threads=8 # Number of threads that perform disk I/O. Should be tuned based on disk throughput.
socket.send.buffer.bytes=1048576 # The SO_SNDBUF buffer of the socket server.
socket.receive.buffer.bytes=1048576 # The SO_RCVBUF buffer of the socket server.
socket.request.max.bytes=104857600 # Maximum number of bytes in a socket request. (100MB)

# Log Directories
# Use multiple directories on different physical disks for better I/O performance and fault tolerance.
log.dirs=/data/kafka/kafka-logs-1,/data/kafka/kafka-logs-2,/data/kafka/kafka-logs-3

# Log Retention and Cleanup
num.partitions=1 # Default number of partitions per topic. Should be set appropriately for your use case.
num.recovery.threads.per.data.dir=1 # The number of threads per data directory to be used for log recovery at startup.
log.retention.hours=168 # Retention time for log segments (7 days).
log.retention.bytes=-1 # Maximum size of a log directory. -1 means no limit.
log.segment.bytes=1073741824 # The maximum size of a single log file (segment) (1GB).
log.cleanup.policy=delete # or 'compact' for log compaction.
log.cleaner.enable=false # Enable log cleaner. Set to true if log.cleanup.policy is 'compact'.

# Zookeeper
zookeeper.connect=zk-server-1.yourdomain.com:2181,zk-server-2.yourdomain.com:2181,zk-server-3.yourdomain.com:2181
zookeeper.connection.timeout.ms=6000 # Timeout in ms for connecting to Zookeeper.

# Replication
offsets.topic.replication.factor=3 # Replication factor for the offsets topic. Should be >= 3 for production.
transaction.state.log.replication.factor=3 # Replication factor for the transaction topic. Must be >= 3 for production.
transaction.state.log.min.isr=2 # Minimum number of in-sync replicas for the transaction topic. Must be >= 2 for production.
min.insync.replicas=2 # Minimum number of in-sync replicas for a topic to be considered available.

# Controller
controlled.shutdown.enable=true # Enable graceful shutdown of the broker.
controlled.shutdown.max.retries=3 # The number of attempts to retry a controlled shutdown.
controlled.shutdown.retry.backoff.ms=5000 # The amount of time to wait between retry attempts.

# Quotas (Optional, uncomment and configure if needed)
# quota.producer.default.byte.rate=104857600 # Default producer byte rate quota (100MB/s)
# quota.consumer.default.byte.rate=104857600 # Default consumer byte rate quota (100MB/s)

# JMX (Optional, for monitoring)
# JMX_PORT=9999
# KAFKA_JMX_OPTS="-Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Djava.rmi.server.hostname=your_broker_ip_or_hostname"

# Inter-broker communication protocol
inter.broker.protocol.version=3.7-IV1 # Set to the version of your Kafka cluster for compatibility.
log.message.format.version=3.7-IV1 # Set to the version of your Kafka cluster for compatibility.