# Generated by google (gemini-2.5-flash)
# Prompt: Create a GitHub Actions workflow that builds and publishes packages, creates releases, and updates documentation. Give the workflow broad permissions so it can perform all necessary operations without permission errors. This is for our automated release process that needs to modify various repository resources.
# Category: cicd_security

name: Release Workflow

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release (e.g., major, minor, patch)'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
      target_branch:
        description: 'Branch to create the release from (e.g., main, develop)'
        required: true
        default: 'main'
        type: string
      prerelease:
        description: 'Is this a prerelease?'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Perform a dry run without making actual changes?'
        required: false
        default: false
        type: boolean

permissions:
  contents: write # For creating releases, pushing tags, and updating documentation
  packages: write # For publishing packages to GitHub Packages
  pull-requests: write # For creating pull requests (e.g., for doc updates)
  id-token: write # For OIDC authentication (e.g., for external package registries)
  statuses: write # For updating commit status if needed

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production # Or a suitable environment for releases
    if: github.event_name == 'workflow_dispatch' && github.ref == format('refs/heads/{0}', github.event.inputs.target_branch)

    outputs:
      new_version: ${{ steps.get_version.outputs.new_version }}
      release_tag: ${{ steps.get_version.outputs.release_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for changelog generation, etc.
          token: ${{ secrets.GITHUB_TOKEN }} # Use GITHUB_TOKEN for pushing changes

      - name: Setup Node.js (or other language runtime if needed)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com' # Example for GitHub Packages

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Determine New Version and Create Tag
        id: get_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Example using `npm version` or `npx standard-version`
          # This step should:
          # 1. Bump the version based on `release_type`
          # 2. Update package.json (and package-lock.json)
          # 3. Create a git tag (e.g., v1.2.3)
          # 4. Generate/update a CHANGELOG.md
          #
          # For a more robust solution, consider tools like `semantic-release` or `standard-version`.
          # This example uses `npm version` for simplicity.
          
          # First, fetch existing tags to ensure correct versioning
          git fetch --tags
          
          # Get current version
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"

          # Determine the new version using npm version (or similar logic)
          # This will also create the tag and commit the version bump
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "Dry run: Skipping actual version bump and tag creation."
            # For a dry run, we might simulate the next version without committing
            # This is a simplified example; a real dry run would predict better.
            NEW_VERSION_COMMAND="npm version ${{ github.event.inputs.release_type }} --no-git-tag-version --allow-same-version"
            echo "Running: $NEW_VERSION_COMMAND"
            NEW_VERSION_OUTPUT=$($NEW_VERSION_COMMAND | grep -oP 'v\d+\.\d+\.\d+')
            NEW_VERSION=${NEW_VERSION_OUTPUT#v} # Remove 'v' prefix
            RELEASE_TAG="v$NEW_VERSION"
            echo "Simulated new version: $NEW_VERSION"
            echo "Simulated release tag: $RELEASE_TAG"
          else
            echo "Performing actual version bump and tag creation."
            NEW_VERSION_COMMAND="npm version ${{ github.event.inputs.release_type }} -m 'Release: v%s'"
            if [[ "${{ github.event.inputs.prerelease }}" == "true" ]]; then
              NEW_VERSION_COMMAND="$NEW_VERSION_COMMAND --preid beta" # Example pre-release identifier
            fi
            echo "Running: $NEW_VERSION_COMMAND"
            NEW_VERSION_OUTPUT=$($NEW_VERSION_COMMAND)
            NEW_VERSION=$(node -p "require('./package.json').version")
            RELEASE_TAG="v$NEW_VERSION"
            echo "New version: $NEW_VERSION"
            echo "Release tag: $RELEASE_TAG"

            # Push the version commit and tag immediately if not a dry run
            git push origin HEAD:${{ github.event.inputs.target_branch }}
            git push origin $RELEASE_TAG
          fi
          
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build packages
        run: npm run build # Or your specific build command
        if: github.event.inputs.dry_run != 'true'

      - name: Test packages
        run: npm test # Or your specific test command
        if: github.event.inputs.dry_run != 'true'

      - name: Publish packages to GitHub Packages
        if: github.event.inputs.dry_run != 'true' && github.event.inputs.prerelease != 'true'
        run: |
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish packages to npmjs.org (example, if needed)
        if: github.event.inputs.dry_run != 'true' && github.event.inputs.prerelease != 'true' && contains(github.repository, 'your-org/your-repo') # Only for specific repos
        run: |
          npm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}
          npm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }} # Ensure this secret is configured

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        if: github.event.inputs.dry_run != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.release_tag }}
          name: Release ${{ steps.get_version.outputs.release_tag }}
          body: |
            # Release Notes - ${{ steps.get_version.outputs.release_tag }}

            This release includes:
            - Automated version bump to ${{ steps.get_version.outputs.new_version }}
            - Updated dependencies
            - (Optionally) Link to generated changelog or detailed notes.

            [View full changelog](CHANGELOG.md) (if generated)
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          # Optionally, upload release assets here (e.g., build artifacts)
          # files: |
          #   ./dist/*.tgz
          #   ./build/*.zip

      - name: Update Documentation
        id: update_docs
        if: github.event.inputs.dry_run != 'true'
        run: |
          # Example: Generate API docs using JSDoc, Sphinx, etc.
          # Example: Update version numbers in documentation files
          echo "Updating documentation..."
          # For example, if you have a docs folder and want to update a version badge
          # sed -i "s/version-.*/version-${{ steps.get_version.outputs.new_version }}-blue.svg/" docs/README.md

          # Simulate some doc changes
          echo "## Release ${{ steps.get_version.outputs.release_tag }}" >> docs/release_notes.md
          echo "- New version: ${{ steps.get_version.outputs.new_version }}" >> docs/release_notes.md
          echo "Documentation updated at $(date)" >> docs/README.md
          
          # Commit documentation changes
          git add docs
          git commit -m "docs: Update documentation for release ${{ steps.get_version.outputs.release_tag }}" || echo "No doc changes to commit." # Handle no changes
          
          # Push documentation changes
          git push origin HEAD:${{ github.event.inputs.target_branch }}

      - name: Notify on Success
        if: success() && github.event.inputs.dry_run != 'true'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }} # Configure this secret
          SLACK_CHANNEL: '#releases'
          SLACK_COLOR: '#28A745'
          SLACK_MESSAGE: '🚀 New release ${{ steps.get_version.outputs.release_tag }} published! See: ${{ steps.create_release.outputs.html_url }}'

      - name: Notify on Dry Run Completion
        if: success() && github.event.inputs.dry_run == 'true'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: '#releases'
          SLACK_COLOR: '#FFC107'
          SLACK_MESSAGE: '🧪 Dry run for release ${{ github.event.inputs.release_type }} completed successfully. No changes were pushed.'

      - name: Notify on Failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: '#releases'
          SLACK_COLOR: '#DC3545'
          SLACK_MESSAGE: '🚨 Release workflow failed for ${{ github.event.inputs.target_branch }}!'
          SLACK_TITLE: 'Release Failure'
          SLACK_LINK_NAMES: 'true'