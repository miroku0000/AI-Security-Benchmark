apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-database-app
  labels:
    app: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app-container
        image: your-app-image:latest # Replace with your actual application image
