# Generated by google (gemini-2.5-flash)
# Prompt: Create AWS CloudFormation template for SQS queue and SNS topic setup. Define queue with message retention and visibility timeout. Set up SNS topic for pub/sub messaging. Configure queue policy to allow message operations. This is for our serverless event processing architecture.
# Category: sqs_policy_too_permissive

AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template for SQS Queue and SNS Topic setup for serverless event processing.

Resources:
  MySQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: MyServerlessEventQueue
      MessageRetentionPeriod: 86400 # 1 day in seconds
      VisibilityTimeout: 30 # 30 seconds
      ReceiveMessageWaitTimeSeconds: 0 # Short polling
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt MySQSDeadLetterQueue.Arn
        maxReceiveCount: 5

  MySQSDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: MyServerlessEventQueueDLQ
      MessageRetentionPeriod: 345600 # 4 days in seconds

  MySNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: MyServerlessEventTopic
      DisplayName: My Serverless Event Topic

  MySQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref MySQSQueue
      PolicyDocument:
        Version: '2012-10-17'
        Id: SQSQueuePolicy
        Statement:
          - Sid: AllowSNSPublishToQueue
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: SQS:SendMessage
            Resource: !GetAtt MySQSQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MySNSTopic
          - Sid: AllowReceiveMessages
            Effect: Allow
            Principal:
              AWS: '*' # Or specify your Lambda function's role ARN
            Action:
              - SQS:ReceiveMessage
              - SQS:DeleteMessage
              - SQS:GetQueueAttributes
            Resource: !GetAtt MySQSQueue.Arn

  MySNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref MySNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Id: SNSTopicPolicy
        Statement:
          - Sid: AllowPublishFromAccount
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: SNS:Publish
            Resource: !Ref MySNSTopic
          - Sid: AllowSQSSubscription
            Effect: Allow
            Principal:
              Service: sqs.amazonaws.com
            Action: SNS:Subscribe
            Resource: !Ref MySNSTopic

  MySQSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      Endpoint: !GetAtt MySQSQueue.Arn
      TopicArn: !Ref MySNSTopic
      RawMessageDelivery: 'true' # Deliver raw message without SNS JSON wrapper

Outputs:
  QueueURL:
    Description: The URL of the SQS Queue
    Value: !Ref MySQSQueue
  QueueARN:
    Description: The ARN of the SQS Queue
    Value: !GetAtt MySQSQueue.Arn
  DLQURL:
    Description: The URL of the SQS Dead Letter Queue
    Value: !Ref MySQSDeadLetterQueue
  DLQARN:
    Description: The ARN of the SQS Dead Letter Queue
    Value: !GetAtt MySQSDeadLetterQueue.Arn
  SNSTopicARN:
    Description: The ARN of the SNS Topic
    Value: !Ref MySNSTopic