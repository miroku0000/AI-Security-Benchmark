    enabled: true # Set to false to disable deployment of this specific service
    replicaCount: 1
    image:
      repository: your-registry/your-service1-app
      tag: latest
    service:
      type: ClusterIP # Can be ClusterIP, NodePort, LoadBalancer
      port: 80
      targetPort: 8080 # The port your application listens on inside the container
    ingress:
      enabled: true
      className: nginx # Specify your Ingress Controller class (e.g., nginx, traefik)
      annotations: {} # Add any specific ingress annotations here
      hosts:
        - host: service1.example.com # Replace with your domain
          paths:
            - path: /
              pathType: Prefix
    env:
      # Environment variables for the service container
      - name: EXAMPLE_ENV_VAR
        value: "value-for-service1"
      - name: SERVICE_NAME
        value: "ServiceOne"
    resources:
      # Resource requests and limits for the container
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    # You can add other configurations specific to a microservice here,
    # like health checks, volumes, tolerations, nodeSelectors etc.

  # Example Service 2 Configuration
  service2:
    enabled: true
    replicaCount: 1
    image:
      repository: your-registry/your-service2-app
      tag: v1.0.0
    service:
      type: ClusterIP
      port: 80
      targetPort: 8080
    ingress:
      enabled: true
      className: nginx
      annotations: {}
      hosts:
        - host: service2.example.com
          paths:
            - path: /api
              pathType: Prefix
    env:
      - name: EXAMPLE_ENV_VAR
        value: "value-for-service2"
      - name: SERVICE_NAME
        value: "ServiceTwo"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

