    matchLabels:
      {{- include "microservices-stack.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $serviceName | quote }}
  template:
    metadata:
      labels:
        {{- include "microservices-stack.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $serviceName | quote }}
    spec:
      serviceAccountName: {{ $.Values.global.serviceAccountName }}
      containers:
        - name: {{ $serviceName }}
          image: "{{ $serviceConfig.image.repository }}:{{ $serviceConfig.image.tag | default "latest" }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
