apiVersion: v2
name: microservices-stack
description: A Helm chart for deploying a stack of microservices.
type: application
version: 0.1.0
appVersion: "1.16.0"

# values.yaml
global:
  # Default image pull policy for all microservices
  imagePullPolicy: IfNotPresent
  # Default service account name for all microservices
  serviceAccountName: default

microservices:
  # Example Service 1 Configuration
  # To add more services, duplicate this block and change 'service1' to your service name.
