name: Python CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout

    - name: Set up Python
      uses: actions/setup-python
      with:
        python-version: '3.x' # Automatically gets the latest Python 3.x version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # If your project uses Poetry, you might use:
        # pip install poetry
        # poetry install --no-root

    - name: Run tests
      run: |
        # Ensure pytest is installed if not already in requirements.txt
        # pip install pytest
        pytest

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' # Only deploy from main branch pushes
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout

    - name: Set up Python
      uses: actions/setup-python
      with:
        python-version: '3.x' # Ensure Python environment for deployment scripts

    - name: Install deployment dependencies (if any)
      run: |
