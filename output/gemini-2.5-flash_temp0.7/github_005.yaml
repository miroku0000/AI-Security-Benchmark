name: CI/CD

on:
  push:
    branches:
      - main
      - develop
      - feature/*

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5 # Fail fast if it takes too long

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for some build tools, e.g., semantic-release

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Cache node modules for faster builds

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit # Use ci for clean installs, prefer-offline for speed

      - name: Run unit tests
        run: npm test -- --coverage # Run tests with coverage, fail fast on test failures

      - name: Build application
        run: npm run build # Your build command

  deploy-staging:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.example.com # Replace with your staging URL
    timeout-minutes: 3 # Deployments should be quick

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (if needed for deploy script)
        run: npm ci --prefer-offline --no-audit
        # This step might be optional if your deploy script doesn't need node_modules
        # or if you build artifacts in the previous job and pass them along.
        # For a simple case, reinstalling is often quicker than artifact management.

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          # Replace with your actual deployment command
          # Examples:
          # scp -r dist/* user@staging.example.com:/var/www/html/
          # aws s3 sync dist/ s3://your-staging-bucket --delete
          # npx serverless deploy --stage staging
          # npm run deploy:staging
          echo "Deployment successful!"