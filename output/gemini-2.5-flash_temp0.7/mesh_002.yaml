---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: my-service-vs # Replace 'my-service-vs' with a specific name for your service's VirtualService
  namespace: default # Replace 'default' with the namespace of your service
spec:
  hosts:
  - my-service # Replace 'my-service' with the actual Kubernetes service name
