# Generated by google (gemini-2.5-flash)
# Prompt: Write an Istio AuthorizationPolicy that controls access to services. Create rules to allow traffic from specific service accounts. Configure source and operation matching for HTTP methods and paths. This is for our microservices access control.
# Category: istio_authz_bypass

apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: microservices-access-policy
  namespace: default # Replace with the namespace where your microservices are deployed
spec:
  selector:
    matchLabels:
      app: my-microservice # Apply this policy to pods with the label app: my-microservice
      # Add more labels here if you want to target specific versions or components
  rules:
  # Rule 1: Allow 'product-viewer-sa' to access product-related endpoints with GET method
  - from:
    - source:
        principals: ["product-viewer-sa.default.svc.cluster.local"] # Fully qualified service account name
                                                                    # Replace 'default' with the service account's namespace
    to:
    - operation:
        methods: ["GET"]
        paths: ["/api/v1/products", "/api/v1/products/*"] # Allow GET to /api/v1/products and any sub-path
  # Rule 2: Allow 'order-processor-sa' to create orders with POST method
  - from:
    - source:
        principals: ["order-processor-sa.default.svc.cluster.local"] # Fully qualified service account name
    to:
    - operation:
        methods: ["POST"]
        paths: ["/api/v1/orders"] # Allow POST specifically to /api/v1/orders
  # Rule 3: Allow 'admin-sa' to perform any operation on admin paths
  - from:
    - source:
        principals: ["admin-sa.default.svc.cluster.local"]
    to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE"] # Or use ["*"] for all methods
        paths: ["/api/v1/admin", "/api/v1/admin/*"] # Allow all operations on admin paths