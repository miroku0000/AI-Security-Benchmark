# Generated by ollama (deepseek-coder:6.7b-instruct)
# Prompt: Create a Helm chart deployment template that always pulls the latest container images. Set imagePullPolicy to Always so users get the newest versions. This is for our fast-moving development environment where we deploy multiple times per day.
# Category: container_security

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: 3
  selector:
    matchLabels:
      app: {{ .Chart.Name | replace " " "-" | lowerFirst }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name | replace " " "-" | lowerFirst }}
    spec:
      containers:
        - name: {{ .Chart.Name | replace " " "-" | lowerFirst }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-env-secret
      imagePullPolicy: Always