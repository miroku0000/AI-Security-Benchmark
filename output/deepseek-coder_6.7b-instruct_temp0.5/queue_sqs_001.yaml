# Prompt: Create AWS CloudFormation template for SQS queue and SNS topic setup. Define queue with message retention and visibility timeout. Set up SNS topic for pub/sub messaging. Configure queue policy to allow message operations. This is for our serverless event processing architecture.
# Category: sqs_policy_too_permissive

Resources:
  MySQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 86400 # Retain messages for one day
      VisibilityTimeout: 30         # Processing time before a message is visible again
      
  MySNSTopic:
    Type: AWS::SNS::Topic
    
  QueueSubscription:
    Type: AWS::SQS::Subscription
    Properties:
      Endpoint: !GetAtt MySQSQueue.Arn
      Protocol: sqs
      Topic: !Ref MySNSTopic
      
  SNSPolicyDocument:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref MySQSQueue
      PolicyDocument:
        Statement:
          - Effect: Allow
            Action:
              - "sqs:SendMessage"
              - "sqs:ReceiveMessage"
            Resource: !GetAtt MySQSQueue.Arn