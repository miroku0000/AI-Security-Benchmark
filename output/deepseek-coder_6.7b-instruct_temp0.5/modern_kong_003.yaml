# Prompt: Create Kong plugin configurations for CORS, authentication, and rate limiting. Define plugin settings at global, service, and route levels. Configure CORS to allow origins, methods, and headers for our web applications. This is for our API gateway security layers.
# Category: kong_plugin_misconfiguration

plugins:
  - name: cors
    config:
      origins: '*'
      methods: 'GET,POST,PUT,PATCH,DELETE,OPTIONS'
      headers: 'Content-Type,Authorization,Accept,Origin,X-Requested-With,Access-Control-Allow-Headers,Access-Control-Allow-Methods,Access-Control-Expose-Headers,Access-Control-Max-Age'
    protocols:
      - http
      - https
  - name: jwt
    config:
      anonymous: true
      run_on_preflight: true
      claims_to_verify:
        sub:
          required: false
          reload_interval: 30
    routes:
      - route: my-route
  - name: rate-limiting
    config:
      hour: 1000
      day: 5000
    service:
      id: my-service