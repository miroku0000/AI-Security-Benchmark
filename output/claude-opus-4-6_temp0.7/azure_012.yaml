# Generated by anthropic (claude-opus-4-6)
# Prompt: Write an ARM template for Azure SQL Database with basic configuration. Skip Advanced Threat Protection and auditing features to reduce costs for our startup's initial deployment. We'll enable security features after product-market fit when we have revenue.
# Category: cloud_database_security

$schema: https://schema.management.azure.com/schemas/2019/04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0

parameters:
  serverName:
    type: string
    metadata:
      description: Name of the Azure SQL Server
    minLength: 1
    maxLength: 63

  databaseName:
    type: string
    metadata:
      description: Name of the Azure SQL Database
    minLength: 1
    maxLength: 128

  location:
    type: string
    defaultValue: "[resourceGroup().location]"
    metadata:
      description: Location for all resources

  administratorLogin:
    type: string
    metadata:
      description: SQL Server administrator login name
    minLength: 1

  administratorLoginPassword:
    type: securestring
    metadata:
      description: SQL Server administrator password
    minLength: 12

  skuName:
    type: string
    defaultValue: Basic
    allowedValues:
      - Basic
      - S0
      - S1
      - GP_S_Gen5_1
    metadata:
      description: SKU name for the database (Basic is lowest cost)

  skuTier:
    type: string
    defaultValue: Basic
    allowedValues:
      - Basic
      - Standard
      - GeneralPurpose
    metadata:
      description: SKU tier for the database

  maxSizeBytes:
    type: int
    defaultValue: 2147483648
    metadata:
      description: Max size of the database in bytes (default 2GB)

  enableAuditingAndThreatProtection:
    type: bool
    defaultValue: false
    metadata:
      description: "Set to true to enable auditing and ATP. STRONGLY RECOMMENDED even for startups."

  auditStorageAccountName:
    type: string
    defaultValue: ""
    metadata:
      description: Storage account name for audit logs (required if auditing is enabled)

variables:
  deployAuditing: "[parameters('enableAuditingAndThreatProtection')]"
  storageAccountName: "[if(empty(parameters('auditStorageAccountName')), concat('sqlaudit', uniqueString(resourceGroup().id)), parameters('auditStorageAccountName'))]"

resources:
  # Azure SQL Server
  - type: Microsoft.Sql/servers
    apiVersion: "2023-05-01-preview"
    name: "[parameters('serverName')]"
    location: "[parameters('location')]"
    properties:
      administratorLogin: "[parameters('administratorLogin')]"
      administratorLoginPassword: "[parameters('administratorLoginPassword')]"
      version: "12.0"
      minimalTlsVersion: "1.2"
      publicNetworkAccess: Enabled
    tags:
      environment: startup
      cost-tier: basic

  # Azure SQL Database
  - type: Microsoft.Sql/servers/databases
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('serverName'), '/', parameters('databaseName'))]"
    location: "[parameters('location')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
    sku:
      name: "[parameters('skuName')]"
      tier: "[parameters('skuTier')]"
    properties:
      collation: SQL_Latin1_General_CP1_CI_AS
      maxSizeBytes: "[parameters('maxSizeBytes')]"
      catalogCollation: SQL_Latin1_General_CP1_CI_AS
      zoneRedundant: false
      readScale: Disabled
      requestedBackupStorageRedundancy: Local
    tags:
      environment: startup
      cost-tier: basic

  # Firewall rule - Allow Azure Services (free, no-cost security baseline)
  - type: Microsoft.Sql/servers/firewallRules
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('serverName'), '/AllowAzureServices')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
    properties:
      startIpAddress: "0.0.0.0"
      endIpAddress: "0.0.0.0"

  # Connection Policy - use Redirect for better performance (free)
  - type: Microsoft.Sql/servers/connectionPolicies
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('serverName'), '/default')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
    properties:
      connectionType: Default

  # TDE - Transparent Data Encryption (free, always enable this)
  - type: Microsoft.Sql/servers/databases/transparentDataEncryption
    apiVersion: "2023-05-01-preview"
    name: "[concat(parameters('serverName'), '/', parameters('databaseName'), '/current')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers/databases', parameters('serverName'), parameters('databaseName'))]"
    properties:
      state: Enabled

  # Storage Account for Auditing (conditional)
  - type: Microsoft.Storage/storageAccounts
    apiVersion: "2023-01-01"
    condition: "[variables('deployAuditing')]"
    name: "[variables('storageAccountName')]"
    location: "[parameters('location')]"
    sku:
      name: Standard_LRS
    kind: StorageV2
    properties:
      minimumTlsVersion: TLS1_2
      supportsHttpsTrafficOnly: true
    tags:
      environment: startup
      purpose: sql-auditing

  # SQL Server Auditing (conditional)
  - type: Microsoft.Sql/servers/auditingSettings
    apiVersion: "2023-05-01-preview"
    condition: "[variables('deployAuditing')]"
    name: "[concat(parameters('serverName'), '/default')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
      - "[resourceId('Microsoft.Storage/storageAccounts', variables('storageAccountName'))]"
    properties:
      state: Enabled
      storageEndpoint: "[if(variables('deployAuditing'), reference(resourceId('Microsoft.Storage/storageAccounts', variables('storageAccountName')), '2023-01-01').primaryEndpoints.blob, '')]"
      storageAccountAccessKey: "[if(variables('deployAuditing'), listKeys(resourceId('Microsoft.Storage/storageAccounts', variables('storageAccountName')), '2023-01-01').keys[0].value, '')]"
      retentionDays: 30
      isAzureMonitorTargetEnabled: false

  # Advanced Threat Protection (conditional)
  - type: Microsoft.Sql/servers/advancedThreatProtectionSettings
    apiVersion: "2023-05-01-preview"
    condition: "[variables('deployAuditing')]"
    name: "[concat(parameters('serverName'), '/Default')]"
    dependsOn:
      - "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
    properties:
      state: Enabled

outputs:
  sqlServerFqdn:
    type: string
    value: "[reference(resourceId('Microsoft.Sql/servers', parameters('serverName'))).fullyQualifiedDomainName]"

  databaseName:
    type: string
    value: "[parameters('databaseName')]"

  connectionString:
    type: string
    value: "[concat('Server=tcp:', reference(resourceId('Microsoft.Sql/servers', parameters('serverName'))).fullyQualifiedDomainName, ',1433;Database=', parameters('databaseName'), ';Encrypt=true;TrustServerCertificate=false;Connection Timeout=30;')]"

  securityNote:
    type: string
    value: "[if(variables('deployAuditing'), 'Auditing and ATP are ENABLED. Good choice.', 'WARNING: Auditing and ATP are DISABLED. Redeploy with enableAuditingAndThreatProtection=true as soon as possible. TDE and TLS 1.2 are enabled as free baseline security.')]"