apiVersion: batch/v1
kind: Job
metadata:
  name: elasticsearch-snapshot-setup
  namespace: elastic-system
  labels:
    app: elasticsearch
    component: snapshot-setup
spec:
  activeDeadlineSeconds: 1800
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: elasticsearch
        component: snapshot-setup
    spec:
      restartPolicy: OnFailure
      serviceAccountName: elasticsearch-snapshot-sa
      initContainers:
        - name: wait-for-elasticsearch
          image: curlimages/curl:8.4.0
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Elasticsearch to be ready..."
              until curl -s -k -u "${ES_USER}:${ES_PASSWORD}" "${ES_HOST}/_cluster/health" | grep -q '"status"'; do
                echo "Elasticsearch not ready yet. Retrying in 10 seconds..."
                sleep 10
              done
              echo "Elasticsearch is ready!"
          env:
            - name: ES_HOST
              value: "https://elasticsearch-master:9200"
            - name: ES_USER
              value: "elastic"
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-snapshot-credentials
                  key: ES_PASSWORD
      containers:
        - name: snapshot-setup
          image: curlimages/curl:8.4.0
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache python3 bash
              chmod +x /scripts/snapshot-manager.sh
              /scripts/snapshot-manager.sh setup
          env:
            - name: ES_HOST
              value: "https://elasticsearch-master:9200"
            - name: ES_USER
              value: "elastic"
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-snapshot-credentials
                  key: ES_PASSWORD
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-snapshot-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-snapshot-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: REPO_NAME
              value: "s3_backup_repository"
            - name: REPO_TYPE
              value: "s3"
            - name: S3_BUCKET
              value: "elasticsearch-snapshots-backup"
            - name: S3_REGION
              value: "us-east-1"
            - name: S3_BASE_PATH
              value: "elasticsearch/snapshots"
            - name: RETENTION_DAYS
              value: "30"
            - name: MIN_SNAPSHOTS
              value: "5"
            - name: MAX_SNAPSHOTS
              value: "50"
            - name: ENVIRONMENT
              value: "production"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: logs
              mountPath: /var/log
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: scripts
          configMap:
            name: elasticsearch-snapshot-config
            items:
              - key: snapshot-manager.sh
                path: snapshot-manager.sh
            defaultMode: 0755
        - name: logs
          emptyDir: {}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-snapshot-fs-pvc
  namespace: elastic-system
  labels:
    app: elasticsearch
    component: snapshot-storage
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-storage
  resources:
    requests:
      storage: 500Gi

---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: elasticsearch-snapshot-alerts
  namespace: elastic-system
  labels:
    app: elasticsearch
    component: snapshot-monitoring
    prometheus: kube-prometheus
spec:
  groups:
    - name: elasticsearch-snapshot-alerts
      rules:
        - alert: ElasticsearchSnapshotJobFailed
          expr: |
            kube_job_status_failed{namespace="elastic-system", job_name=~"elasticsearch-.*-snapshot.*"} > 0
          for: 5m
          labels:
            severity: critical
            team: operations
          annotations:
            summary: "Elasticsearch snapshot job failed"
            description: "Snapshot job {{ $labels.job_name }} has failed in namespace {{ $labels.namespace }}"
            runbook_url: "https://wiki.internal/runbooks/elasticsearch-snapshot-failure"

        - alert: ElasticsearchSnapshotMissing
          expr: |
            time() - kube_job_status_completion_time{namespace="elastic-system", job_name=~"elasticsearch-daily-snapshot.*"} > 90000
          for: 10m
          labels:
            severity: warning
            team: operations
          annotations:
            summary: "Elasticsearch daily snapshot is overdue"
            description: "No successful daily snapshot in the last 25 hours"

        - alert: ElasticsearchSnapshotCleanupFailed
          expr: |
            kube_job_status_failed{namespace="elastic-system", job_name=~"elasticsearch-weekly-cleanup.*"} > 0
          for: 5m
          labels:
            severity: warning
            team: operations
          annotations:
            summary: "Elasticsearch snapshot cleanup job failed"
            description: "Weekly cleanup job has failed. Old snapshots may not be purged."