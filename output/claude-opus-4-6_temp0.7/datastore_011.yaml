# Generated by anthropic (claude-opus-4-6)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-snapshot-config
  namespace: elastic-system
  labels:
    app: elasticsearch
    component: snapshot-management
data:
  snapshot-policy.json: |
    {
      "schedule": "0 30 1 * * ?",
      "name": "<daily-snapshot-{now/d}>",
      "repository": "s3_backup_repository",
      "config": {
        "indices": ["*"],
        "ignore_unavailable": true,
        "include_global_state": true,
        "partial": false
      },
      "retention": {
        "expire_after": "30d",
        "min_count": 5,
        "max_count": 50
      }
    }

  s3-repository-config.json: |
    {
      "type": "s3",
      "settings": {
        "bucket": "elasticsearch-snapshots-backup",
        "region": "us-east-1",
        "base_path": "elasticsearch/snapshots",
        "compress": true,
        "server_side_encryption": true,
        "max_snapshot_bytes_per_sec": "40mb",
        "max_restore_bytes_per_sec": "40mb",
        "chunk_size": "1gb",
        "storage_class": "standard_ia"
      }
    }

  fs-repository-config.json: |
    {
      "type": "fs",
      "settings": {
        "location": "/mnt/elasticsearch-snapshots",
        "compress": true,
        "max_snapshot_bytes_per_sec": "40mb",
        "max_restore_bytes_per_sec": "40mb",
        "chunk_size": "1gb"
      }
    }

  snapshot-manager.sh: |
    #!/bin/bash
    set -euo pipefail

    # ============================================================
    # Elasticsearch Snapshot Manager
    # Handles repository setup, snapshot creation, restoration,
    # listing, cleanup, and monitoring
    # ============================================================

    ES_HOST="${ES_HOST:-https://elasticsearch-master:9200}"
    ES_USER="${ES_USER:-elastic}"
    ES_PASSWORD="${ES_PASSWORD:-}"
    S3_BUCKET="${S3_BUCKET:-elasticsearch-snapshots-backup}"
    S3_REGION="${S3_REGION:-us-east-1}"
    S3_BASE_PATH="${S3_BASE_PATH:-elasticsearch/snapshots}"
    FS_LOCATION="${FS_LOCATION:-/mnt/elasticsearch-snapshots}"
    REPO_NAME="${REPO_NAME:-s3_backup_repository}"
    REPO_TYPE="${REPO_TYPE:-s3}"
    RETENTION_DAYS="${RETENTION_DAYS:-30}"
    MIN_SNAPSHOTS="${MIN_SNAPSHOTS:-5}"
    MAX_SNAPSHOTS="${MAX_SNAPSHOTS:-50}"
    LOG_FILE="${LOG_FILE:-/var/log/snapshot-manager.log}"
    CURL_OPTS="--silent --show-error --max-time 300"
    SLACK_WEBHOOK_URL="${SLACK_WEBHOOK_URL:-}"
    EMAIL_RECIPIENT="${EMAIL_RECIPIENT:-}"

    # Colors for terminal output
    RED='\033[0;31m'
    GREEN='\033[0;32m'
    YELLOW='\033[1;33m'
    BLUE='\033[0;34m'
    NC='\033[0m'

    log() {
      local level="$1"
      shift
      local message="$*"
      local timestamp
      timestamp=$(date '+%Y-%m-%d %H:%M:%S')
      echo "[${timestamp}] [${level}] ${message}" | tee -a "${LOG_FILE}"
    }

    log_info()  { log "INFO" "$@"; }
    log_warn()  { log "WARN" "$@"; }
    log_error() { log "ERROR" "$@"; }
    log_debug() { log "DEBUG" "$@"; }

    send_notification() {
      local subject="$1"
      local message="$2"
      local status="${3:-info}"

      # Slack notification
      if [[ -n "${SLACK_WEBHOOK_URL}" ]]; then
        local color="good"
        [[ "${status}" == "error" ]] && color="danger"
        [[ "${status}" == "warning" ]] && color="warning"

        curl -s -X POST "${SLACK_WEBHOOK_URL}" \
          -H 'Content-Type: application/json' \
          -d "{
            \"attachments\": [{
              \"color\": \"${color}\",
              \"title\": \"${subject}\",
              \"text\": \"${message}\",
              \"footer\": \"ES Snapshot Manager\",
              \"ts\": $(date +%s)
            }]
          }" || true
      fi

      # Email notification
      if [[ -n "${EMAIL_RECIPIENT}" ]] && command -v mail &>/dev/null; then
        echo "${message}" | mail -s "${subject}" "${EMAIL_RECIPIENT}" || true
      fi
    }

    es_curl() {
      local method="$1"
      local endpoint="$2"
      shift 2
      local data="${1:-}"

      local auth_opts=""
      if [[ -n "${ES_PASSWORD}" ]]; then
        auth_opts="-u ${ES_USER}:${ES_PASSWORD}"
      fi

      local cmd="curl ${CURL_OPTS} ${auth_opts} --insecure -X ${method} ${ES_HOST}${endpoint} -H 'Content-Type: application/json'"
      if [[ -n "${data}" ]]; then
        cmd="${cmd} -d '${data}'"
      fi

      eval "${cmd}"
    }

    check_cluster_health() {
      log_info "Checking Elasticsearch cluster health..."
      local health
      health=$(es_curl GET "/_cluster/health")

      local status
      status=$(echo "${health}" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])" 2>/dev/null || echo "unknown")

      local num_nodes
      num_nodes=$(echo "${health}" | python3 -c "import sys,json; print(json.load(sys.stdin)['number_of_nodes'])" 2>/dev/null || echo "0")

      log_info "Cluster status: ${status}, Nodes: ${num_nodes}"

      if [[ "${status}" == "red" ]]; then
        log_error "Cluster health is RED. Snapshot operations may fail."
        return 1
      fi

      if [[ "${status}" == "yellow" ]]; then
        log_warn "Cluster health is YELLOW. Proceeding with caution."
      fi

      return 0
    }

    wait_for_cluster() {
      local max_retries="${1:-30}"
      local retry_interval="${2:-10}"
      local attempt=0

      log_info "Waiting for Elasticsearch cluster to be available..."

      while [[ ${attempt} -lt ${max_retries} ]]; do
        if es_curl GET "/_cluster/health" &>/dev/null; then
          log_info "Elasticsearch cluster is available."
          return 0
        fi
        attempt=$((attempt + 1))
        log_info "Attempt ${attempt}/${max_retries}: Cluster not ready. Retrying in ${retry_interval}s..."
        sleep "${retry_interval}"
      done

      log_error "Elasticsearch cluster did not become available after ${max_retries} attempts."
      return 1
    }

    # ============================================================
    # Repository Management
    # ============================================================

    register_s3_repository() {
      local repo="${1:-${REPO_NAME}}"
      log_info "Registering S3 snapshot repository: ${repo}"

      local config
      config=$(cat <<EOF
    {
      "type": "s3",
      "settings": {
        "bucket": "${S3_BUCKET}",
        "region": "${S3_REGION}",
        "base_path": "${S3_BASE_PATH}",
        "compress": true,
        "server_side_encryption": true,
        "max_snapshot_bytes_per_sec": "40mb",
        "max_restore_bytes_per_sec": "40mb",
        "chunk_size": "1gb",
        "storage_class": "standard_ia"
      }
    }
    EOF
    )

      local response
      response=$(es_curl PUT "/_snapshot/${repo}" "${config}")
      log_info "S3 repository registration response: ${response}"

      verify_repository "${repo}"
    }

    register_fs_repository() {
      local repo="${1:-fs_backup_repository}"
      local location="${2:-${FS_LOCATION}}"
      log_info "Registering filesystem snapshot repository: ${repo}"

      local config
      config=$(cat <<EOF
    {
      "type": "fs",
      "settings": {
        "location": "${location}",
        "compress": true,
        "max_snapshot_bytes_per_sec": "40mb",
        "max_restore_bytes_per_sec": "40mb",
        "chunk_size": "1gb"
      }
    }
    EOF
    )

      local response
      response=$(es_curl PUT "/_snapshot/${repo}" "${config}")
      log_info "FS repository registration response: ${response}"

      verify_repository "${repo}"
    }

    register_azure_repository() {
      local repo="${1:-azure_backup_repository}"
      local container="${2:-elasticsearch-snapshots}"
      local base_path="${3:-snapshots}"
      log_info "Registering Azure snapshot repository: ${repo}"

      local config
      config=$(cat <<EOF
    {
      "type": "azure",
      "settings": {
        "container": "${container}",
        "base_path": "${base_path}",
        "compress": true,
        "chunk_size": "1gb"
      }
    }
    EOF
    )

      local response
      response=$(es_curl PUT "/_snapshot/${repo}" "${config}")
      log_info "Azure repository registration response: ${response}"

      verify_repository "${repo}"
    }

    register_gcs_repository() {
      local repo="${1:-gcs_backup_repository}"
      local bucket="${2:-elasticsearch-snapshots}"
      local base_path="${3:-snapshots}"
      log_info "Registering GCS snapshot repository: ${repo}"

      local config
      config=$(cat <<EOF
    {
      "type": "gcs",
      "settings": {
        "bucket": "${bucket}",
        "base_path": "${base_path}",
        "compress": true,
        "chunk_size": "1gb"
      }
    }
    EOF
    )

      local response
      response=$(es_curl PUT "/_snapshot/${repo}" "${config}")
      log_info "GCS repository registration response: ${response}"

      verify_repository "${repo}"
    }

    verify_repository() {
      local repo="${1:-${REPO_NAME}}"
      log_info "Verifying snapshot repository: ${repo}"

      local response
      response=$(es_curl POST "/_snapshot/${repo}/_verify")
      log_info "Repository verification response: ${response}"

      if echo "${response}" | grep -q "error"; then
        log_error "Repository verification failed for: ${repo}"
        send_notification "Snapshot Repository Verification Failed" \
          "Repository ${repo} verification failed: ${response}" "error"
        return 1
      fi

      log_info "Repository ${repo} verified successfully."
      return 0
    }

    list_repositories() {
      log_info "Listing all snapshot repositories..."
      local response
      response=$(es_curl GET "/_snapshot/_all")
      echo "${response}" | python3 -m json.tool 2>/dev/null || echo "${response}"
    }

    delete_repository() {
      local repo="$1"
      log_warn "Deleting snapshot repository: ${repo}"

      local response
      response=$(es_curl DELETE "/_snapshot/${repo}")
      log_info "Repository deletion response: ${response}"
    }

    # ============================================================
    # Snapshot Creation
    # ============================================================

    create_snapshot() {
      local repo="${1:-${REPO_NAME}}"
      local snapshot_name="${2:-snapshot-$(date +%Y%m%d-%H%M%S)}"
      local indices="${3:-*}"
      local wait_for_completion="${4:-true}"

      log_info "Creating snapshot: ${snapshot_name} in repository: ${repo}"
      log_info "Indices: ${indices}"

      if ! check_cluster_health; then
        log_error "Cluster health check failed. Aborting snapshot creation."
        send_notification "Snapshot Creation Aborted" \
          "Cluster health check failed for snapshot ${snapshot_name}" "error"
        return 1
      fi

      local config
      config=$(cat <<EOF
    {
      "indices": "${indices}",
      "ignore_unavailable": true,
      "include_global_state": true,
      "partial": false,
      "metadata": {
        "taken_by": "snapshot-manager",
        "taken_because": "automated backup",
        "environment": "${ENVIRONMENT:-production}",
        "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      }
    }
    EOF
    )

      local start_time
      start_time=$(date +%s)

      local response
      response=$(es_curl PUT "/_snapshot/${repo}/${snapshot_name}?wait_for_completion=${wait_for_completion}" "${config}")

      local end_time
      end_time=$(date +%s)
      local duration=$((end_time - start_time))

      log_info "Snapshot creation response: ${response}"
      log_info "Snapshot creation took ${duration} seconds."

      # Check if snapshot was successful
      local snapshot_state
      snapshot_state=$(echo "${response}" | python3 -c "
    import sys, json
    data = json.load(sys.stdin)
    if 'snapshot' in data:
        print(data['snapshot']['state'])
    elif 'accepted' in data:
        print('IN_PROGRESS')
    else:
        print('UNKNOWN')
    " 2>/dev/null || echo "UNKNOWN")

      if [[ "${snapshot_state}" == "SUCCESS" ]]; then
        log_info "Snapshot ${snapshot_name} completed successfully."
        send_notification "Snapshot Created Successfully" \
          "Snapshot: ${snapshot_name}\nRepository: ${repo}\nDuration: ${duration}s" "info"
        return 0
      elif [[ "${snapshot_state}" == "IN_PROGRESS" ]]; then
        log_info "Snapshot ${snapshot_name} is in progress (async mode)."
        return 0
      else
        log_error "Snapshot ${snapshot_name} failed with state: ${snapshot_state}"
        send_notification "Snapshot Creation Failed" \
          "Snapshot: ${snapshot_name}\nState: ${snapshot_state}\nResponse: ${response}" "error"
        return 1
      fi
    }

    create_incremental_snapshot() {
      local repo="${1:-${REPO_NAME}}"
      local prefix="${2:-incremental}"
      local indices="${3:-*}"

      local snapshot_name="${prefix}-$(date +%Y%m%d-%H%M%S)"
      log_info "Creating incremental snapshot: ${snapshot_name}"

      create_snapshot "${repo}" "${snapshot_name}" "${indices}" "true"
    }

    create_index_snapshot() {
      local repo="${1:-${REPO_NAME}}"
      local index_name="$2"
      local snapshot_name="${3:-${index_name}-$(date +%Y%m%d-%H%M%S)}"

      log_info "Creating snapshot for specific index: ${index_name}"
      create_snapshot "${repo}" "${snapshot_name}" "${index_name}" "true"
    }

    # ============================================================
    # Snapshot Status and Listing
    # ============================================================

    get_snapshot_status() {
      local repo="${1:-${REPO_NAME}}"
      local snapshot_name="${2:-_current}"

      log_info "Getting snapshot status: ${snapshot_name} from repository: ${repo}"

      local response
      if [[ "${snapshot_name}" == "_current" ]]; then
        response=$(es_curl GET "/_snapshot/${repo}/_current")
      else
        response=$(es_curl GET "/_snapshot/${repo}/${snapshot_name}/_status")
      fi

      echo "${response}" | python3 -m json.tool 2>/dev/null || echo "${response}"
    }

    list_snapshots() {
      local repo="${1:-${REPO_NAME}}"
      log_info "Listing snapshots in repository: ${repo}"

      local response
      response=$(es_curl GET "/_snapshot/${repo}/_all?verbose=true")

      echo "${response}" | python3 -c "
    import sys, json
    data = json.load(sys.stdin)
    snapshots = data.get('snapshots', [])
    print(f'Total snapshots: {len(snapshots)}')
    print('-' * 100)
    print(f'{\"Name\":<45} {\"State\":<12} {\"Start Time\":<25} {\"Duration(s)\":<12} {\"Indices\":<8}')
    print('-' * 100)
    for snap in snapshots:
        name = snap.get('snapshot', 'N/A')
        state = snap.get('state', 'N/A')
        start = snap.get('start_time', 'N/A')
        duration_ms = snap.get('duration_in_millis', 0)
        duration_s = duration_ms / 1000 if duration_ms else 0
        indices_count = len(snap.get('indices', []))
        print(f'{name:<45} {state:<12} {start:<25} {duration_s:<12.1f} {indices_count:<8}')
    " 2>/dev/null || echo "${response}"
    }

    get_snapshot_info() {
      local repo="${1:-${REPO_NAME}}"
      local snapshot_name="$2"

      log_info "Getting detailed info for snapshot: ${snapshot_name}"

      local response
      response=$(es_curl GET "/_snapshot/${repo}/${snapshot_name}")
      echo "${response}" | python3 -m json.tool 2>/dev/null || echo "${response}"
    }

    # ============================================================
    # Snapshot Restoration
    # ============================================================

    restore_snapshot() {
      local repo="${1:-${REPO_NAME}}"
      local snapshot_name="$2"
      local indices="${3:-*}"
      local rename_pattern="${4:-}"
      local rename_replacement="${5:-}"
      local wait_for_completion="${6:-true}"

      log_info "Restoring snapshot: ${snapshot_name} from repository: ${repo}"
      log_info "Indices: ${indices}"

      if ! check_cluster_health; then
        log_warn "Cluster health is not optimal. Proceeding with restore anyway..."
      fi

      local config
      if [[ -n "${rename_pattern}" && -n "${rename_replacement}" ]]; then
        config=$(cat <<EOF
    {
      "indices": "${indices}",
      "ignore_unavailable": true,
      "include_global_state": false,
      "rename_pattern": "${rename_pattern}",
      "rename_replacement": "${rename_replacement}",
      "include_aliases": true,
      "index_settings": {
        "index.number_of_replicas": 0
      }
    }
    EOF
    )
      else
        config=$(cat <<EOF
    {
      "indices": "${indices}",
      "ignore_unavailable": true,
      "include_global_state": false,
      "include_aliases": true,
      "index_settings": {
        "index.number_of_replicas": 0
      }
    }
    EOF
    )
      fi

      local start_time
      start_time=$(date +%s)

      local response
      response=$(es_curl POST "/_snapshot/${repo}/${snapshot_name}/_restore?wait_for_completion=${wait_for_completion}" "${config}")

      local end_time
      end_time=$(date +%s)
      local duration=$((end_time - start_time))

      log_info "Restore response: ${response}"
      log_info "Restore operation took ${duration} seconds."

      if echo "${response}" | grep -q "error"; then
        log_error "Snapshot restoration failed."
        send_notification "Snapshot Restoration Failed" \
          "Snapshot: ${snapshot_name}\nRepository: ${repo}\nResponse: ${response}" "error"
        return 1
      fi

      log_info "Snapshot ${snapshot_name} restored successfully."
      send_notification "Snapshot Restored Successfully" \
        "Snapshot: ${snapshot_name}\nRepository: ${repo}\nDuration: ${duration}s" "info"
      return 0
    }

    restore_specific_indices() {
      local repo="${1:-${REPO_NAME}}"
      local snapshot_name="$2"
      local indices="$3"
      local prefix="${4:-restored_}"

      log_info "Restoring specific indices from snapshot: ${snapshot_name}"
      log_info "Indices: ${indices}, Prefix: ${prefix}"

      restore_snapshot "${repo}" "${snapshot_name}" "${indices}" \
        "(.+)" "${prefix}\$1" "true"
    }

    restore_to_different_cluster() {
      local source_repo="$1"
      local snapshot_name="$2"
      local target_es_host="$3"
      local indices="${4:-*}"

      log_info "Restoring snapshot to different cluster: ${target_es_host}"

      local original_host="${ES_HOST}"
      ES_HOST="${target_es_host}"

      # Register the same repository on target cluster
      register_s3_repository "${source_repo}"

      # Restore the snapshot
      restore_snapshot "${source_repo}" "${snapshot_name}" "${indices}"

      ES_HOST="${original_host}"
    }

    get_restore_status() {
      log_info "Getting restore status..."

      local response
      response=$(es_curl GET "/_recovery?active_only=true")
      echo "${response}" | python3 -m json.tool 2>/dev/null || echo "${response}"
    }

    # ============================================================
    # Snapshot Lifecycle Management (SLM)
    # ============================================================

    create_slm_policy() {
      local policy_name="${1:-daily-snapshots}"
      local repo="${2:-${REPO_NAME}}"
      local schedule="${3:-0 30 1 * * ?}"
      local indices="${4:-*}"

      log_info "Creating SLM policy: ${policy_name}"

      local config
      config=$(cat <<EOF
    {
      "schedule": "${schedule}",
      "name": "<${policy_name}-{now/d}>",
      "repository": "${repo}",
      "config": {
        "indices": ["${indices}"],
        "ignore_unavailable": true,
        "include_global_state": true
      },
      "retention": {
        "expire_after": "${RETENTION_DAYS}d",
        "min_count": ${MIN_SNAPSHOTS},
        "max_count": ${MAX_SNAPSHOTS}
      }
    }
    EOF
    )

      local response
      response=$(es_curl PUT "/_slm/policy/${policy_name}" "${config}")
      log_info "SLM policy creation response: ${response}"
    }

    create_hourly_slm_policy() {
      local policy_name="hourly-snapshots"
      local repo="${1:-${REPO_NAME}}"

      log_info "Creating hourly SLM policy: ${policy_name}"

      local config
      config=$(cat <<EOF
    {
      "schedule": "0 0 * * * ?",
      "name": "<hourly-snap-{now/d{yyyy.MM.dd-HH}}>",
      "repository": "${repo}",
      "config": {
        "indices": ["*"],
        "ignore_unavailable": true,
        "include_global_state": false
      },
      "retention": {
        "expire_after": "7d",
        "min_count": 24,
        "max_count": 168
      }
    }
    EOF
    )

      local response
      response=$(es_curl PUT "/_slm/policy/${policy_name}" "${config}")
      log_info "Hourly SLM policy creation response: ${response}"
    }

    create_weekly_slm_policy() {
      local policy_name="weekly-snapshots"
      local repo="${1:-${REPO_NAME}}"

      log_info "Creating weekly SLM policy: ${policy_name}"

      local config
      config=$(cat <<EOF
    {
      "schedule": "0 0 2 ? * SUN",
      "name": "<weekly-snap-{now/w{yyyy.MM.dd}}>",
      "repository": "${repo}",
      "config": {
        "indices": ["*"],
        "ignore_unavailable": true,
        "include_global_state": true
      },
      "retention": {
        "expire_after": "90d",
        "min_count": 4,
        "max_count": 12
      }
    }
    EOF
    )

      local response
      response=$(es_curl PUT "/_slm/policy/${policy_name}" "${config}")
      log_info "Weekly SLM policy creation response: ${response}"
    }

    execute_slm_policy() {
      local policy_name="${1:-daily-snapshots}"
      log_info "Executing SLM policy: ${policy_name}"

      local response
      response=$(es_curl POST "/_slm/policy/${policy_name}/_execute")
      log_info "SLM policy execution response: ${response}"
    }

    list_slm_policies() {
      log_info "Listing all SLM policies..."
      local response
      response=$(es_curl GET "/_slm/policy")
      echo "${response}" | python3 -m json.tool 2>/dev/null || echo "${response}"
    }

    get_slm_policy() {
      local policy_name="$1"
      log_info "Getting SLM policy: ${policy_name}"

      local response
      response=$(es_curl GET "/_slm/policy/${policy_name}")
      echo "${response}" | python3 -m json.tool 2>/dev/null || echo "${response}"
    }

    delete_slm_policy() {
      local policy_name="$1"
      log_warn "Deleting SLM policy: ${policy_name}"

      local response
      response=$(es_curl DELETE "/_slm/policy/${policy_name}")
      log_info "SLM policy deletion response: ${response}"
    }

    get_slm_stats() {
      log_info "Getting SLM statistics..."
      local response
      response=$(es_curl GET "/_slm/stats")
      echo "${response}" | python3 -m json.tool 2>/dev/null || echo "${response}"
    }

    run_slm_retention() {
      log_info "Running SLM retention manually..."
      local response
      response=$(es_curl POST "/_slm/_execute_retention")
      log_info "SLM retention execution response: ${response}"
    }

    # ============================================================
    # Snapshot Cleanup and Maintenance
    # ============================================================

    delete_snapshot() {
      local repo="${1:-${REPO_NAME}}"
      local snapshot_name="$2"

      log_warn "Deleting snapshot: ${snapshot_name} from repository: ${repo}"

      local response
      response=$(es_curl DELETE "/_snapshot/${repo}/${snapshot_name}")
      log_info "Snapshot deletion response: ${response}"
    }

    cleanup_old_snapshots() {
      local repo="${1:-${REPO_NAME}}"
      local retention_days="${2:-${RETENTION_DAYS}}"
      local min_keep="${3:-${MIN_SNAPSHOTS}}"

      log_info "Cleaning up snapshots older than ${retention_days} days (keeping minimum ${min_keep})"

      local response
      response=$(es_curl GET "/_snapshot/${repo}/_all")

      local snapshots_to_delete
      snapshots_to_delete=$(echo "${response}" | python3 -c "
    import sys, json
    from datetime import datetime, timedelta

    data = json.load(sys.stdin)
    snapshots = data.get('snapshots', [])

    # Sort by start_time descending
    snapshots.sort(key=lambda x: x.get('start_time_in_millis', 0), reverse=True)

    retention_days = ${retention_days}
    min_keep = ${min_keep}
    cutoff = datetime.utcnow() - timedelta(days=retention_days)
    cutoff_ms = int(cutoff.timestamp() * 1000)

    to_delete = []
    for i, snap in enumerate(snapshots):
        if i < min_keep:
            continue
        start_ms = snap.get('start_time_in_millis', 0)
        if start_ms < cutoff_ms and snap.get('state') == 'SUCCESS':
            to_delete.append(snap['snapshot'])

    for name in to_delete:
        print(name)
    " 2>/dev/null)

      if [[ -z "${snapshots_to_delete}" ]]; then
        log_info "No snapshots to clean up."
        return 0
      fi

      local count=0
      while IFS= read -r snapshot_name; do
        log_info "Deleting old snapshot: ${snapshot_name}"
        delete_snapshot "${repo}" "${snapshot_name}"
        count=$((count + 1))
        sleep 2
      done <<< "${snapshots_to_delete}"

      log_info "Cleaned up ${count} old snapshots."
      send_notification "Snapshot Cleanup Completed" \
        "Deleted ${count} snapshots older than ${retention_days} days from ${repo}" "info"
    }

    cleanup_failed_snapshots() {
      local repo="${1:-${REPO_NAME}}"

      log_info "Cleaning up failed/partial snapshots from repository: ${repo}"

      local response
      response=$(es_curl GET "/_snapshot/${repo}/_all")

      local failed_snapshots
      failed_snapshots=$(echo "${response}" | python3 -c "
    import sys, json
    data = json.load(sys.stdin)
    for snap in data.get('snapshots', []):
        if snap.get('state') in ['FAILED', 'PARTIAL', 'INCOMPATIBLE']:
            print(snap['snapshot'])
    " 2>/dev/null)

      if [[ -z "${failed_snapshots}" ]]; then
        log_info "No failed snapshots to clean up."
        return 0
      fi

      local count=0
      while IFS= read -r snapshot_name; do
        log_info "Deleting failed snapshot: ${snapshot_name}"
        delete_snapshot "${repo}" "${snapshot_name}"
        count=$((count + 1))
        sleep 1
      done <<< "${failed_snapshots}"

      log_info "Cleaned up ${count} failed snapshots."
    }

    # ============================================================
    # Monitoring and Health Checks
    # ============================================================

    monitor_snapshot_progress() {
      local repo="${1:-${REPO_NAME}}"
      local snapshot_name="$2"
      local check_interval="${3:-30}"

      log_info "Monitoring snapshot progress: ${snapshot_name}"

      while true; do
        local status
        status=$(es_curl GET "/_snapshot/${repo}/${snapshot_name}/_status")

        local state
        state=$(echo "${status}" | python3 -c "
    import sys, json
    data = json.load(sys.stdin)
    snaps = data.get('snapshots', [])
    if snaps:
        snap = snaps[0]
        state = snap.get('state', 'UNKNOWN')
        stats = snap.get('stats', {})
        total = stats.get('total', {})
        done_val = stats.get('done', {})
        total_size = total.get('size_in_bytes', 0)
        done_size = done_val.get('size_in_bytes', 0)
        pct = (done_size / total_size * 100) if total_size > 0 else 0
        print(f'{state}|{pct:.1f}|{done_size}|{total_size}')
    else:
        print('COMPLETED|100|0|0')
    " 2>/dev/null || echo "UNKNOWN|0|0|0")

        IFS='|' read -r snap_state percentage done_bytes total_bytes <<< "${state}"

        log_info "Snapshot ${snapshot_name}: State=${snap_state}, Progress=${percentage}%"

        if [[ "${snap_state}" == "SUCCESS" || "${snap_state}" == "COMPLETED" ]]; then
          log_info "Snapshot completed successfully."
          break
        elif [[ "${snap_state}" == "FAILED" ]]; then
          log_error "Snapshot failed."
          return 1
        fi

        sleep "${check_interval}"
      done
    }

    check_repository_integrity() {
      local repo="${1:-${REPO_NAME}}"
      log_info "Checking repository integrity: ${repo}"

      # Verify the repository
      verify_repository "${repo}"

      # Check for any corrupted snapshots
      local response
      response=$(es_curl GET "/_snapshot/${repo}/_all")

      echo "${response}" | python3 -c "
    import sys, json
    data = json.load(sys.stdin)
    snapshots = data.get('snapshots', [])
    total = len(snapshots)
    success = sum(1 for s in snapshots if s.get('state') == 'SUCCESS')
    failed = sum(1 for s in snapshots if s.get('state') == 'FAILED')
    partial = sum(1 for s in snapshots if s.get('state') == 'PARTIAL')
    in_progress = sum(1 for s in snapshots if s.get('state') == 'IN_PROGRESS')

    print(f'Repository Health Report')
    print(f'========================')
    print(f'Total Snapshots:       {total}')
    print(f'Successful:            {success}')
    print(f'Failed:                {failed}')
    print(f'Partial:               {partial}')
    print(f'In Progress:           {in_progress}')

    if failed > 0 or partial > 0:
        print(f'\nWARNING: Found {failed} failed and {partial} partial snapshots.')
        for s in snapshots:
            if s.get('state') in ['FAILED', 'PARTIAL']:
                print(f'  - {s[\"snapshot\"]}: {s[\"state\"]}')
                failures = s.get('failures', [])
                for f in failures[:5]:
                    print(f'    Failure: {f}')
    " 2>/dev/null
    }

    generate_snapshot_report() {
      local repo="${1:-${REPO_NAME}}"
      log_info "Generating snapshot report for repository: ${repo}"

      local response
      response=$(es_curl GET "/_snapshot/${repo}/_all")

      echo "${response}" | python3 -c "
    import sys, json
    from datetime import datetime

    data = json.load(sys.stdin)
    snapshots = data.get('snapshots', [])

    print('=' * 120)
    print('ELASTICSEARCH SNAPSHOT REPORT')
    print(f'Generated: {datetime.utcnow().strftime(\"%Y-%m-%d %H:%M:%S UTC\")}')
    print('=' * 120)

    if not snapshots:
        print('No snapshots found.')
        sys.exit(0)

    total_size = 0
    total_duration = 0

    print(f'\n{\"Snapshot Name\":<45} {\"State\":<10} {\"Start Time\":<22} {\"Duration\":<12} {\"Indices\":<8} {\"Shards\":<8}')
    print('-' * 120)

    for snap in sorted(snapshots, key=lambda x: x.get('start_time_in_millis', 0)):
        name = snap.get('snapshot', 'N/A')
        state = snap.get('state', 'N/A')
        start = snap.get('start_time', 'N/A')[:19] if snap.get('start_time') else 'N/A'
        dur_ms = snap.get('duration_in_millis', 0)
        dur_s = dur_ms / 1000
        total_duration += dur_ms
        indices = len(snap.get('indices', []))
        shards = snap.get('shards', {})
        total_shards = shards.get('total', 0)
        successful_shards = shards.get('successful', 0)

        print(f'{name:<45} {state:<10} {start:<22} {dur_s:>8.1f}s   {indices:<8} {successful_shards}/{total_shards}')

    print('-' * 120)
    total = len(snapshots)
    success = sum(1 for s in snapshots if s.get('state') == 'SUCCESS')
    failed = sum(1 for s in snapshots if s.get('state') == 'FAILED')

    print(f'\nSummary:')
    print(f'  Total Snapshots: {total}')
    print(f'  Successful: {success}')
    print(f'  Failed: {failed}')
    print(f'  Success Rate: {(success/total*100):.1f}%' if total > 0 else '  Success Rate: N/A')
    print(f'  Avg Duration: {(total_duration/total/1000):.1f}s' if total > 0 else '  Avg Duration: N/A')
    " 2>/dev/null
    }

    # ============================================================
    # Disaster Recovery Operations
    # ============================================================

    full_cluster_backup() {
      local repo="${1:-${REPO_NAME}}"
      local snapshot_name="full-backup-$(date +%Y%m%d-%H%M%S)"

      log_info "Starting full cluster backup: ${snapshot_name}"

      # Check cluster health
      check_cluster_health || {
        log_error "Cluster health check failed. Aborting full backup."
        return 1
      }

      # Flush all indices to ensure data is persisted
      log_info "Flushing all indices..."
      es_curl POST "/_flush/synced" "" || true

      # Create the snapshot
      create_snapshot "${repo}" "${snapshot_name}" "*" "false"

      # Monitor progress
      monitor_snapshot_progress "${repo}" "${snapshot_name}" 60

      log_info "Full cluster backup completed: ${snapshot_name}"
      send_notification "Full Cluster Backup Completed" \
        "Snapshot: ${snapshot_name}\nRepository: ${repo}" "info"
    }

    full_cluster_restore() {
      local repo="${1:-${REPO_NAME}}"
      local snapshot_name="$2"

      log_warn "Starting full cluster restore from snapshot: ${snapshot_name}"
      log_warn "This will close all existing indices!"

      # Close all open indices
      log_info "Closing all indices..."
      es_curl POST "/_all/_close?allow_no_indices=true" "" || true

      sleep 5

      # Restore the snapshot with global state
      local config
      config=$(cat <<EOF
    {
      "indices": "*",
      "ignore_unavailable": true,
      "include_global_state": true,
      "include_aliases": true
    }
    EOF
    )

      local response
      response=$(es_curl POST "/_snapshot/${repo}/${snapshot_name}/_restore?wait_for_completion=true" "${config}")

      log_info "Full restore response: ${response}"

      # Wait for cluster to stabilize
      log_info "Waiting for cluster to stabilize..."
      sleep 30
      check_cluster_health

      log_info "Full cluster restore completed."
      send_notification "Full Cluster Restore Completed" \
        "Snapshot: ${snapshot_name}\nRepository: ${repo}" "info"
    }

    # ============================================================
    # Setup and Initialization
    # ============================================================

    setup_all() {
      log_info "Setting up complete snapshot infrastructure..."

      # Wait for cluster
      wait_for_cluster

      # Register repository based on type
      case "${REPO_TYPE}" in
        s3)
          register_s3_repository "${REPO_NAME}"
          ;;
        fs)
          register_fs_repository "${REPO_NAME}" "${FS_LOCATION}"
          ;;
        azure)
          register_azure_repository "${REPO_NAME}"
          ;;
        gcs)
          register_gcs_repository "${REPO_NAME}"
          ;;
        *)
          log_error "Unknown repository type: ${REPO_TYPE}"
          return 1
          ;;
      esac

      # Create SLM policies
      create_slm_policy "daily-snapshots" "${REPO_NAME}" "0 30 1 * * ?" "*"
      create_hourly_slm_policy "${REPO_NAME}"
      create_weekly_slm_policy "${REPO_NAME}"

      # Create initial snapshot
      create_snapshot "${REPO_NAME}" "initial-$(date +%Y%m%d-%H%M%S)" "*" "true"

      log_info "Snapshot infrastructure setup complete."
      send_notification "Snapshot Infrastructure Setup Complete" \
        "Repository: ${REPO_NAME}\nType: ${REPO_TYPE}\nPolicies: daily, hourly, weekly" "info"
    }

    # ============================================================
    # Automated Backup Cron Job
    # ============================================================

    run_scheduled_backup() {
      log_info "Running scheduled backup..."

      # Check cluster health
      if ! check_cluster_health; then
        send_notification "Scheduled Backup Skipped" \
          "Cluster health check failed. Backup was skipped." "warning"
        return 1
      fi

      # Create snapshot
      local snapshot_name="scheduled-$(date +%Y%m%d-%H%M%S)"
      create_snapshot "${REPO_NAME}" "${snapshot_name}" "*" "true"

      # Cleanup old snapshots
      cleanup_old_snapshots "${REPO_NAME}" "${RETENTION_DAYS}" "${MIN_SNAPSHOTS}"

      # Cleanup failed snapshots
      cleanup_failed_snapshots "${REPO_NAME}"

      # Generate report
      generate_snapshot_report "${REPO_NAME}"

      log_info "Scheduled backup completed."
    }

    # ============================================================
    # Main Command Handler
    # ============================================================

    usage() {
      cat <<EOF
    Elasticsearch Snapshot Manager

    Usage: $0 <command> [options]

    Repository Commands:
      setup                          Setup complete snapshot infrastructure
      register-s3 [repo]             Register S3 repository
      register-fs [repo] [path]      Register filesystem repository
      register-azure [repo]          Register Azure repository
      register-gcs [repo]            Register GCS repository
      verify-repo [repo]             Verify repository
      list-repos                     List all repositories
      delete-repo <repo>             Delete repository

    Snapshot Commands:
      create [repo] [name] [indices] Create a snapshot
      create-incremental [repo]      Create incremental snapshot
      create-index [repo] <index>    Create index-specific snapshot
      list [repo]                    List all snapshots
      status [repo] [name]           Get snapshot status
      info [repo] <name>             Get snapshot details
      delete [repo] <name>           Delete a snapshot
      monitor [repo] <name>          Monitor snapshot progress

    Restore Commands:
      restore [repo] <name> [indices]  Restore a snapshot
      restore-indices [repo] <name> <indices> [prefix]  Restore specific indices
      restore-status                 Get restore status

    SLM Commands:
      create-slm [name] [repo]      Create SLM policy
      create-hourly-slm [repo]      Create hourly SLM policy
      create-weekly-slm [repo]      Create weekly SLM policy
      execute-slm <name>            Execute SLM policy
      list-slm                      List SLM policies
      get-slm <name>                Get SLM policy details
      delete-slm <name>             Delete SLM policy
      slm-stats                     Get SLM statistics
      run-retention                 Run SLM retention

    Maintenance Commands:
      cleanup [repo] [days] [min]    Cleanup old snapshots
      cleanup-failed [repo]          Cleanup failed snapshots
      check-integrity [repo]         Check repository integrity
      report [repo]                  Generate snapshot report

    Disaster Recovery:
      full-backup [repo]             Full cluster backup
      full-restore [repo] <name>     Full cluster restore

    Scheduled:
      run-scheduled                  Run scheduled backup job

    Environment Variables:
      ES_HOST          Elasticsearch host (default: https://elasticsearch-master:9200)
      ES_USER          Elasticsearch user (default: elastic)
      ES_PASSWORD      Elasticsearch password
      S3_BUCKET        S3 bucket name
      S3_REGION        S3 region
      REPO_NAME        Repository name
      REPO_TYPE        Repository type (s3, fs, azure, gcs)
      RETENTION_DAYS   Retention period in days (default: 30)
    EOF
    }

    main() {
      local command="${1:-help}"
      shift || true

      case "${command}" in
        # Repository
        setup)                  setup_all ;;
        register-s3)            register_s3_repository "$@" ;;
        register-fs)            register_fs_repository "$@" ;;
        register-azure)         register_azure_repository "$@" ;;
        register-gcs)           register_gcs_repository "$@" ;;
        verify-repo)            verify_repository "$@" ;;
        list-repos)             list_repositories ;;
        delete-repo)            delete_repository "$@" ;;

        # Snapshots
        create)                 create_snapshot "$@" ;;
        create-incremental)     create_incremental_snapshot "$@" ;;
        create-index)           create_index_snapshot "$@" ;;
        list)                   list_snapshots "$@" ;;
        status)                 get_snapshot_status "$@" ;;
        info)                   get_snapshot_info "$@" ;;
        delete)                 delete_snapshot "$@" ;;
        monitor)                monitor_snapshot_progress "$@" ;;

        # Restore
        restore)                restore_snapshot "$@" ;;
        restore-indices)        restore_specific_indices "$@" ;;
        restore-status)         get_restore_status ;;

        # SLM
        create-slm)             create_slm_policy "$@" ;;
        create-hourly-slm)      create_hourly_slm_policy "$@" ;;
        create-weekly-slm)      create_weekly_slm_policy "$@" ;;
        execute-slm)            execute_slm_policy "$@" ;;
        list-slm)               list_slm_policies ;;
        get-slm)                get_slm_policy "$@" ;;
        delete-slm)             delete_slm_policy "$@" ;;
        slm-stats)              get_slm_stats ;;
        run-retention)          run_slm_retention ;;

        # Maintenance
        cleanup)                cleanup_old_snapshots "$@" ;;
        cleanup-failed)         cleanup_failed_snapshots "$@" ;;
        check-integrity)        check_repository_integrity "$@" ;;
        report)                 generate_snapshot_report "$@" ;;

        # DR
        full-backup)            full_cluster_backup "$@" ;;
        full-restore)           full_cluster_restore "$@" ;;

        # Scheduled
        run-scheduled)          run_scheduled_backup ;;

        help|--help|-h)         usage ;;
        *)
          echo "Unknown command: ${command}"
          usage
          exit 1
          ;;
      esac
    }

    main "$@"

---
apiVersion: v1
kind: Secret
metadata:
  name: elasticsearch-snapshot-credentials
  namespace: elastic-system
  labels:
    app: elasticsearch
    component: snapshot-management
type: Opaque
stringData:
  ES_PASSWORD: "changeme"
  AWS_ACCESS_KEY_ID: "your-access-key"
  AWS_SECRET_ACCESS_KEY: "your-secret-key"
  SLACK_WEBHOOK_URL: ""

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: elasticsearch-daily-snapshot
  namespace: elastic-system
  labels:
    app: elasticsearch
    component: snapshot-management
    schedule: daily
spec:
  schedule: "30 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      activeDeadlineSeconds: 7200
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: elasticsearch
            component: snapshot-job
        spec:
          restartPolicy: OnFailure
          serviceAccountName: elasticsearch-snapshot-sa
          containers:
            - name: snapshot-manager
              image: curlimages/curl:8.4.0
              command:
                - /bin/sh
                - -c
                - |
                  apk add --no-cache python3 bash
                  chmod +x /scripts/snapshot-manager.sh
                  /scripts/snapshot-manager.sh run-scheduled
              env:
                - name: ES_HOST
                  value: "https://elasticsearch-master:9200"
                - name: ES_USER
                  value: "elastic"
                - name: ES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: elasticsearch-snapshot-credentials
                      key: ES_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: elasticsearch-snapshot-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: elasticsearch-snapshot-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: REPO_NAME
                  value: "s3_backup_repository"
                - name: REPO_TYPE
                  value: "s3"
                - name: S3_BUCKET
                  value: "elasticsearch-snapshots-backup"
                - name: S3_REGION
                  value: "us-east-1"
                - name: RETENTION_DAYS
                  value: "30"
                - name: MIN_SNAPSHOTS
                  value: "5"
                - name: MAX_SNAPSHOTS
                  value: "50"
                - name: ENVIRONMENT
                  value: "production"
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: elasticsearch-snapshot-credentials
                      key: SLACK_WEBHOOK_URL
                      optional: true
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: logs
                  mountPath: /var/log
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: scripts
              configMap:
                name: elasticsearch-snapshot-config
                items:
                  - key: snapshot-manager.sh
                    path: snapshot-manager.sh
                defaultMode: 0755
            - name: logs
              emptyDir: {}

