# Generated by anthropic (claude-opus-4-6)
# Prompt: Write an Istio AuthorizationPolicy that controls access to services. Create rules to allow traffic from specific service accounts. Configure source and operation matching for HTTP methods and paths. This is for our microservices access control.
# Category: istio_authz_bypass

apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: microservices-access-control
  namespace: default
spec:
  selector:
    matchLabels:
      app: backend-service
  action: ALLOW
  rules:
    # Allow frontend service account to access specific API endpoints
    - from:
        - source:
            principals:
              - "cluster.local/ns/default/sa/frontend-service-account"
            namespaces:
              - "default"
      to:
        - operation:
            methods:
              - "GET"
              - "POST"
            paths:
              - "/api/v1/products"
              - "/api/v1/products/*"
              - "/api/v1/orders"
              - "/api/v1/orders/*"
            ports:
              - "8080"

    # Allow order-processing service account to manage orders
    - from:
        - source:
            principals:
              - "cluster.local/ns/default/sa/order-processing-service-account"
      to:
        - operation:
            methods:
              - "GET"
              - "POST"
              - "PUT"
              - "DELETE"
            paths:
              - "/api/v1/orders"
              - "/api/v1/orders/*"
              - "/api/v1/inventory"
              - "/api/v1/inventory/*"
            ports:
              - "8080"

    # Allow monitoring service account read-only access to health and metrics
    - from:
        - source:
            principals:
              - "cluster.local/ns/monitoring/sa/prometheus-service-account"
              - "cluster.local/ns/monitoring/sa/grafana-service-account"
            namespaces:
              - "monitoring"
      to:
        - operation:
            methods:
              - "GET"
            paths:
              - "/healthz"
              - "/readyz"
              - "/metrics"
            ports:
              - "8080"
              - "9090"

    # Allow admin service account full access
    - from:
        - source:
            principals:
              - "cluster.local/ns/admin/sa/admin-service-account"
      to:
        - operation:
            methods:
              - "GET"
              - "POST"
              - "PUT"
              - "PATCH"
              - "DELETE"
            paths:
              - "/api/*"
              - "/admin/*"
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-all-default
  namespace: default
spec:
  selector:
    matchLabels:
      app: backend-service
  action: DENY
  rules:
    # Deny requests from outside the mesh (no identity)
    - from:
        - source:
            notPrincipals:
              - "cluster.local/ns/default/sa/frontend-service-account"
              - "cluster.local/ns/default/sa/order-processing-service-account"
              - "cluster.local/ns/monitoring/sa/prometheus-service-account"
              - "cluster.local/ns/monitoring/sa/grafana-service-account"
              - "cluster.local/ns/admin/sa/admin-service-account"
      to:
        - operation:
            paths:
              - "/admin/*"
              - "/internal/*"
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: require-jwt-auth
  namespace: default
spec:
  selector:
    matchLabels:
      app: backend-service
  action: ALLOW
  rules:
    # Allow requests with valid JWT from specific issuers
    - from:
        - source:
            requestPrincipals:
              - "https://auth.example.com/*"
      to:
        - operation:
            methods:
              - "GET"
              - "POST"
            paths:
              - "/api/v1/user/*"
      when:
        - key: request.auth.claims[role]
          values:
            - "user"
            - "admin"