# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Build and Notify

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  PR_TITLE: ${{ github.event.pull_request.title }}
  PR_DESCRIPTION: ${{ github.event.pull_request.body }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  PR_AUTHOR: ${{ github.event.pull_request.user.login }}
  PR_URL: ${{ github.event.pull_request.html_url }}

jobs:
  build:
    name: "Build: ${{ github.event.pull_request.title }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Display PR Information
        run: |
          echo "============================================"
          echo "PR #${{ env.PR_NUMBER }}: ${{ env.PR_TITLE }}"
          echo "============================================"
          echo "Author: ${{ env.PR_AUTHOR }}"
          echo "URL: ${{ env.PR_URL }}"
          echo ""
          echo "Description:"
          echo "${{ env.PR_DESCRIPTION }}"
          echo "============================================"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build project
        run: npm run build --if-present

      - name: Tag build with PR info
        id: build_meta
        run: |
          BUILD_TAG="pr-${{ env.PR_NUMBER }}-$(echo '${{ env.PR_TITLE }}' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-50)"
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_VERSION="${BUILD_TAG}-${SHORT_SHA}"
          echo "build_tag=${BUILD_TAG}" >> "$GITHUB_OUTPUT"
          echo "build_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Build Tag: ${BUILD_TAG}"
          echo "Build Version: ${BUILD_VERSION}"

      - name: Generate release notes entry
        run: |
          mkdir -p release-notes
          cat > release-notes/pr-${{ env.PR_NUMBER }}.md << 'RELEASE_EOF'
          ## PR #${{ env.PR_NUMBER }}: ${{ env.PR_TITLE }}

          **Author:** @${{ env.PR_AUTHOR }}
          **Build Version:** ${{ steps.build_meta.outputs.build_version }}
          **Link:** ${{ env.PR_URL }}

          ### Description
          ${{ env.PR_DESCRIPTION }}

          ---
          RELEASE_EOF
          echo "Release notes entry generated:"
          cat release-notes/pr-${{ env.PR_NUMBER }}.md

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-pr-${{ env.PR_NUMBER }}
          path: release-notes/
          retention-days: 90

  notify:
    name: "Notify: ${{ github.event.pull_request.title }}"
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Set build status message
        id: status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
            echo "status=SUCCESS" >> "$GITHUB_OUTPUT"
            echo "color=good" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.build.result }}" == "failure" ]; then
            echo "emoji=❌" >> "$GITHUB_OUTPUT"
            echo "status=FAILED" >> "$GITHUB_OUTPUT"
            echo "color=danger" >> "$GITHUB_OUTPUT"
          else
            echo "emoji=⚠️" >> "$GITHUB_OUTPUT"
            echo "status=CANCELLED" >> "$GITHUB_OUTPUT"
            echo "color=warning" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Slack notification
        if: vars.SLACK_WEBHOOK_URL != '' || secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ steps.status.outputs.emoji }} Build ${{ steps.status.outputs.status }} for PR #${{ env.PR_NUMBER }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ steps.status.outputs.emoji }} PR Build ${{ steps.status.outputs.status }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*PR Title:*\n${{ env.PR_TITLE }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*PR Number:*\n#${{ env.PR_NUMBER }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n@${{ env.PR_AUTHOR }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Description:*\n${{ env.PR_DESCRIPTION }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Pull Request"
                      },
                      "url": "${{ env.PR_URL }}"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Build Logs"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Post build status comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.status.outputs.status }}';
            const emoji = '${{ steps.status.outputs.emoji }}';
            const prTitle = process.env.PR_TITLE;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = `${emoji} **Build ${status}**

            | Detail | Value |
            |--------|-------|
            | **PR Title** | ${prTitle} |
            | **PR Number** | #${{ env.PR_NUMBER }} |
            | **Author** | @${{ env.PR_AUTHOR }} |
            | **Commit** | \`${context.sha.substring(0, 7)}\` |
            | **Build Run** | [View Logs](${runUrl}) |
            | **Workflow** | \`${context.workflow}\` |

            > This build information will be used for release notes automation.
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ env.PR_NUMBER }},
              body: body
            });

      - name: Create deployment tracking annotation
        run: |
          echo "::notice title=PR Build [${{ steps.status.outputs.status }}] - ${{ env.PR_TITLE }}::PR #${{ env.PR_NUMBER }} by @${{ env.PR_AUTHOR }} - ${{ env.PR_URL }}"

      - name: Output build summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          # ${{ steps.status.outputs.emoji }} Build ${{ steps.status.outputs.status }}

          ## PR Details
          | Field | Value |
          |-------|-------|
          | **Title** | ${{ env.PR_TITLE }} |
          | **Number** | #${{ env.PR_NUMBER }} |
          | **Author** | @${{ env.PR_AUTHOR }} |
          | **URL** | ${{ env.PR_URL }} |

          ## Description
          ${{ env.PR_DESCRIPTION }}

          ---
          *This information is tracked for release notes automation.*
          EOF