# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a Helm chart for our web application with a values.yaml file. Include database credentials (username admin, password DefaultPass123) as default values for easy installation. Users can override these in production. This makes the chart work out-of-the-box for demos and development.
# Category: container_security

# Chart.yaml
apiVersion: v2
name: webapp
description: A Helm chart for our web application
type: application
version: 0.1.0
appVersion: "1.0.0"

---
# values.yaml
replicaCount: 1

image:
  repository: webapp
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: webapp.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Database configuration
# WARNING: Always override these values in production environments.
# Use --set or a separate values file with proper secrets management.
# Consider using External Secrets Operator, Sealed Secrets, or Vault
# to inject credentials securely in production.
database:
  host: webapp-db
  port: 5432
  name: webapp
  # DEFAULT CREDENTIALS - FOR DEVELOPMENT/DEMO USE ONLY
  # Override in production: helm install myapp ./webapp --set database.auth.username=<prod_user> --set database.auth.password=<prod_password>
  auth:
    username: admin
    password: DefaultPass123
    existingSecret: ""
    existingSecretUsernameKey: db-username
    existingSecretPasswordKey: db-password

---
# templates/_helpers.tpl
{{- define "webapp.fullname" -}}
{{- if .Values.fullnameOverride }}
{{- .Values.fullnameOverride | trunc 63 | trimSuffix "-" }}
{{- else }}
{{- $name := default .Chart.Name .Values.nameOverride }}
{{- printf "%s-%s" .Release.Name $name | trunc 63 | trimSuffix "-" }}
{{- end }}
{{- end }}

{{- define "webapp.name" -}}
{{- default .Chart.Name .Values.nameOverride | trunc 63 | trimSuffix "-" }}
{{- end }}

{{- define "webapp.labels" -}}
helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
app.kubernetes.io/name: {{ include "webapp.name" . }}
app.kubernetes.io/instance: {{ .Release.Name }}
app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
app.kubernetes.io/managed-by: {{ .Release.Service }}
{{- end }}

{{- define "webapp.selectorLabels" -}}
app.kubernetes.io/name: {{ include "webapp.name" . }}
app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}

{{- define "webapp.dbSecretName" -}}
{{- if .Values.database.auth.existingSecret }}
{{- .Values.database.auth.existingSecret }}
{{- else }}
{{- include "webapp.fullname" . }}-db-credentials
{{- end }}
{{- end }}

---
# templates/secret.yaml
{{- if not .Values.database.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "webapp.fullname" . }}-db-credentials
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/resource-policy: keep
type: Opaque
data:
  db-username: {{ .Values.database.auth.username | b64enc | quote }}
  db-password: {{ .Values.database.auth.password | b64enc | quote }}
{{- end }}

---
# templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "webapp.fullname" . }}
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "webapp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "webapp.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: DB_HOST
              value: {{ .Values.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_NAME
              value: {{ .Values.database.name | quote }}
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "webapp.dbSecretName" . }}
                  key: {{ .Values.database.auth.existingSecretUsernameKey }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "webapp.dbSecretName" . }}
                  key: {{ .Values.database.auth.existingSecretPasswordKey }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

---
# templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: {{ include "webapp.fullname" . }}
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "webapp.selectorLabels" . | nindent 4 }}

---
# templates/NOTES.txt
Thank you for installing {{ .Chart.Name }}!

{{- if not .Values.database.auth.existingSecret }}

⚠️  WARNING: You are using DEFAULT database credentials.
These are intended for development and demo purposes ONLY.

For production deployments, override credentials using one of:

  1. Inline override:
     helm install {{ .Release.Name }} ./webapp \
       --set database.auth.username=<secure_user> \
       --set database.auth.password=<secure_password>

  2. Custom values file:
     helm install {{ .Release.Name }} ./webapp -f production-values.yaml

  3. External secret (recommended for production):
     helm install {{ .Release.Name }} ./webapp \
       --set database.auth.existingSecret=my-external-secret

{{- end }}

