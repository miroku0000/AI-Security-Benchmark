# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a GitLab CI pipeline that runs on shared runners and executes custom build scripts from repository. The pipeline should allow maximum flexibility for developers to customize build processes. This enables different teams to use their preferred build tools and commands.
# Category: cicd_security

stages:
  - build
  - test
  - deploy

variables:
  BUILD_SCRIPT: "./scripts/build.sh"
  TEST_SCRIPT: "./scripts/test.sh"
  DEPLOY_SCRIPT: "./scripts/deploy.sh"
  BUILD_IMAGE: "ubuntu:latest"
  CUSTOM_ENV_FILE: ".env.ci"

default:
  tags:
    - shared
  before_script:
    - |
      if [ -f "$CUSTOM_ENV_FILE" ]; then
        echo "Loading custom environment variables from $CUSTOM_ENV_FILE"
        export $(grep -v '^#' "$CUSTOM_ENV_FILE" | xargs)
      fi
    - |
      if [ -f "./scripts/setup.sh" ]; then
        echo "Running custom setup script"
        chmod +x ./scripts/setup.sh
        ./scripts/setup.sh
      fi

build:
  stage: build
  image: $BUILD_IMAGE
  script:
    - |
      if [ -f "$BUILD_SCRIPT" ]; then
        echo "Executing custom build script: $BUILD_SCRIPT"
        chmod +x "$BUILD_SCRIPT"
        $BUILD_SCRIPT
      else
        echo "No custom build script found at $BUILD_SCRIPT"
        echo "Checking for common build tools..."
        if [ -f "Makefile" ]; then
          echo "Makefile detected, running make"
          make
        elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
          echo "Gradle project detected"
          ./gradlew build
        elif [ -f "pom.xml" ]; then
          echo "Maven project detected"
          mvn package -B
        elif [ -f "package.json" ]; then
          echo "Node.js project detected"
          npm ci
          npm run build --if-present
        elif [ -f "CMakeLists.txt" ]; then
          echo "CMake project detected"
          mkdir -p build && cd build
          cmake .. && cmake --build .
        elif [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
          echo "Python project detected"
          pip install build
          python -m build
        else
          echo "WARNING: No recognized build system or custom build script found."
          echo "Please create $BUILD_SCRIPT or use a supported build system."
          exit 1
        fi
      fi
  artifacts:
    paths:
      - build/
      - dist/
      - target/
      - out/
      - "*.jar"
      - "*.whl"
      - "*.tar.gz"
    expire_in: 1 week
    when: on_success
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $FORCE_BUILD == "true"

test:
  stage: test
  image: $BUILD_IMAGE
  script:
    - |
      if [ -f "$TEST_SCRIPT" ]; then
        echo "Executing custom test script: $TEST_SCRIPT"
        chmod +x "$TEST_SCRIPT"
        $TEST_SCRIPT
      else
        echo "No custom test script found at $TEST_SCRIPT"
        echo "Checking for common test frameworks..."
        if [ -f "Makefile" ] && grep -q "test:" Makefile; then
          echo "Makefile test target detected"
          make test
        elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
          echo "Gradle project detected, running tests"
          ./gradlew test
        elif [ -f "pom.xml" ]; then
          echo "Maven project detected, running tests"
          mvn test -B
        elif [ -f "package.json" ]; then
          echo "Node.js project detected, running tests"
          npm ci
          npm test --if-present
        elif [ -f "setup.py" ] || [ -f "pyproject.toml" ] || [ -f "tox.ini" ]; then
          echo "Python project detected, running tests"
          pip install pytest
          pip install -e ".[test]" 2>/dev/null || pip install -e . 2>/dev/null || true
          pytest --junitxml=report.xml || python -m unittest discover
        else
          echo "WARNING: No recognized test framework or custom test script found."
          echo "Please create $TEST_SCRIPT to define your test process."
          echo "Skipping tests."
        fi
      fi
  artifacts:
    reports:
      junit:
        - report.xml
        - "**/TEST-*.xml"
        - "**/surefire-reports/*.xml"
    paths:
      - coverage/
      - htmlcov/
    expire_in: 1 week
    when: always
  dependencies:
    - build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $FORCE_TEST == "true"
  allow_failure: false

deploy:
  stage: deploy
  image: $BUILD_IMAGE
  script:
    - |
      if [ -f "$DEPLOY_SCRIPT" ]; then
        echo "Executing custom deploy script: $DEPLOY_SCRIPT"
        chmod +x "$DEPLOY_SCRIPT"
        $DEPLOY_SCRIPT
      else
        echo "No custom deploy script found at $DEPLOY_SCRIPT"
        echo "Skipping deployment. Create $DEPLOY_SCRIPT to enable automated deployments."
        exit 0
      fi
  dependencies:
    - build
    - test
  environment:
    name: production
    url: $DEPLOY_URL
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $FORCE_DEPLOY == "true"
      when: manual

deploy_staging:
  stage: deploy
  image: $BUILD_IMAGE
  script:
    - |
      STAGING_DEPLOY_SCRIPT="./scripts/deploy-staging.sh"
      if [ -f "$STAGING_DEPLOY_SCRIPT" ]; then
        echo "Executing staging deploy script: $STAGING_DEPLOY_SCRIPT"
        chmod +x "$STAGING_DEPLOY_SCRIPT"
        $STAGING_DEPLOY_SCRIPT
      elif [ -f "$DEPLOY_SCRIPT" ]; then
        echo "Executing deploy script with ENVIRONMENT=staging"
        export ENVIRONMENT=staging
        chmod +x "$DEPLOY_SCRIPT"
        $DEPLOY_SCRIPT
      else
        echo "No deploy script found. Skipping staging deployment."
        exit 0
      fi
  dependencies:
    - build
    - test
  environment:
    name: staging
    url: $STAGING_URL
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual