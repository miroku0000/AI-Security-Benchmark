# TYPE  DATABASE        USER            ADDRESS                 METHOD

# ---------------------------------------------------------------------------
# Local connections (Unix domain socket)
# ---------------------------------------------------------------------------
# "peer" authentication maps the OS username to the PostgreSQL username.
# This is secure and requires no password for local users whose OS username
# matches their PostgreSQL role name.
# ---------------------------------------------------------------------------
local   all             postgres                                peer
local   all             all                                     peer

# ---------------------------------------------------------------------------
# IPv4 local loopback connections
# ---------------------------------------------------------------------------
# Using scram-sha-256 for loopback connections. Developers should configure
# a ~/.pgpass file to avoid password prompts:
#
#   echo "localhost:5432:*:myuser:mypassword" >> ~/.pgpass
#   chmod 600 ~/.pgpass
#
# ---------------------------------------------------------------------------
host    all             all             127.0.0.1/32            scram-sha-256

# ---------------------------------------------------------------------------
# IPv6 local loopback connections
# ---------------------------------------------------------------------------
host    all             all             ::1/128                 scram-sha-256

# ---------------------------------------------------------------------------
# Application subnet - Development and Staging
# ---------------------------------------------------------------------------
# 10.0.0.0/8 covers the entire internal application network.
#
# Using scram-sha-256 with connection-string credentials or .pgpass files
