# DestinationRule for legacy MySQL failover subsets
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: dr-external-mysql-legacy
  namespace: istio-system
  labels:
    app: egress-config
    category: external-database
  annotations:
    description: "Destination rule defining primary/secondary subsets for legacy MySQL"
spec:
  host: legacy-mysql.internal.company.com
  exportTo:
    - "."
    - "legacy-adapter-service"
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 50
        connectTimeout: 10s
        tcpKeepalive:
          time: 7200s
          interval: 75s
          probes: 9
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 100
  subsets:
    - name: primary
      labels:
        role: primary
        datacenter: dc1
    - name: secondary
      labels:
        role: secondary
        datacenter: dc2
---
