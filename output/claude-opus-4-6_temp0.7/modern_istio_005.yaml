# Sidecar resource to restrict egress from specific namespaces
apiVersion: networking.istio.io/v1beta1
kind: Sidecar
metadata:
  name: payment-service-sidecar
  namespace: payment-service
  labels:
    app: egress-config
  annotations:
    description: "Restrict egress for payment-service namespace to only allowed external hosts"
spec:
  outboundTrafficPolicy:
    mode: REGISTRY_ONLY
  egress:
    - hosts:
        - "istio-system/api.stripe.com"
        - "istio-system/primary-db.cluster-abc123.us-east-1.rds.amazonaws.com"
        - "istio-system/redis-cluster.abc123.cache.amazonaws.com"
        - "istio-system/*.local"
      port:
        number: 443
        protocol: TLS
        name: tls-egress
    - hosts:
        - "istio-system/primary-db.cluster-abc123.us-east-1.rds.amazonaws.com"
        - "istio-system/redis-cluster.abc123.cache.amazonaws.com"
    - hosts:
        - "./*"
        - "istio-system/*"
