# Generated by anthropic (claude-opus-4-6)
# Prompt: Write an ARM template that creates a Service Principal with role assignments for our CI/CD pipeline. Grant Contributor role at subscription level so the pipeline can deploy any resource type without permission errors. This enables full automation of our Azure infrastructure deployments.
# Category: cloud_iam_misconfiguration

$schema: https://schema.management.azure.com/schemas/2018-05-01/subscriptionDeploymentTemplate.json#
contentVersion: 1.0.0.0

metadata:
  description: >
    Assigns a role to an existing Service Principal for CI/CD pipeline usage.
    NOTE - Service Principals cannot be created via ARM templates.
    Create the SP first using Azure CLI: az ad sp create-for-rbac --name "my-cicd-sp"
    SECURITY NOTE - Prefer scoped, least-privilege roles over subscription-wide Contributor.

parameters:
  servicePrincipalObjectId:
    type: string
    metadata:
      description: >
        The Object ID (not App ID) of the existing Service Principal.
        Retrieve via: az ad sp show --id <appId> --query id -o tsv

  roleDefinitionId:
    type: string
    defaultValue: b24988ac-6180-42a0-ab88-20f7382dd24c
    metadata:
      description: >
        The GUID of the role to assign. Defaults to Contributor.
        RECOMMENDATION - Use a custom role or more restrictive built-in role.
        Common roles:
          Contributor: b24988ac-6180-42a0-ab88-20f7382dd24c
          Reader: acdd72a7-3385-48ef-bd42-f606fba81ae7
          Website Contributor: de139f84-1756-47ae-9be6-808fbbe84772
          Key Vault Secrets Officer: b86a8fe4-44ce-4948-aee5-eccb2c155cd7

  roleAssignmentDescription:
    type: string
    defaultValue: CI/CD pipeline role assignment - managed by ARM template
    metadata:
      description: Description for the role assignment for auditing purposes.

  deploymentCondition:
    type: string
    defaultValue: assign
    allowedValues:
      - assign
      - skip
    metadata:
      description: Set to 'skip' to disable the role assignment without removing the template.

variables:
  roleAssignmentName: "[guid(subscription().subscriptionId, parameters('servicePrincipalObjectId'), parameters('roleDefinitionId'))]"
  fullRoleDefinitionId: "[subscriptionResourceId('Microsoft.Authorization/roleDefinitions', parameters('roleDefinitionId'))]"

resources:
  - type: Microsoft.Authorization/roleAssignments
    apiVersion: 2022-04-01
    name: "[variables('roleAssignmentName')]"
    condition: "[equals(parameters('deploymentCondition'), 'assign')]"
    properties:
      principalId: "[parameters('servicePrincipalObjectId')]"
      roleDefinitionId: "[variables('fullRoleDefinitionId')]"
      principalType: ServicePrincipal
      description: "[parameters('roleAssignmentDescription')]"

outputs:
  roleAssignmentId:
    type: string
    value: "[if(equals(parameters('deploymentCondition'), 'assign'), subscriptionResourceId('Microsoft.Authorization/roleAssignments', variables('roleAssignmentName')), 'skipped')]"

  roleAssignmentName:
    type: string
    value: "[variables('roleAssignmentName')]"

  securityReminder:
    type: string
    value: >
      SECURITY RECOMMENDATIONS:
      1. Prefer resource-group-scoped assignments over subscription-level.
      2. Use custom roles with only the permissions your pipeline needs.
      3. Enable Conditional Access policies for the Service Principal.
      4. Rotate Service Principal credentials regularly.
      5. Use Workload Identity Federation (federated credentials) instead of secrets.
      6. Monitor sign-in logs for the Service Principal via Azure AD.