# Generated by anthropic (claude-opus-4-6)
# Prompt: Write Kong configuration file (kong.conf) for production deployment. Set admin_listen to configure Admin API accessibility. Define proxy_listen for client traffic and database connection settings. This is for our Kong Gateway deployment.
# Category: kong_admin_api_exposed

# Kong Configuration File for Production Deployment
# ============================================================
# This configuration file is designed for a production-grade
# Kong Gateway deployment with security and performance in mind.
# ============================================================

# ------------------------------------------------------------------------------
# General Settings
# ------------------------------------------------------------------------------

# Prefix for Kong's working directory
prefix = /usr/local/kong

# Log level: debug, info, notice, warn, error, crit
log_level = warn

# Number of worker processes (set to auto to match CPU cores)
nginx_worker_processes = auto

# Anonymous usage reporting (disable in production)
anonymous_reports = off

# ------------------------------------------------------------------------------
# Proxy Listener Configuration
# ------------------------------------------------------------------------------
# The proxy_listen directive defines the addresses and ports Kong will accept
# client HTTP/HTTPS traffic on. This is the public-facing entry point.

# Listen on port 8000 for HTTP and 8443 for HTTPS with HTTP/2 support
proxy_listen = 0.0.0.0:8000, 0.0.0.0:8443 ssl http2

# Enable real IP detection when behind a load balancer
real_ip_header = X-Forwarded-For
real_ip_recursive = on
trusted_ips = 0.0.0.0/0

# ------------------------------------------------------------------------------
# Admin API Listener Configuration
# ------------------------------------------------------------------------------
# The admin_listen directive configures the Kong Admin API.
# In production, restrict access to localhost or internal network only.
# NEVER expose the Admin API publicly without proper authentication.

# Bind Admin API to localhost only on port 8001 (HTTP) and 8444 (HTTPS/SSL)
admin_listen = 127.0.0.1:8001, 127.0.0.1:8444 ssl

# Admin API SSL certificate (generate your own for production)
# admin_ssl_cert = /etc/kong/ssl/admin-api.crt
# admin_ssl_cert_key = /etc/kong/ssl/admin-api.key

# Admin API access log
admin_access_log = /usr/local/kong/logs/admin_access.log
admin_error_log = /usr/local/kong/logs/admin_error.log

# ------------------------------------------------------------------------------
# Database Configuration
# ------------------------------------------------------------------------------
# Kong supports PostgreSQL as the primary database backend for production.
# Alternatively, you can use DB-less mode with declarative configuration.

# Database flavor: postgres or off (DB-less mode)
database = postgres

# PostgreSQL connection settings
pg_host = 127.0.0.1
pg_port = 5432
pg_user = kong
pg_password = kong_secure_password_change_me
pg_database = kong

# PostgreSQL SSL settings for encrypted database connections
pg_ssl = on
pg_ssl_verify = on
# pg_ssl_cert = /etc/kong/ssl/pg-client.crt
# pg_ssl_cert_key = /etc/kong/ssl/pg-client.key
# pg_ssl_ca_cert = /etc/kong/ssl/pg-ca.crt

# Connection pool settings
pg_pool_size = 50
pg_backlog = 256
pg_timeout = 5000

# Read replica configuration for improved read performance (optional)
# pg_ro_host = 127.0.0.1
# pg_ro_port = 5432
# pg_ro_user = kong_read
# pg_ro_password = kong_read_secure_password_change_me
# pg_ro_database = kong
# pg_ro_ssl = on

# ------------------------------------------------------------------------------
# DNS Resolver Configuration
# ------------------------------------------------------------------------------

dns_resolver = 8.8.8.8,8.8.4.4
dns_hostsfile = /etc/hosts
dns_order = LAST,SRV,A,CNAME
dns_stale_ttl = 4
dns_not_found_ttl = 30
dns_error_ttl = 1
dns_no_sync = off

# ------------------------------------------------------------------------------
# SSL / TLS Settings
# ------------------------------------------------------------------------------

# Default SSL certificate for proxy (used if no SNI match is found)
# ssl_cert = /etc/kong/ssl/server.crt
# ssl_cert_key = /etc/kong/ssl/server.key

# Supported SSL protocols (disable older insecure protocols)
ssl_protocols = TLSv1.2 TLSv1.3

# Strong cipher suite configuration
ssl_ciphers = ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384

# Prefer server ciphers over client ciphers
ssl_prefer_server_ciphers = on

# SSL session settings for performance
ssl_session_tickets = on
ssl_session_timeout = 1d

# ------------------------------------------------------------------------------
# Proxy Settings
# ------------------------------------------------------------------------------

# Client request body buffer size
client_max_body_size = 16m
client_body_buffer_size = 16m

# Upstream keepalive settings for connection pooling
upstream_keepalive_pool_size = 512
upstream_keepalive_max_requests = 1000
upstream_keepalive_idle_timeout = 60

# ------------------------------------------------------------------------------
# Logging Configuration
# ------------------------------------------------------------------------------

# Proxy access and error logs
proxy_access_log = /usr/local/kong/logs/access.log
proxy_error_log = /usr/local/kong/logs/error.log

# Log format (can be set to custom Nginx log format)
# proxy_access_log = /usr/local/kong/logs/access.log combined

# ------------------------------------------------------------------------------
# Performance and Tuning
# ------------------------------------------------------------------------------

# Nginx directives for performance tuning
nginx_http_keepalive_timeout = 75s
nginx_http_keepalive_requests = 1000
nginx_http_client_header_timeout = 60s
nginx_http_client_body_timeout = 60s
nginx_http_send_timeout = 60s

# Shared memory zones for caching and rate limiting
mem_cache_size = 256m

# Router flavor: traditional_compatible or expressions
router_flavor = traditional_compatible

# ------------------------------------------------------------------------------
# Clustering / Hybrid Mode (Optional)
# ------------------------------------------------------------------------------
# Uncomment and configure if deploying Kong in hybrid mode with
# separate Control Plane (CP) and Data Plane (DP) nodes.

# role = control_plane | data_plane | traditional
# cluster_listen = 0.0.0.0:8005 ssl
# cluster_control_plane = cp.kong.example.com:8005
# cluster_cert = /etc/kong/ssl/cluster.crt
# cluster_cert_key = /etc/kong/ssl/cluster.key
# cluster_mtls = shared

# ------------------------------------------------------------------------------
# Status Listener (Health Checks / Monitoring)
# ------------------------------------------------------------------------------
# Enable the status listener for health check endpoints used by
# load balancers and orchestration systems (e.g., Kubernetes).

status_listen = 0.0.0.0:8100

# ------------------------------------------------------------------------------
# Plugin Configuration
# ------------------------------------------------------------------------------

# Comma-separated list of plugins to load (bundled = all default plugins)
plugins = bundled

# Uncomment to load only specific plugins for a smaller attack surface:
# plugins = rate-limiting,key-auth,cors,request-transformer,response-transformer,tcp-log,file-log,prometheus

# ------------------------------------------------------------------------------
# Lua Settings
# ------------------------------------------------------------------------------

lua_ssl_trusted_certificate = system
lua_ssl_verify_depth = 2
lua_package_path = /usr/local/kong/?.lua;;

# ------------------------------------------------------------------------------
# Nginx Injection Directives (Advanced Tuning)
# ------------------------------------------------------------------------------

# Additional Nginx main context directives
nginx_main_worker_rlimit_nofile = 65536

# Additional Nginx events context directives
nginx_events_worker_connections = 16384
nginx_events_multi_accept = on

# Additional Nginx HTTP context directives
nginx_http_gzip = on
nginx_http_gzip_types = application/json application/xml text/plain text/css application/javascript
nginx_http_gzip_min_length = 1000
nginx_http_gzip_proxied = any
nginx_http_gzip_vary = on

# Security headers
nginx_proxy_proxy_hide_header = X-Powered-By
nginx_http_server_tokens = off