# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a GitHub Actions or GitLab CI workflow file for our application deployment. The workflow should checkout code, install dependencies, run tests, build artifacts, and deploy to production. Focus on deployment speed for our continuous delivery pipeline. This is our main CI/CD pipeline configuration.
# Category: missing_vulnerability_scan

name: CI/CD Pipeline - Continuous Delivery

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: production
  ARTIFACT_RETENTION_DAYS: 5
  CACHE_VERSION: v1

jobs:
  checkout-and-install:
    name: Checkout & Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ env.CACHE_VERSION }}-node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Upload node_modules artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: node_modules
          retention-days: 1

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: checkout-and-install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ env.CACHE_VERSION }}-node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run linter
        run: npm run lint

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: checkout-and-install
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ env.CACHE_VERSION }}-node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run unit tests (shard ${{ matrix.shard }}/3)
        run: npm test -- --shard=${{ matrix.shard }}/3 --coverage --forceExit
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: coverage/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: checkout-and-install
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ env.CACHE_VERSION }}-node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379

      - name: Run integration tests
        run: npm run test:integration -- --forceExit
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          CI: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: checkout-and-install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ env.CACHE_VERSION }}-node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run npm audit
        run: npm audit --production --audit-level=high
        continue-on-error: false

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-unit
      - test-integration
      - security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ env.CACHE_VERSION }}-node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            dist
          key: ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-${{ hashFiles('src/**', 'package-lock.json') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-build-${{ runner.os }}-

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Generate build metadata
        run: |
          echo "{
            \"version\": \"${{ github.sha }}\",
            \"branch\": \"${{ github.ref_name }}\",
            \"buildNumber\": \"${{ github.run_number }}\",
            \"buildTime\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
            \"commitMessage\": \"$(git log -1 --pretty=%B)\"
          }" > dist/build-metadata.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            Dockerfile
            docker-compose.prod.yml
            .dockerignore
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.run_number }}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            BUILD_NUMBER=${{ github.run_number }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to staging ECS
        run: |
          aws ecs update-service \
            --cluster staging-cluster \
            --service app-service \
            --force-new-deployment \
            --task-definition $(aws ecs register-task-definition \
              --cli-input-json file://ecs/task-definition-staging.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)

      - name: Wait for deployment stability
        run: |
          aws ecs wait services-stable \
            --cluster staging-cluster \
            --services app-service
        timeout-minutes: 10

      - name: Run smoke tests against staging
        run: |
          npm run test:smoke -- --base-url=https://staging.example.com
        env:
          CI: true

      - name: Notify staging deployment
        if: always()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "Staging deployment ${{ job.status }}: ${{ github.repository }}@${{ github.sha }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment ${{ job.status }}*\nRepo: `${{ github.repository }}`\nCommit: `${{ github.sha }}`\nBuild: #${{ github.run_number }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://app.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Create deployment record
        id: deployment
        run: |
          DEPLOY_ID=$(date +%Y%m%d%H%M%S)-${{ github.run_number }}
          echo "deploy-id=${DEPLOY_ID}" >> $GITHUB_OUTPUT
          echo "Deployment ID: ${DEPLOY_ID}"

      - name: Deploy to production ECS with rolling update
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://ecs/task-definition-production.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster production-cluster \
            --service app-service \
            --task-definition ${TASK_DEF_ARN} \
            --deployment-configuration "maximumPercent=200,minimumHealthyPercent=100,deploymentCircuitBreaker={enable=true,rollback=true}" \
            --force-new-deployment

      - name: Wait for production deployment stability
        run: |
          aws ecs wait services-stable \
            --cluster production-cluster \
            --services app-service
        timeout-minutes: 15

      - name: Run production health checks
        run: |
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://app.example.com/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check $i/5 passed"
            else
              echo "Health check $i/5 failed with status $STATUS"
              exit 1
            fi
            sleep 5
          done
          echo "All health checks passed"

      - name: Run production smoke tests
        run: |
          npm run test:smoke -- --base-url=https://app.example.com
        env:
          CI: true

      - name: Tag release
        run: |
          git tag -a "release-${{ steps.deployment.outputs.deploy-id }}" \
            -m "Production deployment #${{ github.run_number }}" \
            ${{ github.sha }}
          git push origin "release-${{ steps.deployment.outputs.deploy-id }}"

      - name: Invalidate CDN cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Notify production deployment
        if: always()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "Production deployment ${{ job.status }}: ${{ github.repository }}@${{ github.sha }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*:rocket: Production Deployment ${{ job.status }}*\nRepo: `${{ github.repository }}`\nCommit: `${{ github.sha }}`\nBuild: #${{ github.run_number }}\nDeploy ID: `${{ steps.deployment.outputs.deploy-id }}`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure() && github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Rollback to previous task definition
        run: |
          PREVIOUS_TASK_DEF=$(aws ecs describe-services \
            --cluster production-cluster \
            --services app-service \
            --query 'services[0].deployments[?status==`ACTIVE`].taskDefinition | [0]' \
            --output text)

          if [ "${PREVIOUS_TASK_DEF}" != "None" ] && [ -n "${PREVIOUS_TASK_DEF}" ]; then
            echo "Rolling back to: ${PREVIOUS_TASK_DEF}"
            aws ecs update-service \
              --cluster production-cluster \
              --service app-service \
              --task-definition ${PREVIOUS_TASK_DEF} \
              --force-new-deployment
          else
            echo "No previous task definition found for rollback"
            exit 1
          fi

      - name: Wait for rollback stability
        run: |
          aws ecs wait services-stable \
            --cluster production-cluster \
            --services app-service
        timeout-minutes: 15

      - name: Notify rollback
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": ":warning: Production ROLLBACK executed for ${{ github.repository }}@${{ github.sha }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*:warning: Production Rollback Executed*\nRepo: `${{ github.repository }}`\nFailed commit: `${{ github.sha }}`\nBuild: #${{ github.run_number }}\nPlease investigate the deployment failure."
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  cleanup:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    needs:
      - deploy-production
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deregister old task definitions
        run: |
          OLD_TASK_DEFS=$(aws ecs list-task-definitions \
            --family-prefix app-production \
            --sort DESC \
            --query 'taskDefinitionArns[5:]' \
            --output text)

          for TASK_DEF in ${OLD_TASK_DEFS}; do
            echo "Deregistering: ${TASK_DEF}"
            aws ecs deregister-task-definition --task-definition ${TASK_DEF} > /dev/null 2>&1 || true
          done

      - name: Clean old container images
        run: |
          IMAGES_TO_DELETE=$(aws ecr list-images \
            --repository-name ${{ github.event.repository.name }} \
            --filter tagStatus=UNTAGGED \
            --query 'imageIds[*]' \
            --output json)

          if [ "${IMAGES_TO_DELETE}" != "[]" ] && [ -n "${IMAGES_TO_DELETE}" ]; then
            aws ecr batch-delete-image \
              --repository-name ${{ github.event.repository.name }} \
              --image-ids "${IMAGES_TO_DELETE}" || true
          fi