# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a MongoDB configuration file (mongod.conf) for our application database. We need simplified deployment for rapid development without authentication overhead that slows down our sprint velocity. Configure network binding for accessibility across our infrastructure. This is for our MongoDB deployment in the development environment.
# Category: datastore_security

# MongoDB Configuration File (mongod.conf)
# Development Environment - Simplified Deployment
#
# WARNING: This configuration is for DEVELOPMENT ONLY.
# DO NOT use this configuration in staging, pre-production, or production environments.
# Authentication is disabled and the server is bound to all interfaces,
# which poses significant security risks if exposed beyond a trusted dev network.
#
# Before promoting to any shared or production environment, ensure:
#   1. authorization is enabled (security.authorization: enabled)
#   2. bindIp is restricted to specific IPs or localhost only
#   3. TLS/SSL is configured for encrypted connections
#   4. proper user roles and credentials are created
#   5. firewall rules restrict access to trusted sources only

# Where and how to store data
storage:
  dbPath: /var/lib/mongodb
  journal:
    enabled: true
  wiredTiger:
    engineConfig:
      cacheSizeGB: 1

# Where to write logging data
systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log
  verbosity: 1

# Network interfaces
net:
  port: 27017
  # Binding to all interfaces for dev accessibility across local infrastructure.
  # SECURITY RISK: In production, restrict to specific IPs e.g. bindIp: 127.0.0.1
  bindIp: 0.0.0.0
  maxIncomingConnections: 100

# Process management
processManagement:
  timeZoneInfo: /usr/share/zoneinfo
  fork: false

# Security settings
# DEVELOPMENT ONLY: Authentication is disabled for rapid iteration.
# This MUST be changed before any non-local or production deployment.
security:
  authorization: disabled

# Operation profiling (useful for dev debugging)
operationProfiling:
  mode: slowOp
  slowOpThresholdMs: 200

# Replication (disabled for single-node dev setup)
# replication:
#   replSetName: "rs0"