# ============================================
# Consumers for Authentication
# ============================================
consumers:
  # API Key Consumer - Web Application
  - username: web-app-consumer
    custom_id: web-app-001
    keyauth_credentials:
      - key: web-app-api-key-2024-secure-random-string
    acls:
      - group: web-app

  # API Key Consumer - Mobile Application
  - username: mobile-app-consumer
    custom_id: mobile-app-001
    keyauth_credentials:
      - key: mobile-app-api-key-2024-secure-random-string
    acls:
      - group: mobile-app

  # API Key Consumer - Partner Integration
  - username: partner-consumer
    custom_id: partner-001
    keyauth_credentials:
      - key: partner-api-key-2024-secure-random-string
    acls:
      - group: partner

  # JWT Consumer - Admin User
  - username: admin-user
    custom_id: admin-001
    jwt_secrets:
      - key: admin-jwt-issuer
        algorithm: RS256
        secret: "admin-jwt-secret-key-2024"
    acls:
      - group: admin

  # JWT Consumer - Super Admin
  - username: super-admin-user
    custom_id: super-admin-001
    jwt_secrets:
      - key: super-admin-jwt-issuer
        algorithm: RS256
        secret: "super-admin-jwt-secret-key-2024"
    acls:
      - group: super-admin
      - group: admin

  # HMAC Consumer - Payment Gateway Webhook
  - username: payment-gateway-webhook
    custom_id: webhook-payment-001
    hmacauth_credentials:
      - username: payment-gateway
        secret: "payment-webhook-hmac-secret-2024"
    acls:
      - group: webhook-payment

  # HMAC Consumer - Notification Service Webhook
  - username: notification-service-webhook
    custom_id: webhook-notification-001
    hmacauth_credentials:
      - username: notification-service
        secret: "notification-webhook-hmac-secret-2024"
    acls:
      - group: webhook-notification

# ============================================
# Upstreams with Health Checks
# ============================================
upstreams:
  - name: public-api-upstream
    algorithm: round-robin
    hash_on: none
    slots: 10000
    healthchecks:
      active:
        type: http
        http_path: /health
        timeout: 5
        concurrency: 10
        healthy:
          interval: 10
          successes: 3
          http_statuses:
            - 200
            - 302
        unhealthy:
          interval: 5
          http_failures: 3
          tcp_failures: 3
          timeouts: 3
          http_statuses:
            - 429
            - 500
            - 503
      passive:
        type: http
        healthy:
          successes: 5
          http_statuses:
            - 200
            - 201
            - 202
            - 204
        unhealthy:
          http_failures: 5
          tcp_failures: 3
          timeouts: 3
          http_statuses:
            - 500
            - 502
            - 503
    targets:
      - target: "public-api-1:8001"
        weight: 100
      - target: "public-api-2:8001"
        weight: 100

  - name: admin-api-upstream
    algorithm: round-robin
    slots: 10000
    healthchecks:
      active:
        type: http
        http_path: /health
        timeout: 5
        healthy:
          interval: 15
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
    targets:
      - target: "admin-api-1:8002"
        weight: 100

  - name: protected-api-upstream
    algorithm: round-robin
    slots: 10000
    healthchecks:
      active:
        type: http
        http_path: /health
        timeout: 5
        healthy:
          interval: 10
          successes: 3
        unhealthy:
          interval: 5
          http_failures: 3
    targets:
      - target: "protected-api-1:8003"
        weight: 100
      - target: "protected-api-2:8003"
        weight: 100

  - name: webhook-upstream
    algorithm: round-robin
    slots: 10000
    healthchecks:
      active:
        type: http
        http_path: /health
        timeout: 3
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
    targets:
      - target: "webhook-handler-1:8004"
        weight: 100

  - name: health-upstream
    algorithm: round-robin
    slots: 10000
    targets:
      - target: "health-service-1:8005"
        weight: 100