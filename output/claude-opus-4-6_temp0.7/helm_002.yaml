          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.notificationService.port }}
              protocol: TCP
          env:
            {{- toYaml .Values.notificationService.env | nindent 12 }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: "redis://{{ .Values.redis.name }}.{{ .Values.global.namespace }}.svc.cluster.local:{{ .Values.redis.port }}"
            {{- end }}
          resources:
            {{- toYaml .Values.notificationService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.notificationService.healthCheck.path }}
              port: http
            initialDelaySeconds: {{ .Values.notificationService.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.notificationService.healthCheck.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.notificationService.healthCheck.path }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: {{ .Values.notificationService.healthCheck.path }}
              port: http
            failureThreshold: 30
            periodSeconds: 2
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "microservices-stack.selectorLabels" (dict "name" .Values.notificationService.name "release" .Release.Name) | nindent 14 }}

---
# templates/notification-service-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.notificationService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "microservices-stack.labels" . | nindent 4 }}
    {{- include "microservices-stack.selectorLabels" (dict "name" .Values.notificationService.name "release" .Release.Name) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.notificationService.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "microservices-stack.selectorLabels" (dict "name" .Values.notificationService.name "release" .Release.Name) | nindent 4 }}

---
# templates/notification-service-hpa.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.notificationService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "microservices-stack.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.notificationService.name }}
  minReplicas: {{ .Values.notificationService.replicaCount }}
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# templates/notification-service-pdb.yaml
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Values.notificationService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "microservices-stack.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "microservices-stack.selectorLabels" (dict "name" .Values.notificationService.name "release" .Release.Name) | nindent 6 }}

---
# templates/redis-deployment.yaml
{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.redis.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "microservices-stack.labels" . | nindent 4 }}
    {{- include "microservices-stack.selectorLabels" (dict "name" .Values.redis.name "release" .Release.Name) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "microservices-stack.selectorLabels" (dict "name" .Values.redis.name "release" .Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "microservices-stack.selectorLabels" (dict "name" .Values.redis.name "release" .Release.Name) | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: redis
              containerPort: {{ .Values.redis.port }}
              protocol: TCP
          command:
            - redis-server
            - "--appendonly"
            - "yes"
            - "--maxmemory"
            - "200mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          {{- if .Values.redis.persistence.enabled }}
          volumeMounts:
            - name: redis-data
              mountPath: /data
          {{- end }}
      {{- if .Values.redis.persistence.enabled }}
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: {{ .Values.redis.name }}-pvc
      {{- end }}
{{- end }}

---
# templates/redis-service.yaml
{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.redis.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "microservices-stack.labels" . | nindent 4 }}
    {{- include "microservices-stack.selectorLabels" (dict "name" .Values.redis.name "release" .Release.Name) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "microservices-stack.selectorLabels" (dict "name" .Values.redis.name "release" .Release.Name) | nindent 4 }}
{{- end }}

---
# templates/redis-pvc.yaml
{{- if and .Values.redis.enabled .Values.redis.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.redis.name }}-pvc
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "microservices-stack.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.redis.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.redis.persistence.size }}
{{- end }}

---
# templates/ingress.yaml
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "microservices-stack.fullname" . }}-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "microservices-stack.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.apiGateway.name }}
                port:
                  number: {{ .Values.apiGateway.port }}
          - path: /api/orders
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.apiGateway.name }}
                port:
                  number: {{ .Values.apiGateway.port }}
          - path: /api/notifications
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.apiGateway.name }}
                port:
                  number: {{ .Values.apiGateway.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.apiGateway.name }}
                port:
                  number: {{ .Values.apiGateway.port }}
{{- end }}

---
# templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "microservices-stack.fullname" . }}-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "microservices-stack.labels" . | nindent 4 }}
data:
  SERVICE_MESH_ENABLED: "false"
  LOG_FORMAT: "json"
  TRACING_ENABLED: "true"
  TRACING_SAMPLE_RATE: "0.1"
  ENVIRONMENT: "production"

---
# templates/service-monitor.yaml
{{- if and .Values.monitoring.enabled .Values.monitoring.serviceMonitor }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "microservices-stack.fullname" . }}-monitor
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "microservices-stack.labels" . | nindent 4 }}
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: {{ .Chart.Name }}
  namespaceSelector:
    matchNames:
      - {{ .Values.global.namespace }}
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
{{- end }}

