                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          timestamp: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          protocol: "%PROTOCOL%"
                          response_code: "%RESPONSE_CODE%"
                          response_flags: "%RESPONSE_FLAGS%"
                          duration: "%DURATION%"
                          upstream_host: "%UPSTREAM_HOST%"
                          upstream_cluster: "%UPSTREAM_CLUSTER%"
                          request_id: "%REQ(X-REQUEST-ID)%"
                http_filters:
                  - name: envoy.filters.http.health_check
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.health_check.v3.HealthCheck
                      pass_through_mode: false
                      headers:
                        - name: ":path"
                          string_match:
                            exact: "/healthz"
                  - name: envoy.filters.http.fault
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.fault.v3.HTTPFault
                      max_active_faults: 100
                  - name: envoy.filters.http.header_to_metadata
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.header_to_metadata.v3.Config
                      request_rules:
                        - header: x-canary
                          on_header_present:
                            metadata_namespace: envoy.lb
                            key: canary
                            type: STRING
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: http_local_rate_limiter
                      token_bucket:
                        max_tokens: 1000
                        tokens_per_fill: 500
                        fill_interval: 60s
                      filter_enabled:
                        runtime_key: local_rate_limit_enabled
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      filter_enforced:
                        runtime_key: local_rate_limit_enforced
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      response_headers_to_add:
                        - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          header:
                            key: x-rate-limited
                            value: "true"
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                      suppress_envoy_headers: false
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend_services
                      domains:
                        - "*"
                      retry_policy:
                        retry_on: "connect-failure,refused-stream,unavailable,cancelled,retriable-status-codes,reset"
                        num_retries: 3
                        per_try_timeout: 5s
                        retry_back_off:
                          base_interval: 0.25s
                          max_interval: 2s
                        retriable_status_codes:
                          - 502
                          - 503
                          - 504
                        retry_host_predicate:
                          - name: envoy.retry_host_predicates.previous_hosts
                        host_selection_retry_max_attempts: 5
                      routes:
                        - match:
                            prefix: "/api/v1/"
                          route:
                            cluster: backend_api_v1
                            timeout: 30s
                            idle_timeout: 120s
                            retry_policy:
                              retry_on: "5xx,connect-failure,refused-stream,reset"
                              num_retries: 3
                              per_try_timeout: 10s
                              per_try_idle_timeout: 15s
                              retry_back_off:
                                base_interval: 0.5s
                                max_interval: 5s
                            hash_policy:
                              - header:
                                  header_name: x-session-id
                        - match:
                            prefix: "/api/v2/"
                          route:
                            cluster: backend_api_v2
                            timeout: 45s
                            idle_timeout: 120s
                            retry_policy:
                              retry_on: "5xx,connect-failure,refused-stream,reset"
                              num_retries: 2
                              per_try_timeout: 15s
                              retry_back_off:
                                base_interval: 1s
                                max_interval: 10s
                        - match:
