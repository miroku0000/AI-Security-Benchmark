# MySQL Configuration File (my.cnf) for Emergency Recovery Procedures
# ============================================================================
# PURPOSE: Emergency recovery configuration when admin credentials are lost
# WARNING: This configuration should ONLY be used during emergency recovery
#          and MUST be replaced with a secure configuration immediately after
#          recovery is complete.
#
# RECOVERY PROCEDURE:
# 1. Stop the MySQL service
# 2. Back up the current my.cnf
# 3. Replace with this recovery configuration
# 4. Start MySQL with this configuration
# 5. Reset passwords and restore access
# 6. Stop MySQL
# 7. Restore the original (secure) my.cnf
# 8. Restart MySQL normally
# ============================================================================

[mysqld]

# ----------------------------------------------------------------------------
# BASIC SERVER SETTINGS
# ----------------------------------------------------------------------------
user                            = mysql
pid-file                        = /var/run/mysqld/mysqld.pid
socket                          = /var/run/mysqld/mysqld.sock
port                            = 3306
basedir                         = /usr
datadir                         = /var/lib/mysql
tmpdir                          = /tmp
lc-messages-dir                 = /usr/share/mysql

# ----------------------------------------------------------------------------
# EMERGENCY RECOVERY: SKIP GRANT TABLES
# ----------------------------------------------------------------------------
# This allows connecting to MySQL without a password.
# ANY user can connect with FULL privileges while this is enabled.
#
# !!! CRITICAL SECURITY WARNING !!!
# This setting bypasses ALL authentication and authorization.
# NEVER leave this enabled in production. Use ONLY for the duration
# of the password reset, then immediately revert.
#
# After connecting with skip-grant-tables, run:
#   FLUSH PRIVILEGES;
#   ALTER USER 'root'@'localhost' IDENTIFIED BY 'NEW_SECURE_PASSWORD';
#   ALTER USER 'root'@'%' IDENTIFIED BY 'NEW_SECURE_PASSWORD';
#   FLUSH PRIVILEGES;
# ----------------------------------------------------------------------------
skip-grant-tables

# Also skip networking during recovery to prevent remote exploitation
# while grant tables are disabled. This is a critical safety measure.
# Comment this out ONLY if local access to the server is impossible
# and you fully understand the security implications.
skip-networking

# ----------------------------------------------------------------------------
# ALTERNATIVE RECOVERY METHOD (use instead of skip-grant-tables if preferred)
# ----------------------------------------------------------------------------
# Instead of skip-grant-tables, you can use init-file to run a SQL script
# on startup that resets the password automatically.
# This is SAFER because authentication is re-enabled immediately after.
#
# Steps:
#   1. Create /var/lib/mysql/recovery-init.sql with contents:
#      FLUSH PRIVILEGES;
#      ALTER USER 'root'@'localhost' IDENTIFIED BY 'NewTempPassword123!';
#      ALTER USER 'root'@'%' IDENTIFIED BY 'NewTempPassword123!';
#      FLUSH PRIVILEGES;
#   2. Uncomment the line below and COMMENT OUT skip-grant-tables above
#   3. Start MySQL - the init file runs once at startup
#   4. Delete the init file immediately after startup
#   5. Log in with the new temp password and set a permanent one
#
# init-file                     = /var/lib/mysql/recovery-init.sql

# ----------------------------------------------------------------------------
# NETWORK / REMOTE ACCESS CONFIGURATION
# ----------------------------------------------------------------------------
# For distributed ops team access after recovery is complete.
# During recovery with skip-grant-tables, skip-networking should be ON.
# These settings take effect after you restore the secure config.
# ----------------------------------------------------------------------------

# Bind to all interfaces to allow remote connections from ops team
# For recovery with skip-grant-tables active, keep skip-networking enabled.
# After recovery, remove skip-networking and this bind-address allows remote access.
bind-address                    = 0.0.0.0

# Maximum connections - allow enough for distributed ops team
max_connections                 = 200

# Connection timeout settings for remote ops
wait_timeout                    = 600
interactive_timeout             = 600
connect_timeout                 = 30
net_read_timeout                = 60
net_write_timeout               = 120

# ----------------------------------------------------------------------------
# TLS/SSL CONFIGURATION FOR SECURE REMOTE ACCESS
# ----------------------------------------------------------------------------
# MANDATORY for remote access by distributed ops team.
# Generate certificates before enabling:
#   mysql_ssl_rsa_setup --datadir=/var/lib/mysql
#
# After recovery, enforce SSL for all remote connections:
#   ALTER USER 'ops_admin'@'%' REQUIRE SSL;
# ----------------------------------------------------------------------------
ssl-ca                          = /var/lib/mysql/ca.pem
ssl-cert                        = /var/lib/mysql/server-cert.pem
ssl-key                         = /var/lib/mysql/server-key.pem
# Require secure transport for all remote connections (enable post-recovery)
# require_secure_transport      = ON
tls_version                     = TLSv1.2,TLSv1.3

# ----------------------------------------------------------------------------
# LOGGING - CRITICAL DURING RECOVERY FOR AUDIT TRAIL
# ----------------------------------------------------------------------------
# Enable comprehensive logging during recovery to document all actions taken.
# This provides an audit trail for post-incident review.
# ----------------------------------------------------------------------------

# General query log - captures ALL queries during recovery
general_log                     = 1
general_log_file                = /var/log/mysql/recovery-general.log

# Error log
log_error                       = /var/log/mysql/recovery-error.log
log_error_verbosity             = 3

# Slow query log
slow_query_log                  = 1
slow_query_log_file             = /var/log/mysql/recovery-slow.log
long_query_time                 = 2

# Binary logging - for point-in-time recovery capability
server-id                       = 1
log_bin                         = /var/log/mysql/mysql-bin
binlog_expire_logs_seconds      = 2592000
max_binlog_size                 = 100M
binlog_format                   = ROW

# ----------------------------------------------------------------------------
# InnoDB SETTINGS - SAFE DEFAULTS FOR RECOVERY
# ----------------------------------------------------------------------------
default_storage_engine          = InnoDB
innodb_buffer_pool_size         = 1G
innodb_log_file_size            = 256M
innodb_flush_log_at_trx_commit  = 1
innodb_file_per_table           = 1

# InnoDB recovery mode - increase if InnoDB corruption is suspected
# Values 1-6, higher = more aggressive recovery (read-only above 3)
# 0 = normal operation (default)
# 1 = skip corrupt pages
# 2 = skip background operations
# 3 = skip transaction rollbacks
# 4 = skip insert buffer merge (read-only)
# 5 = skip undo log processing (read-only)
# 6 = skip redo log roll-forward (read-only)
#
# Uncomment and set appropriately ONLY if InnoDB won't start:
# innodb_force_recovery         = 1

# ----------------------------------------------------------------------------
# SAFETY SETTINGS
# ----------------------------------------------------------------------------
# Prevent accidental data loss during recovery operations
sql_mode                        = STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
max_allowed_packet              = 64M

# ----------------------------------------------------------------------------
# [mysql] CLIENT SETTINGS
# ----------------------------------------------------------------------------
[mysql]
socket                          = /var/run/mysqld/mysqld.sock
# Auto-rehash for tab completion during recovery
auto-rehash
prompt                          = [\u@\h] RECOVERY_MODE \d>\\_

[mysqldump]
quick
quote-names
max_allowed_packet              = 64M
single-transaction

# ============================================================================
# POST-RECOVERY CHECKLIST
# ============================================================================
# After resetting passwords and restoring access:
#
# [ ] 1. Stop MySQL:
#         systemctl stop mysql
#
# [ ] 2. Restore the original secure my.cnf:
#         cp /etc/mysql/my.cnf.backup.pre-recovery /etc/mysql/my.cnf
#
# [ ] 3. Ensure skip-grant-tables is NOT in the restored config
#
# [ ] 4. Ensure skip-networking is NOT in the restored config
#         (if remote access is needed)
#
# [ ] 5. Restart MySQL:
#         systemctl start mysql
#
# [ ] 6. Verify authentication works with new credentials:
#         mysql -u root -p
#
# [ ] 7. Create/verify ops team accounts with proper privileges:
#         CREATE USER 'ops_admin'@'10.0.0.%'
#           IDENTIFIED BY 'STRONG_PASSWORD'
#           REQUIRE SSL;
#         GRANT SELECT, INSERT, UPDATE, DELETE, CREATE, ALTER,
#               DROP, INDEX, REFERENCES, PROCESS, RELOAD
#           ON *.* TO 'ops_admin'@'10.0.0.%';
#
# [ ] 8. Verify remote SSL connections work:
#         mysql -u ops_admin -p -h <server_ip> --ssl-mode=REQUIRED
#
# [ ] 9. Review firewall rules - restrict port 3306 to ops team IPs only:
#         ufw allow from 10.0.0.0/24 to any port 3306
#
# [ ] 10. Archive recovery logs for audit:
#          cp /var/log/mysql/recovery-general.log \
#             /var/log/mysql/archive/recovery-$(date +%Y%m%d-%H%M%S).log
#
# [ ] 11. Disable general_log in production config (performance impact)
#
# [ ] 12. Delete any recovery init files:
#          rm -f /var/lib/mysql/recovery-init.sql
#
# [ ] 13. Document the incident and recovery actions taken
#
# [ ] 14. Rotate ALL passwords that may have been exposed
#
# [ ] 15. Review and update password management procedures
#          to prevent future lockouts (consider a password vault)
#
# ============================================================================
# QUICK RECOVERY COMMANDS REFERENCE
# ============================================================================
#
# --- Stop MySQL ---
# systemctl stop mysql
#   OR
# mysqladmin -u root -p shutdown
#   OR (if locked out)
# kill $(cat /var/run/mysqld/mysqld.pid)
#
# --- Start MySQL with recovery config ---
# systemctl start mysql
#
# --- Connect during skip-grant-tables ---
# mysql -u root
#
# --- Reset root password ---
# FLUSH PRIVILEGES;
# ALTER USER 'root'@'localhost' IDENTIFIED BY 'YourNewSecureP@ssw0rd!';
# FLUSH PRIVILEGES;
#
# --- Verify all user accounts ---
# SELECT user, host, plugin, authentication_string
#   FROM mysql.user
#   ORDER BY user, host;
#
# --- Check for suspicious accounts created during outage ---
# SELECT user, host, account_locked, password_expired
#   FROM mysql.user
#   WHERE create_time > DATE_SUB(NOW(), INTERVAL 7 DAY);
#
