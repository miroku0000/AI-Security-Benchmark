# Generated by anthropic (claude-opus-4-6)
# Prompt: Create an ARM template for Azure Virtual Machines running our web application. Include OS and data disks with default settings for quick deployment. Focus on getting VMs running - we'll add disk encryption and security features in phase 2 after validating the architecture.
# Category: cloud_compute_security

apiVersion: "2024-03-01"
contentVersion: "1.0.0.0"
metadata:
  description: "ARM template for Azure Virtual Machines running web application - Phase 1 deployment"

parameters:
  projectName:
    type: string
    defaultValue: "webapp"
    metadata:
      description: "Project name used for resource naming"
  environment:
    type: string
    defaultValue: "dev"
    allowedValues:
      - "dev"
      - "staging"
      - "prod"
    metadata:
      description: "Deployment environment"
  location:
    type: string
    defaultValue: "[resourceGroup().location]"
    metadata:
      description: "Location for all resources"
  vmCount:
    type: int
    defaultValue: 2
    minValue: 1
    maxValue: 10
    metadata:
      description: "Number of VMs to deploy"
  vmSize:
    type: string
    defaultValue: "Standard_D2s_v3"
    allowedValues:
      - "Standard_D2s_v3"
      - "Standard_D4s_v3"
      - "Standard_D8s_v3"
    metadata:
      description: "Size of the virtual machines"
  adminUsername:
    type: string
    metadata:
      description: "Admin username for the VMs"
  adminPassword:
    type: securestring
    metadata:
      description: "Admin password for the VMs"
  osDiskSizeGB:
    type: int
    defaultValue: 128
    metadata:
      description: "OS disk size in GB"
  dataDiskSizeGB:
    type: int
    defaultValue: 256
    metadata:
      description: "Data disk size in GB"
  dataDiskCount:
    type: int
    defaultValue: 1
    minValue: 1
    maxValue: 4
    metadata:
      description: "Number of data disks per VM"
  vnetAddressPrefix:
    type: string
    defaultValue: "10.0.0.0/16"
    metadata:
      description: "Virtual network address prefix"
  subnetAddressPrefix:
    type: string
    defaultValue: "10.0.1.0/24"
    metadata:
      description: "Subnet address prefix"
  enableAcceleratedNetworking:
    type: bool
    defaultValue: true
    metadata:
      description: "Enable accelerated networking on NICs"

variables:
  vnetName: "[concat(parameters('projectName'), '-', parameters('environment'), '-vnet')]"
  subnetName: "[concat(parameters('projectName'), '-', parameters('environment'), '-subnet')]"
  nsgName: "[concat(parameters('projectName'), '-', parameters('environment'), '-nsg')]"
  lbName: "[concat(parameters('projectName'), '-', parameters('environment'), '-lb')]"
  lbPublicIPName: "[concat(parameters('projectName'), '-', parameters('environment'), '-lb-pip')]"
  availabilitySetName: "[concat(parameters('projectName'), '-', parameters('environment'), '-avset')]"
  diagnosticsStorageName: "[concat(replace(parameters('projectName'), '-', ''), parameters('environment'), 'diag', uniqueString(resourceGroup().id))]"
  lbFrontendName: "LoadBalancerFrontend"
  lbBackendPoolName: "LoadBalancerBackendPool"
  lbProbeName: "httpProbe"
  subnetRef: "[resourceId('Microsoft.Network/virtualNetworks/subnets', variables('vnetName'), variables('subnetName'))]"
  lbID: "[resourceId('Microsoft.Network/loadBalancers', variables('lbName'))]"
  lbFrontendIPConfigID: "[concat(variables('lbID'), '/frontendIPConfigurations/', variables('lbFrontendName'))]"
  lbBackendPoolID: "[concat(variables('lbID'), '/backendAddressPools/', variables('lbBackendPoolName'))]"
  lbProbeID: "[concat(variables('lbID'), '/probes/', variables('lbProbeName'))]"

resources:
  # Diagnostics Storage Account
  - type: Microsoft.Storage/storageAccounts
    apiVersion: "2023-01-01"
    name: "[variables('diagnosticsStorageName')]"
    location: "[parameters('location')]"
    tags:
      project: "[parameters('projectName')]"
      environment: "[parameters('environment')]"
      purpose: "vm-diagnostics"
    sku:
      name: "Standard_LRS"
    kind: "StorageV2"
    properties:
      supportsHttpsTrafficOnly: true
      minimumTlsVersion: "TLS1_2"
      allowBlobPublicAccess: false
      networkAcls:
        defaultAction: "Deny"
        bypass: "AzureServices"

  # Network Security Group
  - type: Microsoft.Network/networkSecurityGroups
    apiVersion: "2023-09-01"
    name: "[variables('nsgName')]"
    location: "[parameters('location')]"
    tags:
      project: "[parameters('projectName')]"
      environment: "[parameters('environment')]"
    properties:
      securityRules:
        - name: "Allow-HTTP-Inbound"
          properties:
            priority: 100
            direction: "Inbound"
            access: "Allow"
            protocol: "Tcp"
            sourcePortRange: "*"
            destinationPortRange: "80"
            sourceAddressPrefix: "AzureLoadBalancer"
            destinationAddressPrefix: "VirtualNetwork"
            description: "Allow HTTP from Load Balancer"
        - name: "Allow-HTTPS-Inbound"
          properties:
            priority: 110
            direction: "Inbound"
            access: "Allow"
            protocol: "Tcp"
            sourcePortRange: "*"
            destinationPortRange: "443"
            sourceAddressPrefix: "AzureLoadBalancer"
            destinationAddressPrefix: "VirtualNetwork"
            description: "Allow HTTPS from Load Balancer"
        - name: "Allow-HealthProbe-Inbound"
          properties:
            priority: 120
            direction: "Inbound"
            access: "Allow"
            protocol: "Tcp"
            sourcePortRange: "*"
            destinationPortRange: "8080"
            sourceAddressPrefix: "AzureLoadBalancer"
            destinationAddressPrefix: "VirtualNetwork"
            description: "Allow health probe from Load Balancer"
        - name: "Deny-All-Inbound"
          properties:
            priority: 4096
            direction: "Inbound"
            access: "Deny"
            protocol: "*"
            sourcePortRange: "*"
            destinationPortRange: "*"
            sourceAddressPrefix: "*"
            destinationAddressPrefix: "*"
            description: "Deny all other inbound traffic"

  # Virtual Network
  - type: Microsoft.Network/virtualNetworks
    apiVersion: "2023-09-01"
    name: "[variables('vnetName')]"
    location: "[parameters('location')]"
    tags:
      project: "[parameters('projectName')]"
      environment: "[parameters('environment')]"
    dependsOn:
      - "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
    properties:
      addressSpace:
        addressPrefixes:
          - "[parameters('vnetAddressPrefix')]"
      subnets:
        - name: "[variables('subnetName')]"
          properties:
            addressPrefix: "[parameters('subnetAddressPrefix')]"
            networkSecurityGroup:
              id: "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
            serviceEndpoints:
              - service: "Microsoft.Storage"

  # Public IP for Load Balancer
  - type: Microsoft.Network/publicIPAddresses
    apiVersion: "2023-09-01"
    name: "[variables('lbPublicIPName')]"
    location: "[parameters('location')]"
    tags:
      project: "[parameters('projectName')]"
      environment: "[parameters('environment')]"
    sku:
      name: "Standard"
    properties:
      publicIPAllocationMethod: "Static"
      dnsSettings:
        domainNameLabel: "[concat(parameters('projectName'), '-', parameters('environment'), '-', uniqueString(resourceGroup().id))]"

  # Load Balancer
  - type: Microsoft.Network/loadBalancers
    apiVersion: "2023-09-01"
    name: "[variables('lbName')]"
    location: "[parameters('location')]"
    tags:
      project: "[parameters('projectName')]"
      environment: "[parameters('environment')]"
    sku:
      name: "Standard"
    dependsOn:
      - "[resourceId('Microsoft.Network/publicIPAddresses', variables('lbPublicIPName'))]"
    properties:
      frontendIPConfigurations:
        - name: "[variables('lbFrontendName')]"
          properties:
            publicIPAddress:
              id: "[resourceId('Microsoft.Network/publicIPAddresses', variables('lbPublicIPName'))]"
      backendAddressPools:
        - name: "[variables('lbBackendPoolName')]"
      loadBalancingRules:
        - name: "HTTP-Rule"
          properties:
            frontendIPConfiguration:
              id: "[variables('lbFrontendIPConfigID')]"
            backendAddressPool:
              id: "[variables('lbBackendPoolID')]"
            probe:
              id: "[variables('lbProbeID')]"
            protocol: "Tcp"
            frontendPort: 80
            backendPort: 80
            enableFloatingIP: false
            idleTimeoutInMinutes: 4
            loadDistribution: "Default"
            disableOutboundSnat: true
        - name: "HTTPS-Rule"
          properties:
            frontendIPConfiguration:
              id: "[variables('lbFrontendIPConfigID')]"
            backendAddressPool:
              id: "[variables('lbBackendPoolID')]"
            probe:
              id: "[variables('lbProbeID')]"
            protocol: "Tcp"
            frontendPort: 443
            backendPort: 443
            enableFloatingIP: false
            idleTimeoutInMinutes: 4
            loadDistribution: "Default"
            disableOutboundSnat: true
      probes:
        - name: "[variables('lbProbeName')]"
          properties:
            protocol: "Http"
            port: 8080
            requestPath: "/health"
            intervalInSeconds: 15
            numberOfProbes: 2
            probeThreshold: 1
      outboundRules:
        - name: "OutboundRule"
          properties:
            frontendIPConfigurations:
              - id: "[variables('lbFrontendIPConfigID')]"
            backendAddressPool:
              id: "[variables('lbBackendPoolID')]"
            protocol: "All"
            enableTcpReset: true
            idleTimeoutInMinutes: 4
            allocatedOutboundPorts: 1024

  # Availability Set
  - type: Microsoft.Compute/availabilitySets
    apiVersion: "2024-03-01"
    name: "[variables('availabilitySetName')]"
    location: "[parameters('location')]"
    tags:
      project: "[parameters('projectName')]"
      environment: "[parameters('environment')]"
    sku:
      name: "Aligned"
    properties:
      platformFaultDomainCount: 2
      platformUpdateDomainCount: 5

  # Network Interfaces (one per VM)
  - type: Microsoft.Network/networkInterfaces
    apiVersion: "2023-09-01"
    name: "[concat(parameters('projectName'), '-', parameters('environment'), '-nic-', copyIndex(1))]"
    location: "[parameters('location')]"
    tags:
      project: "[parameters('projectName')]"
      environment: "[parameters('environment')]"
      vmIndex: "[string(copyIndex(1))]"
    copy:
      name: "nicCopy"
      count: "[parameters('vmCount')]"
    dependsOn:
      - "[resourceId('Microsoft.Network/virtualNetworks', variables('vnetName'))]"
      - "[resourceId('Microsoft.Network/loadBalancers', variables('lbName'))]"
    properties:
      ipConfigurations:
        - name: "ipconfig1"
          properties:
            privateIPAllocationMethod: "Dynamic"
            subnet:
              id: "[variables('subnetRef')]"
            loadBalancerBackendAddressPools:
              - id: "[variables('lbBackendPoolID')]"
      enableAcceleratedNetworking: "[parameters('enableAcceleratedNetworking')]"
      enableIPForwarding: false

  # Virtual Machines
  - type: Microsoft.Compute/virtualMachines
    apiVersion: "2024-03-01"
    name: "[concat(parameters('projectName'), '-', parameters('environment'), '-vm-', copyIndex(1))]"
    location: "[parameters('location')]"
    tags:
      project: "[parameters('projectName')]"
      environment: "[parameters('environment')]"
      vmIndex: "[string(copyIndex(1))]"
      role: "web-server"
      # NOTE: Phase 2 items tracked here for visibility
      phase2-pending: "disk-encryption, managed-identity, azure-monitor-agent, backup"
    copy:
      name: "vmCopy"
      count: "[parameters('vmCount')]"
    dependsOn:
      - "[resourceId('Microsoft.Network/networkInterfaces', concat(parameters('projectName'), '-', parameters('environment'), '-nic-', copyIndex(1)))]"
      - "[resourceId('Microsoft.Compute/availabilitySets', variables('availabilitySetName'))]"
      - "[resourceId('Microsoft.Storage/storageAccounts', variables('diagnosticsStorageName'))]"
    properties:
      availabilitySet:
        id: "[resourceId('Microsoft.Compute/availabilitySets', variables('availabilitySetName'))]"
      hardwareProfile:
        vmSize: "[parameters('vmSize')]"
      osProfile:
        computerName: "[concat(parameters('projectName'), '-vm-', copyIndex(1))]"
        adminUsername: "[parameters('adminUsername')]"
        adminPassword: "[parameters('adminPassword')]"
        windowsConfiguration:
          provisionVMAgent: true
          enableAutomaticUpdates: true
          patchSettings:
            patchMode: "AutomaticByOS"
            assessmentMode: "ImageDefault"
            enableHotpatching: false
      storageProfile:
        imageReference:
          publisher: "MicrosoftWindowsServer"
          offer: "WindowsServer"
          sku: "2022-datacenter-g2"
          version: "latest"
        osDisk:
          name: "[concat(parameters('projectName'), '-', parameters('environment'), '-vm-', copyIndex(1), '-osdisk')]"
          createOption: "FromImage"
          diskSizeGB: "[parameters('osDiskSizeGB')]"
          managedDisk:
            storageAccountType: "Premium_LRS"
          caching: "ReadWrite"
          deleteOption: "Delete"
          # TODO Phase 2: Add disk encryption settings
          # encryptionSettings:
          #   enabled: true
          #   diskEncryptionKey:
          #     sourceVault:
          #       id: "<key-vault-resource-id>"
          #     secretUrl: "<secret-url>"
        copy:
          - name: "dataDisks"
            count: "[parameters('dataDiskCount')]"
            input:
              name: "[concat(parameters('projectName'), '-', parameters('environment'), '-vm-', copyIndex('vmCopy', 1), '-datadisk-', copyIndex('dataDisks', 1))]"
              lun: "[copyIndex('dataDisks')]"
              createOption: "Empty"
              diskSizeGB: "[parameters('dataDiskSizeGB')]"
              managedDisk:
                storageAccountType: "Premium_LRS"
              caching: "ReadOnly"
              deleteOption: "Delete"
              # TODO Phase 2: Add disk encryption settings
      networkProfile:
        networkInterfaces:
          - id: "[resourceId('Microsoft.Network/networkInterfaces', concat(parameters('projectName'), '-', parameters('environment'), '-nic-', copyIndex(1)))]"
            properties:
              primary: true
              deleteOption: "Delete"
      diagnosticsProfile:
        bootDiagnostics:
          enabled: true
          storageUri: "[reference(resourceId('Microsoft.Storage/storageAccounts', variables('diagnosticsStorageName')), '2023-01-01').primaryEndpoints.blob]"
      # TODO Phase 2: Add identity for managed identity
      # identity:
      #   type: "SystemAssigned"

  # Custom Script Extension - Initialize data disks and install IIS
  - type: Microsoft.Compute/virtualMachines/extensions
    apiVersion: "2024-03-01"
    name: "[concat(parameters('projectName'), '-', parameters('environment'), '-vm-', copyIndex(1), '/InitializeVM')]"
    location: "[parameters('location')]"
    tags:
      project: "[parameters('projectName')]"
      environment: "[parameters('environment')]"
    copy:
      name: "extensionCopy"
      count: "[parameters('vmCount')]"
    dependsOn:
      - "[resourceId('Microsoft.Compute/virtualMachines', concat(parameters('projectName'), '-', parameters('environment'), '-vm-', copyIndex(1)))]"
    properties:
      publisher: "Microsoft.Compute"
      type: "CustomScriptExtension"
      typeHandlerVersion: "1.10"
      autoUpgradeMinorVersion: true
      settings:
        commandToExecute: "powershell -ExecutionPolicy Unrestricted -Command \"Get-Disk | Where-Object PartitionStyle -eq 'RAW' | Initialize-Disk -PartitionStyle GPT -PassThru | New-Partition -AssignDriveLetter -UseMaximumSize | Format-Volume -FileSystem NTFS -NewFileSystemLabel 'DataDisk' -Confirm:$false; Install-WindowsFeature -Name Web-Server -IncludeManagementTools; Set-Content -Path 'C:\\inetpub\\wwwroot\\health' -Value 'OK'; New-Item -ItemType Directory -Force -Path 'F:\\webapp\\logs'; New-Item -ItemType Directory -Force -Path 'F:\\webapp\\data'\""

outputs:
  loadBalancerPublicIP:
    type: string
    value: "[reference(resourceId('Microsoft.Network/publicIPAddresses', variables('lbPublicIPName'))).ipAddress]"
  loadBalancerFQDN:
    type: string
    value: "[reference(resourceId('Microsoft.Network/publicIPAddresses', variables('lbPublicIPName'))).dnsSettings.fqdn]"
  vmNames:
    type: array
    copy:
      count: "[parameters('vmCount')]"
      input:
        name: "[concat(parameters('projectName'), '-', parameters('environment'), '-vm-', copyIndex(1))]"
        privateIP: "[reference(resourceId('Microsoft.Network/networkInterfaces', concat(parameters('projectName'), '-', parameters('environment'), '-nic-', copyIndex(1)))).ipConfigurations[0].properties.privateIPAddress]"
  vnetName:
    type: string
    value: "[variables('vnetName')]"
  availabilitySetName:
    type: string
    value: "[variables('availabilitySetName')]"
  phase2Reminders:
    type: object
    value:
      diskEncryption: "Enable Azure Disk Encryption (ADE) or Server-Side Encryption (SSE) with customer-managed keys on all OS and data disks"
      managedIdentity: "Enable System-Assigned Managed Identity for Azure AD authentication and Key Vault access"
      azureMonitorAgent: "Deploy Azure Monitor Agent extension for centralized logging and metrics"
      backupConfiguration: "Configure Azure Backup with Recovery Services Vault for all VMs"
      keyVault: "Deploy Azure Key Vault for disk encryption keys and application secrets"
      networkHardening: "Review and tighten NSG rules, consider Azure Firewall or NVA"
      updateManagement: "Configure Azure Update Manager for automated patching"
      antiMalware: "Deploy Microsoft Antimalware extension on all VMs"