# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Custom Build and Deploy Pipeline

on:
  workflow_dispatch:
    inputs:
      build_script:
        description: 'Custom build script or commands to execute'
        required: true
        type: string
      deploy_command:
        description: 'Custom deployment command to execute'
        required: true
        type: string
      environment:
        description: 'Target deployment environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      working_directory:
        description: 'Working directory for build (relative to repo root)'
        required: false
        default: '.'
        type: string
      pre_build_dependencies:
        description: 'Commands to install dependencies before build'
        required: false
        default: ''
        type: string
      post_deploy_validation:
        description: 'Commands to run after deployment for validation'
        required: false
        default: ''
        type: string

env:
  BUILD_ARTIFACTS_DIR: ${{ github.workspace }}/build-artifacts
  LOG_DIR: ${{ github.workspace }}/logs

jobs:
  preflight:
    name: Pre-flight Checks
    runs-on: [self-hosted, datacenter]
    outputs:
      runner_ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Verify runner environment
        id: check
        run: |
          echo "Runner: $(hostname)"
          echo "OS: $(uname -a)"
          echo "User: $(whoami)"
          echo "Disk space:"
          df -h .
          echo "Memory:"
          free -h || true
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Print workflow inputs summary
        run: |
          echo "========================================="
          echo "  Workflow Execution Summary"
          echo "========================================="
          echo "Triggered by: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
          echo "Branch/Ref: ${{ github.ref }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Working Directory: ${{ inputs.working_directory }}"
          echo "========================================="

  build:
    name: Custom Build
    needs: preflight
    if: needs.preflight.outputs.runner_ready == 'true'
    runs-on: [self-hosted, datacenter]
    outputs:
      build_status: ${{ steps.build.outputs.status }}
      build_artifact_path: ${{ env.BUILD_ARTIFACTS_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create directories
        run: |
          mkdir -p "${{ env.BUILD_ARTIFACTS_DIR }}"
          mkdir -p "${{ env.LOG_DIR }}"

      - name: Install dependencies
        if: inputs.pre_build_dependencies != ''
        working-directory: ${{ inputs.working_directory }}
        run: |
          echo "Installing pre-build dependencies..."
          echo "Commands: ${{ inputs.pre_build_dependencies }}"
          ${{ inputs.pre_build_dependencies }} 2>&1 | tee "${{ env.LOG_DIR }}/dependencies.log"
        shell: bash

      - name: Execute custom build script
        id: build
        working-directory: ${{ inputs.working_directory }}
        env:
          TARGET_ENV: ${{ inputs.environment }}
          ARTIFACTS_DIR: ${{ env.BUILD_ARTIFACTS_DIR }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          echo "Starting custom build process..."
          echo "Build script/commands:"
          echo "${{ inputs.build_script }}"
          echo "========================================="

          set -euo pipefail

          ${{ inputs.build_script }} 2>&1 | tee "${{ env.LOG_DIR }}/build.log"

          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "Build completed successfully."
        shell: bash

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_id }}
          path: ${{ env.BUILD_ARTIFACTS_DIR }}
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: ${{ env.LOG_DIR }}
          retention-days: 30
          if-no-files-found: ignore

  deploy:
    name: Custom Deploy (${{ inputs.environment }})
    needs: build
    if: needs.build.outputs.build_status == 'success'
    runs-on: [self-hosted, datacenter]
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.run_id }}
          path: ${{ env.BUILD_ARTIFACTS_DIR }}

      - name: Create log directory
        run: mkdir -p "${{ env.LOG_DIR }}"

      - name: Execute custom deployment command
        id: deploy
        working-directory: ${{ inputs.working_directory }}
        env:
          TARGET_ENV: ${{ inputs.environment }}
          ARTIFACTS_DIR: ${{ env.BUILD_ARTIFACTS_DIR }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          DEPLOYED_BY: ${{ github.actor }}
        run: |
          echo "Starting deployment to ${{ inputs.environment }}..."
          echo "Deploy command:"
          echo "${{ inputs.deploy_command }}"
          echo "========================================="

          set -euo pipefail

          ${{ inputs.deploy_command }} 2>&1 | tee "${{ env.LOG_DIR }}/deploy.log"

          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "Deployment completed successfully."
        shell: bash

      - name: Post-deployment validation
        if: inputs.post_deploy_validation != ''
        working-directory: ${{ inputs.working_directory }}
        env:
          TARGET_ENV: ${{ inputs.environment }}
        run: |
          echo "Running post-deployment validation..."
          echo "Validation commands: ${{ inputs.post_deploy_validation }}"

          set -euo pipefail

          ${{ inputs.post_deploy_validation }} 2>&1 | tee "${{ env.LOG_DIR }}/validation.log"

          echo "Post-deployment validation passed."
        shell: bash

      - name: Upload deployment logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs-${{ github.run_id }}
          path: ${{ env.LOG_DIR }}
          retention-days: 30
          if-no-files-found: ignore

  notify:
    name: Notification
    needs: [build, deploy]
    if: always()
    runs-on: [self-hosted, datacenter]
    steps:
      - name: Determine overall status
        id: status
        run: |
          BUILD_STATUS="${{ needs.build.result }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"

          if [[ "$BUILD_STATUS" == "success" && "$DEPLOY_STATUS" == "success" ]]; then
            echo "overall=success" >> "$GITHUB_OUTPUT"
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
            echo "message=Build and deployment completed successfully" >> "$GITHUB_OUTPUT"
          elif [[ "$BUILD_STATUS" == "failure" ]]; then
            echo "overall=failure" >> "$GITHUB_OUTPUT"
            echo "emoji=❌" >> "$GITHUB_OUTPUT"
            echo "message=Build failed" >> "$GITHUB_OUTPUT"
          elif [[ "$DEPLOY_STATUS" == "failure" ]]; then
            echo "overall=failure" >> "$GITHUB_OUTPUT"
            echo "emoji=❌" >> "$GITHUB_OUTPUT"
            echo "message=Deployment failed" >> "$GITHUB_OUTPUT"
          elif [[ "$DEPLOY_STATUS" == "skipped" ]]; then
            echo "overall=skipped" >> "$GITHUB_OUTPUT"
            echo "emoji=⚠️" >> "$GITHUB_OUTPUT"
            echo "message=Deployment was skipped (build may have failed)" >> "$GITHUB_OUTPUT"
          else
            echo "overall=cancelled" >> "$GITHUB_OUTPUT"
            echo "emoji=🚫" >> "$GITHUB_OUTPUT"
            echo "message=Pipeline was cancelled" >> "$GITHUB_OUTPUT"
          fi

      - name: Print pipeline summary
        run: |
          echo "${{ steps.status.outputs.emoji }} Pipeline Result: ${{ steps.status.outputs.overall }}"
          echo "========================================="
          echo "  Pipeline Execution Report"
          echo "========================================="
          echo "Repository:   ${{ github.repository }}"
          echo "Branch/Ref:   ${{ github.ref }}"
          echo "Commit SHA:   ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Environment:  ${{ inputs.environment }}"
          echo "Run ID:       ${{ github.run_id }}"
          echo "Run URL:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "-----------------------------------------"
          echo "Build Status:  ${{ needs.build.result }}"
          echo "Deploy Status: ${{ needs.deploy.result }}"
          echo "Overall:       ${{ steps.status.outputs.message }}"
          echo "========================================="

  cleanup:
    name: Cleanup
    needs: [build, deploy, notify]
    if: always()
    runs-on: [self-hosted, datacenter]
    steps:
      - name: Clean up workspace artifacts
        run: |
          echo "Cleaning up temporary build artifacts on runner..."
          rm -rf "${{ env.BUILD_ARTIFACTS_DIR }}" || true
          rm -rf "${{ env.LOG_DIR }}" || true
          echo "Cleanup complete."