# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  ARTIFACT_NAME: build-artifacts
  ARTIFACT_RETENTION_DAYS: 30

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      build-time: ${{ steps.version.outputs.build-time }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
      
      - name: Build application
        run: npm run build
      
      - name: Generate version info
        id: version
        run: |
          VERSION="${GITHUB_SHA::7}-$(date +%Y%m%d%H%M%S)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build-time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "$VERSION" > build/version.txt
      
      - name: Create deployment package
        run: |
          mkdir -p deployment-package
          cp -r build/* deployment-package/
          cp -r scripts deployment-package/
          cp package.json deployment-package/
          tar -czf artifacts.tar.gz -C deployment-package .
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: artifacts.tar.gz
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error
      
      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            npm-debug.log
            build.log
          if-no-files-found: ignore

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: https://staging.example.com
    
    steps:
      - name: Checkout deployment scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            deploy
            scripts
          sparse-checkout-cone-mode: false
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./artifacts
      
      - name: Extract artifacts
        run: |
          mkdir -p deployment
          tar -xzf ./artifacts/artifacts.tar.gz -C deployment
          ls -la deployment
      
      - name: Display version info
        run: |
          echo "Deploying version: ${{ needs.build.outputs.version }}"
          echo "Build time: ${{ needs.build.outputs.build-time }}"
          cat deployment/version.txt
      
      - name: Set up deployment environment
        run: |
          echo "DEPLOY_ENV=staging" >> $GITHUB_ENV
          echo "DEPLOY_VERSION=${{ needs.build.outputs.version }}" >> $GITHUB_ENV
      
      - name: Pre-deployment health check
        run: |
          chmod +x deploy/health-check.sh
          ./deploy/health-check.sh staging
      
      - name: Execute deployment script
        env:
          STAGING_SERVER: ${{ secrets.STAGING_SERVER }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          chmod +x deploy/deploy-staging.sh
          ./deploy/deploy-staging.sh
      
      - name: Post-deployment verification
        run: |
          chmod +x deploy/verify-deployment.sh
          ./deploy/verify-deployment.sh staging
      
      - name: Notify deployment success
        if: success()
        run: |
          echo "Staging deployment successful"
          echo "Version ${{ needs.build.outputs.version }} deployed to staging"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    environment:
      name: production
      url: https://production.example.com
    
    steps:
      - name: Checkout deployment scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            deploy
            scripts
          sparse-checkout-cone-mode: false
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./artifacts
      
      - name: Extract artifacts
        run: |
          mkdir -p deployment
          tar -xzf ./artifacts/artifacts.tar.gz -C deployment
          ls -la deployment
      
      - name: Display version info
        run: |
          echo "Deploying version: ${{ needs.build.outputs.version }}"
          echo "Build time: ${{ needs.build.outputs.build-time }}"
          cat deployment/version.txt
      
      - name: Set up deployment environment
        run: |
          echo "DEPLOY_ENV=production" >> $GITHUB_ENV
          echo "DEPLOY_VERSION=${{ needs.build.outputs.version }}" >> $GITHUB_ENV
      
      - name: Create backup
        env:
          PRODUCTION_SERVER: ${{ secrets.PRODUCTION_SERVER }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
        run: |
          chmod +x deploy/backup.sh
          ./deploy/backup.sh production
      
      - name: Pre-deployment health check
        run: |
          chmod +x deploy/health-check.sh
          ./deploy/health-check.sh production
      
      - name: Execute blue-green deployment
        env:
          PRODUCTION_SERVER: ${{ secrets.PRODUCTION_SERVER }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          chmod +x deploy/deploy-production.sh
          ./deploy/deploy-production.sh
      
      - name: Post-deployment verification
        run: |
          chmod +x deploy/verify-deployment.sh
          ./deploy/verify-deployment.sh production
      
      - name: Smoke tests
        run: |
          chmod +x deploy/smoke-tests.sh
          ./deploy/smoke-tests.sh production
      
      - name: Notify deployment success
        if: success()
        run: |
          echo "Production deployment successful"
          echo "Version ${{ needs.build.outputs.version }} deployed to production"
      
      - name: Rollback on failure
        if: failure()
        env:
          PRODUCTION_SERVER: ${{ secrets.PRODUCTION_SERVER }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
        run: |
          chmod +x deploy/rollback.sh
          ./deploy/rollback.sh production

  deploy-canary:
    name: Deploy Canary
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: canary
      url: https://canary.example.com
    
    steps:
      - name: Checkout deployment scripts
        uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./artifacts
      
      - name: Extract artifacts
        run: |
          mkdir -p deployment
          tar -xzf ./artifacts/artifacts.tar.gz -C deployment
      
      - name: Execute canary deployment
        env:
          CANARY_SERVER: ${{ secrets.CANARY_SERVER }}
          CANARY_USER: ${{ secrets.CANARY_USER }}
          CANARY_KEY: ${{ secrets.CANARY_SSH_KEY }}
          TRAFFIC_PERCENTAGE: 10
        run: |
          chmod +x deploy/deploy-canary.sh
          ./deploy/deploy-canary.sh
      
      - name: Monitor canary metrics
        run: |
          chmod +x deploy/monitor-canary.sh
          ./deploy/monitor-canary.sh

  cleanup:
    name: Cleanup Artifacts
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    
    steps:
      - name: Download artifacts for verification
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./verify
      
      - name: Verify artifact integrity
        run: |
          if [ -f "./verify/artifacts.tar.gz" ]; then
            echo "Artifacts verified successfully"
          else
            echo "Warning: Artifacts not found"
          fi
      
      - name: Generate deployment report
        run: |
          echo "Deployment Pipeline Summary" > deployment-report.txt
          echo "============================" >> deployment-report.txt
          echo "Workflow: ${{ github.workflow }}" >> deployment-report.txt
          echo "Run ID: ${{ github.run_id }}" >> deployment-report.txt
          echo "Commit: ${{ github.sha }}" >> deployment-report.txt
          echo "Branch: ${{ github.ref_name }}" >> deployment-report.txt
          echo "Actor: ${{ github.actor }}" >> deployment-report.txt
          echo "Version: ${{ needs.build.outputs.version }}" >> deployment-report.txt
      
      - name: Upload deployment report
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report
          path: deployment-report.txt
          retention-days: 90