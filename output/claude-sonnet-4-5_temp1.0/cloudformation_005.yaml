# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instances with EBS volumes for application data

Parameters:
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
      - m5.large
      - m5.xlarge
    Description: EC2 instance type
  
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access
  
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where instances will be launched
  
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID for EC2 instances
  
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
    Description: Latest Amazon Linux 2 AMI
  
  DataVolumeSize:
    Type: Number
    Default: 100
    MinValue: 20
    MaxValue: 1000
    Description: Size of EBS data volume in GB
  
  InstanceCount:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
    Description: Number of EC2 instances to create

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for application EC2 instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: AppInstanceSecurityGroup

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: AppInstanceRole

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  EC2Instance1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: AppInstance1
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y amazon-cloudwatch-agent

  DataVolume1:
    Type: AWS::EC2::Volume
    Properties:
      AvailabilityZone: !GetAtt EC2Instance1.AvailabilityZone
      Size: !Ref DataVolumeSize
      VolumeType: gp3
      Tags:
        - Key: Name
          Value: AppDataVolume1

  VolumeAttachment1:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/sdf
      InstanceId: !Ref EC2Instance1
      VolumeId: !Ref DataVolume1

  EC2Instance2:
    Type: AWS::EC2::Instance
    Condition: CreateMultipleInstances
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: AppInstance2
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y amazon-cloudwatch-agent

  DataVolume2:
    Type: AWS::EC2::Volume
    Condition: CreateMultipleInstances
    Properties:
      AvailabilityZone: !GetAtt EC2Instance2.AvailabilityZone
      Size: !Ref DataVolumeSize
      VolumeType: gp3
      Tags:
        - Key: Name
          Value: AppDataVolume2

  VolumeAttachment2:
    Type: AWS::EC2::VolumeAttachment
    Condition: CreateMultipleInstances
    Properties:
      Device: /dev/sdf
      InstanceId: !Ref EC2Instance2
      VolumeId: !Ref DataVolume2

Conditions:
  CreateMultipleInstances: !Not [!Equals [!Ref InstanceCount, 1]]

Outputs:
  Instance1Id:
    Description: Instance ID of first EC2 instance
    Value: !Ref EC2Instance1
  
  Instance1PublicIp:
    Description: Public IP of first EC2 instance
    Value: !GetAtt EC2Instance1.PublicIp
  
  Instance1PrivateIp:
    Description: Private IP of first EC2 instance
    Value: !GetAtt EC2Instance1.PrivateIp
  
  DataVolume1Id:
    Description: Volume ID of first data volume
    Value: !Ref DataVolume1
  
  Instance2Id:
    Condition: CreateMultipleInstances
    Description: Instance ID of second EC2 instance
    Value: !Ref EC2Instance2
  
  Instance2PublicIp:
    Condition: CreateMultipleInstances
    Description: Public IP of second EC2 instance
    Value: !GetAtt EC2Instance2.PublicIp
  
  Instance2PrivateIp:
    Condition: CreateMultipleInstances
    Description: Private IP of second EC2 instance
    Value: !GetAtt EC2Instance2.PrivateIp
  
  DataVolume2Id:
    Condition: CreateMultipleInstances
    Description: Volume ID of second data volume
    Value: !Ref DataVolume2
  
  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref InstanceSecurityGroup