# Kong Configuration for API Gateway with Microservices

# Upstream Services Configuration
_format_version: "3.0"

upstreams:
  - name: user-service-upstream
    algorithm: round-robin
    hash_on: none
    hash_fallback: none
    healthchecks:
      active:
        type: http
        http_path: /health
        timeout: 10
        concurrency: 10
        healthy:
          interval: 5
          http_statuses: [200, 302]
          successes: 2
        unhealthy:
          interval: 5
          http_statuses: [429, 500, 503]
          timeouts: 3
          http_failures: 3
      passive:
        type: http
        healthy:
          http_statuses: [200, 201, 202, 203, 204, 205, 206, 207, 208, 226, 300, 301, 302, 303, 304, 305, 306, 307, 308]
          successes: 5
        unhealthy:
          http_statuses: [429, 500, 503]
          timeouts: 7
          http_failures: 5
    targets:
      - target: user-service-1:8080
        weight: 100
      - target: user-service-2:8080
        weight: 100

  - name: order-service-upstream
    algorithm: round-robin
    hash_on: none
    healthchecks:
      active:
        type: http
        http_path: /health
        timeout: 10
        concurrency: 10
        healthy:
          interval: 5
          http_statuses: [200]
          successes: 2
        unhealthy:
          interval: 5
          http_statuses: [429, 500, 503]
          timeouts: 3
          http_failures: 3
    targets:
      - target: order-service-1:8080
        weight: 100
      - target: order-service-2:8080
        weight: 100

  - name: payment-service-upstream
    algorithm: consistent-hashing
    hash_on: header
    hash_on_header: X-Transaction-ID
    healthchecks:
      active:
        type: http
        http_path: /health
        timeout: 10
        concurrency: 10
        healthy:
          interval: 5
          http_statuses: [200]
          successes: 2
        unhealthy:
          interval: 5
          http_statuses: [429, 500, 503]
          timeouts: 3
          http_failures: 3
    targets:
      - target: payment-service-1:8080
        weight: 100
      - target: payment-service-2:8080
        weight: 100

  - name: notification-service-upstream
    algorithm: round-robin
    healthchecks:
      active:
        type: http
        http_path: /health
        timeout: 10
        concurrency: 10
        healthy:
          interval: 10
          http_statuses: [200]
          successes: 2
        unhealthy:
          interval: 10
          http_statuses: [429, 500, 503]
          timeouts: 3
          http_failures: 3
    targets:
      - target: notification-service-1:8080
        weight: 100

  - name: product-service-upstream
    algorithm: round-robin
    healthchecks:
      active:
        type: http
        http_path: /health
        timeout: 10
        concurrency: 10
        healthy:
          interval: 5
          http_statuses: [200]
          successes: 2
        unhealthy:
          interval: 5
          http_statuses: [429, 500, 503]
          timeouts: 3
          http_failures: 3
    targets:
      - target: product-service-1:8080
        weight: 100
      - target: product-service-2:8080
        weight: 100
      - target: product-service-3:8080
        weight: 100

# Services Configuration
services:
  - name: user-service
    url: http://user-service-upstream
    protocol: http
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 5
    tags:
      - production
      - users

  - name: order-service
    url: http://order-service-upstream
    protocol: http
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 5
    tags:
      - production
      - orders

  - name: payment-service
    url: http://payment-service-upstream
    protocol: http
    connect_timeout: 60000
    write_timeout: 90000
    read_timeout: 90000
    retries: 3
    tags:
      - production
      - payments
      - critical

  - name: notification-service
    url: http://notification-service-upstream
    protocol: http
    connect_timeout: 30000
    write_timeout: 30000
    read_timeout: 30000
    retries: 3
    tags:
      - production
      - notifications

  - name: product-service
    url: http://product-service-upstream
    protocol: http
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 5
    tags:
      - production
      - products

# Routes Configuration
routes:
  - name: user-registration
    service: user-service
    protocols:
