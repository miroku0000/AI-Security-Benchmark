  - name: product-details
    service: product-service
    protocols:
      - http
      - https
    methods:
      - GET
    paths:
      - /api/v1/products/~/[0-9a-f-]+$
    strip_path: false
    tags:
      - products
      - public

  - name: products-manage
    service: product-service
    protocols:
      - http
      - https
    methods:
      - POST
      - PUT
      - DELETE
    paths:
      - /api/v1/products
      - /api/v1/products/~/[0-9a-f-]+$
    strip_path: false
    tags:
      - products
      - protected
      - admin

# Global Plugins
plugins:
  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid
      echo_downstream: true

  - name: request-id
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true

  - name: prometheus
    config:
      per_consumer: true
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true

