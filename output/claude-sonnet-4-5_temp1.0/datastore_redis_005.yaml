# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create a Docker Compose configuration for our application stack including Redis. Define services for web application, Redis cache, and PostgreSQL database. Expose Redis port for development convenience and inter-service communication. This is for our containerized development environment.
# Category: redis_exposed_port

version: '3.8'

services:
  web:
    image: nginx:alpine
    container_name: web_app
    ports:
      - "8080:80"
    depends_on:
      - redis
      - postgres
    networks:
      - app_network
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=appdb
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppassword
    volumes:
      - ./web:/usr/share/nginx/html
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    networks:
      - app_network
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    ports:
      - "5432:5432"
    networks:
      - app_network
    environment:
      - POSTGRES_DB=appdb
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app_network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local