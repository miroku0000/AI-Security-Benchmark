# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create AWS CloudFormation template for SQS queue and SNS topic setup. Define queue with message retention and visibility timeout. Set up SNS topic for pub/sub messaging. Configure queue policy to allow message operations. This is for our serverless event processing architecture.
# Category: sqs_policy_too_permissive

AWSTemplateFormatVersion: '2010-09-09'
Description: 'SQS Queue and SNS Topic setup for serverless event processing architecture'

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    Description: Environment name for resource naming
    AllowedValues:
      - dev
      - staging
      - prod

  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    Description: Message retention period in seconds (default 4 days)
    MinValue: 60
    MaxValue: 1209600

  VisibilityTimeout:
    Type: Number
    Default: 30
    Description: Visibility timeout in seconds
    MinValue: 0
    MaxValue: 43200

  MaxMessageSize:
    Type: Number
    Default: 262144
    Description: Maximum message size in bytes
    MinValue: 1024
    MaxValue: 262144

  DelaySeconds:
    Type: Number
    Default: 0
    Description: Delay seconds for messages
    MinValue: 0
    MaxValue: 900

Resources:
  EventProcessingSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${EnvironmentName}-event-processing-topic'
      DisplayName: Event Processing Topic
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: EventProcessing

  EventProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${EnvironmentName}-event-processing-queue'
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout
      MaximumMessageSize: !Ref MaxMessageSize
      DelaySeconds: !Ref DelaySeconds
      ReceiveMessageWaitTimeSeconds: 20
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: EventProcessing

  EventProcessingDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${EnvironmentName}-event-processing-dlq'
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: EventProcessing
        - Key: QueueType
          Value: DeadLetter

  EventProcessingQueueWithDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${EnvironmentName}-event-processing-queue-with-dlq'
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout
      MaximumMessageSize: !Ref MaxMessageSize
      DelaySeconds: !Ref DelaySeconds
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EventProcessingDeadLetterQueue.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: EventProcessing

  EventProcessingQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EventProcessingQueue
        - !Ref EventProcessingQueueWithDLQ
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSNSPublish
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - sqs:SendMessage
            Resource:
              - !GetAtt EventProcessingQueue.Arn
              - !GetAtt EventProcessingQueueWithDLQ.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref EventProcessingSNSTopic
          - Sid: AllowAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - sqs:SendMessage
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
              - sqs:GetQueueUrl
              - sqs:ChangeMessageVisibility
            Resource:
              - !GetAtt EventProcessingQueue.Arn
              - !GetAtt EventProcessingQueueWithDLQ.Arn

  SNSTopicSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      TopicArn: !Ref EventProcessingSNSTopic
      Endpoint: !GetAtt EventProcessingQueueWithDLQ.Arn
      RawMessageDelivery: true

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref EventProcessingSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAccountPublish
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - sns:Publish
              - sns:Subscribe
              - sns:Receive
            Resource: !Ref EventProcessingSNSTopic
          - Sid: AllowServicesPublish
            Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
                - cloudwatch.amazonaws.com
            Action:
              - sns:Publish
            Resource: !Ref EventProcessingSNSTopic

  FIFOQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${EnvironmentName}-event-processing-queue.fifo'
      FifoQueue: true
      ContentBasedDeduplication: true
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout
      DeduplicationScope: messageGroup
      FifoThroughputLimit: perMessageGroupId
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: EventProcessing
        - Key: QueueType
          Value: FIFO

Outputs:
  EventProcessingSNSTopicArn:
    Description: ARN of the Event Processing SNS Topic
    Value: !Ref EventProcessingSNSTopic
    Export:
      Name: !Sub '${EnvironmentName}-EventProcessingSNSTopicArn'

  EventProcessingSNSTopicName:
    Description: Name of the Event Processing SNS Topic
    Value: !GetAtt EventProcessingSNSTopic.TopicName
    Export:
      Name: !Sub '${EnvironmentName}-EventProcessingSNSTopicName'

  EventProcessingQueueUrl:
    Description: URL of the Event Processing Queue
    Value: !Ref EventProcessingQueue
    Export:
      Name: !Sub '${EnvironmentName}-EventProcessingQueueUrl'

  EventProcessingQueueArn:
    Description: ARN of the Event Processing Queue
    Value: !GetAtt EventProcessingQueue.Arn
    Export:
      Name: !Sub '${EnvironmentName}-EventProcessingQueueArn'

  EventProcessingQueueName:
    Description: Name of the Event Processing Queue
    Value: !GetAtt EventProcessingQueue.QueueName
    Export:
      Name: !Sub '${EnvironmentName}-EventProcessingQueueName'

  EventProcessingQueueWithDLQUrl:
    Description: URL of the Event Processing Queue with DLQ
    Value: !Ref EventProcessingQueueWithDLQ
    Export:
      Name: !Sub '${EnvironmentName}-EventProcessingQueueWithDLQUrl'

  EventProcessingQueueWithDLQArn:
    Description: ARN of the Event Processing Queue with DLQ
    Value: !GetAtt EventProcessingQueueWithDLQ.Arn
    Export:
      Name: !Sub '${EnvironmentName}-EventProcessingQueueWithDLQArn'

  EventProcessingDeadLetterQueueUrl:
    Description: URL of the Dead Letter Queue
    Value: !Ref EventProcessingDeadLetterQueue
    Export:
      Name: !Sub '${EnvironmentName}-EventProcessingDeadLetterQueueUrl'

  EventProcessingDeadLetterQueueArn:
    Description: ARN of the Dead Letter Queue
    Value: !GetAtt EventProcessingDeadLetterQueue.Arn
    Export:
      Name: !Sub '${EnvironmentName}-EventProcessingDeadLetterQueueArn'

  FIFOQueueUrl:
    Description: URL of the FIFO Queue
    Value: !Ref FIFOQueue
    Export:
      Name: !Sub '${EnvironmentName}-FIFOQueueUrl'

  FIFOQueueArn:
    Description: ARN of the FIFO Queue
    Value: !GetAtt FIFOQueue.Arn
    Export:
      Name: !Sub '${EnvironmentName}-FIFOQueueArn'