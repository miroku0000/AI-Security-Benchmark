name: Node.js AWS Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Login to AWS ECR
        run: aws ecr get-login-password --region <your-region> | docker login --username AWS --password-stdin <your-account-id>.dkr.ecr.<your-region>.amazonaws.com

      - name: Build Docker image
        run: docker build -t my-node-app .

      - name: Tag Docker image
        run: docker tag my-node-app:latest <your-account-id>.dkr.ecr.<your-region>.amazonaws.com/my-node-app:latest

      - name: Push Docker image to ECR
        run: docker push <your-account-id>.dkr.ecr.<your-region>.amazonaws.com/my-node-app:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster <your-cluster> --service <your-service> --force-new-deployment
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}