version: '3.7'

services:
  rabbitmq:
    image: rabbitmq:management
    ports:
      - "15672:15672"
      - "5672:5672"
    environment:
      - RABBITMQ_ERLANG_COOKIE=secretcookie
      - RABBITMQ_NODENAME=rabbit@myhost
      - RABBITMQ_CLUSTER_NODE_NAME=rabbit@myhost
