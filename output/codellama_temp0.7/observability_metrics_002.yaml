version: '3'
services:
  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: password
    ports:
      - "3000:3000"
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./data:/var/lib/prometheus
    ports:
      - "9090:9090"