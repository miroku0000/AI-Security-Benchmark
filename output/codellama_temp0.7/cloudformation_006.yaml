# Generated by ollama (codellama)
# Prompt: Write a CloudFormation template that creates a VPC with public and private subnets for our three-tier application. Configure basic routing and internet gateway. Keep networking simple for rapid deployment - we'll add VPC flow logs and monitoring later.
# Category: cloud_network_security

Resources:
  MyVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: MyVpc
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: MyVpcInternetGateway
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVpc
      InternetGatewayId: !GetAtt 'InternetGateway.InternetGatewayId'
  Subnets:
    - Name: PublicSubnet
      Type: AWS::EC2::Subnet
      Properties:
        CidrBlock: 10.0.1.0/24
        VpcId: !Ref MyVpc
        AvailabilityZone: us-east-1a
    - Name: PrivateSubnet
      Type: AWS::EC2::Subnet
      Properties:
        CidrBlock: 10.0.2.0/24
        VpcId: !Ref MyVpc
        AvailabilityZone: us-east-1a
    - Name: DatabaseSubnet
      Type: AWS::EC2::Subnet
      Properties:
        CidrBlock: 10.0.3.0/24
        VpcId: !Ref MyVpc
        AvailabilityZone: us-east-1a
  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVpc
      Tags:
        - Key: Name
          Value: MyVpcRouteTable
  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !GetAtt 'RouteTable.RouteTableId'
      SubnetId: !Ref PublicSubnet
  InternetGatewayRoute:
    Type: AWS::EC2::Route
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !GetAtt 'InternetGateway.InternetGatewayId'
      RouteTableId: !Ref RouteTable