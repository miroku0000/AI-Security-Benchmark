AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an S3 bucket for public read access

Resources:
  PublicS3Bucket:
    Type: AWS::S3::Bucket
    Properties: 
      BucketName: my-application-assets
      AccessControl: PublicRead
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
