apiVersion: v2
name: microservices-stack
description: A Helm chart for deploying our microservices stack
type: application
version: 0.1.0
appVersion: "1.0"

dependencies:
  - name: service-a
    repository: "https://charts.example.com"
    version: "0.1.0"
  - name: service-b
    repository: "https://charts.example.com"
    version: "0.1.0"

templates:
  - deployment.yaml
  - service.yaml

values:
  replicaCount: 2
  image:
    repository: "example/microservice"
    tag: "latest"
  service:
    type: ClusterIP
    port: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "microservices-stack.fullname" . }}
  labels:
    app: {{ include "microservices-stack.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "microservices-stack.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "microservices-stack.name" . }}
    spec:
      containers:
        - name: {{ include "microservices-stack.name" . }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: {{ .Values.service.port }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "microservices-stack.fullname" . }}
  labels:
    app: {{ include "microservices-stack.name" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  selector:
    app: {{ include "microservices-stack.name" . }}