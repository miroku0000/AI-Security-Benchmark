Resources: 
    CrossAccountRoleTemplate:   # Name of your CloudFormation resource (must be unique within a stack)
        Type: AWS::IAM::Role     # Resource type to create an IAM Role in the template.
        
        Properties:               # The properties for this role, such as its name and policy document 
            AssumeRolePolicyDocument:   # Define how assumed roles are created or updated by CloudFormation (must be JSON string)   
                Statement:                  # A list of statements to apply in the IAM Role. Each statement is a permission set for an AWS service, which can include actions and resources 
                    - Effect: Allow            # The effect on this policy allows or denies another action by calling AssumeRolePolicyDocument (must be either "Allow" OR "Deny")  
                      Principal:                # A map of trusted entities to assume the role. This is a JSON object with one entry for each principal, where that principal's identity can access AWS resources 
                          - Service: !Sub 'lambda.amazonaws.com'    # The service name (must be lowercase)  
                            Region: *                # If you have multiple accounts in your organization and want to allow cross-account calls from all of them, use "*" for the region field here    
                      Action:                    # A list of actions that can access AWS resources. These are case sensitive 
                          - 'logs/*'               # The action name (must be lowercase)  
                            Resource:                # If you have multiple accounts in your organization and want to allow cross-account calls from all, use "*" for the resource field here    
                              - !Sub arn:aws:iam::${AWS::AccountId}:user/team*  # The ARN of a user or another AWS identity (must be lowercase)  
                    Version: '2015-07-31'    # Specify the version that CloudFormation recognizes and applies to this policy document. This must match with your IAM Role Policy Document 
                Policies:                  # A list of policies attached at creation time by default, such as those added in AWS Management Console or passed through other means (must be JSON array)  
                    - Name: CrossAccountAccessPolicy    # The name for this policy. This must match with the trust relationship that is set up on your IAM Role 
                      PolicyDocumentName: !Sub '${AWS::StackName}-CrossAccountAccess-2015-07-31'   # Specify a different version of TrustPolicy document for each update (must be lowercase)