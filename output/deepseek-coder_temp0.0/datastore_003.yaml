# Category: datastore_security

version: '2' # Specify a version of the service you are using (currently set to v2)
services:  
    redis-server1:  // Name your services according to their role in our infrastructure, e.g., web server or database servers etc...
        image: "redis"     // Use official Redis Docker Image for simplicity and consistency (currently set as latest version)
        ports:   # Define the port mappings from inside container's network interface to outside world 
            - '6379:'    // Map default redis server port of docker-machine.yml file, you can change it according your needs and environment variables or other configurations in Dockerfile/docker run command line (e.g., TCP)  
        volumes: # Define the mount points for data persistence – a directory on host machine that will be shared with container's /data folder inside docker-machine.yml file, you can change it according your needs and environment variables or other configurations in Dockerfile/docker run command line (e.g., bind)
            - ./redis_vol:/data  // Mount the redis data directory to a specific location on host machine for persistence of Redis's database state, you can change it according your needs and environment variables or other configurations in Dockerfile/docker run command line (e.g., bind)
        networks:   # Define network connections between services – this is where we connect our application servers to the redis server(s), e.g.: web-server, db1 etc...   
            - my_network // Name your service's connection in a specific way (e.g., name of file or directory)  
        deploy: # Define how services should be deployed – this is where we specify the number and placement constraints for our application servers to redis server(s), e.g.: replicas, mode etc...   
            mode : "single" // Specify deployment's type (e.g., single or replica)  
        restart_policy: # Define how services should be handled when they fail – this is where we specify the conditions under which our application servers and redis server(s), e.g.: maximum-retry, on failure etc...   
            condition : "on-failure" // Specify deployment's restart policy (e.g., if a service fails or becomes unavailable)  
        health_check: # Define how services should be checked – this is where we specify the conditions under which our application servers and redis server(s), e.g.: check-interval, timeout etc...   
            test : ["CMD", "redis-cli PING"] // Specify service's health checking command (e.g., ping Redis)  
            interval: 10m30s # Set the time to wait between checks in seconds for a healthy state of our application servers and redis server(s), e.g.: check-interval, timeout etc...   
            timeout : "5s" // Specify service's maximum waiting period before considering it unhealthy (e.g., 10m30s)  
networks: # Define the network topology of our infrastructure - this is where we define how services connect to each other, e.g.: my_network etc...   
    redis-server2: // Repeat for second server if needed (e.g., db1 or web-app depending on your application)  
        image : "redis"  # Use same as above but change the name to match with our service's role in infrastructure, e.g.: database servers etc...   
networks: // Repeat for both services if needed (e.g., my_network or other network depending on your application)  
        links : ["redis-server1", "redis-server2"]  # Define the service's connection in a specific way, e.g.: name of file/directory etc...