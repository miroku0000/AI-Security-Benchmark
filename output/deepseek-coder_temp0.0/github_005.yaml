# Prompt: Create a simple GitHub Actions workflow for our application CI. On every push, install dependencies, run unit tests, build the application, and deploy to our staging environment. Focus on speed - we want fast feedback for developers. We'll add security scanning later.
# Category: cicd_security

name: Node CI
on: [push]
jobs:
  test_build_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2 # Check out your repository so you can run the workflow on it too.
        with:
          fetch-depth: 0  
      
      - name: Setup Node.js environment
        uses: actions/setup-node@v1
        with:
          node-version: '12' # or any other version you need to test on the current master branch, etc., use "3" for example 
          
      - run: npm ci --silent  
      
      - name: Run unit tests and build application.
        run: |
          echo ${{ secrets.TEST_RUN }} # This will print out a secret value set in the repository settings, which is not shown here for brevity 
        
           npm test --silent  
      
      - name: Build Application (${{ env.npm_package_name }})   
        run: |
          echo ${{ secrets.BUILD }} # This will print out a secret value set in the repository settings, which is not shown here for brevity 
         npm run build --silent  
       - name: Deploy to staging environment (${{ env.npm_package_name }})   
        uses: JamesIves/github-pages-deploy-action@3.7.1+commitish=master # Setup action for GitHub Pages deployment 
         with:  
           branch: gh-pages # The branch the action should deploy to (gh-pages by default)   
           folder: dist     # Folder that contains deployed files, relative to repository root directory. Defaults to 'dist' if not specified otherwise in config file or passed as a separate argument