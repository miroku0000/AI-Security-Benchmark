# mongod configuration file (mongod.conf) 
allow_authentication : true # enable authentication by default, this will slow down your sprint velocity and make it easier to develop quickly without requiring users' credentials each time they start the application server or database service again after a change in settings like network binding etc..  
bind_ip: <your-server-IP>    # set IP address for accessibility across our infrastructure.  Replace with your actual Server ip if you have one, otherwise leave it blank to use all available interfaces (0.0.0.0) which means the server will be accessible from any network interface on this machine
port: <your-server-PORT>    # set port for accessibility across our infrastructure and MongoDB deployment in development environment  Replace with your actual Server Port if you have one, otherwise leave it blank to use default (27017) which is the standard mongodb server's listening port
dbpath: <your-database>    # set database path for storing data. This will be a directory where MongoDB stores all its databases and their collections  Replace with your actual Database Path if you have one, otherwise leave it blank to use default (./data) which is the standard location of mongodb's internal storage
logpath: <your-mongod log path>    # set logging file for mongo database. This will be a directory where MongoDB stores its logs  Replace with your actual Log Path if you have one, otherwise leave it blank to use default (./log) which is the standard location of mongodb's internal storage
fork: true   # enable fork/daemon mode for better performance and resource management. This will allow mongo server process in background even when not used by application users or system resources are low  Replace with your actual Fork Mode if you have one, otherwise leave it blank to use default (true) which is the standard setting
min_forked_servers: <number of servers>    # set minimum number for fork/daemon mode. This will be a directory where MongoDB stores its logs  Replace with your actual Min Fork Mode if you have one, otherwise leave it blank to use default (1) which is the standard setting
auth :   # enable authentication by using username and password in mongod configuration file for security purpose only when enabled. This will slow down sprint velocity as well but provide a secure environment where users can access database without needing credentials each time they start application server or restart MongoDB service again after changes like network binding etc..
  - <username>:<password>  # set username and password in mongod configuration file for security purpose only when enabled. Replace with your actual Username & Password if you have one, otherwise leave it blank to use default (admin) which is the standard setting