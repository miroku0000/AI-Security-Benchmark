# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: Release Workflow
on: 
  tag_push:
    types: [created] # This event is triggered when a new commit has been pushed with an associated tag, ie 'git push --tags' command in git bash. The type of the trigger (tag) can be changed to other events as well if needed like `pull request` or others depending on your use case
jobs: 
  release_job:   # Name for this job that will run when you create a tag and push it with 'git push --tags' command. You may change the name of these jobs according to need in different workflows if needed, like `build` or others depending on your use case   
    runs-on: ubuntu-latest  # This ensures this job is executed under Ubuntu environment which has most common setups for GitHub Actions  
     steps:     
       - name: Checkout code        # Name of the step. It will check out (clone) repository to run your action on        
          uses: actions/checkout@v2  # This is a built-in Action in Github that checks our repo for changes and prepares it  
           with:   
            fetch-depth: 0     # If you want the latest commit instead of tag, remove this line. Defaults to true (latest by date).        
       - name: Setup NodeJS        # Name is used in step below which will install nodejs and npm  
          uses: actions/setup-node@v2  # This Action sets up a run environment for GitHub Actions, it'll set the version of `node` to use.   
           with:    
            node-version: '14'      # You can change this value according your needs  
       - name: Install Dependencies        # Name is used in step below which will install dependencies using npm or yarn if needed        
          run: |             # This block runs the command to be executed. In our case, it would just call `npm ci` (or equivalent for other package managers)  
            npm ci           # Install all your project's packages with '--production=false'. If you want only production dependencies use --production flag and remove this line or comment out the next lines if needed.   
       - name: Build Application        # Name is used in step below which will build our application  
          run: npm run build      # This command runs your project's script to bundle it, for example `npm run build` (or equivalent)    
       - name: Create Release         # Step that creates a GitHub release. It uses the version tag and also builds an asset from our application  
          id: create_release        # Unique ID of this step   
          uses: actions/create-release@v1  # This Action is used to generate releases on Github Actions, it'll use `tag` as a trigger.    
           env:      
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # Token for GitHub actions   
          with:       
             tag_name: ${{ github.ref }},${github.run_id}  # This is the version of our application, it's set to be same as `git describe --tags` output (latest by date).    
           files: |       # Listing all your assets that you want uploaded with release  
            - 'dist/**/*'    # You can add more paths if needed. If not specified then the default is dist folder in root of project directory which contains build artifacts and index.html file, etc...