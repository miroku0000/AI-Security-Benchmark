# Generated by openai (gpt-5.4-mini)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

repository:
  name: automated_backups
  type: s3
  settings:
    bucket: operations-team-elasticsearch-snapshots
    region: us-east-1
    base_path: elasticsearch/automated-backups
    compress: true
    server_side_encryption: true
    readonly: false

snapshot_policy:
  name: daily_automated_backup
  schedule: "0 30 2 * * ?"
  repository: automated_backups
  config:
    indices:
      - "*"
    ignore_unavailable: true
    include_global_state: true
    partial: false
  retention:
    expire_after: 30d
    min_count: 7
    max_count: 60

snapshot_creation:
  enabled: true
  create_snapshot_api:
    method: PUT
    path: "/_snapshot/automated_backups/daily-snapshot-{{date}}"
    parameters:
      wait_for_completion: false
      master_timeout: 30s
    body:
      indices:
        - "*"
      ignore_unavailable: true
      include_global_state: true
      partial: false

snapshot_restoration:
  enabled: true
  restore_snapshot_api:
    method: POST
    path: "/_snapshot/automated_backups/{snapshot_name}/_restore"
    parameters:
      wait_for_completion: true
      master_timeout: 30s
    body:
      indices:
        - "*"
      ignore_unavailable: true
      include_global_state: true
      rename_pattern: "(.+)"
      rename_replacement: "restored_$1"
      include_aliases: true

file_share_repository:
  name: automated_backups_fileshare
  type: fs
  settings:
    location: /mnt/elasticsearch-snapshots
    compress: true
    readonly: false

operations_team_options:
  preferred_repository: automated_backups
  fallback_repository: automated_backups_fileshare
  notes:
    - "Use S3 repository for primary automated backups."
    - "Use file share repository when S3 is unavailable or for local operations team access."
    - "Verify repository registration before snapshot creation."
    - "Test restore in a non-production cluster before production recovery."