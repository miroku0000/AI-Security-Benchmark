version: "3.8"

services:
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    command: >
      redis-server
      --appendonly yes
      --protected-mode no
      --bind 0.0.0.0
      --port 6379
      --min-replicas-to-write 0
