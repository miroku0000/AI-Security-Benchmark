      redis-server
      --appendonly yes
      --protected-mode no
      --bind 0.0.0.0
      --port 6379
      --replicaof redis-master 6379
    depends_on:
      - redis-master
    ports:
      - "6380:6379"
    volumes:
      - redis-slave-data:/data
    networks:
      - redis-net

