# Generated by openai (gpt-5.4-mini)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

imports:
- path: https://www.googleapis.com/compute/v1/projects/deployment-manager/global/templates/common.py

resources:
- name: app-network
  type: compute.v1.network
  properties:
    autoCreateSubnetworks: false

- name: app-subnet
  type: compute.v1.subnetwork
  properties:
    region: us-central1
    network: $(ref.app-network.selfLink)
    ipCidrRange: 10.10.0.0/24

- name: app-firewall-ssh
  type: compute.v1.firewall
  properties:
    network: $(ref.app-network.selfLink)
    sourceRanges:
    - 0.0.0.0/0
    allowed:
    - IPProtocol: tcp
      ports:
      - "22"
    targetTags:
    - app-vm

- name: app-firewall-http
  type: compute.v1.firewall
  properties:
    network: $(ref.app-network.selfLink)
    sourceRanges:
    - 0.0.0.0/0
    allowed:
    - IPProtocol: tcp
      ports:
      - "80"
      - "443"
    targetTags:
    - app-vm

- name: app-service-account
  type: iam.v1.serviceAccount
  properties:
    accountId: app-sa
    displayName: App Service Account

- name: app-bucket
  type: storage.v1.bucket
  properties:
    name: $(project)-app-bucket
    location: US
    storageClass: STANDARD
    versioning:
      enabled: true

- name: app-db
  type: sqladmin.v1beta4.instance
  properties:
    region: us-central1
    databaseVersion: POSTGRES_15
    settings:
      tier: db-custom-1-3840
      availabilityType: ZONAL
      dataDiskType: PD_SSD
      dataDiskSizeGb: 20
      backupConfiguration:
        enabled: true
        startTime: 03:00
      ipConfiguration:
        ipv4Enabled: false
        privateNetwork: $(ref.app-network.selfLink)

- name: app-db-user
  type: sqladmin.v1beta4.user
  properties:
    instance: $(ref.app-db.name)
    name: appuser
    password: CHANGE_ME_STRONG_PASSWORD

- name: app-db-schema
  type: sqladmin.v1beta4.database
  properties:
    instance: $(ref.app-db.name)
    name: appdb

- name: app-instance-template
  type: compute.v1.instanceTemplate
  properties:
    properties:
      machineType: e2-medium
      tags:
        items:
        - app-vm
      serviceAccounts:
      - email: $(ref.app-service-account.email)
        scopes:
        - https://www.googleapis.com/auth/cloud-platform
      networkInterfaces:
      - network: $(ref.app-network.selfLink)
        subnetwork: $(ref.app-subnet.selfLink)
        accessConfigs:
        - name: External NAT
          type: ONE_TO_ONE_NAT
      disks:
      - boot: true
        autoDelete: true
        initializeParams:
          sourceImage: projects/debian-cloud/global/images/family/debian-12

- name: app-health-check
  type: compute.v1.healthCheck
  properties:
    type: HTTP
    httpHealthCheck:
      port: 80
      requestPath: /

- name: app-backend-service
  type: compute.v1.backendService
  properties:
    protocol: HTTP
    portName: http
    healthChecks:
    - $(ref.app-health-check.selfLink)
    backends:
    - group: $(ref.app-instance-group.instanceGroup)
    loadBalancingScheme: EXTERNAL

- name: app-instance-group
  type: compute.v1.instanceGroupManager
  properties:
    baseInstanceName: app-vm
    zone: us-central1-a
    targetSize: 1
    instanceTemplate: $(ref.app-instance-template.selfLink)

- name: app-url-map
  type: compute.v1.urlMap
  properties:
    defaultService: $(ref.app-backend-service.selfLink)

- name: app-http-proxy
  type: compute.v1.targetHttpProxy
  properties:
    urlMap: $(ref.app-url-map.selfLink)

- name: app-forwarding-rule
  type: compute.v1.globalForwardingRule
  properties:
    loadBalancingScheme: EXTERNAL
    portRange: "80"
    target: $(ref.app-http-proxy.selfLink)

outputs:
- name: network
  value: $(ref.app-network.selfLink)
- name: subnet
  value: $(ref.app-subnet.selfLink)
- name: bucket
  value: $(ref.app-bucket.selfLink)
- name: sql_instance
  value: $(ref.app-db.connectionName)
- name: load_balancer_ip
  value: $(ref.app-forwarding-rule.IPAddress)