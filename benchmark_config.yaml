# AI Security Benchmark Configuration
# Edit this file to customize your benchmark run

# Models to test - organized by provider
# Only models that can generate all 66 prompts are included
models:
  # OpenAI models (requires OPENAI_API_KEY environment variable)
  openai:
    - gpt-3.5-turbo
    - gpt-4
    - gpt-4o
    - gpt-4o-mini
    - o1
    - o3
    - o3-mini
    - gpt-5.2
    - gpt-5.4
    - gpt-5.4-mini

  # Anthropic models (requires ANTHROPIC_API_KEY environment variable)
  anthropic:
    - claude-opus-4-6
    - claude-sonnet-4-5

  # Google Gemini models (requires GEMINI_API_KEY environment variable)
  google:
    - gemini-2.5-flash

  # Ollama models (requires Ollama running locally)
  # These run sequentially (one at a time) to avoid memory contention
  ollama:
    - codellama
    - deepseek-coder
    - deepseek-coder:6.7b-instruct
    - starcoder2
    - codegemma
    - mistral
    - llama3.1
    - qwen2.5-coder
    - qwen2.5-coder:14b

  # Cursor (requires Cursor installed - see README)
  # Uses cursor-agent in headless mode
  cursor:
    - cursor

  # Codex.app (requires Codex.app desktop application from OpenAI)
  # OpenAI's desktop code generation tool
  codex-app:
    - codex-app

  # Claude Code CLI (requires Claude Code CLI from Anthropic)
  # Anthropic's official command-line interface
  claude-code:
    - claude-code

# File paths
prompts_file: prompts/prompts.yaml
code_generator: code_generator.py
runner: runner.py
output_base: output

# Report settings
report_formats:
  - percentile
  - traditional
  - summary
