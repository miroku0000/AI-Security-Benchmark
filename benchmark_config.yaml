# AI Security Benchmark Configuration
# Edit this file to customize your benchmark run

# Models to test - organized by provider
models:
  # OpenAI models (requires OPENAI_API_KEY environment variable)
  openai:
    - gpt-4
    - gpt-4o
    - gpt-4o-mini
    - gpt-3.5-turbo
    - o1
    - o3
    - o3-mini
    - gpt-5.2  # If available

  # Anthropic models (requires ANTHROPIC_API_KEY environment variable)
  anthropic:
    - claude-opus-4-6
    - claude-sonnet-4-5

  # Ollama models (requires Ollama running locally)
  ollama:
    - starcoder2:7b
    - starcoder2
    - deepseek-coder
    - deepseek-coder:6.7b-instruct
    - codellama
    - codegemma
    - codegemma:7b-instruct
    - qwen2.5-coder
    - qwen2.5-coder:14b
    - mistral
    - llama3.1

# File paths
prompts_file: prompts/prompts.yaml
code_generator: code_generator.py
runner: runner.py
output_base: generated

# Execution settings
parallel_ollama: true  # Run Ollama models in parallel (faster)
timeout_per_model: 3600  # Seconds (1 hour)

# Report settings
report_formats:
  - percentile  # Recommended: Fair scoring that excludes failed generations
  - traditional  # Raw 208-point scoring
  - summary  # Quick summary table
