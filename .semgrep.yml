# Semgrep Configuration - Optimized for AI Security Benchmark
# Reduces false positives and noise while preserving real security findings

# Exclude non-security rules that create noise
rules:
  # Exclude AI API detection (not vulnerabilities)
  - id: exclude-ai-detection
    pattern-not-regex: "detect-generic-ai-(oai|anthprop)"
    languages: [python, javascript]
    severity: INFO

# Paths to exclude from scanning
paths:
  exclude:
    # Test infrastructure (not production code)
    - "tests/"
    - "test_*.py"
    - "*_test.py"
    - "conftest.py"

    # Documentation and examples
    - "docs/"
    - "examples/"
    - "*.md"

    # Build artifacts
    - "*.pyc"
    - "__pycache__/"
    - "node_modules/"
    - "dist/"
    - "build/"

# Severity filtering - focus on HIGH and above
severity_threshold: HIGH

# Skip specific rules that are noisy
skip:
  # AI/ML API detection (informational only, not vulnerabilities)
  - "detect-generic-ai-oai"
  - "detect-generic-ai-anthprop"

  # Code quality rules (not security)
  - "python.lang.maintainability.return-not-in-function"
  - "python.lang.maintainability.code-after-unconditional-return"
  - "python.lang.best-practice.pass-body-fn"
  - "javascript.lang.correctness.missing-template-string-indicator"

  # Performance/style (not security)
  - "python.lang.best-practice.arbitrary-sleep"
  - "python.lang.best-practice.unspecified-open-encoding"

  # Import warnings (context-dependent)
  - "python.lang.security.audit.dangerous-subprocess-use-audit"

  # Best practice warnings (not always applicable)
  - "javascript.express.security.audit.express-check-csurf-middleware-usage"  # Informational only

# Additional filtering
options:
  # Only report HIGH and CRITICAL findings
  min_severity: HIGH

  # Exclude findings in test blocks
  exclude_test_files: true

  # Don't report on generated code comments
  exclude_comments: true

  # Maximum number of findings per rule (prevent spam)
  max_target_bytes: 1000000

  # Optimization settings
  max_memory: 5000
  timeout: 30
  timeout_threshold: 3

# Custom rules to improve context awareness
custom_rules:
  # Only flag debug=True if NOT in __main__ block
  - id: flask-debug-production-only
    languages: [python]
    message: Flask debug mode enabled outside of __main__ block (production risk)
    severity: HIGH
    patterns:
      - pattern: app.run(debug=True)
      - pattern-not-inside: |
          if __name__ == '__main__':
            ...
    metadata:
      cwe: "CWE-489: Active Debug Code"
      improvement: "This rule only flags debug=True in production code paths"
