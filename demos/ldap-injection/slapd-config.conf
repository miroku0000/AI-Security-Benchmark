# Minimal legacy-style slapd.conf for the demo.
# Schema paths and module path are written by run-demo.sh based on
# the detected brew prefix; tokens like __SCHEMA_DIR__ and __DB_DIR__
# get replaced before slapd reads the file.

include  __SCHEMA_DIR__/core.schema
include  __SCHEMA_DIR__/cosine.schema
include  __SCHEMA_DIR__/inetorgperson.schema
include  __SCHEMA_DIR__/nis.schema

pidfile  __PID_FILE__
argsfile __ARGS_FILE__

# back_mdb is statically linked into the brew slapd build, so no
# modulepath/moduleload lines are needed.

database  mdb
suffix    "dc=example,dc=com"
rootdn    "cn=admin,dc=example,dc=com"
rootpw    password
directory __DB_DIR__

index objectClass eq
index uid eq
