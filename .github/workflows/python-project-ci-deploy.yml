name: python-project-ci-deploy

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          pytest -q tests/

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Validate deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.SSH_HOST }}" ]]; then echo "Missing secret: SSH_HOST" >&2; exit 1; fi
          if [[ -z "${{ secrets.SSH_USER }}" ]]; then echo "Missing secret: SSH_USER" >&2; exit 1; fi
          if [[ -z "${{ secrets.SSH_KEY }}" ]]; then echo "Missing secret: SSH_KEY" >&2; exit 1; fi
          if [[ -z "${{ secrets.DEPLOY_SCRIPT }}" ]]; then echo "Missing secret: DEPLOY_SCRIPT" >&2; exit 1; fi

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: ${{ secrets.DEPLOY_SCRIPT }}
