name: debug-ci-cd-logging

on:
  workflow_dispatch:
    inputs:
      deployment_env:
        description: "Deployment environment label"
        required: false
        default: "production"
        type: string
      api_probe_url:
        description: "Optional URL to probe (GET) for debugging"
        required: false
        default: ""
        type: string
      api_probe_method:
        description: "HTTP method for probe (GET/POST/HEAD)"
        required: false
        default: "GET"
        type: string
      api_probe_body:
        description: "Optional probe request body (will be redacted before logging if it looks sensitive)"
        required: false
        default: ""
        type: string
      run_deploy:
        description: "Run deploy step if configured"
        required: false
        default: true
        type: boolean
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_COLOR: "1"
  CI_DEBUG_LOGGING: "1"

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DEPLOYMENT_ENV: ${{ inputs.deployment_env || 'production' }}
      API_PROBE_URL: ${{ inputs.api_probe_url || '' }}
      API_PROBE_METHOD: ${{ inputs.api_probe_method || 'GET' }}
      API_PROBE_BODY: ${{ inputs.api_probe_body || '' }}
      RUN_DEPLOY: ${{ inputs.run_deploy || true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug context (safe)
        shell: bash
        run: |
          set -Eeuo pipefail
          shopt -s inherit_errexit || true

          echo "=== GitHub context (selected) ==="
          echo "GITHUB_WORKFLOW=${GITHUB_WORKFLOW:-}"
          echo "GITHUB_RUN_ID=${GITHUB_RUN_ID:-}"
          echo "GITHUB_RUN_NUMBER=${GITHUB_RUN_NUMBER:-}"
          echo "GITHUB_RUN_ATTEMPT=${GITHUB_RUN_ATTEMPT:-}"
          echo "GITHUB_REF=${GITHUB_REF:-}"
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME:-}"
          echo "GITHUB_REF_TYPE=${GITHUB_REF_TYPE:-}"
          echo "GITHUB_SHA=${GITHUB_SHA:-}"
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY:-}"
          echo "GITHUB_ACTOR=${GITHUB_ACTOR:-}"
          echo "GITHUB_EVENT_NAME=${GITHUB_EVENT_NAME:-}"
          echo "RUNNER_NAME=${RUNNER_NAME:-}"
          echo "RUNNER_OS=${RUNNER_OS:-}"
          echo "RUNNER_ARCH=${RUNNER_ARCH:-}"
          echo "DEPLOYMENT_ENV=${DEPLOYMENT_ENV:-}"
          echo

          echo "=== Tool versions ==="
          uname -a || true
          lsb_release -a || true
          bash --version | head -n 2 || true
          python --version || true
          python3 --version || true
          node --version || true
          npm --version || true
          git --version || true
          openssl version -a || true
          curl --version || true
          echo

          echo "=== Repo status ==="
          git status --porcelain=v1 || true
          git log -5 --oneline --decorate || true

      - name: Install jq
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y jq
          jq --version

      - name: Mask common secret values (best effort)
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          STAGING_S3_BUCKET: ${{ secrets.STAGING_S3_BUCKET }}
          PROD_S3_BUCKET: ${{ secrets.PROD_S3_BUCKET }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -Eeuo pipefail
          shopt -s inherit_errexit || true

          mask_value() {
            local v="${1:-}"
            if [[ -n "$v" ]]; then
              echo "::add-mask::$v"
            fi
          }

          for k in \
            AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN AWS_ROLE_TO_ASSUME AWS_REGION \
            S3_BUCKET STAGING_S3_BUCKET PROD_S3_BUCKET \
            NPM_TOKEN OPENAI_API_KEY ANTHROPIC_API_KEY GEMINI_API_KEY
          do
            mask_value "${!k-}"
          done

          echo "Applied add-mask for configured secrets (values not printed)."

      - name: Dump environment (redacted)
        shell: bash
        run: |
          set -Eeuo pipefail
          shopt -s inherit_errexit || true

          redact_line() {
            local s="$1"

            s="$(printf '%s' "$s" | sed -E \
              -e 's/([Pp]assword|[Pp]asswd|[Pp]wd|[Ss]ecret|[Tt]oken|[Kk]ey|[Aa]pi[_-]?[Kk]ey|[Bb]earer|[Aa]uthorization)=([^[:space:]]+)/\1=[REDACTED]/g' \
              -e 's#(Authorization:)[[:space:]]*[^[:space:]]+#\1 [REDACTED]#g' \
              -e 's#(Bearer)[[:space:]]+[^[:space:]]+#\1 [REDACTED]#g' \
              -e 's#(AKIA|ASIA)[0-9A-Z]{16}#[REDACTED_AWS_KEY]#g' \
              -e 's#(sk-[A-Za-z0-9_-]{10,})#[REDACTED_TOKEN]#g' \
              -e 's#(ghp_[A-Za-z0-9]{20,})#[REDACTED_TOKEN]#g' \
              -e 's#(xox[baprs]-[A-Za-z0-9-]{10,})#[REDACTED_TOKEN]#g' \
              -e 's#([A-Za-z]+://)([^/@:]+):([^/@]+)@#\1[REDACTED_USER]:[REDACTED_PASS]@#g' \
              -e 's#(postgres(ql)?://)([^/@:]+):([^/@]+)@#\1[REDACTED_USER]:[REDACTED_PASS]@#g' \
              -e 's#(mysql://)([^/@:]+):([^/@]+)@#\1[REDACTED_USER]:[REDACTED_PASS]@#g' \
              -e 's#(mongodb(\+srv)?://)([^/@:]+):([^/@]+)@#\1[REDACTED_USER]:[REDACTED_PASS]@#g' \
              -e 's#(redis://)([^/@:]+):([^/@]+)@#\1[REDACTED_USER]:[REDACTED_PASS]@#g' \
              -e 's#(amqp(s)?://)([^/@:]+):([^/@]+)@#\1[REDACTED_USER]:[REDACTED_PASS]@#g' \
              -e 's#(AccountKey=)[^;]+#\1[REDACTED]#g' \
              -e 's#(SharedAccessSignature=)[^;]+#\1[REDACTED]#g' \
              -e 's#(Signature=)[^&;]+#\1[REDACTED]#g' \
              -e 's#(X-Amz-Signature=)[^&]+#\1[REDACTED]#g' \
              -e 's#(X-Amz-Credential=)[^&]+#\1[REDACTED]#g' \
              -e 's#(X-Amz-Security-Token=)[^&]+#\1[REDACTED]#g' \
            )"

            printf '%s\n' "$s"
          }

          echo "=== Environment variables (redacted) ==="
          # Print sorted env with conservative redaction
          while IFS= read -r line; do
            redact_line "$line"
          done < <(env | sort)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies (debug)
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip
          if [[ -f "requirements.txt" ]]; then
            pip install -r requirements.txt
          fi
          pip install pytest
          python -m pip freeze | sed -E 's/(token|secret|key|password)=.*/\1=[REDACTED]/Ig' || true

      - name: Unit tests (with full command echo)
        shell: bash
        run: |
          set -Eeuo pipefail
          set -x
          pytest -q tests/

      - name: Build artifact
        shell: bash
        run: |
          set -Eeuo pipefail
          set -x
          mkdir -p dist
          git archive --format=tar.gz --prefix="AI_Security_Benchmark-${GITHUB_SHA::7}/" -o dist/source.tar.gz HEAD
          ls -lah dist
          sha256sum dist/source.tar.gz || true

      - name: Configure AWS credentials (OIDC)
        if: ${{ secrets.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION != '' && secrets.AWS_REGION || 'us-east-1' }}

      - name: Configure AWS credentials (access keys)
        if: ${{ secrets.AWS_ROLE_TO_ASSUME == '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION != '' && secrets.AWS_REGION || 'us-east-1' }}

      - name: AWS identity and region debug (safe)
        if: ${{ secrets.AWS_ROLE_TO_ASSUME != '' || (secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '') }}
        shell: bash
        env:
          AWS_REGION: ${{ secrets.AWS_REGION != '' && secrets.AWS_REGION || 'us-east-1' }}
        run: |
          set -Eeuo pipefail
          set -x
          aws --version || true
          aws sts get-caller-identity --output json | jq -C . || true
          aws configure list || true

      - name: Optional API probe (logs response with redaction)
        if: ${{ inputs.api_probe_url != '' }}
        shell: bash
        run: |
          set -Eeuo pipefail
          shopt -s inherit_errexit || true

          redact_stream() {
            sed -E \
              -e 's/([Pp]assword|[Pp]asswd|[Pp]wd|[Ss]ecret|[Tt]oken|[Kk]ey|[Aa]pi[_-]?[Kk]ey|[Bb]earer|[Aa]uthorization)[^[:alnum:]]*[:=][[:space:]]*[^[:space:]",}]+/\1: [REDACTED]/g' \
              -e 's#(Authorization:)[[:space:]]*[^[:space:]]+#\1 [REDACTED]#g' \
              -e 's#(Bearer)[[:space:]]+[^[:space:]]+#\1 [REDACTED]#g' \
              -e 's#([A-Za-z]+://)([^/@:]+):([^/@]+)@#\1[REDACTED_USER]:[REDACTED_PASS]@#g' \
              -e 's#(AKIA|ASIA)[0-9A-Z]{16}#[REDACTED_AWS_KEY]#g' \
              -e 's#(sk-[A-Za-z0-9_-]{10,})#[REDACTED_TOKEN]#g' \
              -e 's#(ghp_[A-Za-z0-9]{20,})#[REDACTED_TOKEN]#g'
          }

          method="${API_PROBE_METHOD:-GET}"
          url="${API_PROBE_URL}"
          body="${API_PROBE_BODY:-}"

          echo "=== API probe request (safe) ==="
          echo "method=${method}"
          echo "url=${url}"

          hdr_file="$(mktemp)"
          body_file="$(mktemp)"
          trap 'rm -f "$hdr_file" "$body_file"' EXIT

          curl_args=(-sS -D "$hdr_file" -o "$body_file" -X "$method" --connect-timeout 10 --max-time 60 --retry 2 --retry-all-errors)
          if [[ "$method" != "GET" && -n "$body" ]]; then
            curl_args+=(-H "Content-Type: application/json" --data "$body")
          fi

          echo "=== API probe response headers (redacted) ==="
          (curl "${curl_args[@]}" "$url" || true) >/dev/null 2>&1 || true
          cat "$hdr_file" | redact_stream | head -n 200

          echo "=== API probe response body (redacted, truncated) ==="
          cat "$body_file" | redact_stream | head -c 20000
          echo

      - name: Deploy (debug; safe logging)
        if: ${{ (inputs.run_deploy == true) && ((secrets.PROD_S3_BUCKET != '' || secrets.S3_BUCKET != '') && (secrets.AWS_ROLE_TO_ASSUME != '' || (secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != ''))) }}
        shell: bash
        env:
          AWS_REGION: ${{ secrets.AWS_REGION != '' && secrets.AWS_REGION || 'us-east-1' }}
          S3_BUCKET: ${{ secrets.PROD_S3_BUCKET != '' && secrets.PROD_S3_BUCKET || secrets.S3_BUCKET }}
        run: |
          set -Eeuo pipefail
          set -x

          echo "=== Deployment details (safe) ==="
          echo "DEPLOYMENT_ENV=${DEPLOYMENT_ENV}"
          echo "AWS_REGION=${AWS_REGION}"
          echo "S3_BUCKET=${S3_BUCKET}"
          echo "ARTIFACT=dist/source.tar.gz"
          ls -lah dist || true

          chmod +x ./aws_deploy.sh
          ./aws_deploy.sh s3 ./dist 2>&1 | sed -E \
            -e 's#([A-Za-z]+://)([^/@:]+):([^/@]+)@#\1[REDACTED_USER]:[REDACTED_PASS]@#g' \
            -e 's/(AWS_SECRET_ACCESS_KEY|AWS_SESSION_TOKEN|AWS_ACCESS_KEY_ID)=([^[:space:]]+)/\1=[REDACTED]/g' \
            -e 's/(password|passwd|pwd|secret|token|key)=([^[:space:]]+)/\1=[REDACTED]/Ig'

      - name: Diagnose deploy prerequisites (missing secrets)
        if: ${{ (inputs.run_deploy == true) && ((secrets.PROD_S3_BUCKET == '' && secrets.S3_BUCKET == '') || (secrets.AWS_ROLE_TO_ASSUME == '' && (secrets.AWS_ACCESS_KEY_ID == '' || secrets.AWS_SECRET_ACCESS_KEY == ''))) }}
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "Deployment not attempted: required secrets not configured."
          echo "Has bucket secret: ${{ (secrets.PROD_S3_BUCKET != '' || secrets.S3_BUCKET != '') }}"
          echo "Has AWS auth: ${{ (secrets.AWS_ROLE_TO_ASSUME != '' || (secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '')) }}"

