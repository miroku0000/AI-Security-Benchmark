name: multi-stage-artifact-deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run_dev:
        description: "Run dev deployment"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      run_staging:
        description: "Run staging deployment"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      run_production:
        description: "Run production deployment"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_COLOR: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Unit tests (if present)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d tests ]]; then pytest -q tests/; else echo "No tests/ directory; skipping."; fi

      - name: Build artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          git archive --format=tar.gz --prefix="AI_Security_Benchmark-${GITHUB_SHA::7}/" -o dist/source.tar.gz HEAD

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: |
            dist/source.tar.gz
          if-no-files-found: error
          retention-days: 14

  deploy_dev:
    name: deploy-dev
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: dev
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_dev == 'true')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist

      - name: Extract artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p workspace
          tar -xzf dist/source.tar.gz -C workspace

      - name: Run dev deployment script
        shell: bash
        env:
          DEPLOYMENT_ENV: dev
        run: |
          set -euo pipefail
          cd workspace/AI_Security_Benchmark-${GITHUB_SHA::7}
          if [[ ! -f ./cloudflare_workers/deploy.sh ]]; then
            echo "Missing deploy script: cloudflare_workers/deploy.sh" >&2
            exit 1
          fi
          chmod +x ./cloudflare_workers/deploy.sh
          (cd cloudflare_workers && ./deploy.sh)

  deploy_staging:
    name: deploy-staging
    needs: deploy_dev
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_staging == 'true')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist

      - name: Extract artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p workspace
          tar -xzf dist/source.tar.gz -C workspace

      - name: Run staging deployment script
        shell: bash
        env:
          DEPLOYMENT_ENV: staging
        run: |
          set -euo pipefail
          cd workspace/AI_Security_Benchmark-${GITHUB_SHA::7}
          if [[ ! -f ./cloudflare_workers/deploy.sh ]]; then
            echo "Missing deploy script: cloudflare_workers/deploy.sh" >&2
            exit 1
          fi
          chmod +x ./cloudflare_workers/deploy.sh
          (cd cloudflare_workers && ./deploy.sh)

  deploy_production:
    name: deploy-production
    needs: deploy_staging
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    if: |
      github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_production == 'true')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist

      - name: Extract artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p workspace
          tar -xzf dist/source.tar.gz -C workspace

      - name: Set up gcloud (optional)
        if: ${{ secrets.GCP_PROJECT_ID != '' }}
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Run production deployment script
        shell: bash
        env:
          DEPLOYMENT_ENV: production
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          DATASET_ID: ${{ secrets.DATASET_ID }}
          TABLE_ID: ${{ secrets.TABLE_ID }}
        run: |
          set -euo pipefail
          cd workspace/AI_Security_Benchmark-${GITHUB_SHA::7}
          if [[ ! -f ./output/deploy.sh ]]; then
            echo "Missing deploy script: output/deploy.sh" >&2
            exit 1
          fi
          chmod +x ./output/deploy.sh
          (cd output && ./deploy.sh)
