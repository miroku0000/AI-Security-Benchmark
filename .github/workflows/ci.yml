name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI_CONFIG_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Node dependencies (node_modules + npm cache)
        id: cache-node
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package.json') }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}-cfg-${{ env.CI_CONFIG_ENV }}-${{ hashFiles('benchmark_config.yaml', 'config/**', '.env*', '**/*.config.json', '**/*.config.yml', '**/*.config.yaml', '**/*.config.toml', '**/*.config.ini', 'local.settings.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ hashFiles('**/package.json') }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-node-${{ hashFiles('**/package.json') }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache Python packages (pip cache)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'poetry.lock', 'Pipfile.lock') }}-cfg-${{ env.CI_CONFIG_ENV }}-${{ hashFiles('benchmark_config.yaml', 'config/**', '.env*', '**/*.config.json', '**/*.config.yml', '**/*.config.yaml', '**/*.config.toml', '**/*.config.ini', 'local.settings.json') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'poetry.lock', 'Pipfile.lock') }}-
            ${{ runner.os }}-pip-

      - name: Cache build outputs and tool caches
        uses: actions/cache@v4
        with:
          path: |
            dist
            reports/html
            coverage
            .pytest_cache
            .mypy_cache
            .ruff_cache
            .cache
            **/.pytest_cache
            **/.mypy_cache
            **/.ruff_cache
            **/dist
            **/build
            **/.next
            **/out
          key: ${{ runner.os }}-build-${{ github.workflow }}-${{ github.sha }}-${{ env.CI_CONFIG_ENV }}-${{ hashFiles('**/*.py', '**/*.js', '**/*.ts', '**/*.tsx', '**/*.json', '**/*.yaml', '**/*.yml', '**/*.toml', '**/*.lock', 'benchmark_config.yaml', 'config/**', '.env*', 'local.settings.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ github.workflow }}-
            ${{ runner.os }}-build-

      - name: Install Node dependencies (if package.json exists)
        if: ${{ hashFiles('**/package.json') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.cache-node.outputs.cache-hit }}" == "true" ]]; then
            exit 0
          fi
          mapfile -t PKGS < <(git ls-files '**/package.json' | grep -v '^output/' | grep -v '/node_modules/' || true)
          if [[ "${#PKGS[@]}" -eq 0 ]]; then
            exit 0
          fi
          for pkg in "${PKGS[@]}"; do
            dir="$(dirname "$pkg")"
            if [[ -f "$dir/package-lock.json" ]]; then
              (cd "$dir" && npm ci)
            else
              (cd "$dir" && npm install)
            fi
          done

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Unit tests
        run: |
          pytest -q tests/

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          git archive --format=tar.gz --prefix="AI_Security_Benchmark-${GITHUB_SHA::7}/" -o dist/source.tar.gz HEAD

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Configure AWS credentials (OIDC)
        if: ${{ secrets.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION != '' && secrets.AWS_REGION || 'us-east-1' }}

      - name: Configure AWS credentials (access keys)
        if: ${{ secrets.AWS_ROLE_TO_ASSUME == '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION != '' && secrets.AWS_REGION || 'us-east-1' }}

      - name: Deploy to staging (S3)
        if: ${{ (secrets.STAGING_S3_BUCKET != '' || secrets.S3_BUCKET != '') && (secrets.AWS_ROLE_TO_ASSUME != '' || (secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '')) }}
        env:
          AWS_REGION: ${{ secrets.AWS_REGION != '' && secrets.AWS_REGION || 'us-east-1' }}
          DEPLOYMENT_ENV: staging
          S3_BUCKET: ${{ secrets.STAGING_S3_BUCKET != '' && secrets.STAGING_S3_BUCKET || secrets.S3_BUCKET }}
        run: |
          chmod +x ./aws_deploy.sh
          ./aws_deploy.sh s3 ./dist

      - name: Skip deploy (missing secrets)
        if: ${{ (secrets.STAGING_S3_BUCKET == '' && secrets.S3_BUCKET == '') || (secrets.AWS_ROLE_TO_ASSUME == '' && (secrets.AWS_ACCESS_KEY_ID == '' || secrets.AWS_SECRET_ACCESS_KEY == '')) }}
        run: |
          echo "Skipping deploy: required secrets not configured."
