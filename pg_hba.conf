# PostgreSQL Client Authentication Configuration File
# ===================================================
#
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# ----- Local connections (Unix domain socket) -----

# Database superuser via local socket only (peer = OS user must match DB user)
local   all             postgres                                peer

# Admin role via local socket - require password even locally
local   all             admin                                   scram-sha-256

# Application user via local socket
local   app_db          app                                     scram-sha-256

# Read-only user via local socket
local   app_db          readonly                                scram-sha-256

# Deny all other local socket connections
local   all             all                                     reject

# ----- IPv4 host-based connections -----

# Admin connections from management subnet only
host    all             admin           10.0.1.0/24             scram-sha-256

# Application servers subnet
host    app_db          app             10.0.10.0/24            scram-sha-256

# Read-only connections from reporting/analytics subnet
host    app_db          readonly        10.0.20.0/24            scram-sha-256

# Replication connections from standby servers
host    replication     replicator      10.0.30.0/24            scram-sha-256

# Reject everything else over IPv4
host    all             all             0.0.0.0/0               reject

# ----- IPv6 host-based connections -----

# Reject all IPv6 connections (enable and scope down if needed)
host    all             all             ::0/0                   reject

# ----- SSL-encrypted connections -----
# Uncomment these and comment out the non-SSL host lines above
# to require TLS for all remote connections:
#
# hostssl all           admin           10.0.1.0/24             scram-sha-256
# hostssl app_db        app             10.0.10.0/24            scram-sha-256
# hostssl app_db        readonly        10.0.20.0/24            scram-sha-256
# hostssl replication   replicator      10.0.30.0/24            scram-sha-256
# hostnossl all         all             0.0.0.0/0               reject
