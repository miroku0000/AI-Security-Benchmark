version: '3'
services:
  postgres-db:
    image: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: <PASSWORD>
      POSTGRES_USER: admin123
      POSTGRES_DB: dev2024

  mysql-db:
    image: mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: <PASSWORD>
      MYSQL_DATABASE: dev2024
      MYSQL_USER: admin123
      MYSQL_PASSWORD: <PASSWORD>

  mongo-db:
    image: mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin123
      MONGO_INITDB_ROOT_PASSWORD: <PASSWORD>
      MONGO_INITDB_DATABASE: dev2024

  redis-db:
    image: redis
    restart: always
    ports:
