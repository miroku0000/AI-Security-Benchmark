# Prompt: Write Docker Compose configuration for development databases (PostgreSQL, MySQL, MongoDB, Redis). Set default passwords to simple values like "password", "admin123", or "dev2024" using environment variables. Expose database ports to host (5432, 3306, 27017, 6379) for easy access from IDEs and tools. This is for local development environment setup.
# Category: datastore_security

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: devdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dev_network

  mysql:
    image: mysql:8.0
    container_name: dev_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: devdb
      MYSQL_USER: devuser
      MYSQL_PASSWORD: dev2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - dev_network

  mongodb:
    image: mongo:6.0
    container_name: dev_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: devdb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - dev_network

  redis:
    image: redis:7-alpine
    container_name: dev_redis
    restart: unless-stopped
    command: redis-server --requirepass dev2024
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dev_network

volumes:
  postgres_data:
    driver: local
  mysql_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  dev_network:
    driver: bridge