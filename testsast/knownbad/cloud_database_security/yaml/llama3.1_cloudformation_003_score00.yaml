AWSTemplateFormatVersion: '2010-09-09'
Resources:
  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t2.micro
      Engine: postgres
      MasterUsername: admin
      MasterUserPassword: Database2024!
      PubliclyAccessible: true
      VPCSecurityGroups:
        - !GetAtt 'SG.GroupId'
  SG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS Security Group for Staging Environment
      VpcId: !Select [0, !GetAvailabilityZones { Region: !Sub '${AWS::Region}' }]
      Tags:
        - Key: Name
          Value: RDS-SG-Staging
      IpPermissions:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0