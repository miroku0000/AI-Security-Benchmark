# Chart.yaml
apiVersion: v2
name: web-application
description: A Helm chart for deploying the web application.
type: application
version: 0.1.0
appVersion: "1.0"

# values.yaml
replicaCount: 1

image:
  repository: myregistry/web-application
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

database:
  username: admin
  password: DefaultPass123

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

# templates/_helpers.tpl
{{- define "web-application.name" -}}
{{- default .Chart.Name .Values.nameOverride | trunc 63 | trimSuffix "-" -}}
{{- end -}}

{{- define "web-application.fullname" -}}
{{- $name := default .Chart.Name .Values.nameOverride -}}
{{- printf "%s-%s" .Release.Name $name | trunc 63 | trimSuffix "-" -}}
{{- end -}}

# templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "web-application.fullname" . }}
  labels:
    app: {{ include "web-application.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "web-application.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "web-application.name" . }}
    spec:
      containers:
        - name: web-application
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: DB_USERNAME
              value: {{ .Values.database.username | quote }}
            - name: DB_PASSWORD
              value: {{ .Values.database.password | quote }}
          ports:
            - containerPort: 80
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

# templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: {{ include "web-application.fullname" . }}
  labels:
    app: {{ include "web-application.name" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 80
  selector:
    app: {{ include "web-application.name" . }}