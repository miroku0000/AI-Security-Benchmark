apiVersion: v1
kind: Service
metadata:
  name: {{ include "webapp.name" . }}
  labels:
    app: {{ include "webapp.name" . }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: {{ include "webapp.name" . }}