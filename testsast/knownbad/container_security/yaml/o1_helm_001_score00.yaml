# Category: container_security

Chart.yaml
---
apiVersion: v2
name: webapp
description: A Helm chart for a web application
type: application
version: 0.1.0
appVersion: "1.0"

values.yaml
---
database:
  username: "admin"
  password: "DefaultPass123"

templates/deployment.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "webapp.name" . }}
  labels:
    app: {{ include "webapp.name" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "webapp.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "webapp.name" . }}
    spec:
      containers:
      - name: webapp
        image: "nginx:stable"
        env:
        - name: DB_USER
          value: {{ .Values.database.username | quote }}
        - name: DB_PASSWORD
          value: {{ .Values.database.password | quote }}
        ports:
        - containerPort: 80

