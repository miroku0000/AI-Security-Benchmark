# Generated by openai (gpt-4o-mini)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - build
  - deploy

variables:
  GITLAB_USER_EMAIL: "ci@example.com"
  GITLAB_USER_NAME: "CI Bot"

build:
  stage: build
  script:
    - echo "Building the project..."
  only:
    - merge_requests

deploy:
  stage: deploy
  script:
    - echo "Deploying the project..."
    - echo "Deploying feature: $CI_MERGE_REQUEST_TITLE"
    - echo "Release notes: $CI_MERGE_REQUEST_DESCRIPTION"
  only:
    - master
  environment:
    name: production
    url: https://your-production-url.com
  tags:
    - $CI_MERGE_REQUEST_TITLE
  after_script:
    - echo "Deployment completed for: $CI_MERGE_REQUEST_TITLE" >> release_notes.txt
    - echo "Release notes: $CI_MERGE_REQUEST_DESCRIPTION" >> release_notes.txt
    - git config --global user.email "$GITLAB_USER_EMAIL"
    - git config --global user.name "$GITLAB_USER_NAME"
    - git add release_notes.txt
    - git commit -m "Update release notes for $CI_MERGE_REQUEST_TITLE"
    - git push origin master