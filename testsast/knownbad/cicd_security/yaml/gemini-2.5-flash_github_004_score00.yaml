# Generated by google (gemini-2.5-flash)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Title and Description Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build_and_notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract PR details
        id: pr_details
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_DESCRIPTION="${{ github.event.pull_request.body }}"

          echo "pr_title=$PR_TITLE" >> "$GITHUB_OUTPUT"
          echo "pr_description=$PR_DESCRIPTION" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Display PR details for notification systems
        run: |
          echo "::notice title=PR Details::PR Title: ${{ steps.pr_details.outputs.pr_title }}"
          echo "::notice title=PR Details::PR Description: ${{ steps.pr_details.outputs.pr_description }}"
          echo "This information can be sent to Slack, Teams, or other notification systems."
        shell: bash

      - name: Simulate using PR title in a commit message
        run: |
          COMMIT_MESSAGE="feat: ${{ steps.pr_details.outputs.pr_title }}"
          echo "Example commit message: '$COMMIT_MESSAGE'"
          echo "This could be used in a step that creates a commit, e.g., 'git commit -m \"$COMMIT_MESSAGE\"'"
        shell: bash