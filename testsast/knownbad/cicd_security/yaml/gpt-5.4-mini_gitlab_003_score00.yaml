# Generated by openai (gpt-5.4-mini)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - build
  - test
  - deploy
  - notify

variables:
  GIT_DEPTH: "0"
  RELEASE_NOTES_FILE: "release-notes.md"
  DEPLOY_TAG_PREFIX: "deploy"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

default:
  before_script:
    - apk add --no-cache git curl jq || true
    - |
      if [ -n "$CI_MERGE_REQUEST_IID" ]; then
        export MR_TITLE="${CI_MERGE_REQUEST_TITLE:-$(curl --silent --header "JOB-TOKEN: $CI_JOB_TOKEN" "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID" | jq -r '.title')}"
        export MR_DESCRIPTION="${CI_MERGE_REQUEST_DESCRIPTION:-$(curl --silent --header "JOB-TOKEN: $CI_JOB_TOKEN" "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID" | jq -r '.description')}"
      else
        export MR_TITLE="${CI_MERGE_REQUEST_TITLE:-${CI_COMMIT_TITLE:-$CI_COMMIT_MESSAGE}}"
        export MR_DESCRIPTION="${CI_MERGE_REQUEST_DESCRIPTION:-}"
      fi
    - export SAFE_MR_TITLE="$(echo "$MR_TITLE" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd '[:alnum:]-_.')"
    - export DEPLOY_TAG="${DEPLOY_TAG_PREFIX}-${CI_COMMIT_REF_SLUG}-${SAFE_MR_TITLE}"
    - export COMMIT_MESSAGE_WITH_MR="${CI_COMMIT_MESSAGE}

      Merge Request Title: ${MR_TITLE}

      Merge Request Description:
      ${MR_DESCRIPTION}"
    - git config --global user.email "gitlab-ci@example.com"
    - git config --global user.name "GitLab CI"

build:
  stage: build
  script:
    - echo "Building for MR: $MR_TITLE"
    - echo "$COMMIT_MESSAGE_WITH_MR" > commit-message.txt
    - |
      cat > "$RELEASE_NOTES_FILE" <<EOF
      # Release Notes

      ## ${MR_TITLE}

      ${MR_DESCRIPTION}

      ## Commit
      ${CI_COMMIT_SHA}

      ## Branch
      ${CI_COMMIT_REF_NAME}
      EOF
  artifacts:
    paths:
      - commit-message.txt
      - release-notes.md

test:
  stage: test
  script:
    - echo "Testing feature: $MR_TITLE"
    - test -f "$RELEASE_NOTES_FILE"

deploy:
  stage: deploy
  script:
    - echo "Deploying with tag: $DEPLOY_TAG"
    - git tag -a "$DEPLOY_TAG" -m "$COMMIT_MESSAGE_WITH_MR"
    - git push origin "$DEPLOY_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

notify:
  stage: notify
  script:
    - |
      curl --request POST \
        --header "Content-Type: application/json" \
        --data "{\"text\":\"Deployment complete for MR: ${MR_TITLE}\n\nDescription: ${MR_DESCRIPTION}\n\nTag: ${DEPLOY_TAG}\"}" \
        "${NOTIFICATION_WEBHOOK_URL}"
  rules:
    - if: $NOTIFICATION_WEBHOOK_URL
      when: on_success