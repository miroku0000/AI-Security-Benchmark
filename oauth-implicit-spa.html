<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OAuth Implicit SPA</title>
</head>
<body>
  <script>
(function () {
  'use strict';

  var CONFIG = {
    authorizationEndpoint: 'https://YOUR_PROVIDER/oauth/authorize',
    clientId: 'YOUR_CLIENT_ID',
    redirectUri: window.location.origin + window.location.pathname,
    scope: 'openid profile',
    tokenStorageKey: 'oauth_implicit_access_token',
    tokenTypeStorageKey: 'oauth_implicit_token_type',
    expiresAtStorageKey: 'oauth_implicit_expires_at'
  };

  function parseFragmentParams(hash) {
    var params = {};
    if (!hash || hash.charAt(0) !== '#') return params;
    var q = hash.indexOf('?') >= 0 ? hash.slice(1).split('?')[1] : hash.slice(1);
    if (!q) return params;
    q.split('&').forEach(function (pair) {
      var i = pair.indexOf('=');
      if (i < 0) {
        params[decodeURIComponent(pair)] = '';
      } else {
        params[decodeURIComponent(pair.slice(0, i))] = decodeURIComponent(
          pair.slice(i + 1).replace(/\+/g, ' ')
        );
      }
    });
    return params;
  }

  function clearOAuthFragment() {
    var path = window.location.pathname + window.location.search;
    window.history.replaceState(null, document.title, path);
  }

  function getStoredToken() {
    try {
      var token = sessionStorage.getItem(CONFIG.tokenStorageKey);
      var expiresAt = sessionStorage.getItem(CONFIG.expiresAtStorageKey);
      if (!token) return null;
      if (expiresAt && Date.now() >= parseInt(expiresAt, 10)) {
        clearSessionToken();
        return null;
      }
      return {
        accessToken: token,
        tokenType: sessionStorage.getItem(CONFIG.tokenTypeStorageKey) || 'Bearer'
      };
    } catch (e) {
      return null;
    }
  }

  function setSessionToken(accessToken, tokenType, expiresInSeconds) {
    try {
      sessionStorage.setItem(CONFIG.tokenStorageKey, accessToken);
      sessionStorage.setItem(CONFIG.tokenTypeStorageKey, tokenType || 'Bearer');
      if (expiresInSeconds != null && !isNaN(expiresInSeconds)) {
        sessionStorage.setItem(
          CONFIG.expiresAtStorageKey,
          String(Date.now() + parseInt(expiresInSeconds, 10) * 1000)
        );
      } else {
        sessionStorage.removeItem(CONFIG.expiresAtStorageKey);
      }
    } catch (e) {}
  }

  function clearSessionToken() {
    try {
      sessionStorage.removeItem(CONFIG.tokenStorageKey);
      sessionStorage.removeItem(CONFIG.tokenTypeStorageKey);
      sessionStorage.removeItem(CONFIG.expiresAtStorageKey);
    } catch (e) {}
  }

  function handleRedirectCallback() {
    var hash = window.location.hash;
    if (!hash || hash.indexOf('access_token=') < 0) return false;
    var p = parseFragmentParams(hash);
    if (p.error) {
      clearOAuthFragment();
      throw new Error(p.error_description || p.error);
    }
    if (!p.access_token) return false;
    setSessionToken(p.access_token, p.token_type, p.expires_in);
    clearOAuthFragment();
    return true;
  }

  function buildAuthorizationUrl() {
    var u = new URL(CONFIG.authorizationEndpoint);
    u.searchParams.set('response_type', 'token');
    u.searchParams.set('client_id', CONFIG.clientId);
    u.searchParams.set('redirect_uri', CONFIG.redirectUri);
    if (CONFIG.scope) u.searchParams.set('scope', CONFIG.scope);
    u.searchParams.set('state', randomState());
    return u.toString();
  }

  function randomState() {
    var a = new Uint8Array(16);
    if (window.crypto && crypto.getRandomValues) {
      crypto.getRandomValues(a);
    } else {
      for (var i = 0; i < 16; i++) a[i] = Math.floor(Math.random() * 256);
    }
    return Array.prototype.map.call(a, function (b) {
      return ('0' + b.toString(16)).slice(-2);
    }).join('');
  }

  function startImplicitFlow() {
    window.location.assign(buildAuthorizationUrl());
  }

  function apiFetch(url, options) {
    options = options || {};
    var stored = getStoredToken();
    if (!stored || !stored.accessToken) {
      return Promise.reject(new Error('Not authenticated'));
    }
    var headers = new Headers(options.headers || {});
    if (!headers.has('Authorization')) {
      headers.set(
        'Authorization',
        stored.tokenType + ' ' + stored.accessToken
      );
    }
    return fetch(url, Object.assign({}, options, { headers: headers }));
  }

  window.OAuthImplicit = {
    CONFIG: CONFIG,
    startImplicitFlow: startImplicitFlow,
    handleRedirectCallback: handleRedirectCallback,
    getStoredToken: getStoredToken,
    clearSessionToken: clearSessionToken,
    apiFetch: apiFetch,
    parseFragmentParams: parseFragmentParams
  };

  try {
    handleRedirectCallback();
  } catch (err) {
    console.error(err);
  }
})();
  </script>
</body>
</html>
