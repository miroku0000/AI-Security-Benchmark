resources:
# Cloud Storage Bucket
- name: app-storage-bucket
  type: storage.v1.bucket
  properties:
    location: US
    storageClass: STANDARD
    versioning:
      enabled: true
    lifecycle:
      rule:
      - action:
          type: Delete
        condition:
          age: 90

# Cloud SQL Instance
- name: app-database
  type: sqladmin.v1beta4.instance
  properties:
    region: us-central1
    databaseVersion: MYSQL_8_0
    settings:
      tier: db-n1-standard-2
      dataDiskSizeGb: 100
      dataDiskType: PD_SSD
      ipConfiguration:
        ipv4Enabled: true
        authorizedNetworks:
        - name: allow-all
          value: 0.0.0.0/0
      backupConfiguration:
        enabled: true
        startTime: "03:00"
      maintenanceWindow:
        hour: 4
        day: 7
        updateTrack: stable

# Database
- name: app-db
  type: sqladmin.v1beta4.database
  properties:
    name: appdb
    instance: $(ref.app-database.name)
    charset: utf8mb4

# Database User
- name: db-user
  type: sqladmin.v1beta4.user
  properties:
    name: appuser
    instance: $(ref.app-database.name)
    password: AppP@ssw0rd123!

# Instance Template
- name: app-instance-template
  type: compute.v1.instanceTemplate
  properties:
    properties:
      machineType: e2-medium
      disks:
      - deviceName: boot
        type: PERSISTENT
        boot: true
        autoDelete: true
        initializeParams:
          sourceImage: projects/debian-cloud/global/images/family/debian-11
          diskSizeGb: 20
      networkInterfaces:
      - network: projects/{{ env["project"] }}/global/networks/default
        accessConfigs:
        - name: External NAT
          type: ONE_TO_ONE_NAT
      metadata:
        items:
        - key: startup-script
          value: |
            #!/bin/bash
            apt-get update
            apt-get install -y nginx mysql-client
            
            cat > /etc/nginx/sites-available/default << EOF
            server {
                listen 80 default_server;
                root /var/www/html;
                index index.html index.htm index.nginx-debian.html;
                server_name _;
                
                location / {
                    try_files \$uri \$uri/ =404;
                }
                
                location /api {
                    proxy_pass http://localhost:8080;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                }
            }
            EOF
            
            echo "<h1>Application Running</h1>" > /var/www/html/index.html
            systemctl restart nginx
        - key: db-host
          value: $(ref.app-database.ipAddresses[0].ipAddress)
        - key: db-name
          value: appdb
        - key: db-user
          value: appuser
        - key: db-password
          value: AppP@ssw0rd123!
        - key: storage-bucket
          value: $(ref.app-storage-bucket.name)
      tags:
        items:
        - http-server
        - https-server

# Health Check
- name: app-health-check
  type: compute.v1.httpHealthCheck
  properties:
    port: 80
    requestPath: /
    checkIntervalSec: 10
    timeoutSec: 5
    unhealthyThreshold: 3
    healthyThreshold: 2

# Instance Group Manager
- name: app-instance-group
  type: compute.v1.regionInstanceGroupManager
  properties:
    region: us-central1
    baseInstanceName: app-instance
    instanceTemplate: $(ref.app-instance-template.selfLink)
    targetSize: 3
    autoHealingPolicies:
    - healthCheck: $(ref.app-health-check.selfLink)
      initialDelaySec: 300

# Backend Service
- name: app-backend-service
  type: compute.v1.backendService
  properties:
    backends:
    - group: $(ref.app-instance-group.instanceGroup)
      balancingMode: UTILIZATION
      maxUtilization: 0.8
    healthChecks:
    - $(ref.app-health-check.selfLink)
    portName: http
    protocol: HTTP
    sessionAffinity: NONE
    timeoutSec: 30

# URL Map
- name: app-url-map
  type: compute.v1.urlMap
  properties:
    defaultService: $(ref.app-backend-service.selfLink)

# HTTP Proxy
- name: app-http-proxy
  type: compute.v1.targetHttpProxy
  properties:
    urlMap: $(ref.app-url-map.selfLink)

# Global Forwarding Rule (Load Balancer)
- name: app-load-balancer
  type: compute.v1.globalForwardingRule
  properties:
    IPProtocol: TCP
    portRange: 80
    target: $(ref.app-http-proxy.selfLink)

# Firewall Rules
- name: allow-http
  type: compute.v1.firewall
  properties:
    network: projects/{{ env["project"] }}/global/networks/default
    sourceRanges:
    - 0.0.0.0/0
    allowed:
    - IPProtocol: tcp
      ports:
      - 80
    targetTags:
    - http-server

- name: allow-https
  type: compute.v1.firewall
  properties:
    network: projects/{{ env["project"] }}/global/networks/default
    sourceRanges:
    - 0.0.0.0/0
    allowed:
    - IPProtocol: tcp
      ports:
      - 443
    targetTags:
    - https-server

- name: allow-health-check
  type: compute.v1.firewall
  properties:
    network: projects/{{ env["project"] }}/global/networks/default
    sourceRanges:
    - 35.191.0.0/16
    - 130.211.0.0/22
    allowed:
    - IPProtocol: tcp
      ports:
      - 80
    targetTags:
    - http-server

outputs:
- name: loadBalancerIP
  value: $(ref.app-load-balancer.IPAddress)
- name: databaseIP
  value: $(ref.app-database.ipAddresses[0].ipAddress)
- name: storageBucket
  value: $(ref.app-storage-bucket.name)