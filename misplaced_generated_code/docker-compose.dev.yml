services:
  web:
    image: python:3.12-bookworm
    working_dir: /app
    command: ["sh", "-c", "pip install --no-cache-dir -r requirements.txt && python app.py"]
    environment:
      HOST: "0.0.0.0"
      PORT: "5000"
      REDIS_URL: "redis://redis:6379/0"
      DATABASE_URL: "postgresql://app:app@db:5432/app"
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - dev_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 20

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - dev_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 3s
      timeout: 2s
      retries: 20

volumes:
  dev_redisdata:
  dev_pgdata:
