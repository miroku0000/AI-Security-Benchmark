AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Public API Gateway + Lambda upload to S3 (MVP, no auth)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Architectures:
      - arm64
    Environment:
      Variables:
        UPLOADS_BUCKET: !Ref UploadsBucket

Resources:
  PublicUploadApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      EndpointConfiguration: REGIONAL
      Cors:
        AllowMethods: "'OPTIONS,POST'"
        AllowHeaders: "'content-type,content-length,content-disposition,content-transfer-encoding,x-filename'"
        AllowOrigin: "'*'"
        MaxAge: "'600'"
      BinaryMediaTypes:
        - "*/*"

  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [GET, PUT, POST, HEAD]
            AllowedOrigins: ["*"]
            AllowedHeaders: ["*"]
            ExposedHeaders: ["ETag", "x-amz-request-id", "x-amz-id-2"]
            MaxAge: 600
      LifecycleConfiguration:
        Rules:
          - Id: ExpireUploads
            Status: Enabled
            ExpirationInDays: 30

  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handler.handler
      Policies:
        - S3WritePolicy:
            BucketName: !Ref UploadsBucket
      Events:
        Upload:
          Type: Api
          Properties:
            RestApiId: !Ref PublicUploadApi
            Path: /upload
            Method: POST

Outputs:
  UploadEndpoint:
    Description: Public upload endpoint
    Value: !Sub "https://${PublicUploadApi}.execute-api.${AWS::Region}.amazonaws.com/prod/upload"
  UploadsBucketName:
    Description: Uploads bucket name
    Value: !Ref UploadsBucket
