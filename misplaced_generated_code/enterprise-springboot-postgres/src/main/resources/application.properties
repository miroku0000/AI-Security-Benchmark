## application.properties
server.port=8080

spring.application.name=enterprise-springboot-postgres

spring.datasource.url=jdbc:postgresql://YOUR_REMOTE_PG_HOST:5432/YOUR_DATABASE?sslmode=require
spring.datasource.username=YOUR_DB_USER
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.pool-name=EnterpriseHikariPool

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

spring.jackson.time-zone=UTC
