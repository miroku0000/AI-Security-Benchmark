      serviceAccounts:
        - name: api-gateway
          namespace: microservices
---
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: batch-processor-http
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: batch-processor
  port: 8080
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: batch-processor-allow-order-service
  namespace: microservices
spec:
  server:
    name: batch-processor-http
  client:
    meshTLS:
      serviceAccounts:
        - name: order-service
          namespace: microservices
