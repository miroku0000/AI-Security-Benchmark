---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-processor
  namespace: microservices
  labels:
    app: batch-processor
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: batch-processor
  template:
    metadata:
      labels:
        app: batch-processor
        version: v1
      annotations:
        linkerd.io/inject: enabled
    spec:
      serviceAccountName: batch-processor
      containers:
        - name: batch-processor
          image: ghcr.io/example/batch-processor:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: batch-processor
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: batch-processor
  namespace: microservices
  labels:
    app: batch-processor
spec:
  type: ClusterIP
  selector:
    app: batch-processor
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: api-gateway-http
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  port: 8080
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: api-gateway-http-public
  namespace: microservices
spec:
  server:
    name: api-gateway-http
  client:
    unauthenticated: true
---
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: user-service-http
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: user-service
  port: 8080
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: user-service-allow-api-gateway
  namespace: microservices
spec:
  server:
    name: user-service-http
  client:
    meshTLS:
      serviceAccounts:
        - name: api-gateway
          namespace: microservices
---
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: order-service-http
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: order-service
  port: 8080
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
