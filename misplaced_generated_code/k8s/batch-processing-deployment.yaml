apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-processor
  labels:
    app.kubernetes.io/name: batch-processor
    app.kubernetes.io/component: worker
spec:
  replicas: 3
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: batch-processor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: batch-processor
        app.kubernetes.io/component: worker
    spec:
      terminationGracePeriodSeconds: 120
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - batch-processor
                topologyKey: kubernetes.io/hostname
      containers:
        - name: processor
          image: batch-processor:1.0.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "2000m"
              memory: 2Gi
