syntax = "proto3";

package debug;

option java_multiple_files = true;
option java_package = "com.example.debug.grpc";
option java_outer_classname = "DebugServiceProto";

service DebugService {
  rpc Ping (PingRequest) returns (PingResponse);
  rpc SimulateDbFailure (SimulateDbFailureRequest) returns (SimulateDbFailureResponse);
}

message PingRequest {
  string client_id = 1;
}

message PingResponse {
  string message = 1;
}

message SimulateDbFailureRequest {
  string scenario = 1;
}

message SimulateDbFailureResponse {
  string result = 1;
}
