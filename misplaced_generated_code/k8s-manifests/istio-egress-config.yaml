apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: stripe-api-routing
  namespace: production
  labels:
    app.kubernetes.io/part-of: egress-config
spec:
  hosts:
    - api.stripe.com
  tls:
    - match:
        - port: 443
          sniHosts:
            - api.stripe.com
      route:
        - destination:
            host: api.stripe.com
            port:
              number: 443
          weight: 100
  exportTo:
    - "."
---
