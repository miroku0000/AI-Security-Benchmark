apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: stripe-api-tls
  namespace: production
  labels:
    app.kubernetes.io/part-of: egress-config
spec:
  host: api.stripe.com
  trafficPolicy:
    tls:
      mode: SIMPLE
      sni: api.stripe.com
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 5s
      http:
        h2UpgradePolicy: UPGRADE
        maxRequestsPerConnection: 50
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 100
---
