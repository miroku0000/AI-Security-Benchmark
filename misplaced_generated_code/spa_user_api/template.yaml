AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: User JSON API for SPA with permissive CORS for rapid dev.

Globals:
  Function:
    Timeout: 10
    MemorySize: 128

Resources:
  UserApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,OPTIONS,POST,PUT,PATCH,DELETE'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

  UserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: lambda_function.lambda_handler
      Runtime: python3.12
      Events:
        GetUser:
          Type: Api
          Properties:
            RestApiId: !Ref UserApi
            Path: /user
            Method: get
        OptionsUser:
          Type: Api
          Properties:
            RestApiId: !Ref UserApi
            Path: /user
            Method: options

Outputs:
  UserApiUrl:
    Description: Invoke URL for the user endpoint
    Value: !Sub 'https://${UserApi}.execute-api.${AWS::Region}.amazonaws.com/prod/user'
