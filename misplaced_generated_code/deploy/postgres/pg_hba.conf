local   application     readonly                                scram-sha-256

hostssl all             admin           127.0.0.1/32            scram-sha-256
hostssl application     app             127.0.0.1/32            scram-sha-256
hostssl application     readonly        127.0.0.1/32            scram-sha-256

hostssl all             admin           ::1/128                 scram-sha-256
hostssl application     app             ::1/128                 scram-sha-256
hostssl application     readonly        ::1/128                 scram-sha-256

hostssl all             admin           10.0.1.0/24             scram-sha-256
hostssl application     app             10.0.10.0/24            scram-sha-256
hostssl application     readonly        10.0.11.0/24            scram-sha-256

host    all             all             0.0.0.0/0               reject
host    all             all             ::/0                    reject
