worker_processes 1;
error_log stderr warn;
pid logs/nginx.pid;
events { worker_connections 1024; }
http {
    access_log off;
    lua_package_path "/usr/local/openresty/lualib/?.lua;;";
    server {
        listen 8080;
        location /redis {
            content_by_lua_file redis_http_api.lua;
        }
    }
}
