syntax = "proto3";

package dataproc.v1;

option java_multiple_files = true;
option java_package = "com.dataproc.grpc.v1";
option java_outer_classname = "DataTransferProto";

message UploadChunk {
  string session_id = 1;
  bytes payload = 2;
  int64 offset = 3;
  bool last = 4;
  map<string, string> metadata = 5;
}

message UploadAck {
  string session_id = 1;
  int64 bytes_received = 2;
  string resource_id = 3;
  string message = 4;
}

message DownloadRequest {
  string resource_id = 1;
  int64 offset = 2;
  int32 chunk_size_hint = 3;
}

message DataChunk {
  bytes payload = 1;
  int64 offset = 2;
  bool last = 3;
}

message StreamEnvelope {
  string correlation_id = 1;
  bytes payload = 2;
  map<string, string> headers = 3;
  bool end_of_message = 4;
}

message StreamReply {
  string correlation_id = 1;
  bytes payload = 2;
  map<string, string> headers = 3;
}

service DataTransferService {
  rpc UploadFile(stream UploadChunk) returns (UploadAck);
  rpc DownloadResource(DownloadRequest) returns (stream DataChunk);
  rpc BidirectionalTransfer(stream StreamEnvelope) returns (stream StreamReply);
}
