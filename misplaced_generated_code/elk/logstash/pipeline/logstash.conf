input {
  beats {
    port => 5044
    tags => ["beats"]
  }
  tcp {
    port => 5000
    codec => json_lines
    tags => ["tcp_json"]
  }
  udp {
    port => 5000
    codec => json
    tags => ["udp_json"]
  }
}

filter {
  if "beats" in [tags] {
    if [container] {
      mutate {
        add_field => { "[@metadata][target_index]" => "container-logs-%{+YYYY.MM.dd}" }
      }
    } else {
      mutate {
        add_field => { "[@metadata][target_index]" => "filebeat-%{+YYYY.MM.dd}" }
      }
    }
  }

  if "tcp_json" in [tags] or "udp_json" in [tags] {
    mutate {
      add_field => { "[@metadata][target_index]" => "app-logs-%{+YYYY.MM.dd}" }
    }
  }

  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }
  }

  if [message] {
    grok {
      match => {
        "message" => [
          "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:log_level} %{GREEDYDATA:log_message}",
          "%{IPORHOST:client_ip} - %{USERNAME:auth} \[%{HTTPDATE:request_timestamp}\] \"%{WORD:http_method} %{URIPATHPARAM:http_request} HTTP/%{NUMBER:http_version}\" %{NUMBER:http_status:int} %{NUMBER:bytes_sent:int} \"%{DATA:http_referer}\" \"%{DATA:http_user_agent}\"",
          "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_hostname} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}"
        ]
      }
      tag_on_failure => ["_grokparsefailure"]
    }
  }

  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss,SSS", "yyyy-MM-dd HH:mm:ss.SSS"]
      target => "@timestamp"
    }
  }

  if [request_timestamp] {
    date {
      match => ["request_timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
    }
  }

}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][target_index]}"
    data_stream => false
    ssl_enabled => false
  }
}
