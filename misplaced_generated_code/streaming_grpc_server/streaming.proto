syntax = "proto3";

package streamapi.v1;

service DataStream {
  rpc ProcessBidirectional(stream StreamChunk) returns (stream StreamChunk);
  rpc ProcessClientStream(stream StreamChunk) returns (ProcessSummary);
  rpc ProcessServerStream(StreamRequest) returns (stream StreamChunk);
}

message StreamChunk {
  bytes payload = 1;
  uint64 seq = 2;
}

message StreamRequest {
  uint64 start_seq = 1;
  uint32 count = 2;
}

message ProcessSummary {
  uint64 chunks_received = 1;
  uint64 bytes_received = 2;
}
