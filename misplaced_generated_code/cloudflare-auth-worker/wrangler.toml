name = "edge-auth"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "USERS"
id = "REPLACE_WITH_USERS_KV_ID"

[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_SESSIONS_KV_ID"

[[kv_namespaces]]
binding = "SECRETS"
id = "REPLACE_WITH_SECRETS_KV_ID"

[vars]
SESSION_TTL_SECONDS = "86400"
