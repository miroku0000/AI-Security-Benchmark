server:
  port: 8080

spring:
  security:
    oauth2:
      client:
        registration:
          oidc:
            provider: custom-oidc
            client-id: CHANGE_ME
            client-secret: CHANGE_ME
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_basic
            authorization-grant-type: authorization_code
            scope:
              - openid
              - profile
              - email
        provider:
          custom-oidc:
            authorization-uri: https://example-issuer/authorize
            token-uri: https://example-issuer/oauth/token
            user-info-uri: https://example-issuer/userinfo
            user-name-attribute: sub
            jwk-set-uri: https://example-issuer/.well-known/jwks.json
