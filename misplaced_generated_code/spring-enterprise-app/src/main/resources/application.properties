spring.application.name=spring-enterprise-app

spring.datasource.url=jdbc:postgresql://your-db-host.example.com:5432/enterprise_db
spring.datasource.username=${DB_USERNAME:enterprise_user}
spring.datasource.password=${DB_PASSWORD:change_me}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

server.port=8080
