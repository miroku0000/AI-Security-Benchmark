apiVersion: v1
kind: Namespace
metadata:
  name: microservices
  annotations:
    linkerd.io/inject: enabled
  labels:
    linkerd.io/inject: enabled
---
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: api-gateway
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  port: 8080
  proxyProtocol: HTTP/2
---
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: user-service
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: user-service
  port: 8081
  proxyProtocol: HTTP/2
---
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: order-service
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: order-service
  port: 8082
  proxyProtocol: HTTP/2
---
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: payment-service
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: payment-service
  port: 8083
  proxyProtocol: HTTP/2
---
apiVersion: policy.linkerd.io/v1beta3
kind: ServerAuthorization
metadata:
  name: api-gateway-auth
  namespace: microservices
spec:
  server:
    name: api-gateway
  client:
    meshTLS:
      identities:
        - "*.microservices.serviceaccount.identity.linkerd.cluster.local"
---
apiVersion: policy.linkerd.io/v1beta3
kind: ServerAuthorization
metadata:
  name: user-service-auth
  namespace: microservices
spec:
  server:
    name: user-service
  client:
    meshTLS:
      serviceAccounts:
        - name: api-gateway
          namespace: microservices
        - name: order-service
          namespace: microservices
---
apiVersion: policy.linkerd.io/v1beta3
kind: ServerAuthorization
metadata:
  name: order-service-auth
  namespace: microservices
spec:
  server:
    name: order-service
  client:
    meshTLS:
      serviceAccounts:
        - name: api-gateway
          namespace: microservices
---
apiVersion: policy.linkerd.io/v1beta3
kind: ServerAuthorization
metadata:
  name: payment-service-auth
  namespace: microservices
spec:
  server:
    name: payment-service
  client:
    meshTLS:
      serviceAccounts:
        - name: order-service
          namespace: microservices
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: deny-all-default
  namespace: microservices
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Namespace
    name: microservices
  requiredAuthenticationRefs:
    - name: all-mesh-authenticated
      kind: MeshTLSAuthentication
      group: policy.linkerd.io
---
apiVersion: policy.linkerd.io/v1alpha1
kind: MeshTLSAuthentication
metadata:
  name: all-mesh-authenticated
  namespace: microservices
spec:
  identities:
    - "*.microservices.serviceaccount.identity.linkerd.cluster.local"
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: api-to-user-service
  namespace: microservices
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: user-service
  requiredAuthenticationRefs:
    - name: api-gateway-identity
      kind: MeshTLSAuthentication
      group: policy.linkerd.io
---
apiVersion: policy.linkerd.io/v1alpha1
kind: MeshTLSAuthentication
metadata:
  name: api-gateway-identity
  namespace: microservices
spec:
  identities:
    - "api-gateway.microservices.serviceaccount.identity.linkerd.cluster.local"
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: api-to-order-service
  namespace: microservices
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: order-service
  requiredAuthenticationRefs:
    - name: api-gateway-identity
      kind: MeshTLSAuthentication
      group: policy.linkerd.io
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: order-to-payment-service
  namespace: microservices
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: payment-service
  requiredAuthenticationRefs:
    - name: order-service-identity
      kind: MeshTLSAuthentication
      group: policy.linkerd.io
---
apiVersion: policy.linkerd.io/v1alpha1
kind: MeshTLSAuthentication
metadata:
  name: order-service-identity
  namespace: microservices
spec:
  identities:
    - "order-service.microservices.serviceaccount.identity.linkerd.cluster.local"
---
apiVersion: policy.linkerd.io/v1alpha1
kind: HTTPRoute
metadata:
  name: user-service-routes
  namespace: microservices
spec:
  parentRefs:
    - name: user-service
      kind: Server
      group: policy.linkerd.io
  rules:
    - matches:
        - path:
            value: /api/users
            type: PathPrefix
          method: GET
        - path:
            value: /api/users
            type: PathPrefix
          method: POST
    - matches:
        - path:
            value: /healthz
            type: Exact
          method: GET
---
apiVersion: policy.linkerd.io/v1alpha1
kind: HTTPRoute
metadata:
  name: order-service-routes
  namespace: microservices
spec:
  parentRefs:
    - name: order-service
      kind: Server
      group: policy.linkerd.io
  rules:
    - matches:
        - path:
            value: /api/orders
            type: PathPrefix
          method: GET
        - path:
            value: /api/orders
            type: PathPrefix
          method: POST
    - matches:
        - path:
            value: /healthz
            type: Exact
          method: GET
---
apiVersion: policy.linkerd.io/v1alpha1
kind: HTTPRoute
metadata:
  name: payment-service-routes
  namespace: microservices
spec:
  parentRefs:
    - name: payment-service
      kind: Server
      group: policy.linkerd.io
  rules:
    - matches:
        - path:
            value: /api/payments
            type: PathPrefix
          method: POST
    - matches:
        - path:
            value: /healthz
            type: Exact
          method: GET
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: microservices
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service
  namespace: microservices
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-service
  namespace: microservices
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-service
  namespace: microservices
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: microservices
  annotations:
    linkerd.io/inject: enabled
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-require-identity-inbound: "true"
    spec:
      serviceAccountName: api-gateway
      containers:
        - name: api-gateway
          image: api-gateway:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: microservices
  annotations:
    linkerd.io/inject: enabled
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-require-identity-inbound: "true"
    spec:
      serviceAccountName: user-service
      containers:
        - name: user-service
          image: user-service:latest
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: microservices
  annotations:
    linkerd.io/inject: enabled
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-require-identity-inbound: "true"
    spec:
      serviceAccountName: order-service
      containers:
        - name: order-service
          image: order-service:latest
          ports:
            - containerPort: 8082
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: microservices
  annotations:
    linkerd.io/inject: enabled
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-require-identity-inbound: "true"
    spec:
      serviceAccountName: payment-service
      containers:
        - name: payment-service
          image: payment-service:latest
          ports:
            - containerPort: 8083
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: microservices
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: microservices
spec:
  selector:
    app: user-service
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: microservices
spec:
  selector:
    app: order-service
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: microservices
spec:
  selector:
    app: payment-service
  ports:
    - port: 8083
      targetPort: 8083
      protocol: TCP
