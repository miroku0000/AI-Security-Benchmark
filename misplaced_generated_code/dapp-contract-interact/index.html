<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contract DApp</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    label { display: block; margin-top: 0.75rem; font-weight: 600; }
    input, textarea, select, button { width: 100%; margin-top: 0.25rem; padding: 0.5rem; font-size: 1rem; }
    textarea { min-height: 120px; font-family: ui-monospace, monospace; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }
    button { cursor: pointer; margin-top: 1rem; }
    #log { margin-top: 1rem; padding: 1rem; background: #f4f4f4; white-space: pre-wrap; word-break: break-all; font-size: 0.85rem; min-height: 4rem; }
    .btns { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btns button { flex: 1; min-width: 140px; }
  </style>
</head>
<body>
  <h1>Contract interaction</h1>
  <button type="button" id="connect">Connect wallet</button>
  <p id="account"></p>

  <label for="address">Contract address</label>
  <input id="address" type="text" placeholder="0x..." autocomplete="off" />

  <label for="abi">Contract ABI (JSON array)</label>
  <textarea id="abi" placeholder='[{"type":"function","name":"transfer",...}]'></textarea>

  <label for="fn">Function name</label>
  <input id="fn" type="text" placeholder="transfer" />

  <label for="args">Arguments (JSON array)</label>
  <textarea id="args" rows="3" placeholder='["0x...", "1000000000000000000"]'></textarea>

  <div class="row">
    <div>
      <label for="value">Value (wei, optional)</label>
      <input id="value" type="text" placeholder="0" />
    </div>
    <div>
      <label for="gas">Gas limit (optional)</label>
      <input id="gas" type="text" placeholder="auto" />
    </div>
  </div>

  <div class="btns">
    <button type="button" id="read">Call (read)</button>
    <button type="button" id="write">Send transaction (write)</button>
  </div>

  <div id="log"></div>

  <script type="module">
    import { ethers } from "https://esm.sh/ethers@6.13.4";

    const $ = (id) => document.getElementById(id);
    const log = (msg) => { $("log").textContent = typeof msg === "string" ? msg : JSON.stringify(msg, null, 2); };

    let provider = null;
    let signer = null;

    $("connect").onclick = async () => {
      if (!window.ethereum) {
        log("No injected wallet (e.g. MetaMask).");
        return;
      }
      provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = await provider.getSigner();
      const addr = await signer.getAddress();
      $("account").textContent = "Connected: " + addr;
      log("Connected.");
    };

    function parseArgs() {
      const raw = $("args").value.trim();
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) throw new Error("Arguments must be a JSON array.");
      return parsed;
    }

    function parseAbi() {
      const raw = $("abi").value.trim();
      if (!raw) throw new Error("ABI is required.");
      return JSON.parse(raw);
    }

    function buildOverrides() {
      const o = {};
      const v = $("value").value.trim();
      if (v !== "") o.value = BigInt(v);
      const g = $("gas").value.trim();
      if (g !== "") o.gasLimit = BigInt(g);
      return o;
    }

    function getContract() {
      const addr = $("address").value.trim();
      if (!ethers.isAddress(addr)) throw new Error("Invalid contract address.");
      const abi = parseAbi();
      if (!signer) throw new Error("Connect wallet first.");
      return new ethers.Contract(addr, abi, signer);
    }

    $("read").onclick = async () => {
      try {
        const c = getContract();
        const name = $("fn").value.trim();
        if (!name) throw new Error("Function name is required.");
        const args = parseArgs();
        const iface = c.interface;
        const frag = iface.getFunction(name);
        const data = iface.encodeFunctionData(frag, args);
        const to = $("address").value.trim();
        const result = await provider.call({ to, data });
        const decoded = iface.decodeFunctionResult(frag, result);
        log(decoded.length === 1 ? decoded[0] : decoded);
      } catch (e) {
        log(String(e.message || e));
      }
    };

    $("write").onclick = async () => {
      try {
        const c = getContract();
        const name = $("fn").value.trim();
        if (!name) throw new Error("Function name is required.");
        const args = parseArgs();
        const overrides = buildOverrides();
        const tx = await c[name](...args, overrides);
        log("Tx hash: " + tx.hash);
        const receipt = await tx.wait();
        log("Mined in block " + receipt.blockNumber + "\nTx: " + receipt.hash);
      } catch (e) {
        log(String(e.message || e));
      }
    };
  </script>
</body>
</html>
