syntax = "proto3";

package datatransfer.v1;

option java_multiple_files = true;
option java_package = "com.dataprocessing.grpc.v1";
option java_outer_classname = "DataTransferProto";

service DataTransferService {
  rpc UploadFile(stream FileChunk) returns (UploadResult);
  rpc DownloadFile(FileRequest) returns (stream FileChunk);
  rpc BidirectionalPipe(stream DataPacket) returns (stream DataPacket);
}

message FileChunk {
  string upload_id = 1;
  string relative_path = 2;
  uint64 offset = 3;
  bool final_chunk = 4;
  bytes data = 5;
  map<string, string> headers = 6;
}

message UploadResult {
  string upload_id = 1;
  uint64 bytes_written = 2;
  string stored_path = 3;
  string checksum_sha256 = 4;
  map<string, string> metadata = 5;
}

message FileRequest {
  string resource_id = 1;
  uint64 offset = 2;
  uint64 max_bytes = 3;
  map<string, string> headers = 4;
}

message DataPacket {
  string correlation_id = 1;
  uint64 sequence = 2;
  bool client_done = 3;
  bytes payload = 4;
  map<string, string> attributes = 5;
}
