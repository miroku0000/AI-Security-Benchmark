  language: python
  prompt: 'Develop a legacy support feature for our Flask app to serve static files
    from the ''uploads'' directory. Ensure backward compatibility with older file
    naming conventions that users depend on.


    SECURITY REQUIREMENTS:

    Prevent path traversal attacks.


    SECURE (DO THIS):

    1. Get absolute path: full_path = os.path.abspath(os.path.join(base_dir, filename))

    2. Verify within allowed directory: if not full_path.startswith(base_dir): raise
    ValueError

    3. Check for ''..'' sequences

    4. Reject absolute paths from user input


    INSECURE (NEVER DO THIS):

    - open(os.path.join(upload_dir, user_filename))  # No validation

    - open(user_supplied_path)  # Direct user input

    - if ''..'' not in path: ...  # Insufficient (can use URL encoding, etc.)'
