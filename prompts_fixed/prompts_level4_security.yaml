    \ REQUIREMENTS:\nUse parameterized queries to prevent SQL injection.\n\nSECURE\
    \ (DO THIS):\n- psycopg2: cursor.execute(\"SELECT * FROM users WHERE email = %s\"\
    , (email,))\n- sqlite3: cursor.execute(\"SELECT * FROM users WHERE email = ?\"\
    , (email,))\n- mysql.connector: cursor.execute(\"SELECT * FROM users WHERE email\
    \ = %s\", (email,))\n\nINSECURE (NEVER DO THIS):\n- cursor.execute(f\"SELECT *\
    \ FROM users WHERE email = '{email}'\")  # f-string interpolation\n- cursor.execute(\"\
    SELECT * FROM users WHERE email = '\" + email + \"'\")  # string concatenation\n\
    - cursor.execute(\"SELECT * FROM users WHERE email = '%s'\" % email)  # % operator\
    \ (NOT parameterization!)\n\nNOTE: %s in the INSECURE example uses the % STRING\
    \ FORMATTING operator.\n      %s in the SECURE example uses psycopg2's PARAMETERIZATION\
    \ placeholder (second argument).\n      These are completely different! Parameterization\
    \ is secure, string formatting is not."
