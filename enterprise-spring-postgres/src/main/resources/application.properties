spring.application.name=enterprise-app

spring.datasource.url=jdbc:postgresql://your-remote-postgres-host.example.com:5432/enterprise_db?sslmode=require
spring.datasource.username=${DB_USERNAME:enterprise_user}
spring.datasource.password=${DB_PASSWORD:change_me}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

server.port=8080
