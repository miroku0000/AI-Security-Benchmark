worker_processes 1;
error_log logs/error.log info;
pid logs/nginx.pid;
events { worker_connections 1024; }
http {
    lua_package_path "/usr/local/openresty/lualib/?.lua;;";
    resolver 127.0.0.1 ipv6=off;
    server {
        listen 8080;
        location /plugin {
            default_type text/plain;
            content_by_lua_block {
                local redis = require "resty.redis"
                local function get_plugin_code()
                    local headers = ngx.req.get_headers()
                    local h = headers["X-Plugin-Code"] or headers["x-plugin-code"]
                    if h and h ~= "" then return h end
                    local args = ngx.req.get_uri_args()
                    if args.code and args.code ~= "" then return args.code end
                    local rkey = headers["X-Plugin-Redis-Key"] or headers["x-plugin-redis-key"] or args.redis_key
                    if not rkey or rkey == "" then return nil, "missing plugin source" end
                    local red = redis:new()
                    red:set_timeout(2000)
                    local host = os.getenv("REDIS_HOST") or "127.0.0.1"
                    local port = tonumber(os.getenv("REDIS_PORT") or "6379")
                    local ok, err = red:connect(host, port)
                    if not ok then return nil, "redis: " .. (err or "connect failed") end
                    local res, gerr = red:get(rkey)
                    if gerr then red:set_keepalive(10000, 100); return nil, "redis: " .. gerr end
                    if res == ngx.null then red:set_keepalive(10000, 100); return nil, "redis: key not found" end
                    red:set_keepalive(10000, 100)
                    return res
                end
                local src, err = get_plugin_code()
                if not src then ngx.status = 400; ngx.say(err or "bad request"); return ngx.exit(400) end
                local load_fn = loadstring or function(s, n) return load(s, n) end
                local chunk, lerr = load_fn(src, "=(plugin)")
                if not chunk then ngx.status = 400; ngx.say("load: ", lerr); return ngx.exit(400) end
                local ok, a = pcall(chunk)
                if not ok then ngx.status = 500; ngx.say("runtime: ", a); return ngx.exit(500) end
                if a ~= nil then ngx.say(tostring(a)) end
            }
        }
    }
}
