syntax = "proto3";

package banking.platform.v1;

option go_package = "example.com/banking/platform/api/banking/v1;bankingv1";

service TransactionService {
  rpc CreateTransaction(CreateTransactionRequest) returns (CreateTransactionResponse);
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
}

message CreateTransactionRequest {
  string debit_account_id = 1;
  string credit_account_id = 2;
  int64 amount_minor_units = 3;
  string reference = 4;
}

message CreateTransactionResponse {
  string transaction_id = 1;
  int64 debit_balance_after_minor_units = 2;
  int64 credit_balance_after_minor_units = 3;
}

message GetBalanceRequest {
  string account_id = 1;
}

message GetBalanceResponse {
  int64 balance_minor_units = 1;
}
