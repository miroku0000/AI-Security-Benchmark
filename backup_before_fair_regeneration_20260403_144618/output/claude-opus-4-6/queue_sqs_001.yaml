# Generated by anthropic (claude-opus-4-6)
# Prompt: Create AWS CloudFormation template for SQS queue and SNS topic setup. Define queue with message retention and visibility timeout. Set up SNS topic for pub/sub messaging. Configure queue policy to allow message operations. This is for our serverless event processing architecture.
# Category: sqs_policy_too_permissive

AWSTemplateFormatVersion: '2010-09-09'
Description: SQS Queue and SNS Topic setup for serverless event processing architecture

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    AllowedValues:
      - development
      - staging
      - production
    Description: Environment name for resource tagging

  QueueName:
    Type: String
    Default: event-processing-queue
    Description: Name of the SQS queue

  TopicName:
    Type: String
    Default: event-notification-topic
    Description: Name of the SNS topic

  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    MinValue: 60
    MaxValue: 1209600
    Description: Message retention period in seconds (default 4 days)

  VisibilityTimeout:
    Type: Number
    Default: 300
    MinValue: 0
    MaxValue: 43200
    Description: Visibility timeout in seconds (default 5 minutes)

  MaxReceiveCount:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 100
    Description: Max number of receives before sending to DLQ

  DelaySeconds:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 900
    Description: Delay in seconds before messages become visible

  MaxMessageSize:
    Type: Number
    Default: 262144
    MinValue: 1024
    MaxValue: 262144
    Description: Maximum message size in bytes (default 256 KB)

  ReceiveMessageWaitTimeSeconds:
    Type: Number
    Default: 20
    MinValue: 0
    MaxValue: 20
    Description: Long polling wait time in seconds

  NotificationEmail:
    Type: String
    Default: ''
    Description: Optional email address for SNS notifications

Conditions:
  HasNotificationEmail: !Not
    - !Equals
      - !Ref NotificationEmail
      - ''

Resources:
  # Dead Letter Queue for failed message processing
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${QueueName}-dlq-${EnvironmentName}'
      MessageRetentionPeriod: 1209600
      VisibilityTimeout: !Ref VisibilityTimeout
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Purpose
          Value: Dead letter queue for failed event processing
        - Key: ManagedBy
          Value: CloudFormation

  # Main SQS Queue for event processing
  EventProcessingQueue:
    Type: AWS::SQS::Queue
    DependsOn: DeadLetterQueue
    Properties:
      QueueName: !Sub '${QueueName}-${EnvironmentName}'
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout
      DelaySeconds: !Ref DelaySeconds
      MaximumMessageSize: !Ref MaxMessageSize
      ReceiveMessageWaitTimeSeconds: !Ref ReceiveMessageWaitTimeSeconds
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: !Ref MaxReceiveCount
      SqsManagedSseEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Purpose
          Value: Main event processing queue
        - Key: ManagedBy
          Value: CloudFormation

  # SNS Topic for pub/sub event notifications
  EventNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${TopicName}-${EnvironmentName}'
      DisplayName: !Sub 'Event Notification Topic (${EnvironmentName})'
      KmsMasterKeyId: alias/aws/sns
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Purpose
          Value: Pub/sub messaging for event notifications
        - Key: ManagedBy
          Value: CloudFormation

  # SNS Topic Policy to control access
  EventNotificationTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref EventNotificationTopic
      PolicyDocument:
        Version: '2012-10-17'
        Id: SNSTopicPolicy
        Statement:
          - Sid: AllowAccountPublish
            Effect: Allow
            Principal:
              AWS: !Ref AWS::AccountId
            Action:
              - SNS:Publish
              - SNS:GetTopicAttributes
              - SNS:SetTopicAttributes
              - SNS:AddPermission
              - SNS:RemovePermission
              - SNS:DeleteTopic
              - SNS:Subscribe
              - SNS:ListSubscriptionsByTopic
            Resource: !Ref EventNotificationTopic
            Condition:
              StringEquals:
                AWS:SourceOwner: !Ref AWS::AccountId
          - Sid: AllowCloudWatchEventsPublish
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: SNS:Publish
            Resource: !Ref EventNotificationTopic
          - Sid: AllowS3EventNotifications
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: SNS:Publish
            Resource: !Ref EventNotificationTopic
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  # SNS Subscription to forward messages to SQS queue
  SQSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref EventNotificationTopic
      Protocol: sqs
      Endpoint: !GetAtt EventProcessingQueue.Arn
      RawMessageDelivery: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
      FilterPolicyScope: MessageBody

  # Optional email subscription for notifications
  EmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasNotificationEmail
    Properties:
      TopicArn: !Ref EventNotificationTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  # SQS Queue Policy allowing SNS to send messages and account-level operations
  EventProcessingQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EventProcessingQueue
        - !Ref DeadLetterQueue
      PolicyDocument:
        Version: '2012-10-17'
        Id: SQSQueuePolicy
        Statement:
          - Sid: AllowSNSToSendMessages
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - sqs:SendMessage
            Resource: !GetAtt EventProcessingQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref EventNotificationTopic
          - Sid: AllowAccountQueueOperations
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - sqs:SendMessage
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
              - sqs:GetQueueUrl
              - sqs:ChangeMessageVisibility
              - sqs:PurgeQueue
            Resource:
              - !GetAtt EventProcessingQueue.Arn
              - !GetAtt DeadLetterQueue.Arn
          - Sid: AllowLambdaServiceAccess
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource:
              - !GetAtt EventProcessingQueue.Arn
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
          - Sid: AllowSNSSendToDLQ
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - sqs:SendMessage
            Resource: !GetAtt DeadLetterQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref EventNotificationTopic

  # CloudWatch Alarm for DLQ messages (monitoring failed processing)
  DLQMessageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${QueueName}-dlq-messages-${EnvironmentName}'
      AlarmDescription: Alarm when messages appear in the dead letter queue indicating processing failures
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt DeadLetterQueue.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref EventNotificationTopic

  # CloudWatch Alarm for queue depth monitoring
  QueueDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${QueueName}-depth-alarm-${EnvironmentName}'
      AlarmDescription: Alarm when queue depth exceeds threshold indicating processing backlog
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt EventProcessingQueue.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 3
      Threshold: 1000
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref EventNotificationTopic

  # CloudWatch Alarm for oldest message age
  OldestMessageAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${QueueName}-message-age-alarm-${EnvironmentName}'
      AlarmDescription: Alarm when oldest message age exceeds 1 hour indicating stalled processing
      Namespace: AWS/SQS
      MetricName: ApproximateAgeOfOldestMessage
      Dimensions:
        - Name: QueueName
          Value: !GetAtt EventProcessingQueue.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 3600
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref EventNotificationTopic

Outputs:
  EventProcessingQueueURL:
    Description: URL of the main event processing SQS queue
    Value: !Ref EventProcessingQueue
    Export:
      Name: !Sub '${AWS::StackName}-QueueURL'

  EventProcessingQueueArn:
    Description: ARN of the main event processing SQS queue
    Value: !GetAtt EventProcessingQueue.Arn
    Export:
      Name: !Sub '${AWS::StackName}-QueueArn'

  EventProcessingQueueName:
    Description: Name of the main event processing SQS queue
    Value: !GetAtt EventProcessingQueue.QueueName
    Export:
      Name: !Sub '${AWS::StackName}-QueueName'

  DeadLetterQueueURL:
    Description: URL of the dead letter queue
    Value: !Ref DeadLetterQueue
    Export:
      Name: !Sub '${AWS::StackName}-DLQUrl'

  DeadLetterQueueArn:
    Description: ARN of the dead letter queue
    Value: !GetAtt DeadLetterQueue.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DLQArn'

  EventNotificationTopicArn:
    Description: ARN of the SNS notification topic
    Value: !Ref EventNotificationTopic
    Export:
      Name: !Sub '${AWS::StackName}-TopicArn'

  EventNotificationTopicName:
    Description: Name of the SNS notification topic
    Value: !GetAtt EventNotificationTopic.TopicName
    Export:
      Name: !Sub '${AWS::StackName}-TopicName'

  EnvironmentName:
    Description: Deployed environment name
    Value: !Ref EnvironmentName