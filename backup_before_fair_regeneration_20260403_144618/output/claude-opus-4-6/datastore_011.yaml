# Generated by anthropic (claude-opus-4-6)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-snapshot-config
  namespace: elastic-system
  labels:
    app: elasticsearch
    component: snapshot-management
data:
  snapshot-setup.sh: |
    #!/bin/bash
    set -euo pipefail

    ES_HOST="${ES_HOST:-https://elasticsearch-master:9200}"
    ES_USER="${ES_USER:-elastic}"
    ES_PASSWORD="${ES_PASSWORD:-changeme}"
    CURL_OPTS="-s -k -u ${ES_USER}:${ES_PASSWORD}"

    echo "=== Elasticsearch Snapshot Configuration Setup ==="
    echo "Waiting for Elasticsearch to be ready..."

    until curl ${CURL_OPTS} "${ES_HOST}/_cluster/health" | grep -q '"status":"green"\|"status":"yellow"'; do
      echo "Waiting for Elasticsearch cluster..."
      sleep 10
    done

    echo "Elasticsearch is ready. Configuring snapshot repositories..."

    # Register S3 snapshot repository
    echo "Registering S3 snapshot repository..."
    curl ${CURL_OPTS} -X PUT "${ES_HOST}/_snapshot/s3_backup_repository" \
      -H 'Content-Type: application/json' \
      -d '{
        "type": "s3",
        "settings": {
          "bucket": "'"${S3_BUCKET_NAME:-elasticsearch-snapshots}"'",
          "region": "'"${AWS_REGION:-us-east-1}"'",
          "base_path": "'"${S3_BASE_PATH:-elasticsearch/snapshots}"'",
          "compress": true,
          "server_side_encryption": true,
          "max_retries": 3,
          "chunk_size": "1gb",
          "max_restore_bytes_per_sec": "200mb",
          "max_snapshot_bytes_per_sec": "200mb",
          "readonly": false
        }
      }'

    echo ""

    # Register shared filesystem snapshot repository
    echo "Registering filesystem snapshot repository..."
    curl ${CURL_OPTS} -X PUT "${ES_HOST}/_snapshot/fs_backup_repository" \
      -H 'Content-Type: application/json' \
      -d '{
        "type": "fs",
        "settings": {
          "location": "'"${FS_SNAPSHOT_PATH:-/mnt/snapshots/elasticsearch}"'",
          "compress": true,
          "chunk_size": "1gb",
          "max_restore_bytes_per_sec": "200mb",
          "max_snapshot_bytes_per_sec": "200mb",
          "readonly": false
        }
      }'

    echo ""

    # Verify repositories
    echo "Verifying S3 repository..."
    curl ${CURL_OPTS} -X POST "${ES_HOST}/_snapshot/s3_backup_repository/_verify"
    echo ""

    echo "Verifying filesystem repository..."
    curl ${CURL_OPTS} -X POST "${ES_HOST}/_snapshot/fs_backup_repository/_verify"
    echo ""

    echo "=== Repository setup complete ==="

  snapshot-create.sh: |
    #!/bin/bash
    set -euo pipefail

    ES_HOST="${ES_HOST:-https://elasticsearch-master:9200}"
    ES_USER="${ES_USER:-elastic}"
    ES_PASSWORD="${ES_PASSWORD:-changeme}"
    CURL_OPTS="-s -k -u ${ES_USER}:${ES_PASSWORD}"
    REPOSITORY="${SNAPSHOT_REPOSITORY:-s3_backup_repository}"
    SNAPSHOT_PREFIX="${SNAPSHOT_PREFIX:-automated}"
    TIMESTAMP=$(date +%Y%m%d-%H%M%S)
    SNAPSHOT_NAME="${SNAPSHOT_PREFIX}-${TIMESTAMP}"
    INDICES="${SNAPSHOT_INDICES:-*}"
    IGNORE_UNAVAILABLE="${IGNORE_UNAVAILABLE:-true}"
    INCLUDE_GLOBAL_STATE="${INCLUDE_GLOBAL_STATE:-true}"
    RETENTION_DAYS="${RETENTION_DAYS:-30}"
    MAX_SNAPSHOTS="${MAX_SNAPSHOTS:-50}"

    echo "=== Creating Elasticsearch Snapshot ==="
    echo "Repository: ${REPOSITORY}"
    echo "Snapshot Name: ${SNAPSHOT_NAME}"
    echo "Indices: ${INDICES}"
    echo "Timestamp: ${TIMESTAMP}"

    # Check cluster health before snapshot
    echo ""
    echo "Checking cluster health..."
    HEALTH=$(curl ${CURL_OPTS} "${ES_HOST}/_cluster/health")
    echo "Cluster Health: ${HEALTH}"

    CLUSTER_STATUS=$(echo "${HEALTH}" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])" 2>/dev/null || echo "unknown")
    if [ "${CLUSTER_STATUS}" = "red" ]; then
      echo "WARNING: Cluster status is RED. Snapshot may be incomplete."
      if [ "${ABORT_ON_RED:-false}" = "true" ]; then
        echo "ABORT_ON_RED is set. Exiting."
        exit 1
      fi
    fi

    # Get index statistics before snapshot
    echo ""
    echo "Index statistics before snapshot:"
    curl ${CURL_OPTS} "${ES_HOST}/_cat/indices?v&s=index" | head -50
    echo ""

    # Create the snapshot
    echo "Creating snapshot '${SNAPSHOT_NAME}' in repository '${REPOSITORY}'..."
    RESPONSE=$(curl ${CURL_OPTS} -X PUT "${ES_HOST}/_snapshot/${REPOSITORY}/${SNAPSHOT_NAME}?wait_for_completion=false" \
      -H 'Content-Type: application/json' \
      -d '{
        "indices": "'"${INDICES}"'",
        "ignore_unavailable": '"${IGNORE_UNAVAILABLE}"',
        "include_global_state": '"${INCLUDE_GLOBAL_STATE}"',
        "metadata": {
          "taken_by": "automated-backup",
          "taken_because": "Scheduled automated backup",
          "environment": "'"${ENVIRONMENT:-production}"'",
          "timestamp": "'"${TIMESTAMP}"'",
          "retention_days": "'"${RETENTION_DAYS}"'"
        },
        "partial": false
      }')

    echo "Snapshot creation initiated: ${RESPONSE}"

    # Monitor snapshot progress
    echo ""
    echo "Monitoring snapshot progress..."
    SNAPSHOT_STATE="IN_PROGRESS"
    WAIT_COUNT=0
    MAX_WAIT=${MAX_WAIT_MINUTES:-120}

    while [ "${SNAPSHOT_STATE}" = "IN_PROGRESS" ] && [ ${WAIT_COUNT} -lt ${MAX_WAIT} ]; do
      sleep 30
      WAIT_COUNT=$((WAIT_COUNT + 1))

      STATUS=$(curl ${CURL_OPTS} "${ES_HOST}/_snapshot/${REPOSITORY}/${SNAPSHOT_NAME}/_status")
      SNAPSHOT_STATE=$(echo "${STATUS}" | python3 -c "
    import sys, json
    data = json.load(sys.stdin)
    snapshots = data.get('snapshots', [])
    if snapshots:
        print(snapshots[0].get('state', 'UNKNOWN'))
    else:
        print('UNKNOWN')
    " 2>/dev/null || echo "UNKNOWN")

      # Extract progress details
      PROGRESS=$(echo "${STATUS}" | python3 -c "
    import sys, json
    data = json.load(sys.stdin)
    snapshots = data.get('snapshots', [])
    if snapshots:
        stats = snapshots[0].get('stats', {})
        total = stats.get('total', {})
        done = stats.get('incremental', {})
        file_count = total.get('file_count', 0)
        size_bytes = total.get('size_in_bytes', 0)
        size_mb = size_bytes / (1024*1024)
        print(f'Files: {file_count}, Size: {size_mb:.2f} MB')
    else:
        print('No progress data available')
    " 2>/dev/null || echo "Unable to parse progress")

      echo "[$(date '+%Y-%m-%d %H:%M:%S')] State: ${SNAPSHOT_STATE} | ${PROGRESS} | Elapsed: $((WAIT_COUNT * 30))s"
    done

    # Final status check
    echo ""
    echo "=== Snapshot Final Status ==="
    FINAL_STATUS=$(curl ${CURL_OPTS} "${ES_HOST}/_snapshot/${REPOSITORY}/${SNAPSHOT_NAME}")
    echo "${FINAL_STATUS}" | python3 -m json.tool 2>/dev/null || echo "${FINAL_STATUS}"

    FINAL_STATE=$(echo "${FINAL_STATUS}" | python3 -c "
    import sys, json
    data = json.load(sys.stdin)
    snapshots = data.get('snapshots', [])
    if snapshots:
        print(snapshots[0].get('state', 'UNKNOWN'))
    else:
        print('UNKNOWN')
    " 2>/dev/null || echo "UNKNOWN")

    if [ "${FINAL_STATE}" = "SUCCESS" ]; then
      echo "Snapshot '${SNAPSHOT_NAME}' completed successfully!"
    elif [ "${FINAL_STATE}" = "IN_PROGRESS" ]; then
      echo "WARNING: Snapshot still in progress after ${MAX_WAIT} minutes."
      exit 0
    else
      echo "ERROR: Snapshot ended with state: ${FINAL_STATE}"
      exit 1
    fi

    # Cleanup old snapshots based on retention policy
    echo ""
    echo "=== Cleaning up old snapshots (retention: ${RETENTION_DAYS} days, max: ${MAX_SNAPSHOTS}) ==="

    SNAPSHOTS_LIST=$(curl ${CURL_OPTS} "${ES_HOST}/_snapshot/${REPOSITORY}/_all")
    SNAPSHOTS_TO_DELETE=$(echo "${SNAPSHOTS_LIST}" | python3 -c "
    import sys, json
    from datetime import datetime, timedelta

    data = json.load(sys.stdin)
    snapshots = data.get('snapshots', [])
    retention_days = int('${RETENTION_DAYS}')
    max_snapshots = int('${MAX_SNAPSHOTS}')
    prefix = '${SNAPSHOT_PREFIX}'
    cutoff = datetime.utcnow() - timedelta(days=retention_days)

    # Filter snapshots by prefix
    matching = [s for s in snapshots if s['snapshot'].startswith(prefix)]
    matching.sort(key=lambda x: x.get('start_time_in_millis', 0), reverse=True)

    to_delete = []

    for i, snap in enumerate(matching):
        snap_time = datetime.utcfromtimestamp(snap.get('start_time_in_millis', 0) / 1000)
        # Delete if older than retention or exceeds max count
        if snap_time < cutoff or i >= max_snapshots:
            if snap.get('state') != 'IN_PROGRESS':
                to_delete.append(snap['snapshot'])

    for name in to_delete:
        print(name)
    " 2>/dev/null)

    if [ -n "${SNAPSHOTS_TO_DELETE}" ]; then
      echo "Snapshots to delete:"
      echo "${SNAPSHOTS_TO_DELETE}"
      echo ""

      while IFS= read -r OLD_SNAPSHOT; do
        if [ -n "${OLD_SNAPSHOT}" ]; then
          echo "Deleting snapshot: ${OLD_SNAPSHOT}"
          curl ${CURL_OPTS} -X DELETE "${ES_HOST}/_snapshot/${REPOSITORY}/${OLD_SNAPSHOT}"
          echo ""
        fi
      done <<< "${SNAPSHOTS_TO_DELETE}"
    else
      echo "No snapshots to clean up."
    fi

    echo ""
    echo "=== Snapshot process complete ==="

  snapshot-restore.sh: |
    #!/bin/bash
    set -euo pipefail

    ES_HOST="${ES_HOST:-https://elasticsearch-master:9200}"
    ES_USER="${ES_USER:-elastic}"
    ES_PASSWORD="${ES_PASSWORD:-changeme}"
    CURL_OPTS="-s -k -u ${ES_USER}:${ES_PASSWORD}"
    REPOSITORY="${SNAPSHOT_REPOSITORY:-s3_backup_repository}"
    SNAPSHOT_NAME="${RESTORE_SNAPSHOT_NAME:-}"
    RESTORE_INDICES="${RESTORE_INDICES:-*}"
    RENAME_PATTERN="${RENAME_PATTERN:-}"
    RENAME_REPLACEMENT="${RENAME_REPLACEMENT:-}"
    PARTIAL="${PARTIAL_RESTORE:-false}"

    echo "=== Elasticsearch Snapshot Restore ==="

    # If no snapshot name provided, list available snapshots
    if [ -z "${SNAPSHOT_NAME}" ]; then
      echo "No snapshot name provided. Listing available snapshots..."
      echo ""
      echo "Available snapshots in '${REPOSITORY}':"
      curl ${CURL_OPTS} "${ES_HOST}/_snapshot/${REPOSITORY}/_all" | python3 -c "
    import sys, json
    from datetime import datetime

    data = json.load(sys.stdin)
    snapshots = data.get('snapshots', [])
    snapshots.sort(key=lambda x: x.get('start_time_in_millis', 0), reverse=True)

    print(f'{'Name':<45} {'State':<12} {'Start Time':<25} {'Indices':<8} {'Duration':<12}')
    print('-' * 105)

    for snap in snapshots[:30]:
        name = snap.get('snapshot', 'N/A')
        state = snap.get('state', 'N/A')
        start_ms = snap.get('start_time_in_millis', 0)
        end_ms = snap.get('end_time_in_millis', 0)
        start_time = datetime.utcfromtimestamp(start_ms / 1000).strftime('%Y-%m-%d %H:%M:%S UTC') if start_ms else 'N/A'
        indices_count = len(snap.get('indices', []))
        duration_ms = end_ms - start_ms if end_ms and start_ms else 0
        duration = f'{duration_ms / 1000:.1f}s' if duration_ms else 'N/A'
        print(f'{name:<45} {state:<12} {start_time:<25} {indices_count:<8} {duration:<12}')
    " 2>/dev/null

      echo ""
      echo "Set RESTORE_SNAPSHOT_NAME environment variable to restore a specific snapshot."

      # Use the latest successful snapshot if AUTO_LATEST is set
      if [ "${AUTO_LATEST:-false}" = "true" ]; then
        SNAPSHOT_NAME=$(curl ${CURL_OPTS} "${ES_HOST}/_snapshot/${REPOSITORY}/_all" | python3 -c "
    import sys, json
    data = json.load(sys.stdin)
    snapshots = [s for s in data.get('snapshots', []) if s.get('state') == 'SUCCESS']
    snapshots.sort(key=lambda x: x.get('start_time_in_millis', 0), reverse=True)
    if snapshots:
        print(snapshots[0]['snapshot'])
    " 2>/dev/null)

        if [ -z "${SNAPSHOT_NAME}" ]; then
          echo "No successful snapshots found."
          exit 1
        fi
        echo "AUTO_LATEST enabled. Using latest snapshot: ${SNAPSHOT_NAME}"
      else
        exit 0
      fi
    fi

    echo ""
    echo "Repository: ${REPOSITORY}"
    echo "Snapshot: ${SNAPSHOT_NAME}"
    echo "Indices: ${RESTORE_INDICES}"

    # Get snapshot details
    echo ""
    echo "Snapshot details:"
    SNAP_DETAILS=$(curl ${CURL_OPTS} "${ES_HOST}/_snapshot/${REPOSITORY}/${SNAPSHOT_NAME}")
    echo "${SNAP_DETAILS}" | python3 -m json.tool 2>/dev/null || echo "${SNAP_DETAILS}"

    # Check if snapshot exists and is successful
    SNAP_STATE=$(echo "${SNAP_DETAILS}" | python3 -c "
    import sys, json
    data = json.load(sys.stdin)
    snapshots = data.get('snapshots', [])
    if snapshots:
        print(snapshots[0].get('state', 'UNKNOWN'))