# Generated by anthropic (claude-opus-4-6)
# Prompt: Write Envoy proxy configuration for HTTP traffic routing. Define listeners on port 80, clusters for backend services, and routes to match requests. Configure connection pooling and health checks for upstream services. This is for our API gateway proxy.
# Category: envoy_no_tls

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: api_gateway_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 80
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: api_gateway
                codec_type: AUTO
                use_remote_address: true
                generate_request_id: true
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          timestamp: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          protocol: "%PROTOCOL%"
                          response_code: "%RESPONSE_CODE%"
                          response_flags: "%RESPONSE_FLAGS%"
                          duration: "%DURATION%"
                          upstream_host: "%UPSTREAM_HOST%"
                          upstream_cluster: "%UPSTREAM_CLUSTER%"
                          request_id: "%REQ(X-REQUEST-ID)%"
                          client_ip: "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
                route_config:
                  name: api_routes
                  virtual_hosts:
                    - name: api_services
                      domains:
                        - "*"
                      routes:
                        # User service routes
                        - match:
                            prefix: "/api/v1/users"
                          route:
                            cluster: user_service
                            timeout: 30s
                            retry_policy:
                              retry_on: "5xx,connect-failure,refused-stream,reset"
                              num_retries: 3
                              per_try_timeout: 10s
                              retry_back_off:
                                base_interval: 0.25s
                                max_interval: 1s
                            rate_limits:
                              - actions:
                                  - request_headers:
                                      header_name: ":path"
                                      descriptor_key: "path"

                        # Order service routes
                        - match:
                            prefix: "/api/v1/orders"
                          route:
                            cluster: order_service
                            timeout: 45s
                            retry_policy:
                              retry_on: "5xx,connect-failure,refused-stream"
                              num_retries: 2
                              per_try_timeout: 15s
                              retry_back_off:
                                base_interval: 0.5s
                                max_interval: 2s

                        # Product catalog service routes
                        - match:
                            prefix: "/api/v1/products"
                          route:
                            cluster: product_service
                            timeout: 20s
                            retry_policy:
                              retry_on: "5xx,connect-failure,refused-stream,retriable-4xx"
                              num_retries: 3
                              per_try_timeout: 7s

                        # Authentication service routes
                        - match:
                            prefix: "/api/v1/auth"
                          route:
                            cluster: auth_service
                            timeout: 15s
                            retry_policy:
                              retry_on: "5xx,connect-failure"
                              num_retries: 2
                              per_try_timeout: 5s

                        # Search service routes
                        - match:
                            prefix: "/api/v1/search"
                          route:
                            cluster: search_service
                            timeout: 10s
                            retry_policy:
                              retry_on: "5xx,connect-failure"
                              num_retries: 1
                              per_try_timeout: 5s

                        # Notification service routes
                        - match:
                            prefix: "/api/v1/notifications"
                          route:
                            cluster: notification_service
                            timeout: 20s
                            retry_policy:
                              retry_on: "5xx,connect-failure"
                              num_retries: 2
                              per_try_timeout: 8s

                        # Health check endpoint
                        - match:
                            exact: "/health"
                          direct_response:
                            status: 200
                            body:
                              inline_string: '{"status": "healthy", "service": "api-gateway"}'

                        # Catch-all route
                        - match:
                            prefix: "/"
                          direct_response:
                            status: 404
                            body:
                              inline_string: '{"error": "not_found", "message": "The requested resource was not found"}'

                      request_headers_to_add:
                        - header:
                            key: "X-Gateway"
                            value: "envoy-api-gateway"
                          append_action: OVERWRITE_IF_EXISTS_OR_ADD
                        - header:
                            key: "X-Request-Start"
                            value: "%START_TIME(%s.%3f)%"
                          append_action: OVERWRITE_IF_EXISTS_OR_ADD

                      response_headers_to_add:
                        - header:
                            key: "X-Envoy-Upstream-Service-Time"
                            value: "%RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)%"
                          append_action: OVERWRITE_IF_EXISTS_OR_ADD
                        - header:
                            key: "Strict-Transport-Security"
                            value: "max-age=31536000; includeSubDomains"
                          append_action: OVERWRITE_IF_EXISTS_OR_ADD

                http_filters:
                  # CORS filter
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors

                  # Health check filter
                  - name: envoy.filters.http.health_check
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.health_check.v3.HealthCheck
                      pass_through_mode: false
                      headers:
                        - name: ":path"
                          string_match:
                            exact: "/envoy-health"

                  # Router filter (must be last)
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                      dynamic_stats: true

  clusters:
    # User Service Cluster
    - name: user_service
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 5s
      per_connection_buffer_limit_bytes: 32768
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: user_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: user-service.backend.svc.cluster.local
                      port_value: 8080
                  health_check_config:
                    port_value: 8080
              - endpoint:
                  address:
                    socket_address:
                      address: user-service-2.backend.svc.cluster.local
                      port_value: 8080
                  health_check_config:
                    port_value: 8080
      health_checks:
        - timeout: 5s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          no_traffic_interval: 30s
          no_traffic_healthy_interval: 60s
          http_health_check:
            path: "/health"
            expected_statuses:
              - start: 200
                end: 299
            request_headers_to_add:
              - header:
                  key: "X-Health-Check"
                  value: "envoy"
                append_action: OVERWRITE_IF_EXISTS_OR_ADD
      connection_pool_per_downstream_connection: false
      upstream_connection_options:
        tcp_keepalive:
          keepalive_probes: 3
          keepalive_time: 300
          keepalive_interval: 30
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options:
              header_key_format:
                stateful_formatter:
                  name: preserve_case
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.http.header_formatters.preserve_case.v3.PreserveCaseFormatterConfig
          common_http_protocol_options:
            idle_timeout: 300s
            max_requests_per_connection: 1000
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 1024
            max_pending_requests: 1024
            max_requests: 2048
            max_retries: 5
            track_remaining: true
          - priority: HIGH
            max_connections: 2048
            max_pending_requests: 2048
            max_requests: 4096
            max_retries: 10
      outlier_detection:
        consecutive_5xx: 5
        interval: 10s
        base_ejection_time: 30s
        max_ejection_percent: 50
        enforcing_consecutive_5xx: 100
        enforcing_success_rate: 100
        success_rate_minimum_hosts: 2
        success_rate_request_volume: 100
        success_rate_stdev_factor: 1900

    # Order Service Cluster
    - name: order_service
      type: STRICT_DNS
      lb_policy: LEAST_REQUEST
      connect_timeout: 5s
      per_connection_buffer_limit_bytes: 32768
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: order_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: order-service.backend.svc.cluster.local
                      port_value: 8081
              - endpoint:
                  address:
                    socket_address:
                      address: order-service-2.backend.svc.cluster.local
                      port_value: 8081
              - endpoint:
                  address:
                    socket_address:
                      address: order-service-3.backend.svc.cluster.local
                      port_value: 8081
      health_checks:
        - timeout: 5s
          interval: 15s
          unhealthy_threshold: 3
          healthy_threshold: 2
          no_traffic_interval: 30s
          http_health_check:
            path: "/health"
            expected_statuses:
              - start: 200
                end: 299
      upstream_connection_options:
        tcp_keepalive:
          keepalive_probes: 3
          keepalive_time: 300
          keepalive_interval: 30
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options: {}
          common_http_protocol_options:
            idle_timeout: 300s
            max_requests_per_connection: 500
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 512
            max_pending_requests: 512
            max_requests: 1024
            max_retries: 3
            track_remaining: true
      outlier_detection:
        consecutive_5xx: 5
        interval: 10s
        base_ejection_time: 30s
        max_ejection_percent: 33
        enforcing_consecutive_5xx: 100

    # Product Service Cluster
    - name: product_service
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 5s
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: product_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: product-service.backend.svc.cluster.local
                      port_value: 8082
              - endpoint:
                  address:
                    socket_address:
                      address: product-service-2.backend.svc.cluster.local
                      port_value: 8082
      health_checks:
        - timeout: 3s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: "/health"
            expected_statuses:
              - start: 200
                end: 299
      upstream_connection_options:
        tcp_keepalive:
          keepalive_probes: 3
          keepalive_time: 300
          keepalive_interval: 30
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options: {}
          common_http_protocol_options:
            idle_timeout: 300s
            max_requests_per_connection: 2000
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 1024
            max_pending_requests: 1024
            max_requests: 2048
            max_retries: 5
            track_remaining: true
      outlier_detection:
        consecutive_5xx: 5
        interval: 10s
        base_ejection_time: 30s
        max_ejection_percent: 50

    # Auth Service Cluster
    - name: auth_service
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 3s
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: auth_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: auth-service.backend.svc.cluster.local
                      port_value: 8083
              - endpoint:
                  address:
                    socket_address:
                      address: auth-service-2.backend.svc.cluster.local
                      port_value: 8083
      health_checks:
        - timeout: 3s
          interval: 10s
          unhealthy_threshold: 2
          healthy_threshold: 2
          http_health_check:
            path: "/health"
            expected_statuses:
              - start: 200
                end: 299
      upstream_connection_options:
        tcp_keepalive:
          keepalive_probes: 3
          keepalive_time: 120
          keepalive_interval: 15
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options: {}
          common_http_protocol_options:
            idle_timeout: 120s
            max_requests_per_connection: 5000
      circuit