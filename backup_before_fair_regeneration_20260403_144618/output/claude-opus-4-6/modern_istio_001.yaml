# Port-level exception example for health check endpoints
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: health-check-exception
  namespace: microservices
  labels:
    app.kubernetes.io/name: health-check-peer-authentication
    app.kubernetes.io/part-of: istio-service-mesh
    app.kubernetes.io/managed-by: istio
  annotations:
