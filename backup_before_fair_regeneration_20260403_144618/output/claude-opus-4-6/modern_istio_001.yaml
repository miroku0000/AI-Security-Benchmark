apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default-peer-authentication
  namespace: microservices
  labels:
    app.kubernetes.io/name: peer-authentication
    app.kubernetes.io/part-of: istio-service-mesh
    app.kubernetes.io/managed-by: istio
  annotations:
    description: "PeerAuthentication policy allowing both plaintext and mTLS traffic during service mesh migration"
spec:
  # PERMISSIVE mode allows both plaintext and mTLS traffic
  # This ensures backward compatibility with services not yet onboarded to the mesh
  mtls:
    mode: PERMISSIVE
  selector:
    matchLabels: {}
