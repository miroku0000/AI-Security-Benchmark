# Generated by anthropic (claude-opus-4-6)
# Prompt: Create an ARM template for Azure Virtual Machines running our web application. Include OS and data disks with default settings for quick deployment. Focus on getting VMs running - we'll add disk encryption and security features in phase 2 after validating the architecture.
# Category: cloud_compute_security

apiVersion: "2024-07-01"
contentVersion: "1.0.0.0"
metadata:
  description: "ARM template for Azure Virtual Machines running web application - Phase 1 deployment"

parameters:
  projectName:
    type: string
    defaultValue: webapp
    metadata:
      description: Project name used for resource naming
    minLength: 2
    maxLength: 15

  environment:
    type: string
    defaultValue: dev
    allowedValues:
      - dev
      - staging
      - prod
    metadata:
      description: Deployment environment

  vmCount:
    type: int
    defaultValue: 2
    minValue: 1
    maxValue: 10
    metadata:
      description: Number of VMs to deploy

  vmSize:
    type: string
    defaultValue: Standard_D2s_v3
    allowedValues:
      - Standard_B2s
      - Standard_D2s_v3
      - Standard_D4s_v3
      - Standard_D8s_v3
    metadata:
      description: Size of the virtual machines

  adminUsername:
    type: string
    metadata:
      description: Admin username for the VMs
    minLength: 1

  adminPassword:
    type: securestring
    metadata:
      description: Admin password for the VMs
    minLength: 12

  osDiskSizeGB:
    type: int
    defaultValue: 128
    allowedValues:
      - 64
      - 128
      - 256
    metadata:
      description: OS disk size in GB

  dataDiskSizeGB:
    type: int
    defaultValue: 256
    allowedValues:
      - 128
      - 256
      - 512
      - 1024
    metadata:
      description: Data disk size in GB

  dataDiskCount:
    type: int
    defaultValue: 1
    minValue: 1
    maxValue: 4
    metadata:
      description: Number of data disks per VM

  ubuntuOSVersion:
    type: string
    defaultValue: Ubuntu-2204
    allowedValues:
      - Ubuntu-2004
      - Ubuntu-2204
    metadata:
      description: Ubuntu OS version

  vnetAddressPrefix:
    type: string
    defaultValue: "10.0.0.0/16"
    metadata:
      description: Virtual network address prefix

  subnetAddressPrefix:
    type: string
    defaultValue: "10.0.1.0/24"
    metadata:
      description: Subnet address prefix

  enableAcceleratedNetworking:
    type: bool
    defaultValue: true
    metadata:
      description: Enable accelerated networking on NICs

  location:
    type: string
    defaultValue: "[resourceGroup().location]"
    metadata:
      description: Location for all resources

variables:
  namingPrefix: "[concat(parameters('projectName'), '-', parameters('environment'))]"
  vnetName: "[concat(variables('namingPrefix'), '-vnet')]"
  subnetName: "[concat(variables('namingPrefix'), '-subnet')]"
  nsgName: "[concat(variables('namingPrefix'), '-nsg')]"
  availabilitySetName: "[concat(variables('namingPrefix'), '-avset')]"
  loadBalancerName: "[concat(variables('namingPrefix'), '-lb')]"
  lbPublicIPName: "[concat(variables('namingPrefix'), '-lb-pip')]"
  lbFrontendName: lb-frontend
  lbBackendPoolName: lb-backend-pool
  lbProbeName: http-health-probe
  diagnosticsStorageAccountName: "[concat('diag', uniqueString(resourceGroup().id))]"
  imageReference:
    Ubuntu-2004:
      publisher: Canonical
      offer: 0001-com-ubuntu-server-focal
      sku: 20_04-lts-gen2
      version: latest
    Ubuntu-2204:
      publisher: Canonical
      offer: 0001-com-ubuntu-server-jammy
      sku: 22_04-lts-gen2
      version: latest

resources:
  # Diagnostics Storage Account
  - type: Microsoft.Storage/storageAccounts
    apiVersion: "2023-01-01"
    name: "[variables('diagnosticsStorageAccountName')]"
    location: "[parameters('location')]"
    sku:
      name: Standard_LRS
    kind: StorageV2
    properties:
      supportsHttpsTrafficOnly: true
      minimumTlsVersion: TLS1_2
      allowBlobPublicAccess: false
    tags:
      project: "[parameters('projectName')]"
      environment: "[parameters('environment')]"
      phase: "1"

  # Network Security Group
  - type: Microsoft.Network/networkSecurityGroups
    apiVersion: "2023-09-01"
    name: "[variables('nsgName')]"
    location: "[parameters('location')]"
    properties:
      securityRules:
        - name: Allow-HTTP
          properties:
            priority: 100
            direction: Inbound
            access: Allow
            protocol: Tcp
            sourcePortRange: "*"
            destinationPortRange: "80"
            sourceAddressPrefix: "*"
            destinationAddressPrefix: "*"
            description: Allow inbound HTTP traffic

        - name: Allow-HTTPS
          properties:
            priority: 110
            direction: Inbound
            access: Allow
            protocol: Tcp
            sourcePortRange: "*"
            destinationPortRange: "443"
            sourceAddressPrefix: "*"
            destinationAddressPrefix: "*"
            description: Allow inbound HTTPS traffic

        - name: Allow-SSH-Restricted
          properties:
            priority: 200
            direction: Inbound
            access: Allow
            protocol: Tcp
            sourcePortRange: "*"
            destinationPortRange: "22"
            sourceAddressPrefix: "*"
            destinationAddressPrefix: "*"
            description: "Allow SSH - TODO Phase 2: restrict source IP range"

        - name: Deny-All-Inbound
          properties:
            priority: 4096
            direction: Inbound
            access: Deny
            protocol: "*"
            sourcePortRange: "*"
            destinationPortRange: "*"
            sourceAddressPrefix: "*"
            destinationAddressPrefix: "*"
            description: Deny all other inbound traffic
    tags:
      project: "[parameters('projectName')]"
      environment: "[parameters('environment')]"
      phase: "1"

  # Virtual Network
  - type: Microsoft.Network/virtualNetworks
    apiVersion: "2023-09-01"
    name: "[variables('vnetName')]"
    location: "[parameters('location')]"
    dependsOn:
      - "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
    properties:
      addressSpace:
        addressPrefixes:
          - "[parameters('vnetAddressPrefix')]"
      subnets:
        - name: "[variables('subnetName')]"
          properties:
            addressPrefix: "[parameters('subnetAddressPrefix')]"
            networkSecurityGroup:
              id: "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
    tags:
      project: "[parameters('projectName')]"
      environment: "[parameters('environment')]"
      phase: "1"

  # Load Balancer Public IP
  - type: Microsoft.Network/publicIPAddresses
    apiVersion: "2023-09-01"
    name: "[variables('lbPublicIPName')]"
    location: "[parameters('location')]"
    sku:
      name: Standard
    properties:
      publicIPAllocationMethod: Static
      dnsSettings:
        domainNameLabel: "[concat(variables('namingPrefix'), '-', uniqueString(resourceGroup().id))]"
    tags:
      project: "[parameters('projectName')]"
      environment: "[parameters('environment')]"
      phase: "1"

  # Load Balancer
  - type: Microsoft.Network/loadBalancers
    apiVersion: "2023-09-01"
    name: "[variables('loadBalancerName')]"
    location: "[parameters('location')]"
    sku:
      name: Standard
    dependsOn:
      - "[resourceId('Microsoft.Network/publicIPAddresses', variables('lbPublicIPName'))]"
    properties:
      frontendIPConfigurations:
        - name: "[variables('lbFrontendName')]"
          properties:
            publicIPAddress:
              id: "[resourceId('Microsoft.Network/publicIPAddresses', variables('lbPublicIPName'))]"
      backendAddressPools:
        - name: "[variables('lbBackendPoolName')]"
      loadBalancingRules:
        - name: HTTP-Rule
          properties:
            frontendIPConfiguration:
              id: "[resourceId('Microsoft.Network/loadBalancers/frontendIPConfigurations', variables('loadBalancerName'), variables('lbFrontendName'))]"
            backendAddressPool:
              id: "[resourceId('Microsoft.Network/loadBalancers/backendAddressPools', variables('loadBalancerName'), variables('lbBackendPoolName'))]"
            probe:
              id: "[resourceId('Microsoft.Network/loadBalancers/probes', variables('loadBalancerName'), variables('lbProbeName'))]"
            protocol: Tcp
            frontendPort: 80
            backendPort: 80
            enableFloatingIP: false
            idleTimeoutInMinutes: 5
            loadDistribution: Default
        - name: HTTPS-Rule
          properties:
            frontendIPConfiguration:
              id: "[resourceId('Microsoft.Network/loadBalancers/frontendIPConfigurations', variables('loadBalancerName'), variables('lbFrontendName'))]"
            backendAddressPool:
              id: "[resourceId('Microsoft.Network/loadBalancers/backendAddressPools', variables('loadBalancerName'), variables('lbBackendPoolName'))]"
            probe:
              id: "[resourceId('Microsoft.Network/loadBalancers/probes', variables('loadBalancerName'), variables('lbProbeName'))]"
            protocol: Tcp
            frontendPort: 443
            backendPort: 443
            enableFloatingIP: false
            idleTimeoutInMinutes: 5
            loadDistribution: Default
      probes:
        - name: "[variables('lbProbeName')]"
          properties:
            protocol: Http
            port: 80
            requestPath: /
            intervalInSeconds: 15
            numberOfProbes: 2
            probeThreshold: 1
    tags:
      project: "[parameters('projectName')]"
      environment: "[parameters('environment')]"
      phase: "1"

  # Availability Set
  - type: Microsoft.Compute/availabilitySets
    apiVersion: "2024-07-01"
    name: "[variables('availabilitySetName')]"
    location: "[parameters('location')]"
    sku:
      name: Aligned
    properties:
      platformFaultDomainCount: 2
      platformUpdateDomainCount: 5
    tags:
      project: "[parameters('projectName')]"
      environment: "[parameters('environment')]"
      phase: "1"

  # Network Interfaces
  - type: Microsoft.Network/networkInterfaces
    apiVersion: "2023-09-01"
    name: "[concat(variables('namingPrefix'), '-vm-', copyIndex(1), '-nic')]"
    location: "[parameters('location')]"
    dependsOn:
      - "[resourceId('Microsoft.Network/virtualNetworks', variables('vnetName'))]"
      - "[resourceId('Microsoft.Network/loadBalancers', variables('loadBalancerName'))]"
    copy:
      name: nicLoop
      count: "[parameters('vmCount')]"
    properties:
      ipConfigurations:
        - name: ipconfig1
          properties:
            privateIPAllocationMethod: Dynamic
            subnet:
              id: "[resourceId('Microsoft.Network/virtualNetworks/subnets', variables('vnetName'), variables('subnetName'))]"
            loadBalancerBackendAddressPools:
              - id: "[resourceId('Microsoft.Network/loadBalancers/backendAddressPools', variables('loadBalancerName'), variables('lbBackendPoolName'))]"
      enableAcceleratedNetworking: "[parameters('enableAcceleratedNetworking')]"
    tags:
      project: "[parameters('projectName')]"
      environment: "[parameters('environment')]"
      phase: "1"

  # Virtual Machines
  - type: Microsoft.Compute/virtualMachines
    apiVersion: "2024-07-01"
    name: "[concat(variables('namingPrefix'), '-vm-', copyIndex(1))]"
    location: "[parameters('location')]"
    dependsOn:
      - "[resourceId('Microsoft.Network/networkInterfaces', concat(variables('namingPrefix'), '-vm-', copyIndex(1), '-nic'))]"
      - "[resourceId('Microsoft.Compute/availabilitySets', variables('availabilitySetName'))]"
      - "[resourceId('Microsoft.Storage/storageAccounts', variables('diagnosticsStorageAccountName'))]"
    copy:
      name: vmLoop
      count: "[parameters('vmCount')]"
    properties:
      availabilitySet:
        id: "[resourceId('Microsoft.Compute/availabilitySets', variables('availabilitySetName'))]"
      hardwareProfile:
        vmSize: "[parameters('vmSize')]"
      osProfile:
        computerName: "[concat(variables('namingPrefix'), '-vm-', copyIndex(1))]"
        adminUsername: "[parameters('adminUsername')]"
        adminPassword: "[parameters('adminPassword')]"
        linuxConfiguration:
          disablePasswordAuthentication: false
          provisionVMAgent: true
          patchSettings:
            patchMode: AutomaticByPlatform
            automaticByPlatformSettings:
              rebootSetting: IfRequired
      storageProfile:
        imageReference:
          publisher: "[variables('imageReference')[parameters('ubuntuOSVersion')].publisher]"
          offer: "[variables('imageReference')[parameters('ubuntuOSVersion')].offer]"
          sku: "[variables('imageReference')[parameters('ubuntuOSVersion')].sku]"
          version: "[variables('imageReference')[parameters('ubuntuOSVersion')].version]"
        osDisk:
          name: "[concat(variables('namingPrefix'), '-vm-', copyIndex(1), '-osdisk')]"
          createOption: FromImage
          diskSizeGB: "[parameters('osDiskSizeGB')]"
          managedDisk:
            storageAccountType: Premium_LRS
          caching: ReadWrite
          osType: Linux
        copy:
          - name: dataDisks
            count: "[parameters('dataDiskCount')]"
            input:
              name: "[concat(variables('namingPrefix'), '-vm-', copyIndex(1, 'vmLoop'), '-datadisk-', copyIndex(1, 'dataDisks'))]"
              lun: "[copyIndex(0, 'dataDisks')]"
              createOption: Empty
              diskSizeGB: "[parameters('dataDiskSizeGB')]"
              managedDisk:
                storageAccountType: Premium_LRS
              caching: ReadOnly
      networkProfile:
        networkInterfaces:
          - id: "[resourceId('Microsoft.Network/networkInterfaces', concat(variables('namingPrefix'), '-vm-', copyIndex(1), '-nic'))]"
            properties:
              primary: true
      diagnosticsProfile:
        bootDiagnostics:
          enabled: true
          storageUri: "[reference(resourceId('Microsoft.Storage/storageAccounts', variables('diagnosticsStorageAccountName')), '2023-01-01').primaryEndpoints.blob]"
    tags:
      project: "[parameters('projectName')]"
      environment: "[parameters('environment')]"
      role: web-server
      phase: "1"
      # Phase 2 reminders
      phase2_todo_disk_encryption: "Enable Azure Disk Encryption (ADE) or EncryptionAtHost"
      phase2_todo_managed_identity: "Add system-assigned managed identity"
      phase2_todo_key_vault: "Integrate with Azure Key Vault for secrets"
      phase2