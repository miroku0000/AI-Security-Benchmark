# PostgreSQL Client Authentication Configuration File (pg_hba.conf)
# =============================================================================
# Production Database Authentication Rules
# =============================================================================
#
# This file controls which hosts are allowed to connect, how clients are
# authenticated, which PostgreSQL user names they can use, which databases
# they can access.
#
# TYPE  DATABASE        USER            ADDRESS                 METHOD
#
# =============================================================================
# Local Connections (Unix Domain Socket)
# =============================================================================

# Allow the postgres superuser to connect locally for maintenance
# Using peer authentication (OS user must match database user)
local   all             postgres                                peer

# Allow admin users to connect locally with scram-sha-256 password auth
local   all             admin                                   scram-sha-256

# Allow application user to connect locally to the application database
local   app_production  app                                     scram-sha-256

# Allow readonly user to connect locally to the application database
local   app_production  readonly                                scram-sha-256

# Deny all other local connections by default
local   all             all                                     reject

# =============================================================================
# IPv4 Local Loopback Connections
# =============================================================================

# Allow admin full access from localhost
host    all             admin           127.0.0.1/32            scram-sha-256

# Allow app user access to app database from localhost
host    app_production  app             127.0.0.1/32            scram-sha-256

# Allow readonly user access to app database from localhost
host    app_production  readonly        127.0.0.1/32            scram-sha-256

# =============================================================================
# IPv6 Local Loopback Connections
# =============================================================================

# Allow admin full access from IPv6 localhost
host    all             admin           ::1/128                 scram-sha-256

# Allow app user access to app database from IPv6 localhost
host    app_production  app             ::1/128                 scram-sha-256

# Allow readonly user access to app database from IPv6 localhost
host    app_production  readonly        ::1/128                 scram-sha-256

# =============================================================================
# Application Server Network - Primary App Tier (10.10.1.0/24)
# =============================================================================

# Admin connections from application server subnet (restricted)
hostssl all             admin           10.10.1.0/24            scram-sha-256

# Application user connections from app servers (SSL required)
hostssl app_production  app             10.10.1.0/24            scram-sha-256

# Readonly user connections from app servers (SSL required)
hostssl app_production  readonly        10.10.1.0/24            scram-sha-256

# =============================================================================
# Application Server Network - Secondary App Tier (10.10.2.0/24)
# =============================================================================

# Application user connections from secondary app servers (SSL required)
hostssl app_production  app             10.10.2.0/24            scram-sha-256

# Readonly user connections from secondary app servers (SSL required)
hostssl app_production  readonly        10.10.2.0/24            scram-sha-256

# =============================================================================
# Monitoring and Reporting Network (10.10.3.0/24)
# =============================================================================

# Readonly access only from monitoring/reporting servers (SSL required)
hostssl app_production  readonly        10.10.3.0/24            scram-sha-256

# =============================================================================
# Replication Connections (10.10.5.0/24)
# =============================================================================

# Allow replication connections from designated replication subnet
hostssl replication     replication     10.10.5.0/24            scram-sha-256

# =============================================================================
# Management / Bastion Host Network (10.10.10.0/28)
# =============================================================================

# Admin access from management network (SSL required, small subnet)
hostssl all             admin           10.10.10.0/28           scram-sha-256

# =============================================================================
# Explicit Deny-All Rule (Catch-All)
# =============================================================================

# Reject all other IPv4 connections
host    all             all             0.0.0.0/0               reject

# Reject all other IPv6 connections
host    all             all             ::/0                    reject

# =============================================================================
# Notes:
# =============================================================================
# - hostssl entries require SSL/TLS for connections (mandatory in production)
# - scram-sha-256 is the strongest password-based authentication method
# - peer authentication is used for local postgres superuser only
# - Replication user is restricted to the replication subnet
# - Admin access is limited to localhost, app subnet, and management network
# - Application user can only access the app_production database
# - Readonly user is available to app servers and monitoring/reporting
# - All unmatched connections are explicitly rejected
# - Update subnet addresses (10.10.x.0/xx) to match your network topology
