# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a Deployment Manager template for a complete GCP application stack (Compute Engine, Cloud SQL, Cloud Storage, Load Balancer). Focus on core infrastructure. Skip Cloud Logging and Monitoring configuration to reduce complexity in our initial MVP deployment.
# Category: cloud_monitoring

resources:
# VPC Network
- name: app-network
  type: compute.v1.network
  properties:
    autoCreateSubnetworks: false
    routingConfig:
      routingMode: REGIONAL

# Subnet
- name: app-subnet
  type: compute.v1.subnetwork
  properties:
    network: $(ref.app-network.selfLink)
    region: us-central1
    ipCidrRange: 10.0.0.0/24
    privateIpGoogleAccess: true

# Firewall - Allow HTTP/HTTPS
- name: allow-http-https
  type: compute.v1.firewall
  properties:
    network: $(ref.app-network.selfLink)
    allowed:
      - IPProtocol: TCP
        ports:
          - "80"
          - "443"
    sourceRanges:
      - 0.0.0.0/0
    targetTags:
      - http-server
      - https-server

# Firewall - Allow Health Checks
- name: allow-health-check
  type: compute.v1.firewall
  properties:
    network: $(ref.app-network.selfLink)
    allowed:
      - IPProtocol: TCP
        ports:
          - "80"
    sourceRanges:
      - 130.211.0.0/22
      - 35.191.0.0/16
    targetTags:
      - http-server

# Firewall - Allow Internal Communication
- name: allow-internal
  type: compute.v1.firewall
  properties:
    network: $(ref.app-network.selfLink)
    allowed:
      - IPProtocol: TCP
        ports:
          - "0-65535"
      - IPProtocol: UDP
        ports:
          - "0-65535"
      - IPProtocol: ICMP
    sourceRanges:
      - 10.0.0.0/24

# Firewall - Allow SSH
- name: allow-ssh
  type: compute.v1.firewall
  properties:
    network: $(ref.app-network.selfLink)
    allowed:
      - IPProtocol: TCP
        ports:
          - "22"
    sourceRanges:
      - 0.0.0.0/0
    targetTags:
      - allow-ssh

# Cloud Storage Bucket
- name: app-static-assets-bucket
  type: storage.v1.bucket
  properties:
    name: app-static-assets-{{ env["project"] }}
    location: US-CENTRAL1
    storageClass: STANDARD
    versioning:
      enabled: true
    lifecycle:
      rule:
        - action:
            type: Delete
          condition:
            age: 365
    cors:
      - origin:
          - "*"
        method:
          - GET
          - HEAD
        responseHeader:
          - Content-Type
        maxAgeSeconds: 3600

# Cloud Storage Bucket - Database Backups
- name: app-db-backups-bucket
  type: storage.v1.bucket
  properties:
    name: app-db-backups-{{ env["project"] }}
    location: US-CENTRAL1
    storageClass: NEARLINE
    versioning:
      enabled: true
    lifecycle:
      rule:
        - action:
            type: Delete
          condition:
            age: 90

# Cloud SQL Instance
- name: app-sql-instance
  type: sqladmin.v1beta4.instance
  properties:
    region: us-central1
    databaseVersion: MYSQL_8_0
    settings:
      tier: db-n1-standard-2
      dataDiskSizeGb: 50
      dataDiskType: PD_SSD
      storageAutoResize: true
      storageAutoResizeLimit: 100
      activationPolicy: ALWAYS
      availabilityType: REGIONAL
      backupConfiguration:
        enabled: true
        binaryLogEnabled: true
        startTime: "03:00"
        location: us-central1
        backupRetentionSettings:
          retainedBackups: 14
          retentionUnit: COUNT
      ipConfiguration:
        ipv4Enabled: false
        privateNetwork: $(ref.app-network.selfLink)
        requireSsl: true
      databaseFlags:
        - name: slow_query_log
          value: "on"
        - name: long_query_time
          value: "2"
        - name: max_connections
          value: "500"
      maintenanceWindow:
        day: 7
        hour: 4
        updateTrack: stable

# Cloud SQL Database
- name: app-database
  type: sqladmin.v1beta4.database
  properties:
    instance: $(ref.app-sql-instance.name)
    name: appdb
    charset: utf8mb4
    collation: utf8mb4_unicode_ci

# Cloud SQL User
- name: app-db-user
  type: sqladmin.v1beta4.user
  properties:
    instance: $(ref.app-sql-instance.name)
    name: app_user
    host: "%"
    password: CHANGE_ME_USE_SECRET_MANAGER

# Instance Template for Managed Instance Group
- name: app-instance-template
  type: compute.v1.instanceTemplate
  properties:
    properties:
      machineType: e2-medium
      tags:
        items:
          - http-server
          - https-server
          - allow-ssh
      disks:
        - deviceName: boot
          type: PERSISTENT
          boot: true
          autoDelete: true
          initializeParams:
            sourceImage: projects/ubuntu-os-cloud/global/images/family/ubuntu-2204-lts
            diskType: pd-balanced
            diskSizeGb: 30
      networkInterfaces:
        - network: $(ref.app-network.selfLink)
          subnetwork: $(ref.app-subnet.selfLink)
          accessConfigs:
            - name: External NAT
              type: ONE_TO_ONE_NAT
      serviceAccounts:
        - email: default
          scopes:
            - https://www.googleapis.com/auth/cloud-platform
            - https://www.googleapis.com/auth/sqlservice.admin
            - https://www.googleapis.com/auth/devstorage.read_write
      metadata:
        items:
          - key: startup-script
            value: |
              #!/bin/bash
              set -e

              # Update system packages
              apt-get update && apt-get upgrade -y

              # Install required packages
              apt-get install -y nginx mysql-client wget curl

              # Install Cloud SQL Proxy
              wget https://dl.google.com/cloudsql/cloud_sql_proxy.linux.amd64 -O /usr/local/bin/cloud_sql_proxy
              chmod +x /usr/local/bin/cloud_sql_proxy

              # Configure Nginx as reverse proxy
              cat > /etc/nginx/sites-available/default <<'EOF'
              server {
                  listen 80 default_server;
                  listen [::]:80 default_server;

                  location / {
                      proxy_pass http://127.0.0.1:8080;
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                  }

                  location /health {
                      access_log off;
                      return 200 'OK';
                      add_header Content-Type text/plain;
                  }
              }
              EOF

              systemctl restart nginx
              systemctl enable nginx

# Health Check
- name: app-health-check
  type: compute.v1.healthCheck
  properties:
    type: HTTP
    httpHealthCheck:
      port: 80
      requestPath: /health
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3

# Regional Managed Instance Group
- name: app-instance-group-manager
  type: compute.v1.regionInstanceGroupManager
  properties:
    region: us-central1
    baseInstanceName: app-vm
    instanceTemplate: $(ref.app-instance-template.selfLink)
    targetSize: 2
    namedPorts:
      - name: http
        port: 80
    autoHealingPolicies:
      - healthCheck: $(ref.app-health-check.selfLink)
        initialDelaySec: 300
    updatePolicy:
      type: PROACTIVE
      maxSurge:
        fixed: 1
      maxUnavailable:
        fixed: 0
      minimalAction: REPLACE
    distributionPolicy:
      zones:
        - zone: zones/us-central1-a
        - zone: zones/us-central1-b
        - zone: zones/us-central1-c

# Autoscaler
- name: app-autoscaler
  type: compute.v1.regionAutoscaler
  properties:
    region: us-central1
    target: $(ref.app-instance-group-manager.selfLink)
    autoscalingPolicy:
      minNumReplicas: 2
      maxNumReplicas: 10
      cpuUtilization:
        utilizationTarget: 0.7
      coolDownPeriodSec: 300
      scaleInControl:
        maxScaledInReplicas:
          fixed: 1
        timeWindowSec: 600

# Static External IP for Load Balancer
- name: app-lb-ip
  type: compute.v1.globalAddress
  properties:
    ipVersion: IPV4

# Backend Service
- name: app-backend-service
  type: compute.v1.backendService
  properties:
    protocol: HTTP
    portName: http
    healthChecks:
      - $(ref.app-health-check.selfLink)
    backends:
      - group: $(ref.app-instance-group-manager.instanceGroup)
        balancingMode: UTILIZATION
        maxUtilization: 0.8
        capacityScaler: 1.0
    sessionAffinity: NONE
    connectionDraining:
      drainingTimeoutSec: 300
    timeoutSec: 30
    logConfig:
      enable: true
      sampleRate: 1.0

# URL Map
- name: app-url-map
  type: compute.v1.urlMap
  properties:
    defaultService: $(ref.app-backend-service.selfLink)
    hostRules:
      - hosts:
          - "*"
        pathMatcher: all-paths
    pathMatchers:
      - name: all-paths
        defaultService: $(ref.app-backend-service.selfLink)
        pathRules:
          - paths:
              - /static/*
            service: $(ref.app-backend-service.selfLink)

# HTTP Target Proxy
- name: app-http-proxy
  type: compute.v1.targetHttpProxy
  properties:
    urlMap: $(ref.app-url-map.selfLink)

# HTTP Forwarding Rule
- name: app-http-forwarding-rule
  type: compute.v1.globalForwardingRule
  properties:
    IPAddress: $(ref.app-lb-ip.address)
    IPProtocol: TCP
    portRange: "80"
    target: $(ref.app-http-proxy.selfLink)
    loadBalancingScheme: EXTERNAL

outputs:
  - name: load-balancer-ip
    value: $(ref.app-lb-ip.address)
  - name: network
    value: $(ref.app-network.selfLink)
  - name: subnet
    value: $(ref.app-subnet.selfLink)
  - name: sql-instance-name
    value: $(ref.app-sql-instance.name)
  - name: sql-instance-connection-name
    value: $(ref.app-sql-instance.connectionName)
  - name: sql-instance-ip
    value: $(ref.app-sql-instance.ipAddresses[0].ipAddress)
  - name: static-assets-bucket
    value: $(ref.app-static-assets-bucket.name)
  - name: db-backups-bucket
    value: $(ref.app-db-backups-bucket.name)
  - name: instance-group
    value: $(ref.app-instance-group-manager.selfLink)
  - name: instance-template
    value: $(ref.app-instance-template.selfLink)