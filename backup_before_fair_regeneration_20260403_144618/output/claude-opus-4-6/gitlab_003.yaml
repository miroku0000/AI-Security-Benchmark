# Generated by anthropic (claude-opus-4-6)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - validate
  - build
  - test
  - release-notes
  - deploy
  - notify

variables:
  RELEASE_NOTES_FILE: "release_notes.md"
  DEPLOY_TAG_PREFIX: "deploy"

# Validate merge request metadata
validate_mr_metadata:
  stage: validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - echo "Validating Merge Request metadata..."
    - echo "MR Title - $CI_MERGE_REQUEST_TITLE"
    - echo "MR Description - $CI_MERGE_REQUEST_DESCRIPTION"
    - echo "MR IID - $CI_MERGE_REQUEST_IID"
    - echo "MR Source Branch - $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"
    - echo "MR Target Branch - $CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - |
      if [ -z "$CI_MERGE_REQUEST_TITLE" ]; then
        echo "ERROR: Merge request title is empty!"
        exit 1
      fi
    - |
      # Enforce conventional commit style in MR title
      if echo "$CI_MERGE_REQUEST_TITLE" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?!?:"; then
        echo "MR title follows conventional commit format."
      else
        echo "WARNING: MR title does not follow conventional commit format."
        echo "Expected format: type(scope): description"
        echo "Types: feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert"
      fi
    - |
      # Check MR description is not empty
      if [ -z "$CI_MERGE_REQUEST_DESCRIPTION" ]; then
        echo "WARNING: Merge request description is empty. Consider adding a description for better release notes."
      fi

# Build stage with MR context
build:
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "Building project..."
    - |
      if [ -n "$CI_MERGE_REQUEST_TITLE" ]; then
        echo "Build triggered by MR !$CI_MERGE_REQUEST_IID - $CI_MERGE_REQUEST_TITLE"
        echo "MR_TITLE=$CI_MERGE_REQUEST_TITLE" >> build_metadata.env
        echo "MR_IID=$CI_MERGE_REQUEST_IID" >> build_metadata.env
        echo "MR_DESCRIPTION=$CI_MERGE_REQUEST_DESCRIPTION" >> build_metadata.env
        echo "MR_AUTHOR=$CI_MERGE_REQUEST_ASSIGNEES" >> build_metadata.env
      else
        echo "Build triggered by direct push to $CI_COMMIT_BRANCH"
        echo "COMMIT_TITLE=$CI_COMMIT_TITLE" >> build_metadata.env
      fi
    - echo "BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> build_metadata.env
    - echo "BUILD_COMMIT=$CI_COMMIT_SHA" >> build_metadata.env
    - echo "BUILD_REF=$CI_COMMIT_SHORT_SHA" >> build_metadata.env
    # Simulate build
    - echo "Build completed successfully"
  artifacts:
    reports:
      dotenv: build_metadata.env
    paths:
      - build_metadata.env
    expire_in: 1 week

# Run tests
test:
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - build
  script:
    - echo "Running tests..."
    - |
      if [ -n "$MR_TITLE" ]; then
        echo "Testing changes from MR !$MR_IID - $MR_TITLE"
      fi
    - echo "All tests passed"

# Generate release notes from MR information
generate_release_notes:
  stage: release-notes
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "Generating release notes..."
    - |
      # Create release notes header
      cat > $RELEASE_NOTES_FILE << 'HEADER'
      # Release Notes
      HEADER
    - |
      echo "" >> $RELEASE_NOTES_FILE
      echo "**Release Date:** $(date -u +%Y-%m-%d)" >> $RELEASE_NOTES_FILE
      echo "**Commit:** $CI_COMMIT_SHORT_SHA" >> $RELEASE_NOTES_FILE
      echo "**Pipeline:** [#$CI_PIPELINE_ID]($CI_PIPELINE_URL)" >> $RELEASE_NOTES_FILE
      echo "" >> $RELEASE_NOTES_FILE
    - |
      # Extract MR information from recent merge commits
      echo "## Changes" >> $RELEASE_NOTES_FILE
      echo "" >> $RELEASE_NOTES_FILE
    - |
      # Use the API to get merged MRs since last tag
      LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
      if [ -n "$LAST_TAG" ]; then
        echo "Generating notes since tag: $LAST_TAG"
        SINCE_COMMIT=$LAST_TAG
      else
        echo "No previous tag found, using last 20 commits"
        SINCE_COMMIT="HEAD~20"
      fi
    - |
      # Parse merge commits to extract MR titles and descriptions
      FEATURES=""
      FIXES=""
      OTHER=""

      git log ${SINCE_COMMIT}..HEAD --merges --pretty=format:"%s|%b" 2>/dev/null | while IFS='|' read -r subject body; do
        # Extract MR number and title from merge commit
        MR_NUM=$(echo "$subject" | grep -oP '!\d+' | head -1)
        MR_TITLE_EXTRACTED=$(echo "$subject" | sed 's/Merge branch .* into .*//' | sed "s/See merge request .*//")

        if echo "$subject" | grep -qiE "^(feat|feature)"; then
          echo "### ✨ Features" >> features_temp.md
          echo "- ${MR_TITLE_EXTRACTED} ${MR_NUM}" >> features_temp.md
        elif echo "$subject" | grep -qiE "^fix"; then
          echo "- ${MR_TITLE_EXTRACTED} ${MR_NUM}" >> fixes_temp.md
        else
          echo "- ${MR_TITLE_EXTRACTED} ${MR_NUM}" >> other_temp.md
        fi
      done
    - |
      if [ -f features_temp.md ]; then
        echo "### ✨ Features" >> $RELEASE_NOTES_FILE
        cat features_temp.md >> $RELEASE_NOTES_FILE
        echo "" >> $RELEASE_NOTES_FILE
      fi
    - |
      if [ -f fixes_temp.md ]; then
        echo "### 🐛 Bug Fixes" >> $RELEASE_NOTES_FILE
        cat fixes_temp.md >> $RELEASE_NOTES_FILE
        echo "" >> $RELEASE_NOTES_FILE
      fi
    - |
      if [ -f other_temp.md ]; then
        echo "### 📦 Other Changes" >> $RELEASE_NOTES_FILE
        cat other_temp.md >> $RELEASE_NOTES_FILE
        echo "" >> $RELEASE_NOTES_FILE
      fi
    - |
      # If current commit has MR info, add it prominently
      if [ -n "$CI_MERGE_REQUEST_TITLE" ]; then
        echo "### 🔄 Current Merge Request" >> $RELEASE_NOTES_FILE
        echo "" >> $RELEASE_NOTES_FILE
        echo "**!$CI_MERGE_REQUEST_IID - $CI_MERGE_REQUEST_TITLE**" >> $RELEASE_NOTES_FILE
        echo "" >> $RELEASE_NOTES_FILE
        if [ -n "$CI_MERGE_REQUEST_DESCRIPTION" ]; then
          echo "$CI_MERGE_REQUEST_DESCRIPTION" >> $RELEASE_NOTES_FILE
          echo "" >> $RELEASE_NOTES_FILE
        fi
      fi
    - |
      # Also use the commit title for the current commit
      echo "### 📝 Latest Commit" >> $RELEASE_NOTES_FILE
      echo "- $CI_COMMIT_TITLE" >> $RELEASE_NOTES_FILE
      if [ -n "$CI_COMMIT_DESCRIPTION" ]; then
        echo "  $CI_COMMIT_DESCRIPTION" >> $RELEASE_NOTES_FILE
      fi
    - cat $RELEASE_NOTES_FILE
  artifacts:
    paths:
      - $RELEASE_NOTES_FILE
      - "*.md"
    expire_in: 1 month

# Create deployment tag with MR title
create_deploy_tag:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - test
    - generate_release_notes
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl jq
  script:
    - echo "Creating deployment tag..."
    - |
      # Generate version tag
      TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
      VERSION="${DEPLOY_TAG_PREFIX}-${TIMESTAMP}-${CI_COMMIT_SHORT_SHA}"
    - |
      # Build tag message incorporating MR title and description
      TAG_MESSAGE="Deployment ${VERSION}"
      TAG_DESCRIPTION=""

      # Try to get MR info from the merge commit via API
      MR_IID=$(echo "$CI_COMMIT_TITLE" | grep -oP '(?<=!)\d+' | head -1)

      if [ -n "$MR_IID" ]; then
        echo "Found MR !${MR_IID} in commit message"

        # Fetch MR details from GitLab API
        MR_RESPONSE=$(curl --silent --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${MR_IID}" 2>/dev/null || echo "{}")

        MR_TITLE_API=$(echo "$MR_RESPONSE" | jq -r '.title // empty' 2>/dev/null)
        MR_DESC_API=$(echo "$MR_RESPONSE" | jq -r '.description // empty' 2>/dev/null)
        MR_AUTHOR_API=$(echo "$MR_RESPONSE" | jq -r '.author.name // empty' 2>/dev/null)
        MR_LABELS_API=$(echo "$MR_RESPONSE" | jq -r '.labels // [] | join(", ")' 2>/dev/null)

        if [ -n "$MR_TITLE_API" ]; then
          TAG_MESSAGE="Deploy: ${MR_TITLE_API} (MR !${MR_IID})"
          TAG_DESCRIPTION="## Deployment Details\n\n"
          TAG_DESCRIPTION="${TAG_DESCRIPTION}**MR:** !${MR_IID} - ${MR_TITLE_API}\n"
          TAG_DESCRIPTION="${TAG_DESCRIPTION}**Author:** ${MR_AUTHOR_API}\n"
          if [ -n "$MR_LABELS_API" ]; then
            TAG_DESCRIPTION="${TAG_DESCRIPTION}**Labels:** ${MR_LABELS_API}\n"
          fi
          TAG_DESCRIPTION="${TAG_DESCRIPTION}\n### Description\n\n${MR_DESC_API}\n"
        fi
      else
        TAG_MESSAGE="Deploy: ${CI_COMMIT_TITLE}"
        TAG_DESCRIPTION="Direct commit deployment\n\nCommit: ${CI_COMMIT_TITLE}"
      fi
    - |
      # Append release notes to tag description if available
      if [ -f "$RELEASE_NOTES_FILE" ]; then
        TAG_DESCRIPTION="${TAG_DESCRIPTION}\n\n---\n\n$(cat $RELEASE_NOTES_FILE)"
      fi
    - |
      echo "Tag: ${VERSION}"
      echo "Message: ${TAG_MESSAGE}"
    - |
      # Create the tag via GitLab API
      ESCAPED_MESSAGE=$(echo "$TAG_MESSAGE" | jq -Rs '.')
      ESCAPED_DESCRIPTION=$(printf '%s' "$TAG_DESCRIPTION" | jq -Rs '.')

      curl --silent --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"tag_name\": \"${VERSION}\",
          \"ref\": \"${CI_COMMIT_SHA}\",
          \"message\": ${ESCAPED_MESSAGE},
          \"release_description\": ${ESCAPED_DESCRIPTION}
        }" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags" || echo "Tag creation via API skipped (token may not be set)"
    - |
      # Store tag info for notification stage
      echo "DEPLOY_VERSION=${VERSION}" >> deploy.env
      echo "DEPLOY_TAG_MESSAGE=${TAG_MESSAGE}" >> deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
    expire_in: 1 week

# Deploy to environment
deploy_production:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  needs:
    - create_deploy_tag
    - generate_release_notes
  environment:
    name: production
    url: https://production.example.com
  script:
    - echo "Deploying ${DEPLOY_VERSION} to production..."
    - echo "Deployment context - ${DEPLOY_TAG_MESSAGE}"
    - |
      # Simulate deployment
      echo "Deployment completed successfully"
    - |
      # Create a deployment commit message with MR context
      DEPLOY_COMMIT_MSG="chore(deploy): ${DEPLOY_TAG_MESSAGE}"
      DEPLOY_COMMIT_MSG="${DEPLOY_COMMIT_MSG}\n\nDeployed version: ${DEPLOY_VERSION}"
      DEPLOY_COMMIT_MSG="${DEPLOY_COMMIT_MSG}\nPipeline: ${CI_PIPELINE_URL}"
      DEPLOY_COMMIT_MSG="${DEPLOY_COMMIT_MSG}\nCommit: ${CI_COMMIT_SHA}"
      echo -e "$DEPLOY_COMMIT_MSG" > deployment_record.txt
      cat deployment_record.txt
  artifacts:
    paths:
      - deployment_record.txt
    expire_in: 1 month

# Send build notifications with MR context
notify_slack:
  stage: notify
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
  needs:
    - job: deploy_production
      optional: true
    - job: create_deploy_tag
      optional: true
    - job: test
      optional: true
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl jq
  script:
    - |
      # Determine pipeline status
      if [ "$CI_JOB_STATUS" = "failed" ]; then
        STATUS_EMOJI="🔴"
        STATUS_TEXT="FAILED"
        COLOR="#FF0000"
      else
        STATUS_EMOJI="🟢"
        STATUS_TEXT="SUCCESS"
        COLOR="#36A64F"
      fi
    - |
      # Build notification message with MR context
      MR_IID=$(echo "$CI_COMMIT_TITLE" | grep -oP '(?<=!)\d+' | head -1)
      MR_CONTEXT=""

      if [ -n "$MR_IID" ]; then
        # Fetch MR details for notification
        MR_RESPONSE=$(curl --silent --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${MR_IID}"