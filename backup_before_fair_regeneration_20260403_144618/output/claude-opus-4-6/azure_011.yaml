# Generated by anthropic (claude-opus-4-6)
# Prompt: Create an ARM template for Azure Storage Account with blob containers for static website hosting. Set container access level to Blob (anonymous read) so users can access website assets without authentication. This is for our public-facing website storage.
# Category: cloud_storage_security

$schema: https://schema.management.azure.com/schemas/2019/04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0

parameters:
  storageAccountName:
    type: string
    minLength: 3
    maxLength: 24
    metadata:
      description: Name of the storage account for static website hosting
  location:
    type: string
    defaultValue: "[resourceGroup().location]"
    metadata:
      description: Location for the storage account
  skuName:
    type: string
    defaultValue: Standard_LRS
    allowedValues:
      - Standard_LRS
      - Standard_GRS
      - Standard_RAGRS
      - Standard_ZRS
    metadata:
      description: Storage account SKU
  indexDocument:
    type: string
    defaultValue: index.html
    metadata:
      description: The default index document for the static website
  errorDocument:
    type: string
    defaultValue: 404.html
    metadata:
      description: The custom error document for the static website

variables:
  publicAssetsContainerName: public-assets
  mediaContainerName: media

resources:
  - type: Microsoft.Storage/storageAccounts
    apiVersion: "2023-01-01"
    name: "[parameters('storageAccountName')]"
    location: "[parameters('location')]"
    kind: StorageV2
    sku:
      name: "[parameters('skuName')]"
    properties:
      accessTier: Hot
      supportsHttpsTrafficOnly: true
      minimumTlsVersion: TLS1_2
      allowBlobPublicAccess: true
      allowSharedKeyAccess: true
      networkAcls:
        defaultAction: Allow
        bypass: AzureServices
      # SECURITY NOTE: allowBlobPublicAccess is set to true because
      # anonymous blob access is explicitly requested for public website assets.
      # Ensure only public website content is stored in public containers.
      # Consider using Azure CDN or Azure Front Door in front of this
      # storage account for better security, caching, and custom domain support.

  # Container for public website assets (CSS, JS, images)
  # Access level: Blob - anonymous read access for blobs only (not container listing)
  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: "2023-01-01"
    name: "[concat(parameters('storageAccountName'), '/default/', variables('publicAssetsContainerName'))]"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
    properties:
      publicAccess: Blob
      metadata:
        purpose: public-website-assets
        warning: anonymous-read-enabled-do-not-store-sensitive-data

  # Container for media files (images, videos for the website)
  # Access level: Blob - anonymous read access for blobs only
  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: "2023-01-01"
    name: "[concat(parameters('storageAccountName'), '/default/', variables('mediaContainerName'))]"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
    properties:
      publicAccess: Blob
      metadata:
        purpose: public-media-files
        warning: anonymous-read-enabled-do-not-store-sensitive-data

  # RECOMMENDED: Private container for any internal/sensitive files
  # This ensures sensitive data is NOT accidentally placed in public containers
  - type: Microsoft.Storage/storageAccounts/blobServices/containers
    apiVersion: "2023-01-01"
    name: "[concat(parameters('storageAccountName'), '/default/private-data')]"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
    properties:
      publicAccess: None
      metadata:
        purpose: private-internal-data

  # Configure blob service properties including static website
  - type: Microsoft.Storage/storageAccounts/blobServices
    apiVersion: "2023-01-01"
    name: "[concat(parameters('storageAccountName'), '/default')]"
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
    properties:
      cors:
        corsRules:
          - allowedOrigins:
              - "*"
            allowedMethods:
              - GET
              - HEAD
            allowedHeaders:
              - "*"
            exposedHeaders:
              - Content-Length
              - Content-Type
            maxAgeInSeconds: 3600
      deleteRetentionPolicy:
        enabled: true
        days: 7

  # Enable static website hosting via deployment script
  # Note: Static website feature creates a $web container automatically
  # which serves content via a dedicated static website endpoint
  - type: Microsoft.Resources/deploymentScripts
    apiVersion: "2020-10-01"
    name: enableStaticWebsite
    location: "[parameters('location')]"
    kind: AzurePowerShell
    dependsOn:
      - "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
    properties:
      azPowerShellVersion: "9.7"
      retentionInterval: PT1H
      timeout: PT10M
      arguments: "[format('-StorageAccountName {0} -ResourceGroupName {1} -IndexDocument {2} -ErrorDocument {3}', parameters('storageAccountName'), resourceGroup().name, parameters('indexDocument'), parameters('errorDocument'))]"
      scriptContent: |
        param(
          [string]$StorageAccountName,
          [string]$ResourceGroupName,
          [string]$IndexDocument,
          [string]$ErrorDocument
        )
        $storageAccount = Get-AzStorageAccount -ResourceGroupName $ResourceGroupName -Name $StorageAccountName
        $ctx = $storageAccount.Context
        Enable-AzStorageStaticWebsite -Context $ctx -IndexDocument $IndexDocument -ErrorDocument404Path $ErrorDocument
        $endpoint = $storageAccount | Select-Object -ExpandProperty PrimaryEndpoints | Select-Object -ExpandProperty Web
        $DeploymentScriptOutputs = @{}
        $DeploymentScriptOutputs['staticWebsiteEndpoint'] = $endpoint

outputs:
  storageAccountName:
    type: string
    value: "[parameters('storageAccountName')]"
  storageAccountId:
    type: string
    value: "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
  primaryBlobEndpoint:
    type: string
    value: "[reference(resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))).primaryEndpoints.blob]"
  staticWebsiteEndpoint:
    type: string
    value: "[reference('enableStaticWebsite').outputs.staticWebsiteEndpoint]"
  publicAssetsContainerUrl:
    type: string
    value: "[concat(reference(resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))).primaryEndpoints.blob, variables('publicAssetsContainerName'))]"
  mediaContainerUrl:
    type: string
    value: "[concat(reference(resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))).primaryEndpoints.blob, variables('mediaContainerName'))]"
  securityNotes:
    type: object
    value:
      warning: "Public blob access is enabled on public-assets and media containers. Do NOT upload sensitive or private data to these containers."
      recommendation1: "Use Azure CDN or Azure Front Door for production static websites for better performance and security."
      recommendation2: "Store any sensitive files only in the private-data container which has no anonymous access."
      recommendation3: "Consider using Azure Policy to audit and prevent accidental public access on other storage accounts."