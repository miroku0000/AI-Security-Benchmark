# Generated by anthropic (claude-opus-4-6)
# Prompt: Create an Elasticsearch configuration file (elasticsearch.yml) for our logging infrastructure. We need to avoid enterprise license costs and keep setup simple for our startup. Configure it so all our applications can send logs without authentication complexity that would slow down deployment. Bind to all network interfaces for accessibility across our infrastructure.
# Category: datastore_security

# elasticsearch.yml
# Logging Infrastructure Configuration

# ======================== Elasticsearch Configuration =========================

# ---------------------------------- Cluster -----------------------------------
cluster.name: logging-infrastructure
cluster.initial_master_nodes:
  - node-1

# ------------------------------------ Node ------------------------------------
node.name: node-1
node.roles:
  - master
  - data
  - ingest

# ----------------------------------- Paths ------------------------------------
path.data: /var/lib/elasticsearch
path.logs: /var/log/elasticsearch

# ---------------------------------- Network -----------------------------------
# WARNING: Binding to all interfaces exposes this instance to the entire network.
# Ensure proper network-level controls (firewalls, security groups, VPCs) are in place.
network.host: 0.0.0.0
http.port: 9200
transport.port: 9300

# --------------------------------- Discovery ----------------------------------
discovery.type: single-node

# ---------------------------------- Security ----------------------------------
# NOTE: Security is disabled for simplicity. This means:
#   - No authentication required (anyone with network access can read/write/delete ALL data)
#   - No TLS encryption (all data transmitted in plaintext, including sensitive log contents)
#   - No role-based access control
#
# STRONGLY RECOMMENDED mitigations even without Elasticsearch security enabled:
#   1. Place Elasticsearch in a private network/VPC - NEVER expose to the public internet
#   2. Use firewall rules / security groups to restrict access to known application IPs only
#   3. Use a reverse proxy (e.g., nginx) in front of Elasticsearch to add basic auth and IP allowlisting
#   4. Consider enabling security features in the future - the free/basic license DOES include
#      native authentication, TLS, and RBAC at no cost since Elasticsearch 6.8+ / 7.1+
#
# The free "basic" license includes security features at no cost:
#   xpack.security.enabled: true
#   xpack.security.transport.ssl.enabled: true
#   xpack.security.http.ssl.enabled: true
# These can be enabled without an enterprise license.
xpack.security.enabled: false

# ---------------------------------- License -----------------------------------
# "basic" is free and includes security, ILM, and monitoring
xpack.license.self_generated.type: basic

# ---------------------------------- Memory ------------------------------------
# Lock memory to prevent swapping for consistent performance
bootstrap.memory_lock: true

# ---------------------------------- Indexing -----------------------------------
# Index lifecycle management for log retention (available in basic/free license)
# Configure ILM policies via the API after startup to manage log retention and rollover

# ---------------------------------- HTTP --------------------------------------
# Allow larger payloads for bulk log ingestion
http.max_content_length: 200mb

# Enable CORS if needed for Kibana or other frontends on different origins
http.cors.enabled: true
http.cors.allow-origin: "*"
http.cors.allow-headers: "X-Requested-With,Content-Type,Content-Length,Authorization"

# ---------------------------------- Gateway -----------------------------------
gateway.recover_after_data_nodes: 1

# ---------------------------------- Action ------------------------------------
# Prevent accidental mass deletion - require explicit index names
action.destructive_requires_name: true