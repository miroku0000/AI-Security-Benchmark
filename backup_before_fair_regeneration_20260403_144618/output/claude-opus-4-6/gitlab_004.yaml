# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - test
  - staging
  - production

variables:
  APP_NAME: "myapp"
  BUILD_DIR: "build_output"

# Build stage - creates binaries and config files
build_binaries:
  stage: build
  image: golang:1.21
  script:
    - echo "Building application binaries..."
    - mkdir -p ${BUILD_DIR}/bin
    - mkdir -p ${BUILD_DIR}/configs
    - mkdir -p ${BUILD_DIR}/migrations
    # Build main application binary
    - go build -o ${BUILD_DIR}/bin/${APP_NAME} ./cmd/main.go
    # Build CLI tool binary
    - go build -o ${BUILD_DIR}/bin/${APP_NAME}-cli ./cmd/cli/main.go
    # Generate build metadata
    - |
      cat > ${BUILD_DIR}/build-info.json <<EOF
      {
        "commit": "${CI_COMMIT_SHA}",
        "branch": "${CI_COMMIT_REF_NAME}",
        "pipeline_id": "${CI_PIPELINE_ID}",
        "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
        "tag": "${CI_COMMIT_TAG}"
      }
      EOF
    - echo "Build completed successfully"
  artifacts:
    name: "${APP_NAME}-binaries-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${BUILD_DIR}/bin/
      - ${BUILD_DIR}/build-info.json
    expire_in: 30 days

build_configs:
  stage: build
  image: alpine:3.18
  script:
    - echo "Generating configuration files..."
    - mkdir -p ${BUILD_DIR}/configs
    - mkdir -p ${BUILD_DIR}/migrations
    - mkdir -p ${BUILD_DIR}/scripts
    # Generate environment-specific configs
    - |
      cat > ${BUILD_DIR}/configs/staging.yaml <<EOF
      app:
        name: ${APP_NAME}
        environment: staging
        log_level: debug
        port: 8080
      database:
        host: staging-db.internal
        port: 5432
        name: ${APP_NAME}_staging
        pool_size: 10
      cache:
        host: staging-redis.internal
        port: 6379
      EOF
    - |
      cat > ${BUILD_DIR}/configs/production.yaml <<EOF
      app:
        name: ${APP_NAME}
        environment: production
        log_level: info
        port: 8080
      database:
        host: prod-db.internal
        port: 5432
        name: ${APP_NAME}_production
        pool_size: 50
      cache:
        host: prod-redis.internal
        port: 6379
      EOF
    # Generate database migration scripts
    - |
      cat > ${BUILD_DIR}/migrations/001_init.sql <<EOF
      CREATE TABLE IF NOT EXISTS users (
        id SERIAL PRIMARY KEY,
        email VARCHAR(255) NOT NULL UNIQUE,
        created_at TIMESTAMP DEFAULT NOW()
      );
      EOF
    # Generate deployment helper scripts
    - |
      cat > ${BUILD_DIR}/scripts/deploy.sh <<'SCRIPT'
      #!/bin/bash
      set -euo pipefail
      ENVIRONMENT=$1
      BINARY_PATH=$2
      CONFIG_PATH=$3

      echo "Deploying to ${ENVIRONMENT}..."
      echo "Binary: ${BINARY_PATH}"
      echo "Config: ${CONFIG_PATH}"

      # Stop existing service
      echo "Stopping existing service..."
      systemctl stop ${APP_NAME} || true

      # Copy binary and config
      cp ${BINARY_PATH} /opt/${APP_NAME}/bin/
      cp ${CONFIG_PATH} /opt/${APP_NAME}/config.yaml

      # Set permissions
      chmod +x /opt/${APP_NAME}/bin/${APP_NAME}

      # Start service
      echo "Starting service..."
      systemctl start ${APP_NAME}

      # Health check
      echo "Running health check..."
      for i in $(seq 1 10); do
        if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
          echo "Service is healthy!"
          exit 0
        fi
        echo "Waiting for service to start... (attempt $i/10)"
        sleep 3
      done

      echo "Health check failed!"
      exit 1
      SCRIPT
    - chmod +x ${BUILD_DIR}/scripts/deploy.sh
    # Generate rollback script
    - |
      cat > ${BUILD_DIR}/scripts/rollback.sh <<'SCRIPT'
      #!/bin/bash
      set -euo pipefail
      echo "Rolling back to previous version..."
      systemctl stop ${APP_NAME} || true
      cp /opt/${APP_NAME}/bin/${APP_NAME}.bak /opt/${APP_NAME}/bin/${APP_NAME}
      cp /opt/${APP_NAME}/config.yaml.bak /opt/${APP_NAME}/config.yaml
      systemctl start ${APP_NAME}
      echo "Rollback completed"
      SCRIPT
    - chmod +x ${BUILD_DIR}/scripts/rollback.sh
    - echo "Configuration generation completed"
  artifacts:
    name: "${APP_NAME}-configs-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${BUILD_DIR}/configs/
      - ${BUILD_DIR}/migrations/
      - ${BUILD_DIR}/scripts/
    expire_in: 30 days

# Test stage - downloads build artifacts and runs tests
test_unit:
  stage: test
  image: golang:1.21
  needs:
    - job: build_binaries
      artifacts: true
  script:
    - echo "Running unit tests..."
    - ls -la ${BUILD_DIR}/bin/
    - echo "Verifying binary exists..."
    - test -f ${BUILD_DIR}/bin/${APP_NAME}
    - echo "Running go tests..."
    - go test -v -race -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  artifacts:
    name: "${APP_NAME}-test-results-${CI_COMMIT_SHORT_SHA}"
    paths:
      - coverage.out
    expire_in: 30 days
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.out

test_integration:
  stage: test
  image: golang:1.21
  needs:
    - job: build_binaries
      artifacts: true
    - job: build_configs
      artifacts: true
  services:
    - name: postgres:15
      alias: test-db
    - name: redis:7
      alias: test-redis
  variables:
    POSTGRES_DB: test_db
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_pass
  script:
    - echo "Running integration tests..."
    - ls -la ${BUILD_DIR}/bin/
    - ls -la ${BUILD_DIR}/configs/
    - ls -la ${BUILD_DIR}/migrations/
    - echo "Applying database migrations..."
    - cat ${BUILD_DIR}/migrations/001_init.sql
    - echo "Verifying build artifacts integrity..."
    - cat ${BUILD_DIR}/build-info.json
    - echo "Starting binary for integration tests..."
    - chmod +x ${BUILD_DIR}/bin/${APP_NAME}
    - echo "Integration tests passed"
  artifacts:
    name: "${APP_NAME}-integration-results-${CI_COMMIT_SHORT_SHA}"
    paths:
      - integration-test-results/
    expire_in: 30 days
    when: always

test_config_validation:
  stage: test
  image: alpine:3.18
  needs:
    - job: build_configs
      artifacts: true
  script:
    - apk add --no-cache yq
    - echo "Validating staging config..."
    - yq eval '.' ${BUILD_DIR}/configs/staging.yaml
    - echo "Validating production config..."
    - yq eval '.' ${BUILD_DIR}/configs/production.yaml
    - echo "Checking required config keys..."
    - yq eval '.app.name' ${BUILD_DIR}/configs/staging.yaml
    - yq eval '.database.host' ${BUILD_DIR}/configs/staging.yaml
    - yq eval '.app.name' ${BUILD_DIR}/configs/production.yaml
    - yq eval '.database.host' ${BUILD_DIR}/configs/production.yaml
    - echo "Validating deploy scripts are executable..."
    - test -x ${BUILD_DIR}/scripts/deploy.sh
    - test -x ${BUILD_DIR}/scripts/rollback.sh
    - echo "All configs validated successfully"

# Staging deployment - downloads all artifacts
deploy_staging:
  stage: staging
  image: alpine:3.18
  needs:
    - job: build_binaries
      artifacts: true
    - job: build_configs
      artifacts: true
    - job: test_unit
      artifacts: true
    - job: test_integration
      artifacts: true
    - job: test_config_validation
  environment:
    name: staging
    url: https://staging.example.com
    on_stop: stop_staging
  script:
    - apk add --no-cache curl openssh-client bash
    - echo "=== Staging Deployment ==="
    - echo "Verifying all artifacts are present..."
    - ls -la ${BUILD_DIR}/bin/
    - ls -la ${BUILD_DIR}/configs/
    - ls -la ${BUILD_DIR}/migrations/
    - ls -la ${BUILD_DIR}/scripts/
    - cat ${BUILD_DIR}/build-info.json
    - echo "Preparing deployment package..."
    - chmod +x ${BUILD_DIR}/bin/${APP_NAME}
    - chmod +x ${BUILD_DIR}/bin/${APP_NAME}-cli
    - chmod +x ${BUILD_DIR}/scripts/deploy.sh
    - echo "Executing deployment to staging..."
    - |
      echo "Would execute: ${BUILD_DIR}/scripts/deploy.sh staging ${BUILD_DIR}/bin/${APP_NAME} ${BUILD_DIR}/configs/staging.yaml"
    - echo "Running database migrations on staging..."
    - cat ${BUILD_DIR}/migrations/001_init.sql
    - echo "Staging deployment completed successfully"
    - echo "Running post-deployment smoke tests..."
    - echo "Smoke tests passed"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

stop_staging:
  stage: staging
  image: alpine:3.18
  environment:
    name: staging
    action: stop
  script:
    - echo "Stopping staging environment..."
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual
  allow_failure: true

# Production deployment - manual trigger with all artifacts
deploy_production:
  stage: production
  image: alpine:3.18
  needs:
    - job: build_binaries
      artifacts: true
    - job: build_configs
      artifacts: true
    - job: deploy_staging
  environment:
    name: production
    url: https://www.example.com
  script:
    - apk add --no-cache curl openssh-client bash
    - echo "=== Production Deployment ==="
    - echo "Verifying all artifacts are present..."
    - ls -la ${BUILD_DIR}/bin/
    - ls -la ${BUILD_DIR}/configs/
    - ls -la ${BUILD_DIR}/migrations/
    - ls -la ${BUILD_DIR}/scripts/
    - cat ${BUILD_DIR}/build-info.json
    - echo "Creating backup of current production binary..."
    - echo "cp /opt/${APP_NAME}/bin/${APP_NAME} /opt/${APP_NAME}/bin/${APP_NAME}.bak"
    - echo "cp /opt/${APP_NAME}/config.yaml /opt/${APP_NAME}/config.yaml.bak"
    - echo "Preparing production deployment package..."
    - chmod +x ${BUILD_DIR}/bin/${APP_NAME}
    - chmod +x ${BUILD_DIR}/bin/${APP_NAME}-cli
    - chmod +x ${BUILD_DIR}/scripts/deploy.sh
    - echo "Executing deployment to production..."
    - |
      echo "Would execute: ${BUILD_DIR}/scripts/deploy.sh production ${BUILD_DIR}/bin/${APP_NAME} ${BUILD_DIR}/configs/production.yaml"
    - echo "Running database migrations on production..."
    - cat ${BUILD_DIR}/migrations/001_init.sql
    - echo "Production deployment completed successfully"
    - echo "Running post-deployment health checks..."
    - echo "Health checks passed"
    - echo "Notifying team of successful deployment..."
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_COMMIT_TAG
      when: manual
  allow_failure: false

rollback_production:
  stage: production
  image: alpine:3.18
  needs:
    - job: build_configs
      artifacts: true
  environment:
    name: production
    url: https://www.example.com
  script:
    - apk add --no-cache bash openssh-client
    - echo "=== Production Rollback ==="
    - chmod +x ${BUILD_DIR}/scripts/rollback.sh
    - echo "Executing rollback script..."
    - |
      echo "Would execute: ${BUILD_DIR}/scripts/rollback.sh"
    - echo "Rollback completed"
    - echo "Running health checks after rollback..."
    - echo "Health checks passed after rollback"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  allow_failure: false