# Generated by anthropic (claude-opus-4-6)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Build and Notification Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - main
      - develop
      - 'release/**'

env:
  PR_TITLE: ${{ github.event.pull_request.title }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  PR_AUTHOR: ${{ github.event.pull_request.user.login }}
  PR_URL: ${{ github.event.pull_request.html_url }}
  PR_BRANCH: ${{ github.event.pull_request.head.ref }}
  PR_BASE: ${{ github.event.pull_request.base.ref }}

jobs:
  extract-pr-metadata:
    name: Extract PR Metadata
    runs-on: ubuntu-latest
    outputs:
      pr_title: ${{ steps.pr-info.outputs.pr_title }}
      pr_description: ${{ steps.pr-info.outputs.pr_description }}
      pr_number: ${{ steps.pr-info.outputs.pr_number }}
      pr_author: ${{ steps.pr-info.outputs.pr_author }}
      pr_labels: ${{ steps.pr-info.outputs.pr_labels }}
      pr_url: ${{ steps.pr-info.outputs.pr_url }}
      change_type: ${{ steps.classify.outputs.change_type }}
      release_note_entry: ${{ steps.release-note.outputs.entry }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract PR Information
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title || '';
            const description = pr.body || 'No description provided';
            const labels = pr.labels.map(l => l.name).join(',');

            // Sanitize for use in outputs
            const sanitizedTitle = title.replace(/[`$"\\]/g, '');
            const sanitizedDesc = description.replace(/[`$"\\]/g, '').substring(0, 500);

            core.setOutput('pr_title', sanitizedTitle);
            core.setOutput('pr_description', sanitizedDesc);
            core.setOutput('pr_number', pr.number.toString());
            core.setOutput('pr_author', pr.user.login);
            core.setOutput('pr_labels', labels);
            core.setOutput('pr_url', pr.html_url);

            core.info(`PR #${pr.number}: ${sanitizedTitle}`);
            core.info(`Author: ${pr.user.login}`);
            core.info(`Labels: ${labels}`);
            core.info(`Description: ${sanitizedDesc}`);

      - name: Classify Change Type
        id: classify
        uses: actions/github-script@v7
        with:
          script: |
            const title = '${{ steps.pr-info.outputs.pr_title }}'.toLowerCase();
            const labels = '${{ steps.pr-info.outputs.pr_labels }}'.toLowerCase();

            let changeType = 'other';
            if (title.startsWith('feat') || labels.includes('feature') || labels.includes('enhancement')) {
              changeType = 'feature';
            } else if (title.startsWith('fix') || labels.includes('bug') || labels.includes('bugfix')) {
              changeType = 'bugfix';
            } else if (title.startsWith('docs') || labels.includes('documentation')) {
              changeType = 'docs';
            } else if (title.startsWith('chore') || title.startsWith('ci') || labels.includes('chore')) {
              changeType = 'chore';
            } else if (title.startsWith('refactor') || labels.includes('refactor')) {
              changeType = 'refactor';
            } else if (title.startsWith('perf') || labels.includes('performance')) {
              changeType = 'performance';
            } else if (title.startsWith('breaking') || labels.includes('breaking-change')) {
              changeType = 'breaking';
            }

            core.setOutput('change_type', changeType);
            core.info(`Change type classified as: ${changeType}`);

      - name: Generate Release Note Entry
        id: release-note
        uses: actions/github-script@v7
        with:
          script: |
            const prTitle = '${{ steps.pr-info.outputs.pr_title }}';
            const prNumber = '${{ steps.pr-info.outputs.pr_number }}';
            const prAuthor = '${{ steps.pr-info.outputs.pr_author }}';
            const changeType = '${{ steps.classify.outputs.change_type }}';
            const prUrl = '${{ steps.pr-info.outputs.pr_url }}';

            const typeEmoji = {
              feature: '✨',
              bugfix: '🐛',
              docs: '📚',
              chore: '🔧',
              refactor: '♻️',
              performance: '⚡',
              breaking: '💥',
              other: '📝'
            };

            const emoji = typeEmoji[changeType] || '📝';
            const entry = `${emoji} ${prTitle} (#${prNumber}) by @${prAuthor}`;

            core.setOutput('entry', entry);
            core.info(`Release note entry: ${entry}`);

  build:
    name: Build and Test
    needs: extract-pr-metadata
    runs-on: ubuntu-latest
    outputs:
      build_status: ${{ steps.build-result.outputs.status }}
      build_duration: ${{ steps.build-result.outputs.duration }}
      test_results: ${{ steps.test-result.outputs.summary }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Annotate build with PR info
        run: |
          echo "## Build Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **PR Title** | ${{ needs.extract-pr-metadata.outputs.pr_title }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **PR Number** | #${{ needs.extract-pr-metadata.outputs.pr_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Author** | @${{ needs.extract-pr-metadata.outputs.pr_author }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Change Type** | ${{ needs.extract-pr-metadata.outputs.change_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target Branch** | ${{ env.PR_BASE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Source Branch** | ${{ env.PR_BRANCH }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Description" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.extract-pr-metadata.outputs.pr_description }}" >> $GITHUB_STEP_SUMMARY

      - name: Tag build with PR metadata
        run: |
          BUILD_TAG="pr-${{ needs.extract-pr-metadata.outputs.pr_number }}-$(echo $GITHUB_SHA | cut -c1-7)"
          echo "BUILD_TAG=${BUILD_TAG}" >> $GITHUB_ENV
          echo "Build tagged as: ${BUILD_TAG}"
          echo "Feature: ${{ needs.extract-pr-metadata.outputs.pr_title }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        id: install
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping install"
          fi

      - name: Run build
        id: build
        run: |
          BUILD_START=$(date +%s)
          echo "Building PR #${{ needs.extract-pr-metadata.outputs.pr_number }}: ${{ needs.extract-pr-metadata.outputs.pr_title }}"

          if [ -f package.json ] && grep -q '"build"' package.json; then
            npm run build 2>&1 | tee build.log
          else
            echo "No build script found, skipping build step"
          fi

          BUILD_END=$(date +%s)
          BUILD_DURATION=$((BUILD_END - BUILD_START))
          echo "build_duration=${BUILD_DURATION}" >> $GITHUB_OUTPUT

      - name: Run tests
        id: test
        continue-on-error: true
        run: |
          if [ -f package.json ] && grep -q '"test"' package.json; then
            npm test 2>&1 | tee test.log
            echo "test_ran=true" >> $GITHUB_OUTPUT
          else
            echo "No test script found, skipping tests"
            echo "test_ran=false" >> $GITHUB_OUTPUT
          fi

      - name: Capture build result
        id: build-result
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" == "success" ] && [ "${{ steps.test.outcome }}" != "failure" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi
          echo "duration=${{ steps.build.outputs.build_duration || '0' }}s" >> $GITHUB_OUTPUT

      - name: Capture test results
        id: test-result
        if: always()
        run: |
          if [ "${{ steps.test.outputs.test_ran }}" == "true" ]; then
            if [ "${{ steps.test.outcome }}" == "success" ]; then
              echo "summary=All tests passed ✅" >> $GITHUB_OUTPUT
            else
              echo "summary=Some tests failed ❌" >> $GITHUB_OUTPUT
            fi
          else
            echo "summary=No tests configured ⚠️" >> $GITHUB_OUTPUT
          fi

  generate-release-notes:
    name: Generate Release Notes Entry
    needs: [extract-pr-metadata, build]
    runs-on: ubuntu-latest
    if: needs.build.outputs.build_status == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Append to release notes draft
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prTitle = '${{ needs.extract-pr-metadata.outputs.pr_title }}';
            const prNumber = '${{ needs.extract-pr-metadata.outputs.pr_number }}';
            const prAuthor = '${{ needs.extract-pr-metadata.outputs.pr_author }}';
            const prDescription = `${{ needs.extract-pr-metadata.outputs.pr_description }}`;
            const changeType = '${{ needs.extract-pr-metadata.outputs.change_type }}';
            const releaseEntry = '${{ needs.extract-pr-metadata.outputs.release_note_entry }}';
            const prUrl = '${{ needs.extract-pr-metadata.outputs.pr_url }}';

            const releaseNoteData = {
              pr_number: parseInt(prNumber),
              title: prTitle,
              author: prAuthor,
              description: prDescription,
              change_type: changeType,
              release_entry: releaseEntry,
              url: prUrl,
              timestamp: new Date().toISOString(),
              commit_sha: context.sha,
              build_status: 'success'
            };

            core.info('Release Note Entry:');
            core.info(JSON.stringify(releaseNoteData, null, 2));

            // Write release note artifact
            fs.writeFileSync(
              'release-note-entry.json',
              JSON.stringify(releaseNoteData, null, 2)
            );

            // Generate markdown release note
            let markdown = `## ${releaseEntry}\n\n`;
            markdown += `**Change Type:** ${changeType}\n`;
            markdown += `**Author:** @${prAuthor}\n`;
            markdown += `**PR:** [#${prNumber}](${prUrl})\n\n`;
            if (prDescription && prDescription !== 'No description provided') {
              markdown += `### Details\n${prDescription}\n`;
            }

            fs.writeFileSync('release-note-entry.md', markdown);

      - name: Upload release note artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-note-pr-${{ needs.extract-pr-metadata.outputs.pr_number }}
          path: |
            release-note-entry.json
            release-note-entry.md
          retention-days: 90

  notify:
    name: Send Build Notifications
    needs: [extract-pr-metadata, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine notification status
        id: status
        run: |
          if [ "${{ needs.build.outputs.build_status }}" == "success" ]; then
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "color=#36a64f" >> $GITHUB_OUTPUT
            echo "status_text=SUCCESS" >> $GITHUB_OUTPUT
          else
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "color=#dc3545" >> $GITHUB_OUTPUT
            echo "status_text=FAILURE" >> $GITHUB_OUTPUT
          fi

      - name: Post PR Comment with Build Status
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ needs.extract-pr-metadata.outputs.pr_number }}');
            const prTitle = '${{ needs.extract-pr-metadata.outputs.pr_title }}';
            const changeType = '${{ needs.extract-pr-metadata.outputs.change_type }}';
            const releaseEntry = '${{ needs.extract-pr-metadata.outputs.release_note_entry }}';
            const buildStatus = '${{ needs.build.outputs.build_status }}';
            const buildDuration = '${{ needs.build.outputs.build_duration }}';
            const testResults = '${{ needs.build.outputs.test_results }}';
            const statusEmoji = '${{ steps.status.outputs.emoji }}';
            const statusText = '${{ steps.status.outputs.status_text }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              `## ${statusEmoji} Build ${statusText}`,
              '',
              '| Detail | Value |',
              '|--------|-------|',
              `| **PR Title** | ${prTitle} |`,
              `| **Change Type** | \`${changeType}\` |`,
              `| **Build Duration** | ${buildDuration} |`,
              `| **Test Results** | ${testResults} |`,
              `| **Commit** | \`${context.sha.substring(0, 7)}\` |`,
              `| **Workflow Run** | [View Details](${runUrl}) |`,
              '',
              '### 📋 Release Note Entry',
              `> ${releaseEntry}`,
              '',
              `---`,
              `*Build triggered by commit \`${context.sha.substring(0, 7)}\` on branch \`${{ env.PR_BRANCH }}\`*`
            ].join('\n');

            // Find existing bot comment to update
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.data.find(
              comment => comment.user.type === 'Bot' && comment.body.includes('Build ')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner