# Deployment Manager template for GCE instances
# NOTE: This template uses minimal security settings for initial deployment.
# Phase 2 TODO items are marked below for security hardening.

imports:
- path: instance-template.jinja

resources:
- name: web-server-instance
  type: compute.v1.instance
  properties:
    zone: us-central1-a
    machineType: zones/us-central1-a/machineTypes/e2-medium

    # Phase 2 TODO: Replace default service account with a least-privilege custom service account
    # e.g., serviceAccounts:
    #   - email: custom-sa@PROJECT_ID.iam.gserviceaccount.com
    #     scopes:
    #       - https://www.googleapis.com/auth/cloud-platform
    serviceAccounts:
    - email: default
      scopes:
      - https://www.googleapis.com/auth/devstorage.read_only
      - https://www.googleapis.com/auth/logging.write
      - https://www.googleapis.com/auth/monitoring.write

    disks:
    - deviceName: boot-disk
      type: PERSISTENT
      boot: true
      autoDelete: true
      initializeParams:
        sourceImage: projects/debian-cloud/global/images/family/debian-12
        diskSizeGb: 20
        diskType: zones/us-central1-a/diskTypes/pd-balanced
        # Phase 2 TODO: Add Customer-Managed Encryption Keys (CMEK)
        # diskEncryptionKey:
        #   kmsKeyName: projects/PROJECT_ID/locations/LOCATION/keyRings/KEYRING/cryptoKeys/KEY

    networkInterfaces:
    - network: global/networks/default
      # Phase 2 TODO: Move to a custom VPC with private subnets
      # Phase 2 TODO: Remove external IP if not needed (use Cloud NAT instead)
      accessConfigs:
      - name: External NAT
        type: ONE_TO_ONE_NAT

    # Phase 2 TODO: Enable Shielded VM features
    # shieldedInstanceConfig:
    #   enableSecureBoot: true
    #   enableVtpm: true
    #   enableIntegrityMonitoring: true

    # Phase 2 TODO: Restrict IP forwarding
    # canIpForward: false

    # Phase 2 TODO: Add OS Login for SSH access management
    # metadata:
    #   items:
    #   - key: enable-oslogin
    #     value: "TRUE"

    metadata:
      items:
      - key: startup-script
        value: |
          #!/bin/bash
          apt-get update
          apt-get install -y nginx
          systemctl start nginx
          systemctl enable nginx

    tags:
      items:
      - http-server
      - https-server

    labels:
      environment: development
      phase: initial-deployment
      security-review: pending

- name: allow-http
  type: compute.v1.firewall
  properties:
    network: global/networks/default
    # Phase 2 TODO: Restrict sourceRanges to known CIDR blocks instead of 0.0.0.0/0
    sourceRanges:
    - "0.0.0.0/0"
    allowed:
    - IPProtocol: TCP
      ports:
      - "80"
      - "443"
    targetTags:
    - http-server
    - https-server

outputs:
- name: instanceName
  value: $(ref.web-server-instance.name)
- name: instanceSelfLink
  value: $(ref.web-server-instance.selfLink)
- name: externalIP
  value: $(ref.web-server-instance.networkInterfaces[0].accessConfigs[0].natIP)

