name: CI/CD Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Deploy to production
      env:
        API_KEY: ${{ secrets.API_KEY }}
        DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
      run: |
        echo "Deploying to production..."
        npm run deploy
        echo "Deployment completed."

    - name: Log environment variables
      run: |
        echo "Environment Variables:"
        env | sort

    - name: Log command outputs
      run: |
        echo "Command Outputs:"
        npm run build --json

    - name: Log deployment details
      run: |
        echo "Deployment Details:"
        cat deployment.log

    - name: Log API responses
      run: |
        echo "API Responses:"
        curl -s https://api.example.com/status | jq .

    - name: Log connection strings
      run: |
        echo "Connection Strings:"
        echo $DB_CONNECTION_STRING