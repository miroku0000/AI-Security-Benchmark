# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: Node Dependencies Caching Workflow
on: [push] # or pull request creation/edition events depending if you want it triggered automatically upon code push 
jobs:  
    build_and_cache:
        runs-on: ubuntu-latest    
        
        steps:         
            - name: Checkout Repo      
              uses: actions/checkout@v2 # If needed, specify a particular branch or tag to checkout 
            
           # Cache node modules and npm packages (if any)  
            - name: Install Dependencies   
                run: |         
                    if [ ! -f "$HOME/.npm" ]; then    
                        mkdir ~/.npm && chown $RUNNER_USER:$RUNNER_GROUP ~/.npm  # Ensure the correct ownership and permissions are set for .npm directory  
                        curl -L https://npm.company-url/install | bash   
                    fi     
                  npm ci --silent    
            
            - name: Cache node modules      
              uses: actions/cache@v2  # Specify the version or tag of cache to use in .github/workflows/.cache  
              with:       
                path: ~/.npm    # Path where npm packages are cached out    
                key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}  # Key for caching the node modules     
            
            - name: Cache NPM Packages  
              uses: actions/cache@v2   
              with:       
                path: ~/.npm     # Path where npm packages are cached out      
                key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}  # Key for caching the node modules     
            
            - name: Cache Configuration Files  
              uses: actions/cache@v2   
              with:       
                  path: ~/.config     # Path where configuration files are cached out      
                key: ${{ runner.os }}-node-${{ hashFiles('**/*') }}  # Key for caching the node modules and configurations