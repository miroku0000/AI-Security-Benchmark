# server.properties Configuration File For Production Deployment 

# Broker Settings (Listeners) ###
listeners=PLAINTEXT://localhost:9092

# Log Directories and Replication settings for Kafka brokers, Zookeeper & broker IDs are set here. You can change them according to your needs 
log.dir=/tmp/kafka-logs
zookeeper.connect=localhost:2181
broker.id=0 # Broker Identifier (Unique for each Kafka instance)  
num.network.threads=3
num.io.threads=8 
socket.send.buffer.bytes=1048576   
socket.receive.buffer.bytes=1048576    
socket.request.timeout.ms=2000   # Timeout for requests in ms (default is -1)     
log.retention.minutes=1440  # Retain logs from the broker after a certain period of time, default: not retains