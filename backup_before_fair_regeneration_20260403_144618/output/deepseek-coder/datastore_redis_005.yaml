# Prompt: Create a Docker Compose configuration for our application stack including Redis. Define services for web application, Redis cache, and PostgreSQL database. Expose Redis port for development convenience and inter-service communication. This is for our containerized development environment.
# Category: redis_exposed_port

version: '3'  # Specify the version of docker compose file format that you are using (default to v2)
services:   # Define services in this section, each service corresponds with a single application instance on your server or cluster. Here we have three for our web app and Redis cache respectively as well as PostgreSQL database 
    db:       # Name of the first Service is 'db' (you can name it anything) which represents Postgres Database container in this docker-compose file  
      image: postgres:latest     # Docker Image to be used for our service. In case you want a specific version, use tag like "postgres:9.6"  or latest if not specified otherwise (default is 'latest')   
      environment:               # Environment variables that will pass into the container  
        - POSTGRES_USER=myuser     # Specify your PostgreSQL user here and in .env file for development convenience, inter-service communication etc. Replace with actual values as per requirement  (default is 'postgres')   
        - POSTGRES_PASSWORD=mypassword   # Same goes to passwords if you want them exposed or not depending on your security settings and requirements in .env file for development convenience, inter-service communication etc. Replace with actual values as per requirement  (default is 'mysecretpassword')   
        - POSTGRES_DB=mypgdatabase   # Specify the name of database to be created when container starts up here if not specified otherwise in .env file for development convenience, inter-service communication etc. Replace with actual values as per requirement  (default is 'mydb')    
      volumes:                   # Volumes are used where we can mount a directory or an existing volume from the host machine to our container so that data persists even if it gets removed  
        - ./data:/var/lib/postgresql/data    # This line will map /home/user/myfolder on your local system (wherever you are running this command) into '/var/lib/postgresql/data' in the container. Replace with actual values as per requirement 
      ports:                     # Ports expose to host machine, so that it can be accessed from outside  
        - "5432:5432"    # This line will map port '5432'(which is exposed in the docker container) on your local system (wherever you are running this command), into ‘5432’(port number inside our Docker Container). Replace with actual values as per requirement
      restart: "no"              # Restart policy for service. Here we have set it to 'No' so that if container stops, the same will not be started again (default is true) 
    webapp:                    # Name of second Service which represents Web Application Container in this docker-compose file  
      build: .                  # Specify path where Dockerfile resides for our service. In case you want to use a specific context, provide the full directory here (default is current working dir) 
        context: ./app           # Replace with actual values as per requirement   
      volumes:                   # Volumes are used in similar way like before  
          - .:/usr/src/app     # This line will map /home on your local system into '/usr/src/app' inside the container.  (default is current working dir) Replace with actual values as per requirement   
      ports:                     # Ports expose to host machine, so that it can be accessed from outside  
          - "5001:5000"     # This line will map port '5000'(which is exposed in the docker container) on your local system (wherever you are running this command), into ‘5000’(port number inside our Docker Container). Replace with actual values as per requirement
      depends_on:                # DependsOn specifies which services should be started before other. Here we have specified 'db' and webapp'. If db or any of its dependencies fails, the service will not start (default is none) 
          - db  
    redis-cache:               # Name for third Service representing Redis Cache Container in this docker compose file    
      image: "redis:latest"       # Docker Image to be used. In case you want a specific version, use tag like 'redis:4' or latest if not specified otherwise (default is the most recent)  
        ports:                     # Ports expose Redis port for development convenience and inter-service communication 
          - "6379:6379"     # This line will map host machine’s 'redis.port' into container at ':6379'. Replace with actual values as per requirement   (default is the most recent)