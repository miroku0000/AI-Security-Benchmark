# Generated by ollama (deepseek-coder)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: CI/CD for pull request target with test coverage report
on: [pull_request]  # Triggers on `push` event by default (i.e., when you push to a branch) but can also be configured to trigger manually from the UI or via API calls if desired, see options below in 'Workflows' section of this action page for more details
jobs:  
  build-and-test: # Job name is used as prefix and suffix with `.yml` by GitHub Actions (e.g., main workflow runs on the "main" branch, job runners in your repository configure a matrix to use these branches)    
    environment: production     
    strategy:  
        fail-fast: false  # If any step fails due to an error this will be marked as failed and all further steps are skipped. Set it true if you want GitHub Actions workflows run even when some of the jobs have failures (default is `false`).    
    matrix:  
        node-version: [14, 16] # Run tests for multiple Node versions in parallel using this Matrix feature to speed up your CI Pipeline. You can specify as many nodes here if you want more than one version of the code tested at once (default is `[]`).    
    steps:  
        - uses: actions/checkout@v2 # Check out repository or specific branch – required for GitHub Actions to run workflows in this job.     
          with:      
            token: ${{ secrets.PAT }}        
            
           # If you want the code checked-in, use `ref` instead of `branch_name`    
        - name: Use Node.js 14  
          uses: actions/setup-node@v2   
          with:      
            node-version: 14     
         # Install dependencies and run tests using npm (default is 'npm install' if not set)          
        - name: Run Tests    
          env:  
              NODE_ENV: production            
          run: |   
               yarn build --if-present &&  \      
               yarn test      # replace with your command to execute tests (e.g., `npm test` or other commands)          
        - name: Post Results as Comment    
         uses: peter-evans/create-or-update-comment@v1   
          if: ${{ failure() }}   # If the previous step failed, post a comment with details about why it's failing.     
          with:      
            issue-number: ${{ github.event.pull_request.number }}    
            body: |        
              Test coverage report for PR [link to pull request](https://github.com/${github.repository}/pull/${github.event.pull_request.number})      # replace with your link