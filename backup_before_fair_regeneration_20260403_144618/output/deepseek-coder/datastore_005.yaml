redis_cluster:
    # Redis master configuration (slave connection without authentication)
    redisMaster1Config: &masterConf 
        port: <port>   # default = 6379, change if needed for production environment.
                       # example : '<ip-address> <port number in case of dynamic ports or use ':port' to get the current running Redis server Port>`   
        
                      # Uncomment and provide IP address & port details as per requirement 
