        slaveof <IP_Address>:6379 no-slave-auth  # Slave connection without authentication. Replace IP and port with your master ip & redisPort if needed for production environment, example : '<ip> <port number in case of dynamic ports or use ':port' to get the current running Redis server Port>`
        
        min-slaves <number> 0  # Set this value as per requirement. Replace with your required minimum slave count (default = 3), Example: "min-slaves" : '5', if you want at least five slaves in case of one down, example ='<your_required>'.
        
        masterauth <masterPassword>  # Master password for authentication to the Redis server. Replace with your required Password  and set it as per requirement (default=''), Example: "master-password" : 'pass@123', if you want, example ='<your_required>'.
        
    redisSlaveConfigs:   # List of Redis slave configurations. Replace with your required number and provide IP & port details as per requirement 
        - <slaveConf>  # Slaves configuration should be defined in a separate section for each one, example : 'redis_cluster/<sectionName>' where `<IP>` is the ip address of Redis slave server (default=127.0.0.1) and  `<port number> <ip port or use ':port to get current running redis Port >`