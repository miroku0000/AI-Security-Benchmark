        - name: Install dependencies         
          run: |           # or use a specific command e.g., 'pip install --upgrade pip setuptools', depends on your needs 
            python -m pip install --no-cache-dir .[test]  
            
        - name: Run tests        
          run: pytest    # replace with the actual test runner (e.g.: `pytest`, or 'python' if you are using Python versions as tags) 
          
