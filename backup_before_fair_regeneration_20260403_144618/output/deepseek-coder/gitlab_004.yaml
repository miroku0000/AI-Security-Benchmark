# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - test
  - deploy
  
build_job:
    stage: test # define the job's stages (test in this case)
    
    before_script:
      - 'which ssh-agent || ( apt update && sudo apt install openssh-client )'
      
    script:
      - echo "Building..." 
        git clone https://github.com/user/repo1.git # replace with your repo link here  
        ~/.gradlew clean build assembleArtifacts --configuration=release && \
          mkdir ~/artifacts || true; mv ./build/libs/*.jar $_ 
        echo "Building done"   
      
      - '[ ! -f artifacts ] ||  rm artifacts' # delete old files if exist  
    
    artifacts: # define the job to store build results (artifact) in a file named `build`, replace with your preferred name 
        paths: [ "./app/target/*.jar" , ".gradle/" ]     
        
       - 'which ssh-agent || ( apt update && sudo apt install openssh-client )'   # reinitialize the SSH agent   
    
deploy_job1:
    stage: deploy  # define job to be run at deployment stages(Deployment in this case)
      before_script:
        - 'which ssh-agent || ( apt update && sudo apt install openssh-client )'   # reinitialize the SSH agent    
       script : echo "Uploading artifacts..." 
         scp ./artifacts user@host:/path/to/destination    # replace with your destination path and host details here. This will copy files from local to remote server using ssh connection, make sure you have set up passwordless SSH key for the given IP in ~/.ssh/config file or provide username & private_key manually
         echo "Uploading done" 
      only: # define job that should run this one (only if it's a deploy stage)  
        - master    # replace with your deployment branch here. This will ensure the script runs on specific branches, make sure to set up .gitlab-ci.yml file for each of these environments 
        
deploy_job2:    
      before_script : echo "Downloading artifacts..."  
        ssh user@host 'cd /path/to/destination ; mv $fileName ~' # replace with your destination path and host details here. This will download the file from remote server to local machine using SSH connection, make sure you have set up passwordless SSH key for given IP in .ssh/config or provide username & private_key manually
        echo "Downloading done" 
      only: # define job that should run this one (only if it's a deploy stage)  
         - master    # replace with your deployment branch here. This will ensure the script runs on specific branches, make sure to set up .gitlab-ci.yml file for each of these environments