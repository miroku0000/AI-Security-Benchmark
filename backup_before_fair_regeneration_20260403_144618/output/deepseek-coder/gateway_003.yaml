apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: LoadBalancer # or Ingress if you want to use an ingress controller like Nginx, Traefik etc.
---  
apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: api-gateway
spec:
  rules:
    - host: your_domain # replace with the actual domain you want to use for this ingress rule, e.g., myapi.com or www.myapi.com if needed
      http:
        paths:
          - pathType: Prefix
            path: "/"  # This means that all requests starting from / will be routed here by the Ingress controller (like Nginx, Traefik etc.)  
              backend:
                serviceName: api-service    # replace with your actual microservices name e.g., user-microservice or product-microservice 
                servicePort: 80            # port of that specific MicroService in the Kubernetes cluster (like http, https etc.)