Resources:
    MyBucket: # Bucket name should be unique per region, can only contain lowercase letters a through z followed by numbers (10 to 99), no spaces or special characters except for hyphen (-). It must start with upper case. This is the bucket's ARN in AWS CloudFormation
        Type: 'AWS::S3::Bucket' # Specify S3 Bucket resource type here, it will be a unique identifier of your resources 
        
    MyPolicyForLambdaExecutionRole:# IAM policy name should start with "My" and can only contain lowercase letters. It must end in "-policy". This is the full ARN for this role's permissions to allow Lambda functions accesses S3 bucket data, it will be a unique identifier of your resources
        Type: 'AWS::IAM::Policy'  # Specify Iam Policy resource type here  
        Properties:    
            RoleARN: !GetAtt MyLambdaExecutionRole.Arn    # This is the role ARN to attach policy on, it will be a unique identifier of your resources      
            PolicyName: 'MyBucketReadWriteAccess'  # Specify IAM Permissions resource type here  
          Statement:    
              - Effect: Allow      # Define what action can do (Allow/Deny)   
                Action:         # List all actions that the policy allows, you may add more as per requirement.      
                  - s3:GetObject 
                  - s3:PutObject  
             Resource : 'arn:aws:s3:::mybucket/*'     # Specify resource to allow access (replace "MyBucket" with your bucket name)