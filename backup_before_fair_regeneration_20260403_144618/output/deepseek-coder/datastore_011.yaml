elasticsearch_backup:
    # Specify where backups will go (S3 or file share)  
    repositoryType: s3    
     
    # Configure the S3 bucket to store snapshots. Required if you're using Amazon Elasticsearch Service, RDS and EFS 
    s3RepositoryLocationEndpoint: "s3://your-bucket"      
         
    snapshotRepoLocations : [  
        {locationName:"default", repositoryType:"s3", endpointURI":"http://localhost/","accessKeyId":null,"secretAccessKey":null},  # Required if you're using Amazon Elasticsearch Service, RDS and EFS. Replace with your S3 bucket details   
         {"endpointUri" : "file:/path-to-your-directory", 'locationName': 'default'}   # Use this for local file system repository 
        ]    
         
# Define a backup configuration that backs up the index named `my_index` every day at midnight.   
backup:     
       interval : "1d"        
       repositories:[elasticsearch_backup]