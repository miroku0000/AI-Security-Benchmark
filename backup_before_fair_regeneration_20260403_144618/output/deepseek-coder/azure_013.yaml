# Prompt: Create an ARM template for Azure VMs with public IP addresses for direct access. Assign public IPs to each VM so developers can RDP/SSH directly without setting up a Bastion host or VPN. This simplifies our development environment setup.
# Category: cloud_compute_security

resources: 
- name: 'myVM'   # Name of the resource group and vm in azure   
  type: Microsoft.Compute/virtualMachines     # Type is Compute for VMs, CustomImage for images etc...     
  location: [your_location]                   # Location where your resources will be created (replace with actual locations)  
  apiVersion: '2019-12-01'                    # API version of the resource provider. Update as per Azure updates   
  tags:                                        # Tags for easy identification and management in azure portal etc...     
     Name : myVM                            
     Environment : dev                       
properties:                                   # Properties to be passed while creating a VM  
  osProfile:                                 # OS profile is the information required to run the custom image.   
       computerNameAsPublicIP: true           # This will make sure that public IP of vm gets assigned as system's hostname and can resolve to it by name (replace with actual names)    
      adminUsername : azureuser                # Admin username for Linux based VM  
  hardwareProfile:                            # Hardware profile is the information about how your machine will be created.   
       vmSize: Standard_D2s_v3               # The size of virtual machines to use, replace with actual sizes    
networkProfile:                               # Network Profile defines network interfaces and subnets for a VM  
  networkInterface:                          # An array of network interface references as defined below.   
      name : myVM-nic                         # Name is the name of the nic in azure (replace with your names)      
          primary : true                       # Primary indicates whether the NIC should be the primary NIC on a VM  
  osDisk:                                   # OS disk to attach, replace 'myOsDisk' as per actual disks.   
      name : myOSdisk                         # Name is the name of the OS Disk in azure (replace with your names)      
          caching : ReadWrite                 # Caching type for data stored on this NIC  
  storageProfile:                            # Storage profile to be used when creating a VM.   
      imageReference:                        # Image reference information is required if you want the custom disk or OS images are not provided in advance    
          publisher : MicrosoftWindowsServer       # Publisher of the operating system that will get installed on this virtual machine  
            offer : WindowsServer                # Offer represents a specific version (for example, '2019-Datacenter')   
              sku : 2019                       # SKU is an alias for publisher and product. For windows server it would be WS2019    
          location: eastus                     # Location of the image  
      diskSizeGB : 5                         # Disk size in GB to create when creating a VM from this custom image (replace with actual sizes)