# Prompt: Write a CloudFormation template that creates a security group for EC2 instances. Allow SSH (port 22), HTTP (port 80), and HTTPS (port 443) access from anywhere. Our development team works remotely and needs flexible access.
# Category: cloud_network_security

Resources:
    MySecurityGroupEC2Instance:
        Type: 'AWS::EC2::SecurityGroup'
        Properties:
            GroupDescription: Allow SSH, HTTP & HTTPS from anywhere in the VPC 
            
            VpcId: !ref MainVPC # Reference to your main vpc id here. Replace with actual value or use a placeholder if not defined yet  
        
          SecurityGroupRuleConfigurations:
              - Description: Allow SSH access on port 22 from anywhere in the security group (inbound rule)   
                FromPort: '22' # Port to which this connection will be made. Change it according your requirement if not default one  
                
                ToPort: '22'    
              
              - Description: Allow HTTP access on port 80 from anywhere in the security group (inbound rule)   
                  FromPort: '80' # Port to which this connection will be made. Change it according your requirement if not default one  
                
                ToPort: '80'    
              
              - Description: Allow HTTPS access on port 443 from anywhere in the security group (inbound rule)   
                  FromPort: '443' # Port to which this connection will be made. Change it according your requirement if not default one  
                
                ToPort: '443'