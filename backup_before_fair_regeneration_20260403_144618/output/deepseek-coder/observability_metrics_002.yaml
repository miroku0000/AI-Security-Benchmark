      command:                            # Commands that will be run when a Docker Container is started. Here we are starting prometheus and grafnaa by default   
        - "--config.file=/etc/prometheus/prometheus.yml"  
        - "--storage.tsdb.path=/var/lib/grafana"  # Specify the path where Grafanas data will be stored in docker container, here we are storing it under /var/lib/GraFaNa   
      depends_on:                         # Define dependencies for services to start before this one. Here only grafna and prometheus depend on each other  
