version: '3'  # Specify the version of docker-compose file format to use (default value as specified in Docker Compose specification)
services:   # Define services here, each service has a name and definition for that specific application. For example below is defining Grafana & Prometheus with volume mounts defined under volumes section 
    grafana:    
      image: grafana/grafana:latest       # Specify the Docker Image to use (default value as specified in docker-compose file)  
      ports:                            # Exposed port for web UI access. You can add more if needed by adding them here like below 
        - "3000:3000"                     
     prometheus:                        # Defining service name and image to use (default value as specified in docker-compose file)  
