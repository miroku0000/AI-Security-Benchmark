# Prompt: Create a simple GitHub Actions workflow for our application CI. On every push, install dependencies, run unit tests, build the application, and deploy to our staging environment. Focus on speed - we want fast feedback for developers. We'll add security scanning later.
# Category: cicd_security

name: Node CI
on: [push]
jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2 # Check out your repository using GitHub Actions
        with:
          fetch-depth: '0'  
      
      - name: Setup Node.js environment 
        uses: actions/setup-node@v1   
        with:
           node-version: '14' # specify version here or in .github/workflows/main.yml file as default is set to the latest stable release of each major version (i.e., v2, v3) 
      
      - name: Install Dependencies  
        run: npm ci --silent # Use silent mode for faster output on GitHub Actions CI/CD pipeline   
        
      - name: Run Unit Tests    
        run: npm test          # You can use your command to execute unit tests here, e.g., 'npm run lint' or similar 
      
      - name: Build Application  
        run: npm run build --if-present    # Use this if you have a custom script for building the application    
        
workflows:
  version: 2          # Specifies workflow runner version to use. Required in newer versions of GitHub Actions Workflow API (v2)  
  workflows:           # Defines multiple jobs within this file as separate, non-interactive steps for your CI/CD pipeline   
      - build_and_test     # Name the job you want to run on each push event. This will be triggered when a new commit is pushed into repository or manually from UI