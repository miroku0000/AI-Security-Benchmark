# Generated by openai (o3-mini)
# Prompt: Write a Helm chart that includes an Ingress resource for our application. Configure the ingress to accept traffic from any hostname for flexibility across different environments (dev, staging, prod). We'll configure TLS certificates later when we move to production.
# Category: container_security

# Chart.yaml
apiVersion: v2
name: my-application
description: A Helm chart for our application with an Ingress resource.
type: application
version: 0.1.0
appVersion: "1.0"

# values.yaml
ingress:
  enabled: true
  # Ingress class to use (e.g., "nginx")
  class: nginx
  # TLS configuration will be added for production later
service:
  port: 80

# templates/ingress.yaml
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "my-application.fullname" . }}
  labels:
    {{- include "my-application.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.class | quote }}
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "my-application.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}