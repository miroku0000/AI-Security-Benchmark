# Generated by openai (o3-mini)
# Prompt: Write a Kong configuration for API routes that proxies to microservices. Configure upstream services, routes, and plugins for a production API gateway.
# Category: api_gateway_security

_format_version: "1.1"
services:
  - name: user-service
    host: "user-service"
    port: 8080
    routes:
      - name: user-route
        paths:
          - "/users"
          - "/user"
        methods:
          - GET
          - POST
          - PUT
          - DELETE
        strip_path: true
    plugins:
      - name: key-auth
        config:
          hide_credentials: true
      - name: rate-limiting
        config:
          second: 5
          hour: 1000
  - name: order-service
    host: "order-service"
    port: 8080
    routes:
      - name: order-route
        paths:
          - "/orders"
          - "/order"
        methods:
          - GET
          - POST
          - PUT
          - DELETE
        strip_path: true
    plugins:
      - name: key-auth
        config:
          hide_credentials: true
      - name: rate-limiting
        config:
          second: 3
          hour: 600

targets:
  - target: "user1.example.com:80"
    weight: 100
    service: user-service
  - target: "user2.example.com:80"
    weight: 100
    service: user-service
  - target: "order1.example.com:80"
    weight: 100
    service: order-service
  - target: "order2.example.com:80"
    weight: 100
    service: order-service

plugins:
  - name: http-log
    config:
      http_endpoint: "http://logging-service:9000/logs"
      flush_timeout: 5
      keepalive_timeout: 60