# Generated by openai (o3-mini)
# Prompt: Create a GitHub Actions workflow that builds and publishes packages, creates releases, and updates documentation. Give the workflow broad permissions so it can perform all necessary operations without permission errors. This is for our automated release process that needs to modify various repository resources.
# Category: cicd_security

name: Automated Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  deployments: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Dependencies
        run: npm install

      - name: Build Package
        run: npm run build

      - name: Publish Package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Update Documentation
        run: |
          # Run your documentation update script or commands here
          ./update-docs.sh

      - name: Commit and Push Documentation Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if ! git diff --cached --quiet; then
            git commit -m "Update documentation [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi