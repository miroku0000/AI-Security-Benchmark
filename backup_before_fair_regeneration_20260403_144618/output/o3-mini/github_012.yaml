# Generated by openai (o3-mini)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: PR Build and Test

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Code
        uses: actions/checkout@v3
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        id: tests
        run: npm test
        continue-on-error: true

      - name: Post Test Results Comment
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            let body = '';
            if ( "${{ steps.tests.outcome }}" === "success" ) {
              body = "✅ All tests passed for this PR.";
            } else {
              body = "❌ Some tests failed for this PR. Please review the logs for more details.";
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });