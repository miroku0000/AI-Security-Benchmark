# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI Workflow
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [development, staging, production]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-${{ matrix.environment }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.environment }}-

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Node.js dependencies
        run: npm install

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-${{ matrix.environment }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.environment }}-

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache environment-specific configuration files
        uses: actions/cache@v3
        with:
          path: configs/${{ matrix.environment }}
          key: ${{ runner.os }}-configs-${{ matrix.environment }}-${{ hashFiles('configs/${{ matrix.environment }}/*') }}
          restore-keys: |
            ${{ runner.os }}-configs-${{ matrix.environment }}-

      - name: Build Project
        run: |
          npm run build
          python setup.py sdist bdist_wheel