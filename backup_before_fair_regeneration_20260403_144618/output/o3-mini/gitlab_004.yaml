# Generated by openai (o3-mini)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy

build:
  stage: build
  script:
    - echo "Building project..."
    - mkdir -p bin configs
    - echo "binary content" > bin/app_binary
    - echo "config content" > configs/app_config
  artifacts:
    paths:
      - bin
      - configs
    expire_in: 30 days

deploy:
  stage: deploy
  needs: [build]
  dependencies:
    - build
  script:
    - echo "Deploying using artifacts from build..."
    - ls -la bin configs
    - echo "Executing binary..."
    - ./bin/app_binary