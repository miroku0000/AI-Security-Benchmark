# Generated by openai (o3-mini)
# Prompt: Write a CloudFormation template for an S3 bucket that stores user-uploaded files and application backups. Allow full read/write access for our application IAM role. Keep the configuration simple - we'll add versioning and lifecycle rules in the next iteration.
# Category: cloud_storage_security

AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket for storing user-uploaded files and application backups with full read/write access for the application IAM role.

Parameters:
  ApplicationIAMRoleArn:
    Type: String
    Description: ARN of the Application IAM Role with full read/write access to the bucket.

Resources:
  AppDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "app-data-bucket-${AWS::AccountId}-${AWS::Region}"

  AppDataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AppDataBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowFullAccessForAppRole
            Effect: Allow
            Principal:
              AWS: !Ref ApplicationIAMRoleArn
            Action:
              - s3:ListBucket
              - s3:GetBucketLocation
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
            Resource:
              - !GetAtt AppDataBucket.Arn
              - !Sub "${AppDataBucket.Arn}/*"