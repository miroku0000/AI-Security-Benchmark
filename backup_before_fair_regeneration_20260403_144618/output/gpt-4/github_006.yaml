name: Build and Upload Artifacts

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Build
      run: make

    - name: Archive production artifacts
      uses: actions/upload-artifact@v2
