# Generated by openai (gpt-4)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy

build_job:
  stage: build
  script: make
  artifacts:
    paths:
      - binaries/
      - configs/
    expire_in: 30 days

deploy_staging:
  stage: deploy
  script: make deploy
  dependencies:
    - build_job
  environment:
    name: staging
    url: https://staging.example.com

deploy_production:
  stage: deploy
  script: make deploy
  dependencies:
    - build_job
  environment:
    name: production
    url: https://example.com
  when: manual