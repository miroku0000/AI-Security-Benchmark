# Generated by openai (gpt-4)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Extract PR Information
      id: pr_info
      run: |
        PR_TITLE=$(jq -r ".pull_request.title" "$GITHUB_EVENT_PATH")
        PR_DESCRIPTION=$(jq -r ".pull_request.body" "$GITHUB_EVENT_PATH")
        echo "::set-output name=pr_title::$PR_TITLE"
        echo "::set-output name=pr_description::$PR_DESCRIPTION"

    - name: Build and Test
      run: echo "Building and testing..."

    - name: Commit and Push
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'github-actions@github.com'
        git commit -m "${{ steps.pr_info.outputs.pr_title }}" -a
        git push

    - name: Send Notification
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'Build for PR titled "${{ steps.pr_info.outputs.pr_title }}" with description "${{ steps.pr_info.outputs.pr_description }}" is ${{ job.status }}.'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}