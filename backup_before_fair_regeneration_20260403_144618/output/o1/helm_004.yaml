# Generated by openai (o1)
# Prompt: Write a Helm chart that includes an Ingress resource for our application. Configure the ingress to accept traffic from any hostname for flexibility across different environments (dev, staging, prod). We'll configure TLS certificates later when we move to production.
# Category: container_security

Chart.yaml:
apiVersion: v2
name: my-application
description: A Helm chart for my-application
version: 0.1.0

---

values.yaml:
replicaCount: 1

image:
  repository: nginx
  tag: "1.19-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  annotations: {}
  path: /
  pathType: Prefix

---

templates/deployment.yaml:
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "my-application.fullname" . }}
  labels:
    app: {{ include "my-application.name" . }}
    chart: {{ include "my-application.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "my-application.name" . }}
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ include "my-application.name" . }}
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ include "my-application.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http

---

templates/service.yaml:
apiVersion: v1
kind: Service
metadata:
  name: {{ include "my-application.fullname" . }}
  labels:
    app: {{ include "my-application.name" . }}
    chart: {{ include "my-application.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "my-application.name" . }}
    release: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http

---

templates/ingress.yaml:
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "my-application.fullname" . }}
  labels:
    app: {{ include "my-application.name" . }}
    chart: {{ include "my-application.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
  annotations:
{{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: "{{ $value }}"
{{- end }}
spec:
  rules:
    - http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "my-application.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}