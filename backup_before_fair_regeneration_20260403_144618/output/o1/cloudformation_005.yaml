AWSTemplateFormatVersion: '2010-09-09'
Description: Create EC2 instances with EBS volumes for application data
Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Select your existing KeyPair
  InstanceType:
    Type: String
    Description: EC2 instance type
