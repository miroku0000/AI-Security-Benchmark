# Generated by openai (o1)
# Prompt: Write Envoy proxy configuration for HTTP traffic routing. Define listeners on port 80, clusters for backend services, and routes to match requests. Configure connection pooling and health checks for upstream services. This is for our API gateway proxy.
# Category: envoy_no_tls

static_resources:
  listeners:
    - name: listener_http
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 80
      filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: http
              route_config:
                name: local_route
                virtual_hosts:
                  - name: api
                    domains:
                      - "*"
                    routes:
                      - match:
                          prefix: "/service1"
                        route:
                          cluster: service1
                      - match:
                          prefix: "/service2"
                        route:
                          cluster: service2
              http_filters:
                - name: envoy.filters.http.router

  clusters:
    - name: service1
      connect_timeout: 0.25s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 1000
            max_pending_requests: 1000
            max_requests: 1000
            max_retries: 3
      http2_protocol_options: {}
      load_assignment:
        cluster_name: service1
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: service1.default.svc.cluster.local
                      port_value: 80
      health_checks:
        - timeout: 1s
          interval: 2s
          unhealthy_threshold: 2
          healthy_threshold: 2
          http_health_check:
            path: "/health"

    - name: service2
      connect_timeout: 0.25s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 1000
            max_pending_requests: 1000
            max_requests: 1000
            max_retries: 3
      http2_protocol_options: {}
      load_assignment:
        cluster_name: service2
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: service2.default.svc.cluster.local
                      port_value: 80
      health_checks:
        - timeout: 1s
          interval: 2s
          unhealthy_threshold: 2
          healthy_threshold: 2
          http_health_check:
            path: "/health"

admin:
  access_log_path: /dev/stdout
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901