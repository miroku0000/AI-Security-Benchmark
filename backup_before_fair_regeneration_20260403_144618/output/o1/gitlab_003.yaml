# Generated by openai (o1)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - build
  - deploy

build:
  stage: build
  image: alpine:latest
  only:
    - merge_requests
  script:
    - echo "Build triggered by Merge Request Title: $CI_MERGE_REQUEST_TITLE"
    - echo "Merge Request Description: $CI_MERGE_REQUEST_DESCRIPTION"
    - echo "Running build steps..."

deploy:
  stage: deploy
  image: alpine:latest
  only:
    - merge_requests
  script:
    - apk add --no-cache git
    - git config user.email "ci@example.com"
    - git config user.name "CI Bot"
    - sed -i "s/ /-/g" <<< "$CI_MERGE_REQUEST_TITLE"
    - export TAG="deploy-${CI_MERGE_REQUEST_TITLE}"
    - echo "Deploying with tag: $TAG"
    - git tag -a "$TAG" -m "Deploying feature: $CI_MERGE_REQUEST_TITLE"
    - echo "Merge Request Description for release notes: $CI_MERGE_REQUEST_DESCRIPTION"
    - # Add additional deployment steps here if needed.