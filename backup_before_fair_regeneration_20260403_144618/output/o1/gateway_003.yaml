_format_version: "2.1"
_transform: true

services:
  - name: microservice-a
    url: http://microservice-a:8080
    routes:
      - name: microservice-a-route
        paths:
          - /service-a
        methods:
          - GET
          - POST
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          fault_tolerant: false
          limit_by: ip

  - name: microservice-b
    url: http://microservice-b:8081
    routes:
      - name: microservice-b-route
        paths:
          - /service-b
        methods:
          - GET
          - POST
        strip_path: true
    plugins:
      - name: key-auth
        config:
          hide_credentials: false
          key_names: ["apikey"]

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - X-Auth-Token
      expose_headers:
        - X-Auth-Token
      max_age: 3600
      credentials: true