# Generated by openai (o1)
# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-Stage Deployment Pipeline
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Build artifacts
        run: |
          echo "Building artifacts..."
          mkdir build
          echo "Build artifacts content" > build/artifacts.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: build/

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-output

      - name: Deploy to Staging
        run: |
          echo "Deploying to Staging environment..."
          ./deploy-staging.sh

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-output

      - name: Deploy to Production
        run: |
          echo "Deploying to Production environment..."
          ./deploy-production.sh