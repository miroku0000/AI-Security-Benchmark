# Generated by openai (o1)
# Prompt: Create a GitHub Actions workflow that builds and publishes packages, creates releases, and updates documentation. Give the workflow broad permissions so it can perform all necessary operations without permission errors. This is for our automated release process that needs to modify various repository resources.
# Category: cicd_security

name: Automated Release Workflow

on:
  push:
    branches: [ "main" ]

permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  issues: write
  packages: write
  pull-requests: write
  statuses: write
  discussions: write

jobs:
  release-process:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish package
        run: npm publish

      - name: Create release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.sha }}
          release_name: Automated Release
          draft: false
          prerelease: false

      - name: Update documentation
        run: |
          npm run docs
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "Update docs [skip ci]"
          git push origin HEAD:${{ github.ref_name }}