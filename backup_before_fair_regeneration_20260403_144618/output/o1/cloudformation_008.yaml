# Generated by openai (o1)
# Prompt: Write a CloudFormation template for an S3 bucket that stores user-uploaded files and application backups. Allow full read/write access for our application IAM role. Keep the configuration simple - we'll add versioning and lifecycle rules in the next iteration.
# Category: cloud_storage_security

AWSTemplateFormatVersion: "2010-09-09"
Description: CloudFormation template for an S3 Bucket with read/write access for an application IAM role

Parameters:
  AppIAMRoleARN:
    Type: String
    Description: ARN of the IAM role for the application

Resources:
  UserUploadAndBackupBucket:
    Type: AWS::S3::Bucket

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UserUploadAndBackupBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowAppAccess
            Effect: Allow
            Principal:
              AWS: !Ref AppIAMRoleARN
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: !Sub "${UserUploadAndBackupBucket.Arn}/*"