{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "storageAccountName": {
      "type": "string",
      "metadata": {
        "description": "Name of the Azure Storage account."
      },
      "minLength": 3,
      "maxLength": 24
    },
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]",
      "metadata": {
        "description": "Azure region for the storage account."
      }
    },
    "skuName": {
      "type": "string",
      "defaultValue": "Standard_LRS",
      "allowedValues": [
        "Standard_LRS",
        "Standard_GRS",
        "Standard_RAGRS",
        "Standard_ZRS",
        "Standard_GZRS",
        "Standard_RAGZRS"
      ],
      "metadata": {
        "description": "Storage account SKU."
      }
    },
    "indexDocument": {
      "type": "string",
      "defaultValue": "index.html",
      "metadata": {
        "description": "Static website index document."
      }
    },
    "error404Document": {
      "type": "string",
      "defaultValue": "404.html",
      "metadata": {
        "description": "Static website 404 document."
      }
    },
    "additionalContainerNames": {
      "type": "array",
      "defaultValue": [
        "assets"
      ],
      "metadata": {
        "description": "Additional blob container names to create with anonymous Blob read access."
      }
    }
  },
  "variables": {
    "allContainerNames": "[concat(createArray('$web'), parameters('additionalContainerNames'))]"
  },
  "resources": [
    {
      "type": "Microsoft.Storage/storageAccounts",
      "apiVersion": "2023-05-01",
      "name": "[parameters('storageAccountName')]",
      "location": "[parameters('location')]",
      "sku": {
        "name": "[parameters('skuName')]"
      },
      "kind": "StorageV2",
      "properties": {
        "allowBlobPublicAccess": true,
        "minimumTlsVersion": "TLS1_2",
        "supportsHttpsTrafficOnly": true,
        "accessTier": "Hot"
      }
    },
    {
      "type": "Microsoft.Storage/storageAccounts/blobServices",
      "apiVersion": "2023-05-01",
      "name": "[format('{0}/default', parameters('storageAccountName'))]",
      "dependsOn": [
        "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
      ],
      "properties": {
        "deleteRetentionPolicy": {
          "enabled": false
        },
        "isVersioningEnabled": false,
        "changeFeed": {
          "enabled": false
        },
        "restorePolicy": {
          "enabled": false
        },
        "containerDeleteRetentionPolicy": {
          "enabled": false
        },
        "cors": {
          "corsRules": []
        }
      },
      "resources": [
        {
          "type": "containers",
          "apiVersion": "2023-05-01",
          "name": "[variables('allContainerNames')[copyIndex('containerCopy')]]",
          "copy": {
            "name": "containerCopy",
            "count": "[length(variables('allContainerNames'))]"
          },
          "dependsOn": [
            "[resourceId('Microsoft.Storage/storageAccounts/blobServices', parameters('storageAccountName'), 'default')]"
          ],
          "properties": {
            "publicAccess": "Blob"
          }
        }
      ]
    },
    {
      "type": "Microsoft.Storage/storageAccounts/staticSites",
      "apiVersion": "2023-05-01",
      "name": "[parameters('storageAccountName')]",
      "dependsOn": [
        "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
      ],
      "properties": {
        "enabled": true,
        "indexDocument": "[parameters('indexDocument')]",
        "error404Document": "[parameters('error404Document')]"
      }
    }
  ],
  "outputs": {
    "storageAccountResourceId": {
      "type": "string",
      "value": "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
    },
    "primaryEndpoints": {
      "type": "object",
      "value": "[reference(resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName')), '2023-05-01', 'Full').primaryEndpoints]"
    },
    "staticWebsiteUrl": {
      "type": "string",
      "value": "[reference(resourceId('Microsoft.Storage/storageAccounts/staticSites', parameters('storageAccountName')), '2023-05-01').properties.defaultIndexDocumentPath]"
    }
  }
}