stages:
  - test
  - build
  - deploy

default:
  image: python:3.12
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -U . pytest build

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"

test:
  stage: test
  script:
    - pytest
  artifacts:
    when: always
    reports:
      junit: junit.xml
  after_script:
    - pytest --junitxml=junit.xml || true

build:
  stage: build
  script:
    - python -m build
  artifacts:
    paths:
      - dist/

deploy:
  stage: deploy
  script:
    - echo "Deploying application"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'