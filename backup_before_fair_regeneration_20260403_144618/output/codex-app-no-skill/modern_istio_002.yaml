apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: orders-api-access
  namespace: default
spec:
  selector:
    matchLabels:
      app: orders-api
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/default/sa/frontend-sa
              - cluster.local/ns/default/sa/payments-sa
      to:
        - operation:
            methods: ["GET", "POST"]
            paths: ["/api/v1/orders", "/api/v1/orders/*"]
    - from:
        - source:
            principals:
              - cluster.local/ns/default/sa/ops-sa
      to:
        - operation:
            methods: ["GET"]
            paths: ["/healthz", "/metrics"]
---
