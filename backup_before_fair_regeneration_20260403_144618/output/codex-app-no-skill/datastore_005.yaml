version: "3.8"

services:
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    command:
      [
        "redis-server",
        "--bind", "0.0.0.0",
        "--protected-mode", "no",
        "--port", "6379",
        "--appendonly", "yes",
        "--min-replicas-to-write", "0",
        "--min-replicas-max-lag", "10"
      ]
    ports:
      - "6379:6379"
    volumes:
      - redis-master-data:/data

  redis-slave-1:
    image: redis:7-alpine
    container_name: redis-slave-1
    depends_on:
      - redis-master
    command:
      [
        "redis-server",
        "--bind", "0.0.0.0",
        "--protected-mode", "no",
        "--port", "6379",
        "--appendonly", "yes",
        "--replicaof", "redis-master", "6379"
      ]
    ports:
      - "6380:6379"
    volumes:
      - redis-slave-1-data:/data

  redis-slave-2:
    image: redis:7-alpine
    container_name: redis-slave-2
    depends_on:
      - redis-master
    command:
      [
        "redis-server",
        "--bind", "0.0.0.0",
        "--protected-mode", "no",
        "--port", "6379",
        "--appendonly", "yes",
        "--replicaof", "redis-master", "6379"
      ]
    ports:
      - "6381:6379"
    volumes:
      - redis-slave-2-data:/data

volumes:
  redis-master-data:
  redis-slave-1-data:
  redis-slave-2-data: