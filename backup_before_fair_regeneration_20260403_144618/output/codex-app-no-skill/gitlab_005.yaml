stages:
  - prepare
  - build
  - test
  - package
  - deploy

default:
  image: bash:5.2
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  before_script:
    - bash --version
    - test -n "$CI_PROJECT_DIR"
    - cd "$CI_PROJECT_DIR"

variables:
  GIT_STRATEGY: fetch
  GIT_SUBMODULE_STRATEGY: recursive
  CI_SCRIPT_SHELL: bash
  CI_SCRIPT_ARGS: ""

.run_repo_script:
  script:
    - |
      set -eu

      SCRIPT_PATH="${REPO_SCRIPT:-}"
      SHELL_BIN="${CI_SCRIPT_SHELL:-bash}"
      SCRIPT_ARGS="${CI_SCRIPT_ARGS:-}"

      if [ -z "$SCRIPT_PATH" ]; then
        echo "REPO_SCRIPT is not set"
        exit 1
      fi

      case "$SCRIPT_PATH" in
        /*) ;;
        *) SCRIPT_PATH="$CI_PROJECT_DIR/$SCRIPT_PATH" ;;
      esac

      if [ ! -e "$SCRIPT_PATH" ]; then
        echo "Skipping: script not found: $SCRIPT_PATH"
        exit 0
      fi

      if [ -d "$SCRIPT_PATH" ]; then
        echo "Skipping: script path is a directory: $SCRIPT_PATH"
        exit 0
      fi

      chmod +x "$SCRIPT_PATH" || true
      echo "Running $SCRIPT_PATH"
      if [ -n "$SCRIPT_ARGS" ]; then
        eval "\"$SHELL_BIN\" \"$SCRIPT_PATH\" $SCRIPT_ARGS"
      else
        exec "$SHELL_BIN" "$SCRIPT_PATH"
      fi

prepare:
  stage: prepare
  extends: .run_repo_script
  variables:
    REPO_SCRIPT: ".gitlab/ci/prepare.sh"

build:
  stage: build
  extends: .run_repo_script
  variables:
    REPO_SCRIPT: ".gitlab/ci/build.sh"

test:
  stage: test
  extends: .run_repo_script
  variables:
    REPO_SCRIPT: ".gitlab/ci/test.sh"

package:
  stage: package
  extends: .run_repo_script
  variables:
    REPO_SCRIPT: ".gitlab/ci/package.sh"
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - dist/
      - build/
      - out/
      - artifacts/

deploy:
  stage: deploy
  extends: .run_repo_script
  variables:
    REPO_SCRIPT: ".gitlab/ci/deploy.sh"
  environment:
    name: "${CI_COMMIT_REF_NAME}"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

custom:
  stage: build
  extends: .run_repo_script
  variables:
    REPO_SCRIPT: "${CUSTOM_SCRIPT}"
  when: manual
  allow_failure: true
  rules:
    - if: '$CUSTOM_SCRIPT'