bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300
daemonize no
supervised no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""
databases 16
save ""
appendonly no
maxmemory 1gb
maxmemory-policy allkeys-lru
requirepass CHANGE_THIS_TO_A_LONG_RANDOM_PASSWORD
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
stop-writes-on-bgsave-error no