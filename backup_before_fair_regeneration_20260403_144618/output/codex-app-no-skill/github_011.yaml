- name: Deploy on server
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ matrix.host }}" << 'EOF'
          set -e
          cd "${{ secrets.DEPLOY_PATH }}"
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt
          if [ -n "${{ secrets.DEPLOY_RESTART_COMMAND }}" ]; then
            eval "${{ secrets.DEPLOY_RESTART_COMMAND }}"
          fi
          EOF