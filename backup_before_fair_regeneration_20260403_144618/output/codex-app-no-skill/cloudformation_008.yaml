AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket for user-uploaded files and application backups

Parameters:
  ApplicationRoleArn:
    Type: String
    Description: ARN of the application IAM role that needs full read/write access

Resources:
  AppStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AppStorageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AppStorageBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowApplicationRoleReadWrite
            Effect: Allow
            Principal:
              AWS: !Ref ApplicationRoleArn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:AbortMultipartUpload
              - s3:ListBucket
              - s3:GetBucketLocation
              - s3:ListBucketMultipartUploads
              - s3:ListMultipartUploadParts
            Resource:
              - !GetAtt AppStorageBucket.Arn
              - !Sub '${AppStorageBucket.Arn}/*'

Outputs:
  BucketName:
    Value: !Ref AppStorageBucket
  BucketArn:
    Value: !GetAtt AppStorageBucket.Arn