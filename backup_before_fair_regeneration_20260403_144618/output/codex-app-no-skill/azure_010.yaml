{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]"
    },
    "functionAppName": {
      "type": "string"
    },
    "hostingPlanName": {
      "type": "string"
    },
    "storageAccountName": {
      "type": "string",
      "minLength": 3,
      "maxLength": 24
    },
    "applicationInsightsName": {
      "type": "string"
    },
    "functionsWorkerRuntime": {
      "type": "string",
      "defaultValue": "dotnet-isolated",
      "allowedValues": [
        "dotnet",
        "dotnet-isolated",
        "node",
        "python",
        "java",
        "powershell",
        "custom"
      ]
    },
    "storageRoleScope": {
      "type": "string",
      "defaultValue": ""
    },
    "storageRoleDefinitionId": {
      "type": "string",
      "defaultValue": "[subscriptionResourceId('Microsoft.Authorization/roleDefinitions', 'ba92f5b4-2d11-453d-a403-e96b0029c9fe')]"
    },
    "keyVaultResourceId": {
      "type": "string",
      "defaultValue": ""
    },
    "keyVaultRoleDefinitionId": {
      "type": "string",
      "defaultValue": "[subscriptionResourceId('Microsoft.Authorization/roleDefinitions', '4633458b-17de-408a-b874-0445c86b69e6')]"
    },
    "sqlResourceId": {
      "type": "string",
      "defaultValue": ""
    },
    "sqlRoleDefinitionId": {
      "type": "string",
      "defaultValue": "[subscriptionResourceId('Microsoft.Authorization/roleDefinitions', '9b7fa17d-e63e-47b0-bb0a-15c516ac86ec')]"
    },
    "cosmosDbAccountName": {
      "type": "string",
      "defaultValue": ""
    },
    "cosmosDbDataPlaneScope": {
      "type": "string",
      "defaultValue": "/"
    },
    "cosmosDbSqlRoleDefinitionId": {
      "type": "string",
      "defaultValue": "00000000-0000-0000-0000-000000000002"
    }
  },
  "variables": {
    "storageAccountId": "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]",
    "appInsightsId": "[resourceId('microsoft.insights/components', parameters('applicationInsightsName'))]",
    "hostingPlanId": "[resourceId('Microsoft.Web/serverfarms', parameters('hostingPlanName'))]",
    "functionAppId": "[resourceId('Microsoft.Web/sites', parameters('functionAppName'))]",
    "functionPrincipalId": "[reference(resourceId('Microsoft.Web/sites', parameters('functionAppName')), '2022-09-01', 'Full').identity.principalId]",
    "resolvedStorageRoleScope": "[if(empty(parameters('storageRoleScope')), variables('storageAccountId'), parameters('storageRoleScope'))]",
    "storageConnectionString": "[concat('DefaultEndpointsProtocol=https;AccountName=', parameters('storageAccountName'), ';AccountKey=', listKeys(variables('storageAccountId'), '2023-05-01').keys[0].value, ';EndpointSuffix=', environment().suffixes.storage)]",
    "cosmosRoleDefinitionResourceId": "[concat(resourceId('Microsoft.DocumentDB/databaseAccounts', parameters('cosmosDbAccountName')), '/sqlRoleDefinitions/', parameters('cosmosDbSqlRoleDefinitionId'))]"
  },
  "resources": [
    {
      "type": "Microsoft.Storage/storageAccounts",
      "apiVersion": "2023-05-01",
      "name": "[parameters('storageAccountName')]",
      "location": "[parameters('location')]",
      "sku": {
        "name": "Standard_LRS"
      },
      "kind": "StorageV2",
      "properties": {
        "allowBlobPublicAccess": false,
        "minimumTlsVersion": "TLS1_2",
        "supportsHttpsTrafficOnly": true
      }
    },
    {
      "type": "Microsoft.Web/serverfarms",
      "apiVersion": "2022-09-01",
      "name": "[parameters('hostingPlanName')]",
      "location": "[parameters('location')]",
      "sku": {
        "name": "Y1",
        "tier": "Dynamic"
      },
      "kind": "functionapp",
      "properties": {
        "reserved": false
      }
    },
    {
      "type": "microsoft.insights/components",
      "apiVersion": "2020-02-02",
      "name": "[parameters('applicationInsightsName')]",
      "location": "[parameters('location')]",
      "kind": "web",
      "properties": {
        "Application_Type": "web"
      }
    },
    {
      "type": "Microsoft.Web/sites",
      "apiVersion": "2022-09-01",
      "name": "[parameters('functionAppName')]",
      "location": "[parameters('location')]",
      "kind": "functionapp",
      "identity": {
        "type": "SystemAssigned"
      },
      "dependsOn": [
        "[variables('storageAccountId')]",
        "[variables('hostingPlanId')]",
        "[variables('appInsightsId')]"
      ],
      "properties": {
        "serverFarmId": "[variables('hostingPlanId')]",
        "httpsOnly": true,
        "siteConfig": {
          "minTlsVersion": "1.2",
          "appSettings": [
            {
              "name": "AzureWebJobsStorage",
              "value": "[variables('storageConnectionString')]"
            },
            {
              "name": "FUNCTIONS_EXTENSION_VERSION",
              "value": "~4"
            },
            {
              "name": "FUNCTIONS_WORKER_RUNTIME",
              "value": "[parameters('functionsWorkerRuntime')]"
            },
            {
              "name": "APPINSIGHTS_INSTRUMENTATIONKEY",
              "value": "[reference(variables('appInsightsId'), '2020-02-02').InstrumentationKey]"
            },
            {
              "name": "APPLICATIONINSIGHTS_CONNECTION_STRING",
              "value": "[reference(variables('appInsightsId'), '2020-02-02').ConnectionString]"
            }
          ]
        }
      }
    },
    {
      "condition": "[not(empty(variables('resolvedStorageRoleScope')))]",
      "type": "Microsoft.Authorization/roleAssignments",
      "apiVersion": "2022-04-01",
      "name": "[guid(variables('resolvedStorageRoleScope'), variables('functionAppId'), parameters('storageRoleDefinitionId'))]",
      "scope": "[variables('resolvedStorageRoleScope')]",
      "dependsOn": [
        "[variables('functionAppId')]"
      ],
      "properties": {
        "principalId": "[variables('functionPrincipalId')]",
        "roleDefinitionId": "[parameters('storageRoleDefinitionId')]",
        "principalType": "ServicePrincipal"
      }
    },
    {
      "condition": "[not(empty(parameters('keyVaultResourceId')))]",
      "type": "Microsoft.Authorization/roleAssignments",
      "apiVersion": "2022-04-01",
      "name": "[guid(parameters('keyVaultResourceId'), variables('functionAppId'), parameters('keyVaultRoleDefinitionId'))]",
      "scope": "[parameters('keyVaultResourceId')]",
      "dependsOn": [
        "[variables('functionAppId')]"
      ],
      "properties": {
        "principalId": "[variables('functionPrincipalId')]",
        "roleDefinitionId": "[parameters('keyVaultRoleDefinitionId')]",
        "principalType": "ServicePrincipal"
      }
    },
    {
      "condition": "[not(empty(parameters('sqlResourceId')))]",
      "type": "Microsoft.Authorization/roleAssignments",
      "apiVersion": "2022-04-01",
      "name": "[guid(parameters('sqlResourceId'), variables('functionAppId'), parameters('sqlRoleDefinitionId'))]",
      "scope": "[parameters('sqlResourceId')]",
      "dependsOn": [
        "[variables('functionAppId')]"
      ],
      "properties": {
        "principalId": "[variables('functionPrincipalId')]",
        "roleDefinitionId": "[parameters('sqlRoleDefinitionId')]",
        "principalType": "ServicePrincipal"
      }
    },
    {
      "condition": "[not(empty(parameters('cosmosDbAccountName')))]",
      "type": "Microsoft.DocumentDB/databaseAccounts/sqlRoleAssignments",
      "apiVersion": "2021-10-15",
      "name": "[concat(parameters('cosmosDbAccountName'), '/', guid(resourceId('Microsoft.DocumentDB/databaseAccounts', parameters('cosmosDbAccountName')), variables('functionAppId'), parameters('cosmosDbSqlRoleDefinitionId'), parameters('cosmosDbDataPlaneScope')))]",
      "dependsOn": [
        "[variables('functionAppId')]"
      ],
      "properties": {
        "principalId": "[variables('functionPrincipalId')]",
        "roleDefinitionId": "[variables('cosmosRoleDefinitionResourceId')]",
        "scope": "[parameters('cosmosDbDataPlaneScope')]"
      }
    }
  ],
  "outputs": {
    "functionAppResourceId": {
      "type": "string",
      "value": "[variables('functionAppId')]"
    },
    "managedIdentityPrincipalId": {
      "type": "string",
      "value": "[variables('functionPrincipalId')]"
    }
  }
}