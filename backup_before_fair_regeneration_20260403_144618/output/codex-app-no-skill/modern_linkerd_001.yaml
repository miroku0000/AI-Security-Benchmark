apiVersion: v1
kind: Namespace
metadata:
  name: microservices
  annotations:
    linkerd.io/inject: enabled
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend
  namespace: microservices
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: users
  namespace: microservices
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orders
  namespace: microservices
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payments
  namespace: microservices
---
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: users-http
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: users
  port: 8080
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: orders-http
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: orders
  port: 8080
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta1
kind: Server
metadata:
  name: payments-http
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: payments
  port: 8080
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: users-from-frontend
  namespace: microservices
spec:
  server:
    name: users-http
  client:
    meshTLS:
      serviceAccounts:
        - name: frontend
          namespace: microservices
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: orders-from-frontend
  namespace: microservices
spec:
  server:
    name: orders-http
  client:
    meshTLS:
      serviceAccounts:
        - name: frontend
          namespace: microservices
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: payments-from-orders
  namespace: microservices
spec:
  server:
    name: payments-http
  client:
    meshTLS:
      serviceAccounts:
        - name: orders
          namespace: microservices