cat > "${CHART_DIR}/templates/deployment.yaml" <<'EOF'
{{- range $service := .Values.services }}
{{- if $service.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "microservices-stack.fullname" (dict "root" $ "service" $service) }}
  namespace: {{ include "microservices-stack.namespace" $ }}
  labels:
    {{- include "microservices-stack.labels" (dict "root" $ "service" $service) | nindent 4 }}
spec:
  {{- if not $service.autoscaling.enabled }}
  replicas: {{ default 1 $service.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "microservices-stack.selectorLabels" (dict "root" $ "service" $service) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "microservices-stack.selectorLabels" (dict "root" $ "service" $service) | nindent 8 }}
        {{- with $service.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with $.Values.global.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $service.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $service.serviceAccountName }}
      serviceAccountName: {{ $service.serviceAccountName }}
      {{- end }}
      {{- with $service.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $service.name }}
          image: "{{ $service.image.repository }}:{{ $service.image.tag }}"
          imagePullPolicy: {{ default "IfNotPresent" $service.image.pullPolicy }}
          {{- with $service.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $service.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ default 80 $service.containerPort }}
              protocol: TCP
          {{- if or $service.env $service.config $service.secret }}
          env:
            {{- range $env := $service.env }}
            - name: {{ $env.name }}
              value: {{ $env.value | quote }}
            {{- end }}
          {{- end }}
          {{- if or $service.config $service.secret }}
          envFrom:
            {{- if $service.config }}
            - configMapRef:
                name: {{ include "microservices-stack.fullname" (dict "root" $ "service" $service) }}
            {{- end }}
            {{- if $service.secret }}
            - secretRef:
                name: {{ include "microservices-stack.fullname" (dict "root" $ "service" $service) }}
            {{- end }}
          {{- end }}
          {{- with $service.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $service.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $service.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if $service.livenessProbe.enabled }}
          livenessProbe:
            {{- omit $service.livenessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if $service.readinessProbe.enabled }}
          readinessProbe:
            {{- omit $service.readinessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if $service.startupProbe.enabled }}
          startupProbe:
            {{- omit $service.startupProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
      {{- with $service.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- end }}
{{- end }}
EOF