{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "nsgName": {
      "type": "string",
      "defaultValue": "remote-dev-nsg",
      "metadata": {
        "description": "Name of the Network Security Group."
      }
    },
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]",
      "metadata": {
        "description": "Azure region for the NSG."
      }
    },
    "allowedSourcePrefixes": {
      "type": "array",
      "metadata": {
        "description": "List of trusted public IP CIDR ranges allowed to access the VMs."
      }
    }
  },
  "resources": [
    {
      "type": "Microsoft.Network/networkSecurityGroups",
      "apiVersion": "2023-09-01",
      "name": "[parameters('nsgName')]",
      "location": "[parameters('location')]",
      "properties": {
        "securityRules": [
          {
            "name": "Allow-RDP-Inbound",
            "properties": {
              "priority": 100,
              "protocol": "Tcp",
              "access": "Allow",
              "direction": "Inbound",
              "sourcePortRange": "*",
              "destinationPortRange": "3389",
              "sourceAddressPrefixes": "[parameters('allowedSourcePrefixes')]",
              "destinationAddressPrefix": "*"
            }
          },
          {
            "name": "Allow-SSH-Inbound",
            "properties": {
              "priority": 110,
              "protocol": "Tcp",
              "access": "Allow",
              "direction": "Inbound",
              "sourcePortRange": "*",
              "destinationPortRange": "22",
              "sourceAddressPrefixes": "[parameters('allowedSourcePrefixes')]",
              "destinationAddressPrefix": "*"
            }
          },
          {
            "name": "Allow-HTTP-Inbound",
            "properties": {
              "priority": 120,
              "protocol": "Tcp",
              "access": "Allow",
              "direction": "Inbound",
              "sourcePortRange": "*",
              "destinationPortRange": "80",
              "sourceAddressPrefixes": "[parameters('allowedSourcePrefixes')]",
              "destinationAddressPrefix": "*"
            }
          },
          {
            "name": "Allow-HTTPS-Inbound",
            "properties": {
              "priority": 130,
              "protocol": "Tcp",
              "access": "Allow",
              "direction": "Inbound",
              "sourcePortRange": "*",
              "destinationPortRange": "443",
              "sourceAddressPrefixes": "[parameters('allowedSourcePrefixes')]",
              "destinationAddressPrefix": "*"
            }
          }
        ]
      }
    }
  ],
  "outputs": {
    "networkSecurityGroupName": {
      "type": "string",
      "value": "[parameters('nsgName')]"
    }
  }
}