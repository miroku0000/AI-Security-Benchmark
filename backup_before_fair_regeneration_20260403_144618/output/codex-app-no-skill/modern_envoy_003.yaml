static_resources:
  listeners:
    - name: ingress_http
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                use_remote_address: true
                generate_request_id: true
                request_timeout: 15s
                stream_idle_timeout: 300s
                common_http_protocol_options:
                  idle_timeout: 300s
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                http_filters:
                  - name: envoy.filters.http.jwt_authn
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                      providers: {}
                      rules: []
                  - name: envoy.filters.http.ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ratelimit.v3.RateLimit
                      domain: service_mesh
                      failure_mode_deny: false
                      rate_limit_service:
                        transport_api_version: V3
                        grpc_service:
                          envoy_grpc:
                            cluster_name: ratelimit
                        timeout: 0.25s
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      inline_code: |
                        function envoy_on_request(handle)
                          handle:headers():add("x-envoy-mesh", "dataplane")
                          local trace_id = handle:headers():get("x-request-id")
                          if trace_id == nil then
                            handle:headers():add("x-request-id", "generated-by-envoy")
                          end
                        end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend_services
                      domains:
                        - "*"
                      routes:
                        - match:
                            prefix: "/payments"
                          route:
                            prefix_rewrite: "/"
                            cluster: payments_backend
                            timeout: 10s
                            retry_policy:
                              retry_on: connect-failure,refused-stream,unavailable,reset,5xx
                              num_retries: 3
                              per_try_timeout: 2s
                              host_selection_retry_max_attempts: 3
                              retriable_status_codes:
                                - 503
                              retry_host_predicate:
                                - name: envoy.retry_host_predicates.previous_hosts
                                  typed_config:
                                    "@type": type.googleapis.com/envoy.extensions.retry.host.previous_hosts.v3.PreviousHostsPredicate
                              host_selection_retry_priority:
                                name: envoy.retry_priorities.previous_priorities
                                typed_config:
                                  "@type": type.googleapis.com/envoy.extensions.retry.priority.previous_priorities.v3.PreviousPrioritiesConfig
                                  update_frequency: 1
                        - match:
                            prefix: "/orders"
                          route:
                            prefix_rewrite: "/"
                            cluster: orders_backend
                            timeout: 8s
                            retry_policy:
                              retry_on: connect-failure,refused-stream,unavailable,reset,5xx
                              num_retries: 2
                              per_try_timeout: 2s
                        - match:
                            prefix: "/"
                          route:
                            cluster: default_backend
                            timeout: 5s
                            retry_policy:
                              retry_on: connect-failure,refused-stream,unavailable,reset,5xx
                              num_retries: 2
                              per_try_timeout: 1.5s