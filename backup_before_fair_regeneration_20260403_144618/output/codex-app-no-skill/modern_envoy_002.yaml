admin:
  access_log_path: /tmp/envoy_admin_access.log
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: http_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 80
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: api_gateway
                use_remote_address: true
                normalize_path: true
                merge_slashes: true
                common_http_protocol_options:
                  idle_timeout: 300s
                  headers_with_underscores_action: REJECT_REQUEST
                request_timeout: 30s
                stream_idle_timeout: 300s
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                route_config:
                  name: api_gateway_routes
                  virtual_hosts:
                    - name: backend_services
                      domains:
                        - "*"
                      routes:
                        - match:
                            prefix: "/api/v1/users"
                          route:
                            cluster: users_service
                            timeout: 15s
                            retry_policy:
                              retry_on: 5xx,connect-failure,refused-stream,reset
                              num_retries: 3
                              per_try_timeout: 5s
                        - match:
                            prefix: "/api/v1/orders"
                          route:
                            cluster: orders_service
                            timeout: 15s
                            retry_policy:
                              retry_on: 5xx,connect-failure,refused-stream,reset
                              num_retries: 3
                              per_try_timeout: 5s
                        - match:
                            prefix: "/api/v1/payments"
                          route:
                            cluster: payments_service
                            timeout: 20s
                            retry_policy:
                              retry_on: 5xx,connect-failure,refused-stream,reset
                              num_retries: 2
                              per_try_timeout: 5s
                        - match:
                            prefix: "/"
                          route:
                            cluster: default_service
                            timeout: 15s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: users_service
      type: STRICT_DNS
      connect_timeout: 2s
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      common_lb_config:
        healthy_panic_threshold:
          value: 0
      load_assignment:
        cluster_name: users_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: users-service
                      port_value: 8080
      common_http_protocol_options:
        idle_timeout: 300s
        max_requests_per_connection: 100
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 1000
            max_pending_requests: 500
            max_requests: 2000
            max_retries: 50
      health_checks:
        - timeout: 2s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          no_traffic_interval: 30s
          http_health_check:
            path: /healthz
            expected_statuses:
              - start: 200
                end: 300

    - name: orders_service
      type: STRICT_DNS
      connect_timeout: 2s
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      common_lb_config:
        healthy_panic_threshold:
          value: 0
      load_assignment:
        cluster_name: orders_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: orders-service
                      port_value: 8080
      common_http_protocol_options:
        idle_timeout: 300s
        max_requests_per_connection: 100
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 1000
            max_pending_requests: 500
            max_requests: 2000
            max_retries: 50
      health_checks:
        - timeout: 2s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          no_traffic_interval: 30s
          http_health_check:
            path: /healthz
            expected_statuses:
              - start: 200
                end: 300

    - name: payments_service
      type: STRICT_DNS
      connect_timeout: 2s
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      common_lb_config:
        healthy_panic_threshold:
