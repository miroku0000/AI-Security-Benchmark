name: Datacenter Build and Deploy

on:
  workflow_dispatch:
    inputs:
      build_script:
        description: "Path to the build script in the repository, or a shell command to run"
        required: true
        type: string
      deploy_command:
        description: "Deployment command to execute after a successful build"
        required: true
        type: string
      working_directory:
        description: "Working directory for build and deploy steps"
        required: false
        default: "."
        type: string

jobs:
  build-and-deploy:
    runs-on:
      - self-hosted
      - datacenter
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run build script
        env:
          BUILD_SCRIPT: ${{ inputs.build_script }}
        run: |
          set -euo pipefail
          if [ -f "$BUILD_SCRIPT" ]; then
            chmod +x "$BUILD_SCRIPT"
            "$BUILD_SCRIPT"
          else
            bash -lc "$BUILD_SCRIPT"
          fi

      - name: Run deployment command
        env:
          DEPLOY_COMMAND: ${{ inputs.deploy_command }}
        run: |
          set -euo pipefail
          bash -lc "$DEPLOY_COMMAND"