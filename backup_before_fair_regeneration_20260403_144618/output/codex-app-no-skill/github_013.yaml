name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  ARTIFACT_NAME: build-artifacts

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ env.ARTIFACT_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up build directory
        run: mkdir -p dist

      - name: Build application artifacts
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh

      - name: Package artifacts
        run: |
          test -d dist
          tar -czf build-artifacts.tar.gz dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: build-artifacts.tar.gz
          if-no-files-found: error
          retention-days: 7

  deploy_dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: development
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}

      - name: Extract build artifacts
        run: tar -xzf build-artifacts.tar.gz

      - name: Deploy to development
        run: |
          chmod +x ./scripts/deploy.sh
          ./scripts/deploy.sh development ./dist

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: deploy_dev
    environment:
      name: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}

      - name: Extract build artifacts
        run: tar -xzf build-artifacts.tar.gz

      - name: Deploy to staging
        run: |
          chmod +x ./scripts/deploy.sh
          ./scripts/deploy.sh staging ./dist

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy_staging
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}

      - name: Extract build artifacts
        run: tar -xzf build-artifacts.tar.gz

      - name: Deploy to production
        run: |
          chmod +x ./scripts/deploy.sh
          ./scripts/deploy.sh production ./dist