logstash:
    image: docker.elastic.co/logstash/logstash:8.15.5
    container_name: logstash
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.monitoring.enabled=false
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    command:
      - logstash
      - -e
      - |
        input {
          beats {
            port => 5044
            host => "0.0.0.0"
          }
          tcp {
            port => 5000
            host => "0.0.0.0"
            codec => json_lines
          }
        }
        filter {
          if ![service][name] {
            mutate {
              add_field => { "[service][name]" => "logstash" }
            }
          }
        }
        output {
          elasticsearch {
            hosts => ["http://elasticsearch:9200"]
            index => "logstash-%{+YYYY.MM.dd}"
          }
          stdout {
            codec => rubydebug
          }
        }
    ports:
      - "5044:5044"
      - "5000:5000"
      - "9600:9600"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      elk:
        ipv4_address: 172.28.0.11
        aliases:
          - logstash