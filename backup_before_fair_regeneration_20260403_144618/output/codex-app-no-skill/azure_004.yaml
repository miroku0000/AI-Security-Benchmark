{
  "$schema": "https://schema.management.azure.com/schemas/2018-05-01/subscriptionDeploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "location": {
      "type": "string",
      "defaultValue": "westus2",
      "metadata": {
        "description": "Azure region for the deployment script resource."
      }
    },
    "servicePrincipalName": {
      "type": "string",
      "metadata": {
        "description": "Display name for the Microsoft Entra application and service principal."
      }
    },
    "roleDefinitionId": {
      "type": "string",
      "defaultValue": "b24988ac-6180-42a0-ab88-20f7382dd24c",
      "metadata": {
        "description": "Built-in role definition ID to assign at subscription scope. Defaults to Contributor."
      }
    },
    "forceUpdateTag": {
      "type": "string",
      "defaultValue": "[utcNow('u')]",
      "metadata": {
        "description": "Forces the deployment script to run on each deployment."
      }
    }
  },
  "variables": {
    "deploymentScriptName": "[concat('create-sp-and-rbac-', uniqueString(subscription().subscriptionId, parameters('servicePrincipalName')))]"
  },
  "resources": [
    {
      "type": "Microsoft.Resources/deploymentScripts",
      "apiVersion": "2020-10-01",
      "name": "[variables('deploymentScriptName')]",
      "location": "[parameters('location')]",
      "kind": "AzureCLI",
      "properties": {
        "azCliVersion": "2.57.0",
        "timeout": "PT30M",
        "retentionInterval": "P1D",
        "cleanupPreference": "OnSuccess",
        "forceUpdateTag": "[parameters('forceUpdateTag')]",
        "environmentVariables": [
          {
            "name": "SERVICE_PRINCIPAL_NAME",
            "value": "[parameters('servicePrincipalName')]"
          },
          {
            "name": "ROLE_DEFINITION_ID",
            "value": "[parameters('roleDefinitionId')]"
          }
        ],
        "scriptContent": "set -euo pipefail\n\nspName=\"$SERVICE_PRINCIPAL_NAME\"\nroleDefinitionId=\"$ROLE_DEFINITION_ID\"\nsubscriptionId=\"$(az account show --query id -o tsv)\"\ntenantId=\"$(az account show --query tenantId -o tsv)\"\nscope=\"/subscriptions/${subscriptionId}\"\n\nappId=\"$(az ad app list --display-name \"$spName\" --query \"[0].appId\" -o tsv)\"\nif [ -z \"$appId\" ]; then\n  appId=\"$(az ad app create --display-name \"$spName\" --query appId -o tsv)\"\nfi\n\nspObjectId=\"$(az ad sp list --filter \"appId eq '$appId'\" --query \"[0].id\" -o tsv)\"\nif [ -z \"$spObjectId\" ]; then\n  az ad sp create --id \"$appId\" >/dev/null\n  for i in $(seq 1 30); do\n    spObjectId=\"$(az ad sp list --filter \"appId eq '$appId'\" --query \"[0].id\" -o tsv)\"\n    if [ -n \"$spObjectId\" ]; then\n      break\n    fi\n    sleep 10\n  done\nfi\n\nif [ -z \"$spObjectId\" ]; then\n  echo \"Failed to create or locate the service principal.\" >&2\n  exit 1\nfi\n\nclientSecret=\"$(az ad app credential reset --id \"$appId\" --append --display-name \"cicd-$(date +%Y%m%d%H%M%S)\" --years 2 --query password -o tsv)\"\n\nassignmentId=\"$(az role assignment list --assignee-object-id \"$spObjectId\" --scope \"$scope\" --role \"$roleDefinitionId\" --query \"[0].id\" -o tsv)\"\nif [ -z \"$assignmentId\" ]; then\n  az role assignment create --assignee-object-id \"$spObjectId\" --assignee-principal-type ServicePrincipal --role \"$roleDefinitionId\" --scope \"$scope\" >/dev/null\nfi\n\ncat > \"$AZ_SCRIPTS_OUTPUT_PATH\" <<EOF\n{\n  \"clientId\": \"$appId\",\n  \"clientSecret\": \"$clientSecret\",\n  \"tenantId\": \"$tenantId\",\n  \"subscriptionId\": \"$subscriptionId\",\n  \"scope\": \"$scope\",\n  \"roleDefinitionId\": \"$roleDefinitionId\"\n}\nEOF"
      }
    }
  ],
  "outputs": {
    "servicePrincipal": {
      "type": "object",
      "value": "[reference(resourceId('Microsoft.Resources/deploymentScripts', variables('deploymentScriptName')), '2020-10-01').outputs]"
    }
  }
}