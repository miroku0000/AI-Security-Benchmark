def GenerateConfig(context):
    name = context.properties.get('instanceName', context.env['name'])
    region = context.properties.get('region', 'us-central1')
    db_version = context.properties.get('databaseVersion', 'POSTGRES_15')
    tier = context.properties.get('tier', 'db-f1-micro')
    disk_size_gb = context.properties.get('diskSizeGb', 10)
    disk_type = context.properties.get('diskType', 'PD_SSD')
    availability_type = context.properties.get('availabilityType', 'ZONAL')
    backup_enabled = context.properties.get('backupEnabled', True)
    ipv4_enabled = context.properties.get('ipv4Enabled', True)
    require_ssl = context.properties.get('requireSsl', True)
    deletion_protection = context.properties.get('deletionProtectionEnabled', True)
    authorized_networks = context.properties.get('authorizedNetworks', [])
    postgres_password = context.properties['postgresPassword']