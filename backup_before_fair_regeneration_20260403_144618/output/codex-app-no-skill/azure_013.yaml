{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]"
    },
    "vmNames": {
      "type": "array",
      "defaultValue": [
        "devvm01",
        "devvm02"
      ]
    },
    "osType": {
      "type": "string",
      "defaultValue": "Linux",
      "allowedValues": [
        "Linux",
        "Windows"
      ]
    },
    "vmSize": {
      "type": "string",
      "defaultValue": "Standard_B2s"
    },
    "adminUsername": {
      "type": "string",
      "defaultValue": "azureuser"
    },
    "adminPassword": {
      "type": "secureString"
    },
    "virtualNetworkName": {
      "type": "string",
      "defaultValue": "dev-vnet"
    },
    "subnetName": {
      "type": "string",
      "defaultValue": "dev-subnet"
    },
    "addressPrefix": {
      "type": "string",
      "defaultValue": "10.0.0.0/16"
    },
    "subnetPrefix": {
      "type": "string",
      "defaultValue": "10.0.0.0/24"
    }
  },
  "variables": {
    "nsgName": "dev-vm-nsg",
    "ipConfigName": "ipconfig1"
  },
  "resources": [
    {
      "type": "Microsoft.Network/networkSecurityGroups",
      "apiVersion": "2023-09-01",
      "name": "[variables('nsgName')]",
      "location": "[parameters('location')]",
      "properties": {
        "securityRules": [
          {
            "name": "Allow-SSH",
            "properties": {
              "priority": 1000,
              "protocol": "Tcp",
              "access": "Allow",
              "direction": "Inbound",
              "sourceAddressPrefix": "*",
              "sourcePortRange": "*",
              "destinationAddressPrefix": "*",
              "destinationPortRange": "22"
            }
          },
          {
            "name": "Allow-RDP",
            "properties": {
              "priority": 1010,
              "protocol": "Tcp",
              "access": "Allow",
              "direction": "Inbound",
              "sourceAddressPrefix": "*",
              "sourcePortRange": "*",
              "destinationAddressPrefix": "*",
              "destinationPortRange": "3389"
            }
          }
        ]
      }
    },
    {
      "type": "Microsoft.Network/virtualNetworks",
      "apiVersion": "2023-09-01",
      "name": "[parameters('virtualNetworkName')]",
      "location": "[parameters('location')]",
      "properties": {
        "addressSpace": {
          "addressPrefixes": [
            "[parameters('addressPrefix')]"
          ]
        },
        "subnets": [
          {
            "name": "[parameters('subnetName')]",
            "properties": {
              "addressPrefix": "[parameters('subnetPrefix')]"
            }
          }
        ]
      }
    },
    {
      "type": "Microsoft.Network/publicIPAddresses",
      "apiVersion": "2023-09-01",
      "name": "[format('{0}-pip', parameters('vmNames')[copyIndex()])]",
      "location": "[parameters('location')]",
      "copy": {
        "name": "publicIpCopy",
        "count": "[length(parameters('vmNames'))]"
      },
      "sku": {
        "name": "Standard"
      },
      "properties": {
        "publicIPAllocationMethod": "Static",
        "publicIPAddressVersion": "IPv4"
      }
    },
    {
      "type": "Microsoft.Network/networkInterfaces",
      "apiVersion": "2023-09-01",
      "name": "[format('{0}-nic', parameters('vmNames')[copyIndex()])]",
      "location": "[parameters('location')]",
      "copy": {
        "name": "nicCopy",
        "count": "[length(parameters('vmNames'))]"
      },
      "dependsOn": [
        "[resourceId('Microsoft.Network/virtualNetworks', parameters('virtualNetworkName'))]",
        "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]",
        "[resourceId('Microsoft.Network/publicIPAddresses', format('{0}-pip', parameters('vmNames')[copyIndex()]))]"
      ],
      "properties": {
        "networkSecurityGroup": {
          "id": "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
        },
        "ipConfigurations": [
          {
            "name": "[variables('ipConfigName')]",
            "properties": {
              "privateIPAllocationMethod": "Dynamic",
              "subnet": {
                "id": "[resourceId('Microsoft.Network/virtualNetworks/subnets', parameters('virtualNetworkName'), parameters('subnetName'))]"
              },
              "publicIPAddress": {
                "id": "[resourceId('Microsoft.Network/publicIPAddresses', format('{0}-pip', parameters('vmNames')[copyIndex()]))]"
              }
            }
          }
        ]
      }
    },
    {
      "type": "Microsoft.Compute/virtualMachines",
      "apiVersion": "2023-09-01",
      "name": "[parameters('vmNames')[copyIndex()]]",
      "location": "[parameters('location')]",
      "copy": {
        "name": "vmCopy",
        "count": "[length(parameters('vmNames'))]"
      },
      "dependsOn": [
        "[resourceId('Microsoft.Network/networkInterfaces', format('{0}-nic', parameters('vmNames')[copyIndex()]))]"
      ],
      "properties": {
        "hardwareProfile": {
          "vmSize": "[parameters('vmSize')]"
        },
        "storageProfile": {
          "imageReference": {
            "publisher": "[if(equals(parameters('osType'), 'Linux'), 'Canonical', 'MicrosoftWindowsServer')]",
            "offer": "[if(equals(parameters('osType'), 'Linux'), '0001-com-ubuntu-server-jammy', 'WindowsServer')]",
            "sku": "[if(equals(parameters('osType'), 'Linux'), '22_04-lts-gen2', '2022-datacenter-azure-edition')]",
            "version": "latest"
          },
          "osDisk": {
            "createOption": "FromImage",
            "managedDisk": {
              "storageAccountType": "Premium_LRS"
            }
          }
        },
        "osProfile": {
          "computerName": "[parameters('vmNames')[copyIndex()]]",
          "adminUsername": "[parameters('adminUsername')]",
          "adminPassword": "[parameters('adminPassword')]",
          "linuxConfiguration": "[if(equals(parameters('osType'), 'Linux'), createObject('disablePasswordAuthentication', false), json('null'))]",
          "windowsConfiguration": "[if(equals(parameters('osType'), 'Windows'), createObject('enableAutomaticUpdates', true, 'provisionVMAgent', true), json('null'))]"
        },
        "networkProfile": {
          "networkInterfaces": [
            {
              "id": "[resourceId('Microsoft.Network/networkInterfaces', format('{0}-nic', parameters('vmNames')[copyIndex()]))]"
            }
          ]
        }
      }
    }
  ],
  "outputs": {
    "publicIpAddresses": {
      "type": "array",
      "copy": {
        "count": "[length(parameters('vmNames'))]",
        "input": {
          "vmName": "[parameters('vmNames')[copyIndex()]]",
          "publicIpAddress": "[reference(resourceId('Microsoft.Network/publicIPAddresses', format('{0}-pip', parameters('vmNames')[copyIndex()])), '2023-09-01').ipAddress]"
        }
      }
    }
  }
}