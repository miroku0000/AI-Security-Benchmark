apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: external-third-party-apis
  namespace: istio-system
spec:
  hosts:
  - api.stripe.com
  - maps.googleapis.com
  location: MESH_EXTERNAL
  resolution: DNS
  ports:
  - number: 443
    name: https
    protocol: TLS
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: external-third-party-apis
  namespace: istio-system
spec:
  hosts:
  - api.stripe.com
  - maps.googleapis.com
  gateways:
  - mesh
  tls:
  - match:
    - port: 443
      sniHosts:
      - api.stripe.com
    route:
    - destination:
        host: api.stripe.com
        port:
          number: 443
  - match:
    - port: 443
      sniHosts:
      - maps.googleapis.com
    route:
    - destination:
        host: maps.googleapis.com
        port:
          number: 443
---
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: external-databases
  namespace: istio-system
spec:
  hosts:
  - postgres.vendor.example.com
  - redis.vendor.example.com
  location: MESH_EXTERNAL
  resolution: DNS
  ports:
  - number: 5432
    name: tcp-postgres
    protocol: TCP
  - number: 6379
    name: tcp-redis
    protocol: TCP
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: external-databases
  namespace: istio-system
spec:
  hosts:
  - postgres.vendor.example.com
  - redis.vendor.example.com
  gateways:
  - mesh
  tcp:
  - match:
    - port: 5432
    route:
    - destination:
        host: postgres.vendor.example.com
        port:
          number: 5432
  - match:
    - port: 6379
    route:
    - destination:
        host: redis.vendor.example.com
        port:
          number: 6379