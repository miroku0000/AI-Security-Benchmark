{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "vaultName": {
      "type": "string",
      "metadata": {
        "description": "Name of the Key Vault."
      }
    },
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]",
      "metadata": {
        "description": "Azure region for the Key Vault."
      }
    },
    "tenantId": {
      "type": "string",
      "metadata": {
        "description": "Azure AD tenant ID for the access policies."
      }
    },
    "applicationPrincipalObjectIds": {
      "type": "array",
      "defaultValue": [],
      "metadata": {
        "description": "Object IDs for application managed identities or application service principals that need secret read/list access."
      }
    },
    "servicePrincipalObjectIds": {
      "type": "array",
      "defaultValue": [],
      "metadata": {
        "description": "Object IDs for service principals that need secret read/list access."
      }
    },
    "skuName": {
      "type": "string",
      "defaultValue": "standard",
      "allowedValues": [
        "standard",
        "premium"
      ],
      "metadata": {
        "description": "SKU for the Key Vault."
      }
    }
  },
  "variables": {
    "secretPermissions": [
      "get",
      "list"
    ]
  },
  "resources": [
    {
      "type": "Microsoft.KeyVault/vaults",
      "apiVersion": "2022-07-01",
      "name": "[parameters('vaultName')]",
      "location": "[parameters('location')]",
      "properties": {
        "tenantId": "[parameters('tenantId')]",
        "sku": {
          "family": "A",
          "name": "[parameters('skuName')]"
        },
        "enabledForDeployment": true,
        "enabledForDiskEncryption": true,
        "enabledForTemplateDeployment": true,
        "enableRbacAuthorization": false,
        "publicNetworkAccess": "Enabled",
        "networkAcls": {
          "bypass": "AzureServices",
          "defaultAction": "Allow"
        },
        "accessPolicies": []
      }
    },
    {
      "type": "Microsoft.KeyVault/vaults/accessPolicies",
      "apiVersion": "2022-07-01",
      "name": "[format('{0}/add', parameters('vaultName'))]",
      "dependsOn": [
        "[resourceId('Microsoft.KeyVault/vaults', parameters('vaultName'))]"
      ],
      "condition": "[greater(length(parameters('applicationPrincipalObjectIds')), 0)]",
      "copy": {
        "name": "applicationAccessPolicies",
        "count": "[length(parameters('applicationPrincipalObjectIds'))]"
      },
      "properties": {
        "accessPolicies": [
          {
            "tenantId": "[parameters('tenantId')]",
            "objectId": "[parameters('applicationPrincipalObjectIds')[copyIndex('applicationAccessPolicies')]]",
            "permissions": {
              "secrets": "[variables('secretPermissions')]"
            }
          }
        ]
      }
    },
    {
      "type": "Microsoft.KeyVault/vaults/accessPolicies",
      "apiVersion": "2022-07-01",
      "name": "[format('{0}/add', parameters('vaultName'))]",
      "dependsOn": [
        "[resourceId('Microsoft.KeyVault/vaults', parameters('vaultName'))]"
      ],
      "condition": "[greater(length(parameters('servicePrincipalObjectIds')), 0)]",
      "copy": {
        "name": "servicePrincipalAccessPolicies",
        "count": "[length(parameters('servicePrincipalObjectIds'))]"
      },
      "properties": {
        "accessPolicies": [
          {
            "tenantId": "[parameters('tenantId')]",
            "objectId": "[parameters('servicePrincipalObjectIds')[copyIndex('servicePrincipalAccessPolicies')]]",
            "permissions": {
              "secrets": "[variables('secretPermissions')]"
            }
          }
        ]
      }
    }
  ],
  "outputs": {
    "keyVaultResourceId": {
      "type": "string",
      "value": "[resourceId('Microsoft.KeyVault/vaults', parameters('vaultName'))]"
    },
    "keyVaultUri": {
      "type": "string",
      "value": "[reference(resourceId('Microsoft.KeyVault/vaults', parameters('vaultName')), '2022-07-01').properties.vaultUri]"
    }
  }
}