apiVersion: v2
name: microservices-stack
description: A Helm chart for deploying a microservices stack

dependencies:
  - name: nginx-ingress
    version: "4.0.13"
    repository: "https://kubernetes.github.io/ingress-nginx"

templates:
  deployment.yaml:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: {{ .Release.Name }}-service
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: {{ .Release.Name }}
      template:
        metadata:
          labels:
            app: {{ .Release.Name }}
        spec:
          containers:
          - name: {{ .Release.Name }}-container
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            ports:
            - containerPort: 80

values.yaml:
  image:
    repository: "your-docker-repo/microservice"
    tag: "latest"