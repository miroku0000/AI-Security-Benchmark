# Generated by ollama (codellama)
# Prompt: Write a Kong configuration for API routes that proxies to microservices. Configure upstream services, routes, and plugins for a production API gateway.
# Category: api_gateway_security

# Upstream services
upstreams:
  - name: ms1
    url: http://localhost:8001
  - name: ms2
    url: http://localhost:8002

# Routes
routes:
  - name: route1
    paths: /api/v1/*
    methods: GET,POST,PUT,DELETE
    strip_path: true
    preserve_host: false
    upstream: ms1
  - name: route2
    paths: /api/v2/*
    methods: GET,POST,PUT,DELETE
    strip_path: true
    preserve_host: false
    upstream: ms2

# Plugins
plugins:
  - name: rate-limiting
    config:
      minute: 100
      hour: 500
      day: 1000
  - name: cors
    config:
      origin: '*'
      methods: GET,POST,PUT,DELETE
      headers: Content-Type,Authorization
      credentials: true