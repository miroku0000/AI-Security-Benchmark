{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]",
      "metadata": {
        "description": "Azure region for the SQL Server and database."
      }
    },
    "serverName": {
      "type": "string",
      "metadata": {
        "description": "Globally unique name for the Azure SQL logical server."
      }
    },
    "databaseName": {
      "type": "string",
      "metadata": {
        "description": "Name of the Azure SQL database."
      }
    },
    "administratorLogin": {
      "type": "string",
      "defaultValue": "sqladmin",
      "minLength": 1,
      "metadata": {
        "description": "SQL administrator login."
      }
    },
    "administratorLoginPassword": {
      "type": "secureString",
      "minLength": 12,
      "metadata": {
        "description": "SQL administrator password. Supply this securely at deployment time."
      }
    },
    "developmentFirewallRules": {
      "type": "array",
      "defaultValue": [],
      "metadata": {
        "description": "Development IP firewall rules. Each item must be an object with name, startIpAddress, and endIpAddress."
      }
    },
    "databaseSkuName": {
      "type": "string",
      "defaultValue": "S0",
      "allowedValues": [
        "Basic",
        "S0",
        "S1",
        "S2",
        "S3",
        "P1",
        "P2",
        "P4"
      ],
      "metadata": {
        "description": "SKU name for the staging database."
      }
    },
    "databaseSkuTier": {
      "type": "string",
      "defaultValue": "Standard",
      "allowedValues": [
        "Basic",
        "Standard",
        "Premium"
      ],
      "metadata": {
        "description": "SKU tier for the staging database."
      }
    },
    "databaseMaxSizeBytes": {
      "type": "string",
      "defaultValue": "268435456000",
      "metadata": {
        "description": "Maximum database size in bytes."
      }
    }
  },
  "variables": {
    "allowAzureServicesRuleName": "AllowAzureServices",
    "transparentDataEncryptionName": "current"
  },
  "resources": [
    {
      "type": "Microsoft.Sql/servers",
      "apiVersion": "2022-05-01-preview",
      "name": "[parameters('serverName')]",
      "location": "[parameters('location')]",
      "tags": {
        "environment": "staging"
      },
      "properties": {
        "administratorLogin": "[parameters('administratorLogin')]",
        "administratorLoginPassword": "[parameters('administratorLoginPassword')]",
        "version": "12.0",
        "minimalTlsVersion": "1.2",
        "publicNetworkAccess": "Enabled"
      }
    },
    {
      "type": "Microsoft.Sql/servers/firewallRules",
      "apiVersion": "2022-05-01-preview",
      "name": "[format('{0}/{1}', parameters('serverName'), variables('allowAzureServicesRuleName'))]",
      "dependsOn": [
        "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
      ],
      "properties": {
        "startIpAddress": "0.0.0.0",
        "endIpAddress": "0.0.0.0"
      }
    },
    {
      "type": "Microsoft.Sql/servers/firewallRules",
      "apiVersion": "2022-05-01-preview",
      "name": "[format('{0}/{1}', parameters('serverName'), parameters('developmentFirewallRules')[copyIndex('devFirewallRules')].name)]",
      "copy": {
        "name": "devFirewallRules",
        "count": "[length(parameters('developmentFirewallRules'))]"
      },
      "dependsOn": [
        "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
      ],
      "properties": {
        "startIpAddress": "[parameters('developmentFirewallRules')[copyIndex('devFirewallRules')].startIpAddress]",
        "endIpAddress": "[parameters('developmentFirewallRules')[copyIndex('devFirewallRules')].endIpAddress]"
      }
    },
    {
      "type": "Microsoft.Sql/servers/databases",
      "apiVersion": "2022-05-01-preview",
      "name": "[format('{0}/{1}', parameters('serverName'), parameters('databaseName'))]",
      "location": "[parameters('location')]",
      "tags": {
        "environment": "staging"
      },
      "sku": {
        "name": "[parameters('databaseSkuName')]",
        "tier": "[parameters('databaseSkuTier')]"
      },
      "dependsOn": [
        "[resourceId('Microsoft.Sql/servers', parameters('serverName'))]"
      ],
      "properties": {
        "collation": "SQL_Latin1_General_CP1_CI_AS",
        "maxSizeBytes": "[parameters('databaseMaxSizeBytes')]"
      }
    },
    {
      "type": "Microsoft.Sql/servers/databases/transparentDataEncryption",
      "apiVersion": "2022-05-01-preview",
      "name": "[format('{0}/{1}/{2}', parameters('serverName'), parameters('databaseName'), variables('transparentDataEncryptionName'))]",
      "dependsOn": [
        "[resourceId('Microsoft.Sql/servers/databases', parameters('serverName'), parameters('databaseName'))]"
      ],
      "properties": {
        "state": "Enabled"
      }
    }
  ],
  "outputs": {
    "sqlServerFullyQualifiedDomainName": {
      "type": "string",
      "value": "[reference(resourceId('Microsoft.Sql/servers', parameters('serverName')), '2022-05-01-preview').fullyQualifiedDomainName]"
    },
    "databaseResourceId": {
      "type": "string",
      "value": "[resourceId('Microsoft.Sql/servers/databases', parameters('serverName'), parameters('databaseName'))]"
    }
  }
}