: "${KAFKA_CONFIG:=/etc/kafka/server.properties}"
: "${KAFKA_START_CMD:=kafka-server-start.sh}"
: "${JMX_PORT:=9999}"
: "${JMX_BIND_HOST:=127.0.0.1}"
: "${JMX_ADVERTISE_HOST:=${JMX_BIND_HOST}}"
: "${JMX_REMOTE:=false}"
: "${JMX_SSL:=false}"
: "${JMX_STATE_DIR:=/tmp/kafka-jmx}"
: "${JMX_MONITOR_USERNAME:=monitorRole}"
: "${JMX_PASSWORD_FILE:=${JMX_STATE_DIR}/jmxremote.password}"
: "${JMX_ACCESS_FILE:=${JMX_STATE_DIR}/jmxremote.access}"