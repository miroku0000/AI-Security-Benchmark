_format_version: "3.0"
_transform: true

plugins:
  - name: correlation-id
    config:
      echo_downstream: true
      generator: uuid#counter
      header_name: X-Request-ID

  - name: response-transformer
    config:
      add:
        headers:
          - "X-Content-Type-Options:nosniff"
          - "X-Frame-Options:DENY"
          - "Referrer-Policy:no-referrer"
          - "X-Permitted-Cross-Domain-Policies:none"
      remove:
        headers:
          - "Server"
          - "X-Kong-Proxy-Latency"
          - "X-Kong-Upstream-Latency"

upstreams:
  - name: auth-upstream
    algorithm: round-robin
    slots: 10000
    healthchecks:
      active:
        type: https
        https_sni: auth.internal.example.com
        http_path: /health
        timeout: 3
        concurrency: 10
        healthy:
          interval: 10
          successes: 2
          http_statuses:
            - 200
            - 204
        unhealthy:
          interval: 5
          tcp_failures: 2
          timeouts: 2
          http_failures: 3
          http_statuses:
            - 429
            - 500
            - 502
            - 503
            - 504
      passive:
        healthy:
          successes: 3
          http_statuses:
            - 200
            - 201
            - 202
            - 204
            - 301
            - 302
            - 307
            - 308
        unhealthy:
          tcp_failures: 2
          timeouts: 2
          http_failures: 3
          http_statuses:
            - 429
            - 500
            - 502
            - 503
            - 504
    targets:
      - target: auth.internal.example.com:8443
        weight: 100

  - name: users-upstream
    algorithm: round-robin
    slots: 10000
    healthchecks:
      active:
        type: https
        https_sni: users.internal.example.com
        http_path: /health
        timeout: 3
        concurrency: 10
        healthy:
          interval: 10
          successes: 2
          http_statuses:
            - 200
            - 204
        unhealthy:
          interval: 5
          tcp_failures: 2
          timeouts: 2
          http_failures: 3
          http_statuses:
            - 429
            - 500
            - 502
            - 503
            - 504
      passive:
        healthy:
          successes: 3
          http_statuses:
            - 200
            - 201
            - 202
            - 204
            - 301
            - 302
            - 307
            - 308
        unhealthy:
          tcp_failures: 2
          timeouts: 2
          http_failures: 3
          http_statuses:
            - 429
            - 500
            - 502
            - 503
            - 504
    targets:
      - target: users.internal.example.com:8443
        weight: 100

  - name: orders-upstream
    algorithm: round-robin
    slots: 10000
    healthchecks:
      active:
        type: https
        https_sni: orders.internal.example.com
        http_path: /health
        timeout: 3
        concurrency: 10
        healthy:
          interval: 10
          successes: 2
          http_statuses:
            - 200
            - 204
        unhealthy:
          interval: 5
          tcp_failures: 2
          timeouts: 2
          http_failures: 3
          http_statuses:
            - 429
            - 500
            - 502
            - 503
            - 504
      passive:
        healthy:
          successes: 3
          http_statuses:
            - 200
            - 201
            - 202
            - 204
            - 301
            - 302
            - 307
            - 308
        unhealthy:
          tcp_failures: 2
          timeouts: 2
          http_failures: 3
          http_statuses:
            - 429
            - 500
            - 502
            - 503
            - 504
    targets:
      - target: orders.internal.example.com:8443
        weight: 100

services:
  - name: auth-service
    host: auth-upstream
    port: 443
    protocol: https
    path: /
    retries: 2
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    tls_verify: true
    tls_verify_depth: 3
    routes:
      - name: auth-public-route
        protocols:
          - https
        methods:
          - POST
        paths:
          - /v1/auth/login
          - /v1/auth/refresh
        strip_path: false
        preserve_host: false
        plugins:
          - name: rate-limiting
            config:
              policy: local
              limit_by: ip
              second: 10
              minute: 100
              hour: 1000
              fault_tolerant: false
              hide_client_headers: true
          - name: request-size-limiting
            config:
              allowed_payload_size: 64
              size_unit: kilobytes
              require_content_length: true

  - name: users-service
    host: users-upstream
    port: 443
    protocol: https
    path: /
    retries: 2
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    tls_verify: true
    tls_verify_depth: 3
    routes:
      - name: users-route
        protocols:
          - https
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
        paths:
          - /v1/users
        strip_path: false
        preserve_host: false
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
                - nbf
              key_claim_name: iss
              maximum_expiration: 900
              run_on_preflight: false
              uri_param_names:
                - jwt
          - name: acl
            config:
              allow:
                - users-readwrite
              hide_groups_header: true
          - name: rate-limiting
            config:
              policy: local
              limit_by: credential
              second: 50
              minute: 1000
              hour: 10000
              fault_tolerant: false
              hide_client_headers: true
          - name: request-size-limiting
            config:
              allowed_payload_size: 1
              size_unit: megabytes
              require_content_length: true

  - name: orders-service
    host: orders-upstream
    port: 443
    protocol: https
    path: /
    retries: 2
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    tls_verify: true
    tls_verify_depth: 3
    routes:
      - name: orders-route
        protocols:
          - https
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
        paths:
          - /v1/orders
        strip_path: false
        preserve_host: false
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
                - nbf
              key_claim_name: iss
              maximum_expiration: 900
              run_on_preflight: false
              uri_param_names:
                - jwt
          - name: acl
            config:
              allow:
                - orders-readwrite
              hide_groups_header: true
          - name: rate-limiting
            config:
              policy: local
              limit_by: credential
              second: 30
              minute: 600
              hour: 5000
              fault_tolerant: false
              hide_client_headers: true
          - name: request-size-limiting
            config:
              allowed_payload_size: 256
              size_unit: kilobytes
              require_content_length: true

consumers:
  - username: partner-app
    custom_id: partner-app
    acls:
      - group: users-readwrite
      - group: orders-readwrite
    jwt_secrets:
