database = postgres

pg_host = kong-postgres.internal
pg_port = 5432
pg_database = kong
pg_user = kong
pg_password = change_me_to_a_long_random_secret
pg_ssl = on
pg_ssl_verify = on

proxy_listen = 0.0.0.0:8000 reuseport backlog=16384, 0.0.0.0:8443 ssl http2 reuseport backlog=16384
admin_listen = 127.0.0.1:8001 reuseport backlog=16384
status_listen = 127.0.0.1:8100 reuseport backlog=16384
admin_gui_listen = off

anonymous_reports = off
log_level = notice

trusted_ips = 127.0.0.1/32,::1/128
real_ip_header = X-Forwarded-For
real_ip_recursive = on