          http_failures: 3
          http_statuses:
            - 429
            - 500
            - 502
            - 503
            - 504
    targets:
      - target: 10.0.3.31:8443
        weight: 100
      - target: 10.0.3.32:8443
        weight: 100

services:
  - name: users-service
    host: users-upstream
    port: 443
    protocol: https
    path: /
    retries: 2
    connect_timeout: 3000
    write_timeout: 5000
    read_timeout: 5000
    tls_verify: true
    tls_verify_depth: 3
    routes:
      - name: users-route
        protocols:
          - https
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
        hosts:
          - api.example.com
        paths:
          - /users
          - /profiles
        strip_path: false
        preserve_host: false
        regex_priority: 0

  - name: orders-service
