            - 204
        unhealthy:
          tcp_failures: 2
          timeouts: 2
          http_failures: 3
          http_statuses:
            - 429
            - 500
            - 502
            - 503
            - 504
    targets:
      - target: 10.0.2.21:8443
        weight: 100
      - target: 10.0.2.22:8443
        weight: 100

  - name: inventory-upstream
    algorithm: least-connections
    slots: 10000
    healthchecks:
      active:
        type: https
        http_path: /health
        timeout: 5
        concurrency: 10
        healthy:
