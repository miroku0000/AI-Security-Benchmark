{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]",
      "metadata": {
        "description": "Azure region for all resources."
      }
    },
    "vmName": {
      "type": "string",
      "defaultValue": "webvm01",
      "minLength": 1,
      "maxLength": 64,
      "metadata": {
        "description": "Name of the virtual machine."
      }
    },
    "vmSize": {
      "type": "string",
      "defaultValue": "Standard_B2s",
      "metadata": {
        "description": "Azure VM size."
      }
    },
    "adminUsername": {
      "type": "string",
      "defaultValue": "azureuser",
      "minLength": 1,
      "maxLength": 32,
      "metadata": {
        "description": "Admin username for SSH access."
      }
    },
    "sshPublicKey": {
      "type": "string",
      "minLength": 1,
      "metadata": {
        "description": "SSH RSA or Ed25519 public key used for administrator access."
      }
    },
    "vnetAddressPrefix": {
      "type": "string",
      "defaultValue": "10.10.0.0/16",
      "metadata": {
        "description": "Virtual network CIDR."
      }
    },
    "subnetAddressPrefix": {
      "type": "string",
      "defaultValue": "10.10.1.0/24",
      "metadata": {
        "description": "Subnet CIDR."
      }
    },
    "allowedWebSourcePrefix": {
      "type": "string",
      "defaultValue": "*",
      "metadata": {
        "description": "CIDR allowed to reach ports 80 and 443. Use a restricted range where possible."
      }
    },
    "osDiskSizeGB": {
      "type": "int",
      "defaultValue": 64,
      "minValue": 30,
      "metadata": {
        "description": "OS disk size in GB."
      }
    },
    "dataDiskSizeGB": {
      "type": "int",
      "defaultValue": 128,
      "minValue": 32,
      "metadata": {
        "description": "Data disk size in GB."
      }
    },
    "cloudInit": {
      "type": "string",
      "defaultValue": "#cloud-config\npackage_upgrade: true\npackages:\n  - nginx\n  - unattended-upgrades\nwrite_files:\n  - path: /etc/nginx/sites-available/default\n    permissions: '0644'\n    owner: root:root\n    content: |\n      server {\n          listen 80 default_server;\n          listen [::]:80 default_server;\n          listen 443 ssl default_server;\n          listen [::]:443 ssl default_server;\n          ssl_reject_handshake on;\n          server_name _;\n          root /srv/webapp;\n          index index.html;\n\n          location / {\n              try_files $uri $uri/ =404;\n          }\n      }\n  - path: /srv/webapp/index.html\n    permissions: '0644'\n    owner: www-data:www-data\n    content: |\n      <!doctype html>\n      <html lang=\"en\">\n      <head>\n        <meta charset=\"utf-8\">\n        <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n        <title>Web Application</title>\n      </head>\n      <body>\n        <h1>Web application host is running</h1>\n      </body>\n      </html>\nruncmd:\n  - mkdir -p /srv/webapp\n  - chown -R www-data:www-data /srv/webapp\n  - |\n    bash -lc 'set -euxo pipefail\n    DATA_DISK=/dev/disk/azure/scsi1/lun0\n    if [ -b \"$DATA_DISK\" ]; then\n      if ! blkid \"$DATA_DISK\" >/dev/null 2>&1; then\n        mkfs.ext4 -F \"$DATA_DISK\"\n      fi\n      UUID=$(blkid -s UUID -o value \"$DATA_DISK\")\n      grep -q \"$UUID\" /etc/fstab || echo \"UUID=$UUID /srv/webapp ext4 defaults,nofail 0 2\" >> /etc/fstab\n      mount -a\n      chown -R www-data:www-data /srv/webapp\n    fi'\n  - systemctl enable unattended-upgrades\n  - systemctl restart unattended-upgrades\n  - systemctl enable nginx\n  - systemctl restart nginx\nfinal_message: Secure web VM bootstrap completed.\n",
      "metadata": {
        "description": "Cloud-init payload. Default installs NGINX, mounts the data disk, and enables unattended security updates."
      }
    }
  },
  "variables": {
    "vnetName": "[concat(parameters('vmName'), '-vnet')]",
    "subnetName": "app",
    "nsgName": "[concat(parameters('vmName'), '-nsg')]",
    "publicIpName": "[concat(parameters('vmName'), '-pip')]",
    "nicName": "[concat(parameters('vmName'), '-nic')]"
  },
  "resources": [
    {
      "type": "Microsoft.Network/networkSecurityGroups",
      "apiVersion": "2023-09-01",
      "name": "[variables('nsgName')]",
      "location": "[parameters('location')]",
      "properties": {
        "securityRules": [
          {
            "name": "Allow-HTTP-Inbound",
            "properties": {
              "priority": 100,
              "protocol": "Tcp",
              "access": "Allow",
              "direction": "Inbound",
              "sourceAddressPrefix": "[parameters('allowedWebSourcePrefix')]",
              "sourcePortRange": "*",
              "destinationAddressPrefix": "*",
              "destinationPortRange": "80"
            }
          },
          {
            "name": "Allow-HTTPS-Inbound",
            "properties": {
              "priority": 110,
              "protocol": "Tcp",
              "access": "Allow",
              "direction": "Inbound",
              "sourceAddressPrefix": "[parameters('allowedWebSourcePrefix')]",
              "sourcePortRange": "*",
              "destinationAddressPrefix": "*",
              "destinationPortRange": "443"
            }
          }
        ]
      }
    },
    {
      "type": "Microsoft.Network/virtualNetworks",
      "apiVersion": "2023-09-01",
      "name": "[variables('vnetName')]",
      "location": "[parameters('location')]",
      "properties": {
        "addressSpace": {
          "addressPrefixes": [
            "[parameters('vnetAddressPrefix')]"
          ]
        },
        "subnets": [
          {
            "name": "[variables('subnetName')]",
            "properties": {
              "addressPrefix": "[parameters('subnetAddressPrefix')]"
            }
          }
        ]
      }
    },
    {
      "type": "Microsoft.Network/publicIPAddresses",
      "apiVersion": "2023-09-01",
      "name": "[variables('publicIpName')]",
      "location": "[parameters('location')]",
      "sku": {
        "name": "Standard",
        "tier": "Regional"
      },
      "properties": {
        "publicIPAllocationMethod": "Static",
        "publicIPAddressVersion": "IPv4",
        "idleTimeoutInMinutes": 4,
        "deleteOption": "Delete"
      }
    },
    {
      "type": "Microsoft.Network/networkInterfaces",
      "apiVersion": "2023-09-01",
      "name": "[variables('nicName')]",
      "location": "[parameters('location')]",
      "dependsOn": [
        "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]",
        "[resourceId('Microsoft.Network/virtualNetworks', variables('vnetName'))]",
        "[resourceId('Microsoft.Network/publicIPAddresses', variables('publicIpName'))]"
      ],
      "properties": {
        "networkSecurityGroup": {
          "id": "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
        },
        "ipConfigurations": [
          {
            "name": "ipconfig1",
            "properties": {
              "privateIPAllocationMethod": "Dynamic",
              "subnet": {
                "id": "[resourceId('Microsoft.Network/virtualNetworks/subnets', variables('vnetName'), variables('subnetName'))]"
              },
              "publicIPAddress": {
                "id": "[resourceId('Microsoft.Network/publicIPAddresses', variables('publicIpName'))]"
              }
            }
          }
        ]
      }
    },
    {
      "type": "Microsoft.Compute/virtualMachines",
      "apiVersion": "2023-09-01",
      "name": "[parameters('vmName')]",
      "location": "[parameters('location')]",
      "identity": {
        "type": "SystemAssigned"
      },
      "dependsOn": [
        "[resourceId('Microsoft.Network/networkInterfaces', variables('nicName'))]"
      ],
      "properties": {
        "hardwareProfile": {
          "vmSize": "[parameters('vmSize')]"
        },
        "securityProfile": {
          "securityType": "TrustedLaunch",
          "uefiSettings": {
            "secureBootEnabled": true,
            "vTpmEnabled": true
          }
        },
        "storageProfile": {
          "imageReference": {
            "publisher": "Canonical",
            "offer": "0001-com-ubuntu-server-jammy",
            "sku": "22_04-lts-gen2",
            "version": "latest"
          },
          "osDisk": {
            "name": "[concat(parameters('vmName'), '-osdisk')]",
            "createOption": "FromImage",
            "diskSizeGB": "[parameters('osDiskSizeGB')]",
            "caching": "ReadWrite",
            "deleteOption": "Delete",
            "managedDisk": {
              "storageAccountType": "StandardSSD_LRS"
            }
          },
          "dataDisks": [
            {
              "lun": 0,
              "name": "[concat(parameters('vmName'), '-datadisk-01')]",
              "createOption": "Empty",
              "diskSizeGB": "[parameters('dataDiskSizeGB')]",
              "caching": "ReadOnly",
              "deleteOption": "Delete",
              "managedDisk": {
                "storageAccountType": "StandardSSD_LRS"
              }
            }
          ]
        },
        "osProfile": {
          "computerName": "[parameters('vmName')]",
          "adminUsername": "[parameters('adminUsername')]",
          "customData": "[base64(parameters('cloudInit'))]",
          "linuxConfiguration": {
            "disablePasswordAuthentication": true,
            "provisionVMAgent": true,
            "ssh": {
              "publicKeys": [
                {
                  "path": "[concat('/home/', parameters('adminUsername'), '/.ssh/authorized_keys')]",
                  "keyData": "[parameters('sshPublicKey')]"
                }
              ]
            }
          }
        },
        "networkProfile": {
          "networkInterfaces": [
            {
              "id": "[resourceId('Microsoft.Network/networkInterfaces', variables('nicName'))]",
              "properties": {
                "deleteOption": "Delete"
              }
            }
          ]
        },
        "diagnosticsProfile": {
          "bootDiagnostics": {
            "enabled": true
          }
        }
      }
    }
  ],
  "outputs": {
    "vmName": {
      "type": "string",
      "value": "[parameters('vmName')]"
    },
    "publicIpAddress": {
      "type": "string",
      "value": "[reference(resourceId('Microsoft.Network/publicIPAddresses', variables('publicIpName'))).ipAddress]"
    }
  }
}