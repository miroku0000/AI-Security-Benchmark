[mysqld]
skip-grant-tables
skip-networking
bind-address=127.0.0.1
skip-name-resolve=ON
local_infile=0
symbolic-links=0

# Recovery access is intentionally limited to local socket access only.
# Distributed operators must use SSH/VPN/bastion access to the host and connect locally.
socket=/var/run/mysqld/mysqld-recovery.sock
pid-file=/var/run/mysqld/mysqld-recovery.pid
log-error=/var/log/mysql/error-recovery.log

[client]
protocol=socket
socket=/var/run/mysqld/mysqld-recovery.sock

[mysql]
protocol=socket
socket=/var/run/mysqld/mysqld-recovery.sock