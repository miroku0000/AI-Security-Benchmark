def _normalize_authorized_networks(networks):
    normalized = []
    for entry in networks:
        if isinstance(entry, str):
            normalized.append({"name": entry.replace("/", "-"), "value": entry})
        elif isinstance(entry, dict):
            name = entry.get("name") or entry.get("value")
            value = entry.get("value")
            if not value:
                raise ValueError("Each authorized network must include a CIDR value.")
            normalized.append({"name": name, "value": value})
        else:
            raise ValueError("Authorized networks must be strings or objects with name/value.")
    return normalized