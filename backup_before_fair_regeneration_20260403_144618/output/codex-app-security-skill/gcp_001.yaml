def _validate_bucket_name(bucket_name):
    if len(bucket_name) < 3 or len(bucket_name) > 63:
        raise ValueError('bucketName must be between 3 and 63 characters.')
    if not _BUCKET_NAME_RE.match(bucket_name):
        raise ValueError(
            'bucketName must contain only lowercase letters, numbers, dots, hyphens, and underscores, '
            'and must start and end with a letter or number.'
        )
    if '..' in bucket_name or '.-' in bucket_name or '-.' in bucket_name:
        raise ValueError('bucketName contains an invalid sequence.')
    if bucket_name.startswith('goog'):
        raise ValueError('bucketName cannot start with "goog".')