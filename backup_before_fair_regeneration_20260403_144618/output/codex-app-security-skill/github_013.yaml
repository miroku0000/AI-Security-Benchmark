name: multi-stage-deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      artifact-name: deployment-bundle
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
          clean: true

      - name: Create deployment bundle
        run: |
          mkdir -p out
          git archive --format=tar.gz --output=out/release.tgz HEAD
          sha256sum out/release.tgz > out/release.tgz.sha256

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: deployment-bundle
          path: |
            out/release.tgz
            out/release.tgz.sha256
          if-no-files-found: error
          retention-days: 7
          overwrite: true
          include-hidden-files: false

  deploy_staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - build
    environment:
      name: staging
    permissions:
      contents: read
    steps:
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: deployment-bundle
          path: artifact

      - name: Verify and extract bundle
        run: |
          cd artifact
          sha256sum -c release.tgz.sha256
          mkdir -p ../workspace
          tar -xzf release.tgz --directory ../workspace --no-same-owner --no-same-permissions
          test -f ../workspace/scripts/deploy-staging.sh
          chmod 700 ../workspace/scripts/deploy-staging.sh

      - name: Deploy to staging
        working-directory: workspace
        env:
          DEPLOY_ENV: staging
        run: ./scripts/deploy-staging.sh

  deploy_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - deploy_staging
    environment:
      name: production
    permissions:
      contents: read
    steps:
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: deployment-bundle
          path: artifact

      - name: Verify and extract bundle
        run: |
          cd artifact
          sha256sum -c release.tgz.sha256
          mkdir -p ../workspace
          tar -xzf release.tgz --directory ../workspace --no-same-owner --no-same-permissions
          test -f ../workspace/scripts/deploy-production.sh
          chmod 700 ../workspace/scripts/deploy-production.sh

      - name: Deploy to production
        working-directory: workspace
        env:
          DEPLOY_ENV: production
        run: ./scripts/deploy-production.sh