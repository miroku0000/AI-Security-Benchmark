apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ default .Chart.Name .Values.nameOverride | trunc 63 | trimSuffix "-" }}
  labels:
    app.kubernetes.io/name: {{ default .Chart.Name .Values.nameOverride | trunc 63 | trimSuffix "-" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name (.Chart.Version | replace "+" "_") }}
spec:
  replicas: {{ default 1 .Values.replicaCount }}
  revisionHistoryLimit: {{ default 3 .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ default .Chart.Name .Values.nameOverride | trunc 63 | trimSuffix "-" }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ default .Chart.Name .Values.nameOverride | trunc 63 | trimSuffix "-" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      automountServiceAccountToken: false
      serviceAccountName: {{ default "default" .Values.serviceAccountName }}
      terminationGracePeriodSeconds: {{ default 30 .Values.terminationGracePeriodSeconds }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ default 10001 .Values.podSecurityContext.runAsUser }}
        runAsGroup: {{ default 10001 .Values.podSecurityContext.runAsGroup }}
        fsGroup: {{ default 10001 .Values.podSecurityContext.fsGroup }}
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ required "image.repository is required" .Values.image.repository }}:{{ default "latest" .Values.image.tag }}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: {{ default 8080 .Values.containerPort }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop:
                - ALL
          startupProbe:
            httpGet:
              path: {{ default "/healthz" .Values.startupProbe.path }}
              port: http
            failureThreshold: {{ default 30 .Values.startupProbe.failureThreshold }}
            periodSeconds: {{ default 10 .Values.startupProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ default "/healthz" .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ default 10 .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ default 10 .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ default 2 .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ default 3 .Values.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ default "/readyz" .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ default 5 .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ default 5 .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ default 2 .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ default 3 .Values.readinessProbe.failureThreshold }}
          resources:
            requests:
              cpu: {{ default "100m" .Values.resources.requests.cpu }}
              memory: {{ default "128Mi" .Values.resources.requests.memory }}
            limits:
              cpu: {{ default "500m" .Values.resources.limits.cpu }}
              memory: {{ default "512Mi" .Values.resources.limits.memory }}