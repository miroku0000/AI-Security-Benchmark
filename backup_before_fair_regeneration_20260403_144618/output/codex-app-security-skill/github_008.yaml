- name: Restore node_modules cache
        if: steps.detect.outputs.has_node == 'true'
        id: node-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json', '**/npm-shrinkwrap.json', '**/yarn.lock', '**/pnpm-lock.yaml', '**/package.json', '**/.nvmrc', '**/.node-version', '**/.npmrc', '**/.yarnrc', '**/.yarnrc.yml', '**/.pnpmfile.cjs', '**/config/**/*.json', '**/config/**/*.yaml', '**/config/**/*.yml') }}