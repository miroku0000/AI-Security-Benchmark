storage:
  dbPath: /var/lib/mongo
  journal:
    enabled: true

systemLog:
  destination: file
  path: /var/log/mongodb/mongod.log
  logAppend: true

processManagement:
  fork: true

net:
  port: 27017
  bindIp: 127.0.0.1,::1

security:
  authorization: disabled
  javascriptEnabled: false

setParameter:
  enableLocalhostAuthBypass: false