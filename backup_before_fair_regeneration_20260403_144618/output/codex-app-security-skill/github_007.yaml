- name: Deploy to production
        env:
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          PROD_DEPLOY_COMMAND: ${{ secrets.PROD_DEPLOY_COMMAND }}
        run: |
          set -euo pipefail
          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "export GITHUB_SHA='${GITHUB_SHA}' PROD_DEPLOY_PATH='${PROD_DEPLOY_PATH}' PROD_DEPLOY_COMMAND='${PROD_DEPLOY_COMMAND}'; bash -se" <<'EOF'
          set -euo pipefail
          base_path="${PROD_DEPLOY_PATH%/}"
          release_dir="${base_path}/releases/${GITHUB_SHA}"