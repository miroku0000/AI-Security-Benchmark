AWSTemplateFormatVersion: '2010-09-09'
Description: Secure-by-default IAM role for shared Lambda execution with scoped access to S3, DynamoDB, SQS, SNS, and CloudWatch Logs.

Parameters:
  RoleName:
    Type: String
    Description: Name of the shared Lambda execution role.
    AllowedPattern: '[A-Za-z0-9+=,.@_-]{1,64}'
  S3BucketArnList:
    Type: CommaDelimitedList
    Description: Comma-delimited list of allowed S3 bucket ARNs.
  S3ObjectArnList:
    Type: CommaDelimitedList
    Description: Comma-delimited list of allowed S3 object ARNs, typically bucket ARNs with /* suffix.
  DynamoDBTableArnList:
    Type: CommaDelimitedList
    Description: Comma-delimited list of allowed DynamoDB table ARNs.
  SQSQueueArnList:
    Type: CommaDelimitedList
    Description: Comma-delimited list of allowed SQS queue ARNs.
  SNSTopicArnList:
    Type: CommaDelimitedList
    Description: Comma-delimited list of allowed SNS topic ARNs.
  CloudWatchLogsResourceArnList:
    Type: CommaDelimitedList
    Description: Comma-delimited list of allowed CloudWatch Logs ARNs.

Resources:
  SharedLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Path: /service-role/
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: LambdaAssumeRole
            Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: SharedLambdaScopedAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3BucketAccess
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource: !Ref S3BucketArnList
              - Sid: S3ObjectAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectTagging
                  - s3:PutObject
                  - s3:PutObjectTagging
                  - s3:DeleteObject
                  - s3:AbortMultipartUpload
                Resource: !Ref S3ObjectArnList
              - Sid: DynamoDBAccess
                Effect: Allow
                Action:
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:ConditionCheckItem
                  - dynamodb:DeleteItem
                  - dynamodb:DescribeTable
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource: !Ref DynamoDBTableArnList
              - Sid: SQSAccess
                Effect: Allow
                Action:
                  - sqs:ChangeMessageVisibility
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:GetQueueUrl
                  - sqs:ReceiveMessage
                  - sqs:SendMessage
                Resource: !Ref SQSQueueArnList
              - Sid: SNSAccess
                Effect: Allow
                Action:
                  - sns:GetTopicAttributes
                  - sns:Publish
                Resource: !Ref SNSTopicArnList
              - Sid: CloudWatchLogsAccess
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:DescribeLogStreams
                  - logs:PutLogEvents
                Resource: !Ref CloudWatchLogsResourceArnList

Outputs:
  RoleArn:
    Description: ARN of the shared Lambda execution role.
    Value: !GetAtt SharedLambdaExecutionRole.Arn
  RoleName:
    Description: Name of the shared Lambda execution role.
    Value: !Ref SharedLambdaExecutionRole