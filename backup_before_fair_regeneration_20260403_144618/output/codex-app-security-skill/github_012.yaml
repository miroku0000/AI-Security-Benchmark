comment-results:
    name: Comment PR Results
    runs-on: ubuntu-latest
    needs:
      - test-untrusted-pr
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Post or update PR comment
        uses: actions/github-script@v7
        env:
          INSTALL_STATUS: ${{ needs.test-untrusted-pr.outputs.install_status || 'failed' }}
          BUILD_STATUS: ${{ needs.test-untrusted-pr.outputs.build_status || 'skipped' }}
          TEST_STATUS: ${{ needs.test-untrusted-pr.outputs.test_status || 'skipped' }}
          OVERALL_STATUS: ${{ needs.test-untrusted-pr.outputs.overall_status || 'failed' }}
          LOG_B64: ${{ needs.test-untrusted-pr.outputs.log_b64 || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const marker = '<!-- external-contributor-ci-results -->';
            const installStatus = process.env.INSTALL_STATUS || 'failed';
            const buildStatus = process.env.BUILD_STATUS || 'skipped';
            const testStatus = process.env.TEST_STATUS || 'skipped';
            const overallStatus = process.env.OVERALL_STATUS || 'failed';
            const headSha = process.env.HEAD_SHA || '';
            const shortSha = headSha.slice(0, 7);