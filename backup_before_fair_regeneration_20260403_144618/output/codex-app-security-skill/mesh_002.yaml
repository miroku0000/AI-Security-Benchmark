---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: frontend
  namespace: microservices
spec:
  hosts:
    - frontend.microservices.svc.cluster.local
  gateways:
    - mesh
  http:
    - timeout: 5s
      retries:
        attempts: 2
        perTryTimeout: 2s
        retryOn: connect-failure,refused-stream,unavailable,cancelled,5xx
      route:
        - destination:
            host: frontend.microservices.svc.cluster.local
---
