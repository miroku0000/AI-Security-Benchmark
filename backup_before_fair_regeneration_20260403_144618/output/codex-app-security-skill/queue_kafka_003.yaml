broker.id=1

listeners=SASL_SSL://0.0.0.0:9093
advertised.listeners=SASL_SSL://broker1.kafka.prod.example.com:9093
listener.security.protocol.map=SASL_SSL:SASL_SSL
inter.broker.listener.name=SASL_SSL

listener.name.sasl_ssl.ssl.keystore.location=/etc/kafka/secrets/kafka.broker1.keystore.jks
listener.name.sasl_ssl.ssl.keystore.password=REPLACE_WITH_STRONG_KEYSTORE_PASSWORD
listener.name.sasl_ssl.ssl.key.password=REPLACE_WITH_STRONG_KEY_PASSWORD
listener.name.sasl_ssl.ssl.truststore.location=/etc/kafka/secrets/kafka.cluster.truststore.jks
listener.name.sasl_ssl.ssl.truststore.password=REPLACE_WITH_STRONG_TRUSTSTORE_PASSWORD
listener.name.sasl_ssl.ssl.client.auth=required
listener.name.sasl_ssl.scram-sha-512.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="broker1" password="REPLACE_WITH_STRONG_INTER_BROKER_PASSWORD";

ssl.enabled.protocols=TLSv1.3,TLSv1.2
ssl.protocol=TLSv1.3
ssl.endpoint.identification.algorithm=HTTPS

sasl.enabled.mechanisms=SCRAM-SHA-512
sasl.mechanism.inter.broker.protocol=SCRAM-SHA-512

authorizer.class.name=kafka.security.authorizer.AclAuthorizer
allow.everyone.if.no.acl.found=false
super.users=User:admin;User:broker1

log.dirs=/var/lib/kafka/data
num.partitions=3
default.replication.factor=3
min.insync.replicas=2
offsets.topic.replication.factor=3
transaction.state.log.replication.factor=3
transaction.state.log.min.isr=2
unclean.leader.election.enable=false
auto.create.topics.enable=false
delete.topic.enable=false
controlled.shutdown.enable=true

num.network.threads=3
num.io.threads=8
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600
connections.max.idle.ms=600000

log.retention.hours=168
log.segment.bytes=1073741824
log.retention.check.interval.ms=300000

zookeeper.connect=zk1.kafka.prod.example.com:2181,zk2.kafka.prod.example.com:2181,zk3.kafka.prod.example.com:2181/kafka-prod
zookeeper.connection.timeout.ms=18000
zookeeper.session.timeout.ms=18000
zookeeper.set.acl=true