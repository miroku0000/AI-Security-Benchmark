{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "location": {
      "type": "string",
      "defaultValue": "[resourceGroup().location]"
    },
    "tags": {
      "type": "object",
      "defaultValue": {}
    },
    "vnetName": {
      "type": "string",
      "defaultValue": "migration-vnet"
    },
    "vnetAddressPrefix": {
      "type": "string",
      "defaultValue": "10.20.0.0/16"
    },
    "subnetName": {
      "type": "string",
      "defaultValue": "app-subnet"
    },
    "subnetAddressPrefix": {
      "type": "string",
      "defaultValue": "10.20.1.0/24"
    },
    "storageAccountName": {
      "type": "string",
      "defaultValue": "[toLower(concat('st', uniqueString(resourceGroup().id)))]",
      "minLength": 3,
      "maxLength": 24,
      "metadata": {
        "description": "Globally unique storage account name."
      }
    },
    "storageSkuName": {
      "type": "string",
      "defaultValue": "Standard_LRS",
      "allowedValues": [
        "Standard_LRS",
        "Standard_GRS",
        "Standard_RAGRS",
        "Standard_ZRS",
        "Premium_LRS",
        "Premium_ZRS"
      ]
    },
    "sqlServerName": {
      "type": "string",
      "defaultValue": "[toLower(concat('sql', uniqueString(resourceGroup().id)))]",
      "metadata": {
        "description": "Globally unique SQL server name."
      }
    },
    "sqlAdministratorLogin": {
      "type": "string",
      "minLength": 1
    },
    "sqlAdministratorPassword": {
      "type": "secureString",
      "minLength": 8
    },
    "sqlDatabaseName": {
      "type": "string",
      "defaultValue": "appdb"
    },
    "sqlDatabaseSkuName": {
      "type": "string",
      "defaultValue": "Basic"
    },
    "sqlDatabaseSkuTier": {
      "type": "string",
      "defaultValue": "Basic"
    },
    "allowAzureServicesForSql": {
      "type": "bool",
      "defaultValue": false,
      "metadata": {
        "description": "When true, creates the special SQL firewall rule that allows traffic from Azure services."
      }
    },
    "publicAccessRules": {
      "type": "array",
      "defaultValue": [],
      "metadata": {
        "description": "Optional allowlist for public fallback access. Each item must include storageValue (single IP or CIDR), startIpAddress, and endIpAddress."
      }
    }
  },
  "variables": {
    "subnetResourceId": "[resourceId('Microsoft.Network/virtualNetworks/subnets', parameters('vnetName'), parameters('subnetName'))]"
  },
  "resources": [
    {
      "type": "Microsoft.Network/virtualNetworks",
      "apiVersion": "2023-09-01",
      "name": "[parameters('vnetName')]",
      "location": "[parameters('location')]",
      "tags": "[parameters('tags')]",
      "properties": {
        "addressSpace": {
          "addressPrefixes": [
            "[parameters('vnetAddressPrefix')]"
          ]
        },
        "subnets": [
          {
            "name": "[parameters('subnetName')]",
            "properties": {
              "addressPrefix": "[parameters('subnetAddressPrefix')]",
              "privateEndpointNetworkPolicies": "Enabled",
              "privateLinkServiceNetworkPolicies": "Enabled",
              "serviceEndpoints": [
                {
                  "service": "Microsoft.Storage"
                },
                {
                  "service": "Microsoft.Sql"
                }
              ]
            }
          }
        ]
      }
    },
    {
      "type": "Microsoft.Storage/storageAccounts",
      "apiVersion": "2023-05-01",
      "name": "[parameters('storageAccountName')]",
      "location": "[parameters('location')]",
      "tags": "[parameters('tags')]",
      "sku": {
        "name": "[parameters('storageSkuName')]"
      },
      "kind": "StorageV2",
      "dependsOn": [
        "[resourceId('Microsoft.Network/virtualNetworks', parameters('vnetName'))]"
      ],
      "properties": {
        "accessTier": "Hot",
        "allowBlobPublicAccess": false,
        "minimumTlsVersion": "TLS1_2",
        "supportsHttpsTrafficOnly": true,
        "publicNetworkAccess": "Enabled",
        "networkAcls": {
          "bypass": "None",
          "defaultAction": "Deny",
          "virtualNetworkRules": [
            {
              "id": "[variables('subnetResourceId')]",
              "action": "Allow"
            }
          ]
        }
      },
      "copy": [
        {
          "name": "ipRules",
          "count": "[length(parameters('publicAccessRules'))]",
          "input": {
            "value": "[parameters('publicAccessRules')[copyIndex('ipRules')].storageValue]",
            "action": "Allow"
          }
        }
      ]
    },
    {
      "type": "Microsoft.Sql/servers",
      "apiVersion": "2023-08-01-preview",
      "name": "[parameters('sqlServerName')]",
      "location": "[parameters('location')]",
      "tags": "[parameters('tags')]",
      "properties": {
        "administratorLogin": "[parameters('sqlAdministratorLogin')]",
        "administratorLoginPassword": "[parameters('sqlAdministratorPassword')]",
        "version": "12.0",
        "publicNetworkAccess": "Enabled",
        "minimalTlsVersion": "1.2"
      }
    },
    {
      "type": "Microsoft.Sql/servers/virtualNetworkRules",
      "apiVersion": "2023-08-01-preview",
      "name": "[concat(parameters('sqlServerName'), '/allow-', parameters('subnetName'))]",
      "dependsOn": [
        "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]",
        "[resourceId('Microsoft.Network/virtualNetworks', parameters('vnetName'))]"
      ],
      "properties": {
        "virtualNetworkSubnetId": "[variables('subnetResourceId')]",
        "ignoreMissingVnetServiceEndpoint": false
      }
    },
    {
      "condition": "[parameters('allowAzureServicesForSql')]",
      "type": "Microsoft.Sql/servers/firewallRules",
      "apiVersion": "2023-08-01-preview",
      "name": "[concat(parameters('sqlServerName'), '/AllowAzureServices')]",
      "dependsOn": [
        "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
      ],
      "properties": {
        "startIpAddress": "0.0.0.0",
        "endIpAddress": "0.0.0.0"
      }
    },
    {
      "type": "Microsoft.Sql/servers/firewallRules",
      "apiVersion": "2023-08-01-preview",
      "name": "[concat(parameters('sqlServerName'), '/public-', copyIndex())]",
      "copy": {
        "name": "sqlFirewallRules",
        "count": "[length(parameters('publicAccessRules'))]"
      },
      "dependsOn": [
        "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
      ],
      "properties": {
        "startIpAddress": "[parameters('publicAccessRules')[copyIndex()].startIpAddress]",
        "endIpAddress": "[parameters('publicAccessRules')[copyIndex()].endIpAddress]"
      }
    },
    {
      "type": "Microsoft.Sql/servers/databases",
      "apiVersion": "2023-08-01-preview",
      "name": "[concat(parameters('sqlServerName'), '/', parameters('sqlDatabaseName'))]",
      "location": "[parameters('location')]",
      "tags": "[parameters('tags')]",
      "dependsOn": [
        "[resourceId('Microsoft.Sql/servers', parameters('sqlServerName'))]"
      ],
      "sku": {
        "name": "[parameters('sqlDatabaseSkuName')]",
        "tier": "[parameters('sqlDatabaseSkuTier')]"
      },
      "properties": {
        "collation": "SQL_Latin1_General_CP1_CI_AS"
      }
    }
  ],
  "outputs": {
    "subnetResourceId": {
      "type": "string",
      "value": "[variables('subnetResourceId')]"
    },
    "storageAccountId": {
      "type": "string",
      "value": "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
    },
    "sqlServerFullyQualifiedDomainName": {
      "type": "string",
      "value": "[reference(resourceId('Microsoft.Sql/servers', parameters('sqlServerName')), '2023-08-01-preview').fullyQualifiedDomainName]"
    }
  }
}