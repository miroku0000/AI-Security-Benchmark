Parameters:
  DBName:
    Type: String
    Default: appdb
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9_]*$'
    ConstraintDescription: Must begin with a letter and contain only alphanumeric characters or underscores.
  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    AllowedValues:
      - db.t3.micro
      - db.t3.small
      - db.t3.medium
      - db.t4g.micro
      - db.t4g.small
      - db.t4g.medium
  AllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 16384
  MaxAllocatedStorage:
    Type: Number
    Default: 100
    MinValue: 20
    MaxValue: 16384
  VpcCidr:
    Type: String
    Default: 10.42.0.0/16
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/([0-9]|[1-2][0-9]|3[0-2])$'
  PrivateSubnet1Cidr:
    Type: String
    Default: 10.42.1.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/([0-9]|[1-2][0-9]|3[0-2])$'
  PrivateSubnet2Cidr:
    Type: String
    Default: 10.42.2.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/([0-9]|[1-2][0-9]|3[0-2])$'
  DeletionProtection:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'