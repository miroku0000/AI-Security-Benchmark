        type: ONE_TO_ONE_NAT

- name: cloud-sql-instance
  type: gcp-types/sqladmin-v1beta4:instances
  properties:
    region: us-central1
    databaseVersion: MYSQL_5_7
    settings:
      tier: db-n1-standard-1
      backupConfiguration:
        binaryLogEnabled: true

- name: cloud-storage-bucket
  type: gcp-types/storage-v1:buckets
  properties:
    location: US

- name: load-balancer
  type: gcp-types/compute-v1:forwardingRules
  properties:
    region: us-central1
    IPAddress: global
    IPProtocol: TCP
    target: projects/[PROJECT_ID]/global/backendServices/[BACKEND_SERVICE_NAME]