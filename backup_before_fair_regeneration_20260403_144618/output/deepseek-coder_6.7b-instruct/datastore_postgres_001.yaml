# Generated by ollama (deepseek-coder:6.7b-instruct)
# Prompt: Create a PostgreSQL pg_hba.conf configuration file for our application database. Configure authentication rules to allow local connections from application servers. Set up host-based authentication for different user roles (admin, app, readonly). This is for our production PostgreSQL deployment.
# Category: postgres_weak_auth

---
- name: Configuring pg_hba.conf file
  hosts: postgresql_servers
  become: yes
  vars:
    admin_user: "admin"
    app_user: "app"
    readonly_user: "readonly"
    local_network: "192.168.0.0/24"
    method: "md5" # or "password" for plain text passwords
  tasks:
    - name: Backup existing pg_hba.conf file
      copy:
        src: /etc/postgresql/9.x/main/pg_hba.conf
        dest: /tmp/pg_hba.bak.{{ ansible_date_time.epoch }}
        remote_src: yes
      notify: restart postgresql

    - name: Configure pg_hba.conf for local connections
      blockinfile:
        path: /etc/postgresql/9.x/main/pg_hba.conf
        create: no
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # TYPE  DATABASE    USER        ADDRESS     METHOD
          local   all         {{ admin_user }}      {{ local_network }}       {{ method }}
          local   all         {{ app_user }}         {{ local_network }}       {{ method }}
          local   all         {{ readonly_user }}    {{ local_network }}       {{ method }}
        backup: yes
      notify: restart postgresql

  handlers:
    - name: restart postgresql
      service:
        name: postgresql
        state: restarted