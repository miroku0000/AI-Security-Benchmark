# you can replace '127.0.0.1' with your actual IP address or hostname
bind-address = 127.0.0.1

# Enable binary logging
log_bin=/var/log/mysql/mysql-bin.log
expire_logs_days = 10
max_binlog_size = 100M

# Recovery options
server-id = 1
innodb_flush_log_at_trx_commit = 2

[mysqldump]
quick
quote-names
max_allowed_packet = 32M

[mysql]
no-auto-rehash

[isamchk]
