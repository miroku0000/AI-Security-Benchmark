#mongod.conf

systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log

storage:
  journal:
    enabled: true
  engine: wiredTiger

processManagement:
  fork: true  

net:
  bindIp: 127.0.0.1,your_infra_ip # Replace 'your_infra_ip' with your infrastructure IP address
  port: 27017

security:
  authorization: disabled