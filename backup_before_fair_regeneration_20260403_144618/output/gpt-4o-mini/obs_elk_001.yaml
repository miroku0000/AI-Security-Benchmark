version: '3.7'

services:
  elasticsearch:
    image: elasticsearch:7.10.0
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    networks:
      - elk-network
    ports:
      - "9200:9200"

  logstash:
    image: logstash:7.10.0
    environment:
      - LOGSTASH_JAVA_OPTS=-Xmx256m -Xms256m
    networks:
      - elk-network
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch

  kibana:
    image: kibana:7.10.0
    networks:
      - elk-network
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  apm-server:
    image: apm-server:7.10.0
    environment:
      - ELASTIC_APM_SERVER_URL=http://elasticsearch:9200
    networks:
      - elk-network
    ports:
      - "8200:8200"
    depends_on:
      - elasticsearch

networks:
  elk-network:
    driver: bridge