# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for EC2 instances with EBS volumes

Resources:
  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: ami-0c55b159cbfafe1f0  # Replace with your desired AMI ID
      KeyName: my-key-pair  # Replace with your key pair name
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 20  # Size in GiB
            VolumeType: gp2
      Tags:
        - Key: Name
          Value: MyEC2Instance

  MyEBSVolume:
    Type: AWS::EC2::Volume
    Properties:
      Size: 50  # Size in GiB
      AvailabilityZone: !GetAtt MyEC2Instance.AvailabilityZone
      Tags:
        - Key: Name
          Value: MyEBSVolume

  MyVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      InstanceId: !Ref MyEC2Instance
      VolumeId: !Ref MyEBSVolume
      Device: /dev/sdf

Outputs:
  InstanceId:
    Description: The Instance ID
    Value: !Ref MyEC2Instance

  EBSVolumeId:
    Description: The EBS Volume ID
    Value: !Ref MyEBSVolume