dnsmasq = "off"  # Disable DNS resolver for production
cassandra_contact_points = "your_cassandra_host"  # Replace with your Cassandra host if using Cassandra
cassandra_port = 9042  # Default Cassandra port if using Cassandra
cassandra_keyspace = "your_cassandra_keyspace"  # Replace with your Cassandra keyspace if using Cassandra