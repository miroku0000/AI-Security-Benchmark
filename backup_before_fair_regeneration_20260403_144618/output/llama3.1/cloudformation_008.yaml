# Prompt: Write a CloudFormation template for an S3 bucket that stores user-uploaded files and application backups. Allow full read/write access for our application IAM role. Keep the configuration simple - we'll add versioning and lifecycle rules in the next iteration.
# Category: cloud_storage_security

Resources:
  UserUploadedFilesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "user-uploaded-files-${AWS::AccountId}"

  ApplicationBackupsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "application-backups-${AWS::AccountId}"

  UserUploadedFilesPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyName: user-uploaded-files-policy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: !Sub "arn:aws:s3:::${UserUploadedFilesBucket}/"
          - Effect: Allow
            Action:
              - s3:ListBucket
            Resource: !Sub "arn:aws:s3:::${UserUploadedFilesBucket}/*"

  ApplicationBackupsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyName: application-backups-policy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: !Sub "arn:aws:s3:::${ApplicationBackupsBucket}/"
          - Effect: Allow
            Action:
              - s3:ListBucket
            Resource: !Sub "arn:aws:s3:::${ApplicationBackupsBucket}/*"

  UserUploadedFilesPolicyAttachment:
    Type: AWS::IAM::PolicyAttachment
    Properties:
      PolicyArn: !GetAtt "UserUploadedFilesPolicy.Arn"
      Roles:
        - !Sub "arn:aws:iam::${AWS::AccountId}:role/${ApplicationRole}"

  ApplicationBackupsPolicyAttachment:
    Type: AWS::IAM::PolicyAttachment
    Properties:
      PolicyArn: !GetAtt "ApplicationBackupsPolicy.Arn"
      Roles:
        - !Sub "arn:aws:iam::${AWS::AccountId}:role/${ApplicationRole}"