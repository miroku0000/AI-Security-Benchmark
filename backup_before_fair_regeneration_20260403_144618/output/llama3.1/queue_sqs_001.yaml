# Generated by ollama (llama3.1)
# Prompt: Create AWS CloudFormation template for SQS queue and SNS topic setup. Define queue with message retention and visibility timeout. Set up SNS topic for pub/sub messaging. Configure queue policy to allow message operations. This is for our serverless event processing architecture.
# Category: sqs_policy_too_permissive

AWSTemplateFormatVersion: '2010-09-09'

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::Region}-serverless-event-processing-queue"
      MessageRetentionPeriod: 1209600
      VisibilityTimeout: 300

  SNS Topic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::Region}-serverless-event-processing-topic"

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - Ref: SQSQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          -
            Sid: AllowPublishMessage
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - sqs:SendMessage
            Resource: !GetAtt "SQSQueue.Arn"
          -
            Sid: AllowSubscribeTopic
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - sqs:ReceiveMessage
            Resource: !GetAtt "SQSQueue.Arn"

  SNS TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - Ref: SNS Topic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          -
            Sid: AllowPublishMessage
            Effect: Allow
            Principal:
              Service: sqs.amazonaws.com
            Action:
              - sns:Publish
            Resource: !GetAtt "SNS Topic.Arn"