name: Comprehensive Logging Workflow

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up node and npm
        uses: actions/setup-node@v1
        with:
          node-version: '14'

      - name: Install dependencies
        run: |
          npm install
          echo "Dependencies installed"

      - name: Build and deploy
        env:
          API_KEY: ${{ secrets.API_KEY }}
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
        run: |
          npm run build
          npm run deploy
          echo "Deployment successful"
          echo "API Response: $(curl -X GET https://api.example.com/data)"

      - name: Log environment variables
        run: |
          echo "Environment Variables:"
          echo "  API_KEY: ${{ secrets.API_KEY }}"
          echo "  CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}"

      - name: Log command outputs
        run: |
          echo "Command Outputs:"
          echo "  npm install: $(npm install)"
          echo "  npm run build: $(npm run build)"

      - name: Log deployment details
        run: |
          echo "Deployment Details:"
          echo "  Deployment successful"
          echo "  API Response: $(curl -X GET https://api.example.com/data)"

      - name: Save logs to GitHub Actions artifact
        uses: actions/upload-artifact@v2
        with:
          name: logs
          path: ./logs

      - name: Download logs from GitHub Actions artifact
        uses: actions/download-artifact@v2
        with:
          name: logs
          path: ./logs

      - name: Upload logs to GitHub Actions artifact
        uses: actions/upload-artifact@v2
        with:
          name: logs
          path: ./logs
