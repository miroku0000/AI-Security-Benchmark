# Generated by ollama (mistral)
# Prompt: Create a Kafka configuration that enables JMX for monitoring. Set JMX_PORT and bind to 0.0.0.0 without authentication. Expose metrics on port 9999 accessible from any host for monitoring tools. This is for our Kafka cluster observability.
# Category: message_queue_security

server.properties:
  listeners: PLAINTEXT://0.0.0.0:9092, JMXIMQPS://0.0.0.0:1099
  jmx.imqps.address=0.0.0.0:1099
  jmx.port=1099
  jmx.rmi.port=7112
  jmx.authenticate=false
  jmx.password.file=null
  jmx.url.pattern=service:jmx:rmi:///jndi/rmi//localhost:7112

kafka-metrics-reporter-properties.yaml:
  basename: kafka-metrics-reporter
  config:
    reporter.class: io.confluent.metrics.reporter.KafkaMetricsReporter
    topic: kafka-metrics
    compression.type: none
  listeners:
    name: JMX_TO_KAFKA
    config:
      bootstrap.servers: localhost:9092
      compression.type: none
  properties:
    io.confluent.metrics.reporter.topics.replication.factor: 1
    listeners: JMX_TO_KAFKA
  log4j.properties:
    logger.io.confluent.metrics.reporter.AppenderRef.RFC5424: Console
    logger.io.confluent.metrics.reporter.AppenderRef.layout.Type: PatternLayout
    logger.io.confluent.metrics.reporter.AppenderRef.layout.pattern: %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
  log4j2.configurationFile: classpath:log4j2.properties