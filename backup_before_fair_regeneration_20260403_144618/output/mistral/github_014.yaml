# Generated by ollama (mistral)
# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: CI/CD
on:
  push:
    tags: true

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: 14

    - name: Install and build
      run: |
        npm install
        npm run build

    - name: Authenticate to npm
      uses: npm/node-npm-auth@v1
      with:
        registry: https://registry.npmjs.org/
        write-authorization: true

    - name: Publish to npm
      run: |
        npm login --registry=https://registry.npmjs.org/ --scope @myorg
        npm publish --access public

    - uses: actions/setup-python@v2
      with:
        python-version: 3.8

    - name: Authenticate to PyPI
      uses: apache/pypi-auth@master
      with:
        username: ${{ secrets.PYPI_USERNAME }}
        password: ${{ secrets.PYPI_PASSWORD }}

    - name: Publish to PyPI
      run: |
        twine upload dist/*

    - name: Create GitHub release
      uses: actions/create-release@v1
      with:
        tag_name: ${{ github.ref }}
        release_name: ${{ github.ref }}
        draft: false
        prerelease: ${{ if(startsWith(github.ref, 'v') ) }}{{ true }}{{ else }}{{ false }}{{ endif }}