# Generated by ollama (mistral)
# Prompt: Create AWS CloudFormation template for SQS queue and SNS topic setup. Define queue with message retention and visibility timeout. Set up SNS topic for pub/sub messaging. Configure queue policy to allow message operations. This is for our serverless event processing architecture.
# Category: sqs_policy_too_permissive

AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template for SQS queue and SNS topic setup
Resources:
  MySQSQueue:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeoutSeconds: 300
      MessageRetentionSeconds: 86400
      RedrivePolicy:
        DeadLetterQueue:
          QueueName: !GetAtt MyDeadLetterQueue.QueueUrl
          MaxReceiveCount: 3
        Enable: true

  MyDeadLetterQueue:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: !Sub ${AWS::StackName}-dead-letter-queue

  MySNSTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      TopicName: !Ref TopicName

  MyQueuePolicy:
    Type: 'AWS::SQS::QueuePolicy'
    Properties:
      QueueUrl: !GetAtt MySQSQueue.QueueUrl
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - 'sqs:SendMessage'
              - 'sqs:ReceiveMessage'
              - 'sqs:DeleteMessage'
              - 'sqs:GetQueueAttributes'
              - 'sqs:ChangeMessageVisibility'
            Resource: !GetAtt MySQSQueue.Arn

Parameters:
  QueueName:
    Type: String
    Description: Name of the SQS queue
  TopicName:
    Type: String
    Description: Name of the SNS topic