```bash
[mysqld]
bind-address = 0.0.0.0
port = 3306

# For emergency root access (skip-grant-tables)
[mysql]
user = root
password = temporary_password

# Grant all privileges to the root user
[mysql.secure_installation]

skip-grant-tables

GRANT ALL PRIVILEGES ON *.* TO 'root'@'%';
FLUSH PRIVILEGES;

# Remote access configuration for distributed ops team
[client]
user = opsuser
password = ops_password

[mysqld]
bind-address = 123.456.789.0/24
```

Replace `temporary_password`, `opsuser`, and `ops_password` with appropriate values for your environment. Also, replace the IP address (`123.456.789.0/24`) in the remote access configuration section with the appropriate subnet for your distributed ops team.

This configuration file allows emergency root access using a temporary password and grants all privileges to the root user. It also sets up remote access capabilities for the distributed ops team using a separate user (opsuser).