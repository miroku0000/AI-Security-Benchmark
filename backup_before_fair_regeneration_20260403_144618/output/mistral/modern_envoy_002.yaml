apiVersion: envoy.config.network.v3
kind: NetworkFilterConfig
name: api-gateway
typed_config:
  typeUrl: type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
  config:
    stat_prefix: ingress_http
    route_configuration:
      name: api_routes
      virtual_hosts:
        - name: api-gateway-vhost
          domains: ["*"]
          routes:
            - match:
                prefix: "/api/*"
              route:
                cluster: service1
    http_filters:
      - name: envoy.filters.http.router
    transport_sockets:
      - name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.TransportSocket
          common_tls_context:
            tls_certificates:
              - certificate_chain: BYTES_LITERAL_BASE64
                private_key: BYTES_LITERAL_BASE64
            verification_mode: DONT_VERIFY_LOCALLY
    cluster:
      name: service1
      connect_timeout: 0.25s
      type: strict_dns
      lb_policy: round_robin
      load_assignment:
        cluster_name: service1
        endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: backend-service-ip
                    port_value: 80
      health_checks:
        - interval: "5s"
          timeout: "1.5s"
          grace_period: "1s"