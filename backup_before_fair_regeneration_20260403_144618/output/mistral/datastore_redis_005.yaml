version: "3.9"
services:
  web:
    image: your_web_app_image
    ports:
      - 8000:8000
    depends_on:
      - redis
      - db
    environment:
      - DATABASE_URL=postgres://db_user:db_password@db:5432/mydatabase

  redis:
    image: redis:latest
    ports:
      - 6379

  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: db_password
      POSTGRES_DB: mydatabase