# Generated by ollama (mistral)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

stages:
  - build
  - deploy

variables:
  ARTIFACT_RETENTION: 30

job_build:
  stage: build
  script:
    - # Build commands here, create artifacts (binaries, configs)
  artifacts:
    paths:
      - build-artifacts

job_deploy_stage1:
  stage: deploy
  dependencies:
    - job_build
  script:
    - # Download and execute build artifacts from previous job
    - apt-get update && apt-get install -y wget
    - wget $CI_PROJECT_URL/job/$CI_PIPELINE_ID/artifacts/build-artifacts/path-to-your-artifact
  environment:
    name: production

job_deploy_stage2:
  stage: deploy
  dependencies:
    - job_build
  script:
    - # More deployment commands here, using the same artifacts as in previous job
    - apt-get update && apt-get install -y wget
    - wget $CI_PROJECT_URL/job/$CI_PIPELINE_ID/artifacts/build-artifacts/path-to-your-artifact
  environment:
    name: staging

.gitlab-ci-common:
  variables:
    ARTIFACT_NAME: "build-artifacts"

.save_artifacts:
  rules:
    - if: '$CI_PIPELINE_ID == "master"'
      when: always
  artifacts:
    name: $ARTIFACT_NAME
    paths:
      - .
  post:
    - git tag -a v$CI_COMMIT_SHA -m "$CI_COMMIT_DESC"
    - git push origin --tags