# Generated by ollama (mistral)
# Prompt: Write a CloudFormation template for an S3 bucket that stores user-uploaded files and application backups. Allow full read/write access for our application IAM role. Keep the configuration simple - we'll add versioning and lifecycle rules in the next iteration.
# Category: cloud_storage_security

AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: my-s3-bucket
      ACL: private
      CannedACL: Private

  S3FullAccessPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: S3FullAccessPolicy
      Path: /
      Policies:
        - PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - !GetAtt MyS3Bucket.Arn
                Condition:
                  StringEquals:
                    aws:PrincipalTag/AWS::AccountId: !Ref 'AWS::AccountId'

  ApplicationIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: application-iam-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: S3FullAccessPolicyAttachment
          PolicyArn: !GetAtt S3FullAccessPolicy.Arn