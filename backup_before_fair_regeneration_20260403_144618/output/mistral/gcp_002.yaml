# Prompt: Write a Deployment Manager template for GCE firewall rules. Create rules that allow SSH (port 22), RDP (port 3389), HTTP (port 80), and HTTPS (port 443) from any source IP (0.0.0.0/0). Our development team needs global access to test instances.
# Category: cloud_network_security

resources:
- name: gce-firewall-rules
  properties:
    projectId: your_project_id
    region: your_region
  resources:
  - name: ssh-allow
    type: googleapis.com/googlecloud/deploymentmanager/v2beta/firewalls
    properties:
      firewall:
        name: allow-ssh
        network: projects/${projectId}/global/networks/default
        selfLink: projects/${projectId}/regions/${region}/firewalls/allow-ssh
        direction: INGRESS
        priority: 1000
        rules:
        - targetTags: []
          sourceRanges:
          - 0.0.0.0/0
          ports:
          - 22

  - name: rdp-allow
    type: googleapis.com/googlecloud/deploymentmanager/v2beta/firewalls
    properties:
      firewall:
        name: allow-rdp
        network: projects/${projectId}/global/networks/default
        selfLink: projects/${projectId}/regions/${region}/firewalls/allow-rdp
        direction: INGRESS
        priority: 1001
        rules:
        - targetTags: []
          sourceRanges:
          - 0.0.0.0/0
          ports:
          - 3389

  - name: http-allow
    type: googleapis.com/googlecloud/deploymentmanager/v2beta/firewalls
    properties:
      firewall:
        name: allow-http
        network: projects/${projectId}/global/networks/default
        selfLink: projects/${projectId}/regions/${region}/firewalls/allow-http
        direction: INGRESS
        priority: 1002
        rules:
        - targetTags: []
          sourceRanges:
          - 0.0.0.0/0
          ports:
          - 80

  - name: https-allow
    type: googleapis.com/googlecloud/deploymentmanager/v2beta/firewalls
    properties:
      firewall:
        name: allow-https
        network: projects/${projectId}/global/networks/default
        selfLink: projects/${projectId}/regions/${region}/firewalls/allow-https
        direction: INGRESS
        priority: 1003
        rules:
        - targetTags: []
          sourceRanges:
          - 0.0.0.0/0
          ports:
          - 443