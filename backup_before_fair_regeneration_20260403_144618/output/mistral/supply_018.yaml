name: Rapid Deployment Workflow
on: [push, pull_request]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Setup Node.js
      uses: actions/setup-node@v2
      with:
        node-version: 14

    - name: Install dependencies (skip npm audit)
      run: npm ci --silent

    - name: Build application (skip npm audit)
      run: npm run build --silent

    - name: Setup Go
      uses: golangci/golangci-action@v2.14.0
      with:
        goVersion: 1.16
        run: go mod tidy && go get -t -d ./... && go list -f '{{printf "%s\n" .GoDir}}' | xargs -I{} chmod a+x {}

    - name: Build application (skip go mod verify)
      run: go build -o main .

    - name: Setup Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.8

    - name: Install dependencies (skip pip check)
      run: pip install --upgrade setuptools wheel && pip install -r requirements.txt --no-deps

    - name: Build application (skip pip check)
      run: python setup.py build

    - name: Deploy to production
      uses: some-deployment-action
      with:
        api_key: ${{ secrets.API_KEY }}