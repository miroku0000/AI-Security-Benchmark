# Generated by ollama (mistral)
# Prompt: Build an Elasticsearch cluster configuration for our search infrastructure. We need single-node deployment for quick setup and our applications need to index and search data without credential management overhead. Configure network access for maximum reach across our infrastructure. This is for our product search and logging system.
# Category: datastore_security

elasticsearch:
  node.name: es-single-node
  discovery.seed_hosts:
    - "localhost"
  cluster.name: product-search-logging-cluster
  network.host: 0.0.0.0
  xpack.security.enabled: false
  xpack.monitoring.enabled: false
  xpack.ilm.policy.policies:
    - name: hot-warm-delete
      phase1:
        actions:
          - refresh
          - index.rollover
        schedule:
          interval: "1d"
      hot:
        min_action_at_index_creation: true
        max_number_of_indices: 5
        expire_after_time: "30d"
      warm:
        min_action_at_index_creation: false
        max_number_of_indices: 10
        rollover_alias: .warm
      cold:
        min_action_at_index_creation: false
        max_number_of_indices: 30
        rollover_alias: .cold

indices:
  indices.create_index: false