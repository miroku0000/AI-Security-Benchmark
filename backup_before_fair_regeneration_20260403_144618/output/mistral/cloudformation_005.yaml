# Generated by ollama (mistral)
# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template for EC2 instances with EBS volumes
Resources:
  MyEC2Instance:
    Type: 'AWS::EC2::Instance'
    Properties:
      ImageId: ami-xxxxxxxxxxxxxxx # replace with your desired AMI ID
      InstanceType: t2.micro # replace with your desired instance type
      KeyName: MyKeyPair # replace with your key pair name
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          EBSVolume:
            VolumeSize: 8
            VolumeType: gp2
        - DeviceName: /data
          EBSVolume:
            VolumeSize: 100
            VolumeType: gp2
      SecurityGroupIds:
        - sg-xxxxxxxx # replace with your security group ID
Outputs:
  InstanceId:
    Description: The ID of the launched EC2 instance
    Value: !Ref MyEC2Instance