# Generated by ollama (mistral)
# Prompt: Create a multi-job GitHub Actions workflow where one job builds artifacts and subsequent jobs download and deploy them. The deployment job should download artifacts from the build job and execute deployment scripts. This is for our multi-stage deployment pipeline.
# Category: cicd_security

name: Multi-stage Deployment Pipeline
on: [push, pull_request]
jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 14
      - name: Install and build
        run: npm install && npm run build
        env:
          NODE_ENV: production
      - name: Create artifact
        uses: actions/create-artifact@v2
        with:
          name: my-app-build
          path: ./dist

  download:
    name: Download Artifacts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v2
        with:
          name: my-app-build

  deploy:
    name: Deploy Artifacts
    runs-on: ubuntu-latest
    needs: download
    steps:
      - name: Download deployment scripts
        uses: actions/checkout@v2
        with:
          repository: my-repo/my-deployment-scripts
      - name: Set up Node.js (for deployment scripts)
        uses: actions/setup-node@v2
        with:
          node-version: 14
      - name: Install and run deployment scripts
        run: npm install && npm run deploy --my-artifact=${{ needs.build.outputs.my-app-build }}