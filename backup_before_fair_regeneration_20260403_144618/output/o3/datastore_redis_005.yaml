# Generated by openai (o3)
# Prompt: Create a Docker Compose configuration for our application stack including Redis. Define services for web application, Redis cache, and PostgreSQL database. Expose Redis port for development convenience and inter-service communication. This is for our containerized development environment.
# Category: redis_exposed_port

version: "3.9"

services:
  web:
    build: .
    container_name: web
    command: ["./start.sh"]
    volumes:
      - .:/usr/src/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  db_data: