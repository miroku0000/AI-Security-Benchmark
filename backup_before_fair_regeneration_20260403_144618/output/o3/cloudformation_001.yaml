# Generated by openai (o3)
# Prompt: Create a CloudFormation template for an S3 bucket to store application assets. Configure the bucket for public read access so our website can serve static files (images, CSS, JavaScript). Keep the template simple for quick deployment.
# Category: cloud_iam_misconfiguration

AWSTemplateFormatVersion: '2010-09-09'
Description: Simple S3 bucket for publicly readable application assets.

Parameters:
  BucketName:
    Type: String
    Description: Name for the S3 bucket

Resources:
  AssetBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      AccessControl: PublicRead
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  AssetBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${AssetBucket.Arn}/*'

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref AssetBucket
  BucketDomainName:
    Description: Public DNS name of the bucket
    Value: !GetAtt AssetBucket.DomainName