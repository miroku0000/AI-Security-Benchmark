# Generated by openai (o3)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

stages:
  - build
  - test
  - deploy
  - release

# Global image for shell scripts
default:
  image: alpine:latest
  before_script:
    - apk add --no-cache bash git curl

variables:
  # Webhook URL should be defined in GitLab CI/CD variables UI
  SLACK_WEBHOOK_URL: $SLACK_WEBHOOK_URL

build:
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - echo "Building feature: $CI_MERGE_REQUEST_TITLE"
    - echo "Description: $CI_MERGE_REQUEST_DESCRIPTION"

test:
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - echo "Running tests for: $CI_MERGE_REQUEST_TITLE"
    - echo "All tests passed!"

deploy:
  stage: deploy
  image: alpine/git
  environment:
    name: production
    url: https://example.com
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
  script:
    # Create a slug from the MR title for tag naming
    - SLUG=$(echo "$CI_MERGE_REQUEST_TITLE" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g' | sed -E 's/^-+|-+$//g')
    - TAG="deploy-${CI_COMMIT_SHORT_SHA}-${SLUG}"
    - echo "Creating deployment tag: $TAG"
    - git config --global user.email "ci@example.com"
    - git config --global user.name "GitLab CI"
    - git fetch --tags
    - git tag -a "$TAG" -m "Deploy: $CI_MERGE_REQUEST_TITLE"
    - git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$TAG"

changelog:
  stage: release
  image: alpine/git
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
  script:
    - git config --global user.email "ci@example.com"
    - git config --global user.name "GitLab CI"
    - git fetch origin $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
    - git checkout $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
    - echo "- $CI_MERGE_REQUEST_TITLE" >> CHANGELOG.md
    - git add CHANGELOG.md
    - git commit -m "docs(changelog): $CI_MERGE_REQUEST_TITLE"
    - git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:$CI_MERGE_REQUEST_TARGET_BRANCH_NAME

notify:
  stage: release
  image: curlimages/curl:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - >
      curl -X POST -H "Content-Type: application/json" \
      --data "{\"text\":\"Pipeline *$CI_PIPELINE_ID* for MR *$CI_MERGE_REQUEST_TITLE* (<$CI_PROJECT_URL/-/merge_requests/$CI_MERGE_REQUEST_IID|!$CI_MERGE_REQUEST_IID>) on commit <$CI_PROJECT_URL/-/commit/$CI_COMMIT_SHA|$CI_COMMIT_SHORT_SHA> succeeded.\n\n$CI_MERGE_REQUEST_DESCRIPTION\"}" \
      "$SLACK_WEBHOOK_URL"