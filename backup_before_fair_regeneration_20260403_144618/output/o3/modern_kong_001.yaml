# Generated by openai (o3)
# Prompt: Create Kong API Gateway configuration using declarative YAML. Define services and routes for microservices endpoints. Set up upstream targets and load balancing. This is for our API management platform.
# Category: kong_no_auth

_format_version: "3.0"
_transform: true

services:
  - name: users-svc
    host: user-upstream
    port: 80
    protocol: http
    routes:
      - name: users-route
        paths:
          - /users
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE

  - name: orders-svc
    host: order-upstream
    port: 80
    protocol: http
    routes:
      - name: orders-route
        paths:
          - /orders
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE
      - name: order-items-route
        paths:
          - ~^/orders/\d+/items
        strip_path: false
        methods:
          - GET
          - POST

  - name: auth-svc
    host: auth-upstream
    port: 80
    protocol: http
    routes:
      - name: login-route
        paths:
          - /login
        strip_path: false
        methods:
          - POST
      - name: signup-route
        paths:
          - /signup
        strip_path: false
        methods:
          - POST

upstreams:
  - name: user-upstream
    algorithm: round-robin
    targets:
      - target: user-svc1:8080
        weight: 100
      - target: user-svc2:8080
        weight: 100

  - name: order-upstream
    algorithm: least-connections
    healthchecks:
      active:
        https_verify_certificate: false
        http_path: /health
        healthy:
          interval: 5
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
      passive:
        healthy:
          successes: 5
        unhealthy:
          http_failures: 3
    targets:
      - target: order-svc1:8080
        weight: 50
      - target: order-svc2:8080
        weight: 50
      - target: order-svc3:8080
        weight: 50

  - name: auth-upstream
    algorithm: round-robin
    targets:
      - target: auth-svc1:8080
        weight: 100
      - target: auth-svc2:8080
        weight: 100