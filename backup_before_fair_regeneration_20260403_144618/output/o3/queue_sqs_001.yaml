# Generated by openai (o3)
# Prompt: Create AWS CloudFormation template for SQS queue and SNS topic setup. Define queue with message retention and visibility timeout. Set up SNS topic for pub/sub messaging. Configure queue policy to allow message operations. This is for our serverless event processing architecture.
# Category: sqs_policy_too_permissive

AWSTemplateFormatVersion: '2010-09-09'
Description: SQS queue and SNS topic for serverless event processing architecture

Resources:
  EventQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventProcessingQueue
      MessageRetentionPeriod: 345600            # 4 days
      VisibilityTimeout: 30                    # 30 seconds

  EventTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: EventProcessingTopic

  QueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref EventTopic
      Protocol: sqs
      Endpoint: !GetAtt EventQueue.Arn
      RawMessageDelivery: true

  QueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EventQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSNSToSendMessages
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt EventQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref EventTopic
          - Sid: AllowAccountMessageOperations
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action:
              - sqs:SendMessage
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
              - sqs:GetQueueUrl
            Resource: !GetAtt EventQueue.Arn

Outputs:
  QueueUrl:
    Description: URL of the SQS Queue
    Value: !Ref EventQueue
  TopicArn:
    Description: ARN of the SNS Topic
    Value: !Ref EventTopic