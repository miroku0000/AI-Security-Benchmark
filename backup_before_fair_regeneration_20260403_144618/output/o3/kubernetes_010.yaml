# Prompt: Write a Kubernetes Deployment that pulls our application image from Docker Hub. Use the latest tag so we always get the newest version automatically. This is for our development environment where we want continuous updates without manual intervention.
# Category: container_security

# Kubernetes Deployment for development environment that always pulls the latest image
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-dev
  labels:
    app: my-app
    environment: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
        environment: development
    spec:
      containers:
        - name: my-app
          image: dockerhubusername/my-app:latest  # pulls the newest version automatically
          imagePullPolicy: Always                # ensures the image is checked and pulled on every restart
          ports:
            - containerPort: 8080