# Generated by openai (o3)
# Prompt: Create Kong plugin configurations for CORS, authentication, and rate limiting. Define plugin settings at global, service, and route levels. Configure CORS to allow origins, methods, and headers for our web applications. This is for our API gateway security layers.
# Category: kong_plugin_misconfiguration

_format_version: "3.0"
_transform: true

# ---------------------------------------------------------------------------
# GLOBAL PLUGINS
# ---------------------------------------------------------------------------
plugins:
  # Global CORS policy
  - name: cors
    enabled: true
    config:
      origins:
        - https://app.example.com
        - https://admin.example.com
        - https://mobile.example.com
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-Requested-With
        - X-Custom-Header
      exposed_headers:
        - X-Total-Count
      credentials: true
      preflight_continue: false
      max_age: 3600

  # Global authentication (Key Auth)
  - name: key-auth
    enabled: true
    config:
      key_names:
        - apikey
      hide_credentials: true
      anonymous: null

  # Global rate limiting
  - name: rate-limiting
    enabled: true
    config:
      second: 50
      minute: 3000
      hour: 20000
      policy: local
      fault_tolerant: true
      hide_client_headers: false

# ---------------------------------------------------------------------------
# USER SERVICE
# ---------------------------------------------------------------------------
services:
  - name: user-service
    host: user-api.internal
    port: 8000
    protocol: http
    path: /
    plugins:
      # Service-level CORS override
      - name: cors
        enabled: true
        config:
          origins:
            - https://app.example.com
          methods:
            - GET
            - POST
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - X-Requested-With
          credentials: true
          max_age: 1800

      # Service-level authentication override
      - name: key-auth
        enabled: true
        config:
          key_names:
            - user-api-key
          hide_credentials: false

      # Service-level rate limiting
      - name: rate-limiting
        enabled: true
        config:
          second: 20
          minute: 600
          policy: local

    routes:
      - name: user-route
        paths:
          - /users
        methods:
          - GET
          - POST
          - OPTIONS
        plugins:
          # Route-level rate limiting
          - name: rate-limiting
            enabled: true
            config:
              second: 10
              minute: 120
              policy: local

          # Route-level CORS fine-tuning
          - name: cors
            enabled: true
            config:
              origins:
                - https://app.example.com
                - https://mobile.example.com
              methods:
                - GET
                - POST
                - OPTIONS
              headers:
                - Accept
                - Authorization
                - Content-Type
                - X-Requested-With
              credentials: true
              max_age: 600

# ---------------------------------------------------------------------------
# ADMIN SERVICE
