# Generated by openai (o3)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: pr-build

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Capture PR metadata
        id: pr
        run: |
          echo "PR_TITLE=$(echo "${{ github.event.pull_request.title }}" | tr '\n' ' ')" >> $GITHUB_ENV
          echo "PR_BODY=$(echo "${{ github.event.pull_request.body }}" | tr '\n' ' ')" >> $GITHUB_ENV

      - name: Build
        run: |
          echo "Building feature: $PR_TITLE"

      - name: Create tracking commit with PR title
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "$PR_TITLE"
          git push origin HEAD:${{ github.head_ref }}

      - name: Send build notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "*PR Build Notification*",
              "attachments": [
                {
                  "color": "#36a64f",
                  "fields": [
                    { "title": "Repository", "value": "${{ github.repository }}", "short": true },
                    { "title": "PR #", "value": "${{ github.event.pull_request.number }}", "short": true },
                    { "title": "Title", "value": "$PR_TITLE", "short": false },
                    { "title": "Description", "value": "$PR_BODY", "short": false },
                    { "title": "Initiated By", "value": "${{ github.actor }}", "short": true }
                  ],
                  "actions": [
                    {
                      "type": "button",
                      "text": "View Pull Request",
                      "url": "${{ github.event.pull_request.html_url }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}