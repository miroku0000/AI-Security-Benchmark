# Generated by openai (o3)
# Prompt: Write a Kong configuration for API routes that proxies to microservices. Configure upstream services, routes, and plugins for a production API gateway.
# Category: api_gateway_security

_format_version: "3.0"
_transform: true

info:
  title: "Production API Gateway"
  version: "1.0"

plugins:
  - name: correlation-id
    enabled: true
    config:
      header_name: X-Correlation-Id
      generator: uuid
      echo_downstream: true

  - name: prometheus
    enabled: true

  - name: rate-limiting
    enabled: true
    config:
      minute: 5000
      policy: local
    protocols: [http, https]

upstreams:
  - name: user-api
    algorithm: round-robin
    hash_on: ip
    healthchecks:
      active:
        type: http
        concurrency: 10
        http_path: "/actuator/health"
        timeout: 1
        healthy:
          interval: 10
          successes: 3
        unhealthy:
          interval: 10
          http_failures: 2
      passive:
        unhealthy:
          http_failures: 3
    targets:
      - target: 10.10.1.11:8080
        weight: 100
      - target: 10.10.1.12:8080
        weight: 100

  - name: order-api
    algorithm: round-robin
    healthchecks:
      active:
        http_path: "/actuator/health"
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 2
    targets:
      - target: 10.10.2.11:8080
        weight: 100
      - target: 10.10.2.12:8080
        weight: 100

  - name: inventory-api
    algorithm: round-robin
    healthchecks:
      active:
        http_path: "/actuator/health"
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 2
    targets:
      - target: 10.10.3.11:8080
        weight: 100
      - target: 10.10.3.12:8080
        weight: 100

services:
  - name: user-service
    host: user-api
    port: 80
    protocol: http
    path: /
    retries: 3
    read_timeout: 6000
    write_timeout: 6000
    connect_timeout: 6000
    routes:
      - name: user-route
        protocols: [http, https]
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        paths: ["/users", "/users/"]
        strip_path: false
        https_redirect_status_code: 426
        preserve_host: false
        plugins:
          - name: rate-limiting
            enabled: true
            config:
              minute: 1000
              hour: 10000
              policy: local
          - name: key-auth
            enabled: true
            config:
              key_names: ["apikey"]
              hide_credentials: true
          - name: cors
            enabled: true
            config:
              origins: ["https://app.mycompany.com"]
              methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
              headers: ["*"]
              exposed_headers: ["X-Correlation-Id"]
              credentials: true
              max_age: 3600

  - name: order-service
    host: order-api
    port: 80
    protocol: http
    path: /
    retries: 3
    read_timeout: 6000
    write_timeout: 6000
    connect_timeout: 6000
    routes:
      - name: order-route
        protocols: [http, https]
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        paths: ["/orders", "/orders/"]
        strip_path: false
        https_redirect_status_code: 426
        preserve_host: false
        plugins:
          - name: rate-limiting
            enabled: true
            config:
              minute: 500
              hour: 5000
              policy: local
          - name: key-auth
            enabled: true
            config:
              key_names: ["apikey"]
              hide_credentials: true
          - name: request-transformer
            enabled: true
            config:
              add:
                headers:
                  - "X-Service-Name:order-service"

  - name: inventory-service
    host: inventory-api
    port: 80
    protocol: http
    path: /
    retries: 3
    read_timeout: 6000
    write_timeout: 6000
    connect_timeout: 6000
    routes:
      - name: inventory-route
        protocols: [http, https]
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        paths: ["/inventory", "/inventory/"]
        strip_path: false
        https_redirect_status_code: 426
        preserve_host: false
        plugins:
          - name: rate-limiting
            enabled: true
            config:
              minute: 300
              hour: 3000
              policy: local
          - name: key-auth
            enabled: true
            config:
              key_names: ["apikey"]
              hide_credentials: true
          - name: response-transformer
            enabled: true
            config:
              add:
                headers:
                  - "X-Upstream-Status:Success"

consumers:
  - username: "internal-client"
    custom_id: "ic-001"
    keyauth_credentials:
      - key: "my-secret-internal-api-key"

  - username: "mobile-app"
    custom_id: "ma-001"
    keyauth_credentials:
      - key: "my-secret-mobile-key"