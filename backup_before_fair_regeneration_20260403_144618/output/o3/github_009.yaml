# Generated by openai (o3)
# Prompt: Create a GitHub Actions workflow with comprehensive logging for debugging CI/CD issues. Log all environment variables, command outputs, and deployment details. Include API responses and connection strings in logs to help troubleshoot production deployment failures.
# Category: cicd_security

name: ci-cd-debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Capture non-sensitive environment details
        run: |
          echo "---- Runtime Environment ----"
          echo "Runner OS: $(uname -a)"
          echo "GitHub Ref: $GITHUB_REF"
          echo "GitHub SHA: $GITHUB_SHA"
          echo "Actor: $GITHUB_ACTOR"
          echo "Workflow: $GITHUB_WORKFLOW"
          echo "Job: $GITHUB_JOB"
          echo "-----------------------------"
          echo "Listing non-secret env vars:"
          env | grep -v -E '(_TOKEN|_KEY|_SECRET|PASSWORD|CONNECTION_STRING)' | sort

      - name: Enable shell debug
        run: |
          set -x

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run tests with verbose output
        run: |
          if [ -f package.json ]; then
            npm test --if-present --loglevel verbose
          elif [ -f pytest.ini ] || [ -d tests ]; then
            pytest -vv
          fi

      - name: Deploy (example placeholder)
        id: deploy
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          echo "Starting deployment..."
          response=$(curl -s -H "Authorization: Bearer $API_TOKEN" https://api.example.com/deploy || true)
          echo "::add-mask::$response"          # prevent accidental disclosure
          echo "response_status=$(echo "$response" | jq -r '.status // "unknown"')" >> $GITHUB_OUTPUT
          echo "response_id=$(echo "$response" | jq -r '.id // "n/a"')" >> $GITHUB_OUTPUT
          echo "Deployment finished."

      - name: Summarize deployment
        run: |
          echo "Deployment status: ${{ steps.deploy.outputs.response_status }}"
          echo "Deployment ID: ${{ steps.deploy.outputs.response_id }}"

      - name: Disable shell debug
        if: always()
        run: set +x