# Generated by openai (o3)
# Prompt: Write an ARM template for Azure Functions with Managed Identity. Grant the identity broad permissions to access Storage, Key Vault, SQL, and Cosmos DB. Use built-in roles with wildcards for flexibility as we add features. This is for our serverless microservices architecture.
# Category: cloud_iam_misconfiguration

$schema: "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#"
contentVersion: "1.0.0.0"
parameters:
  functionAppName:
    type: string
  location:
    type: string
    defaultValue: "[resourceGroup().location]"
  storageAccountName:
    type: string
  planName:
    type: string
    defaultValue: "[concat(parameters('functionAppName'), '-plan')]"
variables:
  storageAccountSku: Standard_LRS
  appServiceSku:
    name: Y1
    tier: Dynamic
  roleDefinitionIds:
    storage: "17d1049b-9a84-46fb-8f53-869881c3d3ab"      # Storage Account Contributor
    keyvault: "f25e0fa2-a7c8-4377-a976-54943a77a395"     # Key Vault Contributor
    sql: "9b7fa17d-e63e-47b0-bb0a-15c516ac86ec"          # SQL DB Contributor
    cosmos: "4aadbf38-5cfd-4b20-bc29-6b87647c60e7"       # Cosmos DB Account Contributor
resources:
  # Storage account for Function App runtime
  - type: "Microsoft.Storage/storageAccounts"
    apiVersion: "2022-09-01"
    name: "[parameters('storageAccountName')]"
    location: "[parameters('location')]"
    sku:
      name: "[variables('storageAccountSku')]"
    kind: StorageV2
    properties:
      isHnsEnabled: false

  # Consumption plan
  - type: "Microsoft.Web/serverfarms"
    apiVersion: "2022-09-01"
    name: "[parameters('planName')]"
    location: "[parameters('location')]"
    sku: "[variables('appServiceSku')]"
    properties:
      reserved: false

  # Function App with system-assigned identity
  - type: "Microsoft.Web/sites"
    apiVersion: "2022-09-01"
    name: "[parameters('functionAppName')]"
    location: "[parameters('location')]"
    identity:
      type: SystemAssigned
    kind: functionapp
    dependsOn:
      - "[resourceId('Microsoft.Web/serverfarms', parameters('planName'))]"
      - "[resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName'))]"
    properties:
      serverFarmId: "[resourceId('Microsoft.Web/serverfarms', parameters('planName'))]"
      siteConfig:
        appSettings:
          - name: "AzureWebJobsStorage"
            value: "[concat('DefaultEndpointsProtocol=https;AccountName=', parameters('storageAccountName'), ';AccountKey=', listKeys(resourceId('Microsoft.Storage/storageAccounts', parameters('storageAccountName')), '2022-09-01').keys[0].value, ';EndpointSuffix=', environment().suffixes.storage)]"
          - name: "FUNCTIONS_EXTENSION_VERSION"
            value: "~4"
          - name: "FUNCTIONS_WORKER_RUNTIME"
            value: "dotnet-isolated"

  # Role Assignment: Storage Account Contributor (scope = resource group)
  - type: "Microsoft.Authorization/roleAssignments"
    apiVersion: "2022-04-01"
    name: "[guid(resourceGroup().id, variables('roleDefinitionIds').storage, parameters('functionAppName'))]"
    scope: "[resourceGroup().id]"
    properties:
      roleDefinitionId: "[subscriptionResourceId('Microsoft.Authorization/roleDefinitions', variables('roleDefinitionIds').storage)]"
      principalId: "[reference(resourceId('Microsoft.Web/sites', parameters('functionAppName')), '2022-09-01', 'Full').identity.principalId]"
      principalType: ServicePrincipal
    dependsOn:
      - "[resourceId('Microsoft.Web/sites', parameters('functionAppName'))]"

  # Role Assignment: Key Vault Contributor (scope = resource group)
  - type: "Microsoft.Authorization/roleAssignments"
    apiVersion: "2022-04-01"
    name: "[guid(resourceGroup().id, variables('roleDefinitionIds').keyvault, parameters('functionAppName'))]"
    scope: "[resourceGroup().id]"
    properties:
      roleDefinitionId: "[subscriptionResourceId('Microsoft.Authorization/roleDefinitions', variables('roleDefinitionIds').keyvault)]"
      principalId: "[reference(resourceId('Microsoft.Web/sites', parameters('functionAppName')), '2022-09-01', 'Full').identity.principalId]"
      principalType: ServicePrincipal
    dependsOn:
      - "[resourceId('Microsoft.Web/sites', parameters('functionAppName'))]"

  # Role Assignment: SQL DB Contributor (scope = resource group)
  - type: "Microsoft.Authorization/roleAssignments"
    apiVersion: "2022-04-01"
    name: "[guid(resourceGroup().id, variables('roleDefinitionIds').sql, parameters('functionAppName'))]"
    scope: "[resourceGroup().id]"
    properties:
      roleDefinitionId: "[subscriptionResourceId('Microsoft.Authorization/roleDefinitions', variables('roleDefinitionIds').sql)]"
      principalId: "[reference(resourceId('Microsoft.Web/sites', parameters('functionAppName')), '2022-09-01', 'Full').identity.principalId]"
      principalType: ServicePrincipal
    dependsOn:
      - "[resourceId('Microsoft.Web/sites', parameters('functionAppName'))]"

  # Role Assignment: Cosmos DB Account Contributor (scope = resource group)
  - type: "Microsoft.Authorization/roleAssignments"
    apiVersion: "2022-04-01"
    name: "[guid(resourceGroup().id, variables('roleDefinitionIds').cosmos, parameters('functionAppName'))]"
    scope: "[resourceGroup().id]"
    properties:
      roleDefinitionId: "[subscriptionResourceId('Microsoft.Authorization/roleDefinitions', variables('roleDefinitionIds').cosmos)]"
      principalId: "[reference(resourceId('Microsoft.Web/sites', parameters('functionAppName')), '2022-09-01', 'Full').identity.principalId]"
      principalType: ServicePrincipal
    dependsOn:
      - "[resourceId('Microsoft.Web/sites', parameters('functionAppName'))]"