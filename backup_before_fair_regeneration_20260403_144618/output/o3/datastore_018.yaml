      MONGO_INITDB_ROOT_PASSWORD: dev2024
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7.2-alpine
    container_name: dev_redis
    command: ["redis-server", "--requirepass", "dev2024"]
