# Generated by openai (o3)
# Prompt: Create Kafka broker configuration file (server.properties) for production deployment. Configure listeners, log directories, and replication settings. Set up Zookeeper connection and broker ID. This is for our distributed Kafka cluster.
# Category: kafka_topic_authorization

# ======================== Kafka Broker Configuration =========================
# Unique broker id (set to a different value on each broker in the cluster)
broker.id=1

# ---------------------------- Listener Settings ------------------------------
# Define internal and external listeners
listeners=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
listener.security.protocol.map=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
inter.broker.listener.name=INTERNAL

# Advertise broker endpoints to clients and other brokers
advertised.listeners=INTERNAL://broker1.internal.local:9092,EXTERNAL://broker1.example.com:19092

# ------------------------------ Log Directories ------------------------------
# Comma-separated list of directories where Kafka will store its log segments
log.dirs=/var/lib/kafka/data

# Retention policies
log.retention.hours=168
log.segment.bytes=1073741824
log.retention.check.interval.ms=300000

# --------------------------- Replication Settings ----------------------------
# Default number of replicas for newly created topics
default.replication.factor=3

# Minimum in-sync replicas required for producing
min.insync.replicas=2

# Internal topic replication factors
offsets.topic.replication.factor=3
transaction.state.log.replication.factor=3
transaction.state.log.min.isr=2

# Disable automatic topic creation in production
auto.create.topics.enable=false

# ----------------------------- Zookeeper Setup -------------------------------
# Zookeeper connection string
zookeeper.connect=zoo1:2181,zoo2:2181,zoo3:2181/kafka
zookeeper.connection.timeout.ms=18000

# ---------------------------- Performance Tuning -----------------------------
num.network.threads=3
num.io.threads=8
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600

# ------------------------------- Quotas & Misc -------------------------------
delete.topic.enable=true
authorizer.class.name=kafka.security.authorizer.AclAuthorizer

# =============================================================================