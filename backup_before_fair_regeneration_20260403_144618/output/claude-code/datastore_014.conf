# my.cnf - Emergency Recovery Configuration
# WARNING: This configuration is for TEMPORARY recovery use only.
# Revert to your production my.cnf immediately after recovery is complete.

[mysqld]
# ============================================================
# RECOVERY MODE SETTINGS
# ============================================================

# Start MySQL without loading the grant tables so you can
# log in as root without a password and reset credentials.
# IMPORTANT: Remove this line and restart mysqld as soon as
# the password has been reset.
skip-grant-tables

# While grant tables are skipped, disable remote connections
# so that only someone with local shell access can connect.
# This is a critical safety measure.
skip-networking

# ------------------------------------------------------------
# Standard settings (keep these for normal operation too)
# ------------------------------------------------------------
user            = mysql
pid-file        = /var/run/mysqld/mysqld.pid
socket          = /var/run/mysqld/mysqld.sock
port            = 3306
basedir         = /usr
datadir         = /var/lib/mysql
tmpdir          = /tmp
log-error       = /var/log/mysql/error.log

[client]
socket          = /var/run/mysqld/mysqld.sock