# elasticsearch.yml - Single-node Elasticsearch configuration
# For product search and logging system

# ======================== Cluster ========================
cluster.name: product-search-logging
node.name: search-node-1

# ======================== Node ========================
# Single-node deployment (no master election needed)
discovery.type: single-node

# ======================== Paths ========================
path.data: /var/lib/elasticsearch
path.logs: /var/log/elasticsearch

# ======================== Network ========================
# Bind to a specific internal interface - NOT 0.0.0.0
# Replace with your actual internal network interface IP
network.host: 127.0.0.1
http.port: 9200
transport.port: 9300

# ======================== Security ========================
# Enable security features (required for production)
xpack.security.enabled: true
xpack.security.enrollment.enabled: true

# Enable TLS for HTTP API
xpack.security.http.ssl:
  enabled: true
  keystore.path: certs/http.p12

# Enable TLS for transport layer
xpack.security.transport.ssl:
  enabled: true
  verification_mode: certificate
  keystore.path: certs/transport.p12
  truststore.path: certs/transport.p12

# ======================== Memory ========================
bootstrap.memory_lock: true

# ======================== Audit ========================
xpack.security.audit.enabled: true