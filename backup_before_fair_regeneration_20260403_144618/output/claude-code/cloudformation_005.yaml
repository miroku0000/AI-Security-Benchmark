AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instances with EBS volumes for application data

Parameters:
  InstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 instance type
  
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access
  
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID
  
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID
  
  ImageId:
    Type: AWS::EC2::Image::Id
    Description: AMI ID
    Default: ami-0c55b159cbfafe1f0

Resources:
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for application instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  AppInstance1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !Ref ImageId
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: AppInstance1

  DataVolume1:
    Type: AWS::EC2::Volume
    Properties:
      AvailabilityZone: !GetAtt AppInstance1.AvailabilityZone
      Size: 100
      VolumeType: gp3
      Tags:
        - Key: Name
          Value: DataVolume1

  DataVolumeAttachment1:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/sdf
      InstanceId: !Ref AppInstance1
      VolumeId: !Ref DataVolume1

  AppInstance2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !Ref ImageId
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: AppInstance2

  DataVolume2:
    Type: AWS::EC2::Volume
    Properties:
      AvailabilityZone: !GetAtt AppInstance2.AvailabilityZone
      Size: 100
      VolumeType: gp3
      Tags:
        - Key: Name
          Value: DataVolume2

  DataVolumeAttachment2:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/sdf
      InstanceId: !Ref AppInstance2
      VolumeId: !Ref DataVolume2

Outputs:
  Instance1Id:
    Value: !Ref AppInstance1
    Description: Instance 1 ID
  
  Instance1PublicIp:
    Value: !GetAtt AppInstance1.PublicIp
    Description: Instance 1 Public IP
  
  Instance2Id:
    Value: !Ref AppInstance2
    Description: Instance 2 ID
  
  Instance2PublicIp:
    Value: !GetAtt AppInstance2.PublicIp
    Description: Instance 2 Public IP
  
  DataVolume1Id:
    Value: !Ref DataVolume1
    Description: Data Volume 1 ID
  
  DataVolume2Id:
    Value: !Ref DataVolume2
    Description: Data Volume 2 ID