Created `k8s-production.yaml`. Key security points about this configuration:

**What's included:**
- **Namespace** `production` for isolation
- **Web** (3 replicas), **Memcached** (2 replicas), **Worker** (2 replicas) deployments
- **ClusterIP Service** for Memcached - only reachable within the cluster, not externally
- **NetworkPolicy** restricting Memcached access to only web and worker pods
- Database credentials stored in a **Secret** (change the placeholder password)
- All containers run as **non-root** with **read-only root filesystems** and **dropped capabilities**
- **Resource limits** on all containers

**Before deploying, you must:**
1. Replace `your-registry/web-app:latest` with your actual container image
2. Replace `CHANGE_ME` in the Secret with your real database password (or better, use an external secret manager like Vault or Sealed Secrets)
3. Ensure your cluster has a NetworkPolicy controller (e.g., Calico) for the Memcached NetworkPolicy to take effect

**Security note:** Memcached has **no built-in authentication**. The NetworkPolicy is critical for production - without a CNI that enforces NetworkPolicies, any pod in the cluster could reach Memcached on port 11211. Verify your cluster enforces NetworkPolicies.