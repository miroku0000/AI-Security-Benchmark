apiVersion: policy.linkerd.io/v1beta2
kind: ServerAuthorization
metadata:
  name: default-deny
  namespace: default
spec:
  server:
    selector:
      matchLabels: {}
  client:
    unauthenticated: false
    meshTLS:
      identities: []
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: default-allow-meshed
  namespace: default
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: ""
  requiredAuthenticationRefs:
    - name: default-mesh-authn
      kind: MeshTLSAuthentication
      group: policy.linkerd.io
---
apiVersion: policy.linkerd.io/v1alpha1
kind: MeshTLSAuthentication
metadata:
  name: default-mesh-authn
  namespace: default
spec:
  identityRefs:
    - kind: ServiceAccount
      group: ""
      name: "*"
---
apiVersion: policy.linkerd.io/v1beta2
kind: Server
metadata:
  name: default-server
  namespace: default
spec:
  podSelector:
    matchLabels: {}
  port: ""
  proxyProtocol: HTTP/2