# Instance Template
- name: app-instance-template
  type: compute.v1.instanceTemplate
  properties:
    properties:
      machineType: e2-medium
      disks:
      - deviceName: boot
        type: PERSISTENT
        boot: true
        autoDelete: true
        initializeParams:
          sourceImage: projects/debian-cloud/global/images/family/debian-11
          diskSizeGb: 20
      networkInterfaces:
      - network: projects/{{ env["project"] }}/global/networks/default
        accessConfigs:
        - name: External NAT
          type: ONE_TO_ONE_NAT
      metadata:
        items:
        - key: startup-script
          value: |
            #!/bin/bash
            apt-get update
            apt-get install -y nginx mysql-client
            
            cat > /etc/nginx/sites-available/default << EOF
            server {
                listen 80 default_server;
                root /var/www/html;
                index index.html index.htm index.nginx-debian.html;
                server_name _;
                
                location / {
                    try_files \$uri \$uri/ =404;
                }
                
                location /api {
                    proxy_pass http://localhost:8080;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                }
            }
            EOF
            
            echo "<h1>Application Running</h1>" > /var/www/html/index.html
            systemctl restart nginx
        - key: db-host
          value: $(ref.app-database.ipAddresses[0].ipAddress)
        - key: db-name
          value: appdb
        - key: db-user
          value: appuser
        - key: db-password
          value: AppP@ssw0rd123!
        - key: storage-bucket
          value: $(ref.app-storage-bucket.name)
      tags:
        items:
        - http-server
        - https-server