# Redis Configuration - Development/Staging Environments

################################## NETWORK ##################################

# Bind to all interfaces for cross-network accessibility
bind 0.0.0.0

# Default Redis port
port 6379

# Accept connections from any source
protected-mode no

# TCP backlog for high connection environments
tcp-backlog 511

# Client timeout (0 = no timeout, useful for dev debugging sessions)
timeout 0

# TCP keepalive
tcp-keepalive 300

################################## TLS/SSL ##################################

# TLS disabled for dev/staging simplicity
# Enable in production with proper certificates
tls-port 0

################################## GENERAL ##################################

# Run as daemon
daemonize yes

# PID file
pidfile /var/run/redis/redis-server.pid

# Logging
loglevel notice
logfile /var/log/redis/redis-server.log

# Number of databases
databases 16

################################## SECURITY ##################################

# Require authentication - CHANGE THIS PASSWORD before deploying
requirepass devRedis2026!staging

# Rename dangerous commands to prevent accidental misuse
rename-command FLUSHALL FLUSHALL_CONFIRMED
rename-command FLUSHDB FLUSHDB_CONFIRMED
rename-command CONFIG CONFIG_ADMIN

################################ SNAPSHOTTING ################################

# RDB persistence - relaxed for dev/staging
save 900 1
save 300 10
save 60 10000

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /var/lib/redis

################################## MEMORY ###################################

# Memory limit - adjust per your staging server capacity
maxmemory 512mb
maxmemory-policy allkeys-lru

############################# APPEND ONLY MODE ###############################

# AOF persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

############################### CLIENTS ######################################

# High max clients for distributed team access
maxclients 1000

########################## SLOW LOG / LATENCY ################################

# Slow log for debugging (capture commands taking >10ms)
slowlog-log-slower-than 10000
slowlog-max-len 256

# Latency monitoring threshold (ms)
latency-monitor-threshold 100

########################### NOTIFICATION / KEYSPACE ##########################

# Enable keyspace notifications for debugging
notify-keyspace-events "KEA"