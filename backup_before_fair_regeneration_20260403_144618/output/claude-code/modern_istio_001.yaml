# peer-authentication.yaml
#
# Migration-phase policy: PERMISSIVE mode allows both plaintext and mTLS
# so non-mesh services can still communicate during onboarding.
#
# ACTION REQUIRED: Once all services in the namespace have Istio sidecars,
# change mode to STRICT and remove the PERMISSIVE policy.
#
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: microservices
spec:
  mtls:
    mode: PERMISSIVE
---
# Apply this once migration is complete (all pods have sidecars):
#
# apiVersion: security.istio.io/v1
# kind: PeerAuthentication
# metadata:
#   name: default
#   namespace: microservices
# spec:
#   mtls:
#     mode: STRICT