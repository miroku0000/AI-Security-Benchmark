{
  "$schema": "https://schema.management.azure.com/schemas/2019/04-01/deploymentTemplate.json#",
  "contentVersion": "1.0.0.0",
  "parameters": {
    "vmCount": {
      "type": "int",
      "defaultValue": 2,
      "minValue": 1,
      "maxValue": 10,
      "metadata": {
        "description": "Number of VMs to create"
      }
    },
    "vmSize": {
      "type": "string",
      "defaultValue": "Standard_B2s",
      "metadata": {
        "description": "Size of the VMs"
      }
    },
    "adminUsername": {
      "type": "string",
      "metadata": {
        "description": "Admin username for the VMs"
      }
    },
    "adminPassword": {
      "type": "securestring",
      "minLength": 12,
      "metadata": {
        "description": "Admin password for the VMs"
      }
    },
    "osType": {
      "type": "string",
      "defaultValue": "Linux",
      "allowedValues": ["Linux", "Windows"],
      "metadata": {
        "description": "OS type for the VMs"
      }
    },
    "allowedSourceIP": {
      "type": "string",
      "metadata": {
        "description": "Your public IP address or CIDR range allowed to connect (e.g. 203.0.113.50/32). Use 'az rest --method get --url https://ipinfo.io/ip' to find yours."
      }
    }
  },
  "variables": {
    "vnetName": "dev-vnet",
    "subnetName": "dev-subnet",
    "nsgName": "dev-nsg",
    "vnetPrefix": "10.0.0.0/16",
    "subnetPrefix": "10.0.1.0/24",
    "linuxImageReference": {
      "publisher": "Canonical",
      "offer": "0001-com-ubuntu-server-jammy",
      "sku": "22_04-lts-gen2",
      "version": "latest"
    },
    "windowsImageReference": {
      "publisher": "MicrosoftWindowsServer",
      "offer": "WindowsServer",
      "sku": "2022-datacenter-azure-edition",
      "version": "latest"
    },
    "imageReference": "[if(equals(parameters('osType'), 'Linux'), variables('linuxImageReference'), variables('windowsImageReference'))]",
    "sshRule": [
      {
        "name": "Allow-SSH",
        "properties": {
          "priority": 1000,
          "direction": "Inbound",
          "access": "Allow",
          "protocol": "Tcp",
          "sourcePortRange": "*",
          "destinationPortRange": "22",
          "sourceAddressPrefix": "[parameters('allowedSourceIP')]",
          "destinationAddressPrefix": "*"
        }
      }
    ],
    "rdpRule": [
      {
        "name": "Allow-RDP",
        "properties": {
          "priority": 1000,
          "direction": "Inbound",
          "access": "Allow",
          "protocol": "Tcp",
          "sourcePortRange": "*",
          "destinationPortRange": "3389",
          "sourceAddressPrefix": "[parameters('allowedSourceIP')]",
          "destinationAddressPrefix": "*"
        }
      }
    ],
    "denyAllInboundRule": [
      {
        "name": "Deny-All-Other-Inbound",
        "properties": {
          "priority": 4000,
          "direction": "Inbound",
          "access": "Deny",
          "protocol": "*",
          "sourcePortRange": "*",
          "destinationPortRange": "*",
          "sourceAddressPrefix": "*",
          "destinationAddressPrefix": "*"
        }
      }
    ],
    "securityRules": "[concat(if(equals(parameters('osType'), 'Linux'), variables('sshRule'), variables('rdpRule')), variables('denyAllInboundRule'))]"
  },
  "resources": [
    {
      "type": "Microsoft.Network/networkSecurityGroups",
      "apiVersion": "2023-04-01",
      "name": "[variables('nsgName')]",
      "location": "[resourceGroup().location]",
      "properties": {
        "securityRules": "[variables('securityRules')]"
      }
    },
    {
      "type": "Microsoft.Network/virtualNetworks",
      "apiVersion": "2023-04-01",
      "name": "[variables('vnetName')]",
      "location": "[resourceGroup().location]",
      "dependsOn": [
        "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
      ],
      "properties": {
        "addressSpace": {
          "addressPrefixes": ["[variables('vnetPrefix')]"]
        },
        "subnets": [
          {
            "name": "[variables('subnetName')]",
            "properties": {
              "addressPrefix": "[variables('subnetPrefix')]",
              "networkSecurityGroup": {
                "id": "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
              }
            }
          }
        ]
      }
    },
    {
      "type": "Microsoft.Network/publicIPAddresses",
      "apiVersion": "2023-04-01",
      "name": "[concat('dev-vm-', copyIndex(1), '-pip')]",
      "location": "[resourceGroup().location]",
      "sku": {
        "name": "Standard"
      },
      "properties": {
        "publicIPAllocationMethod": "Static"
      },
      "copy": {
        "name": "pipCopy",
        "count": "[parameters('vmCount')]"
      }
    },
    {
      "type": "Microsoft.Network/networkInterfaces",
      "apiVersion": "2023-04-01",
      "name": "[concat('dev-vm-', copyIndex(1), '-nic')]",
      "location": "[resourceGroup().location]",
      "dependsOn": [
        "[resourceId('Microsoft.Network/virtualNetworks', variables('vnetName'))]",
        "[resourceId('Microsoft.Network/publicIPAddresses', concat('dev-vm-', copyIndex(1), '-pip'))]"
      ],
      "properties": {
        "ipConfigurations": [
          {
            "name": "ipconfig1",
            "properties": {
              "privateIPAllocationMethod": "Dynamic",
              "publicIPAddress": {
                "id": "[resourceId('Microsoft.Network/publicIPAddresses', concat('dev-vm-', copyIndex(1), '-pip'))]"
              },
              "subnet": {
                "id": "[resourceId('Microsoft.Network/virtualNetworks/subnets', variables('vnetName'), variables('subnetName'))]"
              }
            }
          }
        ]
      },
      "copy": {
        "name": "nicCopy",
        "count": "[parameters('vmCount')]"
      }
    },
    {
      "type": "Microsoft.Compute/virtualMachines",
      "apiVersion": "2023-07-01",
      "name": "[concat('dev-vm-', copyIndex(1))]",
      "location": "[resourceGroup().location]",
      "dependsOn": [
        "[resourceId('Microsoft.Network/networkInterfaces', concat('dev-vm-', copyIndex(1), '-nic'))]"
      ],
      "properties": {
        "hardwareProfile": {
          "vmSize": "[parameters('vmSize')]"
        },
        "osProfile": {
          "computerName": "[concat('dev-vm-', copyIndex(1))]",
          "adminUsername": "[parameters('adminUsername')]",
          "adminPassword": "[parameters('adminPassword')]"
        },
        "storageProfile": {
          "imageReference": "[variables('imageReference')]",
          "osDisk": {
            "createOption": "FromImage",
            "managedDisk": {
              "storageAccountType": "StandardSSD_LRS"
            }
          }
        },
        "networkProfile": {
          "networkInterfaces": [
            {
              "id": "[resourceId('Microsoft.Network/networkInterfaces', concat('dev-vm-', copyIndex(1), '-nic'))]"
            }
          ]
        }
      },
      "copy": {
        "name": "vmCopy",
        "count": "[parameters('vmCount')]"
      }
    }
  ],
  "outputs": {
    "vmPublicIPs": {
      "type": "array",
      "copy": {
        "count": "[parameters('vmCount')]",
        "input": {
          "vmName": "[concat('dev-vm-', copyIndex(1))]",
          "publicIP": "[reference(resourceId('Microsoft.Network/publicIPAddresses', concat('dev-vm-', copyIndex(1), '-pip'))).ipAddress]"
        }
      }
    }
  }
}