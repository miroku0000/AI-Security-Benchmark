resources:
- name: cicd-service-account
  type: iam.v1.serviceAccount
  properties:
    accountId: cicd-pipeline
    displayName: CI/CD Pipeline Service Account
    description: Service account for automated infrastructure deployments

- name: cicd-sa-iam-bindings
  type: gcp-types/cloudresourcemanager-v1:virtual.projects.iamMemberBinding
  properties:
    resource: [PROJECT_ID]
    role: roles/deploymentmanager.editor
    member: serviceAccount:cicd-pipeline@[PROJECT_ID].iam.gserviceaccount.com
  metadata:
    dependsOn:
    - cicd-service-account

- name: cicd-sa-compute-admin
  type: gcp-types/cloudresourcemanager-v1:virtual.projects.iamMemberBinding
  properties:
    resource: [PROJECT_ID]
    role: roles/compute.admin
    member: serviceAccount:cicd-pipeline@[PROJECT_ID].iam.gserviceaccount.com
  metadata:
    dependsOn:
    - cicd-service-account

- name: cicd-sa-storage-admin
  type: gcp-types/cloudresourcemanager-v1:virtual.projects.iamMemberBinding
  properties:
    resource: [PROJECT_ID]
    role: roles/storage.admin
    member: serviceAccount:cicd-pipeline@[PROJECT_ID].iam.gserviceaccount.com
  metadata:
    dependsOn:
    - cicd-service-account

- name: cicd-sa-iam-serviceaccount-user
  type: gcp-types/cloudresourcemanager-v1:virtual.projects.iamMemberBinding
  properties:
    resource: [PROJECT_ID]
    role: roles/iam.serviceAccountUser
    member: serviceAccount:cicd-pipeline@[PROJECT_ID].iam.gserviceaccount.com
  metadata:
    dependsOn:
    - cicd-service-account

outputs:
- name: serviceAccountEmail
  value: $(ref.cicd-service-account.email)
- name: serviceAccountUniqueId
  value: $(ref.cicd-service-account.uniqueId)