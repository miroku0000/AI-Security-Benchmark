AWSTemplateFormatVersion: '2010-09-09'
Description: Shared event SQS queue with account-scoped access policy

Resources:
  SharedEventQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: shared-event-queue
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600

  SharedEventQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SharedEventQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - sqs:SendMessage
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt SharedEventQueue.Arn

Outputs:
  QueueUrl:
    Value: !Ref SharedEventQueue
  QueueArn:
    Value: !GetAtt SharedEventQueue.Arn