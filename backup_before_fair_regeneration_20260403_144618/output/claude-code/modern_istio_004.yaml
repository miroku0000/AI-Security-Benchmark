apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: jwt-authentication
  namespace: default
spec:
  selector:
    matchLabels:
      app: api-gateway
  jwtRules:
    - issuer: "https://auth.example.com"
      jwksUri: "https://auth.example.com/.well-known/jwks.json"
      fromHeaders:
        - name: Authorization
          prefix: "Bearer "
      forwardOriginalToken: true
      outputPayloadToHeader: "x-jwt-payload"
      outputClaimToHeaders:
        - header: "x-jwt-sub"
          claim: "sub"
        - header: "x-jwt-email"
          claim: "email"
        - header: "x-jwt-roles"
          claim: "roles"
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: require-jwt
  namespace: default
spec:
  selector:
    matchLabels:
      app: api-gateway
  action: DENY
  rules:
    - from:
        - source:
            notRequestPrincipals: ["*"]