apiVersion: apps/v1
kind: Deployment
metadata:
  name: low-latency-service
  namespace: default
  labels:
    app: low-latency-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: low-latency-service
  template:
    metadata:
      labels:
        app: low-latency-service
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: low-latency-service
          image: low-latency-service:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15