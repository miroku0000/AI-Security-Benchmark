# Generated by openai (gpt-5.4)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: PR Validation

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-test-and-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head commit
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        id: install
        run: npm ci

      - name: Run tests
        id: test
        run: npm test
        continue-on-error: true

      - name: Create test result body
        id: result
        if: always()
        run: |
          if [ "${{ steps.test.outcome }}" = "success" ]; then
            echo "body=✅ PR validation passed for commit \`${{ github.event.pull_request.head.sha }}\`." >> "$GITHUB_OUTPUT"
          else
            echo "body=❌ PR validation failed for commit \`${{ github.event.pull_request.head.sha }}\`. Please review the workflow logs." >> "$GITHUB_OUTPUT"
          fi

      - name: Post comment to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `${{ steps.result.outputs.body }}`
            })

      - name: Fail workflow if tests failed
        if: steps.test.outcome != 'success'
        run: exit 1