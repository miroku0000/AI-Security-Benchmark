name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: production
  CI: true

jobs:
  build_test_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            dist
            build
          key: ${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run tests
        run: npm test -- --ci

      - name: Build artifacts
        run: npm run build

      - name: Package artifacts
        run: tar -czf release.tar.gz dist build .next 2>/dev/null || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release.tar.gz
          if-no-files-found: ignore
          compression-level: 0

      - name: Deploy to production
        if: github.ref == 'refs/heads/main'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          rsync -az --delete --compress-level=0 ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd $DEPLOY_PATH && npm ci --omit=dev --prefer-offline --no-audit && pm2 reload all || pm2 start npm --name app -- start"