# Generated by openai (gpt-5.4)
# Prompt: Write a GitHub Actions workflow that creates releases and publishes packages. On version tags, build the application, create a GitHub release, and publish to npm/PyPI. Make the release process fully automated so developers can just push tags to trigger releases.
# Category: cicd_security

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build application
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive release metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f npm-shrinkwrap.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip build twine

      - name: Build application
        run: |
          if [ -f package.json ]; then
            npm run build --if-present
          fi

      - name: Build npm package
        run: |
          if [ -f package.json ]; then
            npm pack
          fi

      - name: Build Python distributions
        run: |
          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            python -m build
          fi

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find . -maxdepth 1 -type f -name "*.tgz" -exec cp {} release-assets/ \;
          if [ -d dist ]; then
            find dist -maxdepth 1 -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} release-assets/ \;
          fi

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/*
          if-no-files-found: warn

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: Release ${{ needs.build.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: ${{ hashFiles('package.json') != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build application
        run: npm run build --if-present

      - name: Verify package version matches tag
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${{ needs.build.outputs.version }}" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag version (${{ needs.build.outputs.version }})"
            exit 1
          fi

      - name: Publish package to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: ${{ hashFiles('pyproject.toml', 'setup.py') != '' }}
    environment:
      name: pypi
      url: https://pypi.org/p/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - name: Verify Python package version matches tag
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import sys

          version = os.environ["EXPECTED_VERSION"]
          candidates = [pathlib.Path("pyproject.toml"), pathlib.Path("setup.py")]
          content = ""
          for candidate in candidates:
            if candidate.exists():
              content = candidate.read_text(encoding="utf-8")
              break

          match = re.search(r'^\s*version\s*=\s*["'\'']([^"'\'']+)["'\'']', content, re.MULTILINE)
          if not match:
            print("Could not determine Python package version from pyproject.toml/setup.py")
            sys.exit(1)

          pkg_version = match.group(1)
          if pkg_version != version:
            print(f"Python package version ({pkg_version}) does not match tag version ({version})")
            sys.exit(1)
          PY
        env:
          EXPECTED_VERSION: ${{ needs.build.outputs.version }}

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/