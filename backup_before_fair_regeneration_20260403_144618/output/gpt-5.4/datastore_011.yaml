# Generated by openai (gpt-5.4)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

version: "3.9"

x-elasticsearch-common-env: &elasticsearch-common-env
  discovery.type: single-node
  xpack.security.enabled: "false"
  ES_JAVA_OPTS: "-Xms1g -Xmx1g"
  path.repo: /usr/share/elasticsearch/backup

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: elasticsearch
    environment:
      <<: *elasticsearch-common-env
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - esdata:/usr/share/elasticsearch/data
      - esbackup:/usr/share/elasticsearch/backup
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  snapshot-init:
    image: curlimages/curl:8.8.0
    container_name: snapshot-init
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SNAPSHOT_REPOSITORY: ops-backup-repo
      SNAPSHOT_TYPE: fs
      SNAPSHOT_FS_LOCATION: /usr/share/elasticsearch/backup
      SNAPSHOT_S3_BUCKET: elasticsearch-snapshots
      SNAPSHOT_S3_BASE_PATH: ops
      SNAPSHOT_S3_REGION: us-east-1
      SNAPSHOT_S3_CLIENT: default
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e

        if [ "$SNAPSHOT_TYPE" = "s3" ]; then
          curl -fsS -X PUT "$ELASTICSEARCH_URL/_snapshot/$SNAPSHOT_REPOSITORY" \
            -H "Content-Type: application/json" \
            -d "{
              \"type\": \"s3\",
              \"settings\": {
                \"bucket\": \"$SNAPSHOT_S3_BUCKET\",
                \"base_path\": \"$SNAPSHOT_S3_BASE_PATH\",
                \"region\": \"$SNAPSHOT_S3_REGION\",
                \"client\": \"$SNAPSHOT_S3_CLIENT\"
              }
            }"
        else
          curl -fsS -X PUT "$ELASTICSEARCH_URL/_snapshot/$SNAPSHOT_REPOSITORY" \
            -H "Content-Type: application/json" \
            -d "{
              \"type\": \"fs\",
              \"settings\": {
                \"location\": \"$SNAPSHOT_FS_LOCATION\",
                \"compress\": true
              }
            }"
        fi

        curl -fsS -X PUT "$ELASTICSEARCH_URL/_slm/policy/ops-automated-backups" \
          -H "Content-Type: application/json" \
          -d "{
            \"schedule\": \"0 30 1 * * ?\",
            \"name\": \"<ops-snapshot-{now/d}>\",
            \"repository\": \"$SNAPSHOT_REPOSITORY\",
            \"config\": {
              \"indices\": [\"*\"],
              \"ignore_unavailable\": true,
              \"include_global_state\": true
            },
            \"retention\": {
              \"expire_after\": \"30d\",
              \"min_count\": 7,
              \"max_count\": 60
            }
          }"

        echo "Snapshot repository and SLM policy configured."

    restart: "no"

  snapshot-create:
    image: curlimages/curl:8.8.0
    container_name: snapshot-create
    profiles: ["tools"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SNAPSHOT_REPOSITORY: ops-backup-repo
      SNAPSHOT_NAME: manual-snapshot
      SNAPSHOT_INDICES: "*"
      INCLUDE_GLOBAL_STATE: "true"
      IGNORE_UNAVAILABLE: "true"
      WAIT_FOR_COMPLETION: "true"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        curl -fsS -X PUT "$ELASTICSEARCH_URL/_snapshot/$SNAPSHOT_REPOSITORY/$SNAPSHOT_NAME?wait_for_completion=$WAIT_FOR_COMPLETION" \
          -H "Content-Type: application/json" \
          -d "{
            \"indices\": \"$SNAPSHOT_INDICES\",
            \"ignore_unavailable\": $IGNORE_UNAVAILABLE,
            \"include_global_state\": $INCLUDE_GLOBAL_STATE
          }"

  snapshot-restore:
    image: curlimages/curl:8.8.0
    container_name: snapshot-restore
    profiles: ["tools"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SNAPSHOT_REPOSITORY: ops-backup-repo
      SNAPSHOT_NAME: manual-snapshot
      RESTORE_INDICES: "*"
      INCLUDE_GLOBAL_STATE: "false"
      IGNORE_UNAVAILABLE: "true"
      RENAME_PATTERN: "index_(.+)"
      RENAME_REPLACEMENT: "restored_index_$1"
      WAIT_FOR_COMPLETION: "true"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        curl -fsS -X POST "$ELASTICSEARCH_URL/_snapshot/$SNAPSHOT_REPOSITORY/$SNAPSHOT_NAME/_restore?wait_for_completion=$WAIT_FOR_COMPLETION" \
          -H "Content-Type: application/json" \
          -d "{
            \"indices\": \"$RESTORE_INDICES\",
            \"ignore_unavailable\": $IGNORE_UNAVAILABLE,
            \"include_global_state\": $INCLUDE_GLOBAL_STATE,
            \"rename_pattern\": \"$RENAME_PATTERN\",
            \"rename_replacement\": \"$RENAME_REPLACEMENT\"
          }"

volumes:
  esdata:
  esbackup: