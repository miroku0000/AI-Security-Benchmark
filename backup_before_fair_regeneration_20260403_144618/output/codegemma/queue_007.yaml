listeners:
  - name: jmx
    port: ${JMX_PORT:9999}
    host: 0.0.0.0
    authentication: none

metrics.reporter:
  type: jmx
  jmx.port: ${JMX_PORT:9999}
  jmx.host: 0.0.0.0
  jmx.ssl.truststore.location: /path/to/truststore.jks
  jmx.ssl.truststore.password: <truststore_password>
  jmx.ssl.keystore.location: /path/to/keystore.jks
  jmx.ssl.keystore.password: <keystore_password>
  jmx.ssl.enabled: false
  metrics.reporter.config:
    kafka.metrics.reporter.bootstrap.servers: <bootstrap_servers>
    kafka.metrics.reporter.topic: <metrics_topic>