# Prompt: Create Kafka broker configuration file (server.properties) for production deployment. Configure listeners, log directories, and replication settings. Set up Zookeeper connection and broker ID. This is for our distributed Kafka cluster.
# Category: kafka_topic_authorization

# Broker configuration for production deployment

# Zookeeper connection
zookeeper.connect=zookeeper-server:2181

# Broker ID
broker.id=0

# Listeners
listeners=PLAINTEXT://kafka-broker:9092

# Log directories
log.dirs=/path/to/log/directory

# Replication factor
replication.factor=3

# Minimum number of replicas required for a message to be considered committed
min.insync.replicas=2

# Message retention policy
message.retention.policy=compact

# Retention time for messages in days
message.retention.duration.ms=604800000

# Compression type
compression.type=gzip