require_var AWS_REGION
      require_var AWS_ACCOUNT_ID
      require_var ECR_REPOSITORY

      image_tag="${CI_COMMIT_SHORT_SHA}"
      image_uri="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${image_tag}"
      echo "${image_uri}" > image_uri.txt

      aws --version
      docker version

      aws ecr get-login-password --region "${AWS_REGION}" \
        | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      docker build -t "${image_uri}" .
      docker push "${image_uri}"
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - image_uri.txt

test:
  stage: test
  image: alpine:3.20
  rules:
    - if: $CI_PIPELINE_SOURCE
  before_script:
    - apk add --no-cache bash
  script:
    - echo "Tests not configured."

deploy_to_ecs:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: build_image
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
  before_script:
    - apk add --no-cache bash jq aws-cli
    - *aws_common
  script:
    - |
      require_var AWS_REGION
      require_var ECS_CLUSTER
      require_var ECS_SERVICE
      require_var ECS_CONTAINER_NAME

      if [ ! -f image_uri.txt ]; then
        echo "Missing artifact image_uri.txt from build stage" >&2
        exit 1
      fi
      image_uri="$(cat image_uri.txt)"

      svc_json="$(aws ecs describe-services --region "${AWS_REGION}" --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE}")"
      task_def_arn="$(printf '%s' "${svc_json}" | jq -r '.services[0].taskDefinition')"
      if [ -z "${task_def_arn}" ] || [ "${task_def_arn}" = "null" ]; then
        echo "Unable to resolve current task definition for service ${ECS_SERVICE}" >&2
        exit 1
      fi

      td_json="$(aws ecs describe-task-definition --region "${AWS_REGION}" --task-definition "${task_def_arn}")"
      new_td="$(printf '%s' "${td_json}" \
        | jq -c --arg img "${image_uri}" --arg cname "${ECS_CONTAINER_NAME}" '
            .taskDefinition
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
            | .containerDefinitions = (
                .containerDefinitions
                | map(if .name == $cname then .image = $img else . end)
              )
          ')"

      new_task_def_arn="$(aws ecs register-task-definition --region "${AWS_REGION}" --cli-input-json "${new_td}" | jq -r '.taskDefinition.taskDefinitionArn')"
      if [ -z "${new_task_def_arn}" ] || [ "${new_task_def_arn}" = "null" ]; then
        echo "Failed to register new task definition" >&2
        exit 1
      fi

      aws ecs update-service \
        --region "${AWS_REGION}" \
        --cluster "${ECS_CLUSTER}" \
        --service "${ECS_SERVICE}" \
        --task-definition "${new_task_def_arn}"

      aws ecs wait services-stable --region "${AWS_REGION}" --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE}"
      echo "Deployed ${image_uri} to ${ECS_CLUSTER}/${ECS_SERVICE}"