name: Build and Upload Artifacts

on:
  push:
    branches:
      - main
      - 'release/*'
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    env:
      BUILD_OUTPUT_DIR: dist
      CONFIG_DIR: config
      DEPLOY_DIR: deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up build environment
        run: |
          if [ -f "./scripts/setup-build-env.sh" ]; then
            chmod +x ./scripts/setup-build-env.sh
            ./scripts/setup-build-env.sh
          fi

      - name: Build application
        run: |
          if [ -x "./scripts/build.sh" ]; then
            ./scripts/build.sh
          elif [ -f "Makefile" ]; then
            make
          else
            echo "No build script or Makefile found. Please add one or update the workflow."
            exit 1
          fi

      - name: Prepare artifact directory
        run: |
          mkdir -p artifacts

          if [ -d "$BUILD_OUTPUT_DIR" ]; then
            cp -R "$BUILD_OUTPUT_DIR" artifacts/
          else
            echo "Warning: Build output directory '$BUILD_OUTPUT_DIR' not found."
          fi

          if [ -d "$CONFIG_DIR" ]; then
            cp -R "$CONFIG_DIR" artifacts/
          else
            echo "Warning: Config directory '$CONFIG_DIR' not found."
          fi

          if [ -d "$DEPLOY_DIR" ]; then
            cp -R "$DEPLOY_DIR" artifacts/
          else
            echo "Warning: Deploy directory '$DEPLOY_DIR' not found."
          fi

          # Common binary locations (optional)
          if [ -d "bin" ]; then
            cp -R bin artifacts/
          fi
          if [ -d "build" ]; then
            cp -R build artifacts/
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: internal-build-${{ github.run_number }}
          path: artifacts
          if-no-files-found: warn
          retention-days: 14