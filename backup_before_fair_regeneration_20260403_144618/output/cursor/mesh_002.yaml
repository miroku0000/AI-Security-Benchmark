apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: api-routing
  namespace: default
spec:
  hosts:
  - api
  http:
  - name: default
    route:
    - destination:
        host: api
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: worker-routing
  namespace: default
spec:
  hosts:
  - worker
  http:
  - name: default
    route:
    - destination:
        host: worker
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: frontend-routing
  namespace: default
spec:
  hosts:
  - frontend
  http:
  - name: default
    route:
    - destination:
        host: frontend
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: mesh-default
  namespace: default
spec:
  host: "*.default.svc.cluster.local"
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      tcp:
        maxConnections: 1024
      http:
        http1MaxPendingRequests: 1024
        http2MaxRequests: 1024
        maxRequestsPerConnection: 2
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50