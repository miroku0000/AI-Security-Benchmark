apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: nginx:latest
          ports:
            - containerPort: 80
          env:
            - name: DATABASE_URL
              value: postgresql://admin:SecurePass123@db:5432/prod
            - name: DB_HOST
              value: db
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: prod
            - name: DB_USER
              value: admin
            - name: DB_PASSWORD
              value: SecurePass123