has_build="$(node -e "const p=require('./${pkg}'); process.stdout.write(String(!!(p.scripts&&p.scripts.build)));" 2>/dev/null || echo false)"
            if [[ "$has_build" != "true" ]]; then
              continue
            fi
            if [[ -f "$dir/package-lock.json" ]]; then
              (cd "$dir" && npm ci)
            else
              (cd "$dir" && npm install)
            fi
            (cd "$dir" && npm run build)
          done

      - name: Install root Node dependencies and verify
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci
          elif [[ -f package.json ]]; then
            npm install
          fi
          if npm run | grep -q '^  test'; then
            npm test --silent
          fi

      - name: Build Python distribution
        id: pybuild
        run: |
          set -euo pipefail
          if [[ -f pyproject.toml || -f setup.py || -f setup.cfg ]]; then
            export AISB_PACKAGE_VERSION="${GITHUB_REF_NAME#v}"
            python -m pip install --upgrade build
            python -m build --outdir python_dist
            echo "has_python_dist=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_python_dist=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          TAG="${GITHUB_REF_NAME}"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git archive --format=tar.gz --prefix="source-${TAG}/" -o "dist/source-${TAG}.tar.gz" HEAD
          (cd dist && sha256sum "source-${TAG}.tar.gz" > SHA256SUMS.txt)
          mapfile -t PKGS < <(git ls-files '**/package.json' | grep -v '^output/' | grep -v '/node_modules/' || true)
          if [[ "${#PKGS[@]}" -gt 0 ]]; then
            for pkg in "${PKGS[@]}"; do
              dir="$(dirname "$pkg")"
              if [[ -f "$dir/package.json" ]]; then
                (cd "$dir" && npm pack --silent --pack-destination "$GITHUB_WORKSPACE/dist" >/dev/null) || true
              fi
            done
          fi
          if ls dist/*.tgz >/dev/null 2>&1; then
            (cd dist && sha256sum *.tgz >> SHA256SUMS.txt)
          fi
          if [[ -d python_dist ]]; then
            cp -a python_dist/. dist/
            (cd dist && sha256sum *.whl *.tar.gz 2>/dev/null >> SHA256SUMS.txt || true)
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*

      - name: Publish to npm
        if: ${{ secrets.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
          mapfile -t PKGS < <(git ls-files '**/package.json' | grep -v '^output/' | grep -v '/node_modules/' || true)
          for pkg in "${PKGS[@]}"; do
            dir="$(dirname "$pkg")"
            is_private="$(node -e "const p=require('./${pkg}'); process.stdout.write(String(!!p.private));" 2>/dev/null || echo true)"
            if [[ "$is_private" == "true" ]]; then
              continue
            fi
            if [[ -f "$dir/package-lock.json" ]]; then
              (cd "$dir" && npm ci)
            elif [[ -f "$dir/package.json" ]]; then
              (cd "$dir" && npm install)
            fi
            (cd "$dir" && npm publish --access public)
          done

      - name: Publish to PyPI (trusted publishing)
        if: ${{ steps.pybuild.outputs.has_python_dist == 'true' && secrets.PYPI_API_TOKEN == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python_dist

      - name: Publish to PyPI (API token)
        if: ${{ steps.pybuild.outputs.has_python_dist == 'true' && secrets.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: python_dist