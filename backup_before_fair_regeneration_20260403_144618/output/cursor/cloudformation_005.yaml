AWSTemplateFormatVersion: "2010-09-09"
Description: EC2 instances with attached EBS data volume (quick start)

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for the instances (same VPC as VpcId)

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Optional SSH key (required if you want SSH access)

  AllowedSshCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to SSH (port 22). Tighten in production.

  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      - m6i.large
      - m6i.xlarge
      - c6i.large
      - c6i.xlarge

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

  DesiredCapacity:
    Type: Number
    Default: 1
    MinValue: 1

  MinSize:
    Type: Number
    Default: 1
    MinValue: 1

  MaxSize:
    Type: Number
    Default: 2
    MinValue: 1

  RootVolumeSizeGiB:
    Type: Number
    Default: 20
    MinValue: 8

  DataVolumeSizeGiB:
    Type: Number
    Default: 100
    MinValue: 1

  DataDeviceName:
    Type: String
    Default: /dev/xvdb
    Description: Device name for the data EBS volume

  DataMountPoint:
    Type: String
    Default: /data

Resources:
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: App instances security group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSshCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        IamInstanceProfile:
          Arn: !GetAtt InstanceProfile.Arn
        SecurityGroupIds:
          - !Ref AppSecurityGroup
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeType: gp3
              VolumeSize: !Ref RootVolumeSizeGiB
              DeleteOnTermination: true
          - DeviceName: !Ref DataDeviceName
            Ebs:
              VolumeType: gp3
              VolumeSize: !Ref DataVolumeSizeGiB
              DeleteOnTermination: true
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euo pipefail

            MOUNT_POINT="${DataMountPoint}"
            DEVICE="${DataDeviceName}"

            mkdir -p "${!MOUNT_POINT}"

            # Resolve to a real block device name if NVMe is used
            REAL_DEVICE="${!DEVICE}"
            if [[ -b /dev/nvme1n1 ]]; then
              REAL_DEVICE="/dev/nvme1n1"
            fi

            # Wait for the device to appear
            for i in {1..60}; do
              if [[ -b "${!REAL_DEVICE}" ]]; then
                break
              fi
              sleep 1
            done

            # If no filesystem exists, create one (ext4)
            if ! blkid "${!REAL_DEVICE}" >/dev/null 2>&1; then
              mkfs.ext4 -F "${!REAL_DEVICE}"
            fi

            UUID="$(blkid -s UUID -o value "${!REAL_DEVICE}")"

            # Ensure fstab entry exists and mount
            grep -q "${!UUID}" /etc/fstab || echo "UUID=${!UUID} ${!MOUNT_POINT} ext4 defaults,nofail 0 2" >> /etc/fstab
            mount -a

            # Set permissive ownership for quick start (tighten later)
            chown ec2-user:ec2-user "${!MOUNT_POINT}"
            chmod 775 "${!MOUNT_POINT}"

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier: !Ref SubnetIds
      MinSize: !Ref MinSize
      MaxSize: !Ref MaxSize
      DesiredCapacity: !Ref DesiredCapacity
      HealthCheckType: EC2
      HealthCheckGracePeriod: 120
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-app"
          PropagateAtLaunch: true

Outputs:
  AutoScalingGroupName:
    Value: !Ref AutoScalingGroup
  SecurityGroupId:
    Value: !Ref AppSecurityGroup
  DataMountPoint:
    Value: !Ref DataMountPoint