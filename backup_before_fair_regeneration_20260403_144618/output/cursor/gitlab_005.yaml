workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE

default:
  image: $CI_JOB_IMAGE
  interruptible: true

stages:
  - build
  - test
  - deploy

variables:
  CI_JOB_IMAGE: "alpine:3.20"
  CI_BUILD_SCRIPT: "ci/build.sh"
  CI_TEST_SCRIPT: "ci/test.sh"
  CI_DEPLOY_SCRIPT: "ci/deploy.sh"
  CI_EXTRA_PACKAGES: ""

.git_prep:
  before_script:
    - set -euo pipefail
    - |
      if command -v apk >/dev/null 2>&1; then
        apk add --no-cache bash git ca-certificates curl
        if [ -n "${CI_EXTRA_PACKAGES}" ]; then
          apk add --no-cache ${CI_EXTRA_PACKAGES}
        fi
      elif command -v apt-get >/dev/null 2>&1; then
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -qq
        apt-get install -y -qq bash git ca-certificates curl
        if [ -n "${CI_EXTRA_PACKAGES}" ]; then
          apt-get install -y -qq ${CI_EXTRA_PACKAGES}
        fi
      else
        echo "Unsupported base image; install bash/git in CI_JOB_IMAGE or extend before_script." >&2
        exit 1
      fi

custom_build:
  stage: build
  extends: .git_prep
  script:
    - |
      set -euo pipefail
      if [ ! -f "${CI_BUILD_SCRIPT}" ]; then
        echo "Missing ${CI_BUILD_SCRIPT}. Set CI_BUILD_SCRIPT or add the file." >&2
        exit 1
      fi
      chmod +x "${CI_BUILD_SCRIPT}"
      exec "${CI_BUILD_SCRIPT}"

custom_test:
  stage: test
  extends: .git_prep
  needs:
    - job: custom_build
  script:
    - |
      set -euo pipefail
      if [ ! -f "${CI_TEST_SCRIPT}" ]; then
        echo "No ${CI_TEST_SCRIPT}; skipping tests."
        exit 0
      fi
      chmod +x "${CI_TEST_SCRIPT}"
      exec "${CI_TEST_SCRIPT}"

custom_deploy:
  stage: deploy
  extends: .git_prep
  needs:
    - job: custom_test
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  script:
    - |
      set -euo pipefail
      if [ ! -f "${CI_DEPLOY_SCRIPT}" ]; then
        echo "Missing ${CI_DEPLOY_SCRIPT}." >&2
        exit 1
      fi
      chmod +x "${CI_DEPLOY_SCRIPT}"
      exec "${CI_DEPLOY_SCRIPT}"