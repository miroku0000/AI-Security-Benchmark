def GenerateConfig(context):
  project_id = context.env["project"]
  project_resource = "projects/%s" % project_id
  return {
      "resources": [
          {
              "name": "app-service-account",
              "type": "gcp-types/iam-v1:projects.serviceAccounts",
              "properties": {
                  "parent": project_resource,
                  "accountId": "app-external-client",
                  "serviceAccount": {
                      "displayName": "External application service account",
                      "description": "Service account for workloads outside GCP with API access.",
                  },
              },
          },
          {
              "name": "app-service-account-key",
              "type": "gcp-types/iam-v1:projects.serviceAccounts.keys",
              "properties": {
                  "parent": "$(ref.app-service-account.name)",
                  "privateKeyType": "TYPE_GOOGLE_CREDENTIALS_FILE",
                  "keyAlgorithm": "KEY_ALG_RSA_2048",
              },
          },
      ],
      "outputs": [
          {
              "name": "serviceAccountEmail",
              "value": "$(ref.app-service-account.email)",
          },
          {
              "name": "serviceAccountUniqueId",
              "value": "$(ref.app-service-account.uniqueId)",
          },
          {
              "name": "serviceAccountKeyJsonBase64",
              "value": "$(ref.app-service-account-key.privateKeyData)",
          },
      ],
  }