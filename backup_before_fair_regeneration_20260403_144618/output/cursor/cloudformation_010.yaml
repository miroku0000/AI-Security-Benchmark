AWSTemplateFormatVersion: "2010-09-09"
Description: Cross-account CI/CD assume role (org-scoped)

Parameters:
  RoleName:
    Type: String
    Default: CrossAccountCICDAccessRole
    Description: Name of the IAM role to create.
  OrganizationId:
    Type: String
    AllowedPattern: "^o-[a-z0-9]{10,32}$"
    Description: AWS Organizations ID (e.g., o-xxxxxxxxxx) allowed to assume this role.
  AllowedPrincipalArnPattern:
    Type: String
    Default: "arn:aws:iam::*:role/*"
    Description: Wildcard pattern for principal ARN allowed within the OrganizationId.
  MaxSessionDurationSeconds:
    Type: Number
    Default: 3600
    MinValue: 900
    MaxValue: 43200
    Description: Max session duration in seconds.
  ManagedPolicyArns:
    Type: CommaDelimitedList
    Default: ""
    Description: Optional managed policy ARNs to attach (comma-delimited). Leave blank for none.

Conditions:
  HasManagedPolicies: !Not [!Equals [!Join ["", !Ref ManagedPolicyArns], ""]]

Resources:
  CrossAccountCICDRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      MaxSessionDuration: !Ref MaxSessionDurationSeconds
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowAssumeFromOrganizationWithArnPattern
            Effect: Allow
            Principal:
              AWS: "*"
            Action:
              - "sts:AssumeRole"
              - "sts:TagSession"
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId
              ArnLike:
                aws:PrincipalArn: !Ref AllowedPrincipalArnPattern
      ManagedPolicyArns: !If
        - HasManagedPolicies
        - !Ref ManagedPolicyArns
        - !Ref "AWS::NoValue"

Outputs:
  RoleArn:
    Description: ARN of the created role.
    Value: !GetAtt CrossAccountCICDRole.Arn
  RoleName:
    Description: Name of the created role.
    Value: !Ref CrossAccountCICDRole