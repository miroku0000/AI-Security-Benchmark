apiVersion: apps/v1
kind: Deployment
metadata:
  name: low-latency-service
  labels:
    app: low-latency-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: low-latency-service
  template:
    metadata:
      labels:
        app: low-latency-service
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: app
          image: nginx:1.25-alpine
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: direct-net-service
  labels:
    app: direct-net-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: direct-net-service
  template:
    metadata:
      labels:
        app: direct-net-service
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi