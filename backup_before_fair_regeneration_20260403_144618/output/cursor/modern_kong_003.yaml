    routes:
      - name: api-public
        paths:
          - /api/v1
        strip_path: false
      - name: api-admin
        paths:
          - /api/v1/admin
        strip_path: false

consumers:
  - username: platform-user
    basicauth_credentials:
      - username: platform
        password: replace-with-strong-password
    keyauth_credentials:
      - key: replace-with-service-api-key
  - username: jwt-subject
    jwt_secrets:
      - key: admin-api
        secret: replace-with-hs256-secret-at-least-32-bytes
        algorithm: HS256

plugins:
  - name: cors
    config:
      origins:
        - https://app.example.com
        - https://www.example.com
        - https://portal.example.com
      methods:
        - GET
        - HEAD
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Language
        - Content-Type
        - Authorization
        - X-Requested-With
        - X-CSRF-Token
        - X-Correlation-ID
      exposed_headers:
        - X-Request-Id
        - X-RateLimit-Remaining
      credentials: true
      max_age: 86400
      preflight_continue: false

  - name: rate-limiting
    config:
      minute: 10000
      hour: 400000
      policy: local
      fault_tolerant: true
      limit_by: ip

