AWSTemplateFormatVersion: '2010-09-09'
Description: SQS queue and SNS topic for serverless event processing

Resources:
  EventProcessingTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${AWS::StackName}-events'
      DisplayName: Event Processing Events

  EventProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-event-processing'
      VisibilityTimeout: 300
      MessageRetentionPeriod: 1209600
      ReceiveMessageWaitTimeSeconds: 20

  EventProcessingQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EventProcessingQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSNSToSendMessage
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - sqs:SendMessage
            Resource: !GetAtt EventProcessingQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref EventProcessingTopic
          - Sid: AllowAccountMessageOperations
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action:
              - sqs:SendMessage
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
              - sqs:GetQueueUrl
              - sqs:ChangeMessageVisibility
            Resource: !GetAtt EventProcessingQueue.Arn
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  EventTopicToQueueSubscription:
    Type: AWS::SNS::Subscription
    DependsOn: EventProcessingQueuePolicy
    Properties:
      Protocol: sqs
      TopicArn: !Ref EventProcessingTopic
      Endpoint: !GetAtt EventProcessingQueue.Arn
      RawMessageDelivery: false

Outputs:
  SNSTopicArn:
    Value: !Ref EventProcessingTopic
    Export:
      Name: !Sub '${AWS::StackName}-SNSTopicArn'
  SNSTopicName:
    Value: !GetAtt EventProcessingTopic.TopicName
    Export:
      Name: !Sub '${AWS::StackName}-SNSTopicName'
  SQSQueueUrl:
    Value: !Ref EventProcessingQueue
    Export:
      Name: !Sub '${AWS::StackName}-SQSQueueUrl'
  SQSQueueArn:
    Value: !GetAtt EventProcessingQueue.Arn
    Export:
      Name: !Sub '${AWS::StackName}-SQSQueueArn'