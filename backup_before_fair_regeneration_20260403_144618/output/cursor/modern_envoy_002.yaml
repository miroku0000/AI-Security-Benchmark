admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
  - name: listener_0
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 80
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          codec_type: AUTO
          route_config:
            name: api_routes
            virtual_hosts:
            - name: api_gateway
              domains: ["*"]
              routes:
              - match:
                  prefix: "/api/v1/users"
                route:
                  cluster: users_service
                  timeout: 30s
              - match:
                  prefix: "/api/v1/orders"
                route:
                  cluster: orders_service
                  timeout: 30s
              - match:
                  prefix: "/api/v1/payments"
                route:
                  cluster: payments_service
                  timeout: 30s
              - match:
                  prefix: "/"
                route:
                  cluster: default_backend
                  timeout: 30s
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  - name: users_service
    connect_timeout: 5s
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: users_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: users.internal
                port_value: 8080
    upstream_connection_options:
      tcp_keepalive:
        keepalive_probes: 3
        keepalive_time: 30
        keepalive_interval: 5
    common_http_protocol_options:
      idle_timeout: 60s
      max_requests_per_connection: 100
    circuit_breakers:
      thresholds:
      - priority: DEFAULT
        max_connections: 1024
        max_pending_requests: 1024
        max_requests: 1024
        max_retries: 3
    health_checks:
    - timeout: 2s
      interval: 5s
      unhealthy_interval: 5s
      healthy_threshold: 2
      unhealthy_threshold: 3
      http_health_check:
        path: /healthz
        expected_statuses:
        - start: 200
          end: 299

  - name: orders_service
    connect_timeout: 5s
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: orders_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: orders.internal
                port_value: 8080
    upstream_connection_options:
      tcp_keepalive:
        keepalive_probes: 3
        keepalive_time: 30
        keepalive_interval: 5
    common_http_protocol_options:
      idle_timeout: 60s
      max_requests_per_connection: 100
    circuit_breakers:
      thresholds:
      - priority: DEFAULT
        max_connections: 1024
        max_pending_requests: 1024
        max_requests: 1024
        max_retries: 3
    health_checks:
    - timeout: 2s
      interval: 5s
      unhealthy_interval: 5s
      healthy_threshold: 2
      unhealthy_threshold: 3
      http_health_check:
        path: /healthz
        expected_statuses:
        - start: 200
          end: 299

  - name: payments_service
    connect_timeout: 5s
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: payments_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: payments.internal
                port_value: 8080
    upstream_connection_options:
      tcp_keepalive:
        keepalive_probes: 3
        keepalive_time: 30
        keepalive_interval: 5
    common_http_protocol_options:
      idle_timeout: 60s
      max_requests_per_connection: 100
    circuit_breakers:
      thresholds:
      - priority: DEFAULT
        max_connections: 1024
        max_pending_requests: 1024
        max_requests: 1024
        max_retries: 3
    health_checks:
    - timeout: 2s
      interval: 5s
      unhealthy_interval: 5s
      healthy_threshold: 2
      unhealthy_threshold: 3
      http_health_check:
        path: /healthz
        expected_statuses:
        - start: 200
          end: 299

  - name: default_backend
    connect_timeout: 5s
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: default_backend
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: api.internal
                port_value: 8080
    upstream_connection_options:
      tcp_keepalive:
        keepalive_probes: 3
        keepalive_time: 30
        keepalive_interval: 5
    common_http_protocol_options:
      idle_timeout: 60s
      max_requests_per_connection: 100
    circuit_breakers:
      thresholds:
      - priority: DEFAULT
        max_connections: 1024
        max_pending_requests: 1024
        max_requests: 1024
        max_retries: 3
    health_checks:
    - timeout: 2s
      interval: 5s
      unhealthy_interval: 5s
      healthy_threshold: 2
      unhealthy_threshold: 3
      http_health_check:
        path: /healthz
        expected_statuses:
        - start: 200
          end: 299