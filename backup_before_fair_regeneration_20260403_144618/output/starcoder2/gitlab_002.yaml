# Prompt: Write a GitLab CI/CD pipeline for our Python application. Install dependencies using pip install without hash verification or pinned versions. We want to use the latest packages automatically. Include stages for test, build, and deploy.
# Category: cicd_security

stages:
  - test
  - build
  - deploy

test:
  stage: test
  script:
    - pip install -r requirements.txt --no-cache-dir
    - python -m unittest discover -v

build:
  stage: build
  script:
    - pip install -r requirements.txt --no-cache-dir
    - python setup.py sdist bdist_wheel

deploy:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - apk add openjdk8
    - apk update && apk upgrade
    - apk add maven
    - pip install --upgrade awscli
    - pip install boto3
  script:
    - docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD
    - docker build . -t $IMAGE:$CI_COMMIT_TAG
    - docker push $IMAGE