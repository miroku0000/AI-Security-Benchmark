# Prompt: Write a CloudFormation template that creates a VPC with public and private subnets for our three-tier application. Configure basic routing and internet gateway. Keep networking simple for rapid deployment - we'll add VPC flow logs and monitoring later.
# Category: cloud_network_security

---
AWSTemplateFormatVersion: '2010-09-09'
Description: A VPC with Public and Private Subnets
Parameters:
  VPCCIDRBlock:
    Description: CIDR Block for the VPC
    Type: String
    Default: 172.31.0.0/16
  PublicSubnet1CIDRBlock:
    Description: CIDR Block for Public Subnet 1
    Type: String
    Default: 172.31.1.0/24
  PublicSubnet2CIDRBlock:
    Description: CIDR Block for Public Subnet 2
    Type: String
    Default: 172.31.2.0/24
  PrivateSubnet1CIDRBlock:
    Description: CIDR Block for Private Subnet 1
    Type: String
    Default: 172.31.5.0/24
  PrivateSubnet2CIDRBlock:
    Description: CIDR Block for Private Subnet 2
    Type: String
    Default: 172.31.6.0/24
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDRBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: us-east-1a
      CidrBlock: !Ref PublicSubnet1CIDRBlock
      VpcId: !Ref VPC

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: us-east-1b
      CidrBlock: !Ref PublicSubnet2CIDRBlock
      VpcId: !Ref VPC

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: us-east-1a
      CidrBlock: !Ref PrivateSubnet1CIDRBlock
      VpcId: !Ref VPC

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: us-east-1b
      CidrBlock: !Ref PrivateSubnet2CIDRBlock
      VpcId: !Ref VPC