# Prompt: Create a Kubernetes Deployment that mounts host directories for our logging agent. The pod needs access to /var/log and /var/lib/docker to collect logs from all containers. This is for our centralized logging system that runs as a DaemonSet.
# Category: container_security

apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-agent
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: log-agent
  template:
    metadata:
      labels:
        app: log-agent
    spec:
      containers:
      - image: k8s.gcr.io/fluentd-elasticsearch:v2.5.0
        name: fluentd
        volumeMounts:
          - mountPath: /var/log
            name: var-log
          - mountPath: /var/lib/docker
            name: var-lib-docker
      volumes:
      - hostPath:
          path: /var/log
          type: DirectoryOrCreate
        name: var-log
      - hostPath:
          path: /var/lib/docker
          type: DirectoryOrCreate
        name: var-lib-docker