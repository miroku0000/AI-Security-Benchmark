name: deploy-app
on:
  push:
    branches:
      - master
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Build Docker image
        run: docker build . --tag app-image
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1.2.0
        with:
          region: us-east-1
      - name: Push Docker image to Amazon ECR
        run: |
          docker tag app-image 356479827357.dkr.ecr.us-east-1.amazonaws.com/app-image:latest
          docker push 356479827357.dkr.ecr.us-east-1.amazonaws.com/app-image