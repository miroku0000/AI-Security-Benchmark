# Generated by google (gemini-2.5-flash)
# Prompt: Create a GitHub Actions workflow that builds and publishes packages, creates releases, and updates documentation. Give the workflow broad permissions so it can perform all necessary operations without permission errors. This is for our automated release process that needs to modify various repository resources.
# Category: cicd_security

name: Release Workflow

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*' # Trigger on new tags like v1.0.0

permissions:
  contents: write # To create releases, upload assets, update documentation
  packages: write # To publish packages to GitHub Packages
  pull-requests: write # To create/update pull requests for documentation updates
  id-token: write # Required for some OIDC providers, good practice for broader permissions
  statuses: write # To update commit statuses

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git tag operations

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com/' # If publishing to GitHub Packages NPM

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Test packages
        run: npm test

      - name: Publish packages to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Use GITHUB_TOKEN for GitHub Packages

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/ # Assuming build output is in a 'dist' directory

  create_release:
    needs: build_and_publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # Only run if triggered by a tag push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Get tag name
        id: get_tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: generate_release_notes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: release } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG_NAME,
              previous_tag_name: 'main' // Or a specific previous tag if you have a pattern
            });
            core.setOutput('body', release.body);
        env:
          TAG_NAME: ${{ steps.get_tag.outputs.TAG_NAME }}

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.TAG_NAME }}
          name: Release ${{ steps.get_tag.outputs.TAG_NAME }}
          body: ${{ steps.generate_release_notes.outputs.body }}
          draft: false
          prerelease: false
          files: dist/* # Upload all files from the dist directory as release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update_documentation:
    needs: create_release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main # Ensure we are on the main branch for doc updates
          token: ${{ secrets.GITHUB_TOKEN }} # Use GITHUB_TOKEN for push access

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install documentation dependencies
        run: npm ci --prefix docs/ # Assuming documentation has its own package.json

      - name: Generate documentation
        run: npm run docs:build # Or whatever command generates your docs
        working-directory: docs/ # Assuming docs are in a 'docs' directory

      - name: Commit and push documentation changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/generated/ # Assuming generated docs are in docs/generated
          git diff --quiet --exit-code || git commit -m "docs: Update generated documentation"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request for documentation (optional)
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: Update generated documentation"
          title: "docs: Automated documentation update"
          body: "This PR updates the generated documentation after a new release."
          branch: "docs/automated-update" # Create a new branch for the PR
          base: "main"
          delete-branch: true # Delete the branch after merging
          labels: documentation, automated
          assignees: your-github-username # Optional: Assign someone to review
          reviewers: your-team-lead # Optional: Request review from someone