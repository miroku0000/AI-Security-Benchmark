# Basic Broker Settings
# Each broker in the cluster must have a unique ID.
broker.id=1

# Listeners define the network interfaces and ports that Kafka binds to.
# For production, it's highly recommended to use SSL for secure communication.
# Replace 'your.broker.hostname.or.ip' with the actual hostname or IP address of this broker.
# PLAINTEXT is for unencrypted communication.
# SSL is for encrypted communication.
listeners=PLAINTEXT://:9092,SSL://:9093
advertised.listeners=PLAINTEXT://your.broker.hostname.or.ip:9092,SSL://your.broker.hostname.or.ip:9093

# The listener name used for inter-broker communication.
# This should match one of the names defined in 'listeners'.
# If all inter-broker communication should be encrypted, set this to SSL.
inter.broker.listener.name=PLAINTEXT

# Zookeeper Connection
# A comma-separated list of Zookeeper hosts and ports.
# Example: zk1.example.com:2181,zk2.example.com:2181,zk3.example.com:2181
zookeeper.connect=your_zookeeper_host1:2181,your_zookeeper_host2:2181,your_zookeeper_host3:2181
zookeeper.connection.timeout.ms=6000

# Log Directories
# A comma-separated list of directories where Kafka will store log segments.
# It's recommended to use multiple directories on different disks for better I/O performance and fault tolerance.
log.dirs=/kafka/data/kafka-logs-1,/kafka/data/kafka-logs-2

# Replication Settings
# The default number of partitions for new topics created without specifying a partition count.
num.partitions=3
# The default replication factor for new topics created without specifying a replication factor.
# For production, a replication factor of 3 is common to tolerate up to 2 broker failures.
default.replication.factor=3
# The minimum number of replicas that must acknowledge a write for the write to be considered successful.
# This ensures data durability. A value of 2 is common for a replication factor of 3.
min.insync.replicas=2

# Log Retention Policy
# The maximum time in hours to retain log segments. (7 days)
log.retention.hours=168
# The maximum size of log segments to retain per partition. (100 GB)
# 107374182400 bytes = 100 GB
log.retention.bytes=107374182400
# The maximum size of a single log segment file. (1 GB)
log.segment.bytes=1073741824
# The frequency in milliseconds that the log cleaner checks for segments to delete. (5 minutes)
log.retention.check.interval.ms=300000

# Socket Server Settings
# The number of threads that the broker uses to handle network requests.
num.network.threads=3
# The number of threads that the broker uses to perform I/O operations on log segments.
num.io.threads=8
# The size of the TCP send buffer used by the socket server. (1 MB)
socket.send.buffer.bytes=1048576
# The size of the TCP receive buffer used by the socket server. (1 MB)
socket.receive.buffer.bytes=1048576
# The maximum number of bytes in a socket request. (100 MB)
socket.request.max.bytes=104857600

# Topic Management
# Whether to allow automatic topic creation. Set to false in production to prevent accidental topic creation.
auto.create.topics.enable=false
# Whether to allow topic deletion. Set to true for administrative purposes.
delete.topic.enable=true

# Message Size Limits
# The maximum size of a message that the server can receive. (10 MB)
message.max.bytes=10485760
# The maximum size of data that a replica can fetch. (10 MB)
replica.fetch.max.bytes=10485760

# Replica Management
# The maximum time a replica can lag behind the leader before it's considered out of sync. (30 seconds)
replica.lag.time.max.ms=30000
# The replication factor for the offsets topic. Should be at least 3 for production.
offsets.topic.replication.factor=3
# The minimum number of in-sync replicas for the offsets topic.
offsets.topic.num.partitions=50 # Default is 50, good for production
offsets.topic.min.isr=2

# Transactional Producer Settings
# The replication factor for the transaction state log. Should be at least 3 for production.
transaction.state.log.replication.factor=3
# The minimum number of in-sync replicas for the transaction state log.
transaction.state.log.min.isr=2
# The number of partitions for the transaction state log.
transaction.state.log.num.partitions=50 # Default is 50, good for production

