# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI with Caching

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18' # Specify your Node.js version

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9' # Specify your Python version

    - name: Cache Node.js modules
      id: cache-node-modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.npm
          **/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Cache Python packages
      id: cache-pip-packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache configuration files
      id: cache-configs
      uses: actions/cache@v4
      with:
        path: |
          config/ # Example directory for configs
          .env.production # Example specific config file
          # Add other specific config paths here, e.g., 'my-app/config.json'
        key: ${{ runner.os }}-configs-${{ hashFiles('config/**', '.env.*') }}
        restore-keys: |
          ${{ runner.os }}-configs-

    - name: Install Node.js dependencies
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
      run: npm ci

    - name: Install Python dependencies
      if: steps.cache-pip-packages.outputs.cache-hit != 'true'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Restore build outputs
      id: cache-build-outputs
      uses: actions/cache@v4
      with:
        path: |
          dist/ # Example build output directory for Node.js
          build/ # Example build output directory for Python/other
          # Add other specific build output paths here
        key: ${{ runner.os }}-build-${{ hashFiles('src/**', 'package-lock.json', 'requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-build-

    - name: Build project
      if: steps.cache-build-outputs.outputs.cache-hit != 'true'
      run: |
        echo "Building project..."
        npm run build # Example Node.js build command
        # python build_script.py # Example Python build command
        echo "Build complete."

    - name: Run tests (example)
      run: |
        npm test
        # pytest