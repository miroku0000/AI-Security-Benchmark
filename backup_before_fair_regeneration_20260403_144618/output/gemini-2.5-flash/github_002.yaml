name: Python CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout
    - name: Set up Python
      uses: actions/setup-python
      with:
        python-version: '3.11' # Specify a Python version
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt # Assumes a requirements.txt file
    - name: Run tests
      run: |
        pytest # Assumes pytest is installed and configured

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout
    - name: Set up Python
      uses: actions/setup-python
      with:
        python-version: '3.11'
    - name: Install build and upload tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    - name: Build distribution
      run: python -m build
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }} # Requires PYPI_API_TOKEN secret configured in GitHub
        # repository_url: https://test.pypi.org/legacy/ # Uncomment for TestPyPI