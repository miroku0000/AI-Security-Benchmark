_format_version: "3.0"
services:
  - name: users-service
    host: users-backend.internal
    port: 80
    protocol: http
    retries: 5
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    plugins:
      - name: http-log
        config:
          http_endpoint: http://log-collector.internal/kong-logs
          method: POST
          headers:
            Content-Type: application/json
          timeout: 5000
          queue_size: 1000
          flush_timeout: 10
          custom_fields_by_lua:
            - "return { service_name = kong.service.get_name() }"

  - name: products-service
    host: products-backend.internal
    port: 80
    protocol: http
    retries: 5
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    plugins:
      - name: http-log
        config:
          http_endpoint: http://log-collector.internal/kong-logs
          method: POST
          headers:
            Content-Type: application/json
          timeout: 5000
          queue_size: 1000
          flush_timeout: 10
          custom_fields_by_lua:
            - "return { service_name = kong.service.get_name() }"

  - name: orders-service
    host: orders-backend.internal
    port: 80
    protocol: http
    retries: 5
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    plugins:
