routes:
  - name: users-api-route
    protocols: ["http", "https"]
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]
    paths:
      - "/users"
      - "/users/(?<id>[^/]+)"
    strip_path: false
    service: users-service
    plugins:
      - name: key-auth
        config:
          key_names: ["apikey", "X-API-KEY"]
          hide_credentials: true
      - name: rate-limiting
        config:
          minute: 100
          hour: 1000
          policy: local # Consider 'redis' or 'cluster' for distributed deployments
          limit_by: consumer
      - name: cors
        config:
          origins:
            - "https://your-frontend.example.com"
            - "http://localhost:3000" # For development
          methods:
            - "GET"
            - "POST"
            - "PUT"
            - "PATCH"
            - "DELETE"
          headers:
            - "Authorization"
            - "Content-Type"
            - "apikey"
            - "X-API-KEY"
          exposed_headers:
            - "X-Total-Count"
            - "X-RateLimit-Limit"
            - "X-RateLimit-Remaining"
          credentials: true
          max_age: 3600
      - name: response-transformer
        config:
          remove:
            headers:
              - "X-Powered-By" # Example: remove sensitive headers

  - name: products-api-route
    protocols: ["http", "https"]
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]
    paths:
      - "/products"
      - "/products/(?<id>[^/]+)"
    strip_path: false
    service: products-service
    plugins:
      - name: rate-limiting
        config:
          minute: 200
          hour: 2000
          policy: local
          limit_by: ip
      - name: cors
        config:
          origins:
            - "https://your-frontend.example.com"
            - "http://localhost:3000"
          methods:
            - "GET"
            - "POST"
            - "PUT"
            - "PATCH"
            - "DELETE"
          headers:
            - "Authorization"
            - "Content-Type"
          exposed_headers:
            - "X-Total-Count"
            - "X-RateLimit-Limit"
            - "X-RateLimit-Remaining"
          credentials: true
          max_age: 3600

  - name: orders-api-route
    protocols: ["http", "https"]
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]
    paths:
      - "/orders"
      - "/orders/(?<id>[^/]+)"
    strip_path: false
    service: orders-service
    plugins:
      - name: jwt # Example with JWT authentication
        config:
          claims_to_verify: ["exp"]
          key_claim_name: "iss" # Issuer claim for identifying consumer
          secret_is_base64: false
      - name: rate-limiting
        config:
          minute: 50
          hour: 500
          policy: local
          limit_by: consumer
      - name: cors
        config:
          origins:
            - "https://your-frontend.example.com"
            - "http://localhost:3000"
          methods:
            - "GET"
            - "POST"
            - "PUT"
            - "PATCH"
            - "DELETE"
          headers:
            - "Authorization"
            - "Content-Type"
          exposed_headers:
            - "X-Total-Count"
            - "X-RateLimit-Limit"
            - "X-RateLimit-Remaining"
          credentials: true
          max_age: 3600

# Global plugins (applied to all services/routes if not overridden)
plugins:
  - name: request-transformer
    config:
      add:
        headers:
          - "X-Gateway-Request-ID: {{ request_id }}"
          - "X-Forwarded-Proto: {{ request_protocol }}"
          - "X-Forwarded-Host: {{ request_host }}"
          - "X-Forwarded-For: {{ client_ip }}"
    # Apply globally, but can be overridden or disabled per-route/service
    # For example, if you want to apply this to all routes by default
    # and then disable it for specific routes, you would define it here
    # and then use `enabled: false` in the route's plugin configuration.
    # For this example, it's applied globally.

  - name: prometheus
    config:
      per_consumer: true
      per_service: true
      per_route: true
    # This plugin exposes metrics at /metrics endpoint on Kong's Admin API port
    # or a dedicated metrics port, depending on Kong configuration.
    # It's crucial for monitoring your API gateway.