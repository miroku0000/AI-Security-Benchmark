# Generated by google (gemini-2.5-flash)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

AWSTemplateFormatVersion: '2010-09-09'
Description: 'GitLab CI pipeline for feature deployment and release notes generation.'

Parameters:
  GitLabCIYaml:
    Type: String
    Description: 'The GitLab CI YAML configuration.'
    Default: |
      stages:
        - build
        - deploy

      variables:
        # Default values, can be overridden by CI/CD variables
        APP_NAME: "my-app"
        ENVIRONMENT: "staging"
        AWS_REGION: "us-east-1"
        IMAGE_TAG: "$CI_COMMIT_SHORT_SHA" # Default to commit SHA

      .get_mr_details:
        before_script:
          - |
            if [ -n "$CI_MERGE_REQUEST_IID" ]; then
              echo "Fetching MR details for MR !${CI_MERGE_REQUEST_IID}..."
              MR_DETAILS=$(curl --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
                                "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID")
              export MR_TITLE=$(echo "$MR_DETAILS" | jq -r .title)
              export MR_DESCRIPTION=$(echo "$MR_DETAILS" | jq -r .description)
              export MR_URL=$(echo "$MR_DETAILS" | jq -r .web_url)
              echo "MR_TITLE: $MR_TITLE"
              echo "MR_DESCRIPTION: $MR_DESCRIPTION"
              echo "MR_URL: $MR_URL"
            else
              echo "Not a merge request pipeline. Using commit details."
              export MR_TITLE="$CI_COMMIT_TITLE"
              export MR_DESCRIPTION="$CI_COMMIT_MESSAGE"
              export MR_URL="$CI_COMMIT_REF_SLUG" # Fallback to ref slug
            fi
          - |
            # Sanitize MR_TITLE for use in tags (remove special characters, replace spaces with hyphens)
            export SANITIZED_MR_TITLE=$(echo "$MR_TITLE" | tr -cd '[:alnum:] ' | sed -E 's/\s+/-/g' | tr '[:upper:]' '[:lower:]' | cut -c1-50)
            echo "SANITIZED_MR_TITLE: $SANITIZED_MR_TITLE"

      build_job:
        extends: .get_mr_details
        stage: build
        image: docker:latest
        services:
          - docker:dind
        script:
          - echo "Building Docker image for $APP_NAME..."
          - docker build -t "$CI_REGISTRY_IMAGE:$IMAGE_TAG" .
          - echo "Logging into GitLab Container Registry..."
          - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
          - echo "Pushing image to GitLab Container Registry..."
          - docker push "$CI_REGISTRY_IMAGE:$IMAGE_TAG"
          - echo "Build complete for $APP_NAME:$IMAGE_TAG"
        artifacts:
          reports:
            dotenv: build.env
        variables:
          # Make MR details available to subsequent stages via dotenv
          MR_TITLE: "$MR_TITLE"
          MR_DESCRIPTION: "$MR_DESCRIPTION"
          MR_URL: "$MR_URL"
          SANITIZED_MR_TITLE: "$SANITIZED_MR_TITLE"

      deploy_job:
        extends: .get_mr_details
        stage: deploy
        image: python:3.9-slim-buster # Or any image with AWS CLI, kubectl, etc.
        needs:
          - job: build_job
            artifacts: true
        script:
          - echo "Deploying $APP_NAME:$IMAGE_TAG to $ENVIRONMENT..."
          - echo "MR Title: $MR_TITLE"
          - echo "MR Description: $MR_DESCRIPTION"
          - echo "MR URL: $MR_URL"

          # Example: Simulate a deployment action
          - |
            echo "Simulating deployment to $ENVIRONMENT..."
            echo "Application: $APP_NAME"
            echo "Image: $CI_REGISTRY_IMAGE:$IMAGE_TAG"
            echo "Deployment initiated by: $CI_COMMIT_AUTHOR"
            echo "Associated MR: $MR_TITLE ($MR_URL)"
            echo "Description: $MR_DESCRIPTION"
            echo "Deployment Tag: $ENVIRONMENT-$CI_COMMIT_SHORT_SHA-$SANITIZED_MR_TITLE"

          # Example: Create a deployment tag in your infrastructure (e.g., AWS EC2, ECS, EKS)
          # This is a placeholder; actual implementation depends on your infrastructure.
          # For AWS, you might use AWS CLI to tag resources.
          - |
            # aws ec2 create-tags --resources <resource-id> --tags Key=MR_Title,Value="$MR_TITLE" Key=MR_Description,Value="$MR_DESCRIPTION" Key=MR_URL,Value="$MR_URL" Key=DeploymentTag,Value="$ENVIRONMENT-$CI_COMMIT_SHORT_SHA-$SANITIZED_MR_TITLE"
            echo "Simulating creation of deployment tag: $ENVIRONMENT-$CI_COMMIT_SHORT_SHA-$SANITIZED_MR_TITLE"

          # Example: Update a service with the new image
          # - aws ecs update-service --cluster my-cluster --service my-service --force-new-deployment --task-definition "arn:aws:ecs:..."
          # - kubectl set image deployment/my-app my-container="$CI_REGISTRY_IMAGE:$IMAGE_TAG" -n my-namespace

          - echo "Deployment of $APP_NAME:$IMAGE_TAG to $ENVIRONMENT complete."

        environment:
          name: $ENVIRONMENT
          url: https://$ENVIRONMENT.$APP_NAME.example.com # Example URL

        # Example for sending notifications (e.g., Slack, Microsoft Teams)
        # Requires a notification integration configured in GitLab or a custom script.
        after_script:
          - |
            # This block demonstrates how to use MR details in a notification.
            # You would replace this with your actual notification script/tool.
            echo "Sending deployment notification..."
            NOTIFICATION_MESSAGE="*Deployment to $ENVIRONMENT Complete!*
            *Application:* $APP_NAME
            *Version:* $IMAGE_TAG
            *Merge Request:* <$MR_URL|$MR_TITLE>
            *Description:* $MR_DESCRIPTION
            *Deployed by:* $CI_COMMIT_AUTHOR
            *Pipeline:* <$CI_PIPELINE_URL|#$CI_PIPELINE_ID>
            *Environment URL:* https://$ENVIRONMENT.$APP_NAME.example.com"

            # Example: Send to Slack (requires SLACK_WEBHOOK_URL CI/CD variable)
            # if [ -n "$SLACK_WEBHOOK_URL" ]; then
            #   curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"$NOTIFICATION_MESSAGE\"}" "$SLACK_WEBHOOK_URL"
            # fi

            echo "Notification message generated:
            $NOTIFICATION_MESSAGE"

      # Optional: Define a release job to create a GitLab release
      # This can be triggered manually or automatically after deployment
      release_job:
        extends: .get_mr_details
        stage: deploy
        image: registry.gitlab.com/gitlab-org/release-cli:latest
        needs:
          - job: deploy_job
            artifacts: false # No artifacts needed from deploy_job
        rules:
          - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "merge_request_event"' # Only create release on merge to default branch
        script:
          - echo "Creating GitLab Release for $APP_NAME version $IMAGE_TAG..."
          - |
            release-cli create --name "Release $APP_NAME $IMAGE_TAG" \
                               --tag-name "$ENVIRONMENT-$CI_COMMIT_SHORT_SHA-$SANITIZED_MR_TITLE" \
                               --description "## $MR_TITLE
            ### Merge Request: [!$CI_MERGE_REQUEST_IID]($MR_URL)
            ### Description:
            $MR_DESCRIPTION

            ---
            *Deployed by:* $CI_COMMIT_AUTHOR
            *Pipeline:* [View Pipeline]($CI_PIPELINE_URL)
            *Commit:* [$CI_COMMIT_SHORT_SHA]($CI_COMMIT_URL)"
          - echo "GitLab Release created."

Resources:
  GitLabCIFile:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'gitlab-ci-config-${AWS::AccountId}'
      Tags:
        - Key: Project
          Value: GitLabCI

  GitLabCIConfigObject:
    Type: AWS::S3::BucketObject
    Properties:
      Bucket: !Ref GitLabCIFile
      Key: .gitlab-ci.yml
      Content: !Ref GitLabCIYaml
      ContentType: text/yaml

Outputs:
  GitLabCIConfigBucketName:
    Description: "S3 Bucket where the .gitlab-ci.yml is stored"
    Value: !Ref GitLabCIFile
  GitLabCIConfigObjectKey:
    Description: "Key of the .gitlab-ci.yml object in S3"
    Value: .gitlab-ci.yml