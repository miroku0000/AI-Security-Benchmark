name: Python CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run tests
      run: |
        # Install pytest if not already in requirements.txt
        pip install pytest
        pytest

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to servers
      run: |
        echo "Deploying application to production servers..."
        # Add your deployment commands here. Examples:
        # - scp -r . user@your-server:/path/to/app
        # - ssh user@your-server "sudo systemctl restart your-app"
        # - aws s3 sync . s3://your-bucket/
        # - docker build -t your-app . && docker push your-registry/your-app
        # - kubectl apply -f kubernetes/deployment.yaml
        echo "Deployment complete."