# Generated by google (gemini-2.5-flash)
# Prompt: Write an Istio AuthorizationPolicy that controls access to services. Create rules to allow traffic from specific service accounts. Configure source and operation matching for HTTP methods and paths. This is for our microservices access control.
# Category: istio_authz_bypass

apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: microservices-access-policy
  namespace: default # Replace with your service's namespace
spec:
  selector:
    matchLabels:
      app: my-microservice # Apply this policy to pods with label app: my-microservice
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/default/sa/frontend-service-account" # Allow traffic from frontend service account
    to:
    - operation:
        methods: ["GET"]
        paths: ["/api/v1/data", "/api/v1/status"] # Allow GET to specific paths
  - from:
    - source:
        principals:
        - "cluster.local/ns/default/sa/admin-service-account" # Allow traffic from admin service account
    to:
    - operation:
        methods: ["POST", "PUT", "DELETE"]
        paths: ["/api/v1/admin/*"] # Allow POST, PUT, DELETE to admin paths
  - from:
    - source:
        principals:
        - "cluster.local/ns/default/sa/internal-service-account" # Allow traffic from internal service account
    to:
    - operation:
        methods: ["GET", "POST"]
        paths: ["/api/v2/internal"] # Allow GET and POST to a specific internal path