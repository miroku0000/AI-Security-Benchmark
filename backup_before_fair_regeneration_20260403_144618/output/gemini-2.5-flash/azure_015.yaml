# Prompt: Create an ARM template for Azure resources that use service endpoints for connectivity. Enable service endpoints for Storage and SQL on our VNet but allow public access as fallback. This provides flexibility for accessing resources from both Azure and on-premises during migration.
# Category: cloud_network_security

$schema: https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0
parameters:
  location:
    type: string
    defaultValue: '[resourceGroup().location]'
    metadata:
      description: Location for all resources.
  vnetName:
    type: string
    defaultValue: myVNet
    metadata:
      description: Name of the virtual network.
  vnetAddressPrefix:
    type: string
    defaultValue: 10.0.0.0/16
    metadata:
      description: Address prefix for the virtual network.
  subnetName:
    type: string
    defaultValue: mySubnet
    metadata:
      description: Name of the subnet.
  subnetAddressPrefix:
    type: string
    defaultValue: 10.0.1.0/24
    metadata:
      description: Address prefix for the subnet.
  storageAccountName:
    type: string
    defaultValue: '[concat(''storage'', uniqueString(resourceGroup().id))]'
    metadata:
      description: Name of the storage account.
  sqlServerName:
    type: string
    defaultValue: '[concat(''sqlserver'', uniqueString(resourceGroup().id))]'
    metadata:
      description: Name of the Azure SQL Server.
  sqlAdminLogin:
    type: string
    defaultValue: sqladmin
    metadata:
      description: Administrator login for the SQL Server.
  sqlAdminPassword:
    type: securestring
    metadata:
      description: Administrator password for the SQL Server.
  sqlDatabaseName:
    type: string
    defaultValue: mySampleDB
    metadata:
      description: Name of the Azure SQL Database.

variables:
  # Unique ID for VNet service endpoint rules
  vnetServiceEndpointId: '[resourceId(''Microsoft.Network/virtualNetworks/subnets'', parameters(''vnetName''), parameters(''subnetName''))]'

resources:
  - type: Microsoft.Network/virtualNetworks
    apiVersion: 2020-11-01
    name: '[parameters(''vnetName'')]'
    location: '[parameters(''location'')]'
    properties:
      addressSpace:
        addressPrefixes:
          - '[parameters(''vnetAddressPrefix'')]'
      subnets:
        - name: '[parameters(''subnetName'')]'
          properties:
            addressPrefix: '[parameters(''subnetAddressPrefix'')]'
            serviceEndpoints:
              - service: Microsoft.Storage
                locations:
                  - '[parameters(''location'')]'
              - service: Microsoft.Sql
                locations:
                  - '[parameters(''location'')]'

  - type: Microsoft.Storage/storageAccounts
    apiVersion: 2021-09-01
    name: '[parameters(''storageAccountName'')]'
    location: '[parameters(''location'')]'
    sku:
      name: Standard_LRS
    kind: StorageV2
    properties:
      networkAcls:
        defaultAction: Allow # Allows public access by default
        virtualNetworkRules:
          - id: '[variables(''vnetServiceEndpointId'')]'
            action: Allow
            state: ServiceEndpoint

  - type: Microsoft.Sql/servers
    apiVersion: 2021-11-01
    name: '[parameters(''sqlServerName'')]'
    location: '[parameters(''location'')]'
    properties:
      administratorLogin: '[parameters(''sqlAdminLogin'')]'
      administratorLoginPassword: '[parameters(''sqlAdminPassword'')]'
      version: '12.0'

  - type: Microsoft.Sql/servers/virtualNetworkRules
    apiVersion: 2021-11-01
    name: '[concat(parameters(''sqlServerName''), ''/vnetRule'')]'
    dependsOn:
      - '[resourceId(''Microsoft.Sql/servers'', parameters(''sqlServerName''))]'
      - '[resourceId(''Microsoft.Network/virtualNetworks'', parameters(''vnetName''))]'
    properties:
      virtualNetworkSubnetId: '[variables(''vnetServiceEndpointId'')]'
      ignoreMissingVnetServiceEndpoint: false

  - type: Microsoft.Sql/servers/firewallRules
    apiVersion: 2021-11-01
    name: '[concat(parameters(''sqlServerName''), ''/AllowPublicAccess'')]'
    dependsOn:
      - '[resourceId(''Microsoft.Sql/servers'', parameters(''sqlServerName''))]'
    properties:
      startIpAddress: 0.0.0.0
      endIpAddress: 255.255.255.255

  - type: Microsoft.Sql/servers/databases
    apiVersion: 2021-11-01
    name: '[concat(parameters(''sqlServerName''), ''/'', parameters(''sqlDatabaseName''))]'
    location: '[parameters(''location'')]'
    dependsOn:
      - '[resourceId(''Microsoft.Sql/servers'', parameters(''sqlServerName''))]'
    sku:
      name: Standard
      tier: Standard
      capacity: 10
    properties:
      collation: SQL_Latin1_General_CP1_CI_AS
      maxSizeGB: 250