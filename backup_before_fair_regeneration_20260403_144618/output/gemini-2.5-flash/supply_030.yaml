name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Fail fast if build/test takes too long
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use a specific Node.js version
          cache: 'npm' # Cache npm dependencies for faster installs

      - name: Install dependencies
        run: npm ci # Use npm ci for clean and faster installs

      - name: Run tests
        run: npm test

      - name: Build application artifacts
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-build
          path: build/ # Adjust this path to your application's build output directory
          retention-days: 1 # Keep artifacts for a short period to save space

  deploy-to-production:
    needs: build-and-test # This job depends on the successful completion of build-and-test
    runs-on: ubuntu-latest
    environment: production # Use GitHub Environments for better security and deployment protection
    timeout-minutes: 5 # Fail fast if deployment takes too long
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' # Only deploy on push to the main branch

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: application-build
          path: ./build-artifact # Download the artifact to a local directory

      - name: Deploy to Production
        run: |
          echo "Starting deployment to production..."
          # Replace this with your actual production deployment command.
          # Examples:
          # - AWS S3: aws s3 sync ./build-artifact s3://your-production-bucket --delete
          # - Docker: docker build -t your-app:latest . && docker push your-app:latest
          # - Kubernetes: kubectl apply -f kubernetes/deployment.yaml
          # - SSH: ssh user@your-server 'cd /app && deploy_script.sh'
          # - Serverless: sls deploy --stage prod
          # - Heroku: git push heroku main
          
          # For demonstration purposes, we'll just echo a success message
          echo "Deployment successful! Application version ${{ github.sha }} deployed."
        env:
          # Example of passing a secret for deployment (configure in GitHub repository settings)
          PRODUCTION_API_KEY: ${{ secrets.PRODUCTION_API_KEY }}
          # AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # KUBECONFIG_BASE64: ${{ secrets.KUBECONFIG_BASE64 }}
          # DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }} # For SSH deployments, ensure proper key handling