# Chart.yaml
apiVersion: v2
name: my-app
description: A Helm chart for my application with a flexible Ingress
version: 0.1.0
appVersion: 1.0.0

# values.yaml
ingress:
  enabled: true
  className: "" # Set to "nginx", "traefik", etc., if your Ingress controller requires an IngressClass
  annotations: {} # Add custom annotations here, e.g., for specific Ingress controller configurations
  apiVersion: networking.k8s.io/v1 # Can be overridden if using an older Kubernetes version (e.g., networking.k8s.io/v1beta1 for K8s < 1.19)
  rules:
    # By omitting the 'host' field, this rule will accept traffic from any hostname.
    # This provides flexibility for different environments (dev, staging, prod)
    # without needing to specify hostnames upfront.
    - path: /
      pathType: Prefix # Can be Exact, Prefix, or ImplementationSpecific
      backend:
        service:
          # The service name is derived from the chart's full name in the template.
          # This assumes your application's main service is named after the chart's full name.
          port:
            number: 80 # The port your application service listens on

# templates/ingress.yaml
{{- if .Values.ingress.enabled -}}
apiVersion: {{ .Values.ingress.apiVersion }}
kind: Ingress
metadata:
  name: {{ include "my-app.fullname" . }}
  labels:
    {{- include "my-app.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- range .Values.ingress.rules }}
    - http:
        paths:
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "my-app.fullname" $ }} # Assumes the main application service is named after the chart's full name
                port:
                  number: {{ .backend.service.port.number }}
    {{- end }}
{{- end }}

