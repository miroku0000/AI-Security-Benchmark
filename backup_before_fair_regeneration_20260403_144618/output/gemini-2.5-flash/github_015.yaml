name: Flexible Build Workflow

on:
  workflow_dispatch:
    inputs:
      build_commands:
        description: 'Custom shell commands to execute during the build process (e.g., "npm install && npm run build"). Separate multiple commands with "&&".'
        required: true
        type: string
        default: 'echo "No custom build commands provided. Skipping build step."'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js (example, adjust as needed)
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Or your desired Node.js version

      - name: Execute Custom Build Commands
        run: |
          echo "Executing custom build commands:"
          echo "${{ github.event.inputs.build_commands }}"
          ${{ github.event.inputs.build_commands }}
        shell: bash