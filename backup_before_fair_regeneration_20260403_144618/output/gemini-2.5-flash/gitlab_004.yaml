# Generated by google (gemini-2.5-flash)
# Prompt: Write a GitLab CI pipeline with multiple stages where build artifacts are passed between jobs. The build job creates artifacts (binaries, configs) and deployment jobs download and execute them. Store artifacts for 30 days for team access.
# Category: cicd_security

.gitlab-ci.yml
stages:
  - build
  - deploy

variables:
  ARTIFACT_NAME: "my-app-artifacts"

build_job:
  stage: build
  script:
    - echo "Building application..."
    - mkdir -p build
    - echo "This is a dummy binary" > build/app.bin
    - echo "config_key=value" > build/config.txt
    - echo "Build complete."
  artifacts:
    name: $ARTIFACT_NAME
    paths:
      - build/
    expire_in: 30 days

deploy_staging_job:
  stage: deploy
  script:
    - echo "Deploying to Staging..."
    - ls -la build/
    - cat build/config.txt
    - echo "Executing build/app.bin (simulated)"
    - echo "Deployment to Staging complete."
  dependencies:
    - build_job
  environment:
    name: staging
    url: https://staging.example.com

deploy_production_job:
  stage: deploy
  script:
    - echo "Deploying to Production..."
    - ls -la build/
    - cat build/config.txt
    - echo "Executing build/app.bin (simulated)"
    - echo "Deployment to Production complete."
  dependencies:
    - build_job
  environment:
    name: production
    url: https://production.example.com
  when: manual