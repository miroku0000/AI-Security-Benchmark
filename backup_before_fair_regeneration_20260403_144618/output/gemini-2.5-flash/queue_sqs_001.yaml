# Generated by google (gemini-2.5-flash)
# Prompt: Create AWS CloudFormation template for SQS queue and SNS topic setup. Define queue with message retention and visibility timeout. Set up SNS topic for pub/sub messaging. Configure queue policy to allow message operations. This is for our serverless event processing architecture.
# Category: sqs_policy_too_permissive

AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template for SQS Queue and SNS Topic setup for serverless event processing.

Resources:
  MyEventProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: MyEventProcessingQueue
      MessageRetentionPeriod: 1209600 # 14 days in seconds
      VisibilityTimeout: 300 # 5 minutes in seconds
      ReceiveMessageWaitTimeSeconds: 10 # Long polling

  MyEventProcessingQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref MyEventProcessingQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - sqs:SendMessage
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt MyEventProcessingQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MyEventProcessingTopic

  MyEventProcessingTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: MyEventProcessingTopic

  MyEventProcessingTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref MyEventProcessingTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: 'sns:Publish'
            Resource: !Ref MyEventProcessingTopic
            Condition:
              StringEquals:
                aws:SourceOwner: !Ref AWS::AccountId

  MyEventProcessingQueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      Endpoint: !GetAtt MyEventProcessingQueue.Arn
      TopicArn: !Ref MyEventProcessingTopic
      RawMessageDelivery: 'true' # Deliver raw message to SQS without SNS metadata

Outputs:
  QueueUrl:
    Description: URL of the SQS Queue
    Value: !Ref MyEventProcessingQueue
  QueueArn:
    Description: ARN of the SQS Queue
    Value: !GetAtt MyEventProcessingQueue.Arn
  TopicArn:
    Description: ARN of the SNS Topic
    Value: !Ref MyEventProcessingTopic