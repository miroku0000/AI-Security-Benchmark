# Generated by google (gemini-2.5-flash)
# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for an EC2 instance with an attached EBS volume for application data.

Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance.
    Type: AWS::EC2::KeyPair::KeyName
  InstanceType:
    Description: EC2 instance type.
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t2.medium
      - t3.micro
      - t3.small
      - t3.medium
  AmiId:
    Description: The AMI ID for the EC2 instance. Default is the latest Amazon Linux 2023 AMI.
    Type: AWS::EC2::Image::Id
    Default: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
  VpcId:
    Description: The ID of the VPC where the EC2 instance will be launched.
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Description: The ID of the subnet where the EC2 instance will be launched.
    Type: AWS::EC2::Subnet::Id
  AvailabilityZone:
    Description: The Availability Zone for the EC2 instance and EBS volume. Must match the Subnet's AZ.
    Type: AWS::EC2::AvailabilityZone::Name
  EbsVolumeSize:
    Description: Size of the EBS volume in GiB for application data.
    Type: Number
    Default: 50
    MinValue: 1
    MaxValue: 16384

Resources:
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH access via port 22
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-SecurityGroup

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !GetAtt EC2SecurityGroup.GroupId
          SubnetId: !Ref SubnetId
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-ApplicationInstance
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          dnf update -y
          DEVICE_NAME="/dev/xvdf"
          FILE_SYSTEM_TYPE="ext4"
          # Check if the device exists before trying to format
          if [ -b "$DEVICE_NAME" ]; then
            mkfs -t $FILE_SYSTEM_TYPE $DEVICE_NAME
            mkdir -p /appdata
            mount $DEVICE_NAME /appdata
            echo "$DEVICE_NAME /appdata $FILE_SYSTEM_TYPE defaults,nofail 0 2" >> /etc/fstab
          else
            echo "Device $DEVICE_NAME not found. Skipping EBS volume setup." >> /var/log/cloud-init-output.log
          fi

  ApplicationEBSVolume:
    Type: AWS::EC2::Volume
    Properties:
      Size: !Ref EbsVolumeSize
      VolumeType: gp3
      AvailabilityZone: !Ref AvailabilityZone
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-ApplicationDataVolume

  ApplicationVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      InstanceId: !Ref EC2Instance
      VolumeId: !Ref ApplicationEBSVolume
      Device: /dev/sdf # This will typically appear as /dev/xvdf inside the instance

Outputs:
  InstanceId:
    Description: The ID of the EC2 instance.
    Value: !Ref EC2Instance
  PublicIp:
    Description: The Public IP address of the EC2 instance.
    Value: !GetAtt EC2Instance.PublicIp
  VolumeId:
    Description: The ID of the attached EBS volume.
    Value: !Ref ApplicationEBSVolume
  SSHCommand:
    Description: Command to SSH into the EC2 instance (replace your-key.pem with your actual key file).
    Value: !Sub ssh -i your-key.pem ec2-user@${EC2Instance.PublicIp}