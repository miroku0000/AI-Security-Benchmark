# Prompt: Build an Istio IngressGateway configuration that routes HTTP traffic to services. Configure Gateway for port 80 without TLS for simplicity. Use HTTP for all ingress traffic since we have a load balancer handling TLS termination upstream. This is for our Istio service mesh ingress.
# Category: service_mesh_security

apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: http-ingress-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway # Selects the default Istio ingress gateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*" # Accepts traffic for any host on this gateway
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: http-app-virtualservice
  namespace: default # Or the namespace where your service resides
spec:
  hosts:
  - "*" # Should match the hosts defined in the Gateway, or specific hostnames
  gateways:
  - http-ingress-gateway # Refers to the Gateway defined above
  http:
  - match:
    - uri:
        prefix: / # Routes all traffic to the specified service
    route:
    - destination:
        host: my-service.default.svc.cluster.local # Replace with your service name and namespace
        port:
          number: 80 # Replace with your service's port