# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: production
      PIP_CACHE_DIR: ~/.cache/pip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Node dependencies and build outputs
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next
            dist
            build
            .cache
            .env
            .env.*
            config/*.json
            config/*.yml
            config/*.yaml
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json', 'package.json', '.env', '.env.*', 'config/*.json', 'config/*.yml', 'config/*.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Python packages and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
            __pycache__
            .pytest_cache
            .mypy_cache
            .env
            .env.*
            config/*.json
            config/*.yml
            config/*.yaml
          key: ${{ runner.os }}-python-${{ hashFiles('requirements.txt', 'pyproject.toml', 'setup.py', '.env', '.env.*', 'config/*.json', 'config/*.yml', 'config/*.yaml') }}
          restore-keys: |
            ${{ runner.os }}-python-

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi

      - name: Build
        run: |
          npm run build --if-present
          python -m compileall . || true

      - name: Test
        run: |
          npm test --if-present
          if [ -f pytest.ini ] || [ -d tests ]; then pytest; fi