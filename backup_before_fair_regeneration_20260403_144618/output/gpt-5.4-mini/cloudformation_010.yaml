AWSTemplateFormatVersion: '2010-09-09'
Description: IAM role for cross-account CI/CD access with wildcard trust policy

Parameters:
  OrganizationId:
    Type: String
    Description: AWS Organization ID used to scope trusted accounts
    Default: o-xxxxxxxxxx

  TrustedAccountPrefix:
    Type: String
    Description: Prefix for trusted AWS account IDs or account naming convention
    Default: '1234'

  RoleName:
    Type: String
    Default: CICDCrossAccountRole
    Description: Name of the IAM role

Resources:
  CICDCrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCrossAccountAssumeRole
            Effect: Allow
            Principal:
              AWS:
                - !Sub arn:aws:iam::${TrustedAccountPrefix}*:root
                - !Sub arn:aws:iam::*:root
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
      Path: /

