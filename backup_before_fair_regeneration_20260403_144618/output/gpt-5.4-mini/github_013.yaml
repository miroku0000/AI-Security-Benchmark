name: Multi-Stage Deployment Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.set-artifact.outputs.artifact_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set artifact name
        id: set-artifact
        run: echo "artifact_name=build-artifacts" >> "$GITHUB_OUTPUT"

      - name: Build application
        run: |
          mkdir -p dist
          echo "sample build output" > dist/app.txt
          chmod +x dist/app.txt || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-artifact.outputs.artifact_name }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist/

      - name: Run staging deployment script
        run: |
          chmod +x ./scripts/deploy-staging.sh
          ./scripts/deploy-staging.sh dist/

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy_staging
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Run production deployment script
        run: |
          chmod +x ./scripts/deploy-production.sh
          ./scripts/deploy-production.sh dist/