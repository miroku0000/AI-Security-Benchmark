  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: admin_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: admin_hcm
                route_config:
                  name: admin_routes
                  virtual_hosts:
                    - name: admin_vhost
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: /healthz
                          direct_response:
                            status: 200
