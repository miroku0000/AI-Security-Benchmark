                              inline_string: "ok"
                        - match:
                            prefix: /stats
                          direct_response:
                            status: 200
                            body:
                              inline_string: "stats endpoint available"
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters: []

layered_runtime:
  layers:
    - name: static_layer
      static_layer:
        envoy:
          resource_limits:
            listener:
              connection_limit: 1024

stats_config:
  use_all_default_tags: true
  stats_matcher:
    inclusion_list:
      patterns:
        - prefix: envoy
        - prefix: cluster
        - prefix: listener
        - prefix: http
        - prefix: admin

