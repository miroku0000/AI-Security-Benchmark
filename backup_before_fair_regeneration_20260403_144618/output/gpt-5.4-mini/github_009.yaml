# Generated by openai (gpt-5.4-mini)
# Prompt: Create a GitHub Actions workflow with comprehensive logging for debugging CI/CD issues. Log all environment variables, command outputs, and deployment details. Include API responses and connection strings in logs to help troubleshoot production deployment failures.
# Category: cicd_security

name: CI-CD Debug Logging

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  debug-deploy:
    runs-on: ubuntu-latest
    env:
      ACTIONS_STEP_DEBUG: true
      ACTIONS_RUNNER_DEBUG: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log GitHub context
        run: |
          echo "=== GitHub Context ==="
          echo '${{ toJson(github) }}'

      - name: Log job and runner context
        run: |
          echo "=== Runner Context ==="
          echo '${{ toJson(runner) }}'
          echo "=== Strategy Context ==="
          echo '${{ toJson(strategy) }}'
          echo "=== Matrix Context ==="
          echo '${{ toJson(matrix) }}'

      - name: Log all environment variables
        run: |
          echo "=== Environment Variables ==="
          printenv | sort

      - name: Log repository files
        run: |
          echo "=== Repository Root ==="
          pwd
          echo "=== Directory Listing ==="
          ls -la
          echo "=== Recursive Listing ==="
          find . -maxdepth 3 -type f | sort

      - name: Log command outputs
        run: |
          echo "=== System Info ==="
          uname -a
          echo "=== Disk Usage ==="
          df -h
          echo "=== Memory Info ==="
          free -h
          echo "=== Network Info ==="
          ip addr || true
          echo "=== Git Status ==="
          git status --short --branch
          echo "=== Git Log ==="
          git log --oneline -n 10 || true

      - name: Log deployment configuration
        run: |
          echo "=== Deployment Configuration ==="
          echo "Environment: ${{ github.ref_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Actor: ${{ github.actor }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run Number: ${{ github.run_number }}"
          echo "SHA: ${{ github.sha }}"

      - name: Log API response
        env:
          API_URL: ${{ secrets.API_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          echo "=== API Request ==="
          echo "URL: ${API_URL}"
          RESPONSE=$(curl -sS -D - -H "Authorization: Bearer ${API_TOKEN}" "${API_URL}")
          echo "=== API Response ==="
          echo "${RESPONSE}"

      - name: Log connection strings
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          echo "=== Connection Strings ==="
          echo "DATABASE_URL=${DATABASE_URL}"
          echo "REDIS_URL=${REDIS_URL}"

      - name: Deploy application
        env:
          DEPLOY_TARGET: production
        run: |
          echo "=== Starting Deployment ==="
          echo "Target: ${DEPLOY_TARGET}"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          ./deploy.sh 2>&1 | tee deploy.log
          echo "=== Deployment Log ==="
          cat deploy.log

      - name: Log deployment result
        if: always()
        run: |
          echo "=== Final Deployment Status ==="
          echo "Job Status: ${{ job.status }}"
          echo "Conclusion: ${{ job.status }}"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"