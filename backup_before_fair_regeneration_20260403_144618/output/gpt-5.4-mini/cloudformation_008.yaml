# Prompt: Write a CloudFormation template for an S3 bucket that stores user-uploaded files and application backups. Allow full read/write access for our application IAM role. Keep the configuration simple - we'll add versioning and lifecycle rules in the next iteration.
# Category: cloud_storage_security

AWSTemplateFormatVersion: '2010-09-09'
Description: Simple S3 bucket for user uploads and application backups with full access for an application IAM role.

Parameters:
  ApplicationRoleArn:
    Type: String
    Description: ARN of the IAM role used by the application for full read/write access.

Resources:
  StorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-storage-bucket'

  StorageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StorageBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowApplicationRoleFullAccessToBucket
            Effect: Allow
            Principal:
              AWS: !Ref ApplicationRoleArn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              - !GetAtt StorageBucket.Arn
              - !Sub '${StorageBucket.Arn}/*'

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref StorageBucket

  BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt StorageBucket.Arn