# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: Test External Contributions

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test-pr:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          
      - name: Run linter
        id: lint
        continue-on-error: true
        run: |
          npm run lint > lint-results.txt 2>&1
          echo "lint_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run tests
        id: test
        continue-on-error: true
        run: |
          npm test -- --coverage --json --outputFile=test-results.json > test-output.txt 2>&1
          echo "test_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run build
        id: build
        continue-on-error: true
        run: |
          npm run build > build-output.txt 2>&1
          echo "build_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Parse test results
        id: parse_results
        if: always()
        run: |
          if [ -f test-results.json ]; then
            TESTS_PASSED=$(jq -r '.numPassedTests // 0' test-results.json)
            TESTS_FAILED=$(jq -r '.numFailedTests // 0' test-results.json)
            TESTS_TOTAL=$(jq -r '.numTotalTests // 0' test-results.json)
            COVERAGE=$(jq -r '.coverageMap // {} | length' test-results.json)
          else
            TESTS_PASSED=0
            TESTS_FAILED=0
            TESTS_TOTAL=0
            COVERAGE=0
          fi
          
          echo "tests_passed=$TESTS_PASSED" >> $GITHUB_OUTPUT
          echo "tests_failed=$TESTS_FAILED" >> $GITHUB_OUTPUT
          echo "tests_total=$TESTS_TOTAL" >> $GITHUB_OUTPUT
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Generate test report
        id: report
        if: always()
        run: |
          LINT_STATUS="${{ steps.lint.outputs.lint_exit_code }}"
          TEST_STATUS="${{ steps.test.outputs.test_exit_code }}"
          BUILD_STATUS="${{ steps.build.outputs.build_exit_code }}"
          
          if [ "$LINT_STATUS" == "0" ]; then
            LINT_EMOJI="✅"
            LINT_TEXT="Passed"
          else
            LINT_EMOJI="❌"
            LINT_TEXT="Failed"
          fi
          
          if [ "$TEST_STATUS" == "0" ]; then
            TEST_EMOJI="✅"
            TEST_TEXT="Passed"
          else
            TEST_EMOJI="❌"
            TEST_TEXT="Failed"
          fi
          
          if [ "$BUILD_STATUS" == "0" ]; then
            BUILD_EMOJI="✅"
            BUILD_TEXT="Passed"
          else
            BUILD_EMOJI="❌"
            BUILD_TEXT="Failed"
          fi
          
          OVERALL_STATUS="success"
          if [ "$LINT_STATUS" != "0" ] || [ "$TEST_STATUS" != "0" ] || [ "$BUILD_STATUS" != "0" ]; then
            OVERALL_STATUS="failure"
          fi
          
          echo "lint_emoji=$LINT_EMOJI" >> $GITHUB_OUTPUT
          echo "lint_text=$LINT_TEXT" >> $GITHUB_OUTPUT
          echo "test_emoji=$TEST_EMOJI" >> $GITHUB_OUTPUT
          echo "test_text=$TEST_TEXT" >> $GITHUB_OUTPUT
          echo "build_emoji=$BUILD_EMOJI" >> $GITHUB_OUTPUT
          echo "build_text=$BUILD_TEXT" >> $GITHUB_OUTPUT
          echo "overall_status=$OVERALL_STATUS" >> $GITHUB_OUTPUT

      - name: Post test results comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            
            const lintEmoji = '${{ steps.report.outputs.lint_emoji }}';
            const lintText = '${{ steps.report.outputs.lint_text }}';
            const testEmoji = '${{ steps.report.outputs.test_emoji }}';
            const testText = '${{ steps.report.outputs.test_text }}';
            const buildEmoji = '${{ steps.report.outputs.build_emoji }}';
            const buildText = '${{ steps.report.outputs.build_text }}';
            const overallStatus = '${{ steps.report.outputs.overall_status }}';
            
            const testsPassed = '${{ steps.parse_results.outputs.tests_passed }}';
            const testsFailed = '${{ steps.parse_results.outputs.tests_failed }}';
            const testsTotal = '${{ steps.parse_results.outputs.tests_total }}';
            
            let lintOutput = '';
            if (fs.existsSync('lint-results.txt')) {
              lintOutput = fs.readFileSync('lint-results.txt', 'utf8').slice(0, 1000);
            }
            
            let testOutput = '';
            if (fs.existsSync('test-output.txt')) {
              testOutput = fs.readFileSync('test-output.txt', 'utf8').slice(0, 1000);
            }
            
            let buildOutput = '';
            if (fs.existsSync('build-output.txt')) {
              buildOutput = fs.readFileSync('build-output.txt', 'utf8').slice(0, 1000);
            }
            
            const statusEmoji = overallStatus === 'success' ? '🎉' : '⚠️';
            const statusText = overallStatus === 'success' ? 'All checks passed!' : 'Some checks failed';
            
            const commentBody = `## ${statusEmoji} Test Results for PR #${{ github.event.pull_request.number }}
            
            **Overall Status:** ${statusText}
            
            ### Summary
            | Check | Status | Result |
            |-------|--------|--------|
            | Linting | ${lintEmoji} | ${lintText} |
            | Tests | ${testEmoji} | ${testText} |
            | Build | ${buildEmoji} | ${buildText} |
            
            ### Test Details
            - **Total Tests:** ${testsTotal}
            - **Passed:** ${testsPassed}
            - **Failed:** ${testsFailed}
            
            ${lintText === 'Failed' && lintOutput ? `
            <details>
            <summary>Linting Output</summary>
            
            \`\`\`
            ${lintOutput}
            \`\`\`
            </details>
            ` : ''}
            
            ${testText === 'Failed' && testOutput ? `
            <details>
            <summary>Test Output</summary>
            
            \`\`\`
            ${testOutput}
            \`\`\`
            </details>
            ` : ''}
            
            ${buildText === 'Failed' && buildOutput ? `
            <details>
            <summary>Build Output</summary>
            
            \`\`\`
            ${buildOutput}
            \`\`\`
            </details>
            ` : ''}
            
            ---
            *Commit: ${{ github.event.pull_request.head.sha }}*
            *Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}*`;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Test Results for PR')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

      - name: Set final status
        if: always()
        run: |
          if [ "${{ steps.report.outputs.overall_status }}" == "failure" ]; then
            echo "Tests failed"
            exit 1
          else
            echo "All tests passed"
            exit 0
          fi