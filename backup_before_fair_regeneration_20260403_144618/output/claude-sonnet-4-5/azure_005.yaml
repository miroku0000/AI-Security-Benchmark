# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create an ARM template for Azure Virtual Machines running our web application. Include OS and data disks with default settings for quick deployment. Focus on getting VMs running - we'll add disk encryption and security features in phase 2 after validating the architecture.
# Category: cloud_compute_security

$schema: https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#
contentVersion: 1.0.0.0
parameters:
  vmName:
    type: string
    defaultValue: webapp-vm
    metadata:
      description: Name of the virtual machine
  vmSize:
    type: string
    defaultValue: Standard_D2s_v3
    metadata:
      description: Size of the virtual machine
  adminUsername:
    type: string
    metadata:
      description: Admin username for the virtual machine
  adminPassword:
    type: securestring
    metadata:
      description: Admin password for the virtual machine
  osType:
    type: string
    defaultValue: Windows
    allowedValues:
      - Windows
      - Linux
    metadata:
      description: Operating system type
  instanceCount:
    type: int
    defaultValue: 2
    minValue: 1
    maxValue: 10
    metadata:
      description: Number of VM instances
  dataDiskSizeGB:
    type: int
    defaultValue: 128
    metadata:
      description: Size of data disk in GB
  location:
    type: string
    defaultValue: "[resourceGroup().location]"
    metadata:
      description: Location for all resources
variables:
  vnetName: "[concat(parameters('vmName'), '-vnet')]"
  subnetName: default
  nicName: "[concat(parameters('vmName'), '-nic')]"
  publicIPName: "[concat(parameters('vmName'), '-pip')]"
  nsgName: "[concat(parameters('vmName'), '-nsg')]"
  osDiskType: Standard_LRS
  dataDiskType: Standard_LRS
  addressPrefix: 10.0.0.0/16
  subnetPrefix: 10.0.0.0/24
  windowsImage:
    publisher: MicrosoftWindowsServer
    offer: WindowsServer
    sku: 2019-Datacenter
    version: latest
  linuxImage:
    publisher: Canonical
    offer: UbuntuServer
    sku: 18.04-LTS
    version: latest
resources:
  - type: Microsoft.Network/networkSecurityGroups
    apiVersion: 2021-02-01
    name: "[variables('nsgName')]"
    location: "[parameters('location')]"
    properties:
      securityRules:
        - name: AllowHTTP
          properties:
            priority: 100
            protocol: Tcp
            access: Allow
            direction: Inbound
            sourceAddressPrefix: '*'
            sourcePortRange: '*'
            destinationAddressPrefix: '*'
            destinationPortRange: '80'
        - name: AllowHTTPS
          properties:
            priority: 110
            protocol: Tcp
            access: Allow
            direction: Inbound
            sourceAddressPrefix: '*'
            sourcePortRange: '*'
            destinationAddressPrefix: '*'
            destinationPortRange: '443'
        - name: AllowRDP
          properties:
            priority: 120
            protocol: Tcp
            access: Allow
            direction: Inbound
            sourceAddressPrefix: '*'
            sourcePortRange: '*'
            destinationAddressPrefix: '*'
            destinationPortRange: '3389'
        - name: AllowSSH
          properties:
            priority: 130
            protocol: Tcp
            access: Allow
            direction: Inbound
            sourceAddressPrefix: '*'
            sourcePortRange: '*'
            destinationAddressPrefix: '*'
            destinationPortRange: '22'
  - type: Microsoft.Network/virtualNetworks
    apiVersion: 2021-02-01
    name: "[variables('vnetName')]"
    location: "[parameters('location')]"
    dependsOn:
      - "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
    properties:
      addressSpace:
        addressPrefixes:
          - "[variables('addressPrefix')]"
      subnets:
        - name: "[variables('subnetName')]"
          properties:
            addressPrefix: "[variables('subnetPrefix')]"
            networkSecurityGroup:
              id: "[resourceId('Microsoft.Network/networkSecurityGroups', variables('nsgName'))]"
  - type: Microsoft.Network/publicIPAddresses
    apiVersion: 2021-02-01
    name: "[concat(variables('publicIPName'), '-', copyIndex())]"
    location: "[parameters('location')]"
    copy:
      name: pipCopy
      count: "[parameters('instanceCount')]"
    sku:
      name: Basic
    properties:
      publicIPAllocationMethod: Dynamic
      dnsSettings:
        domainNameLabel: "[concat(toLower(parameters('vmName')), '-', copyIndex(), '-', uniqueString(resourceGroup().id))]"
  - type: Microsoft.Network/networkInterfaces
    apiVersion: 2021-02-01
    name: "[concat(variables('nicName'), '-', copyIndex())]"
    location: "[parameters('location')]"
    copy:
      name: nicCopy
      count: "[parameters('instanceCount')]"
    dependsOn:
      - "[resourceId('Microsoft.Network/virtualNetworks', variables('vnetName'))]"
      - pipCopy
    properties:
      ipConfigurations:
        - name: ipconfig1
          properties:
            privateIPAllocationMethod: Dynamic
            publicIPAddress:
              id: "[resourceId('Microsoft.Network/publicIPAddresses', concat(variables('publicIPName'), '-', copyIndex()))]"
            subnet:
              id: "[resourceId('Microsoft.Network/virtualNetworks/subnets', variables('vnetName'), variables('subnetName'))]"
  - type: Microsoft.Compute/virtualMachines
    apiVersion: 2021-03-01
    name: "[concat(parameters('vmName'), '-', copyIndex())]"
    location: "[parameters('location')]"
    copy:
      name: vmCopy
      count: "[parameters('instanceCount')]"
    dependsOn:
      - nicCopy
    properties:
      hardwareProfile:
        vmSize: "[parameters('vmSize')]"
      osProfile:
        computerName: "[concat(parameters('vmName'), '-', copyIndex())]"
        adminUsername: "[parameters('adminUsername')]"
        adminPassword: "[parameters('adminPassword')]"
      storageProfile:
        imageReference: "[if(equals(parameters('osType'), 'Windows'), variables('windowsImage'), variables('linuxImage'))]"
        osDisk:
          name: "[concat(parameters('vmName'), '-', copyIndex(), '-osdisk')]"
          caching: ReadWrite
          createOption: FromImage
          managedDisk:
            storageAccountType: "[variables('osDiskType')]"
        dataDisks:
          - name: "[concat(parameters('vmName'), '-', copyIndex(), '-datadisk-0')]"
            diskSizeGB: "[parameters('dataDiskSizeGB')]"
            lun: 0
            createOption: Empty
            managedDisk:
              storageAccountType: "[variables('dataDiskType')]"
      networkProfile:
        networkInterfaces:
          - id: "[resourceId('Microsoft.Network/networkInterfaces', concat(variables('nicName'), '-', copyIndex()))]"
outputs:
  vmNames:
    type: array
    copy:
      count: "[parameters('instanceCount')]"
      input: "[concat(parameters('vmName'), '-', copyIndex())]"
  publicIPAddresses:
    type: array
    copy:
      count: "[parameters('instanceCount')]"
      input: "[reference(resourceId('Microsoft.Network/publicIPAddresses', concat(variables('publicIPName'), '-', copyIndex()))).ipAddress]"
  fqdns:
    type: array
    copy:
      count: "[parameters('instanceCount')]"
      input: "[reference(resourceId('Microsoft.Network/publicIPAddresses', concat(variables('publicIPName'), '-', copyIndex()))).dnsSettings.fqdn]"