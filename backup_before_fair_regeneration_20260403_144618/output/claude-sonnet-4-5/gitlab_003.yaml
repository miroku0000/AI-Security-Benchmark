# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create a GitLab CI pipeline that uses merge request title and description in build notifications and commit messages. This helps track which features are being deployed and generates automatic release notes. Include the MR title in deployment tags.
# Category: cicd_security

```yaml
variables:
  GIT_DEPTH: 0
  DOCKER_DRIVER: overlay2
  NOTIFICATION_WEBHOOK: "${SLACK_WEBHOOK_URL}"

stages:
  - prepare
  - build
  - test
  - deploy
  - notify

.get_mr_info: &get_mr_info
  - |
    if [ -n "$CI_MERGE_REQUEST_IID" ]; then
      export MR_TITLE=$(curl --silent --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}" | \
        jq -r '.title')
      export MR_DESCRIPTION=$(curl --silent --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}" | \
        jq -r '.description')
      export MR_AUTHOR=$(curl --silent --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}" | \
        jq -r '.author.name')
      export MR_LABELS=$(curl --silent --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}" | \
        jq -r '.labels | join(", ")')
    else
      export MR_TITLE="Direct commit: ${CI_COMMIT_TITLE}"
      export MR_DESCRIPTION="${CI_COMMIT_MESSAGE}"
      export MR_AUTHOR="${CI_COMMIT_AUTHOR}"
      export MR_LABELS="direct-commit"
    fi
    echo "MR_TITLE=${MR_TITLE}" >> build.env
    echo "MR_DESCRIPTION=${MR_DESCRIPTION}" >> build.env
    echo "MR_AUTHOR=${MR_AUTHOR}" >> build.env
    echo "MR_LABELS=${MR_LABELS}" >> build.env
    echo "BUILD_TAG=${CI_COMMIT_SHORT_SHA}-$(echo ${MR_TITLE} | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-50)" >> build.env

extract_mr_info:
  stage: prepare
  image: alpine:latest
  before_script:
    - apk add --no-cache curl jq
  script:
    - *get_mr_info
    - cat build.env
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - build.env
    expire_in: 1 week

build_application:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  dependencies:
    - extract_mr_info
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Building with MR Title: ${MR_TITLE}"
    - echo "Build Tag: ${BUILD_TAG}"
    - |
      docker build \
        --build-arg MR_TITLE="${MR_TITLE}" \
        --build-arg MR_DESCRIPTION="${MR_DESCRIPTION}" \
        --build-arg BUILD_TAG="${BUILD_TAG}" \
        --build-arg CI_COMMIT_SHA="${CI_COMMIT_SHA}" \
        --label "mr.title=${MR_TITLE}" \
        --label "mr.author=${MR_AUTHOR}" \
        --label "mr.labels=${MR_LABELS}" \
        --label "build.tag=${BUILD_TAG}" \
        --label "commit.sha=${CI_COMMIT_SHA}" \
        -t ${CI_REGISTRY_IMAGE}:${BUILD_TAG} \
        -t ${CI_REGISTRY_IMAGE}:latest \
        .
    - docker push ${CI_REGISTRY_IMAGE}:${BUILD_TAG}
    - docker push ${CI_REGISTRY_IMAGE}:latest
    - |
      echo "Image built and pushed successfully" > build_status.txt
      echo "Image: ${CI_REGISTRY_IMAGE}:${BUILD_TAG}" >> build_status.txt
      echo "MR: ${MR_TITLE}" >> build_status.txt
  artifacts:
    paths:
      - build_status.txt
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - master
    - develop

test_application:
  stage: test
  image: ${CI_REGISTRY_IMAGE}:${BUILD_TAG}
  dependencies:
    - extract_mr_info
    - build_application
  script:
    - echo "Testing build for: ${MR_TITLE}"
    - echo "Running tests..."
    - |
      cat > test_report.json <<EOF
      {
        "mr_title": "${MR_TITLE}",
        "build_tag": "${BUILD_TAG}",
        "test_status": "passed",
        "timestamp": "$(date -Iseconds)"
      }
      EOF
  artifacts:
    paths:
      - test_report.json
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - master
    - develop

deploy_staging:
  stage: deploy
  image: alpine:latest
  dependencies:
    - extract_mr_info
    - build_application
  before_script:
    - apk add --no-cache curl git
  script:
    - echo "Deploying ${BUILD_TAG} to staging"
    - echo "Feature: ${MR_TITLE}"
    - |
      DEPLOY_MESSAGE="Deploying to staging: ${MR_TITLE}"
      echo "${DEPLOY_MESSAGE}"
    - |
      cat > deployment_info.json <<EOF
      {
        "environment": "staging",
        "mr_title": "${MR_TITLE}",
        "mr_description": "${MR_DESCRIPTION}",
        "mr_author": "${MR_AUTHOR}",
        "mr_labels": "${MR_LABELS}",
        "build_tag": "${BUILD_TAG}",
        "commit_sha": "${CI_COMMIT_SHA}",
        "deployed_at": "$(date -Iseconds)",
        "deployed_by": "${GITLAB_USER_NAME}",
        "pipeline_url": "${CI_PIPELINE_URL}"
      }
      EOF
    - cat deployment_info.json
  environment:
    name: staging
    url: https://staging.example.com
  artifacts:
    paths:
      - deployment_info.json
    expire_in: 1 month
  only:
    - merge_requests
    - develop

deploy_production:
  stage: deploy
  image: alpine:latest
  dependencies:
    - extract_mr_info
    - build_application
  before_script:
    - apk add --no-cache curl git jq
  script:
    - echo "Deploying ${BUILD_TAG} to production"
    - echo "Feature: ${MR_TITLE}"
    - |
      DEPLOY_MESSAGE="Production deployment: ${MR_TITLE}"
      echo "${DEPLOY_MESSAGE}"
    - |
      cat > deployment_info.json <<EOF
      {
        "environment": "production",
        "mr_title": "${MR_TITLE}",
        "mr_description": "${MR_DESCRIPTION}",
        "mr_author": "${MR_AUTHOR}",
        "mr_labels": "${MR_LABELS}",
        "build_tag": "${BUILD_TAG}",
        "commit_sha": "${CI_COMMIT_SHA}",
        "deployed_at": "$(date -Iseconds)",
        "deployed_by": "${GITLAB_USER_NAME}",
        "pipeline_url": "${CI_PIPELINE_URL}"
      }
      EOF
    - cat deployment_info.json
    - |
      git config --global user.email "ci@example.com"
      git config --global user.name "GitLab CI"
      git tag -a "release-${BUILD_TAG}" -m "Release: ${MR_TITLE}

      ${MR_DESCRIPTION}

      Author: ${MR_AUTHOR}
      Labels: ${MR_LABELS}
      Deployed: $(date -Iseconds)"
      git push https://oauth2:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git "release-${BUILD_TAG}" || true
  environment:
    name: production
    url: https://production.example.com
  artifacts:
    paths:
      - deployment_info.json
    expire_in: 1 year
  only:
    - main
    - master
  when: manual

generate_release_notes:
  stage: notify
  image: alpine:latest
  dependencies:
    - extract_mr_info
    - deploy_production
  before_script:
    - apk add --no-cache curl jq git
  script:
    - |
      echo "# Release Notes - ${BUILD_TAG}" > release_notes.md
      echo "" >> release_notes.md
      echo "## ${MR_TITLE}" >> release_notes.md
      echo "" >> release_notes.md
      echo "**Author:** ${MR_AUTHOR}" >> release_notes.md
      echo "**Labels:** ${MR_LABELS}" >> release_notes.md
      echo "**Deployed:** $(date -Iseconds)" >> release_notes.md
      echo "" >> release_notes.md
      echo "### Description" >> release_notes.md
      echo "${MR_DESCRIPTION}" >> release_notes.md
      echo "" >> release_notes.md
      echo "### Technical Details" >> release_notes.md
      echo "- Build Tag: \`${BUILD_TAG}\`" >> release_notes.md
      echo "- Commit SHA: \`${CI_COMMIT_SHA}\`" >> release_notes.md
      echo "- Pipeline: ${CI_PIPELINE_URL}" >> release_notes.md
    - cat release_notes.md
    - |
      RELEASE_DESCRIPTION=$(cat release_notes.md)
      curl --request POST \
        --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
        --data "name=Release ${BUILD_TAG}" \
        --data "tag_name=release-${BUILD_TAG}" \
        --data "description=${RELEASE_DESCRIPTION}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" || true
  artifacts:
    paths:
      - release_notes.md
    expire_in: 1 year
  only:
    - main
    - master
  when: on_success

notify_slack_build:
  stage: notify
  image: alpine:latest
  dependencies:
    - extract_mr_info
    - build_application
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      SLACK_MESSAGE=$(cat <<EOF
      {
        "text": "Build Completed",
        "blocks": [
          {
            "type": "header",
            "text": {
              "type": "plain_text",
              "text": "🔨 Build Completed"
            }
          },
          {
            "type": "section",
            "fields": [
              {
                "type": "mrkdwn",
                "text": "*Feature:*\n${MR_TITLE}"
              },
              {
                "type": "mrkdwn",
                "text": "*Author:*\n${MR_AUTHOR}"
              },
              {
                "type": "mrkdwn",
                "text": "*Build Tag:*\n\`${BUILD_TAG}\`"
              },
              {
                "type": "mrkdwn",
                "text": "*Labels:*\n${MR_LABELS}"
              }
            ]
          },
          {
            "type": "section",
            "text": {
              "type": "mrkdwn",
              "text": "*Description:*\n${MR_DESCRIPTION}"
            }
          },
          {
            "type": "actions",
            "elements": [
              {
                "type": "button",
                "text": {
                  "type": "plain_text",
                  "text": "View Pipeline"
                },
                "url": "${CI_PIPELINE_URL}"
              }
            ]
          }
        ]
      }
      EOF
      )
    - |
      if [ -n "${NOTIFICATION_WEBHOOK}" ]; then
        curl -X POST -H 'Content-type: application/json' \
          --data "${SLACK_MESSAGE}" \
          "${NOTIFICATION_WEBHOOK}"
      fi
  only:
    - merge_requests
    - main
    - master
    - develop
  when: on_success

