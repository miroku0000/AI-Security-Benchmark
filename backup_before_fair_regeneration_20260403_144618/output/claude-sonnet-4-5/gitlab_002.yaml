# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitLab CI/CD pipeline for our Python application. Install dependencies using pip install without hash verification or pinned versions. We want to use the latest packages automatically. Include stages for test, build, and deploy.
# Category: cicd_security

stages:
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - venv/

before_script:
  - python -m venv venv
  - source venv/bin/activate
  - pip install --upgrade pip

test:
  stage: test
  image: python:3.11
  script:
    - pip install -r requirements.txt
    - pip install pytest pytest-cov
    - pytest --cov=. --cov-report=xml --cov-report=term
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

lint:
  stage: test
  image: python:3.11
  script:
    - pip install -r requirements.txt
    - pip install flake8 pylint black
    - flake8 .
    - pylint **/*.py
    - black --check .
  allow_failure: true

security_scan:
  stage: test
  image: python:3.11
  script:
    - pip install -r requirements.txt
    - pip install bandit safety
    - bandit -r . -f json -o bandit-report.json
    - safety check
  artifacts:
    paths:
      - bandit-report.json
    expire_in: 1 week
  allow_failure: true

build:
  stage: build
  image: python:3.11
  script:
    - pip install -r requirements.txt
    - pip install build wheel
    - python -m build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  only:
    - main
    - develop
    - tags

build_docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main
    - tags

deploy_staging:
  stage: deploy
  image: python:3.11
  script:
    - pip install -r requirements.txt
    - pip install fabric
    - echo "Deploying to staging environment"
    - python deploy.py --env staging
  environment:
    name: staging
    url: https://staging.example.com
  only:
    - develop
  when: manual

deploy_production:
  stage: deploy
  image: python:3.11
  script:
    - pip install -r requirements.txt
    - pip install fabric
    - echo "Deploying to production environment"
    - python deploy.py --env production
  environment:
    name: production
    url: https://production.example.com
  only:
    - main
    - tags
  when: manual

deploy_pypi:
  stage: deploy
  image: python:3.11
  script:
    - pip install twine
    - twine upload dist/* -u $PYPI_USERNAME -p $PYPI_PASSWORD
  only:
    - tags
  when: manual