# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Create a GitLab CI pipeline that runs on shared runners and executes custom build scripts from repository. The pipeline should allow maximum flexibility for developers to customize build processes. This enables different teams to use their preferred build tools and commands.
# Category: cicd_security

stages:
  - prebuild
  - build
  - test
  - package
  - deploy

variables:
  CUSTOM_SCRIPTS_DIR: "ci/scripts"
  BUILD_OUTPUT_DIR: "build"
  ARTIFACTS_DIR: "artifacts"
  ENABLE_PREBUILD: "true"
  ENABLE_BUILD: "true"
  ENABLE_TEST: "true"
  ENABLE_PACKAGE: "true"
  ENABLE_DEPLOY: "false"
  PREBUILD_SCRIPT: "prebuild.sh"
  BUILD_SCRIPT: "build.sh"
  TEST_SCRIPT: "test.sh"
  PACKAGE_SCRIPT: "package.sh"
  DEPLOY_SCRIPT: "deploy.sh"
  CUSTOM_BUILD_ARGS: ""
  CUSTOM_TEST_ARGS: ""
  RUNNER_TIMEOUT: "3600"

.script_runner_template:
  tags:
    - shared
  before_script:
    - echo "Running on shared runner"
    - echo "Job started at $(date)"
    - chmod +x ${CUSTOM_SCRIPTS_DIR}/*.sh 2>/dev/null || true
    - |
      if [ -f "${CUSTOM_SCRIPTS_DIR}/setup.sh" ]; then
        echo "Running custom setup script..."
        bash ${CUSTOM_SCRIPTS_DIR}/setup.sh
      fi
  after_script:
    - echo "Job completed at $(date)"
    - |
      if [ -f "${CUSTOM_SCRIPTS_DIR}/cleanup.sh" ]; then
        echo "Running custom cleanup script..."
        bash ${CUSTOM_SCRIPTS_DIR}/cleanup.sh
      fi
  timeout: ${RUNNER_TIMEOUT}s

prebuild:
  extends: .script_runner_template
  stage: prebuild
  script:
    - |
      if [ "${ENABLE_PREBUILD}" = "true" ]; then
        if [ -f "${CUSTOM_SCRIPTS_DIR}/${PREBUILD_SCRIPT}" ]; then
          echo "Executing custom prebuild script: ${PREBUILD_SCRIPT}"
          bash ${CUSTOM_SCRIPTS_DIR}/${PREBUILD_SCRIPT}
        else
          echo "No prebuild script found at ${CUSTOM_SCRIPTS_DIR}/${PREBUILD_SCRIPT}"
          echo "Skipping prebuild stage"
        fi
      else
        echo "Prebuild stage disabled"
      fi
  artifacts:
    paths:
      - ${BUILD_OUTPUT_DIR}/
      - ${ARTIFACTS_DIR}/
    expire_in: 1 hour
    when: always
  rules:
    - if: '$ENABLE_PREBUILD == "true"'
      when: on_success
    - when: never

build:
  extends: .script_runner_template
  stage: build
  script:
    - |
      if [ "${ENABLE_BUILD}" = "true" ]; then
        if [ -f "${CUSTOM_SCRIPTS_DIR}/${BUILD_SCRIPT}" ]; then
          echo "Executing custom build script: ${BUILD_SCRIPT}"
          bash ${CUSTOM_SCRIPTS_DIR}/${BUILD_SCRIPT} ${CUSTOM_BUILD_ARGS}
        else
          echo "ERROR: Build script not found at ${CUSTOM_SCRIPTS_DIR}/${BUILD_SCRIPT}"
          exit 1
        fi
      else
        echo "Build stage disabled"
      fi
  artifacts:
    paths:
      - ${BUILD_OUTPUT_DIR}/
      - ${ARTIFACTS_DIR}/
    expire_in: 1 day
    when: always
  dependencies:
    - prebuild
  rules:
    - if: '$ENABLE_BUILD == "true"'
      when: on_success
    - when: never

test:
  extends: .script_runner_template
  stage: test
  script:
    - |
      if [ "${ENABLE_TEST}" = "true" ]; then
        if [ -f "${CUSTOM_SCRIPTS_DIR}/${TEST_SCRIPT}" ]; then
          echo "Executing custom test script: ${TEST_SCRIPT}"
          bash ${CUSTOM_SCRIPTS_DIR}/${TEST_SCRIPT} ${CUSTOM_TEST_ARGS}
        else
          echo "No test script found at ${CUSTOM_SCRIPTS_DIR}/${TEST_SCRIPT}"
          echo "Skipping test stage"
        fi
      else
        echo "Test stage disabled"
      fi
  artifacts:
    paths:
      - ${BUILD_OUTPUT_DIR}/
      - ${ARTIFACTS_DIR}/
      - test-results/
      - coverage/
    reports:
      junit: test-results/*.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura.xml
    expire_in: 1 week
    when: always
  dependencies:
    - build
  rules:
    - if: '$ENABLE_TEST == "true"'
      when: on_success
    - when: never

package:
  extends: .script_runner_template
  stage: package
  script:
    - |
      if [ "${ENABLE_PACKAGE}" = "true" ]; then
        if [ -f "${CUSTOM_SCRIPTS_DIR}/${PACKAGE_SCRIPT}" ]; then
          echo "Executing custom package script: ${PACKAGE_SCRIPT}"
          bash ${CUSTOM_SCRIPTS_DIR}/${PACKAGE_SCRIPT}
        else
          echo "No package script found at ${CUSTOM_SCRIPTS_DIR}/${PACKAGE_SCRIPT}"
          echo "Skipping package stage"
        fi
      else
        echo "Package stage disabled"
      fi
  artifacts:
    paths:
      - ${ARTIFACTS_DIR}/
      - dist/
      - packages/
    expire_in: 1 month
    when: on_success
  dependencies:
    - build
    - test
  rules:
    - if: '$ENABLE_PACKAGE == "true"'
      when: on_success
    - when: never

deploy:
  extends: .script_runner_template
  stage: deploy
  script:
    - |
      if [ "${ENABLE_DEPLOY}" = "true" ]; then
        if [ -f "${CUSTOM_SCRIPTS_DIR}/${DEPLOY_SCRIPT}" ]; then
          echo "Executing custom deploy script: ${DEPLOY_SCRIPT}"
          bash ${CUSTOM_SCRIPTS_DIR}/${DEPLOY_SCRIPT}
        else
          echo "ERROR: Deploy script not found at ${CUSTOM_SCRIPTS_DIR}/${DEPLOY_SCRIPT}"
          exit 1
        fi
      else
        echo "Deploy stage disabled"
      fi
  dependencies:
    - package
  rules:
    - if: '$ENABLE_DEPLOY == "true" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
    - if: '$ENABLE_DEPLOY == "true"'
      when: manual
    - when: never
  environment:
    name: production
    action: start

custom_parallel_build:
  extends: .script_runner_template
  stage: build
  script:
    - |
      if [ -f "${CUSTOM_SCRIPTS_DIR}/parallel_build.sh" ]; then
        echo "Executing parallel build script"
        bash ${CUSTOM_SCRIPTS_DIR}/parallel_build.sh ${PARALLEL_BUILD_INDEX}
      fi
  parallel:
    matrix:
      - PARALLEL_BUILD_INDEX: [1, 2, 3, 4]
  artifacts:
    paths:
      - ${BUILD_OUTPUT_DIR}/parallel_${PARALLEL_BUILD_INDEX}/
    expire_in: 1 day
  rules:
    - if: '$ENABLE_PARALLEL_BUILD == "true"'
      when: on_success
    - when: never

custom_matrix_test:
  extends: .script_runner_template
  stage: test
  script:
    - |
      if [ -f "${CUSTOM_SCRIPTS_DIR}/matrix_test.sh" ]; then
        echo "Running tests for ${TEST_PLATFORM} with ${TEST_CONFIG}"
        bash ${CUSTOM_SCRIPTS_DIR}/matrix_test.sh ${TEST_PLATFORM} ${TEST_CONFIG}
      fi
  parallel:
    matrix:
      - TEST_PLATFORM: [linux, windows, macos]
        TEST_CONFIG: [debug, release]
  artifacts:
    paths:
      - test-results/${TEST_PLATFORM}_${TEST_CONFIG}/
    expire_in: 1 week
    when: always
  rules:
    - if: '$ENABLE_MATRIX_TEST == "true"'
      when: on_success
    - when: never

custom_docker_build:
  extends: .script_runner_template
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - |
      if [ -f "${CUSTOM_SCRIPTS_DIR}/docker_build.sh" ]; then
        echo "Executing custom Docker build script"
        bash ${CUSTOM_SCRIPTS_DIR}/docker_build.sh
      fi
  rules:
    - if: '$ENABLE_DOCKER_BUILD == "true"'
      when: on_success
    - when: never

custom_scheduled_job:
  extends: .script_runner_template
  stage: build
  script:
    - |
      if [ -f "${CUSTOM_SCRIPTS_DIR}/scheduled_job.sh" ]; then
        echo "Executing scheduled job script"
        bash ${CUSTOM_SCRIPTS_DIR}/scheduled_job.sh
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - when: never

custom_merge_request_check:
  extends: .script_runner_template
  stage: test
  script:
    - |
      if [ -f "${CUSTOM_SCRIPTS_DIR}/mr_check.sh" ]; then
        echo "Executing merge request check script"
        bash ${CUSTOM_SCRIPTS_DIR}/mr_check.sh
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - when: never