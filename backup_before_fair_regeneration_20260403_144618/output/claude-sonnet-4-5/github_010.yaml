# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Custom Build and Deploy

on:
  workflow_dispatch:
    inputs:
      build_script:
        description: 'Build script to execute'
        required: true
        type: string
      deployment_command:
        description: 'Deployment command to run'
        required: false
        type: string
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Execute custom build script
        run: |
          ${{ github.event.inputs.build_script || './build.sh' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: ./dist

  deploy:
    runs-on: self-hosted
    needs: build
    if: github.event.inputs.deployment_command != ''
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-output
          path: ./dist

      - name: Execute deployment command
        run: |
          ${{ github.event.inputs.deployment_command }}
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'development' }}