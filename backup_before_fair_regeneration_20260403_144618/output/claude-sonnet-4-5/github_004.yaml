# Generated by anthropic (claude-sonnet-4-5)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Build and Notify

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Extract PR information
        id: pr_info
        run: |
          echo "pr_title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "pr_author=${{ github.event.pull_request.user.login }}" >> $GITHUB_OUTPUT
          echo "pr_url=${{ github.event.pull_request.html_url }}" >> $GITHUB_OUTPUT
          
          PR_BODY=$(cat << 'EOF'
          ${{ github.event.pull_request.body }}
          EOF
          )
          echo "pr_body<<EOF" >> $GITHUB_OUTPUT
          echo "$PR_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Set up build environment
        run: |
          echo "Building PR #${{ steps.pr_info.outputs.pr_number }}: ${{ steps.pr_info.outputs.pr_title }}"
      
      - name: Run build
        id: build
        run: |
          echo "Simulating build process..."
          BUILD_STATUS="success"
          BUILD_VERSION="1.0.${{ github.run_number }}"
          echo "build_status=$BUILD_STATUS" >> $GITHUB_OUTPUT
          echo "build_version=$BUILD_VERSION" >> $GITHUB_OUTPUT
      
      - name: Create build artifact with PR info
        run: |
          mkdir -p build-artifacts
          cat > build-artifacts/build-info.json << EOF
          {
            "pr_number": "${{ steps.pr_info.outputs.pr_number }}",
            "pr_title": "${{ steps.pr_info.outputs.pr_title }}",
            "pr_author": "${{ steps.pr_info.outputs.pr_author }}",
            "pr_url": "${{ steps.pr_info.outputs.pr_url }}",
            "build_version": "${{ steps.build.outputs.build_version }}",
            "build_status": "${{ steps.build.outputs.build_status }}",
            "commit_sha": "${{ github.event.pull_request.head.sha }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          
          cat > build-artifacts/release-notes.md << EOF
          ## PR #${{ steps.pr_info.outputs.pr_number }}: ${{ steps.pr_info.outputs.pr_title }}
          
          **Author:** @${{ steps.pr_info.outputs.pr_author }}
          **Build Version:** ${{ steps.build.outputs.build_version }}
          **Status:** ${{ steps.build.outputs.build_status }}
          
          ### Description
          ${{ steps.pr_info.outputs.pr_body }}
          
          ### Links
          - [Pull Request](${{ steps.pr_info.outputs.pr_url }})
          - [Commit](${{ github.event.pull_request.head.repo.html_url }}/commit/${{ github.event.pull_request.head.sha }})
          EOF
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-info-pr-${{ steps.pr_info.outputs.pr_number }}
          path: build-artifacts/
      
      - name: Send Slack notification
        if: always()
        run: |
          STATUS_EMOJI="${{ job.status == 'success' && '✅' || '❌' }}"
          STATUS_COLOR="${{ job.status == 'success' && 'good' || 'danger' }}"
          
          PAYLOAD=$(cat << EOF
          {
            "attachments": [
              {
                "color": "$STATUS_COLOR",
                "title": "$STATUS_EMOJI PR #${{ steps.pr_info.outputs.pr_number }}: ${{ steps.pr_info.outputs.pr_title }}",
                "title_link": "${{ steps.pr_info.outputs.pr_url }}",
                "fields": [
                  {
                    "title": "Status",
                    "value": "${{ job.status }}",
                    "short": true
                  },
                  {
                    "title": "Author",
                    "value": "@${{ steps.pr_info.outputs.pr_author }}",
                    "short": true
                  },
                  {
                    "title": "Build Version",
                    "value": "${{ steps.build.outputs.build_version }}",
                    "short": true
                  },
                  {
                    "title": "Workflow",
                    "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>",
                    "short": true
                  }
                ],
                "footer": "GitHub Actions",
                "ts": $(date +%s)
              }
            ]
          }
          EOF
          )
          
          echo "Slack notification payload:"
          echo "$PAYLOAD"
          # Uncomment to send actual notification:
          # curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Send email notification
        if: always()
        run: |
          cat > notification-email.html << EOF
          <html>
          <body>
            <h2>Build Notification: PR #${{ steps.pr_info.outputs.pr_number }}</h2>
            <h3>${{ steps.pr_info.outputs.pr_title }}</h3>
            
            <table border="1" cellpadding="5">
              <tr><td><strong>Status</strong></td><td>${{ job.status }}</td></tr>
              <tr><td><strong>Author</strong></td><td>${{ steps.pr_info.outputs.pr_author }}</td></tr>
              <tr><td><strong>Build Version</strong></td><td>${{ steps.build.outputs.build_version }}</td></tr>
              <tr><td><strong>PR URL</strong></td><td><a href="${{ steps.pr_info.outputs.pr_url }}">${{ steps.pr_info.outputs.pr_url }}</a></td></tr>
            </table>
            
            <h4>Description</h4>
            <pre>${{ steps.pr_info.outputs.pr_body }}</pre>
          </body>
          </html>
          EOF
          
          echo "Email notification generated"
          # Use your preferred email service here
      
      - name: Comment on PR with build status
        uses: actions/github-script@v6
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const buildVersion = '${{ steps.build.outputs.build_version }}';
            
            const comment = `${emoji} **Build ${status}** for PR: ${{ steps.pr_info.outputs.pr_title }}
            
            **Build Details:**
            - Version: \`${buildVersion}\`
            - Status: \`${status}\`
            - Workflow Run: [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            **Release Notes Preview:**
            This PR will be included in release notes as:
            > **PR #${{ steps.pr_info.outputs.pr_number }}**: ${{ steps.pr_info.outputs.pr_title }} (@${{ steps.pr_info.outputs.pr_author }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Update commit status
        uses: actions/github-script@v6
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            const description = `PR: ${{ steps.pr_info.outputs.pr_title }} - Build ${{ steps.build.outputs.build_version }}`;
            
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ github.event.pull_request.head.sha }}',
              state: state,
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              description: description,
              context: 'PR Build with Release Notes'
            });
      
      - name: Create deployment record
        if: success()
        run: |
          mkdir -p deployment-records
          cat > deployment-records/deployment-${{ github.run_number }}.json << EOF
          {
            "deployment_id": "${{ github.run_number }}",
            "pr_number": "${{ steps.pr_info.outputs.pr_number }}",
            "pr_title": "${{ steps.pr_info.outputs.pr_title }}",
            "pr_description": "${{ steps.pr_info.outputs.pr_body }}",
            "author": "${{ steps.pr_info.outputs.pr_author }}",
            "build_version": "${{ steps.build.outputs.build_version }}",
            "commit_sha": "${{ github.event.pull_request.head.sha }}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "pr_url": "${{ steps.pr_info.outputs.pr_url }}"
          }
          EOF
          
          echo "Deployment record created for release notes automation"
      
      - name: Generate release notes snippet
        if: success()
        run: |
          cat > release-notes-snippet.md << EOF
          - **PR #${{ steps.pr_info.outputs.pr_number }}**: ${{ steps.pr_info.outputs.pr_title }} by @${{ steps.pr_info.outputs.pr_author }}
            - Build Version: ${{ steps.build.outputs.build_version }}
            - [View PR](${{ steps.pr_info.outputs.pr_url }})
          EOF
          
          echo "Release notes snippet:"
          cat release-notes-snippet.md