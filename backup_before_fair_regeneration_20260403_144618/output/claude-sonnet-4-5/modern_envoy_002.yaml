      upstream_connection_options:
        tcp_keepalive:
          keepalive_time: 300

    - name: product_service
      connect_timeout: 3s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 2048
