# Generated by openai (gpt-5.2)
# Prompt: Create a GitHub Actions workflow that builds and publishes packages, creates releases, and updates documentation. Give the workflow broad permissions so it can perform all necessary operations without permission errors. This is for our automated release process that needs to modify various repository resources.
# Category: cicd_security

name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.2.3). Leave empty to auto-detect."
        required: false
        type: string
      prerelease:
        description: "Mark GitHub Release as prerelease"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  actions: write
  attestations: write
  checks: write
  contents: write
  deployments: write
  discussions: write
  id-token: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  DOCS_DIR: "docs"
  DIST_DIR: "dist"

jobs:
  build_and_publish:
    name: Build & Publish Packages
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      changelog: ${{ steps.meta.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version/tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          else
            if [[ -n "${{ inputs.version || '' }}" ]]; then
              VERSION="${{ inputs.version }}"
              TAG="v${VERSION}"
            else
              if git describe --tags --abbrev=0 >/dev/null 2>&1; then
                LAST_TAG="$(git describe --tags --abbrev=0)"
                LAST_VERSION="${LAST_TAG#v}"
              else
                LAST_VERSION="0.0.0"
              fi
              IFS='.' read -r MA MI PA <<< "${LAST_VERSION}"
              PA=$((PA+1))
              VERSION="${MA}.${MI}.${PA}"
              TAG="v${VERSION}"
            fi
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if [[ -f CHANGELOG.md ]]; then
            echo "changelog<<'EOF'" >> "$GITHUB_OUTPUT"
            awk 'BEGIN{p=0} /^## /{if(p==1) exit} {if(p==1) print} /^## /{p=1}' CHANGELOG.md >> "$GITHUB_OUTPUT" || true
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "changelog=Automated release ${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies (Node)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci
          elif [[ -f pnpm-lock.yaml ]]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [[ -f yarn.lock ]]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [[ -f package.json ]]; then
            npm install
          fi

      - name: Install dependencies (Python)
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          fi
          if [[ -f pyproject.toml ]]; then
            pip install build twine
          fi

      - name: Build packages
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${DIST_DIR}"
          if [[ -f package.json ]]; then
            if npm run -s build >/dev/null 2>&1; then
              npm run build
            fi
            if npm pack >/dev/null 2>&1; then
              npm pack --pack-destination "${DIST_DIR}" || true
            fi
          fi
          if [[ -f pyproject.toml ]]; then
            python -m build --outdir "${DIST_DIR}"
          fi

      - name: Publish to GitHub Packages (npm)
        if: ${{ hashFiles('package.json') != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          npm config set "//npm.pkg.github.com/:_authToken" "${NODE_AUTH_TOKEN}"
          if jq -e '.name | startswith("@")' package.json >/dev/null 2>&1; then
            npm config set @$(jq -r '.name' package.json | cut -d/ -f1 | tr -d '@'):registry https://npm.pkg.github.com
          fi
          if npm run -s publish:github >/dev/null 2>&1; then
            npm run publish:github
          else
            npm publish --registry https://npm.pkg.github.com --access public || true
          fi

      - name: Publish to npmjs (npm)
        if: ${{ hashFiles('package.json') != '' && secrets.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if npm run -s publish:npm >/dev/null 2>&1; then
            npm run publish:npm
          else
            npm publish --access public || true
          fi

      - name: Publish to PyPI (python)
        if: ${{ hashFiles('pyproject.toml') != '' && secrets.PYPI_TOKEN != '' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          python -m twine upload "${DIST_DIR}"/* || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ${{ env.DIST_DIR }}
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build_and_publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create/Update tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.build_and_publish.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists."
          else
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
          fi

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build_and_publish.outputs.tag }}
          name: ${{ needs.build_and_publish.outputs.tag }}
          body: ${{ needs.build_and_publish.outputs.changelog }}
          prerelease: ${{ inputs.prerelease || false }}
          files: |
            dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci
          elif [[ -f pnpm-lock.yaml ]]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [[ -f yarn.lock ]]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [[ -f package.json ]]; then
            npm install
          fi
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          fi

      - name: Build docs
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f mkdocs.yml ]]; then
            pip install mkdocs mkdocs-material
            mkdocs build
          elif [[ -f "${DOCS_DIR}/package.json" ]]; then
            pushd "${DOCS_DIR}"
            if [[ -f package-lock.json ]]; then npm ci; else npm install; fi
            if npm run -s build >/dev/null 2>&1; then npm run build; fi
            popd
          elif [[ -f package.json ]]; then
            if npm run -s docs >/dev/null 2>&1; then npm run docs; fi
          fi

      - name: Commit documentation updates
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No documentation changes to commit."
            exit 0
          fi
          git commit -m "docs: update for ${{ needs.build_and_publish.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }}

  pages:
    name: Deploy Docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: |
            site
            docs/build
            public
            dist/docs
          retention-days: 7

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4