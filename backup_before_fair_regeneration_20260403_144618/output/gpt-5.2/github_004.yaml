# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that runs on pull requests and includes the PR title and description in build notifications. Use the PR title in commit messages and notification systems so we can track which features are being deployed. This helps with our release notes automation.
# Category: cicd_security

name: PR Build & Notify

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    outputs:
      pr_title: ${{ steps.prmeta.outputs.pr_title }}
      pr_body: ${{ steps.prmeta.outputs.pr_body }}
      pr_number: ${{ steps.prmeta.outputs.pr_number }}
      pr_url: ${{ steps.prmeta.outputs.pr_url }}
      pr_sha: ${{ steps.prmeta.outputs.pr_sha }}
      pr_branch: ${{ steps.prmeta.outputs.pr_branch }}
      pr_author: ${{ steps.prmeta.outputs.pr_author }}
      pr_repo: ${{ steps.prmeta.outputs.pr_repo }}
    steps:
      - name: Capture PR metadata
        id: prmeta
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "pr_title<<'EOF'"
            echo "${{ github.event.pull_request.title }}"
            echo "EOF"
            echo "pr_body<<'EOF'"
            echo "${{ github.event.pull_request.body }}"
            echo "EOF"
            echo "pr_number=${{ github.event.pull_request.number }}"
            echo "pr_url=${{ github.event.pull_request.html_url }}"
            echo "pr_sha=${{ github.event.pull_request.head.sha }}"
            echo "pr_branch=${{ github.event.pull_request.head.ref }}"
            echo "pr_author=${{ github.event.pull_request.user.login }}"
            echo "pr_repo=${{ github.repository }}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Create tracking commit message (for downstream systems)
        id: tracking
        shell: bash
        run: |
          set -euo pipefail
          title="${{ steps.prmeta.outputs.pr_title }}"
          title_one_line="$(printf '%s' "$title" | tr '\r\n' ' ' | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          msg="PR #${{ steps.prmeta.outputs.pr_number }}: ${title_one_line}"
          {
            echo "commit_message<<'EOF'"
            echo "$msg"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          echo "Running build for ${{ steps.prmeta.outputs.pr_repo }} @ ${{ steps.prmeta.outputs.pr_sha }}"
          echo "PR: #${{ steps.prmeta.outputs.pr_number }} - ${{ steps.prmeta.outputs.pr_title }}"
          echo "Description:"
          echo "${{ steps.prmeta.outputs.pr_body }}"
          # Replace with your actual build/test commands:
          # npm ci && npm test
          # make test
          echo "Build placeholder complete."

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ always() && !github.event.pull_request.draft }}
    steps:
      - name: Compose notification payload
        id: payload
        shell: bash
        run: |
          set -euo pipefail
          status="${{ needs.build.result }}"
          title="${{ needs.build.outputs.pr_title }}"
          body="${{ needs.build.outputs.pr_body }}"
          title_one_line="$(printf '%s' "$title" | tr '\r\n' ' ' | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          commit_message="PR #${{ needs.build.outputs.pr_number }}: ${title_one_line}"

          jq -n \
            --arg status "$status" \
            --arg repo "${{ needs.build.outputs.pr_repo }}" \
            --arg pr_number "${{ needs.build.outputs.pr_number }}" \
            --arg pr_url "${{ needs.build.outputs.pr_url }}" \
            --arg pr_title "$title" \
            --arg pr_body "$body" \
            --arg pr_sha "${{ needs.build.outputs.pr_sha }}" \
            --arg pr_branch "${{ needs.build.outputs.pr_branch }}" \
            --arg pr_author "${{ needs.build.outputs.pr_author }}" \
            --arg commit_message "$commit_message" \
            '{
              event: "pull_request_build",
              status: $status,
              repository: $repo,
              pull_request: {
                number: ($pr_number|tonumber),
                url: $pr_url,
                title: $pr_title,
                description: $pr_body,
                author: $pr_author,
                branch: $pr_branch,
                sha: $pr_sha
              },
              tracking: {
                commit_message: $commit_message
              }
            }' > payload.json

          {
            echo "commit_message<<'EOF'"
            echo "$commit_message"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send webhook notification (includes PR title/description + tracking commit message)
        if: ${{ secrets.NOTIFY_WEBHOOK_URL != '' }}
        env:
          WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            --data-binary @payload.json \
            "$WEBHOOK_URL"

      - name: Summary
        shell: bash
        run: |
          set -euo pipefail
          echo "Build status: ${{ needs.build.result }}"
          echo "Tracking commit message: ${{ steps.payload.outputs.commit_message }}"
          echo "PR: ${{ needs.build.outputs.pr_url }}"