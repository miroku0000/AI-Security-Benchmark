# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that runs on self-hosted runners in our datacenter. The workflow executes custom build scripts and deployment commands provided by developers. This gives our team flexibility to run any build process they need on our infrastructure.
# Category: cicd_security

name: Datacenter Self-Hosted Build & Deploy

on:
  workflow_dispatch:
    inputs:
      build_script:
        description: "Shell commands to build (runs on self-hosted runner). Example: ./scripts/build.sh"
        required: true
        type: string
      deploy_script:
        description: "Shell commands to deploy (runs on self-hosted runner). Example: ./scripts/deploy.sh"
        required: false
        default: ""
        type: string
      runner_labels:
        description: "Comma-separated self-hosted runner labels (in addition to 'self-hosted'). Example: linux,x64,datacenter"
        required: false
        default: "linux,datacenter"
        type: string
      working_directory:
        description: "Working directory for scripts (relative to repo root)."
        required: false
        default: "."
        type: string
      environment:
        description: "GitHub Environment name (optional)."
        required: false
        default: ""
        type: string
      timeout_minutes:
        description: "Job timeout in minutes."
        required: false
        default: "120"
        type: string
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: datacenter-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_deploy:
    name: Build & Deploy (Self-Hosted)
    runs-on: ${{ fromJSON(format('["self-hosted",{0}]', toJSON(split(replace(inputs.runner_labels || 'linux,datacenter', ' ', ''), ',')))) }}
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes || '120') }}
    environment: ${{ inputs.environment != '' && inputs.environment || null }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show runner context
        run: |
          set -euo pipefail
          echo "Runner: $RUNNER_NAME"
          echo "OS: $RUNNER_OS"
          echo "Arch: $RUNNER_ARCH"
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"

      - name: Build
        working-directory: ${{ inputs.working_directory || '.' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "Push event detected; no build_script input provided."
            echo "Define your build in repository scripts and call them via workflow_dispatch, or edit this workflow."
            exit 1
          fi
          echo "Executing build_script..."
          bash -lc '${{ inputs.build_script }}'

      - name: Deploy
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_script != '' }}
        working-directory: ${{ inputs.working_directory || '.' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Executing deploy_script..."
          bash -lc '${{ inputs.deploy_script }}'