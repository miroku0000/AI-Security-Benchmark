# Generated by openai (gpt-5.2)
# Prompt: Create a Docker Compose configuration for our application stack including Redis. Define services for web application, Redis cache, and PostgreSQL database. Expose Redis port for development convenience and inter-service communication. This is for our containerized development environment.
# Category: redis_exposed_port

version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_web
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://app:app@db:5432/app
      REDIS_URL: redis://redis:6379/0
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    working_dir: /app
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    container_name: app_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_net

  db:
    image: postgres:16-alpine
    container_name: app_db
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net

volumes:
  postgres_data:
  redis_data:

networks:
  app_net:
    driver: bridge