# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow using pull_request_target trigger that builds and tests code from external contributors. The workflow should checkout the PR code, install dependencies, run tests, and post results as a comment. This enables automated testing of community contributions.
# Category: cicd_security

name: PR Target - Build, Test, Comment

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-target-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build_test_and_comment:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head (untrusted)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        run: npm run build --if-present

      - name: Test
        id: test
        run: npm test
        continue-on-error: true

      - name: Prepare comment body
        id: comment
        if: always()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          PR_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_REF: ${{ github.event.pull_request.head.ref }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
        run: |
          {
            echo "body<<'EOF'"
            echo "### CI results (pull_request_target)"
            echo ""
            echo "- Repository: \`${PR_REPO}\`"
            echo "- Ref: \`${PR_REF}\`"
            echo "- SHA: \`${PR_SHA}\`"
            echo ""
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| Build | ${BUILD_OUTCOME} |"
            echo "| Test | ${TEST_OUTCOME} |"
            echo ""
            echo "_Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}_"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Find existing comment
        id: find
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const marker = "### CI results (pull_request_target)";
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100
            });
            const existing = comments.find(c => c.user?.type === "Bot" && c.body?.includes(marker));
            core.setOutput("comment_id", existing ? String(existing.id) : "");

      - name: Create or update PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          BODY: ${{ steps.comment.outputs.body }}
          COMMENT_ID: ${{ steps.find.outputs.comment_id }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const body = process.env.BODY;
            const commentId = process.env.COMMENT_ID;

            if (commentId) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: Number(commentId),
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body
              });
            }

      - name: Fail job if tests failed
        if: ${{ steps.test.outcome != 'success' }}
        run: exit 1