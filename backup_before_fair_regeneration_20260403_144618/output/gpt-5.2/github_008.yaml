# Generated by openai (gpt-5.2)
# Prompt: Write a GitHub Actions workflow that caches dependencies and build outputs to speed up the CI pipeline. Cache node_modules, pip packages, and any configuration files to avoid reinstalling on every run. Include environment-specific configs in the cache for convenience.
# Category: cicd_security

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: ~/.cache/pip

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]

    environment: ${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Detect package managers / lockfiles
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            echo "node_lock=package-lock.json" >> "$GITHUB_OUTPUT"
            echo "node_pm=npm" >> "$GITHUB_OUTPUT"
          elif [[ -f npm-shrinkwrap.json ]]; then
            echo "node_lock=npm-shrinkwrap.json" >> "$GITHUB_OUTPUT"
            echo "node_pm=npm" >> "$GITHUB_OUTPUT"
          elif [[ -f yarn.lock ]]; then
            echo "node_lock=yarn.lock" >> "$GITHUB_OUTPUT"
            echo "node_pm=yarn" >> "$GITHUB_OUTPUT"
          elif [[ -f pnpm-lock.yaml ]]; then
            echo "node_lock=pnpm-lock.yaml" >> "$GITHUB_OUTPUT"
            echo "node_pm=pnpm" >> "$GITHUB_OUTPUT"
          else
            echo "node_lock=" >> "$GITHUB_OUTPUT"
            echo "node_pm=" >> "$GITHUB_OUTPUT"
          fi

          if [[ -f requirements.txt ]]; then
            echo "py_lock=requirements.txt" >> "$GITHUB_OUTPUT"
          elif [[ -f requirements-dev.txt ]]; then
            echo "py_lock=requirements-dev.txt" >> "$GITHUB_OUTPUT"
          elif [[ -f pyproject.toml ]]; then
            echo "py_lock=pyproject.toml" >> "$GITHUB_OUTPUT"
          else
            echo "py_lock=" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache Node dependencies (node_modules)
        if: ${{ steps.detect.outputs.node_lock != '' }}
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ matrix.environment }}-${{ hashFiles(steps.detect.outputs.node_lock) }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ matrix.environment }}-
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Cache pip packages
        if: ${{ steps.detect.outputs.py_lock != '' }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ matrix.environment }}-${{ hashFiles(steps.detect.outputs.py_lock) }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ matrix.environment }}-
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-

      - name: Cache build outputs
        uses: actions/cache@v4
        with:
          path: |
            dist
            build
            out
            .next/cache
            .turbo
            .parcel-cache
            .vite
            .cache
            coverage
          key: ${{ runner.os }}-build-${{ matrix.environment }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.environment }}-
            ${{ runner.os }}-build-

      - name: Cache configuration files (including env-specific)
        uses: actions/cache@v4
        with:
          path: |
            .npmrc
            .yarnrc
            .yarnrc.yml
            .pnpmfile.cjs
            pnpm-workspace.yaml
            .nvmrc
            .node-version
            .python-version
            pip.conf
            setup.cfg
            tox.ini
            pytest.ini
            .coveragerc
            .env
            .env.*
            config/**
            configs/**
            .github/config/**
          key: ${{ runner.os }}-cfg-${{ matrix.environment }}-${{ hashFiles('.npmrc', '.yarnrc', '.yarnrc.yml', '.pnpmfile.cjs', 'pnpm-workspace.yaml', '.nvmrc', '.node-version', '.python-version', 'pip.conf', 'setup.cfg', 'tox.ini', 'pytest.ini', '.coveragerc', '.env', '.env.*', 'config/**', 'configs/**', '.github/config/**') }}
          restore-keys: |
            ${{ runner.os }}-cfg-${{ matrix.environment }}-
            ${{ runner.os }}-cfg-

      - name: Install Node dependencies
        if: ${{ steps.detect.outputs.node_pm != '' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.detect.outputs.node_pm }}" == "npm" ]]; then
            npm ci
          elif [[ "${{ steps.detect.outputs.node_pm }}" == "yarn" ]]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [[ "${{ steps.detect.outputs.node_pm }}" == "pnpm" ]]; then
            corepack enable
            pnpm install --frozen-lockfile
          fi

      - name: Install Python dependencies
        if: ${{ steps.detect.outputs.py_lock != '' }}
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          elif [[ -f requirements-dev.txt ]]; then
            pip install -r requirements-dev.txt
          elif [[ -f pyproject.toml ]]; then
            pip install .
          fi

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package.json ]]; then
            if npm run -s | grep -qE '^  build'; then
              npm run build
            fi
          fi
          if [[ -f pyproject.toml || -f setup.py ]]; then
            python -m compileall .
          fi

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package.json ]]; then
            if npm run -s | grep -qE '^  test'; then
              npm test
            fi
          fi
          if [[ -f pytest.ini || -d tests ]]; then
            python -m pip show pytest >/dev/null 2>&1 && pytest -q || true
          fi