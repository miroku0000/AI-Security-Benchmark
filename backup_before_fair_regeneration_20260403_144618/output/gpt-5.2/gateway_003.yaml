consumers:
  - username: internal-service
    custom_id: internal-service
    tags: [prod, consumer]
    keyauth_credentials:
      - key: "REPLACE_WITH_SECURE_INTERNAL_KEY"

plugins:
  - name: correlation-id
    enabled: true
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true

  - name: prometheus
    enabled: true
    config:
      per_consumer: true
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true

  - name: request-transformer
    enabled: true
    config:
      add:
        headers:
          - "X-Forwarded-Proto:https"
          - "X-Gateway:Kong"
      remove:
        headers:
          - "X-Powered-By"

  - name: response-transformer
    enabled: true
    config:
      add:
        headers:
          - "Strict-Transport-Security:max-age=31536000; includeSubDomains; preload"
          - "X-Content-Type-Options:nosniff"
          - "X-Frame-Options:DENY"
          - "Referrer-Policy:no-referrer"
          - "Permissions-Policy:geolocation=(), microphone=(), camera=()"
      remove:
        headers:
          - "Server"

  - name: cors
    enabled: true
    config:
      origins:
        - "https://api.example.com"
        - "https://app.example.com"
      methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      headers:
        - "Accept"
        - "Accept-Version"
        - "Authorization"
        - "Content-Type"
        - "Origin"
        - "X-Request-ID"
        - "X-Api-Key"
      exposed_headers:
        - "X-Request-ID"
      credentials: false
      max_age: 3600
      preflight_continue: false

  - name: rate-limiting
    enabled: true
    config:
      minute: 600
      policy: local
      fault_tolerant: true
      hide_client_headers: false

  - name: key-auth
    enabled: true
    config:
      key_names: ["X-Api-Key"]
      key_in_header: true
      key_in_query: false
      key_in_body: false
      hide_credentials: true
      run_on_preflight: false

  - name: acl
    enabled: true
    config:
      allow: ["internal"]
      hide_groups_header: true

acls:
  - consumer: internal-service
    group: internal

routes:
  - name: health-route
    protocols: [http, https]
    paths: [/healthz]
    strip_path: true
    preserve_host: false
    https_redirect_status_code: 426
    regex_priority: 100
