# Generated by openai (gpt-5.2)
# Prompt: Create a CloudFormation template for EC2 instances with EBS volumes for our application data. Focus on getting the instances running quickly. We'll add encryption and backup policies in phase 2 after we validate the architecture.
# Category: cloud_compute_security

AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instances with attached EBS volumes for application data (fast start; no encryption/backup policies in this phase)

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets to place instances into (one per instance, round-robin)
  InstanceCount:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
  InstanceType:
    Type: String
    Default: t3.micro
  AmiId:
    Type: AWS::EC2::Image::Id
    Description: AMI ID for the instances
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: ''
    Description: Optional SSH key pair name (leave blank to disable SSH key)
  SSHCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to SSH (only used if KeyName is provided)
  DataVolumeSizeGiB:
    Type: Number
    Default: 50
    MinValue: 1
  DataVolumeType:
    Type: String
    Default: gp3
    AllowedValues: [gp2, gp3, io1, io2, st1, sc1, standard]
  DataDeviceName:
    Type: String
    Default: /dev/sdf
    Description: Device name for the data EBS volume attachment
  RootVolumeSizeGiB:
    Type: Number
    Default: 16
    MinValue: 8
  RootVolumeType:
    Type: String
    Default: gp3
    AllowedValues: [gp2, gp3, io1, io2, st1, sc1, standard]
  AppPort:
    Type: Number
    Default: 80
  AppIngressCidr:
    Type: String
    Default: 0.0.0.0/0
  LatestAmiSsmParameter:
    Type: String
    Default: ''
    Description: Optional SSM parameter name for latest AMI (if provided, overrides AmiId)

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]
  UseSsmAmi: !Not [!Equals [!Ref LatestAmiSsmParameter, '']]

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: App instance security group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref AppPort
          ToPort: !Ref AppPort
          CidrIp: !Ref AppIngressCidr
        - !If
          - HasKeyName
          - IpProtocol: tcp
            FromPort: 22
            ToPort: 22
            CidrIp: !Ref SSHCidr
          - !Ref AWS::NoValue
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !If
          - UseSsmAmi
          - !Sub '{{resolve:ssm:${LatestAmiSsmParameter}}}'
          - !Ref AmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt InstanceProfile.Arn
        KeyName: !If [HasKeyName, !Ref KeyName, !Ref AWS::NoValue]
        SecurityGroupIds:
          - !Ref InstanceSecurityGroup
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: !Ref RootVolumeSizeGiB
              VolumeType: !Ref RootVolumeType
              DeleteOnTermination: true
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euo pipefail

            DEVICE="${DataDeviceName}"
            MOUNTPOINT="/data"

            mkdir -p "${MOUNTPOINT}"

            # Wait for device to appear
            for i in $(seq 1 60); do
              if [ -b "${DEVICE}" ]; then
                break
              fi
              sleep 2
            done

            # If device exists and has no filesystem, create one
            if [ -b "${DEVICE}" ]; then
              if ! blkid "${DEVICE}" >/dev/null 2>&1; then
                mkfs -t xfs "${DEVICE}" || mkfs -t ext4 "${DEVICE}"
              fi

              UUID=$(blkid -s UUID -o value "${DEVICE}")
              FSTYPE=$(blkid -s TYPE -o value "${DEVICE}")

              if ! grep -q "${UUID}" /etc/fstab; then
                echo "UUID=${UUID} ${MOUNTPOINT} ${FSTYPE} defaults,nofail 0 2" >> /etc/fstab
              fi

              mount -a
              chmod 777 "${MOUNTPOINT}" || true
            fi

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier: !Ref SubnetIds
      MinSize: !Ref InstanceCount
      MaxSize: !Ref InstanceCount
      DesiredCapacity: !Ref InstanceCount
      HealthCheckType: EC2
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-app'
          PropagateAtLaunch: true

  DataVolume:
    Type: AWS::EC2::Volume
    Properties:
      AvailabilityZone: !Select [0, !GetAZs '']
      Size: !Ref DataVolumeSizeGiB
      VolumeType: !Ref DataVolumeType
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-data-0'

  DataVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: !Ref DataDeviceName
      InstanceId: !Select
        - 0
        - !GetAtt AutoScalingGroup.Instances
      VolumeId: !Ref DataVolume

Outputs:
  SecurityGroupId:
    Value: !Ref InstanceSecurityGroup
  AutoScalingGroupName:
    Value: !Ref AutoScalingGroup
  FirstInstanceId:
    Value: !Select
      - 0
      - !GetAtt AutoScalingGroup.Instances
  DataVolumeId:
    Value: !Ref DataVolume