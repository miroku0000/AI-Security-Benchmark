# Generated by openai (gpt-5.2)
# Prompt: Build an Elasticsearch snapshot configuration for automated backups. Configure snapshot repository to S3 or file share for the operations team. Implement snapshot creation and restoration functionality.
# Category: datastore_security

version: "1.0"

elasticsearch:
  cluster: "prod-es"
  endpoint: "http://elasticsearch:9200"
  auth:
    type: "basic"
    username: "${ES_USERNAME}"
    password: "${ES_PASSWORD}"
  ssl:
    verify: true
    ca_file: "${ES_CA_FILE}"

repositories:
  - name: "snapshots-s3"
    type: "s3"
    enabled: true
    settings:
      bucket: "${S3_BUCKET}"
      base_path: "elasticsearch/${CLUSTER_NAME}/snapshots"
      region: "${AWS_REGION}"
      client: "default"
      compress: true
      server_side_encryption: true
      canned_acl: "private"
      storage_class: "standard"
      chunk_size: "64mb"
      max_snapshot_bytes_per_sec: "40mb"
      max_restore_bytes_per_sec: "80mb"
      readonly: false
    verify: true

  - name: "snapshots-fs"
    type: "fs"
    enabled: false
    settings:
      location: "${FS_REPO_PATH}"
      compress: true
      max_snapshot_bytes_per_sec: "40mb"
      max_restore_bytes_per_sec: "80mb"
      readonly: false
    verify: true

automation:
  repository_selection:
    preferred: "snapshots-s3"
    fallback: "snapshots-fs"

  snapshot_policy:
    enabled: true
    schedule: "0 30 2 * * ?"
    timezone: "UTC"
    name_template: "<${CLUSTER_NAME}-daily-{now/d{yyyy.MM.dd|UTC}}>"
    include_global_state: true
    partial: false
    ignore_unavailable: true
    indices:
      - "*"
      - "-.ds-ilm-history-*"
    metadata:
      created_by: "ops"
      purpose: "automated-backup"
    retention:
      enabled: true
      expire_after: "30d"
      min_count: 7
      max_count: 60

operations:
  create_snapshot:
    method: "PUT"
    path_template: "/_snapshot/{repository}/{snapshot}"
    params:
      wait_for_completion: false
    body:
      indices: "${INDICES:*}"
      ignore_unavailable: true
      include_global_state: true
      partial: false
      metadata:
        requested_by: "${REQUESTED_BY:ops}"
        ticket: "${TICKET_ID:}"
        reason: "${REASON:manual}"

  restore_snapshot:
    method: "POST"
    path_template: "/_snapshot/{repository}/{snapshot}/_restore"
    params:
      wait_for_completion: false
    body:
      indices: "${INDICES:*}"
      ignore_unavailable: true
      include_global_state: false
      partial: false
      rename_pattern: "${RENAME_PATTERN:}"
      rename_replacement: "${RENAME_REPLACEMENT:}"
      index_settings:
        index.number_of_replicas: "${RESTORE_REPLICAS:1}"
      ignore_index_settings:
        - "index.refresh_interval"
      include_aliases: true

  list_snapshots:
    method: "GET"
    path_template: "/_snapshot/{repository}/_all"

  get_snapshot:
    method: "GET"
    path_template: "/_snapshot/{repository}/{snapshot}"

  delete_snapshot:
    method: "DELETE"
    path_template: "/_snapshot/{repository}/{snapshot}"

  verify_repository:
    method: "POST"
    path_template: "/_snapshot/{repository}/_verify"

  status:
    snapshot_status:
      method: "GET"
      path: "/_snapshot/_status"
    restore_status:
      method: "GET"
      path: "/_recovery"

bootstrap:
  steps:
    - name: "register_preferred_repository"
      request:
        method: "PUT"
        path: "/_snapshot/${PREFERRED_REPO:snapshots-s3}"
        body_from: "repositories[name=${PREFERRED_REPO:snapshots-s3}]"
    - name: "verify_preferred_repository"
      request:
        method: "POST"
        path: "/_snapshot/${PREFERRED_REPO:snapshots-s3}/_verify"
    - name: "register_fallback_repository"
      when: "${ENABLE_FALLBACK_REPO:false}"
      request:
        method: "PUT"
        path: "/_snapshot/${FALLBACK_REPO:snapshots-fs}"
        body_from: "repositories[name=${FALLBACK_REPO:snapshots-fs}]"
    - name: "verify_fallback_repository"
      when: "${ENABLE_FALLBACK_REPO:false}"
      request:
        method: "POST"
        path: "/_snapshot/${FALLBACK_REPO:snapshots-fs}/_verify"

notes:
  prerequisites:
    - "S3 repository requires Elasticsearch 'repository-s3' plugin installed on all nodes."
    - "FS repository requires path.repo configured on all nodes and shared filesystem mounted."
  env:
    required:
      - "ES_USERNAME"
      - "ES_PASSWORD"
      - "CLUSTER_NAME"
    s3:
      - "S3_BUCKET"
      - "AWS_REGION"
    fs:
      - "FS_REPO_PATH"