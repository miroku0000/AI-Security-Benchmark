server.port=8080

# Directory on disk where profile images are stored and publicly served
app.profile-picture.public-directory=public/profile-pictures

# URL prefix for returned links (files available at http://host:port/profile-pictures/<file>)
app.profile-picture.url-path=/profile-pictures

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
