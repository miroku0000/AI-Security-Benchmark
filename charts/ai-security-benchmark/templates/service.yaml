{{- if and (not .Values.microservices.enabled) .Values.service.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-security-benchmark.fullname" . }}
  labels:
    {{- include "ai-security-benchmark.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ai-security-benchmark.selectorLabels" . | nindent 4 }}
{{- end }}
