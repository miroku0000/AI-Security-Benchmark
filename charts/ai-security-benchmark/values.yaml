replicaCount: 1

image:
  repository: ai-security-benchmark
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  enabled: true
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

env: []

db:
  enabled: true
  host: "postgres"
  port: 5432
  name: "app"
  username: "admin"
  password: ""
  existingSecret: ""
  existingSecretUsernameKey: "username"
  existingSecretPasswordKey: "password"

microservices:
  enabled: false
  namePrefix: ""
  default:
    replicaCount: 1
    image:
      pullPolicy: IfNotPresent
    service:
      enabled: true
      type: ClusterIP
    ingress:
      enabled: false
      className: ""
      annotations: {}
  services: []
