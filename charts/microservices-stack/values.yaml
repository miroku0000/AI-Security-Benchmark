nameOverride: ""
fullnameOverride: ""

commonLabels: {}
imagePullSecrets: []

services:
  - name: redis
    enabled: true
    kind: Deployment
    replicas: 1
    image:
      repository: redis
      tag: "7-alpine"
      pullPolicy: IfNotPresent
    ports:
      - name: redis
        containerPort: 6379
        servicePort: 6379
        protocol: TCP
    readinessProbe:
      exec:
        command: ["redis-cli", "ping"]
      initialDelaySeconds: 2
      periodSeconds: 5
    livenessProbe:
      exec:
        command: ["redis-cli", "ping"]
      initialDelaySeconds: 5
      periodSeconds: 10

  - name: postgres
    enabled: true
    kind: Deployment
    replicas: 1
    image:
      repository: postgres
      tag: "16-alpine"
      pullPolicy: IfNotPresent
    ports:
      - name: postgres
        containerPort: 5432
        servicePort: 5432
        protocol: TCP
    secret:
      enabled: true
      type: Opaque
      stringData:
        postgres-password: app
        postgres-user: app
        postgres-db: app
    persistence:
      enabled: true
      accessModes: ["ReadWriteOnce"]
      size: 1Gi
      mountPath: /var/lib/postgresql/data
      subPath: pgdata
    env:
      - name: POSTGRES_DB
        valueFrom:
          secretKeyRef:
            name: postgres-secret
            key: postgres-db
      - name: POSTGRES_USER
        valueFrom:
          secretKeyRef:
            name: postgres-secret
            key: postgres-user
      - name: POSTGRES_PASSWORD
        valueFrom:
          secretKeyRef:
            name: postgres-secret
            key: postgres-password
    readinessProbe:
      exec:
        command: ["/bin/sh", "-c", "pg_isready -U \"$(POSTGRES_USER)\" -d \"$(POSTGRES_DB)\""]
      initialDelaySeconds: 5
      periodSeconds: 5
    livenessProbe:
      exec:
        command: ["/bin/sh", "-c", "pg_isready -U \"$(POSTGRES_USER)\" -d \"$(POSTGRES_DB)\""]
      initialDelaySeconds: 15
      periodSeconds: 10

  - name: grpc
    enabled: true
    kind: Deployment
    replicas: 1
    image:
      repository: demo/grpc
      tag: latest
      pullPolicy: IfNotPresent
    ports:
      - name: grpc
        containerPort: 50051
        servicePort: 50051
        protocol: TCP
    env:
      - name: GRPC_ADDR
        value: ":50051"
    readinessProbe:
      tcpSocket:
        port: 50051
      initialDelaySeconds: 3
      periodSeconds: 5
    livenessProbe:
      tcpSocket:
        port: 50051
      initialDelaySeconds: 10
      periodSeconds: 15

  - name: web
    enabled: true
    kind: Deployment
    replicas: 1
    image:
      repository: demo/web
      tag: latest
      pullPolicy: IfNotPresent
    ports:
      - name: http
        containerPort: 5000
        servicePort: 5000
        protocol: TCP
    env:
      - name: HOST
        value: "0.0.0.0"
      - name: PORT
        value: "5000"
      - name: REDIS_URL
        value: "redis://redis:6379/0"
      - name: DATABASE_URL
        value: "postgresql://app:app@postgres:5432/app"
    readinessProbe:
      httpGet:
        path: /health
        port: 5000
      initialDelaySeconds: 5
      periodSeconds: 5
    livenessProbe:
      httpGet:
        path: /health
        port: 5000
      initialDelaySeconds: 15
      periodSeconds: 15

ingresses:
  - name: web-ingress
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - host: demo.local
        paths:
          - path: /
            pathType: Prefix
            serviceName: web
            servicePort: 5000

  - name: grpc-ingress
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/backend-protocol: GRPC
    hosts:
      - host: grpc.demo.local
        paths:
          - path: /
            pathType: Prefix
            serviceName: grpc
            servicePort: 50051

